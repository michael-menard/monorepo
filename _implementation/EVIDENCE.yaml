story_id: WINT-0270
version: 1
timestamp: '2026-03-20T11:50:00Z'

acceptance_criteria:
  - ac_id: AC-1
    ac_text: >-
      The harness shall include a task corpus with at least 3 prompts per category for 4 categories:
      code_generation, code_review, elaboration_analysis, lint_syntax.
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/model-selector/benchmark-corpus.ts
        description: >-
          Exports BENCHMARK_CORPUS with 12 tasks: 3 per category across all 4 categories.
          Tasks sourced from real monorepo context (TypeScript snippets, YAML fragments, lint output).
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-corpus.test.ts
        description: >-
          18 tests pass verifying: >= 12 total tasks, all 4 categories present,
          >= 3 tasks per category, unique IDs, non-empty prompts, naming convention.
      - type: command
        command: pnpm --filter @repo/orchestrator test -- src/model-selector/__tests__/benchmark-corpus.test.ts
        result: SUCCESS (18/18 tests pass)

  - ac_id: AC-2
    ac_text: >-
      The harness shall iterate all 5 required Ollama models against each task,
      recording latency_ms, cost_usd=0, and raw output per run.
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/model-selector/benchmark-harness.ts
        description: >-
          runBenchmarkHarness() iterates REQUIRED_MODELS x BENCHMARK_CORPUS tasks.
          Records latency_ms, cost_usd=0, raw output via callOllama(), evaluateQuality().
      - type: file
        path: packages/backend/orchestrator/src/model-selector/constants.ts
        description: >-
          REQUIRED_MODELS exports all 5 models: deepseek-coder-v2:16b, codellama:13b,
          qwen2.5-coder:14b, qwen2.5-coder:7b, llama3.2:8b.
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-harness.test.ts
        description: >-
          runBenchmarkHarness() test verifies 2 models x 2 tasks = 4 fetch calls.
          summary.totalRuns = 4 confirmed.

  - ac_id: AC-3
    ac_text: >-
      For each (model, task) pair, the harness shall call evaluateQuality() and
      recordRun() to persist results to the leaderboard YAML.
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/model-selector/benchmark-harness.ts
        description: >-
          runSingleBenchmark() calls evaluateQuality(contract, 'tier-3', output) and
          recordRun(leaderboardPath, {...evaluation, cost_usd: 0, latency_ms, task_id}).
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-harness.test.ts
        description: >-
          Test "should persist a leaderboard entry via recordRun (AC-3)" verifies
          leaderboard YAML file is created after each run. Test "should persist leaderboard
          after all runs (AC-3: recordRun called)" verifies file exists after harness run.

  - ac_id: AC-4
    ac_text: >-
      The harness shall include a QUALITY_EVALUATOR_LIMITATION constant documenting
      that scores are heuristic-only (keyword matching, length heuristics, no semantic analysis).
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/model-selector/benchmark-harness.ts
        description: >-
          QUALITY_EVALUATOR_LIMITATION exported constant with JSDoc documentation explaining
          heuristic-only nature: keyword matching, length heuristics, no semantic analysis,
          no code execution. Printed in harness_start and summary_header log events.
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-harness.test.ts
        description: >-
          3 tests verify: QUALITY_EVALUATOR_LIMITATION is non-empty, mentions 'heuristic'
          or 'keyword', mentions 'semantic'.

  - ac_id: AC-5
    ac_text: >-
      MODEL_LEADERBOARD_PATH shall be a named constant in constants.ts,
      not hardcoded in harness files.
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/model-selector/constants.ts
        description: >-
          MODEL_LEADERBOARD_PATH exported as named constant:
          path.join(process.cwd(), 'data', 'model-leaderboard.yaml').
          REQUIRED_MODELS, OLLAMA_BASE_URL, OLLAMA_GENERATE_PATH also exported.
      - type: file
        path: packages/backend/orchestrator/src/model-selector/benchmark-harness.ts
        description: >-
          Imports MODEL_LEADERBOARD_PATH, REQUIRED_MODELS, OLLAMA_BASE_URL, OLLAMA_GENERATE_PATH
          from constants.ts. No hardcoded paths in harness file.

  - ac_id: AC-6
    ac_text: >-
      The benchmark script shall be developer-local only (scripts/benchmark-models.ts)
      and NOT referenced in CI configuration.
    status: PASS
    evidence_items:
      - type: file
        path: scripts/benchmark-models.ts
        description: >-
          Developer-local CLI script. Imports runBenchmarkHarness from benchmark-harness.ts.
          Supports --leaderboard-path, --models, --ollama-url arguments.
          Not referenced in any CI config files.
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-harness.test.ts
        description: >-
          Unit tests use vi.stubGlobal('fetch', mockFetch) — no live Ollama network calls.
          Tests are isolated from network.

  - ac_id: AC-7
    ac_text: >-
      The harness shall set cost_usd = 0 for all Ollama model runs
      (zero-cost sentinel per WINT-0260).
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/model-selector/benchmark-harness.ts
        description: >-
          BenchmarkResultSchema uses z.literal(0) for cost_usd field, enforcing zero-cost sentinel.
          runSingleBenchmark() hardcodes cost_usd: 0 in both success and error paths.
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-harness.test.ts
        description: >-
          Test "should return a BenchmarkResult with cost_usd = 0 (AC-7: Ollama zero-cost sentinel)"
          explicitly verifies result.cost_usd === 0. Additional tests in buildSummary() and
          runBenchmarkHarness() sections verify cost_usd sentinel is maintained.

  - ac_id: AC-8
    ac_text: >-
      Unit tests shall cover: task iteration loop (all tasks x all models),
      result aggregation (averages, ranking), mock Ollama responses.
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-harness.test.ts
        description: >-
          23 tests covering: callOllama (4 tests), QUALITY_EVALUATOR_LIMITATION (3 tests),
          runSingleBenchmark (6 tests), buildSummary (5 tests), runBenchmarkHarness (5 tests).
          All use vi.stubGlobal('fetch', mockFetch) for Ollama mocking.
      - type: test
        path: packages/backend/orchestrator/src/model-selector/__tests__/benchmark-corpus.test.ts
        description: >-
          18 tests verifying corpus structure: category counts, ID uniqueness, prompt validity,
          naming convention, expected keyword arrays.
      - type: command
        command: pnpm --filter @repo/orchestrator test -- src/model-selector/__tests__/
        result: SUCCESS (112 tests pass across 5 model-selector test files)

