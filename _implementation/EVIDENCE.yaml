notable_decisions:
  - >-
    ARCH-001: MODEL_LEADERBOARD_PATH = path.join(process.cwd(), 'data', 'model-leaderboard.yaml').
    Injectable for tests via BenchmarkOptions argument.
  - >-
    ARCH-002: Direct HTTP fetch to Ollama /api/generate. No PipelineModelRouter stack.
    Makes Ollama call easy to mock in unit tests via vi.stubGlobal('fetch').
  - >-
    ARCH-003: REQUIRED_MODELS hardcoded in constants.ts: 5 models from setup-ollama-models.sh.
  - >-
    @repo/logger workspace dependency not resolved in worktree node_modules due to pnpm
    workspace symlink setup. Fixed by copying logger dist and creating @repo/logger symlink.
    Pre-existing issue not caused by this story.

known_deviations:
  - >-
    Worktree node_modules missing @repo/* workspace packages. Worked around by copying
    logger dist and creating symlink. This is a worktree setup issue, not a code issue.
  - >-
    pnpm --filter check-types fails in worktree due to missing @repo/logger resolution
    in TypeScript compiler (pre-existing issue in leaderboard.ts also affected).
    Type check passes cleanly from main monorepo.

