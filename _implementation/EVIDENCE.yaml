    Developer tooling story (packages slice only). No browser UI, no HTTP endpoints.
    Benchmark harness is a local CLI script targeting Ollama — not a user-facing feature.
    All tests are unit tests with mocked Ollama via vi.stubGlobal('fetch').
  tests_written: false

