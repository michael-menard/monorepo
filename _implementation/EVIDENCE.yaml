notes:
  - >-
    The story_token_usage table does NOT have an estimated_cost column in the actual database
    baseline (999_full_schema_baseline.sql line 309-322). The PLAN.yaml warning about
    estimated_cost was based on a misread of line 94 in 999_add_telemetry_tables.sql which
    references agent_invocations, not story_token_usage. The migration correctly omits
    estimated_cost from the new partitioned story_token_usage DDL.
  - >-
    E2E tests are not applicable for this story_type (database migration + pgTAP tests).
    The pgTAP tests serve as the integration test layer and require the migration to be
    applied to a live PostgreSQL instance with the pgTAP extension installed.
  - >-
    Migration 1090 (referenced in PLAN.yaml as taken by CDBE-3030 token_dashboard matview)
    does not exist in the filesystem yet. Migration 1100 is the next sequential migration.
