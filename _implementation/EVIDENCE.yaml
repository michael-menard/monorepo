  - ac_id: AC3
    description: Example trigger unit test passing
    status: PASS
    evidence:
      - type: file
        path: tests/db/triggers/test_set_story_completed_at.sql
        description: 6-assertion pgtap test for set_story_completed_at() trigger function
      - type: command
        command: pg_prove --host localhost --username pgtap --dbname pgtap_test --verbose /tmp/test_set_story_completed_at.sql
        result: |
          1..6
          ok 1 - set_story_completed_at() function should exist in public schema
          ok 2 - completed_at should be NULL before transitioning to completed
          ok 3 - completed_at should be set when state transitions to completed
          ok 4 - completed_at should not be overwritten on a second transition to completed
          ok 5 - completed_at should be set for TEST-0002 independently
          ok 6 - completed_at should remain NULL when transitioning to a non-completed state
          ok
          All tests successful. Files=1, Tests=6, 0 wallclock secs
          Result: PASS

