acceptance_criteria:
  - ac_id: AC-1
    ac_text: >-
      workflow.plan_flows table created with source (text CHECK IN user|inferred|merged),
      confidence (numeric 0-1), status (text CHECK IN approved|unconfirmed|rejected|deferred) columns
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema/workflow.ts
        description: >-
          planFlows Drizzle table defined with source text(), confidence numeric(4,3),
          status text().default('unconfirmed') columns — CHECK constraints enforced in migration
      - type: file
        path: apps/api/knowledge-base/src/db/migrations/1120_aprs1040_plan_flows.sql
        description: >-
          CREATE TABLE IF NOT EXISTS workflow.plan_flows with CONSTRAINT chk_plan_flows_source
          CHECK (source IN ('user','inferred','merged')), chk_plan_flows_status
          CHECK (status IN ('approved','unconfirmed','rejected','deferred')),
          chk_plan_flows_confidence CHECK (confidence IS NULL OR (confidence >= 0 AND confidence <= 1))

  - ac_id: AC-2
    ac_text: >-
      workflow.plan_flow_steps table created with FK to plan_flows ON DELETE CASCADE
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema/workflow.ts
        description: >-
          planFlowSteps Drizzle table defined with flowId uuid().references(() => planFlows.id,
          { onDelete: 'cascade' }), stepOrder integer(), stepLabel text(), stepDescription text()
      - type: file
        path: apps/api/knowledge-base/src/db/migrations/1120_aprs1040_plan_flows.sql
        description: >-
          CREATE TABLE IF NOT EXISTS workflow.plan_flow_steps with
          flow_id UUID NOT NULL REFERENCES workflow.plan_flows(id) ON DELETE CASCADE

  - ac_id: AC-3
    ac_text: >-
      planFlows and planFlowSteps exported from workflow.ts with $inferSelect/$inferInsert type aliases;
      pnpm check-types passes (no new errors introduced by APRS-1040 changes)
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema/workflow.ts
        description: >-
          Exports: PlanFlow (planFlows.$inferSelect), NewPlanFlow (planFlows.$inferInsert),
          PlanFlowStep (planFlowSteps.$inferSelect), NewPlanFlowStep (planFlowSteps.$inferInsert)
      - type: command
        command: pnpm --filter @repo/knowledge-base exec tsc --noEmit
        result: >-
          No new type errors from APRS-1040 changes. Pre-existing errors in
          analytics-operations.ts (phase, iteration properties — unrelated to this story,
          present in worktree before implementation)

  - ac_id: AC-4
    ac_text: >-
      Migration file with safety preamble, CREATE TABLE IF NOT EXISTS, CHECK constraints on source
      and status, FK to workflow.plans ON DELETE CASCADE, supporting indexes, and DO completion block
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/migrations/1120_aprs1040_plan_flows.sql
        description: >-
          Full migration with: CREATE TABLE IF NOT EXISTS for both tables,
          CONSTRAINT chk_plan_flows_source CHECK (source IN ('user','inferred','merged')),
          CONSTRAINT chk_plan_flows_status CHECK (status IN ('approved','unconfirmed','rejected','deferred')),
          CONSTRAINT chk_plan_flows_confidence CHECK (confidence IS NULL OR (confidence >= 0 AND confidence <= 1)),
          FK REFERENCES workflow.plans(id) ON DELETE CASCADE (plan_flows),
          FK REFERENCES workflow.plan_flows(id) ON DELETE CASCADE (plan_flow_steps),
          Indexes: idx_plan_flows_plan_id, idx_plan_flows_status, idx_plan_flow_steps_flow_id,
          idx_plan_flow_steps_flow_order, DO $$ completion notice block with RAISE NOTICE

  - ac_id: AC-5
    ac_text: >-
      pgTAP test file with assertions for table existence, column presence/types,
      CHECK constraint rejection, cascade delete behavior, and index presence
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/migrations/pgtap/1120_aprs1040_plan_flows_test.sql
        description: >-
          21-assertion pgTAP test in BEGIN/ROLLBACK wrapper using TEST-1040-* fixture prefix.
          Groups: TEST-1040-1 table existence (2), TEST-1040-2 plan_flows columns (5),
          TEST-1040-3 plan_flow_steps columns (5), TEST-1040-4 CHECK rejection (3: invalid source,
          invalid status, confidence > 1), TEST-1040-5 FK cascade delete (2: row exists before
          delete, row gone after), TEST-1040-6 index existence (4: plan_id, status, flow_id, flow_order)

