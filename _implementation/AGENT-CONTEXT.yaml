domain: packages/backend/orchestrator
canonical_patterns:
  state_file: packages/backend/orchestrator/src/state/plan-revalidation-state.ts
  node_pattern: packages/backend/orchestrator/src/nodes/plan-revalidation/check-already-implemented.ts
  graph_pattern: packages/backend/orchestrator/src/graphs/plan-refinement.ts
  test_pattern: packages/backend/orchestrator/src/nodes/plan-revalidation/__tests__/check-already-implemented.test.ts
key_types:
  RevalidationVerdict: z.enum(['proceed','needs_revision','already_done','blocked','error'])
  DriftFinding: "{ nodeId, category, severity: 'info'|'warning'|'blocking', summary, detail, confidence }"
  PlanRevalidationState: '{ planSlug, rawPlan, contextSnapshot, driftFindings[], verdict, revalidationPhase, warnings[], errors[] }'
  plan_revision_history: >-
    { id, plan_id(uuid), revision_number, raw_content(text), content_hash, sections(jsonb), change_reason(text),
    changed_by(text), created_at }
heuristic_scoring_rules:
  any_blocking_category_already_implemented: verdict = already_done
  any_blocking_other_categories: verdict = needs_revision
  any_warning_no_blocking: verdict = needs_revision
  all_info_or_no_findings: verdict = proceed
  error_state: verdict = error
adapter_contracts:
  PlanUpdaterFn: >-
    (planSlug: string, updates: { summary?: string; tags?: string[] }, options?: { dryRun?: boolean }) => Promise<{
    updated: boolean; proposedUpdates?: Record<string, unknown> }>
  RevisionLoggerFn: >-
    (planId: string, revisionData: { rawContent: string; contentHash: string; sections: Record<string, unknown>;
    changeReason: string; changedBy: string; revisionNumber: number }) => Promise<void>
  PlanIdResolverFn: '(planSlug: string) => Promise<string | null>'
aprs_3010_complete: true
no_db_migration_needed: true
lessons:
  - >-
    Phase function exports (not just node factories) are required for unit testability — each pure logic step must be an
    exported function
  - >-
    LangGraph mock pattern: vi.mock('@langchain/langgraph', () => ({ Annotation: Object.assign((config) =>
    ({...config}), { Root: ... }) }))
  - All Zod schema parsing with .parse() for validated output construction
  - Graceful fallback to defaults on adapter errors — never throw from node function body
  - Node function returns Partial<PlanRevalidationState>, never full state
