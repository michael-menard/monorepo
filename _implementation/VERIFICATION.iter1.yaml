lessons_to_record:
  - lesson: >-
      When running pnpm test for a package with pre-existing failures, use vitest run <specific-path> to isolate only
      the story-touched test files. Pre-existing failures pollute the full test run output and can obscure the actual
      story test results.
    category: pattern
    tags:
      - testing
      - vitest
      - qa-verify
  - lesson: >-
      pg_class runtime guard pattern (checking table existence before UPDATE) allows migration 1060 to safely deploy
      before migration 1110 without a hard dependency. This is a useful defensive pattern for migrations with forward
      references.
    category: pattern
    tags:
      - sql
      - migrations
      - postgres
      - infrastructure
  - lesson: >-
      Partial unique index (WHERE status = 'active') is the correct pattern to enforce at-most-one active worktree per
      story while allowing unlimited historical records. Standard unique index would block legitimate historical
      entries.
    category: pattern
    tags:
      - sql
      - postgres
      - indexes
      - worktrees
