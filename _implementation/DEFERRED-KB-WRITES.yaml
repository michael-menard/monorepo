      "payload": {
        "title": "Self-referencing Drizzle foreign keys require inline type import syntax",
        "story_id": "CDTS-1030",
        "category": "pattern",
        "what_happened": "CDTS-1030 schema defined a self-referencing FK on plans.parentPlanId → plans.id. Initial implementation failed until the reference was updated to use inline type import syntax.",
        "why": "Drizzle ORM resolves self-referencing FKs at runtime. To avoid circular dependency issues, Drizzle requires the referenced column to be accessed via a function that performs inline type import.",
        "resolution": "Use inline type import syntax for self-referencing FKs: .references((): import('drizzle-orm/pg-core').AnyPgColumn => table.col, { onDelete: 'restrict' }). This pattern is documented and verified in schema.ts.",
        "tags": [
          "drizzle",
          "schema",
          "self-referencing-fk",
          "pattern"
        ]
      },
