      graceful shutdown sequence, Zod schema validation for notification payloads. (AC-9)
  - path: apps/api/knowledge-base/src/embedding-worker/run.ts
    action: create
    reason: >-
      Process entrypoint. OPENAI_API_KEY preflight check (exit 1 with logger error if absent). pg.Client construction +
