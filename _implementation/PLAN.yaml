schema: 1
story_id: CDBE-0010
timestamp: '2026-03-15T00:00:00Z'
steps:
  - id: 1
    description: >-
      Create pgtap-enabled Docker Compose service (docker-compose.pgtap.yml) that extends the local postgres with pgtap
      installed, so local dev can run SQL tests without modifying the shared compose files
    files:
      - docker-compose.pgtap.yml
    dependencies: []
    slice: backend
    verification: >-
      docker compose -f docker-compose.pgtap.yml up -d && docker compose -f docker-compose.pgtap.yml exec pgtap-postgres
      pg_prove --version
  - id: 2
    description: >-
      Create the pgtap test runner shell script (scripts/db/run-pgtap.sh) that discovers and runs all *.sql test files
      under tests/db/, wraps pg_prove, and exits non-zero on failure
    files:
      - scripts/db/run-pgtap.sh
    dependencies:
      - 1
    slice: backend
    verification: bash scripts/db/run-pgtap.sh --help || bash scripts/db/run-pgtap.sh (exits 0 with 0 tests if no test files yet)
  - id: 3
    description: >-
      Create the transaction-rollback fixture helper (tests/db/fixtures/rollback-helper.sql) that wraps each test file
      in BEGIN/ROLLBACK to ensure isolation, with inline documentation explaining the pattern
    files:
      - tests/db/fixtures/rollback-helper.sql
      - tests/db/README.md
    dependencies:
      - 1
    slice: backend
    verification: File exists; README documents the transaction-rollback pattern per AC2
  - id: 4
    description: >-
      Create the example trigger unit test (tests/db/triggers/test_set_story_completed_at.sql) that validates the
      set_story_completed_at() trigger: inserts a story, transitions state to completed, asserts completed_at is set,
      and rolls back
    files:
      - tests/db/triggers/test_set_story_completed_at.sql
    dependencies:
      - 3
    slice: backend
    verification: bash scripts/db/run-pgtap.sh (all tests pass against pgtap postgres container)
  - id: 5
    description: >-
      Add pgtap CI job to .github/workflows/pgtap.yml that spins up a postgres service container with pgtap installed,
      applies the knowledge-base schema, and runs the full pgtap suite
    files:
      - .github/workflows/pgtap.yml
    dependencies:
      - 2
      - 4
    slice: backend
    verification: >-
      Workflow file is valid YAML and references the correct test runner script; can be validated locally with act or by
      inspection
files_to_change:
  - path: docker-compose.pgtap.yml
    action: create
    reason: pgtap-enabled postgres for local dev testing without touching shared compose files
  - path: scripts/db/run-pgtap.sh
    action: create
    reason: Standardized test runner that discovers and executes all tests/db/**/*.sql files via pg_prove
  - path: tests/db/fixtures/rollback-helper.sql
    action: create
    reason: Transaction-rollback fixture helper per AC2
  - path: tests/db/README.md
    action: create
    reason: Documents the rollback fixture pattern and how to run pgtap locally and in CI per AC2
  - path: tests/db/triggers/test_set_story_completed_at.sql
    action: create
    reason: Example trigger test per AC3
  - .github/workflows/pgtap.yml: path
    action: create
    reason: CI pipeline job that runs pgtap on every PR per AC4
commands_to_run:
  - command: docker compose -f docker-compose.pgtap.yml up -d
    when: after step 1, to start local pgtap postgres
    required: false
  - command: bash scripts/db/run-pgtap.sh
    when: after all code changes, to verify example test passes against local pgtap postgres
    required: true
  - command: docker compose -f docker-compose.pgtap.yml down
    when: after test run, cleanup
    required: false
acceptance_criteria_map:
  - ac_id: AC1
    planned_evidence: docker-compose.pgtap.yml starts a postgres+pgtap container; scripts/db/run-pgtap.sh successfully invokes pg_prove
    evidence_type: command
  - ac_id: AC2
    planned_evidence: tests/db/fixtures/rollback-helper.sql contains BEGIN/ROLLBACK wrapper; tests/db/README.md documents the pattern
    evidence_type: file
  - ac_id: AC3
    planned_evidence: tests/db/triggers/test_set_story_completed_at.sql passes via pg_prove (bash scripts/db/run-pgtap.sh exits 0)
    evidence_type: command
  - ac_id: AC4
    planned_evidence: .github/workflows/pgtap.yml exists with postgres service container and pgtap test run step
    evidence_type: file
architectural_decisions:
  - id: ARCH-001
    question: >-
      Should pgtap target the knowledge-base postgres (port 5433, pgvector image) or a dedicated standalone postgres
      container?
    decision: >-
      Dedicated standalone docker-compose.pgtap.yml with a custom image (postgis/postgis or a pgtap-specific image). The
      KB postgres is for agent state, not DB infrastructure testing. A dedicated container avoids polluting shared state
      and can be torn down after tests.
    rationale: 'Clean test isolation, no risk to KB data, can be used in CI via services: block'
    decided_by: planner
  - id: ARCH-002
    question: >-
      Which PostgreSQL image to use for pgtap? Options: (a) build custom FROM postgres:16 + apt-get install
      postgresql-16-pgtap, (b) use itheory/pg-pgtap pre-built image
    decision: >-
      Use a Dockerfile that extends FROM postgres:16 and installs pgtap via apt-get, placed at infra/pgtap/Dockerfile.
      This avoids external image dependencies and gives us full control. The docker-compose.pgtap.yml builds from this
      Dockerfile.
    rationale: >-
      Reproducible, no external image trust issue, matches lesson from pgvector: always be explicit about extension
      installation
    decided_by: planner
  - id: ARCH-003
    question: Where should DB test files live?
    decision: >-
      tests/db/ at repo root, with sub-directories triggers/, fixtures/. This is outside apps/ and packages/ since pgtap
      tests are pure SQL, not part of any Node package.
    rationale: Keeps SQL tests separate from TypeScript test infrastructure; easy to glob for pg_prove
    decided_by: planner
complexity: moderate
notes:
  - pgtap is installed via apt-get install postgresql-16-pgtap in a custom Dockerfile extending postgres:16
  - >-
    The example test targets set_story_completed_at() trigger which exists in the knowledge-base schema
    (999_full_schema_baseline.sql). The CI job must apply that schema before running tests.
  - >-
    The CI job uses services: to run postgres as a sidecar, applies the schema baseline SQL, then runs bash
    scripts/db/run-pgtap.sh
  - No TypeScript code changes required — this story is purely SQL, shell, and CI YAML
  - 'Lesson applied: pgtap tests run inside transactions and ROLLBACK at the end for isolation (per pgtap convention)'
  - 'Lesson applied: graceful-skip not needed here because the CI job explicitly provisions its own DB with pgtap'
