      for blockers/lessons). Both are pure string builders — no KB calls, no network I/O.
    files:
      - packages/backend/workflow-logic/src/context/index.ts
    files_to_read:
      - .claude/agents/_shared/kb-integration.md
      - packages/backend/workflow-logic/src/evidence-judge/index.ts
    dependencies: []
    slice: packages
    verification: pnpm check-types --filter @repo/workflow-logic
