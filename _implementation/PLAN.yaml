architectural_decisions: []
complexity: moderate
notes:
  - >-
    Session functions already exist in packages/backend/mcp-tools/src/session-management/ — no new functions to write,
    only wire-up
  - >-
    The mcp-tools package is NOT a direct dep of @repo/knowledge-base; import paths must be verified. The functions need
    to be imported from the session-management package — check package.json deps first
  - >-
    CRITICAL: session tracking is telemetry, never a gate. Null returns from session_create/complete must log warning
    and let workflow continue
  - 'Access control for session tools: ''all'' role is appropriate — these are observability tools, not admin operations'
  - 'Tool naming: snake_case (session_create not sessionCreate) per MCP convention and elaboration decision'
  - mcp-integration.test.ts currently expects exactly 73 tools — must update to 78 after adding 5 session tools
  - >-
    skill files (.claude/skills/session-create/SKILL.md) reference mcp__postgres-knowledgebase__sessionCreate
    (camelCase) — update to session_create (snake_case) per WINT-2090 elaboration decision
