architectural_decisions: []

complexity: moderate

notes:
  - "story-crud-operations.ts has a compile-time broken reference to storyDetails from schema.ts — storyDetails table was removed in schema consolidation. ST-1 is the most critical fix."
  - "planService.ts references planDetails (local inline table def that was deleted) and storyDetails (also deleted). The getPlanBySlug, getStoriesByPlanSlug, getStoryById functions need rewriting to use only available columns from workflow.plans and workflow.stories."
  - "workflow.stories PK is storyId (text), not id (uuid). planService.ts stories table redef uses correct storyId pattern. story-crud-operations.ts uses stories.id which does not exist."
  - "workflow.plans table has: id, planSlug, title, summary, planType, storyPrefix, tags, rawContent, contentHash, kbEntryId, parentPlanId, deletedAt, supersededBy, embedding, sections, status, priority, priorityOrder. No featureDir, estimatedStories, formatVersion, sourceFile."
  - "telemetry-operations.ts, tool-schemas.ts, tool-handlers.ts changes are comment/string-only — no behavior changes, no risk of test regression."
  - "story-outcomes.test.ts is an integration test requiring real postgres-knowledgebase on port 5433 (ADR-005). Comment updates only — test logic unchanged."
  - "planService.ts PlanWithDetails interface references featureDir, estimatedStories which don't exist in plans table. These fields must be dropped from the response shape or mapped from available columns."
