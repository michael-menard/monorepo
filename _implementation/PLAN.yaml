acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: >-
      Drizzle planFlows table in workflow.ts with source (text, CHECK IN ('user','inferred','merged')), confidence
      (numeric 0-1), status (text, CHECK IN ('approved','unconfirmed','rejected','deferred')) columns; migration creates
      workflow.plan_flows with matching DDL
    evidence_type: file
  - ac_id: AC-2
    planned_evidence: >-
      Drizzle planFlowSteps table in workflow.ts with FK to plan_flows ON DELETE CASCADE; migration creates
      workflow.plan_flow_steps
    evidence_type: file
  - ac_id: AC-3
    planned_evidence: >-
      planFlows and planFlowSteps exported from workflow.ts with $inferSelect/$inferInsert type aliases; pnpm
      check-types passes
    evidence_type: command
  - ac_id: AC-4
    planned_evidence: >-
      Migration file 1120_aprs1040_plan_flows.sql with safety preamble (CREATE TABLE IF NOT EXISTS), CHECK constraints
      on source and status, FK to workflow.plans with ON DELETE CASCADE, supporting indexes, and DO $$ completion notice
      block
    evidence_type: file
  - ac_id: AC-5
    planned_evidence: >-
      pgTAP test file 1120_aprs1040_plan_flows_test.sql with assertions covering: table existence, column
      presence/types, FK integrity, CHECK constraint violations rejected, cascade delete behavior, index existence
    evidence_type: file
architectural_decisions:
  - id: ARCH-001
    question: Use pgEnum() or text() + CHECK constraint for source/status columns?
    decision: Use text() columns with SQL CHECK constraints in migration
    rationale: >-
      All existing workflow schema tables (stories.state, plans.status, etc.) use plain text() columns. pgEnum() is not
      used anywhere in workflow.ts. text() + CHECK is consistent with established pattern and easier to extend.
    decided_by: auto
    kb_decision_id: 48eb87a5-e96b-4f8c-90f5-35ab9e07abb5
  - id: ARCH-002
    question: Migration slot number for 1120?
    decision: Use migration slot 1120 (next after 1110_wint1130_worktrees_table.sql)
    rationale: 'Sequential numbering: last numbered migration is 1110. 1120 is the next logical slot.'
    decided_by: auto
  - id: ARCH-003
    question: 'FK target for plan_flows: plans.id (UUID) or plans.plan_slug (text)?'
    decision: FK to workflow.plans(id) UUID primary key
    rationale: >-
      workflow.plans has id UUID as primary key. Other child tables (plan_details, planRevisionHistory, planEmbeddings)
      all reference plans.id. plan_slug FK is only used in peer-level tables (plan_dependencies, plan_story_links).
      plan_flows is a child of a plan record, so plans.id is the correct anchor.
    decided_by: auto
complexity: simple
notes:
  - Story has no subtasks — steps derived from ACs per schema:1 mode
  - 'ARCH-001: text()+CHECK chosen over pgEnum to match all existing workflow.ts column patterns'
  - 'ARCH-002: Migration slot 1120 is next sequential slot after 1110'
  - 'ARCH-003: FK to plans.id UUID (not plan_slug) consistent with plan_details, plan_revision_history, plan_embeddings'
  - >-
    confidence column: numeric(4,3) gives range 0.000–9.999; use CHECK (confidence >= 0 AND confidence <= 1) to enforce
    0.0-1.0
  - plan_flow_steps FK to plan_flows ON DELETE CASCADE; plan_flows FK to plans ON DELETE CASCADE — full cascade chain
  - pgTAP test uses BEGIN/ROLLBACK wrapper and TEST-1040-* fixture story_id prefix
  - 'Non-goal: No MCP tools, no rawContent migration, no embedding column'
  - 'Risk: FK migration ordering — migration 1120 must run after 999_full_schema_baseline.sql (plans table) and 1110'
  - 'Risk: Source enum values must align with APRS-2010 extract_flows output (user|inferred|merged)'
