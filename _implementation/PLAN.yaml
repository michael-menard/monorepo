architectural_decisions:
  - id: ARCH-001
    question: >-
      How to represent dependency edges between GeneratedStory objects when stories have no persistent IDs at generation
      time?
    decision: >-
      Use story title + parent_flow_id as composite key for edge references within the wire_dependencies node.
      dependencyEdges use from/to as string identifiers (title|flow_id composite or index-based). orderedStories and
      parallelGroups reference GeneratedStory by array index for the in-memory pipeline.
    rationale: >-
      Stories at generation time are ephemeral in-memory objects with no KB ID yet. Using title+flow_id as a stable
      composite key within the same graph run is sufficient for MVP. KB persistence is deferred to APRS-4030 per story
      non-goals.
    decided_by: agent
  - id: ARCH-002
    question: generatedStoriesWithDeps vs orderedStories — are both needed in state?
    decision: >-
      Both are kept per AC-1. generatedStoriesWithDeps = GeneratedStory[] with minimum_path field mutated after
      wire_dependencies runs. orderedStories = the same stories sorted (minimum-path first, then dependency order). This
      separation allows downstream nodes to access both the flat-with-deps list and the ordered execution list.
    rationale: >-
      AC-1 explicitly requires both fields. The distinction matters for APRS-4030 KB write ordering vs minimum_path
      annotation.
    decided_by: agent
  - id: ARCH-003
    question: How to implement BFS topological layer partitioning for parallelGroups given GeneratedStory objects?
    decision: >-
      Build an adjacency list from dependencyEdges (using story array index as node identifier), compute in-degree for
      each node, run standard BFS Kahn's algorithm collecting nodes per BFS layer. Each layer becomes one entry in
      parallelGroups (array of story titles or indices). For MVP, use story titles as group member identifiers.
    rationale: >-
      Kahn's BFS naturally produces layers where all nodes in a layer have no dependencies on each other — exactly
      parallel group semantics. Using titles keeps the output human-readable and consistent with the from/to edge
      format.
    decided_by: agent
  - id: ARCH-004
    question: Should generate_stories → wire_dependencies be a direct edge or conditional?
    decision: >-
      Conditional edge. generate_stories already transitions to phase=complete on success. We change generate_stories to
      transition to phase=wire_dependencies on success instead of complete. afterGenerateStories conditional routes to
      wire_dependencies when phase=wire_dependencies, and __end__ when phase=error.
    rationale: >-
      Consistent with existing pattern (afterLoadRefinedPlan, afterSliceFlows). Allows generate_stories to short-circuit
      to END on error without flowing through wiring/validation. Requires changing generate_stories success phase from
      complete to wire_dependencies.
    decided_by: agent
complexity: moderate
notes:
  - >-
    ARCH-004 requires a one-line change to generate-stories.ts: success path returns generationPhase=wire_dependencies
    instead of complete. This is required for the conditional edge routing to work correctly.
  - >-
    The generate_stories node's existing test expects generationPhase=complete on success. That test will need updating
    in ST-5 to expect wire_dependencies, or a separate integration-level assertion.
  - >-
    wire_dependencies is purely deterministic — no LLM calls, no async I/O beyond state reads. The node returns
    synchronously-computable results wrapped in async per LangGraph node contract.
  - >-
    DEC-1 scope: cross-flow dependency inference is explicitly deferred. Only same-flow step ordering creates edges.
    Stories from different flows have no edges between them unless parent_flow_id relationships imply otherwise.
  - >-
    The GeneratedStory objects already carry parent_flow_id and flow_step_reference which encode step ordering.
    wire_dependencies reads these to sort stories within a flow by step index extracted from flow_step_reference.
  - >-
    validate_graph no-op default: returns { passed: true, errors: [], warnings: [] }. This ensures the graph compiles
    and tests pass without APRS-1020 primitives.
