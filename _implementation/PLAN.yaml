architectural_decisions:
  - id: ARCH-001
    question: Should backlog writes be in Phase 4 of scope-defend.ts or a new downstream node?
    decision: Extend Phase 4 of scope-defend.ts with injectable KbAddTaskFn — not a new downstream node.
    rationale: >-
      Elaboration ARCH decision (decided_at: 2026-03-23). Avoids new graph node, uses established injectable pattern
      from persist-learnings.ts and backlog-curate.ts. Keeps backlog write co-located with challenge generation.
    decided_by: elaboration
  - id: ARCH-002
    question: Does backlog-curator require code changes to surface auto-created tasks?
    decision: No code changes to backlog-curator needed. The tag contract ('deferred' + 'scope-defender') is sufficient.
    rationale: >-
      backlog-curate.ts already queries with tags=['deferred'] at line 222. Auto-created tasks will appear automatically
      if they include the 'deferred' tag. The elaboration verified this at codebase_verification.backlog_curate_ts.
    decided_by: elaboration
  - id: ARCH-003
    question: Should scope-defend.ts import types from artifacts/scope-challenges.ts (canonical) or define its own?
    decision: >-
      scope-defend.ts should import ScopeChallengeSchema, RiskIfDeferredSchema, and RecommendationSchema from
      artifacts/scope-challenges.ts. The canonical schema must be extended to include total_candidates_reviewed,
      truncated, warnings, warning_count fields.
    rationale: >-
      AC-8 prerequisite: cementing a third consumer on the diverged local schema permanently splits the type contract.
      The canonical schema is extended (not replaced) to preserve backward compatibility for existing consumers.
    decided_by: elaboration
complexity: moderate
notes:
  - >-
    AC-8 (schema reconciliation) is the prerequisite gate for AC-1–AC-7 and AC-9–AC-10. ST-1 must be completed and
    type-checked before ST-2 begins.
  - >-
    backlog-curate.ts does NOT require changes — the 'deferred' tag contract is sufficient for backlog-curator's Phase 1
    KB query (confirmed at line 222).
  - >-
    The RISK_ORDER map in scope-defend.ts uses ['low','medium','high'] — after schema reconciliation, it must be updated
    to handle the canonical enum ['critical','high','medium','low','none']. Critical maps above high; none maps below
    low.
  - >-
    writeBacklogTasks() must be exported for unit testability, matching the pattern of applyDAChallenges() and
    identifyCandidates().
  - >-
    Fire-and-forget error handling: any kbAddTaskFn call that throws must be caught, logged as logger.warn, and
    execution continues — never rethrows. Same pattern as persist-learnings.ts.
  - >-
    Idempotency tag format: 'scope-defender:{storyId}:{challengeId}' where challengeId is the DA-001..DA-005 stable ID
    from a single applyDAChallenges() run.
  - >-
    deferral_note field from the challenge becomes the task description (if present); otherwise derive from
    challenge.target + challenge.challenge text.
