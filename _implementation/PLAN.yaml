schema: 2
story_id: WINT-8060
timestamp: '2026-03-23T19:00:00Z'
subtask_source: story
steps:
  - id: 1
    subtask_id: ST-1
    description: >-
      Reconcile schema drift between scope-defend.ts local ScopeChallengesOutputSchema and artifacts/scope-challenges.ts
      canonical schema. Align 'target'→'description' field rename in ScopeChallengeSchema, update RiskIfDeferredSchema
      to include 'critical' and 'none' values, and ensure the local schema extends or re-exports the canonical.
    files:
      - packages/backend/orchestrator/src/nodes/story/scope-defend.ts
      - packages/backend/orchestrator/src/artifacts/scope-challenges.ts
    files_to_read:
      - packages/backend/orchestrator/src/artifacts/scope-challenges.ts
      - packages/backend/orchestrator/src/nodes/story/__tests__/scope-defend.test.ts
    dependencies: []
    slice: packages
    verification: pnpm check-types --filter @repo/orchestrator && pnpm test --filter @repo/orchestrator -- scope-defend
    acs_covered:
      - AC-8
  - id: 2
    subtask_id: ST-2
    description: >-
      Extend createScopeDefendNode() factory to accept an optional KbAddTaskFn config parameter. Add a
      writeBacklogTasks() helper function (exported for testability) that iterates defer-to-backlog challenges from the
      validated output and calls kbAddTaskFn for each, with source attribution fields (source_agent: 'scope-defender',
      source_story_id, source_phase: 'elab', task_type: 'feature_idea', tags includes 'scope-defender', 'deferred').
      Call writeBacklogTasks() at the end of Phase 4 in scopeDefendNode. Error from any kbAddTaskFn call must be caught
      and logged as a warning — never thrown.
    files:
      - packages/backend/orchestrator/src/nodes/story/scope-defend.ts
    files_to_read:
      - packages/backend/orchestrator/src/nodes/completion/persist-learnings.ts
      - packages/backend/orchestrator/src/nodes/backlog/backlog-curate.ts
      - apps/api/knowledge-base/src/crud-operations/task-operations.ts
    dependencies:
      - 1
    slice: packages
    verification: pnpm check-types --filter @repo/orchestrator
    acs_covered:
      - AC-1
      - AC-2
      - AC-3
      - AC-4
      - AC-5
      - AC-6
      - AC-7
  - id: 3
    subtask_id: ST-3
    description: >-
      Add idempotency guard inside writeBacklogTasks(): before calling kbAddTaskFn for each challenge, call
      kbListTasksFn with tags filter 'scope-defender:{storyId}:{challengeId}'. Skip write with debug log if task already
      exists. Add KbListTasksFn as a second optional config parameter in createScopeDefendNode(). The deterministic
      idempotency tag uses DA-001..DA-005 challenge IDs (stable within a single run).
    files:
      - packages/backend/orchestrator/src/nodes/story/scope-defend.ts
    files_to_read:
      - apps/api/knowledge-base/src/crud-operations/task-operations.ts
    dependencies:
      - 2
    slice: packages
    verification: pnpm check-types --filter @repo/orchestrator
    acs_covered:
      - AC-9
  - id: 4
    subtask_id: ST-4
    description: >-
      Write unit tests for writeBacklogTasks() and the updated scopeDefendNode / createScopeDefendNode() covering: (a)
      zero defer-to-backlog challenges → no kbAddTaskFn calls; (b) one challenge → one task with correct source
      attribution fields; (c) five challenges → five tasks; (d) kbAddTaskFn failure → warning logged, no throw; (e)
      kbAddTaskFn not injected → no-op (default behaviour); (f) idempotency: kbListTasksFn finds existing task → skip
      with debug log; (g) tag contract: every task includes both 'scope-defender' and 'deferred' tags.
    files:
      - packages/backend/orchestrator/src/nodes/story/__tests__/scope-defend.test.ts
    files_to_read:
      - packages/backend/orchestrator/src/nodes/story/__tests__/scope-defend.test.ts
      - packages/backend/orchestrator/src/nodes/story/scope-defend.ts
    dependencies:
      - 3
    slice: packages
    verification: pnpm test --filter @repo/orchestrator -- scope-defend
    acs_covered:
      - AC-10
