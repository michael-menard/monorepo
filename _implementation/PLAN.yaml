notes:
  - >-
    Migration slot 1011 confirmed: last migration in worktree is 1010_story_state_history_trigger.sql. Filename must be
    1011_cdbe4020_embedding_columns_knowledge_tables.sql.
  - >-
    CDBE-4010 is currently in_qa — ST-1 must NOT begin until CDBE-4010 is merged. ST-2 (kb.ts) can proceed in parallel
    and does not depend on CDBE-4010.
  - >-
    CREATE INDEX CONCURRENTLY statements must be top-level SQL — NOT inside any BEGIN/COMMIT block. PostgreSQL enforces
    this at the engine level.
  - All five target tables are in the public schema (not workflow schema). Use public.vector_cosine_ops operator class.
  - >-
    HNSW parameters: m=16, ef_construction=64 — consistent with CDBE-4010 and confirmed by KB entry 5918e276 for tables
    under 10,000 rows.
  - The vector customType is already defined and exported in kb.ts lines 24-39 — reuse directly, no redefinition.
  - >-
    Drizzle does not support functional indexes for HNSW — indexes exist in migration SQL only, not in kb.ts table
    definitions.
  - 'Elaboration verdict: PASS (9/9 audit checks), all opportunities auto-resolved to KB, no gaps, no ACs added.'
  - >-
