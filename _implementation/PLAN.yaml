      result (EmbeddingWriteResultSchema). No TypeScript interfaces — z.infer<> only (AC-8, AC-10).
  - path: apps/api/knowledge-base/src/embedding-worker/embedding-worker.ts
    action: create
    reason: >-
      Core worker module. Injectable EmbeddingClient + pg.Client. LISTEN subscription, notification batching (dedup by
      table+id, flush on batchWindowMs or batchSize), EmbeddingClient.generateEmbeddingsBatch() call, withRetry UPDATE
      write-back. Per-row error handling. Polling fallback with in-memory running flag. Backfill function
