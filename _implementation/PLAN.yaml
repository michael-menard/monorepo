architectural_decisions:
  - id: ARCH-001
    question: >-
      Should ST-2 depend on ST-1 completing first, or can the TypeScript module be authored and unit-tested against
      mocks in parallel?
    decision: >-
      ST-2 has NO dependency on ST-1. The embedding-worker TypeScript module and its tests can be authored and
      unit-tested against mock pg.Client and mock EmbeddingClient without ST-1's migration being applied to any DB. ST-1
      and ST-2 are parallel. Only ST-3 depends on ST-2.
    rationale: >-
      Elaboration audit (subtask_decomposition: CONDITIONAL) identified that ST-2 depending on ST-1 was overconstrained
      and created an unnecessary serialization bottleneck. The TypeScript implementation has no runtime dependency on
      the DB migration during unit testing.
    decided_by: autonomous_elaboration
  - id: ARCH-002
    question: >-
      Should run.ts accept a --backfill-only CLI flag or should a separate run-backfill.ts entrypoint be created for
      standalone backfill invocation?
    decision: >-
      run.ts accepts a CLI approach: check process.argv for '--backfill-only'. If present, run the backfill function,
      log results, and exit. This avoids creating a second entrypoint file and keeps the backfill-as-standalone-script
      AC-6 requirement satisfied within the single entrypoint.
    rationale: >-
      Elaboration opportunity opp-6 flagged this ambiguity. A single entrypoint with a flag is simpler and avoids code
      duplication. A separate run-backfill.ts would require duplicating pg.Client setup and EmbeddingClient
      initialization logic.
    decided_by: autonomous_elaboration
complexity: complex
