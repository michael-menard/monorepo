architectural_decisions:
  - id: ARCH-001
    question: >-
      How should FKs from agent_outcomes, agent_decisions, hitl_decisions reference the new partitioned
      agent_invocations when only invocation_id (uuid) is present on child tables — not started_at?
    decision: >-
      Create a per-partition UNIQUE index on (id) in addition to the composite PK (id, started_at). PostgreSQL allows
      FKs to reference any unique key (not just the PK), so child tables can continue referencing agent_invocations(id)
      directly. This avoids requiring started_at on every child table, which would be a much larger schema change out of
      scope for this story.
    rationale: >-
      Minimizes schema blast radius. Child tables (agent_outcomes, agent_decisions, hitl_decisions) are not partitioned
      and their FKs only carry invocation_id. Adding started_at to all child tables would require additional migrations
      and Drizzle schema changes. The per-partition unique index on (id) is sufficient for PostgreSQL FK validation.
    decided_by: plan-leader
    trade_offs: >-
      The unique index on (id) per partition is technically redundant with the PK for single-partition queries, but it
      is the correct PostgreSQL pattern for enabling FK from non-partitioned child to partitioned parent when the FK
      column set is a subset of the partition key.
  - id: ARCH-002
    question: >-
      Should the materialized view analytics.token_dashboard (migration 1090) be refreshed or recreated after
      partitioning?
    decision: >-
      No action required. The materialized view queries workflow.agent_invocations and analytics.story_token_usage by
      their schema-qualified names. Since partitioned tables have the same names, the view continues to work. A manual
      REFRESH MATERIALIZED VIEW CONCURRENTLY analytics.token_dashboard is recommended post-migration to ensure fresh
      data but is not blocking.
    rationale: >-
      Transparent schema replacement — the partitioned table has the same name, columns, and constraints as the original
      from the view's perspective.
    decided_by: plan-leader
    trade_offs: None. This is a non-issue.
  - id: ARCH-003
    question: Should the migration run inside a single BEGIN/COMMIT transaction or be split into separate transactions?
    decision: >-
      Single BEGIN/COMMIT transaction for each table's migration. The rename → create → insert → verify → drop sequence
      must be atomic. If row count verification fails, the entire migration rolls back cleanly.
    rationale: Atomicity requirement from AC-7. PostgreSQL DDL is transactional, so BEGIN/COMMIT wraps the full migration safely.
    decided_by: plan-leader
    trade_offs: >-
      For very large tables, a single transaction holds locks for the duration of the INSERT SELECT. On production this
      may require a maintenance window. The story context defers maintenance window decisions to the implementer — this
      is noted in the migration file header comment.
complexity: complex
