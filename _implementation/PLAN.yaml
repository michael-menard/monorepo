schema: 1
story_id: PIPE-4010
timestamp: '2026-03-19T12:00:00Z'
steps:
  - id: 1
    description: >-
      Export runReview from orchestrator graphs/index.ts — the graph-loader.ts dynamically loads dist/graphs/index.js
      and expects runReview to be exported. It currently is not, so the review dispatch path will fail with undefined at
      runtime.
    files:
      - packages/backend/orchestrator/src/graphs/index.ts
    dependencies: []
    slice: packages
  - id: 2
    description: >-
      Create pre-flight verification script at apps/api/pipeline/scripts/preflight-check.ts. Checks: (a) KB deps
      satisfied — all 4 dependency stories in completed state, (b) Redis connectivity, (c) Aurora/KB DB connectivity,
      (d) orchestrator graphs module resolves runDevImplement/runReview/runQAVerify at the dynamic dist path, (e)
      selected test story is in ready state with valid elaboration artifact. Exits non-zero with actionable messages on
      any failure.
    files:
      - apps/api/pipeline/scripts/preflight-check.ts
    dependencies:
      - 1
    slice: backend
  - id: 3
    description: >-
      Extend OPS-RUNBOOK.md with a 'First Supervised Run' section covering AC-10: (a) startup sequence with exact
      commands, (b) monitoring dashboard — CLI commands and log events to watch, (c) kill switch — exact emergency stop
      sequence, (d) rollback — how to reset a story back to ready state, (e) proof artifact verification — how to
      confirm dev stage produced real (non-stub) code. Keep as a markdown append to the existing file.
    files:
      - apps/api/pipeline/OPS-RUNBOOK.md
    dependencies:
      - 2
    slice: backend
  - id: 4
    description: >-
      Write an integration test that validates the end-to-end graph-loader contract: (a) loadGraphRunners() resolves to
      an object with all 5 required functions (runElaboration, runStoryCreation, runDevImplement, runReview,
      runQAVerify), (b) each runner is callable (typeof === function), (c) runReview is present after Step 1 fix. This
      test serves as AC-3 observability evidence — a test that would have caught the missing runReview export.
    files:
      - apps/api/pipeline/src/supervisor/__tests__/graph-loader-contract.test.ts
    dependencies:
      - 1
    slice: backend
files_to_change:
  - path: packages/backend/orchestrator/src/graphs/index.ts
    action: modify
    reason: >-
      Add runReview export so graph-loader.ts can load it from dist/graphs/index.js at runtime. Currently missing — will
      cause undefined runner for review stage dispatch.
  - path: apps/api/pipeline/scripts/preflight-check.ts
    action: create
    reason: >-
      AC-1 and AC-9: Pre-flight verification script that validates all integration points before supervised run. Checks
      KB deps, Redis, Aurora, graph-loader, and test story selection.
  - path: apps/api/pipeline/OPS-RUNBOOK.md
    action: modify
    reason: >-
      AC-10: Add First Supervised Run section with startup sequence, monitoring dashboard, kill switch, rollback, and
      proof artifact verification steps.
  - path: apps/api/pipeline/src/supervisor/__tests__/graph-loader-contract.test.ts
    action: create
    reason: >-
      Integration contract test that validates graph-loader exports all 5 required runners including runReview. Prevents
      regression of the missing-export bug.
commands_to_run:
  - command: pnpm build --filter @repo/orchestrator
    when: after modifying packages/backend/orchestrator/src/graphs/index.ts
    required: true
  - command: pnpm check-types --filter @repo/orchestrator
    when: after modifying packages/backend/orchestrator/src/graphs/index.ts
    required: true
  - command: pnpm test --filter @repo/pipeline
    when: after all code changes
    required: true
  - command: pnpm check-types --filter @repo/pipeline
    when: after all code changes
    required: true
