    The story_token_usage table has an estimated_cost column present in the DB (via 999_add_telemetry_tables.sql line
    94) but NOT reflected in the Drizzle analytics.ts schema. The migration must include this column in the new
    partitioned CREATE TABLE DDL to match the actual DB. The Drizzle schema can optionally be updated to add it, but
    that is a separate concern.
  - Migration number 1090 is already taken. Use 1100.
  - >-
    Partition pruning via EXPLAIN requires constraint_exclusion = 'partition' (default in PG 12+) or
    enable_partition_pruning = on (default). No configuration change needed for standard installs.
  - >-
    The DEFAULT partition absorbs any row with started_at / logged_at outside all declared ranges. If data has NULL
    timestamps, they will NOT route to DEFAULT (NULL is not in any range). Ensure the NOT NULL constraint on started_at
    and logged_at is preserved on the partitioned parent.
