notes:
  - >-
    The graph's DecisionCallback (human-review-checkpoint.ts) is DIFFERENT from the adapters/decision-callbacks/types.ts
    DecisionCallback. The former is plan-refinement-specific with ask(DecisionContext); the latter is a generic
    ask(DecisionRequest). The bridge adapter creates a NEW graph-compatible DecisionCallback — it does not extend
    CLIDecisionCallback.
  - >-
    The bridge adapter uses inquirer directly (same approach as cli-callback.ts) since it needs to render flow-specific
    UI beyond generic options.
  - The adapters/plan-refinement/ directory is new — needs to be created.
  - ST-3 and ST-4 both live in adapters/plan-refinement/__tests__/ to follow existing test co-location pattern.
  - >-
    The CLI entrypoint uses a stub planLoader (same pattern as generate-stories.ts stubKbGetPlan) with an INJECTION
    POINT comment.
  - inquirer is already a dependency in the orchestrator package.json.
