architectural_decisions:
  - id: ARCH-001
    question: Where should MODEL_LEADERBOARD_PATH point — relative to package root or absolute from monorepo root?
    decision: >-
      Path relative to the orchestrator package output directory: path.join(process.cwd(), 'data',
      'model-leaderboard.yaml'). Allows the harness to write next to the package without hardcoding monorepo root. For
      tests, the path is overridden via argument injection.
    rationale: >-
      Keeps the package self-contained; tests can inject a temp path; does not require knowledge of monorepo layout at
      runtime.
    decided_by: planner
  - id: ARCH-002
    question: How should the harness invoke Ollama — via PipelineModelRouter, direct HTTP fetch, or a thin OllamaClient wrapper?
    decision: >-
      Direct HTTP fetch to Ollama generate/chat API (http://127.0.0.1:11434/api/generate). This avoids pulling in the
      full PipelineModelRouter stack (LangChain, BudgetAccumulator, TokenBucket) for a developer-local benchmark script.
    rationale: >-
      The harness is explicitly dev-local only (AC-6). A direct fetch keeps dependencies minimal and makes the Ollama
      call easy to mock in unit tests via vi.mock('node-fetch') or global fetch mock.
    decided_by: planner
  - id: ARCH-003
    question: Should the 5 required Ollama models be hardcoded in the harness or imported from a shared constant?
    decision: >-
      Hardcode the 5 REQUIRED_MODELS list in constants.ts alongside MODEL_LEADERBOARD_PATH, mirroring the
      REQUIRED_MODELS array from setup-ollama-models.sh. These are: deepseek-coder-v2:16b, codellama:13b,
      qwen2.5-coder:14b, qwen2.5-coder:7b, llama3.2:8b.
    rationale: >-
      Single source of truth in constants.ts; the script is the authoritative list per WINT-0220 strategy; both harness
      and any future consumer can import from constants.
    decided_by: planner
complexity: moderate
notes:
  - AC-6 explicitly states the harness is dev-local only — no CI integration required; unit tests use mocks
  - AC-7 confirms Ollama cost_usd = 0 sentinel (soft dependency on WINT-0260 — no blocking)
  - >-
    Quality evaluator uses heuristic scoring (keyword matching, length checks) — not semantic; this limitation must be
    documented per AC-4
  - >-
    The 5 required models are from setup-ollama-models.sh REQUIRED_MODELS: deepseek-coder-v2:16b, codellama:13b,
    qwen2.5-coder:14b, qwen2.5-coder:7b, llama3.2:8b
  - >-
    Task corpus categories must cover exactly: code_generation, code_review, elaboration_analysis, lint_syntax (4
    categories x 3+ prompts = 12+ tasks minimum per AC-1)
  - >-
    Prompts must be sourced from monorepo files (actual TypeScript code snippets, real elaboration YAML fragments, real
    lint output)
  - >-
    RunRecord requires: taskContract, selectedTier, modelUsed, qualityScore, qualityDimensions, contractMismatch,
    timestamp (from QualityEvaluationSchema) plus cost_usd, latency_ms, task_id
  - No barrel files — import directly from source paths per CLAUDE.md
