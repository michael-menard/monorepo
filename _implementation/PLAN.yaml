  - Trigger function returns NULL (required for AFTER triggers that have no row-level semantics)
  - >-
    pg_trigger_depth() guard: check > 1 (not > 0) to allow the first trigger invocation to proceed — depth 1 is the
    trigger itself, depth > 1 indicates recursion
