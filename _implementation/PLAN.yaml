migration_detailed_plan:
  file: apps/api/knowledge-base/src/db/migrations/1100_cdbe5010_partition_telemetry.sql
  sections:
    - section: 0 — Safety preamble
      sql_summary: "DO block: verify current_database() = 'knowledgebase', raise exception if not."
    - section: 1 — Snapshot row counts (before migration)
      sql_summary: >-
        Capture row counts into local variables for post-migration verification. SELECT COUNT(*) FROM
        workflow.agent_invocations INTO v_ai_count. SELECT COUNT(*) FROM analytics.story_token_usage INTO v_stu_count.
    - section: 2 — Drop FKs referencing workflow.agent_invocations
      sql_summary: >-
        ALTER TABLE workflow.agent_outcomes DROP CONSTRAINT IF EXISTS agent_outcomes_invocation_id_fkey. ALTER TABLE
        workflow.agent_decisions DROP CONSTRAINT IF EXISTS agent_decisions_invocation_id_fkey. ALTER TABLE
        workflow.hitl_decisions DROP CONSTRAINT IF EXISTS hitl_decisions_invocation_id_fkey.
    - section: 3 — Rename original agent_invocations to _old
      sql_summary: ALTER TABLE workflow.agent_invocations RENAME TO agent_invocations_old.
    - section: '4 — Create partitioned parent: workflow.agent_invocations'
      sql_summary: >-
        CREATE TABLE workflow.agent_invocations (same columns as original, but PRIMARY KEY (id, started_at)) PARTITION
        BY RANGE (started_at). All columns identical to original schema: id, invocation_id, agent_name, story_id, phase,
        input_payload, output_payload, duration_ms, input_tokens, output_tokens, status, error_message, started_at,
        completed_at, created_at, cached_tokens, total_tokens, estimated_cost, model_name.
    - section: 5 — Create partitions for agent_invocations
      sql_summary: >-
        CREATE TABLE workflow.agent_invocations_default PARTITION OF workflow.agent_invocations DEFAULT. CREATE TABLE
        workflow.agent_invocations_y2026m03 PARTITION OF workflow.agent_invocations FOR VALUES FROM ('2026-03-01') TO
        ('2026-04-01'). CREATE TABLE workflow.agent_invocations_y2026m04 PARTITION OF workflow.agent_invocations FOR
        VALUES FROM ('2026-04-01') TO ('2026-05-01').
    - section: 6 — Create per-partition UNIQUE index on (invocation_id, started_at) and unique index on (id) for FK support
      sql_summary: >-
        For each partition (default, y2026m03, y2026m04): CREATE UNIQUE INDEX ON workflow.agent_invocations_<partition>
        (invocation_id, started_at). CREATE UNIQUE INDEX ON workflow.agent_invocations_<partition> (id) — this supports
        the existing FK pattern from child tables where only invocation_id (uuid) is available and started_at is not
        present on child tables. Additional performance indexes: (agent_name), (story_id), (started_at), (status),
        (agent_name, started_at), (agent_name, story_id) — created on parent; PostgreSQL propagates to partitions.
    - section: 7 — Copy data from _old into new partitioned table
      sql_summary: INSERT INTO workflow.agent_invocations SELECT * FROM workflow.agent_invocations_old.
    - section: 8 — Verify agent_invocations row count
      sql_summary: >-
        SELECT COUNT(*) FROM workflow.agent_invocations INTO v_ai_new_count. IF v_ai_new_count <> v_ai_count THEN RAISE
        EXCEPTION '1100: agent_invocations row count mismatch: expected %, got %', v_ai_count, v_ai_new_count. END IF.
    - section: 9 — Recreate FKs referencing new partitioned agent_invocations
      sql_summary: >-
        ALTER TABLE workflow.agent_outcomes ADD CONSTRAINT agent_outcomes_invocation_id_fkey FOREIGN KEY (invocation_id)
        REFERENCES workflow.agent_invocations(id) ON DELETE CASCADE. ALTER TABLE workflow.agent_decisions ADD CONSTRAINT
        agent_decisions_invocation_id_fkey FOREIGN KEY (invocation_id) REFERENCES workflow.agent_invocations(id) ON
        DELETE CASCADE. ALTER TABLE workflow.hitl_decisions ADD CONSTRAINT hitl_decisions_invocation_id_fkey FOREIGN KEY
        (invocation_id) REFERENCES workflow.agent_invocations(id) ON DELETE SET NULL. NOTE: These FKs reference (id)
        alone. They work because each partition has a UNIQUE index on (id).
    - section: 10 — Drop _old agent_invocations table
      sql_summary: DROP TABLE workflow.agent_invocations_old.
    - section: 11 — Rename original story_token_usage to _old
      sql_summary: ALTER TABLE analytics.story_token_usage RENAME TO story_token_usage_old.
    - section: '12 — Create partitioned parent: analytics.story_token_usage'
      sql_summary: >-
        CREATE TABLE analytics.story_token_usage (same columns as original, but PRIMARY KEY (id, logged_at)) PARTITION
        BY RANGE (logged_at). Columns: id, story_id, feature, phase, agent, iteration, input_tokens, output_tokens,
        total_tokens, logged_at, created_at. Also include estimated_cost (present in DB via 999_add_telemetry_tables but
        not yet in Drizzle schema — must match the actual DB column).
    - section: 13 — Create partitions for story_token_usage
      sql_summary: >-
        CREATE TABLE analytics.story_token_usage_default PARTITION OF analytics.story_token_usage DEFAULT. CREATE TABLE
        analytics.story_token_usage_y2026m03 PARTITION OF analytics.story_token_usage FOR VALUES FROM ('2026-03-01') TO
        ('2026-04-01'). CREATE TABLE analytics.story_token_usage_y2026m04 PARTITION OF analytics.story_token_usage FOR
        VALUES FROM ('2026-04-01') TO ('2026-05-01').
    - section: 14 — Create indexes on story_token_usage parent/partitions
      sql_summary: >-
        Per-partition unique index on (id, logged_at) is already covered by the PK. Additional: CREATE INDEX ON
        analytics.story_token_usage (story_id). CREATE INDEX ON analytics.story_token_usage (feature). CREATE INDEX ON
        analytics.story_token_usage (phase). CREATE INDEX ON analytics.story_token_usage (logged_at). CREATE INDEX ON
        analytics.story_token_usage (feature, phase). CREATE INDEX ON analytics.story_token_usage (phase, logged_at).
        Recreate the CHECK constraint: story_token_usage_phase_check if it existed on the original (check
        pg_constraint).
    - section: 15 — Copy data from _old into new partitioned story_token_usage
      sql_summary: INSERT INTO analytics.story_token_usage SELECT * FROM analytics.story_token_usage_old.
    - section: 16 — Verify story_token_usage row count
      sql_summary: >-
        SELECT COUNT(*) FROM analytics.story_token_usage INTO v_stu_new_count. IF v_stu_new_count <> v_stu_count THEN
        RAISE EXCEPTION '1100: story_token_usage row count mismatch: expected %, got %', v_stu_count, v_stu_new_count.
        END IF.
    - section: 17 — Verify no orphaned FKs
      sql_summary: >-
        SELECT COUNT(*) FROM workflow.agent_outcomes o LEFT JOIN workflow.agent_invocations ai ON ai.id =
        o.invocation_id WHERE ai.id IS NULL INTO v_orphaned_outcomes. IF v_orphaned_outcomes > 0 THEN RAISE EXCEPTION
        '1100: % orphaned agent_outcomes rows after migration', v_orphaned_outcomes. END IF. Same check for
        agent_decisions and hitl_decisions (noting hitl.invocation_id is nullable — use WHERE o.invocation_id IS NOT
        NULL AND ai.id IS NULL).
    - section: 18 — Drop _old story_token_usage table
      sql_summary: DROP TABLE analytics.story_token_usage_old.
    - section: 19 — Completion notice
      sql_summary: >-
        DO block: report row counts in both tables, partition counts, RAISE NOTICE '1100: Migration complete.
        agent_invocations: % rows across % partitions. story_token_usage: % rows across % partitions.'.
    - section: 20 — COMMENTS
      sql_summary: >-
        COMMENT ON TABLE workflow.agent_invocations IS '1100: RANGE-partitioned on started_at. PK (id, started_at).
        Monthly partitions named agent_invocations_y<YYYY>m<MM>. DEFAULT partition for historical data. FKs from
        agent_outcomes, agent_decisions, hitl_decisions reference (id) via per-partition unique index.'. COMMENT ON
        TABLE analytics.story_token_usage IS '1100: RANGE-partitioned on logged_at. PK (id, logged_at). Monthly
        partitions named story_token_usage_y<YYYY>m<MM>. DEFAULT partition for historical data. No dependent FKs.'.
