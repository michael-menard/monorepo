architectural_decisions: []
notes:
  - >-
    PIPE-2010 is already merged: ReviewPayloadSchema and QaPayloadSchema exist in @repo/pipeline-queue, and the unsafe
    type cast in the review branch is already gone. ST-6 is purely a verification step.
  - >-
    createMockRunners() currently returns only runElaboration and runStoryCreation stubs. TypeScript GraphRunners
    interface requires all 5. The extension must be done first (ST-1) before any new stage tests are written.
  - >-
    EC-1 timeout tests in the existing file pass partial GraphRunners { runElaboration: hangingRunner, runStoryCreation:
    vi.fn() } — this works structurally. New timeout tests should follow the same pattern but with the correct stage
    runner as the hanging one.
  - >-
    Thread ID format {storyId}:{stage}:{attemptNumber} is IRREVERSIBLE ADR. All threadId assertions must be exact: e.g.,
    'PIPE-2020:implementation:1'.
  - >-
    The review branch fallback: worktreePath ?? '' and featureDir ?? 'plans/future/platform'. HP-5 needs both a
    with-payload test (explicit paths) and without-payload test (verifies fallback defaults).
  - >-
    Circuit breaker cbMap in dispatch-router.ts has separate entries for implementation, review, qa. CB tests must
    assert circuit_open with stage:'implementation', stage:'review', stage:'qa' respectively — not stage:'elaboration'.
  - No new packages, imports, or dependencies needed. All test infrastructure already exists in the file.
