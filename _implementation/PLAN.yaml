architectural_decisions: []
complexity: simple
notes:
  - >-
    ST-1 and ST-2 have no dependencies on each other and can be coded in either order; ST-3 depends on ST-1 (needs
    strictFinishBeforeNewStart in config type); ST-4 depends on ST-2 and ST-3
  - >-
    applyStrictFinishFilter() implementation strategy: reuse the hasSiblingInProgress Set that
    applyFinishBeforeNewStart() already builds via its SQL query. The strict filter is invoked BEFORE the priority
    reorder in runOnce() — only call applyFinishBeforeNewStart() on the already-filtered list. This avoids a second DB
    round-trip.
  - >-
    Concrete runOnce() call order: (1) getEligibleStories, (2) if strictFinishBeforeNewStart: applyStrictFinishFilter,
    (3) if finishBeforeNewStart: applyFinishBeforeNewStart on the (possibly filtered) list, (4) slice to slotsAvailable,
    (5) dispatch
  - >-
    applyStrictFinishFilter() needs its own DB query — it cannot share the hasSiblingInProgress Set from
    applyFinishBeforeNewStart() because the two methods run independently. The query is identical in shape to the one in
    applyFinishBeforeNewStart(): SELECT psl.story_id FROM workflow.plan_story_links WHERE story_id = ANY(...) AND EXISTS
    (in_progress sibling). Add a private helper that returns the Set to share between both methods.
  - >-
    Test setup for ST-4 AC-5/AC-6: makeKbDeps() currently returns a single vi.fn().mockResolvedValue for db.execute. The
    strict filter test needs db.execute to return different rows on its second call (first call = getEligibleStories
    result, second call = hasSiblingInProgress query). Use vi.fn().mockResolvedValueOnce(...).mockResolvedValueOnce(...)
    chaining in the test.
  - >-
    For the F006 test (AC-7): the current test file patches dispatchStory directly instead of mocking
    kb_update_story_status at module level. The new test should use vi.mock('@repo/knowledge-base', ...) at the top of
    the describe block, or mock the kbDeps.db.execute to simulate the KB call path. Since kb_update_story_status is
    imported from @repo/knowledge-base as a named function, vi.mock is the correct approach.
  - No new packages required. All changes are within apps/api/pipeline.
