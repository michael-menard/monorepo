notes:
  - 'Only one file is modified: packages/backend/orchestrator/src/graphs/__tests__/elaboration.test.ts'
  - No production code changes — this story is test-only. No export keywords to add.
  - >-
    afterStructurer test cases must use the existing createTestState() helper from the same file and
    ElaborationConfigSchema.parse() for config construction — consistent with the afterAggregate test pattern.
  - >-
    Import afterStructurer at the bottom of the file alongside the existing afterAggregate import: import {
    afterAggregate, afterStructurer } from '../elaboration.js'
  - >-
    afterStructurer is a pure synchronous function with exactly 2 branches: recalculateReadiness true →
    update_readiness, else → save_to_db. Minimum 3 test cases: (1) true, (2) false, (3) null config.
  - >-
    afterAggregate null-config edge case: createTestState({ config: null }) → expect result to be 'save_to_db'. The
    optional chaining in the source (config?.structurerConfig?.enabled, config?.recalculateReadiness) means null config
    falls through all conditions to the final return.
  - >-
    ORCH-1010 provides createMockLLMProvider and createMockGraphState but these are not needed for ElaborationState
    tests — the existing createTestState() in elaboration.test.ts is the right fixture builder.
  - 'Verification command from elaboration: pnpm --filter orchestrator test -- graphs/elaboration'
test_cases_detail:
  afterStructurer:
    - id: AS-1
      description: routes to update_readiness when recalculateReadiness is true
      state_setup: 'createTestState({ config: ElaborationConfigSchema.parse({ recalculateReadiness: true }) })'
      expected: "'update_readiness'"
    - id: AS-2
      description: routes to save_to_db when recalculateReadiness is false
      state_setup: 'createTestState({ config: ElaborationConfigSchema.parse({ recalculateReadiness: false }) })'
      expected: "'save_to_db'"
    - id: AS-3
      description: routes to save_to_db when config is null
      state_setup: 'createTestState({ config: null })'
      expected: "'save_to_db'"
  afterAggregate_new_edge_case:
    - id: AA-5
      description: routes to save_to_db when config is null (null guard path)
      state_setup: 'createTestState({ config: null })'
      expected: "'save_to_db'"
