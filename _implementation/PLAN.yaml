architectural_decisions:
  - id: ARCH-001
    question: "Should contextWarmerNode support all three operations (get, put, invalidate) via an operation dispatch pattern in state, or should invalidation be a separate exported companion function?"
    decision: "Implement all three operations as a state-dispatched operation mode (operation: 'get' | 'put' | 'invalidate') within createContextWarmerNode — consistent with how sessionManagerNode dispatches create/update/complete/cleanup via state.sessionOperation"
    rationale: "The story's session-manager node already uses this dispatch pattern (operation field in state) and the story's AC-13 says 'accessible via the context-warmer node or a companion utility'. Using the same dispatch pattern across both nodes maximizes consistency and reduces API surface."
    decided_by: planner

