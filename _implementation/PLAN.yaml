architectural_decisions:
  - id: ARCH-001
    question: Should the hitlInterview MCP tool call captureInterview directly (in-process) or via HTTP fetch to localhost:3093?
    decision: Direct in-process call (same pattern as cohesion_audit in WINT-4010)
    rationale: >-
      WINT-4010 established this pattern via ARCH-001 precedent: direct import avoids requiring the sidecar HTTP server
      to be running when the MCP tool is invoked. HTTP server is for external callers; MCP tool is the programmatic
      interface.
    decided_by: auto-accepted (tier-1, matches existing codebase pattern)
  - id: ARCH-002
    question: AC-9 references readJsonBody but @repo/sidecar-http-utils only exports readBody. Which to use?
    decision: >-
      Use readBody from @repo/sidecar-http-utils and parse JSON locally in http-handler.ts, following the rules-registry
      pattern
    rationale: >-
      rules-registry/src/http-handler.ts shows the established pattern: readBody() returns raw string, local
      readJsonBody() helper parses it. This keeps @repo/sidecar-http-utils unchanged (no new exports needed) and follows
      existing convention.
    decided_by: auto-accepted (tier-1, matches codebase pattern)
  - id: ARCH-003
    question: Where should trainingDataIngest be imported from — direct path or package export?
    decision: >-
      Import trainingDataIngest from apps/api/knowledge-base/src/ml-pipeline/training-data-ingest.ts via
      @repo/knowledge-base package dependency
    rationale: >-
      cohesion sidecar uses @repo/db for database access. Same dependency pattern: hitl-interview sidecar adds
      @repo/knowledge-base to its dependencies to access the ML pipeline tool and DB exports. No circular deps — the
      sidecar is a consumer of knowledge-base.
    decided_by: auto-accepted (tier-2, matches cohesion dependency pattern)
complexity: moderate
notes:
  - pnpm-workspace.yaml already includes packages/backend/sidecars/* — no workspace config change needed
  - >-
    No DB migrations required — workflow.hitl_decisions and workflow.training_data tables already exist (confirmed in
    SCOPE artifact)
  - >-
    The AC-9 reference to readJsonBody means using readBody from @repo/sidecar-http-utils and wrapping JSON.parse
    locally (rules-registry pattern)
  - Coverage threshold is 45% (not 80% like cohesion) per AC-10 — vitest.config.ts thresholds should reflect this
  - >-
    hitl_decisions.storyId is NOT NULL FK — read queries must filter by valid storyId; handle empty result gracefully
    (context enrichment is best-effort)
  - >-
    trainingDataIngest returns null on failure (not throws) — capture-interview.ts must handle null return and log
    warning
  - >-
    Port 3093 was noted as conflicting with rules-registry in elaboration ARCH note — the server.ts comment in cohesion
    shows rules-registry as 3093. Clarify: rules-registry is @repo/sidecar-rules-registry. Dev must confirm port 3093 is
    available or use 3094.
