architectural_decisions:
  - id: ARCH-001
    question: Should auto_update_plan conditionally skip writing when verdict is not needs_revision?
    decision: >-
      Yes — auto_update_plan is only added to the conditional edge for needs_revision verdict. The node still validates
      its precondition via state.verdict check and returns early with a warning if called with a different verdict
      (defensive guard).
    rationale: >-
      Graph conditional edge routing is the primary guard; defensive check in node body prevents state corruption if
      graph is misconfigured in tests.
    decided_by: planner
  - id: ARCH-002
    question: >-
      How does log-revision obtain the plan UUID (plan_id) to write to plan_revision_history? planSlug is available in
      state but revision history requires UUID.
    decision: >-
      Inject a PlanIdResolverFn adapter into log-revision node that maps planSlug → plan UUID. Default implementation is
      a no-op that returns null, causing the node to emit a warning and skip the write gracefully.
    rationale: >-
      Keeps the node testable without DB. The pipeline supervisor wires the real resolver. Consistent with
      ports/adapters pattern from APRS-3010.
    decided_by: planner
  - id: ARCH-003
    question: What value should changedBy be in plan_revision_history when written by the automated graph?
    decision: >-
      Use the fixed string 'plan-revalidation-graph' as changedBy to identify automated revisions. This is injectable
      via adapter config for flexibility.
    rationale: Consistent audit trail distinguishing automated vs human changes. No new state field needed.
    decided_by: planner
complexity: moderate
notes:
  - >-
    classify_drift is a pure heuristic node — no LLM. Per opp-1 from elaboration, this is deterministic and fully
    unit-testable.
  - >-
    auto_update_plan writes ONLY summary and tags to workflow.plans via kb_update_plan adapter — no other plan fields.
    Per AC-4.
  - >-
    No DB migration required — verdict is written to state only (not a new workflow.plans column). Per elab gap-2
    resolution and ACs.
  - >-
    plan_revision_history revision_number uses MAX(revision_number)+1 pattern via adapter — no sequence. The adapter
    handles atomicity.
  - >-
    The graph does NOT add auto_update_plan or log_revision for already_done/blocked/error verdicts — graph terminates
    via END directly from classify_drift conditional edges.
  - Tests use the established vi.mock('@langchain/langgraph') pattern from APRS-3010 test files.
  - >-
    Scoring rule for already_implemented category is special: blocking severity with category=already_implemented →
    already_done verdict (not needs_revision). All other blocking categories → needs_revision.
