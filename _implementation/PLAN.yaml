architectural_decisions:
  - id: ARCH-001
    question: What type does next_unblocked_story_id use — TEXT (story_id only) or JSONB ({story_id, title} snapshot)?
    decision: TEXT (story_id only) — column named next_unblocked_story_id
    rationale: >-
      JSONB snapshots go stale when story titles change. The matview refresh triggers on plan_story_links and stories
      state changes, not on title changes. Service layer joins for title are cheap (index lookup). This was an
      autonomous elaboration decision (decision-1) confirmed at elab iteration 1.
    decided_by: elab-autonomous-decider (2026-03-19)
    source: elaboration gap-101
  - id: ARCH-002
    question: REFRESH MATERIALIZED VIEW CONCURRENTLY or non-CONCURRENTLY in the trigger function?
    decision: Non-CONCURRENTLY — REFRESH MATERIALIZED VIEW workflow.roadmap (no CONCURRENTLY keyword)
    rationale: >-
      REFRESH MATERIALIZED VIEW CONCURRENTLY cannot run inside a transaction context (which triggers always are).
      Non-CONCURRENTLY acquires an exclusive lock but is MVP-acceptable. The unique index (AC-6) future-proofs a
      CONCURRENTLY upgrade if called from a non-transaction context (e.g., pg_cron).
    decided_by: elab-analyst (2026-03-19)
    source: elaboration architecture_notes + gap-104
  - id: ARCH-003
    question: Should CREATE UNIQUE INDEX use CONCURRENTLY to avoid locking?
    decision: No CONCURRENTLY — use CREATE UNIQUE INDEX IF NOT EXISTS idx_roadmap_plan_slug ON workflow.roadmap (plan_slug)
    rationale: >-
      CREATE INDEX CONCURRENTLY cannot run inside a transaction block. The matview is empty at index creation time (WITH
      NO DATA or freshly dropped), so the non-concurrent form completes instantly with no blocking.
    decided_by: elab-analyst (2026-03-19)
    source: elaboration architecture_notes
