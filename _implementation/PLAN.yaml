      guard). (AC-3, AC-4, AC-5, AC-6, AC-7, AC-11)
  - path: apps/api/knowledge-base/src/embedding-worker/__tests__/embedding-worker.test.ts
    action: create
    reason: >-
      Unit tests using MockEmbeddingClient and MockPgClient (no real DB or OpenAI calls). Covers: batching (window +
