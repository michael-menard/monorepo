    planned_evidence: preflight-check.ts script — checks all 4 dependency stories are in completed state in KB before reporting PASS
    evidence_type: command
  - ac_id: AC-2
    planned_evidence: >-
      Runtime observable via scheduler_dispatched log event. No code change required — scheduler already emits this
      event in dispatchStory().
    evidence_type: manual
  - ac_id: AC-3
    planned_evidence: >-
      graph-loader-contract.test.ts validates runDevImplement is loaded. Runtime evidence: proof artifact content
      inspection post-run.
    evidence_type: test
  - ac_id: AC-4
    planned_evidence: >-
      Runtime observable via review_artifact_written log event (no code change) + graph-loader-contract.test.ts
      validates runReview is loaded after index.ts fix.
    evidence_type: test
  - ac_id: AC-5
    planned_evidence: Runtime observable via qa_artifact_written log event. No code change required — QA dispatch already wired.
    evidence_type: manual
  - ac_id: AC-6
    planned_evidence: >-
      Runtime observable via KB state transition sequence. No code change required — supervisor's completed handler
      advances states.
    evidence_type: manual
  - ac_id: AC-7
    planned_evidence: >-
      Existing StoryTransitionService artifact gate enforces this. No code change required — gate already checks for
      proof artifact before needs_code_review.
    evidence_type: manual
  - ac_id: AC-8
    planned_evidence: >-
      Retrospective written post-run as KB completion_report artifact. No code change required — format defined in
      elaboration KB entry.
    evidence_type: manual
  - ac_id: AC-9
    planned_evidence: >-
      preflight-check.ts script — step (e) validates selected test story is in ready state with valid elaboration
      artifact. Selection criteria documented in runbook.
    evidence_type: command
  - ac_id: AC-10
    planned_evidence: >-
      OPS-RUNBOOK.md First Supervised Run section — covers startup sequence, monitoring, kill switch, rollback, and
      stub-check procedure.
    evidence_type: file
architectural_decisions: []
complexity: moderate
notes:
  - >-
    CRITICAL INTEGRATION GAP: runReview is exported from review.ts but NOT from graphs/index.ts. graph-loader.ts loads
    dist/graphs/index.js dynamically — mod.runReview will be undefined at runtime. Step 1 fixes this before all other
    steps.
  - >-
    This is an integration/validation story. Most ACs are satisfied by runtime observation, not new code. The three
    deliverables are: (1) the runReview export fix, (2) the preflight script, (3) the runbook extension.
  - >-
    The execute node in dev-implement.ts is still a stub (WINT-9070 reference). AC-3 requires real LLM invocation — this
    is a known dependency on PIPE-3010 being completed before the supervised run begins. The preflight script checks for
    PIPE-3010 completion.
  - >-
    The graph-loader-contract test (Step 4) uses vi.mock to avoid loading the real LangGraph dist during CI. It
    validates the module export shape, not actual LLM execution.
  - No DB migrations are required for this story.
  - >-
    dispatchQaStory F006 deviation (no KB state advance before QA enqueue) is known tech debt. Operator will see
    duplicate rejection logs during QA polling. This is expected behavior — documented in OPS-RUNBOOK First Supervised
    Run section.
