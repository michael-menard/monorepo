    subtask_id: ST-3
    description: >-
      Extend embedding-worker.ts with polling fallback (configurable interval 5min, skip-if-running in-memory guard,
      per-table NULL sweep LIMIT 100, embedding + write-back per batch), backfill function (batch-with-delay,
      configurable batchSize 50 + delayMs 500, callable at startup and standalone, logs per-table counts), graceful
