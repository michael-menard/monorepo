schema: 1
story_id: CDBE-5010
timestamp: '2026-03-19T00:00:00Z'
title: Partition agent_invocations and token_usage Tables
migration_number: 1100
migration_filename: 1100_cdbe5010_partition_telemetry.sql
pgtap_filename: 1100_cdbe5010_partition_telemetry_test.sql
notes:
  - Migration 1090 is already taken by CDBE-3030 token_dashboard matview; migration number for this story is 1100.
  - >-
    PostgreSQL cannot ALTER TABLE ... PARTITION BY on a non-empty table. The rename+copy strategy is required: rename
    old table, create partitioned parent with same name, INSERT INTO new SELECT FROM old, drop old.
  - >-
    Drizzle ORM does not natively model table inheritance / partitioned tables — the schema files should use a comment
    noting partitioning is managed in SQL migrations rather than attempting to express PARTITION BY in Drizzle. The
    Drizzle table definition itself can remain unchanged since partitioned tables have identical column signatures.
  - >-
    Per-partition uniqueness on (invocation_id, started_at) is accepted. Cross-partition uniqueness is enforced at the
    application level. This is a deliberate decision from the elaboration phase.
  - >-
    The DEFAULT partition catches historical rows whose started_at / logged_at values are unknown or outside the
    declared monthly ranges.
  - >-
    Partition names use the format <table>_y<YYYY>m<MM> (e.g., agent_invocations_y2026m03) for clarity and
    sort-lexicographic alignment.
  - >-
    The token_dashboard materialized view (migration 1090) queries workflow.agent_invocations and
    analytics.story_token_usage — both are kept at the same schema-qualified names, so the view is unaffected.
  - >-
    hitl_decisions.invocation_id is ON DELETE SET NULL (nullable FK). After re-partitioning, the FK must target the new
    partitioned parent table using (id, started_at). However, PostgreSQL FKs referencing partitioned tables require the
    referenced columns to form a unique key on the parent. Since the PK is now (id, started_at), the FK from child
    tables (agent_outcomes, agent_decisions, hitl_decisions) must reference the full PK tuple (id, started_at). This
    means child tables also need started_at columns as FK companions, OR the FK remains on id alone if a unique index on
    id alone is maintained on the partition parent. IMPORTANT: PostgreSQL 12+ supports FKs to partitioned tables but
    only when the referenced columns are the full partition key or a superset. Since the FK source columns in
    agent_outcomes/agent_decisions/hitl_decisions only have invocation_id (uuid), a partial unique index on just id is
    needed on the parent to satisfy the FK. We will create a unique index on (id) across the partitioned table using a
    UNIQUE index on just id per partition. However, per-partition UNIQUE on id is sufficient for FK support. This is a
    critical constraint — the FK target must be unique; since id is uuid and gen_random_uuid() each partition's id
    values are globally unique, a per-partition unique index on (id) satisfies the FK requirement.
  - >-
    AC-2 note: The composite PK (id, started_at) is the physical partition key requirement. The simple FK from child
    tables to invocation_id is maintained via a separate UNIQUE index on id alone per partition. This allows the FK to
    remain as invocation_id → agent_invocations(id) without requiring the child tables to carry started_at.
