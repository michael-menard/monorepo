architectural_decisions:
  - id: ARCH-001
    question: >-
      AC-14: How to resolve the QA dispatch trigger state collision — in_qa is used as both 'waiting for review'
      sentinel (after review dispatch) and 'ready for QA' sentinel. dispatchQaStory() cannot call kb_update_story_status
      with a valid canonical target from in_qa.
    decision: >-
      dispatchQaStory() skips the KB state advance entirely. BullMQ jobId deduplication ('{storyId}:qa:{attempt}')
      serves as the idempotency fence, preventing double-dispatch. A story in in_qa that has already been dispatched as
      a QA job will have its jobId rejected by BullMQ on the next poll cycle. This is an explicit documented deviation
      from the F006 atomic dispatch pattern.
    rationale: >-
      The canonical state machine has no valid intermediate 'qa_dispatching' state between in_qa and
      completed/failed_qa/blocked. Adding a new state would require a DB migration (non-goal per story scope). The
      BullMQ jobId fence is sufficient for MVP: PIPE-4010 (first supervised run) requires PIPE-2030 completion callbacks
      which will advance state out of in_qa properly. Until then, the QA dispatch branch is guarded by BullMQ dedup.
    decided_by: dev_plan_leader
  - id: ARCH-002
    question: >-
      dispatchReviewStory() needs to advance from needs_code_review to in_qa — but the state machine has
      needs_code_review → ready_for_qa → in_qa (two hops). Can kb_update_story_status perform a multi-hop transition in
      one call?
    decision: >-
      kb_update_story_status validates against the canonical state machine. It does NOT support multi-hop transitions.
      Therefore dispatchReviewStory() must call kb_update_story_status twice: first advancing needs_code_review →
      ready_for_qa, then ready_for_qa → in_qa. If the first advance succeeds but the second fails, the story is left in
      ready_for_qa (valid state — not a stuck/invalid state). The queue.add() call happens only after BOTH advances
      succeed.
    rationale: >-
      The state machine enforces single-step transitions. Leaving a story in ready_for_qa on partial failure is safe —
      the scheduler's next poll cycle will re-pick it (getEligibleReviewStories() queries needs_code_review, so
      ready_for_qa stories are NOT re-picked — but they are not dispatched either). This is a minor gap but acceptable
      for MVP: PIPE-2030 will implement proper completion callbacks. For now, a manual intervention can advance
      ready_for_qa → in_qa if needed.
    decided_by: dev_plan_leader
