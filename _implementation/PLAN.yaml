  - "Import pattern: Zod schemas from mcp-tools __types__/ must be imported not duplicated (AC-14). The db type is imported from @repo/db but the db instance itself is injectable via factory config"
  - "GraphStateWithContext (from retrieve-context.ts) is the extension base per story's architecture notes — context-warmer extends it to GraphStateWithContextCache, session-manager to GraphStateWithSession"
  - "Cache TTL note: use explicit future timestamps in tests, not relative offsets (story risk)"
  - "Session update throws on not-found/already-completed (MCP source behavior). The LangGraph node must wrap this in the graceful degradation try/catch, returning null sessionId state instead of propagating the throw"
