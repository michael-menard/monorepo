      type), isValidArtifactForPhase(artifactType, phase) → boolean. Encode type-to-phase mapping table from
      kb-integration.md Artifact Type Reference section. Pure metadata — no MCP SDK calls.
    files:
      - packages/backend/workflow-logic/src/artifact/index.ts
    files_to_read:
