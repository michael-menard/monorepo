complexity: simple
notes:
  - >-
    Migration slot 1030 is confirmed free — no file at apps/api/knowledge-base/src/db/migrations/1030*.sql exists at
    planning time.
  - >-
    Safety preamble DO block pattern: DO $$ BEGIN IF current_database() <> 'knowledgebase' THEN RAISE EXCEPTION '1030:
    This migration must run against the ''knowledgebase'' database. Current database: %', current_database(); END IF;
    RAISE NOTICE '1030: Safety check passed — running against database: %', current_database(); END $$;
  - >-
    LATERAL join pattern from 1000_create_story_details_view.sql lines 117-123: LEFT JOIN LATERAL (SELECT * FROM
    workflow.story_outcomes o2 WHERE o2.story_id = s.story_id ORDER BY o2.created_at DESC LIMIT 1) o ON true. Adapt to
    story_state_history with exited_at IS NULL predicate and SELECT to_state, created_at only.
  - >-
    Explicit column list in AC-2 matches the columns visible in 1000_create_story_details_view.sql lines 17-30 plus
    started_at, completed_at, file_hash (present in workflow.stories per Reality Baseline).
  - >-
    The enforce_story_state_history_transition trigger will fire during pgtap test fixture inserts. Use the valid
    transition sequence: NULL → backlog (initial), then backlog → created (second open row). The trigger closes the
    prior open row on each new insert, so to have a multi-row scenario with one open row, insert NULL → backlog then
    backlog → created — the first row will have exited_at set by the trigger.
  - >-
    pgtap plan count: 1 (has_view) + 2 (HP-2: current_state + entered_at) + 2 (HP-3: both NULL) + 1 (HP-4: correct open
    row value) + 1 (EC-2: idempotency lives_ok) = 7 assertions. Use SELECT plan(7).
  - No Vitest tests, no pnpm build, no pnpm check-types commands needed — pure DDL story.
  - ST-2 depends on ST-1 (reads the migration file for the idempotency test). Execution must serialize ST-1 → ST-2.
