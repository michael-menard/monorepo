      checklist_id: "FILE-1"

    - path: "apps/api/pipeline/src/supervisor/concurrency/concurrency-controller.ts"
      purpose: "Slot acquisition, release, and status tracking"
      lines_expected: 100-150
      critical: true
      checklist_id: "FILE-2"

    - path: "apps/api/pipeline/src/supervisor/concurrency/worktree-path.ts"
      purpose: "Worktree path generation with collision prevention"
      lines_expected: 40-60
      critical: false
      checklist_id: "FILE-3"

    - path: "apps/api/pipeline/src/supervisor/worktree-lifecycle.ts"
      purpose: "Git worktree creation and cleanup orchestration"
      lines_expected: 80-120
      critical: true
      checklist_id: "FILE-4"

    - path: "apps/api/pipeline/src/conflicts/worktree-conflict-detector.ts"
