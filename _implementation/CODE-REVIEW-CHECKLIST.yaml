---
schema_version: "1"
story_id: "APIP-3080"
timestamp: "2026-03-01T00:00:00Z"
title: "Code Review Checklist - Parallel Story Concurrency (2-3 Worktrees)"
phase: "implementation"
iteration: 0

# Overview section describing the code review scope
overview:
  description: >
    APIP-3080 extends the autonomous pipeline supervisor to support 2-3 concurrent
    stories via BullMQ's concurrency parameter, with isolated git worktrees,
    conflict detection, and per-worktree circuit breakers. This checklist
    validates implementation against the 12 acceptance criteria and project standards.

  feature_scope: |
    1. ConcurrencyConfig Zod schema with maxWorktrees (1-3), conflictPolicy
    2. ConcurrencyController for slot management and lifecycle tracking
    3. WorktreeConflictDetector for path-prefix overlap detection
    4. BullMQ Worker concurrency integration in pipeline-supervisor
    5. Git worktree creation/cleanup lifecycle
    6. Per-worktree circuit breaker instances
    7. TokenBucket concurrent safety validation
    8. Integration tests with real Redis and git worktrees

  dependencies:
    - APIP-0020 (BullMQ supervisor loop - must be merged)
    - APIP-0040 (PipelineModelRouter with TokenBucket - must be merged)
    - Git 2.27+ (git worktree command)
    - Redis instance for BullMQ integration tests

