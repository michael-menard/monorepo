      pgTAP test files (SQL-only) cannot be executed in the standard vitest run. They require a live PostgreSQL
      instance. For infra/schema stories, the 26-assertion pgTAP file is the primary test artifact. QA should verify
      file structure and assertion count directly rather than relying on a vitest run to catch SQL test failures.
    category: pattern
    tags:
      - pgtap
      - sql
      - db-migration
      - qa-verify
