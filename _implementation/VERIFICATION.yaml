lessons_to_record:
  - lesson: >-
      Evidence grep claims must be independently re-verified by QA. A false-positive grep claim (claiming zero matches
      when matches exist) propagated through evidence and review phases undetected. QA spot-check of actual files is
      mandatory even when evidence claims clean grep output.
    category: anti_pattern
    tags:
      - qa
      - evidence
      - grep-verification
      - wint-migration
  - lesson: >-
      For agent/skill markdown migrations (WINT batch stories), the code review phase passed with zero errors/warnings
      despite the migration not being performed. This indicates the code review workers did not check the actual file
      content for the required KB pattern adoption — only structural/syntax checks were run. Review phase needs to
      include a content-level grep check for forbidden filesystem patterns in WINT migration stories.
    category: blocker
    tags:
      - code-review
      - wint-migration
      - markdown-agents
      - qa
  - lesson: >-
      For WINT batch migration stories where all changes are markdown files, the test-exempt path must still include an
      independent QA grep as a test substitute. The absence of executable tests does not mean absence of verifiable
      correctness criteria.
    category: pattern
    tags:
      - wint-migration
      - qa-verify
      - markdown-only-stories
