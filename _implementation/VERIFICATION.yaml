lessons_to_record:
  - lesson: >-
      ON CONFLICT DO UPDATE is incompatible with BEFORE INSERT triggers that modify the conflicting row — use
      UPDATE-first, INSERT-if-not-exists pattern instead
    category: pattern
    tags:
      - postgresql
      - triggers
      - upsert
      - migrations
  - lesson: >-
      When an AC prescribes a specific implementation mechanism (ON CONFLICT DO UPDATE) but the migration uses a
      different mechanism for documented technical reasons, this constitutes a PASS if the behavioral contract is
      preserved and the deviation is documented in code comments
    category: pattern
    tags:
      - qa
      - ac-verification
      - sql
      - migrations
  - lesson: >-
      pgtap test setup should seed blocker rows whose ordering in tests is clear — the e1e1 second blocker for
      TEST-1070-A was subtle to follow across HP-2 and HP-3 test groups
    category: time_sink
    tags:
      - pgtap
      - test-setup
      - readability
