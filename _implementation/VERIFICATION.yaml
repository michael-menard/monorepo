lessons_to_record:
  - lesson: >-
      REFRESH MATERIALIZED VIEW cannot run inside a pgtap BEGIN/ROLLBACK block. Fixture setup and REFRESH must be
      committed outside the test transaction wrapper. The test file correctly places REFRESH at line 65 before BEGIN
      (line 71).
    category: pattern
    tags:
      - postgresql
      - pgtap
      - materialized-view
      - testing
  - lesson: >-
      CREATE MATERIALIZED VIEW does not support CREATE OR REPLACE. Idempotency requires DROP MATERIALIZED VIEW IF EXISTS
      ... CASCADE followed by CREATE. The CASCADE automatically drops dependent indexes, which must then be recreated.
    category: pattern
    tags:
      - postgresql
      - materialized-view
      - migrations
      - idempotency
  - lesson: >-
      STATEMENT-level triggers are mandatory for matview refresh on busy tables. ROW-level triggers would call REFRESH
      once per modified row — catastrophic for bulk updates. FOR EACH STATEMENT fires once per DML statement regardless
      of rows affected.
    category: pattern
    tags:
      - postgresql
      - triggers
      - materialized-view
      - performance
  - lesson: >-
      pg_trigger_depth() > 1 guard is the correct recursion defense for matview refresh triggers. Depth 0 = direct SQL,
      Depth 1 = trigger invocation, Depth > 1 = recursive trigger. Using > 1 (not > 0) allows the first trigger
      invocation to proceed.
    category: pattern
    tags:
      - postgresql
      - triggers
      - recursion-guard
      - plpgsql
  - lesson: >-
      For next_unblocked_story in a matview, TEXT (story_id only) is preferable to JSONB ({story_id, title}). JSONB
      snapshots go stale when story titles change between matview refreshes. Service layer joins for title are cheap
      (index lookup on primary key).
    category: pattern
    tags:
      - postgresql
      - materialized-view
      - schema-design
      - jsonb
