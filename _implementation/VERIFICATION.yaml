lessons_to_record:
  - lesson: >-
      Content-validation test pattern for agent .md files: read the file as a string and assert on presence/absence of
      specific constants, patterns, and structural elements. This achieves comprehensive AC coverage for
      specification-as-code deliverables without requiring executable runtime code.
    category: pattern
    tags:
      - agents
      - testing
      - markdown
      - vitest
  - lesson: >-
      Agent files with no TypeScript compilation surface are legitimately exempt from build gates and coverage
      thresholds. The 45% coverage threshold in CLAUDE.md applies to packages with executable code — markdown agent
      specs with content-validation tests are a distinct artifact class.
    category: pattern
    tags:
      - agents
      - coverage
      - qa-gate
      - build-exempt
  - lesson: >-
      Sequential processing enforcement in batch coordinator agents should be documented with both positive constraint
      (one story at a time, foreground Task calls) and negative constraint (explicitly prohibit run_in_background:
      true). Tests should verify the negative constraint is absent.
    category: pattern
    tags:
      - agents
      - orchestration
      - sequential
      - batch-coordinator
