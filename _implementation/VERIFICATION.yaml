lessons_to_record:
  - lesson: >-
      pgtap tests that use CREATE TRIGGER referencing a not-yet-deployed function will abort the entire transaction when
      the function is missing. This silently skips all remaining assertions. Tests should use a guard (e.g., check
      has_function() BEFORE attempting CREATE TRIGGER, or use a DO block with conditional logic) to avoid full abort.
    category: anti_pattern
    tags:
      - pgtap
      - database
      - testing
      - triggers
  - lesson: >-
      When EVIDENCE.yaml is written with DB_NOT_AVAILABLE, it should still enumerate all 7 ACs with their status.
      Omitting AC-4 through AC-7 from EVIDENCE leaves QA without the primary source of truth for those criteria.
    category: pattern
    tags:
      - evidence
      - qa
      - documentation
  - lesson: >-
      KB dependency declarations (AC-5 for CDBE-0020) must be explicitly executed via kb_update_story or
      story_dependencies insert — noting it in the plan notes is insufficient. Implementation agents must execute KB
      writes as part of the implementation phase.
    category: blocker
    tags:
      - kb
      - dependencies
      - implementation
