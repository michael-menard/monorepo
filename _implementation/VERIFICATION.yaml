lessons_to_record:
  - lesson: >-
      Injectable callback/adapter pattern (DecisionCallback, ReadinessScoreFn) enables full unit testability of
      LangGraph nodes without any LLM or transport dependency. This pattern should be used consistently for all future
      HiTL nodes.
    category: pattern
    tags:
      - langgraph
      - hitl
      - testing
      - orchestrator
  - lesson: >-
      Soft HiTL state injection (checking state.hitlDecision before invoking callback) provides resume capability
      without requiring LangGraph interrupt(). The node checks refinementPhase==='human_review' to distinguish resume
      from re-entry after edit loop.
    category: pattern
    tags:
      - hitl
      - langgraph
      - resume
      - orchestrator
  - lesson: >-
      makeState helper in test files must include all state fields (including fields from sibling stories like APRS-2020
      gap-coverage fields) to prevent TypeScript errors. AC-9 enforces this explicitly.
    category: pattern
    tags:
      - testing
      - typescript
      - langgraph
      - state
  - lesson: >-
      DEC-6 routes 'edit' back to extract_flows (not normalize_plan or gap_coverage directly). When adding new
      conditional routing decisions, document the decision as a DECision record in the story description for future
      reference.
    category: pattern
    tags:
      - langgraph
      - routing
      - orchestrator
      - design-decisions
