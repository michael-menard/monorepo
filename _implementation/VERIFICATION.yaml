lessons_to_record:
  - lesson: >-
      Injectable function types (KbAddTaskFn, KbListTasksFn) with optional injection and factory pattern
      (createScopeDefendNode) provide clean testability for nodes that write to external systems without coupling the
      node to a live KB connection.
    category: pattern
    tags:
      - orchestrator
      - langgraph
      - testing
      - dependency-injection
  - lesson: >-
      Idempotency via tag-based lookup (kbListTasksFn scoped by source_story_id + tag prefix) avoids duplicate KB
      entries on retries. The idempotency check failure is also treated as non-blocking — execution continues without
      the guard rather than aborting.
    category: pattern
    tags:
      - idempotency
      - orchestrator
      - kb
      - resilience
