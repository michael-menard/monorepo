lessons_to_record:
  - lesson: >-
      pgtap test isolation via BEGIN/ROLLBACK is self-healing: SELECT finish() raises an exception on assertion count
      mismatch, which causes PostgreSQL to abort and ROLLBACK automatically — isolation is preserved even on test
      failure without explicit error handling.
    category: pattern
    tags:
      - pgtap
      - database
      - testing
      - infra
  - lesson: >-
      For GitHub Actions service containers, custom Docker images are not available — install pgtap via apt-get in a
      setup step against the standard postgres:16 image rather than building a custom image. The custom Dockerfile is
      still useful for local docker-compose.
    category: pattern
    tags:
      - ci
      - github-actions
      - pgtap
      - docker
  - lesson: >-
      The ?-operator syntax in docker-compose (${VAR:?error message}) provides fail-fast credential enforcement — the
      container refuses to start if the password is not set, preventing accidental runs against an unauthenticated
      database.
    category: pattern
    tags:
      - docker
      - security
      - credentials
