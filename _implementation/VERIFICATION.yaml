lessons_to_record:
  - lesson: >-
      Injectable function type pattern (KbUpsertPlanFn) enables testing side-effectful KB persistence without real MCP
      tool calls. Type the injectable as a simple async function signature rather than full tool interface.
    category: pattern
    tags:
      - backend
      - testing
      - mcp
      - orchestrator
  - lesson: >-
      Local schema copy (KbPlanInputSchema in kb-persistence.ts) avoids cross-app imports when the target schema lives
      in a different service boundary. Accept the tech debt of duplication over introducing a forbidden dependency edge.
    category: pattern
    tags:
      - backend
      - schema
      - orchestrator
      - architecture
  - lesson: >-
      Intermediate typed schema (IntakePlanDraftSchema) between raw skill output and NormalizedPlan eliminates the
      untyped input contract gap. Both brainstorm and existing-plan skills share a single typed intake shape rather than
      separate ad-hoc types.
    category: pattern
    tags:
      - backend
      - zod
      - orchestrator
      - intake
