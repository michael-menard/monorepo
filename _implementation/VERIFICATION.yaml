lessons_to_record:
  - lesson: >-
      Adapter factory pattern (createXxxAdapter returning interface) cleanly bridges an interactive CLI tool (inquirer)
      to a typed graph callback interface without coupling the graph to the I/O mechanism. The graph only sees
      DecisionCallback; the adapter handles all terminal interaction.
    category: pattern
    tags:
      - langgraph
      - adapter
      - cli
      - hitl
      - inquirer
  - lesson: >-
      Ctrl+C / interruption handling via try/catch around each inquirer.prompt call provides graceful fallback (defer on
      primary interrupt, approve-all on checkbox interrupt) without crashing the graph. This is a reusable pattern for
      any interactive HiTL adapter.
    category: pattern
    tags:
      - cli
      - error-handling
      - hitl
      - inquirer
      - interruption
