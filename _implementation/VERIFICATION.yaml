lessons_to_record:
  - lesson: >-
      pgTAP col_type_is with custom types like vector(1536) requires the type schema argument (e.g., 'public') to match
      how pgtap resolves the type. The 6-argument form col_type_is(schema, table, column, type_schema, type_name,
      description) is required.
    category: pattern
    tags:
      - pgtap
      - pgvector
      - database
      - migration
  - lesson: >-
      CREATE INDEX CONCURRENTLY cannot run inside a transaction block. Migration files that include CONCURRENTLY indexes
      must keep those statements as top-level SQL, not wrapped in DO $$ ... $$ blocks.
    category: pattern
    tags:
      - postgresql
      - migration
      - hnsw
      - pgvector
  - lesson: >-
      For DB-only migration stories with no API surface, the E2E gate and .http file execution are both exempt. The
      review verdict of PASS plus 15/15 pgTAP assertions is sufficient for QA verification.
    category: pattern
    tags:
      - migration
      - qa
      - e2e-exempt
      - pgtap
