lessons_to_record:
  - lesson: >-
      QA verification must run tests against the active worktree branch when PR is open but not yet merged. Evidence
      artifacts describe the worktree state, not main. The test runner on main will not find worktree-only files.
    category: pattern
    tags:
      - qa
      - worktree
      - verification
  - lesson: >-
      Injectable adapter pattern (e.g. CoverageAdapterFn, ReconciliationAdapterFn following FlowWriterFn convention)
      enables deterministic unit testing of LangGraph nodes without LLM calls. Circuit breaker state
      (circuitBreakerOpen, consecutiveLlmFailures) should be first-class state fields.
    category: pattern
    tags:
      - langgraph
      - testing
      - adapters
      - circuit-breaker
  - lesson: >-
      When evidence claims N tests in files that do not exist on main, check for an open PR or worktree before marking
      as FAIL. The files may exist on the feature branch awaiting merge.
    category: pattern
    tags:
      - qa
      - evidence
      - verification
