architecture_notes:
  - "SecretsClient uses dependency injection pattern for AWS SDK, enabling testing without real AWS calls"
  - "TTL-based in-memory cache reduces AWS Secrets Manager API calls in production"
  - "Graceful degradation: falls back to process.env when SECRETS_ENGINE=env (local dev)"
  - "Factory methods support custom configuration for testing scenarios"
  - "All secret reads are synchronous (getSync) to avoid async complications in module load phase"
  - "Audit logging provides visibility into cache misses without exposing secret values"

decision_rationale:
  cache_ttl: "1 hour default balances security (secrets aging) with performance (reduced AWS calls)"
  synchronous_api: "Module initialization happens synchronously; async get() provided for runtime refresh"
  error_handling: "Graceful degradation (return undefined) preferred over throwing to prevent app startup failures"
  zod_validation: "Runtime schema validation ensures config safety even with environment-based overrides"

