      root_cause: |
        The mcp-tools package was maintaining local copies of worktree-management and telemetry tools 
        that were also available in @repo/knowledge-base. This created a circular dependency where 
        knowledge-base depends on mcp-tools, and mcp-tools was trying to provide tools that created 
        a reverse dependency.

      resolution: |
        Updated mcp-tools to source worktree-management and telemetry tools directly from @repo/knowledge-base
        instead of maintaining local copies. This breaks the cycle while maintaining the same API surface
        for consumers of mcp-tools.

      impact:
        - Unidirectional dependency graph (knowledge-base → mcp-tools)
        - Both packages compile cleanly
        - No breaking changes to public API
        - Reduces code duplication and maintenance burden

