lessons_to_record:
  - lesson: >-
      Integration tests that rely on live DB and use human-readable story IDs (e.g. APRS-TEST-001) as FK references can
      fail teardown if any path in the DB schema requires UUID. Prefer using the test story's uuid primary key for
      cleanup queries.
    category: blocker
    tags:
      - integration-tests
      - database
      - uuid
  - lesson: >-
      Dual-layer artifact enforcement (orchestrator StoryTransitionService + MCP storyUpdateStatus) is the correct
      pattern: orchestrator gates via workflowRepo.getLatestProof/Verification, MCP gates via direct storyArtifacts
      table query inside transaction. Both layers use the same 4-entry gate map.
    category: pattern
    tags:
      - artifact-gates
      - atomicity
      - mcp-tools
      - orchestrator
