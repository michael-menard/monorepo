lessons_to_record:
  - lesson: >-
      EVIDENCE.yaml artifacts can report AC-PASS when implementation steps were never applied. QA must always re-run
      tests and directly grep implementation targets — do not trust EVIDENCE.yaml status claims.
    category: anti_pattern
    tags:
      - evidence
      - qa
      - trust-but-verify
  - lesson: >-
      When a YAML configuration file has a version bump (1.0.0 -> 1.1.0), all integration tests that assert the
      hardcoded version string must be updated atomically with the YAML change.
    category: blocker
    tags:
      - integration-tests
      - version-drift
      - strategy-yaml
  - lesson: >-
      Worktree environments missing built @repo/* dist directories cause test failures in unrelated test files. These
      must be classified as environment gaps rather than code regressions. The fix scope for WINT-0230 is confirmed by
      diffing touched files against main and running only affected test files.
    category: pattern
    tags:
      - worktree
      - environment
      - qa-isolation
