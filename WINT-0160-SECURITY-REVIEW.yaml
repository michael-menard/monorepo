security:
  t_shirt_size: M
  size_rationale: |
    Subprocess execution with shell=true creates attack surface, but mitigated by:
    - Fixed command ('claude') with no user-controlled injection points
    - Limited, validated arguments (--check-only, --force flags only)
    - File I/O restricted to single report file with controlled path resolution
    - No auth/payment/PII handling in this node
    - Backend-only, no network exposure via UI
    - Good error handling and logging practices
  risk_level: medium

findings:
  - id: SEC-001
    severity: high
    finding: |
      Subprocess spawned with shell=true (line 102)

      Code:
        const child = spawn('claude', ['doc-sync', ...args], {
          cwd: workingDir,
          shell: true,
        })

      While the command itself ('claude') and args are controlled, shell=true is a
      security anti-pattern. If workingDir or any config values are user-controlled
      in future versions, this could enable command injection through shell metacharacters
      in the cwd parameter.

      Current risk is LOW because workingDir defaults to process.cwd() and is only
      settable via internal DocSyncConfig. No direct user input flows to spawn().
      However, this is a potential vulnerability if config sources change.
    file: /Users/michaelmenard/Development/monorepo/packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
    line: 100-103
    cwe: CWE-78 (Improper Neutralization of Special Elements used in an OS Command)
    suggested_action: |
      RECOMMENDED: Remove shell=true unless shell features are explicitly needed.

      Change from:
        const child = spawn('claude', ['doc-sync', ...args], {
          cwd: workingDir,
          shell: true,
        })

      To:
        const child = spawn('claude', ['doc-sync', ...args], {
          cwd: workingDir,
        })

      The args array is already properly quoted by spawn() when shell is false.
      This is the safest approach for this use case.

  - id: SEC-002
    severity: medium
    finding: |
      Path traversal vulnerability in workingDir (line 205)

      Code:
        const workingDir = fullConfig.workingDir || process.cwd()
        const reportPath = fullConfig.reportPath || path.join(workingDir, 'SYNC-REPORT.md')

      If workingDir is set via DocSyncConfig from an external source (LangGraph state),
      a caller could pass "../../../etc/passwd" or absolute paths to read arbitrary files
      via the reportPath file read (line 145).

      Current risk is MEDIUM because:
      - docSyncConfig is validated via Zod schema (checkOnly, force booleans are safe)
      - workingDir/reportPath are optional and not currently exposed via untrusted sources
      - No explicit validation that paths stay within a sandbox
      - File is only read (fs.readFile), not written or deleted

      However, if createDocSyncNode() is called with user-supplied config later,
      this becomes a critical path traversal.
    file: /Users/michaelmenard/Development/monorepo/packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
    line: 204-205
    cwe: CWE-22 (Improper Limitation of a Pathname to a Restricted Directory)
    suggested_action: |
      ADD PATH VALIDATION to ensure workingDir and reportPath stay within allowed bounds.

      Option 1 - Strict sandboxing:
        import { resolve } from 'node:path'

        const ALLOWED_BASE = resolve(process.cwd(), 'artifacts')
        const sanitizedDir = resolve(workingDir)

        if (!sanitizedDir.startsWith(ALLOWED_BASE)) {
          throw new Error(`workingDir must be within ${ALLOWED_BASE}`)
        }

      Option 2 - Relative path enforcement (simpler):
        if (workingDir.startsWith('/') || workingDir.includes('..')) {
          throw new Error('workingDir must be a relative path without ".."')
        }

      Add this validation to the DocSyncConfigSchema or docSyncImpl() function.

  - id: SEC-003
    severity: low
    finding: |
      No validation of reportPath file size (line 145)

      Code:
        const content = await fs.readFile(reportPath, 'utf-8')

      If an attacker can control reportPath (or symlink it), they could point to a
      very large file causing:
      - Memory exhaustion (entire file loaded into memory as string)
      - DoS via resource exhaustion
      - Slowdown of workflow processing

      Current risk is LOW because:
      - reportPath defaults to a controlled location
      - File is expected to be SYNC-REPORT.md (small, documented format)
      - No current UI/external exposure

      But if this becomes user-configurable or file-accessible, could be exploited.
    file: /Users/michaelmenard/Development/monorepo/packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
    line: 145
    cwe: CWE-400 (Uncontrolled Resource Consumption)
    suggested_action: |
      ADD file size limit before reading:

        const MAX_REPORT_SIZE = 10 * 1024 * 1024 // 10 MB

        try {
          const stats = await fs.stat(reportPath)
          if (stats.size > MAX_REPORT_SIZE) {
            throw new Error(`SYNC-REPORT.md exceeds max size of ${MAX_REPORT_SIZE} bytes`)
          }
          const content = await fs.readFile(reportPath, 'utf-8')
          ...
        }

      This prevents memory exhaustion from maliciously large files.

  - id: SEC-004
    severity: low
    finding: |
      Subprocess stderr not checked for sensitive data leakage (line 112-114)

      Code:
        child.stderr?.on('data', data => {
          stderr += data.toString()
        })

      The captured stderr is logged and returned to state (line 215, 225).
      If the spawned 'claude doc-sync' command outputs sensitive info (API keys,
      file paths, etc.) on stderr, it will be:
      - Logged via logger.error()
      - Stored in GraphState docSync.errors[]
      - Potentially exposed in audit logs or state dumps

      Current risk is LOW because:
      - 'claude doc-sync' is a trusted internal command
      - No PII/auth data expected in output
      - Logging is appropriate for debugging

      But violates principle of least logging for subprocess output.
    file: /Users/michaelmenard/Development/monorepo/packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
    line: 112-114, 215, 225
    cwe: CWE-532 (Insertion of Sensitive Information into Log File)
    suggested_action: |
      OPTIONAL: Sanitize or truncate stderr before logging if command semantics
      ever include sensitive data:

        const MAX_STDERR_LENGTH = 1000
        const sanitizedStderr = stderr.length > MAX_STDERR_LENGTH
          ? stderr.substring(0, MAX_STDERR_LENGTH) + '...[truncated]'
          : stderr

        logger.error('doc-sync command failed', { exitCode, stderr: sanitizedStderr })

      For now, this is low priority since 'claude' is internal and trusted.

  - id: SEC-005
    severity: low
    finding: |
      No validation of exit codes beyond 0/1 (line 212)

      Code:
        if (exitCode !== 0 && exitCode !== 1) {
          // Exit code 1 in check-only mode means out-of-sync (expected)
          logger.error('doc-sync command failed', { exitCode, stderr })
        }

      Exit code 127 (command not found) or 139 (segfault) could indicate that
      'claude' command is missing or corrupted. The current code treats these as
      generic failures, which is appropriate, but doesn't distinguish between:
      - Legitimate tool failures (exit code 2)
      - System/environment issues (exit code 127)
      - Signal termination (exit code > 128)

      Current risk is LOW because error handling is defensive.
      This is more of a robustness than security issue.
    file: /Users/michaelmenard/Development/monorepo/packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
    line: 212-228
    cwe: CWE-754 (Improper Error Handling)
    suggested_action: |
      OPTIONAL: Add more granular exit code handling for better diagnostics:

        if (exitCode === 127) {
          throw new Error('claude command not found - ensure Claude Code is installed')
        } else if (exitCode > 128) {
          throw new Error(`doc-sync terminated by signal ${exitCode - 128}`)
        } else if (exitCode !== 0 && exitCode !== 1) {
          logger.error('doc-sync command failed', { exitCode, stderr })
        }

      This helps distinguish environment issues from actual tool failures.

security_summary:
  critical_issues: 0
  high_issues: 1
  medium_issues: 1
  low_issues: 3

  total_actionable_risks: 2

owasp_top_10_coverage:
  A01_BrokenAccess: NOT_APPLICABLE
  A02_Cryptographic: NOT_APPLICABLE
  A03_Injection:
    status: MITIGATED
    note: |
      Command injection risk exists via shell=true but is mitigated by:
      - Fixed command name ('claude' hardcoded, not user input)
      - Args validated via Zod schema (only boolean flags)
      - No string interpolation in spawn() arguments
      Recommendation: Remove shell=true to eliminate this attack vector entirely.
  A04_InsecureDesign: MITIGATED
    note: |
      File I/O is appropriately scoped. Path traversal risk exists if config
      becomes user-controlled. Recommend adding path validation.
  A05_SecurityMisconfiguration: NONE
  A06_VulnerableComponents: NONE
    note: |
      Dependencies (zod, node stdlib) are not vulnerable. The spawned
      'claude' command is internal and trusted.
  A07_AuthenticationFailure: NOT_APPLICABLE
  A08_SoftwareDataIntegrity: NONE
    note: |
      No integrity verification of SYNC-REPORT.md. If file is tampered,
      parsing could fail gracefully (defaults to 0 counts). Low risk.
  A09_LoggingMonitoring: MITIGATED
    note: |
      Subprocess stderr is logged. Could sanitize if needed but low priority
      since 'claude' is internal command.
  A10_SSRF: NOT_APPLICABLE

security_recommendations_priority:
  1: |
    IMMEDIATE: Remove shell=true from spawn() call (SEC-001 High)
    Effort: 5 minutes
    Impact: Eliminates OS command injection attack vector

  2: |
    SOON: Add path validation to workingDir/reportPath (SEC-002 Medium)
    Effort: 15 minutes
    Impact: Prevents directory traversal if config sources change in future

  3: |
    NICE_TO_HAVE: Add file size limits to SYNC-REPORT.md read (SEC-003 Low)
    Effort: 10 minutes
    Impact: Prevents resource exhaustion DoS

notes:
  - |
    This node is BACKEND-ONLY with no direct UI exposure, which significantly
    reduces the practical attack surface.
  - |
    The spawned 'claude doc-sync' command is an internal tool, not user-controlled,
    which makes it much safer than spawning arbitrary user-supplied commands.
  - |
    Configuration comes from LangGraph workflow state (docSyncImpl parameter), not
    from HTTP input or environment variables, which limits injection risk.
  - |
    The primary security risks are design patterns (shell=true, path traversal)
    that could become critical if code is refactored or reused in different contexts.
  - |
    No hardcoded secrets, API keys, or authentication tokens found in this file.
  - |
    Error handling is defensive and doesn't expose sensitive information.
  - |
    Test coverage is comprehensive and includes error cases.

tested_against_cwe:
  - CWE-78: OS Command Injection
  - CWE-22: Path Traversal
  - CWE-400: Resource Exhaustion
  - CWE-532: Sensitive Information in Logs
  - CWE-754: Improper Error Handling
