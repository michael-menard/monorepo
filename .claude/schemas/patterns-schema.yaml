# PATTERNS-{month}.yaml Schema
# Output format for cross-story pattern mining
# Generated by: pattern-miner agent
# Consumer: Dev agents, human reviewers, calibration agent
# Schema version: 2

---

## Core Structure

```yaml
schema: 2
generated_at: "{ISO timestamp}"
analysis_period:
  start: "{ISO date}"
  end: "{ISO date}"
  days: {N}
stories_analyzed: {N}
data_sources: [outcome, verification]  # Which files were analyzed

file_patterns: []
ac_patterns: []
agent_correlations: []
deduplicated_from_previous: {}
trend_summary: {}
metadata: {}
```

---

## File Patterns Section

Detects correlation between specific file paths and review outcomes.

```yaml
file_patterns:
  - pattern: "{file path or glob pattern}"
    occurrences: {N}
    stories: ["{STORY_ID}", ...]

    cluster_label: "{pattern_type}_{NNN}"  # e.g. file_pattern_001 - AC-4
    similarity_score: {0.0-1.0}            # similarity to cluster representative - AC-4

    confidence: {0.0-1.0 | null}           # null if occurrences < 5 - AC-14

    trend: improving | regressing | stable | new | resolved  # only if --trend flag used

    correlation_metrics:
      lint_failures: {N}
      typecheck_failures: {N}
      security_issues: {N}
      build_failures: {N}
      correlation_score: {0.0-1.0}  # Probability this file triggers issues

    severity: high | medium | low

    recommendation: "{actionable improvement}"

    evidence:
      - story_id: "{STORY_ID}"
        failure_type: lint | typecheck | security | build
        description: "{specific issue}"
```

### Thresholds

- **Significance**: Pattern must appear in 3+ stories
- **Correlation**: correlation_score >= 0.60 to report
- **Confidence**: null if occurrences < 5; computed as correlation_score * (min(N,20)/20) otherwise
- **Severity**:
  - high: correlation_score >= 0.80
  - medium: correlation_score >= 0.60
  - low: correlation_score < 0.60 (excluded)

---

## AC Patterns Section

Detects vague or problematic phrasing in Acceptance Criteria.

```yaml
ac_patterns:
  - vague_phrase: "{phrase detected}"
    occurrences: {N}
    stories: ["{STORY_ID}", ...]

    cluster_label: "{pattern_type}_{NNN}"  # e.g. ac_pattern_001 - AC-4
    similarity_score: {0.0-1.0}            # similarity to cluster representative - AC-4

    confidence: {0.0-1.0 | null}           # null if occurrences < 5 - AC-14

    trend: improving | regressing | stable | new | resolved  # only if --trend flag used

    impact_metrics:
      review_cycles_avg: {float}
      failure_rate: {0.0-1.0}

    severity: high | medium | low

    improved_phrasing: "{suggested alternative}"

    evidence:
      - story_id: "{STORY_ID}"
        ac_id: "{AC_ID}"
        original_text: "{AC text}"
        failure_type: "{description}"
```

### Vague Phrase Detection

Common patterns to detect:
- "properly", "correctly", "appropriate", "reasonable"
- "fast", "efficient", "optimized"
- "good", "bad", "better"
- "should work", "must handle"
- "etc.", "and so on"

### Thresholds

- **Significance**: Phrase must appear in 3+ stories
- **Impact**: failure_rate >= 0.40 or review_cycles_avg >= 2.5
- **Confidence**: null if occurrences < 5; computed as failure_rate * (min(N,20)/20) otherwise
- **Severity**:
  - high: failure_rate >= 0.60 or review_cycles_avg >= 3.0
  - medium: failure_rate >= 0.40 or review_cycles_avg >= 2.5
  - low: below medium thresholds (excluded)

---

## Agent Correlations Section

Detects patterns in agent behavior and inter-agent dependencies.

```yaml
agent_correlations:
  - correlation_type: coder_to_reviewer | phase_to_phase | ac_type_to_failure

    primary_agent: "{agent name or phase}"
    secondary_agent: "{agent name or phase}"

    occurrences: {N}
    stories: ["{STORY_ID}", ...]

    cluster_label: "{pattern_type}_{NNN}"  # e.g. agent_corr_001 - AC-4
    similarity_score: {0.0-1.0}            # similarity to cluster representative - AC-4

    confidence: {0.0-1.0 | null}           # null if occurrences < 5 - AC-14

    trend: improving | regressing | stable | new | resolved  # only if --trend flag used

    correlation_score: {0.0-1.0}
    severity: high | medium | low

    description: "{pattern description}"
    recommendation: "{actionable improvement}"

    evidence:
      - story_id: "{STORY_ID}"
        observation: "{specific finding}"
```

### Thresholds

- **Significance**: Pattern must appear in 3+ stories
- **Correlation**: correlation_score >= 0.60
- **Confidence**: null if occurrences < 5; computed as correlation_score * (min(N,20)/20) otherwise
- **Severity**:
  - high: correlation_score >= 0.80
  - medium: correlation_score >= 0.60
  - low: below 0.60 (excluded)

---

## Deduplicated From Previous Section (AC-16)

Cross-period deduplication: patterns that also appeared in the previous analysis period.

```yaml
deduplicated_from_previous:
  previous_period: "{YYYY-MM}"  # e.g. "2026-01"
  method: levenshtein           # similarity algorithm used
  threshold: 0.70               # similarity threshold applied

  file_patterns:
    - pattern: "{file path or glob pattern}"
      first_seen: "{YYYY-MM}"
      current_correlation: {0.0-1.0}
      previous_correlation: {0.0-1.0}
      trend: improving | regressing | stable

  ac_patterns:
    - vague_phrase: "{phrase}"
      first_seen: "{YYYY-MM}"
      current_failure_rate: {0.0-1.0}
      previous_failure_rate: {0.0-1.0}
      trend: improving | regressing | stable

  agent_correlations:
    - description: "{pattern description}"
      first_seen: "{YYYY-MM}"
      current_correlation: {0.0-1.0}
      previous_correlation: {0.0-1.0}
      trend: improving | regressing | stable
```

---

## Trend Summary Section (--trend flag)

```yaml
trend_summary:
  period: "{YYYY-MM}"
  compared_to: "{YYYY-MM}"
  improving_patterns: {N}
  regressing_patterns: {N}
  stable_patterns: {N}
  new_patterns: {N}
  resolved_patterns: {N}
```

---

## Metadata Section

```yaml
metadata:
  min_sample_size: 3
  min_correlation: 0.60
  clustering_threshold: 0.70  # Text similarity threshold
  clustering_method: levenshtein  # MVP: text similarity

  flags:
    use_verifications: true | false
    all_epics: true | false
    trend: true | false

  warnings:
    - "{warning message}"

  data_quality:
    outcome_files: {N}
    verification_files: {N}
    fallback_mode: true | false

  processing:
    stories_skipped: {N}
    skip_reasons:
      - story_id: "{STORY_ID}"
        reason: "{reason}"
```

---

## Example

```yaml
schema: 2
generated_at: "2026-02-07T10:00:00Z"
analysis_period:
  start: "2026-01-08"
  end: "2026-02-07"
  days: 30
stories_analyzed: 15
data_sources: [verification]

file_patterns:
  - pattern: "apps/api/*/routes.ts"
    occurrences: 8
    stories: ["WISH-001", "WISH-003", "WISH-007", "WISH-010"]

    cluster_label: "file_pattern_001"
    similarity_score: 1.0

    confidence: 0.68  # occurrences >= 5

    trend: stable

    correlation_metrics:
      lint_failures: 6
      typecheck_failures: 2
      security_issues: 0
      build_failures: 0
      correlation_score: 0.75

    severity: medium

    recommendation: "Add lint pre-check to backend-coder for route handlers. Consider type annotation template for handler params."

    evidence:
      - story_id: "WISH-001"
        failure_type: lint
        description: "Missing type annotations on handler params"
      - story_id: "WISH-003"
        failure_type: typecheck
        description: "Implicit any on request object"

ac_patterns:
  - vague_phrase: "properly"
    occurrences: 3
    stories: ["WISH-002", "WISH-005", "WISH-009"]

    cluster_label: "ac_pattern_001"
    similarity_score: 1.0

    confidence: null  # occurrences < 5

    trend: new

    impact_metrics:
      review_cycles_avg: 2.8
      failure_rate: 0.60

    severity: medium

    improved_phrasing: "Replace 'properly' with specific criteria (e.g., 'validated with Zod schema', 'authenticated via JWT')"

    evidence:
      - story_id: "WISH-002"
        ac_id: "AC-3"
        original_text: "Request must be properly validated"
        failure_type: "Vague - no test criteria"

agent_correlations:
  - correlation_type: coder_to_reviewer
    primary_agent: "backend-coder"
    secondary_agent: "code-review-security"
    occurrences: 6
    stories: ["WISH-002", "WISH-004", "WISH-006"]

    cluster_label: "agent_corr_001"
    similarity_score: 1.0

    confidence: 0.51  # occurrences >= 5

    trend: improving

    correlation_score: 0.85
    severity: high
    description: "When backend-coder implements auth routes, security review finds issues 85% of time"
    recommendation: "Add security checklist to backend-coder agent for auth-related work"
    evidence:
      - story_id: "WISH-002"
        observation: "Missing input sanitization in auth handler"

deduplicated_from_previous:
  previous_period: "2026-01"
  method: levenshtein
  threshold: 0.70
  file_patterns:
    - pattern: "apps/api/*/routes.ts"
      first_seen: "2026-01"
      current_correlation: 0.75
      previous_correlation: 0.82
      trend: improving
  ac_patterns: []
  agent_correlations: []

trend_summary:
  period: "2026-02"
  compared_to: "2026-01"
  improving_patterns: 2
  regressing_patterns: 0
  stable_patterns: 3
  new_patterns: 1
  resolved_patterns: 0

metadata:
  min_sample_size: 3
  min_correlation: 0.60
  clustering_threshold: 0.70
  clustering_method: levenshtein
  flags:
    use_verifications: true
    all_epics: false
    trend: true
  warnings:
    - "OUTCOME.yaml unavailable - used VERIFICATION.yaml fallback"
  data_quality:
    outcome_files: 0
    verification_files: 37
    fallback_mode: true
  processing:
    stories_skipped: 2
    skip_reasons:
      - story_id: "WISH-999"
        reason: "No VERIFICATION.yaml or OUTCOME.yaml found"
```
