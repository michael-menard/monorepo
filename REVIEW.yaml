acceptance_criteria:
  - ac_id: AC-1
    verdict: PASS
    notes: >
      Test 'should return null story with zero candidates when queue is empty' at line 92
      mocks { story: null, candidates_count: 0, blocked_by_dependencies: [] } and asserts
      parsed.story is null and candidates_count is 0. Correct.

  - ac_id: AC-2
    verdict: PASS
    notes: >
      Test 'should return null story with blocked_by_dependencies list when all are blocked'
      at line 114 mocks 3 blocked entries and asserts blocked_by_dependencies.length === 3
      and story is null. Correct.

  - ac_id: AC-3
    verdict: PASS
    notes: >
      Test 'should return the first unblocked story when one is available' at line 141
      mocks story fixture with storyId: 'KBAR-0090' and asserts parsed.story.storyId ===
      'KBAR-0090'. Priority ordering is implicitly covered by the mock — the handler
      delegates ordering to the DB layer, so forwarding the call and asserting the returned
      story is the correct unit-test approach. Correct.

  - ac_id: AC-4
    verdict: PASS
    notes: >
      Two tests at lines 166 and 189. First test calls with include_backlog: true and
      asserts callArgs[1] matches { include_backlog: true }. Second test omits include_backlog
      and asserts callArgs[1] matches { include_backlog: false } (default). Both forwarding
      cases covered. Correct.

  - ac_id: AC-5
    verdict: PASS
    notes: >
      Test 'should forward exclude_story_ids array to crud operation' at line 211 calls with
      exclude_story_ids: ['KBAR-0080', 'KBAR-0070'] and asserts callArgs[1] matches the array.
      Correct.

  - ac_id: AC-6
    verdict: PASS
    notes: >
      Test 'should forward feature filter to crud operation and return correct result' at line
      235 calls with feature: 'kb-artifact-migration' and asserts callArgs[1] matches
      { feature: 'kb-artifact-migration' }. Correct.

  - ac_id: AC-7
    verdict: PASS
    notes: >
      Test 'should reject invalid role and not call crud operation' at line 263 creates
      context with agent_role: 'unknown' as AgentRole (invalid role not in
      [all, dev, qa, pm]) and asserts result.isError === true and mockKbGetNextStory not
      called. AuthorizationError path correctly exercised. Correct.

  - ac_id: AC-8
