    makeStoryFixture helper is well-structured with sensible defaults and override support,
    reducing fixture duplication across tests.
  - >
    The mock variable is named mockKbGetNextStory but replaces the export kb_get_next_story
    (snake_case). This is correct — the hoisted variable name is internal to the test and
    the vi.mock return object correctly maps the export name to the mock function.
  - >
