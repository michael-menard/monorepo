  covered:
    - ac: 1
      title: Create Zod schemas
      description: |
        AC-1: Create DocSyncConfigSchema, DocSyncResultSchema, and GraphStateWithDocSync
      tests:
        - name: "DocSyncConfigSchema"
          test_file: packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts
          test_cases:
            - line: 50
              test_name: "should parse valid config with defaults"
              given_when_then: |
                Given an empty config object {}
                When DocSyncConfigSchema.parse() is called
                Then it returns config with checkOnly=false, force=false, agentPath=undefined
            - line: 57
              test_name: "should parse config with checkOnly flag"
              given_when_then: |
                Given config { checkOnly: true }
                When DocSyncConfigSchema.parse() is called
                Then it returns config with checkOnly=true and force=false
            - line: 63
              test_name: "should parse config with force flag"
              given_when_then: |
                Given config { force: true }
                When DocSyncConfigSchema.parse() is called
                Then it returns config with force=true and checkOnly=false
            - line: 69
              test_name: "should parse config with custom paths"
              given_when_then: |
                Given config with workingDir and reportPath
                When DocSyncConfigSchema.parse() is called
                Then paths are preserved exactly as provided
        - name: "DocSyncResultSchema"
          test_file: packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts
          test_cases:
            - line: 80
              test_name: "should validate complete result"
              given_when_then: |
                Given a complete DocSyncResult with all fields
                When DocSyncResultSchema.parse() is called
                Then validation succeeds and result matches input exactly
            - line: 96
              test_name: "should validate result with errors"
              given_when_then: |
                Given a DocSyncResult with errors array populated
                When DocSyncResultSchema.parse() is called
                Then validation succeeds and errors are preserved
      implementation_file: packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
      implementation_lines: 24-69
      evidence: |
        DocSyncConfigSchema defined at lines 24-35 with all required fields:
        - checkOnly: z.boolean().default(false)
        - force: z.boolean().default(false)
        - agentPath: z.string().optional()
        - workingDir: z.string().optional()
        - reportPath: z.string().optional()

        DocSyncResultSchema defined at lines 42-59 with all required fields:
        - success: z.boolean()
        - filesChanged: z.number()
        - sectionsUpdated: z.number()
        - diagramsRegenerated: z.number()
        - manualReviewNeeded: z.number()
        - changelogDrafted: z.boolean()
        - reportPath: z.string()
        - errors: z.array(z.string())

        GraphStateWithDocSync interface at lines 66-69 properly extends GraphState
      status: PASS
      test_coverage: 4 tests for schemas (all passing)

