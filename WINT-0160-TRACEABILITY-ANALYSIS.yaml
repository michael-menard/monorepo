          test_file: packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts
          test_cases:
            - line: 203
              test_name: "should handle check-only mode with out-of-sync (exit code 1)"
              given_when_then: |
                Given config { checkOnly: true }
                When createDocSyncNode({ checkOnly: true }) is called and returns a node
                And that node is invoked with graph state
                Then the node executes doc-sync command correctly
            - line: 239
              test_name: "should handle force mode flag correctly"
              given_when_then: |
                Given config { force: true }
                When createDocSyncNode({ force: true }) is called
                Then returned node function passes --force to subprocess
            - line: 423
              test_name: "should use custom working directory and report path"
              given_when_then: |
                Given custom workingDir and reportPath in config
                When createDocSyncNode(config) is called
                Then returned node uses those paths for subprocess and file reading
      implementation_file: packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
      implementation_lines: 301-308
      evidence: |
        createDocSyncNode factory function at lines 301-308 returns a LangGraph-compatible node:
        - Takes Partial<DocSyncConfig> parameter with defaults
        - Returns result of createToolNode() wrapping docSyncImpl
        - docSyncImpl at lines 198-259 handles state transformation correctly
        - Follows established factory pattern: (config) => async (state) => updatedState
      status: PASS
      test_coverage: 3+ tests directly exercising factory (all passing)

    - ac: 3
      title: Implement doc-sync invocation logic
      description: |
        AC-3: Implement subprocess invocation with configurable flags (--check-only, --force)
        and proper error capture
      tests:
        - name: "Subprocess execution"
          test_file: packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts
          test_cases:
            - line: 126
              test_name: "should successfully sync and parse report"
              given_when_then: |
                Given mock subprocess returning exit code 0
                When docSyncNode is invoked
                Then subprocess spawn was called with correct arguments
                And success is true
            - line: 171
              test_name: "should handle check-only mode with out-of-sync (exit code 1)"
              given_when_then: |
                Given config { checkOnly: true } and exit code 1
                When node executes
                Then success is false (exit code 1 treated as out-of-sync)
            - line: 212
              test_name: "should handle force mode flag correctly"
              given_when_then: |
                Given config { force: true }
                When node executes
                Then spawn called with ['doc-sync', '--force'] in args
            - line: 276
              test_name: "should handle subprocess failure (non-zero exit code)"
              given_when_then: |
                Given subprocess returns exit code 2
                When node executes
                Then success is false and errors array populated
            - line: 375
              test_name: "should handle subprocess spawn error"
              given_when_then: |
                Given spawn throws an error
                When node executes
                Then error caught, result.success = false, errors populated
      implementation_file: packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
      implementation_lines: 77-128
      evidence: |
        executeDocSyncCommand at lines 77-128 implements subprocess invocation:
        - Constructs args array with optional --check-only, --force flags (lines 80-88)
        - Uses spawn('claude', ['doc-sync', ...args]) with shell: true (line 100)
        - Captures stdout/stderr via event handlers (lines 108-114)
        - Handles spawn errors with catch block (lines 116-118)
        - Returns exitCode, stderr, stdout for caller (lines 121-126)
        - Proper promise wrapping with resolve/reject (lines 97-127)
      status: PASS
      test_coverage: 5+ tests (all passing)

    - ac: 4
      title: Parse SYNC-REPORT.md output
      description: |
        AC-4: Parse SYNC-REPORT.md into structured result with counts and metadata
      tests:
        - name: "SYNC-REPORT parsing"
          test_file: packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts
          test_cases:
            - line: 126
              test_name: "should successfully sync and parse report"
              given_when_then: |
                Given valid SYNC-REPORT.md with all sections
                When readFile mock returns report and parseSyncReport is called
                Then all counts extracted: filesChanged=3, sectionsUpdated=2, diagramsRegenerated=1
                And changelogDrafted=true (due to [DRAFT] status)
            - line: 302
              test_name: "should handle malformed SYNC-REPORT.md with missing sections"
              given_when_then: |
                Given SYNC-REPORT.md missing structured sections
                When node executes
                Then missing counts default to 0
                And logger.warn called for each missing section
            - line: 336
              test_name: "should handle SYNC-REPORT.md with partial counts"
              given_when_then: |
                Given report with some counts present, others missing
                When parsed
                Then present values extracted, missing default to 0
                And changelogDrafted=false (APPLIED != DRAFT)
            - line: 251
              test_name: "should handle missing SYNC-REPORT.md file"
              given_when_then: |
                Given ENOENT error when reading file
                When readFile rejects with 'ENOENT'
                Then result.success=false, errors include "SYNC-REPORT.md not found"
      implementation_file: packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts
      implementation_lines: 143-187
      evidence: |
        parseSyncReport at lines 143-187 extracts structured data:
        - Uses regex patterns to match "Total files changed: N" etc. (lines 148-151)
        - Extracts numerical values with parseInt (lines 157-162)
        - Checks for [DRAFT] status in document (line 154)
        - Provides defaults (0 for missing counts) (lines 157-162)
        - Logs warnings for missing sections (lines 165-170)
        - Handles ENOENT file-not-found with specific error message (lines 182-184)
      status: PASS
      test_coverage: 4+ tests (all passing)

