  gaps:
    - id: "BUGF-018-KB-001"
      category: "edge-case"
      title: "Test setup inconsistency between apps for URL.createObjectURL"
      impact: "Low"
      effort: "Low"
      tags: ["non-blocking", "edge-case", "test-setup"]
      related_stories: ["BUGF-043"]
      content: |
        app-sets-gallery has URL.createObjectURL stub in setup.ts (lines 56-62),
        but app-inspiration-gallery does not. Tests can handle per-test vi.spyOn
        pattern without global stub. Consider consolidating to shared test-utils
        package when tackling BUGF-043.

    - id: "BUGF-018-KB-002"
      category: "observability"
      title: "No automated memory leak detection in CI"
      impact: "Low"
      effort: "Medium"
      tags: ["non-blocking", "observability", "ci-automation"]
      content: |
        Currently rely on manual memory profiling in browser DevTools. No CI
        pipeline checks for memory leaks using heap snapshots. Consider adding
        Puppeteer-based memory profiling if createObjectURL usage expands or
        manual profiling becomes frequent.

    - id: "BUGF-018-KB-003"
      category: "ux-polish"
      title: "Manual memory profiling is tedious for developers"
      impact: "Low"
      effort: "Low"
      tags: ["non-blocking", "ux-polish", "developer-experience"]
      content: |
        Current process requires 7 manual DevTools steps per component. Browser
        extension or DevTools script could automate blob URL leak detection.
        Only needed if manual profiling becomes frequent (>5 times per sprint).

  enhancements:
    - id: "BUGF-018-KB-004"
      category: "future-work"
      title: "Custom useObjectURL hook could centralize pattern"
      impact: "Low"
      effort: "Low"
      tags: ["non-blocking", "future-work", "abstraction", "yagni"]
      content: |
        Only 3 components currently use URL.createObjectURL. Apply YAGNI principle:
        wait until 5+ components use the pattern before creating abstraction.
        Premature abstraction increases maintenance burden.

    - id: "BUGF-018-KB-005"
      category: "code-quality"
      title: "No ESLint rule to detect createObjectURL without cleanup"
      impact: "Medium"
      effort: "Medium"
      tags: ["non-blocking", "code-quality", "eslint", "prevention"]
      content: |
        No automated lint-time detection of URL.createObjectURL calls without
        corresponding URL.revokeObjectURL cleanup. Could prevent future memory
        leaks during code review. Consider implementing if leak issues recur or
        pattern becomes more prevalent.

    - id: "BUGF-018-KB-006"
      category: "performance"
      title: "FileReader alternative performance comparison not documented"
      impact: "Low"
      effort: "High"
      tags: ["non-blocking", "performance", "documentation", "alternatives"]
      content: |
        Story correctly chooses URL.createObjectURL over FileReader.readAsDataURL
        for performance, but no benchmarks exist. Document performance comparison
        only if use case emerges requiring FileReader (e.g., data URL persistence).

    - id: "BUGF-018-KB-007"
      category: "code-quality"
      title: "No TypeScript branded type for blob URLs"
      impact: "Low"
      effort: "Low"
      tags: ["non-blocking", "code-quality", "typescript", "type-safety"]
      content: |
        Blob URLs typed as plain string. Branded type could enforce compile-time
        cleanup patterns but requires ecosystem adoption. Only implement if type
        safety becomes priority.

    - id: "BUGF-018-KB-008"
      category: "documentation"
      title: "Blob URL cleanup pattern should be documented in CLAUDE.md"
      impact: "Medium"
      effort: "Low"
      tags: ["non-blocking", "documentation", "best-practices", "recommended"]
      priority: "High Value, Low Effort - Should do next"
      content: |
        CLAUDE.md does not document blob URL cleanup best practices. Add section
        after this fix is validated in production. Include: when to use
        createObjectURL vs FileReader, required cleanup pattern with useEffect,
        example code snippet, link to MDN docs, common pitfalls.

    - id: "BUGF-018-KB-009"
      category: "observability"
      title: "No dev-mode runtime warning for unreleased blob URLs"
      impact: "Low"
      effort: "Medium"
      tags: ["non-blocking", "observability", "developer-experience", "runtime-checks"]
      content: |
        React development mode does not warn when components unmount with
        unreleased blob URLs. Implement dev-mode runtime checks if developers
        repeatedly miss cleanup or pattern becomes more common.

    - id: "BUGF-018-KB-010"
      category: "documentation"
      title: "ImageUploadZone cleanup ownership unclear in component contract"
      impact: "Low"
      effort: "Low"
      tags: ["non-blocking", "documentation", "component-contract"]
      content: |
        ImageUploadZone receives images as props but creates blob URLs internally.
        Not explicitly documented whether parent or component is responsible for
        cleanup. Current implementation correctly assumes component cleanup. Add
        JSDoc clarification if confusion arises during code review.

    - id: "BUGF-018-KB-011"
      category: "code-quality"
      title: "ThumbnailUpload has duplicate createObjectURL calls in two handlers"
      impact: "Low"
      effort: "Low"
      tags: ["non-blocking", "code-quality", "code-duplication"]
      related_stories: ["BUGF-024"]
      content: |
        ThumbnailUpload creates blob URLs in two separate handlers (line 95: file
        select, line 120: drag-and-drop). Both perform identical operations. Extract
        common logic to shared function to reduce duplication.

    - id: "BUGF-018-KB-012"
      category: "observability"
      title: "No telemetry for blob URL lifecycle in production"
      impact: "Low"
      effort: "Medium"
      tags: ["non-blocking", "observability", "telemetry", "debugging"]
      content: |
        No metrics tracking blob URL creation, cleanup timing, or cleanup failures.
        Add telemetry if memory issues persist or pattern expands significantly.
        Useful for debugging production memory issues, understanding user behavior,
        and validating cleanup effectiveness.

    - id: "BUGF-018-KB-013"
      category: "edge-case"
      title: "No test coverage for rapid file selection cleanup race conditions"
      impact: "Low"
      effort: "Medium"
      tags: ["non-blocking", "edge-case", "concurrent-operations"]
      content: |
        Current test plan covers unmount, remove, and replace scenarios, but not
        rapid file selection (user rapidly clicks file input before cleanup
        completes). React's batching makes race conditions unlikely, but add test
        if race condition bugs found during QA.

