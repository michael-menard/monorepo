codebase_patterns:

  exponential_backoff:
    source: "apps/web/main-app/src/components/Auth/ResendCodeButton.tsx"
    implementation: |
      Lines 23-31: calculateCooldown function
      - Formula: base * 2^(attempt-1), capped at max
      - Progression: 60s → 120s → 240s → 480s → 600s
      - Default base: 60 seconds
      - Default max: 600 seconds (10 minutes)
    usage: "Apply same pattern to ForgotPasswordPage and ResetPasswordPage cooldowns"

  sessionStorage_tracking:
    source: "apps/web/main-app/src/components/Auth/ResendCodeButton.tsx"
    implementation: |
      Lines 36-100: SessionStorage state management
      - Keys: {prefix}_cooldown, {prefix}_attempts, {prefix}_attempt_reset
      - Cooldown expiration stored as timestamp (Date.now() + seconds * 1000)
      - Attempt count resets after 30 minutes of inactivity
      - Cooldown cleared on successful operation
    naming_convention: "auth:{operation}:{attribute}"
    operations:
      - forgotPassword
      - confirmResetPassword
      - resendCode
    attributes:
      - attempts (number)
      - lastAttempt (timestamp)
      - cooldownUntil (timestamp)

  countdown_timer:
    source: "packages/core/upload/src/components/RateLimitBanner/index.tsx"
    implementation: |
      Lines 41-59: useEffect with setInterval
      - Updates every 1000ms (1 second)
      - Decrements remainingSeconds state
      - Cleanup function clears interval on unmount
      - Stops at zero (does not go negative)
    format: "MM:SS (e.g., '2:30' for 150 seconds)"
    accessibility: |
      Lines 126-130: Screen reader announcement
      - role="timer" on countdown div
      - aria-live="polite" for non-intrusive updates
      - Announcement should be throttled to every 30 seconds (not every second)

  password_strength:
    source: "apps/web/main-app/src/routes/pages/ResetPasswordPage.tsx"
    implementation: |
      Lines 56-74: getPasswordStrength function
      - Returns { score: 0-4, label: string, color: string }
      - Score calculation:
        * +1 if length >= 8
        * +1 if length >= 12
        * +1 if mixed case (uppercase and lowercase)
        * +1 if contains numbers
        * +1 if contains special characters
      - Labels: ['Weak', 'Fair', 'Good', 'Strong', 'Very Strong']
      - Colors: ['red', 'orange', 'yellow', 'lime', 'green']

      Lines 77-108: PasswordStrengthIndicator component
      - 5 horizontal bars with color coding
      - Real-time update as user types
      - Shows label text: "Password strength: {label}"
    extraction: "Extract both function and component to app-component-library/src/forms/PasswordStrengthIndicator/"

