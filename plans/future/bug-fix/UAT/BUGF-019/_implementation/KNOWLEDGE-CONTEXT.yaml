gotchas:

  timer_cleanup:
    issue: "Memory leaks from countdown timers"
    solution: |
      Always return cleanup function from useEffect:
      useEffect(() => {
        const timer = setInterval(() => { /* ... */ }, 1000)
        return () => clearInterval(timer)
      }, [dependencies])

  sessionStorage_keys:
    issue: "Potential key collisions between different operations"
    solution: "Use consistent naming: auth:{operation}:{attribute}"
    example: |
      auth:forgotPassword:attempts
      auth:forgotPassword:cooldownUntil
      auth:resendCode:attempts (different operation, no collision)

  msw_cognito_mocking:
    issue: "MSW cannot intercept Amplify SDK calls directly"
    solution: "Mock low-level Cognito HTTP API endpoint"
    endpoint: "https://cognito-idp.us-east-1.amazonaws.com/"
    target_header: "X-Amz-Target: AWSCognitoIdentityProviderService.{OperationName}"

  countdown_format:
    issue: "Single-digit seconds should have leading zero"
    solution: "Use padStart(2, '0') for seconds"
    example: "1:05 (not 1:5), 2:30 (correct)"

  screen_reader_spam:
    issue: "Announcing every second is too noisy for screen readers"
    solution: "Throttle announcements to every 30 seconds"
    implementation: |
      Track last announcement time, only update aria-live text every 30 seconds
      Round to nearest 30 seconds for announcement text

  progress_bar_direction:
    issue: "RateLimitBanner progress bar animates 0% to 100%, but cooldown is counting down"
    solution: "Progress represents elapsed time, not remaining time (existing behavior is correct)"
    calculation: "((retryAfterSeconds - remainingSeconds) / retryAfterSeconds) * 100"

