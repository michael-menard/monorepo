constraints:

  claude_md_compliance:
    zod_schemas: "All types must use Zod schemas with z.infer<>, no TypeScript interfaces"
    barrel_imports: "Import from @repo/app-component-library, never individual paths"
    logger: "Use @repo/logger, never console.log"
    component_structure: |
      ComponentName/
        index.tsx
        __types__/index.ts (Zod schemas)
        __tests__/ComponentName.test.tsx
        utils/ (optional, component-specific)

  account_enumeration_prevention:
    rule: "Generic error messages must NOT reveal account existence"
    approved_messages:
      - "Too many attempts. Please wait before trying again."
      - "Rate limit exceeded. Try again in 2:30."
    prohibited_messages:
      - "This account has been locked for 5 minutes."
      - "Too many failed resets for test@example.com."
    implementation: "Maintain existing behavior in ForgotPasswordPage lines 78-88, 89-94"

  cognito_architecture:
    flow: "Frontend (Amplify SDK) → Cognito User Pool (Direct)"
    no_backend: "Password reset operations do NOT involve backend API"
    no_retry_after_header: "Cognito does NOT provide Retry-After header"
    frontend_estimation: "Frontend must estimate cooldown using exponential backoff"
    security_note: "Client-side cooldown is UX feedback only, not security enforcement"

  accessibility_requirements:
    countdown_timers:
      - role: "timer"
      - aria_live: "polite"
      - announcement_throttle: "Every 30 seconds (not every second to avoid spam)"
      - announcement_text: "Approximately {rounded_minutes} minutes remaining"
      - final_announcement: "Rate limit expired. You can now retry."
    buttons:
      - disabled: "true when cooldown active"
      - aria_disabled: "true when cooldown active"
    prefers_reduced_motion:
      - progress_bar: "Disable animations (motion-reduce:transition-none)"
      - countdown_timer: "Continue to function normally (visual updates every second)"

