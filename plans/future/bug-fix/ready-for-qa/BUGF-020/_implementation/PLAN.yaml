architectural_decisions:
  - id: ARCH-BUGF020-001
    question: "Should @repo/accessibility-testing be a separate package or a subdirectory export of @repo/accessibility?"
    decision: "Separate package @repo/accessibility-testing"
    rationale: "Clearer separation of concerns - runtime utilities vs test utilities. Prevents test dependencies from being bundled in production. Follows pattern of other testing packages in monorepo."
    decided_by: auto-accepted
    tier: 2

  - id: ARCH-BUGF020-002
    question: "Should TagInput have role='list' on the tags container?"
    decision: "Yes, add role='list' to tag container and role='listitem' to each tag badge"
    rationale: "Per AC2 requirements and ARIA best practices for tag lists. Improves screen reader understanding of tag collection structure."
    decided_by: auto-accepted
    tier: 1

  - id: ARCH-BUGF020-003
    question: "Should we remove the original a11y files from wishlist-gallery or keep them as re-exports?"
    decision: "Keep as re-exports initially for backwards compatibility"
    rationale: "Minimize breaking changes. Apps can migrate gradually. Re-exports add negligible overhead."
    decided_by: auto-accepted
    tier: 1

