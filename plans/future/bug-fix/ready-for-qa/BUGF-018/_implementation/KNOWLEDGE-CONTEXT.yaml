existing_patterns:
  - pattern_name: "ThumbnailUpload handleRemove cleanup"
    location: "apps/web/app-instructions-gallery/src/components/ThumbnailUpload/index.tsx"
    lines: "141-147"
    description: "Correct cleanup pattern in manual remove handler - checks if previewUrl exists, calls URL.revokeObjectURL(), then sets state to null"
    code_example: |
      const handleRemove = useCallback(() => {
        setSelectedFile(null)
        if (previewUrl) {
          URL.revokeObjectURL(previewUrl)
          setPreviewUrl(null)
        }
      }, [previewUrl])
    reuse_guidance: "Extend this pattern to useEffect cleanup hooks for all three components - same conditional check and revoke call"

  - pattern_name: "Test file mock setup for URL.createObjectURL"
    location: "apps/web/app-instructions-gallery/src/components/ThumbnailUpload/__tests__/ThumbnailUpload.test.tsx"
    lines: "14-15"
    description: "Global mocks for URL.createObjectURL and revokeObjectURL using vi.fn()"
    code_example: |
      global.URL.createObjectURL = vi.fn(() => 'blob:mock-url')
      global.URL.revokeObjectURL = vi.fn()
    reuse_guidance: "Use vi.spyOn instead for new cleanup tests to verify calls while preserving mock implementation"

  - pattern_name: "Test file mock setup for URL.createObjectURL (alternative)"
    location: "apps/web/app-sets-gallery/src/components/__tests__/ImageUploadZone.test.tsx"
    lines: "12-14"
    description: "Per-test vi.spyOn setup for URL.createObjectURL in beforeEach"
    code_example: |
      beforeEach(() => {
        vi.spyOn(URL, 'createObjectURL').mockImplementation(() => 'blob:mock-url')
      })
    reuse_guidance: "This approach already uses vi.spyOn - can extend with additional spy for revokeObjectURL in cleanup tests"

