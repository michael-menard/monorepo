implementation_notes:
  decisions:
    - decision: |
        ImageUploadZone required state management for blob URLs.

        Rationale: Blob URLs were created inline in JSX (line 117 in original), making
        per-image cleanup difficult. Added previewUrls state array to track URLs for cleanup.

        This is the minimal approach - alternative (custom hook) considered but rejected
        per story non-goal YAGNI principle (only 3 components affected).

    - decision: |
        ThumbnailUpload kept existing handleRemove cleanup.

        Rationale: Component already had correct cleanup in handleRemove (line 149-155).
        useEffect added for unmount cleanup. Both patterns coexist - useEffect handles
        automatic cleanup on state change/unmount, handleRemove handles explicit removal.
        This is defensive and correct.

    - decision: |
        Used img src={undefined} instead of empty string in ImageUploadZone (line 135).

        Rationale: Prevents browser warnings about invalid image source. React treats
        undefined as falsy in JSX, rendering no src attribute instead of src="".

