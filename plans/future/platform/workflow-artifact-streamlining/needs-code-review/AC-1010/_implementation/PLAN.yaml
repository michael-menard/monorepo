schema: 1
story_id: "AC-1010"
timestamp: "2026-03-03T00:00:00Z"

steps:
  - id: 1
    description: "Define golden reference ELAB.yaml schema with schema_version field"
    files:
      - ".claude/schemas/elab-schema.md"
    dependencies: []
    slice: packages
    verification: "grep -n 'schema_version' .claude/schemas/elab-schema.md"
    acs_covered: ["AC1"]
    notes: >
      Must be done first per ENG-ARCH-001 and ENG-ARCH-002. Defines the complete ELAB.yaml
      schema with schema_version as the first field, covering audit[], gaps[], opportunities[],
      preliminary_verdict, verdict, decided_at, and summary sections. This is the authoritative
      reference all downstream agents must conform to.

  - id: 2
    description: "Update elab-analyst.agent.md to align with golden schema (already largely correct, verify schema_version field is present)"
    files:
      - ".claude/agents/elab-analyst.agent.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'schema_version' .claude/agents/elab-analyst.agent.md"
    acs_covered: ["AC2"]
    notes: >
      elab-analyst already writes to ELAB.yaml with the correct structure.
      Add schema_version: 1 as the first field in the output schema definition.
      Verify no stale references to ANALYSIS.md, DECISIONS.yaml, FUTURE-OPPORTUNITIES.md,
      or ELAB-{ID}.md remain.

  - id: 3
    description: "Update elab-completion-leader.agent.md — replace DECISIONS.yaml input reference with ELAB.yaml"
    files:
      - ".claude/agents/elab-completion-leader.agent.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'DECISIONS.yaml\|ANALYSIS.md\|FUTURE-OPPORTUNITIES\|ELAB-{' .claude/agents/elab-completion-leader.agent.md | wc -l | grep '^0$'"
    acs_covered: ["AC2"]
    notes: >
      Line 35 references 'DECISIONS.yaml' as an alternative input source for autonomous mode.
      Replace with 'ELAB.yaml gaps[].decision and opportunities[].decision fields' which is
      already described in the autonomous mode section. This is the only old-artifact reference
      in this file.

  - id: 4
    description: "Update dev-documentation-leader.agent.md — replace DECISIONS.yaml source references with ELAB.yaml"
    files:
      - ".claude/agents/dev-documentation-leader.agent.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'DECISIONS.yaml' .claude/agents/dev-documentation-leader.agent.md | grep -v 'ARCHITECTURAL-DECISIONS\|BATCH-DECISIONS\|DECISIONS-AUTO\|PENDING-DECISIONS' | wc -l | grep '^0$'"
    acs_covered: ["AC2"]
    notes: >
      Lines 131-134 reference 'DECISIONS.yaml' as the source for auto_accepted/escalated/deferred
      decision counts in OUTCOME.yaml. Replace with ELAB.yaml summary fields:
      auto_accepted from summary.gaps_resolved, escalated from summary.gaps_found - gaps_resolved,
      deferred from opportunities not kb-logged. Also update the sources.decisions field in
      OUTCOME.yaml template from '_implementation/DECISIONS.yaml' to '_implementation/ELAB.yaml'.

  - id: 5
    description: "Update risk-predictor.agent.md — replace FUTURE-OPPORTUNITIES.md references with ELAB.yaml opportunities[]"
    files:
      - ".claude/agents/risk-predictor.agent.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'FUTURE-OPPORTUNITIES' .claude/agents/risk-predictor.agent.md | wc -l | grep '^0$'"
    acs_covered: ["AC2"]
    notes: >
      Lines 222 and 516 reference 'FUTURE-OPPORTUNITIES.md Gap #1'. Update both inline
      code comment and notes section to reference 'ELAB.yaml opportunities[] — see AC-1010
      deferred items' or similar accurate reference. The actual deferred item logic is
      unchanged; only the artifact reference name changes.

  - id: 6
    description: "Update outcome-schema.md — replace DECISIONS.yaml source reference with ELAB.yaml"
    files:
      - ".claude/schemas/outcome-schema.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'DECISIONS.yaml' .claude/schemas/outcome-schema.md | grep -v 'ARCHITECTURAL-DECISIONS\|BATCH-DECISIONS' | wc -l | grep '^0$'"
    acs_covered: ["AC4"]
    notes: >
      Three references: line 132 (schema field comment), line 277 (example value), and
      line 289 (generation description). Replace all with ELAB.yaml. The sources.decisions
      field in the schema should point to '_implementation/ELAB.yaml' instead of
      '_implementation/DECISIONS.yaml'.

  - id: 7
    description: "Update decision-outcome-schema.md — replace DECISIONS.yaml references with ELAB.yaml"
    files:
      - ".claude/schemas/decision-outcome-schema.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'DECISIONS.yaml' .claude/schemas/decision-outcome-schema.md | wc -l | grep '^0$'"
    acs_covered: ["AC4"]
    notes: >
      Multiple references to DECISIONS.yaml as the artifact where decisions are logged.
      Replace with ELAB.yaml where elab-specific decisions are stored, and update the
      integration section to note that implementation-phase decisions remain in
      ARCHITECTURAL-DECISIONS.yaml (a separate, unchanged artifact).

  - id: 8
    description: "Update pm-fix-story-reference.md — replace ELAB-STORY-XXX.md references with ELAB.yaml"
    files:
      - ".claude/docs/pm-fix-story-reference.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'ELAB-STORY-' .claude/docs/pm-fix-story-reference.md | wc -l | grep '^0$'"
    acs_covered: ["AC4"]
    notes: >
      Lines 50 and 121 reference 'ELAB-STORY-XXX.md' as the QA audit artifact.
      Replace with '_implementation/ELAB.yaml' — the elab-analyst already writes
      findings here. Precondition check should look for ELAB.yaml with
      preliminary_verdict set, not the old .md file.

  - id: 9
    description: "Update elab-story-reference.md — verify all artifact references use ELAB.yaml, remove any stale mentions"
    files:
      - ".claude/docs/elab-story-reference.md"
    dependencies: [1]
    slice: packages
    verification: "grep -n 'ANALYSIS.md\|DECISIONS.yaml\|FUTURE-OPPORTUNITIES\|ELAB-STORY-\|ELAB-{' .claude/docs/elab-story-reference.md | wc -l | grep '^0$'"
    acs_covered: ["AC4"]
    notes: >
      This reference doc is mostly already updated (references ELAB.yaml). Verify no stale
      artifact names remain. If any are found, update to ELAB.yaml.

  - id: 10
    description: "Grep checklist — verify zero remaining references to the four eliminated files across .claude/"
    files: []
    dependencies: [2, 3, 4, 5, 6, 7, 8, 9]
    slice: packages
    verification: >
      grep -rn 'ANALYSIS\.md\|FUTURE-OPPORTUNITIES\.md\|ELAB-{ID}\.md\|ELAB-{STORY_ID}\.md\|ELAB-STORY-' .claude/ --include='*.md' --include='*.yaml' | grep -v '\.bak' | wc -l | grep '^0$'
    acs_covered: ["AC5"]
    notes: >
      Per ENG-REC-002 and action_items: run grep checklist before finalizing.
      Stale DECISIONS.yaml references to ARCHITECTURAL-DECISIONS.yaml, BATCH-DECISIONS.yaml,
      DECISIONS-AUTO.yaml, and PENDING-DECISIONS.yaml are NOT old elaboration artifacts
      and should NOT be flagged. Only the four enumerated files are targets.
      elab-epic-reference.md DECISIONS.yaml is the epic-level artifact (different workflow)
      and is also NOT a target for elimination.

