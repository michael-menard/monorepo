lessons_to_record:
  - lesson: >-
      For documentation-only infra stories, QA must explicitly verify the story branch rather than the main branch. The
      current working directory reflects main, not the story branch, so grep checks must use 'git show story/<ID>:path'
      rather than direct file reads.
    category: pattern
    tags:
      - qa
      - infra-story
      - documentation
      - branch-verification
  - lesson: >-
      QA-SETUP-RESULT.yaml showing BLOCKED can be stale — it reflects the state at the time qa-setup ran. If
      EVIDENCE.yaml and REVIEW.yaml exist in the implementation directory, QA verification can proceed even if an older
      QA-SETUP-RESULT shows BLOCKED.
    category: blocker
    tags:
      - qa-setup
      - stale-artifact
      - qa-workflow
  - lesson: >-
      When eliminating artifact names (e.g., DECISIONS.yaml), the schema documentation file itself (elab-schema.md) is
      allowed to reference the old names in its 'Overview' and 'Changelog' sections to document what was superseded.
      These are not stale references and should be excluded from grep checks.
    category: pattern
    tags:
      - grep-checklist
      - documentation
      - artifact-elimination
