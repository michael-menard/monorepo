title: TOKEN-LOG.md → KB
story_id: AC-2020
e2e_tests:
  mode: n/a
  reason: >-
    This story modifies agent instruction files (.md) only. No application code, endpoints, UI components, or
    infrastructure changes. E2E tests are not applicable.
  status: exempt
files_changed:
  - .claude/agents/_token-logging.md
  - .claude/agents/workflow-retro.agent.md
  - .claude/commands/workflow-retro.md
  - .claude/patterns/2026-02/ANTI-PATTERNS.md
scoping_decisions:
  workflow_retro_fallback:
    tier: tier-2
    decision: keep_with_backward_compat_comments
    rationale: >-
      workflow-retro reads TOKEN-LOG.md for legacy stories predating KB migration. Removing this fallback would silently
      break retro analysis for completed stories without OUTCOME.yaml. Kept but marked [BACKWARD-COMPAT ONLY] per AC-3
      exclusion clause.
    auto_accepted: true
    autonomy_level: aggressive
acceptance_criteria:
  AC-1:
    status: pass
    evidence: >-
      _token-logging.md updated: 'Required Log Format' section now instructs agents to use /token-log skill
      (kb_log_tokens). Markdown table format removed as primary format. The /token-log SKILL.md already uses
      kb_log_tokens exclusively (pre-existing).
    description: >-
      No agent or skill writes to a TOKEN-LOG.md file during active story execution. /token-log skill writes exclusively
      to KB via kb_log_tokens.
  AC-2:
    status: pass
    evidence: >-
      Pre-existing: /token-log SKILL.md v2.0.0 already calls kb_log_tokens. dev-documentation-leader.agent.md already
      queries KB storyTokenUsage. No changes needed — verified existing behavior.
    description: >-
      Token usage data for a story is queryable from KB by story_id (storyTokenUsage entries exist after /token-log is
      called).
  AC-3:
    status: pass
    evidence: >-
      Post-change grep shows 6 remaining TOKEN-LOG.md references: 1 is a 'Do NOT write' instruction in
      _token-logging.md; 5 are explicitly marked as [BACKWARD-COMPAT ONLY] or 'legacy-only last resort' in
      workflow-retro files. Zero active-path references remain.
    description: >-
      After commit, grep of .claude/ tree finds zero TOKEN-LOG.md references in active-path agent instructions
      (excluding backward-compat legacy fallback paths).
implementation_date: '2026-03-07'
