      workflow-retro data_source field in RETRO output should be updated: the "fallback"
      source would become "kb_only" rather than the file list. This would be a small schema
      improvement opportunity during the same commit.
    effort: low
    decision: log_to_kb
    kb_entry_id: "5e78b51d-cd44-405d-9784-bc3dbc247884"

  - id: opp-4
    category: edge_cases
    finding: >
      ANTI-PATTERNS.md (2026-02/ANTI-PATTERNS.md line 145) contains "Log actual vs estimated
      in TOKEN-LOG.md" as a recommendation. This is a stale cross-reference that would
      confuse any agent reading it. Updating it to "Log actual vs estimated via /token-log
      skill (KB-backed)" is a 1-line fix that should be included in the grep checklist step.
    effort: low
    decision: log_to_kb
    kb_entry_id: "1b0909a0-5e7b-42ae-a520-450590c4906f"

