  - id: opp-2
    category: edge_cases
    finding: >
      If KB is unavailable when /token-log is called, the SKILL.md currently says "Report
      the error message / Suggest checking KB MCP server." There is no fallback write path
      (e.g., write to a temp file and defer). Given the story's goal of eliminating
      TOKEN-LOG.md entirely, it may be worth adding a deferred-write fallback (DEFERRED-KB-WRITES.yaml)
      for KB-unavailable scenarios so token data is not silently lost.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "3048ff3c-96fa-4574-85e8-7183280ba89d"

  - id: opp-3
    category: integrations
    finding: >
      workflow-retro.agent.md already has the KB query as "preferred over TOKEN-LOG.md"
