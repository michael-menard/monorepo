id: AC-3010
title: "_pm/ Folder → story.yaml Sections"
status: uat
updated_at: "2026-03-08T00:00:00Z"
priority: medium
phase: 3
feature: "Update pm-draft-test-plan, pm-uiux-recommendations, and pm-dev-feasibility-review agents to write their outputs as pm_artifacts.* sections in story.yaml instead of separate _pm/ files; update pm-story-generation-leader to remove intermediate _pm/ file reads; update pm-spawn-patterns.md to remove stale Output file directives"
goal: "No _pm/test-plan.yaml, _pm/uiux-notes.yaml, or _pm/dev-feasibility.yaml are created during PM generation; their content lives as pm_artifacts.* sections in story.yaml."
depends_on:
  - AC-1010
  - AC-2010
  - AC-2020
endpoints: []
infrastructure: []
risk_notes: "story.yaml write ordering matters — pm workers must append sections without overwriting each other. uiux_notes section should be conditionally omitted for non-UI stories; agents must handle this gracefully. pm-story-generation-leader subtask reading must match exact YAML path."
sizing_warning: false
created: "2026-03-03T00:00:00Z"
action_items:
  - "Include a grep checklist step in the implementation plan to catch stale cross-references before committing"
ac_decisions:
  - id: ENG-REC-002
    decision: accept
    notes: "Grep checklist required before commit"
  - id: ELAB-DEC-001
    decision: accept
    notes: "Write protocol: inline return via TaskOutput. Workers return YAML payload as structured output; pm-story-generation-leader Phase 4 reads all TaskOutput payloads and writes a single atomic pm_artifacts block into story.yaml. Eliminates RISK-003 (concurrent write collisions) entirely."
  - id: ELAB-DEC-002
    decision: accept
    notes: "pm-spawn-patterns.md added to implementation scope — contains hardcoded Output file directives that must be updated to match new inline-return protocol."
  - id: ELAB-DEC-003
    decision: accept
    notes: "Goal narrowed to three specific file types. _pm/ directory still exists for STORY-SEED.md, BLOCKERS.md, and other out-of-scope artifacts."
acceptance_criteria:
  - id: AC-1
    description: "After a PM story generation run completes, no _pm/test-plan.yaml, _pm/uiux-notes.yaml, or _pm/dev-feasibility.yaml files are created in the story output directory."
    evidence: "ls {OUTPUT_DIR}/_pm/ shows no test-plan.yaml, uiux-notes.yaml, or dev-feasibility.yaml"
  - id: AC-2
    description: "The generated story.yaml contains a pm_artifacts.test_plan section with test plan content (strategy, happy_path_tests, error_cases, edge_cases keys)."
    evidence: "yq '.pm_artifacts.test_plan.strategy' story.yaml returns a non-empty string"
  - id: AC-3
    description: "The generated story.yaml contains a pm_artifacts.dev_feasibility section with feasibility content (feasible, confidence, subtasks keys)."
    evidence: "yq '.pm_artifacts.dev_feasibility.feasible' story.yaml returns true or false"
  - id: AC-4
    description: "For UI stories: story.yaml contains pm_artifacts.uiux_notes with skipped: false and component_patterns. For non-UI stories: pm_artifacts.uiux_notes is entirely absent from story.yaml."
    evidence: "Manual inspection of story.yaml for a UI story and a non-UI story"
  - id: AC-5
    description: "Grep of pm-draft-test-plan.agent.md, pm-uiux-recommendations.agent.md, pm-dev-feasibility-review.agent.md, pm-story-generation-leader.agent.md, and pm-spawn-patterns.md finds zero references to _pm/test-plan.yaml, _pm/uiux-notes.yaml, or _pm/dev-feasibility.yaml."
    evidence: "grep -n '_pm/test-plan\\|_pm/uiux-notes\\|_pm/dev-feasibility' across all five files returns 0 matches"
  - id: AC-6
    description: "Out-of-scope _pm/ files (STORY-SEED.md, BLOCKERS.md) are unaffected. pm-story-fix-leader, pm-harness-generation-leader, and other agents still reference their own _pm/ artifact types without regression."
    evidence: "Grep checklist confirms zero unintended removals of out-of-scope _pm/ references"
non_goals:
  - "Migrating STORY-SEED.md, BLOCKERS.md, or other _pm/ artifact types — those remain in _pm/"
  - "Modifying pm-harness-generation-leader, pm-story-fix-leader, or other out-of-scope agents"
  - "Eliminating the _pm/ directory entirely — it still hosts out-of-scope artifacts"
