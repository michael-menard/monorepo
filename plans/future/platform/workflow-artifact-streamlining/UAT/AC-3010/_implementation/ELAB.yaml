# ─── 9-POINT AUDIT CHECKLIST ───────────────────────────────────────────────

audit:

  scope_alignment:
    verdict: PASS_WITH_GAPS
    notes: >
      The index entry for Phase 3 ("Fold _pm/ worker outputs into story.yaml")
      matches the story goal. However, the story feature description says
      "update pm-story-generation-leader to read from story.yaml" which is
      partially misleading — the leader currently READS the _pm/ files and
      embeds them into story.yaml; after this story the leader will SKIP the
      intermediate _pm/ files entirely because workers will write directly to
      story.yaml. The scope boundary must be crystal-clear: only the three named
      PM worker agents (pm-draft-test-plan, pm-uiux-recommendations,
      pm-dev-feasibility-review) and pm-story-generation-leader are in scope.
      Other consumers of _pm/ (pm-harness-generation-leader, pm-story-fix-leader,
      pm-story-adhoc-leader, pm-story-bug-leader, pm-story-followup-leader,
      pm-story-split-leader, pm-spawn-patterns reference doc, story-synthesize-agent,
      gap-hygiene-agent, readiness-score-agent, commitment-gate-agent) use DIFFERENT
      _pm/ artifact types (STORY-SEED.md, BLOCKERS.md, QA-FEEDBACK.md,
      FANOUT-PM.yaml, ATTACK.yaml, GAPS-RANKED.yaml, READINESS.yaml) and are
      explicitly OUT OF SCOPE. The implementation must not silently break those
      agents. A grep verification step must confirm zero regressions.
    gaps:
      - gap-1: "Story feature description says 'read from story.yaml' but should
          say 'no longer reads _pm/ intermediate files; workers write directly
          to story.yaml'. Wording conflation risks wrong implementation direction."
      - gap-2: "Scope of _pm/ files being eliminated is not explicitly enumerated.
          Only three files are in scope: test-plan.yaml, uiux-notes.yaml,
          dev-feasibility.yaml. STORY-SEED.md and BLOCKERS.md are out of scope
          but live in the same directory — the implementation must not touch them."

  internal_consistency:
    verdict: FAIL
    notes: >
      The story has no acceptance_criteria section. The goal statement is the only
      testable criterion: "No _pm/ directory or files are created during PM generation;
      all PM worker outputs live as structured YAML sections within story.yaml."
      This is a single compound sentence covering at least 6 distinct observable
      behaviors (three workers stop writing files, story.yaml gains three new sections,
      leader reads from story.yaml, uiux_notes conditionally omitted). Without ACs,
      the story cannot be verified or implementation-gated.

      Additionally, the risk_notes section warns that "pm workers must append sections
      without overwriting each other" but the story provides no implementation
      constraint specifying HOW this is achieved (sequential execution mandate,
      read-modify-write protocol, or leader-side aggregation). This omission will cause
      ambiguity during implementation.

      The pm-spawn-patterns.md reference doc (which pm-story-generation-leader reads
      in Phase 1-3) still specifies `Output file: {OUTPUT_DIR}/_pm/test-plan.yaml`
      etc. — this file must also be updated but is not mentioned in the story.
    gaps:
      - gap-3: "No acceptance_criteria section. Goal sentence does not substitute for
          verifiable, individually-testable ACs."
      - gap-4: "No concurrent write resolution strategy specified. RISK-003 is documented
          in the index but the story provides no concrete decision: sequential worker
          execution vs. leader-side aggregation vs. read-modify-write."
      - gap-5: "pm-spawn-patterns.md is not listed as a file to modify even though it
          contains Output file directives pointing to _pm/ paths for all three workers.
          Omitting this file leaves stale spawn instructions that will cause future PM
          runs to produce _pm/ files again."

  reuse_first_enforcement:
    verdict: PASS
    notes: >
      This story is pure agent-file modification (markdown docs). No new libraries,
      packages, or utilities are introduced. Existing YAML-write patterns already
      established in the agents are reused. The story correctly identifies the minimal
      change surface. No reuse violations detected.

  ports_adapters_compliance:
    verdict: PASS
    notes: >
      No backend code is touched. All changes are in .claude/agents/*.agent.md
      documentation files. No port/adapter boundaries are crossed. Not applicable
      as a structural concern for this story.

  local_testability:
    verdict: PASS_WITH_GAPS
    notes: >
      The primary verification for this story is behavioral: run a PM story generation
      cycle and confirm (a) no _pm/test-plan.yaml, _pm/uiux-notes.yaml,
      _pm/dev-feasibility.yaml are created, and (b) story.yaml contains
      pm_artifacts.test_plan, pm_artifacts.dev_feasibility, and optionally
      pm_artifacts.uiux_notes sections. This is locally runnable.

      However, the story provides no test plan. The grep-checklist action_item
      (from ac_decisions ENG-REC-002) needs to be formalized into specific grep
      commands that prove the outcome. There is also no smoke-test description
      for verifying that a generated story.yaml is structurally valid YAML after
      the pm_artifacts sections are written by workers independently.
    gaps:
      - gap-6: "No test plan. The verification approach (grep commands + smoke test)
          needs to be explicitly specified. Without it the dev agent will define
          its own evidence criteria."
      - gap-7: "No explicit YAML validity check in the verification plan. If a worker
          writes malformed YAML into story.yaml the error may be silent."

  decision_completeness:
    verdict: FAIL
    notes: >
      Three implementation-blocking decisions are unresolved:

      Decision 1 — Write protocol: How do the three PM workers write to story.yaml
      without overwriting each other? Options are:
        A) Sequential execution (leader spawns workers one at a time, not in parallel)
        B) Each worker appends only its own YAML key (read-modify-write)
        C) Workers return output inline (not written to disk); leader aggregates and
           writes a single story.yaml update
      The current pm-story-generation-leader Phase 1-3 says "Spawn all workers in
      SINGLE message" (parallel). This is the exact race condition RISK-003 calls out.
      This decision MUST be made before implementation starts.

      Decision 2 — Where do workers write? Options:
        A) Workers write pm_artifacts sections directly into story.yaml (read-modify-write)
        B) Workers return YAML payload inline; leader does a single atomic write to story.yaml
        C) Workers write to a temporary staging file (e.g., _pm/staging/{worker}.yaml)
           that the leader merges; staging files are deleted after merge
      Each option has different risk profiles. Option B (inline return) is the safest
      for RISK-003 but requires changing the worker output protocol and the leader's
      TaskOutput reading pattern. Option A requires atomic file access, which bash/agents
      cannot guarantee.

      Decision 3 — STORY-SEED.md placement: The story says workers no longer write to
      _pm/. But pm-story-generation-leader Phase 4 still reads from the seed at
      _pm/STORY-SEED.md. The seed is written by pm-story-seed-agent, not the three
      workers in scope. Is STORY-SEED.md retained in _pm/? The story is silent on this.
    gaps:
      - gap-4: "(See internal_consistency) Concurrent write strategy unresolved."
      - gap-8: "Decision on where/how workers write pm_artifacts (inline vs. direct
          story.yaml edit vs. staged temp files) must be resolved before implementation."
      - gap-9: "STORY-SEED.md retention decision: does _pm/ still exist for STORY-SEED.md
          and BLOCKERS.md? If yes, the goal statement ('No _pm/ directory or files are
          created') is literally false and needs rewording. The goal should read:
          'No _pm/test-plan.yaml, _pm/uiux-notes.yaml, or _pm/dev-feasibility.yaml
          are created during PM generation.'"

  risk_disclosure:
    verdict: PASS_WITH_GAPS
    notes: >
      RISK-003 in the index (concurrent write collisions) is the primary risk and is
      accurately identified. The story's own risk_notes echoes this. Additional risks
      not disclosed in the story:

      Risk A — pm-spawn-patterns.md stale reference: The reference doc read by
      pm-story-generation-leader contains hardcoded `Output file: {OUTPUT_DIR}/_pm/...`
      spawn prompt templates. If this file is not updated, every future PM run will
      instruct workers to write to _pm/ regardless of agent-file changes.

      Risk B — pm-harness-generation-leader isolation: This leader generates its own
      _pm/test-plan.yaml and _pm/dev-feasibility.yaml independently (not via the
      three worker agents). AC-3010 changes must not inadvertently affect harness
      generation. The grep verification must exclude harness-scope files.

      Risk C — Goal statement overpromises: If STORY-SEED.md and BLOCKERS.md remain
      in _pm/ (which they must, for now), the goal "No _pm/ directory or files are
      created" is literally false. This creates a verification gap.

      Risk D — pm-story-fix-leader reads _pm/QA-FEEDBACK.md and _pm/ artifacts.
      These are out of scope but a careless grep-and-replace in the implementation
      could accidentally delete these references.
    undisclosed_risks:
      - "pm-spawn-patterns.md not listed as a required modification target"
      - "pm-harness-generation-leader generates its own _pm/ files independently"
      - "Goal statement overpromises scope — _pm/ directory will still exist"
      - "pm-story-fix-leader _pm/ reads must not be broken by grep-and-replace"

  story_sizing:
    verdict: PASS
    notes: >
      Change surface analysis:
      - Files to modify: pm-draft-test-plan.agent.md, pm-uiux-recommendations.agent.md,
        pm-dev-feasibility-review.agent.md, pm-story-generation-leader.agent.md,
        pm-spawn-patterns.md (not listed but required)
      - Pattern of change: all changes are in agent markdown documentation files,
        not TypeScript or compiled code
      - No schema migrations, no database changes, no infrastructure changes
      - Test verification is behavioral (manual PM run) + grep evidence

      Estimated as 3-point story: 4-5 subtasks, medium complexity due to the
      write-ordering risk requiring a clear protocol decision first.

      The story does not have sizing_warning: true, and this assessment agrees.
      This is not undersized or oversized for a 3-point agent-doc migration story.

  subtask_decomposition:
    verdict: FAIL
    notes: >
      No subtasks section exists in the story. For a 3-point story, the dev
      feasibility worker should produce 3-5 subtasks. Given the missing ACs and
      unresolved write-protocol decision, subtask decomposition cannot be completed
      until those gaps are resolved. However, a preliminary subtask structure can
      be projected:

      ST-1: Resolve write-protocol decision (sequential vs. inline return) — unblocks
            all subsequent subtasks
      ST-2: Update pm-draft-test-plan.agent.md output instruction
      ST-3: Update pm-uiux-recommendations.agent.md output instruction
      ST-4: Update pm-dev-feasibility-review.agent.md output instruction
      ST-5: Update pm-story-generation-leader Phase 0/4/1-3 (directory creation,
            worker read paths, pm_artifacts synthesis path)
      ST-6: Update pm-spawn-patterns.md spawn prompt templates

      ST-1 (protocol decision) must be resolved by PM/analyst before developer
      begins ST-2 through ST-6.
    preliminary_subtasks:
      - id: ST-1
        title: "Resolve PM worker write protocol (design decision)"
        goal: "Decide and document how three concurrent workers write pm_artifacts
          sections without race conditions. Record decision in story.yaml ac_decisions."
        files_to_read:
          - .claude/agents/pm-story-generation-leader.agent.md
