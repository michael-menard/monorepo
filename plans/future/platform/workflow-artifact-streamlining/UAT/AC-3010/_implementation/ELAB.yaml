# ─── GAP SUMMARY ───────────────────────────────────────────────────────────

gaps:
  - id: gap-1
    severity: medium
    category: wording
    description: "Feature description says 'read from story.yaml' but workers write
      directly TO story.yaml (not via an intermediate file). Wording will mislead
      implementors."
    resolution: "Reword feature description to: 'Update pm worker agents to write
      pm_artifacts sections directly into story.yaml; update pm-story-generation-leader
      to remove intermediate _pm/ file reads.'"

  - id: gap-2
    severity: medium
    category: scope_boundary
    description: "In-scope _pm/ files (test-plan.yaml, uiux-notes.yaml,
      dev-feasibility.yaml) not explicitly enumerated. STORY-SEED.md and BLOCKERS.md
      live in the same directory and are out of scope."
    resolution: "Add explicit scope enumeration to story ACs or a non-goals section."

  - id: gap-3
    severity: critical
    category: missing_acs
    description: "No acceptance_criteria section. Story has zero verifiable, testable
      acceptance criteria."
    resolution: "Add acceptance_criteria section with at least 5 ACs (see proposed_acs)."

  - id: gap-4
    severity: critical
    category: unresolved_decision
    description: "No write-ordering strategy for concurrent worker execution.
      pm-story-generation-leader mandates parallel spawning but RISK-003 identifies
      this as a collision risk. No resolution specified."
    resolution: "Make an explicit decision: recommend Option B (inline return, leader
      aggregates). Workers return YAML payload inline via TaskOutput; leader does single
      story.yaml write in Phase 4. This eliminates the race entirely."

  - id: gap-5
    severity: high
    category: missing_file
    description: "pm-spawn-patterns.md contains hardcoded Output file directives
      pointing to _pm/ paths for all three workers. Not listed in story scope.
      Omitting this file leaves stale spawn instructions."
    resolution: "Add pm-spawn-patterns.md to the implementation scope."

  - id: gap-6
    severity: medium
    category: missing_verification
    description: "No formal test plan. Verification approach is implied (grep + PM run)
      but not specified as concrete commands or acceptance evidence."
    resolution: "Add test plan with specific grep commands and smoke test description."

  - id: gap-7
    severity: medium
    category: missing_verification
    description: "No YAML validity check in verification. If a worker writes malformed
      YAML into story.yaml the error may be silent until the next story.yaml reader."
    resolution: "Add evidence expectation: 'yq validate {STORY_ID}.story.yaml returns
      exit 0 after PM generation completes.'"

  - id: gap-8
    severity: critical
    category: unresolved_decision
    description: "No decision on WHERE workers write: direct story.yaml edit, inline
      return, or staged temp files. Each option requires different agent instructions."
    resolution: "Resolve as part of gap-4 (recommend inline return via TaskOutput)."

  - id: gap-9
    severity: high
    category: goal_accuracy
    description: "Goal says 'No _pm/ directory or files are created' but STORY-SEED.md
      and BLOCKERS.md will still be created in _pm/ (out of scope). Literal goal
      is false."
    resolution: "Narrow goal to: 'No _pm/test-plan.yaml, _pm/uiux-notes.yaml, or
      _pm/dev-feasibility.yaml are created during PM generation; their content lives
      as pm_artifacts.* sections in story.yaml.'"

