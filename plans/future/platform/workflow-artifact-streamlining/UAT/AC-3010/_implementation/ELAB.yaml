# ─── IMPLEMENTATION NOTES ─────────────────────────────────────────────────

implementation_notes:
  recommended_write_protocol: >
    Recommend Option B (inline return). Workers return their YAML payload as structured
    output via TaskOutput (not written to disk). The pm-story-generation-leader Phase 4
    synthesis reads all three TaskOutput payloads and writes a single, complete
    pm_artifacts block into story.yaml atomically. This eliminates RISK-003 entirely
    without requiring read-modify-write file locking.

    This protocol change requires:
    1. pm-draft-test-plan, pm-uiux-recommendations, pm-dev-feasibility-review:
       Remove "Write {FEATURE_DIR}/backlog/{STORY_ID}/_pm/*.yaml" instruction.
       Add "Return your output as a YAML code block in your response."
    2. pm-story-generation-leader Phase 1-3:
       Remove Output file from spawn prompts.
       Phase 4: Read TaskOutput from each worker (not from _pm/*.yaml files).
    3. pm-spawn-patterns.md: Remove Output file directives from all three templates.

  files_in_scope:
    - path: .claude/agents/pm-draft-test-plan.agent.md
      change: "Replace Output section (write to _pm/) with inline YAML return instruction"
    - path: .claude/agents/pm-uiux-recommendations.agent.md
      change: "Replace Output section (write to _pm/) with inline YAML return instruction;
        preserve conditional omission for non-UI stories"
    - path: .claude/agents/pm-dev-feasibility-review.agent.md
      change: "Replace Output section (write to _pm/) with inline YAML return instruction"
    - path: .claude/agents/pm-story-generation-leader.agent.md
      change: "Phase 0: Remove _pm/ directory creation from directory structure step;
        Phase 1-3: Remove Output file from spawn prompts;
        Phase 4 PM Artifacts: Replace 'Read _pm/*.yaml' with 'Read TaskOutput from workers';
        Workers table: Update Output column from '_pm/file.yaml' to '(inline)'"
    - path: .claude/agents/_reference/patterns/pm-spawn-patterns.md
      change: "Remove 'Output file: {OUTPUT_DIR}/_pm/*.yaml' line from all three spawn
        prompt templates"

  files_explicitly_out_of_scope:
    - .claude/agents/pm-story-fix-leader.agent.md
    - .claude/agents/pm-story-adhoc-leader.agent.md
    - .claude/agents/pm-story-bug-leader.agent.md
    - .claude/agents/pm-story-followup-leader.agent.md
    - .claude/agents/pm-story-split-leader.agent.md
    - .claude/agents/pm-harness-generation-leader.agent.md
    - .claude/agents/pm-harness-setup-leader.agent.md
    - .claude/agents/pm-story-seed-agent.agent.md
    - .claude/agents/story-synthesize-agent.agent.md
    - .claude/agents/gap-hygiene-agent.agent.md
    - .claude/agents/readiness-score-agent.agent.md
    - .claude/agents/commitment-gate-agent.agent.md
    - .claude/agents/story-attack-agent.agent.md
    - .claude/agents/story-fanout-pm.agent.md
    - .claude/agents/story-fanout-ux.agent.md
    - .claude/agents/story-fanout-qa.agent.md

  grep_checklist:
    - cmd: "grep -n '_pm/test-plan\\|_pm/uiux-notes\\|_pm/dev-feasibility' .claude/agents/pm-draft-test-plan.agent.md"
      expected: "0 matches"
    - cmd: "grep -n '_pm/test-plan\\|_pm/uiux-notes\\|_pm/dev-feasibility' .claude/agents/pm-uiux-recommendations.agent.md"
      expected: "0 matches"
    - cmd: "grep -n '_pm/test-plan\\|_pm/uiux-notes\\|_pm/dev-feasibility' .claude/agents/pm-dev-feasibility-review.agent.md"
      expected: "0 matches"
    - cmd: "grep -n '_pm/test-plan\\|_pm/uiux-notes\\|_pm/dev-feasibility' .claude/agents/pm-story-generation-leader.agent.md"
      expected: "0 matches"
    - cmd: "grep -n '_pm/test-plan\\|_pm/uiux-notes\\|_pm/dev-feasibility' .claude/agents/_reference/patterns/pm-spawn-patterns.md"
      expected: "0 matches"
    - cmd: "grep -rn '_pm/STORY-SEED\\|_pm/BLOCKERS' .claude/agents/pm-story-generation-leader.agent.md"
      expected: "Still present (these are retained, not removed)"

