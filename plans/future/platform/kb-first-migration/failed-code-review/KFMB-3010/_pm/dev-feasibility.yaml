feasible: true
confidence: high
rationale: >
  The work is entirely documentation editing of .md files in .claude/agents/. No TypeScript
  compilation, no DB migrations, no infrastructure changes. The primary challenge is blast radius
  (~32 files), not technical complexity. The KB MCP tools required (kb_list_stories, kb_get_story,
  kb_update_story_status, kb_get_next_story, kb_search) are already available. The main risk is
  missed references — mitigated by final grep audit AC-13 and incremental subtask grouping.
  Hard dependency on KFMB-2010 and KFMB-2020 for AC-6 and AC-7 (bootstrap agents).

complexity: medium
change_surface:
  areas:
    - ".claude/agents/ (32 .md files)"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required — agent .md files are read at runtime by Claude"

risks:
  - finding: "~32 files with similar but not identical patterns — one missed reference invalidates AC-13"
    mitigation: "Process agents in named groups (Subtasks 1-8); run grep audit after each group before proceeding"
  - finding: "Parent agents pass index_path to workers — removing the parameter from workers without updating parents breaks the contract"
    mitigation: "For each worker updated in Subtasks 3/5, trace all spawning parents and update their prompt templates"
  - finding: "KFMB-2010 and KFMB-2020 are hard dependencies for AC-6 (bootstrap setup) and AC-7 (bootstrap generation)"
    mitigation: "Do Subtask 3 (bootstrap agents) last, only after KFMB-2010 and KFMB-2020 are merged"
  - finding: "KB tool parameter names may not match assumed values (e.g., 'feature' vs 'prefix' vs 'epic' filter)"
    mitigation: "Read MCP tool schema definitions before writing any agent replacements; validate parameter names against actual tool signatures"

missing_requirements: []

evidence_expectations:
  - "grep -r 'stories\\.index\\.md' .claude/agents/ returns zero results (final audit)"
  - "Each modified agent file has a visible kb_list_stories, kb_get_story, or kb_update_story_status call replacing the removed index reference"
  - "pm-story-followup-leader and pm-story-split-leader show MAX(story_id_numeric)+10 pattern in their ID allocation logic"
  - "All completion signal strings unchanged from pre-modification versions"

subtasks:
  - id: ST-1
    title: "ID-Allocation Agents — pm-story-followup-leader and pm-story-split-leader"
    goal: "Replace grep-based highest-ID scan with kb_list_stories({feature, limit: 100}) + MAX(id)+10 pattern"
    files_to_read:
      - ".claude/agents/pm-story-followup-leader.agent.md"
      - ".claude/agents/pm-story-split-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-story-followup-leader.agent.md"
      - ".claude/agents/pm-story-split-leader.agent.md"
    acs: ["AC-1", "AC-2"]
    depends_on: "none"
    verification: "grep 'stories.index.md' .claude/agents/pm-story-followup-leader.agent.md .claude/agents/pm-story-split-leader.agent.md | wc -l should equal 0"
    estimated_tokens: 6000

  - id: ST-2
    title: "State-Mutation Agents — elab-epic-updates-leader and audit-promote-leader"
    goal: "Replace direct stories.index.md writes with kb_create_story/kb_update_story_status and kb_list_stories dedup"
    files_to_read:
      - ".claude/agents/elab-epic-updates-leader.agent.md"
      - ".claude/agents/audit-promote-leader.agent.md"
    files_to_modify:
      - ".claude/agents/elab-epic-updates-leader.agent.md"
      - ".claude/agents/audit-promote-leader.agent.md"
    acs: ["AC-3", "AC-4"]
    depends_on: "none"
    verification: "grep 'stories.index.md' .claude/agents/elab-epic-updates-leader.agent.md .claude/agents/audit-promote-leader.agent.md | wc -l should equal 0"
    estimated_tokens: 7000

  - id: ST-3
    title: "Generation-Leader Index Claim — pm-story-generation-leader"
    goal: "Replace Phase 0.6 /index-update skill call with kb_update_story_status and Phase 5 with kb_get_story"
    files_to_read:
      - ".claude/agents/pm-story-generation-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-story-generation-leader.agent.md"
    acs: ["AC-5"]
