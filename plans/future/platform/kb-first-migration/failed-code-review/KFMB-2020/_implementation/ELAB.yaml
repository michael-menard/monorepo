gaps:
  - id: GAP-001
    severity: mvp_blocking
    description: >
      The `epic` column value for KFMB stories is unconfirmed. The story assumes the `epic` column
      stores the plan slug (e.g., "kb-first-migration"), but this has not been verified against the
      live database. If the column stores a different format (e.g., a UUID, a display name, or a
      prefixed slug), the Step 4 filter `kb_list_stories({ epic: "{project_name}", limit: 1 })`
      will silently return zero results for ALL queries — making the collision check always pass and
      never block, eliminating the safety guard entirely. ST-1 is designed to catch this, but it
      must complete and confirm the column value BEFORE ST-2 edits the agent markdown.
    mitigation: >
      ST-1 (already defined) is the correct mitigation. Mark ST-1 as a hard gate: ST-2 must not
      begin until ST-1 research confirms the epic column value. If the value differs from
      plan_slug, the story's Step 4 prose template must be adjusted before implementation.
    ac_affected: "AC-1"
    decision: already_mitigated
    decision_note: >
      ST-1 already exists in the story as a hard pre-implementation gate. The subtask decomposition
      explicitly requires ST-1 to complete and confirm the epic column value before ST-2 begins.
      No new AC is needed — ST-1 IS the gate. Gap is mitigated by existing story structure.

  - id: GAP-002
    severity: mvp_blocking
    description: >
      The fallback SETUP BLOCKED message (Architecture Notes item 4) uses a different format string
      than the primary SETUP BLOCKED message in AC-2. Primary: "Stories already exist in KB for
      plan '{project_name}' — bootstrap already run". Fallback: "stories.index.md already exists
      in {feature_dir} — bootstrap already run (filesystem fallback)". Both use the correct
      "SETUP BLOCKED: <reason>" prefix as required by AC-6. However, neither the story body nor
      any AC explicitly confirms that the filesystem fallback BLOCKED message format is a VALID
      signal variant for downstream Phase 1 parsing. The signal contract (Signals section in
      pm-bootstrap-setup-leader.agent.md) only defines `SETUP BLOCKED: <reason>` generically.
      The note in EC-2 says "Downstream Phase 1 parsing succeeds unchanged" — this needs to be
      verified by inspection of the Phase 1 orchestrator's BLOCKED signal parsing logic.
    mitigation: >
      Implementer should verify that the downstream parser (pm-bootstrap-workflow.md Phase 1
      orchestration) pattern-matches on the prefix "SETUP BLOCKED:" and not on a full message
      string. This is a one-line inspection of pm-bootstrap-workflow.md and requires no code
      change. If the parser uses prefix matching, no gap exists. If it uses full-string matching,
      both BLOCKED messages must be registered — a small change in KFMB-2030 scope.
    ac_affected: "AC-4, AC-6"
    decision: add_ac
    ac_added: "AC-11: Verify downstream SETUP BLOCKED signal parsing uses prefix matching"

opportunities:
  - id: OPP-001
    description: >
      The story lists scrum-master-setup-leader.agent.md as a canonical reference "If it uses
      kb_list_stories" — but inspection confirms it does NOT use kb_list_stories. This means there
      is no existing agent that embeds a kb_list_stories call in step prose, making KFMB-2020 the
      first such pattern. The canonical reference row is aspirational, not confirmatory. A future
      opportunity exists to document the MCP-call-in-agent-prose pattern after KFMB-2020
      implementation, so it can serve as a genuine canonical reference for subsequent Phase 2/3
      agent migration stories (KFMB-2010, KFMB-3010, etc.).
    priority: low
    phase: post_implementation
    decision: log_to_kb
    decision_note: Non-blocking finding. No story change required. KB write skipped (tool not available in this context).

  - id: OPP-002
    description: >
      The fallback path (AC-4) degrades silently to filesystem check on ANY error from
      kb_list_stories (connection error, tool not found, timeout). This is the correct conservative
      approach for a transitional story. However, once all agents have migrated to KB-native
      storage (Phase 3 completion), the filesystem fallback will become dead code. Noting this now
      surfaces a natural cleanup target for KFMB-3010 (Eliminate stories.index.md — Agent Updates)
      where the fallback path in pm-bootstrap-setup-leader.agent.md should be removed or converted
      to a hard error.
    priority: low
    phase: kfmb_phase_3
    decision: log_to_kb
    decision_note: Non-blocking finding. Conservative fallback is correct for now. Dead code cleanup is a natural KFMB-3010 scope item. KB write skipped (tool not available in this context).

  - id: OPP-003
    description: >
      The story does not specify whether kb_list_stories should filter on all story states or only
      active/non-terminal states. Currently the Step 4 call uses only the `epic` filter with no
      `state` filter. If a previous bootstrap run was cancelled or its stories were set to
      `cancelled` state, the collision check would still block (treating a cancelled bootstrap as
      if it completed). This may or may not be the desired behavior. A future opportunity exists
      to add state filter semantics (e.g., exclude `cancelled` stories) if the use case demands it.
      For the current story scope, blocking on ANY existing story (regardless of state) is the
      safer default.
    priority: low
    phase: future_consideration
    decision: log_to_kb
    decision_note: Non-blocking finding. Conservative default (block on any existing story regardless of state) is correct for this story. State filtering is a future consideration. KB write skipped (tool not available in this context).

