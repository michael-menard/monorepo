  - id: ports_adapters
    status: PASS
    note: >
      Not applicable in the strict code sense — this is an agent markdown file, not TypeScript.
      However, the equivalent principle applies: the story correctly isolates the transport
      mechanism (filesystem vs MCP tool call) from the downstream contract (SETUP-CONTEXT YAML
