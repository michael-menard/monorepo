      This is a PASS by analogy.

  - id: testability
    status: PASS
    note: >
      Test plan is concrete and executable. HP-1 and HP-2 are UAT-runnable against a real KB MCP
      server (ADR-005). HP-3, HP-4, HP-5 are structural verification steps (diff + grep) that can
