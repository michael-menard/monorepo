strategy: unit
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
  mcp_tools_touched:
    - kb_delete_artifact
  files_under_test:
    - apps/api/knowledge-base/src/mcp-server/__tests__/artifact-tools.test.ts
    - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    - apps/api/knowledge-base/src/crud-operations/artifact-operations.ts
    - apps/api/knowledge-base/src/mcp-server/access-control.ts

# NOTE: This story verifies an existing implementation. All tests below correspond to
# already-implemented behavior. The test plan enumerates existing test cases and
# identifies any coverage gaps.

happy_path_tests:
  - id: HP-1
    title: "getToolDefinitions() includes kb_delete_artifact"
    setup: "Import getToolDefinitions from tool-schemas.ts"
    action: "Call getToolDefinitions() and inspect result array"
    expected: "Array contains an entry with name: 'kb_delete_artifact'"
    evidence: "kbDeleteArtifactToolDefinition is in the toolDefinitions array at line 3316 of tool-schemas.ts"
    ac_coverage: ["AC-1"]
    existing: true
    test_location: "Verify via manual or dedicated integration test; not explicitly tested as standalone in artifact-tools.test.ts"
    gap: true
    gap_note: "No explicit test in artifact-tools.test.ts for AC-1. The tool registration can be verified by inspecting toolDefinitions array directly. A test that calls getToolDefinitions() and asserts 'kb_delete_artifact' is present would close this gap."

  - id: HP-2
    title: "handleKbDeleteArtifact is dispatched from tool handler map"
    setup: "Import tool dispatch map and handleKbDeleteArtifact from tool-handlers.ts"
    action: "Inspect dispatch map entry for 'kb_delete_artifact' key"
    expected: "dispatch_map['kb_delete_artifact'] === handleKbDeleteArtifact"
    evidence: "Dispatch map at line 4539 of tool-handlers.ts: kb_delete_artifact: handleKbDeleteArtifact"
    ac_coverage: ["AC-2"]
    existing: true
    test_location: "Verify via code inspection; no explicit test for dispatch routing in artifact-tools.test.ts"
    gap: true
    gap_note: "Not explicitly tested. Could add a test that calls the tool router with 'kb_delete_artifact' name and confirms handleKbDeleteArtifact is invoked."

  - id: HP-3
    title: "handleKbDeleteArtifact returns deleted:true for existing artifact"
    setup: "mockKbDeleteArtifact.mockResolvedValue(true); generate valid UUID"
    action: "Call handleKbDeleteArtifact({ artifact_id: validUuid }, mockDeps, pmContext)"
    expected: "result.isError is undefined; JSON.parse(result.content[0].text) = { deleted: true, artifact_id: validUuid }"
    evidence: "Existing test HP-4 in handleKbDeleteArtifact describe block, artifact-tools.test.ts line 367"
    ac_coverage: ["AC-3"]
    existing: true
    gap: false

  - id: HP-4
    title: "handleKbDeleteArtifact calls CRUD fn with bare artifact_id string"
    setup: "mockKbDeleteArtifact.mockResolvedValue(true); generate valid UUID"
    action: "Call handleKbDeleteArtifact({ artifact_id: validUuid }, mockDeps, pmContext) and inspect mock calls"
    expected: "mockKbDeleteArtifact.mock.calls[0][0] === validUuid (string, not object)"
    evidence: "Existing test at artifact-tools.test.ts line 414: 'should call kb_delete_artifact with bare artifact_id string'"
    ac_coverage: ["AC-2", "AC-8"]
    existing: true
    gap: false

error_cases:
  - id: EC-1
    title: "handleKbDeleteArtifact returns deleted:false for non-existent artifact"
    setup: "mockKbDeleteArtifact.mockResolvedValue(false); generate valid UUID"
    action: "Call handleKbDeleteArtifact({ artifact_id: validUuid }, mockDeps, pmContext)"
    expected: "result.isError is undefined; JSON.parse(result.content[0].text) = { deleted: false, artifact_id: validUuid }"
    evidence: "Existing test EC-8 in handleKbDeleteArtifact describe block, artifact-tools.test.ts line 380"
    ac_coverage: ["AC-4"]
    existing: true
    gap: false

  - id: EC-2
    title: "handleKbDeleteArtifact rejects non-UUID artifact_id with Zod error"
    setup: "Pass invalid string 'not-a-valid-uuid' as artifact_id"
    action: "Call handleKbDeleteArtifact({ artifact_id: 'not-a-valid-uuid' }, mockDeps, pmContext)"
    expected: "result.isError === true (Zod parse error caught in handler catch block)"
    evidence: "Existing test EC-9 in handleKbDeleteArtifact describe block, artifact-tools.test.ts line 392"
    ac_coverage: ["AC-5"]
    existing: true
    gap: false

  - id: EC-3
    title: "handleKbDeleteArtifact rejects non-PM roles with authorization error"
    setup: "Use context with agent_role: 'dev' | 'qa' | 'all' instead of 'pm'"
    action: "Call handleKbDeleteArtifact({ artifact_id: validUuid }, mockDeps, nonPmContext)"
    expected: "result.isError === true (enforceAuthorization throws AuthorizationError)"
    evidence: "ACCESS_MATRIX entry at access-control.ts line 117: kb_delete_artifact: new Set(['pm'])"
    ac_coverage: ["AC-6"]
    existing: false
    gap: true
    gap_note: "The existing handleKbDeleteArtifact describe block uses pmContext throughout. An explicit test with a dev/qa/all role context to verify authorization rejection is not present and should be added."

  - id: EC-4
    title: "handleKbDeleteArtifact returns MCP error on DB rejection"
    setup: "mockKbDeleteArtifact.mockRejectedValue(new Error('DB connection failed'))"
    action: "Call handleKbDeleteArtifact({ artifact_id: validUuid }, mockDeps, pmContext)"
    expected: "result.isError === true"
    evidence: "Existing test EC-10 in handleKbDeleteArtifact describe block, artifact-tools.test.ts line 403"
    ac_coverage: ["AC-3"]
    existing: true
    gap: false

edge_cases:
  - id: ED-1
    title: "kb_delete_artifact CRUD deletes from both jump table and detail table"
    setup: "Use real DB (integration context) or inspect CRUD implementation"
    action: "Inspect kb_delete_artifact() at artifact-operations.ts line 882 — verify deleteDetailRow called before storyArtifacts delete"
    expected: "CRUD fn reads jump row, calls deleteDetailRow(db, jumpRow.detailTable, jumpRow.detailId), then deletes from storyArtifacts"
    evidence: "CRUD implementation confirmed at artifact-operations.ts lines 901-910"
    ac_coverage: ["AC-8"]
    existing: true
    gap: false
    note: "Unit tests mock kb_delete_artifact at the handler level; the CRUD fn itself is verified by direct code inspection. Integration test against real DB would fully close AC-8 per ADR-005 UAT requirement."

  - id: ED-2
    title: "kbDeleteArtifactToolDefinition uses zodToMcpSchema() with KbDeleteArtifactInputSchema"
    setup: "Inspect tool-schemas.ts line 2524-2541"
    action: "Verify inputSchema field uses zodToMcpSchema(KbDeleteArtifactInputSchema)"
    expected: "Tool definition follows same pattern as kbWriteArtifactToolDefinition"
    evidence: "tool-schemas.ts line 2541: inputSchema: zodToMcpSchema(KbDeleteArtifactInputSchema)"
    ac_coverage: ["AC-1"]
    existing: true
    gap: false

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "result.content[0].type === 'text'"
      - "JSON.parse(result.content[0].text).deleted === true (on success)"
      - "JSON.parse(result.content[0].text).artifact_id matches input UUID"
      - "result.isError === true on auth failure, Zod error, or DB rejection"
      - "mockKbDeleteArtifact called with bare string UUID (not object)"
  frontend:
    playwright_runs: []
    assertions: []

manual_cases:
  - id: MC-1
    title: "Verify kb_delete_artifact appears in MCP server ListTools response"
    steps:
      - "Start the MCP server (apps/api/knowledge-base)"
      - "Send a ListTools request to the MCP server"
      - "Inspect the tools array in the response"
    expected: "Response includes tool with name 'kb_delete_artifact' and inputSchema matching { artifact_id: UUID }"
    priority: high
    ac_coverage: ["AC-1", "AC-2"]

fixture_definitions:
  - name: pmContext
    type: ToolCallContext
    description: "Context with agent_role: 'pm' — required for kb_delete_artifact authorization"
  - name: nonPmContext
    type: ToolCallContext
    description: "Context with agent_role: 'dev' — used to verify authorization rejection"
  - name: mockKbDeleteArtifact
    type: vi.fn()
    description: "Mock for the CRUD kb_delete_artifact function; return true (deleted) or false (not found)"
  - name: mockDeps
    type: ToolHandlerDeps
    description: "Mocked dependencies including db property; mockKbDeleteArtifact injected via module mock"

risks:
  - "AC-6 authorization test not present — risk that a future refactor breaks auth enforcement without failing any test"
  - "AC-1 (ListTools presence) not covered by unit tests — manual verification required per MC-1"
  - "AC-8 (dual table delete) confirmed by code inspection only at unit level; full UAT requires real DB per ADR-005"
  - "Note: this is a verification story, not a build story — all implementation is already present. Risk is misidentifying gaps."

coverage_summary:
  fully_covered: ["AC-3", "AC-4", "AC-5", "AC-7", "AC-8"]
  partially_covered: ["AC-1", "AC-2"]
  gap_requiring_new_test: ["AC-6"]
  verified_by_code_inspection: ["AC-1", "AC-2", "AC-8"]
  verified_by_existing_unit_test: ["AC-3", "AC-4", "AC-5", "AC-7"]
