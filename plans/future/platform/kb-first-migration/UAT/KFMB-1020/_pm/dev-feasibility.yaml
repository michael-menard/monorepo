feasible: true
confidence: high
rationale: >
  The implementation pattern is well-established — kb_upsert_plan in plan-operations.ts demonstrates
  the exact Drizzle onConflictDoUpdate pattern needed for kb_create_story. The registration pattern
  (ToolNameSchema + ACCESS_MATRIX + toolHandlers + tool-schemas) is repeated consistently throughout
  the codebase. The existing KbUpdateStoryInputSchema in story-crud-operations.ts provides the
  base schema shape to extend for content fields. The only non-trivial element is the partial-merge
  set clause construction, which is already used in kb_update_story. High confidence that this can
  be implemented without surprises once KFMB-1010 migration is in place.
complexity: medium
change_surface:
  areas:
    - "apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts"
    - "apps/api/knowledge-base/src/mcp-server/access-control.ts"
    - "apps/api/knowledge-base/src/mcp-server/tool-handlers.ts"
    - "apps/api/knowledge-base/src/mcp-server/tool-schemas.ts"
    - "apps/api/knowledge-base/src/crud-operations/__tests__/ (tests)"
  endpoints: []
  deploy_touchpoints:
    - "No infrastructure changes — MCP server restarts automatically via Lambda cold start"
    - "KFMB-1010 migration must be applied to Aurora before KFMB-1020 can be tested"

risks:
  - finding: "Content column types not yet confirmed — KFMB-1010 may use text[] vs jsonb for packages column"
    mitigation: >
      Before writing KbCreateStoryInputSchema content field Zod types, read KFMB-1010 migration
      file to confirm exact column types. If jsonb, use z.array(z.string()) with Drizzle jsonb cast.
      If text[], use z.array(z.string()) with Drizzle sql`ARRAY[...]::text[]` cast.
  - finding: "Partial-merge upsert set clause must dynamically exclude undefined fields to avoid clobbering"
    mitigation: >
      Build the set object by checking each optional field:
      `const set = {}; if (input.description !== undefined) set.description = input.description`.
      Never spread all fields into set or DB values will overwrite existing content with null on re-upsert.
  - finding: "Dependency on KFMB-1010 — tests will fail with column-not-found if migration not applied"
    mitigation: >
      Gate integration test execution on a pre-check that queries information_schema.columns to verify
      description/acceptance_criteria/non_goals/packages columns exist in stories table.

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter knowledge-base passes with all new tests green and no regressions"
  - "pnpm check-types passes for all modified files"
  - "Manual MCP call to kb_create_story returns { created: true } on first call, { created: false } on second"
  - "Manual MCP call to kb_get_story shows content fields populated after kb_create_story with content"

subtasks:
  - id: ST-1
    title: "Add KbCreateStoryInputSchema and kb_create_story CRUD operation"
    goal: >
      Define the Zod input schema for kb_create_story (story_id required, title required, all other
      fields optional including the four new content fields). Implement the kb_create_story function
      using Drizzle onConflictDoUpdate with partial-merge set clause semantics. Return { ...story_row, created: boolean }.
    files_to_read:
      - "apps/api/knowledge-base/src/crud-operations/plan-operations.ts"
      - "apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts"
      - "apps/api/knowledge-base/src/db/schema.ts"
    files_to_modify:
      - "apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts"
    acs: ["AC-1", "AC-2", "AC-3"]
    depends_on: none
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 12000

  - id: ST-2
    title: "Extend KbUpdateStoryInputSchema to accept content fields"
    goal: >
      Add description (z.string().optional().nullable()), acceptance_criteria (z.string().optional().nullable()),
      non_goals (z.string().optional().nullable()), and packages (z.array(z.string()).optional().nullable())
      to KbUpdateStoryInputSchema. Update the kb_update_story function to include these fields in its
      partial-merge set clause construction.
    files_to_read:
      - "apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts"
      - "apps/api/knowledge-base/src/db/schema.ts"
    files_to_modify:
      - "apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts"
    acs: ["AC-4", "AC-5"]
    depends_on: none
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 6000

  - id: ST-3
    title: "Register kb_create_story in access-control.ts and tool-schemas.ts"
    goal: >
      Add 'kb_create_story' to ToolNameSchema enum in access-control.ts. Add kb_create_story entry
      to ACCESS_MATRIX (all roles: pm, dev, qa, all). Add kbCreateStoryToolDefinition using zodToMcpSchema
      in tool-schemas.ts, following the kbGetStoryToolDefinition pattern (docstring format, Story Tools section).
    files_to_read:
      - "apps/api/knowledge-base/src/mcp-server/access-control.ts"
      - "apps/api/knowledge-base/src/mcp-server/tool-schemas.ts"
    files_to_modify:
      - "apps/api/knowledge-base/src/mcp-server/access-control.ts"
      - "apps/api/knowledge-base/src/mcp-server/tool-schemas.ts"
    acs: ["AC-6"]
    depends_on: "ST-1"
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 8000

  - id: ST-4
    title: "Register handleKbCreateStory in tool-handlers.ts"
    goal: >
      Implement handleKbCreateStory handler function following the handleKbUpsertPlan pattern exactly:
      startTime, correlationId, logger.info, enforceAuthorization, KbCreateStoryInputSchema.parse,
      delegate to kb_create_story CRUD op, logger.info success, return { content: [{type:'text', text: JSON.stringify(result)}] },
      catch → errorToToolResult. Add to toolHandlers dispatch object.
    files_to_read:
      - "apps/api/knowledge-base/src/mcp-server/tool-handlers.ts"
    files_to_modify:
      - "apps/api/knowledge-base/src/mcp-server/tool-handlers.ts"
    acs: ["AC-1", "AC-6"]
    depends_on: "ST-3"
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 10000

  - id: ST-5
    title: "Write unit and integration tests for all new and modified operations"
    goal: >
      Add tests covering: (1) fresh insert via kb_create_story returns created:true, (2) re-upsert
      returns created:false and only updates provided fields (critical partial-merge guard), (3) upsert
      with all four content fields, (4) kb_update_story with content fields, (5) kb_get_story returns
      content fields. Verify no regressions in existing story operation tests. Use CRUD test helpers
      for DB setup/teardown.
    files_to_read:
      - "apps/api/knowledge-base/src/crud-operations/__tests__/test-helpers.ts"
      - "apps/api/knowledge-base/src/crud-operations/__tests__/"
    files_to_modify:
      - "apps/api/knowledge-base/src/crud-operations/__tests__/story-crud-operations.test.ts"
    acs: ["AC-7", "AC-8"]
    depends_on: "ST-2"
    verification: "pnpm test --filter knowledge-base"
    estimated_tokens: 14000
