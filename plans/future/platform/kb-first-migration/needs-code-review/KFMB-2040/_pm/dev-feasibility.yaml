feasible: true
confidence: high
rationale: "All required KB MCP tools (kb_list_stories, kb_write_artifact, kb_read_artifact, kb_update_story) already exist. This story only modifies three markdown instruction files — no TypeScript compilation, no schema migrations, no new package dependencies. The primary risk is coordination: AC-2 (seed write) and AC-3 (leader read) must ship atomically, and implementation is gated on KFMB-1020 + KFMB-1030. Sister story KFMB-2010/2020 provides a proven migration pattern reference."
complexity: medium
change_surface:
  areas:
    - ".claude/commands/pm-story.md"
    - ".claude/agents/pm-story-seed-agent.agent.md"
    - ".claude/agents/pm-story-generation-leader.agent.md"
  endpoints: []
  deploy_touchpoints:
    - "KFMB-1020 must be deployed (extends kb_update_story with content fields)"
    - "KFMB-1030 must be deployed (registers story_seed artifact type)"

risks:
  - finding: "Partial migration breaks pipeline silently — seed writes to KB but leader still reads from disk (or vice versa)"
    mitigation: "Implement AC-2 (seed write) and AC-3 (leader read) in the same commit. Gate behind a single feature flag or implement dual-write with both read paths until confirmed stable."
  - finding: "index_path removal from seed agent could break sibling leaders (adhoc, followup, split) — AC-5 and AC-7"
    mitigation: "Before removing index_path, grep all .claude/agents/ and .claude/commands/ for index_path references. Only remove after confirming all callers either no longer pass it or have been updated. Consider keeping index_path as optional parameter."
  - finding: "kb_update_story content field support (KFMB-1020) may not be complete when this story is implemented"
    mitigation: "Gate Phase 4.5 migration on confirming story-crud-operations.ts post-KFMB-1020 includes description/acceptance_criteria/non_goals fields. Do not write Phase 4.5 instructions until KFMB-1020 EVIDENCE.yaml is available."

missing_requirements: []

evidence_expectations:
  - "After implementation: run /pm-story generate against a test story and confirm kb_read_artifact returns story_seed artifact"
  - "Confirm kb_get_story returns non-null description, acceptance_criteria, non_goals for generated story"
  - "Confirm sibling leaders (followup, split) still function correctly — no calling convention breaks"
  - "Confirm DEFERRED-KB-WRITES.yaml created when KB is unavailable"

subtasks:
  - id: ST-1
    title: "Audit caller agents and grep index_path references"
    goal: "Identify all call sites passing index_path to pm-story-seed-agent; document which can be safely updated or made optional"
    files_to_read:
      - ".claude/commands/pm-story.md"
      - ".claude/agents/pm-story-adhoc-leader.agent.md"
      - ".claude/agents/pm-story-followup-leader.agent.md"
      - ".claude/agents/pm-story-split-leader.agent.md"
    files_to_modify: []
    acs: ["AC-5", "AC-7"]
    depends_on: none
    verification: "Audit document produced; all callers identified; no blind spots"
    estimated_tokens: 6000

  - id: ST-2
    title: "Update pm-story-seed-agent to write story_seed artifact via kb_write_artifact"
    goal: "Add kb_write_artifact call with artifact_type='story_seed' to seed agent output phase; maintain filesystem write as fallback (dual-write); update kb_tools frontmatter"
    files_to_read:
      - ".claude/agents/pm-story-seed-agent.agent.md"
      - "apps/api/knowledge-base/src/crud-operations/artifact-operations.ts"
    files_to_modify:
      - ".claude/agents/pm-story-seed-agent.agent.md"
    acs: ["AC-2", "AC-6", "AC-8"]
    depends_on: ST-1
    verification: "Agent file has kb_write_artifact call; kb_tools frontmatter updated; fallback pattern documented"
    estimated_tokens: 8000

  - id: ST-3
    title: "Update pm-story-generation-leader to read seed from KB via kb_read_artifact"
    goal: "Replace Phase 0 filesystem STORY-SEED.md read with kb_read_artifact call; implement fallback to filesystem if artifact not found; update kb_tools frontmatter"
    files_to_read:
      - ".claude/agents/pm-story-generation-leader.agent.md"
      - "apps/api/knowledge-base/src/crud-operations/artifact-operations.ts"
    files_to_modify:
      - ".claude/agents/pm-story-generation-leader.agent.md"
    acs: ["AC-3", "AC-6"]
    depends_on: ST-2
    verification: "Agent reads seed via kb_read_artifact in Phase 0; fallback to filesystem documented; kb_tools updated"
    estimated_tokens: 8000

  - id: ST-4
    title: "Update pm-story-generation-leader to discover stories via kb_list_stories"
    goal: "Replace stories.index.md file reads with kb_list_stories call (feature+state filters) in generation leader story discovery phase; update frontmatter"
    files_to_read:
      - ".claude/agents/pm-story-generation-leader.agent.md"
      - "apps/api/knowledge-base/src/mcp-server/tool-schemas.ts"
    files_to_modify:
      - ".claude/agents/pm-story-generation-leader.agent.md"
    acs: ["AC-1", "AC-6"]
    depends_on: ST-3
    verification: "Leader uses kb_list_stories for story discovery; no reference to reading stories.index.md as discovery mechanism"
    estimated_tokens: 7000

  - id: ST-5
    title: "Update pm-story-generation-leader Phase 4.5 to use kb_update_story for content persistence"
    goal: "Replace raw SQL INSERT in Phase 4.5 with kb_update_story call writing description, acceptance_criteria, non_goals; maintain DEFERRED-KB-WRITES.yaml fallback pattern"
    files_to_read:
      - ".claude/agents/pm-story-generation-leader.agent.md"
      - "apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts"
    files_to_modify:
      - ".claude/agents/pm-story-generation-leader.agent.md"
    acs: ["AC-4", "AC-6"]
    depends_on: ST-4
    verification: "Phase 4.5 uses kb_update_story; raw SQL INSERT removed or commented; DEFERRED-KB-WRITES.yaml fallback present"
    estimated_tokens: 7000

  - id: ST-6
    title: "Update pm-story command to pass story_id as primary context key"
    goal: "Update pm-story.md Step 2 (seed phase) to pass story_id to seed agent; ensure index_path made optional or removed where safe per ST-1 audit"
    files_to_read:
      - ".claude/commands/pm-story.md"
    files_to_modify:
      - ".claude/commands/pm-story.md"
    acs: ["AC-5", "AC-7"]
    depends_on: ST-1
    verification: "pm-story.md passes story_id to seed agent; sibling leaders still function (followup, split commands tested)"
    estimated_tokens: 6000
