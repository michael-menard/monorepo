opportunities:

  - id: "OPP-1"
    title: "Document scope exclusions for remaining story.yaml fields"
    detail: >
      Fields present in story.yaml but not covered by KFMB-1010 (phase, feature,
      goal, depends_on, endpoints, infrastructure, risk_notes, sizing_warning,
      created) should be acknowledged. Either add a note to this story explaining
      why they are deferred, or create a follow-on story (e.g. KFMB-1011) to
      track their migration.
    effort: "low"
    decision: "log_to_kb — scope exclusion rationale documented in story.yaml DEC-3; future stories to be tracked in KB"

  - id: "OPP-2"
    title: "Add migration verification test"
    detail: >
      The project has a test-data directory under migrations. A lightweight
      integration test that runs the migration against a test DB instance and
      asserts column presence (using pg_catalog.pg_attribute or Drizzle
      introspection) would increase confidence in migration correctness and
      provide a regression guard for future migrations that touch this table.
    effort: "low"
    decision: "log_to_kb — nice-to-have, not MVP for Phase 1; to be tracked as a future enhancement"

  - id: "OPP-3"
    title: "Export updated drizzle-zod Zod schemas for new columns"
    detail: >
      Both kbar.ts and wint.ts already export insertStorySchema and
      selectStorySchema via createInsertSchema / createSelectSchema. After adding
      the new columns, these auto-generated schemas will automatically include
      them. Verify that the exported TypeScript types are re-generated and that
      any downstream consumers (KB MCP tools, sync service) that use these types
      are updated accordingly.
    effort: "low"
    decision: "covered_by_ac — AC-3 requires drizzle-zod types to reflect new columns; no separate action needed"

  - id: "OPP-4"
    title: "Consider DB-level constraints for packages array format"
    detail: >
      If packages is stored as text[], a check constraint could enforce that
      entries match a package name pattern (e.g. @repo/* or packages/*). This
      is low-priority for Phase 1 but would prevent malformed data from entering
      the DB without application-layer validation.
    effort: "medium"
    decision: "log_to_kb — future enhancement, out of scope for Phase 1"

