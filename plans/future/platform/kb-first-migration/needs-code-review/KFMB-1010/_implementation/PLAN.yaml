files_to_change:
  - path: packages/backend/database-schema/src/schema/kbar.ts
    action: modify
    reason: >-
      Add acceptance_criteria (jsonb), non_goals (text[]), packages (text[]) nullable columns to the stories table
      definition
  - path: packages/backend/database-schema/src/migrations/app/
    action: create
    reason: Drizzle-kit db:generate produces a new SQL migration file for the 3 new columns
commands_to_run:
  - command: pnpm --filter @repo/database-schema db:generate
    when: after ST-1 schema edit
    required: true
  - command: pnpm --filter @repo/database-schema db:migrate
    when: after migration file is generated
    required: true
  - command: pnpm check-types --filter @repo/database-schema
    when: after schema edit
    required: true
  - command: pnpm test --filter @repo/database-schema
    when: after all code changes
    required: true
acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: pnpm db:migrate runs without errors (command output)
    evidence_type: command
  - ac_id: AC-2
    planned_evidence: >-
      Migration SQL contains ALTER TABLE kbar.stories ADD COLUMN for all 3 columns with correct types; psql
      introspection confirms nullable
    evidence_type: command
  - ac_id: AC-3
    planned_evidence: >-
      pnpm check-types passes; insertStorySchema and selectStorySchema include acceptanceCriteria, nonGoals, packages
      fields
    evidence_type: command
  - ac_id: AC-4
    planned_evidence: pnpm test --filter @repo/database-schema passes with no failures
    evidence_type: test
architectural_decisions: []
complexity: simple
notes:
  - jsonb is already imported in kbar.ts — no new imports needed for acceptance_criteria column
  - text().array() is the Drizzle pattern for text[] arrays — confirmed in cohesion.ts and sets.ts
  - All 3 columns are nullable with no default per DEC-2 in story.yaml for backward compatibility
  - ST-2 (db:generate) produces the migration file automatically — no manual SQL authoring needed
  - >-
    ST-3 (db:migrate) may require a running local database; if not available, AC-1/AC-2 can be verified by inspecting
    generated SQL
  - >-
    The kbar-schema.test.ts stories table column test checks named columns — new columns do not break existing
    assertions (additive only)
  - Only kbar.stories is in scope per DEC-1; wint.stories is explicitly excluded
