gaps:

  - id: GAP-1
    title: "elab-epic.md may already be migrated — AC-8 pre-condition requires verification"
    severity: LOW
    blocking: false
    description: >
      AC-8 specifies removing `stories_index` field from the elab-epic.md
      context-init template. On inspection of the current elab-epic.md file,
      the Execution section passes only `Feature directory: {FEATURE_DIR}` to
      each phase agent — there is no `stories_index` field present in the file.

      If elab-epic.md is already migrated (or was never using the field), ST-4
      becomes a verify-and-confirm task rather than a removal task. The implementor
      must grep the file before editing to confirm current state.

      Risk if ignored: Implementor spends tokens searching for a field that does
      not exist, or introduces incorrect formatting trying to "remove" a nonexistent
      field.
    recommended_action: >
      Before ST-4, run:
        grep -n "stories_index\|stories\.index\.md\|INDEX_PATH" .claude/commands/elab-epic.md
      If output is empty, mark AC-8 as "already satisfied" and document the finding
      in the implementation notes rather than making edits.
    decision: implementation_note
    decision_rationale: >
      Non-blocking. No AC addition needed. Implementor must run the verification grep
      before ST-4. If AC-8 is already satisfied, ST-4 becomes confirm-and-document only.
      This is captured as an implementation condition in the verdict summary.

  - id: GAP-2
    title: "AC-4 does not explicitly address the Step 1c / Step 1c-platform embedded collision check in pm-story.md"
    severity: MEDIUM
    blocking: false
    description: >
      Architecture Notes explicitly state pm-story.md has TWO collision detection
      locations:
        1. The inline `## Collision Detection (REQUIRED)` section (line 115)
        2. The logic embedded in Step 1c / Step 1c-platform (paths through
           index_path discovery at lines 163-176)

      AC-4 specifies updating the "Collision Detection section" to use kb_list_stories.
      However, Step 1c (Find Next Available Story) at line 240-246 also reads
      `stories.index.md` via `Read the index file`. Similarly, Step 1b-map at
      lines 210-234 contains multiple `stories.index.md` references in the epic
      mapping table (structural/lookup data, not live writes).

      The current pm-story.md Step 1 flow at lines 162-176 also discovers
      `index_path` by finding `*.stories.index.md` in the feature directory —
      this is a live read that must be addressed.

      If only the Collision Detection section header is updated and the Step 1c
      embedded read and Step 1 path parsing are not updated, AC-12 (grep returns
      zero live references) will FAIL.

      Note: Some pm-story.md references to stories.index.md are structural/
      navigation metadata (platform.stories.index.md routing in Step 1b-map,
      Step 5 platform index update) which are explicitly out of scope per Non-Goal #4.
      The implementor must distinguish live-read references from structural routing.
    recommended_action: >
      In ST-5, enumerate ALL pm-story.md references before editing:
        grep -n "stories\.index\.md" .claude/commands/pm-story.md
      Classify each hit as:
        (a) Live story-state read/write → must be replaced with kb_list_stories
        (b) platform.stories.index.md routing → out of scope (Non-Goal #4)
        (c) Example/documentation text → acceptable to retain with deprecation note
      The Step 1c "Read the index file" and Step 1 index_path discovery logic
      are category (a) and must be updated. The Step 1b-map table rows showing
      per-epic index paths are ambiguous — verify whether they are navigation
      metadata or live-read targets.
    decision: implementation_note
    decision_rationale: >
      Non-blocking but the highest-severity gap. The Architecture Notes already call
      out the two locations; R-3 and the Reuse Plan reiterate the need to enumerate
      all references. No new AC is needed — AC-12 (grep gate) will catch any missed
      references at verification time. The implementor must follow the classification
      approach in recommended_action during ST-5. This is the most important
      implementation condition for this story.

  - id: GAP-3
    title: "AC-13 (completion signals) has no dedicated test in HP-1 through HP-11"
    severity: LOW
    blocking: false
    description: >
      AC-13 requires that all updated commands preserve their existing completion
      signals (UPDATE COMPLETE, INDEX UPDATE COMPLETE, AUDIT COMPLETE, etc.).
      The test plan covers HP-1 through HP-11 but none of these explicitly
      verify completion signals. ST-7 addresses AC-13 but its verification command
      is the grep audit for stories.index.md — it does not include signal verification.
    recommended_action: >
      Add a verification step in ST-7: after the grep audit, confirm each command
      file still contains its expected completion signal:
        grep -n "UPDATE COMPLETE\|INDEX UPDATE COMPLETE\|AUDIT COMPLETE\|PM COMPLETE\|ELAB COMPLETE" .claude/commands/{file}
      This is a 5-minute addition to ST-7 and closes the AC-13 gap.
    decision: implementation_note
    decision_rationale: >
      Non-blocking, LOW severity. No new AC needed — AC-13 is already present in the
      story. The recommended grep command should be added to ST-7 verification steps
      by the implementor. This is a minor test completeness note, not a story defect.

  - id: GAP-4
    title: "ST-7 depends only on ST-6 but should depend on all prior subtasks"
    severity: LOW
    blocking: false
    description: >
      ST-7 (Final grep audit) lists `Depends on: ST-6` but the final grep across
      all 6 command files should only run after ST-1 through ST-6 all complete.
      The current dependency chain means an implementor following the story strictly
      could run ST-7 immediately after ST-6, before ST-1 through ST-5 complete,
      and the grep would incorrectly pass (if earlier subtasks were not done yet).
    recommended_action: >
      Update ST-7 dependency to: "Depends on: ST-1, ST-2, ST-3, ST-4, ST-5, ST-6"
      This is a documentation correction only.
    decision: defer
    decision_rationale: >
      Non-blocking, LOW severity documentation correction. In practice, the implementor
      completes subtasks sequentially and ST-7 is clearly the final step. The story
      narrative makes this ordering implicit. Correcting the dependency chain in the
      story file is deferred — the implementor should be aware of this and run ST-7
      last regardless of the stated dependency. No AC impact.

