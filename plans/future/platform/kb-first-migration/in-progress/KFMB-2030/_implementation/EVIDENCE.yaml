    ac_text: File Mode behavior preserved unchanged
    status: PASS
    evidence_items:
      - type: file
        path: .claude/commands/pm-bootstrap-workflow.md
        description: >-
          File Mode sections (File Mode legacy disk-based prompt, Done — File Mode with pnpm
