        path: .claude/commands/pm-bootstrap-workflow.md
        description: >-
          Frontmatter kb_tools list now contains: kb_get_plan, kb_list_plans, kb_create_story,
          kb_list_stories. Lines 7-11. Version bumped from 5.0.0 to 5.1.0.

