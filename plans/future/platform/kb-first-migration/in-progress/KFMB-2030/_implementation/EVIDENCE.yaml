          sections were modified.

  - ac_id: AC-7
    ac_text: Reference doc Artifacts table updated (remove or annotate stories.index.md as File Mode only)
    status: PASS
    evidence_items:
      - type: file
        path: .claude/docs/pm-bootstrap-workflow-reference.md
