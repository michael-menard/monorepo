architectural_decisions: []
complexity: simple
notes:
  - Documentation-only story — no TypeScript, no tests, no build required
  - >-
    post-KFMB-2020 setup-leader (v4.1.0): KB Mode Step 4 now calls kb_list_stories({ feature: '{project_name}', limit: 1
    }) with filesystem fallback when tool unavailable
  - >-
    post-KFMB-2010 generation-leader (v5.0.0): uses kb_create_story MCP tool loop; stories.index.md still written
    (pending KFMB-3010 removal); File Mode removed from agent
  - >-
    Key insight: stories.index.md write is still present in generation-leader v5.0.0 (retained pending KFMB-3010). The
    command doc's Completion Report in KB Mode should still list it — but pnpm migrate:stories is no longer the primary
    seeding mechanism. Review AC-4 carefully: the generation-leader SUMMARY still lists stories.index.md in
    files_created.
  - >-
    AC-4 nuance: The generation-leader v5.0.0 SUMMARY output block still lists stories.index.md in files_created. So the
    Completion Report in the command should reflect what the agent actually outputs. The change is that migrate:stories
    is removed as primary seeding mechanism (AC-3) — stories.index.md is still written as a file artifact. The command
    doc Completion Report may keep stories.index.md but should clarify it is a filesystem artifact, not the KB seeding
    mechanism.
  - >-
    Step ordering: ST-1 (frontmatter) → ST-2 (Phase 0) → ST-3 (Phase 2) → ST-4 (Done + Report) → ST-5 (reference doc).
    Each step modifies the same files so sequential ordering prevents read-before-write conflicts.
