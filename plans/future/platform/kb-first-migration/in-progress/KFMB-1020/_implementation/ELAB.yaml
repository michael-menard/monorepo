      these columns at all. The implementer must add these columns to the KB-internal
      schema as part of this story, and must choose consistent types. The story does not
      explicitly state that schema.ts must also be updated — it only mentions CRUD
      operations as the change surface. See GAP-1 for full detail.

      The "created" flag detection approach (pre-existence check via findFirst) is
      explicitly described in Architecture Notes. No blocking TBDs remain after GAP-1
      is acknowledged.
    resolution_required: false
    gap_ref: "GAP-1"

  - id: "CHECK-7"
    category: "Risk Disclosure"
    status: "PASS"
    finding: >
      dev_feasibility.risks correctly identifies:
      (1) Content column types not confirmed — mitigation: read KFMB-1010 first.
          KFMB-1010 DEC-2 has resolved this. Types confirmed: jsonb / text[] / text[].
