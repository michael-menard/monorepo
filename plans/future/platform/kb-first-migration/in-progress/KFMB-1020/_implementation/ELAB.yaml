# ============================================================================
# 9-POINT AUDIT CHECKLIST
# ============================================================================

checklist:

  - id: "CHECK-1"
    category: "Scope Alignment"
    status: "PASS"
    finding: >
      stories.index.md lists KFMB-1020 as "kb_create_story MCP Tool and CRUD Update"
      in Phase 1: Schema & API Foundation, with depends_on: KFMB-1010. This matches
      the story file exactly. The story's scope (add kb_create_story tool, extend
      kb_update_story with content fields, verify kb_get_story returns content fields)
      is consistent with the Phase 1 goal of extending the CRUD API layer after the
      schema migration. No scope drift detected.
    resolution_required: false

  - id: "CHECK-2"
    category: "Internal Consistency"
    status: "WARN"
    finding: >
      Minor inconsistency in the architecture notes. The "Three-place registration rule"
      header says "exactly three places" but then enumerates FOUR registration points:
      (1) ToolNameSchema, (2) ACCESS_MATRIX, (3) toolHandlers dispatch, (4) getToolDefinitions().
      This is confusing but not a blocker — the four specific locations are all correct
      and properly identified. AC-6 correctly lists all four locations.

      Separate issue: AC-3 lists the complete set of fields accepted by kb_create_story
      including storyType and story_dir. The current stories table schema.ts also has
      storyType and storyDir columns. The KbCreateStoryInputSchema must map field names
      correctly (snake_case input → camelCase Drizzle columns). The story provides no
      explicit field-name mapping table. This is low-risk given the established pattern
      in KbUpdateStoryInputSchema, but warrants attention.

      Goals and non-goals are internally consistent: goal #3 says "Verify kb_get_story
      returns the four new content fields (included automatically once present in the
      schema row type)" which is accurate — kb_get_story does a SELECT * via
      stories.$inferSelect; the fields will auto-appear once the DB columns exist and
      the Drizzle schema is updated. However, KbGetStoryResultSchema wraps the result
      with z.custom<typeof stories.$inferSelect>() — the schema wrapper will not
      automatically expose the new fields to callers unless the result schema is
      updated or the type inference chain is verified. This is a low-risk implementation
      detail, not a blocker.
    resolution_required: false
    gap_ref: "OPP-1"

  - id: "CHECK-3"
    category: "Reuse-First"
    status: "PASS"
    finding: >
      The story explicitly identifies the correct reuse targets:
      - Upsert pattern: kb_upsert_plan (plan-operations.ts) — confirmed present and
        uses Drizzle onConflictDoUpdate. The partial-merge set clause is a novel
        extension of that pattern, not a direct copy.
      - Handler pattern: handleKbUpsertPlan (tool-handlers.ts lines 4398–4432) —
        confirmed present with correct structure.
      - Schema pattern: KbUpdateStoryInputSchema — confirmed present.
      - Tool definition pattern: kbGetStoryToolDefinition — confirmed present.
      - Test setup: test-helpers.ts — confirmed present (though story-specific fixtures
        will need to be added).
      No new dependencies required. Drizzle-orm, zod, @repo/logger already available.
    resolution_required: false

  - id: "CHECK-4"
    category: "Ports and Adapters"
    status: "PASS"
    finding: >
      The MCP server is stdio-based (not HTTP). The story correctly identifies no
      HTTP endpoints, no APIGW changes, and no frontend surfaces. The CRUD operation
      functions (story-crud-operations.ts) are transport-agnostic — they accept typed
      inputs and return typed results without any MCP-layer coupling. The handler layer
      (tool-handlers.ts) is the only MCP-aware layer. Architecture is correctly layered.
      ADR-006 (no E2E) is correctly applied. No ports-and-adapters violations.
    resolution_required: false

  - id: "CHECK-5"
    category: "Local Testability"
    status: "PASS"
    finding: >
      The test plan is exceptionally detailed: 6 happy-path tests (HP-1 through HP-6),
      4 error cases (EC-1 through EC-4), and 4 edge cases (ED-1 through ED-4). Each
      test specifies setup, action, expected result, and evidence. The partial-merge
      clobber guard (ED-1) is correctly flagged as the highest-value test. The test
      strategy (unit + integration, real DB at port 5433) is consistent with ADR-005.
      The prerequisite check (verify content columns exist via information_schema.columns
      before running integration tests) is a concrete and executable guard.
      The story correctly notes that story-crud-operations.test.ts does not yet exist
      and must be created in ST-5. All ACs are covered by test scenarios.
    resolution_required: false

  - id: "CHECK-6"
    category: "Decision Completeness"
    status: "WARN"
    finding: >
      One TBD identified that is non-blocking but should be confirmed before implementation:

      The story states "Confirm exact column types from KFMB-1010 migration before
      writing content field Zod schemas." KFMB-1010 story.yaml DEC-2 has resolved this:
      acceptance_criteria = jsonb, non_goals = text[], packages = text[]. However,
      these types are for kbar.stories (packages/backend/database-schema). The KB-internal
