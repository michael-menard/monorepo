      AC-5 (ST-2), AC-6 (ST-3, ST-4), AC-7 (ST-5), AC-8 (ST-5). Full coverage confirmed.
      ST-2 is marked as parallel with ST-1 (correct — both touch story-crud-operations.ts
      but at different schema objects; can be done sequentially in same pass).
      ST-5 depends on ST-2 rather than ST-4 — this is correct since tests exercise CRUD
      layer directly and don't require the MCP handler layer to exist.
      Minor: ST-1 and ST-2 both modify story-crud-operations.ts but are listed as
      parallel. In practice, they should be done in sequence within the same file edit.
      This is an organizational note, not a blocker.
      CRITICAL: ST-1 mentions reading "db/schema.ts" but does not explicitly list it
      in "files to modify." The schema.ts update is implied by the need for content
      columns to exist in the Drizzle type system. See GAP-1.
    resolution_required: false
    gap_ref: "GAP-1"

# ============================================================================
# MVP-CRITICAL GAPS (blocks implementation start or core user journey)
# ============================================================================

gaps:

  - id: "GAP-1"
    severity: "BLOCKER"
    title: "KB-internal stories schema (schema.ts) must be updated but is not listed as a change surface"
    detail: >
      KFMB-1010 adds content columns (acceptance_criteria, non_goals, packages) to
      kbar.stories in packages/backend/database-schema/src/schema/kbar.ts. This is the
      KBAR application-level schema managed by the shared database-schema package and
      applied via Aurora migrations.

      KFMB-1020 implements kb_create_story in apps/api/knowledge-base, which uses a
      SEPARATE stories table defined in apps/api/knowledge-base/src/db/schema.ts.
      Inspection of that file (lines 603–706) confirms this stories table has NO
      content columns: description, acceptance_criteria, non_goals, and packages are
      all ABSENT.

      For the content fields to work in the MCP layer:
        1. The Drizzle schema definition in apps/api/knowledge-base/src/db/schema.ts
           must be updated to add the three new columns (acceptance_criteria, non_goals,
           packages). Without this, stories.$inferInsert and stories.$inferSelect will
           not include these fields, causing TypeScript errors and/or silent data loss.
        2. A corresponding migration for the knowledge-base Lambda's Aurora connection
           must be applied (or this is the same Aurora DB with a shared stories table,
           in which case it's the same migration — but the schema.ts must still be
           updated for the Drizzle ORM layer to recognize the columns).

      Note: The knowledge-base schema.ts also already has a description field ABSENT
      from the stories table (unlike kbar.ts which has description). So the story's
      AC-3 ("kb_create_story accepts... description") may require adding description
      to schema.ts as well, or clarifying that description is not a content column
      in this context.

      The story's change_surface lists only 5 files, none of which is schema.ts.
      Without this update, pnpm check-types will fail on the content field references.

    required_action: >
      Add apps/api/knowledge-base/src/db/schema.ts to the change_surface list.
      Clarify whether the knowledge-base stories table is the SAME Aurora DB table
      as the one KFMB-1010 migrates, or a separate table. If the same table, schema.ts
      must be updated to match the new columns added by KFMB-1010. If a separate table,
      a separate migration must also be planned.
      Confirm whether 'description' column should also be added to schema.ts for
      consistency with AC-3.
    owner: "story-author"
    decision: "add_ac"
    resolution: "Added AC-9 to story: KB-internal Drizzle schema must include content columns. Auto-resolved by autonomous elaboration."
    ac_added: "AC-9: KB-internal Drizzle schema (schema.ts) updated with content columns matching KFMB-1010"

