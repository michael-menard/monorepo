    title: "Clarify the 'Three-place registration rule' header (says 3, lists 4)"
    detail: >
      The Architecture Notes section header says "Three-place registration rule" but
      enumerates four required registration points. The header should be updated to
      "Four-place registration rule" to match the actual requirement. Minor documentation
      inconsistency with no implementation impact.
    effort: "trivial"
    decision: "log_to_kb"
    kb_entry_id: "327baec7-f13e-49f0-9714-3bbc635c832f"

  - id: "OPP-2"
    title: "KbGetStoryResultSchema uses z.custom<> — verify content fields surface to callers"
    detail: >
      KbGetStoryResultSchema wraps the story type as z.custom<typeof stories.$inferSelect>().
      Once schema.ts gains the new columns, stories.$inferSelect will include them and
      they will flow through. However, if the schema wrapper is used for validation or
      serialization, callers should verify the content fields actually appear in
      responses. The test HP-3 (content field round-trip) and HP-5 (null content fields)
      cover this behaviorally, but an explicit type assertion in the test would increase
      confidence.
    effort: "low"
    decision: "log_to_kb"
    kb_entry_id: "54d903f7-1a38-4d9b-bd64-9945f1bf74a9"

  - id: "OPP-3"
    title: "ST-1 and ST-2 both modify story-crud-operations.ts — consider combining into one subtask"
    detail: >
      ST-1 adds KbCreateStoryInputSchema and kb_create_story function. ST-2 extends
      KbUpdateStoryInputSchema and kb_update_story. Both target the same file. Combining
      them would avoid two separate file-read passes, but the current decomposition
      is still valid as they cover different ACs (AC-1/2/3 vs AC-4/5). No action required
      unless the implementer finds the split confusing.
    effort: "trivial"
    decision: "log_to_kb"
    kb_entry_id: "7b346b70-2a0a-43c7-8df2-a55afe1222ff"

  - id: "OPP-4"
    title: "Access control test (HP-6) may need role-injection utilities not yet in test-helpers.ts"
    detail: >
      HP-6 requires calling kb_create_story with each role in ACCESS_MATRIX. The
      existing test-helpers.ts provides embedding client mocks and task/work-state
      fixtures but no role injection or MCP context construction utilities. The
      implementer will need to add story-specific test fixtures and either add
      role injection helpers to test-helpers.ts or implement them inline in
      story-crud-operations.test.ts. Since MCP tool handlers (not CRUD ops) enforce
      authorization, HP-6 may need to test at the handler level rather than the
      CRUD level. This is a test-design note, not a blocker.
    effort: "low"
    decision: "log_to_kb"
    kb_entry_id: "73399870-b988-4342-868f-682d40ce408b"

