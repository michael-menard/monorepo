architectural_decisions: []
complexity: moderate
notes:
  - >-
    KFMB-1010 dependency: its checkpoint shows current_phase='plan' — migration NOT yet applied to Aurora. Integration
    tests in ST-5 that require the real DB (port 5433) will fail until KFMB-1010 migration is applied. ST-5 should
    include an information_schema pre-check guard and tests may need to be skipped/xfailed until migration is live.
  - >-
    Column types for KB-internal schema.ts (per KFMB-1010 ELAB DEC-2 and KFMB-1020 ELAB GAP-1 resolution): description =
    text().nullable(), acceptance_criteria = jsonb().nullable(), non_goals = text('non_goals').array().nullable(),
    packages = text('packages').array().nullable()
  - >-
    Partial-merge pattern: build setFields dynamically — only include fields where input value !== undefined. Do NOT
    copy kb_upsert_plan's always-write-all-fields approach.
  - >-
    created flag: pre-existence check pattern (findFirst before upsert, created = existing === undefined) is superior to
    timestamp comparison used in kb_upsert_plan.
  - >-
    ST-1 and ST-2 both modify story-crud-operations.ts — implement sequentially in one file edit pass (OPP-3 from ELAB —
    combining is acceptable).
  - >-
    HP-6 (access control test): authorization is enforced at the handler layer (tool-handlers.ts), not the CRUD layer.
    Test at handler level using enforceAuthorization context mocking, or verify via access-control.ts unit test.
  - 'New test file must be CREATED (does not exist): __tests__/story-crud-operations.test.ts'
  - >-
    The `description` field: kbar.ts already has it, but KB-internal schema.ts does NOT. AC-3 explicitly includes
    description as an accepted field, so it must be added to schema.ts along with the other three columns.
