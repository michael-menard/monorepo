architectural_decisions:
  - id: ARCH-001
    question: >-
      Migration file naming: story specifies 017_pm_artifact_types.sql but 017 and 018 are already taken in the codebase
      (017_add_plan_dependencies.sql, 017_change_telemetry_experiment_fk.sql, 018_add_parent_plan.sql)
    decision: Use 019_pm_artifact_types.sql — next available sequence number in the migrations directory
    rationale: >-
      The story's Reality Baseline was written against an older codebase state. The codebase has since added migrations
      017 (x2) and 018. Using 019 avoids filename collision. The migration approach is unchanged — purely additive 4
      CREATE TABLE statements.
    decided_by: auto
    autonomy_tier: 1
    autonomy_level: aggressive
