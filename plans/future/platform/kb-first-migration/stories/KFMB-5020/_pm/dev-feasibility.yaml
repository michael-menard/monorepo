feasible: true
confidence: high
rationale: >
  All changes are text edits to .claude/agents/*.md markdown files. No TypeScript compilation,
  no npm changes, no database migrations, no API changes. The kb_read_artifact MCP tool is
  already available and in production use (dev-execute-leader, qa-verify-verification-leader
  demonstrate the pattern). The migration is mechanical: replace filesystem Read() calls with
  kb_read_artifact() calls and update frontmatter. Main risk is completeness (missing an agent),
  not technical feasibility.
complexity: medium
change_surface:
  areas:
    - ".claude/agents/ (19 agent markdown files)"
    - ".claude/agents/_shared/kb-integration.md (reference only, not modified)"
  endpoints: []
  deploy_touchpoints:
    - "KFMB-5010 must be complete before this story is implemented (writer agents must exist before readers can switch to KB-only reads)"

risks:
  - finding: "Hard dependency on KFMB-5010 — reader migration before writer migration causes kb_read_artifact to return null silently"
    mitigation: "Do not begin implementation until KFMB-5010 is in ready-for-qa or complete status. Story.yaml lists KFMB-5010 as depends_on."
  - finding: "Incorrect artifact_type string mapping — ELAB.yaml → 'analysis', not 'elab'; QA-VERIFY.yaml → 'verification'; KNOWLEDGE-CONTEXT.yaml → 'context'"
    mitigation: "Use _shared/kb-integration.md artifact type reference table as the authoritative checklist for every agent migration"
  - finding: "Agents that both read AND write (dev-verification-leader reads scope/checkpoint, also writes checkpoint in fix mode) — read-side scoped to this story, write-side to KFMB-5010"
    mitigation: "Coordinate with KFMB-5010 to avoid double-counting. KFMB-5020 covers only the read calls; write calls remain KFMB-5010 scope."

missing_requirements: []

evidence_expectations:
  - "grep count of _implementation/CHECKPOINT|EVIDENCE|ELAB|SCOPE|PLAN|REVIEW in .claude/agents/ = 0 after migration (excluding agents not in scope)"
  - "All 19 migrated agent files have kb_read_artifact in frontmatter kb_tools"
  - "AC-9 smoke test passes with a real or fixture KB story_id (requires KFMB-5010 or test fixture)"

subtasks:
  - id: ST-1
    title: "Migrate high-traffic reader agents: dev-verification-leader, qa-verify-setup-leader"
    goal: "Update the two highest-traffic reader agents (AC-1 and AC-2) to use kb_read_artifact"
    files_to_read:
      - ".claude/agents/dev-verification-leader.agent.md"
      - ".claude/agents/qa-verify-setup-leader.agent.md"
      - ".claude/agents/_shared/kb-integration.md"
    files_to_modify:
      - ".claude/agents/dev-verification-leader.agent.md"
      - ".claude/agents/qa-verify-setup-leader.agent.md"
    acs: ["AC-1", "AC-2"]
    depends_on: "none"
    verification: "grep -c 'kb_read_artifact' .claude/agents/dev-verification-leader.agent.md && grep -c 'kb_read_artifact' .claude/agents/qa-verify-setup-leader.agent.md"
    estimated_tokens: 6000

  - id: ST-2
    title: "Migrate elab reader agents: elab-completion-leader, elab-autonomous-decider"
    goal: "Replace _implementation/ELAB.yaml reads with kb_read_artifact({ artifact_type: 'analysis' }) (AC-3 and AC-4)"
    files_to_read:
      - ".claude/agents/elab-completion-leader.agent.md"
      - ".claude/agents/elab-autonomous-decider.agent.md"
      - ".claude/agents/_shared/kb-integration.md"
    files_to_modify:
      - ".claude/agents/elab-completion-leader.agent.md"
      - ".claude/agents/elab-autonomous-decider.agent.md"
    acs: ["AC-3", "AC-4"]
    depends_on: "none"
    verification: "grep 'artifact_type.*analysis' .claude/agents/elab-completion-leader.agent.md && grep 'artifact_type.*analysis' .claude/agents/elab-autonomous-decider.agent.md"
    estimated_tokens: 5000

  - id: ST-3
    title: "Migrate evidence-judge reader agent"
    goal: "Replace {story_dir}/_implementation/EVIDENCE.yaml read with kb_read_artifact({ artifact_type: 'evidence' }) (AC-5)"
    files_to_read:
      - ".claude/agents/evidence-judge.agent.md"
      - ".claude/agents/_shared/kb-integration.md"
    files_to_modify:
      - ".claude/agents/evidence-judge.agent.md"
    acs: ["AC-5"]
    depends_on: "none"
    verification: "grep 'kb_read_artifact' .claude/agents/evidence-judge.agent.md"
    estimated_tokens: 3000

  - id: ST-4
    title: "Migrate batch reader agents — dev-fix-fix-leader, dev-documentation-leader, elab-delta-review-agent, elab-escape-hatch-agent, architect-story-review"
    goal: "Update 5 of the 14 batch agents (AC-6, first half) to read via kb_read_artifact"
    files_to_read:
      - ".claude/agents/dev-fix-fix-leader.agent.md"
      - ".claude/agents/dev-documentation-leader.agent.md"
      - ".claude/agents/elab-delta-review-agent.agent.md"
      - ".claude/agents/elab-escape-hatch-agent.agent.md"
      - ".claude/agents/architect-story-review.agent.md"
      - ".claude/agents/_shared/kb-integration.md"
    files_to_modify:
      - ".claude/agents/dev-fix-fix-leader.agent.md"
      - ".claude/agents/dev-documentation-leader.agent.md"
      - ".claude/agents/elab-delta-review-agent.agent.md"
      - ".claude/agents/elab-escape-hatch-agent.agent.md"
      - ".claude/agents/architect-story-review.agent.md"
    acs: ["AC-6", "AC-7", "AC-8"]
    depends_on: "none"
    verification: "for f in dev-fix-fix-leader dev-documentation-leader elab-delta-review-agent elab-escape-hatch-agent architect-story-review; do grep -l 'kb_read_artifact' .claude/agents/$f.agent.md; done"
    estimated_tokens: 10000

  - id: ST-5
    title: "Migrate batch reader agents — pm-story-followup-leader, pm-story-split-leader, ui-ux-review-setup-leader, workflow-retro, reality-intake-collector"
    goal: "Update 5 more batch agents (AC-6, second batch) to read via kb_read_artifact"
    files_to_read:
      - ".claude/agents/pm-story-followup-leader.agent.md"
      - ".claude/agents/pm-story-split-leader.agent.md"
      - ".claude/agents/ui-ux-review-setup-leader.agent.md"
      - ".claude/agents/workflow-retro.agent.md"
      - ".claude/agents/reality-intake-collector.agent.md"
      - ".claude/agents/_shared/kb-integration.md"
    files_to_modify:
      - ".claude/agents/pm-story-followup-leader.agent.md"
      - ".claude/agents/pm-story-split-leader.agent.md"
      - ".claude/agents/ui-ux-review-setup-leader.agent.md"
      - ".claude/agents/workflow-retro.agent.md"
      - ".claude/agents/reality-intake-collector.agent.md"
    acs: ["AC-6", "AC-7", "AC-8"]
    depends_on: "none"
    verification: "for f in pm-story-followup-leader pm-story-split-leader ui-ux-review-setup-leader workflow-retro reality-intake-collector; do grep -l 'kb_read_artifact' .claude/agents/$f.agent.md; done"
    estimated_tokens: 10000

  - id: ST-6
    title: "Migrate metrics reader agents — leakage-metrics-agent, turn-count-metrics-agent, pcar-metrics-agent, churn-index-metrics-agent"
    goal: "Update 4 metrics agents (AC-6, final batch) to read via kb_read_artifact"
    files_to_read:
      - ".claude/agents/leakage-metrics-agent.agent.md"
      - ".claude/agents/turn-count-metrics-agent.agent.md"
      - ".claude/agents/pcar-metrics-agent.agent.md"
      - ".claude/agents/churn-index-metrics-agent.agent.md"
      - ".claude/agents/_shared/kb-integration.md"
    files_to_modify:
      - ".claude/agents/leakage-metrics-agent.agent.md"
      - ".claude/agents/turn-count-metrics-agent.agent.md"
      - ".claude/agents/pcar-metrics-agent.agent.md"
      - ".claude/agents/churn-index-metrics-agent.agent.md"
    acs: ["AC-6", "AC-7", "AC-8"]
    depends_on: "none"
    verification: "for f in leakage-metrics-agent turn-count-metrics-agent pcar-metrics-agent churn-index-metrics-agent; do grep -l 'kb_read_artifact' .claude/agents/$f.agent.md; done"
    estimated_tokens: 8000

  - id: ST-7
    title: "AC-9 smoke test and regression grep"
    goal: "Verify all migrated agents have kb_read_artifact in frontmatter and no deprecated paths remain; run smoke test with KB fixture"
    files_to_read:
      - "All 19 migrated .claude/agents/*.agent.md files"
    files_to_modify: []
    acs: ["AC-7", "AC-8", "AC-9"]
    depends_on: "ST-6"
    verification: >
      grep -rL 'kb_read_artifact' .claude/agents/dev-verification-leader.agent.md
      .claude/agents/qa-verify-setup-leader.agent.md [... all 19 files] | wc -l  # should be 0
      &&
      grep -rl '_implementation/CHECKPOINT\|_implementation/EVIDENCE\|_implementation/ELAB\|_implementation/SCOPE\|_implementation/PLAN\|_implementation/REVIEW'
      .claude/agents/ --include='*.md' | wc -l  # should be 0 for migrated files
    estimated_tokens: 4000
