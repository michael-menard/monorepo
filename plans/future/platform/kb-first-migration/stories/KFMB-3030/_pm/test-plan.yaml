strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  scripts_touched:
    - scripts/lib/resolve-plan.sh
    - scripts/generate-stories.sh
    - scripts/implement-stories.sh
    - scripts/implement-dispatcher.sh
    - scripts/sync-work-order.py

happy_path_tests:
  - id: HP-1
    title: "discover_stories() succeeds when only KB is available (no stories.index.md)"
    setup: |
      1. Have a plan registered in KB (e.g., kb-first-migration with prefix KFMB).
      2. Temporarily rename or remove stories.index.md from FEATURE_DIR.
      3. Set STORY_PREFIX=KFMB and FEATURE_DIR to the plan directory.
    action: "Source scripts/lib/resolve-plan.sh; call discover_stories; inspect DISCOVERED_STORIES array."
    expected: "DISCOVERED_STORIES is populated with story IDs from KB. Exit code 0."
    evidence: "echo ${DISCOVERED_STORIES[@]} prints at least one KFMB-XXXX entry."
  - id: HP-2
    title: "generate-stories.sh --dry-run succeeds with no stories.index.md"
    setup: "Plan registered in KB. Remove stories.index.md from plan directory."
    action: "./scripts/generate-stories.sh kb-first-migration --dry-run"
    expected: "Script prints story commands for each KFMB story. No errors. Exit code 0."
    evidence: "Dry-run output lists KFMB story IDs discovered from KB."
  - id: HP-3
    title: "implement-stories.sh --dry-run succeeds with no stories.index.md"
    setup: "Same as HP-2."
    action: "./scripts/implement-stories.sh kb-first-migration --dry-run"
    expected: "Script prints impl commands for eligible stories. No errors. Exit code 0."
    evidence: "Dry-run output shows story IDs from KB."
  - id: HP-4
    title: "implement-dispatcher.sh sources resolve-plan.sh and discovers stories from KB"
    setup: "Plan registered in KB. Remove stories.index.md."
    action: "./scripts/implement-dispatcher.sh kb-first-migration --dry-run"
    expected: "Script resolves plan via resolve-plan.sh, discovers stories via discover_stories(). No inline grep of stories.index.md. Exit code 0."
    evidence: "Dry-run output shows story IDs. No 'Error: No stories.index.md found' message."
  - id: HP-5
    title: "sync-work-order.py returns story status from KB when stories.index.md is absent"
    setup: "Plan registered in KB with story status entries. Remove or rename stories.index.md."
    action: "Run one cycle of scripts/sync-work-order.py plans/future/platform/kb-first-migration (or equivalent) and observe status output."
    expected: "Status map includes KFMB story IDs with correct stages from KB. No FileNotFoundError."
    evidence: "stdout/stderr shows story statuses derived from KB, not empty."
  - id: HP-6
    title: "Backward compatibility: all scripts work when stories.index.md IS present"
    setup: "Plan has stories.index.md. KB also has plan registered."
    action: "Run ./scripts/generate-stories.sh kb-first-migration --dry-run with index present."
    expected: "Script continues to work. KB is used as primary; index can coexist."
    evidence: "Dry-run output matches expected story list. No regressions."

error_cases:
  - id: EC-1
    title: "discover_stories() fails with descriptive error when KB unreachable and no stories.index.md"
    setup: "Remove stories.index.md. KB is unavailable (e.g., MCP server not running)."
    action: "Source resolve-plan.sh; call discover_stories."
    expected: "Script exits non-zero with a descriptive error message (e.g., 'Error: No stories found for prefix KFMB in KB'). No silent fallback to stale data."
    evidence: "stderr contains a clear error. Exit code non-zero."
  - id: EC-2
    title: "generate-stories.sh exits cleanly with helpful error when KB down and no index"
    setup: "Remove stories.index.md. KB unreachable."
    action: "./scripts/generate-stories.sh kb-first-migration --dry-run"
    expected: "Exits non-zero with message indicating KB is unavailable. No hang."
    evidence: "stderr message. Non-zero exit code."
  - id: EC-3
    title: "implement-dispatcher.sh exits cleanly when KB down and no index"
    setup: "Remove stories.index.md. KB unreachable."
    action: "./scripts/implement-dispatcher.sh kb-first-migration --dry-run"
    expected: "Exits non-zero with descriptive KB error message. Does not crash with grep error."
    evidence: "stderr message. Non-zero exit code."
  - id: EC-4
    title: "sync-work-order.py handles KB unavailability gracefully"
    setup: "Remove stories.index.md. KB unreachable."
    action: "Run one cycle of sync-work-order.py."
    expected: "Either exits with clear error OR logs warning and continues with only directory-scan data (directory scan must still work)."
    evidence: "No unhandled Python exception. Script behavior is documented and predictable."

edge_cases:
  - id: ED-1
    title: "KB returns empty story list for prefix"
    setup: "Plan exists in KB but has zero story entries."
    action: "Source resolve-plan.sh; call discover_stories."
    expected: "Exit with 'Error: No stories found for prefix X in KB' — does not return empty array silently."
    evidence: "Non-zero exit with descriptive message."
  - id: ED-2
    title: "KB returns malformed JSON from kb_list_stories"
    setup: "Simulate claude -p returning invalid JSON."
    action: "Source resolve-plan.sh; call discover_stories."
    expected: "Script handles jq parse failure gracefully — exits with error rather than silently producing empty list."
    evidence: "Non-zero exit code. Error message referencing KB/JSON issue."
  - id: ED-3
    title: "implement-dispatcher.sh --only flag still works after refactor"
    setup: "Plan in KB. Use --only KFMB-3010 flag."
    action: "./scripts/implement-dispatcher.sh kb-first-migration --only KFMB-3010 --dry-run"
    expected: "Only KFMB-3010 is dispatched. No regression from dispatcher refactor."
    evidence: "Dry-run output contains only KFMB-3010."
  - id: ED-4
    title: "sync-work-order.py directory scan and PROOF-*.md scan unaffected"
    setup: "Plan with stage directories populated. stories.index.md absent."
    action: "Run one cycle of sync-work-order.py."
    expected: "Status map still populated from directory scan. PROOF-*.md scan still marks completed stories."
    evidence: "Status output reflects directory-based stages correctly."

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "discover_stories() DISCOVERED_STORIES array non-empty when KB available"
      - "Exit code 0 for all happy path dry-runs"
      - "Exit code non-zero with descriptive error when KB unavailable and no index"
      - "No grep of stories.index.md in implement-dispatcher.sh functional paths after refactor"

manual_cases:
  - id: MC-1
    title: "End-to-end smoke test: generate-stories.sh against plan with no stories.index.md"
    steps:
      - "Register kb-first-migration plan in KB (if not already registered)"
      - "Rename plans/future/platform/kb-first-migration/stories.index.md to stories.index.md.bak"
      - "Run: ./scripts/generate-stories.sh kb-first-migration --dry-run"
      - "Verify: output lists KFMB story IDs discovered from KB"
      - "Restore: mv stories.index.md.bak stories.index.md"
    expected: "All KFMB stories discovered from KB. Dry-run output matches known story list."
  - id: MC-2
    title: "One-cycle smoke test: sync-work-order.py with KB as story status source"
    steps:
      - "Ensure KB has current story statuses for kb-first-migration"
      - "Rename stories.index.md to .bak"
      - "Run: python3 scripts/sync-work-order.py plans/future/platform/kb-first-migration"
      - "Verify: status map populated from KB + directory scan"
      - "Restore: mv stories.index.md.bak stories.index.md"
    expected: "Story statuses shown correctly. No errors. No reference to missing index file."

fixture_definitions:
  - name: "kb-first-migration plan in KB"
    type: "KB plan record"
    description: "Plan slug 'kb-first-migration' registered via kb_get_plan. Story prefix KFMB. All KFMB stories registered in stories table."
  - name: "KB unreachable simulation"
    type: "environment"
    description: "MCP knowledge-base server stopped or ALLOWED_TOOLS excludes kb_list_stories to simulate KB unavailability during tests."

risks:
  - "sync-work-order.py does not support --dry-run, so error-path testing requires real KB or careful mock. ADR-005 requires real KB for UAT."
  - "KB query latency (2-5s per claude -p call) means full test cycles are slow. Tests should be designed to minimize KB round-trips."
  - "implement-dispatcher.sh refactor is the highest-risk change; regression tests for --only, --parallel, and stage discovery are critical."
  - "Backward compatibility (stories.index.md present) must be verified before merge to avoid breaking active plans that still have the index file."
