feasible: true
confidence: high
rationale: |
  The primary implementation path is already partially built. scripts/lib/resolve-plan.sh has a
  KB-only branch in discover_stories() that only activates when stories.index.md is absent. The
  work is to promote that branch to the primary path (making KB the default) and demote the
  filesystem branch. resolve_plan() already demonstrates the exact KB-first + filesystem-fallback
  pattern. The main complexity lies in (1) refactoring implement-dispatcher.sh, which has its own
  standalone story discovery logic instead of sourcing resolve-plan.sh, and (2) replacing
  scan_index_file() in sync-work-order.py with a KB query mechanism compatible with Python without
  introducing excessive latency.
complexity: medium
change_surface:
  areas:
    - scripts/lib/resolve-plan.sh (promote KB branch in discover_stories to primary)
    - scripts/implement-dispatcher.sh (source resolve-plan.sh, remove inline grep/sed story parsing)
    - scripts/sync-work-order.py (replace scan_index_file() with KB query; update discover_files())
    - scripts/generate-stories.sh (verify no direct stories.index.md reads — likely zero changes needed)
    - scripts/implement-stories.sh (verify no direct stories.index.md reads — likely zero changes needed)
  endpoints: []
  deploy_touchpoints:
    - "No deployment — script-only changes; runnable locally and in CI"

risks:
  - finding: "sync-work-order.py KB query latency: each claude -p subprocess call takes 2–5 seconds"
    mitigation: |
      Cache the KB story-status query once at startup (before the polling loop begins) and refresh
      on a longer interval (e.g., every 5 cycles) rather than per-cycle. The existing
      scan_index_file() is already called once per cycle, so a cached startup query + periodic
      refresh is a drop-in replacement with acceptable latency characteristics.
  - finding: "implement-dispatcher.sh does not source resolve-plan.sh — refactor changes script structure significantly"
    mitigation: |
      Refactor to source scripts/lib/resolve-plan.sh at the top of implement-dispatcher.sh (after
      the arg-parsing block but before the story discovery block). Replace the inline STORY_PREFIX
      sed extraction and ALL_STORIES grep loop with calls to resolve_plan() and discover_stories().
      The --only filter and all post-discovery logic remain unchanged. This is a contained refactor
      affecting lines 69–150 only.
  - finding: "Removing filesystem fallback from discover_stories() before KFMB-3010 completes may cause stories to be missing from KB"
    mitigation: |
      Retain the filesystem fallback in discover_stories() in this story. The filesystem branch
      stays but is demoted to a secondary path (tried only when KB query returns empty or fails).
      Full fallback removal is a follow-on step scoped to KFMB-3010 completion.

missing_requirements: []

evidence_expectations:
  - "dry-run of generate-stories.sh against plan with no stories.index.md returns story list"
  - "dry-run of implement-stories.sh against plan with no stories.index.md returns story list"
  - "dry-run of implement-dispatcher.sh against plan with no stories.index.md completes without error"
  - "grep of implement-dispatcher.sh shows no 'stories.index.md' in functional code paths (not comments)"
  - "sync-work-order.py one-cycle smoke test against live KB returns story statuses"

subtasks:
  - id: ST-1
    title: "Promote KB branch in resolve-plan.sh discover_stories() to primary path"
    goal: |
      Make kb_list_stories the first-tried path in discover_stories(). Retain filesystem branch as
      secondary (tried when KB query fails or returns empty), NOT as the default. This satisfies
      AC-1 and enables AC-2, AC-3 transitively.
    files_to_read:
      - scripts/lib/resolve-plan.sh
    files_to_modify:
      - scripts/lib/resolve-plan.sh
    acs: ["AC-1", "AC-6"]
    depends_on: none
    verification: |
      Source scripts/lib/resolve-plan.sh; set STORY_PREFIX=KFMB; set FEATURE_DIR to a path with
      no stories.index.md; call discover_stories; verify DISCOVERED_STORIES is populated from KB.
      Also test error path: KB unavailable, no index → clean error exit.
    estimated_tokens: 6000

  - id: ST-2
    title: "Verify generate-stories.sh and implement-stories.sh have no direct stories.index.md reads"
    goal: |
      Audit and confirm (or fix) that generate-stories.sh and implement-stories.sh have no
      functional-path reads of stories.index.md beyond what's already delegated to resolve-plan.sh.
      Both scripts already source resolve-plan.sh and call discover_stories — this task confirms
      no additional direct file reads exist. Satisfies AC-2 and AC-3.
    files_to_read:
      - scripts/generate-stories.sh
      - scripts/implement-stories.sh
    files_to_modify:
      - scripts/generate-stories.sh
      - scripts/implement-stories.sh
    acs: ["AC-2", "AC-3", "AC-7"]
    depends_on: ST-1
    verification: |
      grep -n 'stories.index.md' scripts/generate-stories.sh scripts/implement-stories.sh
      (only comments should remain). Run dry-run against plan with no index file.
    estimated_tokens: 3000

  - id: ST-3
    title: "Refactor implement-dispatcher.sh to source resolve-plan.sh"
    goal: |
      Remove the inline plan resolution (grep for **Plan Slug**) and story discovery loop
      (STORY_PREFIX sed + grep ALL_STORIES) from implement-dispatcher.sh. Replace with:
        source "$(dirname "$0")/lib/resolve-plan.sh"
        resolve_plan "$PLAN_SLUG"
        discover_stories
      Update error handling to reflect KB-sourced story list. The --only, --parallel, --poll,
      and all post-discovery logic remain unchanged. Satisfies AC-4.
    files_to_read:
      - scripts/implement-dispatcher.sh
      - scripts/lib/resolve-plan.sh
    files_to_modify:
      - scripts/implement-dispatcher.sh
    acs: ["AC-4", "AC-6"]
    depends_on: ST-1
    verification: |
      grep -n 'stories.index.md' scripts/implement-dispatcher.sh (only in comments/error messages
      if any). Run: ./scripts/implement-dispatcher.sh kb-first-migration --dry-run against plan
      with no index. Confirm story list populated from KB.
    estimated_tokens: 8000

  - id: ST-4
    title: "Replace scan_index_file() in sync-work-order.py with KB query"
    goal: |
      Update scripts/sync-work-order.py:
      1. Replace scan_index_file() body with a subprocess call to claude -p using kb_list_stories
         (or an equivalent KB query) to retrieve story status from KB. Cache result at startup;
         refresh every N cycles rather than per-cycle to avoid latency accumulation.
      2. Update discover_files() to not search for *stories.index.md — remove that glob; the
         function should only discover the work order file. Index file discovery is no longer needed.
      3. Preserve all existing directory scan (scan_directories()) and PROOF-*.md scan
         (scan_proof_files()) logic completely unchanged.
      Satisfies AC-5.
    files_to_read:
      - scripts/sync-work-order.py
    files_to_modify:
      - scripts/sync-work-order.py
    acs: ["AC-5", "AC-6"]
    depends_on: ST-1
    verification: |
      Manual smoke test: run one cycle of sync-work-order.py against kb-first-migration plan with
      stories.index.md absent. Status map populated from KB + directory scan. No Python exceptions.
    estimated_tokens: 10000

  - id: ST-5
    title: "Dry-run backward compatibility verification across all five scripts"
    goal: |
      Execute dry-run tests for all four shell scripts against a plan that still has
      stories.index.md present to confirm no regressions. Document results. Satisfies AC-7 and AC-8.
    files_to_read:
      - scripts/generate-stories.sh
      - scripts/implement-stories.sh
      - scripts/implement-dispatcher.sh
      - scripts/lib/resolve-plan.sh
    files_to_modify: []
    acs: ["AC-7", "AC-8"]
    depends_on: ST-4
    verification: |
      ./scripts/generate-stories.sh kb-first-migration --dry-run (with index present) → success.
      ./scripts/implement-stories.sh kb-first-migration --dry-run (with index present) → success.
      ./scripts/implement-dispatcher.sh kb-first-migration --dry-run (with index present) → success.
      ./scripts/generate-stories.sh kb-first-migration --dry-run (with index REMOVED) → success (AC-8).
    estimated_tokens: 4000
