gaps:
  - id: GAP-1
    title: "sync-work-order.py check_untracked_stories() becomes silent no-op after index removal"
    severity: low
    blocking: false
    description: >
      After ST-4 removes the *stories.index.md glob from discover_files(), the index_file variable
      will always be None for plans that have no stories.index.md. The check_untracked_stories()
      function (line 732) and scan_all_index_stories() function (line 688) are guarded by
      'if not index_file: return stories/[]' so they silently become no-ops — no crash, but the
      untracked-story warning feature is silently disabled. AC-5 says to remove *stories.index.md
      from discover_files() but does not explicitly address whether check_untracked_stories() should
      be updated, converted to a KB query, or documented as intentionally dormant until KFMB-6020.
    recommendation: >
      ST-4 should explicitly note that check_untracked_stories() and scan_all_index_stories() will
      become no-ops and this is intentional (deferred to KFMB-6020 dead code removal). A comment
      in the code or a note in ST-4's verification instructions would prevent ambiguity during
      code review. This is low severity since the graceful no-op is safe and the behavior is
      consistent with the story's non-goals (no write-path changes).
    decision: log_to_kb
    kb_entry_id: "1ef272ff-9648-4c45-82e2-c616f466df4c"

