        execution, or ST-3 must be removed from this story's scope and fully
        delegated to KFMB-6030.
      affected_acs: [AC-3]
      affected_subtasks: [ST-3]
      resolution: >
        Create KFMB-6030 story for agent Output section cleanup before executing
        ST-3. Update this story's Scope section to make AC-3/ST-3 conditional on
        KFMB-6030 assessment or remove ST-3 entirely from this story. The AC-3
        split gate is already specified — the pre-audit finding confirms it fires.

    - id: GAP-2
      title: "implement-dispatcher.sh contains functional filesystem references, not just comments"
      severity: medium
      type: scope_underspecification
      description: >
        The story classifies implement-dispatcher.sh as "Files to audit (scope TBD
        by AC-1)" with the implication that only comments/docstrings may need
        updating. However, static analysis shows implement-dispatcher.sh contains
        functional filesystem logic: line 82 exits with error if stories.index.md
        does not exist, line 83 errors if no stories.index.md found, lines 136/138/145/148
        read stories.index.md for prefix and story list, and line 180/454 check
        _implementation/ directory existence for workflow state detection.

        These are not comments — they are functional code. The story's Non-goal
        explicitly states "Do not modify any functional logic in shell or Python
        scripts — only comments and docstrings." This creates a direct conflict:
        implement-dispatcher.sh has dead functional code that cannot be cleaned
        up under this story's constraints.

        Resolution options:
        (a) Explicitly acknowledge implement-dispatcher.sh functional cleanup is
            out of scope — documenting it as a future story (KFMB-6030 or new KFMB-6040).
        (b) Expand scope to include functional cleanup of implement-dispatcher.sh
            (would require updating dev_feasibility.feasible rationale and risk profile).

        As a documentation/comment-only story, option (a) is appropriate. Without
        explicit acknowledgment, the AC-1 audit will surface this finding and the
        implementor may be uncertain about the correct response.
      affected_acs: [AC-1, AC-2, AC-7]
      affected_subtasks: [ST-1, ST-2]
      resolution: >
        Add explicit Non-goal or Architecture Note: "implement-dispatcher.sh contains
        functional (non-comment) filesystem references to stories.index.md and
        _implementation/ that are not in scope for KFMB-6020. The AC-1 audit should
        document these findings as requiring a follow-up story (create KFMB-6040 or
        include in KFMB-6030)." This prevents ambiguity during ST-1.

    - id: GAP-3
      title: "sync-work-order.py functional filesystem logic is explicitly excluded but scope is ambiguous"
      severity: low
      type: scope_clarification
      description: >
        The Non-goals section excludes "sync-work-order.py scan_directories() or
        scan_proof_files() function correctness." The grep scan shows sync-work-order.py
        has 4 lines referencing stories.index.md (lines 5, 22, 115, 116, 120) — the
        module docstring (lines 5, 22) are in scope for AC-2, but lines 115–120
        are functional code (glob for *stories.index.md file, filesystem scan).

        The story correctly scopes AC-2 to only the module docstring. However,
        the AC-1 inventory will need to explicitly flag lines 115–120 as "out of
        scope functional code" to avoid implementor confusion. The current story
        text says "module docstring: stories.index.md listed as data source" but
        does not explicitly call out the functional lines as out-of-scope items
        that will appear in the AC-1 inventory.
      affected_acs: [AC-1, AC-2]
      affected_subtasks: [ST-1]
      resolution: >
        Minor clarification: Add to AC-1 inventory criteria: "Note functional
        (non-comment) filesystem references found in scripts; mark them as
        out-of-scope for this story." This is low severity since the Non-goals
        already cover it, but explicit guidance prevents wasted implementor effort.

