# ─────────────────────────────────────────────────────────────────────────────
# DISCOVERY ANALYSIS
# ─────────────────────────────────────────────────────────────────────────────

discovery:

  mvp_critical_gaps:
    # Conservative threshold for a docs-only story. A gap is MVP-critical only
    # if it blocks the core user journey (KB-native bootstrap producing correct output).
    - id: GAP-1
      severity: conditional
      description: >
        AC-8 (runtime end-to-end verification) is explicitly gated on KFMB-2010
        and KFMB-2020 reaching needs-code-review. This is not a gap in the story
        design — it is a correctly declared dependency gate. However, if KFMB-2030
        is implemented and merged before its dependencies, the documentation will
        describe agent behavior that does not yet exist, and AC-8 cannot be
        verified. This story MUST NOT be closed until MC-1 has been executed
        against the live merged agents.
      mitigation: >
        Gate is already declared in the story body and test plan. No additional
        design change needed. Enforcing the gate at the workflow level (story
        status check before implementation begins) is sufficient.
      blocking: false
      action_required: none

  # No other MVP-critical gaps identified. The story is well-scoped, internally
  # consistent, and all ACs are clearly implementable editorial changes.

  future_opportunities:
    - id: OPP-1
      priority: low
      description: >
        Phase 2 KB Mode prompt in pm-bootstrap-workflow.md currently reads
        "Mode: KB (story files written to disk, stories inserted into KB stories table)"
        (line 144 of current file). After this story is implemented, the inline
        prompt text should reflect that story files are written to disk AND inserted
        via kb_create_story — but the current text already mentions disk writes.
        If KFMB-2010 eliminates disk writes entirely, this inline comment would
        also need updating. KFMB-2030's AC-2 covers this, but the implementer
        should verify against the post-KFMB-2010 agent contract carefully — the
        inline prompt comment may need more than a simple tool name swap.
      action: Note for implementer — not a blocking gap. Covered by AC-2 + Files to Read.

    - id: OPP-2
      priority: low
      description: >
        The reference doc (pm-bootstrap-workflow-reference.md) Architecture section
        still describes Phase 2 as "Generates all artifact files" without distinguishing
        KB Mode vs File Mode. After KFMB-2010 eliminates disk artifacts in KB Mode,
        this description will be mildly misleading. KFMB-2030's AC-7 covers only the
        Artifacts table and Troubleshooting section. The Architecture diagram text
        is not in scope.
      action: >
        Could be addressed in this story (low effort, single line change) or deferred
        to KFMB-3020/3030. Recommend deferring to keep this story atomic — not blocking.

    - id: OPP-3
      priority: low
      description: >
        The Retry Policy table in the reference doc references "Prefix already exists"
        with guidance to "Look for existing {PREFIX}.stories.index.md". After
        KFMB-2010/2020 are merged, this troubleshooting guidance will be stale
        (KB Mode will use kb_list_stories, not a disk file). KFMB-2030 AC-7 mentions
        "update Troubleshooting section (if collision check wording changed)" but this
        is conditional. The Retry Policy table row is a separate entry from Troubleshooting.
      action: >
        Recommend expanding AC-7 verification to explicitly check the Retry Policy
        table row "Prefix already exists". Currently the story mentions Troubleshooting
        section only. Not blocking — implementer reading the file first will catch it.

