# ---------------------------------------------------------------------------
# Lessons to Record
# ---------------------------------------------------------------------------

lessons_to_record:
  - lesson: >
      Partial-merge upsert using SELECT + conditional UPDATE is more reliable than
      onConflictDoUpdate for field-by-field semantics. The onConflictDoUpdate pattern
      (used by kb_upsert_plan) requires building a complete set clause and risks
      clobbering. SELECT-then-UPDATE with !== undefined guards is explicit and safe.
    category: pattern
    tags: ["backend", "drizzle", "upsert", "mcp-tool"]

  - lesson: >
      Adding content columns to an existing table should gate integration tests on
      an information_schema pre-check. The contentColumnsExist flag pattern (beforeAll
      query + conditional skip) prevents test suite failure when dependent migration
      (KFMB-1010) is not yet applied. Use console.warn (not skip()) to emit a visible
      warning without counting as a test failure.
    category: pattern
    tags: ["backend", "testing", "migration-dependency", "integration-tests"]

  - lesson: >
      When a new MCP tool is added, the mcp-integration test that asserts total tool
      count must be updated atomically. KFMB-1020 fixed a pre-existing regression
      where context_pack_get was added by WINT-2020 but the test was not updated from
      61 to 62. This indicates the tool-count test is fragile — consider switching
      to a minimum-count assertion or set-membership test to reduce churn.
    category: anti_pattern
    tags: ["backend", "mcp", "testing", "tool-count"]

  - lesson: >
      The four-place registration rule (ToolNameSchema + ACCESS_MATRIX + toolHandlers +
      getToolDefinitions) is the pattern every new MCP tool must follow. Missing any
      one causes a runtime error or silent mismatch. The mcp-integration test that
      asserts tool names is the primary safeguard — ensure it checks by name, not
      just count.
    category: pattern
    tags: ["backend", "mcp", "architecture", "registration"]

