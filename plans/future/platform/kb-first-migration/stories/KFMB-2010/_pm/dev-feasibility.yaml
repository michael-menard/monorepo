feasible: true
confidence: medium
rationale: >
  The rewrite is straightforward in principle: replace the raw psql batch INSERT block
  in pm-bootstrap-generation-leader with a loop of kb_create_story MCP tool calls.
  The existing dual-mode structure provides a clear starting point. Confidence is
  medium rather than high because the kb_create_story interface (input schema, return
  shape) is not yet finalized — KFMB-1020 must ship first. Once KFMB-1020 is complete,
  the implementation risk drops to low.
complexity: low
change_surface:
  areas:
    - ".claude/agents/pm-bootstrap-generation-leader.agent.md (agent markdown rewrite in place)"
  endpoints: []
  deploy_touchpoints:
    - "KB MCP server must have kb_create_story tool registered (KFMB-1020 prerequisite)"
risks:
  - finding: >
      kb_create_story MCP tool interface (input schema, return shape) is not yet defined.
      KFMB-2010 cannot be fully implemented until KFMB-1020 ships and the tool signature
      is confirmed. The agent's MCP call syntax must match exactly.
    mitigation: >
      Block implementation start on KFMB-1020 completion. During elaboration, coordinate
      with KFMB-1020 implementer to obtain the exact input fields and success/error return
      shape before writing the agent loop. The seed's recommended minimum fields are:
      story_id, title, feature, epic, priority, state, phase, story_dir, story_file,
      depends_on, risk_notes, sizing_warning.
  - finding: >
      Removing story.yaml and stories.index.md writes prematurely will break downstream
      agents (elab, dev, story-move commands) that read these files before KFMB-3010/5010-5050
      complete the reader migration. Scope creep risk if dev removes filesystem writes too eagerly.
    mitigation: >
      Retain story.yaml and stories.index.md filesystem writes in this story. Document
      them as "retained for backward compatibility pending KFMB-3010 and KFMB-5010-5050."
      Removal is explicitly out of scope for KFMB-2010.
missing_requirements:
  - >
    AC-7 is intentionally left open ("decision must be made during elaboration").
    Before implementation starts, the AC-7 decision must be explicitly documented:
    retain stories.index.md write (recommended) or remove it. This must be resolved
    in elaboration before dev starts.
  - >
    The kb_create_story idempotency contract must be confirmed: does calling the tool
    for an already-inserted story_id return success silently (ON CONFLICT DO NOTHING)
    or return a distinct "already exists" result? AC-2 and test coverage depend on this.
evidence_expectations:
  - "Agent transcript from a real bootstrap run shows kb_create_story tool calls and no psql invocations"
  - "KB query SELECT count(*) FROM stories WHERE story_id IN (...) returns expected count after run"
  - "Second run with same ANALYSIS produces identical count (idempotency confirmed)"
  - "Agent response contains inline SUMMARY with kb_stories_inserted field"
  - "No _bootstrap/SUMMARY.yaml file written to disk"
subtasks:
  - id: ST-1
    title: "Read current agent and confirm kb_create_story interface from KFMB-1020"
    goal: >
      Understand the full current structure of pm-bootstrap-generation-leader.agent.md
      (v4.0.0) and confirm the exact kb_create_story input schema from the shipped
      KFMB-1020 implementation before making any changes.
    files_to_read:
      - ".claude/agents/pm-bootstrap-generation-leader.agent.md"
      - "apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts"
      - "apps/api/knowledge-base/src/mcp-server/tool-handlers.ts"
      - "apps/api/knowledge-base/src/mcp-server/tool-schemas.ts"
    files_to_modify: []
    acs: ["AC-1", "AC-2"]
    depends_on: none
    verification: "Read files successfully; kb_create_story input fields documented in subtask notes"
    estimated_tokens: 4000

  - id: ST-2
    title: "Rewrite KB Mode section — replace psql batch with kb_create_story loop"
    goal: >
      In pm-bootstrap-generation-leader.agent.md, replace the raw psql batch INSERT
      logic with a kb_create_story MCP tool call loop. Each story in ANALYSIS is inserted
      individually. Preserve the ON CONFLICT idempotency behavior. Keep the inline SUMMARY
      output contract unchanged.
    files_to_read:
      - ".claude/agents/pm-bootstrap-generation-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-bootstrap-generation-leader.agent.md"
    acs: ["AC-1", "AC-2", "AC-4"]
    depends_on: ST-1
    verification: >
      Agent markdown no longer contains psql, temp file, or raw SQL references.
      kb_create_story loop present in KB Mode section. SUMMARY output format unchanged.
    estimated_tokens: 6000

  - id: ST-3
    title: "Remove or deprecate File Mode section"
    goal: >
      Either remove the File Mode section entirely from pm-bootstrap-generation-leader.agent.md
      or mark it with a clear 'NOT SUPPORTED — deprecated in v5.0.0, use KB Mode' notice.
      Remove all active File Mode input reading logic (_bootstrap/AGENT-CONTEXT.md,
      _bootstrap/ANALYSIS.yaml references from live code paths).
    files_to_read:
      - ".claude/agents/pm-bootstrap-generation-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-bootstrap-generation-leader.agent.md"
    acs: ["AC-6"]
    depends_on: ST-2
    verification: >
      No active file reading from _bootstrap/ in agent logic. File Mode either absent or
      clearly marked deprecated. Version bumped to 5.x.x in frontmatter.
    estimated_tokens: 3000

  - id: ST-4
    title: "Document stories.index.md and story.yaml decisions in agent definition"
    goal: >
      Add explicit comments or a 'Files to Generate' section in the agent explaining:
      (1) stories.index.md write is retained pending KFMB-3010,
      (2) story.yaml writes are retained pending artifact migration phase (KFMB-5010-5050),
      (3) AC-5 KB degradation behavior is documented.
    files_to_read:
      - ".claude/agents/pm-bootstrap-generation-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-bootstrap-generation-leader.agent.md"
    acs: ["AC-3", "AC-5", "AC-7"]
    depends_on: ST-3
    verification: >
      Agent contains explicit section addressing stories.index.md fate and story.yaml fate.
      KB degradation path documented with warning + continue behavior.
    estimated_tokens: 3000
