strategy: unit+manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
happy_path_tests:
  - id: HP-1
    title: "Write and read test_plan artifact round-trip"
    setup: "KB DB running on port 5433; story record exists for KFMB-TEST-001"
    action: "Call kb_write_artifact with artifact_type: test_plan and content containing strategy, happy_path_tests, error_cases fields; then call kb_read_artifact with same story_id and artifact_type"
    expected: "Row created in story_artifacts jump table with artifact_type='test_plan'; row created in artifact_test_plans detail table; kb_read_artifact returns full content including strategy field"
    evidence: "SELECT * FROM artifact_test_plans WHERE target_id = 'KFMB-TEST-001'; response content.strategy matches input"
  - id: HP-2
    title: "Write and read dev_feasibility artifact round-trip"
    setup: "KB DB running; story record exists"
    action: "Call kb_write_artifact with artifact_type: dev_feasibility and content containing feasible, confidence, complexity fields; then call kb_read_artifact"
    expected: "Row created in artifact_dev_feasibility; detail table row has feasible, confidence, complexity typed columns populated correctly"
    evidence: "SELECT feasible, confidence, complexity FROM artifact_dev_feasibility WHERE target_id = 'KFMB-TEST-001'"
  - id: HP-3
    title: "Write and read uiux_notes artifact round-trip"
    setup: "KB DB running; story record exists"
    action: "Call kb_write_artifact with artifact_type: uiux_notes and content containing has_ui_changes, component_count fields; then call kb_read_artifact"
    expected: "Row created in artifact_uiux_notes; typed columns has_ui_changes and component_count populated"
    evidence: "SELECT has_ui_changes, component_count FROM artifact_uiux_notes WHERE target_id = 'KFMB-TEST-001'"
  - id: HP-4
    title: "Write and read story_seed artifact round-trip"
    setup: "KB DB running; story record exists"
    action: "Call kb_write_artifact with artifact_type: story_seed and content containing conflicts_found, blocking_conflicts, baseline_loaded fields; then call kb_read_artifact"
    expected: "Row created in artifact_story_seeds; typed columns conflicts_found, blocking_conflicts, baseline_loaded populated correctly"
    evidence: "SELECT conflicts_found, blocking_conflicts, baseline_loaded FROM artifact_story_seeds WHERE target_id = 'KFMB-TEST-001'"
  - id: HP-5
    title: "List artifacts by new artifact_type filter"
    setup: "Two test_plan artifacts written for two different stories"
    action: "Call kb_list_artifacts with artifact_type: test_plan"
    expected: "Returns both test_plan artifacts and no artifacts of other types; no SQL errors"
    evidence: "Response array length equals number of test_plan artifacts written; all entries have artifact_type='test_plan'"
  - id: HP-6
    title: "generateArtifactName returns correct display names"
    setup: "Unit test environment"
    action: "Call generateArtifactName for each of the 4 new types with iteration=0"
    expected: "Returns 'TEST-PLAN', 'DEV-FEASIBILITY', 'UIUX-NOTES', 'STORY-SEED' respectively"
    evidence: "Unit test assertion on return value"

error_cases:
  - id: EC-1
    title: "Unknown artifact type still returns error"
    setup: "KB CRUD layer with extended enum"
    action: "Call kb_write_artifact with artifact_type: 'nonexistent_type'"
    expected: "Zod validation error returned; no rows written to any table; error message indicates invalid artifact type"
    evidence: "Response contains validation error; SELECT COUNT(*) from story_artifacts WHERE artifact_type='nonexistent_type' = 0"
  - id: EC-2
    title: "Missing required fields in content uses null defaults"
    setup: "KB DB running"
    action: "Call kb_write_artifact with artifact_type: test_plan but content has no strategy field"
    expected: "Write succeeds; artifact_test_plans.strategy is null; data JSONB column stores the provided content object"
    evidence: "SELECT strategy FROM artifact_test_plans WHERE target_id = ...; value is NULL"
  - id: EC-3
    title: "Existing artifact types unaffected by extension"
    setup: "Write a checkpoint artifact before and after the new types are registered"
    action: "Call kb_write_artifact with artifact_type: checkpoint; then call kb_read_artifact"
    expected: "Checkpoint works identically to pre-extension behavior; artifact_checkpoints row created and readable"
    evidence: "SELECT * FROM artifact_checkpoints WHERE target_id = ...; full round-trip passes"

edge_cases:
  - id: ED-1
    title: "List with each new artifact_type filter returns empty when no artifacts exist"
    setup: "Clean DB with no PM artifacts written"
    action: "Call kb_list_artifacts with artifact_type: test_plan"
    expected: "Returns empty array; no errors; HTTP 200"
    evidence: "Response.artifacts is empty array"
  - id: ED-2
    title: "dev_feasibility feasible column handles null gracefully"
    setup: "KB DB running"
    action: "Call kb_write_artifact with artifact_type: dev_feasibility and content omitting the feasible field"
    expected: "Write succeeds; artifact_dev_feasibility.feasible is null; read returns full content from data JSONB"
    evidence: "SELECT feasible FROM artifact_dev_feasibility WHERE target_id = ...; NULL"
  - id: ED-3
    title: "All 13 existing artifact type write/read operations remain unaffected (regression)"
    setup: "KB DB with extended Zod enum and CRUD routing"
    action: "Execute write + read + list for each of the 13 original artifact types: checkpoint, scope, plan, evidence, verification, analysis, context, fix_summary, proof, elaboration, review, qa_gate, completion_report"
    expected: "All 13 types work without error; typed columns populated as before; no regressions introduced by enum extension"
    evidence: "pnpm test --filter @repo/knowledge-base passes all pre-existing test cases"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "artifact_test_plans table exists and has strategy TEXT, scope_ui_touched BOOLEAN, scope_data_touched BOOLEAN columns"
      - "artifact_dev_feasibility table has feasible BOOLEAN, confidence TEXT, complexity TEXT columns"
      - "artifact_uiux_notes table has has_ui_changes BOOLEAN, component_count INTEGER columns"
      - "artifact_story_seeds table has conflicts_found INTEGER, blocking_conflicts INTEGER, baseline_loaded BOOLEAN columns"
      - "ArtifactTypeSchema accepts 'test_plan', 'dev_feasibility', 'uiux_notes', 'story_seed'"
      - "pnpm check-types --filter @repo/knowledge-base passes with zero errors"
      - "pnpm test --filter @repo/knowledge-base passes all tests including new unit tests"
  frontend: ~

manual_cases:
  - id: MC-1
    title: "Smoke test SQL migration 017 applies cleanly"
    steps:
      - "Run migration 017_pm_artifact_types.sql against a fresh KB DB (port 5433)"
      - "Verify all 4 new tables exist: SELECT table_name FROM information_schema.tables WHERE table_name LIKE 'artifact_%'"
      - "Verify artifact_type column in story_artifacts still has no CHECK constraint: \\d story_artifacts"
    expected: "Migration runs without errors; 4 new tables visible; no CHECK constraint on artifact_type"
  - id: MC-2
    title: "KFMB-1010 prerequisite not bypassed"
    steps:
      - "Confirm KFMB-1010 status is 'completed' before starting KFMB-1030 implementation"
    expected: "stories.index.md shows KFMB-1010 as completed"

fixture_definitions:
  - name: testPlanContent
    type: Record<string, unknown>
    description: "Sample test_plan artifact content: { strategy: 'unit+integration', scope: { ui_touched: false, data_touched: true }, happy_path_tests: [...], error_cases: [] }"
  - name: devFeasibilityContent
    type: Record<string, unknown>
    description: "Sample dev_feasibility content: { feasible: true, confidence: 'high', complexity: 'low', rationale: '...', subtasks: [] }"
  - name: uiuxNotesContent
    type: Record<string, unknown>
    description: "Sample uiux_notes content: { skipped: true, has_ui_changes: false, component_count: 0 }"
  - name: storySeedContent
    type: Record<string, unknown>
    description: "Sample story_seed content: { conflicts_found: 1, blocking_conflicts: 0, baseline_loaded: true, baseline_date: '2026-02-13' }"

risks:
  - "Migration must be applied before tests run against real DB — unit tests may use mock DB to avoid this dependency"
  - "KFMB-1010 dependency means this story cannot begin implementation until KFMB-1010 is complete"
  - "Regression test for all 13 existing types is comprehensive — consider running as part of CI rather than manual"
