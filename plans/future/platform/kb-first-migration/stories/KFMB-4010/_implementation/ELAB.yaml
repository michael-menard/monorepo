opportunities:

  - id: "OPP-1"
    title: "--update-status flag disposition unspecified after rewrite"
    detail: >
      story-move.md v2.1.0 has a --update-status flag that delegates the DB write to /story-update
      (with a guard clause to prevent double-writes). After the KFMB-4010 rewrite, story-move.md
      will call kb_update_story_status directly as its primary action. The --update-status delegation
      pattern becomes redundant: /story-update (post-rewrite) also calls kb_update_story_status,
      so both would hit the DB.

      The story does not specify whether --update-status is:
        (a) Preserved as-is (still delegates to /story-update, causing double-write of same state)
        (b) Deprecated as a no-op with a deprecation note
        (c) Removed entirely

      AC-5 requires backward-compatible error signals (MOVE COMPLETE, MOVE FAILED, MOVE SKIPPED)
      but does not address --update-status flag behavior. AC-11 requires no filesystem directory
      operations — the --update-status delegation to /story-update no longer serves a filesystem
      purpose after both commands are KB-only, but the flag could remain as a no-op.

      Recommended disposition: Mark --update-status as deprecated (no-op) in the rewritten
      command spec, with a note that state is now always written to KB regardless of flag presence.
      This preserves backward compatibility without silently causing double-writes.
    effort: "low"
    blocking: false
    decision: "log_to_kb — implementer should decide during ST-2; deprecating as no-op is the safe default"

  - id: "OPP-2"
    title: "Clarify behavior for story-update statuses absent from SWIM_LANE_TO_STATE"
    detail: >
      story-update.md v3.0.0 has statuses in its DB write mapping table that are explicitly marked
      as 'skip' (no DB write): needs-code-review, failed-code-review, failed-qa, needs-split,
      created, elaboration. Notably, needs-code-review, failed-code-review, and failed-qa are
      NOT present in SWIM_LANE_TO_STATE at all (only backlog, ready-to-work, in-progress,
      needs-code-review [mapped to ready_for_review], failed-code-review, ready-for-qa, failed-qa,
      UAT, done are in the TypeScript constant — wait, needs-code-review IS present mapped to
      ready_for_review, failed-code-review IS present, failed-qa IS present).

      Re-checking: SWIM_LANE_TO_STATE DOES contain needs-code-review → ready_for_review,
      failed-code-review → failed_code_review, failed-qa → failed_qa. However, story-update.md
      v3.0.0 lists these as 'skip' in its status table (no DB state mapping for the command
      perspective). This is an intentional design choice in v3.0.0 (treating them as transient
      states not tracked in DB).

      After KFMB-4010, if kb_update_story_status becomes the primary action, the story needs to
      clarify: for statuses that are currently skipped in story-update.md but ARE in SWIM_LANE_TO_STATE
      (needs-code-review, failed-code-review, failed-qa) — should kb_update_story_status now be
      called for these, or should the skip behavior be preserved?

      This is a design question that the implementer should resolve during ST-3. The story is
      silent on it, but AC-6 says "for all mapped statuses" which implicitly preserves the
      existing skip list. The safe interpretation is: skip behavior is preserved as-is, only
      the call mechanism changes from shimUpdateStoryStatus to kb_update_story_status for
      the mapped cases.
    effort: "low"
    blocking: false
    decision: "log_to_kb — clarify during ST-3; AC-6 'for all mapped statuses' implies skip list is preserved; no behavior change intended for unmapped statuses"

  - id: "OPP-3"
    title: "Consider adding a caller-impact summary to ST-1 output"
    detail: >
      ST-1 audits callers but its output format is unspecified (just "documentation only"). The
      implementer may want to produce a brief table or YAML note documenting which callers use
      --update-status flag, which call /story-move without it, and which will be most impacted
      by the hard-failure DB behavior change. This would make ST-2/ST-3 rewrites more informed
      and provide a paper trail for the KFMB-4020 implementer (who takes the next step in
      stage directory elimination).
    effort: "low"
    blocking: false
    decision: "log_to_kb — nice-to-have; implementer may produce inline comments in the rewritten command spec noting caller impact"

