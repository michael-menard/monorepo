feasible: true
confidence: high
rationale: "Scope is narrow and well-bounded: two command specification files (.claude/commands/story-move.md v2.1.0 and .claude/commands/story-update.md v3.0.0) with clear before/after behavior. No TypeScript, no migrations, no infra changes. The target behavior (kb_update_story_status as primary call) already exists in agents like dev-setup-leader, providing a proven reference pattern. The main complexity is the behavioral contract inversion: DB unavailability becomes a hard failure rather than a silent warning — this must be clearly specified."
complexity: low
change_surface:
  areas:
    - ".claude/commands/story-move.md"
    - ".claude/commands/story-update.md"
  endpoints: []
  deploy_touchpoints: []
  mcp_tools:
    - "mcp__knowledge-base__kb_update_story_status"
    - "mcp__knowledge-base__kb_get_story"

risks:
  - finding: "Behavioral contract inversion: DB unavailability now blocks /story-move entirely (no fallback directory mv). Agents calling /story-move currently assume it always succeeds if the filesystem is reachable."
    mitigation: "Explicitly document the MOVE FAILED: DB unavailable error signal in AC-3. Callers must handle this new failure mode. Note in story non-goals that updating callers is out of scope for this story."

  - finding: "KFMB-3020 parallel sibling also modifies story-update.md (index step removal). Simultaneous edits risk merge conflicts."
    mitigation: "Serialize changes: KFMB-3020 should land index step removal first. KFMB-4010 then removes frontmatter step and promotes DB write. Alternatively, coordinate as a single PR with clear ownership split."

missing_requirements: []

evidence_expectations:
  - "Grep audit of both command files confirms zero filesystem operation keywords (mv, mkdir, readdirSync) in state-transition code paths"
  - "Manual review confirms kb_update_story_status called with correct triggered_by value in each command"
  - "Manual integration test against live KB confirms round-trip: /story-move → kb_get_story shows updated state"
  - "Result YAML schemas reviewed to confirm kb_updated field present and from_path/to_path/file_updated removed"

subtasks:
  - id: ST-1
    title: "Audit all callers of /story-move and /story-update"
    goal: "Identify all agents and commands that call /story-move or /story-update, document which will be affected by the hard-failure DB behavior change. No code changes — documentation only."
    files_to_read:
      - ".claude/agents/dev-setup-leader.agent.md"
      - ".claude/agents/dev-execute-leader.agent.md"
      - ".claude/agents/qa-verify-completion-leader.agent.md"
      - ".claude/agents/dev-fix-fix-leader.agent.md"
      - ".claude/agents/elab-setup-leader.agent.md"
    files_to_modify: []
    acs: ["AC-2", "AC-3"]
    depends_on: none
    verification: "grep -r '/story-move\\|/story-update' .claude/agents/ .claude/commands/ returns complete caller list"
    estimated_tokens: 6000

  - id: ST-2
    title: "Rewrite .claude/commands/story-move.md"
    goal: "Replace locate step (directory scan → kb_get_story), replace execute step (mv → kb_update_story_status), remove fallback language, update result YAML schema to use kb_updated."
    files_to_read:
      - ".claude/commands/story-move.md"
      - ".claude/agents/dev-setup-leader.agent.md"
      - "packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts"
    files_to_modify:
      - ".claude/commands/story-move.md"
    acs: ["AC-1", "AC-2", "AC-3", "AC-4", "AC-5", "AC-9", "AC-11"]
    depends_on: ST-1
    verification: "grep -E '(\\bmv\\b|readdirSync|from_path|to_path|db_updated)' .claude/commands/story-move.md returns 0 results for state-management paths"
    estimated_tokens: 10000

  - id: ST-3
    title: "Rewrite .claude/commands/story-update.md"
    goal: "Remove frontmatter write step (step 3b in v3.0.0), promote kb_update_story_status to primary action (step 1), update result YAML schema to use kb_updated. Preserve worktree cleanup step (WINT-1150). Coordinate with KFMB-3020 on step 4 index removal."
    files_to_read:
      - ".claude/commands/story-update.md"
      - ".claude/agents/dev-setup-leader.agent.md"
      - "packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts"
    files_to_modify:
      - ".claude/commands/story-update.md"
    acs: ["AC-6", "AC-7", "AC-8", "AC-10", "AC-11"]
    depends_on: ST-1
    verification: "grep -E '(frontmatter|file_updated|step 3b)' .claude/commands/story-update.md returns 0 results; worktree cleanup step present"
    estimated_tokens: 10000

  - id: ST-4
    title: "Verify both rewritten commands against AC-1 through AC-11"
    goal: "Perform grep audit and manual review to confirm all 11 ACs satisfied. Execute live KB integration test for round-trip verification."
    files_to_read:
      - ".claude/commands/story-move.md"
      - ".claude/commands/story-update.md"
    files_to_modify: []
    acs: ["AC-1", "AC-2", "AC-3", "AC-4", "AC-5", "AC-6", "AC-7", "AC-8", "AC-9", "AC-10", "AC-11"]
    depends_on: ST-3
    verification: "All 11 ACs manually verified; grep audit passes; live KB round-trip test passes"
    estimated_tokens: 6000
