gaps:
  - id: GAP-1
    severity: MVP_BLOCKING
    description: >
      ST-6 violates the subtask file-count guideline (6 files > 3 file limit). While not a
      correctness issue, it makes the subtask non-atomic and increases the risk of partial
      completion during implementation. The subtask should be split into ST-6a (read-only audit
      of all 6 command files to identify filesystem path references) and ST-6b (apply story_id
      spawn prompt fixes where the audit found violations). This split maintains the DAG
      integrity (ST-6a → ST-6b → ST-8) and respects the guideline.
    resolution: >
      Split ST-6 into ST-6a (audit, read-only, all 6 files) and ST-6b (apply fixes, max 3
      files per pass or iterate). Update the Subtasks table and subtask detail sections.

  - id: GAP-2
    severity: MVP_BLOCKING
    description: >
      The `is_implemented()` KB state mapping in Architecture Notes includes `state == "in_progress"`
      as a valid "implemented" signal. This is semantically incorrect: `in_progress` means a story
      is being actively worked on (not yet implemented). Using it in `is_implemented()` would cause
      implement-stories.sh to skip stories that are mid-flight but not yet complete. The correct
      sentinel for "implemented" is `state == "ready_for_review"` (submitted for review) or later.
      This ambiguity exists in both the Architecture Notes and propagates to ST-2 and ST-3.
    resolution: >
      Clarify the KB state mapping in Architecture Notes: remove `state == "in_progress"` from
      the `is_implemented()` mapping. The corrected mapping should read: Implemented:
      `state == "ready_for_review"` or `state == "needs_review"` or later. Ensure ST-2 and ST-3
      subtask detail sections reference the corrected mapping.

opportunities:
  - id: OPP-1
    severity: non_blocking
    description: >
      AC-9 verifies shell script correctness via dry-run output but does not specify what
      "correct story filtering" means in measurable terms (e.g., how many stories should appear,
      which specific story IDs, what the expected count delta is). Adding a concrete expected
      count or story ID list to the test plan would make AC-9 falsifiable rather than
      observational. This is an enhancement for test rigor, not a blocking gap.
    recommendation: >
      Add a concrete expected-result note to HP-1, HP-2, HP-3 specifying which story IDs from
      the kb-first-migration plan are expected to appear/not appear in dry-run output based on
      their current KB state.

  - id: OPP-2
    severity: non_blocking
    description: >
      The Architecture Notes document the preferred batch query strategy (Option B) but do not
      document a rejected Option A (per-story subprocess) with an explicit rationale for why it
      was rejected beyond "latency multiplication." Adding a short ADR note or inline rejection
      rationale would help future implementers avoid regressing to per-story calls if they are
      tempted to simplify the implementation.
    recommendation: >
      Add a brief "Option A: per-story subprocess — rejected because N-story × claude -p call
      latency is multiplicative in implement-dispatcher.sh poll loop (can add 10-60s per cycle)"
      note to the Architecture Notes section.

  - id: OPP-3
    severity: non_blocking
    description: >
      ST-8 (frontmatter kb_artifacts update) is listed as depending on ST-6 only. However,
      ST-5 (precondition-check.md migration) also modifies a command file whose frontmatter
      should be updated per KBAR-0190. The dependency chain ST-5 → ST-8 is not explicitly
      listed in the Subtasks table. While an implementer would catch this during ST-8 work,
      making the dependency explicit reduces the risk of an incomplete frontmatter update for
      precondition-check.md.
    recommendation: >
      Add ST-5 as an explicit dependency of ST-8 in the Subtasks table
      (Depends On: ST-6, ST-5).

