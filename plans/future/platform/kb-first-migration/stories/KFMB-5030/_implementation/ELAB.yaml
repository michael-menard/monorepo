      across two stories. WARN is appropriate; not SPLIT.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      All 10 ACs are covered by subtasks: AC-1→ST-2, AC-2→ST-3, AC-3→ST-4, AC-4→ST-5,
      AC-5→ST-5, AC-6→ST-6, AC-7→ST-1+ST-7, AC-8→ST-5, AC-9 (implicitly verified by
