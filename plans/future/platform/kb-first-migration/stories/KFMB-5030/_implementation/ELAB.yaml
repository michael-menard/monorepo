audit:
  - id: scope_alignment
    status: PASS
    note: >
      Story title matches stories.index.md ("Migrate _implementation/ Command Orchestrators").
      Correctly placed in Phase 4: Artifact Migration. No extra endpoints, infrastructure, or
      unscoped features introduced. Non-goals explicitly exclude agent workers (KFMB-5010/5020),
      stage directories (KFMB-4010/4020), stories.index.md (KFMB-3020/3030), and production DB
      schemas. Scope coordination notes for KFMB-4020 and KFMB-3030 overlap are documented.

  - id: internal_consistency
    status: WARN
    note: >
      Goals, non-goals, and ACs are largely consistent. One logic concern in the Architecture Notes
      KB state mapping table: "Implemented" is mapped to `state == "in_progress"` or
      `state == "ready_for_review"`. A story in `in_progress` is actively being implemented (not
      complete), so using it as the `is_implemented()` signal may produce false positives — a story
      mid-flight would appear implemented to implement-stories.sh. The expected correct sentinel is
      `state == "ready_for_review"` (or later). The `in_progress` inclusion should be clarified or
      removed. HP-3 expected output "ALREADY_ELABORATED" aligns with AC-3 semantics; no issue there.
      AC-6 includes scrum-master.md while non-goals exclude story-move.md/story-update.md —
      consistent. AC-7's either/or clause is internally consistent with ST-1/ST-7 split.

  - id: reuse_first
    status: PASS
    note: >
      Reuse plan explicitly identifies resolve-plan.sh (batch KB query pattern), dev-code-review.md
      Phase 0 (kb_read_artifact existence check pattern), and KFMB-2010/2020/2030 analogous
      migration stories. No new shared packages created — all changes are in .claude/commands/
      markdown files and scripts/*.sh bash scripts. The batch query strategy (Option B) avoids
      per-story subprocess duplication. KBAR-0190 frontmatter atomicity lesson is cited and actioned
      in ST-8.

  - id: ports_adapters
    status: PASS
    note: >
      This is a docs+scripts story with no TypeScript packages. The architecture notes correctly
      identify the constraint: bash scripts cannot make MCP tool calls directly, so the claude -p
      subprocess is the adapter boundary. The batch query approach isolates KB-access IO to a single
      subprocess call per poll cycle. The command markdown files are the orchestration layer;
      kb_read_artifact / kb_list_stories calls are the port. Platform-specific logic (bash
      associative arrays for in-memory lookup) is confined to shell scripts only.

  - id: testability
    status: PASS
    note: >
      Test strategy is appropriate for docs+scripts story. Concrete dry-run commands are provided
