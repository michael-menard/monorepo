  - id: story_sizing
    status: WARN
    note: >
      10 ACs (exceeds the 8 AC threshold — 1 sizing indicator triggered). 0 endpoints. No
      frontend work. 8 subtasks. Story touches 3 shell scripts + 7 command files but all are
      the same type (markdown/bash — not TypeScript packages), making the breadth manageable.
