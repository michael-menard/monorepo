strategy: manual+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  e2e: not_applicable
  coverage_threshold_waived: true
  coverage_waiver_reason: "Documentation-only story — agent markdown file modification only. No TypeScript code produced. Coverage threshold (45%) not applicable per KB lesson on infrastructure stories."
  notes: "ADR-006 skip condition applies (no UI-facing ACs). ADR-005 requires real KB MCP server for UAT."

happy_path_tests:
  - id: HP-1
    title: "KB collision detected — SETUP BLOCKED emitted when stories exist in KB"
    setup: "Real KB MCP server running. Stories exist in KB for plan slug 'kb-first-migration' (epic: 'kb-first-migration'). Run /pm-bootstrap-workflow on an existing plan."
    action: "Agent runs KB Mode Step 4: calls kb_list_stories({ epic: 'kb-first-migration', limit: 1 }). Result: 1 or more stories returned."
    expected: "Agent emits SETUP BLOCKED: 'Stories already exist in KB for plan kb-first-migration — bootstrap already run'. Agent halts without writing SETUP-CONTEXT."
    evidence: "Manual inspection of agent output. Verify SETUP BLOCKED message appears in agent response. Verify no SETUP-CONTEXT YAML is emitted."

  - id: HP-2
    title: "Fresh plan — agent proceeds to Step 5 when no KB stories found"
    setup: "Real KB MCP server running. No stories exist in KB for plan slug 'fresh-test-plan-xyz'. Run /pm-bootstrap-workflow on a fresh plan."
    action: "Agent runs KB Mode Step 4: calls kb_list_stories({ epic: 'fresh-test-plan-xyz', limit: 1 }). Result: empty array returned."
    expected: "Agent proceeds to Step 5 (extract raw plan summary). SETUP-CONTEXT YAML is emitted with correct schema fields: schema, mode, plan_slug, feature_dir, prefix, project_name, created, raw_plan_summary."
    evidence: "Manual inspection of agent output. Verify SETUP COMPLETE signal. Verify SETUP-CONTEXT YAML fields match schema: 2 definition exactly — no added/removed fields."

  - id: HP-3
    title: "SETUP-CONTEXT YAML schema stability — no added or removed fields"
    setup: "Compare updated pm-bootstrap-setup-leader.agent.md Output section against current v4.0.0."
    action: "Structurally verify that the Output YAML block in the agent file has exactly these fields: schema, mode, plan_slug, feature_dir, prefix, project_name, created, raw_plan_summary."
    expected: "Field list is identical between v4.0.0 and v4.1.0. Zero additions, zero removals, zero renames."
    evidence: "Diff the Output section of both versions. No field changes."

  - id: HP-4
    title: "Frontmatter version incremented to 4.1.0"
    setup: "Open updated pm-bootstrap-setup-leader.agent.md."
    action: "Read the frontmatter version field."
    expected: "version: 4.1.0 (or higher). Updated field shows implementation date."
    evidence: "Grep for 'version:' in agent file frontmatter. Confirm value is 4.1.0."

  - id: HP-5
    title: "File Mode steps unchanged"
    setup: "Open updated pm-bootstrap-setup-leader.agent.md."
    action: "Locate the File Mode section. Compare Step 4 of File Mode against v4.0.0."
    expected: "File Mode Step 4 is byte-for-byte identical between v4.0.0 and v4.1.0. File Mode collision check still uses filesystem (stories.index.md) not KB."
    evidence: "Diff File Mode section between versions. Zero changes."

error_cases:
  - id: EC-1
    title: "MCP tool unavailable — fallback to filesystem check with warning"
    setup: "Simulate kb_list_stories MCP tool unavailability (disconnect MCP server or tool not registered in agent context)."
    action: "Agent reaches KB Mode Step 4. kb_list_stories call fails with connection error or tool not found."
    expected: "Agent logs warning: 'KB collision check unavailable — falling back to filesystem check'. Agent then checks if {feature_dir}/stories.index.md exists on disk (fallback behavior). If file exists, SETUP BLOCKED. If file does not exist, proceed to Step 5."
    evidence: "Manual inspection of agent output. Verify warning message appears verbatim. Verify correct BLOCKED or PROCEED behavior based on filesystem state."

  - id: EC-2
    title: "SETUP BLOCKED signal format unchanged — downstream Phase 1 parsing works"
    setup: "Trigger a collision scenario (KB has stories OR filesystem has index file in fallback mode)."
    action: "Agent emits SETUP BLOCKED signal."
    expected: "Signal format is 'SETUP BLOCKED: <reason>' — colon + space + reason. pm-bootstrap-analysis-leader can parse the signal without modification."
    evidence: "Verify signal string matches documented format. Verify Phase 1 agent response parsing succeeds."

  - id: EC-3
    title: "kb_list_stories called with wrong filter type — feature vs epic"
    setup: "Code review / structural inspection of updated Step 4 prose."
    action: "Verify the agent instructions specify kb_list_stories with epic parameter, NOT feature parameter."
    expected: "Step 4 prose says: kb_list_stories({ epic: '{project_name}', limit: 1 }) — uses epic filter. Does NOT use feature filter (which matches description strings, not plan slugs)."
    evidence: "Inspect the Step 4 text in updated agent file. Confirm 'epic' not 'feature' is the filter parameter."

edge_cases:
  - id: ED-1
    title: "kb_list_stories returns exactly 1 story — still blocks"
    setup: "KB has exactly one story for the target epic."
    action: "Agent calls kb_list_stories({ epic: '{project_name}', limit: 1 }). Response: 1 story."
    expected: "Agent emits SETUP BLOCKED. The check is 'one or more stories' not 'more than N stories'."
    evidence: "Manual test with exactly 1 story in KB. Verify BLOCKED is emitted."

  - id: ED-2
    title: "Protected files not modified — pm-bootstrap-workflow.md and pm-bootstrap-generation-leader.agent.md unchanged"
    setup: "After implementation, diff the following files against main: .claude/commands/pm-bootstrap-workflow.md and .claude/agents/pm-bootstrap-generation-leader.agent.md."
    action: "Check git diff for these two files."
    expected: "Zero changes to either file. No lines added, removed, or modified."
    evidence: "git diff output shows no changes to protected files."

  - id: ED-3
    title: "Signal string contract preserved — SETUP COMPLETE format unchanged"
    setup: "Run a successful bootstrap flow (no existing stories)."
    action: "Agent completes Step 4 (no collision), runs through Steps 5-6, emits final signal."
    expected: "Final signal is 'SETUP COMPLETE' — exact string, no extra whitespace, no reformatting."
    evidence: "Manual inspection of agent output."

tooling_evidence:
  backend:
    http_requests: []
    assertions: []
  frontend: null
manual_cases:
  - id: MC-1
    title: "Full UAT: fresh plan bootstrap succeeds"
    steps:
      - "Ensure KB MCP server is running and accessible"
      - "Choose a plan slug with NO existing KB stories (e.g., 'test-fresh-2026-02')"
      - "Run: /pm-bootstrap-workflow [plan-path] [fresh plan slug]"
      - "Observe Phase 0 (pm-bootstrap-setup-leader) output"
      - "Confirm SETUP COMPLETE signal"
      - "Confirm SETUP-CONTEXT YAML is emitted with all 8 required fields"
    expected: "Bootstrap proceeds to Phase 1 analysis. SETUP-CONTEXT YAML has: schema, mode, plan_slug, feature_dir, prefix, project_name, created, raw_plan_summary."
  - id: MC-2
    title: "Full UAT: existing plan bootstrap blocks"
    steps:
      - "Ensure KB MCP server is running and accessible"
      - "Choose a plan slug WITH existing KB stories (e.g., 'kb-first-migration')"
      - "Run: /pm-bootstrap-workflow [plan-path] [existing plan slug]"
      - "Observe Phase 0 (pm-bootstrap-setup-leader) output"
      - "Confirm SETUP BLOCKED signal with descriptive reason message"
      - "Confirm bootstrap does NOT proceed to Phase 1"
    expected: "Bootstrap halts at Phase 0 with SETUP BLOCKED. Message identifies the plan name and indicates stories already exist in KB."
  - id: MC-3
    title: "UAT fallback: MCP unavailable — filesystem fallback activates"
    steps:
      - "Disconnect or disable KB MCP server"
      - "Run: /pm-bootstrap-workflow [plan-path] [plan slug]"
      - "Observe Phase 0 output for warning message"
      - "Confirm warning: 'KB collision check unavailable — falling back to filesystem check'"
      - "Verify correct BLOCKED or PROCEED based on stories.index.md existence"
    expected: "Agent degrades gracefully. Warning logged. Filesystem check runs as fallback. No crash or unhandled error."

fixture_definitions:
  - name: fresh_plan_fixture
    type: manual-setup
    description: "A plan slug with no existing stories in the KB stories table for the target epic."
  - name: existing_plan_fixture
    type: manual-setup
    description: "A plan slug (e.g., 'kb-first-migration') with at least 1 story in KB for that epic."

risks:
  - "kb_list_stories epic filter behavior must be validated against real DB column values before implementation. If the epic column stores a different value than the plan slug, the filter will return empty incorrectly."
  - "Structural verification (file diffing) is manual — no automated CI check exists for agent markdown content compliance."
  - "MCP tool availability in haiku sub-agent context: if the tool is consistently unavailable in sub-agent execution, the fallback path becomes the primary path rather than the exception."
