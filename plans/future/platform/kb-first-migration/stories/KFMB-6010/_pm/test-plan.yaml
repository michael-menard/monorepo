story_id: KFMB-6010
generated: "2026-02-26"
strategy: manual-and-dry-run
frontend_impacted: false
adr_005_applies: true
adr_006_applies: false

notes: >
  No TypeScript, no HTTP endpoints, no frontend. All verification is shell
  dry-run, bash syntax check, and live-KB smoke tests (ADR-005: real KB at
  port 5433 required). sync-work-order.py has no --dry-run mode; its
  verification requires a live KB connection.

preconditions:
  - id: PRE-1
    description: >
      Confirm KFMB-3030, KFMB-4020, and KFMB-5030 are all at
      needs-code-review or later before beginning KFMB-6010 implementation.
      Their script changes must be merged before fallbacks can safely be removed.
  - id: PRE-2
    description: >
      Confirm KFMB-3010 (Eliminate stories.index.md — Agent Updates) status
      before attempting AC-6 (discover_stories filesystem fallback removal).
      If KFMB-3010 is not at needs-code-review or later, AC-6 is a partial
      pass and the fallback must be retained with a TODO(KFMB-3010) comment.
  - id: PRE-3
    description: >
      Verify KB is available at port 5433 before running any live-KB
      verification steps. Run: nc -z localhost 5433 (or equivalent check).

test_scenarios:
  - id: TS-1
    title: "kb-state.sh library extraction and sourcing"
    covers: [AC-1]
    type: functional
    steps:
      - "Verify scripts/lib/kb-state.sh exists and is executable"
      - "Run: grep -n 'kb_state_query' scripts/lib/kb-state.sh — function must be defined"
      - "Run: grep -n 'source.*kb-state' scripts/generate-stories.sh — must source the library"
      - "Run: grep -n 'source.*kb-state' scripts/implement-stories.sh — must source the library"
      - >
        Run: grep -c 'kb_state_query()' scripts/generate-stories.sh — expect 0
        (no local definition; library definition is in kb-state.sh)
      - >
        Run: grep -c 'kb_state_query()' scripts/implement-stories.sh — expect 0
        (no local definition)
    expected: >
      kb-state.sh defines kb_state_query(); both scripts source it; neither
      script contains a local duplicate definition.

  - id: TS-2
    title: "generate-stories.sh — no filesystem fallback path"
    covers: [AC-2]
    type: functional
    steps:
      - "Run: grep -n 'KB-FIRST FALLBACK' scripts/generate-stories.sh — expect 0 matches"
      - "Run: grep -n 'stage_dir.*backlog\|stage_dir.*in-progress' scripts/generate-stories.sh (in ALREADY_GENERATED detection) — filesystem loop must be gone"
      - "Run: bash -n scripts/generate-stories.sh — no syntax errors"
    expected: No [KB-FIRST FALLBACK] references; filesystem directory loop for state detection removed.

  - id: TS-3
    title: "generate-stories.sh — KB unavailable exits non-zero with message"
    covers: [AC-2]
    type: error-handling
    note: "Simulate KB unavailability by stopping the KB server or pointing to wrong port"
    steps:
      - "Temporarily disable KB (stop postgres or modify port)"
      - "Run: ./scripts/generate-stories.sh kb-first-migration --dry-run (or a safe invocation)"
      - "Observe exit code (must be non-zero) and stderr message (must be descriptive, not empty)"
    expected: Non-zero exit code and descriptive error message; no silent empty list; no hang.

  - id: TS-4
    title: "implement-stories.sh — all five state functions use KB exclusively"
    covers: [AC-3]
    type: functional
    steps:
      - "Run: grep -n 'KB-FIRST FALLBACK' scripts/implement-stories.sh — expect 0 matches"
      - "For each function (find_story_dir, is_elaborated, is_implemented, is_reviewed, is_completed): verify no filesystem directory iteration for state detection"
      - "Run: bash -n scripts/implement-stories.sh — no syntax errors"
    expected: All five state functions query KB exclusively; no filesystem fallback branches.

  - id: TS-5
    title: "implement-stories.sh — KB unavailable exits non-zero"
    covers: [AC-3]
    type: error-handling
    steps:
      - "Disable KB (see TS-3 note)"
      - "Run: ./scripts/implement-stories.sh kb-first-migration --dry-run"
      - "Observe exit code (must be non-zero) and error message"
    expected: Non-zero exit; descriptive message; no silent failure.

  - id: TS-6
    title: "implement-dispatcher.sh — state detection KB-only"
    covers: [AC-4]
    type: functional
    steps:
      - "Run: grep -n 'KB-FIRST FALLBACK' scripts/implement-dispatcher.sh — expect 0 matches"
      - "Run: grep -n 'stories.index.md' scripts/implement-dispatcher.sh — expect 0 (index file discovery removed)"
      - "Verify is_elaborated() and EVIDENCE checks in dispatcher use KB query, not filesystem"
      - "Run: bash -n scripts/implement-dispatcher.sh — no syntax errors"
    expected: No filesystem fallback in dispatcher state detection; KB-only paths.

  - id: TS-7
    title: "sync-work-order.py — dormant functions removed or replaced"
    covers: [AC-5]
    type: functional
    steps:
      - "Run: grep -n 'check_untracked_stories\|scan_all_index_stories' scripts/sync-work-order.py"
      - "If present: must be replaced by KB query or have documented removal rationale comment"
      - "If removed: confirm no call sites reference them"
    expected: >
      check_untracked_stories() and scan_all_index_stories() are either
      replaced by KB queries or removed with documented rationale.

  - id: TS-8
    title: "resolve-plan.sh — discover_stories() filesystem fallback conditional removal"
    covers: [AC-6]
    type: conditional
    precondition: "KFMB-3010 must be at needs-code-review or later"
    steps:
      - "Check KFMB-3010 status via KB or index"
      - "If KFMB-3010 complete: verify filesystem fallback branch is removed from discover_stories()"
      - "If KFMB-3010 not complete: verify TODO(KFMB-3010) comment is present on the retained fallback"
    expected: >
      If KFMB-3010 complete: fallback removed, KB-only path.
      If KFMB-3010 not complete: fallback retained with # TODO(KFMB-3010) comment.
      Either outcome is a pass for this AC.

  - id: TS-9
    title: "sync-work-order.py — scan_directories and scan_proof_files preserved"
    covers: [AC-7]
    type: preservation
    steps:
      - "Run: grep -n 'def scan_directories\|def scan_proof_files' scripts/sync-work-order.py — expect both present"
      - "Verify neither function has been modified (diff against pre-KFMB-6010 baseline)"
    expected: Both functions present and unmodified.

  - id: TS-10
    title: "Shell scripts syntax and dry-run validation"
    covers: [AC-8]
    type: integration
    kb_required: true
    steps:
      - "Run: bash -n scripts/generate-stories.sh"
      - "Run: bash -n scripts/implement-stories.sh"
      - "Run: bash -n scripts/implement-dispatcher.sh"
      - "Run: ./scripts/generate-stories.sh kb-first-migration --dry-run (with KB at port 5433)"
      - "Run: ./scripts/implement-stories.sh kb-first-migration --dry-run (with KB available)"
    expected: >
      All three scripts pass bash -n with no syntax errors.
      Dry-run output lists stories from KB state correctly.
      No [KB-FIRST FALLBACK] lines appear in dry-run output.

  - id: TS-11
    title: "sync-work-order.py one-cycle smoke test"
    covers: [AC-9]
    type: integration
    kb_required: true
    steps:
      - "Ensure KB is available at port 5433"
      - "Run: python scripts/sync-work-order.py --plan kb-first-migration (or equivalent invocation)"
      - "Observe for Python exceptions or tracebacks"
    expected: >
      Script completes one full cycle without Python exceptions.
      scan_directories() and scan_proof_files() run as expected.
      KB queries succeed (no connection errors).

uat_checklist:
  - "[ ] PRE-1: All three dependencies (KFMB-3030, KFMB-4020, KFMB-5030) at needs-code-review or later"
  - "[ ] PRE-2: KFMB-3010 status confirmed for AC-6 conditional"
  - "[ ] PRE-3: KB available at port 5433"
  - "[ ] TS-1: kb-state.sh extraction verified"
  - "[ ] TS-2: generate-stories.sh no fallback paths"
  - "[ ] TS-3: generate-stories.sh KB-unavailable error handling"
  - "[ ] TS-4: implement-stories.sh all five state functions KB-only"
  - "[ ] TS-5: implement-stories.sh KB-unavailable error handling"
  - "[ ] TS-6: implement-dispatcher.sh KB-only state detection"
  - "[ ] TS-7: sync-work-order.py dormant functions removed/replaced"
  - "[ ] TS-8: resolve-plan.sh discover_stories() conditional (KFMB-3010 gated)"
  - "[ ] TS-9: scan_directories and scan_proof_files preserved"
  - "[ ] TS-10: bash -n and --dry-run pass for all three shell scripts"
  - "[ ] TS-11: sync-work-order.py one-cycle smoke test passes"
