opportunities:
  - id: OPP-1
    title: "kb-state.sh: consider exporting kb_artifact_exists() alongside kb_state_query()"
    description: >
      The story mentions kb_artifact_exists() as optional ("and optionally
      kb_artifact_exists()") in both ST-1 and the Scope section. The implement-dispatcher.sh
      currently checks EVIDENCE.yaml readiness via filesystem (line 454:
      [[ ! -f "${STORY_DIR}/_implementation/EVIDENCE.yaml" ]]). AC-4 requires removing
      filesystem fallbacks but does not explicitly mandate KB-based artifact existence
      checks — it references EVIDENCE readiness as a "filesystem fallback path" to
      remove. If kb_artifact_exists() is implemented in kb-state.sh, the dispatcher's
      EVIDENCE check can be migrated to KB in the same pass rather than deferring to
      KFMB-6020. Non-blocking since the story's AC-4 language is satisfied without it,
      but the opportunity to eliminate a remaining filesystem artifact check exists
      within this story's natural scope.
    priority: low
    blocking: false
    decision: log_to_kb
    kb_entry_id: null

  - id: OPP-2
    title: "AC-8 dry-run verification: add explicit KB-unavailable simulation step to test plan"
    description: >
      TS-3, TS-5, and TS-6 specify that "KB unavailability produces a non-zero exit"
      but the test plan does not specify HOW to simulate KB unavailability (e.g.,
      ANTHROPIC_BASE_URL pointing to a dead port, or temporarily stopping the KB
      service). Adding an explicit simulation instruction (e.g., "run with
      MCP_SERVER=localhost:9999 to force connection failure") would make these
      test scenarios fully self-contained and reduce ambiguity for the reviewer.
      Non-blocking — experienced implementer will infer the technique.
    priority: low
    blocking: false
    decision: log_to_kb
    kb_entry_id: null

  - id: OPP-3
    title: "Reality Baseline note: current code does not yet reflect post-dependency state"
    description: >
      Code review confirms that generate-stories.sh and implement-stories.sh have NO
      kb_state_query() function and no [KB-FIRST FALLBACK] labels — they are pure
      filesystem implementations. This is correct per the Reality Baseline's note
      ("KB was unavailable during seed generation; lessons derived from dependency
      story ELAB artifacts"). The story's Reality Baseline table describes the
      expected states AFTER KFMB-3030, KFMB-4020, and KFMB-5030 are merged.
      The implementer must confirm PRE-1 is satisfied (all three dependencies at
      needs-code-review or later) before beginning. This is already captured in PRE-1
      and the Dependency gate section — noting here for analyst awareness only.
    priority: informational
    blocking: false
    decision: log_to_kb
    kb_entry_id: null

