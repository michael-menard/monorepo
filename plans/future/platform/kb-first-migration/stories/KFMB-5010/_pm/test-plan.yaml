strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
happy_path_tests:
  - id: HP-1
    title: "End-to-end pipeline run — checkpoint written to KB after setup phase"
    setup: "KFMB-1030 and KFMB-2040 are complete. KB running on port 5433. A test story (e.g., TEST-9999) is in backlog state."
    action: "Run /dev-implement-story TEST-9999 through the setup phase using dev-setup-leader."
    expected: "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'checkpoint', phase: 'setup' }) returns the checkpoint artifact. No CHECKPOINT.yaml file is created under _implementation/."
    evidence: "kb_read_artifact response logged; ls _implementation/ shows no YAML files."
  - id: HP-2
    title: "End-to-end pipeline run — scope written to KB after setup phase"
    setup: "Same as HP-1."
    action: "After dev-setup-leader completes its scope write call."
    expected: "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'scope' }) returns the scope artifact."
    evidence: "kb_read_artifact response logged showing populated scope content."
  - id: HP-3
    title: "End-to-end pipeline run — plan written to KB after planning phase"
    setup: "dev-setup-leader has completed. KB contains checkpoint and scope for TEST-9999."
    action: "Run /dev-implement-story through the planning phase using dev-plan-leader."
    expected: "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'plan' }) returns the plan artifact."
    evidence: "kb_read_artifact response logged showing populated plan content."
  - id: HP-4
    title: "End-to-end pipeline run — evidence written to KB after execute phase"
    setup: "Planning phase complete. dev-execute-leader runs implementation phase."
    action: "Run /dev-implement-story through the execute phase."
    expected: "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'evidence' }) returns the evidence artifact."
    evidence: "kb_read_artifact response logged."
  - id: HP-5
    title: "End-to-end pipeline run — review written to KB after code review phase"
    setup: "Execute phase complete. review-aggregate-leader runs."
    action: "Trigger code review phase."
    expected: "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'review' }) returns the review artifact."
    evidence: "kb_read_artifact response logged."
  - id: HP-6
    title: "End-to-end pipeline run — verification written to KB after QA phase"
    setup: "Code review complete. qa-verify-verification-leader or qa-verify-completion-leader runs."
    action: "Trigger QA verification phase."
    expected: "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'verification' }) returns the verification artifact."
    evidence: "kb_read_artifact response logged showing PASS or FAIL verdict."
  - id: HP-7
    title: "Frontmatter kb_tools updated — no artifact_write in any of the 7 agents"
    setup: "KFMB-5010 implementation complete. Agent files updated."
    action: "Run: grep -rn 'artifact_write' .claude/agents/dev-setup-leader.agent.md .claude/agents/dev-plan-leader.agent.md .claude/agents/dev-execute-leader.agent.md .claude/agents/dev-fix-fix-leader.agent.md .claude/agents/review-aggregate-leader.agent.md .claude/agents/qa-verify-verification-leader.agent.md .claude/agents/qa-verify-completion-leader.agent.md"
    expected: "No matches returned. All 7 files are free of artifact_write references."
    evidence: "grep output shows zero matches."
error_cases:
  - id: EC-1
    title: "KB write failure — pipeline phase continues gracefully"
    setup: "KB unavailable (simulate by stopping KB server or using an invalid connection). dev-setup-leader attempts kb_write_artifact for checkpoint."
    action: "Run dev-setup-leader against a test story while KB is unavailable."
    expected: "Agent logs a warning about KB write failure. Pipeline phase continues to next step without halting. No exception is thrown that breaks orchestration."
    evidence: "Agent output includes warning log line. Pipeline proceeds to next phase."
  - id: EC-2
    title: "file_path parameter absent — no _implementation/ YAML files created"
    setup: "KFMB-5010 implementation complete."
    action: "Run a complete /dev-implement-story end-to-end. After completion, check _implementation/ directory."
    expected: "_implementation/ directory does not contain any .yaml artifact files (CHECKPOINT.yaml, SCOPE.yaml, PLAN.yaml, EVIDENCE.yaml, REVIEW.yaml, QA-VERIFY.yaml are absent). Only BACKEND-LOG.md and FRONTEND-LOG.md may be present."
    evidence: "ls _implementation/ shows no .yaml files."
  - id: EC-3
    title: "dev-implement-backend-coder and dev-implement-frontend-coder unchanged"
    setup: "KFMB-5010 implementation complete."
    action: "Read .claude/agents/dev-implement-backend-coder.agent.md and .claude/agents/dev-implement-frontend-coder.agent.md. Check their kb_tools frontmatter."
    expected: "These two files are unchanged from their pre-KFMB-5010 state. Their artifact_write frontmatter entry (for log file context) is still present."
    evidence: "File diff shows no changes to these two agents."
edge_cases:
  - id: ED-1
    title: "fix_summary artifact written by dev-setup-leader during fix flow"
    setup: "dev-setup-leader is invoked in its fix/retry flow (not the initial setup flow)."
    action: "Trigger the fix path in dev-setup-leader that writes fix_summary."
    expected: "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'fix_summary' }) returns the artifact."
    evidence: "kb_read_artifact response logged."
  - id: ED-2
    title: "qa-verify-completion-leader FAIL branch writes verification"
    setup: "QA verification reaches a FAIL outcome."
    action: "Trigger the FAIL branch in qa-verify-completion-leader."
    expected: "kb_read_artifact for verification returns a verification artifact with a FAIL verdict. No YAML file written to filesystem."
    evidence: "kb_read_artifact response logged with verdict: FAIL."
  - id: ED-3
    title: "kb_write_artifact iteration parameter increments correctly on retry"
    setup: "An agent writes the same artifact type and phase a second time (retry scenario)."
    action: "Call kb_write_artifact with iteration: 1, then again with iteration: 2 for the same story_id, artifact_type, and phase."
    expected: "Both iterations are stored. kb_read_artifact returns the latest iteration."
    evidence: "KB query confirms multiple iterations stored."
tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "kb_read_artifact returns non-null content for each of: checkpoint(setup), scope, plan, evidence, review, verification"
      - "No .yaml files present under _implementation/ after full pipeline run"
      - "grep -rn 'artifact_write' across all 7 target agent files returns zero matches"
      - "grep -rn 'kb_write_artifact' across all 7 target agent files returns at least one match per file"
manual_cases:
  - id: MC-1
    title: "Spot-check: dev-setup-leader frontmatter kb_tools"
    steps:
      - "Open .claude/agents/dev-setup-leader.agent.md"
      - "Read the YAML frontmatter section (lines 1-20 or similar)"
      - "Check kb_tools list"
    expected: "kb_tools contains kb_write_artifact. kb_tools does NOT contain artifact_write."
  - id: MC-2
    title: "Spot-check: dev-plan-leader call sites"
    steps:
      - "Open .claude/agents/dev-plan-leader.agent.md"
      - "Search for all kb_write_artifact call blocks"
      - "Verify no file_path parameter appears in any kb_write_artifact call"
    expected: "All call blocks use story_id, artifact_type, phase, iteration, content — no file_path."
  - id: MC-3
    title: "Spot-check: graceful failure handling in each agent"
    steps:
      - "Open each of the 7 agent files"
      - "Find the section describing failure handling for KB writes"
      - "Confirm each agent has language like: 'if kb_write_artifact fails, log a warning and continue'"
    expected: "All 7 agents have graceful failure language for kb_write_artifact."
  - id: MC-4
    title: "Spot-check: knowledge-context-loader unchanged"
    steps:
      - "Open .claude/agents/knowledge-context-loader.agent.md"
      - "Confirm it already uses kb_write_artifact (not artifact_write)"
      - "Confirm it was not modified as part of this story"
    expected: "knowledge-context-loader uses kb_write_artifact natively; no changes made by this story."
fixture_definitions:
  - name: test_story_TEST-9999
    type: story
    description: "A minimal test story in backlog state used for end-to-end pipeline integration verification. Must be in a feature with a valid KB entry."
risks:
  - "Integration tests require KFMB-1030 and KFMB-2040 to be complete — cannot run until those stories land."
  - "End-to-end pipeline run requires real KB on port 5433 per ADR-005; KB must be running during test execution."
  - "Graceful failure test (EC-1) requires manually stopping the KB server, which may be disruptive to other concurrent tests."
