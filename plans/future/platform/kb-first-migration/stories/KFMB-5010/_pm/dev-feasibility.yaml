feasible: true
confidence: high
rationale: "All 7 target agents are markdown files under .claude/agents/. The migration pattern is well-defined: replace artifact_write calls with kb_write_artifact calls, remove file_path parameters, and update kb_tools frontmatter. No TypeScript compilation, no DB schema changes, no package.json changes. The knowledge-context-loader.agent.md already serves as a validated reference implementation. All required artifact types (checkpoint, scope, plan, evidence, review, verification, fix_summary) exist in the KB. The migration is purely textual with no build step required."
complexity: medium
change_surface:
  areas:
    - ".claude/agents/ (7 agent instruction files)"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required — agent instruction files are read directly from filesystem by Claude sessions"
    - "Implementation gated on KFMB-1030 and KFMB-2040 reaching completed status"
risks:
  - finding: "Partial migration leaves inconsistent pipeline state — if fewer than all 7 agents are updated, some phases write to KB while others write to filesystem, breaking KFMB-5020 reader migration."
    mitigation: "Treat all 7 agent file updates as a single atomic batch. If scope must be split, define clear sub-story boundaries (e.g., setup/plan group vs. execute/review/QA group) and implement sequentially, not in parallel."
  - finding: "artifact_write and kb_write_artifact have different call signatures — artifact_write accepts file_path; kb_write_artifact does not. Including file_path in migrated calls will cause tool errors."
    mitigation: "Dev agent must explicitly drop file_path when migrating each call site. The _shared/kb-integration.md pattern (lines 293-390) provides the canonical call template."
  - finding: "dev-implement-backend-coder and dev-implement-frontend-coder are out-of-scope (KBAR-0170 exemption) but have artifact_write in frontmatter — accidental inclusion would modify files that should not change."
    mitigation: "Explicitly document exclusion in SCOPE.yaml. Dev agent must confirm these two agents are unchanged as part of AC-10 verification."
missing_requirements: []
evidence_expectations:
  - "grep -rn 'artifact_write' across the 7 target agent files returns zero matches after implementation"
  - "grep -rn 'kb_write_artifact' across the 7 target agent files returns at least one match per file"
  - "dev-implement-backend-coder.agent.md and dev-implement-frontend-coder.agent.md are byte-for-byte identical to their pre-implementation state (git diff shows no changes)"
  - "All 7 agent files have kb_tools frontmatter listing kb_write_artifact and not artifact_write"
