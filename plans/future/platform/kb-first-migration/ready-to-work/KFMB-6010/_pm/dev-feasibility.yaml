architecture_notes: >
  The kb_state_query() function currently duplicated in generate-stories.sh
  and implement-stories.sh (both added independently in KFMB-4020) should be
  extracted to scripts/lib/kb-state.sh. This new library follows the same
  pattern as scripts/lib/resolve-plan.sh: sourced by calling scripts, exports
  named functions, uses claude -p + --allowedTools + jq + || true wrapping.

  The implement-dispatcher.sh poll loop must use the batch kb_list_stories
  pattern (one call per poll cycle → in-memory array → O(1) per-story
  lookups) rather than per-story claude -p calls. This was established by
  KFMB-5030 to avoid N-story subprocess latency.

  sync-work-order.py check_untracked_stories() and scan_all_index_stories()
  became no-ops after KFMB-3030 removed the *stories.index.md glob. These
  can be removed cleanly (with a comment documenting why) or replaced with
  KB queries if their original functionality is still needed. The decision
  should be driven by whether the use case they served is covered by the KB.

