summary: >
  KFMB-6010 is a mechanical cleanup story. Every pattern required is
  already established by KFMB-3030, KFMB-4020, and KFMB-5030. The work
  is removal of fallback branches and extraction of a shared library — no
  new design exploration. The highest-risk change is implement-dispatcher.sh
  (production-style poll loop), but the batch kb_list_stories pattern from
  KFMB-5030 mitigates per-story latency risk.

risks:
  - id: RISK-1
    description: >
      implement-dispatcher.sh poll loop regression. This script drives
      production-style pipelines. Removing filesystem fallbacks must not
      break the --parallel or --only flags. Regression testing with a live
      KB is required.
    mitigation: >
      Use existing --dry-run mode for structural validation. Run one full
      cycle against kb-first-migration plan with KB available before marking
      done. Batch kb_list_stories (not per-story calls) for the poll loop.
    severity: medium

  - id: RISK-2
    description: >
      AC-6 is conditionally gated on KFMB-3010 completion. If KFMB-3010 is
      not done, the discover_stories() filesystem fallback cannot be removed.
    mitigation: >
      ACs explicitly handle both paths: full removal if KFMB-3010 complete,
      or retain with TODO(KFMB-3010) comment. Either outcome passes AC-6.
    severity: low

  - id: RISK-3
    description: >
      KB unavailability must produce a non-zero exit with descriptive message
      (not hang, not silent empty list). This error path must be explicitly
      tested.
    mitigation: >
      KB unavailability test scenario included in test plan (TS-3, TS-5).
      The || true + -z guard pattern from resolve-plan.sh is the template —
      replace the || true + filesystem fallback with || exit 1 + error message.
    severity: low

  - id: RISK-4
    description: >
      Bash 3.2 compatibility (macOS). No associative arrays. The batch
      kb_list_stories result must be stored as indexed arrays or positional
      args, not associative arrays.
    mitigation: >
      All patterns follow KFMB-5030 batch query pattern which already uses
      indexed arrays. No new array handling needed.
    severity: low

