# -------------------------------------------------------------------
# DECISIONS (left for human PM review)
# -------------------------------------------------------------------
decisions:
  - id: DEC-1
    question: >
      Should the seed agent call kb_get_story({story_id}) to resolve story
      identity after index_path is made optional (AC-5), or should the
      orchestrator continue to inline the story entry in the spawn prompt?
    options:
      - "A: Seed agent calls kb_get_story — removes filesystem dependency entirely"
      - "B: Orchestrator inlines story entry — seed agent remains stateless re KB for story lookup"
    recommendation: "A"
    rationale: >
      Option A aligns with the KB-first migration goal. The seed agent calling
      kb_get_story directly eliminates filesystem dependency for story identity,
      which is the explicit intent of this migration. AC-9 was added to make
      this explicit.
    decided_by: elab-autonomous-decider
    decided_at: "2026-02-26T00:00:00Z"

  - id: DEC-2
    question: >
      After Phase 4.5 migration, which fields does kb_update_story own vs.
      migrate:stories? Are they complementary (different field sets) or
      partially redundant?
    options:
      - "A: kb_update_story owns content fields (description, ACs, non_goals); migrate:stories owns structural fields (story_id, title, state, etc.)"
      - "B: kb_update_story is the sole write path post-migration; migrate:stories is deprecated for content fields"
    recommendation: "A"
    rationale: >
      Option A is the safe transitional choice. kb_update_story handles content
      fields (description, ACs, non_goals) per KFMB-1020 extension, while
      migrate:stories handles structural fields (story_id, title, state). This
      complementary split avoids breaking the migrate:stories script during
      transition. Full consolidation is deferred to KFMB-6010/6020.
    decided_by: elab-autonomous-decider
    decided_at: "2026-02-26T00:00:00Z"
