      Clarifying this as a permanent path rather than transitional would
      improve resilience documentation.
    applicable_phase: implementation
    decision: log_to_kb
    kb_entry_id: "de9fff48-4495-4f75-bade-da3b1aebabdc"

  - id: OPP-4
    title: "AC-7 scope clarification after ST-1 caller audit"
    description: >
      If ST-1 confirms sibling leaders (adhoc, followup, split) do not spawn
      the seed agent directly, AC-7's verification scope narrows significantly.
      This reduces test surface for ED-1 and ED-2 and may simplify the
      post-implementation spot-check.
    applicable_phase: pre-implementation
    decision: log_to_kb
    kb_entry_id: "43e8ae4a-8bb6-4ad9-a004-a63393352588"

