strategy: integration+manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
happy_path_tests:
  - id: HP-1
    title: "pm-story-seed-agent writes story_seed artifact to KB after filesystem write"
    setup: "KFMB-1030 and KFMB-2040 complete; KB running on port 5433; test story TEST-9999 seeded"
    action: "Run /pm-story seed TEST-9999 against a test epic directory"
    expected: "STORY-SEED.md exists in TEST-9999/_pm/ AND kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'story_seed' }) returns the artifact"
    evidence: "File present in _pm/; kb_read_artifact returns non-null with correct story_id and artifact_type"
  - id: HP-2
    title: "pm-draft-test-plan writes test_plan artifact to KB after filesystem write"
    setup: "KFMB-1030 and KFMB-2040 complete; KB running on port 5433; pm-story-seed-agent has run for TEST-9999"
    action: "Run /pm-story generate which spawns pm-draft-test-plan for TEST-9999"
    expected: "test-plan.yaml exists in TEST-9999/_pm/ AND kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'test_plan' }) returns the artifact"
    evidence: "File present in _pm/; kb_read_artifact returns non-null with strategy field"
  - id: HP-3
    title: "pm-dev-feasibility-review writes dev_feasibility artifact to KB after filesystem write"
    setup: "KFMB-1030 and KFMB-2040 complete; KB running on port 5433"
    action: "Run /pm-story generate which spawns pm-dev-feasibility-review for TEST-9999"
    expected: "dev-feasibility.yaml exists in TEST-9999/_pm/ AND kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'dev_feasibility' }) returns the artifact"
    evidence: "File present in _pm/; kb_read_artifact returns non-null with feasible and confidence fields"
  - id: HP-4
    title: "pm-uiux-recommendations writes uiux_notes artifact to KB after filesystem write (non-skipped branch)"
    setup: "KFMB-1030 and KFMB-2040 complete; KB running on port 5433; test story has UI touches"
    action: "Run /pm-story generate which spawns pm-uiux-recommendations for a UI-touching test story"
    expected: "uiux-notes.yaml exists in TEST-9999/_pm/ AND kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'uiux_notes' }) returns the artifact with skipped: false"
    evidence: "File present in _pm/; kb_read_artifact returns non-null with skipped: false"

error_cases:
  - id: EC-1
    title: "KB unavailable during pm-draft-test-plan execution — filesystem write still succeeds"
    setup: "KB port 5433 unavailable (simulated); test story TEST-9999"
    action: "Run pm-draft-test-plan for TEST-9999 with KB unreachable"
    expected: "test-plan.yaml is still written to _pm/ (filesystem write unaffected); agent logs a warning about KB write failure; agent does NOT halt or error out"
    evidence: "test-plan.yaml present in _pm/; WARNING log entry present; pm-story-generation-leader completes story generation normally"
  - id: EC-2
    title: "KB unavailable during pm-story-seed-agent execution — filesystem write still succeeds"
    setup: "KB port 5433 unavailable; test story TEST-9999"
    action: "Run pm-story-seed-agent for TEST-9999 with KB unreachable"
    expected: "STORY-SEED.md is still written to _pm/; agent logs warning and continues"
    evidence: "STORY-SEED.md present; WARNING log present; downstream workers can proceed"
  - id: EC-3
    title: "pm-uiux-recommendations skipped branch — uiux-notes.yaml with skipped: true still written; KB artifact written with skipped: true"
    setup: "KFMB-1030 complete; test story with no UI touches (e.g., backend-only story)"
    action: "Run pm-uiux-recommendations for a story with no UI touches"
    expected: "uiux-notes.yaml written to _pm/ with skipped: true; kb_read_artifact returns artifact with content.skipped: true (or KB write intentionally suppressed per elaboration decision)"
    evidence: "uiux-notes.yaml present with skipped: true; KB artifact present or absence documented in story non-goals"

edge_cases:
  - id: ED-1
    title: "Full pm-story generate pipeline dual-write regression — all 4 _pm/ files present after migration"
    setup: "KFMB-5040 implemented; KFMB-1030 and KFMB-2040 complete; pm-story-generation-leader unchanged"
    action: "Run full /pm-story generate for TEST-9999"
    expected: "All 4 files present: STORY-SEED.md, test-plan.yaml, dev-feasibility.yaml, uiux-notes.yaml in _pm/; story.yaml generated with pm_artifacts correctly embedded by leader"
    evidence: "All 4 files present; story.yaml pm_artifacts section has test_plan, dev_feasibility keys; pm-story-generation-leader did not error"
  - id: ED-2
    title: "Agent frontmatter kb_tools includes kb_write_artifact for all 4 agents"
    setup: "KFMB-5040 implemented"
    action: "Inspect frontmatter of pm-story-seed-agent.agent.md, pm-draft-test-plan.agent.md, pm-dev-feasibility-review.agent.md, pm-uiux-recommendations.agent.md"
    expected: "kb_write_artifact present in kb_tools list for all 4 agents; no duplicate entries"
    evidence: "YAML frontmatter inspection; grep kb_write_artifact in each agent file"
  - id: ED-3
    title: "pm-story-generation-leader is unchanged — still reads from _pm/ filesystem"
    setup: "KFMB-5040 implemented"
    action: "Inspect pm-story-generation-leader.agent.md for any changes to _pm/ read logic or kb_read_artifact calls"
    expected: "pm-story-generation-leader still reads _pm/ files; no kb_read_artifact calls added; pm_artifacts embedding logic unchanged"
    evidence: "File diff shows no modifications to leader agent"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'story_seed' }) returns non-null artifact"
      - "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'test_plan' }) returns non-null artifact with strategy field"
      - "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'dev_feasibility' }) returns non-null artifact with feasible and confidence fields"
      - "kb_read_artifact({ story_id: 'TEST-9999', artifact_type: 'uiux_notes' }) returns non-null artifact"
  frontend:

manual_cases:
  - id: MC-1
    title: "Spot-check agent files — retained filesystem Write calls"
    steps:
      - "Read .claude/agents/pm-story-seed-agent.agent.md"
      - "Confirm Write tool call for _pm/STORY-SEED.md is still present"
      - "Confirm kb_write_artifact call with artifact_type: story_seed is appended after Write"
      - "Repeat for pm-draft-test-plan, pm-dev-feasibility-review, pm-uiux-recommendations"
    expected: "All 4 agents have both Write call AND kb_write_artifact call; no Write calls removed"
  - id: MC-2
    title: "Spot-check graceful failure instructions in each agent"
    steps:
      - "Read each of the 4 migrated agent files"
      - "Verify each has an instruction to log a warning and continue if kb_write_artifact fails"
      - "Verify the instruction does NOT say to halt or throw on KB failure"
    expected: "Graceful failure pattern present in all 4 agents"

fixture_definitions:
  - name: TEST-9999
    type: test story
    description: "Ephemeral test story used for integration verification of PM artifact KB writes; requires KFMB-1030 artifact types to be live in KB"

risks:
  - "Integration tests cannot run until KFMB-1030 and KFMB-2040 are complete — artifact types do not exist yet"
  - "KB availability on port 5433 required for HP-1 through HP-4; ADR-005 prohibits mocked MCP responses"
  - "skipped: true branch for uiux_notes KB write behavior must be decided during elaboration before implementation"
  - "ED-3 regression guard: if pm-story-generation-leader is accidentally modified, this test catches it"
