strategy: manual+grep-audit
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  agents_touched: 32
  infra_touched: false

happy_path_tests:
  - id: HP-1
    title: "pm-story-followup-leader uses kb_list_stories for ID allocation (AC-1)"
    setup: "Open .claude/agents/pm-story-followup-leader.agent.md"
    action: "Review Phase 3/3.5 collision detection section; verify reference to kb_list_stories({feature, limit: 100}) and MAX(story_id_numeric)+10 calculation"
    expected: "No grep match for 'stories.index.md' in this file; kb_list_stories call present"
    evidence: "grep 'stories.index.md' .claude/agents/pm-story-followup-leader.agent.md returns no output"

  - id: HP-2
    title: "pm-story-split-leader uses kb_list_stories for ID allocation (AC-2)"
    setup: "Open .claude/agents/pm-story-split-leader.agent.md"
    action: "Review ID-allocation section; verify kb_list_stories pattern matches AC-1 pattern"
    expected: "No grep match for 'stories.index.md'; kb_list_stories call present"
    evidence: "grep 'stories.index.md' .claude/agents/pm-story-split-leader.agent.md returns no output"

  - id: HP-3
    title: "elab-epic-updates-leader writes stories to KB (AC-3)"
    setup: "Open .claude/agents/elab-epic-updates-leader.agent.md"
    action: "Verify all story write operations use kb_create_story or kb_update_story_status; verify UPDATES-LOG KB artifact write is preserved"
    expected: "No grep match for 'stories.index.md'; kb_create_story and/or kb_update_story_status present"
    evidence: "grep 'stories.index.md' .claude/agents/elab-epic-updates-leader.agent.md returns no output"

  - id: HP-4
    title: "audit-promote-leader deduplicates via KB (AC-4)"
    setup: "Open .claude/agents/audit-promote-leader.agent.md"
    action: "Verify dedup logic uses kb_list_stories or kb_search instead of reading plans/future/*/stories.index.md glob"
    expected: "No grep match for 'stories.index.md'; kb_list_stories or kb_search present in dedup section"
    evidence: "grep 'stories.index.md' .claude/agents/audit-promote-leader.agent.md returns no output"

  - id: HP-5
    title: "pm-story-generation-leader claims story via kb_update_story_status (AC-5)"
    setup: "Open .claude/agents/pm-story-generation-leader.agent.md"
    action: "Verify Phase 0.6 uses kb_update_story_status({story_id, state: 'in_progress'}) and Phase 5 verifies via kb_get_story; no /index-update skill call"
    expected: "No grep match for 'stories.index.md'; kb_update_story_status and kb_get_story present"
    evidence: "grep 'stories.index.md' .claude/agents/pm-story-generation-leader.agent.md returns no output"

  - id: HP-6
    title: "pm-bootstrap-setup-leader collision detection uses kb_list_stories (AC-6)"
    setup: "Open .claude/agents/pm-bootstrap-setup-leader.agent.md (post-KFMB-2020)"
    action: "Verify collision detection uses kb_list_stories({feature: prefix}); no filesystem existence check for stories.index.md"
    expected: "No grep match for 'stories.index.md'; kb_list_stories with feature filter present"
    evidence: "grep 'stories.index.md' .claude/agents/pm-bootstrap-setup-leader.agent.md returns no output"

  - id: HP-7
    title: "pm-bootstrap-generation-leader writes only to KB (AC-7)"
    setup: "Open .claude/agents/pm-bootstrap-generation-leader.agent.md (post-KFMB-2010)"
    action: "Verify all story creation uses kb_create_story; no filesystem write to stories.index.md"
    expected: "No grep match for 'stories.index.md' as write target; kb_create_story present"
    evidence: "grep 'stories.index.md' .claude/agents/pm-bootstrap-generation-leader.agent.md returns no output"

  - id: HP-8
    title: "Read-only consumers use kb_get_story (AC-8)"
    setup: "Open each of: pm-story-seed-agent, pm-draft-test-plan, pm-uiux-recommendations, pm-dev-feasibility-review, elab-analyst, story-fanout-pm, story-fanout-qa, story-fanout-ux"
    action: "Verify each uses kb_get_story({story_id}) for story data retrieval; index_path input parameter removed or replaced with story_id"
    expected: "No grep match for 'stories.index.md' in any of the 8 files"
    evidence: "grep 'stories.index.md' .claude/agents/pm-story-seed-agent.agent.md .claude/agents/pm-draft-test-plan.agent.md .claude/agents/pm-uiux-recommendations.agent.md .claude/agents/pm-dev-feasibility-review.agent.md .claude/agents/elab-analyst.agent.md .claude/agents/story-fanout-pm.agent.md .claude/agents/story-fanout-qa.agent.md .claude/agents/story-fanout-ux.agent.md returns no output"

  - id: HP-9
    title: "Setup/validation agents use kb_list_stories (AC-9)"
    setup: "Open elab-epic-setup-leader.agent.md and pm-harness-setup-leader.agent.md"
    action: "Verify bootstrap completion check uses kb_list_stories({feature: prefix}) instead of checking stories.index.md file existence"
    expected: "No grep match for 'stories.index.md' in either file; kb_list_stories present"
    evidence: "grep 'stories.index.md' .claude/agents/elab-epic-setup-leader.agent.md .claude/agents/pm-harness-setup-leader.agent.md returns no output"

  - id: HP-10
    title: "reality-intake-collector scans completed stories via KB (AC-10)"
    setup: "Open .claude/agents/reality-intake-collector.agent.md"
    action: "Verify scan uses kb_list_stories({state: 'completed'}) instead of globbing plans/future/*/stories.index.md"
    expected: "No grep match for 'stories.index.md'; kb_list_stories with state filter present"
    evidence: "grep 'stories.index.md' .claude/agents/reality-intake-collector.agent.md returns no output"

  - id: HP-11
    title: "audit-devils-advocate dedup uses KB search (AC-11)"
    setup: "Open .claude/agents/audit-devils-advocate.agent.md"
    action: "Verify dedup check uses kb_search or kb_list_stories instead of reading plans/future/*/stories.index.md"
    expected: "No grep match for 'stories.index.md'; kb_search or kb_list_stories present"
    evidence: "grep 'stories.index.md' .claude/agents/audit-devils-advocate.agent.md returns no output"

  - id: HP-12
    title: "Completion signals preserved across all updated agents (AC-12)"
    setup: "For each updated agent, compare output/completion signal sections before and after"
    action: "Verify PM COMPLETE, SETUP COMPLETE, GENERATION COMPLETE, and other completion signals remain unchanged"
    expected: "All completion signal strings are identical to pre-change versions"
    evidence: "Side-by-side diff of completion signal sections in each agent file"

  - id: HP-13
    title: "Final grep audit — zero stories.index.md references (AC-13)"
    setup: "Run from monorepo root after all changes applied"
    action: "grep -r 'stories\\.index\\.md' .claude/agents/"
    expected: "Zero matches returned"
    evidence: "Command exits with no stdout output and exit code 1 (no matches found) OR exit code 0 with 0 matches"

error_cases:
  - id: EC-1
    title: "kb_list_stories call missing feature filter"
    setup: "Review any agent that calls kb_list_stories for ID allocation"
    action: "Check that the feature/prefix parameter is passed to prevent cross-epic ID collisions"
    expected: "Every kb_list_stories call in ID-allocation agents includes feature filter"
    evidence: "Code review of all modified agents' kb_list_stories call signatures"

  - id: EC-2
    title: "Partial migration — agent still has both old and new reference"
    setup: "Run grep audit mid-migration"
    action: "grep -r 'stories\\.index\\.md' .claude/agents/ | grep -v 'STORY-SEED'"
    expected: "Any agent found must be intentionally in-progress or excluded from scope"
    evidence: "All grep results are accounted for in the migration tracker"

  - id: EC-3
    title: "Agent passes index_path to worker that no longer accepts it"
    setup: "Review agents that spawn sub-workers (pm.agent.md, story-fanout-pm, etc.)"
    action: "Verify any removed index_path parameter in workers is also removed from the spawning parent's prompt template"
    expected: "No mismatch between spawner parameter lists and worker input expectations"
    evidence: "Diff review of parent agents that pass context to modified workers"

  - id: EC-4
    title: "kb_update_story_status called with invalid state"
    setup: "Review pm-story-generation-leader Phase 0.6 replacement"
    action: "Verify state value matches KB MCP tool accepted values (e.g., 'in_progress', not 'Created')"
    expected: "State string matches KB schema enum values exactly"
    evidence: "Cross-reference with KB MCP tool schema documentation"

edge_cases:
  - id: ED-1
    title: "Agent excluded from scope still references stories.index.md"
    setup: "Run final grep audit"
    action: "Identify any agent not in the ~32 scope list that still references stories.index.md"
    expected: "Any additional references are intentional exclusions (e.g., _shared/work-order-claim.md)"
    evidence: "All grep results in .claude/agents/ are either updated or intentionally excluded"

  - id: ED-2
    title: "elab-epic-* review agents (AC-13 coverage)"
    setup: "Open each of: elab-epic-engineering, elab-epic-platform, elab-epic-product, elab-epic-qa, elab-epic-security, elab-epic-ux"
    action: "Verify all 6 agents have no remaining stories.index.md references"
    expected: "grep returns no matches for any of the 6 elab-epic-* agents"
    evidence: "grep 'stories.index.md' .claude/agents/elab-epic-*.agent.md returns no output"

  - id: ED-3
    title: "story-attack-agent, pm-story-adhoc-leader, pm-story-bug-leader (Subtask 8 coverage)"
    setup: "Open each of the three remaining agents"
    action: "Verify each has been updated and contains no stories.index.md references"
    expected: "grep returns no matches for all three files"
    evidence: "grep 'stories.index.md' .claude/agents/story-attack-agent.agent.md .claude/agents/pm-story-adhoc-leader.agent.md .claude/agents/pm-story-bug-leader.agent.md returns no output"

tooling_evidence:
  backend:
    http_requests: []
    assertions: []
  frontend: null

manual_cases:
  - id: MC-1
    title: "Per-agent before/after diff checklist"
    steps:
      - "For each of the ~32 agents in scope, open the file before the change"
      - "Record the specific stories.index.md read/write operation being replaced"
      - "Record the KB MCP tool call replacing it"
      - "Apply the change"
      - "Verify grep returns no match for this specific file"
    expected: "Completed checklist for all 32 agents with before/after documentation"

  - id: MC-2
    title: "KB tool signature validation"
    steps:
      - "Open KB MCP tool schema documentation (or mcp__knowledge-base tool listing)"
      - "For each KB tool used across agents (kb_list_stories, kb_get_story, kb_update_story_status, kb_get_next_story, kb_search), verify parameter names match actual MCP tool signatures"
      - "Cross-check any feature/prefix filter parameter names"
    expected: "All KB tool calls in updated agents use the correct parameter names as defined in the MCP tool schema"

  - id: MC-3
    title: "Completion signal regression check"
    steps:
      - "Before making any changes, document the completion signal string for each agent in scope"
      - "After changes, compare each agent's completion signal to the documented baseline"
    expected: "Zero diffs in completion signal strings"

fixture_definitions: []

risks:
  - "Blast radius: ~32 agent files increase probability of a missed reference"
  - "KB tool parameter names may differ from assumed values — manual schema validation required"
  - "Agents spawned by other agents: parent prompt templates may still pass index_path to updated workers"
  - "No automated test harness for agent .md files — all verification is manual review + grep"
  - "KFMB-2010 and KFMB-2020 must complete before AC-6 and AC-7 can be tested"
