feasible: true
confidence: high
rationale: >
  All required KB tools (kb_get_story, kb_list_stories, kb_read_artifact) already exist and are
  registered. The canonical bash subprocess pattern for invoking claude -p KB queries is already
  proven in scripts/lib/resolve-plan.sh. The kb_read_artifact pattern for precondition existence
  checks is already live in dev-code-review.md Phase 0. Changes are mechanical substitutions
  (filesystem checks → KB calls) across markdown files and bash scripts — no TypeScript build
  required. The only design decision with moderate complexity is the context-init.md consumer
  audit for AC-7.
complexity: medium
change_surface:
  areas:
    - ".claude/commands/ (8 command files)"
    - "scripts/ (3 bash scripts)"
    - "scripts/lib/resolve-plan.sh (reference pattern — no modification)"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required — docs+scripts only"
    - "Shell scripts updated in-place; changes take effect on next script invocation"
risks:
  - finding: "context-init.md downstream consumer audit may reveal agents outside the current scope reading AGENT-CONTEXT.md from disk"
    mitigation: "Audit all downstream consumers of AGENT-CONTEXT.md (scrum-master-loop-leader, elab-epic-setup-leader, pm-bootstrap-setup-leader, pm-harness-setup-leader) before implementing AC-7. If a complete KB migration path is not achievable in this story, retain filesystem write with KB dual-write and document the deferral clearly."
  - finding: "implement-dispatcher.sh poll loop performance degradation if per-story claude -p subprocess calls are used"
    mitigation: "Use batch strategy (Option B): one kb_list_stories call per poll cycle fetches all story states for the plan. Store in associative array and use in-memory lookups for is_elaborated(), is_implemented(). This adds one claude -p call per poll cycle (not per story). Avoids ~2-5s * N_stories latency multiplication."
  - finding: "KFMB-4020 scope overlap: same files targeted by both stories"
    mitigation: "Before beginning implementation, coordinate with KFMB-4020 assignee. Agreed split: KFMB-5030 modifies --requires=FILEPATH artifact checks; KFMB-4020 modifies --in-stage= directory checks and stage directory elimination. Work serially if both are in the same sprint."
missing_requirements:
  - "AC-7 needs explicit decision: does context-init.md write KB artifact, keep filesystem write, or dual-write? This depends on the consumer audit result. The AC should be finalized during elaboration after the consumer audit is run."
evidence_expectations:
  - "grep -n '_implementation/ELAB.yaml' scripts/implement-stories.sh returns 0 matches after implementation"
  - "grep -n '_implementation/EVIDENCE.yaml' scripts/implement-dispatcher.sh returns 0 matches after implementation"
  - "grep -n '_implementation/' scripts/generate-stories.sh returns 0 matches for state-detection logic after implementation"
  - "grep -n 'requires.*_implementation/' .claude/commands/precondition-check.md returns 0 matches after implementation"
  - "implement-stories.sh --dry-run output matches expected KB story state (tested against real KB port 5433)"
  - "End-to-end pipeline smoke test completes without _implementation/ file-not-found errors"

subtasks:
  - id: ST-1
    title: "Audit context-init.md downstream consumers"
    goal: "Identify all agents and commands that read AGENT-CONTEXT.md from disk to determine if KB migration is safe for AC-7"
    files_to_read:
      - .claude/commands/context-init.md
      - .claude/commands/scrum-master.md
      - .claude/agents/scrum-master-loop-leader.agent.md
    files_to_modify: []
    acs: ["AC-7"]
    depends_on: "none"
    verification: "Audit findings documented in implementation notes; AC-7 decision recorded"
    estimated_tokens: 4000

  - id: ST-2
    title: "Migrate implement-stories.sh state detection to KB batch query"
    goal: "Replace is_elaborated(), is_implemented(), is_reviewed() filesystem checks with KB story state queries via batch claude -p kb_list_stories call"
    files_to_read:
      - scripts/implement-stories.sh
      - scripts/lib/resolve-plan.sh
    files_to_modify:
      - scripts/implement-stories.sh
    acs: ["AC-1", "AC-10"]
    depends_on: "ST-1"
    verification: "bash scripts/implement-stories.sh kb-first-migration --dry-run; verify no _implementation/ path checks remain"
    estimated_tokens: 8000

  - id: ST-3
    title: "Migrate implement-dispatcher.sh state detection to KB batch query"
    goal: "Replace is_elaborated() and EVIDENCE.yaml check with KB story state queries via batch claude -p kb_list_stories call; use same batch strategy as ST-2 to avoid poll loop latency"
    files_to_read:
      - scripts/implement-dispatcher.sh
      - scripts/lib/resolve-plan.sh
    files_to_modify:
      - scripts/implement-dispatcher.sh
    acs: ["AC-2", "AC-10"]
    depends_on: "ST-2"
    verification: "bash scripts/implement-dispatcher.sh kb-first-migration --dry-run; verify no _implementation/ path checks remain"
    estimated_tokens: 7000

  - id: ST-4
    title: "Migrate generate-stories.sh ALREADY_GENERATED and ALREADY_ELABORATED checks"
    goal: "Replace filesystem stat checks with KB story state queries (kb_get_story or kb_list_stories via claude -p)"
    files_to_read:
      - scripts/generate-stories.sh
      - scripts/lib/resolve-plan.sh
    files_to_modify:
      - scripts/generate-stories.sh
    acs: ["AC-3", "AC-10"]
    depends_on: "ST-2"
    verification: "bash scripts/generate-stories.sh kb-first-migration --dry-run; verify ALREADY_GENERATED and ALREADY_ELABORATED checks use KB state"
    estimated_tokens: 6000

  - id: ST-5
    title: "Migrate precondition-check.md elaboration and verification checks"
    goal: "Replace --requires=_implementation/ELAB.yaml and --requires=_implementation/VERIFICATION.yaml with kb_read_artifact artifact-existence assertions; update Precondition Sets table"
    files_to_read:
      - .claude/commands/precondition-check.md
      - .claude/commands/dev-code-review.md
    files_to_modify:
      - .claude/commands/precondition-check.md
    acs: ["AC-4", "AC-5", "AC-8"]
    depends_on: "ST-1"
    verification: "grep -n 'requires.*_implementation/' .claude/commands/precondition-check.md returns 0 matches; Precondition Sets table updated"
    estimated_tokens: 5000

  - id: ST-6
    title: "Audit and update command orchestrator agent spawn prompts"
    goal: "Audit dev-implement-story.md, elab-story.md, dev-code-review.md, qa-verify-story.md, dev-fix-story.md, scrum-master.md to ensure all agent spawn prompts pass story_id not filesystem paths; update any remaining path-based references"
    files_to_read:
      - .claude/commands/dev-implement-story.md
      - .claude/commands/elab-story.md
      - .claude/commands/dev-code-review.md
      - .claude/commands/qa-verify-story.md
      - .claude/commands/dev-fix-story.md
      - .claude/commands/scrum-master.md
    files_to_modify:
      - .claude/commands/dev-implement-story.md
      - .claude/commands/elab-story.md
      - .claude/commands/dev-code-review.md
    acs: ["AC-6"]
    depends_on: "ST-5"
    verification: "grep -rn '_implementation/ELAB\\|_implementation/EVIDENCE\\|_implementation/REVIEW' .claude/commands/ returns 0 matches for agent spawn prompt contexts"
    estimated_tokens: 10000

  - id: ST-7
    title: "Implement context-init.md KB migration or document deferral"
    goal: "Based on ST-1 audit: either migrate context-init.md to write KB context artifact, or retain filesystem write with KB dual-write and documented rationale for deferral"
    files_to_read:
      - .claude/commands/context-init.md
    files_to_modify:
      - .claude/commands/context-init.md
    acs: ["AC-7"]
    depends_on: "ST-1"
    verification: "Either: kb_write_artifact call present for context artifact type, OR clear deferral rationale paragraph present explaining consumer audit results"
    estimated_tokens: 5000

  - id: ST-8
    title: "Update command file frontmatter kb_artifacts declarations"
    goal: "Ensure frontmatter kb_artifacts lists in all modified commands accurately reflect artifact types read/written after migration (per KBAR-0190 lesson: must be updated atomically with call-site migration)"
    files_to_read:
      - .claude/commands/dev-implement-story.md
      - .claude/commands/elab-story.md
      - .claude/commands/dev-code-review.md
      - .claude/commands/qa-verify-story.md
      - .claude/commands/dev-fix-story.md
    files_to_modify:
      - .claude/commands/dev-implement-story.md
      - .claude/commands/elab-story.md
      - .claude/commands/dev-code-review.md
    acs: ["AC-6"]
    depends_on: "ST-6"
    verification: "All kb_artifacts frontmatter entries match actual kb_read_artifact / kb_write_artifact call sites in each command file"
    estimated_tokens: 5000
