      AC-6 authorization test is missing. The existing test suite uses pmContext
      throughout handleKbDeleteArtifact tests; no test verifies that non-pm roles
      (dev, qa, all) receive an authorization error.
    mitigation: >
      Add one test in the handleKbDeleteArtifact describe block using a non-pm
      ToolCallContext (agent_role: 'dev'). Expect result.isError === true.
    severity: low
    blocks_core_journey: false

missing_requirements: []

evidence_expectations:
