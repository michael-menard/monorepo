feasible: true
confidence: high
rationale: >
  The pattern is fully established by KFMB-4010 (story-move.md v2.1.0). The shimGetStoryStatus
  DB-first + directory-fallback guard is a proven, copy-paste template. The shell script KB
  query pattern is already in resolve-plan.sh. No new infrastructure is required — only
  two command .md files and two shell scripts need updating. The STATE_TO_SWIM_LANE reverse
  map is derivable at runtime from the existing SWIM_LANE_TO_STATE constant.
  Hard blocker: KFMB-4010 must be complete (DB state writes must be in place) before
  this story can be elaborated.
complexity: medium
change_surface:
  areas:
    - ".claude/commands/precondition-check.md (version bump + KB-first Step 1, Step 2, Step 3)"
    - ".claude/commands/context-init.md (version bump + KB-first Step 1)"
    - "scripts/generate-stories.sh (ALREADY_GENERATED + ALREADY_ELABORATED state detection)"
    - "scripts/implement-stories.sh (find_story_dir, is_elaborated, is_implemented, is_reviewed, is_completed)"
    - "packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts (add STATE_TO_SWIM_LANE export)"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required — changes are to documentation (.md files) and scripts (.sh files)"
    - "STATE_TO_SWIM_LANE export in __types__/index.ts requires pnpm build for dependent packages"

risks:
  - finding: >
      KFMB-4020 depends on KFMB-4010 DB state writes being in place. If /precondition-check
      runs before KFMB-4010 is complete, shimGetStoryStatus will return null for most stories
      and the KB-first path will always fall back — making the migration ineffective.
    mitigation: >
      Do not merge or elaborate KFMB-4020 until KFMB-4010 reaches ready-for-qa or later.
      Add a pre-check in elaboration: verify at least one story has a non-null DB state.
  - finding: >
      Shell scripts cannot call MCP tools directly — must use `claude -p` subprocess.
      If the KB service is not running, `claude -p` will return empty output. Scripts must
      handle this gracefully with `|| true` and empty-output checks, not `set -e` failures.
    mitigation: >
      Wrap all `claude -p` KB calls in: `raw=$(claude -p "..." ... 2>/dev/null) || true`.
      Check `[[ -z "$raw" ]]` before using result. Emit `[KB-FIRST FALLBACK]` warning.
  - finding: >
      STATE_TO_SWIM_LANE reverse map does not exist yet. SWIM_LANE_TO_STATE maps
      swim-lane → DB state. The reverse (DB state → swim-lane) is needed for --in-stage
      validation in /precondition-check. If derived incorrectly, --in-stage checks
      will silently fail or produce false positives.
    mitigation: >
      Add `STATE_TO_SWIM_LANE` as a derived constant in
      packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts using
      Object.entries(SWIM_LANE_TO_STATE).reduce((acc, [k, v]) => ({ ...acc, [v]: k }), {}).
      Export it alongside SWIM_LANE_TO_STATE.

missing_requirements: []

evidence_expectations:
  - "precondition-check.md version > 1.0.0 with history entry for KB-first change"
  - "context-init.md version > 1.0.0 with history entry for KB-first change"
  - "generate-stories.sh contains [KB-FIRST] and [KB-FIRST FALLBACK] log patterns"
  - "implement-stories.sh contains [KB-FIRST] and [KB-FIRST FALLBACK] log patterns in find_story_dir and is_* functions"
  - "STATE_TO_SWIM_LANE exported from __types__/index.ts and derivation is correct inverse of SWIM_LANE_TO_STATE"
  - "pnpm check-types passes after __types__/index.ts update"
  - "Integration test (live KB) confirms db_state_used: true when KB is available"

