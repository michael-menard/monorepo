    title: "Add STATE_TO_SWIM_LANE reverse map export to story-compatibility __types__"
    goal: >
      Export STATE_TO_SWIM_LANE as the inverse of SWIM_LANE_TO_STATE so that
      /precondition-check and /context-init can validate --in-stage against DB state.
    files_to_read:
      - "packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts"
    files_to_modify:
      - "packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts"
    acs: ["AC-2"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/mcp-tools"
    estimated_tokens: 4000

  - id: ST-2
