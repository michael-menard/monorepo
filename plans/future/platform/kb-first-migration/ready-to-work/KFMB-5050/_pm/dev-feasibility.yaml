feasible: true
confidence: high
rationale: >
  Implementation is text edits to 5-7 .claude/agents/*.md markdown files and one section of
  _shared/kb-integration.md. No TypeScript compilation, no npm changes, no database migrations,
  no schema changes. The migration pattern is well-established by KFMB-5020 (the analogous
  _implementation/ reader migration) and the dev-execute-leader parallel-read pattern is
  the canonical reference. The primary risk is completeness of the pm_artifacts consumer audit —
  missing a consumer would cause a silent break in the PM lifecycle. This risk is mitigated by
  conducting a grep audit (AC via ED-1 test) before touching any files.
complexity: medium
change_surface:
  areas:
    - ".claude/agents/pm-story-generation-leader.agent.md"
    - ".claude/agents/pm-story-fix-leader.agent.md"
    - ".claude/agents/architect-story-review.agent.md"
    - ".claude/agents/story-synthesize-agent.agent.md"
    - ".claude/agents/pm-story-risk-predictor.agent.md"
    - ".claude/agents/pm-story-adhoc-leader.agent.md (caller update)"
    - ".claude/agents/_shared/kb-integration.md"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required — agent markdown files only"
    - "Coordination gate: KFMB-5040 must be in ready-for-qa or complete before implementation begins"
risks:
  - finding: "pm_artifacts removal is a breaking change with potentially undiscovered consumers"
    mitigation: "Mandatory pre-implementation grep audit across .claude/agents/, .claude/skills/, scripts/, and plans/ for all pm_artifacts and _pm/*.yaml references. Build complete consumer list before modifying anything."
  - finding: "Interface change for story-synthesize-agent and pm-story-risk-predictor (story_seed_path → story_id) requires all callers to be updated"
    mitigation: "Grep for all invocations of both agents across pm-story-generation-leader and pm-story-adhoc-leader. Update all call sites atomically."
  - finding: "Implementation order matters: updating readers before KFMB-5040 completes will cause silent null reads"
    mitigation: "Implementation must not begin until KFMB-5040 is in ready-for-qa or complete. Gate enforced in story dependency chain."
missing_requirements: []
evidence_expectations:
  - "grep -r 'pm_artifacts\\|_pm/test-plan\\|_pm/dev-feasibility\\|_pm/uiux-notes\\|_pm/STORY-SEED' .claude/agents/ returns 0 matches in non-writer agents after migration"
  - "Each migrated agent file shows kb_read_artifact in frontmatter kb_tools list"
  - "kb-integration.md table shows all four PM artifact type rows"
  - "New story.yaml generated by pm-story-generation-leader post-migration has no pm_artifacts block"
subtasks:
  - id: ST-1
    title: "Pre-migration audit: grep for all pm_artifacts and _pm/ readers"
    goal: "Build complete consumer list before any file modifications to prevent missed-consumer breakage"
    files_to_read:
      - ".claude/agents/"
      - ".claude/skills/"
      - "scripts/"
    files_to_modify: []
    acs: ["AC-9", "AC-10"]
    depends_on: none
    verification: "Grep output reviewed; consumer list documented"
    estimated_tokens: 4000

  - id: ST-2
    title: "Migrate pm-story-generation-leader: replace _pm/ reads with kb_read_artifact + remove pm_artifacts write"
    goal: "Update the primary PM orchestrator to read all four PM artifacts (story_seed, test_plan, dev_feasibility, uiux_notes) from KB via Promise.all and stop embedding pm_artifacts in story.yaml"
    files_to_read:
      - ".claude/agents/pm-story-generation-leader.agent.md"
      - ".claude/agents/dev-execute-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-story-generation-leader.agent.md"
    acs: ["AC-1", "AC-2", "AC-8"]
    depends_on: ST-1
    verification: "grep 'pm_artifacts\\|_pm/test-plan\\|_pm/dev-feasibility\\|_pm/uiux-notes\\|_pm/STORY-SEED' .claude/agents/pm-story-generation-leader.agent.md returns 0"
    estimated_tokens: 8000

  - id: ST-3
    title: "Migrate pm-story-fix-leader: replace pm_artifacts.* reads with kb_read_artifact"
    goal: "Update pm-story-fix-leader to read test_plan, uiux_notes, dev_feasibility from KB instead of story.yaml frontmatter pm_artifacts block"
    files_to_read:
      - ".claude/agents/pm-story-fix-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-story-fix-leader.agent.md"
    acs: ["AC-3", "AC-8", "AC-10"]
    depends_on: ST-2
    verification: "grep 'pm_artifacts' .claude/agents/pm-story-fix-leader.agent.md returns 0"
    estimated_tokens: 5000

  - id: ST-4
    title: "Migrate architect-story-review: replace pm_artifacts.dev_feasibility read with kb_read_artifact"
    goal: "Update architect-story-review to read dev_feasibility artifact from KB instead of pm_artifacts.dev_feasibility frontmatter"
    files_to_read:
      - ".claude/agents/architect-story-review.agent.md"
    files_to_modify:
      - ".claude/agents/architect-story-review.agent.md"
    acs: ["AC-4", "AC-8", "AC-10"]
    depends_on: ST-2
    verification: "grep 'pm_artifacts' .claude/agents/architect-story-review.agent.md returns 0"
    estimated_tokens: 4000

  - id: ST-5
    title: "Migrate story-synthesize-agent and pm-story-risk-predictor: filesystem path → story_id interface"
    goal: "Update both agents to accept story_id as input and read story_seed via kb_read_artifact instead of reading from story_seed_path filesystem parameter"
    files_to_read:
      - ".claude/agents/story-synthesize-agent.agent.md"
      - ".claude/agents/pm-story-risk-predictor.agent.md"
      - ".claude/agents/qa-verify-verification-leader.agent.md"
    files_to_modify:
      - ".claude/agents/story-synthesize-agent.agent.md"
      - ".claude/agents/pm-story-risk-predictor.agent.md"
    acs: ["AC-5", "AC-6", "AC-8", "AC-9"]
    depends_on: ST-1
    verification: "grep 'story_seed_path' .claude/agents/story-synthesize-agent.agent.md .claude/agents/pm-story-risk-predictor.agent.md returns 0"
    estimated_tokens: 7000

  - id: ST-6
    title: "Update callers: pm-story-generation-leader and pm-story-adhoc-leader — pass story_id not story_seed_path"
    goal: "Update all call sites that spawn story-synthesize-agent and pm-story-risk-predictor to pass story_id instead of story_seed_path"
    files_to_read:
      - ".claude/agents/pm-story-generation-leader.agent.md"
      - ".claude/agents/pm-story-adhoc-leader.agent.md"
    files_to_modify:
      - ".claude/agents/pm-story-generation-leader.agent.md"
      - ".claude/agents/pm-story-adhoc-leader.agent.md"
    acs: ["AC-7"]
    depends_on: ST-5
    verification: "grep 'story_seed_path' .claude/agents/pm-story-generation-leader.agent.md .claude/agents/pm-story-adhoc-leader.agent.md returns 0 (as a spawn parameter)"
    estimated_tokens: 4000

  - id: ST-7
    title: "Update _shared/kb-integration.md Artifact Type Reference table with PM artifact types"
    goal: "Extend the Artifact Type Reference table in _shared/kb-integration.md to include story_seed, test_plan, dev_feasibility, uiux_notes rows with phase and written_by entries"
    files_to_read:
      - ".claude/agents/_shared/kb-integration.md"
    files_to_modify:
      - ".claude/agents/_shared/kb-integration.md"
    acs: ["AC-11"]
    depends_on: ST-1
    verification: "grep 'story_seed\\|test_plan\\|dev_feasibility\\|uiux_notes' .claude/agents/_shared/kb-integration.md returns 4 table rows"
    estimated_tokens: 3000

  - id: ST-8
    title: "Smoke-test walkthrough: verify full PM pipeline reads from KB end-to-end"
    goal: "Dry-run review confirming pm-story-generation-leader can read all four PM artifacts from KB and produce a valid story document with no _pm/ references in the output"
    files_to_read:
      - ".claude/agents/pm-story-generation-leader.agent.md (post-migration)"
      - "Any canary story with KB PM artifacts (post-KFMB-5040)"
    files_to_modify: []
    acs: ["AC-12"]
    depends_on: ST-6
    verification: "Smoke-test walkthrough complete; story document generated without _pm/ references and no pm_artifacts block in story.yaml"
    estimated_tokens: 5000
