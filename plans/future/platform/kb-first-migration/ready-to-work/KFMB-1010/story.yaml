id: "KFMB-1010"
title: "Stories Table Content Columns Migration"
status: ready-to-work
priority: medium
phase: 1
feature: "Add acceptance_criteria, non_goals, and packages columns to the kbar.stories table via a new Drizzle migration"
goal: "Extend the kbar.stories table with content columns so story body data can be stored in the DB instead of story.yaml files."
depends_on: []
endpoints: []
infrastructure: ["PostgreSQL/Aurora", "Drizzle ORM"]
risk_notes: "Migration must be backward-compatible; existing rows will have NULL values for new columns."
sizing_warning: false
created: "2026-02-26T00:00:00Z"

decisions:
  - id: "DEC-1"
    title: "Target schema: kbar.stories only"
    rationale: >
      This story belongs to the KB-First Migration plan (KBAR prefix). kbar.stories
      is the primary KB schema target for Phase 1. wint.stories is a separate
      workflow-intelligence table; adding equivalent columns there is deferred to a
      follow-on story (KFMB-1011+) if needed. The description column already exists
      in both schemas as text (nullable) and is adequate as-is — no replacement needed.
    decided_at: "2026-02-26"

  - id: "DEC-2"
    title: "Column SQL types"
    rationale: >
      - acceptance_criteria: jsonb — stores structured criterion objects
        (e.g. {id: string, description: string, met?: boolean}[]) enabling future
        querying; more expressive than plain text[].
      - non_goals: text[] — simple string array; PostgreSQL native array is
        efficient for plain string lists.
      - packages: text[] — simple string array of package name strings; same
        rationale as non_goals.
      All three columns are nullable with no default to preserve backward compatibility.
    decided_at: "2026-02-26"

  - id: "DEC-3"
    title: "Scope exclusions acknowledged"
    rationale: >
      Additional story.yaml fields (phase, feature, goal, depends_on, endpoints,
      infrastructure, risk_notes, sizing_warning, created) are intentionally excluded
      from this Phase 1 story. Their DB representation is deferred to future stories
      in the KB-First Migration plan. This story covers only the three content columns
      most immediately needed for story body storage.
    decided_at: "2026-02-26"

acceptance_criteria:
  - id: "AC-1"
    description: "Running pnpm db:migrate against a local database applies the migration without errors."
  - id: "AC-2"
    description: "The acceptance_criteria (jsonb), non_goals (text[]), and packages (text[]) columns are present in kbar.stories with nullable constraint, confirmed via psql \\d or introspection query."
  - id: "AC-3"
    description: "Drizzle-generated TypeScript types (via drizzle-zod insertStorySchema / selectStorySchema for kbar.stories) reflect the three new columns."
  - id: "AC-4"
    description: "All existing tests continue to pass after the schema change."

subtasks:
  - id: "ST-1"
    title: "Edit kbar.ts schema definition"
    detail: >
      Add acceptance_criteria (jsonb, nullable), non_goals (text[], nullable), and
      packages (text[], nullable) columns to the kbar.stories table definition in
      packages/backend/database-schema/src/schema/kbar.ts.

  - id: "ST-2"
    title: "Generate SQL migration file"
    detail: >
      Run pnpm db:generate from packages/backend/database-schema to produce the
      Drizzle-kit SQL migration file in src/migrations/app/.

  - id: "ST-3"
    title: "Apply migration locally"
    detail: >
      Run pnpm db:migrate against a local dev database. Verify the migration applies
      cleanly with no errors. Confirm columns are present with correct types via
      psql \d kbar.stories.

  - id: "ST-4"
    title: "Verify drizzle-zod TypeScript types"
    detail: >
      Confirm that the auto-generated insertStorySchema and selectStorySchema exports
      for kbar.stories include the three new columns with correct TypeScript types.
      Run pnpm check-types to verify no type errors are introduced.

  - id: "ST-5"
    title: "Run existing tests"
    detail: >
      Run pnpm test against packages/backend/database-schema and any other packages
      that consume kbar story types. Verify all existing tests pass.
qa_notes:
  verdict: CONDITIONAL_PASS
  decided_at: "2026-02-26T00:00:00Z"
  mode: autonomous
  acs_added: 4
  gaps_resolved: 3
  opportunities_logged: 3

