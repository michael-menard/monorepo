strategy: integration+manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
happy_path_tests:
  - id: HP-1
    title: "Agent calls kb_create_story for each story in ANALYSIS"
    setup: >
      KB MCP server running at localhost:5433/knowledgebase.
      KFMB-1020 shipped — kb_create_story tool registered in tool-handlers.ts and tool-schemas.ts.
      pm-bootstrap-generation-leader rewritten to KB-native mode.
      Prepare ANALYSIS with 3 story stubs (story_id, title, feature, epic, priority, etc.).
    action: >
      Invoke pm-bootstrap-generation-leader with SETUP-CONTEXT and ANALYSIS (3 stories).
      Observe MCP tool calls emitted by the agent.
    expected: >
      Agent emits exactly 3 kb_create_story MCP tool calls (one per story).
      No psql batch insert command is issued.
      No raw SQL temp file is written.
      SUMMARY returned inline with kb_stories_inserted: 3.
    evidence: >
      KB query: SELECT count(*) FROM stories WHERE story_id IN ('STORY-A', 'STORY-B', 'STORY-C')
      Expected count: 3. Agent transcript shows kb_create_story calls, no psql invocations.

  - id: HP-2
    title: "SUMMARY returned inline — no _bootstrap/SUMMARY.yaml written"
    setup: >
      Same setup as HP-1.
    action: >
      Invoke agent and inspect filesystem for _bootstrap/SUMMARY.yaml.
    expected: >
      No file written at {feature_dir}/_bootstrap/SUMMARY.yaml.
      SUMMARY content appears in agent response inline.
    evidence: >
      ls {feature_dir}/_bootstrap/ shows no SUMMARY.yaml.
      Agent response text contains inline SUMMARY block with kb_stories_inserted field.

  - id: HP-3
    title: "Individual story.yaml files NOT written during stub generation"
    setup: >
      Same setup as HP-1. Feature dir has no pre-existing story subdirectories.
    action: >
      Invoke agent with ANALYSIS containing 3 stories. Check filesystem after.
    expected: >
      No story.yaml files created at {feature_dir}/{story_id}/story.yaml paths.
      KB rows exist for all 3 stories (inserted via kb_create_story).
    evidence: >
      find {feature_dir} -name 'story.yaml' returns no results.
      KB query confirms 3 rows inserted.

error_cases:
  - id: EC-1
    title: "KB unavailable — agent warns and continues, does not halt"
    setup: >
      Stop KB MCP server (port 5433 not reachable) before invoking agent.
      ANALYSIS contains 3 story stubs.
    action: >
      Invoke pm-bootstrap-generation-leader with KB server down.
    expected: >
      Agent logs warning: KB unavailable (or equivalent).
      Agent does NOT throw or halt execution.
      SUMMARY returned inline with kb_stories_inserted: 0 and warning note.
    evidence: >
      Agent response contains warning message and inline SUMMARY.
      No unhandled exception or PM BLOCKED signal emitted.

  - id: EC-2
    title: "File Mode inputs present — agent ignores them and uses KB Mode"
    setup: >
      Place AGENT-CONTEXT.md and ANALYSIS.yaml in {feature_dir}/_bootstrap/.
      Also provide SETUP-CONTEXT and ANALYSIS inline in the invocation prompt.
    action: >
      Invoke agent with both inline context and _bootstrap/ files present.
    expected: >
      Agent uses inline KB Mode path.
      Agent does NOT read _bootstrap/AGENT-CONTEXT.md or _bootstrap/ANALYSIS.yaml.
      Agent does NOT behave as if File Mode was triggered.
    evidence: >
      Agent transcript shows no Read calls to _bootstrap/ files.
      KB Mode output (inline SUMMARY) returned normally.

  - id: EC-3
    title: "Empty ANALYSIS — agent handles zero stories gracefully"
    setup: >
      Provide SETUP-CONTEXT and ANALYSIS with stories: [] (empty list).
    action: >
      Invoke agent.
    expected: >
      Agent returns inline SUMMARY with kb_stories_inserted: 0 and no errors.
      No kb_create_story calls made.
    evidence: >
      KB query: SELECT count(*) FROM stories WHERE feature = '{feature}' remains unchanged.
      Agent response contains SUMMARY with kb_stories_inserted: 0.

edge_cases:
  - id: ED-1
    title: "Idempotent re-run — same story set invoked twice"
    setup: >
      KB MCP server running. First run already inserted 3 stories via kb_create_story.
    action: >
      Invoke agent a second time with the same ANALYSIS (same 3 story_ids).
    expected: >
      kb_create_story calls are made again for all 3 stories.
      No duplicate rows created (ON CONFLICT DO NOTHING semantics).
      SUMMARY returns kb_stories_inserted: 3 (or 0 if kb_create_story returns a no-op indicator).
      No errors or constraint violations.
    evidence: >
      KB query: SELECT count(*) FROM stories WHERE story_id IN ('STORY-A', 'STORY-B', 'STORY-C')
      Returns 3 (not 6). No PostgreSQL error in agent transcript.

  - id: ED-2
    title: "Partial failure — kb_create_story fails for one story mid-batch"
    setup: >
      KB MCP server running. Configure server to return error for the second story only.
    action: >
      Invoke agent with ANALYSIS containing 3 stories.
    expected: >
      Agent logs warning for the failed story.
      Continues inserting remaining stories.
      SUMMARY reflects kb_stories_inserted: 2 with warning about 1 failure.
    evidence: >
      KB query returns 2 rows. Agent transcript shows warning for failed story, no halt.

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "SELECT count(*) FROM stories WHERE story_id = '{story_id}' returns 1 after successful kb_create_story call"
      - "SELECT count(*) FROM stories WHERE story_id = '{story_id}' returns 1 after second (idempotent) kb_create_story call"
      - "No psql invocations appear in agent transcript"
      - "No _bootstrap/SUMMARY.yaml file on disk after agent run"
  frontend: null

manual_cases:
  - id: MC-1
    title: "Agent definition review — File Mode removed or deprecated"
    steps:
      - "Open .claude/agents/pm-bootstrap-generation-leader.agent.md"
      - "Search for 'File Mode' section header"
      - "Verify section is either absent or clearly marked as 'deprecated' or 'not supported'"
      - "Verify no File Mode input paths (_bootstrap/AGENT-CONTEXT.md, _bootstrap/ANALYSIS.yaml) appear in active logic"
    expected: >
      File Mode section is either removed or contains explicit 'NOT SUPPORTED' or 'DEPRECATED' marker.
      No active code path reads from _bootstrap/ for file-based bootstrap input.

  - id: MC-2
    title: "stories.index.md write behavior explicitly documented"
    steps:
      - "Open .claude/agents/pm-bootstrap-generation-leader.agent.md"
      - "Search for 'stories.index.md' reference"
      - "Verify the section explicitly states either (a) retained for now pending KFMB-3010, or (b) removed"
      - "Decision must match the elaboration analysis for KFMB-3010 dependency"
    expected: >
      Agent definition contains an explicit comment or section explaining the stories.index.md decision.

fixture_definitions:
  - name: test_story_stub
    type: ANALYSIS story entry
    description: >
      Minimal story stub with required fields: story_id (e.g. 'TEST-001'), title,
      feature, epic, priority ('medium'), state ('backlog'), phase ('backlog'),
      story_dir (e.g. 'plans/test/backlog/TEST-001'),
      story_file (e.g. 'plans/test/backlog/TEST-001/story.yaml'),
      depends_on (null or [])
  - name: kb_mcp_server_unavailable
    type: environment state
    description: >
      KB PostgreSQL instance at port 5433 is stopped or refusing connections.
      Use: docker stop knowledgebase-db or equivalent.

risks:
  - "kb_create_story interface not yet finalized (KFMB-1020 dependency) — tests cannot be run until KFMB-1020 ships"
  - "Real KB server required at port 5433 — tests are not runnable without local dev environment"
  - "Idempotency behavior depends on whether kb_create_story returns a distinguishable result for conflict-skipped rows vs inserted rows"
  - "stories.index.md and story.yaml filesystem output decision (AC-7) affects test coverage scope — if retained, HP-3 must be updated"
