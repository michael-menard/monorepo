strategy: manual+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
  commands_touched:
    - .claude/commands/story-move.md
    - .claude/commands/story-update.md
  mcp_tools_used:
    - mcp__knowledge-base__kb_update_story_status
    - mcp__knowledge-base__kb_get_story

happy_path_tests:
  - id: HP-1
    title: "/story-move happy path — KB available, valid stage"
    setup: "KB postgres-knowledgebase MCP server running; KFMB-4010 exists in core.stories table with state backlog"
    action: "Invoke /story-move plans/future/platform/kb-first-migration KFMB-4010 in-progress"
    expected: "Command calls kb_get_story(KFMB-4010) to locate story; calls kb_update_story_status({story_id: 'KFMB-4010', state: 'in_progress', triggered_by: 'story-move'}); returns result YAML with MOVE COMPLETE and kb_updated: true; no mv command executed"
    evidence: "Result YAML shows kb_updated: true; no from_path or to_path fields; kb_get_story after move returns state=in_progress"

  - id: HP-2
    title: "/story-move round-trip verification"
    setup: "KB available; KFMB-4010 exists with state backlog"
    action: "Invoke /story-move; then invoke kb_get_story({story_id: 'KFMB-4010'})"
    expected: "kb_get_story returns updated state matching the TO_STAGE DB mapping"
    evidence: "State field in kb_get_story response matches expected DB state"

  - id: HP-3
    title: "/story-update happy path — KB available, mapped status"
    setup: "KB available; KFMB-4010 exists in core.stories with state in_progress"
    action: "Invoke /story-update plans/future/platform/kb-first-migration KFMB-4010 needs-code-review"
    expected: "Command calls kb_update_story_status({story_id: 'KFMB-4010', state: 'needs_code_review', triggered_by: 'story-update-command'}); no frontmatter file write; result YAML with UPDATE COMPLETE and kb_updated: true"
    evidence: "No .md frontmatter modified; result YAML shows kb_updated: true; no file_updated field"

  - id: HP-4
    title: "/story-update uat→completed — worktree cleanup preserved"
    setup: "KB available; KFMB-4010 in UAT state; worktree tree/story/KFMB-4010 exists"
    action: "Invoke /story-update plans/future/platform/kb-first-migration KFMB-4010 completed"
    expected: "Worktree cleanup step (WINT-1150) runs BEFORE kb_update_story_status call; then KB updated; UPDATE COMPLETE returned"
    evidence: "Command spec shows worktree cleanup before KB call; result kb_updated: true"

error_cases:
  - id: EC-1
    title: "/story-move — DB unavailable"
    setup: "KB MCP server not running or unreachable"
    action: "Invoke /story-move plans/future/platform/kb-first-migration KFMB-4010 in-progress"
    expected: "Command returns MOVE FAILED: DB unavailable; no directory mv executed; no fallback operation"
    evidence: "Result YAML shows kb_updated: false and MOVE FAILED signal; no filesystem state change"

  - id: EC-2
    title: "/story-move — story not found in KB"
    setup: "KB available; KFMB-9999 does not exist in core.stories"
    action: "Invoke /story-move plans/future/platform/kb-first-migration KFMB-9999 in-progress"
    expected: "Command calls kb_get_story(KFMB-9999); returns MOVE FAILED: Story not found in KB"
    evidence: "Result YAML shows MOVE FAILED: Story not found in KB"

  - id: EC-3
    title: "/story-move — unmapped stage"
    setup: "KB available; KFMB-4010 exists"
    action: "Invoke /story-move plans/future/platform/kb-first-migration KFMB-4010 elaboration"
    expected: "SWIM_LANE_TO_STATE lookup returns no DB state for 'elaboration'; command returns MOVE FAILED: No DB state for stage 'elaboration'"
    evidence: "Result YAML shows MOVE FAILED: No DB state for stage 'elaboration'; no KB call made"

  - id: EC-4
    title: "/story-update — DB unavailable"
    setup: "KB MCP server unreachable"
    action: "Invoke /story-update plans/future/platform/kb-first-migration KFMB-4010 in-progress"
    expected: "Returns UPDATE FAILED: DB unavailable; no frontmatter written"
    evidence: "Result YAML kb_updated: false and UPDATE FAILED signal"

edge_cases:
  - id: ED-1
    title: "/story-move — stage with no DB mapping (created)"
    setup: "KB available; story exists"
    action: "Invoke /story-move with TO_STAGE=created"
    expected: "MOVE FAILED: No DB state for stage 'created'"
    evidence: "SWIM_LANE_TO_STATE table does not include 'created' mapping"

  - id: ED-2
    title: "No filesystem directory operations in story-move.md after rewrite"
    setup: "Rewritten story-move.md committed"
    action: "grep -E '(\\bmv\\b|fs\\.|readdirSync|mkdir)' .claude/commands/story-move.md in state-management context"
    expected: "Zero matches for filesystem state-management keywords"
    evidence: "Grep returns 0 results for state-transition code paths"

  - id: ED-3
    title: "No frontmatter write in story-update.md after rewrite"
    setup: "Rewritten story-update.md committed"
    action: "grep for frontmatter YAML write patterns (e.g. 'status:', sed, write to .md file) in story-update.md"
    expected: "Zero matches for frontmatter write operations"
    evidence: "Grep returns 0 results for frontmatter modification patterns"

  - id: ED-4
    title: "Result YAML schema verification — story-move"
    setup: "Rewritten story-move.md"
    action: "Inspect result YAML schema in command spec"
    expected: "No from_path or to_path fields; kb_updated field present as mandatory boolean"
    evidence: "Command spec result YAML section shows kb_updated and omits from_path/to_path"

  - id: ED-5
    title: "Result YAML schema verification — story-update"
    setup: "Rewritten story-update.md"
    action: "Inspect result YAML schema in command spec"
    expected: "No file_updated field; kb_updated field present as mandatory boolean"
    evidence: "Command spec result YAML section shows kb_updated and omits file_updated"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "kb_get_story returns story record with state field"
      - "kb_update_story_status returns non-null on success, null on DB failure"
      - "State in core.stories matches expected DB state after /story-move"
  frontend:

manual_cases:
  - id: MC-1
    title: "Full /story-move AC audit (AC-1 through AC-5, AC-9, AC-11)"
    steps:
      - "Read .claude/commands/story-move.md after rewrite"
      - "Verify locate step calls kb_get_story not directory scan (AC-1)"
      - "Verify execute step calls kb_update_story_status with triggered_by:'story-move' (AC-2)"
      - "Verify no mv command present in state-transition steps (AC-2, AC-11)"
      - "Verify DB unavailable path returns MOVE FAILED: DB unavailable without fallback (AC-3)"
      - "Verify SWIM_LANE_TO_STATE inline mapping table present (AC-4)"
      - "Verify unmapped stage returns MOVE FAILED: No DB state for stage (AC-4)"
      - "Verify error signals present: MOVE COMPLETE, MOVE FAILED, MOVE SKIPPED (AC-5)"
      - "Verify result YAML has kb_updated field, no from_path/to_path (AC-9)"
    expected: "All checks pass"

  - id: MC-2
    title: "Full /story-update AC audit (AC-6 through AC-8, AC-10, AC-11)"
    steps:
      - "Read .claude/commands/story-update.md after rewrite"
      - "Verify kb_update_story_status is step 1 (primary action), triggered_by:'story-update-command' (AC-6)"
      - "Verify frontmatter write step (step 3b in v3.0.0) is removed (AC-6, AC-11)"
      - "Verify worktree cleanup (WINT-1150) still present for uat→completed and runs before KB call (AC-7)"
      - "Verify error signals: UPDATE COMPLETE, UPDATE FAILED (AC-8)"
      - "Verify result YAML has kb_updated field, no file_updated (AC-10)"
    expected: "All checks pass"

  - id: MC-3
    title: "Live KB integration test — /story-move happy path"
    steps:
      - "Ensure postgres-knowledgebase MCP server running at localhost:5433"
      - "Verify KFMB-4010 record exists in core.stories (use kb_get_story)"
      - "Invoke /story-move on KFMB-4010 to ready-to-work"
      - "Confirm result YAML shows MOVE COMPLETE and kb_updated: true"
      - "Call kb_get_story to confirm state updated in DB"
    expected: "Round-trip confirmed: state updated in KB, no mv executed"

fixture_definitions:
  - name: "kfmb-4010-kb-record"
    type: "KB story record"
    description: "core.stories row for KFMB-4010 with state=backlog for integration tests"

risks:
  - "KB MCP server must be available for integration tests — ADR-005 compliance required"
  - "KFMB-3020 may modify story-update.md before this story is worked — test plan must account for step 4 potentially already removed"
  - "Double-write risk (agents calling kb_update_story_status directly AND /story-move) is explicitly out of scope — do not test"
  - "SWIM_LANE_TO_STATE mapping table completeness not verified in this story (all stages with DB mappings should be tested)"
