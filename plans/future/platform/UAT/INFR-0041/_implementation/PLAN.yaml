architectural_decisions:
  - id: ARCH-001
    question: "Should validation use .parse() (throw) or .safeParse() (return errors)?"
    decision: "Use .parse() for fail-fast validation"
    rationale: "Story specifies fail-fast validation to catch errors immediately. Per INFR-0040 pattern, insertWorkflowEvent already catches DB errors gracefully, so Zod validation errors will be caught at the same level."
    decided_by: story

  - id: ARCH-002
    question: "Should discriminated union use event_type field or separate functions?"
    decision: "Use discriminated union pattern based on event_type field"
    rationale: "Story AC-9 explicitly requires discriminated union pattern. This is the standard Zod pattern for type-safe validation of polymorphic data."
    decided_by: story

  - id: ARCH-003
    question: "Should helper functions generate event_id or require it as parameter?"
    decision: "Helper functions generate event_id internally using crypto.randomUUID()"
    rationale: "Story AC-10 signature shows no event_id parameter. Reduces caller burden and ensures UUID format is correct. INFR-0040 already uses UUID primary key."
    decided_by: story

  - id: ARCH-004
    question: "Should new metadata columns be required or nullable?"
    decision: "All 3 new columns (correlation_id, source, emitted_by) are nullable"
    rationale: "Story specifies nullable for backward compatibility with existing events. AC-6, AC-7, AC-8 all specify nullable type."
    decided_by: story

  - id: ARCH-005
    question: "Should Zod schemas be strict or use .passthrough()?"
    decision: "Use strict schemas without .passthrough() for event-type specific payloads"
    rationale: "Type safety requires strict validation. Current WorkflowEventPayloadSchema uses .passthrough() but this is too permissive for typed payloads. Event-specific schemas should validate exact structure."
    decided_by: autonomous

complexity: simple

