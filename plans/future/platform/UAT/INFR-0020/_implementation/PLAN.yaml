architectural_decisions:
  - id: ARCH-001
    question: "Should stage auto-detection be synchronous or async?"
    decision: "Async using fs.promises.access() for file existence checks"
    rationale: "Aligns with existing async patterns in YamlArtifactReader and enables future optimization"
    decided_by: autonomous

  - id: ARCH-002
    question: "Should the service cache PathResolver and YamlArtifactReader instances?"
    decision: "Yes, create instances once in constructor and reuse"
    rationale: "Reduces object creation overhead and aligns with DI pattern from lessons"
    decided_by: autonomous

  - id: ARCH-003
    question: "How to handle YAML+DB mode when DB repos not provided?"
    decision: "Validate at config validation time via Zod .refine() - fail fast"
    rationale: "Better DX to catch misconfiguration at service creation rather than first operation"
    decided_by: autonomous

complexity: low-medium

notes:
  - "Per AC-011, using simple class-based service pattern (factory + class), NOT Ports & Adapters"
  - "Stage auto-detection searches: backlog → elaboration → ready-to-work → in-progress → ready-for-qa → UAT"
  - "Atomic writes use temp file → rename pattern from YamlArtifactWriter"
  - "All operations return discriminated union result types per WRKF-1020 lesson"
  - "DI pattern: service depends on PathResolver, YamlArtifactReader, YamlArtifactWriter, and optional DB repos"
  - "Config validation via Zod with .refine() for conditional requirements (storyRepo/workflowRepo when mode=yaml+db)"
  - "Integration tests will create temporary test directories for file I/O verification"
  - "Reference existing schemas from packages/backend/orchestrator/src/artifacts/ - no new artifact schemas needed"
