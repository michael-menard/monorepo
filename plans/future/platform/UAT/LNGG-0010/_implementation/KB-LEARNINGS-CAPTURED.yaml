  - lesson_id: 3
    title: "Backward-compatible schema design using optional fields + .passthrough() enables zero-migration adoption"
    category: pattern
    priority: high
    tags:
      - schema-design
      - backward-compatibility
      - zod
      - migration
    context: |
      When introducing new field names or format changes, data migration is costly and risky.
      Backward-compatible schema design allows new code to work with old data without requiring
      migration, enabling zero-downtime adoption.

      LNGG-0010 faced a critical blocker: existing 50+ story YAML files use the legacy format
      (status, epic, acceptance_criteria) but the story schema was defined with new field names
      (state, feature, acs).

      Solution: StoryArtifactSchema v2 with:
      1. Optional fields for all new fields (state, feature, acs)
      2. Optional fields for all legacy fields (status, epic, acceptance_criteria)
      3. .passthrough() to preserve unknown fields
      4. Normalization helpers (getStoryState, getStoryFeature, etc.)

      Result: All 50+ existing files work immediately with no migration.

    evidence: |
      File: src/artifacts/story-v2-compatible.ts (430 lines)

      Schema features:
      - Both legacy (status, epic) and new (state, feature) formats supported
      - .passthrough() preserves unknown fields
      - Normalization helpers map old → new fields
      - 20+ test cases verify both formats work

      Backward compatibility test results (AC-7):
      - Unit Test: "should parse legacy format (status, epic, acceptance_criteria)"
      - Unit Test: "should parse new format (state, feature, acs)"
      - Integration Test: "should handle legacy format"
      - Integration Test: "should handle v2 format"
      - Integration Test: "should preserve unknown fields via passthrough"
      - Integration Test: "round-trip compatibility preserves all fields"

    lesson_learned: |
      When designing schemas that will evolve over time:
      1. Make all new fields optional to accept old data
      2. Make all old fields optional to accept new data
      3. Use Zod's .passthrough() to preserve unknown fields
      4. Create normalization helpers to map old → new fields
      5. Test both old and new formats thoroughly

      Benefits:
      - Zero migration required
      - Gradual rollout possible
      - Old and new clients can coexist
      - Bidirectional compatibility
      - No data loss

    applicability: HIGH (applies to all schema evolution scenarios)
    relevant_downstream_stories:
      - WINT-0010  # Create Core Database Schemas (will evolve)
      - WINT-0020  # Story Management Tables (schema evolution)
      - LNGG-0020  # Index Management Adapter (may evolve index format)


  - lesson_id: 4
    title: "TypeScript compilation errors may not be caught by vitest - always run build step in verification"
    category: anti_pattern
    priority: medium
    tags:
      - testing
      - typescript
      - build
      - verification
    context: |
      Vitest runs tests using ts-node or similar transpilation that may not perform the same
      type checking as the TypeScript compiler. Tests can pass while TypeScript compilation fails,
      creating a false sense of confidence.

      In LNGG-0010 Phase 1 QA:
      - All 28 tests passed locally
      - But `pnpm build` (which runs `tsc --noEmit`) revealed 16 TypeScript errors
      - Logger API signature was wrong in production build even though tests passed
      - This required a fix cycle to correct

      Root cause: Tests mock/override the logger, so type errors in logger usage weren't caught
      by test execution. Only the TypeScript compiler caught them.

    evidence: |
      Phase 1 QA Results:
      - Vitest: 28/28 tests PASS
      - `pnpm build`: 16 TypeScript errors

      Errors were in:
      - src/adapters/story-file-adapter.ts (10 call sites)
      - src/adapters/utils/file-utils.ts (2 call sites)
      - src/adapters/utils/yaml-parser.ts (4 call sites)

      Error type: logger.info(message, context) called with wrong signature

    lesson_learned: |
      QA verification checklist must include:
      1. Vitest passes (tests pass)
      2. ESLint passes (linting)
      3. tsc --noEmit passes (TypeScript compilation)
      4. pnpm build succeeds (actual build)
      5. Coverage requirement met (coverage)

      Do NOT assume tests passing = code compiles. Always run the build step.

      Implementation: Add build step to QA verification checklist as a mandatory gate
      before tests pass.

    applicability: CRITICAL (applies to all QA verification)
    relevant_downstream_stories:
      - ALL (this is a process improvement for QA workflow)


  - lesson_id: 5
    title: "Comprehensive test fixtures (minimal, full, invalid, malformed) improve test coverage"
    category: pattern
    priority: medium
    tags:
      - testing
      - fixtures
      - coverage
      - edge-cases
    context: |
      Test fixtures are example data that represent different scenarios. Comprehensive fixtures
      ensure tests exercise the full range of code paths including edge cases and error conditions.

      LNGG-0010 uses four categories of fixtures:

      1. MINIMAL FIXTURE (minimal-story.yaml)
         - Contains only required fields
         - Smallest valid story
         - Tests basic happy path

      2. FULL FIXTURE (full-story.yaml)
         - Contains all possible fields
         - All combinations of optional fields
         - Tests comprehensive round-trip fidelity

      3. INVALID FIXTURE (invalid-missing-id.yaml)
         - Missing required field (id)
         - Tests validation catches missing fields

      4. MALFORMED FIXTURE (malformed.yaml)
         - Not valid YAML syntax
         - Tests error handling for parse failures

      Additionally, fixtures cover both legacy and v2 formats to test backward compatibility.

    evidence: |
      Test fixtures location: src/adapters/__tests__/fixtures/

      Fixture coverage achieved:
      - Minimal valid story (1 fixture)
      - Full story with all fields (1 fixture)
      - Invalid stories - missing required fields (3 variations)
      - Invalid stories - wrong field types (2 variations)
      - Malformed YAML syntax (1 fixture)
      - Legacy format (status, epic, acceptance_criteria) (1 fixture)
      - V2 format (state, feature, acs) (1 fixture)
      - Round-trip compatibility (covered in integration tests)

      Test organization:
      - Tests grouped by acceptance criteria
      - Fixtures referenced by test description
      - Both unit and integration tests use fixtures

      Coverage achieved: 90.52% (exceeds 80% requirement)

    lesson_learned: |
      For file format adapters, create fixtures covering:
      1. Minimal valid data (smallest possible)
      2. Full valid data (all fields)
      3. Invalid data - missing required (catches validation)
      4. Invalid data - wrong types (catches validation)
      5. Malformed syntax (catches parse errors)
      6. Legacy formats (if backward compatibility needed)
      7. New formats (to test forward compat)
      8. Edge cases (empty arrays, null values, special characters)

      Organize tests:
      - Group by acceptance criterion
      - Use clear fixture names
      - Document what each fixture tests
      - Re-use fixtures across multiple tests
      - Track coverage to ensure all paths tested

    applicability: HIGH (applies to all file I/O adapters and schema/parsing code)
    relevant_downstream_stories:
      - LNGG-0020  # Index Management Adapter (file format parsing)
      - LNGG-0040  # Stage Movement Adapter (file modifications)
      - LNGG-0060  # Checkpoint Adapter (file persistence)


