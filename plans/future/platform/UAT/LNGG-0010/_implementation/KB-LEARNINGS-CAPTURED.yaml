  - lesson_id: 2
    title: "Atomic write pattern (temp file + rename) is essential for file adapters to prevent corruption"
    category: pattern
    priority: high
    tags:
      - file-io
      - atomicity
      - adapter
      - reliability
    context: |
      File-based operations are subject to unexpected failures (power loss, disk full, process crash).
      A write operation that is partially complete can leave corrupted data on disk that is worse than
      no data at all.

      The atomic write pattern uses a two-step process:
      1. Write to a temporary file (suffixed .tmp)
      2. Rename the temp file to the target file (atomic OS operation)

      The rename operation is atomic at the OS level - either it succeeds completely or fails without
      modifying the target file. Crucially, cleanup must be in a finally block to ensure temp files
      are cleaned up even if rename fails.

      LNGG-0010 implements this pattern in utils/file-utils.ts:writeFileAtomic():
      - Try: write temp file → rename to target
      - Finally: always cleanup temp file

    evidence: |
      File: src/adapters/utils/file-utils.ts (lines 50-70)
      ```typescript
      async function writeFileAtomic(filePath: string, content: string): Promise<void> {
        const tmpPath = `${filePath}.tmp`
        try {
          await fs.writeFile(tmpPath, content, 'utf-8')
          await fs.rename(tmpPath, filePath)  // Atomic operation
        } finally {
          try {
            await fs.unlink(tmpPath)  // Always cleanup
          } catch {
            // Ignore cleanup errors
          }
        }
      }
      ```

      Tests verify this pattern:
      - AC-5 Unit Test: "should use temp file during write operation"
      - AC-5 Unit Test: "should cleanup temp file on write failure"

    lesson_learned: |
      For all file-based adapters, implement atomic writes using:
      1. Create a .tmp file path
      2. Write content to .tmp file
      3. Use fs.rename(tmpPath, targetPath) to move atomically
      4. Always cleanup in finally block with fs.unlink(tmpPath)

      This prevents data corruption from:
      - Process crashes mid-write
      - Disk full errors
      - Permission changes
      - Power loss during write

    applicability: CRITICAL (applies to all file I/O adapters)
    relevant_downstream_stories:
