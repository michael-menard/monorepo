architectural_decisions:
  - id: ARCH-001
    question: "Which schema version to use for Story File Adapter (v1 strict vs v2 backward-compatible)?"
    decision: "Use story-v2-compatible.ts (backward-compatible schema v2)"
    rationale: "Existing 50+ story files use legacy format (status, epic, acceptance_criteria). v2 schema accepts both formats without migration. Unblocks AC-7 and enables reading all existing files."
    decided_by: pm
    constraints:
      - "Import from src/artifacts/story-v2-compatible.ts, not src/artifacts/story.ts"
      - "Use normalization helpers (getStoryState, getStoryFeature) for field access"
      - "Log deprecation warnings for legacy fields in future"
      - "Document dual format support in adapter JSDoc"
    alternatives_considered:
      - "Use strict v1 schema (would require migration of 50+ files)"
      - "Create adapter-specific schema (duplication, maintenance burden)"
      - "Version detection with separate parsers (complexity overhead)"

  - id: ARCH-002
    question: "How to implement atomic writes to prevent partial file corruption?"
    decision: "Use temp file + rename pattern (write to .tmp, then atomic rename)"
    rationale: "Standard pattern for atomic file writes. OS-level rename is atomic on POSIX systems. Prevents partial corruption if write fails mid-operation."
    decided_by: auto
    constraints:
      - "Write to {filename}.tmp first"
      - "Use fs.rename() for atomic move (not copy + delete)"
      - "Cleanup temp file on error"
      - "Ensure directory exists before write"
      - "Handle ENOENT, EACCES, ENOSPC errors"
    alternatives_considered:
      - "Direct write (not atomic, risk of partial corruption)"
      - "Copy-on-write (requires filesystem support)"
      - "Database-backed writes (out of scope, high complexity)"

  - id: ARCH-003
    question: "Which YAML library to use (js-yaml vs yaml vs gray-matter)?"
    decision: "Use gray-matter for frontmatter parsing + js-yaml for serialization"
    rationale: "gray-matter is specialized for frontmatter extraction (YAML + Markdown content). js-yaml provides lower-level YAML control for serialization. Combined approach gives best of both."
    decided_by: auto
    constraints:
      - "gray-matter.read() for parsing files"
      - "gray-matter.stringify() for serialization"
      - "js-yaml for custom YAML formatting options if needed"
      - "Handle YAML parsing errors gracefully with InvalidYAMLError"
    alternatives_considered:
      - "js-yaml only (less convenient for frontmatter)"
      - "yaml library (newer, but less battle-tested)"
      - "Custom parser (reinventing wheel, high effort)"

  - id: ARCH-004
    question: "Should adapter support streaming reads for large files?"
    decision: "No streaming for MVP - read full file into memory"
    rationale: "Story files are <10KB typically. Streaming adds complexity without performance benefit. Can add later if needed."
    decided_by: auto
    constraints:
      - "Document file size assumption (<100KB)"
      - "Log warning if file >100KB"
      - "KB-log enhancement opportunity for streaming support"
    alternatives_considered:
      - "Stream-based parsing (complex, unnecessary for current file sizes)"
      - "Lazy field loading (over-engineering for MVP)"

  - id: ARCH-005
    question: "How to handle errors during batch operations (fail-fast vs continue-on-error)?"
    decision: "Fail-fast for validation errors, continue-on-error for missing files"
    rationale: "Validation errors indicate data corruption (critical). Missing files may be intentional (e.g., story deleted). Return partial results with error array."
    decided_by: auto
    constraints:
      - "readBatch() returns { results: StoryArtifact[], errors: Error[] }"
      - "Validation errors throw immediately"
      - "Missing files logged to errors array, processing continues"
      - "Document error handling behavior in JSDoc"
    alternatives_considered:
      - "Fail-fast for all errors (too strict)"
      - "Continue-on-error for all errors (masks critical issues)"
      - "Promise.allSettled() for graceful degradation"

