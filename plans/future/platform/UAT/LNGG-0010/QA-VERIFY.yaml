issues:
  - id: ISSUE-1
    severity: minor
    description: >
      Two TypeScript interfaces used instead of Zod schemas:
      BatchReadResult in story-file-adapter.ts:44 and ParsedStory in
      yaml-parser.ts:18. CLAUDE.md mandates Zod-first types (no interfaces).
    impact: >
      ESLint passes (no rule enforces this at the tooling level). Interfaces
      are internal implementation details not exported as public API types.
      No runtime validation gap — these types describe adapter-internal
      data shapes rather than user-facing data contracts. Functionality
      and all tests unaffected.
    recommendation: >
      Convert BatchReadResult and ParsedStory to Zod schemas with
      z.infer<> in a follow-up story for strict CLAUDE.md compliance.
    blocking: false

lessons_to_record:
  - lesson: >
      When a Zod schema is incompatible with existing on-disk files,
      creating a v2 backward-compatible schema (with optional legacy
      fields + .passthrough()) eliminates migration work for all existing
      files while keeping forward compatibility. This pattern was proven
      with story-v2-compatible.ts serving 50+ legacy story files.
    category: pattern
    tags: ["zod", "schema-migration", "backward-compatibility", "orchestrator"]

  - lesson: >
      The gray-matter + js-yaml combination is the right library pairing
      for YAML frontmatter files: gray-matter for parsing (specialized,
      handles edge cases), js-yaml for serialization (full control over
      output). Do not use either alone.
    category: reuse
    tags: ["yaml", "gray-matter", "js-yaml", "parsing"]

  - lesson: >
      Logger API in @repo/logger uses logger.level('message', { context })
      order (NOT pino.js style logger.level({ context }, 'message')).
      Mixing these causes TS compilation errors (16 call sites had to be
      fixed in this story during the fix cycle).
    category: anti_pattern
    tags: ["logger", "api-signature", "typescript"]

