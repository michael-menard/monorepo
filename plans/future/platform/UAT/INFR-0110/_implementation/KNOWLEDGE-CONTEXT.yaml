schema: 1
story_id: INFR-0110
timestamp: "2026-02-15T14:30:00Z"
domain: infra-persistence

lessons:
  - id: INFR-0040-L1
    title: "UUID vs ULID decision for primary keys"
    summary: "Use UUID with defaultRandom() for consistency across all schemas"
    context: "INFR-0040 established UUID pattern for telemetry schema"
    recommendation: "Apply uuid('id').primaryKey().defaultRandom() to all artifact tables"
    tags: [database-design, primary-keys, infra-persistence]

  - id: INFR-0040-L2
    title: "Event ID generation responsibility"
    summary: "Caller-provided IDs for artifact writes, not database-generated"
    context: "INFR-0040 clarified that event_id is provided by caller, not DB sequence"
    recommendation: "Artifact IDs should be generated by application layer before insert"
    tags: [database-design, id-generation, infra-persistence]

  - id: INFR-0040-L3
    title: "Documentation paths for story artifacts"
    summary: "Story-level documentation goes in _implementation/ directory"
    context: "INFR-0040 corrected documentation to use story-level paths"
    recommendation: "Place SCHEMA-REFERENCE.md in _implementation/ directory"
    tags: [documentation, file-organization]

  - id: WINT-0010-L1
    title: "pgSchema namespace isolation pattern"
    summary: "Use pgSchema for logical separation of domains (wint, kbar, artifacts, telemetry)"
    context: "WINT-0010 established 6 schema groups in wint namespace"
    recommendation: "Create artifacts pgSchema for artifact relational data, separate from kbar (file sync)"
    tags: [database-design, schema-isolation]

  - id: WINT-0010-L2
    title: "Enum definitions in public schema"
    summary: "Define enums in public schema for cross-namespace reusability"
    context: "WINT-0010 placed artifact_type_enum in public for KBAR references"
    recommendation: "Define artifact_type_enum in public schema with all 7 types upfront"
    tags: [database-design, enum-location]

  - id: KBAR-0010-L1
    title: "KBAR schema is for file sync state, not artifact content"
    summary: "KBAR tracks artifacts table for file sync metadata (checksum, lastSyncedAt)"
    context: "KBAR-0010 created artifacts, artifact_versions, artifact_content_cache for file tracking"
    recommendation: "Do not modify KBAR schema - create separate artifacts schema for relational content"
    tags: [database-design, schema-isolation, protected-features]

  - id: DRIZZLE-L1
    title: "drizzle-zod pattern for auto-generated Zod schemas"
    summary: "Use createInsertSchema and createSelectSchema for runtime validation"
    context: "All existing schemas (WINT, KBAR, telemetry) use drizzle-zod pattern"
    recommendation: "Generate insert/select schemas for 4 core artifact tables"
    tags: [drizzle-orm, zod, type-safety]

  - id: DRIZZLE-L2
    title: "JSONB type safety with .$type<T>()"
    summary: "Use jsonb().$type<ZodInferredType>() for typed JSONB columns"
    context: "WINT-0010 uses this pattern for metadata, agentOutcomes.securityIssues"
    recommendation: "Apply to acceptance_criteria, risks, file_changes, steps JSONB fields"
    tags: [drizzle-orm, jsonb, type-safety]

  - id: MIGRATION-L1
    title: "Drizzle migration generation command"
    summary: "Use pnpm --filter @repo/database-schema db:generate for migration files"
    context: "Standard workflow for all schema changes across monorepo"
    recommendation: "Run after creating artifacts.ts schema definitions"
    tags: [drizzle-orm, migrations, tooling]

adrs:
  - id: ADR-INFR-110-001
    title: "JSONB denormalization for acceptance criteria and file changes"
    decision: "Store acceptance_criteria, risks, file_changes as JSONB arrays instead of normalized tables"
    rationale: "Co-location pattern for small arrays (<20 items), simplifies queries, matches WINT pattern"
    alternatives:
      - option: "Normalize to acceptance_criteria table with FK to story_artifacts"
        rejected_reason: "Over-engineering for current query patterns - no need to query individual ACs"
    tags: [database-design, jsonb, denormalization]

  - id: ADR-INFR-110-002
    title: "Enum location in public schema"
    decision: "Define artifact_type_enum in public schema with all 7 types upfront"
    rationale: "Enables cross-namespace use (KBAR sync tools), avoids ALTER TYPE in INFR-0120"
    alternatives:
      - option: "Define enum in artifacts schema"
        rejected_reason: "KBAR schema cannot reference artifacts schema enum - circular dependency"
    tags: [database-design, enum-location, forward-compatibility]

  - id: ADR-INFR-110-003
    title: "ON DELETE CASCADE for foreign keys"
    decision: "Add ON DELETE CASCADE to story_id foreign keys in 4 artifact tables"
    rationale: "Story deletion should automatically clean up artifacts, prevents orphaned records"
    risks:
      - "Story deletion is destructive - must document in SCHEMA-REFERENCE.md"
    tags: [database-design, foreign-keys, data-integrity]

  - id: ADR-INFR-110-004
    title: "Composite index strategy"
    decision: "Add idx_story_artifact (story_id, artifact_type), idx_artifact_created (created_at DESC)"
    rationale: "Supports common query patterns: filter by story + type, time-range queries"
    alternatives:
      - option: "GIN indexes on JSONB fields"
        deferred_reason: "Defer to performance optimization story - no current need for JSONB queries"
    tags: [database-design, indexing, performance]

migration_notes:
  - title: "Migration coordination with WINT-0010"
    note: "WINT-0010 must complete before INFR-0110 migration (requires wint.stories table for FK)"
    action: "Verify wint.stories exists in target database before applying migration"

  - title: "Migration size estimation"
    note: "~250 lines (artifacts pgSchema + 4 tables + enum + indexes)"
    action: "Test in isolated database first, measure apply time (target <5s)"

  - title: "Rollback testing"
    note: "Test rollback immediately after apply to verify clean removal"
    action: "Verify artifacts schema, 4 tables, and enum are removed on rollback"

dependencies:
  blocking:
    - story_id: WINT-0010
      reason: "Requires wint.stories table for foreign key constraints"
      status: "Wave 1 story #4 (parallel track)"

  related:
    - story_id: INFR-0120
      reason: "Sibling story for review/QA artifact schemas (evidence, review, qa-verify)"
      note: "INFR-0120 depends on INFR-0110 completing"

    - story_id: INFR-0020
      reason: "Artifact Writer/Reader service will use these schemas for bi-directional sync"
      note: "INFR-0020 blocked until INFR-0110 completes"

patterns_to_follow:
  - pattern: "pgSchema namespace isolation"
    example: "telemetrySchema = pgSchema('telemetry')"
    source: "packages/backend/database-schema/src/schema/telemetry.ts"

  - pattern: "UUID primary keys with defaultRandom()"
    example: "id: uuid('id').primaryKey().defaultRandom()"
    source: "packages/backend/database-schema/src/schema/wint.ts:142"

  - pattern: "Timestamp fields with timezone"
    example: "timestamp('created_at', { withTimezone: true }).notNull().defaultNow()"
    source: "packages/backend/database-schema/src/schema/wint.ts:170"

  - pattern: "JSONB fields with type safety"
    example: "jsonb('metadata').$type<{ surfaces?: {...} }>()"
    source: "packages/backend/database-schema/src/schema/wint.ts:161"

  - pattern: "Composite indexes for query optimization"
    example: "index('stories_epic_wave_idx').on(table.epic, table.wave)"
    source: "packages/backend/database-schema/src/schema/wint.ts:177"

  - pattern: "Foreign keys with ON DELETE CASCADE"
    example: "references(() => stories.id, { onDelete: 'cascade' })"
    source: "packages/backend/database-schema/src/schema/wint.ts:192"

  - pattern: "Auto-generated Zod schemas"
    example: "createInsertSchema(stories)"
    source: "packages/backend/database-schema/src/schema/wint.ts:1636"

  - pattern: "Drizzle relations for lazy loading"
    example: "relations(stories, ({ many }) => ({ artifacts: many(storyArtifacts) }))"
    source: "packages/backend/database-schema/src/schema/wint.ts:1454"

risks:
  - id: RISK-001
    description: "Schema alignment drift between Zod artifacts and Postgres schema"
    severity: medium
    mitigation: "Automated test comparing Drizzle field names to Zod artifact schemas"

  - id: RISK-002
    description: "JSONB type safety not enforced at database level"
    severity: low
    mitigation: "Use drizzle-zod for runtime validation before insert"

  - id: RISK-003
    description: "Migration dependency on WINT-0010 may block progress"
    severity: medium
    mitigation: "Coordinate with WINT-0010 implementer, verify wint.stories exists"

  - id: RISK-004
    description: "Enum forward compatibility - defining 7 types when only using 4"
    severity: low
    mitigation: "Document rationale in SCHEMA-REFERENCE.md, verify INFR-0120 compatibility"

constraints:
  - "Do not modify existing KBAR or WINT schemas (protected by KBAR-0010, WINT-0010)"
  - "Use snake_case for Postgres columns, camelCase for TypeScript (Drizzle handles transformation)"
  - "All schemas must use Zod with z.infer<>, no TypeScript interfaces (CLAUDE.md requirement)"
  - "Foreign keys must reference wint.stories.id (UUID, not story_id text field)"
