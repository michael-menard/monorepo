schema: 1
story_id: "KBAR-0030"
timestamp: "2026-02-16T23:55:47Z"
gen_mode: false

touches:
  backend: true
  frontend: false
  packages: true
  db: true
  contracts: false
  ui: false
  infra: false

touched_paths_globs:
  - "packages/backend/kbar-sync/**"
  - "packages/backend/database-schema/src/schema/**"
  - "packages/backend/db/**"

risk_flags:
  auth: false
  payments: false
  migrations: false
  external_apis: false
  security: false
  performance: false

summary: "Create sync service with three core functions (syncStoryToDatabase, syncStoryFromDatabase, detectSyncConflicts) for bidirectional synchronization between filesystem story files and KBAR database with checksum-based change detection and conflict tracking"

elaboration: "completed"

scope_details:
  new_packages:
    - path: "packages/backend/kbar-sync/"
      description: "New backend package for KBAR sync functions"
      files:
        - "package.json"
        - "tsconfig.json"
        - "vitest.config.ts"
        - "src/index.ts"
        - "src/sync-story-to-database.ts"
        - "src/sync-story-from-database.ts"
        - "src/detect-sync-conflicts.ts"
        - "src/__types__/index.ts"
        - "src/__tests__/sync-story-to-database.test.ts"
        - "src/__tests__/sync-story-from-database.test.ts"
        - "src/__tests__/detect-sync-conflicts.test.ts"
        - "src/__tests__/integration.test.ts"

  db_tables_read_write:
    - table: "kbar.stories"
      operations: ["INSERT", "UPDATE"]
      description: "Insert/update story metadata"
    - table: "kbar.syncEvents"
      operations: ["INSERT"]
      description: "Insert sync event logs"
    - table: "kbar.syncConflicts"
      operations: ["INSERT"]
      description: "Insert conflict records"
    - table: "kbar.artifacts"
      operations: ["UPDATE"]
      description: "Update checksum, syncStatus, lastSyncedAt"

  filesystem_access:
    - type: "read"
      path: "plans/future/platform/"
      description: "Read YAML story files"
    - type: "write"
      path: "plans/future/platform/"
      description: "Write YAML story files (sync from database to filesystem)"

  exports:
    - "syncStoryToDatabase"
    - "syncStoryFromDatabase"
    - "detectSyncConflicts"

  dependencies:
    - "@repo/database-schema"
    - "@repo/db"
    - "@repo/logger"
    - "drizzle-orm"
    - "yaml"
    - "Node.js crypto (built-in)"
    - "Node.js fs/promises (built-in)"

acceptance_criteria:
  - id: "AC-1"
    title: "Sync story from filesystem to database"
    checklist:
      - "Read YAML story file, parse frontmatter and content"
      - "Compute SHA-256 checksum of file content"
      - "Insert or update kbar.stories table with story metadata"
      - "Create syncEvents record with sync metadata"
      - "Update artifacts.syncStatus to 'completed' on success, 'failed' on error"
      - "Return sync result (status, checksum, timestamp)"

  - id: "AC-2"
    title: "Sync story from database to filesystem"
    checklist:
      - "Read story from kbar.stories table"
      - "Generate YAML frontmatter with all metadata fields"
      - "Write to filesystem using atomic file write (temp file + rename)"
      - "Create syncEvents record"
      - "Update artifacts.lastSyncedAt timestamp"
      - "Return sync result"

  - id: "AC-3"
    title: "Detect sync conflicts"
    checklist:
      - "Read story from both filesystem and database"
      - "Compare checksums and updatedAt timestamps"
      - "Detect conflicts (both changed since last sync)"
      - "Log conflict to syncConflicts table with metadata"
      - "Return conflict status with resolution options"

  - id: "AC-4"
    title: "Checksum-based change detection"
    checklist:
      - "Compute SHA-256 checksum for YAML file content"
      - "Store checksum in artifacts.checksum field"
      - "Skip sync if checksum unchanged (idempotency)"
      - "Log checksum mismatches for debugging"

  - id: "AC-5"
    title: "Zod validation for all inputs/outputs"
    checklist:
      - "Define SyncStoryToDatabaseInputSchema, SyncStoryToDatabaseOutputSchema"
      - "Define SyncStoryFromDatabaseInputSchema, SyncStoryFromDatabaseOutputSchema"
      - "Define DetectSyncConflictsInputSchema, DetectSyncConflictsOutputSchema"
      - "Validate all inputs before execution"
      - "Validate all outputs before returning"

  - id: "AC-6"
    title: "Error handling and logging"
    checklist:
      - "Catch all errors (filesystem, database, parsing)"
      - "Log errors with context (storyId, filePath, error message)"
      - "Return graceful error results (never throw to caller)"
      - "Update artifacts.syncStatus to 'failed' on error"
      - "Store error details in syncEvents.metadata"

  - id: "AC-7"
    title: "Sync event tracking"
    checklist:
      - "Create syncEvents record for every sync operation"
      - "Track eventType ('story_sync_to_db', 'story_sync_from_db', 'conflict_detected')"
      - "Track status (pending, in_progress, completed, failed)"
      - "Track timing (startedAt, completedAt, durationMs)"
      - "Store metadata (filesScanned, filesChanged, conflictsDetected)"

  - id: "AC-8"
    title: "Unit tests (>80% coverage)"
    checklist:
      - "Test successful sync to database"
      - "Test successful sync from database"
      - "Test conflict detection (both sides changed)"
      - "Test checksum-based skip (no changes)"
      - "Test error handling (file not found, parse error, DB error)"
      - "Test Zod validation (invalid inputs rejected)"

patterns_to_follow:
  - "story-file-adapter.ts for YAML structure"
  - "story-repository.ts for database encapsulation"
  - "story-management/ MCP tools for Zod validation and error handling"
  - "Node.js crypto.createHash('sha256') for file hashing"
  - "Node.js fs/promises for async file operations"

protected_features:
  - "KBAR schema structure (created in KBAR-0010, validated in KBAR-0020)"
  - "WINT story management MCP tools (different schema, different use case)"
  - "Existing story files in plans/future/platform/ (read-only for this story)"
  - "Artifact service (INFR-0020) - use its patterns, don't modify"

non_blocking_gaps:
  - "Batch sync operations (deferred to KBAR-0040)"
  - "MCP tool wrapper (deferred to KBAR-0050+)"
  - "CLI commands (deferred to KBAR-0050)"
  - "Automated sync triggers (deferred to KBAR-0060+)"
  - "Conflict resolution UI (deferred to KBAR-0080+)"
  - "Artifact sync for non-story files (deferred to KBAR-0040)"
  - "Index regeneration (deferred to KBAR-0230)"
  - "Streaming for large files (future enhancement)"
