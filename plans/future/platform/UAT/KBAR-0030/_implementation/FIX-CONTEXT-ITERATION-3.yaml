    auto_fixable: true
    fix_strategy: |
      1. Remove @repo/db from packages/backend/database-schema/package.json dependencies
      2. @repo/db remains available at runtime when seed scripts execute via tsx
      3. Seed scripts can still import @repo/db because typescript resolves it from node_modules
      4. Verify full monorepo build succeeds with no dependency graph errors
      5. Confirm all tests still pass after dependency removal

