  - id: 1
    code: "CYCLIC-001"
    severity: "critical"
    domain: "dependency-graph"
    title: "Cyclic Dependency: @repo/db ↔ @repo/database-schema"
    file: "packages/backend/database-schema/package.json"
    line: 45
    issue: |
      Dependency cycle detected:
      - @repo/db → @repo/database-schema (line 35 in db/package.json)
      - @repo/database-schema → @repo/db (line 45 in database-schema/package.json)

      Root cause: WINT-0110 added @repo/db as a build-time dependency for seed scripts
      in src/seed/index.ts, but @repo/db already requires database-schema for schema exports.
