overview: |
  Fix iteration 3 addresses a pre-existing cyclic dependency that was blocking the build.
  This dependency was introduced in WINT-0110 when @repo/db was added to database-schema
  to support seed scripts. However, the seed scripts only need @repo/db at runtime (via tsx),
  not at build time, creating an unnecessary build-time dependency that cycles back.

  Root cause: packages/backend/database-schema/package.json declared @repo/db as a dependency
  for seed scripts, but @repo/db already depends on @repo/database-schema (for schema exports).

  This iteration resolves the cycle by removing @repo/db from database-schema dependencies
  since seed scripts can access it at runtime without it being in package.json.

