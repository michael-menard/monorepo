  - Seed scripts remain functional (can be executed via pnpm seed:wint)
  - Only packages/backend/database-schema/package.json is modified
  - Build time returns to normal (no dependency resolution delays)
  - No TypeScript errors or warnings introduced
  - No changes to seed script functionality or behavior

