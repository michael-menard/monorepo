lessons_to_record:
  - lesson: >
      Coverage checks must be run with --coverage flag during fix iterations to catch
      branch coverage gaps. Statement coverage (82%) and branch coverage (71%) can diverge
      significantly, and the vitest threshold checks branches separately. EVIDENCE.yaml
      claims of '100% coverage' should always be verified by re-running with --coverage.
    category: anti_pattern
    tags: ["testing", "coverage", "qa-process"]

  - lesson: >
      The SHA-256 checksum injectable pattern was successfully solved by using crypto mock
      in vitest, enabling previously-skipped idempotency tests to be enabled. This pattern
      (mock Node crypto module in vitest.config.ts globals) is reusable for KBAR-0040.
    category: pattern
    tags: ["testing", "kbar", "crypto", "backend"]

  - lesson: >
      Cyclic dependency (database-schema -> db -> database-schema) was introduced by WINT-0110
      adding @repo/db to database-schema for seed scripts. Build-time vs runtime dependencies
      must be carefully distinguished - seed scripts only need @repo/db at runtime (tsx).
    category: blocker
    tags: ["dependencies", "build", "cyclic", "database-schema"]

  - lesson: >
      The validateInput() and computeChecksum() utility patterns are duplicated across
      4+ backend packages (mcp-tools, database-schema, orchestrator, kbar-sync). A shared
      @repo/backend-utils package is recommended to consolidate these patterns.
    category: time_sink
    tags: ["backend", "reuse", "utilities", "tech-debt"]

