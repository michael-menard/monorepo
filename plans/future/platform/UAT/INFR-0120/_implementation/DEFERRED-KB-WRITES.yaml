    content: |
      **Finding**: Artifact diff tracking

      **Impact**: High | **Effort**: High

      **Recommendation**: Track diffs between artifact versions (not just full snapshots) to
      enable "what changed" queries and reduce storage for large JSONB fields. Useful for
      INFR-0020+ artifact versioning and audit trails.

      **Context**: Current design stores full artifact snapshots. Diffs would reduce storage
      for large evidence_artifacts JSONB and enable "show what changed in AC evidence between
      v1 and v2" queries.

