      - "performance"
    content: |
      **Finding**: No composite indexes for complex queries

      **Impact**: Medium | **Effort**: Low

      **Recommendation**: Add composite indexes for specific query patterns discovered in
      INFR-0020+ (e.g., `(story_id, created_at DESC)` for time-series queries,
      `(artifact_type, status)` for filtering). Current `idx_story_artifact` from INFR-0110
      covers basic queries.

      **Context**: Wait until INFR-0020+ reveals actual query patterns before adding indexes.
      Premature indexing wastes storage and slows writes.

  - entry_id: 6
    entry_type: finding
    source_stage: elab
    story_id: "INFR-0120"
    category: "future-opportunities"
    tags:
