      - "runtime-safety"
    content: |
      **Finding**: Zod schema validation in database triggers

      **Impact**: High | **Effort**: High

      **Recommendation**: Add PostgreSQL triggers to validate JSONB structure against Zod
      schemas at insert/update time, preventing schema drift. Trade-off: performance overhead
      vs runtime safety. Evaluate after INFR-0020 implementation to measure impact.

      **Context**: Current approach relies on application-layer validation via drizzle-zod.
      Database-level triggers would enforce validation even if application code is bypassed
      (e.g., direct SQL inserts, external tools).

  - entry_id: 7
    entry_type: finding
    source_stage: elab
    story_id: "INFR-0120"
    category: "future-opportunities"
    tags:
