    content: |
      **Finding**: Column-level encryption for sensitive evidence

      **Impact**: Low | **Effort**: High

      **Recommendation**: If evidence artifacts contain sensitive data (API keys, PII,
      credentials), implement column-level encryption for JSONB fields. Current story assumes
      non-sensitive workflow artifacts. Re-evaluate if artifact types expand.

      **Context**: Evidence artifacts currently store test results, file paths, and commands
      run. No sensitive data expected in MVP, but future artifact types may require encryption.

  - entry_id: 11
