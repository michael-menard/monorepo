      **Finding**: Evidence quality scoring

      **Impact**: Medium | **Effort**: Medium

      **Recommendation**: Calculate evidence quality scores (completeness, test coverage,
      E2E pass rate) and store as computed columns for filtering/ranking stories by QA
      quality. Useful for batch processing (WINT-6010+) to prioritize high-quality stories.

      **Context**: qa_verify_artifacts and evidence_artifacts contain data for calculating
      quality scores. Computed columns would enable queries like "show stories with evidence
      quality > 80%" for batch processing prioritization.

