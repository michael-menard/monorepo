      - "query-optimization"
    content: |
      **Finding**: No full-text search indexes on JSONB fields

      **Impact**: Low | **Effort**: Medium

      **Recommendation**: Add GIN indexes for JSONB fields if text search across evidence
      descriptions or review findings becomes a common query pattern. Defer until INFR-0020+
      when actual query patterns are established.

      **Context**: Basic queries are covered by idx_story_artifact composite index from
      INFR-0110. Full-text search is a future enhancement once query patterns are known.

