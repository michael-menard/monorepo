    content: |
      **Finding**: No materialized views for QA metrics aggregation

      **Impact**: Medium | **Effort**: Medium

      **Recommendation**: Create materialized views for QA trend analysis (e.g., "average
      AC pass rate per epic", "most common QA issues") once INFR-0020 enables artifact sync
      and queries are used in production.

      **Context**: QA trend analysis requires aggregating data across many qa_verify_artifacts
      and evidence_artifacts records. Materialized views would cache these expensive
      aggregations.

