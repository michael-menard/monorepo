    content: |
      **Finding**: No archival strategy for old artifact versions

      **Impact**: Low | **Effort**: High

      **Recommendation**: Consider partitioning or archival strategy for artifact tables if
      data volume grows large (>1M rows). Monitor table size in production before implementing.

      **Context**: Current design assumes all artifact versions are kept in hot storage.
      Once INFR-0020 enables artifact versioning, old versions may need archival to cold
      storage or separate partitions.

  - entry_id: 5
    entry_type: finding
    source_stage: elab
    story_id: "INFR-0120"
    category: "future-opportunities"
    tags:
