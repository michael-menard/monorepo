    content: |
      **Finding**: Cross-story evidence correlation

      **Impact**: Medium | **Effort**: High

      **Recommendation**: Enable queries like "show all stories where AC-3 failed due to
      similar root causes" by extracting common patterns from evidence JSONB and indexing
      them. Useful for KBAR learning loop (KBAR-0110+).

      **Context**: Evidence artifacts contain rich data about test failures and AC
      verification. Extracting and indexing common failure patterns would enable learning
      from past failures across stories.

