    content: |
      **Finding**: No normalization of evidence items, review findings, or QA issues into separate tables

      **Impact**: Medium | **Effort**: Medium

      **Recommendation**: Consider normalizing if query patterns emerge that require
      filtering/aggregating individual evidence items or findings across stories. Current
      JSONB denormalization is appropriate for MVP (max ~20 items per artifact, co-location
      benefits), but track query performance in production.

      **Context**: INFR-0120 uses JSONB denormalization for evidence_artifacts,
      review_artifacts, and qa_verify_artifacts tables. This matches the pattern from
      INFR-0110 for core workflow artifacts.

