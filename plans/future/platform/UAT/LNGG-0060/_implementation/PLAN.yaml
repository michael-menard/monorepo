architectural_decisions:
  - id: ARCH-001
    question: "Should CheckpointAdapter parse pure YAML or reuse frontmatter parser?"
    decision: "Parse pure YAML using js-yaml.load() directly"
    rationale: "Checkpoint files are pure YAML without frontmatter delimiters. Using gray-matter (frontmatter parser) is unnecessary overhead."
    decided_by: auto
    tier: 1

  - id: ARCH-002
    question: "Should CheckpointSchema use .passthrough() or enumerate all optional fields?"
    decision: "Hybrid approach: .passthrough() + typed optional fields for high-frequency extras"
    rationale: "Passthrough ensures backward compatibility with all existing files. Typed optional fields (e2e_gate, completed_at, qa_verdict) provide type safety for common cases."
    decided_by: auto
    tier: 2
    context: "Decided in Phase 0 based on schema survey findings"

  - id: ARCH-003
    question: "How to handle numeric phase values in existing checkpoints?"
    decision: "Convert numeric to string in adapter.read() and log warning"
    rationale: "Maintains backward compatibility without modifying existing files. Logging warns about legacy format."
    decided_by: auto
    tier: 1
    context: "Decided in Phase 0 based on AC-10 survey findings"

