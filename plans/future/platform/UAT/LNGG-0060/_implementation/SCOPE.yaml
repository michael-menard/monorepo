## Phase 0: Pre-Implementation Findings

### AC-9 Completion: Schema Compatibility Survey

**Survey Scope**: Scanned 10 existing CHECKPOINT.yaml files across plans/future/instructions and plans/future/wish directories.

**Key Findings**:
- 25+ extra fields found beyond 13 core CheckpointSchema fields
- High-frequency extra fields: e2e_gate, completed_at, phase_summary_*, qa_verdict, qa_gate_decision
- Schema drift indicates agents added fields as workflows matured
- Extra field types vary (string, object, timestamp, boolean, arrays)
- Existing checkpoints must remain readable after adapter deployment

**Decision**: Implement CheckpointAdapter using hybrid approach:
1. Primary: Use Zod `.passthrough()` to preserve all extra fields
2. Secondary: Extend CheckpointSchema with typed definitions for high-frequency fields (e2e_gate, completed_at, qa_verdict)
3. Fallback: Low-frequency fields handled via passthrough, no individual type definitions

**Rationale**:
- `.passthrough()` ensures backward compatibility with all existing files
- Type extension for common fields provides type safety where it matters
- Forward-compatible: new fields automatically supported without adapter changes
- Minimal schema maintenance burden

**Artifact**: See SCHEMA-SURVEY.md for complete scan results, field categorization, and example file excerpts.

### AC-10 Completion: Phase Enum Compatibility

**Survey Results**:
- Found 11 phase values across 10 checkpoint files
- 8 values match PhaseSchema enum (setup, plan, execute, review, qa-setup, qa-verify, qa-complete, done)
- 3 mismatches identified:
  1. `qa-completion` (INST-1102): 8-letter variant of schema's `qa-complete` (10-letter)
  2. `uat-complete` (SETS-MVP-002): Not in schema, suggests UAT completion state
  3. Numeric `3` (INST-1105): Type error - should be string enum

**Decision**: Extend PhaseSchema to include discovered phase values:
```
Added to enum:
- 'qa-completion' (variant/alias for qa-complete)
- 'uat-complete' (represents UAT phase completion)

Numeric phase handling:
- Convert numeric phases to string equivalents in CheckpointAdapter.read()
- Document as legacy format
- Add test fixture for backward compatibility
```

**Migration Strategy**:
- Adapter reads numeric phases and converts automatically
- Log warning when legacy format detected
- Existing files remain unchanged (in-place conversion during read)
- New checkpoints use correct string enum values

**Artifact**: See SCHEMA-SURVEY.md section "AC-10: Phase Enum Compatibility Survey" for detailed findings.

### Schema Compatibility Decisions

**Decision 1: Field preservation strategy**
- ✓ Passthrough mode enabled: Unknown extra fields preserved as-is
- ✓ Core schema validation: 13 required fields validated against CheckpointSchema
- Impact: Existing 100+ checkpoints readable without migration

**Decision 2: Phase enum extension**
- ✓ PhaseSchema extended with 2 new values (qa-completion, uat-complete)
- ✓ Numeric phase conversion: 3 → 'execute' mapping
- Impact: All existing phase values now supported; no checkpoint corruption

**Decision 3: Typed optional fields**
- ✓ High-frequency fields (e2e_gate, completed_at, qa_verdict): Added to CheckpointSchema as optional
- ✓ Low-frequency fields (20+ others): Preserved via passthrough, no type definition
- Impact: Type safety for common patterns; flexibility for edge cases

**Decision 4: Test fixture strategy**
- ✓ Core fixtures: valid, minimal, invalid, legacy formats
- ✓ Extra field fixtures: e2e-gate, phases-tracking, uat-metadata
- ✓ Enum mismatch fixtures: numeric-phase, qa-completion-variant, uat-complete
- Impact: Comprehensive backward compatibility testing

### Blocking Dependencies

**LNGG-0010 Status**: Currently in "fix" phase with TypeScript compilation failures
- CheckpointAdapter reuses file-utils, yaml-parser, error types from LNGG-0010
- Cannot proceed to implementation phase until LNGG-0010 reaches "completed" status
- No code changes started; setup only

**Mitigation**: Phase 0 setup (this phase) is independent of LNGG-0010 completion. Can proceed to Phase 1 (plan) once LNGG-0010 is fixed.

### Key Constraints

1. **Backward Compatibility Required**: Adapter must read all existing 100+ checkpoints without modification
2. **Atomic Write Pattern**: Temp file + rename mandatory to prevent corruption
3. **Zod Validation**: Runtime validation required at all read/write points
4. **Type Safety**: Core fields must be fully typed; extra fields optional
5. **No Breaking Changes**: CheckpointSchema v1 must remain compatible; no field deletions

### Risk Summary

| Risk | Likelihood | Impact | Mitigation |
|------|-----------|--------|-----------|
| Extra fields lose type safety | Medium | Low | Typed optional fields for common cases |
| Numeric phase values fail | Medium | Medium | Conversion in adapter.read() + test fixture |
| Phase name variants break logic | Low | High | Extended enum with both variants |
| Existing checkpoints unreadable | Low | Critical | Passthrough mode ensures compatibility |

