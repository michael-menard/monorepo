  lessons_learned:
    count: 8
    relevant_to_scope:
      - story_id: "KBAR-0030"
        lesson: "computeChecksum idempotency cannot be unit-tested via crypto mock — requires real PostgreSQL + filesystem integration test"
        category: blocker
        applies_because: "KBAR-0040 implements the same checksum-based idempotency pattern for artifact sync; AC-1 skip-on-checksum-unchanged must be an integration test"

      - story_id: "KBAR-0030"
        lesson: "Path traversal (CWE-22) and symlink following (CWE-59) were HIGH security findings in code review — validateFilePath and validateNotSymlink must be called before every I/O operation"
        category: blocker
        applies_because: "AC-8 explicitly requires path security on all file operations in both single-artifact and batch sync functions"

      - story_id: "KBAR-0030"
        lesson: "as any casts in transaction callbacks and metadata objects caused TypeScript review findings — define Zod schemas and use proper Drizzle types throughout"
        category: pattern
        applies_because: "AC-7 explicitly prohibits as any casts; artifact sync adds more transaction code with metadata objects"

      - story_id: "KBAR-0030"
        lesson: "N+1 queries caused performance findings — use Drizzle leftJoin to fetch related rows in one query; cache lookup results inside transactions"
        category: pattern
        applies_because: "AC-4 and AC-5 batch sync functions must not issue N+1 queries per artifact"

      - story_id: "KBAR-0030"
        lesson: "MAX(version) computation for artifactVersions must happen inside the Drizzle transaction to avoid race conditions — do not read MAX(version) before entering the transaction"
        category: blocker
        applies_because: "AC-1 inserts version records in kbar.artifactVersions on content change; same race condition risk applies"

      - story_id: "KBAR-0030"
        lesson: "Sync event must be created as pending before file I/O and updated to completed/failed after — never skip the pending→completed/failed lifecycle"
        category: pattern
        applies_because: "AC-1, AC-2, AC-4, AC-5 all require kbar.syncEvents records with timing"

      - story_id: "KBAR-0030"
        lesson: "Atomic write pattern (write to .tmp then fs.rename) must include finally block to clean up .tmp on rename failure to avoid orphaned temp files"
        category: pattern
        applies_because: "AC-2 (syncArtifactFromDatabase) uses atomic write; cleanup is a defensive measure"

      - story_id: "KBAR-0030"
        lesson: "kbar.artifacts table has no unique constraint on (storyId, artifactType) — storyArtifactTypeIdx is index() not uniqueIndex() — multiple rows of same artifactType per story are permitted"
        category: reuse
        applies_because: "AC-10 requires documenting this in ARTIFACT_FILENAME_MAP since both _pm/STORY-SEED.md and _pm/DEV-FEASIBILITY.md map to 'elaboration' type"

    blockers_to_avoid:
      - "Crypto mock-based unit test for checksum idempotency — always use real PostgreSQL via testcontainers"
      - "Path security skipped in batch discovery — even auto-discovered paths must pass validateFilePath and validateNotSymlink"
      - "as any casts in Drizzle transaction callbacks — define proper types"
      - "MAX(version) read outside transaction — race condition risk for concurrent sync calls"
      - "Aborting entire batch on first artifact failure — batch functions must be fault-tolerant with per-artifact isolation"

    patterns_to_follow:
