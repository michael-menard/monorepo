      - "Zod-first types: all inputs and outputs defined as Zod schemas; no TypeScript interfaces"
      - "Create syncEvent as pending before I/O; update to completed/failed with timing after"
      - "Use Drizzle .onConflictDoUpdate() for artifactContentCache upsert (unique index on artifactId)"
      - "batchSyncByType: update syncCheckpoints after each artifact inside its transaction for resumption"
      - "fs.mkdir({ recursive: true }) before atomic write in syncArtifactFromDatabase (parent dir may not exist)"
      - "PROOF-*.md uses glob pattern in batch discovery — compose with static ARTIFACT_FILENAME_MAP keys"

