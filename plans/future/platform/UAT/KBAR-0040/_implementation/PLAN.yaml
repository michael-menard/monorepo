notes:
  - "KBAR-0030 must be merged before implementation begins — __types__/index.ts changes from KBAR-0030 review must be accommodated before Step 1"
  - "Per DECISIONS.yaml and ANALYSIS.md: kbar.artifacts has no unique constraint on (storyId, artifactType) — confirmed safe for multiple 'elaboration' rows per story"
  - "syncStatus 'synced' (not 'completed') is intentional deviation from KBAR-0030 story sync pattern — document in SyncArtifactToDatabaseOutputSchema per AC-10"
  - "PROOF-*.md files require glob pattern matching in batch discovery — compose with static ARTIFACT_FILENAME_MAP keys using Node.js glob/micromatch"
  - "batchSyncByType omits conflictsDetected field intentionally — AC-5 does not specify it; document omission as intentional in code comment"
  - "5MB file size limit defaults to hard error: { success: false, error: 'File too large', sizeBytes: N } per DECISIONS.yaml auto-resolution"
  - "Idempotency (AC-1 checksum skip) and conflict detection (AC-6 no-conflict) must be integration tests using real PostgreSQL — cannot be unit-tested via mocks (KBAR-0030 lesson)"
  - "Per ADR-005 and ADR-006: at least one happy-path integration test per AC required during dev phase"
  - "Test files must NOT use barrel file imports — import directly from source files per CLAUDE.md"
  - "No changes to sync-story-to-database.ts, sync-story-from-database.ts, detect-sync-conflicts.ts, or database-schema package"
