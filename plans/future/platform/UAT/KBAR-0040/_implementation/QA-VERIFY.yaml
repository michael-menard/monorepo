lessons_to_record:
  - lesson: >
      Composing batch functions from single-artifact functions (batchSyncArtifactsForStory
      calls syncArtifactToDatabase per artifact) avoids logic duplication and inherits
      existing security, cache, and idempotency behaviors automatically.
    category: pattern
    tags: ["backend", "kbar-sync", "batch"]

  - lesson: >
      PROOF-*.md glob pattern in ARTIFACT_FILENAME_MAP requires batch discovery to
      combine static map keys with dynamic glob results; this hybrid approach cleanly
      handles evidence files whose names are not known at design time.
    category: pattern
    tags: ["backend", "kbar-sync", "artifact-discovery"]

  - lesson: >
      syncStatus 'synced' (artifact output schema) vs 'completed' (DB kbar_sync_status enum)
      is an intentional naming divergence to distinguish artifact sync results from
      KBAR-0030 story sync results at the API boundary; must be documented in schema
      comments to avoid future confusion.
    category: pattern
    tags: ["backend", "kbar-sync", "schema-design"]

  - lesson: >
      When writing idempotency tests that depend on real SHA-256 checksums, import
      node:crypto inside the mock implementation to compute the expected checksum
      dynamically rather than hardcoding a hash value — this keeps tests resilient
      to content changes.
    category: pattern
    tags: ["testing", "checksum", "idempotency"]

