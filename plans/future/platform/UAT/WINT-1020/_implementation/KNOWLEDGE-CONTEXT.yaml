# ==============================================================================
# Documentation Structure
# ==============================================================================

documentation:
  file: docs/workflow/story-directory-structure.md
  sections:
    - section: Overview
      content: Rationale for flat directory structure

    - section: Directory Structure
      content: |
        Before (lifecycle-based):
        ```
        plans/future/{epic}/
          ├── backlog/{STORY-ID}/
          ├── elaboration/{STORY-ID}/
          ├── ready-to-work/{STORY-ID}/
          ├── in-progress/{STORY-ID}/
          ├── ready-for-qa/{STORY-ID}/
          └── UAT/{STORY-ID}/
        ```

        After (flat):
        ```
        plans/future/{epic}/
          └── {STORY-ID}/
        ```

    - section: Status Field
      content: |
        Story status is now stored in YAML frontmatter:
        ```yaml
        ---
        id: STORY-001
        title: Example Story
        status: in-progress
        ---
        ```

    - section: Migration Notes
      content: |
        - Migration script creates backup tarball before execution
        - Dry-run mode available for preview
        - Production migration deferred to WINT-1030
        - Story commands will break until WINT-1030 updates them

    - section: Command Compatibility
      content: |
        During transition (WINT-1020 → WINT-1030):
        - /story-status: Will not work (searches lifecycle directories)
        - /story-move: Will not work (moves between lifecycle directories)
        - /story-update: Will not work (uses directory location for status)

        After WINT-1030 (database population):
        - All commands will be updated to use database queries
        - Status tracked in database, not directory location

