related_code:
  - example: Reading story frontmatter safely
    location: StoryFileAdapter.read()
    snippet: |
      const content = await readFileSafe(filePath)
      const parsed = parseFrontmatter(content, filePath)
      const result = StoryArtifactSchema.safeParse(parsed.frontmatter)
      if (!result.success) {
        throw new ValidationError(filePath, errors)
      }
    application: Use same pattern in validation phase

  - example: Updating story frontmatter
    location: StoryFileAdapter.update()
    snippet: |
      const content = await readFileSafe(filePath)
      const parsed = parseFrontmatter(content, filePath)
      const merged = mergeFrontmatter(parsed, updates)
      const result = StoryArtifactSchema.safeParse(merged.frontmatter)
      const yaml = serializeStory(result.data, merged.content)
      await writeFileAtomic(filePath, yaml)
    application: Use same pattern to add status field

  - example: Batch read with error collection
    location: StoryFileAdapter.readBatch()
    snippet: |
      const results: StoryArtifact[] = []
      const errors: Array<{ filePath: string; error: Error }> = []
      const promises = filePaths.map(async filePath => {
        try {
          const story = await this.read(filePath)
          results.push(story)
        } catch (error) {
          errors.push({ filePath, error: error as Error })
        }
      })
      await Promise.all(promises)
      return { results, errors }
    application: Use for validation phase (collect all errors)

  - example: Atomic file write with cleanup
    location: file-utils.ts writeFileAtomic()
    snippet: |
      const tempPath = `${filePath}.tmp`
      try {
        await fs.writeFile(tempPath, content, 'utf-8')
        await fs.rename(tempPath, filePath)
      } catch (error) {
        try {
          await fs.unlink(tempPath)
        } catch {}
        throw new WriteError(filePath, error)
      }
    application: Same pattern for auxiliary file writes

  - example: CLI script structure
    location: scripts/check-workflow-sync.ts
    snippet: |
      async function main() {
        const args = process.argv.slice(2)
        const dryRun = args.includes('--dry-run')
        const verbose = args.includes('--verbose')

        // Run checks
        const results = await runChecks()

        // Report results
        results.forEach(r => console.log(`${icon} ${r.message}`))

        // Exit with appropriate code
        process.exit(hasFailures ? 1 : 0)
      }

      main().catch(err => {
        console.error('Error:', err)
        process.exit(1)
      })
    application: Use same structure for migration script

