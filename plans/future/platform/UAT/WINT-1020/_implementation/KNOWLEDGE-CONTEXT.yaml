reuse_candidates:
  # Adapters - Existing, use as-is
  - name: StoryFileAdapter
    location: packages/backend/orchestrator/src/adapters/story-file-adapter.ts
    purpose: Type-safe YAML read/write operations for story files
    reuse_strategy: Use read-only
    methods_to_use:
      - read(filePath): Read and validate story frontmatter
      - update(filePath, updates): Update status field in frontmatter
      - readBatch(filePaths): Read multiple stories in parallel
      - exists(filePath): Check if story file exists
    key_features:
      - Atomic writes (temp file + rename pattern)
      - Zod validation on read/write
      - Typed error handling (StoryNotFoundError, ValidationError, ReadError, WriteError)
      - Backward compatibility with legacy story formats
      - Batch operations for performance
    why_perfect_fit: |
      StoryFileAdapter provides exactly what we need:
      1. Safe YAML parsing with gray-matter
      2. Zod validation against StoryArtifactSchema
      3. Atomic write operations prevent corruption
      4. Error handling already implemented
      No need to write custom YAML parsing or validation logic.

  - name: StoryArtifactSchema
    location: packages/backend/orchestrator/src/artifacts/story-v2-compatible.ts
    purpose: Zod schema for story frontmatter validation
    reuse_strategy: Use for validation
    key_features:
      - Backward compatible (supports both status and state fields)
      - Allows unknown fields via .passthrough()
      - Validates story structure before writes
      - Supports both legacy and v2 formats
    why_perfect_fit: |
      Schema already has status field as optional (legacy support).
      Migration script can use this to validate stories before writing
      status field. No schema changes needed.

  - name: file-utils.ts
    location: packages/backend/orchestrator/src/adapters/utils/file-utils.ts
    purpose: Atomic file operations
    reuse_strategy: Use existing utilities
    functions_to_use:
      - writeFileAtomic(filePath, content): Atomic write with temp file pattern
      - readFileSafe(filePath): Safe read with error handling
      - ensureDirectory(dirPath): Create directories recursively
      - fileExists(filePath): Check file existence
    key_features:
      - Atomic writes prevent partial corruption
      - Comprehensive error handling
      - Uses fs/promises for async operations
    why_perfect_fit: |
      Provides low-level file operations with safety guarantees.
      Migration script can use these for auxiliary file operations
      (though directory moves will use fs.rename() directly).

  - name: yaml-parser.ts
    location: packages/backend/orchestrator/src/adapters/utils/yaml-parser.ts
    purpose: YAML frontmatter parsing and serialization
    reuse_strategy: Used internally by StoryFileAdapter (no direct use needed)
    functions:
      - parseFrontmatter(content, filePath): Extract YAML + markdown
      - serializeStory(story, content): Create YAML file with frontmatter
      - mergeFrontmatter(original, updates): Merge updates into frontmatter
    key_features:
      - Uses gray-matter for frontmatter extraction
      - Preserves markdown content during updates
      - Type-safe with Zod validation
    why_perfect_fit: |
      Already used internally by StoryFileAdapter.
      Migration script doesn't need to call these directly.

  # Utilities
  - name: "@repo/logger"
    location: packages/core/logger
    purpose: Structured logging
    reuse_strategy: Use for all logging (never console.log)
    methods_to_use:
      - logger.info(): Progress and status updates
      - logger.warn(): Recoverable issues (missing frontmatter, collisions)
      - logger.error(): Failures and exceptions
      - logger.debug(): Detailed trace for debugging
    why_perfect_fit: |
      Already used throughout orchestrator package.
      Provides structured logging with consistent format.

  # Standard Library
  - name: Node.js fs/promises
    purpose: Async file system operations
    reuse_strategy: Use for directory operations
    methods_to_use:
      - fs.rename(oldPath, newPath): Atomic directory move
      - fs.readdir(dirPath, { withFileTypes: true }): List directory contents
      - fs.stat(filePath): Get file metadata
      - fs.utimes(filePath, atime, mtime): Preserve timestamps
      - fs.mkdir(dirPath, { recursive: true }): Create directories
    why_perfect_fit: |
      Built-in Node.js APIs, no external dependencies needed.
      fs.rename() is atomic on POSIX systems (critical for data safety).

  - name: Node.js child_process
    purpose: Execute tar command for backup
    reuse_strategy: Use execSync for backup/rollback
    methods_to_use:
      - execSync('tar -czf backup.tar.gz plans/future/'): Create backup
      - execSync('tar -xzf backup.tar.gz'): Restore backup
      - execSync('tar -tzf backup.tar.gz | wc -l'): Verify tarball
    why_perfect_fit: |
      Simpler than implementing tar in JavaScript.
      Reliable and well-tested system utility.

