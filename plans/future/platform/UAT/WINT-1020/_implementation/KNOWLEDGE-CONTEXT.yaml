# Lifecycle Directory Priority Mapping
# ==============================================================================

lifecycle_mapping:
  priority_hierarchy:
    - directory: UAT
      status_value: uat
      priority: 1
      description: User Acceptance Testing (highest priority)

    - directory: ready-for-qa
      status_value: ready-for-qa
      priority: 2
      description: Ready for QA testing

    - directory: in-progress
      status_value: in-progress
      priority: 3
      description: Currently being implemented

    - directory: ready-to-work
      status_value: ready-to-work
      priority: 4
      description: Ready for implementation

    - directory: elaboration
      status_value: elaboration
      priority: 5
      description: Being elaborated/refined

    - directory: backlog
      status_value: backlog
      priority: 6
      description: Backlog (lowest priority)

  rationale: |
    When a story exists in multiple lifecycle directories (duplicates),
    choose the most advanced lifecycle stage. This ensures we don't
    accidentally downgrade a story from UAT to backlog.

# ==============================================================================
# Migration Script Structure
# ==============================================================================

script_structure:
  entry_point: packages/backend/orchestrator/src/scripts/migrate-flatten-stories.ts

  cli_interface:
    flags:
      - flag: --epic
        required: true
        description: Epic directory to migrate (e.g., bug-fix, platform)
        example: --epic test-epic-migration

      - flag: --dry-run
        required: false
        description: Generate migration plan without executing
        example: --dry-run

      - flag: --execute
        required: false
        description: Execute migration (requires prior dry-run)
        example: --execute

      - flag: --verbose
        required: false
        description: Enable verbose logging
        example: --verbose

  phases:
    - phase: 1_discovery
      functions:
        - scanAllEpics()
        - findLifecycleDirectories()
        - buildInventory()
        - detectDuplicates()
      output: migration-inventory.json

    - phase: 2_validation
      functions:
        - validateStories()
        - checkFrontmatter()
        - reportValidationErrors()
        - handleMissingFrontmatter()
      output: migration-validation-report.json

    - phase: 3_dry_run
      functions:
        - generateMigrationPlan()
        - inferStatus()
        - detectCollisions()
        - applyPriorityHierarchy()
      output: migration-plan.json

    - phase: 4_backup
      functions:
        - createBackupTarball()
        - verifyTarball()
        - checkDiskSpace()
      output: plans-backup-{date}.tar.gz

    - phase: 5_execute
      functions:
        - moveDirectories()
        - updateFrontmatter()
        - preserveTimestamps()
        - handleFailure()
      output: Updated directory structure

    - phase: 6_verify
      functions:
        - verifyFlatStructure()
        - validateStatuses()
        - compareFileCounts()
        - generateVerificationReport()
      output: migration-log.json

  error_handling:
    - error_type: Malformed YAML frontmatter
      behavior: Skip story, log error, continue
      recovery: Manual review after migration

    - error_type: Missing frontmatter
      behavior: Create minimal frontmatter with status
      recovery: Continue migration

    - error_type: Target directory collision
      behavior: Halt migration, log collision
      recovery: Manual resolution required

    - error_type: Validation failure
      behavior: Skip story, continue with others
      recovery: Report in validation-report.json

    - error_type: Mid-migration failure
      behavior: Stop execution, preserve partial state
      recovery: Rollback from backup tarball

    - error_type: Disk full
      behavior: Fail fast before any writes
      recovery: Check disk space in Phase 0

