insights:
  - insight: StoryArtifactSchema already supports status field
    location: packages/backend/orchestrator/src/artifacts/story-v2-compatible.ts
    details: |
      The schema has both legacy (status) and new (state) fields.
      No schema changes needed for WINT-1020.
      Migration script can just add status field to frontmatter.
    impact: Simplifies AC-4 (no schema updates required)

  - insight: StoryFileAdapter uses atomic write pattern
    location: packages/backend/orchestrator/src/adapters/utils/file-utils.ts
    details: |
      All writes use temp file + rename pattern.
      This prevents partial corruption if write fails mid-way.
      Same pattern should be used for migration.
    impact: Data safety guaranteed by existing patterns

  - insight: Existing YAML parser preserves content
    location: packages/backend/orchestrator/src/adapters/utils/yaml-parser.ts
    details: |
      parseFrontmatter() separates YAML from markdown content.
      serializeStory() preserves markdown when updating frontmatter.
      Migration won't lose markdown content when adding status.
    impact: AC-7 (preserve artifacts) is supported by existing utilities

  - insight: Error types already defined
    location: packages/backend/orchestrator/src/adapters/__types__/index.ts
    details: |
      StoryNotFoundError, ValidationError, ReadError, WriteError
      All typed error classes with structured data.
      Migration script can use same error types.
    impact: Consistent error handling across orchestrator package

  - insight: Batch operations use Promise.all with error collection
    location: StoryFileAdapter.readBatch()
    details: |
      Parallel processing with individual error collection.
      Allows partial success (some stories fail, others succeed).
      Same pattern should be used for validation phase.
    impact: Migration can continue even if some stories fail validation

