# ==============================================================================
# Implementation Plan: Flatten Story Directories
# ==============================================================================

approach: |
  Implement a 5-phase migration pipeline that safely flattens story directory
  structure from lifecycle-based to flat organization. The migration script will
  use existing StoryFileAdapter for type-safe YAML operations and implement
  comprehensive safety mechanisms (backup, dry-run, validation, rollback).

  Key principles:
  - Atomic operations (all-or-nothing per epic)
  - Read → Validate → Plan → Backup → Execute → Verify
  - Comprehensive logging for audit trail
  - Test on isolated test epic before production use
  - Production migration deferred to WINT-1030

# ==============================================================================
# Implementation Steps
# ==============================================================================

phases:
  # Phase 1: Create Migration Script Foundation
  - phase: foundation
    order: 1
    description: Set up migration script structure and utilities
    tasks:
      - task: Create script file
        files:
          - path: packages/backend/orchestrator/src/scripts/migrate-flatten-stories.ts
            action: create
            description: |
              Main migration script with CLI interface.

              Structure:
              - CLI argument parsing (--epic, --dry-run, --execute)
              - Phase orchestration (Discovery → Validation → Dry Run → Execute → Verify)
              - Comprehensive error handling
              - Logging setup with @repo/logger

              Dependencies:
              - StoryFileAdapter from ../adapters/story-file-adapter.ts
              - StoryArtifactSchema from ../artifacts/story-v2-compatible.ts
              - @repo/logger
              - Node.js fs/promises, path, child_process

      - task: Define types and interfaces
        files:
          - path: packages/backend/orchestrator/src/scripts/__types__/migration.ts
            action: create
            description: |
              Migration-specific type definitions using Zod.

              Schemas:
              - MigrationInventorySchema (all stories found)
              - MigrationPlanSchema (planned operations)
              - MigrationLogSchema (executed operations)
              - ValidationReportSchema (validation errors/warnings)
              - StoryLocationSchema (story path + lifecycle directory)
              - DuplicateStorySchema (stories in multiple locations)

              All schemas use Zod for runtime validation.

  # Phase 2: Implement Discovery and Validation
  - phase: discovery
    order: 2
    description: Scan filesystem and validate stories
    tasks:
      - task: Implement Phase 1 - Discovery
        description: |
          Scan all epics for lifecycle directories and build story inventory.

          Functions:
          - scanAllEpics(): Traverse plans/future/ for epic directories
          - findLifecycleDirectories(): Locate backlog/, elaboration/, etc.
          - buildInventory(): List all stories with locations
          - detectDuplicates(): Identify stories in multiple directories

          Output: migration-inventory.json

        acceptance_criteria:
          - Scans all epics under plans/future/
          - Detects all 6 lifecycle directories (backlog, elaboration, ready-to-work, in-progress, ready-for-qa, UAT)
          - Identifies duplicate stories across lifecycle directories
          - Handles nested epics (preserves nesting structure)
          - Logs inventory to migration-inventory.json

      - task: Implement Phase 2 - Validation
        description: |
          Read and validate story frontmatter against StoryArtifactSchema.

          Functions:
          - validateStories(): Read all story files using StoryFileAdapter
          - checkFrontmatter(): Validate against StoryArtifactSchema
          - reportValidationErrors(): Log errors to migration-validation-report.json
          - handleMissingFrontmatter(): Flag stories with no frontmatter

          Output: migration-validation-report.json

        acceptance_criteria:
          - Reads all story files using StoryFileAdapter.read()
          - Validates frontmatter with StoryArtifactSchema.safeParse()
          - Reports malformed YAML (parse errors)
          - Reports missing frontmatter (create minimal on migration)
          - Reports validation failures (schema violations)
          - Continues validation even if some stories fail (collect all errors)

  # Phase 3: Implement Dry Run and Planning
  - phase: planning
    order: 3
    description: Generate migration plan and detect conflicts
    tasks:
      - task: Implement Phase 3 - Dry Run
        description: |
          Generate migration plan WITHOUT executing file operations.

          Functions:
          - generateMigrationPlan(): Map source → target directories
          - inferStatus(): Determine status field from lifecycle directory
          - detectCollisions(): Check for target directory conflicts
          - applyPriorityHierarchy(): Choose most advanced lifecycle for duplicates

          Priority hierarchy (AC-1):
          1. UAT (highest)
          2. ready-for-qa
          3. in-progress
          4. ready-to-work
          5. elaboration
          6. backlog (lowest)

          Output: migration-plan.json

        acceptance_criteria:
          - Maps all stories to target flat locations
          - Infers status from lifecycle directory per AC-1 priority
          - Detects target directory collisions (halt if found)
          - Handles duplicates using priority hierarchy
          - Outputs migration-plan.json with all planned operations
          - Dry-run produces NO filesystem changes (read-only verification)

  # Phase 4: Implement Backup and Execution
  - phase: execution
    order: 4
    description: Create backup and execute migration
    tasks:
      - task: Implement Phase 4 - Backup
        description: |
          Create backup tarball before ANY write operations.

          Functions:
          - createBackupTarball(): tar -czf plans-backup-{date}.tar.gz plans/future/
          - verifyTarball(): Check tarball integrity after creation
          - checkDiskSpace(): Ensure sufficient space before backup

          AC-8: Rollback mechanism must restore exact structure

        acceptance_criteria:
          - Creates tarball BEFORE any file operations
          - Uses timestamp in filename: plans-backup-YYYYMMDD-HHMMSS.tar.gz
          - Verifies tarball integrity (tar -tzf | wc -l)
          - Logs backup location
          - Fails fast if disk space insufficient

      - task: Implement Phase 5 - Execute
        description: |
          Move directories and update frontmatter with status field.

          Functions:
          - moveDirectories(): Use fs.rename() for atomic moves
          - updateFrontmatter(): Add/update status field via StoryFileAdapter
          - preserveTimestamps(): Use fs.utimes() for original timestamps
          - handleFailure(): Trigger rollback on any error

          AC-7: Preserve all artifacts during migration

        acceptance_criteria:
          - Uses fs.rename() for atomic directory moves (not copy + delete)
          - Updates frontmatter using StoryFileAdapter.update()
          - Adds status field based on lifecycle directory
          - Preserves all subdirectories (_pm/, _implementation/)
          - Preserves file timestamps with fs.utimes()
          - Transaction-like per epic (all-or-nothing)
          - Triggers rollback on partial failure

  # Phase 5: Implement Verification and Rollback
  - phase: verification
    order: 5
    description: Verify migration success and implement rollback
    tasks:
      - task: Implement Phase 6 - Verify
        description: |
          Verify flat structure and status fields after migration.

          Functions:
          - verifyFlatStructure(): Check no lifecycle directories remain
          - validateStatuses(): All stories have status field
          - compareFileCounts(): Verify no data loss
          - generateVerificationReport(): Log results

        acceptance_criteria:
          - Verifies no lifecycle directories remain in epic
          - Confirms all stories have status field in frontmatter
          - Compares file counts (before vs after)
          - Reports any discrepancies
          - Logs verification results to migration-log.json

      - task: Implement rollback mechanism
        description: |
          Restore from backup tarball if migration fails.

          Functions:
          - rollback(): Extract backup tarball to restore original structure
          - cleanPartialMigration(): Remove any partial flat directories
          - verifyRollback(): Ensure exact restoration

          AC-8: Rollback mechanism required

        acceptance_criteria:
          - Extracts backup tarball: tar -xzf plans-backup-{date}.tar.gz
          - Removes partial migration artifacts
          - Restores exact directory structure (diff shows no changes)
          - Logs rollback operations
          - Tested with simulated mid-migration failure (Test 12)

