# ==============================================================================
# Testing Strategy
# ==============================================================================

testing:
  unit_tests:
    - description: Not applicable (migration script, manual testing)

  integration_tests:
    - test: Test 1 - Single story in single lifecycle directory
      setup: Create test epic with 1 story in backlog/
      expected: Story moved to flat location with status: backlog
      evidence: Directory listing + frontmatter inspection

    - test: Test 2 - Story in multiple lifecycle directories (duplicate)
      setup: Story in backlog/, ready-to-work/, in-progress/
      expected: Story moved to flat location with status: in-progress (highest priority)
      evidence: Migration log shows duplicate detection + priority selection

    - test: Test 3 - Nested epic migration
      setup: Story in plans/future/parent-epic/child-epic/backlog/
      expected: Story moved to plans/future/parent-epic/child-epic/{STORY-ID}/
      evidence: Nested structure preserved

    - test: Test 4 - All lifecycle directories migrated
      setup: Stories in all 6 lifecycle directories
      expected: All stories migrated with correct status mapping
      evidence: Each story's frontmatter shows correct status

    - test: Test 5 - Story with no frontmatter
      setup: Story directory with markdown but no YAML frontmatter
      expected: Migration creates minimal frontmatter with status
      evidence: Warning logged + frontmatter created

    - test: Test 6 - Story with malformed YAML frontmatter
      setup: Story with invalid YAML syntax
      expected: Migration skips story, logs error, does not move
      evidence: Error in validation report + story remains in original location

    - test: Test 7 - Target directory collision
      setup: Target flat directory already exists
      expected: Collision detected, migration halts, no overwrite
      evidence: Warning logged + both directories preserved

    - test: Test 8 - Missing subdirectories
      setup: Story with no _pm/ or _implementation/
      expected: Migration proceeds, logs warning
      evidence: Story moved with warning logged

    - test: Test 9 - Empty epic (no stories)
      setup: Epic with lifecycle directories but no stories
      expected: Migration completes without errors
      evidence: Clean log + empty directories handled

    - test: Test 10 - Story in UAT (highest priority)
      setup: Story in multiple directories including UAT/
      expected: UAT location chosen, status: uat
      evidence: Status field = uat

    - test: Test 11 - Large epic with 50+ stories
      setup: Epic with 50+ stories across lifecycle directories
      expected: All stories migrated, no data loss, <30s runtime
      evidence: Story count matches + performance timing

    - test: Test 12 - Rollback after partial migration failure
      setup: Simulate failure after 5 of 10 stories migrated
      expected: Rollback restores exact original structure
      evidence: Directory structure matches pre-migration snapshot (diff clean)

    - test: Test 13 - Concurrent directory read during migration
      setup: Run migration + /story-status simultaneously
      expected: No deadlocks, migration completes
      evidence: Both commands complete successfully

    - test: Test 14 - Story with symlinks or hardlinks
      setup: Story directory contains symlinks
      expected: Symlinks preserved, warning logged
      evidence: Symlinks functional after migration

  manual_testing:
    - step: Run dry-run on test epic
      command: npx tsx packages/backend/orchestrator/src/scripts/migrate-flatten-stories.ts --epic test-epic-migration --dry-run
      verify: migration-plan.json created, no filesystem changes

    - step: Review migration plan
      verify: Plan matches expected operations (status mapping correct)

    - step: Execute migration on test epic
      command: npx tsx packages/backend/orchestrator/src/scripts/migrate-flatten-stories.ts --epic test-epic-migration --execute
      verify: Backup tarball created, stories moved, status fields added

    - step: Verify no lifecycle directories remain
      command: find plans/future/test-epic-migration -type d -name "backlog"
      verify: No results

    - step: Test rollback mechanism
      verify: Restore from backup, directory structure matches original

# ==============================================================================
# Risk Mitigations
# ==============================================================================

risks:
  - risk: Data loss during file movement
    severity: critical
    mitigation:
      - Create backup tarball BEFORE any writes (AC-8)
      - Use fs.rename() for atomic moves (not copy + delete)
      - Implement dry-run mode for preview-before-execute (AC-9)
      - Test rollback with simulated failure (Test 12)

  - risk: Frontmatter corruption during YAML manipulation
    severity: high
    mitigation:
      - Use StoryFileAdapter for all YAML operations (type-safe)
      - Validate with StoryArtifactSchema before writing
      - Skip malformed stories instead of corrupting them
      - Test with edge cases (Tests 5-6)

  - risk: Duplicate story conflict resolution
    severity: high
    mitigation:
      - Clear priority hierarchy (UAT > ready-for-qa > ... > backlog)
      - Log all duplicate detections with chosen location
      - Test with real duplicate stories (Test 2)

  - risk: Incomplete migration leaving partial state
    severity: high
    mitigation:
      - Transaction-like approach (all-or-nothing per epic)
      - Rollback mechanism on ANY story failure
      - Track migration state in migration-log.json
      - Test partial failure scenario (Test 12)

  - risk: Breaking story commands before WINT-1030
    severity: medium
    mitigation:
      - DO NOT run on production epics (AC-10)
      - Test on isolated test epic only (AC-5)
      - Document migration sequence in script comments
      - Defer production migration to WINT-1030

