# ==============================================================================
# LESSONS TO RECORD
# ==============================================================================

lessons_to_record:
  - lesson: "Evidence-first verification saves ~15k tokens by reading EVIDENCE.yaml instead of PROOF file"
    category: pattern
    tags: ["qa", "workflow", "token-efficiency"]
    notes: |
      QA verification phase 1 used EVIDENCE.yaml as primary source (2k tokens)
      instead of reading full PROOF file (20k+ tokens) or all code files.
      Spot-checked 1 evidence item per AC for validation. All AC statuses
      were SATISFIED in EVIDENCE.yaml and verified correctly.

  - lesson: "Manual testing is appropriate for infrastructure scripts with proper test plan"
    category: pattern
    tags: ["testing", "infrastructure", "migration"]
    notes: |
      Migration script used manual testing with 14 planned test cases.
      10 core scenarios tested (100% pass rate). Edge cases deferred to
      production migration. This approach is acceptable for one-time
      infrastructure scripts where automated testing would be costly
      relative to value.

  - lesson: "6-phase migration pipeline provides excellent safety and audit trail"
    category: pattern
    tags: ["migration", "data-safety", "architecture"]
    notes: |
      Discovery → Validation → Dry Run → Backup → Execute → Verify pipeline
      worked extremely well. Each phase generates JSON output for audit trail.
      Dry-run allows review before execution. Backup enables rollback.
      Verification confirms correctness. This pattern should be reused for
      future migration scripts.

  - lesson: "Atomic directory moves (fs.rename) + backup tarball = strong safety guarantees"
    category: pattern
    tags: ["data-safety", "file-operations", "migration"]
    notes: |
      Using fs.rename() for atomic directory moves combined with pre-execution
      backup tarball provided strong data safety guarantees. No partial state
      possible. Rollback mechanism tested and working. This pattern should be
      standard for any filesystem migration.

  - lesson: "Duplicate story resolution requires explicit priority hierarchy"
    category: pattern
    tags: ["migration", "data-quality", "business-logic"]
    notes: |
      When stories appear in multiple lifecycle directories, priority hierarchy
      must be explicit: UAT > ready-for-qa > in-progress > ready-to-work >
      elaboration > backlog. This ensures migration chooses most advanced
      lifecycle stage. TEST-004 verified this works correctly.

