story_id: LNGG-0040
context_version: 1

reuse_components:
  - name: StoryFileAdapter
    path: packages/backend/orchestrator/src/adapters/story-file-adapter.ts
    methods: ["read()", "update()", "exists()"]
    purpose: "Read/write story YAML files with atomic operations"

  - name: file-utils
    path: packages/backend/orchestrator/src/adapters/utils/file-utils.ts
    methods: ["readFileSafe()", "writeFileAtomic()", "fileExists()", "ensureDirectory()"]
    purpose: "Atomic file operations"

  - name: yaml-parser
    path: packages/backend/orchestrator/src/adapters/utils/yaml-parser.ts
    methods: ["parseFrontmatter()", "mergeFrontmatter()"]
    purpose: "YAML frontmatter parsing and merging"

  - name: StoryArtifactSchema
    path: packages/backend/orchestrator/src/artifacts/story-v2-compatible.ts
    purpose: "Story schema with status field (legacy format)"

  - name: StoryStateSchema
    path: packages/backend/orchestrator/src/state/enums/story-state.ts
    purpose: "Reference for lifecycle states (draft, backlog, ready-to-work, etc.)"

  - name: Error hierarchy
    path: packages/backend/orchestrator/src/adapters/__types__/index.ts
    purpose: "Base StoryFileAdapterError class to extend for stage errors"

patterns:
  - "Zod-first types (REQUIRED): define schemas first, infer TypeScript types"
  - "ESM imports: use .js extension in import paths"
  - "@repo/logger: never use console.log"
  - "Atomic writes: temp file + rename via writeFileAtomic()"
  - "No barrel files: import directly from source"
  - "Error classes: extend StoryFileAdapterError hierarchy"

key_decisions:
  - "Story uses BOTH status and state fields. Legacy files use status; v1 files use state. StoryFileAdapter.update() handles both via mergeFrontmatter()."
  - "Stage names align with actual usage: backlog, elaboration, ready-to-work, in-progress, ready-for-qa, uat. These differ from StoryStateSchema which doesn't include 'elaboration'."
  - "Flat directory structure: status is updated in frontmatter only, no directory moves."
  - "The adapter creates its OWN stage enum (StageSchema) that includes 'elaboration' - broader than StoryStateSchema."
