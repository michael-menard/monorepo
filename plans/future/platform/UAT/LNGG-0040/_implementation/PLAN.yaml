    name: "Create stage type definitions (Zod-first)"
    description: "Create __types__/stage-types.ts with StageSchema, StageTransitionSchema, MoveStageRequestSchema, MoveStageResultSchema, BatchMoveStageRequestSchema"
    files:
      - packages/backend/orchestrator/src/adapters/__types__/stage-types.ts

