architecture_compliant: true
architecture_notes: |
  - Package structure follows CLAUDE.md guidelines:
    * No barrel files (direct imports from source files)
    * Zod-first types (no TypeScript interfaces)
    * __types__/ directory for schemas
    * __tests__/ directory for test files

  - Dependencies correctly use workspace:* pattern:
    * @repo/db for database access
    * @repo/logger for logging (no console.log in source)
    * drizzle-orm for type-safe queries

  - Error handling follows resilient pattern:
    * Zod validation at entry (fail fast)
    * Try-catch with logger.warn() for DB errors
    * Clear error messages for business logic failures

  - Database operations:
    * Uses Drizzle ORM type-safe builders (no raw SQL)
    * Incremental mode uses SQL arithmetic for concurrency safety
    * Proper index usage for queries (agentName, storyId composite)

issues: []

lessons_to_record:
  - lesson: "Drizzle SQL expressions require careful typing to work with type-safe updates"
    category: pattern
    tags: ["backend", "drizzle", "typescript"]
    context: |
      When using SQL expressions in Drizzle updates (e.g., sql`${table.col} + ${val}`),
      TypeScript type checking requires explicit object construction rather than
      Record<string, any>. Solved by using Partial<InsertType> & { field: Date }.

  - lesson: "vi.hoisted() pattern essential for proper Vitest mock initialization"
    category: pattern
    tags: ["testing", "vitest"]
    context: |
      Mock chains must be created in vi.hoisted() callback to ensure proper
      initialization order. Calling vi.clearAllMocks() requires re-establishing
      mock chains in beforeEach().

  - lesson: "Default Zod values improve API safety for destructive operations"
    category: pattern
    tags: ["validation", "safety"]
    context: |
      Setting dryRun=true as Zod default (not just function parameter default)
      provides defense-in-depth against accidental data deletion. Schema validation
      ensures safety even if function signature changes.

