## Key Decisions

decisions:
  - decision: "Default mode='incremental' for session_update"
    rationale: "Prevents accidental token count overwrites, safer default for concurrent updates"
  - decision: "Default dryRun=true for session_cleanup"
    rationale: "Prevents accidental data deletion, requires explicit opt-in"
  - decision: "Order session_query results by started_at DESC"
    rationale: "Most recent sessions first, aligns with typical use case"
  - decision: "Package location: packages/backend/mcp-tools/"
    rationale: "New standalone package for MCP tool infrastructure, reusable across future tools"

## Risk Flags

risks:
  - severity: medium
    title: "Concurrent Session Updates"
    description: "Multiple agents updating same session simultaneously may cause race conditions"
    mitigation: "Incremental mode uses SQL arithmetic, absolute mode documents last-write-wins behavior"
  - severity: high
    title: "Session Cleanup Safety"
    description: "Risk of accidental deletion of active or recent sessions"
    mitigation: "Default dryRun=true, protected endedAt IS NOT NULL check, comprehensive logging"
  - severity: medium
    title: "MCP Tool Pattern Not Established"
    description: "No existing MCP server infrastructure in codebase"
    mitigation: "Focus on database operations as standalone functions, defer MCP server integration to later story"

## Testing Strategy

testing:
  - file: session-create.test.ts
    coverage_target: 85%
    scenarios:
      - Happy path: create with all fields
      - Auto-generate sessionId
      - Minimal creation (agentName only)
      - Error: Duplicate sessionId
      - Error: Missing agentName
      - Error: Invalid UUID format
  - file: session-update.test.ts
    coverage_target: 85%
    scenarios:
      - Incremental mode: multiple updates accumulate
      - Absolute mode: last write wins
      - Update metadata JSONB field
      - Error: Session not found
      - Error: Negative token counts
      - Concurrency: multiple agents updating same session
  - file: session-complete.test.ts
    coverage_target: 85%
    scenarios:
      - Mark session as ended with timestamp
      - Use current timestamp if endedAt not provided
      - Calculate session duration
      - Error: Session already completed
      - Error: Session not found
  - file: session-query.test.ts
    coverage_target: 85%
    scenarios:
      - Query active sessions only
      - Query by agentName
      - Query by storyId
      - Combine filters (agentName + active)
      - Pagination (limit + offset)
      - Default limit=50
      - Empty result set
      - Offset beyond results
  - file: session-cleanup.test.ts
    coverage_target: 85%
    scenarios:
      - DryRun mode: returns count, no deletion
      - Actual cleanup: deletes old sessions when dryRun=false
      - Preserves recent completed sessions
      - Preserves active sessions regardless of age
      - Error: Negative retentionDays
  - file: schemas.test.ts
    coverage_target: 95%
    scenarios:
      - Validate all required fields present
      - Reject invalid UUID formats
      - Reject negative token counts
      - Validate enum values (mode)
      - Optional field handling
  - file: integration.test.ts
    coverage_target: 90%
    scenarios:
      - Full session lifecycle (create → update → complete → query)
      - Concurrent session updates
      - Session cleanup with dryRun validation
      - Pagination edge cases

