architectural_decisions:
  - id: "MODL-0011-ARCH-001"
    question: "Should BaseProvider be an abstract class or interface with mixins?"
    decision: "Use abstract class"
    rationale: |
      Abstract class allows providing concrete implementations of common methods
      (getCachedInstance, clearCaches, template method getModel) while still
      enforcing implementation of provider-specific methods. This is the standard
      Template Method pattern from Gang of Four.

      Interface + mixins would be more complex and not idiomatic TypeScript.
    decided_by: "auto-accepted"
    tier: 1
    tags: ["architecture", "typescript", "template-method"]

  - id: "MODL-0011-ARCH-002"
    question: "Should caches be static or instance-based?"
    decision: "Keep static caches (preserve existing pattern)"
    rationale: |
      All 3 providers currently use static caches. Changing to instance-based
      would be a breaking change affecting cache invalidation behavior.

      Static caches are acceptable because:
      1. Typical usage involves 3-5 unique provider configs (low memory)
      2. Provider instances are singletons via factory pattern
      3. Cache invalidation happens on process restart

      This maintains backward compatibility per AC-5.
    decided_by: "auto-accepted"
    tier: 1
    tags: ["architecture", "caching", "backward-compatibility"]

complexity: moderate

notes:
  - "This story resolves technical debt from MODL-0010 code review iteration 4"
  - "Template Method Pattern: base class defines algorithm, subclasses fill in steps"
  - "TypeScript abstract classes: can have both concrete and abstract methods"
  - "Static methods like getCachedInstance() cannot be abstract, so each provider keeps its own static cache reference"
  - "All 3 providers must be refactored together to ensure consistency"
  - "Tests must pass without modification to verify backward compatibility"
  - "Expected code reduction: ~150 lines removed, ~80 added = net -70 lines"
  - "Duplication reduction: 80% → <10% per AC-6"

