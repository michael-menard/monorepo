notable_decisions:
  - id: MODL-0011-DEC-001
    title: Use Abstract Class Instead of Interface + Mixins
    decision: |
      Used abstract class with template method pattern (standard TypeScript/OOP approach)
      rather than interface + mixins for better IDE support and simpler implementation

  - id: MODL-0011-DEC-002
    title: Keep Static Caches (Preserve Existing Pattern)
    decision: |
      Preserved static caches for backward compatibility. All 3 providers use
      static caches, and changing to instance-based would break existing tests
      and invalidation behavior

  - id: MODL-0011-DEC-003
    title: Template Method Pattern for getModel()
    decision: |
      Implemented template method pattern where BaseProvider.getModel() defines
      the caching algorithm and calls abstract methods for provider-specific steps.
      This eliminates 24 lines of duplication

  - id: MODL-0011-DEC-004
    title: Static Methods Cannot Be Abstract (TypeScript Limitation)
    decision: |
      TypeScript does not support abstract static methods. Each provider maintains
      its own getCachedInstance() and clearCaches() static methods. This leaves
      ~12 lines of duplication but is unavoidable given language constraints

  - id: MODL-0011-DEC-005
    title: parseModelName() Remains Provider-Specific
    decision: |
      Model name parsing logic kept in each provider because each has different
      prefix conventions (ollama: vs ollama/ vs openrouter/ vs anthropic/).
      Extracting to base class would violate separation of concerns

known_deviations:
  - description: |
      Static methods (getCachedInstance, clearCaches) remain duplicated across providers
      due to TypeScript language constraint (abstract static methods not supported).
      This leaves ~12 lines of duplication but is unavoidable.
    impact: low
    reason: TypeScript limitation
    accepted: true

  - description: |
      Net code change is +75 lines instead of target -70 lines due to comprehensive
      JSDoc documentation and more robust abstract class infrastructure
    impact: low
    reason: Better documentation and maintainability trade-off
    accepted: true

