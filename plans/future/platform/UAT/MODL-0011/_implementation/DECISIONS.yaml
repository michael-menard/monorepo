decisions:
  - id: MODL-0011-DEC-001
    title: "Use Abstract Class Instead of Interface + Mixins"
    tier: 1
    category: clarification
    context: |
      Need to decide between two approaches for sharing common provider logic:
      1. Abstract class with template method pattern
      2. Interface with TypeScript mixins

    decision: "Use abstract class (BaseProvider) with template method pattern"

    rationale: |
      Abstract class is the standard TypeScript/OOP approach for the Template Method pattern:
      - Allows concrete implementations of common methods (getCachedInstance, clearCaches)
      - Enforces implementation of provider-specific methods via abstract keyword
      - Simpler and more idiomatic than mixins
      - Better IDE support and type inference
      - Aligns with Gang of Four design patterns

      Interface + mixins would be:
      - More complex to implement and understand
      - Less idiomatic in TypeScript
      - Harder to maintain
      - No clear benefit over abstract class for this use case

    alternatives_considered:
      - option: "Interface + TypeScript mixins"
        pros:
          - "More flexible (multiple inheritance-like behavior)"
        cons:
          - "More complex implementation"
          - "Less idiomatic TypeScript pattern"
          - "Harder for developers to understand"
          - "No tangible benefit for this use case"

    consequences:
      positive:
        - "Standard OOP pattern (easy to understand)"
        - "TypeScript has excellent support for abstract classes"
        - "Template method pattern is well-documented"
        - "Better IDE autocomplete and type checking"

      negative:
        - "Single inheritance only (not a concern for this use case)"

    decided_by: auto-accepted
    autonomy_level: conservative
    tags: ["architecture", "typescript", "template-method", "tier-1"]

  - id: MODL-0011-DEC-002
    title: "Keep Static Caches (Preserve Existing Pattern)"
    tier: 1
    category: clarification
    context: |
      All 3 providers currently use static caches:
      - configCache: ProviderConfig | null
      - instanceCache: Map<string, BaseChatModel>
      - availabilityCache: AvailabilityCache | null

      Options:
      1. Keep static caches (current pattern)
      2. Convert to instance-based caches

    decision: "Keep static caches (preserve existing pattern)"

    rationale: |
      Static caches must be preserved for backward compatibility:
      - Provider instances are singletons via factory pattern
      - Existing tests rely on static cache behavior
      - Cache invalidation via clearCaches() is static
      - Memory usage is acceptable (3-5 configs typical)

      Converting to instance-based would be a breaking change:
      - Would require updating all tests
      - Would change cache invalidation behavior
      - Would violate AC-5 (backward compatibility)

      Per MODL-0010 architecture decision, static caches are acceptable because:
      - Typical usage: 3-5 unique provider configurations
      - Low memory overhead (unbounded cache is acceptable)
      - Cache invalidation happens on process restart
      - TODO(MODL-0020): Implement LRU cache for production

    alternatives_considered:
      - option: "Convert to instance-based caches"
        pros:
          - "More OOP-friendly (no static state)"
          - "Better testability (isolated instances)"
        cons:
          - "Breaking change (violates AC-5)"
          - "Requires updating all existing tests"
          - "Changes cache invalidation behavior"
          - "No tangible benefit (singletons via factory)"

    consequences:
      positive:
        - "Full backward compatibility maintained"
        - "No test changes required"
        - "Existing cache invalidation works identically"
        - "Consistent with MODL-0010 architecture"

      negative:
        - "Static state (less pure OOP)"
        - "Unbounded cache (acceptable per MODL-0010)"

    decided_by: auto-accepted
    autonomy_level: conservative
    tags: ["architecture", "caching", "backward-compatibility", "tier-1"]

  - id: MODL-0011-DEC-003
    title: "Template Method Pattern for getModel()"
    tier: 1
    category: pattern
    context: |
      The getModel() method has identical cache management logic across all providers:
      1. Load config
      2. Generate cache hash
      3. Check cache
      4. Create model (if not cached)
      5. Store in cache

      Only the config loading and model creation vary by provider.

    decision: "Use template method pattern with abstract hooks for provider-specific steps"

    rationale: |
      Template method pattern is ideal for this scenario:
      - Algorithm structure (caching) is identical
      - Steps 1 and 4 (loadConfig, createModel) vary by provider
      - Steps 2, 3, 5 (hashing, cache check, cache store) are common

      Implementation:
      - BaseProvider.getModel() = template method (common algorithm)
      - loadConfig() = abstract method (provider-specific)
      - createModel() = abstract method (provider-specific)
      - Concrete providers implement only the variable steps

      This is a textbook application of the Template Method pattern.

    alternatives_considered:
      - option: "Strategy pattern (delegate to separate cache manager)"
        pros:
          - "More flexible (runtime strategy selection)"
        cons:
          - "Overkill for this use case (no runtime variation needed)"
          - "Adds unnecessary abstraction layers"
          - "More complex than template method"

    consequences:
      positive:
        - "Eliminates 24 lines of duplication from getModel()"
        - "Cache logic in single location (easier to modify)"
        - "Clear separation of common vs provider-specific code"
        - "Enforces consistent caching behavior"

      negative:
        - "Subclasses depend on base class implementation"
        - "Less flexible than composition (acceptable trade-off)"

    decided_by: auto-accepted
    autonomy_level: conservative
    tags: ["architecture", "template-method", "caching", "tier-1"]

  - id: MODL-0011-DEC-004
    title: "Static Methods Cannot Be Abstract (TypeScript Limitation)"
    tier: 1
    category: technical-constraint
    context: |
      TypeScript does not allow abstract static methods.
      getCachedInstance() and clearCaches() are static methods.

      Problem: How to share static method implementations across providers?

    decision: "Implement static methods in each provider, not in base class"

    rationale: |
      This is a TypeScript language constraint, not a design choice:
      - TypeScript does not support abstract static methods
      - Static methods cannot be inherited in a meaningful way for caching

      Solution:
      - Each provider keeps its own static cache references
      - Each provider implements its own static getCachedInstance() and clearCaches()
      - The implementations are identical, but this is unavoidable

      Alternative approaches considered:
      1. Use instance methods (breaks backward compatibility)
      2. Use static base class methods with generics (doesn't work for caches)
      3. Accept the duplication (chosen approach)

      Impact: ~12 lines remain duplicated (getCachedInstance + clearCaches per provider)

    alternatives_considered:
      - option: "Convert to instance methods"
        pros:
          - "Could be implemented in base class"
        cons:
          - "Breaking change (tests call static methods)"
          - "Violates AC-5 (backward compatibility)"

      - option: "Use static factory pattern in base class"
        pros:
          - "Could share more logic"
        cons:
          - "Doesn't work with per-provider static caches"
          - "Would require significant architecture change"

    consequences:
      positive:
        - "Maintains backward compatibility"
        - "Preserves existing test patterns"
        - "Clear ownership of caches per provider"

      negative:
        - "~12 lines remain duplicated across providers"
        - "Cannot DRY this up due to TypeScript constraints"

    decided_by: auto-accepted
    autonomy_level: conservative
    tags: ["technical-constraint", "typescript", "caching", "tier-1"]
    notes:
      - "This is unavoidable given TypeScript language constraints"
      - "Still achieves 82% reduction in duplication (66 → 12 lines)"
      - "Acceptable trade-off for backward compatibility"

  - id: MODL-0011-DEC-005
    title: "parseModelName() Remains Provider-Specific"
    tier: 1
    category: scope-boundary
    context: |
      Each provider has different model name parsing logic:
      - Ollama: supports both 'ollama:' and 'ollama/' prefixes
      - OpenRouter: 'openrouter/' prefix
      - Anthropic: 'anthropic/' prefix

      Question: Should this be extracted to base class?

    decision: "Keep parseModelName() logic in each provider (provider-specific)"

    rationale: |
      Model name parsing is provider-specific behavior:
      - Each provider has different prefix conventions
      - Ollama has legacy 'ollama:' support (others don't)
      - OpenRouter/Anthropic use '/' consistently
      - Future providers may have different conventions

      Extracting to base class would:
      - Require base class to know about all provider-specific formats
      - Violate single responsibility (base class shouldn't know provider details)
      - Not reduce code (each provider still needs its own logic)

      Decision: Keep in providers, document clearly.

    alternatives_considered:
      - option: "Extract to base class with provider-specific hooks"
        pros:
          - "Centralizes parsing logic"
        cons:
          - "Base class would need to know all provider formats"
          - "Violates separation of concerns"
          - "No code reduction (still needs provider-specific logic)"

    consequences:
      positive:
        - "Clear separation of concerns"
        - "Base class doesn't know provider-specific details"
        - "Easier to add new providers with different formats"

      negative:
        - "~10 lines remain duplicated (parsing logic)"

    decided_by: auto-accepted
    autonomy_level: conservative
    tags: ["scope", "separation-of-concerns", "tier-1"]

