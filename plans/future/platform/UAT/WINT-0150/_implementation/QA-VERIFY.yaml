lessons_to_record:
  - lesson: "Documentation-only Skills (SKILL.md artifacts) do not require test execution. The qa-verify flow should short-circuit test execution when EVIDENCE.yaml verification_commands is empty and story domain is 'documentation'. The test_executed: false path needs to be clearly supported in QA-VERIFY.yaml schema."
    category: pattern
    tags: ["documentation", "qa-verify", "skills", "testing"]

  - lesson: "EVIDENCE.yaml may be recorded at an earlier point in implementation (v1.0.0) and the actual artifact may have been updated post-evidence (v1.1.0 additions). QA spot-checks should read the actual file rather than only trusting evidence metadata, as the file will often be in a better state than the evidence records."
    category: pattern
    tags: ["evidence", "qa-verify", "documentation", "version-history"]

  - lesson: "For documentation stories, the primary quality gate is completeness and accuracy against the acceptance criteria rather than test coverage. The spot-check approach (read the actual artifact, verify sections exist and match AC descriptions) is the correct verification method."
    category: pattern
    tags: ["documentation", "qa-verify", "quality-gates"]

