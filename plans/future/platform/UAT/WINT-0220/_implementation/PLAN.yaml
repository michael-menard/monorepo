  - "Validation script uses Zod schema from model-assignments.ts as reference"
  - "Mermaid flowchart embedded in strategy doc for visual decision guide"
  - "Migration plan phased: Wave 1 (critical), Wave 2 (recommended), Wave 3 (optional)"
