  - ac_id: "AC-1"
    planned_evidence: "Strategy document exists with all required sections (tiers, flowchart, escalation, versioning)"
    evidence_type: file

  - ac_id: "AC-2"
    planned_evidence: "Task taxonomy section maps all workflow task types to tiers with rationale"
    evidence_type: file

  - ac_id: "AC-3"
    planned_evidence: "Tier specifications table with 4 tiers (0-3), models, use cases, fallbacks, cost estimates"
    evidence_type: file

  - ac_id: "AC-4"
    planned_evidence: "Agent analysis section shows 143 agents reviewed, current vs proposed mappings, migration plan"
    evidence_type: file

  - ac_id: "AC-5"
    planned_evidence: "Escalation triggers section defines quality thresholds, cost thresholds, failure-based escalation, human-in-loop triggers"
    evidence_type: file

  - ac_id: "AC-6"
