  - id: ARCH-001
    question: "Should validation script be executable standalone or integrated into CI pipeline?"
    decision: "Standalone script for initial validation, CI integration deferred to WINT-0230"
    rationale: "Story scope is strategy definition, not implementation. CI integration belongs in auto-selection story."
    decided_by: auto-accepted

  - id: ARCH-002
    question: "Should strategy YAML extend model-assignments.yaml or be separate file?"
    decision: "Separate file for strategy, document migration path to merge later"
    rationale: "Preserves backward compatibility, allows iterative refinement without breaking existing agents"
    decided_by: auto-accepted

complexity: moderate

notes:
