    slice: packages

  - id: 3
    description: "Create Zod validation script for strategy YAML"
    files:
      - "packages/backend/orchestrator/scripts/validate-strategy.ts"
    dependencies: [2]
    slice: packages

  - id: 4
    description: "Create human-readable strategy document (WINT-0220-STRATEGY.md) with all 8 ACs"
    files:
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md"
    dependencies: [1, 2, 3]
    slice: packages

  - id: 5
    description: "Validate strategy YAML with Zod schema"
    files:
      - "packages/backend/orchestrator/scripts/validate-strategy.ts"
    dependencies: [2, 3, 4]
    slice: packages

  - id: 6
    description: "Generate Mermaid decision flowchart and embed in strategy doc"
    files:
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md"
    dependencies: [4]
    slice: packages

files_to_change:
  - path: "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md"
    action: create
    reason: "AC-1: Human-readable strategy document with decision flowchart, task taxonomy, tier specs, escalation triggers, cost analysis, and examples"

  - path: "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
    action: create
    reason: "AC-3: Machine-readable tier definitions, mappings, and escalation rules"

  - path: "packages/backend/orchestrator/scripts/validate-strategy.ts"
    action: create
    reason: "AC-1: Zod schema validation for strategy YAML"

commands_to_run:
  - command: "pnpm --filter @repo/orchestrator exec tsx packages/backend/orchestrator/scripts/validate-strategy.ts"
    when: "after strategy YAML created"
    required: true

  - command: "pnpm check-types --filter @repo/orchestrator"
    when: "after validation script created"
    required: true

  - command: "pnpm lint --filter @repo/orchestrator"
    when: "after all code changes"
    required: true

