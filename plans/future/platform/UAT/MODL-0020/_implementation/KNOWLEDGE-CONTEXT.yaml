lessons_learned:
  - id: MODL-0010-lesson-001
    title: "Provider abstraction via ILLMProvider interface is mandatory"
    summary: "All model instantiation must go through getProviderForModel() factory. Direct provider instantiation bypasses caching and abstraction layer."
    source: MODL-0010
    category: provider-abstraction
    applies_to: MODL-0020
    reason: "task-selector.ts must use getProviderForModel() for tier→model resolution"
    pattern_to_follow: "Import getProviderForModel from config/llm-provider.ts, call with modelName parameter, never instantiate ChatOllama/ChatAnthropic directly"

  - id: MODL-0010-lesson-002
    title: "Provider caching is unbounded - cache invalidation on process restart only"
    summary: "ILLMProvider instances are cached in Map without eviction policy. Acceptable for MVP (3-5 unique providers). Future: implement LRU cache."
    source: MODL-0010
    category: caching
    applies_to: MODL-0020
    reason: "task-selector can rely on provider caching from MODL-0010, no need for duplicate cache"
    pattern_to_follow: "Trust existing provider cache, focus on strategy configuration caching"

  - id: WINT-0230-lesson-001
    title: "ModelRouter.getModelForTier() is canonical tier→model mapping"
    summary: "ModelRouter loads strategy YAML and maps tier (0-3) to model definition (provider, name, cost). Reuse this logic, don't duplicate."
    source: WINT-0230
    category: tier-selection
    applies_to: MODL-0020
    reason: "task-selector must call getModelForTier(tier) after computing target tier from contract"
    pattern_to_follow: "Import ModelRouter, call getModelForTier(selectedTier) to get TierSelection, return TierSelection directly"

  - id: WINT-0230-lesson-002
    title: "TierSelection type is standard return format for routing decisions"
    summary: "TierSelection schema includes: tier, model, provider, cost_per_1m_tokens, fallbackChain. All routing functions return this type."
    source: WINT-0230
    category: type-consistency
    applies_to: MODL-0020
    reason: "selectModelForTask() must return TierSelection to maintain API consistency"
    pattern_to_follow: "Import TierSelection type from unified-interface.ts, use as return type for selectModelForTask()"

  - id: WINT-0230-lesson-003
    title: "Strategy loader implements caching with hot-reload support"
    summary: "loadStrategy() caches parsed YAML in memory, watches file for changes. No need for duplicate strategy caching in consumers."
    source: WINT-0230
    category: strategy-loading
    applies_to: MODL-0020
    reason: "task-selector.ts can call loadStrategy() without implementing own cache"
    pattern_to_follow: "Import loadStrategy from strategy-loader.ts, call at module init or lazily on first use, trust existing cache"

  - id: WINT-0230-lesson-004
    title: "Escalation logic based on AgentSelectionContext.complexity field"
    summary: "ModelRouter.selectModelForAgent() accepts optional context with complexity enum (low, medium, high). High complexity escalates tier by -1."
    source: WINT-0230
    category: escalation
    applies_to: MODL-0020
    reason: "task-selector extends this pattern with more granular escalation rules (security, quality, budget)"
    pattern_to_follow: "Follow escalation precedence: security > quality > complexity. Apply tier = Math.max(0, tier - 1) for escalation."

  - id: WINT-0220-lesson-001
    title: "Task type taxonomy in strategy.task_types defines default tier mappings"
    summary: "WINT-0220-STRATEGY.yaml includes task_types array with fields: type, recommended_tier, escalation rules, examples."
    source: WINT-0220
    category: task-taxonomy
    applies_to: MODL-0020
    reason: "task-selector.ts loads task type → tier mapping from strategy.task_types, not hardcoded"
    pattern_to_follow: "Load strategy, find task type in strategy.task_types array, use recommended_tier as starting tier"

  - id: WINT-0220-lesson-002
    title: "Fallback chains defined in tier.models.fallback array"
    summary: "Each tier configuration includes models.primary (preferred) and models.fallback (backups). Fallback order matters."
    source: WINT-0220
    category: fallback-chains
    applies_to: MODL-0020
    reason: "task-selector must filter fallback chains based on contract.allowOllama constraint"
    pattern_to_follow: "Read tier.models.fallback array, filter out Ollama models if allowOllama=false, validate at least one non-Ollama fallback exists"

  - id: CLAUDE-MD-lesson-001
    title: "All types must use Zod schemas with z.infer<>, never TypeScript interfaces"
    summary: "CLAUDE.md mandates Zod-first approach for runtime validation and type inference. Interfaces are prohibited."
    source: CLAUDE.md
    category: type-system
    applies_to: MODL-0020
    reason: "TaskContractSchema must be Zod schema, TaskContract type via z.infer<typeof TaskContractSchema>"
    pattern_to_follow: "Define schema with z.object(), export schema and type separately, use schema for validation"

  - id: CLAUDE-MD-lesson-002
    title: "Use @repo/logger for all logging, never console.log"
    summary: "CLAUDE.md requires structured logging via @repo/logger. console.log is prohibited."
    source: CLAUDE.md
    category: logging
    applies_to: MODL-0020
    reason: "task-selector.ts logs selection decisions, escalation events, fallback triggers"
    pattern_to_follow: "Import logger from @repo/logger, use logger.info/warn/error with event name and structured context"

  - id: CLAUDE-MD-lesson-003
    title: "No barrel files - import directly from source files"
    summary: "CLAUDE.md prohibits index.ts re-exports. Import from actual source file paths."
    source: CLAUDE.md
    category: module-structure
    applies_to: MODL-0020
    reason: "__types__/task-contract.ts must be imported directly, not via __types__/index.ts"
    pattern_to_follow: "Import from '__types__/task-contract.ts', not '__types__/index.ts' or '__types__'"

architecture_decisions:
  - id: ADR-MODL-001
    title: "Provider abstraction layer via ILLMProvider interface"
    status: active
    decision: "All LLM provider interactions go through ILLMProvider interface, instantiated via getProviderForModel() factory"
    rationale: "Unified abstraction enables multi-provider support (OpenRouter, Ollama, Anthropic) with consistent API and caching"
    constraints:
      - "Never instantiate providers directly (no new ChatOllama(), new ChatAnthropic())"
      - "Use getProviderForModel(modelName) for all model access"
      - "Provider caching is automatic (unbounded Map cache)"
    applies_to: MODL-0020

  - id: ADR-WINT-001
    title: "Tier-based model selection with 4-tier strategy (0=Opus, 1=Sonnet, 2=Haiku, 3=Ollama)"
    status: active
    decision: "Models organized in tiers 0-3 based on capability/cost tradeoff. Selection starts with tier, maps to specific model via strategy configuration."
    rationale: "Tier abstraction decouples selection logic from specific model names. Strategy changes (e.g., add new model) don't require code changes."
    constraints:
      - "Tier 0: Critical decisions (Opus, 15.00/1M tokens)"
      - "Tier 1: Complex reasoning (Sonnet, 3.00/1M tokens)"
      - "Tier 2: Routine work (Haiku, 0.25/1M tokens)"
      - "Tier 3: Simple tasks (Ollama, 0.00/1M tokens)"
      - "Escalation moves down tier number (tier 2 → tier 1)"
      - "De-escalation moves up tier number (tier 1 → tier 2)"
    applies_to: MODL-0020

  - id: ADR-WINT-002
    title: "Strategy configuration as single source of truth via WINT-0220-STRATEGY.yaml"
    status: active
    decision: "All tier definitions, task type mappings, escalation triggers stored in YAML configuration. Code reads config, doesn't hardcode."
    rationale: "Configuration-driven approach enables strategy updates without code changes. Hot-reload support allows runtime updates."
    constraints:
      - "WINT-0220-STRATEGY.yaml location: packages/backend/orchestrator/docs/"
      - "Use loadStrategy() from strategy-loader.ts for all config access"
      - "Validate strategy with StrategySchema Zod schema"
      - "Cache strategy in memory (TTL 60s, hot-reload on file change)"
    applies_to: MODL-0020

  - id: ADR-MODL-002
    title: "Task contracts enable task-level selection granularity"
    status: active
    decision: "Tasks declare requirements via TaskContract (complexity, quality, security, budget). Selector computes optimal tier from contract."
    rationale: "Task-level routing is more precise than agent-level. Same agent can use different tiers for different tasks (simple gen → Tier 3, security analysis → Tier 0)."
    constraints:
      - "TaskContract is request-scoped (ephemeral, not persisted)"
      - "Optional parameter - backward compatibility with agent-based selection"
      - "Escalation rules: security > quality > complexity > budget"
      - "De-escalation only if quality permits (no downgrade for critical quality)"
    applies_to: MODL-0020

