  - component: MODL-0010 Provider Factory
    location: packages/backend/orchestrator/src/config/llm-provider.ts
    usage: Instantiate providers for tier→model resolution
    required_apis:
      - getProviderForModel(modelName)

  - component: Logger
    package: '@repo/logger'
    usage: Structured logging for selection decisions
    required_apis:
      - logger.info(), logger.warn(), logger.error()

