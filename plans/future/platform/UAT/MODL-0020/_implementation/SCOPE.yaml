# ==============================================================================
# Technical Constraints
# ==============================================================================
constraints:
  - name: Zod-first types (CLAUDE.md)
    type: type_system
    description: All schemas must use Zod with z.infer<> for types
    applies_to:
      - __types__/task-contract.ts
      - All contract-related types

  - name: No barrel files (CLAUDE.md)
    type: structure
    description: Import directly from source files, no __types__/index.ts re-exports
    applies_to:
      - __types__/task-contract.ts

  - name: Use @repo/logger (CLAUDE.md)
    type: logging
    description: Never use console.log - must use @repo/logger
    applies_to:
      - task-selector.ts
      - All logging statements

  - name: Provider abstraction (MODL-0010)
    type: architecture
    description: Must use ILLMProvider interface, no direct provider instantiation
    applies_to:
      - task-selector.ts

  - name: Strategy-based routing (WINT-0230)
    type: architecture
    description: Extend ModelRouter, reuse tier-based selection logic
    applies_to:
      - unified-interface.ts extension
      - task-selector.ts

  - name: Backward compatibility (AC-4)
    type: functional
    description: Existing agent-based selection must work unchanged without contract
    applies_to:
      - unified-interface.ts
      - task-selector.ts

# ==============================================================================
# Testing Strategy
# ==============================================================================
testing:
  unit:
    - component: Task Contract Schema
      file: __tests__/task-contract-validation.test.ts
      coverage_target: 80%
      key_scenarios:
        - Valid contract with all fields
        - Valid contract with defaults
        - Invalid task type error
        - Invalid complexity error
        - Invalid quality requirement error

  integration:
    - component: Task-Based Model Selector
      file: __tests__/task-selector.test.ts
      coverage_target: 80%
      key_scenarios:
        - Simple task (low complexity, adequate quality) → Tier 3
        - Complex task (high complexity, high quality) → Tier 1
        - Critical task (security sensitive, critical quality) → Tier 0
        - Budget-constrained task → de-escalates when safe
        - Ollama-prohibited task → skips Ollama tiers
        - Fallback chain validation with unavailable primary
        - Backward compatibility - agent-based unchanged

  matrix_testing:
    - dimension_1: taskType
      values:
        - code_generation
        - gap_analysis
        - security_review
        - setup_validation

    - dimension_2: complexity
      values:
        - low
        - medium
        - high

    - dimension_3: qualityRequirement
      values:
        - adequate
        - good
        - high
        - critical

    - dimension_4: securitySensitive
      values:
        - true
        - false

    - dimension_5: allowOllama
      values:
        - true
        - false

