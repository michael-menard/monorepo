architectural_decisions:
  - id: ARCH-001
    question: "Should task selector cache strategy configuration or reload on every call?"
    decision: "Cache strategy in task-selector module via loadStrategy() (existing WINT-0230 pattern)"
    rationale: "Strategy loader already implements caching with hot-reload support. Reuse existing infrastructure rather than duplicate caching logic."
    decided_by: auto
    constraints:
      - "Use existing loadStrategy() from strategy-loader.ts"
      - "No additional caching logic in task-selector.ts"
      - "Trust strategy loader's TTL and cache invalidation"
    alternatives_considered:
      - "Reload strategy on every selectModelForTask() call (performance cost)"
      - "Implement separate cache in task-selector (duplicate logic)"

  - id: ARCH-002
    question: "Should selectModelForTask() be standalone function or ModelRouter method?"
    decision: "Standalone function in task-selector.ts, called by ModelRouter.selectModelForAgent()"
    rationale: "Task-based selection is new feature layer on top of existing agent-based routing. Standalone function allows independent testing and future extensibility without polluting ModelRouter class."
    decided_by: auto
    constraints:
      - "Export selectModelForTask() from task-selector.ts"
      - "ModelRouter.selectModelForAgent() delegates to selectModelForTask() when contract provided"
      - "Both functions return TierSelection type"
    alternatives_considered:
      - "Add selectModelForTask() method to ModelRouter class (tighter coupling)"
      - "Create separate TaskRouter class (over-engineering for MVP)"

  - id: ARCH-003
    question: "How to handle conflicting contract constraints (e.g., complexity='high' + budgetTokens=100)?"
    decision: "Escalation rules take precedence over de-escalation. Log warning when budget constraint cannot be satisfied."
    rationale: "Quality and security requirements must not be compromised by budget constraints. Transparent logging enables users to adjust contracts."
    decided_by: auto
    constraints:
      - "Escalation rules (security, quality, complexity) evaluated first"
      - "De-escalation (budget) only applied if quality permits"
      - "Log warning via @repo/logger when budget constraint ignored"
      - "Include reason in log: 'Budget constraint ignored due to security requirement'"
    alternatives_considered:
      - "Throw error on conflicting constraints (too rigid, breaks backward compatibility)"
      - "Silently ignore budget constraint (poor transparency)"
      - "Use weighted scoring to balance constraints (over-complex for MVP)"

  - id: ARCH-004
    question: "Should task type taxonomy be embedded in code or loaded from WINT-0220-STRATEGY.yaml?"
    decision: "Load from WINT-0220-STRATEGY.yaml as single source of truth"
    rationale: "Strategy configuration owns tier assignments and task type mappings. Duplication in code would create sync issues. Follow existing WINT-0230 pattern."
    decided_by: auto
    constraints:
      - "Use strategy.task_types array from WINT-0220-STRATEGY.yaml"
      - "Validate taskType exists in strategy before selection"
      - "Throw clear error with available task types if unknown"
      - "No hardcoded task type → tier mappings in task-selector.ts"
    alternatives_considered:
      - "Embed task type enum in TaskContractSchema (code duplication)"
      - "Create separate task-type-taxonomy.ts (unnecessary indirection)"

