issues:
  - issue_id: QA-001
    severity: minor
    category: test_infrastructure
    title: "INIT-002 Test Mock Setup Issue"
    description: |
      Test "INIT-002: should start flush timer on initialization" fails with mock spy
      not being called. This is a test fixture issue (vi.resetModules() + dynamic import
      interaction), not an implementation bug. The actual implementation at init.ts:162
      correctly calls startFlushTimer(5000, callback).
    file: packages/backend/db/src/telemetry-sdk/__tests__/init.test.ts
    lines: [29, 50, 54]
    remediation: |
      Recommended fix: Remove vi.resetModules() from beforeEach or restructure mock setup
      to use dynamic mock declarations. This does not affect production code quality.
      Documented in REVIEW.yaml REV-002.
    blocks_merge: false

  - issue_id: QA-002
    severity: minor
    category: documentation
    title: "README Missing Event Loss Limitation Callout"
    description: |
      SDK README.md is comprehensive but doesn't explicitly document that in-memory buffer
      means events are lost on process crash before flush. This is a known non-goal per
      story but should be visible to SDK users.
    file: packages/backend/db/src/telemetry-sdk/README.md
    remediation: |
      Add "Limitations" section documenting:
      - Events in buffer are lost on process crash (in-memory only)
      - Graceful shutdown required for event persistence
      - Future TELE-0020 for persistent event queues
      Documented in REVIEW.yaml REV-005.
    blocks_merge: false

