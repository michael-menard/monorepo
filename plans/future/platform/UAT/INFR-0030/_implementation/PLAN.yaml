# Implementation Complexity

complexity: moderate

# Implementation Notes

notes:
  - "Phase 1 (Docker) can be done first and tested independently"
  - "Phase 2 (S3 Client) requires careful preservation of existing API"
  - "Must use Zod schemas for configuration - no TypeScript interfaces"
  - "Health check timeout is 30s to allow for bucket initialization"
  - "Default MinIO credentials: minioadmin:minioadmin (document security warning)"
  - "forcePathStyle: true is required for MinIO compatibility"
  - "Connection singleton pattern must be preserved for Lambda optimization"
  - "Test script should be runnable via: pnpm tsx scripts/test-minio.ts"
  - "No unit tests required for this story - smoke test script covers integration"
  - "Docker volume ensures data persists across container restarts"

risks:
  - "MinIO must be running for smoke test to pass"
  - "Docker Compose file could conflict with other services on same ports"
  - "Environment variables must be set correctly for client to work"
  - "Bucket initialization timing - health check may pass before bucket created"

mitigations:
  - "Health check start period: 30s to allow initialization"
  - "Document port conflicts in troubleshooting section"
  - "Clear error messages in config validation with Zod"
  - "Idempotent bucket creation - succeeds if already exists"

validation:
  - "Verify MinIO starts healthy: docker ps | grep minio"
  - "Verify bucket exists: docker exec monorepo-minio mc ls local/"
  - "Verify upload/download/delete work: pnpm tsx scripts/test-minio.ts"
  - "Verify persistence: docker compose restart minio && check bucket still exists"
