architectural_decisions:
  - id: ARCH-001
    question: "Enum naming convention: underscores vs hyphens"
    decision: "Use underscores (ready_to_work) for TypeScript compatibility"
    rationale: "TypeScript enum member names cannot contain hyphens. Underscores align with existing WINT pattern and avoid quoting in JavaScript/TypeScript object keys."
    decided_by: autonomous
    source: "ANALYSIS.md autonomous elaboration"

  - id: ARCH-002
    question: "Database consolidation strategy"
    decision: "Maintain two separate databases (main app on 5432, knowledge-base on 5433)"
    rationale: "Isolation, performance, scalability, and migration safety. Future consolidation deferred to Wave 4+."
    decided_by: autonomous
    source: "Story architecture notes and ANALYSIS.md"

  - id: ARCH-003
    question: "Schema namespace for LangGraph tables post-migration"
    decision: "Keep in 'public' namespace initially, defer 'wint' namespace migration"
    rationale: "Reduces migration complexity. Namespace migration can happen later if databases merge."
    decided_by: autonomous
    source: "Story architecture notes"

  - id: ARCH-004
    question: "Source of truth for overlapping tables (stories, features, workflow events)"
    decision: "WINT schema is source of truth for core tables"
    rationale: "WINT has more normalized structure, supports context caching, ML pipeline, and graph relational model. LangGraph-specific tables (elaborations, proofs) remain separate."
    decided_by: autonomous
    source: "AC-003 verification criteria and ANALYSIS.md"

