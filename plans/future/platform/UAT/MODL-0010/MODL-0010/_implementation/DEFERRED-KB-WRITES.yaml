      **Impact**: Low - Full provider names work fine (openrouter/, anthropic/, ollama/)
      **Effort**: Low - Simple alias mapping in provider factory
      **Recommendation**: Wait for real usage patterns. If developers prefer shortcuts, add alias mapping (e.g., "or/" -> "openrouter/", "anth/" -> "anthropic/").
