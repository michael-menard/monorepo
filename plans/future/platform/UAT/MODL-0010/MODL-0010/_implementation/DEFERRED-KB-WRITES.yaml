      **Impact**: Low - Basic provider access works
      **Effort**: High - Complex configuration surface
      **Recommendation**: Document in MODL-0020 scope to avoid re-opening provider adapters later. Advanced feature for task-specific optimization.
    tags: [integration, future-work, openrouter, low-priority]
    related_stories: [MODL-0010, MODL-0020]

