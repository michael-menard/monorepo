  - entry_type: finding
    source_stage: elab
    category: future-opportunities
    subcategory: observability
    title: "No health checks for OpenRouter/Anthropic providers"
    content: |
      **Gap**: OpenRouter/Anthropic use lazy initialization (fail on first use). No proactive health checks like Ollama's isOllamaAvailable().
      **Impact**: Low - Errors detected on first API call
      **Effort**: Medium - Additional API calls, potential rate limit impact
      **Recommendation**: Defer until MODL-0020 integration when health monitoring needs are clearer. Benefit: Earlier error detection. Cost: API overhead.
