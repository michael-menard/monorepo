    related_stories: [MODL-0010, MODL-0020]

  - entry_type: finding
    source_stage: elab
    category: future-opportunities
    subcategory: edge-case
    title: "No retry logic for provider initialization"
    content: |
      **Gap**: If OpenRouter/Anthropic API calls fail transiently during initialization, provider factory throws immediately. No exponential backoff retry.
      **Impact**: Medium - Transient failures cause request failure
      **Effort**: Medium - Implement retry with configurable max attempts
      **Recommendation**: Defer to observability story (TELE epic) when retry patterns are standardized across orchestrator. Improves resilience.
    tags: [edge-case, resilience, retry-logic, medium-priority]
    related_stories: [MODL-0010, TELE-0010]

