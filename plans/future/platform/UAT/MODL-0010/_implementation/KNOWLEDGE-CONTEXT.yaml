reusable_patterns:
  - pattern_id: zod-config-loading
    source: packages/backend/orchestrator/src/config/llm-provider.ts
    description: "Environment-based configuration with Zod schema validation"
    example: |
      const ConfigSchema = z.object({
        baseUrl: z.string().url().default('http://example.com'),
        temperature: z.number().min(0).max(2).default(0),
      })
      
      export function loadConfig(): Config {
        if (cachedConfig) return cachedConfig
        cachedConfig = ConfigSchema.parse({
          baseUrl: process.env.BASE_URL ?? 'http://example.com',
          temperature: parseFloat(process.env.TEMPERATURE || '0'),
        })
        return cachedConfig
      }
    usage: "Use for OpenRouter, Anthropic, and Ollama adapter configs"

  - pattern_id: instance-caching
    source: packages/backend/orchestrator/src/config/llm-provider.ts
    description: "LLM instance caching by configuration hash"
    example: |
      const instanceCache = new Map<string, ChatModel>()
      
      export function createLLM(config): ChatModel {
        const cacheKey = config.fullName
        const cached = instanceCache.get(cacheKey)
        if (cached) return cached
        
        const llm = new ChatModel(config)
        instanceCache.set(cacheKey, llm)
        logger.debug('Created instance', { model: config.fullName })
        return llm
      }
    usage: "Implement in all provider adapters (OpenRouter, Ollama, Anthropic)"

  - pattern_id: availability-check
    source: packages/backend/orchestrator/src/config/llm-provider.ts
    description: "Availability checking with timeout and cache"
    example: |
      interface AvailabilityCache {
        available: boolean
        checkedAt: number
      }
      
      export async function isAvailable(forceCheck = false): Promise<boolean> {
        if (!forceCheck && availabilityCache) {
          if (Date.now() - availabilityCache.checkedAt < cacheTtlMs) {
            return availabilityCache.available
          }
        }
        
        try {
          const controller = new AbortController()
          const timeoutId = setTimeout(() => controller.abort(), 5000)
          const response = await fetch(healthUrl, { signal: controller.signal })
          clearTimeout(timeoutId)
          
          const available = response.ok
          availabilityCache = { available, checkedAt: Date.now() }
          return available
        } catch (error) {
          availabilityCache = { available: false, checkedAt: Date.now() }
          logger.warn('Service unavailable', { error })
          return false
        }
      }
    usage: "Implement in all provider adapters with 5s default timeout"

  - pattern_id: model-prefix-parsing
    source: packages/backend/orchestrator/src/config/model-assignments.ts
    description: "Model prefix detection and parsing"
    example: |
      export function parseOllamaModel(model: string): ParsedOllamaModel | null {
        const match = model.match(/^ollama:([a-z0-9._-]+):([a-z0-9._-]+)$/i)
        if (!match) return null
        
        const [, modelName, tag] = match
        return {
          provider: 'ollama',
          model: modelName,
          tag,
          fullName: `${modelName}:${tag}`,
        }
      }
    usage: "Extend pattern for openrouter/* and anthropic/* prefixes"

  - pattern_id: logger-usage
    source: packages/backend/orchestrator/src/config/llm-provider.ts
    description: "Logging with @repo/logger"
    example: |
      import { logger } from '@repo/logger'
      
      logger.debug('Cache hit', { configHash })
      logger.info('Falling back', { from, to })
      logger.warn('Service unavailable', { baseUrl, error })
      logger.error('Failed to parse', { model })
    usage: "All provider adapters use @repo/logger only, never console.log"

  - pattern_id: langchain-integration
    source: packages/backend/orchestrator/src/config/llm-provider.ts
    description: "LangChain ChatModel integration"
    example: |
      import { ChatOllama } from '@langchain/ollama'
      import type { BaseChatModel } from '@langchain/core/language_models/chat_models'
      
      const llm: BaseChatModel = new ChatOllama({
        model: parsedModel.fullName,
        baseUrl: config.baseUrl,
        temperature: config.temperature,
      })
    usage: "Return BaseChatModel from all provider adapters"

lessons_learned:
  - lesson_id: zod-first-types
    source: CLAUDE.md
    description: "ALWAYS use Zod schemas for types - never use TypeScript interfaces"
    impact: "All configuration types must use z.infer<typeof Schema>"
    
  - lesson_id: no-barrel-files
    source: CLAUDE.md
    description: "NO BARREL FILES - import directly from source files"
    impact: "providers/index.ts exports factory function only, not all adapters"

  - lesson_id: integration-tests-real-services
    source: ADR-005 (via story)
    description: "Integration tests use real services, not mocks"
    impact: "Tests must gracefully skip if API keys missing, per AC-9"

architectural_decisions:
  - decision_id: provider-selection-strategy
    title: "Prefix-based provider routing for MVP"
    context: "Multiple providers can support same model (e.g., Claude via OpenRouter vs Anthropic direct)"
    decision: "Use explicit model prefix to determine provider: openrouter/*, ollama/*, anthropic/*"
    rationale: "Simple MVP approach, defers advanced selection logic to MODL-0020"
    source: "Story Implementation Notes"

  - decision_id: cache-invalidation-strategy
    title: "Process restart only for MVP"
    context: "Cached provider instances persist for process lifetime"
    decision: "No hot-reload or TTL-based invalidation in MVP"
    rationale: "Provider configs rarely change mid-execution, acceptable for MVP"
    source: "Story Implementation Notes"

  - decision_id: availability-timeout
    title: "5-second default timeout for availability checks"
    context: "All providers need availability checking"
    decision: "Default timeout: 5000ms (configurable via parameter)"
    rationale: "Matches existing isOllamaAvailable() pattern"
    source: "AC-7 clarification"

