schema: 1
story_id: MODL-0010
timestamp: "2026-02-13T20:11:00Z"

environment_setup:
  development:
    required_variables:
      - name: OLLAMA_BASE_URL
        description: "Local Ollama server URL for integration testing"
        default_value: "http://localhost:11434"
        test_requirement: "Integration tests skip if server unavailable"
        notes: "Existing configuration, unchanged from current setup"

      - name: OPENROUTER_API_KEY
        description: "API key for OpenRouter access (200+ model catalog)"
        default_value: null
        test_requirement: "Integration tests skip OpenRouter if missing"
        notes: "New dependency for AC-2. Get key from https://openrouter.ai/keys"

      - name: ANTHROPIC_API_KEY
        description: "API key for Anthropic direct API (official Claude)"
        default_value: null
        test_requirement: "Integration tests skip Anthropic if missing"
        notes: "New dependency for AC-4. Get key from https://console.anthropic.com/"

  testing:
    unit_tests:
      required_env: []
      description: "Unit tests do not require environment variables (mock-based per ADR-005)"

    integration_tests:
      required_env:
        - OLLAMA_BASE_URL (if testing Ollama adapter)
        - OPENROUTER_API_KEY (if testing OpenRouter adapter)
        - ANTHROPIC_API_KEY (if testing Anthropic adapter)
      description: "Integration tests use real provider APIs. Tests gracefully skip if env var missing."
      skip_behavior: "Per AC-9, integration tests skip if corresponding API key missing"

  production:
    required_variables:
      - name: OPENROUTER_API_KEY
        description: "OpenRouter API key for production workloads"
        test_requirement: "Must be set before startup if using OpenRouter"

      - name: ANTHROPIC_API_KEY
        description: "Anthropic API key for production workloads"
        test_requirement: "Must be set before startup if using Anthropic"

dependency_installation:
  new_packages:
    - name: "@langchain/anthropic"
      version: "latest compatible"
      reason: "Anthropic direct API provider adapter (AC-4)"
      install_command: "pnpm add --workspace @langchain/anthropic"
      notes: "Required for Anthropic direct integration"

    - name: "@langchain/openai"
      version: "latest compatible"
      reason: "May be needed for OpenRouter compatibility (verify during implementation)"
      install_command: "pnpm add --workspace @langchain/openai"
      notes: "Conditional dependency - verify if needed for OpenRouter"

  existing_packages:
    - "@langchain/core" (^0.3.0) - Base chat model interface
    - "@langchain/ollama" (^0.1.0) - Ollama provider (reference impl)
    - "@repo/logger" (workspace:*) - Logging utility
    - "zod" (^3.23.8) - Schema validation

workspace_setup:
  tooling:
    - pnpm (workspace package manager)
    - Turborepo (build orchestration)
    - TypeScript (type checking)
    - Vitest (testing framework)

  build_commands:
    dev: "pnpm dev"
    build: "pnpm build"
    test: "pnpm test"
    type_check: "pnpm check-types"

  orchestrator_specific:
    root: "packages/backend/orchestrator"
    scripts:
      - "build": "tsc"
      - "dev": "tsc --watch"
      - "test": "vitest run"
      - "test:watch": "vitest watch"
      - "test:coverage": "vitest run --coverage"

implementation_checklist:
  dependency_management:
    - [ ] "Verify @langchain/anthropic not already installed"
    - [ ] "Install new dependencies: pnpm add --workspace @langchain/anthropic"
    - [ ] "Verify pnpm-lock.yaml updated"
    - [ ] "Run pnpm install to sync dependencies"
    - [ ] "Verify no dependency conflicts"

  environment_configuration:
    - [ ] "Document required env vars in .env.example or .env.local"
    - [ ] "Set OPENROUTER_API_KEY if testing OpenRouter adapter"
    - [ ] "Set ANTHROPIC_API_KEY if testing Anthropic adapter"
    - [ ] "Verify OLLAMA_BASE_URL points to running server (or set to skip Ollama tests)"

  testing_prerequisites:
    - [ ] "Start Ollama server locally (ollama serve) - or tests skip gracefully"
    - [ ] "Verify integration tests skip if env vars missing (AC-9)"
    - [ ] "Run unit tests first (no env vars needed)"
    - [ ] "Run integration tests with all env vars set"

notes:
  - "Test behavior (AC-9): Integration tests skip gracefully if API key missing"
  - "No production secrets in version control - use environment variables only"
  - "Existing OLLAMA_BASE_URL configuration unchanged"
  - "All logging uses @repo/logger, no console.log"
  - "All config validation uses Zod schemas"
