summary: "Implement pluggable provider adapter system for unified LLM access (OpenRouter, Ollama, Anthropic direct API)"

acceptance_criteria:
  - id: "AC-1"
    title: "Base Provider Interface"
    description: "Define ILLMProvider interface and BaseProviderConfig Zod schema in packages/backend/orchestrator/src/providers/base.ts with methods: getModel(), checkAvailability(), getCachedInstance(), loadConfig()"
    status: pending

  - id: "AC-2"
    title: "OpenRouter Adapter"
    description: "Implement providers/openrouter.ts with support for openrouter/* model prefix, environment variable OPENROUTER_API_KEY, and LangChain BaseChatModel instance caching"
    status: pending

  - id: "AC-3"
    title: "Ollama Adapter"
    description: "Refactor existing Ollama integration into providers/ollama.ts maintaining backward compatibility, reusing availability check pattern, and instance cache pattern"
    status: pending

  - id: "AC-4"
    title: "Anthropic Direct Adapter"
    description: "Implement providers/anthropic.ts with support for anthropic/* model prefix, environment variable ANTHROPIC_API_KEY, and ChatAnthropic instance caching"
    status: pending

  - id: "AC-5"
    title: "Provider Factory"
    description: "Implement providers/index.ts with getProviderForModel(modelName) function that routes to correct adapter based on model prefix (openrouter/*, ollama/*, anthropic/*)"
    status: pending

  - id: "AC-6"
    title: "Configuration Schemas"
    description: "Define all configuration types using Zod schemas (OpenRouterConfigSchema, OllamaConfigSchema, AnthropicConfigSchema) with inferred types, no TypeScript interfaces"
    status: pending

  - id: "AC-7"
    title: "Availability Checking"
    description: "All providers implement checkAvailability(timeout?: number) with 5-second default timeout, @repo/logger integration, and timeout error handling"
    status: pending

  - id: "AC-8"
    title: "Instance Caching"
    description: "All providers cache model instances by configuration hash with cache hit/miss logging, shared cache across instances, and no memory leaks"
    status: pending

  - id: "AC-9"
    title: "Integration Tests"
    description: "Write integration tests for Ollama (local server), OpenRouter (real API key, skipped if missing), Anthropic (real API key, skipped if missing), factory routing, and cache behavior"
    status: pending

  - id: "AC-10"
    title: "Backward Compatibility"
    description: "Ensure existing LangGraph nodes pass tests, no regressions in orchestrator functionality, and performance unchanged"
    status: pending

