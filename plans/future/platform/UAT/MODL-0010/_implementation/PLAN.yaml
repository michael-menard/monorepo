schema: 1
story_id: MODL-0010
timestamp: "2026-02-13T20:30:00Z"

implementation_strategy:
  approach: "Sequential implementation with backward compatibility preservation"
  order:
    - "Install dependencies"
    - "Create base provider interface (AC-1, AC-6)"
    - "Refactor Ollama adapter (AC-3, AC-10)"
    - "Create OpenRouter adapter (AC-2)"
    - "Create Anthropic adapter (AC-4)"
    - "Create provider factory (AC-5)"
    - "Add caching to all providers (AC-8)"
    - "Add availability checks to all providers (AC-7)"
    - "Write unit tests"
    - "Write integration tests (AC-9)"
    - "Validate backward compatibility (AC-10)"

phases:
  - phase: 1
    name: "Setup & Base Interface"
    tasks:
      - task_id: "1.1"
        description: "Install @langchain/anthropic dependency"
        acceptance_criteria: ["AC-4"]
        commands:
          - "pnpm add @langchain/anthropic --filter @repo/orchestrator"
        validation:
          - "package.json updated"
          - "pnpm-lock.yaml updated"
      
      - task_id: "1.2"
        description: "Create providers directory structure"
        acceptance_criteria: ["AC-1"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/base.ts"
          - "packages/backend/orchestrator/src/providers/__types__/index.ts"
        validation:
          - "Directory structure created"
      
      - task_id: "1.3"
        description: "Define base provider interface and Zod schemas"
        acceptance_criteria: ["AC-1", "AC-6"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/base.ts"
        exports:
          - "ILLMProvider interface"
          - "BaseProviderConfigSchema (Zod)"
          - "BaseProviderConfig type (z.infer)"
        patterns_used:
          - "zod-config-loading"
          - "logger-usage"

  - phase: 2
    name: "Ollama Adapter Refactor"
    tasks:
      - task_id: "2.1"
        description: "Extract Ollama logic into providers/ollama.ts"
        acceptance_criteria: ["AC-3", "AC-6", "AC-10"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/ollama.ts"
        files_to_modify:
          - "packages/backend/orchestrator/src/config/llm-provider.ts"
        patterns_used:
          - "zod-config-loading"
          - "instance-caching"
          - "availability-check"
          - "model-prefix-parsing"
        validation:
          - "Implements ILLMProvider interface"
          - "OllamaConfigSchema defined with Zod"
          - "Reuses existing cache pattern"
          - "Reuses existing availability check"
          - "TypeScript compiles"
      
      - task_id: "2.2"
        description: "Update llm-provider.ts to use new Ollama adapter"
        acceptance_criteria: ["AC-10"]
        files_to_modify:
          - "packages/backend/orchestrator/src/config/llm-provider.ts"
        validation:
          - "Backward compatibility maintained"
          - "Existing tests still pass"

  - phase: 3
    name: "OpenRouter Adapter"
    tasks:
      - task_id: "3.1"
        description: "Implement OpenRouter provider adapter"
        acceptance_criteria: ["AC-2", "AC-6"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/openrouter.ts"
        exports:
          - "OpenRouterProvider class"
          - "OpenRouterConfigSchema (Zod)"
          - "OpenRouterConfig type (z.infer)"
        patterns_used:
          - "zod-config-loading"
          - "instance-caching"
          - "logger-usage"
          - "langchain-integration"
        technical_notes:
          - "Verify if @langchain/openai needed for OpenRouter compatibility"
          - "Parse model prefix: openrouter/<model-name>"
          - "Load OPENROUTER_API_KEY from environment"
          - "Cache instances by configuration hash"
        validation:
          - "Implements ILLMProvider interface"
          - "Returns BaseChatModel instance"
          - "TypeScript compiles"

  - phase: 4
    name: "Anthropic Adapter"
    tasks:
      - task_id: "4.1"
        description: "Implement Anthropic direct API adapter"
        acceptance_criteria: ["AC-4", "AC-6"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/anthropic.ts"
        exports:
          - "AnthropicProvider class"
          - "AnthropicConfigSchema (Zod)"
          - "AnthropicConfig type (z.infer)"
        patterns_used:
          - "zod-config-loading"
          - "instance-caching"
          - "logger-usage"
          - "langchain-integration"
        technical_notes:
          - "Import ChatAnthropic from @langchain/anthropic"
          - "Parse model prefix: anthropic/<model-name>"
          - "Load ANTHROPIC_API_KEY from environment"
          - "Cache instances by configuration hash"
        validation:
          - "Implements ILLMProvider interface"
          - "Returns ChatAnthropic instance"
          - "TypeScript compiles"

  - phase: 5
    name: "Provider Factory"
    tasks:
      - task_id: "5.1"
        description: "Create provider factory with dynamic routing"
        acceptance_criteria: ["AC-5"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/index.ts"
        exports:
          - "getProviderForModel(modelName: string) function"
        implementation:
          - "Parse model prefix (before first /)"
          - "Route to correct adapter: openrouter/*, ollama/*, anthropic/*"
          - "Throw clear error for unsupported prefixes"
          - "List supported prefixes in error message"
        patterns_used:
          - "model-prefix-parsing"
          - "logger-usage"
        validation:
          - "Routes correctly based on prefix"
          - "Error handling for unknown prefixes"
          - "TypeScript compiles"

  - phase: 6
    name: "Caching & Availability"
    tasks:
      - task_id: "6.1"
        description: "Add instance caching to all providers"
        acceptance_criteria: ["AC-8"]
        files_to_modify:
          - "packages/backend/orchestrator/src/providers/ollama.ts"
          - "packages/backend/orchestrator/src/providers/openrouter.ts"
          - "packages/backend/orchestrator/src/providers/anthropic.ts"
        implementation:
          - "Cache key based on configuration hash"
          - "Log cache hit/miss via @repo/logger"
          - "Shared cache across provider instances"
          - "No memory leaks (bounded cache)"
        patterns_used:
          - "instance-caching"
          - "logger-usage"
      
      - task_id: "6.2"
        description: "Add availability checking to all providers"
        acceptance_criteria: ["AC-7"]
        files_to_modify:
          - "packages/backend/orchestrator/src/providers/ollama.ts"
          - "packages/backend/orchestrator/src/providers/openrouter.ts"
          - "packages/backend/orchestrator/src/providers/anthropic.ts"
        implementation:
          - "Implement checkAvailability(timeout?: number) method"
          - "Default timeout: 5000ms (5 seconds)"
          - "Use AbortController for timeout handling"
          - "Log via @repo/logger (no console.log)"
        patterns_used:
          - "availability-check"
          - "logger-usage"

  - phase: 7
    name: "Testing"
    tasks:
      - task_id: "7.1"
        description: "Write unit tests for all providers"
        acceptance_criteria: ["AC-9"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/__tests__/base.test.ts"
          - "packages/backend/orchestrator/src/providers/__tests__/ollama.test.ts"
          - "packages/backend/orchestrator/src/providers/__tests__/openrouter.test.ts"
          - "packages/backend/orchestrator/src/providers/__tests__/anthropic.test.ts"
          - "packages/backend/orchestrator/src/providers/__tests__/factory.test.ts"
        coverage:
          - "Zod schema validation (valid/invalid configs)"
          - "Model prefix parsing"
          - "Cache key generation"
          - "Configuration merging"
          - "Error message formatting"
        validation:
          - "pnpm test passes"
      
      - task_id: "7.2"
        description: "Write integration tests with real services"
        acceptance_criteria: ["AC-9"]
        files_to_create:
          - "packages/backend/orchestrator/src/providers/__tests__/integration.test.ts"
        test_cases:
          - "Ollama integration test with local server"
          - "OpenRouter integration test with real API key (skipped if key missing)"
          - "Anthropic integration test with real API key (skipped if key missing)"
          - "Provider factory routing tests"
          - "Cache behavior tests"
        skip_pattern: "test.skipIf(!process.env.OPENROUTER_API_KEY)(...)"
        validation:
          - "Tests pass when API keys provided"
          - "Tests skip gracefully when API keys missing"
      
      - task_id: "7.3"
        description: "Validate backward compatibility"
        acceptance_criteria: ["AC-10"]
        validation_commands:
          - "pnpm test packages/backend/orchestrator"
          - "pnpm build"
        success_criteria:
          - "All existing LangGraph nodes pass tests"
          - "No regressions in orchestrator functionality"
          - "Performance unchanged (no added latency)"

acceptance_criteria_mapping:
  AC-1:
    tasks: ["1.2", "1.3"]
    validation:
      - "base.ts exports ILLMProvider interface"
      - "base.ts exports BaseProviderConfigSchema (Zod)"
      - "Interface has methods: getModel(), checkAvailability(), getCachedInstance(), loadConfig()"
      - "TypeScript compiles"
  
  AC-2:
    tasks: ["3.1"]
    validation:
      - "openrouter.ts implements ILLMProvider"
      - "Parses openrouter/* prefix"
      - "Loads OPENROUTER_API_KEY from environment"
      - "Returns BaseChatModel instance"
      - "Caches instances by config hash"
  
  AC-3:
    tasks: ["2.1", "2.2"]
    validation:
      - "ollama.ts implements ILLMProvider"
      - "Maintains backward compatibility"
      - "Reuses existing availability check pattern"
      - "Reuses existing cache pattern"
      - "All existing tests pass"
  
  AC-4:
    tasks: ["1.1", "4.1"]
    validation:
      - "@langchain/anthropic installed"
      - "anthropic.ts implements ILLMProvider"
      - "Parses anthropic/* prefix"
      - "Loads ANTHROPIC_API_KEY from environment"
      - "Returns ChatAnthropic instance"
      - "Caches instances by config hash"
  
  AC-5:
    tasks: ["5.1"]
    validation:
      - "index.ts exports getProviderForModel(modelName)"
      - "Routes openrouter/* to OpenRouter adapter"
      - "Routes ollama/* to Ollama adapter"
      - "Routes anthropic/* to Anthropic adapter"
      - "Throws error for unsupported prefixes"
  
  AC-6:
    tasks: ["1.3", "2.1", "3.1", "4.1"]
    validation:
      - "OpenRouterConfigSchema defined with Zod"
      - "OllamaConfigSchema defined with Zod"
      - "AnthropicConfigSchema defined with Zod"
      - "All types use z.infer<typeof Schema>"
      - "No TypeScript interfaces for config"
  
  AC-7:
    tasks: ["6.2"]
    validation:
      - "All providers implement checkAvailability(timeout?: number)"
      - "Default timeout: 5000ms"
      - "Timeout configurable via parameter"
      - "Returns boolean or throws timeout error"
      - "Uses @repo/logger for all logging"
  
  AC-8:
    tasks: ["6.1"]
    validation:
      - "Cache key based on configuration hash"
      - "Cache hit/miss logged via @repo/logger"
      - "Cache shared across provider instances"
      - "No memory leaks (cache bounded)"
  
  AC-9:
    tasks: ["7.1", "7.2"]
    validation:
      - "Unit tests cover all providers"
      - "Integration tests for Ollama (local server)"
      - "Integration tests for OpenRouter (real API, skipped if key missing)"
      - "Integration tests for Anthropic (real API, skipped if key missing)"
      - "Provider factory routing tests"
      - "Cache behavior tests"
  
  AC-10:
    tasks: ["2.1", "2.2", "7.3"]
    validation:
      - "All existing LangGraph nodes pass tests"
      - "No regressions in orchestrator functionality"
      - "Performance unchanged"

risks:
  - risk: "OpenRouter may require @langchain/openai for compatibility"
    mitigation: "Verify during Phase 3, install if needed"
    impact: "Low - additional dependency only"
  
  - risk: "Integration tests may fail in CI without API keys"
    mitigation: "Tests skip gracefully per AC-9, document in ENV-SETUP.yaml"
    impact: "Low - expected behavior"
  
  - risk: "Backward compatibility regression"
    mitigation: "Comprehensive test suite in Phase 7.3"
    impact: "High - blocking issue"

success_criteria:
  - "All 10 acceptance criteria pass"
  - "Unit tests pass: pnpm test"
  - "Build succeeds: pnpm build"
  - "Integration tests pass (when API keys provided)"
  - "No regressions in existing orchestrator functionality"
  - "EVIDENCE.yaml created with all AC mappings"
