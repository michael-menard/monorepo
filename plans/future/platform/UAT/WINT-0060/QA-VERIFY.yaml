lessons_to_record:
  - lesson: >
      Evidence artifact migration filename references can drift from actual filenames
      when migration numbering changes during implementation. QA should check the
      actual file exists rather than trusting the filename reference verbatim.
    category: pattern
    tags: ["qa", "migration", "evidence-accuracy"]

  - lesson: >
      Pure database schema stories (no I/O operations, no HTTP endpoints) complete
      cleanly with 100% test coverage achievable in a single implementation pass
      when tests are written alongside schema enhancements.
    category: pattern
    tags: ["schema", "testing", "efficiency"]

  - lesson: >
      Self-referencing foreign keys in Drizzle ORM require forward reference syntax
      () => tableName.column and must use relationName in relations() to prevent
      circular dependency TypeScript errors.
    category: pattern
    tags: ["drizzle", "self-referencing-fk", "schema"]

