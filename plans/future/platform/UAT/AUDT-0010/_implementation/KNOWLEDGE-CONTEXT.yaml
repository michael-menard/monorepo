lessons:
  - id: AUDT-0010-L001
    title: "LangGraph test pattern - test compiled graph not dynamic imports"
    context: "code-audit.ts uses dynamic imports in createLensParallelNode"
    recommendation: "Test graph.compile() succeeds and routing logic, not individual lens loading"
    source: "elaboration.test.ts, metrics.test.ts patterns"
    tags: [testing, langgraph, audit]

  - id: AUDT-0010-L002
    title: "Filesystem test isolation - use temp directories"
    context: "scan-scope walks filesystem to discover files"
    recommendation: "Use os.tmpdir() with fixture files, cleanup in afterEach"
    source: "Testing best practices"
    tags: [testing, filesystem, audit]

  - id: AUDT-0010-L003
    title: "Schema test coverage - fixtures for valid/invalid/edge cases"
    context: "AuditFindingsSchema and LensResultSchema need comprehensive validation"
    recommendation: "Follow checkpoint.test.ts pattern - valid fixture, invalid (missing fields), edge cases (empty arrays, boundary values)"
    source: "checkpoint.test.ts pattern"
    tags: [testing, zod, audit]

  - id: AUDT-0010-L004
    title: "Conditional routing requires explicit test coverage for both paths"
    context: "code-audit.ts has pipeline and roundtable modes with different routing"
    recommendation: "Test both mode='pipeline' and mode='roundtable' to verify devils_advocate/roundtable nodes are skipped/included"
    source: "code-audit.ts routing logic"
    tags: [testing, langgraph, routing, audit]

adrs:
  - id: ADR-ORCH-001
    title: "Export pattern - JSDoc headers and grouped exports"
    decision: "All index.ts files have JSDoc header explaining module purpose, exports grouped by feature"
    rationale: "Consistency with existing graphs/index.ts, nodes/index.ts, artifacts/index.ts"
    consequences: "New audit exports must follow same pattern"
    tags: [architecture, exports, audit]

  - id: ADR-ORCH-002
    title: "Zod-first types - no TypeScript interfaces"
    decision: "All types use Zod schemas with z.infer<> - never TypeScript interfaces"
    rationale: "Runtime validation + automatic type inference + self-documenting constraints"
    consequences: "audit-findings.ts already follows this pattern, tests must validate schemas"
    tags: [architecture, typescript, zod, audit]

  - id: ADR-ORCH-003
    title: "Named exports preferred - no default exports"
    decision: "Use named exports for all functions, types, schemas"
    rationale: "Consistency with orchestrator package patterns"
    consequences: "nodes/audit/index.ts must use named exports only"
    tags: [architecture, exports, audit]

