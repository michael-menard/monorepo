kb_writes:
  - id: 1
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: edge-case
    title: "Column Order Validation"
    content: |
      **Finding**: Story assumes fixed column order (# | Story | Title | ← Depends On | Epic | Priority)
      but does not validate headers on read.

      **Impact**: Low - Current format is consistent, but future changes could break parsing
      **Effort**: Low - Add header validation in parseMarkdownTable()

      **Recommendation**: Validate column headers match expected order on first parse. Throw
      descriptive error if columns are missing or reordered.

      **Context**: IndexAdapter.readIndex() should validate table structure before parsing rows.
    additional_tags:
      - non-blocking
      - edge-case
      - validation

  - id: 2
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: edge-case
    title: "Missing Optional Columns"
    content: |
      **Finding**: Some wave sections may omit the Priority column, but story assumes all
      columns are present.

      **Impact**: Low - Current platform index has all columns, but flexibility needed
      **Effort**: Low - Make column detection dynamic

      **Recommendation**: Detect which columns are present from header row, make parsing
      adaptive. Priority should be truly optional.

      **Context**: Some legacy or simplified indexes may not track priority at all.
    additional_tags:
      - non-blocking
      - edge-case
      - flexibility

  - id: 3
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: edge-case
    title: "Malformed Table Recovery"
    content: |
      **Finding**: No error recovery for tables with mismatched row/column counts. Parser
      will throw error instead of attempting recovery.

      **Impact**: Medium - Manual edits could corrupt table, causing complete parse failure
      **Effort**: Medium - Add row validation and error recovery strategies

      **Recommendation**: When row has wrong column count, log warning and skip row (or pad
      with empty values). Don't fail entire parse for single malformed row.

      **Context**: Human editing of markdown can introduce formatting errors. Graceful degradation
      is better than hard failure.
    additional_tags:
      - non-blocking
      - edge-case
      - error-handling

  - id: 4
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: edge-case
    title: "Unicode Emoji Edge Cases"
    content: |
      **Finding**: Story only tests three specific emojis (⚡🎯✨) but platform may use
      wider emoji range.

      **Impact**: Low - Unicode handling is generally robust in modern Node.js
      **Effort**: Low - Add test cases for full emoji range

      **Recommendation**: Test with emoji ranges: symbols (⚡🔥), faces (😀😎), objects (🚀📦),
      flags (🏁🎯), and modifiers (skin tones, gender). Ensure preservation across read/write.

      **Context**: Markdown table preservation requires correct Unicode handling.
    additional_tags:
      - non-blocking
      - edge-case
      - unicode

  - id: 5
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: performance
    title: "Large File Streaming"
    content: |
      **Finding**: Current implementation loads entire index file into memory. For 1000+
      story indexes, this may be inefficient.

      **Impact**: Medium - Performance degradation at scale
      **Effort**: High - Requires streaming parser and incremental processing

      **Recommendation**: Monitor memory usage. If index files exceed 1MB or 1000 stories,
      consider line-by-line streaming with readline module.

      **Context**: Current scale is 235 stories (~100KB). Streaming not needed for MVP but
      plan for future growth.
    additional_tags:
      - non-blocking
      - performance
      - scalability

  - id: 6
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: future-work
    title: "Concurrent Write Conflict Resolution"
    content: |
      **Finding**: File locking mechanism needed for simultaneous updates. Current approach
      is atomic writes with last-write-wins behavior.

      **Impact**: High - Lost updates if multiple LangGraph workflows update simultaneously
      **Effort**: High - Requires file locking library and conflict detection

      **Recommendation**: Use `proper-lockfile` npm package for cross-platform file locking.
      Wrap all write operations with lock acquisition. Add timeout and stale lock detection.

      **Context**: Story explicitly defers this ("No real-time collaboration"). Revisit if
      concurrent workflows become common.
    additional_tags:
      - non-blocking
      - future-work
      - concurrency

  - id: 7
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: enhancement
    title: "Markdown AST Parser (remark/unified)"
    content: |
      **Finding**: Story recommends upgrading from regex to remark/unified for robust parsing.

      **Impact**: High - Improved robustness and maintainability
      **Effort**: Medium - Add dependencies, refactor parser logic

      **Recommendation**: Monitor regex parser for issues. If more than 3 edge case bugs
      filed or patterns exceed 10 lines, trigger migration to remark/unified.

      **Migration path**:
      1. Add remark-parse and mdast-util-to-markdown deps
      2. Create MarkdownAstParser class alongside regex parser
      3. Feature flag to switch: USE_AST_PARSER=true
      4. Run both in parallel in tests, compare results
      5. Deprecate regex parser after validation period

      **Context**: Story suggests this as future enhancement path.
    additional_tags:
      - non-blocking
      - enhancement
      - technical-debt

  - id: 8
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: enhancement
    title: "Batch Update Operations"
    content: |
      **Finding**: Following StoryFileAdapter pattern, could add updateBatch() for multiple
      status updates in single write operation.

      **Impact**: Medium - Performance improvement for bulk operations
      **Effort**: Medium - Extend class with batch methods

      **Recommendation**: Add methods like:
      - updateStatusBatch(updates: Array<{storyId, status}>)
      - addStoriesBatch(entries: IndexStoryEntry[])

      Benefits: Single file read/write for multiple changes, improved transaction semantics.

      **Context**: StoryFileAdapter has readBatch() pattern. IndexAdapter should mirror this.
    additional_tags:
      - non-blocking
      - enhancement
      - performance

  - id: 9
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: enhancement
    title: "Index Validation CLI"
    content: |
      **Finding**: Command-line tool would be useful for manual validation of index files.

      **Impact**: Low - Developer experience improvement
      **Effort**: Low - Thin wrapper around validate() method

      **Recommendation**: Create CLI script:
      ```bash
      pnpm validate-index platform.stories.index.md
      ```

      Output:
      - ✓ All checks pass
      - Or: X errors found with detailed messages
      - Exit code: 0 for pass, 1 for fail (CI/CD integration)

      **Context**: Useful for local validation before committing index changes.
    additional_tags:
      - non-blocking
      - enhancement
      - developer-experience

  - id: 10
    entry_type: finding
    source_stage: elab
    story_id: LNGG-0020
    category: observability
    title: "Performance Benchmarks"
    content: |
      **Finding**: Story specifies performance targets (parse < 100ms, update < 50ms) but
      could add benchmark tracking over time.

      **Impact**: Medium - Detect performance regressions early
      **Effort**: Low - Add benchmark tests with threshold alerts

      **Recommendation**: Use vitest's bench API to track:
      - Parse 235-story index time
      - Update single story time
      - Validation time
      - Full read-modify-write cycle time

      Alert if any benchmark regresses by >20%. Track historical trend.

      **Context**: Performance is a quality attribute. Benchmarks prevent degradation.
    additional_tags:
      - non-blocking
      - observability
      - performance

