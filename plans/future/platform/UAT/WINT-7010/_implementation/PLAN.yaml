      - "plans/future/platform/in-progress/WINT-7010/DIRECTORY-STRUCTURE.md"
      - "plans/future/platform/in-progress/WINT-7010/CROSS-REFERENCES.yaml"
      - "plans/future/platform/in-progress/WINT-7010/SPAWN-GRAPH.md"
      - "plans/future/platform/in-progress/WINT-7010/SHARED-DEPENDENCIES.yaml"
      - "plans/future/platform/in-progress/WINT-7010/ORPHANED-AGENTS.yaml"
      - "plans/future/platform/in-progress/WINT-7010/AUDIT-SUMMARY.md"
