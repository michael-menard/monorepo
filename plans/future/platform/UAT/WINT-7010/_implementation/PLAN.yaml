    description: "Scan .claude/agents directory and extract frontmatter metadata from all agent files"
    files:
      - ".claude/agents/**/*.agent.md"
    dependencies: []
    slice: packages
    notes: "Use Glob to find all agent files, Grep to extract frontmatter, Read for parsing errors"

  - id: 2
    description: "Generate directory structure documentation including _shared, _reference, _archive, _migration"
