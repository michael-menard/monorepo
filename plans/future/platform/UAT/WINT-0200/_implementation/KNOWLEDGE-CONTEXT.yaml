# === CONVENTIONS ===
conventions:
  naming:
    enums: PascalCase + "Enum" suffix (e.g., UserFlowStateEnum)
    schemas: PascalCase + "Schema" suffix (e.g., UserFlowsSchema)
    types: PascalCase, no suffix (e.g., UserFlows)
    files: kebab-case (e.g., user-flows.ts)

  exports:
    - Export schema constant (e.g., export const UserFlowsSchema)
    - Export inferred type (e.g., export type UserFlows = z.infer<typeof UserFlowsSchema>)
    - Export all intermediate types (e.g., UserFlowStep, UserFlow)
    - NO default exports (use named exports only)

  error_handling:
    - Use Zod's .parse() for validation (throws on error)
    - Use .safeParse() if error handling is needed (returns { success, data, error })
    - Provide custom error messages for user-facing validation
    - Test error messages for clarity

