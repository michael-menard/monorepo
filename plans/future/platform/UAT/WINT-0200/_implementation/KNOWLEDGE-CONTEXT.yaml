# === ZOD SCHEMA PATTERNS ===
zod_patterns:
  enum_definition:
    description: Pattern for defining enums with Zod
    source: packages/backend/mcp-tools/src/session-management/__types__/index.ts
    pattern: |
      // Define enum using z.enum()
      export const MyEnumSchema = z.enum(['value1', 'value2', 'value3'])

      // Infer type from enum
      export type MyEnum = z.infer<typeof MyEnumSchema>
    notes: |
      - Use z.enum() for closed enum sets (not z.string().enum())
      - Export both schema and inferred type
      - Enum values are string literals

  object_with_enums:
    description: Pattern for object schemas using enums
    source: packages/backend/mcp-tools/src/session-management/__types__/index.ts
    pattern: |
      export const MyObjectSchema = z.object({
        status: MyEnumSchema,
        mode: z.enum(['mode1', 'mode2']).default('mode1'),
        optional: z.string().optional(),
      })

      export type MyObject = z.infer<typeof MyObjectSchema>
    notes: |
      - Enum fields can have .default() for optional enums
      - Use .optional() for truly optional fields
      - Export schema and inferred type

  array_constraints:
    description: Pattern for array length validation
    source: Session management Zod patterns
    pattern: |
      export const MyArraySchema = z.array(ItemSchema)
        .min(1, 'Array must have at least 1 item')
        .max(5, 'Array cannot exceed 5 items')

      // Or with default
      export const MyArraySchema = z.array(ItemSchema).max(5).default([])
    notes: |
      - Use .min() / .max() for length constraints
      - Optional: Add custom error messages as second argument
      - .default([]) provides empty array default

  nested_schemas:
    description: Pattern for nested object composition
    source: Session management and scope patterns
    pattern: |
      // Define sub-schema first
      export const StepSchema = z.object({
        name: z.string(),
        state: StateEnum,
      })

      // Use in parent schema
      export const FlowSchema = z.object({
        flowName: z.string(),
        steps: z.array(StepSchema).max(7),
      })

      // Infer all types
      export type Step = z.infer<typeof StepSchema>
      export type Flow = z.infer<typeof FlowSchema>
    notes: |
      - Define sub-schemas before parent schemas
      - Export all intermediate types
      - Enables type reuse across schemas

  custom_error_messages:
    description: Pattern for clear validation errors
    source: Best practices from existing tests
    pattern: |
      export const MySchema = z.object({
        count: z.number()
          .int('Count must be an integer')
          .min(0, 'Count cannot be negative')
          .max(100, 'Count cannot exceed 100'),
      })
    notes: |
      - Add custom messages to .min() / .max() / .int()
      - Error messages should be user-friendly
      - Test error messages in test suite

# === PGENUM PATTERNS (IF DATABASE STORAGE CHOSEN) ===
pgenum_patterns:
  enum_definition:
    description: Pattern for defining database enums
    source: packages/backend/database-schema/src/schema/wint.ts
    pattern: |
      // Define pgEnum in Drizzle schema
      export const storyStateEnum = pgEnum('story_state', [
        'backlog',
        'ready_to_work',
        'in_progress',
        'done',
      ])

      // Use in table definition
      export const stories = wintSchema.table('stories', {
        state: storyStateEnum('state').notNull().default('backlog'),
      })
    notes: |
      - First argument is database enum name (snake_case)
      - Second argument is array of string values
      - Use in table columns with enum('column_name')
      - Can set .notNull() and .default()

  dual_schema_approach:
    description: When to use both pgEnum and Zod
    source: WINT database schema + session management patterns
    pattern: |
      // Database enum (wint.ts)
      export const myStateEnum = pgEnum('my_state', ['state1', 'state2'])

      // Zod enum (separate file)
      export const MyStateSchema = z.enum(['state1', 'state2'])
      export type MyState = z.infer<typeof MyStateSchema>
    notes: |
      - pgEnum for database constraints (if database storage chosen)
      - Zod enum for runtime validation in TypeScript code
      - Keep enum values synchronized between both
      - Drizzle can auto-generate Zod schemas from pgEnum

# === JSON SCHEMA PATTERNS ===
json_schema_patterns:
  draft_2020_12:
    description: JSON Schema Draft 2020-12 structure
    source: JSON Schema specification
    pattern: |
      {
        "$schema": "https://json-schema.org/draft/2020-12/schema",
        "$id": "https://example.com/schemas/user-flows.schema.json",
        "title": "User Flows Schema",
        "description": "Schema for defining user flows with states and capabilities",
        "type": "object",
        "properties": {
          "flows": {
            "type": "array",
            "maxItems": 5,
            "items": {
              "type": "object",
              "properties": {
                "flowName": { "type": "string" },
                "steps": {
                  "type": "array",
                  "maxItems": 7,
                  "items": { "$ref": "#/$defs/step" }
                }
              }
            }
          }
        },
        "$defs": {
          "step": {
            "type": "object",
            "properties": {
              "state": {
                "enum": ["loading", "empty", "validation_error", "server_error", "permission_denied"]
              }
            }
          }
        }
      }
    notes: |
      - Use $schema to specify JSON Schema version
      - Use $id for schema identifier
      - Use enum for closed value sets
      - Use maxItems for array constraints
      - Use $defs for reusable sub-schemas

  versioning:
    description: Schema versioning pattern
    source: WINT-0180 versioning strategy (when available)
    pattern: |
      {
        "schema_version": "1.0.0",
        "flows": [ ... ]
      }
    notes: |
      - Include schema_version field in all schemas
      - Use semantic versioning (major.minor.patch)
      - Major version: breaking changes to enum values or structure
      - Minor version: new enum values added (backward compatible)
      - Patch version: documentation or clarification updates

# === TSDOC PATTERNS ===
tsdoc_patterns:
  enum_documentation:
    description: Pattern for documenting enum values
    source: WINT database schema comments
    pattern: |
      /**
       * User Flow State Enum
       *
       * Defines the required states that all user flows must handle.
       *
       * @remarks
       * - `loading`: Initial data fetch in progress (show spinner or skeleton state)
       * - `empty`: No data exists yet (show empty state with call-to-action)
       * - `validation_error`: User input failed validation (show form errors)
       * - `server_error`: Backend returned 5xx error (show error boundary with retry)
       * - `permission_denied`: User lacks required permissions (show 403 state)
       *
       * @see {@link https://docs.example.com/user-flows | User Flows Documentation}
       */
      export const UserFlowStateEnum = z.enum([
        'loading',
        'empty',
        'validation_error',
        'server_error',
        'permission_denied',
      ])
    notes: |
      - Use JSDoc /** */ for multi-line comments
      - @remarks for detailed explanations
      - Document purpose and usage for each enum value
      - Add @see links to related documentation

  extensibility_docs:
    description: Pattern for extensibility documentation
    source: Implementation notes from ANALYSIS.md
    pattern: |
      /**
       * ## Extensibility
       *
       * To add a new state to this enum:
       * 1. Add the new state value to the enum array
       * 2. Increment schema_version (minor version for new values)
       * 3. Update TSDoc comments with state description
       * 4. Add test cases for new state validation
       * 5. Update example flow to demonstrate new state
       * 6. Coordinate with WINT-0210/WINT-4xxx for cohesion rule updates
       *
       * @example
       * ```typescript
       * // Before (v1.0.0)
       * z.enum(['loading', 'empty'])
       *
       * // After (v1.1.0)
       * z.enum(['loading', 'empty', 'maintenance'])
       * ```
       */
    notes: |
      - Place in README.md for high-level process
      - Include step-by-step guide for adding enum values
      - Provide before/after example
      - Note downstream integration impacts

# === TESTING PATTERNS ===
testing_patterns:
  vitest_structure:
    description: Standard Vitest test file structure
    source: packages/backend/orchestrator/src/artifacts/__tests__/scope.test.ts
    pattern: |
      import { describe, expect, it } from 'vitest'
      import { MySchema } from '../my-schema'

      describe('MySchema', () => {
        describe('schema validation', () => {
          it('validates a minimal valid object', () => {
            const obj = { /* minimal valid object */ }
            const result = MySchema.parse(obj)
            expect(result).toMatchObject(obj)
          })

          it('validates an object with all fields', () => {
            const obj = { /* fully populated object */ }
            const result = MySchema.parse(obj)
            expect(result.field).toBe('value')
          })

          it('rejects invalid field value', () => {
            const obj = { /* invalid object */ }
            expect(() => MySchema.parse(obj)).toThrow()
          })
        })
      })
    notes: |
      - Use describe blocks for organization (schema > feature > test)
      - Happy path tests first, error cases second
      - Use .parse() for validation (throws on error)
      - Use .toMatchObject() for partial validation
      - Use .toThrow() for error cases

  error_validation:
    description: Testing Zod error messages
    source: Best practices from existing tests
    pattern: |
      it('rejects array exceeding max length', () => {
        const obj = { items: [1, 2, 3, 4, 5, 6] } // max is 5

        try {
          MySchema.parse(obj)
          expect.fail('Should have thrown ZodError')
        } catch (err) {
          expect(err).toBeInstanceOf(ZodError)
          expect(err.errors[0].message).toContain('cannot exceed 5')
        }
      })
    notes: |
      - Test both that error is thrown AND error message is clear
      - Use try/catch for detailed error inspection
      - Check err.errors array for validation failures
      - Ensure error messages guide users to fix issues

  round_trip_validation:
    description: Testing JSON serialization consistency
    source: Implementation notes from DECISIONS.yaml
    pattern: |
      it('validates round-trip JSON serialization', () => {
        const input = { /* valid object */ }
        const json = JSON.stringify(input)
        const parsed = JSON.parse(json)
        const validated = MySchema.parse(parsed)

        expect(JSON.stringify(validated)).toBe(json)
      })
    notes: |
      - Ensures schema doesn't lose data during validation
      - JSON.stringify → JSON.parse → Zod.parse → JSON.stringify
      - Output should match input (no data loss)
      - No custom serialization needed for this story

  fixtures_pattern:
    description: Using test fixtures for examples
    source: Implementation notes from SCOPE.yaml
    pattern: |
      // In test file
      import exampleFlow from './fixtures/example-user-flow.json'

      it('validates example user flow', () => {
        const result = UserFlowsSchema.parse(exampleFlow)

        // Verify all required states present
        const allStates = result.flows.flatMap(f => f.steps.map(s => s.state))
        expect(allStates).toContain('loading')
        expect(allStates).toContain('empty')
        expect(allStates).toContain('validation_error')
        expect(allStates).toContain('server_error')
        expect(allStates).toContain('permission_denied')
      })
    notes: |
      - Place fixtures in __tests__/fixtures/ directory
      - Import JSON directly in test file
      - Example becomes part of test suite (automatic validation)
      - Verify example demonstrates all required elements

# === TEST COVERAGE REQUIREMENTS ===
test_coverage:
  target: 100%
  rationale: |
    Validation logic is deterministic with no behavioral complexity.
    100% coverage is achievable and ensures all schema paths are tested.

  coverage_areas:
    - All enum values validate correctly
    - Max constraints enforced (5 flows, 7 steps)
    - Min constraints enforced (if any)
    - Required fields enforced
    - Optional fields work correctly
    - Invalid values rejected with clear errors
    - Round-trip validation succeeds
    - Edge cases handled (empty arrays, single items, max items)

