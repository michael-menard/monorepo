# ============================================================================
# Architectural Decisions
# ============================================================================

architectural_decisions:
  - id: ARCH-001
    decision: "evaluateQuality() is synchronous; ModelRouter.evaluateQuality() is async"
    rationale: >
      The core evaluator uses code constants (no IO) so it can be synchronous.
      ModelRouter wraps it in async to maintain interface consistency with other
      async methods and allow future async evaluation strategies (LLM-as-judge).

  - id: ARCH-002
    decision: "Dimension evaluators are heuristic/rule-based, not LLM-based"
    rationale: >
      Story explicitly excludes LLM-as-judge (Non-Goals). MVP uses string analysis,
      length checks, keyword presence, and contract flag inspection. This keeps
      evaluation fast, deterministic, and repeatable.

  - id: ARCH-003
    decision: "QualityDimensionScoreSchema uses dimension enum, not plain string"
    rationale: >
      Following readiness-score.ts pattern where category is an enum. This provides
      type safety for dimension names and enables exhaustive checking in TypeScript.
      The enum values match the 5 dimension names from the story spec.

  - id: ARCH-004
    decision: "No __tests__ directory created inside __types__ - use direct path"
    rationale: >
      Story spec lists the test file at __types__/__tests__/quality-evaluation.test.ts.
      Create the __tests__ subdirectory inside __types__ per the spec. This is consistent
      with the component directory structure in CLAUDE.md.

  - id: ARCH-005
    decision: "Over-provisioning threshold is 20 points above requirement threshold"
    rationale: >
      AC-3 specifies: 'score exceeds threshold by 20+ points'. For adequate (60),
      this means 80+ triggers over-provisioning flag. Configurable via constant
      OVER_PROVISIONING_MARGIN = 20 in quality-evaluator.ts.

