lessons_to_record:
  - lesson: >
      Scoping coverage to specific files with --coverage.include is necessary to get
      meaningful per-file numbers when running a subset of tests in a large monorepo package.
      The default coverage table truncates filenames, requiring targeted include filters.
    category: pattern
    tags: ["testing", "vitest", "coverage"]

  - lesson: >
      The synchronous evaluator + async ModelRouter wrapper pattern (ADR-001) cleanly
      separates I/O-free scoring logic from the async interface contract, enabling future
      async strategies (LLM-as-judge) without API changes. Worth reusing for similar
      evaluator patterns in MODL-0040.
    category: pattern
    tags: ["backend", "models", "architecture"]

  - lesson: >
      Heuristic quality evaluators benefit from edge case test coverage for empty output,
      whitespace-only output, unicode, and special characters before reaching UAT.
      The quality-evaluator-errors.test.ts file demonstrates this well (11 cases).
    category: pattern
    tags: ["testing", "quality-evaluation", "edge-cases"]

