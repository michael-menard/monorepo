id: CDBN-2010
title: Migrate artifacts Schema Live Data
status: backlog
priority: medium
phase: 2
feature: consolidate-db-normalized
goal: Consolidate all live artifact rows from wint.story_artifacts, kbar.story_artifacts, and artifacts.* into the new artifacts schema with deduplication and idempotency
split_from: CDBN-2010
split_part: '1 of 4'
depends_on:
  - CDBN-1020
  - CDBN-1060
endpoints: []
infrastructure:
  - One-time migration SQL script
  - Aurora PostgreSQL
risk_notes: >-
  High risk. The 7 source artifact tables may contain duplicate rows for the same
  (story_id, artifact_type, phase) triple. Deduplication strategy must pick the newest
  row by updated_at. The unique constraint on artifacts(story_id, artifact_type, phase)
  will reject duplicates — migration must handle conflicts via ON CONFLICT. Must be run
  in a transaction with rollback tested. Child table migrations (artifact_files_touched,
  artifact_ac_checks, artifact_commands, artifact_findings, artifact_test_results) depend
  on parent artifact rows existing first — ordering is strictly enforced.
sizing_warning: false
created: '2026-03-11T20:23:22Z'
acceptance_criteria:
  - id: AC-1
    description: >-
      All rows from wint.story_artifacts, kbar.story_artifacts, and artifacts.story_artifacts
      are consolidated into artifacts.artifacts with no data loss. Row count of
      artifacts.artifacts equals the deduplicated count of source rows (by story_id,
      artifact_type, phase). Verified via COUNT(*) comparison queries.

  - id: AC-2
    description: >-
      Duplicate artifacts across source tables are resolved by keeping the row with the
      latest updated_at timestamp. A deduplication log is written to _implementation/
      documenting how many duplicates were resolved and which source table won each conflict.

  - id: AC-3
    description: >-
      Child artifact tables (artifact_files_touched, artifact_ac_checks, artifact_commands,
      artifact_findings, artifact_test_results) are populated with correct artifact_id FK
      references. No orphaned child rows exist. Verified via LEFT JOIN ... WHERE parent IS NULL
      returning zero rows for each child table.

  - id: AC-4
    description: >-
      The migration script is idempotent — running it twice produces the same result
      with no duplicate rows or FK violations. Verified by running the script twice in
      sequence on a test database and confirming identical row counts.

  - id: AC-5
    description: >-
      All artifact_id FK references from other schemas (if any) are updated to point to
      the new artifacts.artifacts table. No orphaned FK references remain pointing to
      old source tables.
