id: CDBN-2020
title: Filesystem Ingestion Pipeline for Stories and Plans Not in DB
status: ready-to-work
priority: medium
phase: 2
feature: consolidate-db-normalized
goal: Ensure the DB is the single source of truth by pulling in any stories and plans that exist only on the filesystem
depends_on:
  - CDBN-2013
endpoints: []
infrastructure:
  - Node.js/TypeScript ingestion script
  - Aurora PostgreSQL
risk_notes: Medium risk. story.yaml parsing must handle schema variations across old and new formats. Idempotency is critical — re-running must not create duplicate rows. Reconciliation report should be reviewed before marking complete.
sizing_warning: false
created: '2026-03-11T20:23:22Z'
acceptance_criteria:
  - id: AC-1
    description: 'Ingestion script identifies all stories in plans/* directories that do not exist in the database (workflow.stories table). Returns a list of filesystem-only story IDs and their paths.'
  - id: AC-2
    description: 'Ingestion script identifies all plans in plans/* directories that do not exist in the database (workflow.plans table). Returns a list of filesystem-only plan IDs and their paths.'
  - id: AC-3
    description: 'Ingestion script parses filesystem story.yaml and plan.yaml files and inserts them into the database. Must handle both old and new schema formats per risk_notes.'
  - id: AC-4
    description: 'Ingestion script is idempotent - running multiple times does not create duplicate rows. Verified by running script twice and checking for duplicate entries.'
  - id: AC-5
    description: 'Ingestion script generates a reconciliation report showing: (a) stories in DB but not on filesystem, (b) stories on filesystem but not in DB, (c) stories in both but with content differences. Report saved to _implementation/RECONCILIATION.md.'
  - id: AC-6
    description: 'Ingestion script handles edge cases: missing story.yaml files, malformed YAML, duplicate IDs across directories. Errors are logged but do not stop the entire ingestion.'
