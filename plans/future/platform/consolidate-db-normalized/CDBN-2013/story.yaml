id: CDBN-2013
title: Migrate Story/Plan Content Split and Cross-Schema FK Verification
status: backlog
priority: medium
phase: 2
feature: consolidate-db-normalized
goal: Parse existing story and plan content into section-split rows (story_content, plan_content) and verify all cross-schema FK integrity across the 4 new schemas
split_from: CDBN-2010
split_part: '4 of 4'
depends_on:
  - CDBN-2010
  - CDBN-2011
  - CDBN-2012
endpoints: []
infrastructure:
  - One-time migration SQL script
  - Aurora PostgreSQL
risk_notes: >-
  High risk. Story content must be split across story_content rows by section (description,
  acceptance_criteria, non_goals, implementation_notes, scope_summary) — requires parsing
  existing jsonb or text columns with varying formats. Plan content must be split into
  plan_content rows by section (overview, goals, phases, technical_notes). Parsing failures
  must not lose data — a fallback 'raw' section should capture unparseable content.
  Cross-schema FK verification is the final gate before declaring Phase 2 complete.
  Must verify every FK constraint across all 4 schemas resolves correctly with zero
  orphaned references.
sizing_warning: false
created: '2026-03-13T00:00:00Z'
acceptance_criteria:
  - id: AC-1
    description: >-
      Every row in workflow.stories has at least one corresponding row in
      workflow.story_content. Stories with parseable structured content have separate
      rows for each section (description, acceptance_criteria, non_goals, etc.).
      Verified via LEFT JOIN showing zero stories without content rows.

  - id: AC-2
    description: >-
      Every row in workflow.plans has at least one corresponding row in
      workflow.plan_content. Plans with parseable structured content have separate
      rows for each section (overview, goals, phases, technical_notes).
      Verified via LEFT JOIN showing zero plans without content rows.

  - id: AC-3
    description: >-
      Content that cannot be parsed into structured sections is preserved in a 'raw'
      section row. Zero data loss — the concatenation of all section content_text values
      for a story/plan must contain all original content. Verified by spot-checking
      5 stories and 3 plans against their source data.

  - id: AC-4
    description: >-
      Cross-schema FK verification passes for all 4 schemas. A verification script
      checks every FK constraint in workflow, artifacts, knowledge, and telemetry schemas
      and confirms zero orphaned references. Results documented in a VERIFICATION.yaml
      artifact in _implementation/.

  - id: AC-5
    description: >-
      The story_dependencies self-referential FK in workflow.story_dependencies correctly
      resolves for all existing dependency relationships. The plan_dependencies
      self-referential FK in workflow.plan_dependencies correctly resolves for all existing
      plan dependency relationships. Verified via FK constraint validation queries.
