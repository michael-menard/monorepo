id: CDBN-1050
title: Create workflow Schema — DDL Tables, Constraints, Indexes, Drizzle
status: ready-to-work
priority: medium
phase: 1
feature: consolidate-db-normalized
goal: Create the workflow pgSchema and all workflow tables (DDL only, no data migration) as the structural foundation for the story and plan store
split_from: CDBN-1010
split_part: "1 of 2"
depends_on:
  - CDBN-0010
  - CDBN-0020
endpoints: []
infrastructure:
  - Aurora PostgreSQL migration file
  - Drizzle schema.ts update
risk_notes: >-
  High risk. This is the central hub schema. The story_state_history table consolidates 6 source tables
  (story_states, story_transitions, story_phase_history, story_assignments, story_blockers,
  story_metadata_versions) — the column design, event_type discriminator, and NULL constraints must be
  explicitly defined before the migration file is written. Self-referential FKs on story_dependencies
  (story_id and depends_on_story_id both referencing workflow.stories.story_id) require careful ordering
  in the DDL. Drizzle schema.ts must introduce pgSchema('workflow') — confirm all generated table
  references are fully qualified (workflow.stories not just stories). The wint cross-schema FK resolution
  strategy (drop-and-recreate vs. deferred) must be documented as a DECISION record in this story before
  implementation begins.
sizing_warning: false
created: '2026-03-11T23:30:00Z'
acceptance_criteria:
  - id: AC-1
    description: >-
      workflow pgSchema created: SQL migration file executes CREATE SCHEMA IF NOT EXISTS workflow
      and the schema appears in SELECT schema_name FROM information_schema.schemata WHERE schema_name = 'workflow'
      against lego_dev (port 5432).

  - id: AC-2
    description: >-
      workflow.stories table exists with correct columns and indexes: at minimum story_id (PK),
      feature, state, title, priority, created_at, updated_at columns; composite indexes on
      (feature, state) and (state, updated_at) created. Verified via information_schema.columns
      and pg_indexes queries.

  - id: AC-3
    description: >-
      workflow.story_dependencies table exists with a self-referential FK: both story_id and
      depends_on_story_id columns are present and each references workflow.stories.story_id.
      FK constraint names are documented. Verified via information_schema.referential_constraints.

  - id: AC-4
    description: >-
      workflow.story_state_history table exists with event_type discriminator column and FK to
      workflow.stories.story_id. Column list covers the merged schema from the 6 source tables
      (story_states, story_transitions, story_phase_history, story_assignments, story_blockers,
      story_metadata_versions). A DECISION record in _implementation/ documents the final column
      design and NULL constraints.

  - id: AC-5
    description: >-
      workflow.worktrees table exists with FK to workflow.stories.story_id. At minimum: worktree_id
      (PK), story_id (FK), branch_name, path, created_at columns. Verified via information_schema.columns.

  - id: AC-6
    description: >-
      workflow.workflow_executions table exists with an id (PK), story_id (FK to workflow.stories),
      status, started_at, completed_at columns at minimum. Verified via information_schema.columns.

  - id: AC-7
    description: >-
      workflow.workflow_checkpoints and workflow.workflow_audit_log tables exist, both with FK to
      workflow.workflow_executions.id. Verified via information_schema.referential_constraints.

  - id: AC-8
    description: >-
      Drizzle schema.ts exports a workflow schema object created with pgSchema('workflow') from
      drizzle-orm/pg-core, and all workflow table definitions (stories, story_dependencies,
      story_state_history, worktrees, workflow_executions, workflow_checkpoints, workflow_audit_log)
      are declared under this schema object. No existing table definitions are modified.

  - id: AC-9
    description: >-
      SQL verification query confirms all 7 workflow tables exist in information_schema.tables
      WHERE table_schema = 'workflow'. Query output must list: stories, story_dependencies,
      story_state_history, worktrees, workflow_executions, workflow_checkpoints, workflow_audit_log.

  - id: AC-10
    description: >-
      pnpm check-types passes with no new TypeScript errors after schema.ts update. No regressions
      to existing table definitions or imports in the knowledge-base package.

  - id: AC-11
    description: >-
      A DECISION record at `_implementation/DECISION-fk-resolution.md` documents the cross-schema
      FK resolution strategy (drop-and-recreate or DEFERRABLE) for `workflow.story_dependencies`
      before any SQL migration is written. The strategy must address: (1) whether self-referential
      FKs use DEFERRABLE INITIALLY DEFERRED, (2) how story_dependencies' FKs to workflow.stories
      are ordered relative to the parent table, (3) disposition of the 13 cross-schema FK violations
      from MANIFEST CDBN-0020 that downstream Phase 1 stories will inherit.
      (Added by autonomous elaboration — gap-1 resolution)

  - id: AC-12
    description: >-
      All verification queries execute against the knowledgebase DB at localhost:5433 (NOT lego_dev
      at port 5432). Connection string for manual verification:
      `PGPASSWORD=postgres psql -h localhost -p 5433 -d knowledgebase -U postgres`. The migration
      file `033_workflow_schema.sql` runs via `pnpm db:migrate` in `apps/api/knowledge-base/`.
      Type-check command: `pnpm check-types` run from `apps/api/knowledge-base/`.
      (Added by autonomous elaboration — gap-2 resolution, corrects factual error in AC-1 through AC-9)

  - id: AC-13
    description: >-
      All Drizzle export names for workflow schema tables use the `workflow` prefix to avoid collision
      with existing public-schema exports: `workflowStories`, `workflowStoryDependencies`,
      `workflowStoryStateHistory`, `workflowWorktrees`, `workflowExecutions`, `workflowCheckpoints`,
      `workflowAuditLog`. The existing `stories`, `storyDependencies` and other public-schema exports
      in schema.ts are NOT modified or renamed.
      (Added by autonomous elaboration — gap-3 resolution)
