gaps:
  - id: gap-1
    check: decision_completeness
    finding: >-
      Cross-schema FK resolution strategy (drop-and-recreate vs. deferred constraints) is
      explicitly required as a pre-implementation DECISION record in risk_notes but does not
      exist. Without this decision, the DDL for workflow.story_dependencies (AC-3) cannot be
      finalized — specifically whether the self-referential FK uses DEFERRABLE INITIALLY
      DEFERRED or if cross-schema migration ordering must be strictly sequenced. The MANIFEST
      (CDBN-0020) confirms 13 cross-schema FK violations that CDBN-1050's successor stories
      will need to resolve; the DDL written here creates the anchor point for that strategy.
      An implementer who writes the DDL without this decision may need to alter constraints
      in a later migration, creating technical debt in the migration chain.
    severity: high
    decision: add_ac
    ac_added: >-
      AC-11: A DECISION record at `_implementation/DECISION-fk-resolution.md` documents the
      cross-schema FK resolution strategy (drop-and-recreate or DEFERRABLE) for
      `workflow.story_dependencies` before any SQL migration is written. The strategy must
      address: (1) whether self-referential FKs use DEFERRABLE INITIALLY DEFERRED,
      (2) how story_dependencies' FKs to workflow.stories are ordered relative to the parent
      table, (3) disposition of the 13 cross-schema FK violations from MANIFEST CDBN-0020
      that downstream Phase 1 stories will inherit. (Added by autonomous elaboration)

  - id: gap-2
    check: internal_consistency
    finding: >-
      AC-1 states the verification target as "lego_dev (port 5432)" but the migration file
      must be written to apps/api/knowledge-base/src/db/migrations/ and executed against
      the knowledgebase DB at port 5433. This is a factual error in the AC text. An
      implementer following AC-1 literally would verify against the wrong database and
      conclude the migration succeeded when no workflow schema exists in the target DB.
      All verification queries in AC-1 through AC-9 inherit this ambiguity since they do
      not specify the target host/port.
    severity: high
    decision: add_ac
    ac_added: >-
      AC-12: All verification queries execute against the knowledgebase DB at localhost:5433
      (NOT lego_dev at port 5432). Connection string for manual verification:
      `PGPASSWORD=postgres psql -h localhost -p 5433 -d knowledgebase -U postgres`. The
      migration file `033_workflow_schema.sql` runs via `pnpm db:migrate` in
      `apps/api/knowledge-base/`. Type-check command: `pnpm check-types` run from
      `apps/api/knowledge-base/`. (Added by autonomous elaboration)

  - id: gap-3
    check: risk_disclosure
    finding: >-
      The Drizzle schema.ts export naming collision is undocumented. schema.ts currently
      exports `stories` (public schema, line 621). Adding `workflow.stories` via
      pgSchema('workflow') requires a different Drizzle export name (e.g., workflowStories).
      AC-8 says all 7 tables must be "declared under this schema object" but does not specify
      the export naming convention. If an implementer names the export `stories` (matching
      the table name), TypeScript will have a duplicate identifier collision at the module
      level. Similarly, `storyDependencies`, `worktrees` and other table names already exist
      or may collide. The AC must specify that all workflow schema exports must be prefixed
      with `workflow` (e.g., `workflowStories`, `workflowStoryDependencies`,
      `workflowWorktrees`, etc.).
    severity: high
    decision: add_ac
    ac_added: >-
      AC-13: All Drizzle export names for workflow schema tables use the `workflow` prefix to
      avoid collision with existing public-schema exports: `workflowStories`,
      `workflowStoryDependencies`, `workflowStoryStateHistory`, `workflowWorktrees`,
      `workflowExecutions`, `workflowCheckpoints`, `workflowAuditLog`. The existing `stories`,
      `storyDependencies` and other public-schema exports in schema.ts are NOT modified or
      renamed. (Added by autonomous elaboration)

