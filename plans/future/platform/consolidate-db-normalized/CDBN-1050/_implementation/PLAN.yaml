architectural_decisions:
  - id: ARCH-001
    question: >-
      Should self-referential FKs on workflow.story_dependencies use DEFERRABLE INITIALLY DEFERRED or standard
      non-deferred constraints?
    decision: DEFERRABLE INITIALLY DEFERRED
    rationale: >-
      Allows bulk inserts in Phase 2 data migration stories without topological ordering constraints. Supports circular
      dependency graphs. Constraint integrity preserved at transaction commit boundary.
    decided_by: user
  - id: ARCH-002
    question: What is the disposition of 13 cross-schema FK violations from CDBN-0020 MANIFEST?
    decision: Out of scope for CDBN-1050 — deferred to downstream stories CDBN-1020, CDBN-1030, CDBN-1040
    rationale: >-
      CDBN-1050 is DDL-only for the new workflow schema. The 13 violations are pre-existing in wint/analytics schemas
      referencing public.stories and are not introduced by this story.
    decided_by: user
complexity: moderate
e2e_gate: EXEMPT
e2e_exemption_reason: Infrastructure/DDL story — no HTTP endpoints, no Playwright tests required
notes:
  - >-
    ST-1 (DECISION record) is a prerequisite for ST-2/ST-3/ST-4 — do not write any SQL before DECISION-fk-resolution.md
    is written
  - All verification queries target localhost:5433 knowledgebase (NOT localhost:5432 lego_dev) — AC-12 correction
  - >-
    Migration file must include safety preamble: DO $$ BEGIN IF current_database() != 'knowledgebase' THEN RAISE
    EXCEPTION... per pattern in 025_structural_ddl_and_cross_schema_fk.sql
  - Migration file must be wrapped in BEGIN; ... COMMIT; transaction block
  - 'Next migration number is 033 (current highest: 032_compound_plan_type.sql)'
  - >-
    Drizzle export names must use workflow prefix (workflowStories not stories) to avoid collision with existing public
    schema exports — AC-13
  - >-
    story_state_history event_type CHECK constraint must enumerate all 6 values: state_change, transition, phase_change,
    assignment, blocker, metadata_version
  - >-
    ST-6 (schema.ts update) can proceed in parallel with ST-2 through ST-5 since it is TypeScript-only and does not
    depend on migration execution
  - ST-7 (db:migrate) depends on both SQL file completion (ST-5) and schema.ts update (ST-6) to ensure type consistency
