schema: 2
story_id: CDBN-0020
timestamp: '2026-03-11T21:30:00Z'
subtask_source: story
db_target_callout: >-
  TARGET DATABASE: lego_dev at port 5432. Do NOT query the knowledgebase DB (port 5433). The wint schema was dropped
  from port 5433 by CDTS-3020 — querying the wrong DB will return zero tables and produce an invalid manifest.
steps:
  - id: 1
    subtask_id: ST-1
    description: >-
      Enumerate all tables in the wint schema via information_schema by connecting to lego_dev at port 5432. Record
      total table count as the anchored baseline for the MANIFEST.
    files:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    files_to_read:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/story.yaml
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/_implementation/ELAB.yaml
    dependencies: []
    slice: backend
    verification: >-
      psql -h localhost -p 5432 -d lego_dev -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema =
      'wint';" — confirm count >= 38 and record exact number in MANIFEST
    acs_covered:
      - AC-2
      - AC-4
  - id: 2
    subtask_id: ST-2
    description: >-
      Produce FK edge map for all wint schema tables. Query information_schema.referential_constraints and
      key_column_usage to enumerate all foreign key relationships. Document any FK violations or undocumented
      cross-schema constraints.
    files:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    files_to_read: []
    dependencies:
      - 1
    slice: backend
    verification: >-
      psql -h localhost -p 5432 -d lego_dev -c "SELECT tc.table_name, kcu.column_name, ccu.table_name AS
      foreign_table_name, ccu.column_name AS foreign_column_name FROM information_schema.table_constraints AS tc JOIN
      information_schema.key_column_usage AS kcu ON tc.constraint_name = kcu.constraint_name JOIN
      information_schema.constraint_column_usage AS ccu ON ccu.constraint_name = tc.constraint_name WHERE
      tc.constraint_type = 'FOREIGN KEY' AND tc.table_schema = 'wint';" — verify all FK edges are captured in MANIFEST
      fk_violations section
    acs_covered:
      - AC-3
      - AC-4
  - id: 3
    subtask_id: ST-3
    description: >-
      Document column definitions (name, data type, nullable, default) for all wint tables targeted for migration. Use
      information_schema.columns. Record column_count per table in MANIFEST.
    files:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    files_to_read: []
    dependencies:
      - 1
    slice: backend
    verification: >-
      psql -h localhost -p 5432 -d lego_dev -c "SELECT table_name, COUNT(*) as column_count FROM
      information_schema.columns WHERE table_schema = 'wint' GROUP BY table_name ORDER BY table_name;" — verify each
      table row in MANIFEST has accurate column_count
    acs_covered:
      - AC-4
  - id: 4
    subtask_id: ST-4
    description: >-
      Identify deduplication conflicts in artifact tables (e.g., rows with duplicate (story_id, artifact_type, phase)
      composites). Document the deduplication_strategy field in MANIFEST. This decision gates CDBN-1020.
    files:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    files_to_read: []
    dependencies:
      - 3
    slice: backend
    verification: >-
      psql -h localhost -p 5432 -d lego_dev -c "SELECT story_id, artifact_type, phase, COUNT(*) FROM
      wint.story_artifacts GROUP BY story_id, artifact_type, phase HAVING COUNT(*) > 1;" — record whether duplicates
      exist and proposed deduplication_strategy in MANIFEST
    acs_covered:
      - AC-3
      - AC-4
  - id: 5
    subtask_id: ST-5
    description: >-
      Flag live-usage tables. Identify context_packs and context_sessions as live_usage=true in MANIFEST. These tables
      are actively queried by running MCP context cache tools and must not be broken during migration (per CDBN-1030
      risk).
    files:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    files_to_read: []
    dependencies:
      - 1
    slice: backend
    verification: >-
      psql -h localhost -p 5432 -d lego_dev -c "SELECT table_name FROM information_schema.tables WHERE table_schema =
      'wint' AND table_name IN ('context_packs', 'context_sessions');" — confirm both tables exist; verify MANIFEST
      shows live_usage=true for both
    acs_covered:
      - AC-3
      - AC-4
  - id: 6
    subtask_id: ST-6
    description: >-
      Synthesize all findings into MANIFEST.yaml written to the story directory. MANIFEST must include all required
      columns: schema_name, table_name, row_count, column_count, has_pk, has_fk, fk_violations, live_usage,
      migration_action, dedup_strategy, notes. Record source_database=lego_dev and source_port=5432 in MANIFEST header.
      Must be machine-readable YAML for ingestion by CDBN-2010.
    files:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    files_to_read:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/story.yaml
    dependencies:
      - 2
      - 3
      - 4
      - 5
    slice: backend
    verification: >-
      Manually verify MANIFEST.yaml contains: (a) source_database and source_port header fields, (b)
      deduplication_strategy for artifact tables, (c) live_usage=true for context_packs and context_sessions, (d)
      fk_violations section, (e) row_count for every table
    acs_covered:
      - AC-1
      - AC-2
      - AC-3
  - id: 7
    subtask_id: ST-7
    description: >-
      Write re-runnable verification SQL queries as a dedicated section in MANIFEST.yaml. Queries must include: (1)
      anchored table count assertion (SELECT COUNT(*) = N), (2) per-table row counts, (3) FK constraint enumeration, (4)
      duplicate artifact detection. These allow any reviewer to independently re-verify the manifest against
      lego_dev:5432.
    files:
      - plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    files_to_read: []
    dependencies:
      - 6
    slice: backend
    verification: >-
      Execute each verification SQL block from the MANIFEST against lego_dev:5432 and confirm results match the recorded
      counts. All SQL must be copy-pasteable without modification.
    acs_covered:
      - AC-1
      - AC-4
files_to_change:
  - path: plans/future/platform/consolidate-db-normalized/CDBN-0020/MANIFEST.yaml
    action: create
    reason: Primary deliverable — migration manifest of live wint schema data produced by DB audit (ACs 1-4)
commands_to_run:
  - command: >-
      psql -h localhost -p 5432 -d lego_dev -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema =
      'wint';"
    when: 'ST-1: first step — anchor table count'
    required: true
  - command: psql -h localhost -p 5432 -d lego_dev -f verification.sql
    when: 'ST-7: after MANIFEST is written — run verification SQL block end-to-end'
    required: true
acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: >-
      MANIFEST.yaml exists in story directory with complete sections: Acceptance Criteria, Non-Goals, Subtasks (ST-1
      through ST-7), and Local Testing Plan (verification SQL)
    evidence_type: file
  - ac_id: AC-2
    planned_evidence: >-
      MANIFEST.yaml header declares source_database=lego_dev and source_port=5432; story callout present stating 'Do NOT
      query the knowledgebase DB (port 5433)'
    evidence_type: file
  - ac_id: AC-3
    planned_evidence: >-
      MANIFEST.yaml includes: (a) deduplication_strategy field for artifact tables, (b) live_usage=true for
      context_packs and context_sessions, (c) fk_violations section documenting all FK constraints and undocumented
      dependencies found
    evidence_type: file
  - ac_id: AC-4
    planned_evidence: >-
      MANIFEST.yaml verification_plan section contains SQL commands, anchored table count assertion, per-table row
      counts, and copy-pasteable re-runnable verification SQL
    evidence_type: file
architectural_decisions: []
complexity: moderate
notes:
  - This is a read-only DB audit story — no TypeScript or application code is changed.
  - >-
    All SQL targets lego_dev at port 5432. Querying knowledgebase DB (port 5433) will return zero wint tables because
    CDTS-3020 already dropped the wint schema from that DB.
  - >-
    MANIFEST.yaml is the sole deliverable. It must be machine-readable YAML for ingestion by CDBN-2010 and other Phase 2
    stories.
  - >-
    Steps 2, 3, and 5 can be executed in parallel (all depend only on ST-1). Steps are presented sequentially for
    clarity but parallelism is possible.
  - >-
    deduplication_strategy in ST-4 gates CDBN-1020 design. This must be decided and recorded before Phase 1
    implementation begins.
  - >-
    live_usage=true classification in ST-5 gates CDBN-1030. context_packs and context_sessions must not be dropped or
    truncated during migration.
  - >-
    No pnpm build or pnpm test commands apply — this is a SQL audit story. Verification is SQL execution against
    lego_dev:5432.
  - >-
    MANIFEST should record row counts from pg_stat_user_tables (or SELECT COUNT(*) per table) to provide a
    post-migration baseline for CDBN-2010.
