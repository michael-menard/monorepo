lessons_to_record:
  - lesson: >-
      For DB audit stories, SQL verification queries (anchored count + per-table row counts) serve as an effective E2E
      equivalent, making the audit independently verifiable by any reviewer with DB access.
    category: pattern
    tags:
      - db-audit
      - verification
      - qa
  - lesson: >-
      Cross-schema FK violations are a significant migration risk in normalized DB consolidation. wint.stories is the
      anchor table for 11 inbound cross-schema FK constraints from artifacts.* and kbar schemas — it must be migrated
      first in any Phase 1 plan.
    category: pattern
    tags:
      - db-migration
      - fk-constraints
      - migration-order
  - lesson: >-
      When documenting deduplication strategies for audit stories, always inspect the actual column schema — PLAN.yaml
      assumed a (story_id, artifact_type, phase) composite key for wint.story_artifacts but the table has no phase
      column. Direct column inspection corrected the strategy.
    category: blocker
    tags:
      - deduplication
      - schema-inspection
      - audit
