      strategy: keep_latest_by_updated_at
      rationale: >-
        wint.story_artifacts does NOT have a phase column (unlike artifacts.* schema tables
        which are separated by type). Deduplication key is (story_id, artifact_type).
        Strategy: on conflict, keep the row with the most recent updated_at timestamp.
        No duplicates exist in current data — this strategy applies only if duplicates
        appear mid-migration.
  current_duplicate_count: 0
  duplicate_check_result: CLEAN

