# ============================================================================
# FK VIOLATIONS (AC-3)
# Cross-schema FK dependencies that complicate clean schema migration
# ============================================================================
fk_violations:
  outbound_cross_schema:
    description: >-
      FK constraints in wint schema that reference tables OUTSIDE wint.
      These are undocumented cross-schema dependencies discovered during this audit.
    violations:
      - table: wint.story_dependencies
        column: story_id
        references: kbar.stories(id)
        constraint_name: story_dependencies_story_id_stories_id_fk
        severity: HIGH
        migration_note: >-
          Must coordinate wint and kbar migration order or replace constraint
          with a reference to the consolidated stories table.

      - table: wint.story_dependencies
        column: depends_on_story_id
        references: kbar.stories(id)
        constraint_name: story_dependencies_depends_on_story_id_stories_id_fk
        severity: HIGH
        migration_note: >-
          Same table, second FK column also pointing to kbar. Both FK constraints
          must be resolved together.

      - table: wint.story_states
        column: story_id
        references: kbar.stories(id)
        constraint_name: story_states_story_id_stories_id_fk
        severity: HIGH
        migration_note: >-
          4 live rows in story_states reference kbar.stories. Cannot migrate
          wint.story_states without first migrating or aliasing kbar.stories.

  inbound_cross_schema:
    description: >-
      FK constraints from OTHER schemas that reference wint tables.
      These are inbound dependencies: wint tables cannot be dropped without
      first dropping or migrating these constraints.
    violations:
      - referencing_schema: artifacts
        referencing_table: checkpoint_artifacts
        column: story_id
        references: wint.stories(id)
        constraint_name: checkpoint_artifacts_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: artifacts
        referencing_table: evidence_artifacts
        column: story_id
        references: wint.stories(id)
        constraint_name: evidence_artifacts_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: artifacts
        referencing_table: plan_artifacts
        column: story_id
        references: wint.stories(id)
        constraint_name: plan_artifacts_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: artifacts
        referencing_table: qa_verify_artifacts
        column: story_id
        references: wint.stories(id)
        constraint_name: qa_verify_artifacts_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: artifacts
        referencing_table: review_artifacts
        column: story_id
        references: wint.stories(id)
        constraint_name: review_artifacts_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: artifacts
        referencing_table: scope_artifacts
        column: story_id
        references: wint.stories(id)
        constraint_name: scope_artifacts_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: artifacts
        referencing_table: story_artifacts
        column: story_id
        references: wint.stories(id)
        constraint_name: story_artifacts_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: kbar
        referencing_table: story_dependencies
        column: story_id
        references: wint.stories(id)
        constraint_name: story_dependencies_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: kbar
        referencing_table: story_dependencies
        column: depends_on_story_id
        references: wint.stories(id)
        constraint_name: story_dependencies_depends_on_story_id_stories_id_fk
        severity: HIGH

      - referencing_schema: kbar
        referencing_table: story_states
        column: story_id
        references: wint.stories(id)
        constraint_name: story_states_story_id_stories_id_fk
        severity: HIGH

  summary:
    outbound_violations_count: 3
    inbound_violations_count: 10
    total_violations: 13
    blocking_tables:
      - wint.stories
        # Cannot be migrated/dropped without coordinating with artifacts.* and kbar.* schema migrations
    recommendation: >-
      Migration order must be: (1) migrate wint.stories to consolidated schema first,
      (2) update all FK constraints in artifacts.* and kbar.* schemas to point to new
      consolidated stories table, (3) migrate remaining wint tables,
      (4) drop wint.story_dependencies and wint.story_states cross-schema FKs after
      kbar migration completes.

