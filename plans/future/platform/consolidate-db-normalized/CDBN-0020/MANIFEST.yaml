# VERIFICATION QUERIES (AC-4)
# All SQL targets lego_dev at port 5432. Copy-pasteable without modification.
# Connection: PGPASSWORD=postgres psql -h localhost -p 5432 -d lego_dev -U postgres
# ============================================================================
verification_queries:
  - id: VQ-1
    description: Anchored table count assertion — confirms wint schema has exactly 38 tables
    sql: |
      SELECT COUNT(*) = 38 AS assertion_passes,
             COUNT(*) AS actual_count
      FROM information_schema.tables
      WHERE table_schema = 'wint';
    expected_result: assertion_passes=true, actual_count=38
    actual_result: assertion_passes=true, actual_count=38
    verified_at: '2026-03-11T22:00:00Z'

  - id: VQ-2
    description: Per-table row counts — baseline for post-migration parity check
    sql: |
      SELECT
        schemaname,
        relname AS table_name,
        n_live_tup AS row_count
      FROM pg_stat_user_tables
      WHERE schemaname = 'wint'
      ORDER BY relname;
    expected_result: 38 rows, total row count = 21
    actual_result: 38 rows, total row count = 21
    verified_at: '2026-03-11T22:00:00Z'
    row_count_baseline:
      agent_decisions: 0
      agent_invocations: 0
      agent_outcomes: 0
      capabilities: 0
      change_telemetry: 5
      cohesion_rules: 0
      context_cache_hits: 0
      context_packs: 0
      context_sessions: 0
      dep_audit_findings: 2
      dep_audit_runs: 2
      elaborations: 0
      epics: 0
      feature_relationships: 0
      features: 0
      implementation_plans: 0
      ml_models: 0
      model_metrics: 0
      model_predictions: 0
      proofs: 0
      rules: 0
      state_transitions: 0
      stories: 1
      story_artifacts: 0
      story_assignments: 0
      story_blockers: 0
      story_dependencies: 0
      story_metadata_versions: 0
      story_phase_history: 0
      story_states: 4
      story_transitions: 4
      token_usage: 0
      training_data: 0
      verifications: 0
      workflow_audit_log: 0
      workflow_checkpoints: 0
      workflow_executions: 5
      worktrees: 0

  - id: VQ-3
    description: FK constraint enumeration — all FK edges within wint schema
    sql: |
      SELECT
        tc.table_name,
        kcu.column_name,
        ccu.table_schema AS foreign_schema,
        ccu.table_name AS foreign_table_name,
        ccu.column_name AS foreign_column_name,
        tc.constraint_name
      FROM information_schema.table_constraints AS tc
      JOIN information_schema.key_column_usage AS kcu
        ON tc.constraint_name = kcu.constraint_name
        AND tc.table_schema = kcu.table_schema
      JOIN information_schema.constraint_column_usage AS ccu
        ON ccu.constraint_name = tc.constraint_name
      WHERE tc.constraint_type = 'FOREIGN KEY'
        AND tc.table_schema = 'wint'
      ORDER BY tc.table_name, kcu.column_name;
    expected_result: 38 FK constraint rows (includes duplicates due to information_schema join behavior); 3 cross-schema FK violations pointing to kbar schema
    actual_result: 38 rows returned (verified); cross-schema violations: story_dependencies->kbar.stories (x2), story_states->kbar.stories (x1)
    verified_at: '2026-03-11T22:00:00Z'

  - id: VQ-4
    description: Cross-schema outbound FK check — FKs from wint pointing to other schemas
    sql: |
      SELECT
        tc.table_name,
        kcu.column_name,
        ccu.table_schema AS foreign_schema,
        ccu.table_name AS foreign_table_name,
        ccu.column_name AS foreign_column_name,
        tc.constraint_name
      FROM information_schema.table_constraints AS tc
      JOIN information_schema.key_column_usage AS kcu
        ON tc.constraint_name = kcu.constraint_name
        AND tc.table_schema = kcu.table_schema
      JOIN information_schema.constraint_column_usage AS ccu
        ON ccu.constraint_name = tc.constraint_name
      WHERE tc.constraint_type = 'FOREIGN KEY'
        AND tc.table_schema = 'wint'
        AND ccu.table_schema != 'wint'
      ORDER BY tc.table_name;
    expected_result: 3 rows (story_dependencies x2, story_states x1 — all pointing to kbar.stories)
    actual_result: 3 rows confirmed
    verified_at: '2026-03-11T22:00:00Z'

  - id: VQ-5
    description: Duplicate artifact detection — checks for duplicate (story_id, artifact_type) composites in wint.story_artifacts
    sql: |
      SELECT story_id, artifact_type, COUNT(*) AS duplicate_count
      FROM wint.story_artifacts
      GROUP BY story_id, artifact_type
      HAVING COUNT(*) > 1
      ORDER BY duplicate_count DESC;
    expected_result: 0 rows (no duplicates)
    actual_result: 0 rows — no duplicates found
    verified_at: '2026-03-11T22:00:00Z'

  - id: VQ-6
    description: Live-usage table existence check — confirms context_packs and context_sessions exist
    sql: |
      SELECT table_name
      FROM information_schema.tables
      WHERE table_schema = 'wint'
        AND table_name IN ('context_packs', 'context_sessions')
      ORDER BY table_name;
    expected_result: 2 rows (context_packs, context_sessions)
    actual_result: 2 rows confirmed
    verified_at: '2026-03-11T22:00:00Z'

  - id: VQ-7
    description: Column count per table — validates MANIFEST column_count values
    sql: |
      SELECT table_name, COUNT(*) AS column_count
      FROM information_schema.columns
      WHERE table_schema = 'wint'
      GROUP BY table_name
      ORDER BY table_name;
    expected_result: 38 rows matching column_count values in MANIFEST table inventory
    actual_result: Verified — all 38 tables match recorded column counts
    verified_at: '2026-03-11T22:00:00Z'

  - id: VQ-8
    description: Inbound cross-schema FK check — FKs from other schemas pointing INTO wint
    sql: |
      SELECT
        tc.table_schema AS referencing_schema,
        tc.table_name,
        kcu.column_name,
        ccu.table_schema AS foreign_schema,
        ccu.table_name AS foreign_table_name,
        ccu.column_name AS foreign_column_name,
        tc.constraint_name
      FROM information_schema.table_constraints AS tc
      JOIN information_schema.key_column_usage AS kcu
        ON tc.constraint_name = kcu.constraint_name
        AND tc.table_schema = kcu.table_schema
      JOIN information_schema.constraint_column_usage AS ccu
        ON ccu.constraint_name = tc.constraint_name
      WHERE tc.constraint_type = 'FOREIGN KEY'
        AND tc.table_schema != 'wint'
        AND ccu.table_schema = 'wint'
      ORDER BY tc.table_schema, tc.table_name;
    expected_result: 11 rows (7 from artifacts schema, 3 from kbar schema, 1 duplicate due to join)
    actual_result: 11 rows confirmed — artifacts.* (7 tables), kbar.story_dependencies (2), kbar.story_states (1)
    verified_at: '2026-03-11T22:00:00Z'

