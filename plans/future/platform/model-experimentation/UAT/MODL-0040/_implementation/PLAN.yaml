    planned_evidence: "Unit test: value_score = avg_quality / avg_cost_usd when cost > 0; value_score = avg_quality when cost_usd === 0 (Ollama); capped at 9999999.99"
    evidence_type: test

  - ac_id: "AC-4"
    planned_evidence: "Unit test: 5 runs → exploring; 25 runs with quality_gap >= 5.0 and best_model_runs >= 10 → converged (confidence: 0.95); single-model task >= 20 runs → converged; boundary 19 vs 20 runs"
    evidence_type: test

  - ac_id: "AC-5"
    planned_evidence: "Unit test: 5 low-quality runs after baseline → quality_trend === 'degrading' and logger.warn called once; exactly 10.0% drop → stable; 10.01% → degrading"
    evidence_type: test

  - ac_id: "AC-6"
    planned_evidence: "Unit test: loadLeaderboard returns empty leaderboard when file absent (no error); integration test: write 3 runs, reload, data round-trips; no orphaned .tmp files after write"
    evidence_type: test

  - ac_id: "AC-7"
    planned_evidence: "Unit test: generateSummaryReport sorted by value_score desc; generateByTaskReport filters to task; generateByModelReport filters to model; empty state returns message; CONVERGED (95%) display format; [ALERT] prefix for degrading"
    evidence_type: test

  - ac_id: "AC-8"
    planned_evidence: "File .claude/commands/model-leaderboard.md exists; contains MODEL_LEADERBOARD_PATH env var reference; documents --task TASK_ID and --model MODEL_NAME arguments"
    evidence_type: file

  - ac_id: "AC-9"
    planned_evidence: "pnpm test coverage for src/model-selector/ >= 80%; all computation functions tested in isolation (pure functions, no filesystem); logger mocked with vi.mock"
    evidence_type: command

  - ac_id: "AC-10"
    planned_evidence: "Integration test: write→reload→update→reload cycle; both task entries present after sequential writes; LeaderboardSchema.safeParse(loaded).success === true; no .tmp files in tmpdir after write"
    evidence_type: test

architectural_decisions: []

complexity: moderate

notes:
  - "ST-5 (reports.ts) is parallelizable with ST-2/3/4 (both depend only on ST-1 schema). PLAN.yaml encodes ST-5 dependency as [1] to reflect this — executor may run ST-5 concurrently with ST-2 if desired."
  - "Circular import guard: leaderboard.ts imports ONLY from models/__types__/quality-evaluation.ts (type-only import). Never import from models/quality-evaluator.ts."
  - "Atomic write pattern (copy from yaml-artifact-writer.ts): getTempFilePath uses Math.random().toString(36).substring(2,10); fs.writeFile to temp; fs.rename to target."
  - "Value score JSDoc must document zero-cost rationale: 'When avg_cost_usd === 0 (Ollama zero-cost sentinel), value_score = avg_quality to avoid division-by-zero and preserve ranking.'"
  - "Convergence algorithm TODO comment required in code: 'TODO: Upgrade to Wilson score interval when >= 5 models have run.'"
  - "No new npm packages required — yaml, zod, @repo/logger, fs/promises, os, vitest all already in orchestrator deps."
  - "MODL-0030 (Quality Evaluator) dependency is in UAT — verify QualityEvaluation schema has not changed before starting ST-1."
  - "model-selector/ directory does not exist yet — ST-1 creates it via file creation."
