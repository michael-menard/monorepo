acceptance_criteria_map:
  - ac_id: "AC-1"
    planned_evidence: "TypeScript compilation: RunRecordSchema.extend(), LeaderboardEntrySchema, LeaderboardSchema pass check-types; all required fields present including recent_run_scores"
    evidence_type: command

