entries:
  # --- Non-Blocking Gaps (Edge Cases) ---

  - id: gap-1
    category: edge-case
    tags: [edge-case, future-work, model-experimentation]
    finding: >
      Rolling window with fewer than 5 runs — trend computed over 1–4 samples may be statistically
      noisy and produce false 'degrading' signals early in a model's run history.
    impact: Medium
    effort: Low
    recommendation: >
      Track recent_run_scores.length in degradation log output so operators can assess confidence.
      Consider requiring a minimum of 3 runs in the window before computing trend (add
      'if (recent_run_scores.length < 3) return stable' guard).

  - id: gap-2
    category: edge-case
    tags: [edge-case, future-work, observability, model-experimentation]
    finding: >
      quality_trend never recovers from 'degrading' to 'stable' after the model improves unless
      the recent_run_scores window flushes through with good scores — there is no explicit
      'recovery' signal.
    impact: Low
    effort: Low
    recommendation: >
      Add a logger.info event 'quality_recovery' when trend transitions from 'degrading' to
      'stable' or 'improving'. Mirrors the existing quality_degradation alert pattern.

  - id: gap-3
    category: performance
    tags: [performance, optimization, future-work, model-experimentation]
    finding: >
      YAML float precision drift: avg_quality, avg_cost_usd, avg_latency_ms stored as floats may
      accumulate rounding errors across many write/reload cycles.
    impact: Low
    effort: Medium
    recommendation: >
      After a configurable run count (e.g., 1000 runs), consider recomputing averages from raw
      recent data rather than incrementally. Low priority for MVP since the leaderboard is scoped
      to experimentation runs, not production-scale volumes.

  - id: gap-4
    category: edge-case
    tags: [edge-case, future-work, model-experimentation]
    finding: >
      No validation that leaderboardPath directory exists before write — loadLeaderboard on a
      non-existent directory will fail at fs.readFile with ENOENT, but saveLeaderboard will fail
      at fs.rename if the parent directory does not exist.
    impact: Low
    effort: Low
    recommendation: >
      Add a mkdir -p equivalent before the temp-file write in saveLeaderboard, mirroring the
      ensureDirectory pattern in yaml-artifact-writer.ts. Low risk since the CLI command sets
      the path via env var, but defensive coding would improve robustness.

  - id: gap-5
    category: edge-case
    tags: [edge-case, future-work, model-experimentation]
    finding: >
      Single-model task convergence: a task where only one model has ever been tried is declared
      'converged' after 20 runs. This may be misleading — there is no competition evidence.
    impact: Low
    effort: Low
    recommendation: >
      Add a single_model_convergence: true flag or change the convergence rationale string to
      indicate 'no competition observed' to help operators distinguish between legitimate
      convergence (best model found among multiple) and trivial convergence (only one model tried).

  # --- Enhancement Opportunities ---

  - id: enhancement-1
    category: performance
    tags: [performance, future-work, model-experimentation, statistics]
    finding: >
      Convergence algorithm upgrade: the simplified gap heuristic should be upgraded to Wilson
      score confidence interval for statistically principled convergence detection. The story
      already documents a TODO comment for this upgrade.
    impact: High
    effort: Medium
    recommendation: >
      Implement as part of LERN epic or a follow-up MODL story when 5 or more models have
      accumulated real run data to validate the algorithm.

  - id: enhancement-2
    category: observability
    tags: [observability, monitoring, model-experimentation]
    finding: >
      Convergence transition events are not emitted — operators cannot track when the system
      identifies winning models (exploring → converging → converged transitions).
    impact: Medium
    effort: Low
    recommendation: >
      Add convergence transition detection in recordRun: compare previous convergence_status to
      updated status; if changed, emit logger.info('leaderboard', { event: 'convergence_transition',
      old_status, new_status, task_id, model, confidence }).

  - id: enhancement-3
    category: ux-polish
    tags: [ux-polish, enhancement, model-experimentation]
    finding: >
      Report column alignment — markdown table reports may have misaligned columns when model
      names or task IDs are long. Current audience is developers using CLI, not end users.
    impact: Low
    effort: Low
    recommendation: >
      Implement a padColumn(value, width) utility in reports.ts. Low priority for MVP.

  - id: enhancement-4
    category: integration
    tags: [integration, future-work, model-experimentation, lern-epic]
    finding: >
      No programmatic filter API — LERN/SDLC epics will need to query leaderboard data without
      generating a string report. filterLeaderboard({ taskId?, model?, provider? }): LeaderboardEntry[]
      is not exported from the current module design.
    impact: Medium
    effort: Low
    recommendation: >
      Add filterLeaderboard as a named export in leaderboard.ts. The seed's Patterns to Follow
      section already describes this function signature.

  - id: enhancement-5
    category: integration
    tags: [integration, future-work, model-experimentation, infra-epic, postgres]
    finding: >
      Postgres persistence migration — the leaderboard module has no abstraction layer between
      the recordRun public API and the YAML storage implementation. When the INFRA epic delivers
      a Postgres adapter, migration will require significant refactoring.
    impact: High
    effort: High
    recommendation: >
      Create a LeaderboardStorage interface that leaderboard.ts implements via YAML. Future INFRA
      story can add a Postgres implementation. Defer until INFRA epic scope is defined.

  - id: enhancement-6
    category: performance
    tags: [performance, future-work, model-experimentation, concurrency]
    finding: >
      Leaderboard file lock contention — if future callers invoke recordRun from multiple
      concurrent Node processes (e.g., parallel LangGraph node runs), the atomic rename pattern
      prevents corruption but can lose writes (last-writer-wins).
    impact: Medium
    effort: High
    recommendation: >
      Implement a file-based advisory lock (lockfile pattern) or migrate to a queue-based write
      pattern. Deferred since Non-goals explicitly states 'Multi-process concurrent writes' are
      out of scope for MVP.

  - id: enhancement-7
    category: observability
    tags: [observability, monitoring, model-experimentation, analytics]
    finding: >
      Only avg_latency_ms is tracked — p50 and p95 percentile latencies would give better tail
      latency visibility. A recent_latencies rolling array (like recent_run_scores) would enable
      percentile computation without storing all historical data.
    impact: Medium
    effort: Low
    recommendation: >
      Add recent_latency_ms: z.array(z.number()).max(5) field to LeaderboardEntrySchema in a
      follow-up MODL story.

  - id: enhancement-8
    category: ux-polish
    tags: [ux-polish, enhancement, model-experimentation, cli, dev-tools]
    finding: >
      The model-leaderboard.md slash command is read-only. A companion model-leaderboard-inject.md
      command for injecting test RunRecord data for local development without running actual model
      calls would improve developer experience.
    impact: Low
    effort: Low
    recommendation: >
      Create in a follow-up story or as a dev-tools task once the leaderboard module is stable.
