    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/orchestrator/src/model-selector/__tests__/leaderboard.test.ts"
        description: "Tests: 'should compute value_score correctly' (80/0.002=40000), 'should use avg_quality as value_score when cost_usd === 0 (Ollama)' (65.0), 'should cap value_score at 9999999.99' (very high quality/very low cost). All pass."

  - ac_id: "AC-4"
    ac_text: "Convergence algorithm: exploring/converging/converged with confidence. 5 runs → exploring; 20 runs with gap>=5 and best_runs>=10 → converged (0.95); single-model >=20 → converged; boundary 19 vs 20"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/orchestrator/src/model-selector/__tests__/leaderboard.test.ts"
        description: "8 convergence tests: boundary 19 vs 20 runs, single-model >= 20, gap < 5.0 stays converging, best_model_runs < 10 stays converging, converged at 25 runs + gap >= 5 + best_runs >= 10. All pass."

  - ac_id: "AC-5"
    ac_text: "quality_trend rolling window (degrading/stable/improving); logger.warn on degradation flip; exactly 10.0% drop → stable; 10.01% → degrading"
    status: PASS
    evidence_items:
