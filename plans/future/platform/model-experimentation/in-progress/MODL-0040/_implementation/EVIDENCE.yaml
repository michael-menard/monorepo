        path: "packages/backend/orchestrator/src/model-selector/__tests__/leaderboard.test.ts"
        description: "Tests: boundary stable at exactly 10.0% drop, degrading at 10.01%, improving when avg > baseline, logger.warn called on first degradation flip, no repeat warning when already degrading. All pass."

  - ac_id: "AC-6"
