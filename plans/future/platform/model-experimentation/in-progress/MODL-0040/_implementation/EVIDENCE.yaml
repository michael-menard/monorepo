      - type: test
        path: "packages/backend/orchestrator/src/model-selector/__tests__/reports.test.ts"
        description: "23 unit tests for all 3 report generators. Pure functions — no filesystem. All 23 pass."
      - type: command
        command: "pnpm --filter @repo/orchestrator test -- model-selector"
        result: "PASS"
        description: "71 tests across 3 test files. All pass in both worktree and main repo."

  - ac_id: "AC-10"
    ac_text: "Integration test: write→reload→update→reload cycle; both task entries present; LeaderboardSchema.safeParse success; no .tmp files after write"
    status: PASS
    evidence_items:
