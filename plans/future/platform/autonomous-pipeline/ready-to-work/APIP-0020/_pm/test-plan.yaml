strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  infra_touched: true
  notes: >
    APIP-0020 is a headless TypeScript supervisor process. No HTTP routes.
    No UI. No Aurora DB writes from supervisor. BullMQ state in Redis only.
    Playwright/E2E tests not applicable (ADR-006 E2E requirement does not apply — no frontend).

happy_path_tests:
  - id: HP-1
    title: "Elaboration job routes to runElaboration() and completes"
    setup: "Mock runElaboration() to return successful ElaborationResult; enqueue job with stage: 'elaboration', storyId: 'TEST-001', attemptNumber: 1"
    action: "Supervisor Worker processes job"
    expected: "runElaboration() called with storyId and config; BullMQ job transitions to completed; structured log event 'completed' emitted with storyId, stage, threadId, durationMs"
    evidence: "Mock spy on runElaboration() asserts single call; job.getState() === 'completed'; logger.info called with event:'completed'"

  - id: HP-2
    title: "Story-creation job routes to createStoryCreationGraph() and completes"
    setup: "Mock story-creation graph dispatch to return success; enqueue job with stage: 'story-creation', storyId: 'TEST-002', attemptNumber: 1"
    action: "Supervisor Worker processes job"
    expected: "Story-creation graph dispatch called; BullMQ job transitions to completed; log event 'completed' emitted"
    evidence: "Mock spy asserts dispatch to story-creation graph; job.getState() === 'completed'"

  - id: HP-3
    title: "Thread ID convention applied correctly before dispatch"
    setup: "Enqueue job with storyId: 'APIP-001', stage: 'elaboration', attemptNumber: 2"
    action: "Supervisor processes job"
    expected: "Logger receives structured event with threadId: 'APIP-001:elaboration:2' on job_received and dispatching events"
    evidence: "logger.info spy captures threadId field matching '{storyId}:{stage}:{attemptNumber}' pattern"

  - id: HP-4
    title: "Graceful shutdown stops Worker without dropping active job"
    setup: "Supervisor start() is called; supervisor.stop() triggered while no active job"
    action: "stop() is called"
    expected: "BullMQ Worker closes gracefully; no jobs lost; process exits without error"
    evidence: "worker.close() called; no unhandled promise rejections"

error_cases:
  - id: EC-1
    title: "Wall clock timeout fires — job marked failed with wall_clock_timeout reason"
    setup: "Mock runElaboration() to hang (never resolve); set stageTimeoutMs to 100ms; enqueue elaboration job"
    action: "Supervisor processes job — timeout fires before graph completes"
    expected: "Promise.race() timeout branch fires; BullMQ job marked failed with reason 'wall_clock_timeout'; log event 'timeout' with threadId, storyId, stage, durationMs"
    evidence: "job.getState() === 'failed'; job.failedReason includes 'wall_clock_timeout'; logger.error spy captures event:'timeout'"

  - id: EC-2
    title: "PERMANENT error classification — immediate BullMQ failure, no retry"
    setup: "Mock runElaboration() to throw error classified as PERMANENT (e.g., ErrorCategory.PERMANENT); enqueue elaboration job"
    action: "Supervisor processes job — graph throws PERMANENT error"
    expected: "isRetryableNodeError() returns false; BullMQ job immediately fails without adding to retry queue; log event 'failed' with error category"
    evidence: "job.getState() === 'failed'; job has 0 retry attempts remaining; logger.error captures event:'failed', errorCategory:'PERMANENT'"

  - id: EC-3
    title: "TRANSIENT error classification — BullMQ job retried"
    setup: "Mock runElaboration() to throw error classified as TRANSIENT; queue configured with maxAttempts: 3; enqueue elaboration job"
    action: "Supervisor processes job — graph throws TRANSIENT error on first attempt"
    expected: "isRetryableNodeError() returns true; BullMQ job moves to retry/delayed state; attempt counter increments; job not immediately failed"
    evidence: "job.attemptsMade incremented; job.getState() === 'delayed' or 'waiting-children'"

  - id: EC-4
    title: "Circuit breaker OPEN — new jobs for that stage rejected and re-queued as delayed"
    setup: "Configure NodeCircuitBreaker for elaboration graph with threshold of 2 failures; enqueue and fail 2 elaboration jobs; circuit trips to OPEN; enqueue a new elaboration job"
    action: "Supervisor attempts to process new elaboration job while circuit is OPEN"
    expected: "Supervisor detects OPEN circuit; job re-queued as delayed (not failed); log event 'circuit_open' with storyId, stage, threadId"
    evidence: "job.getState() === 'delayed'; logger.warn captures event:'circuit_open'"

  - id: EC-5
    title: "Unknown stage in job payload — job fails with Zod validation error"
    setup: "Enqueue job with stage: 'unknown-stage' (not in enum)"
    action: "Supervisor processes job — Zod schema validation fails"
    expected: "Zod parse throws; job fails immediately; no graph dispatch attempted; error logged"
    evidence: "job.getState() === 'failed'; no calls to runElaboration() or story-creation graph dispatch"

edge_cases:
  - id: ED-1
    title: "Supervisor enforces concurrency: 1 (no parallel jobs)"
    setup: "Enqueue 3 jobs in rapid succession; first job takes 500ms (simulated)"
    action: "Worker processes queue"
    expected: "Only 1 job active at a time; jobs 2 and 3 remain in 'waiting' state while job 1 is 'active'; after job 1 completes, job 2 starts"
    evidence: "At any point queue.getActive() returns at most 1 job; jobs processed sequentially"

  - id: ED-2
    title: "Supervisor start() is idempotent — second call does not create duplicate Workers"
    setup: "Call supervisor.start() twice"
    action: "Both calls execute"
    expected: "Second start() is a no-op or reuses existing Worker; no duplicate BullMQ Worker instances created"
    evidence: "BullMQ Worker constructor called exactly once"

  - id: ED-3
    title: "Structured log fields present on all lifecycle events"
    setup: "Enqueue and process one successful elaboration job"
    action: "Supervisor processes job from job_received to completed"
    expected: "Each log call contains all required fields: storyId, stage, threadId, attemptNumber, durationMs (where applicable)"
    evidence: "Spy captures all logger.info/warn/error calls; each call asserted to include the required fields"

  - id: ED-4
    title: "Existing orchestrator tests pass unchanged (regression guard, AC-12)"
    setup: "Run packages/backend/orchestrator test suite without any modifications"
    action: "pnpm test --filter @repo/orchestrator"
    expected: "All existing orchestrator tests pass; no regressions from supervisor dispatch wiring"
    evidence: "CI gate output shows 0 failures in packages/backend/orchestrator"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "BullMQ job state transitions: waiting → active → completed/failed"
      - "logger.info/warn/error calls contain required structured fields"
      - "runElaboration() mock spy call count and argument assertions"
      - "NodeCircuitBreaker state: CLOSED / OPEN / HALF_OPEN"
      - "Zod schema parse success/failure on job payload"
  frontend:
    playwright_runs: []
    assertions: []

manual_cases:
  - id: MC-1
    title: "Full BullMQ lifecycle integration test with real Docker Compose Redis"
    steps:
      - "Start Docker Compose Redis (infra/compose.lego-app.yaml)"
      - "Run integration test suite (REDIS_URL=redis://localhost:6379)"
      - "Enqueue a job with stage: 'elaboration' using real BullMQ Queue"
      - "Start supervisor Worker against real Redis connection"
      - "Observe job transitions from 'waiting' → 'active' → 'completed' or 'failed'"
    expected: "BullMQ job status in Redis reflects final state (completed/failed); supervisor logs show all lifecycle events; no hanging processes"

fixture_definitions:
  - name: MockElaborationResult
    type: object
    description: "Successful ElaborationResult returned by mocked runElaboration() — shape matches actual ElaborationResult from packages/backend/orchestrator/src/graphs/elaboration.ts"
  - name: MockTransientError
    type: Error
    description: "Error instance that isRetryableNodeError() classifies as TRANSIENT"
  - name: MockPermanentError
    type: Error
    description: "Error instance that isRetryableNodeError() classifies as PERMANENT (e.g., invalid config, data corruption)"
  - name: MinimalJobPayload
    type: object
    description: "Valid Zod-validated job payload: { storyId: string, stage: 'elaboration' | 'story-creation', attemptNumber: number }"

risks:
  - "APIP-0010 not yet merged: integration tests that wire actual BullMQ Worker require queue name constants from APIP-0010. Unit tests can run immediately by injecting queue name as constructor param. Integration wiring follows APIP-0010 merge."
  - "Wall clock timeout test relies on fast timer (100ms) — ensure test uses fake timers (vi.useFakeTimers()) in unit tier to avoid real 10-minute waits"
  - "NodeCircuitBreaker state test may be flaky if circuit recovery time is too short — configure generously in test environment"
  - "Regression guard (ED-4 / AC-12): requires packages/backend/orchestrator tests to be in a passing state on main before APIP-0020 PR is opened"
  - "Full server integration test (MC-1) is gated on APIP-5006 server provisioning; do not block PR on this test tier"
