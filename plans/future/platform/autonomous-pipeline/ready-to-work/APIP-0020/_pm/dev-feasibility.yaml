    goal: "Apply isRetryableNodeError() from packages/backend/orchestrator/src/runner/error-classification.ts to all graph errors. PERMANENT errors cause immediate BullMQ job failure (no retry). TRANSIENT errors propagate for BullMQ retry per queue config."
