    goal: "Vitest unit tests: (a) dispatch routing by stage, (b) wall clock timeout -> failed + log, (c) PERMANENT error -> immediate fail, (d) TRANSIENT error -> retry path, (e) circuit open -> delayed re-queue. All tests run without real Redis (mock BullMQ at module boundary)."
