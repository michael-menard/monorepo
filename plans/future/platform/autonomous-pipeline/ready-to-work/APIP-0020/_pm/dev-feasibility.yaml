feasible: true
confidence: high
rationale: >
  All required building blocks exist: LangGraph elaboration and story-creation graphs
  (packages/backend/orchestrator/src/graphs/), NodeCircuitBreaker pattern
  (runner/circuit-breaker.ts), error classification utilities (runner/error-classification.ts),
  and a Redis client factory (apps/api/lego-api/core/cache/redis-client.ts).
  BullMQ is a well-understood pattern. The only structural decision is the location of
  the new supervisor process (apps/api/pipeline/ recommended) and the dependency on
  APIP-0010 for the queue name constant (mitigated by injecting queue name as config).

complexity: high
change_surface:
  areas:
    - "apps/api/pipeline/ (new app — supervisor process)"
    - "packages/backend/orchestrator/ (dispatch wiring, read-only — no signature changes)"
    - "apps/api/lego-api/core/cache/redis-client.ts (reuse createRedisClient(), read-only)"
  endpoints: []
  deploy_touchpoints:
    - "New long-lived Node.js process must be started on dedicated server (APIP-5006)"
    - "Docker Compose Redis must be running for integration tests"
    - "BullMQ queue name from APIP-0010 must be available at process start"

risks:
  - finding: "APIP-0010 dependency — BullMQ queue name constant, Redis config, and job payload schema are produced by APIP-0010 which is not yet complete"
    mitigation: "Implement supervisor dispatch logic as a standalone module with injected queue name. Unit tests run immediately. BullMQ Worker wiring proceeds after APIP-0010 merges."
  - finding: "APIP-5006 dependency — full end-to-end integration test requires the dedicated server to be provisioned"
    mitigation: "Define two test tiers: unit tests (local, no server) and integration tests (Docker Compose Redis, local). Full server integration test is a separate suite gated on APIP-5006. PR does not block on this tier."
  - finding: "Thread ID convention ({storyId}:{stage}:{attemptNumber}) is an irreversible decision — changing it post-Phase 0 requires LangGraph checkpoint data migration"
    mitigation: "Document convention as inline ADR comment in supervisor code before any coding begins. Include in story deliverables. Review explicitly during PR."
  - finding: "Wall clock timeout cleanup — if timeout fires while LangGraph graph is mid-stream, the checkpoint in Aurora may be in a partial state"
    mitigation: "Log the threadId at timeout so the checkpoint can be inspected/abandoned manually. Full crash recovery reconciliation is deferred to APIP-2010. Document this limitation in the supervisor code."

missing_requirements: []

evidence_expectations:
  - "TypeScript compiles with zero errors (pnpm check-types --filter pipeline)"
  - "Unit tests pass for dispatch router, timeout handler, error classifier integration, circuit breaker integration"
  - "Integration test (Docker Compose Redis): BullMQ job enqueued with stage:'elaboration' transitions to completed/failed"
  - "Existing packages/backend/orchestrator test suite passes unchanged (regression guard)"

subtasks:
  - id: ST-1
    title: "Create apps/api/pipeline app structure and Zod job payload schema"
    goal: "Establish the new pipeline app directory, tsconfig, package.json, and Zod-validated job payload schema (storyId, stage, attemptNumber). Document thread ID convention as inline ADR comment."
    files_to_read:
      - "apps/api/lego-api/package.json"
      - "packages/backend/orchestrator/src/artifacts/story.ts"
    files_to_modify:
      - "apps/api/pipeline/package.json (new)"
      - "apps/api/pipeline/src/supervisor/__types__/index.ts (new)"
      - "apps/api/pipeline/tsconfig.json (new)"
    acs: ["AC-2", "AC-3"]
    depends_on: none
    verification: "pnpm check-types --filter pipeline"
    estimated_tokens: 6000

  - id: ST-2
    title: "Implement PipelineSupervisor class with start()/stop() and BullMQ Worker wiring"
    goal: "Create PipelineSupervisor class that wraps a BullMQ Worker (concurrency: 1) using createRedisClient() from apps/api/lego-api/core/cache/redis-client.ts. Implement start() and stop() with graceful shutdown."
    files_to_read:
      - "apps/api/lego-api/core/cache/redis-client.ts"
      - "apps/api/pipeline/src/supervisor/__types__/index.ts"
    files_to_modify:
      - "apps/api/pipeline/src/supervisor/index.ts (new)"
    acs: ["AC-1", "AC-2"]
    depends_on: ST-1
    verification: "pnpm check-types --filter pipeline"
    estimated_tokens: 8000

  - id: ST-3
