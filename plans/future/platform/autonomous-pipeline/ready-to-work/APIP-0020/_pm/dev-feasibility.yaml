    estimated_tokens: 10000

  - id: ST-4
    title: "Implement wall clock timeout via Promise.race() with WallClockTimeoutError"
    goal: "Wrap each graph dispatch in Promise.race([graphInvocation, wallClockTimeout]). Define WallClockTimeoutError. On timeout: log event with threadId, mark BullMQ job failed with reason 'wall_clock_timeout'. Default timeout: 10 minutes, configurable via supervisor config."
    files_to_read:
