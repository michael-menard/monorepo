canonical_references:

  - path: packages/backend/orchestrator/src/graphs/elaboration.ts
    status: VERIFIED
    exports:
      - runElaboration(currentStory: SynthesizedStory, previousStory: SynthesizedStory | null, config: Partial<ElaborationConfig>): Promise<ElaborationResult>
      - createElaborationGraph(config: Partial<ElaborationConfig>): CompiledGraph
      - ElaborationResultSchema (Zod)
      - ElaborationConfigSchema (Zod)
    note: >
      runElaboration() takes SynthesizedStory as first arg — NOT a storyId string.
      The supervisor cannot call runElaboration(storyId, ...) directly. It must first
      load or construct a SynthesizedStory object from the job payload or KB, OR accept
      a pre-built SynthesizedStory embedded in the job payload. This is a significant
      gap in the story's dispatch specification. See GAP-001 (critical).

  - path: packages/backend/orchestrator/src/graphs/story-creation.ts
    status: VERIFIED
    exports:
      - runStoryCreation(storyRequest: StoryRequest, storyId: string | null, config: Partial<StoryCreationConfig>): Promise<StoryCreationResult>
      - createStoryCreationGraph(config: Partial<StoryCreationConfig>): CompiledGraph
    note: >
      runStoryCreation() takes a StoryRequest object as first argument, NOT just a storyId.
      Same gap as elaboration — the job payload must carry the StoryRequest payload or the
      supervisor must fetch it. The Reuse Plan says "createStoryCreationGraph()" but the
      correct entry point (matching runElaboration pattern) is runStoryCreation(). See GAP-001.

  - path: packages/backend/orchestrator/src/runner/circuit-breaker.ts
    status: VERIFIED
    exports:
      - NodeCircuitBreaker class (canExecute(), recordSuccess(), recordFailure(), getStatus(), getState(), reset(), getConfig())
      - CircuitBreakerStatus interface
      - CircuitState type ('CLOSED' | 'OPEN' | 'HALF_OPEN')
    defaults:
      failureThreshold: 5
      recoveryTimeoutMs: 60000
    note: >
      CircuitBreakerConfig is imported from runner/types.ts with defaults failureThreshold=5,
      recoveryTimeoutMs=60000. Story does not specify what thresholds to use for the
      per-graph circuit breakers in the supervisor context. See OPP-003 for configurable
      threshold opportunity.

  - path: packages/backend/orchestrator/src/runner/error-classification.ts
    status: VERIFIED
    exports:
      - isRetryableNodeError(error: unknown): boolean
      - classifyError(error: unknown): ErrorClassification
      - getErrorCategory(error: unknown): ErrorCategory
      - ErrorCategory type ('validation' | 'programming' | 'timeout' | 'cancellation' | 'circuit_open' | 'network' | 'rate_limit' | 'unknown')
    note: >
      The story's error model maps PERMANENT→immediate fail, TRANSIENT→retry. The actual
      classifyError() returns isRetryable boolean — maps correctly. Note that WallClockTimeoutError
      is a new type defined by this story; it will NOT be classified as NodeTimeoutError (which
      IS retryable in the existing classifier). The story should clarify that WallClockTimeoutError
      bypasses the classifier and goes directly to BullMQ fail — this is implied but not stated.
      See GAP-004.

  - path: apps/api/lego-api/core/cache/redis-client.ts
    status: VERIFIED
    exports:
      - createRedisClient(config: RedisClientConfig): RedisClient
      - getRedisClient(): RedisClient | null (singleton, reads REDIS_URL env var)
      - disconnectRedis(): Promise<void>
    note: >
      createRedisClient() requires a RedisClientConfig object { url, maxRetriesPerRequest?,
      connectTimeout?, lazyConnect? } — NOT a plain URL string. The story's wiring pattern
      shows "const redisClient = createRedisClient()" with no arguments, which would fail
      TypeScript compilation. The supervisor must pass { url: process.env.REDIS_URL }.
      Alternatively, getRedisClient() (singleton) could be used directly. This is a minor
