    note: File exists at stated path — integration test dependency confirmed reachable.

# ─────────────────────────────────────────────────────────────────────────────
# MVP-CRITICAL GAPS
# ─────────────────────────────────────────────────────────────────────────────
mvp_critical_gaps:

  - id: GAP-001
    severity: CRITICAL
    title: "runElaboration() and runStoryCreation() require story objects, not storyId strings"
    description: >
      The story's AC-4 says the supervisor "calls runElaboration()" and AC-5 says it
      "dispatches to the story-creation graph" — implying a simple storyId-based dispatch.
      However, the verified signatures are:
        runElaboration(currentStory: SynthesizedStory, previousStory: SynthesizedStory | null, config)
        runStoryCreation(storyRequest: StoryRequest, storyId: string | null, config)
      The job payload as specified (storyId + stage + attemptNumber) is insufficient to call
      either function. The supervisor needs either:
        (a) The full SynthesizedStory / StoryRequest serialized in the BullMQ job payload, or
        (b) A mechanism to fetch/reconstruct the story object from KB/filesystem given storyId
      This gap is a blocker — the dispatch-router.ts cannot be implemented without resolving
      what the job payload carries beyond the three minimum fields.
    affected_acs: [AC-2, AC-4, AC-5, AC-10]
    affected_subtasks: [ST-1, ST-3]
    resolution_options:
      - "Extend job payload schema to include serialized story object (increases payload size but is self-contained)"
      - "Add a storyLoader utility to dispatch-router that reads story from filesystem/KB given storyId (adds I/O dependency)"
      - "Scope Phase 0 dispatch to a stub/mock invocation that only passes storyId, deferring real graph invocation to a follow-on story"
    recommended_resolution: >
      Extend the job payload Zod schema in ST-1 to include a 'payload' field containing
      the story object (union type for elaboration vs story-creation). Document this as part
      of the APIP-0010 queue contract (the producer must embed the story object when enqueuing).
      This keeps the supervisor stateless and avoids filesystem I/O in the dispatch loop.
    decision: add_ac
    ac_added: "AC-13: Job payload Zod schema includes payload field (SynthesizedStory | StoryRequest discriminated union); supervisor extracts and passes to graph functions"
    notes: "Auto-resolved: blocks core dispatch implementation. Added as AC-13 to story. ST-1 and ST-3 subtask descriptions updated with implementation notes."

  - id: GAP-002
    severity: MODERATE
    title: "Missing MockStoryCreationResult fixture for HP-2 test coverage"
    description: >
      HP-2 tests story-creation dispatch but the fixture_definitions section only defines
      MockElaborationResult. The AC-10 unit tests for the story-creation dispatch path (AC-10a)
      need a MockStoryCreationResult fixture to verify the correct return shape from the mocked
      runStoryCreation(). Without it, the story-creation mock may return undefined or an
      incorrect shape, silently passing tests that would fail in integration.
    affected_acs: [AC-5, AC-10]
    affected_subtasks: [ST-7]
    resolution_options:
      - "Add MockStoryCreationResult fixture definition to pm_artifacts.fixture_definitions"
    recommended_resolution: >
      Add MockStoryCreationResult fixture matching StoryCreationResultSchema shape
      (verified in packages/backend/orchestrator/src/graphs/story-creation.ts).
    decision: implementation_note
    notes: "Added as implementation note in ST-7 subtask description. Implementer directed to read StoryCreationResultSchema from story-creation.ts and define MockStoryCreationResult fixture. No new AC warranted — this is a test implementation detail."

  - id: GAP-003
    severity: MODERATE
    title: "Ambiguous circuit breaker import vs re-implementation"
    description: >
      The story says circuit breakers are "modeled on" NodeCircuitBreaker but does not
      explicitly state whether the supervisor imports NodeCircuitBreaker from
      packages/backend/orchestrator or re-implements the pattern. The graph-circuit-breakers.ts
      file is listed as a new file in scope — if it imports NodeCircuitBreaker, it needs
      packages/backend/orchestrator as a workspace dependency of apps/api/pipeline. If it
      re-implements the pattern, it creates duplication the codebase should avoid.
    affected_acs: [AC-8]
    affected_subtasks: [ST-1, ST-6]
    resolution_options:
      - "Explicitly state: import NodeCircuitBreaker from @repo/orchestrator (preferred — no duplication)"
      - "Re-implement: document why re-implementation is chosen over import"
    recommended_resolution: >
      The story should state explicitly that apps/api/pipeline imports NodeCircuitBreaker
      from packages/backend/orchestrator (which should be a workspace:* devDependency in
      apps/api/pipeline/package.json). Add this to the ST-1 package.json creation task.
    decision: add_ac
    ac_added: "AC-14: graph-circuit-breakers.ts imports NodeCircuitBreaker from @repo/orchestrator; pipeline package.json lists @repo/orchestrator as workspace:* dependency"
    notes: "Auto-resolved: reuse-first principle requires import over re-implementation. Added as AC-14. ST-1 implementation notes updated to include @repo/orchestrator dependency."

  - id: GAP-004
    severity: MODERATE
    title: "WallClockTimeoutError classification path not specified"
    description: >
      The error-classification.ts classifies NodeTimeoutError as TRANSIENT (retryable).
      WallClockTimeoutError is a new type defined by this story. If the dispatch-router
      catches WallClockTimeoutError and then passes it to isRetryableNodeError(), it will
      be classified as 'unknown' (retryable), which contradicts the intended behavior
      (wall_clock_timeout → immediate BullMQ fail, no retry). The story implies but does not
      state that WallClockTimeoutError bypasses the classifier and is handled as a special
      case before error classification runs.
    affected_acs: [AC-6, AC-7]
    affected_subtasks: [ST-4, ST-5]
    resolution_options:
      - "Make WallClockTimeoutError extend a base class that classifyError() recognizes as non-retryable"
      - "Handle WallClockTimeoutError as a catch branch before the error-classification catch branch (preferred)"
    recommended_resolution: >
      The dispatch router should use a two-catch pattern:
        catch (e) { if (e instanceof WallClockTimeoutError) { /* fail immediately */ }
        else { const retryable = isRetryableNodeError(e); /* route accordingly */ } }
      Document this explicitly in ST-4 and ST-5 so they do not produce conflicting behavior.
    decision: add_ac
    ac_added: "AC-15: dispatch router uses two-catch pattern — WallClockTimeoutError caught before general error classification branch, bypasses isRetryableNodeError()"
    notes: "Auto-resolved: without explicit two-catch pattern, WallClockTimeoutError would be misclassified as retryable. Added as AC-15. ST-4 and ST-5 subtask descriptions updated with two-catch pattern code example."

  - id: GAP-005
    severity: LOW
    title: "createRedisClient() requires config object, not called with no arguments"
    description: >
      The story's wiring pattern shows: "const redisClient = createRedisClient()" with no
      arguments. The verified signature is createRedisClient(config: RedisClientConfig) where
      config.url is required. This pattern would fail TypeScript compilation.
      The existing getRedisClient() singleton (reads REDIS_URL env var) is a viable alternative.
    affected_acs: [AC-2]
    affected_subtasks: [ST-2]
    resolution_options:
      - "Update wiring pattern to: createRedisClient({ url: process.env.REDIS_URL ?? '' })"
      - "Use getRedisClient() singleton instead (simpler, already handles missing URL)"
    recommended_resolution: >
      Update the key wiring pattern in the Architecture Notes to use getRedisClient()
      (which already handles REDIS_URL env var and returns null gracefully if not set).
      Note that getRedisClient() returns RedisClient | null — the supervisor must handle
      the null case (throw on startup if Redis unavailable).
    decision: implementation_note
    notes: "Updated key wiring pattern in story Architecture Notes and Reuse Plan table to use getRedisClient() with null guard. Updated ST-2 subtask description with implementation note. No new AC warranted — this is a compilation correctness fix in the example code, not a functional gap."

# ─────────────────────────────────────────────────────────────────────────────
# FUTURE OPPORTUNITIES (non-blocking)
# ─────────────────────────────────────────────────────────────────────────────
future_opportunities:

  - id: OPP-001
    title: "Structured metrics / telemetry beyond @repo/logger"
    description: >
      The story relies entirely on @repo/logger structured events for observability.
      In Phase 2+, durationMs, attempt counts, and circuit state could be emitted to a
      metrics sink (CloudWatch, DataDog, or a custom telemetry table) for dashboarding
      in APIP-2020. The NodeMetricsCollector interface already exists in
      packages/backend/orchestrator/src/runner/types.ts and could be used as a model.
    phase: "Phase 2 / APIP-2020"
    effort: low
    decision: log_to_kb
    kb_entry_id: "a8a59726-8c41-4335-9936-a49e5048b6a0"
    notes: "Logged to KB as non-blocking future opportunity. Tags: observability, monitoring, future-work."

  - id: OPP-002
    title: "Health check endpoint for supervisor process"
    description: >
      The long-lived Node.js supervisor process (APIP-5006) has no health check mechanism
      beyond process-level aliveness. A lightweight HTTP health endpoint (e.g., express
      on port 9090 responding to GET /health) would allow infrastructure monitoring to
      detect hung or deadlocked supervisors. Deferred to APIP-2030 (Graceful Shutdown,
      Health Check, and Deployment Hardening) which already exists in the plan.
    phase: "Phase 2 / APIP-2030"
    effort: low
    decision: log_to_kb
    kb_entry_id: "8afde5e9-a86e-4399-bd13-034eb4a07d21"
    notes: "Logged to KB as non-blocking future opportunity. Tags: observability, health-check, future-work."

  - id: OPP-003
    title: "Configurable circuit breaker thresholds via supervisor config"
    description: >
      The NodeCircuitBreaker defaults (failureThreshold=5, recoveryTimeoutMs=60000ms) may
      be too permissive for a single-story-at-a-time supervisor where 5 consecutive failures
      before opening means 5 failed stories before protection kicks in. Phase 0 should at
      minimum document the chosen thresholds as a config value rather than accepting defaults
      silently. Recommend exposing supervisorConfig.circuitBreaker.failureThreshold and
      supervisorConfig.circuitBreaker.recoveryTimeoutMs in the PipelineSupervisor constructor.
    phase: "Phase 0 (recommended) / configurable later"
    effort: very_low
    decision: log_to_kb
    kb_entry_id: "52ac71df-4390-421f-a976-9d74a0957f09"
    notes: "Logged to KB as non-blocking future opportunity. Tags: configuration, circuit-breaker, future-work. Not promoted to AC — implementer can add via supervisor config object without a formal AC requirement."

  - id: OPP-004
    title: "BullMQ job priority support"
    description: >
      BullMQ supports job priority at enqueue time. The current job payload schema
      does not include a priority field. If APIP-0010 (the queue producer) later needs
      to prioritize certain story types (e.g., hotfix stories), the supervisor would need
      to handle priority-aware dequeue. This is a producer concern but the schema should
      be designed to accommodate optional priority without breaking changes.
    phase: "Phase 1+ / APIP-3080"
    effort: very_low
    decision: log_to_kb
    kb_entry_id: "b848bafb-8dcb-4ff6-8bd3-7bb13cff4e9c"
    notes: "Logged to KB as non-blocking future opportunity. Tags: integration, bullmq, future-work."

  - id: OPP-005
    title: "Dead letter queue for permanently failed jobs"
    description: >
      PERMANENT error failures currently mark jobs as BullMQ 'failed' with no further
      routing. BullMQ supports a 'removeOnFail' option and a failed job events listener.
      A dead letter queue (separate BullMQ Queue for failed jobs) would allow APIP-2010
      (Blocked Queue Notification) to subscribe to failure events without polling the
      main queue's failed bucket. Worth noting in the APIP-2010 elaboration as a design
      constraint originating here.
    phase: "Phase 2 / APIP-2010"
    effort: low
    decision: log_to_kb
    kb_entry_id: "09319dc4-c2b8-4b71-8452-f5174af37d9b"
    notes: "Logged to KB as non-blocking future opportunity. Tags: integration, bullmq, dead-letter-queue, future-work."

