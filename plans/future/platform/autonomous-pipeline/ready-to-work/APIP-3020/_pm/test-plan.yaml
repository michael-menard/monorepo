strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Confidence level 'none' assigned when sample_size is 0"
    setup: "Pattern Miner module loaded; no telemetry rows"
    action: "Call assignConfidenceLevel(0)"
    expected: "Returns 'none'"
    evidence: "Unit test in pattern-miner.test.ts"

  - id: HP-2
    title: "Confidence level 'low' assigned when sample_size is 1–19"
    setup: "Pattern Miner module loaded"
    action: "Call assignConfidenceLevel(1), assignConfidenceLevel(19)"
    expected: "Returns 'low' for both boundary values"
    evidence: "Unit test covering band boundaries 1 and 19"

  - id: HP-3
    title: "Confidence level 'medium' assigned when sample_size is 20–49"
    setup: "Pattern Miner module loaded"
    action: "Call assignConfidenceLevel(20), assignConfidenceLevel(49)"
    expected: "Returns 'medium' for both boundary values"
    evidence: "Unit test covering band boundaries 20 and 49"

  - id: HP-4
    title: "Confidence level 'high' assigned when sample_size is 50+"
    setup: "Pattern Miner module loaded"
    action: "Call assignConfidenceLevel(50), assignConfidenceLevel(200)"
    expected: "Returns 'high' for all values >= 50"
    evidence: "Unit test covering 50 and well above threshold"

  - id: HP-5
    title: "Aggregation query produces correct profile for fixture telemetry rows"
    setup: "Mocked DB layer returns 10 fixture change_telemetry rows: 8 successes, 2 failures; all for same (model, change_type, file_type) combination"
    action: "Run aggregation logic against mocked rows"
    expected: "success_rate = 0.8000; sample_size = 10; confidence_level = 'low'"
    evidence: "Unit test with fixture construction; assert shape of upsert parameters"

  - id: HP-6
    title: "Watermark advances after successful Pattern Miner run"
    setup: "Mocked DB returns rows with created_at timestamps; initial watermark = epoch"
    action: "Run Pattern Miner aggregation; read watermark after run"
    expected: "Watermark equals MAX(created_at) from processed rows"
    evidence: "Unit test verifying watermark parameter passed to next DB call"

  - id: HP-7
    title: "Integration: fixture rows aggregate into correct model_affinity profile"
    setup: "Real test PostgreSQL DB; migration applied; 25 fixture rows inserted into wint.change_telemetry for (gpt-4o, refactor, .ts)"
    action: "Run Pattern Miner via runPatternMiner(config)"
    expected: "wint.model_affinity contains 1 row: sample_size=25, confidence_level='medium', success_rate calculated correctly"
    evidence: "Integration test query against real DB; verify all required columns populated"

  - id: HP-8
    title: "Integration: upsert is idempotent — second run with same data does not double-count"
    setup: "Real test DB; Pattern Miner already run once with 25 rows"
    action: "Run Pattern Miner again without adding new telemetry rows (watermark is current)"
    expected: "No new rows processed; wint.model_affinity sample_size remains 25"
    evidence: "Integration test: assert rows_aggregated=0 in second run logs; sample_size unchanged"

  - id: HP-9
    title: "Integration: incremental run processes only new rows since watermark"
    setup: "Real test DB; first run complete with 25 rows; then 5 new rows added to change_telemetry"
    action: "Run Pattern Miner again"
    expected: "Only 5 new rows processed; sample_size increments correctly using weighted average formula"
    evidence: "Integration test verifying rows_aggregated=5 in logs; sample_size=30"

  - id: HP-10
    title: "ModelAffinityInsertSchema and ModelAffinitySelectSchema have correct shape"
    setup: "packages/backend/database-schema/src/schema/ loaded"
    action: "Import ModelAffinityInsertSchema and ModelAffinitySelectSchema; parse test objects"
    expected: "Schemas accept valid objects; reject objects with wrong types or missing required fields"
    evidence: "Schema unit test in packages/backend/database-schema/src/schema/__tests__/"

  - id: HP-11
    title: "SQL migration runs cleanly on blank wint schema"
    setup: "Fresh PostgreSQL test DB; wint schema exists; model_affinity table does not"
    action: "Execute migration file in BEGIN/COMMIT transaction"
    expected: "Migration succeeds; wint.model_affinity table exists with all specified columns and indexes"
    evidence: "Migration test using real test DB; INFORMATION_SCHEMA query to verify table structure"

  - id: HP-12
    title: "Trend detection stores correct direction for improving success rate"
    setup: "Existing model_affinity row with success_rate=0.6000; new telemetry produces success_rate=0.8000"
    action: "Run Pattern Miner upsert; read trend column"
    expected: "trend = { direction: 'up', delta: 0.2, computed_at: <timestamp> }"
    evidence: "Unit test on trend computation logic; integration test reading trend from DB"

error_cases:
  - id: EC-1
    title: "Cold-start: empty change_telemetry produces no error and no model_affinity rows"
    setup: "Real test DB; wint.change_telemetry has zero rows"
    action: "Run Pattern Miner via runPatternMiner(config)"
    expected: "No exception thrown; no rows in wint.model_affinity; logger emits rows_aggregated: 0"
    evidence: "Integration test: assert DB empty; assert no throw; check logger output"

  - id: EC-2
    title: "Migration idempotency: running migration twice does not error"
    setup: "Real test DB; migration already applied"
    action: "Execute migration SQL a second time"
    expected: "No error (CREATE TABLE IF NOT EXISTS prevents duplicate table error)"
    evidence: "Migration idempotency test in test suite"

  - id: EC-3
    title: "Division by zero guard: sample_size = 0 does not produce NaN success_rate"
    setup: "Edge case fixture: aggregation query returns COUNT(*) = 0 (impossible in practice but defensive)"
    action: "Call aggregation logic with zero-count group"
    expected: "success_rate defaults to 0.0; no NaN or division by zero error"
    evidence: "Unit test with zero-count fixture"

  - id: EC-4
    title: "Weighted average upsert: existing profile with large sample_size correctly weights new data"
    setup: "Existing model_affinity row: sample_size=100, success_rate=0.9000; new incremental batch: sample_size=10, success_rate=0.5000"
    action: "Run Pattern Miner upsert with ON CONFLICT DO UPDATE using weighted average formula"
    expected: "New success_rate = (100 * 0.9 + 10 * 0.5) / 110 ≈ 0.8545"
    evidence: "Unit test with mocked DB layer verifying SQL parameters; integration test reading final value"

edge_cases:
  - id: ED-1
    title: "Boundary value: sample_size = 19 → 'low'; sample_size = 20 → 'medium'"
    setup: "Pattern Miner confidence assignment function"
    action: "Call assignConfidenceLevel(19) and assignConfidenceLevel(20)"
    expected: "'low' and 'medium' respectively"
    evidence: "Unit test covering exact boundary transition"

  - id: ED-2
    title: "Boundary value: sample_size = 49 → 'medium'; sample_size = 50 → 'high'"
    setup: "Pattern Miner confidence assignment function"
    action: "Call assignConfidenceLevel(49) and assignConfidenceLevel(50)"
    expected: "'medium' and 'high' respectively"
    evidence: "Unit test covering exact boundary transition"

  - id: ED-3
    title: "Trend direction 'stable' when success_rate change is below noise threshold"
    setup: "Existing model_affinity row with success_rate=0.8000; new telemetry also produces 0.8000"
    action: "Run Pattern Miner; read trend column"
    expected: "trend.direction = 'stable'; trend.delta = 0.0"
    evidence: "Unit test on trend computation; test that equal rates produce 'stable'"

  - id: ED-4
    title: "Multiple distinct (model, change_type, file_type) combinations aggregate independently"
    setup: "Real test DB; fixture rows span 3 distinct combinations"
    action: "Run Pattern Miner"
    expected: "wint.model_affinity contains 3 rows, one per combination; no cross-contamination"
    evidence: "Integration test querying COUNT(*) from wint.model_affinity; asserting 3 rows"

  - id: ED-5
    title: "Unique index prevents duplicate (model, change_type, file_type) rows"
    setup: "Real test DB; model_affinity already has 1 row for (gpt-4o, refactor, .ts)"
    action: "Attempt to INSERT another row for same combination without ON CONFLICT DO UPDATE"
    expected: "PostgreSQL raises unique constraint violation"
    evidence: "Unit migration test verifying index existence; integration test confirming constraint enforced"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "wint.model_affinity row count after Pattern Miner run"
      - "success_rate value precision (numeric 5,4)"
      - "confidence_level enum value validity"
      - "trend column JSON structure"
      - "rows_aggregated count in structured logs"
      - "watermark advancement between runs"
      - "INFORMATION_SCHEMA.COLUMNS for migration verification"

manual_cases: []

fixture_definitions:
  - name: "change_telemetry_fixtures_25_rows"
    type: "SQL INSERT fixture"
    description: "25 rows in wint.change_telemetry for (gpt-4o, refactor, .ts); 20 successes, 5 failures; timestamps spread over 1 hour; used for HP-7, HP-8, HP-9"
  - name: "change_telemetry_fixtures_multi_combo"
    type: "SQL INSERT fixture"
    description: "30 rows across 3 distinct (model, change_type, file_type) combos: (gpt-4o, refactor, .ts), (claude-3-5-sonnet, add-feature, .tsx), (gpt-4o-mini, fix-bug, .ts); used for ED-4"
  - name: "confidence_band_test_values"
    type: "Unit test constants"
    description: "Array of {input, expected_band} pairs: [{0, 'none'}, {1, 'low'}, {19, 'low'}, {20, 'medium'}, {49, 'medium'}, {50, 'high'}, {200, 'high'}]"
  - name: "weighted_avg_upsert_fixture"
    type: "Unit test constants"
    description: "Existing row: {sample_size: 100, success_rate: 0.9000}; new batch: {sample_size: 10, success_rate: 0.5000}; expected result: {sample_size: 110, success_rate: 0.8545}"

risks:
  - "Integration tests require real PostgreSQL with wint schema — CI must provision test DB; risk: CI env may not have Aurora-compatible test DB"
  - "APIP-3010 must be complete before integration tests can run against real change_telemetry table — risk: integration tests blocked until APIP-3010 merges"
  - "Weighted average formula for incremental upsert is complex — risk of off-by-one or precision loss; boundary-test with large sample_sizes"
  - "Trend delta computation depends on reading previous success_rate before upsert — race condition risk if Pattern Miner runs concurrently (APIP-3090 must ensure single-instance scheduling)"
