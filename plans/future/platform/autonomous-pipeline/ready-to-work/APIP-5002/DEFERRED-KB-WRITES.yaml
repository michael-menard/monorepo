    deferred_at: "2026-02-25T00:00:00Z"
    artifact_type: analysis
    artifact_name: OPP-3-REVIEW-YAML-FAIL-BEHAVIOR
    content:
      finding: "REVIEW.yaml FAIL verdict behavior in full critical path E2E (phase1-critical-path.spec.ts) is unspecified. AC-7(d) states REVIEW.yaml is written with 'verdict: PASS or FAIL (not null)' but does not say what the test should do if verdict is FAIL. The synthetic ChangeSpec is designed to always pass review, so FAIL means a framework bug — but the spec should fail explicitly rather than silently skip merge assertions."
      recommendation: "In ST-7 when implementing phase1-critical-path.spec.ts, add an explicit assertion: if REVIEW.yaml verdict is FAIL, use expect.fail() or equivalent with message 'Framework bug: synthetic ChangeSpec produced REVIEW.yaml FAIL verdict — investigate review graph'. Do not silently skip merge assertions on FAIL."
      effort: low
      blocking: false
      decision: "Log to KB as non-blocking edge_cases guidance for ST-7 implementer."
