feasible: true
confidence: high
rationale: "All deliverables are new test infrastructure files isolated to packages/backend/orchestrator/e2e/. No modification of existing packages, no new AWS infrastructure, no database changes. Playwright is already in the monorepo for web tests. BullMQ and Redis client patterns are established. The primary risk is the synthetic ChangeSpec design for micro-verify passability — all other components follow known patterns."
complexity: medium
change_surface:
  areas:
    - "packages/backend/orchestrator/e2e/ (new directory)"
    - "packages/backend/orchestrator/ (package.json — add e2e script, possibly add @playwright/test devDependency)"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required — E2E suite runs against local Docker Compose stack"
    - "CI pipeline may need a new job to run phase0 E2E after APIP-0010 and APIP-0020 merge"

risks:
  - finding: "Synthetic ChangeSpec must produce TypeScript-error-free, test-passing code change — LLM non-determinism makes this hard unless the ChangeSpec uses a pre-written literal diff"
    mitigation: "Design the ChangeSpec to add a documented constant with a corresponding Vitest test to a non-critical utility file. The implementation graph applies it as a literal patch. Document this design in PIPELINE-E2E-TEST-PLAN.md before APIP-1030 is available."
  - finding: "QA graph (APIP-1060) invokes Playwright as a subprocess — port/process conflicts if pipeline E2E and QA graph run concurrently"
    mitigation: "Use distinct project name 'pipeline-e2e' in config; set workers:1 to prevent concurrent pipeline E2E runs; document that pipeline E2E must be serialized with QA graph executions."
  - finding: "BullMQ QueueEvents.waitUntilFinished() requires a separate Redis connection for event subscription — fixture setup must open two Redis connections (Queue client + QueueEvents)"
    mitigation: "In beforeAll, create both Queue and QueueEvents with separate connection configs from REDIS_URL env var. Close both in afterAll. This is standard BullMQ pattern — documented in BullMQ docs."

missing_requirements: []

evidence_expectations:
  - "packages/backend/orchestrator/e2e/playwright.config.ts exists and is valid TypeScript"
  - "packages/backend/orchestrator/e2e/fixtures/pipeline.fixture.ts exports PipelineTestFixtures"
  - "packages/backend/orchestrator/e2e/fixtures/synthetic-story.ts exports SyntheticTestStorySchema and syntheticStory"
  - "packages/backend/orchestrator/e2e/helpers/artifact-assertions.ts exports all 5 assertion functions"
  - "packages/backend/orchestrator/e2e/helpers/job-poller.ts exports PipelineJobPoller and PollTimeoutError"
  - "packages/backend/orchestrator/e2e/tests/phase0-queue-supervisor.spec.ts exists"
  - "packages/backend/orchestrator/e2e/tests/phase1-elaboration.spec.ts exists with skipIf guard"
  - "packages/backend/orchestrator/e2e/tests/phase1-critical-path.spec.ts exists with skipIf guards"
  - "packages/backend/orchestrator/e2e/PIPELINE-E2E-TEST-PLAN.md exists with all 5 required sections"
  - "pnpm check-types passes on all new files"
  - "No modifications to apps/web/playwright/"

