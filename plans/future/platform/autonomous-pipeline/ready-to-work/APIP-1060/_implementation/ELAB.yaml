audit:
  - id: scope_alignment
    status: PASS
    note: >
      Story scope matches stories.index.md exactly. APIP-1060 is listed as "Created" with
      APIP-1050 dependency; the story confirms the same. Backend-only, single package
      (packages/backend/orchestrator), no endpoints, no DB, no infra. The frontmatter
      `story_dir` points to `backlog/APIP-1060` while the file lives under
      `elaboration/APIP-1060/` — minor metadata drift but does not affect implementation
      scope alignment. No extra endpoints, infrastructure, or features introduced.

  - id: internal_consistency
    status: PASS
    note: >
      Goals (autonomous QA gate) do not contradict Non-Goals (9 clearly bounded items).
      ACs 1-16 map cleanly to scope: config schema (AC-1), state annotation (AC-2), 6 nodes
      (AC-3 through AC-9), graph wiring (AC-10), entry function (AC-11), PASS semantics
      (AC-12), graph tests (AC-13), node tests (AC-14), schema compat (AC-15), logging
      (AC-16). Test Plan scenarios match ACs exactly. AC-2 references TestResultsSchema
      from qa-verify.ts (existing, nullable in state) and the PASS check in AC-12 uses
      testResults.unit.fail === 0 — consistent with the actual TestResultsSchema shape.
      Minor note: the state annotation field name `acVerifications` (AC-2) diverges from
      QaVerifySchema's `acs_verified` field name — these are separate concerns (in-flight
      state vs. artifact) which is intentional and consistent with the architecture.

  - id: reuse_first
    status: PASS
    note: >
      Explicit reuse plan cites all existing shared assets: createToolNode, createQaVerify,
      addAcVerification, calculateVerdict, qaPassedSuccessfully from qa-verify.ts
      (confirmed present); EvidenceSchema from evidence.ts (confirmed); NodeCircuitBreaker
      from runner/circuit-breaker.ts (imported by node-factory.ts, confirmed present);
      isRetryableNodeError / ErrorCategory from error-classification.ts (imported by
      node-factory.ts, confirmed present); @repo/logger; StateGraph / Annotation from
      @langchain/langgraph; YAML artifact persistence pattern from artifacts/. All
      canonical reference files exist and export the claimed symbols. No per-story
      one-off utilities introduced.

  - id: ports_adapters
    status: PASS
    note: >
      ModelClient abstraction is defined with a Zod schema and injected at
      createQAGraph(config, { modelClient }), enabling testability without APIP-0040.
      Subprocess execution (child_process.spawn) is transport-agnostic Node core.
      KB write-back is gated by kbWriteBackEnabled config flag, making it injectable/
      optional. BullMQ dispatch is the supervisor's concern — not in this graph.
      QA graph produces a QaVerify artifact consumed by APIP-1070 — clean adapter boundary.
      Gate model is hardcoded to claude via z.literal('claude') per architecture note
      (safety-critical, intentional constraint).

  - id: testability
    status: PASS
    note: >
      Full test plan with 10 graph-level scenarios (AC-13) and 6 node-level test files
      (AC-14). vi.mock('child_process') ensures no real subprocesses. Mock ModelClient
      prevents real model calls. Mock fs.writeFile and KB MCP tool prevent side effects.
      graph.compile() test included (AC-13j). All tests runnable via
      `pnpm test --filter @repo/orchestrator`. Coverage targets specified: >90% branch
      on verify-acs and gate-decision, 100% on AC_VERIFICATION_PROMPT_V1.
      All scenarios are concrete and verifiable.

  - id: decision_completeness
    status: WARN
    note: >
      One unresolved ambiguity: `worktreeDir` (absolute path to the story's git worktree)
      is required by run-unit-tests and run-e2e-tests nodes and is described in Architecture
      Notes and Infrastructure Notes as "part of QAGraphConfig" — but it is NOT listed in
      AC-1's explicit QAGraphConfigSchema field enumeration. An implementer following AC-1
      literally would omit worktreeDir from the schema, causing both subprocess nodes to
      have no working directory. This is a pre-implementation gap, not a runtime TBD.
      All other design decisions are resolved: ModelClient injection pattern defined,
      YAML persistence path defined, BLOCKED vs FAIL semantics per node defined, gate model
      hardcoded, backward-compat strategy documented.

  - id: risk_disclosure
    status: PASS
    note: >
      Auth risk: OpenRouter API key from env var (APIP-5004 pattern, noted). Subprocess
      hang risk: spawn + Promise.race with wall clock timeout (explicit mitigation).
      EvidenceSchema drift: safeParse in check-preconditions → BLOCKED on mismatch.
      QaVerifySchema compat: all additions use z.optional()/z.nullable().default(null).
      APIP-0040 unavailability: ModelClient injection abstraction with direct OpenRouter stub.
      LangGraph version changes: listed in test_plan.risks. Deep dependency chain:
      explicitly noted with elaboration/unit-test-first mitigation strategy. No hidden
      dependencies found. Risk coverage is thorough.

  - id: story_sizing
    status: SPLIT
    note: >
      SPLIT indicators triggered: (1) 16 ACs — double the 8 AC threshold. (2) Token
      estimate of 220K is at the high end for a single implementation session. PM assigned
      split_risk: 0.9 (high confidence). Positive factors: backend-only, single package,
      no frontend, no DB changes, subtasks form a clean DAG. However, the implementation
      load per session is high: 6 new node files + 1 graph file + 7 test files = 14 new
      files, spanning subprocess execution, model calls, retry logic, graph composition,
      YAML persistence, and conditional KB write-back. Recommended split: ST-1 through
      ST-5 as APIP-1060-A (config + 5 nodes, 9 ACs), ST-6 through ST-8 as APIP-1060-B
      (artifact write + graph wiring + all tests, 7 ACs). Split is not required if
      implementing agent can sustain 220K tokens in a single session; CONDITIONAL_PASS
      is acceptable if team decides to keep as-is with the worktreeDir gap resolved.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      Strong decomposition overall: 8 subtasks, all 16 ACs covered, dependencies form a
      strict DAG (ST-1 → {ST-2, ST-3, ST-4}; ST-4 → ST-5 → ST-6 → ST-7 → ST-8), each
      subtask has a verification command, Canonical References section has 4 entries.
      Condition: ST-8 touches 7 files (6 node test files + 1 graph test file), exceeding
      the 3-file guideline. This is acceptable for a test-only subtask with no
      cross-cutting implementation changes, but the implementing agent should be aware
      that ST-8 is the largest single subtask by file count. Condition 2: ST-5's
      verification command runs only gate-decision tests, but ST-5 also covers AC-12
      (qaPassedSuccessfully() check), which requires qa-verify.ts integration — the
      verification command should be extended to include the PASS-check scenario.

gaps:
  - id: GAP-001
    severity: high
    description: >
      `worktreeDir` missing from AC-1 QAGraphConfigSchema field list. Architecture Notes
      and Infrastructure Notes both state "worktreeDir (absolute path to story's git
      worktree) is part of QAGraphConfig", but AC-1's explicit field enumeration for
      QAGraphConfigSchema does not include worktreeDir. An implementer following AC-1
      literally will omit this field, causing run-unit-tests (AC-4) and run-e2e-tests
      (AC-5) to spawn subprocesses without a working directory. This is an MVP-blocking
      gap — both test execution nodes are inoperable without worktreeDir.
    suggested_resolution: >
      Add `worktreeDir: z.string().min(1)` (required, no default) to the
      QAGraphConfigSchema field list in AC-1. It must be required, not optional, since
      there is no meaningful fallback for subprocess working directory.
    affects_acs:
      - AC-1
      - AC-4
      - AC-5
    decision: "add_ac"
    ac_added: "AC-17: worktreeDir required in QAGraphConfigSchema"
    resolved: true

opportunities:
  - id: OPP-001
    priority: low
    description: >
      AC-2 uses `review (ReviewSchema nullable)` in state but ReviewSchema / review.ts is
      not listed in Canonical References. It appears in Reality Baseline as existing, and
      ST-2 lists it as a file to read. Adding a 5th canonical reference row for
      `packages/backend/orchestrator/src/artifacts/review.ts` would complete the reference
      set and improve discoverability for the implementing agent.
    affects_acs:
      - AC-2
      - AC-3
    decision: "log_to_kb"
    kb_entry_id: "f31e42a4-ad76-44a5-81fb-7345e1307f38"

  - id: OPP-002
    priority: low
    description: >
      ST-5 verification command is `pnpm test --filter @repo/orchestrator -- gate-decision`
      but ST-5 also covers AC-12 which encodes the qaPassedSuccessfully() check.
      Adding `-- qa-verify` or a dedicated PASS-semantics test to the verification scope
      would ensure the AC-12 contract (qaPassedSuccessfully called before PASS returned)
      is confirmed by the subtask's own verification step rather than deferred entirely to
      ST-8.
    affects_acs:
      - AC-12
    decision: "log_to_kb"
    kb_entry_id: "37414a54-7a28-4ec3-b43a-75446d0230a9"

  - id: OPP-003
    priority: low
    description: >
      createToolNode has a hard-coded 10-second timeout (timeoutMs: 10000) per node-factory.ts.
      The QA graph's subprocess-executing nodes (run-unit-tests, run-e2e-tests) are designed
      with testTimeoutMs: 300000 (5 minutes) — far exceeding createToolNode's built-in
      timeout. The story architecture is aware of this (subprocess timeout is handled via
      Promise.race at the application layer), but the story does not explicitly note that
      createToolNode's wrapper timeout will need to be overridden or that createNode should
      be called directly with a longer timeoutMs for these two nodes. This is a runtime
      correctness risk worth documenting.
    affects_acs:
      - AC-4
      - AC-5
    decision: "log_to_kb"
    kb_entry_id: "ae193a52-018d-4db4-be44-748c8a550be6"

  - id: OPP-004
    priority: low
    description: >
      The `QaVerifySchema` does not have a `gate_reasoning` or `gate_blocking_issues` field
      for storing the structured gate model response (`blocking_issues: string[]`, `reasoning:
      string` from AC-8). Currently the gate decision's `reasoning` and `blocking_issues`
      are captured in `state.gateDecision` (a string nullable field per AC-2), which loses
      the structured data before artifact write. AC-9 constructs the QaVerify artifact but
      the gate reasoning would be in the generic string. Consider adding
      `gate_reasoning: z.string().nullable().default(null)` and
      `gate_blocking_issues: z.array(z.string()).default([])` to QaVerifySchema for
      full auditability — backward-compatible additions per AC-15.
    affects_acs:
      - AC-8
      - AC-9
    decision: "log_to_kb"
    kb_entry_id: "d0245822-efa3-445f-8200-6b210dfdef43"

split_recommendation:
  recommended: true
  rationale: >
    16 ACs (2x threshold), 220K token estimate, split_risk 0.9 from PM. While the story
    is coherent (single package, no frontend/DB), the implementation depth spans 6 nodes +
    graph wiring + 7 test files = 14 new files. A mid-session split is likely given the
    token budget. Proactive split reduces review cycle risk (PM predicted 4 cycles).
  splits:
    - id: "APIP-1060-A"
      title: "QA Graph Core Nodes (Config, State, Nodes 1-5)"
      acs:
        - AC-1
        - AC-2
        - AC-3
        - AC-4
        - AC-5
        - AC-6
        - AC-7
        - AC-8
        - AC-12
      subtasks:
        - ST-1
        - ST-2
        - ST-3
        - ST-4
        - ST-5
      estimated_tokens: 36000
      note: >
        Config schema + state annotation + 5 nodes (check-preconditions, run-unit-tests,
        run-e2e-tests, verify-acs, gate-decision). Unit tests for each node included in
        this split. Does not require APIP-1050 integration.

    - id: "APIP-1060-B"
      title: "QA Graph Wiring, Artifact Write, and Full Test Suite"
      depends_on:
        - "APIP-1060-A"
      acs:
        - AC-9
        - AC-10
        - AC-11
        - AC-13
        - AC-14
        - AC-15
        - AC-16
      subtasks:
        - ST-6
        - ST-7
        - ST-8
      estimated_tokens: 28000
      note: >
        write-qa-artifact node + StateGraph wiring + runQA() entry function + graph-level
        tests (10 scenarios) + node test files completion + logging verification (AC-16).
        AC-15 (schema compat) is here because write-qa-artifact constructs the QaVerify
        object and exercises the compat constraint.

