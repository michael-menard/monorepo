      formatting in the echo server payload assertion.
    priority: low
    logged: false
    log_note: "KB unavailable at decision time (2026-02-25) — INTERNAL_ERROR from kb_write_artifact. Finding captured in ELAB.yaml for traceability."

  - id: OPP-5
