opportunities:
  - id: OPP-1
    title: "Consider getRedisClient() singleton vs createRedisClient() factory for supervisor"
    category: architecture
    description: >
      The story's reuse plan specifies: "call createRedisClient() factory for all Redis
      operations". However, redis-client.ts also exports getRedisClient() — a module-level
      singleton that reuses an existing connection if available.

      For the supervisor (a long-lived Node.js process, not Lambda), the singleton pattern
      is more appropriate: it avoids creating a new ioredis connection per blocked-transition
      event. The Lambda-specific concern ("eager connect for Lambda cold starts") in the
      factory comments does not apply to the supervisor process model.

      Recommendation: At ST-2 implementation time, evaluate whether to use the singleton
      getRedisClient() or inject a createRedisClient() instance at supervisor startup and
      reuse it. The injected-instance approach is more testable (easier to mock in ST-5).
      This is an architectural preference, not a correctness issue.
    priority: low
    logged: false
    log_note: "KB unavailable at decision time (2026-02-25) — INTERNAL_ERROR from kb_write_artifact. Finding captured in ELAB.yaml for traceability."

  - id: OPP-2
    title: "BlockedJobEventSchema and WebhookPayloadSchema — clarify scope in ST-1"
    category: scope_clarity
    description: >
      Architecture Notes reference four schemas: BlockedJobRecordSchema, NotificationConfigSchema,
      BlockedJobEventSchema, and WebhookPayloadSchema. However, ST-1 only mentions
      BlockedJobRecordSchema and NotificationConfigSchema as deliverables. The other two are
      mentioned in Architecture Notes without subtask assignment.

      BlockedJobEventSchema appears to be the event object passed from transitionToBlocked to
      dispatchNotification. WebhookPayloadSchema appears to be the HTTP POST body shape.

      Recommendation: ST-1 should explicitly include BlockedJobEventSchema and WebhookPayloadSchema
      in its files-to-modify list, or confirm they are inline type definitions within ST-2/ST-3.
      Ambiguity here risks ST-2 and ST-3 defining incompatible intermediate types.
    priority: medium
    logged: false
    log_note: "KB unavailable at decision time (2026-02-25) — INTERNAL_ERROR from kb_write_artifact. Finding captured in ELAB.yaml for traceability."

  - id: OPP-3
    title: "ZADD NX flag as complement to SET NX dedup key for sorted set idempotency"
    category: correctness_enhancement
    description: >
      The story uses MULTI/EXEC { ZADD score member, SET NX key EX 604800 } for atomicity and
      deduplication. ioredis ZADD also supports NX option: "Only add new elements. Don't update
      already existing elements." Using ZADD NX provides a second layer of idempotency at the
      sorted set level (prevents score update on duplicate ZADD) independent of the SET NX key.

      This is not required by the current ACs (deduplication is fully covered by the SET NX key
      check before dispatch). However, adding ZADD NX makes the blocked record write idempotent
      at the Redis data structure level, which protects against a race condition where two
      supervisor processes process the same exhausted job simultaneously.

      Recommendation: Evaluate at ST-2 implementation time. ZADD NX + SET NX provides defense
      in depth; ZADD (without NX) + SET NX is sufficient for the single-supervisor architecture.
    priority: low
    logged: false
    log_note: "KB unavailable at decision time (2026-02-25) — INTERNAL_ERROR from kb_write_artifact. Finding captured in ELAB.yaml for traceability."

  - id: OPP-4
    title: "Manual verification MC-1 lacks structured evidence capture in subtask plan"
    category: test_completeness
    description: >
