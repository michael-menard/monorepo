gaps:
  - id: GAP-1
    title: "ErrorCategory Zod compatibility — type vs enum impedance mismatch"
    severity: high
    description: >
      error-classification.ts exports `ErrorCategory` as a raw TypeScript `type` union
      (not a Zod schema/enum). BlockedJobRecordSchema in ST-1 must include `lastErrorCategory`
      as a Zod field, but `z.object()` cannot directly reference a TS `type`.

      The implementer must choose before ST-1:
        Option A: Mirror the 8 category values in a local `ErrorCategorySchema = z.enum([...])`
          inside supervisor/__types__/index.ts. Risk: value drift if error-classification.ts
          adds a new category without updating the supervisor schema.
        Option B: `z.string()` with `.refine(val => ERROR_CATEGORIES.includes(val))` using
          an imported const. Looser type safety at schema level, correct at runtime.
        Option C: Propose adding a `ErrorCategorySchema` export to error-classification.ts
          as a prerequisite (small 1-line change to the canonical file).

      Option C is cleanest for long-term maintenance but requires a coordinated change.
      Option A is sufficient for this story if the canonical file is treated as stable.
      A decision must be recorded before ST-1 begins to avoid rework on BlockedJobRecordSchema.
    blocking_subtask: "ST-1"
    resolution: >
      RESOLVED — Option A chosen: mirror the 8 ErrorCategory values in a local
      ErrorCategorySchema = z.enum([...]) inside supervisor/__types__/index.ts.
      A source-of-truth comment referencing error-classification.ts is required in the
      schema definition to document the drift risk. No new ACs added — AC-2 absorbs this
      decision. Implementation note added to story Architecture Notes / Implementation
      Decisions section.
    decided_at: "2026-02-25T00:00:00Z"

  - id: GAP-2
    title: "Redis write failure path undefined — transitionToBlocked has no error handling contract"
    severity: high
    description: >
      The story defines explicit swallow-and-log behavior for webhook dispatch failures (AC-7:
      "swallowed — the supervisor continues operating normally"). However, there is no defined
      behavior when the Redis MULTI/EXEC pipeline fails (e.g., Redis connection lost, EXECABORT
      from command error mid-pipeline, Redis OOM).

      If Redis is unavailable during transitionToBlocked():
        - The BlockedJobRecord is never written to pipeline:blocked:jobs
        - The deduplication NX key is never set
        - The job silently appears "not blocked" in the Redis sorted set
        - On supervisor restart, the same job may trigger transitionToBlocked again but Redis
          may still be down — creating potential for notification spam if Redis recovers
          after the dedup key write but before the notification dispatches

      Required decision before AC-1/AC-3 implementation:
        Option A: Propagate Redis error upward to BullMQ Worker 'failed' handler. BullMQ logs
          the failure; job remains in BullMQ 'failed' state (no BlockedJobRecord). Supervisor
          continues. Risk: blocked state not visible in Redis sorted set.
        Option B: Log error with event='blocked_transition_failed' + rethrow. Supervisor
          handles upstream. AC-7-style swallow explicitly excluded for Redis (vs webhook).
        Option C: Retry the Redis write once (transient connection blip) then propagate.
          Consistent with createRedisClient's retryStrategy.
      The story's "Redis AOF persistence" and "no Aurora writes" constraints make this failure
      path more consequential — Redis is the only durable record of blocked state.
    blocking_subtask: "ST-2"
    resolution: >
      RESOLVED — Option A chosen: propagate the Redis error to the BullMQ Worker 'failed'
      event handler. transitionToBlocked() does not catch Redis errors. The BullMQ handler
      catches and logs with event='blocked_transition_failed' then does not rethrow (supervisor
      continues). Job remains in BullMQ native 'failed' state — visible to operators via BullMQ.
      On Redis recovery + supervisor restart, SET NX deduplication prevents duplicate notification.
      Option C (retry-once) rejected: createRedisClient() retryStrategy already handles transient
      blips; double-retry at application layer masks issues. No new ACs added — AC-1 and AC-3
      absorb this decision. Implementation note added to story Architecture Notes / Implementation
      Decisions section.
    decided_at: "2026-02-25T00:00:00Z"

