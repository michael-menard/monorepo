story_id: APIP-1070
generated: "2026-02-25"
feasibility: viable
confidence: high
points: 13
sizing_rationale: >
  13 points reflects: 8 new node files + 1 new graph file + 1 new artifact schema +
  2 test suites (per-node and graph-level) covering 17 ACs. Complexity is driven by
  external subprocess interactions (gh CLI, git), the CI polling loop, and the
  requirement to handle all 3 verdict paths. Reuse of createToolNode, persist-learnings,
  and YAML artifact reader/writer significantly reduces scope. Main complexity centers
  are the poll-ci exponential back-off, the rebase-branch subprocess chain, and
  ensuring cleanup runs on all terminal paths.

