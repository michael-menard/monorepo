subprocess_approach:
  pattern: "child_process.spawn (never execSync)"
  injectable_runners:
    gitRunner: "(cmd: string, cwd: string) => Promise<{exitCode: number; stdout: string; stderr: string}>"
    ghRunner: "(args: string[], opts: SpawnOptions) => Promise<{exitCode: number; stdout: string; stderr: string}>"
  token_injection: "GH_TOKEN via config.ghToken ?? process.env.GH_TOKEN in env at spawn time"
  timeout: "Promise.race([exitPromise, timeoutPromise]) at nodeTimeoutMs"

ci_polling_design:
  approach: "Single long-running node with internal async loop (not LangGraph edges per poll)"
  rationale: "Avoids excessive checkpoint writes per poll iteration; LangGraph checkpoints after node completes"
  back_off: "Initial: ciPollIntervalMs (30s default). Double per attempt. Cap at ciPollMaxIntervalMs (5min). Jitter: ±10% random."
  implementation: "await sleepFn(interval) in loop body; sleepFn injectable for tests"
  timeout_enforcement: "Track startTime = Date.now(); if Date.now() - startTime > ciTimeoutMs, break with timeout"

learnings_category_mapping:
  description: "QaVerifySchema uses different enum values than LearningCategorySchema"
  mappings:
    time_sink: "time-sink"
    anti_pattern: "pattern"
    blocker: "blocker"
    pattern: "pattern"
    reuse: "reuse"

risks:
  - id: RISK-1070-01
    title: "runMerge() signature must align with APIP-0020 supervisor dispatch contract"
    severity: high
    mitigation: >
      Accept both pre-loaded QaVerify object and file path string.
      Signature: runMerge(storyId: string, qaVerifyOrPath: QaVerify | string, config: Partial<MergeGraphConfig>).
      Document the contract explicitly in graphs/merge.ts JSDoc.
      Coordinate with APIP-0020 before final implementation.

  - id: RISK-1070-02
    title: "Integration testing blocked on APIP-1060 (QA Graph) and full upstream chain"
    severity: medium
    mitigation: >
      Unit tests use mocked QaVerify objects built from QaVerifySchema directly.
      Integration testing milestone is explicitly deferred to when APIP-1060 produces
      a real QA-VERIFY.yaml. Document this in the story as a known integration gate.

  - id: RISK-1070-03
    title: "gh CLI not installed or authenticated on dedicated server"
    severity: medium
    mitigation: >
      check-preconditions node includes gh auth status preflight. Returns MERGE_BLOCKED
      with operator instructions if gh is not authenticated. Add gh CLI installation
      as a requirement to APIP-5006 (Server Infrastructure Baseline).

  - id: RISK-1070-04
    title: "Main branch advancement during CI polling causes stale PR checks"
    severity: low
    mitigation: >
      Document as known limitation for Phase 1. The poll-ci node will log a warning
      if CI checks appear stale (no state change after N polls). Full re-rebase cycle
      on stale CI is deferred to a future story.

  - id: RISK-1070-05
    title: "Exponential back-off implementation complexity in poll-ci"
    severity: low
    mitigation: >
      Use injectable sleepFn to decouple timing from logic. Verify back-off schedule
      with dedicated test T-N-CI05. Cap at ciPollMaxIntervalMs to prevent runaway delays.

