strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  packages_touched:
    - packages/backend/orchestrator

happy_path_tests:
  - id: HP-1
    title: "LangGraph implementation graph compiles with expected node and edge structure"
    setup: "Import createImplementationGraph from packages/backend/orchestrator/src/graphs/implementation.ts"
    action: "Call graph.compile() and inspect compiled graph node/edge registry"
    expected: "Graph compiles without error; nodes load-story, create-worktree, change-loop, evidence-production are present; conditional edges from change-loop to commit/retry/abort are present"
    evidence: "expect(compiledGraph).toBeDefined(); verify node names in graph.nodes"

  - id: HP-2
    title: "Change loop routes to commit on micro-verify pass"
    setup: "Create compiled implementation graph with mocked PipelineModelRouter.dispatch() returning success; mock micro-verify (tsc + pnpm test) both returning exit code 0; provide single ChangeSpec in graph state"
    action: "Invoke change loop node with a single ChangeSpec"
    expected: "changeSpec dispatched; micro-verify passes; git commit made; completedChanges includes changeSpec.id; transitions to next ChangeSpec or done"
    evidence: "expect(state.completedChanges).toContain(changeSpec.id); verify mock commit was called once"

  - id: HP-3
    title: "Change loop retries on micro-verify fail then commits on subsequent pass"
    setup: "Mock PipelineModelRouter.dispatch() returning success; mock micro-verify to fail once then pass on second call; maxRetries set to 2"
    action: "Run change loop with one failing ChangeSpec that succeeds on retry"
    expected: "First attempt: micro-verify fail → retry; second attempt: micro-verify pass → commit; completedChanges includes changeSpec.id"
    evidence: "expect retryCount to equal 1; expect(state.completedChanges).toContain(changeSpec.id)"

  - id: HP-4
    title: "Evidence production node writes EVIDENCE.yaml with correct EvidenceSchema structure"
    setup: "Prepare graph state with completedChanges, touchedFiles, commandsRun, tokenSummary; mock yaml artifact writer"
    action: "Run evidence-production node"
    expected: "EVIDENCE.yaml written to story feature directory; file validates against EvidenceSchema; fields: touched_files, commands_run, acceptance_criteria, status populated correctly"
    evidence: "Parse written YAML; EvidenceSchema.safeParse(parsed).success === true"

  - id: HP-5
    title: "Resume from checkpoint skips already-committed ChangeSpecs"
    setup: "Prepare graph state with completedChanges: ['cs-001', 'cs-002']; provide ChangeSpec list including cs-001, cs-002, cs-003; mock dispatch/micro-verify/commit for cs-003"
    action: "Run change loop"
    expected: "cs-001 and cs-002 are skipped (not dispatched); cs-003 is dispatched and committed"
    evidence: "expect(mockDispatch).toHaveBeenCalledOnce(); verify call was for cs-003 only"

  - id: HP-6
    title: "runImplementation() entry point accepts storyId and config, returns completion result"
    setup: "Mock all graph nodes; provide valid storyId and config with worktree base path"
    action: "Call runImplementation(storyId, config)"
    expected: "Graph executes from load-story through evidence-production; returns result with status, completedChanges, evidencePath"
    evidence: "expect(result.status).toBe('completed'); expect(result.completedChanges).toHaveLength(n)"

error_cases:
  - id: EC-1
    title: "BudgetExhaustedError from PipelineModelRouter triggers immediate permanent abort"
    setup: "Mock PipelineModelRouter.dispatch() to throw BudgetExhaustedError; provide 3 ChangeSpecs; change loop running"
    action: "Run change loop until dispatch throws BudgetExhaustedError on first ChangeSpec"
    expected: "Remaining ChangeSpecs not dispatched; evidence status set to 'aborted'; BudgetExhaustedError propagated to caller (not swallowed); no retry attempted"
    evidence: "expect(mockDispatch).toHaveBeenCalledOnce(); expect(state.abortReason).toContain('BudgetExhaustedError'); expect propagated error instanceof BudgetExhaustedError"

  - id: EC-2
    title: "Change loop aborts after maxRetries exceeded on persistent micro-verify failure"
    setup: "Mock PipelineModelRouter.dispatch() returning success; mock micro-verify always returning exit code 1; maxRetries = 2"
    action: "Run change loop with one ChangeSpec"
    expected: "Dispatch called 3 times total (initial + 2 retries); transitions to abort edge; evidence records abort reason"
    evidence: "expect(mockDispatch).toHaveBeenCalledTimes(3); expect(state.status).toBe('aborted')"

  - id: EC-3
    title: "load-story node produces typed LoadError when story file is missing"
    setup: "Configure graph state with path to non-existent story file"
    action: "Run load-story node"
    expected: "Node produces LoadError; graph transitions to abort edge; error includes storyId and missing file path"
    evidence: "expect(state.error.type).toBe('LoadError'); expect graph to route to abort edge"

  - id: EC-4
    title: "load-story node produces LoadError when ChangeSpec plan is missing"
    setup: "Configure valid story file but no ChangeSpec plan file at expected path"
    action: "Run load-story node"
    expected: "Node produces LoadError for missing ChangeSpec plan; graph transitions to abort edge"
    evidence: "expect(state.error.type).toBe('LoadError'); expect(state.error.reason).toMatch(/ChangeSpec/)"

  - id: EC-5
    title: "TRANSIENT model dispatch error triggers retry up to maxRetries"
    setup: "Mock PipelineModelRouter.dispatch() to throw TRANSIENT error twice then succeed; mock micro-verify passing; error-classification returns TRANSIENT for the error"
    action: "Run change loop with one ChangeSpec"
    expected: "Dispatch retried twice after TRANSIENT errors; third call succeeds; micro-verify runs; commit made; no abort"
    evidence: "expect(mockDispatch).toHaveBeenCalledTimes(3); expect(state.completedChanges).toContain(changeSpec.id)"

  - id: EC-6
    title: "PERMANENT model dispatch error (non-budget) triggers immediate abort"
    setup: "Mock PipelineModelRouter.dispatch() to throw PERMANENT error (not BudgetExhaustedError); error-classification returns PERMANENT"
    action: "Run change loop with one ChangeSpec"
    expected: "No retry; immediate transition to abort; evidence captures abort reason; error propagated"
    evidence: "expect(mockDispatch).toHaveBeenCalledOnce(); expect(state.status).toBe('aborted')"

edge_cases:
  - id: ED-1
    title: "Empty ChangeSpec list completes without error"
    setup: "Load story with valid story file but ChangeSpec plan has 0 ChangeSpecs"
    action: "Run full implementation graph"
    expected: "Change loop runs zero iterations; evidence production runs; evidence status 'completed' with empty completedChanges; graph exits cleanly"
    evidence: "expect(state.completedChanges).toHaveLength(0); expect(state.status).toBe('completed')"

  - id: ED-2
    title: "Worktree cleanup runs even when graph aborts"
    setup: "Trigger abort via BudgetExhaustedError during change loop"
    action: "Run graph through abort path"
    expected: "create-worktree node runs cleanup (git worktree remove --force) regardless of abort; graph result propagates abort state unblocked by cleanup"
    evidence: "expect(mockGitWorktreeRemove).toHaveBeenCalled(); abort result still returned"

  - id: ED-3
    title: "All ChangeSpecs already in completedChanges (full resume, nothing to do)"
    setup: "Graph state has completedChanges matching all ChangeSpec IDs in the plan"
    action: "Run change loop"
    expected: "No dispatches; loop completes immediately; evidence production runs with all ChangeSpecs recorded; status 'completed'"
    evidence: "expect(mockDispatch).not.toHaveBeenCalled(); expect(state.status).toBe('completed')"

  - id: ED-4
    title: "Integration: git worktree add creates real isolated worktree (os.tmpdir fixture)"
    setup: "Create temp git repo in os.tmpdir(); initialize with git init + initial commit; configure create-worktree node with tmpdir base path"
    action: "Run create-worktree node"
    expected: "git worktree list shows new worktree at expected path; worktree path exists in filesystem; path recorded in graph state"
    evidence: "execSync('git worktree list', { cwd: tmpRepo }) contains worktree path; fs.existsSync(worktreePath) === true"

  - id: ED-5
    title: "Integration: git commit in worktree produces real commit visible via git log (os.tmpdir fixture)"
    setup: "Create temp git repo + worktree in os.tmpdir(); write a test file to the worktree"
    action: "Run atomic commit in worktree: git add + git commit with expected message format"
    expected: "git log in worktree shows new commit with message matching feat({storyId}): {changeSpecId} — {summary}; commit SHA captured in state"
    evidence: "execSync('git log --oneline', { cwd: worktreePath }) contains expected commit message"

  - id: ED-6
    title: "Integration: micro-verify runs pnpm check-types and pnpm test scoped to changed package"
    setup: "Isolated temp fixture with a simple TypeScript package; mock ChangeSpec with touched package name"
    action: "Run micro-verify node against the fixture package"
    expected: "Both pnpm check-types --filter <package> and pnpm test --filter <package> invoked; stdout/stderr captured in commands_run array"
    evidence: "state.commandsRun includes entries for both tsc and test commands with captured output"

  - id: ED-7
    title: "Integration: git worktree remove cleans up after graph completion (os.tmpdir fixture)"
    setup: "Create temp git repo + worktree in os.tmpdir(); run full graph lifecycle to completion"
    action: "Allow graph cleanup phase to run"
    expected: "Worktree directory removed from filesystem; git worktree list no longer shows the worktree"
    evidence: "fs.existsSync(worktreePath) === false after cleanup; git worktree list clean"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "graph.compile() returns without error"
      - "EvidenceSchema.safeParse(evidenceOutput).success === true"
      - "Commit SHA in completedChanges matches real git log in integration tests"
      - "BudgetExhaustedError propagated without retry"
      - "Existing pnpm test --filter @repo/orchestrator passes unchanged (AC-13 regression guard)"
  frontend:
    playwright_runs: []
    assertions: []

manual_cases:
  - id: MC-1
    title: "RISK-001 acknowledgment: micro-verify passes but logic is semantically wrong"
    steps:
      - "Generate code that typechecks and passes scoped tests but contains a logical bug"
      - "Run micro-verify against the generated code"
      - "Observe that micro-verify passes (typecheck + scoped test both exit 0)"
      - "Review code manually and confirm the logical error exists"
    expected: "Micro-verify gate passes; logical correctness not guaranteed. This risk is documented and deferred to APIP-1060 (QA Graph). Story ACs reflect this limitation."

fixture_definitions:
  - name: "TempGitRepo"
    type: "integration-fixture"
    description: "os.tmpdir() isolated git repository with initial commit; used for create-worktree, atomic commit, and git log integration tests. Never touches the real monorepo."
  - name: "MockPipelineModelRouter"
    type: "unit-mock"
    description: "Vitest mock of PipelineModelRouter.dispatch() at the module boundary. Configured per test case to return success, TRANSIENT error, PERMANENT error, or BudgetExhaustedError."
  - name: "MockMicroVerify"
    type: "unit-mock"
    description: "Mock of the micro-verify subprocess calls (pnpm check-types + pnpm test). Configured to return exit 0 (pass) or exit 1 (fail) per test scenario."
  - name: "MockGitSubprocess"
    type: "unit-mock"
    description: "Mock of child_process.execSync / execa for git operations in unit tests. Integration tests use REAL git subprocess (no mocking per ADR-005)."
  - name: "SampleChangeSpecPlan"
    type: "test-data"
    description: "Array of 2-3 ChangeSpec objects with stable IDs, summaries, and touched package names. Used across unit and integration test suites."

risks:
  - "ChangeSpec schema not yet finalized (APIP-1020 pending) — tests using placeholder ChangeSpec schema may need schema-level updates once APIP-1020 ADR is published. Use a minimal interface-compatible stub."
  - "Integration tests require git >= 2.5 for worktree support on the test machine. Verify CI environment."
  - "pnpm check-types --filter scoping requires correct Turborepo package names in ChangeSpec metadata — mismatch will cause integration test command-not-found failures."
  - "BudgetExhaustedError class must be importable from PipelineModelRouter (APIP-0040) before those test cases can be written; use a placeholder throw until APIP-0040 is available."
  - "Graph compilation smoke test (HP-1) is high-value but fragile if LangGraph @langchain/langgraph version changes node registration API."
