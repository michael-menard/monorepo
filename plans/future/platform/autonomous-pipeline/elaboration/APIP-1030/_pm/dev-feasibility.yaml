feasible: true
confidence: medium
rationale: >
  The implementation graph is technically feasible and follows well-established
  patterns in the existing orchestrator codebase (elaboration.ts, story-creation.ts).
  The LangGraph StateGraph + Annotation + createToolNode pattern is proven across
  two existing graphs. The git worktree mechanics are standard (git >= 2.5) and
  the atomic commit pattern is straightforward with child_process/execa.

  CRITICAL GATE: Feasibility is contingent on APIP-1020 (ChangeSpec schema ADR)
  completing before integration coding begins. Without the ChangeSpec schema, no
  change loop integration code can be written. The story CAN be fully specified
  and the graph skeleton (nodes, state, routing) CAN be built without the schema,
  but the actual change loop dispatch integration is blocked.

  The sizing_warning: true is well-founded. This story spans 4 distinct technical
  domains and a split is strongly recommended at elaboration time.

complexity: high

change_surface:
  areas:
    - packages/backend/orchestrator/src/graphs/
    - packages/backend/orchestrator/src/nodes/ (new directory for implementation graph nodes)
    - packages/backend/orchestrator/src/artifacts/ (evidence production, read-only reuse)
    - packages/backend/orchestrator/src/runner/ (circuit-breaker, error-classification, node-factory — read-only reuse)
    - packages/backend/orchestrator/src/__tests__/
  endpoints: []
  deploy_touchpoints:
    - "No deployment changes — the graph runs on the existing local LangGraph server (APIP-0030)"
    - "Git must be >= 2.5 on the pipeline server for worktree support (verify before implementation)"

risks:
  - finding: "ChangeSpec schema dependency (APIP-1020) — HARD GATE"
    mitigation: >
      Do not write any change loop integration code until APIP-1020 closes and
      publishes the ChangeSpec Zod schema ADR. The graph skeleton (nodes, state
      definition, routing edges) can proceed with a placeholder ChangeSpec stub.
      AC-1 explicitly gates the integration phase. Implementation must track
      APIP-1020 status before starting AC-5 through AC-8 work.

  - finding: "PipelineModelRouter dependency (APIP-0040) — blocker for real dispatch"
    mitigation: >
      Define an IModelDispatch interface that PipelineModelRouter satisfies.
      Inject the interface into the change loop node. Unit tests mock at this
      interface boundary. Full integration (real model dispatch) requires
      APIP-0040 complete. Graph skeleton, worktree node, load-story node, and
      evidence-production node can all be built and tested before APIP-0040.

  - finding: "Sizing warning — 4 distinct technical domains increase review cycle risk"
    mitigation: >
      Strong split recommendation: APIP-1030a (graph skeleton + worktree management
      + load-story + evidence-production, no LLM dispatch) and APIP-1030b (change
      loop + model dispatch + micro-verify + atomic commit + retry logic). This
      split reduces the blast radius of each review cycle and allows APIP-1030a
      to ship before APIP-0040 is complete.

  - finding: "BudgetExhaustedError must be caught at BullMQ job processor level, not swallowed in graph"
    mitigation: >
      The implementation graph must propagate BudgetExhaustedError to its caller
      (the BullMQ job processor in APIP-0020's supervisor). The graph should NOT
      catch and suppress this error internally. This wiring requires coordination
      with the APIP-0020 supervisor implementation to ensure permanent failure
      handling is in place.

  - finding: "Atomic commit invariant — each ChangeSpec must be committed before next begins"
    mitigation: >
      Implement git add + git commit as a single synchronous operation within the
      change loop iteration using child_process.execSync with explicit cwd set to
      the worktree path. The completedChanges state update must happen AFTER the
      commit exits 0. Never batch commits. LangGraph checkpointing persists state
      after each commit, enabling safe resume.

missing_requirements:
  - "ChangeSpec Zod schema must be published as ADR from APIP-1020 before AC-1 can be completed. Story explicitly gates on this."
  - "Confirm git version >= 2.5 available on pipeline server before implementation of create-worktree node."
  - "Confirm ChangeSpec schema includes touched package names (Turborepo filter identifiers) for micro-verify scoping (AC-7 dependency)."

evidence_expectations:
  - "graph.compile() completes without error (graph compilation smoke test)"
  - "EVIDENCE.yaml validates against EvidenceSchema (Zod parse success)"
  - "Integration test shows real git commit in os.tmpdir worktree visible via git log"
  - "pnpm test --filter @repo/orchestrator passes unchanged (AC-13 regression guard)"
  - "BudgetExhaustedError propagated to caller, not swallowed (unit test)"

