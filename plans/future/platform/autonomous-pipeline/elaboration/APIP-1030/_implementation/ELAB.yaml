opportunities:
  - id: OPP-1
    title: "Token estimate calibration: subtask sum vs story prediction vs KB lesson"
    impact: LOW
    effort: LOW
    description: >
      Subtask token estimates sum to 71,000 tokens. predictions.token_estimate is
      200,000 (with low confidence). KB lesson (WKFL-004/007/010 retro) shows code
      stories with agents + schemas + CLI exceed estimates by 4-8x. Applying a 4x
      multiplier to the subtask sum yields ~284,000; applying to the 200k prediction
      yields ~400,000-800,000. The 200k estimate appears reasonable as a floor but
      may undercalibrate. Flagging for awareness, not action — the split into
      APIP-1030a/b would reduce per-story token exposure.

  - id: OPP-2
    title: "Micro-verify timeout guard missing in AC-7"
    impact: MEDIUM
    effort: LOW
    description: >
      AC-7 specifies that micro-verify runs pnpm check-types --filter and pnpm test
      --filter but does not specify a timeout. In large monorepos, test runs can
      consume unbounded time. If a generated code change introduces an infinite loop
      or hangs a test, the change loop will hang indefinitely. A configurable timeout
      (e.g., microVerifyTimeoutMs: 120000 default) with a TIMEOUT exit code treated
      as micro-verify failure would prevent runaway loops. This should be considered
      for a future AC or added to AC-7 as a clarification.

  - id: OPP-3
    title: "APIP-1030a/1030b split enables earlier downstream planning"
    impact: HIGH
    effort: MEDIUM
    description: >
      Splitting into APIP-1030a (ST-1 through ST-5: graph skeleton, load-story,
      create-worktree, evidence-production, IModelDispatch — no APIP-1020 dependency)
      and APIP-1030b (ST-6 through ST-9: change-loop, wiring, tests — gated on
      APIP-1020) would allow APIP-1030a to begin immediately alongside APIP-1020
      elaboration. APIP-1030b remains blocked on APIP-1020 as designed, but the
      infrastructure work in 1030a (7 subtasks, ~35k tokens) becomes unblocked.
      Additionally, downstream stories APIP-1040, 1050, 1060, 1070 each depend on
      APIP-1030 — earlier completion of 1030a gives them partial dependency
      satisfaction for planning purposes.

  - id: OPP-4
    title: "story.yaml metadata fields may reflect seed-era content"
    impact: LOW
    effort: LOW
    description: >
      Pattern observed in APIP-5007 elaboration (KB entry a9d3aa23): story.yaml
      feature/infrastructure fields often retain seed-era descriptions after
      elaboration. Recommend verifying APIP-1030/story.yaml aligns with elaborated
      scope after moving to ready-to-work. Low priority, non-blocking.

