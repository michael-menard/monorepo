# ============================================================================
# Gaps (MVP-blocking only)
# ============================================================================

gaps:
  - id: GAP-1
    title: "completedChanges graph state Annotation schema undefined"
    severity: HIGH
    blocking_acs:
      - AC-8
    description: >
      AC-8 requires atomic recording of completed ChangeSpecs with commit SHAs in
      graph state under completedChanges. The ImplementationGraph StateAnnotation must
      include a completedChanges field with a typed Zod schema (e.g.,
      z.array(z.object({ id: z.string(), sha: z.string() }))), but neither the
      Architecture Notes nor the Subtasks section defines this. Without it, the
      state Annotation in ST-1 will be underspecified, and the idempotent resume
      logic in ST-6 will have no typed contract to check against.
    recommendation: >
      Add to Architecture Notes: CommitRecordSchema = z.object({ id: z.string(),
      sha: z.string() }). Add completedChanges: Annotation<CommitRecord[]> to
      ImplementationGraphStateAnnotation in ST-1. This schema also serves as the
      input type for the idempotent skip check in ST-6.

  - id: GAP-2
    title: "Non-blocking worktree cleanup mechanism unspecified"
    severity: MEDIUM
    blocking_acs:
      - AC-3
    description: >
      AC-3 mandates "worktree cleanup never blocks graph result propagation
      (non-blocking cleanup pattern)" but does not specify the implementation
      mechanism. There are three viable patterns: (a) fire-and-forget async with
      setImmediate/void, (b) try/finally with synchronous git worktree remove
      (which would block), or (c) a deferred cleanup queue. Without specifying the
      pattern, implementers may accidentally implement a blocking cleanup that
      causes graph timeouts, or use fire-and-forget in a way that swallows cleanup
      errors silently, breaking observability. The choice also affects whether
      cleanup failures are logged.
    recommendation: >
      Add to Architecture Notes: "Non-blocking cleanup pattern: use a try/finally
      block where the finally runs git worktree remove --force wrapped in an
      async IIFE that is not awaited. Log cleanup errors via @repo/logger but do
      not propagate them. Example: void (async () => { try { execSync(...) }
      catch (e) { logger.warn('worktree cleanup failed', { storyId, error: e }) }
      })(). This ensures cleanup is attempted but never blocks the calling flow."

  - id: GAP-3
    title: "createToolNode wrapping ambiguity for internal graph nodes"
    severity: MEDIUM
    blocking_acs:
      - AC-2
      - AC-5
    description: >
      AC-2 states "createToolNode-wrapped nodes" as the pattern from elaboration.ts.
      However, elaboration.ts registers plain async functions directly into
      StateGraph.addNode() — it does NOT wrap each graph-internal node with
      createToolNode. createToolNode appears only in the outer workflow adapter
      (elaborationNode export). If ST-1 and ST-7 apply createToolNode to each
      internal node, the change-loop node will have an additional retry layer
      (maxAttempts: 2, timeout: 10s) conflicting with the domain-level maxRetries
      logic in AC-5. The two retry systems (node-factory retry vs change-loop
      application-level retry) need clear separation.
    recommendation: >
      Clarify in Architecture Notes: "Internal graph nodes (load-story, create-
      worktree, change-loop, evidence-production) are registered as plain async
      functions in StateGraph.addNode(), matching elaboration.ts line 952-983.
      createToolNode is used only for the runImplementation() workflow adapter
      export. The change-loop node manages its own maxRetries counter; do not wrap
      it in createToolNode to avoid double-retry interference."

