strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Decision document exists and specifies migration toolchain"
    setup: "Story implementation complete"
    action: "Read decision document at apps/api/pipeline/src/db/MIGRATION-STRATEGY.md (or equivalent); verify it covers toolchain selection, generate/apply/rollback workflows, and relationship to APIP-5001 provisional runner"
    expected: "Document exists, specifies toolchain (Drizzle-kit or plain SQL runner), documents how migrations are generated/applied in CI and local, and addresses APIP-5001 handoff"
    evidence: "File readable at documented path; passes human review of required sections"

  - id: HP-2
    title: "Pipeline schema files live at isolated location"
    setup: "Story implementation complete"
    action: "Check that all pipeline schema and migration files are under apps/api/pipeline/src/db/ (or packages/backend/pipeline-schema/); verify NO pipeline tables added to packages/backend/database-schema/src/schema/"
    expected: "Pipeline schema location is isolated; no changes to packages/backend/database-schema/"
    evidence: "git diff confirms no modifications to packages/backend/database-schema/src/schema/"

  - id: HP-3
    title: "schema_versions table defined matching SCHEMA-VERSIONING.md structure"
    setup: "Story implementation complete"
    action: "Read schema_versions definition (Drizzle table or SQL file); verify it includes: version TEXT, migration_file TEXT, description TEXT, change_type TEXT, is_breaking BOOLEAN, rollback_safe BOOLEAN, rollback_sql TEXT, story_id TEXT, applied_at TIMESTAMP, plus CHECK constraints for version format and change_type values"
    expected: "schema_versions definition matches structure from packages/backend/database-schema/docs/SCHEMA-VERSIONING.md"
    evidence: "Schema definition file contains all required columns and constraints"

  - id: HP-4
    title: "LangGraph checkpoint migrations from APIP-5001 are canonical initial migration"
    setup: "Story implementation complete"
    action: "Verify first migration file(s) at apps/api/pipeline/src/db/migrations/ contain LangGraph checkpoint table definitions (checkpoints, checkpoint_blobs, checkpoint_writes, checkpoint_migrations); migration numbering starts at 0000 or 0001"
    expected: "APIP-5001 checkpoint schema is the first migration under the formalized framework; schema can be applied from scratch"
    evidence: "Migration file exists and contains required LangGraph tables"

  - id: HP-5
    title: "Migration files follow XXXX_description.sql naming convention"
    setup: "Story implementation complete"
    action: "List all .sql files in apps/api/pipeline/src/db/migrations/; verify each matches pattern /^\\d{4}_[a-z0-9_]+\\.sql$/"
    expected: "All migration files match MIGRATION_NAME_PATTERN from validate-schema-changes.ts"
    evidence: "Shell glob/regex match confirms naming convention for all migration files"

  - id: HP-6
    title: "Schema unit tests pass without live DB"
    setup: "No runtime setup required"
    action: "Run pnpm test from pipeline package directory; unit test suite validates schema exports, Zod inference, and enum values"
    expected: "All schema unit tests pass; no live DB connection required"
    evidence: "pnpm test output shows suite passes; test file imports directly from schema module without DB pool"

  - id: HP-7
    title: "Integration test: full migration lifecycle from empty schema"
    setup: "Start APIP-5001 test DB container (compose.test-db.yaml on port 5434); ensure clean database with no applied migrations"
    action: "Run integration test that: (1) starts from empty schema, (2) applies all migrations via migration runner, (3) queries schema_versions for latest version, (4) calls testConnection() and verifies success"
    expected: "All migrations apply in sequence without error; schema_versions table contains correct version record; testConnection() returns { success: true }"
    evidence: "Integration test assertions pass; test output shows each migration applied in order"

  - id: HP-8
    title: "pnpm commands work as documented"
    setup: "Local Docker Compose pipeline test DB running"
    action: "Run each documented command: pnpm db:generate (or equivalent), pnpm db:migrate, pnpm db:status, pnpm db:validate from pipeline package; verify each exits 0 and produces expected output"
    expected: "All four commands exit 0; db:status shows applied migrations; db:validate passes on valid schema"
    evidence: "Command output and exit codes recorded"

  - id: HP-9
    title: "CI validation passes on conforming PR"
    setup: "PR with correctly-named migration file and no breaking changes"
    action: "CI pipeline runs validate-pipeline-schema-changes job (or extended validate-schema-changes job); job passes"
    expected: "CI job exits 0; validation report shows PASS status"
    evidence: "GitHub Actions job log shows validation passed"

  - id: HP-10
    title: "pnpm check-types passes with no errors"
    setup: "Story implementation complete"
    action: "Run pnpm check-types from monorepo root or pnpm check-types --filter pipeline-package"
    expected: "TypeScript compilation passes with zero errors"
    evidence: "check-types output shows 0 errors"

error_cases:
  - id: EC-1
    title: "CI validation fails on migration with incorrect naming"
    setup: "Prepare a PR that adds a migration file named 'add_checkpoint_index.sql' (missing 4-digit prefix)"
    action: "Run CI validation job on the PR"
    expected: "Job fails with critical violation: 'Migration file name does not match required pattern XXXX_description.sql'; PR is blocked"
    evidence: "CI job exits non-zero; validation report shows NAMING_CONVENTION critical violation"

  - id: EC-2
    title: "CI validation fails on migration with DROP TABLE"
    setup: "Prepare a PR that adds a migration containing 'DROP TABLE pipeline_checkpoints;' without deprecation comment"
    action: "Run CI validation job on the PR"
    expected: "Job fails with critical violation: 'Breaking change detected: DROP TABLE'; PR is blocked"
    evidence: "CI job exits non-zero; validation report shows BREAKING_CHANGE critical violation"

  - id: EC-3
    title: "pnpm db:migrate fails gracefully if DB is unavailable"
    setup: "Stop pipeline test DB container; attempt to run migration"
    action: "Run pnpm db:migrate with PIPELINE_DB_* env vars pointing to stopped container"
    expected: "Script exits non-zero with clear error message (connection refused); no partial migration state"
    evidence: "Script exit code non-zero; error message is human-readable and includes connection details"

  - id: EC-4
    title: "pnpm db:migrate is idempotent on already-migrated schema"
    setup: "Run pnpm db:migrate on a clean DB (migrations applied); do NOT clear DB"
    action: "Run pnpm db:migrate a second time on the already-migrated DB"
    expected: "Script exits 0; no errors; no duplicate schema_versions records inserted; migration runner detects already-applied state"
    evidence: "Script exit code 0; DB query shows no duplicate schema_versions entries"

  - id: EC-5
    title: "schema_versions INSERT fails on invalid version format"
    setup: "Integration test with live DB"
    action: "Attempt to INSERT into schema_versions with version = 'not-semver' (e.g., 'v1.0' without patch)"
    expected: "PostgreSQL CHECK constraint rejects the INSERT; error is caught and logged"
    evidence: "INSERT throws constraint violation with message about version_format constraint"

edge_cases:
  - id: ED-1
    title: "CI validation passes when migration contains DROP COLUMN with deprecation comment"
    setup: "PR with migration file containing '-- BREAKING CHANGE APPROVED: removing deprecated column' before DROP COLUMN statement"
    action: "Run CI validation job"
    expected: "Job passes (or passes with warning); deprecation comment is recognized and violation severity downgraded from critical to warning"
    evidence: "CI job exits 0; validation report shows WARNING (not critical) for the breaking change"

  - id: ED-2
    title: "pnpm check-types passes when pipeline drizzle.config.ts coexists with app drizzle.config.ts"
    setup: "Both packages/backend/database-schema/drizzle.config.ts and apps/api/pipeline/drizzle.config.ts present"
    action: "Run pnpm check-types:all from monorepo root"
    expected: "Type check passes for both packages; no namespace collisions; Drizzle configs are independent"
    evidence: "pnpm check-types:all exits 0 with zero errors"

  - id: ED-3
    title: "db:validate detects and reports journal consistency issue"
    setup: "Manually introduce a gap in migration journal (e.g., idx 0, idx 2 — skip idx 1)"
    action: "Run pnpm db:validate"
    expected: "Validation reports journal gap warning; does not silently pass"
    evidence: "db:validate output includes journal consistency warning"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "schema_versions table exists after applying migrations"
      - "schema_versions contains correct version record (SemVer format)"
      - "testConnection() returns { success: true } against running test DB"
      - "All checkpoint tables exist (checkpoints, checkpoint_blobs, checkpoint_writes, checkpoint_migrations)"
      - "pnpm check-types exits 0"
      - "validate-pipeline-schema-changes CI step exits 0 on conforming migration"
      - "validate-pipeline-schema-changes CI step exits 1 on naming violation"
      - "validate-pipeline-schema-changes CI step exits 1 on unguarded DROP TABLE"

manual_cases:
  - id: MC-1
    title: "Decision document review: toolchain selection rationale is sound"
    steps:
      - "Read the migration strategy decision document at the documented location"
      - "Verify it explicitly addresses: Drizzle-kit vs plain SQL runner vs LangGraph setup() decision"
      - "Verify it explains the relationship to APIP-5001 provisional runner"
      - "Verify it documents when to use each approach (checkpoint tables vs custom pipeline tables)"
      - "Verify it shows concrete commands and examples for local development workflow"
    expected: "Document is complete, unambiguous, and actionable for future pipeline story implementers"

  - id: MC-2
    title: "Operator ergonomics: pnpm command names match or are consistent with production schema commands"
    steps:
      - "Check packages/backend/database-schema/package.json for existing command names (db:generate, db:migrate, db:status, db:validate)"
      - "Check apps/api/pipeline/package.json (or equivalent) for new pipeline command names"
      - "Verify naming is consistent and would not confuse an operator working across both packages"
    expected: "Command names follow the same pattern; README documents the differences if any"

fixture_definitions:
  - name: pipeline_test_db
    type: docker-compose
    description: "Test PostgreSQL container from APIP-5001 compose.test-db.yaml; runs on port 5434 with PIPELINE_DB_* env vars; used for integration test HP-7 and error cases EC-3, EC-4, EC-5"

  - name: minimal_schema_versions_record
    type: sql-fixture
    description: "Valid schema_versions INSERT for integration tests: version='0.1.0', migration_file='0001_langgraph_checkpoint_schema.sql', change_type='MINOR', is_breaking=false, rollback_safe=true, story_id='APIP-5001'"

risks:
  - "Integration test HP-7 depends on APIP-5001 test DB container being available in CI — must document container startup in test README"
  - "CI validation test ED-1 requires careful orchestration to stage a PR with intentional violations in CI context; may require a dedicated test migration file that is added/removed as part of the test"
  - "If LangGraph setup() method handles checkpoint schema creation, AC-4 test coverage changes — the 'migration' may be a script call rather than a SQL file; test plan is written for the SQL file approach but should adapt if setup() is used"
  - "pnpm check-types coverage depends on whether pipeline package is included in the monorepo's Turborepo check-types pipeline; verify turbo.json includes the pipeline package"
