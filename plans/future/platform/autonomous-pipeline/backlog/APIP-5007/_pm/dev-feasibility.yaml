      - "apps/api/pipeline/scripts/apply-migrations.ts"
    acs: ["AC-4", "AC-7"]
    depends_on: ST-2
    verification: "drizzle.config.ts is syntactically valid TypeScript; migration runner script applies migrations, inserts schema_versions records, and is idempotent"
    estimated_tokens: 9000

  - id: ST-4
    title: "Create db:status and db:validate commands"
    goal: "Implement db:status script (reads schema_versions table, shows applied migrations with version and rollback_safe status). Implement db:validate script (runs naming/journal/breaking-change validation locally, mirrors CI gate). Register as pnpm commands in package.json. Document in README or MIGRATION-STRATEGY.md."
    files_to_read:
      - "packages/backend/database-schema/scripts/validate-schema-changes.ts"
      - "packages/backend/database-schema/docs/SCHEMA-VERSIONING.md"
    files_to_modify:
      - "apps/api/pipeline/scripts/validate-pipeline-schema.ts (create)"
      - "apps/api/pipeline/scripts/status.ts (create)"
      - "apps/api/pipeline/package.json"
    acs: ["AC-6", "AC-7"]
    depends_on: ST-3
    verification: "pnpm db:status exits 0 and shows migration list; pnpm db:validate exits 0 on valid schema; pnpm db:validate exits 1 on naming violation"
    estimated_tokens: 8000

  - id: ST-5
    title: "Create CI GitHub Actions job for pipeline schema validation"
    goal: "Add or extend GitHub Actions workflow to run validate-pipeline-schema.ts on PRs that modify apps/api/pipeline/src/db/ or apps/api/pipeline/scripts/. Job must: fail on critical violations (naming, DROP TABLE without approval), warn on best-practice issues (INDEX without CONCURRENTLY, NOT NULL without DEFAULT)."
    files_to_read:
      - "packages/backend/database-schema/scripts/validate-schema-changes.ts"
      - ".github/workflows/ (existing schema validation workflow if present)"
    files_to_modify:
      - ".github/workflows/validate-pipeline-schema.yml (create) or extend existing workflow"
    acs: ["AC-6"]
    depends_on: ST-4
    verification: "Workflow file is valid YAML; job triggers on PRs modifying pipeline schema paths; test by staging a naming violation PR locally with act or via actual PR"
    estimated_tokens: 5000

  - id: ST-6
    title: "Create schema unit tests (no live DB)"
    goal: "Create apps/api/pipeline/src/db/__tests__/pipeline-schema.test.ts following WINT schema unit test pattern. Test: schema_versions table definition exports correctly, drizzle-zod generates insert/select schemas, all enum values are present, Zod schema validates a well-formed schema_versions insert record."
    files_to_read:
      - "packages/backend/database-schema/src/schema/__tests__/wint-schema.test.ts"
      - "apps/api/pipeline/src/db/schema.ts"
    files_to_modify:
      - "apps/api/pipeline/src/db/__tests__/pipeline-schema.test.ts (create)"
    acs: ["AC-8", "AC-10"]
    depends_on: ST-2
    verification: "pnpm test passes; no live DB connection required; test imports from schema module only"
    estimated_tokens: 6000

  - id: ST-7
    title: "Create migration lifecycle integration test"
    goal: "Create apps/api/pipeline/src/db/__tests__/migration-lifecycle.integration.test.ts that: (1) starts from empty schema, (2) runs migration runner to apply all migrations, (3) queries schema_versions for latest entry, (4) verifies version format is SemVer, (5) calls testConnection() and asserts success. Test uses APIP-5001 test DB container."
    files_to_read:
      - "apps/api/pipeline/src/db/client.ts"
      - "apps/api/pipeline/scripts/apply-migrations.ts"
      - "apps/api/pipeline/src/db/__tests__/checkpoint-integration.test.ts (existing from APIP-5001)"
    files_to_modify:
      - "apps/api/pipeline/src/db/__tests__/migration-lifecycle.integration.test.ts (create)"
    acs: ["AC-9", "AC-10"]
    depends_on: ST-3
    verification: "Integration test passes when APIP-5001 test DB container is running; test output shows each migration applied and schema_versions record verified"
    estimated_tokens: 7000
