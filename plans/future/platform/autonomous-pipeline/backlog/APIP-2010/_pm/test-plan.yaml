strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
  notes: "Server-side supervisor process concern only. No HTTP API endpoints added. No Playwright/E2E required (ADR-006 does not apply — frontend_impacted: false). Integration tests require real Redis via Docker Compose and a local echo server as the Slack webhook target."

happy_path_tests:
  - id: HP-1
    title: "transitionToBlocked writes BlockedJobRecord to Redis sorted set"
    setup: "Redis running locally (REDIS_URL set). BullMQ Job mock with attemptsMade=3, opts.attempts=3 (exhausted). NotificationConfig with valid Slack webhook URL pointing to local echo server."
    action: "Call transitionToBlocked(job) once."
    expected: "BlockedJobRecord written to pipeline:blocked:jobs Redis ZADD with score = blockedAt timestamp. Record contains jobId, storyId, stage, attemptNumber=3, maxAttempts=3, lastError, lastErrorCategory, blockedAt."
    evidence: "Redis ZSCORE pipeline:blocked:jobs {jobId} returns a numeric timestamp. Redis HGET or JSON parse of the stored member contains all required fields."

  - id: HP-2
    title: "transitionToBlocked dispatches webhook POST to configured Slack URL"
    setup: "Real Redis + local HTTP echo server on port 9999 as the Slack webhook target. NotificationConfig.webhookUrl = 'http://localhost:9999/slack'. Job exhausted."
    action: "Call transitionToBlocked(job)."
    expected: "HTTP POST received at echo server within 5 seconds. Payload contains: storyId, stage, attemptNumber, maxAttempts, lastErrorCategory, blockedAt. Response 200."
    evidence: "Echo server log shows POST with correct payload. logger captures notification_sent event with redacted webhookUrl."

  - id: HP-3
    title: "NotificationConfig loads and validates successfully at supervisor startup"
    setup: "NOTIFICATION_WEBHOOK_URL env var set to a valid URL. NOTIFICATION_CHANNEL=slack."
    action: "Call loadNotificationConfig() in supervisor start()."
    expected: "NotificationConfigSchema.safeParse() returns success=true. Supervisor BullMQ Worker initializes normally."
    evidence: "Supervisor process starts without error. No process.exit() called."

  - id: HP-4
    title: "Redis SET NX deduplication key written before notification dispatch"
    setup: "Real Redis. Job exhausted (attemptsMade=3, opts.attempts=3)."
    action: "Call transitionToBlocked(job)."
    expected: "Redis key notified:{jobId}:{attemptNumber} set with NX flag and 7-day TTL (604800 seconds). TTL is retrievable via TTL command."
    evidence: "Redis TTL notified:{jobId}:3 returns value between 604700 and 604800. Redis EXISTS notified:{jobId}:3 = 1."

  - id: HP-5
    title: "job_blocked structured log event emitted on successful transition"
    setup: "Vitest unit test with mocked Redis and notification dispatch. Logger spy."
    action: "Call transitionToBlocked(job) with exhausted job."
    expected: "logger.info called once with event='job_blocked', storyId, stage, attemptNumber, maxAttempts, lastErrorCategory, blockedAt, durationMs fields."
    evidence: "Logger spy assertion on first call arguments matches required schema."

  - id: HP-6
    title: "notification_sent log event emitted with redacted webhookUrl"
    setup: "Vitest unit test with mocked fetch returning 200. Logger spy."
    action: "Call dispatchNotification(blockedEvent, notificationConfig)."
    expected: "logger.info called with event='notification_sent', channel='slack', webhookUrl='<redacted>', statusCode=200, durationMs>0."
    evidence: "Logger spy assertion confirms webhookUrl field equals '<redacted>', not the raw URL."

error_cases:
  - id: EC-1
    title: "Webhook dispatch failure (network error) is swallowed — supervisor continues"
    setup: "Vitest unit test. fetch mocked to throw a network error (ECONNREFUSED). Logger spy."
    action: "Call dispatchNotification(blockedEvent, notificationConfig)."
    expected: "No error propagated. Function returns normally. logger.error called with event='notification_failed', storyId, channel, error fields."
    evidence: "Logger spy shows notification_failed event. dispatchNotification does not throw."

  - id: EC-2
    title: "Webhook dispatch failure (non-2xx response) is swallowed — supervisor continues"
    setup: "Vitest unit test. fetch mocked to return HTTP 500 response."
    action: "Call dispatchNotification(blockedEvent, notificationConfig)."
    expected: "No error propagated. logger.error called with event='notification_failed', statusCode=500."
    evidence: "Logger spy captures notification_failed with statusCode=500. Function returns without throwing."

  - id: EC-3
    title: "Webhook dispatch timeout (>5s) is swallowed — supervisor continues"
    setup: "Vitest unit test with fake timers. fetch mocked to never resolve. AbortController with 5s timeout."
    action: "Call dispatchNotification(blockedEvent, notificationConfig). Advance fake timer by 6000ms."
    expected: "AbortError caught. logger.error called with event='notification_failed', error message includes 'aborted'."
    evidence: "Logger spy captures notification_failed. Function returns within 5100ms (with timer advance)."

  - id: EC-4
    title: "Invalid NotificationConfig causes supervisor startup failure (fail-fast)"
    setup: "NOTIFICATION_WEBHOOK_URL env var unset or set to 'not-a-url'. NOTIFICATION_CHANNEL=slack."
    action: "Call loadNotificationConfig() during supervisor start()."
    expected: "NotificationConfigSchema.safeParse() returns success=false. logger.error called with Zod error details. process.exit(1) called."
    evidence: "process.exit spy captures exit code 1. Supervisor BullMQ Worker not initialized."

  - id: EC-5
    title: "Missing NotificationConfig env var causes supervisor startup failure"
    setup: "NOTIFICATION_WEBHOOK_URL env var not set."
    action: "Call loadNotificationConfig()."
    expected: "Zod parse fails. logger.error emitted. process.exit(1) called."
    evidence: "process.exit spy called with 1. Error log includes 'notification_config_invalid'."

  - id: EC-6
    title: "transitionToBlocked not called when attemptsMade < maxAttempts"
    setup: "Vitest unit test. Job mock with attemptsMade=2, opts.attempts=3. transitionToBlocked spy."
    action: "Invoke supervisor job failure handler with the non-exhausted job."
    expected: "transitionToBlocked is NOT called. Job failure handler completes normally."
    evidence: "Spy on transitionToBlocked shows call count = 0."

  - id: EC-7
    title: "Redis MULTI/EXEC partial write failure is handled"
    setup: "Vitest unit test. Redis MULTI mock throws during EXEC. Logger spy."
    action: "Call transitionToBlocked(job) where Redis pipeline fails."
    expected: "Error caught and logged. Supervisor does not crash. BlockedJobRecord write failure is logged but not propagated as a fatal error."
    evidence: "Logger spy shows write_failed event. Function returns without throwing."

edge_cases:
  - id: ED-1
    title: "transitionToBlocked is idempotent — second call for same job is a no-op"
    setup: "Real Redis (integration) or mocked Redis returning existing NX key on second call. Job exhausted."
    action: "Call transitionToBlocked(job) twice with the same jobId and attemptNumber."
    expected: "First call: writes BlockedJobRecord to Redis, sets NX key, dispatches notification. Second call: NX key already exists → notification skipped → notification_deduplicated log event emitted → no duplicate record written."
    evidence: "Redis ZCOUNT pipeline:blocked:jobs = 1 after two calls. Logger spy shows notification_deduplicated event on second call. Notification dispatch (fetch) called exactly once."

  - id: ED-2
    title: "Deduplication prevents double notification on supervisor restart (crash-restart scenario)"
    setup: "Real Redis with notified:{jobId}:{attemptNumber} key pre-seeded (simulating prior supervisor run that crashed after Redis write but before notification). New supervisor instance starts."
    action: "New supervisor processes the same exhausted job (BullMQ re-delivers failed job on restart). Supervisor calls transitionToBlocked(job)."
    expected: "NX key already exists → notification_deduplicated log event. No second webhook POST dispatched to echo server."
    evidence: "Echo server receives 0 POST requests. Logger shows notification_deduplicated. Redis blocked record count still 1."

  - id: ED-3
    title: "Blocked record queryable from Redis without Bull Board access"
    setup: "Real Redis. One job transitioned to blocked via transitionToBlocked."
    action: "Query Redis ZRANGEBYSCORE pipeline:blocked:jobs -inf +inf WITHSCORES directly (no BullMQ client)."
    expected: "Returns at minimum 1 entry. Entry is parseable JSON containing all BlockedJobRecord fields."
    evidence: "ZRANGEBYSCORE returns array with member that JSON.parses to valid BlockedJobRecordSchema."

  - id: ED-4
    title: "Multiple concurrent blocked jobs do not interfere — each gets own deduplication key"
    setup: "Vitest unit test with mocked Redis. Two jobs exhausted simultaneously: jobId='job-A' attemptNumber=3 and jobId='job-B' attemptNumber=5."
    action: "Call transitionToBlocked(jobA) and transitionToBlocked(jobB) concurrently."
    expected: "Two separate NX keys set: notified:job-A:3 and notified:job-B:5. Two separate BlockedJobRecords in Redis sorted set. Two separate notifications dispatched."
    evidence: "Redis EXISTS for both keys = 1. ZCOUNT pipeline:blocked:jobs = 2. Notification fetch called exactly twice."

  - id: ED-5
    title: "lastErrorCategory populated from error-classification.ts for PERMANENT vs TRANSIENT errors"
    setup: "Vitest unit test. Job with lastError that classifyError() identifies as PERMANENT."
    action: "Call transitionToBlocked(job)."
    expected: "BlockedJobRecord.lastErrorCategory = 'PERMANENT'. Log event includes lastErrorCategory='PERMANENT'."
    evidence: "Redis stored record has lastErrorCategory=PERMANENT. Logger spy shows lastErrorCategory in job_blocked event."

  - id: ED-6
    title: "Existing APIP-0020 supervisor test suite passes unchanged (regression guard)"
    setup: "Run existing APIP-0020 test suite after APIP-2010 changes are applied. No modifications to dispatch router, wall-clock timeout, error classification, or circuit breaker."
    action: "pnpm test --filter @repo/pipeline-supervisor (or equivalent) runs full existing test suite."
    expected: "All pre-existing tests pass. Zero failures."
    evidence: "Test runner exit code 0. No test file changes required to make existing tests pass."

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "Redis ZSCORE pipeline:blocked:jobs {jobId} is non-null after transitionToBlocked"
      - "Redis EXISTS notified:{jobId}:{attemptNumber} = 1 after first call"
      - "Redis TTL notified:{jobId}:{attemptNumber} ≈ 604800 (7 days)"
      - "Redis ZRANGEBYSCORE pipeline:blocked:jobs -inf +inf returns valid BlockedJobRecord JSON"
      - "Echo server received POST with Content-Type: application/json"
      - "Echo server payload contains storyId, stage, attemptNumber, maxAttempts, lastErrorCategory, blockedAt"
      - "No raw webhookUrl in any logger output (redacted to '<redacted>')"
      - "process.exit(1) called when NotificationConfig invalid"

manual_cases:
  - id: MC-1
    title: "Verify Slack webhook message is human-readable with actionable fields"
    steps:
      - "Configure NOTIFICATION_WEBHOOK_URL to a real test Slack webhook (development workspace)"
      - "Manually exhaust a test BullMQ job by setting maxAttempts=1 and letting it fail"
      - "Observe Slack notification in development channel"
    expected: "Slack message shows: Story ID (human-readable label), Stage, Attempts Made / Max, Error Category. Message includes instructions for re-queuing or cancelling. No raw webhook URL visible."

fixture_definitions:
  - name: "exhausted_bullmq_job"
    type: "BullMQ Job mock"
    description: "BullMQ Job with id='test-job-001', data.storyId='STORY-001', data.stage='elaboration', attemptsMade=3, opts.attempts=3, failedReason='Connection timeout'"
  - name: "valid_notification_config"
    type: "NotificationConfig object"
    description: "NotificationConfigSchema-valid config with channel='slack', webhookUrl='http://localhost:9999/slack', channelName='#pipeline-alerts'"
  - name: "redis_test_client"
    type: "ioredis client"
    description: "Real ioredis client using createRedisClient() factory pointing to Docker Compose Redis at REDIS_URL=redis://localhost:6379/15 (db 15 for test isolation)"
  - name: "local_echo_server"
    type: "HTTP server"
    description: "Simple Node.js net.createServer or http.createServer that captures POST requests and responds 200. Used as Slack webhook target in integration tests."
  - name: "non_exhausted_job"
    type: "BullMQ Job mock"
    description: "BullMQ Job with attemptsMade=2, opts.attempts=3 — NOT exhausted, transitionToBlocked must NOT be called"

risks:
  - finding: "Real Redis required for integration tests — may not be available in all CI environments"
    mitigation: "Use Docker Compose service in CI pipeline (already established pattern from APIP-0010). Mark integration tests with @integration tag and separate Vitest config that requires REDIS_URL env var."
  - finding: "Local echo server port conflict in parallel CI runs"
    mitigation: "Use port 0 (OS-assigned) for echo server to avoid conflicts. Extract assigned port dynamically before configuring NotificationConfig in test setup."
  - finding: "APIP-0020 test suite location unknown until APIP-0020 merges"
    mitigation: "AC-13 regression guard is conditional on APIP-0020 test file locations. Dev must confirm paths before running regression suite."
  - finding: "BullMQ job.opts.attempts field access may differ between BullMQ versions"
    mitigation: "During implementation, confirm actual field name from APIP-0010 deliverables (job.opts.attempts vs defaultJobOptions). Tests must use the same field access pattern as production code."
