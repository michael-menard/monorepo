feasible: true
confidence: medium
rationale: >
  The core blocked-transition and notification pattern is well-understood: Redis SET NX for
  idempotency + fire-and-forget fetch with AbortController is a standard Node.js pattern.
  Zod schema definitions follow existing conventions in packages/backend/orchestrator/src/artifacts/.
  The primary feasibility risk is the dependency on APIP-0010 and APIP-0020 (both in-progress)
  for the exact BullMQ job schema field names and supervisor architecture. Using BullMQ native
  fields (job.attemptsMade, job.opts.attempts) rather than custom PipelineJobPayload fields
  de-risks this dependency significantly. Confidence is medium because APIP-0020 supervisor
  module structure is not yet finalized.

complexity: medium
points_estimate: 5
points_rationale: >
  13 ACs covering: new Zod schemas, Redis sorted set persistence, idempotent state transition,
  configurable notification dispatch with deduplication, startup validation, structured logging,
  unit tests (5 scenarios) + integration test. Backend-only (no frontend multiplier). Moderate
  complexity due to idempotency requirements and dependency coordination.

change_surface:
  areas:
    - "apps/api/pipeline/src/supervisor/ (APIP-0020 module — extend with blocked-transition logic)"
    - "apps/api/pipeline/src/supervisor/__types__/ (new BlockedJobRecordSchema, NotificationConfigSchema)"
    - "apps/api/pipeline/src/supervisor/blocked-transition.ts (new file)"
    - "apps/api/pipeline/src/supervisor/notification-dispatch.ts (new file)"
    - "packages/backend/orchestrator/src/runner/error-classification.ts (read-only reference)"
    - "apps/api/lego-api/core/cache/redis-client.ts (read-only, reuse createRedisClient factory)"
  endpoints: []
  deploy_touchpoints:
    - "NOTIFICATION_WEBHOOK_URL env var must be set on the dedicated pipeline server"
    - "NOTIFICATION_CHANNEL env var (default: slack)"
    - "Redis AOF persistence should be enabled (APIP-0010 concern — verify before deploy)"
    - "Docker Compose Redis service must include REDIS_URL in supervisor process env"

risks:
  - finding: "APIP-0020 supervisor module structure not finalized — job failure handler location unknown"
    mitigation: "Read final APIP-0020 deliverables before writing any code. Use BullMQ native job.attemptsMade and job.opts.attempts (stable regardless of PipelineJobPayload changes). Integration point is the BullMQ Worker 'failed' event handler."
  - finding: "Blocked records storage backend decision (Redis vs Aurora) not yet resolved"
    mitigation: "Recommendation confirmed: Redis sorted set pipeline:blocked:jobs is the correct choice. Consistent with 'supervisor has no direct DB writes' constraint from APIP-0020. APIP-2020 Monitor UI will read from Redis. If Aurora is needed later, add a pipeline_blocked_jobs table as a separate story."
  - finding: "Redis MULTI/EXEC atomicity for two-phase write (BlockedJobRecord + NX deduplication key)"
    mitigation: "Use a single Redis MULTI/EXEC pipeline to write ZADD pipeline:blocked:jobs + SET NX notified:{jobId}:{attemptNumber}. This ensures either both writes succeed or neither does, preventing partial state."
  - finding: "notification_deduplicated scenario requires pre-seeded Redis state in integration test"
    mitigation: "Integration test ED-2 pre-seeds the NX key before calling transitionToBlocked to simulate crash-restart. This is straightforward with ioredis SET command in test setup."

missing_requirements:
  - "Exact supervisor BullMQ Worker 'failed' event handler signature (from APIP-0020) — needed to correctly hook transitionToBlocked"
  - "Confirmation that APIP-0010 uses job.opts.attempts (not a custom maxAttempts field in PipelineJobPayload) for the attempt limit"

evidence_expectations:
  - "Redis ZRANGEBYSCORE pipeline:blocked:jobs -inf +inf WITHSCORES returns 1+ entries after a job is blocked"
  - "Redis GET notified:{jobId}:{attemptNumber} returns non-null after transitionToBlocked"
  - "Echo server (integration test) receives exactly 1 POST per unique jobId+attemptNumber pair, even if transitionToBlocked called twice"
  - "Supervisor process exits with code 1 when NOTIFICATION_WEBHOOK_URL is invalid (startup validation)"
  - "pnpm test passes all unit tests without REDIS_URL (mocked Redis)"
  - "pnpm test:integration passes all integration tests with REDIS_URL=redis://localhost:6379"

subtasks:
  - id: ST-1
    title: "Define Zod schemas: BlockedJobRecordSchema and NotificationConfigSchema"
    goal: "Create the canonical type definitions for blocked job records and notification configuration. These schemas flow into all other subtasks."
    files_to_read:
      - "packages/backend/orchestrator/src/artifacts/story.ts"
      - "packages/backend/orchestrator/src/runner/error-classification.ts"
    files_to_modify:
      - "apps/api/pipeline/src/supervisor/__types__/index.ts"
    acs: ["AC-2", "AC-4", "AC-5"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/pipeline (or equivalent supervisor package)"
    estimated_tokens: 6000

  - id: ST-2
    title: "Implement transitionToBlocked with Redis MULTI/EXEC and deduplication"
    goal: "Create blocked-transition.ts with idempotent transitionToBlocked(job) function. Write BlockedJobRecord to Redis sorted set pipeline:blocked:jobs and SET NX deduplication key in a single MULTI/EXEC pipeline."
    files_to_read:
      - "packages/backend/orchestrator/src/runner/circuit-breaker.ts"
      - "apps/api/lego-api/core/cache/redis-client.ts"
      - "packages/backend/orchestrator/src/runner/error-classification.ts"
    files_to_modify:
      - "apps/api/pipeline/src/supervisor/blocked-transition.ts"
    acs: ["AC-1", "AC-3", "AC-8"]
    depends_on: ST-1
    verification: "pnpm check-types; unit test: transitionToBlocked idempotency with mocked Redis"
    estimated_tokens: 10000

  - id: ST-3
    title: "Implement notification-dispatch.ts with fire-and-forget webhook POST"
    goal: "Create notification-dispatch.ts with dispatchNotification(blockedEvent, config) that POSTs to Slack webhook URL using native fetch with AbortController 5-second timeout. Catch and log all errors. Never throw."
    files_to_read:
      - "packages/backend/orchestrator/src/artifacts/story.ts"
    files_to_modify:
      - "apps/api/pipeline/src/supervisor/notification-dispatch.ts"
    acs: ["AC-6", "AC-7", "AC-10"]
    depends_on: ST-1
    verification: "pnpm check-types; unit test: notification failure does not propagate; webhookUrl redacted in logs"
    estimated_tokens: 8000

  - id: ST-4
    title: "Wire blocked-transition into supervisor BullMQ Worker failure handler"
    goal: "Integrate transitionToBlocked and dispatchNotification into the existing supervisor's BullMQ Worker 'failed' event handler. Add NotificationConfig startup validation that calls process.exit(1) on invalid config."
    files_to_read:
      - "apps/api/pipeline/src/supervisor/ (APIP-0020 final deliverables)"
    files_to_modify:
      - "apps/api/pipeline/src/supervisor/index.ts (or supervisor.ts — main supervisor file)"
    acs: ["AC-1", "AC-4", "AC-9"]
    depends_on: "ST-2, ST-3"
    verification: "pnpm check-types; supervisor starts without error with valid config; exits with code 1 with invalid config"
    estimated_tokens: 8000

  - id: ST-5
    title: "Write unit tests: all AC-11 scenarios plus notification path branches"
    goal: "Unit test suite (no real Redis, no real webhook): (a) idempotency, (b) not called when attemptsMade < maxAttempts, (c) notification failure swallowed, (d) deduplication prevents double notify, (e) invalid NotificationConfig → process.exit(1). Mock createRedisClient and fetch."
    files_to_read:
      - "apps/api/pipeline/src/supervisor/blocked-transition.ts"
      - "apps/api/pipeline/src/supervisor/notification-dispatch.ts"
    files_to_modify:
      - "apps/api/pipeline/src/supervisor/__tests__/blocked-transition.test.ts"
      - "apps/api/pipeline/src/supervisor/__tests__/notification-dispatch.test.ts"
    acs: ["AC-11"]
    depends_on: "ST-2, ST-3, ST-4"
    verification: "pnpm test without REDIS_URL — all unit tests pass"
    estimated_tokens: 12000

  - id: ST-6
    title: "Write integration test: AC-12 full lifecycle with real Redis and echo server"
    goal: "Integration test (real Docker Compose Redis, local HTTP echo server as Slack target): job exhausts attempts → transitionToBlocked → BlockedJobRecord readable from Redis → webhook POST received by echo server. Also covers ED-2 crash-restart deduplication."
    files_to_read:
      - "apps/api/pipeline/src/supervisor/blocked-transition.ts"
      - "apps/api/pipeline/src/supervisor/notification-dispatch.ts"
    files_to_modify:
      - "apps/api/pipeline/src/supervisor/__tests__/integration/blocked-lifecycle.integration.test.ts"
    acs: ["AC-12", "AC-13"]
    depends_on: "ST-5"
    verification: "pnpm test:integration with REDIS_URL=redis://localhost:6379 — all integration tests pass; APIP-0020 existing tests pass unchanged"
    estimated_tokens: 10000
