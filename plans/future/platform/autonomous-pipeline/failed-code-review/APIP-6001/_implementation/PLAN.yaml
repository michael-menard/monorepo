schema: 1
story_id: APIP-6001
timestamp: '2026-03-03T00:00:00Z'
steps:
  - id: 1
    description: >-
      Add validate_artifact_schema() function to implement-stories.sh that checks a YAML file for required fields using
      grep (bash 3.2 compatible, no yq)
    files:
      - scripts/implement-stories.sh
    dependencies: []
    slice: backend
  - id: 2
    description: >-
      Add validate_phase_gate() function to implement-stories.sh implementing per-transition artifact rules for all 5
      gate transitions (impl→needs-code-review, review→ready-for-qa, review→failed-code-review, qa→UAT, qa→failed-qa)
    files:
      - scripts/implement-stories.sh
    dependencies:
      - 1
    slice: backend
  - id: 3
    description: >-
      Wrap all move_story_to() calls in process_story() with validate_phase_gate() pre-check; on gate failure retry the
      phase up to MAX_RETRIES instead of advancing. Emit structured GATE FAIL log entries. Write GATE-FAILURE.yaml on
      exhaustion.
    files:
      - scripts/implement-stories.sh
    dependencies:
      - 2
    slice: backend
  - id: 4
    description: Change default MAX_RETRIES from 0 to 1 in implement-stories.sh
    files:
      - scripts/implement-stories.sh
    dependencies:
      - 3
    slice: backend
  - id: 5
    description: >-
      Apply gate validation in implement-dispatcher.sh: add validate_phase_gate() calls before verify_stage_transition()
      checks in process_story(). Emit GATE FAIL log entries on failure.
    files:
      - scripts/implement-dispatcher.sh
    dependencies:
      - 2
    slice: backend
files_to_change:
  - path: scripts/implement-stories.sh
    action: modify
    reason: >-
      Add validate_artifact_schema(), validate_phase_gate() functions; wrap all move_story_to() calls with gate
      validation; add GATE-FAILURE.yaml write on exhaustion; change default MAX_RETRIES from 0 to 1
  - path: scripts/implement-dispatcher.sh
    action: modify
    reason: Apply gate validation in process_story() using shared validate_phase_gate() logic to satisfy AC-8
commands_to_run:
  - command: bash -n scripts/implement-stories.sh
    when: after all changes to implement-stories.sh
    required: true
  - command: bash -n scripts/implement-dispatcher.sh
    when: after all changes to implement-dispatcher.sh
    required: true
  - command: shellcheck scripts/implement-stories.sh --severity=error
    when: after all changes
    required: false
  - command: shellcheck scripts/implement-dispatcher.sh --severity=error
    when: after all changes
    required: false
acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: >-
      validate_phase_gate() function present in implement-stories.sh accepting (story_id, from_stage, to_stage),
      returning 0 on pass
    evidence_type: file
  - ac_id: AC-2
    planned_evidence: >-
      5 gate transition rules implemented in validate_phase_gate(): impl→needs-code-review (EVIDENCE.yaml +
      touched_files + commands_run), review→ready-for-qa (REVIEW.yaml + verdict=pass|conditional-pass),
      review→failed-code-review (REVIEW.yaml + verdict=fail|concerns), qa→UAT (VERIFICATION.yaml + verdict=pass),
      qa→failed-qa (VERIFICATION.yaml + verdict=fail)
    evidence_type: file
  - ac_id: AC-3
    planned_evidence: >-
      Every move_story_to() call in process_story() is wrapped with validate_phase_gate(); gate failure triggers phase
      retry up to MAX_RETRIES before exhausting
    evidence_type: file
  - ac_id: AC-4
    planned_evidence: 'MAX_RETRIES default changed from 0 to 1 (line: MAX_RETRIES=1)'
    evidence_type: file
  - ac_id: AC-5
    planned_evidence: 'Structured GATE FAIL log entry emitted: ''GATE FAIL: {story_id} ({from} -> {to}): missing {artifact} field {field}'''
    evidence_type: file
  - ac_id: AC-6
    planned_evidence: >-
      GATE-FAILURE.yaml written to _implementation/ when max-retries exhausted after gate failures; story moved to
      failed-code-review or failed-qa
    evidence_type: file
  - ac_id: AC-7
    planned_evidence: >-
      Existing stories already in later stages (with artifacts present) pass gate validation without being blocked;
      backward-compat logic confirmed via code inspection
    evidence_type: manual
  - ac_id: AC-8
    planned_evidence: Gate validation applied in implement-dispatcher.sh process_story() using same validate_phase_gate() logic
    evidence_type: file
architectural_decisions: []
complexity: moderate
notes:
  - Both target files are modifications to existing scripts, not new files
  - >-
    The scope artifact incorrectly lists paths as plans/future/platform/autonomous-pipeline/**; actual files are at
    scripts/implement-stories.sh and scripts/implement-dispatcher.sh
  - >-
    validate_artifact_schema() extends existing validate_artifact() — same grep-based field extraction, bash 3.2
    compatible
  - >-
    validate_phase_gate() must handle backward compat: stories already in advanced stages with valid artifacts should
    never be blocked
  - >-
    VERIFICATION.yaml field name: the existing code uses QA-VERIFY.yaml (not VERIFICATION.yaml); must check actual field
    names in existing QA agent output — the story seed says VERIFICATION.yaml; implement-stories.sh uses
    VERIFICATION.yaml in validate_artifact() call at line 1362. Use VERIFICATION.yaml.
  - >-
    verdict field values in REVIEW.yaml from observed artifacts use uppercase: PASS, FAIL. Story seed ACs say 'pass' or
    'conditional-pass'. The validate_phase_gate() must handle both cases (case-insensitive grep). Use grep -i.
  - GATE-FAILURE.yaml is written to the story's _implementation/ dir before moving to the failure stage
  - >-
    implement-dispatcher.sh is a simpler script — it calls claude for impl/review/QA sequentially; gate validation there
    means checking artifacts after each claude invocation and before calling verify_stage_transition()
  - >-
    No pnpm/TypeScript changes — bash-only changes, no build needed. Syntax check via 'bash -n' is the verification
    gate.
  - shellcheck is optional (may not be installed); bash -n is the required check
