strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "Structurer node produces correct change_outline from multiple ACs"
    setup: "Create mock ElaborationState with currentStory containing 3 ACs referencing distinct files (auth service, user repository, API route). Set structurerConfig.splitThreshold: 15."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "Returns state updates with changeOutline array of 3+ ChangeOutlineItems, each with id (CO-N), filePath, changeType, description, complexity (low/medium/high), estimatedAtomicChanges >= 1, relatedAcIds non-empty. totalEstimatedAtomicChanges = sum of all estimatedAtomicChanges. splitRequired: false (total <= 15). fallbackUsed: false. structurerComplete: true."
    evidence: "Vitest assertion on returned state shape; validate against ChangeOutlineItemSchema with z.parse()"

  - id: HP-2
    title: "Split flagging activates when total estimated atomic changes exceed threshold"
    setup: "Create mock ElaborationState with 6 ACs each referencing 3+ cross-cutting systems (e.g., auth, DB, queue, API, cache, metrics). Configure structurerConfig.splitThreshold: 15."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "splitRequired: true. splitReason contains a human-readable explanation naming the contributing changes with their estimated counts. totalEstimatedAtomicChanges > 15."
    evidence: "Assert splitRequired === true, splitReason is non-null string containing CO-N references, totalEstimatedAtomicChanges > splitThreshold"

  - id: HP-3
    title: "Split does NOT trigger when total atomic changes are at or below threshold"
    setup: "Create mock ElaborationState with 3 ACs referencing single-system changes. structurerConfig.splitThreshold: 15."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "splitRequired: false. splitReason: null. totalEstimatedAtomicChanges <= 15."
    evidence: "Assert splitRequired === false, splitReason === null"

  - id: HP-4
    title: "Custom splitThreshold is respected"
    setup: "Create mock ElaborationState with 3 ACs producing ~10 estimated changes. Set structurerConfig.splitThreshold: 5."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "splitRequired: true because 10 > 5. splitReason non-null."
    evidence: "Assert splitRequired === true at threshold 5 for same data that produces splitRequired:false at threshold 15"

  - id: HP-5
    title: "Structurer node wired correctly — graph.compile() succeeds with structurer node"
    setup: "Import elaboration graph with Structurer node added. No mocking of LLM — mock createStructurerNode to return a no-op that sets structurerComplete:true."
    action: "Call graph.compile() on the elaboration graph"
    expected: "Compilation succeeds without error. Compiled graph includes 'structurer' node in node registry."
    evidence: "No thrown exception from graph.compile(). inspect compiled graph node list for 'structurer'."

  - id: HP-6
    title: "Routing from aggregate_findings reaches structurer when enabled"
    setup: "Mock elaboration graph state with aggregate_findings complete. structurerConfig.enabled: true."
    action: "Invoke afterAggregate routing function with state"
    expected: "Returns 'structurer' as next node name."
    evidence: "Assert afterAggregate(state) === 'structurer' when enabled:true"

  - id: HP-7
    title: "Routing bypasses structurer when disabled"
    setup: "Mock state with structurerConfig.enabled: false."
    action: "Invoke afterAggregate routing function with disabled state"
    expected: "Returns 'update_readiness' (bypasses structurer)."
    evidence: "Assert afterAggregate(state) === 'update_readiness' when enabled:false"

  - id: HP-8
    title: "ElaborationResult carries changeOutline nullable fields"
    setup: "Run full elaboration with Structurer enabled (mocked node). Result returned from runElaboration()."
    action: "Parse returned ElaborationResult with ElaborationResultSchema.parse()"
    expected: "Parse succeeds. changeOutline is array or null. splitRequired is boolean. splitReason is string or null. totalEstimatedAtomicChanges is number or null."
    evidence: "No Zod parse error. Verify field types match schema."

error_cases:
  - id: EC-1
    title: "Model error triggers graceful fallback — elaboration not blocked"
    setup: "Create mock ElaborationState with 3 ACs. Configure Structurer to use LLM path. Mock LLM call to throw Error('Model timeout')."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "Node returns normally (no re-throw). fallbackUsed: true. changeOutline contains one ChangeOutlineItem per AC with complexity: 'unknown', estimatedAtomicChanges: 1. structurerComplete: true. Elaboration continues."
    evidence: "Assert no exception propagated. Assert fallbackUsed === true. Assert changeOutline.length === ac_count. Assert all items have complexity === 'unknown'."

  - id: EC-2
    title: "Empty acceptanceCriteria returns empty outline — no error state"
    setup: "Create mock ElaborationState with currentStory.acceptanceCriteria: []."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "changeOutline: []. splitRequired: false. structurerComplete: true. state.warnings contains at least one entry about empty ACs. currentPhase is NOT 'error'."
    evidence: "Assert changeOutline.length === 0. Assert warnings.length >= 1. Assert currentPhase !== 'error'."

  - id: EC-3
    title: "Null currentStory returns empty outline — no error state"
    setup: "Create mock ElaborationState with currentStory: null."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "changeOutline: []. splitRequired: false. structurerComplete: true. Warning appended to state.warnings."
    evidence: "Assert no exception. Assert changeOutline === [] or null-coerced to []."

edge_cases:
  - id: ED-1
    title: "Single AC with high cross-cutting complexity — correct single-item outline"
    setup: "Mock state with 1 AC that references auth, database, and queue systems. escapeHatchResult indicates cross-cutting."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "changeOutline has entries for each anticipated file change. At least one item has complexity: 'high' given cross-cutting signals from escapeHatchResult."
    evidence: "Assert at least one ChangeOutlineItem has complexity in ['high', 'medium']. Assert relatedAcIds includes the single AC's id."

  - id: ED-2
    title: "Exactly at split threshold — no split flagged"
    setup: "Tune mock ACs to produce exactly totalEstimatedAtomicChanges === splitThreshold (e.g., threshold 15, total exactly 15)."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "splitRequired: false (boundary is > threshold, not >=)."
    evidence: "Assert splitRequired === false when total === threshold."

  - id: ED-3
    title: "One above threshold — split flagged"
    setup: "Tune mock ACs to produce totalEstimatedAtomicChanges === splitThreshold + 1."
    action: "Invoke createStructurerNode(config)(mockState)"
    expected: "splitRequired: true. splitReason non-null."
    evidence: "Assert splitRequired === true when total === threshold + 1."

  - id: ED-4
    title: "Existing elaboration tests still pass after Structurer wiring (regression)"
    setup: "Run full elaboration.test.ts test suite without changes to existing test cases."
    action: "pnpm test --filter packages/backend/orchestrator"
    expected: "All pre-existing elaboration tests pass. No regressions on existing routing paths, schema parsing, or runElaboration() call signature."
    evidence: "Zero failing tests in elaboration.test.ts suite. No new TypeScript errors."

  - id: ED-5
    title: "StructurerResult is valid Zod-parseable structure"
    setup: "Run Structurer node on well-formed mock state."
    action: "Parse returned structurerResult with StructurerResultSchema.parse()"
    expected: "Parse succeeds. All required fields present and typed correctly (storyId: string, structuredAt: ISO datetime, durationMs: number, fallbackUsed: boolean)."
    evidence: "No Zod parse error."

  - id: ED-6
    title: "New Structurer exports available from elaboration/index.ts"
    setup: "Import ChangeOutlineItemSchema, StructurerResultSchema, StructurerConfigSchema, createStructurerNode from packages/backend/orchestrator/src/nodes/elaboration/index.ts"
    action: "TypeScript compilation check"
    expected: "No import errors. All exports resolve correctly."
    evidence: "pnpm check-types --filter packages/backend/orchestrator passes with no errors."

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "ChangeOutlineItemSchema.parse(item) — validates each outline item structure"
      - "StructurerResultSchema.parse(result) — validates full structurer output"
      - "ElaborationResultSchema.parse(result) — validates backward compat of ElaborationResult"
      - "graph.compile() — no exception verifies graph wiring"
      - "afterAggregate(state) === 'structurer' | 'update_readiness' — routing verification"
      - "splitRequired === (totalEstimatedAtomicChanges > splitThreshold) — threshold logic"

manual_cases:
  - id: MC-1
    title: "Verify splitReason is human-readable and actionable on the server environment"
    steps:
      - "Run elaboration graph against a real story with 6+ complex ACs on the local LangGraph server"
      - "Inspect ElaborationResult.splitReason from the returned result"
      - "Verify the reason names contributing ChangeOutlineItems by ID with their estimated atomic change counts"
      - "Example expected format: 'Story exceeds split threshold: 22 estimated atomic changes (threshold: 15). Contributing changes: [CO-3: modify AuthService (8), CO-7: create UserQuotaAdapter (9)].'"
    expected: "splitReason is human-readable, actionable, and names specific contributing changes"

fixture_definitions:
  - name: mockElaborationStateWithACs
    type: "ElaborationState"
    description: "Mock LangGraph state with currentStory.acceptanceCriteria populated (3-6 ACs), escapeHatchResult set, structurerConfig injected"
  - name: mockElaborationStateEmpty
    type: "ElaborationState"
    description: "Mock state with currentStory.acceptanceCriteria: [] for empty-AC edge case"
  - name: mockElaborationStateNullStory
    type: "ElaborationState"
    description: "Mock state with currentStory: null for null-story edge case"
  - name: mockStructurerConfigDefault
    type: "StructurerConfig"
    description: "Default config: enabled:true, splitThreshold:15, maxChangesPerItem:50, nodeTimeoutMs:60000"
  - name: mockStructurerConfigLowThreshold
    type: "StructurerConfig"
    description: "Config with splitThreshold:5 for threshold boundary tests"

risks:
  - "Integration tests require real LangGraph graph.compile() — must not require real LLM; mock Structurer node function, not the graph runtime"
  - "Heuristic estimation is non-deterministic based on AC text parsing — parametric test fixtures must be carefully controlled"
  - "Backward compat risk: if ElaborationResultSchema changes break any existing caller test, it surfaces as a regression in ED-4"
  - "Graph routing test fragility: afterAggregate conditional edge must be tested as a pure function, not via dynamic graph traversal"
  - "AC-13f (threshold config test) depends on deterministic heuristic output — ensure test fixtures reliably produce known estimatedAtomicChanges totals"
