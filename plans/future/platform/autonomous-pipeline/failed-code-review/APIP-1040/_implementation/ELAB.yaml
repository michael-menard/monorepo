gap_decisions:
  GAP-001:
    decision: RESOLVED_VIA_AC
    added_ac: AC-18
    rationale: >
      AC-4 already has timeoutMs: 120000 default in DocWorkerConfigSchema.
      AC-18 makes explicit that 5 LLM-calling workers must use createLLMNode
      (or equivalent >= 60s timeout factory) and must pass config.timeoutMs
      to the node factory. KB Sync Worker explicitly permitted to use
      createToolNode. No structural change needed — this is a clarification
      that closes the gap.

  GAP-002:
    decision: RESOLVED_VIA_AC
    added_ac: AC-19
    rationale: >
      The aggregate node was architecturally described but not contracted in
      any AC. AC-19 provides the explicit contract: sentinel count check,
      pass-through behavior, logging on mismatch, deadlock prevention,
      distinction from DocReviewNode, and scoping to ST-9/ST-12. This
      prevents developer conflation of aggregate and doc-review nodes.

  GAP-003:
    decision: RESOLVED_VIA_AC
    added_ac: AC-20
    rationale: >
      ProposedFileChangeSchema was referenced in 4 ACs without being defined.
      AC-20 specifies the complete Zod schema with all required fields.
      The 'delete' operation is intentionally excluded from the operation enum
      to enforce the append-only KB Sync Worker constraint at the schema level.
      workerName field added (beyond minimal recommendation) to enable
      DocReviewNode to attribute which worker proposed each change.

