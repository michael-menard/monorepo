# ============================================================================
# DISCOVERY ANALYSIS
# ============================================================================

gaps:
  mvp_critical:
    - id: GAP-001
      title: "createToolNode 10s timeout too short for LLM-calling doc workers"
      severity: HIGH
      description: >
        createToolNode() uses tool preset: 10s timeout, 2 retries.
        Doc workers that call an LLM (api-docs, component-docs, architecture-docs,
        readme-guides, changelog workers) will likely exceed 10s for non-trivial
        diffs. The story calls out 'cheap model via config.model' but even cheap
        models (haiku, gemini-flash) can take 15-30s for document generation tasks.
        Using createToolNode for LLM-calling workers risks systematic timeout
        failures. createLLMNode (60s, 5 retries) is the correct preset.
        Alternatively, workers should accept timeoutMs in their config and
        override the preset. Either way, the story should specify which factory
        to use for LLM-calling workers.
      affects_acs: ["AC-5", "AC-6"]
      resolution: >
        Use createLLMNode (or createNode with custom retry config including
        timeoutMs: 120000) for the 5 LLM-calling workers. KB Sync Worker
        (primarily doing KB search + conditional write) can use createToolNode.
        Add timeout override to DocWorkerConfigSchema (timeoutMs already
        exists in AC-4 — confirm it flows to createNode retry config).
      blocking: true

    - id: GAP-002
      title: "Aggregate node contract unspecified — sentinel count implementation implicit"
      severity: MEDIUM
      description: >
        The graph flow requires a dedicated 'aggregate' node between the 6
        workers and 'doc-review'. This node must: (a) check
        state.workerResults.length >= state.expectedWorkers to detect completion,
        and (b) pass through to doc-review only when all workers have reported.
        No AC explicitly specifies this node's contract. AC-11 mentions it in
        graph wiring but does not describe its logic. No subtask explicitly
        implements it — ST-7 covers DocReviewNode, ST-9 covers wiring.
        Without explicit specification, a developer might conflate 'aggregate'
        with 'doc-review' or implement it incorrectly.
      affects_acs: ["AC-11"]
      resolution: >
        Add explicit sentinel count check to AC-11 or create AC-11a. The
        aggregate node should: read state.workerResults.length and
        state.expectedWorkers; if equal, return {} (no-op, pass through);
        if not equal, this indicates a LangGraph wiring issue. Include this
        in ST-9 implementation scope.
      blocking: true

    - id: GAP-003
      title: "ProposedFileChangeSchema not defined in any AC"
      severity: HIGH
      description: >
        Multiple ACs (AC-6, AC-9, AC-10) reference ProposedFileChange and
        state.proposedFileChanges, but no AC defines the ProposedFileChangeSchema
        Zod schema. AC-1 mentions 'proposedFileChanges: Annotation<ProposedFileChange[]>'
        and AC-3 mentions 'proposedChanges: z.array(ProposedFileChangeSchema)'
        but neither defines what ProposedFileChangeSchema contains. ST-1 is
        expected to define it but the schema fields are not specified.
        A developer implementing ST-1 must invent this schema — creating risk
        of inconsistency between workers (one worker might propose
        {filePath, content, operation} while another uses {path, newContent, type}).
      affects_acs: ["AC-1", "AC-3", "AC-6", "AC-10"]
      resolution: >
        Define ProposedFileChangeSchema fields explicitly in the story (or
        in ST-1 guidance). Recommended minimum:
        z.object({
          filePath: z.string(),
          operation: z.enum(['create', 'update', 'delete']),
          content: z.string().nullable(),
          reason: z.string(),
        })
        The 'delete' operation should probably be restricted per AC-7
        (KB Sync Worker never proposes deletion) — DocReviewNode blocks
        on any delete in KB worker output (EC-3).
      blocking: true

  future_opportunities:
    - id: OPP-001
      title: "Shared fixture factory for 6 worker tests"
      description: >
        The test plan risk notes '6 parallel workers mean 6 test files —
        use shared fixture factory'. A createMockMergeEventPayload() and
        createMockDocWorkerConfig() helper in a test utilities file would
        reduce test boilerplate significantly. Not blocking but improves
        maintainability.
      affects_acs: ["AC-14"]

    - id: OPP-002
      title: "AC-12 inclusion in ST-1 creates Phase A/B boundary ambiguity"
      description: >
        AC-12 is Phase B material but is listed in ST-1 dependencies.
        If a developer partially implements DocGraphConfigSchema in ST-1
        (just enough for Phase A to type-check) but defers full
        minSuccessThreshold/commitMessage fields to Phase B, this is
        technically correct but may confuse reviewers. Recommend the
        developer implement DocGraphConfigSchema fully in ST-1 even if
        Phase B formally claims it — since all downstream workers need it
        for type safety.
      affects_acs: ["AC-12"]

    - id: OPP-003
      title: "DocCommitResult schema unspecified"
      description: >
        AC-1 includes 'commitResult: Annotation<DocCommitResult | null>' in
        DocGraphStateAnnotation but no AC defines DocCommitResultSchema fields.
        AC-10 describes commit node behavior but not the result shape.
        Recommended fields: { committed: boolean, commitSha: string | null,
        filesWritten: string[], durationMs: number, error: string | null }.
        This is non-blocking (developer can define it) but worth noting.
      affects_acs: ["AC-1", "AC-10"]

    - id: OPP-004
      title: "DocReviewResult schema unspecified"
      description: >
        AC-1 includes 'docReviewResult: Annotation<DocReviewResult | null>'
        but the schema fields are only implied by AC-9's description.
        Recommended Zod schema fields: { docReviewPassed: z.boolean(),
        commitBlocked: z.boolean(), commitBlockedReason: z.string().nullable(),
        workerSuccessCount: z.number(), workerFailureCount: z.number() }.
        Non-blocking but should be explicit.
      affects_acs: ["AC-1", "AC-9"]

    - id: OPP-005
      title: "git operations in commit node may need spawn abstraction for testability"
      description: >
        AC-10 requires the commit node to 'create a git commit' via git
        operations. The story does not specify how git is invoked (exec,
        spawn, simple-git library). For testability, git operations should
        be injectable (e.g., gitCommitFn in commit node config) similar to
        how kbSearchFn/kbAddFn are injectable in KB Sync Worker. Otherwise
        unit tests must mock child_process.exec.
      affects_acs: ["AC-10"]

