feasible: true
confidence: high
rationale: >
  All required patterns exist in the codebase. The createToolNode factory, Annotation-based state,
  and fan-out node structure from elaboration.ts and fanout-pm.ts provide direct templates for
  the 6 doc workers and graph wiring. The 7-phase doc-sync node provides reusable file discovery
  and changelog logic. The persist-learnings node provides the exact 0.85-threshold KB deduplication
  guard the KB Sync Worker must replicate. LangGraph Send API is already used in the codebase.
  The story's complexity is high but well-understood — all patterns are established.
  Sizing warning is noted: scope should be shipped as Phase A (scaffold + stubs with real file
  discovery) first, with Phase B (prompt quality refinement) as a follow-up if token budget fills.
complexity: high
change_surface:
  areas:
    - packages/backend/orchestrator/src/nodes/doc-workers/ (new directory, 6 worker files + index)
    - packages/backend/orchestrator/src/graphs/doc-graph.ts (new graph file)
    - packages/backend/orchestrator/src/graphs/__tests__/doc-graph.test.ts (new graph test)
    - packages/backend/orchestrator/src/nodes/doc-workers/__tests__/ (6 worker test files + review test)
  endpoints: []
  deploy_touchpoints:
    - "No deploy changes — headless graph on dedicated server. No Lambda. No API Gateway."
    - "APIP-5006 LangGraph Server must be running for integration tests (not unit tests)"
risks:
  - finding: "Sizing warning: 17 ACs spanning 6 workers + Doc Review + commit node may exceed single story"
    mitigation: >
      Implement AC-1 through AC-11 as Phase A (graph scaffold, dispatch, 6 worker stubs with
      real file discovery logic, basic Doc Review, commit node). Ship Phase A as the story.
      AC-12 through AC-17 (config schema finalization, exports, full test suite) as Phase B follow-up
      if Phase A fills budget. Define clear AC split point: Phase A must compile and pass graph
      routing tests even if worker prompt logic is no-op stubs.
  - finding: "KB Sync Worker hallucination risk: auto-generated KB entries may overwrite valid learnings"
    mitigation: >
      Mandatory: replicate persist-learnings.ts dedup guard (kbSearchFn before kbAddFn, 0.85
      threshold). KB Sync Worker must tag all entries with ['auto-generated', 'source:{storyId}'].
      Never propose deletions. Doc Review node must check for deletion attempts. Injectable
      kbSearchFn and kbAddFn via config for testability.
  - finding: "Aggregate node sentinel count: LangGraph has no built-in join barrier for Send-dispatched nodes"
    mitigation: >
      Add expectedWorkers: Annotation<number> field to DocGraphState. Dispatch node sets it
      to count of enabled workers. Aggregate node polls workerResults.length vs expectedWorkers
      to detect completion. Use reducer: append on workerResults to accumulate as workers complete.
  - finding: "Parallel git commits: multiple workers could attempt simultaneous file writes"
    mitigation: >
      Centralized commit node only — workers NEVER write to filesystem, only to graph state.
      All proposedFileChanges are written atomically by commit node after Doc Review passes.
      This is the canonical pattern per seed constraints.
  - finding: "Model assignment hardcoded in Phase 1: DocWorkerConfig.model must be required string"
    mitigation: >
      All 6 worker configs require model: z.string() (not optional). Phase 1 callers pass
      hardcoded cheap model string (e.g., 'claude-haiku-4'). APIP-0040 Model Router supplies
      model dynamically in Phase 3 — design is forward-compatible.
missing_requirements: []
evidence_expectations:
  - "graph.compile() does not throw — proves graph wiring is valid"
  - "dispatch node returns Send[] of length === enabled worker count"
  - "DocWorkerResultSchema.parse() validates all 6 worker outputs"
  - "KB Sync Worker: kbSearchFn spy called before any kbAddFn call in unit tests"
  - "dryRun: true run produces fs.writeFile call count === 0"
  - "pnpm check-types --filter @repo/orchestrator passes after all new files added"
  - "pnpm test --filter @repo/orchestrator passes all new test files"

