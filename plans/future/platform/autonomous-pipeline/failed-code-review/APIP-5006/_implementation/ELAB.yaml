opportunities:
  - id: OPP-1
    title: "Add .env.example template for checkpoint DB and Aurora credentials"
    description: >
      The story correctly avoids hardcoding secrets and documents the checkpoint pool
      spec in README.md. However, an infra/langgraph-server/.env.example file listing
      required environment variable names (CHECKPOINT_DB_HOST, CHECKPOINT_DB_PORT,
      CHECKPOINT_DB_NAME, CHECKPOINT_DB_USER, CHECKPOINT_DB_PASSWORD, CHECKPOINT_DB_POOL_MAX)
      would accelerate the APIP-0030 handoff and reduce onboarding friction. No secrets
      stored — only variable names as placeholders. Non-blocking; APIP-5004 (Secrets
      Engine) is the correct story for full secrets management.
    blocking: false
    suggested_story: "APIP-5004 or add as optional subtask to APIP-5006 if reviewer approves"
    decision: "log_to_kb"
    kb_entry_id: "641aebff-2893-4c3f-8b42-b57f40ffbe8c"

  - id: OPP-2
    title: "Prometheus scrape target for LangGraph server is marked optional — track for APIP-2020"
    description: >
      The scope table lists infra/prometheus/prometheus.yml modification as optional.
      If LangGraph Platform exposes a /metrics endpoint, adding the scrape target during
      APIP-5006 is low-cost and would give APIP-2020 (Monitor UI) immediate data. This
      should be explicitly tracked as a deferred task for APIP-2020 or an optional
      completion item for APIP-5006 with reviewer sign-off.
    blocking: false
    suggested_story: "APIP-2020 (Monitor UI v1)"
    decision: "log_to_kb"
    kb_entry_id: "7c521592-13c9-4129-a0ae-1f512daefec5"

  - id: OPP-3
    title: "ST-3 five-AC span — consider splitting for future re-elaboration"
    description: >
      ST-3 currently covers AC-3, AC-4, AC-5, AC-6, and AC-8 in one subtask. While
      acceptable for Phase 0 (single README.md output), a future re-elaboration should
      split into ST-3a (resource limits, network config, checkpoint DB spec) and ST-3b
      (deployment procedure, APIP-0030 handoff checklist) to reduce cognitive load per
      subtask and enable parallel authoring.
    blocking: false
    suggested_story: "Address in re-elaboration if story is re-opened"
    decision: "log_to_kb"
    kb_entry_id: "ae416027-b5ab-41a1-8c9e-55b5acb3bd17"

