    description: >
      EC-2 tests that the change-loop node continues when writeTelemetry throws. The test plan
      says this is executable via mock injection, but the subtask decomposition does not clarify
      whether this test belongs in ST-4 (unit, no APIP-1030 needed) or ST-6 (gated). If it can
      be implemented with a minimal stub wrapper of the change-loop node, it should be in ST-4
      to maximise pre-APIP-1030 coverage. Low risk — implementer can decide at coding time.
    priority: low
    blocking: false
    decision: log_to_kb
    kb_entry_id: "b6969830-466d-411a-9dbb-ec63d712914f"

