# ============================================================================
# Lessons
# ============================================================================

lessons_to_record:
  - lesson: >
      QA must run tests from the story worktree (/tree/story/{STORY_ID}), not from main.
      Pipeline implementation files only exist on the story branch until merged.
      Running pnpm test from main will show 'No test files found' for story-specific tests.
    category: pattern
    tags: ["qa", "worktree", "git", "backend"]

  - lesson: >
      vi.useFakeTimers() + while-loop setTimeout pattern works cleanly for token bucket
      rate limiter tests. Promise.allSettled is the right pattern for testing concurrent
      consume() calls that may throw, avoiding unhandled rejection warnings.
    category: pattern
    tags: ["testing", "vitest", "async", "rate-limiting"]

  - lesson: >
      Object.setPrototypeOf(this, ErrorClass.prototype) is required in custom Error
      subclasses when TypeScript targets ES5/CommonJS due to prototype chain breakage.
      All three pipeline errors (BudgetExhaustedError, RateLimitExceededError,
      ProviderChainExhaustedError) apply this correctly.
    category: pattern
    tags: ["typescript", "error-handling", "prototype"]

  - lesson: >
      DB-backed model assignment loading can be implemented as an in-memory cache
      (loadAssignmentsCache / invalidateAssignmentsCache pattern) without requiring
      a full DB driver in scope for the initial story. This scoping decision is valid
      and properly documented in EVIDENCE.yaml known_deviations.
    category: pattern
    tags: ["backend", "database", "caching", "scope"]

