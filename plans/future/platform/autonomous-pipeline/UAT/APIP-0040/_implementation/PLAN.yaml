steps:
  - id: 1
    subtask_id: "ST-1"
    description: "Create PipelineModelRouter types and error classes in pipeline/__types__/index.ts. Define Zod schemas for BudgetExhaustedError, RateLimitExceededError, ProviderChainExhaustedError with correct prototype chains (this.name assignment). Define PipelineDispatchOptionsSchema (storyId, agentId, messages: BaseMessage[]) and PipelineDispatchResultSchema (response + inputTokens + outputTokens). No barrel files."
    files:
      - "packages/backend/orchestrator/src/pipeline/__types__/index.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/models/__types__/task-contract.ts"
      - "packages/backend/orchestrator/src/models/unified-interface.ts"
    dependencies: []
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-4", "AC-5", "AC-11", "AC-12"]

  - id: 2
    subtask_id: "ST-2"
    description: "Implement TokenBucket rate limiter in pipeline/token-bucket.ts. In-memory class with Zod-validated config (capacity, refillRate, maxWaitMs), consume() that waits or throws RateLimitExceededError, and async wait logic using setTimeout (required for vi.useFakeTimers() compatibility). Write unit tests in __tests__/token-bucket.test.ts covering fill, drain, refill via vi.useFakeTimers(), concurrent Promise.all under rate limit."
    files:
      - "packages/backend/orchestrator/src/pipeline/token-bucket.ts"
      - "packages/backend/orchestrator/src/pipeline/__tests__/token-bucket.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/utils/token-budget.ts"
      - "packages/backend/orchestrator/src/pipeline/__types__/index.ts"
    dependencies: [1]
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator -- token-bucket"
    acs_covered: ["AC-2", "AC-8"]

  - id: 3
    subtask_id: "ST-3"
    description: "Implement per-story budget accumulator in pipeline/budget-accumulator.ts. In-memory Map<storyId, number> tracking cumulative tokens. record(storyId, tokens) adds to running total. getStoryUsage(storyId) returns current total. checkBudget(storyId, newTokens, hardBudgetCap) throws BudgetExhaustedError using direct numeric comparison (NOT checkTokenBudget() — that is phase-key-typed). Write unit tests in __tests__/budget-accumulator.test.ts covering accumulation, cap crossing, cross-story isolation, instanceof check."
    files:
      - "packages/backend/orchestrator/src/pipeline/budget-accumulator.ts"
      - "packages/backend/orchestrator/src/pipeline/__tests__/budget-accumulator.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/utils/token-budget.ts"
      - "packages/backend/orchestrator/src/pipeline/__types__/index.ts"
    dependencies: [1]
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator -- budget-accumulator"
    acs_covered: ["AC-3", "AC-4", "AC-8"]

  - id: 4
    subtask_id: "ST-4"
    description: "Create wint.model_assignments migration and Drizzle schema. Write SQL migration 016_wint_model_assignments.sql with CREATE TABLE IF NOT EXISTS (idempotent). Add modelAssignments table export to packages/backend/database-schema/src/schema/wint.ts using existing wintSchema pgSchema namespace, drizzle-zod createInsertSchema/createSelectSchema. Schema: id uuid PK, agent_pattern text, provider text, model text, tier integer, effective_from timestamptz, created_at timestamptz."
    files:
      - "apps/api/knowledge-base/src/db/migrations/016_wint_model_assignments.sql"
      - "packages/backend/database-schema/src/schema/wint.ts"
    files_to_read:
      - "packages/backend/database-schema/src/schema/wint.ts"
      - "apps/api/knowledge-base/src/db/migrations/015_artifact_type_tables.sql"
    dependencies: []
    slice: backend
    verification: "pnpm check-types --filter @repo/database-schema"
    acs_covered: ["AC-6"]

  - id: 5
    subtask_id: "ST-5"
    description: "Implement PipelineModelRouter core in pipeline/model-router.ts. Wraps ModelRouterFactory.getInstance(). Escalation chain ['ollama', 'openrouter', 'anthropic'] — for each provider calls ModelRouterFactory.getInstance().getProvider(modelString) then provider.getModel(modelString).invoke(messages) (LangChain BaseChatModel API, NOT provider.complete()). Extract tokens from AIMessage.usage_metadata (input_tokens + output_tokens). Structured logging via @repo/logger with domain 'pipeline_model_router' for each failure/success. DB-backed model_assignments query (cached, invalidateAssignmentsCache() for cache reset). Reads API keys from env only (ANTHROPIC_API_KEY, OPENROUTER_API_KEY). PipelineModelRouterFactory singleton (private static _instance, getInstance(), clearInstance()). Compose TokenBucket and BudgetAccumulator."
    files:
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/models/unified-interface.ts"
      - "packages/backend/orchestrator/src/models/task-selector.ts"
      - "packages/backend/orchestrator/src/providers/base.ts"
      - "packages/backend/orchestrator/src/pipeline/__types__/index.ts"
      - "packages/backend/database-schema/src/schema/wint.ts"
    dependencies: [2, 3, 4]
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator && pnpm test --filter @repo/orchestrator -- model-router"
    acs_covered: ["AC-1", "AC-5", "AC-6", "AC-7", "AC-10", "AC-11", "AC-12"]

  - id: 6
    subtask_id: "ST-6"
    description: "Write unit tests for all PipelineModelRouter behaviors in __tests__/model-router.test.ts. Cover: singleton verification (PipelineModelRouterFactory.getInstance() x3 === same ref), token-bucket per-provider rate limiting, budget accumulation per storyId, BudgetExhaustedError thrown at hard cap with correct fields (storyId, tokensUsed, budgetCap), escalation chain iteration (Ollama→OpenRouter fallback), ProviderChainExhaustedError when all fail, DB config override taking precedence over YAML fallback, cache invalidation via invalidateAssignmentsCache(), structured logger calls for each provider failure. Mock providers implement ILLMProvider interface with getModel() returning mock BaseChatModel."
    files:
      - "packages/backend/orchestrator/src/pipeline/__tests__/model-router.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"
      - "packages/backend/orchestrator/src/pipeline/token-bucket.ts"
      - "packages/backend/orchestrator/src/pipeline/budget-accumulator.ts"
    dependencies: [5]
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator"
    acs_covered: ["AC-8", "AC-10"]

  - id: 7
    subtask_id: "ST-7"
    description: "Write integration test for full escalation chain in __tests__/escalation-integration.test.ts. Mock ILLMProvider interface providers (MockOllamaProvider, MockOpenRouterProvider, MockAnthropicProvider) implementing getModel() returning mock BaseChatModel. Test cases: Ollama fails → OpenRouter succeeds, Ollama+OpenRouter fail → Anthropic succeeds, all three fail → ProviderChainExhaustedError, mid-chain structured logger called for each failure with provider+reason. Run full orchestrator test suite to verify zero WINT/MODL regressions (AC-10)."
    files:
      - "packages/backend/orchestrator/src/pipeline/__tests__/escalation-integration.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/providers/base.ts"
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"
      - "packages/backend/orchestrator/src/pipeline/__tests__/model-router.test.ts"
    dependencies: [6]
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator"
    acs_covered: ["AC-9", "AC-10"]

