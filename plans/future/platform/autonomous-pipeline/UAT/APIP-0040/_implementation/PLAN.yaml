architectural_decisions: []

complexity: moderate

notes:
  - "CRITICAL: ILLMProvider has no complete() method. dispatch() MUST use provider.getModel(modelString).invoke(messages) (LangChain BaseChatModel API). Token usage extracted from AIMessage.usage_metadata.input_tokens + output_tokens. This is AC-11 from elaboration."
  - "BudgetAccumulator must use direct numeric comparison against hardBudgetCap — do NOT call checkTokenBudget() which is phase-key-typed and incompatible with cross-story accumulation."
  - "TokenBucket.wait() must use setTimeout internally (not Date.now() loop or setInterval) for vi.useFakeTimers() compatibility."
  - "All typed errors (BudgetExhaustedError, RateLimitExceededError, ProviderChainExhaustedError) must assign this.name = 'ErrorName' in constructor to preserve prototype chains across TypeScript transpilation."
  - "PROTECTED FILES — DO NOT MODIFY: packages/backend/orchestrator/src/models/unified-interface.ts, task-selector.ts, strategy-loader.ts."
  - "Migration 016 runs after 015 — 015_artifact_type_tables.sql is untracked in working tree and must be present before running 016."
  - "ST-2 and ST-3 can run in parallel after ST-1. ST-4 can run in parallel with ST-1/ST-2/ST-3. ST-5 requires ST-2+ST-3+ST-4."
  - "AC-9 ownership: ST-6 covers AC-8 (unit tests only); ST-7 covers AC-9 (integration test). No overlap."
  - "No HTTP surface — ADR-001 API path schema does not apply. ADR-006 E2E not applicable (frontend_impacted: false)."
  - "UAT manual cases MC-1 (live escalation chain) and MC-2 (wint.model_assignments DB override) require real credentials and APIP-5001 test DB. Mark as CI skip when unavailable."
