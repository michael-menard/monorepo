# =============================================================================
# 9-POINT AUDIT
# =============================================================================

audit:

  # ---------------------------------------------------------------------------
  # 1. SCOPE ALIGNMENT
  # ---------------------------------------------------------------------------
  scope_alignment:
    verdict: PASS
    notes: >
      Story scope matches the autonomous-pipeline epic plan. The goal of building
      a PipelineModelRouter wrapper with rate limiting, budget tracking, escalation
      chain, and DB-backed model assignment overrides is coherent and bounded.
      Dependencies (APIP-0010) and dependents (APIP-1030, APIP-5004, APIP-3040,
      APIP-3080) are correctly identified. The story explicitly scopes to Phase 0
      (single server, in-memory state) and defers concurrency limits, AI affinity,
      and vault integration to successor stories.

  # ---------------------------------------------------------------------------
  # 2. INTERNAL CONSISTENCY
  # ---------------------------------------------------------------------------
  internal_consistency:
    verdict: PASS_WITH_WARNINGS
    notes: >
      Goals and Non-Goals are well aligned. ACs map cleanly to the stated goals.
      Two minor consistency issues identified:

      WARNING-1 (low severity): AC-9 is listed as an AC with its own testability
      requirement (integration test), but ST-7 is the sole subtask covering it and
      lists ST-6 as a blocker. However ST-6 already lists "AC-8, AC-9" in its ACs
      field, creating overlap between ST-6 and ST-7's AC ownership. This does not
      block implementation but may cause confusion about which subtask owns AC-9.

      WARNING-2 (low severity): AC-3 specifies getStoryUsage('storyId') as the
      public surface for reading accumulated tokens (visible in HP-3 and ED-2 test
      cases), but this method is not formally named or defined in the ACs or
      Architecture Notes. The method name is implied only through the test plan.
      Should be specified explicitly in AC-3.

  # ---------------------------------------------------------------------------
  # 3. REUSE-FIRST
  # ---------------------------------------------------------------------------
  reuse_first:
    verdict: PASS_WITH_WARNINGS
    notes: >
      Good reuse of ModelRouterFactory, ILLMProvider, TaskContract, Drizzle/wintSchema,
      and @repo/logger. Protected files in models/ are explicitly shielded from
      modification.

      WARNING (medium severity): The Reuse Plan claims checkTokenBudget() from
      token-budget.ts as "Core enforcement primitive for hard_gate budget check."
      However, checkTokenBudget() takes `phase: PhaseKey` which is typed as
      `keyof PhaseTokenLimits` — a union of 5 specific phase names
      ('pm_story' | 'elaboration' | 'dev_implementation' | 'code_review' | 'qa_verification').
      The budget-accumulator story-level accumulator operates without a named phase;
      it tracks cumulative tokens across all phases for a story's lifetime. Passing
      a per-story cross-phase accumulation value into checkTokenBudget() requires
      either (a) selecting an arbitrary phase key that has a high enough limit, or
      (b) using customLimits override, or (c) simply not using checkTokenBudget() at
      all — just a direct numeric comparison. The reuse claim is overstated and will
      create friction during implementation. Developer should note that
      checkTokenBudget() is a stateless comparator and budget-accumulator will need
      to implement its own Map-based accumulation independently. This is a clarification
      gap, not a blocking issue.

  # ---------------------------------------------------------------------------
  # 4. PORTS & ADAPTERS
  # ---------------------------------------------------------------------------
  ports_and_adapters:
    verdict: PASS
    notes: >
      Backend infrastructure only — no HTTP endpoints. Core logic is transport-
      agnostic. PipelineModelRouter is designed as a singleton callable from BullMQ
      job processors (APIP-0020) without coupling to the transport layer. ILLMProvider
      interface is preserved as the boundary for provider mocking in tests.
      Architecture Notes correctly keep domain logic (rate limiting, budget tracking)
      in dedicated modules (token-bucket.ts, budget-accumulator.ts) separate from
      the routing orchestration (model-router.ts). No concerns.

  # ---------------------------------------------------------------------------
  # 5. TESTABILITY
  # ---------------------------------------------------------------------------
  testability:
    verdict: PASS_WITH_WARNINGS
    notes: >
      Test plan is exceptionally detailed. All 10 ACs have test coverage. Happy
      path, error case, and edge case tests are concrete with explicit setup,
      action, expected, and evidence fields. vi.useFakeTimers() integration is
      called out. Fixture definitions are well specified.

      WARNING-1 (medium severity): The story describes the escalation chain as
      calling `provider.complete(prompt)` in Architecture Notes (section "Escalation
      Chain", step 2). However, ILLMProvider (providers/base.ts) has NO `complete()`
      method. The interface exposes `getModel(modelName: string): BaseChatModel`.
      The actual invocation would need to be `provider.getModel(modelString).invoke(messages)`
      or equivalent LangChain invocation. The mock providers in the test plan
      (MockOllamaProvider, MockOpenRouterProvider, MockAnthropicProvider) are
      described as implementing ILLMProvider, which does not have a `complete()`
      method. This is an INTERFACE MISMATCH that will cause a type error during
      implementation. The dispatch() design must be clarified to use `getModel().invoke()`
      rather than a non-existent `complete()` method.

      WARNING-2 (low severity): ED-5 (checksum verification of models/ files) is
      described as a test case but has no corresponding vi/vitest implementation.
      It is more of a CI process check. Acceptable as a manual verification step
      but should not be counted as an automated test case.

      UAT cases (MC-1, MC-2) correctly note CI skip conditions for missing
      credentials and test DB. No concerns there.

  # ---------------------------------------------------------------------------
  # 6. DECISION COMPLETENESS
  # ---------------------------------------------------------------------------
  decision_completeness:
    verdict: PASS_WITH_WARNINGS
    notes: >
      All major architectural decisions are made: in-memory token bucket for Phase 0,
      single-process singleton, env var credentials, no cron reset, no polling loop
      for cache invalidation, setTimeout-based wait for vi.useFakeTimers() compat,
      explicit error.name assignment for transpile safety.

      WARNING (medium severity): The dispatch() method signature is not formally
      specified anywhere in the story. The test plan implies: dispatch(storyId, prompt,
      agentId?) based on HP-3 (dispatch() with storyId tracking), HP-5 (dispatch with
      agent_id matching), AC-3 (dispatch() records tokens against storyId). The
      Architecture Notes describe dispatch() only in prose. A formal Zod schema or
      at minimum a TypeScript signature for PipelineModelRouterDispatchOptions should
      be specified to prevent implementor ambiguity. Without this, ST-5 has an
      underspecified interface that could lead to a review cycle.

  # ---------------------------------------------------------------------------
  # 7. RISK DISCLOSURE
  # ---------------------------------------------------------------------------
  risk_disclosure:
    verdict: PASS
    notes: >
      Risks are well documented in both pm_artifacts.dev_feasibility.risks and
      pm_artifacts.test_plan.risks sections. Key risks called out:
      - vi.useFakeTimers() requires setTimeout-based wait (mitigation specified)
      - BudgetExhaustedError prototype chain across transpile boundary (mitigation: explicit name)
      - Migration idempotency (mitigation: CREATE TABLE IF NOT EXISTS)
      - Cache invalidation coupling (mitigation: public invalidateAssignmentsCache())
      - UAT dependency on APIP-5001 test DB and live credentials (noted as CI skip)

      The ILLMProvider interface mismatch (provider.complete() does not exist) is
      an implementation risk NOT currently disclosed. This should be added to the
      risk register (see Testability WARNING-1 above).

      DB migration ordering risk: Migration 016 assumes 015 exists. The
      015_artifact_type_tables.sql file exists in the working tree (untracked) which
      is acceptable but worth noting as a deploy sequencing dependency.

  # ---------------------------------------------------------------------------
  # 8. STORY SIZING
  # ---------------------------------------------------------------------------
  story_sizing:
    verdict: SPLIT_RECOMMENDED
    sizing_indicators:
      ac_count: 10          # threshold: 8 — EXCEEDED (10 ACs)
      endpoint_count: 0     # threshold: 5 — OK
      fe_and_be: false      # threshold: both — OK
      independent_features: 4  # rate-limiting + budget-tracking + escalation-chain + DB-config
      happy_path_count: 6   # threshold: 3 — EXCEEDED (6 happy paths)
      package_count: 3      # threshold: 2 — EXCEEDED (orchestrator + database-schema + migrations)
    indicator_count: 3
    notes: >
      Three out of six sizing indicators are exceeded (AC count, happy paths, package
      count), plus 4 functionally independent feature areas are bundled. The story
      author's own split_risk prediction is 0.7 (high).

      The four feature areas have natural seams:
        A) Token-bucket rate limiter (AC-2, ST-1 partial, ST-2) — standalone algorithm
        B) Per-story budget accumulator (AC-3, AC-4, ST-3) — standalone data structure
        C) PipelineModelRouter + escalation chain + DB config (AC-1, AC-5, AC-6, AC-7, ST-5) — integration layer
        D) DB migration + Drizzle schema (AC-6 partial, ST-4) — schema only

      However, features A and B are low-complexity standalone modules (ST-2 est. 8k
      tokens, ST-3 est. 7k tokens), and feature D is trivially small (ST-4 est. 5k
      tokens). The highest complexity is ST-5 (14k tokens) which bundles the
      integration of all parts.

      RECOMMENDED SPLIT EVALUATION: Split into APIP-0040a (rate limiter + budget
      accumulator primitives) and APIP-0040b (PipelineModelRouter integration + DB
      config) is viable. However, given that A and B have no consumer until C is
      built, splitting may create story ordering overhead without parallelization
      benefit. The analyst defers the split decision to the leader agent.

  # ---------------------------------------------------------------------------
  # 9. SUBTASK DECOMPOSITION
  # ---------------------------------------------------------------------------
  subtask_decomposition:
    verdict: PASS_WITH_WARNINGS
    notes: >
      Subtask section is present. 7 subtasks with explicit DAG
      (ST-1 → ST-2,ST-3 parallel → ST-5; ST-4 → ST-5; ST-5 → ST-6 → ST-7).
      AC coverage: all 10 ACs accounted for across subtasks. Verification commands
      present for each subtask. Estimated token counts provided. Canonical reference
      files listed for ST-1 and ST-5.

      WARNING-1 (medium severity): ST-5 reads from providers/base.ts to use
      ILLMProvider, but the dispatch() implementation will need to call
      getModel().invoke() not provider.complete(). This should be corrected in
      the ST-5 "Files to read" and implementation notes before development begins.

      WARNING-2 (low severity): ST-6 lists "AC-8, AC-9" while ST-7 separately
      covers "AC-9" for the integration test. The overlap is intentional (unit
      tests for escalation in ST-6, integration test in ST-7) but AC-9 ownership
      should be clarified — AC-9 is about the integration test specifically, so
      ST-6 should list only AC-8 and ST-7 should list AC-9.

      WARNING-3 (low severity): No subtask covers the non-regression verification
      of AC-10 (WINT/MODL tests pass). This is implicitly expected as part of
      ST-6/ST-7 verification commands but should be explicit. Adding
      "pnpm test --filter @repo/orchestrator" (which covers WINT/MODL) to ST-6
      and ST-7 verification commands would make this explicit.

# =============================================================================
# DISCOVERY ANALYSIS
# =============================================================================

discovery:

  mvp_critical_gaps:

    - id: GAP-1
      severity: MEDIUM
      category: interface_mismatch
      title: "provider.complete(prompt) does not exist on ILLMProvider"
      description: >
        Architecture Notes (Escalation Chain section, step 2) specify:
        "Call provider.complete(prompt)" but ILLMProvider in
        packages/backend/orchestrator/src/providers/base.ts only exposes:
          - getModel(modelName: string): BaseChatModel
          - checkAvailability(timeout?, forceCheck?): Promise<boolean>
          - loadConfig(): unknown

        There is no complete() method. The correct invocation pattern from
        the existing codebase is provider.getModel(modelString).invoke(messages)
        (LangChain BaseChatModel invocation). This mismatch will cause a TypeScript
        type error in ST-5 and will also invalidate the mock provider fixture
        definitions in the test plan (MockOllamaProvider, MockOpenRouterProvider,
        MockAnthropicProvider are described as "ILLMProvider mocks" but the
        test harness calls .complete() on them).

        The dispatch() implementation design must be clarified to use:
          const model = provider.getModel(modelString)
          const result = await model.invoke(messages)

        This also affects how tokens are counted — BaseChatModel.invoke() returns
        an AIMessage with usage_metadata, not a simple token count. The
        budget-accumulator will need to extract usage_metadata.input_tokens and
        usage_metadata.output_tokens from the LangChain response.
      files_affected:
        - "packages/backend/orchestrator/src/pipeline/model-router.ts (to be created)"
        - "packages/backend/orchestrator/src/pipeline/__tests__/model-router.test.ts (to be created)"
        - "packages/backend/orchestrator/src/pipeline/__tests__/escalation-integration.test.ts (to be created)"
      recommended_action: >
        Before ST-5 begins: Clarify dispatch() to use getModel().invoke(). Update
        Architecture Notes "Escalation Chain" section. Update mock provider fixture
        definitions to implement getModel() returning a mock BaseChatModel rather
        than a complete() method. Specify how usage_metadata is extracted from
        AIMessage for token counting.
      leader_decision: ADD_AS_AC
      leader_action: "Added as AC-11 in APIP-0040.md"
      decided_at: "2026-02-25T00:00:00Z"

    - id: GAP-2
      severity: LOW
      category: underspecified_interface
      title: "dispatch() method signature not formally specified"
      description: >
        The dispatch() method is the core public API of PipelineModelRouter but
        its signature is only implied through test scenarios and prose. From the
        test plan, the following parameters can be inferred:
          - storyId: string (HP-3, EC-1, ED-2)
          - agentId: string (HP-5 — used for model_assignments pattern matching)
          - prompt/messages: unknown (not specified)
          - returns: LLM response with token usage

        Without a formal Zod schema or TypeScript signature, ST-5 implementors
        will make assumptions that may not match downstream consumers in APIP-0020
        (BullMQ job processor) and APIP-1030 (Implementation Graph).
      files_affected:
        - "packages/backend/orchestrator/src/pipeline/__types__/index.ts (to be created)"
      recommended_action: >
        Add PipelineDispatchOptionsSchema to ST-1 scope:
          z.object({
            storyId: z.string(),
            agentId: z.string(),
            messages: z.array(...),  // or prompt: z.string()
            taskContract: TaskContractSchema.optional(),
          })
        And PipelineDispatchResultSchema capturing result + token usage.
      leader_decision: ADD_AS_AC
      leader_action: "Added as AC-12 in APIP-0040.md"
      decided_at: "2026-02-25T00:00:00Z"

    - id: GAP-3
      severity: LOW
      category: reuse_clarification
      title: "checkTokenBudget() reuse claim requires clarification for story-level accumulation"
      description: >
        The Reuse Plan states checkTokenBudget() is "Core enforcement primitive
        for hard_gate budget check" for the budget-accumulator. However, the function
        signature is checkTokenBudget({ phase: PhaseKey, ... }) where PhaseKey is
        strictly typed to 5 phase names. Story-level accumulation does not map to
        a named phase.

        The budget-accumulator can trivially implement its own comparison:
          if (accumulated + newTokens > hardBudgetCap) throw new BudgetExhaustedError(...)

        The reuse of checkTokenBudget() adds no value here and may create confusion
        for ST-3 implementors who attempt to force the story accumulator through the
        phase-level enforcement function.
      files_affected:
        - "packages/backend/orchestrator/src/pipeline/budget-accumulator.ts (to be created)"
      recommended_action: >
        Remove checkTokenBudget() from the Reuse Plan for budget-accumulator.
        The budget-accumulator should implement a direct numeric comparison against
        hardBudgetCap. checkTokenBudget() remains useful for phase-level checks
        within the orchestrator but is not the right tool for cross-story lifetime
        budget enforcement.
      leader_decision: LOG_TO_KB
      leader_action: "Non-blocking clarification logged to KB as developer note. Not added as AC — direct numeric comparison is self-evident at implementation time."
      decided_at: "2026-02-25T00:00:00Z"

  future_opportunities:

    - id: OPP-1
      priority: LOW
      title: "Token usage extraction from LangChain AIMessage should be encapsulated"
      description: >
        Once GAP-1 is resolved and dispatch() uses model.invoke(), token counting
        will require extracting usage_metadata from AIMessage responses. This
        extraction pattern (input_tokens + output_tokens) could be a reusable
        utility in packages/backend/orchestrator/src/utils/ alongside token-budget.ts.
        Currently, the orchestrator has no standardized utility for extracting
        token counts from LangChain responses.
      deferred_to: "APIP-0040 implementation or follow-on story"
      leader_decision: LOG_TO_KB
      leader_action: "Logged to KB as future opportunity. Non-blocking for APIP-0040 — AC-11 covers the immediate extraction pattern."
      decided_at: "2026-02-25T00:00:00Z"

    - id: OPP-2
      priority: LOW
      title: "AC-6 model_assignments cache invalidation assumes single process"
      description: >
        The invalidateAssignmentsCache() design is explicitly scoped to Phase 0
        (single process, ADR-001 Decision 4). The architecture note acknowledges
        this: "For Phase 0 (single process), this is sufficient without distributed
        coordination." This is sound for Phase 0 but should be logged as a known
        limitation for Phase 1+ if/when the pipeline scales to multiple workers.
        No action required now — architecture note is already clear.
      deferred_to: "Future multi-process pipeline story"
      leader_decision: LOG_TO_KB
      leader_action: "Logged to KB as known limitation for Phase 1+ scaling. No action needed in APIP-0040."
      decided_at: "2026-02-25T00:00:00Z"

    - id: OPP-3
      priority: LOW
      title: "RateLimitExceededError fields could include provider for richer BullMQ error handling"
      description: >
        EC-2 tests that RateLimitExceededError is thrown with instanceof check, and
        the error fields schema shows provider: string, waitedMs: number. The
        error already includes provider, which is good. This opportunity is already
        addressed in the design — noting for completeness.
      deferred_to: "No action needed"
      leader_decision: LOG_TO_KB
      leader_action: "No action needed — design already covers this. Logged to KB for completeness."
      decided_at: "2026-02-25T00:00:00Z"

    - id: OPP-4
      priority: LOW
      title: "Missing index on wint.model_assignments.agent_pattern"
      description: >
        The migration SQL in the story creates the model_assignments table without
        any index on agent_pattern. Since PipelineModelRouter caches the full table
        in memory and matches patterns in-process (glob matching), this is fine for
        Phase 0 with a small number of rows. However, if the table grows and direct
        SQL queries replace the in-memory cache approach in future phases, an index
        on agent_pattern would be needed. Acceptable to defer given Phase 0 scope.
      deferred_to: "Future phase if DB query replaces in-memory cache"
      leader_decision: LOG_TO_KB
      leader_action: "Logged to KB as deferred schema improvement. Acceptable for Phase 0 in-memory cache pattern."
      decided_at: "2026-02-25T00:00:00Z"

# =============================================================================
# SPLIT ANALYSIS
# =============================================================================

split_analysis:
  recommended: true
  confidence: MEDIUM
  rationale: >
    3/6 sizing indicators exceeded, 4 functionally independent feature areas,
    split_risk=0.7. The story is implementable as-is but represents significant
    surface area for a single PR. Natural split seams exist.

  proposed_split:
    option_a:
      name: "Keep as single story with clarifications"
      viable: true
      rationale: >
        Features A (token bucket) and B (budget accumulator) have no independent
        consumers until feature C (PipelineModelRouter) is built. Splitting creates
        ordering overhead without parallelization benefit. If a single developer
        implements sequentially, a single story is efficient. The 3 gaps identified
        are all addressable with pre-implementation clarifications rather than
        requiring a structural story split.

    option_b:
      name: "Split into APIP-0040a and APIP-0040b"
      viable: true
      rationale: >
        APIP-0040a: Rate limiter primitives (token-bucket, budget-accumulator, types,
        unit tests) — ST-1, ST-2, ST-3, partial ST-6. Clean boundary, fully testable
        in isolation.
        APIP-0040b: PipelineModelRouter integration (escalation chain, DB config,
        migration, integration tests) — ST-4, ST-5, partial ST-6, ST-7. Depends on
        APIP-0040a.
        This split reduces review surface per PR and makes it easier to verify
        the complex escalation chain logic in isolation.

  leader_decision: keep_single
  leader_rationale: >
    Features A (token bucket) and B (budget accumulator) have no independent
    consumers until feature C (PipelineModelRouter) is built. Splitting creates
    story ordering overhead without parallelization benefit given single-developer
    sequential execution. The 3 MVP-critical gaps are all addressable as ACs or
    developer notes — no structural split is required. GAP-1 and GAP-2 resolved
    as AC-11 and AC-12. GAP-3 logged to KB as non-blocking clarification.
  decided_at: "2026-02-25T00:00:00Z"

