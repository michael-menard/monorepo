notable_decisions:
  - "Used vi.spyOn on _getModelInstance (private method) instead of vi.mock(ModelRouterFactory) for model-router tests — vi.mock had hoisting issues with static async methods across ESM boundaries"
  - "TokenBucket.consume uses while-loop with setTimeout internally (not setInterval) for vi.useFakeTimers() compatibility — tests use Promise.allSettled to avoid unhandled rejection warnings"
  - "BudgetAccumulator uses direct numeric comparison (current + newTokens > hardBudgetCap) — explicitly does NOT use checkTokenBudget() which requires PhaseKey"
  - "ST-4 migration 016 placed in apps/api/knowledge-base/src/db/migrations/ to match existing convention (015_artifact_type_tables.sql pattern)"
  - "Pre-existing test failures (context-warmer, session-manager) are due to @repo/mcp-tools missing subpath exports — identical in main monorepo branch, not introduced by this story"

known_deviations:
  - "logger.warn spy in escalation-integration.test.ts checks for calls where first arg contains 'pipeline_model_router' — this matches the logger.warn('pipeline_model_router', { event: 'provider_failure' }) pattern"
  - "DB model_assignments query is implemented as in-memory cache loaded via loadAssignmentsCache() — actual DB query driver is out of scope for this story (ST-5 notes mention 'cached, invalidateAssignmentsCache() for cache reset')"

