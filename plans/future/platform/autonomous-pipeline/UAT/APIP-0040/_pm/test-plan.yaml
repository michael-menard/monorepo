strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Token-bucket rate limiter allows requests within capacity"
    setup: "Create TokenBucket with capacity=10, refillRate=5/sec. Advance fake timer to t=0."
    action: "Call bucket.consume(1) ten times in sequence."
    expected: "All 10 calls succeed without throwing RateLimitExceededError."
    evidence: "No exception thrown; bucket.available() returns 0 after 10 consumes."

  - id: HP-2
    title: "Token-bucket refills after elapsed time"
    setup: "Create TokenBucket with capacity=10, refillRate=5/sec. Drain bucket fully. Use vi.useFakeTimers()."
    action: "Advance fake timer by 1000ms, then call bucket.consume(5)."
    expected: "consume(5) succeeds; bucket refilled by refillRate * elapsed."
    evidence: "No exception; bucket.available() equals 5 after advance and consume."

  - id: HP-3
    title: "PipelineModelRouter.dispatch() accumulates tokens per story"
    setup: "Construct PipelineModelRouter with hardBudgetCap=100000. Mock ILLMProvider returning { inputTokens: 500, outputTokens: 200, content: '...' }."
    action: "Call dispatch({ storyId: 'APIP-0040', ... }) five times."
    expected: "Story's running total = 5 * 700 = 3500 tokens; no BudgetExhaustedError."
    evidence: "router.getStoryUsage('APIP-0040') returns 3500."

  - id: HP-4
    title: "Escalation chain proceeds from Ollama to OpenRouter when Ollama fails"
    setup: "Configure escalation chain ['ollama', 'openrouter', 'anthropic']. Mock OllamaProvider to throw Error('connection refused'). Mock OpenRouterProvider to return valid response."
    action: "Call dispatch({ storyId: 'APIP-0040', ... })."
    expected: "Returns OpenRouter response; @repo/logger records ollama failure and openrouter attempt."
    evidence: "Logger spy called with provider='ollama' failure, provider='openrouter' success."

  - id: HP-5
    title: "wint.model_assignments DB override takes precedence over YAML config"
    setup: "Insert row into wint.model_assignments: { agent_pattern: 'elaboration-*', provider: 'openrouter', model: 'gpt-4o', tier: 2 }. Load PipelineModelRouter."
    action: "Dispatch task with agent_id='elaboration-structurer'."
    expected: "Model selection uses openrouter/gpt-4o from DB, not YAML fallback."
    evidence: "Logger records model selection from 'db_assignments' source."

  - id: HP-6
    title: "PipelineModelRouter singleton returns same instance on repeated getInstance() calls"
    setup: "No setup required."
    action: "Call PipelineModelRouterFactory.getInstance() three times in sequence."
    expected: "All three calls return the same object reference."
    evidence: "Strict equality: instance1 === instance2 === instance3."

error_cases:
  - id: EC-1
    title: "BudgetExhaustedError thrown when story exceeds hard budget cap"
    setup: "Construct PipelineModelRouter with hardBudgetCap=1000. Mock provider to return 600 tokens per call. Dispatch once (600 tokens accumulated)."
    action: "Dispatch a second call that would push total to 1200 tokens."
    expected: "Throws BudgetExhaustedError with storyId, tokensUsed=600, budgetCap=1000."
    evidence: "instanceof BudgetExhaustedError === true; error.storyId='APIP-0040'; error.name='BudgetExhaustedError'."

  - id: EC-2
    title: "RateLimitExceededError thrown when bucket exhausted and max-wait exceeded"
    setup: "TokenBucket with capacity=5, refillRate=1/sec, maxWaitMs=100. Drain bucket. Use vi.useFakeTimers()."
    action: "Call consume(1) and do not advance timer (simulating no refill within maxWait)."
    expected: "Throws RateLimitExceededError after maxWaitMs elapsed."
    evidence: "instanceof RateLimitExceededError === true; error.name='RateLimitExceededError'."

  - id: EC-3
    title: "ProviderChainExhaustedError thrown when all providers fail"
    setup: "Mock all three providers (Ollama, OpenRouter, Anthropic) to throw errors."
    action: "Call dispatch({ storyId: 'APIP-0040', ... })."
    expected: "Throws ProviderChainExhaustedError. Logger records failure for each of the 3 providers."
    evidence: "instanceof ProviderChainExhaustedError === true; logger spy called 3 times with distinct provider names."

  - id: EC-4
    title: "Provider API key read from environment only — not hard-coded"
    setup: "Unset ANTHROPIC_API_KEY and OPENROUTER_API_KEY from process.env."
    action: "Attempt to construct PipelineModelRouter or invoke Anthropic/OpenRouter provider."
    expected: "Throws a configuration error referencing missing env var, not a hard-coded credential."
    evidence: "Error message includes 'ANTHROPIC_API_KEY' or 'OPENROUTER_API_KEY'; no credential string in source."

  - id: EC-5
    title: "Escalation logs each provider failure before trying next"
    setup: "Mock Ollama to throw Error('timeout'). Mock OpenRouter to throw Error('rate_limit'). Mock Anthropic to return success."
    action: "Call dispatch({ storyId: 'APIP-0040', ... })."
    expected: "Logger called with structured log for Ollama failure (provider, reason), OpenRouter failure (provider, reason), Anthropic success."
    evidence: "Logger spy assertions in order: level=warn domain=pipeline_model_router provider=ollama, then provider=openrouter, then info provider=anthropic."

edge_cases:
  - id: ED-1
    title: "Concurrent dispatches under rate limit are serialized correctly"
    setup: "TokenBucket with capacity=3. Use vi.useFakeTimers()."
    action: "Fire Promise.all([dispatch(), dispatch(), dispatch(), dispatch(), dispatch()]) — 5 concurrent calls."
    expected: "First 3 succeed immediately; remaining 2 either wait for refill or throw RateLimitExceededError depending on maxWait config."
    evidence: "Resolved count + rejected count = 5; no deadlock; all rejections are RateLimitExceededError."

  - id: ED-2
    title: "Budget accumulation is isolated per storyId"
    setup: "Construct PipelineModelRouter with hardBudgetCap=1000. Mock provider to return 400 tokens per call."
    action: "Dispatch 2 calls for storyId='APIP-0040' (800 total), then 1 call for storyId='APIP-0041' (400 total)."
    expected: "Neither story hits budget cap. Story APIP-0040 has 800 tokens, APIP-0041 has 400 tokens."
    evidence: "router.getStoryUsage('APIP-0040') === 800; router.getStoryUsage('APIP-0041') === 400."

  - id: ED-3
    title: "model_assignments cache is invalidated on write and re-fetched on next dispatch"
    setup: "Load PipelineModelRouter with initial DB state (model: 'claude-3-haiku'). Perform one dispatch to warm cache."
    action: "Insert override into wint.model_assignments (model: 'claude-3-5-sonnet'). Trigger cache invalidation. Dispatch again."
    expected: "Second dispatch uses updated model from DB (claude-3-5-sonnet)."
    evidence: "Logger records model selection change between first and second dispatch."

  - id: ED-4
    title: "BudgetExhaustedError is distinguishable from generic Error for BullMQ job processor"
    setup: "Throw BudgetExhaustedError in dispatch path."
    action: "Catch the error in a try/catch block. Check instanceof BudgetExhaustedError."
    expected: "instanceof check returns true; error.name === 'BudgetExhaustedError'."
    evidence: "Prototype chain works across transpile boundary; BullMQ can distinguish from transient errors."

  - id: ED-5
    title: "Existing ModelRouter files are not modified"
    setup: "Record file checksums for packages/backend/orchestrator/src/models/unified-interface.ts, task-selector.ts, strategy-loader.ts before implementation."
    action: "Run full test suite for WINT and MODL stories."
    expected: "All WINT/MODL tests pass; file checksums unchanged."
    evidence: "pnpm test --filter @repo/orchestrator shows 0 regressions in models/ directory."

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "BudgetExhaustedError.storyId matches dispatched storyId"
      - "BudgetExhaustedError.tokensUsed >= budgetCap"
      - "ProviderChainExhaustedError.name === 'ProviderChainExhaustedError'"
      - "RateLimitExceededError.name === 'RateLimitExceededError'"
      - "router.getStoryUsage(storyId) accumulates correctly across multiple dispatch calls"
      - "PipelineModelRouterFactory.getInstance() returns same reference on repeated calls"
      - "Logger structured log: { domain: 'pipeline_model_router', provider, reason } per escalation step"
  frontend: null

manual_cases:
  - id: MC-1
    title: "UAT: Full escalation chain against real providers"
    steps:
      - "Ensure Ollama is running locally (or simulate unavailability)."
      - "Set ANTHROPIC_API_KEY and OPENROUTER_API_KEY from environment."
      - "Construct PipelineModelRouter with real provider configs."
      - "Call dispatch() with a real task payload."
      - "Observe log output for provider escalation steps."
    expected: "Dispatch succeeds via first available provider; structured logs record each escalation step."

  - id: MC-2
    title: "UAT: wint.model_assignments override against real test DB (APIP-5001 dependency)"
    steps:
      - "Start test DB from APIP-5001 infrastructure."
      - "Insert a model_assignments row for agent_pattern='*'."
      - "Load PipelineModelRouter and dispatch a task."
      - "Verify selected model matches DB row."
    expected: "Model from DB overrides YAML default; dispatch succeeds."

fixture_definitions:
  - name: MockOllamaProvider
    type: ILLMProvider mock
    description: "Implements ILLMProvider interface. Configurable: returns valid response or throws Error('connection refused')."
  - name: MockOpenRouterProvider
    type: ILLMProvider mock
    description: "Implements ILLMProvider interface. Configurable: returns valid response, throws Error('rate_limit'), or throws Error('timeout')."
  - name: MockAnthropicProvider
    type: ILLMProvider mock
    description: "Implements ILLMProvider interface. Configurable: returns valid response or throws Error('overloaded')."
  - name: ControlledTokenBucket
    type: TokenBucket test harness
    description: "TokenBucket with vi.useFakeTimers() integration; capacity and refillRate set per test."
  - name: ModelAssignmentsDbFixture
    type: database fixture
    description: "Inserts/clears wint.model_assignments rows for integration tests. Requires APIP-5001 test DB."

risks:
  - "vi.useFakeTimers() and async token-bucket wait logic require careful coordination — bucket.waitForToken() must use setTimeout internally for fake timer compatibility."
  - "Prototype chain for typed errors (BudgetExhaustedError, RateLimitExceededError, ProviderChainExhaustedError) must be verified in transpiled output — extend Error with explicit name assignment in constructor."
  - "UAT manual cases (MC-1, MC-2) depend on APIP-5001 (Test DB) and live provider credentials; mark as skip conditions in CI without those resources."
  - "wint.model_assignments cache invalidation test (ED-3) requires white-box access to cache internals or a public invalidate() method — ensure PipelineModelRouter exposes one for testability."
  - "Concurrent dispatch test (ED-1) may have timing sensitivity — prefer deterministic resolution order via fake timers over wall-clock delays."
