notes:
  - >-
    Last migration is 0029_apip_3020_model_affinity.sql — new migrations are 0030 (dep_audit_runs) and 0031
    (dep_audit_findings)
  - cron/ and config/ directories already exist in orchestrator src — no directory creation needed
  - LOCK_KEYS.DEP_AUDIT constant (e.g., 42002) must be added to packages/backend/orchestrator/src/cron/constants.ts
  - >-
    Advisory lock pattern from pattern-miner.job.ts: tryAcquireAdvisoryLock with getCronDbClient, pool released in
    finally block
  - 'Per KB lesson: wint schema tables live in lego_dev port 5432 (not port 5433 KB database)'
  - >-
    Per KB lesson: pg_try_advisory_lock pattern from APIP-3020 — fixed integer keys, session-level, auto-released on
    disconnect
  - 'Per KB lesson: Drizzle ORM enum comparisons in wint schema require raw SQL tag for ::text casts'
  - >-
    DepBlockedQueueClient is a stub interface (logs warning) until APIP-2010 ships — no real blocked queue wiring in
    this story
  - >-
    APIP-3090 cron infrastructure exists (cron/registry.ts, cron/adapter.ts) — dep-audit.job.ts can be added to jobs
    array when APIP-3090 wiring is completed
  - PnpmAuditOutputSchema must use .passthrough() to survive pnpm major version upgrades
  - estimateBundleImpact is info-only severity — graceful null return on all errors, never blocks pipeline
  - >-
    Integration tests for migrations require APIP-5001 test database — tag with .integration.test.ts suffix for CI
    exclusion from unit-only runs
  - AC-16 (check-types + lint) verified at end of each subtask step — not a single final step
