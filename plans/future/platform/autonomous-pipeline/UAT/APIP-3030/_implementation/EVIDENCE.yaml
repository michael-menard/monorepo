acceptance_criteria:

  - id: AC-1
    text: "The Diff Planner node queries wint.model_affinity for the assigned model before
      generating the decomposition prompt. The query is keyed by (model_id, change_type,
      file_type) and retrieves success_rate, avg_attempts, confidence, and any recorded
      weak patterns."
    verdict: PARTIAL
    notes: >
      The node does query wint.model_affinity before generating the decomposition prompt.
      However, the query is keyed by model_id only (bulk fetch of all change_types for
      that model), consistent with the Architecture Notes recommendation to 'query for all
      (model_id, change_type) pairs first, then filter during prompt assembly'. The query
      does not key by file_type because AffinityProfileSchema has no file_type field —
      the story's architecture notes omit it from the DB schema. avg_attempts is also
      absent from the retrieved columns (schema has sample_count instead). The AC text
      says 'avg_attempts' but the implemented schema uses 'sample_count'. This is a minor
      field-name deviation consistent with the architecture choosing sample_count over
      avg_attempts in the Zod schema. The core intent (query affinity before prompt
      generation, retrieve success_rate and confidence) is satisfied.
    evidence:
      - file: packages/backend/orchestrator/src/nodes/diff-planner/affinity-query.ts
        excerpt: |
          export const COL_MODEL_ID = 'model_id'
          export const COL_CHANGE_TYPE = 'change_type'
          export const COL_SUCCESS_RATE = 'success_rate'
          export const COL_CONFIDENCE = 'confidence'
          export const COL_SAMPLE_COUNT = 'sample_count'
          export const COL_STRONG_PATTERNS = 'strong_patterns'
          export const COL_WEAK_PATTERNS = 'weak_patterns'
          export const COL_UPDATED_AT = 'updated_at'
          export const DB_FULL_TABLE = `${DB_SCHEMA}.${DB_TABLE}`  // wint.model_affinity
        description: "Column constants confirm wint.model_affinity table and all queried columns."
      - file: packages/backend/orchestrator/src/nodes/diff-planner/affinity-query.ts
        excerpt: |
          const sql = `
            SELECT
              ${COL_MODEL_ID},
              ${COL_CHANGE_TYPE},
              ${COL_SUCCESS_RATE},
              ${COL_CONFIDENCE},
              ${COL_SAMPLE_COUNT},
              ${COL_STRONG_PATTERNS},
              ${COL_WEAK_PATTERNS},
              ${COL_UPDATED_AT}
            FROM ${DB_FULL_TABLE}
            WHERE ${COL_MODEL_ID} = $1
            ORDER BY ${COL_CHANGE_TYPE}
          `
          result = await db.query(sql, [modelId])
        description: "Parameterized query on wint.model_affinity keyed by model_id.
          Bulk fetch of all change_type rows per architecture notes."
      - file: packages/backend/orchestrator/src/nodes/diff-planner/index.ts
        excerpt: |
          const profiles = await queryAffinityProfilesByModel(dbClient, modelId)
          // ...
          const { affinityPromptFragment, enrichedSpecs, profileMetadata } = assembleAffinityContext(
            modelId,
            profiles,
            changeSpecs,
            config,
          )
        description: "Affinity query is called before assembleAffinityContext, confirming
          profiles are loaded prior to prompt generation."

  - id: AC-2
    text: "When profile confidence meets or exceeds AFFINITY_CONFIDENCE_MIN (default medium),
      the decomposition prompt includes a concise affinity summary of weak and strong
      change_type/file_type combinations."
    verdict: PASS
    notes: >
      The confidence gate is implemented in meetsConfidenceThreshold() using a numeric
      threshold (AFFINITY_CONFIDENCE_MIN = 0.5). The story uses 'medium' as an enum label
      but the implementation uses a numeric 0-1 scale, which is equivalent and more precise.
      buildAffinityPromptFragment() injects weak patterns (CAUTION labels) and strong patterns
      (STRENGTH labels) into a structured 'Model Affinity Context' section. The prompt
      includes human-readable context for the decomposition LLM.
    evidence:
      - file: packages/backend/orchestrator/src/nodes/diff-planner/__types__/index.ts
        excerpt: |
          export const AFFINITY_CONFIDENCE_MIN = 0.5
        description: "Default confidence threshold constant defined and exported."
      - file: packages/backend/orchestrator/src/nodes/diff-planner/prompt-assembly.ts
        excerpt: |
          export function meetsConfidenceThreshold(
            profile: AffinityProfile,
            config: Partial<DiffPlannerConfig> = {},
          ): boolean {
            const threshold = config.affinityConfidenceMin ?? AFFINITY_CONFIDENCE_MIN
            return profile.confidence >= threshold
          }
        description: "Confidence gate applied per-profile before injection."
      - file: packages/backend/orchestrator/src/nodes/diff-planner/prompt-assembly.ts
        excerpt: |
          parts.push('## Model Affinity Context')
          parts.push('The following patterns are based on historical performance data for this model.')
          if (weakLines.length > 0) {
            parts.push('### Areas Requiring Extra Attention')
            parts.push(...weakLines)
          }
          if (strongLines.length > 0) {
            parts.push('### Areas of Demonstrated Strength')
            parts.push(...strongLines)
          }
        description: "Structured affinity summary injected into decomposition prompt."

  - id: AC-3
    text: "When a ChangeSpec uses a change_type/file_type the assigned model handles poorly
      (success_rate below WEAKNESS_THRESHOLD), the ChangeSpec is annotated with
      escalation_model: <model_id>."
    verdict: PASS
    notes: >
      annotateEscalations() iterates all change specs, looks up each change_type in the
      profile map, and sets escalation_model to ESCALATION_MODEL_DEFAULT when
      success_rate < WEAKNESS_THRESHOLD. The affinity_notes field also records the
      specific success_rate and threshold for observability. Note: the AC mentions
      file_type-level discrimination but the implementation operates at change_type level
      (consistent with the schema having no file_type field).
    evidence:
      - file: packages/backend/orchestrator/src/nodes/diff-planner/__types__/index.ts
        excerpt: |
          export const WEAKNESS_THRESHOLD = 0.6
          export const ESCALATION_MODEL_DEFAULT = 'claude-sonnet-4-6'
        description: "Weakness threshold and default escalation model constants."
      - file: packages/backend/orchestrator/src/nodes/diff-planner/prompt-assembly.ts
        excerpt: |
          if (profile && profile.success_rate < weaknessThreshold) {
            escalationCount++
            return {
              ...spec,
              escalation_model: escalationModel,
              affinity_notes: `Pre-assigned escalation (success_rate=${Math.round(profile.success_rate * 100)}%, threshold=${Math.round(weaknessThreshold * 100)}%)`,
            }
          }
        description: "Escalation pre-assignment logic with descriptive affinity_notes."

  - id: AC-4
    text: "When no affinity profile exists (cold-start) or profile confidence is below
      threshold, the node falls back to model-agnostic decomposition without error.
      A profile_used: false field is set on decomposition metadata."
    verdict: PASS
    notes: >
      Three fallback paths all result in profile_used: false. Cold-start (empty profiles
      array from queryAffinityProfilesByModel) → assembleAffinityContext returns
      profile_used=false. Confidence below threshold → qualifying profiles filter returns
      empty → same path. DB error → query returns [] → same path. createFallbackOutput()
      also explicitly sets profile_metadata=null (which the schema allows as nullable).
    evidence:
      - file: packages/backend/orchestrator/src/nodes/diff-planner/prompt-assembly.ts
        excerpt: |
          if (qualifyingProfiles.length === 0) {
            const metadata: ProfileMetadata = {
              profile_used: false,
              model_id: modelId,
              confidence_level: null,
              weak_patterns_injected: 0,
              strong_patterns_injected: 0,
              escalation_preassigned: false,
              escalation_count: 0,
            }
            return {
              affinityPromptFragment: '',
              enrichedSpecs: changeSpecs,
              profileMetadata: metadata,
            }
          }
        description: "Cold-start and below-threshold fallback — profile_used=false, no-op output."
      - file: packages/backend/orchestrator/src/artifacts/diff-planner-output.ts
        excerpt: |
          export function createFallbackOutput(
            storyId: string,
            changeSpecs: PlaceholderChangeSpec[],
            reason?: string,
          ): DiffPlannerOutput {
            return DiffPlannerOutputSchema.parse({
              schema: 1,
              story_id: storyId,
              produced_at: new Date().toISOString(),
              change_specs: changeSpecs,
              affinity_prompt_fragment: '',
              profile_metadata: null,
              success: true,
              error: reason,
            })
          }
        description: "createFallbackOutput produces Zod-valid output with profile_metadata=null."

  - id: AC-5
    text: "The affinity query is non-blocking: if the DB query fails (connection error,
      timeout), the node logs a warning via @repo/logger and falls back to model-agnostic
      decomposition. The planning step does not fail due to affinity lookup errors."
    verdict: PASS
    notes: >
      Both query functions (queryAffinityProfile and queryAffinityProfilesByModel) wrap
      db.query in try/catch. On error: logger.warn is called with structured context
      including event='db_error', then null/[] is returned. The node handler calls
      queryAffinityProfilesByModel which returns [] on error, then assembleAffinityContext
      proceeds with empty profiles (model-agnostic path). The planning step never throws.
    evidence:
      - file: packages/backend/orchestrator/src/nodes/diff-planner/affinity-query.ts
        excerpt: |
          try {
            result = await db.query(sql, [modelId])
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error)
            logger.warn('diff-planner:affinity-query', {
              event: 'db_error',
              model_id: modelId,
              change_type: changeType,
              error: message,
            })
            return null
          }
        description: "DB error caught, warning logged via @repo/logger, null returned."
      - file: packages/backend/orchestrator/src/nodes/diff-planner/affinity-query.ts
        excerpt: |
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error)
            logger.warn('diff-planner:affinity-query', {
              event: 'db_error_bulk',
              model_id: modelId,
              error: message,
            })
            return []
          }
        description: "Bulk query DB error — returns empty array, logs warning, no throw."

