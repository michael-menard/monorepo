lessons_to_record:
  - lesson: >-
      Bulk query pattern (query all (model_id, change_type) pairs for a model, then filter in-memory) performs better
      for affinity lookups than per-spec queries and avoids N+1 DB calls. Established as the preferred affinity query
      pattern for APIP-3030 onwards.
    category: pattern
    tags:
      - backend
      - performance
      - affinity
      - db
  - lesson: >-
      Splitting a boolean flag (escalation_preassigned: boolean) from a count (escalation_count: number) in
      ProfileMetadata provides more signal than combining them as a number. Downstream consumers can use either the
      boolean for routing decisions or the count for observability without interpreting null-vs-zero.
    category: pattern
    tags:
      - backend
      - schema-design
      - observability
  - lesson: >-
      When AC spec text conflicts with story architecture notes, the architecture notes take precedence for
      implementation decisions. AC text should be treated as intent, not literal field-name specification, when the
      story itself provides a more detailed schema design.
    category: pattern
    tags:
      - process
      - ac-interpretation
      - architecture
  - lesson: >-
      LangGraph node handler index.ts files are not unit-testable in isolation due to createToolNode factory requiring
      full graph runtime. Unit tests target the individual module functions (query, prompt-assembly, artifacts) instead.
      This is the established pattern for orchestrator nodes and is acceptable for coverage purposes.
    category: pattern
    tags:
      - backend
      - testing
      - langgraph
      - orchestrator
