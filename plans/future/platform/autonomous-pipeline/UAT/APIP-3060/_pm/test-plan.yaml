strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
happy_path_tests:
  - id: HP-1
    title: "Bake-off runs and promotes challenger winner when significance reached"
    setup: "Insert one active wint.model_experiments row (change_type='typescript', file_type='.ts', control_model='claude-haiku', challenger_model='claude-sonnet', min_sample_per_arm=50). Insert 60 telemetry rows tagged with experiment_id for control arm (50% success rate) and 60 for challenger arm (60% success rate). Challenger delta = 0.10 >= MIN_ABSOLUTE_DELTA=0.05."
    action: "Call runBakeOff(config) against real lego_dev PostgreSQL DB (port 5432)"
    expected: "wint.model_affinity upserted with challenger_model as winner for (typescript, .ts). wint.model_experiments row updated to status='concluded', winner='claude-sonnet', concluded_at IS NOT NULL. Structured log emitted with experimentId, changeType, fileType, winner, controlSuccessRate, challengerSuccessRate, durationMs."
    evidence: "SELECT winner, status, concluded_at FROM wint.model_experiments WHERE id = <id>; SELECT preferred_model FROM wint.model_affinity WHERE change_type='typescript' AND file_type='.ts'"

  - id: HP-2
    title: "Bake-off runs and keeps control when challenger does not beat control"
    setup: "Insert one active experiment. Insert 60 telemetry rows per arm. Control success rate = 0.60, challenger success rate = 0.62. Delta = 0.02 < MIN_ABSOLUTE_DELTA=0.05."
    action: "Call runBakeOff(config)"
    expected: "Experiment remains status='active'. wint.model_affinity NOT updated. No promotion log emitted."
    evidence: "SELECT status FROM wint.model_experiments WHERE id = <id> — must still be 'active'."

  - id: HP-3
    title: "Bake-off promotes control when control beats challenger"
    setup: "Insert one active experiment. Insert 60 rows per arm. Control success rate = 0.70, challenger success rate = 0.60. Delta = 0.10 >= MIN_ABSOLUTE_DELTA. Control wins."
    action: "Call runBakeOff(config)"
    expected: "wint.model_affinity upserted with control_model as winner. Experiment marked concluded with winner=control_model."
    evidence: "SELECT winner FROM wint.model_experiments; SELECT preferred_model FROM wint.model_affinity"

  - id: HP-4
    title: "No-op when no active experiments"
    setup: "No rows in wint.model_experiments with status='active'"
    action: "Call runBakeOff(config)"
    expected: "No DB writes occur. Structured log emitted with { active_experiments: 0, durationMs: N }. Function returns without error."
    evidence: "Inspect DB — no new rows; inspect log output"

  - id: HP-5
    title: "Multiple simultaneous active experiments processed independently"
    setup: "Insert two active experiments with different change_type/file_type combinations. Each has 60 telemetry rows per arm. Experiment A: challenger wins. Experiment B: insignificant (insufficient delta)."
    action: "Call runBakeOff(config)"
    expected: "Experiment A concluded with winner. Experiment B remains active. Each experiment processed independently."
    evidence: "SELECT status, winner FROM wint.model_experiments — Experiment A concluded, Experiment B active"

error_cases:
  - id: EC-1
    title: "Experiment expires by max_window_rows without reaching significance"
    setup: "Insert active experiment with max_window_rows=100. Insert 51 rows per arm (100 < max_window_rows). Delta = 0.03 < MIN_ABSOLUTE_DELTA (not significant)."
    action: "Call runBakeOff(config)"
    expected: "Experiment marked status='expired', concluded_at IS NOT NULL, winner=null. wint.model_affinity NOT updated. Log emitted with status='expired', reason='window_exceeded'."
    evidence: "SELECT status, winner, concluded_at FROM wint.model_experiments — status='expired', winner IS NULL"

  - id: EC-2
    title: "Experiment expires by max_window_days without reaching significance"
    setup: "Insert active experiment with max_window_days=7, started_at=NOW()-8 days. Both arms have < MIN_SAMPLE_PER_ARM rows OR insufficient delta."
    action: "Call runBakeOff(config)"
    expected: "Experiment marked status='expired'. wint.model_affinity NOT updated."
    evidence: "SELECT status FROM wint.model_experiments — status='expired'"

  - id: EC-3
    title: "Tie-break defaults to control when both arms have equal success rate"
    setup: "Insert active experiment. Both arms have 60 rows and exactly equal success rate (0.65 each). Delta = 0.00 < MIN_ABSOLUTE_DELTA."
    action: "Call runBakeOff(config) (unit test context)"
    expected: "Significance NOT reached (delta is 0). Experiment not concluded. Control is preserved (no model_affinity change)."
    evidence: "Unit test assertion on determineWinner() function return value"

  - id: EC-4
    title: "Additive migration runs safely when change_telemetry does not exist yet"
    setup: "Fresh schema with no wint.change_telemetry table"
    action: "Run experiment_id FK migration"
    expected: "Migration completes without error (ALTER TABLE IF EXISTS guard prevents failure)"
    evidence: "No SQL error; migration idempotency check passes on re-run"

edge_cases:
  - id: ED-1
    title: "Significance check at exact minimum boundary (exactly MIN_SAMPLE_PER_ARM rows)"
    setup: "Insert exactly 50 rows per arm (= MIN_SAMPLE_PER_ARM). Challenger success rate 60%, control 50%. Delta = 0.10."
    action: "Run significance check (unit test)"
    expected: "Significance IS reached — boundary is inclusive (>= 50 passes)"
    evidence: "Unit test assertion: isSignificant({controlSample: 50, challengerSample: 50, delta: 0.10}) === true"

  - id: ED-2
    title: "Significance check at exactly MIN_ABSOLUTE_DELTA boundary"
    setup: "Both arms have 60 rows. Delta = exactly 0.05."
    action: "Run significance check (unit test)"
    expected: "Significance IS reached — boundary is inclusive (>= 0.05 passes)"
    evidence: "Unit test: isSignificant({delta: 0.05}) === true"

  - id: ED-3
    title: "One arm has zero rows (experiment just started)"
    setup: "Active experiment with 0 telemetry rows for challenger arm"
    action: "Call runBakeOff(config)"
    expected: "Significance check returns false (insufficient samples). Experiment remains active. No crash or NaN errors in success_rate calculation."
    evidence: "Experiment status remains 'active'"

  - id: ED-4
    title: "Migration idempotency — run both migrations twice"
    setup: "Apply both SQL migrations (model_experiments creation + experiment_id FK additive migration)"
    action: "Run both migrations a second time"
    expected: "No errors (CREATE TABLE IF NOT EXISTS, CREATE INDEX IF NOT EXISTS, ALTER TABLE IF EXISTS ensure idempotency)"
    evidence: "No SQL errors on second run"

  - id: ED-5
    title: "BakeOffConfigSchema validates required fields"
    setup: "Construct config object missing required field (e.g., missing db config)"
    action: "Parse with BakeOffConfigSchema.parse()"
    expected: "Zod throws ZodError with clear field validation message"
    evidence: "Unit test assertion on thrown ZodError"

  - id: ED-6
    title: "Unique partial index prevents two simultaneous active experiments for same (change_type, file_type)"
    setup: "Insert active experiment for (typescript, .ts). Attempt INSERT of second active experiment for same (typescript, .ts)."
    action: "Execute INSERT against real DB"
    expected: "DB throws unique constraint violation. Second experiment not inserted."
    evidence: "Catch error with code '23505' (unique_violation)"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "wint.model_experiments row: status='concluded', winner IS NOT NULL, concluded_at IS NOT NULL after winner promotion"
      - "wint.model_affinity row: preferred_model updated to winner model after promotion"
      - "wint.model_experiments row: status='expired', winner IS NULL, concluded_at IS NOT NULL after expiry"
      - "No wint.model_affinity changes after expiry"
      - "@repo/logger structured log fields: experimentId, changeType, fileType, winner, controlSuccessRate, challengerSuccessRate, durationMs"
      - "createBakeOffGraph() compiles without error"
      - "runBakeOff() returns without throwing on no-op path"
  frontend:
    # Omitted — ui_touched: false

manual_cases: []

fixture_definitions:
  - name: active_experiment_fixture
    type: SQL INSERT
    description: "wint.model_experiments row with status='active', known control/challenger models, min_sample_per_arm=50, max_window_rows=500"
  - name: telemetry_rows_control_arm
    type: SQL INSERT batch
    description: "N rows in wint.change_telemetry with experiment_id set, model=control_model, outcome='success' or 'failure' to achieve target success rate"
  - name: telemetry_rows_challenger_arm
    type: SQL INSERT batch
    description: "N rows in wint.change_telemetry with experiment_id set, model=challenger_model, outcome='success' or 'failure' to achieve target success rate"
  - name: expired_experiment_fixture
    type: SQL INSERT
    description: "wint.model_experiments row with started_at past max_window_days, insufficient telemetry for significance"

risks:
  - "Integration tests cannot run until APIP-3010 (change_telemetry table) and APIP-3020 (model_affinity table) are merged — clearly gate integration tests with @integration tag and prerequisite documentation"
  - "Migration sequence number may shift as APIP-5007 defines authoritative runner — glob for correct migration filename during implementation rather than hardcoding"
  - "Statistical edge cases (both arms tied, exactly at boundary) must be carefully covered in unit tests to prevent silent correctness regressions"
  - "wint schema DB is at port 5432 (lego_dev) not port 5433 (KB DB) — must use correct DATABASE_URL in integration test environment"
