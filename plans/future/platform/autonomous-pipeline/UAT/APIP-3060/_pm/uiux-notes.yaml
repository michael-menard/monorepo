skipped: true
reason: "APIP-3060 is a pure backend/cron story with no UI surface. The Bake-Off Engine is a LangGraph cron graph that runs internally on the dedicated LangGraph Platform server. There are no HTTP endpoints, no frontend components, no user-facing interactions, and no operator UI in scope. Future UI for experiment monitoring is deferred to APIP-2020 (Monitor UI v1) and operator CLI to APIP-5005. ADR-006 skip condition applies (frontend_impacted: false)."
future_ui_note: "When APIP-2020 (Monitor Dashboard) is implemented, it will need to query wint.model_experiments to display experiment status, progress, control/challenger success rates, and winner outcomes. The data shape defined in this story (status enum: active/concluded/expired; control_success_rate; challenger_success_rate; winner; concluded_at) should be treated as the authoritative query target for that future dashboard."
