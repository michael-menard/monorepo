feasible: true
confidence: high
rationale: "All required patterns exist in the codebase. The LangGraph StateGraph factory pattern is established by metrics.ts. The wintSchema pgSchema namespace and Drizzle ORM patterns are established by the existing wint.ts schema file. SQL migration structure follows 015_artifact_type_tables.sql. The story is correctly scoped to schema definition, SQL migrations, graph skeleton, significance logic, and winner promotion — all of which are implementable with existing tooling. The only MVP-critical risk is the integration test gate behind APIP-3010 and APIP-3020, which is addressable by phasing subtasks to decouple schema/unit-test work from integration work."
complexity: high
change_surface:
  areas:
    - packages/backend/database-schema/src/schema/wint.ts
    - packages/backend/orchestrator/src/graphs/bake-off-engine.ts
    - apps/api/knowledge-base/src/db/migrations/ (new migration file for model_experiments)
    - apps/api/knowledge-base/src/db/migrations/ (new additive migration for experiment_id FK)
    - packages/backend/orchestrator/src/graphs/__tests__/bake-off-engine.test.ts
    - packages/backend/orchestrator/src/graphs/__tests__/bake-off-engine.integration.test.ts
  endpoints: []
  deploy_touchpoints:
    - "Aurora PostgreSQL migration must run before bake-off engine cron is activated (APIP-3090)"
    - "Additive migration for change_telemetry FK must run after APIP-3010 migration"

risks:
  - finding: "Integration tests cannot run until APIP-3010 (wint.change_telemetry) and APIP-3020 (wint.model_affinity) are both complete and merged to test DB"
    mitigation: "Separate subtasks into a schema/migration/unit-test group (completable immediately) and an integration-test group (gated on APIP-3010 + APIP-3020). Tag integration tests with @integration and document prerequisite in test file."
  - finding: "Additive migration for experiment_id FK on wint.change_telemetry must guard against change_telemetry not existing (APIP-3010 not yet deployed)"
    mitigation: "Use ALTER TABLE IF EXISTS wint.change_telemetry ADD COLUMN IF NOT EXISTS experiment_id ... to make the migration safe to run on schemas where change_telemetry may not yet exist."
  - finding: "Concurrent bake-off runs could race on experiment status transitions (e.g., two cron invocations both attempt to mark an experiment concluded)"
    mitigation: "Use Drizzle upsert with ON CONFLICT DO UPDATE for model_affinity writes and a conditional UPDATE (WHERE status = 'active') for experiment status transitions. APIP-3090 should enforce single-instance scheduling, but the engine must be idempotent regardless."

missing_requirements: []

evidence_expectations:
  - "createBakeOffGraph() compiles without TypeScript errors (pnpm check-types --filter @repo/orchestrator)"
  - "Unit tests pass for significance logic, expiry logic, no-op path, and BakeOffConfigSchema validation"
  - "Integration test: insert fixture experiment + telemetry rows, run runBakeOff(), assert model_affinity updated with winner, assert experiment marked concluded"
  - "Integration test: expiry path verified with window-exceeded fixture (max_window_rows exceeded, significance not reached)"
  - "Both SQL migrations run idempotently (run twice, no errors)"
  - "Existing packages/backend/database-schema/src/schema/__tests__/ tests all pass after schema additions"
  - "No modifications to wint.trainingData, wint.mlModels, wint.modelPredictions, wint.modelMetrics"

