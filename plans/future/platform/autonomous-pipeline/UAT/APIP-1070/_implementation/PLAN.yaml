architectural_decisions:
  - id: ARCH-001
    question: "poll-ci timeout: createToolNode() has 10s hardcoded timeout incompatible with 30-minute CI polling"
    decision: "Use createNode() directly with timeoutMs set to config.ciTimeoutMs (per AC-20)"
    rationale: "createToolNode() wraps createNode() with timeoutMs: 10000 which would immediately terminate the 30-min polling loop. createNode() accepts a custom NodeConfigInput with configurable timeout. AC-20 explicitly mandates this approach."
    decided_by: story
  - id: ARCH-002
    question: "MERGE.yaml write: YamlArtifactWriter does not have a 'merge' artifact type registered"
    decision: "Use direct atomic filesystem write: fs.writeFile to temp path + fs.rename() to final path"
    rationale: "AC-18 explicitly mandates this approach to avoid coupling to the YamlArtifactWriter type system. The atomic pattern (temp + rename) ensures no partial writes on crash."
    decided_by: story
  - id: ARCH-003
    question: "extract-learnings reuse: createPersistLearningsNode() returns a NodeFunction expecting GraphState, not MergeGraphStateAnnotation"
    decision: "Call persistLearnings() directly with a pre-built Learning[] array"
    rationale: "AC-19 explicitly mandates calling persistLearnings() directly. The factory function createPersistLearningsNode() returns a NodeFunction expecting GraphState.extractedLearnings which is incompatible with MergeGraphStateAnnotation."
    decided_by: story

complexity: complex

notes:
  - "All 3 gaps from ELAB.yaml (GAP-01, GAP-02, GAP-03) have been resolved via AC-18, AC-19, AC-20 added to the story."
  - "ST-12 (structured logging) modifies nodes already created in ST-03..ST-10; only 3 representative files listed in step files — actual logging is added to all 8 node files during this step."
  - "poll-ci node uses createNode() with timeoutMs: config.ciTimeoutMs to accommodate 30-minute CI window (AC-20). The internal async loop manages per-poll delays via injectable sleepFn."
  - "All failure paths (MERGE_BLOCKED, MERGE_FAIL) must route through cleanup-worktree → extract-learnings → write-merge-artifact → END. This is the critical invariant verified in both per-node and graph-level tests."
  - "MergeGraphStateAnnotation does not extend GraphState — it is a standalone Annotation.Root() following the elaboration.ts pattern. The merge.ts file starts with schema/config definitions before adding nodes."
  - "The merge.ts file is created in step 2 with only config/state definitions, then expanded in step 11 to add all nodes and graph wiring."
  - "Category mapping for QA lessons: time_sink → time-sink, anti_pattern → pattern, blocker → blocker, pattern → pattern, reuse → reuse."
  - "Thread ID convention: storyId + ':merge:' + attempt — follows APIP-1030 convention documented in Architecture Notes."
