schema: 2
story_id: APIP-5005
timestamp: '2026-03-01T00:00:00Z'
subtask_source: story
steps:
  - id: 1
    subtask_id: ST-1
    description: >-
      Verify ESLint config covers CLI path. The existing 'apps/api/**/*.{js,ts}' Node.js glob in eslint.config.js
      already includes the CLI path with no-console: off. Confirm no change is needed; if any edge case exists (e.g.
      .tsx extension), add it. Also add @repo/pipeline-queue to apps/api/pipeline/package.json dependencies.
    files:
      - eslint.config.js
      - apps/api/pipeline/package.json
    files_to_read:
      - eslint.config.js
    dependencies: []
    slice: backend
    verification: pnpm eslint apps/api/pipeline/src/cli/index.ts exits 0 (after CLI file exists)
    acs_covered:
      - AC-11
  - id: 2
    subtask_id: ST-2
    description: >-
      Create CLI entry point apps/api/pipeline/src/cli/index.ts with: (1) '#!/usr/bin/env npx tsx' shebang, (2)
      process.argv.slice(2) command parsing, (3) top-level command dispatch to queue/supervisor/graph subcommands, (4)
      --help flag printing all available commands and exits 0, (5) unknown command prints usage and exits 1.
    files:
      - apps/api/pipeline/src/cli/index.ts
    files_to_read:
      - scripts/check-workflow-sync.ts
    dependencies:
      - 1
    slice: backend
    verification: >-
      npx tsx apps/api/pipeline/src/cli/index.ts --help exits 0 and prints commands; npx tsx
      apps/api/pipeline/src/cli/index.ts badcmd exits 1
    acs_covered:
      - AC-1
      - AC-12
      - AC-9
  - id: 3
    subtask_id: ST-3
    description: >-
      Implement 'queue status' and 'queue jobs' commands in cli/index.ts. Import createPipelineConnection,
      createPipelineQueue, PIPELINE_QUEUE_NAME, PipelineJobDataSchema from @repo/pipeline-queue. Use pq.bullQueue for
      BullMQ Queue read operations (getJobCounts, getJobs). queue status: print waiting/active/completed/failed/delayed
      counts in key-value format. queue jobs: accept optional --status flag, fetch and print tabular output with
      columns: jobId, storyId, phase (from data.phase), attemptsMade, status, age. Wrap all Redis operations in
      try/catch/finally with await pq.bullQueue.close() + await conn.quit() in finally block. On ECONNREFUSED: print
      'Error: Cannot connect to Redis at <url>. Is the pipeline server running?' and process.exit(1).
    files:
      - apps/api/pipeline/src/cli/index.ts
    files_to_read:
      - packages/backend/pipeline-queue/src/index.ts
      - packages/backend/pipeline-queue/src/__types__/index.ts
    dependencies:
      - 2
    slice: backend
    verification: >-
      Unit tests for queue commands pass (mocked @repo/pipeline-queue); connection.quit() spy called; output formatting
      assertions pass
    acs_covered:
      - AC-2
      - AC-3
      - AC-6
      - AC-7
      - AC-8
  - id: 4
    subtask_id: ST-4
    description: >-
      Implement 'supervisor status' command in cli/index.ts. Use pq.bullQueue.getActive(), getCompleted(1),
      getFailed(1). Infer state: active.length > 0 = 'processing', else 'idle'. Print key-value: 'supervisor state:
      <state>', active job storyId + phase + metadata?.threadId (if any), last completed job storyId + outcome, last
      failed job storyId + failedReason. NOTE: PipelineJobDataSchema has no threadId field; threadId may be in
      job.data.metadata. Print 'N/A' if field absent.
    files:
      - apps/api/pipeline/src/cli/index.ts
    files_to_read:
      - packages/backend/pipeline-queue/src/__types__/index.ts
    dependencies:
      - 3
    slice: backend
    verification: >-
      Unit tests: idle state (no active jobs), processing state (active job present), all-empty state (no jobs at all)
      all pass
    acs_covered:
      - AC-4
      - AC-6
      - AC-7
      - AC-8
  - id: 5
    subtask_id: ST-5
    description: >-
      Implement 'graph status' command in cli/index.ts. Stages: ['elaboration', 'implementation', 'review', 'qa',
      'merge']. Fetch all jobs via pq.bullQueue.getJobs(['waiting','active','completed','failed','delayed'], 0, 1000).
      Group by job.data.phase. For each stage print count. For merge: if count is 0 and no merge jobs found, display
      'N/A (pending APIP-1070)'. When real merge jobs exist (stage = 'merge' in data.phase), show actual count
      automatically.
    files:
      - apps/api/pipeline/src/cli/index.ts
    files_to_read:
      - packages/backend/pipeline-queue/src/__types__/index.ts
    dependencies:
      - 3
    slice: backend
    verification: 'Unit test: no merge jobs -> N/A shown; merge jobs present -> count shown'
    acs_covered:
      - AC-5
      - AC-6
      - AC-7
      - AC-8
  - id: 6
    subtask_id: ST-6
    description: >-
      Write unit and integration tests in apps/api/pipeline/src/cli/__tests__/cli.test.ts. Use
      vi.mock('@repo/pipeline-queue') at module level with vi.hoisted() for mock factory setup. Use vi.spyOn(process,
      'exit').mockImplementation(() => { throw new Error('process.exit called') }) to prevent test runner termination.
      Tests cover: (a) queue status output formatting with mock getJobCounts, (b) connection error prints correct
      message and calls process.exit(1), (c) unknown command exits 1, (d) connection.quit() called in success and error
      paths. Integration test guarded by test.skipIf(!process.env.REDIS_URL): queue status connects to Docker Compose
      Redis and prints counts.
    files:
      - apps/api/pipeline/src/cli/__tests__/cli.test.ts
    files_to_read:
      - scripts/check-workflow-sync.ts
    dependencies:
      - 4
      - 5
    slice: backend
    verification: pnpm test --filter @repo/pipeline passes; integration test skips (not fails) when REDIS_URL not set
    acs_covered:
      - AC-9
      - AC-10
files_to_change:
  - path: eslint.config.js
    action: modify
    reason: >-
      Verify apps/api glob covers CLI; add .tsx extension if needed (likely no change required — apps/api/**/*.{js,ts}
      already covers the path with no-console: off)
  - path: apps/api/pipeline/package.json
    action: modify
    reason: Add @repo/pipeline-queue as workspace dependency so CLI can import it
  - path: apps/api/pipeline/src/cli/index.ts
    action: create
    reason: >-
      CLI entry point — shebang, command dispatcher, all 4 command handlers (queue status, queue jobs, supervisor
      status, graph status), --help, error handling, connection lifecycle
  - path: apps/api/pipeline/src/cli/__tests__/cli.test.ts
    action: create
    reason: Unit tests (mocked BullMQ/ioredis) + integration test (REDIS_URL guard) per AC-9 and AC-10
commands_to_run:
  - command: pnpm add @repo/pipeline-queue --filter @repo/pipeline
    when: before writing CLI code (ST-1)
    required: true
  - command: pnpm check-types --filter @repo/pipeline
    when: after all code changes
    required: true
  - command: pnpm test --filter @repo/pipeline
    when: after all code changes
    required: true
  - command: pnpm eslint apps/api/pipeline/src/cli/index.ts
    when: after all code changes
    required: true
acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: File exists at apps/api/pipeline/src/cli/index.ts with shebang; npx tsx invocation works
    evidence_type: command
  - ac_id: AC-2
    planned_evidence: >-
      Unit test HP-1: mock getJobCounts returns {waiting:3,active:1,completed:10,failed:2,delayed:0}; stdout assertions
      pass
    evidence_type: test
  - ac_id: AC-3
    planned_evidence: 'Unit test HP-2 and HP-3: mock getJobs returns 10 jobs; --status active filter tested'
    evidence_type: test
  - ac_id: AC-4
    planned_evidence: 'Unit tests HP-4 and HP-5: idle/processing state assertions pass; supervisor status output correct'
    evidence_type: test
  - ac_id: AC-5
    planned_evidence: 'Unit test HP-6: graph status stage count table; merge row shows N/A when no merge jobs'
    evidence_type: test
  - ac_id: AC-6
    planned_evidence: Unit tests assert stdout contains column-aligned text for all commands
    evidence_type: test
  - ac_id: AC-7
    planned_evidence: 'Unit test EC-1: ECONNREFUSED prints correct error message; process.exit(1) called'
    evidence_type: test
  - ac_id: AC-8
    planned_evidence: 'Unit tests EC-3 and EC-4: connection.quit() spy asserts called in success and error paths'
    evidence_type: test
  - ac_id: AC-9
    planned_evidence: 'Unit tests in cli.test.ts: output formatting, connection error, unknown command, connection cleanup'
    evidence_type: test
  - ac_id: AC-10
    planned_evidence: Integration test guarded by test.skipIf(!process.env.REDIS_URL); skips cleanly when not set
    evidence_type: test
  - ac_id: AC-11
    planned_evidence: pnpm check-types --filter @repo/pipeline exits 0; pnpm eslint apps/api/pipeline/src/cli/index.ts exits 0
    evidence_type: command
  - ac_id: AC-12
    planned_evidence: 'Unit test HP-7 and EC-2: --help exits 0 with command list; unknown command exits 1'
    evidence_type: test
architectural_decisions: []
complexity: simple
notes:
  - >-
    APIP-0010 is merged: @repo/pipeline-queue exists at packages/backend/pipeline-queue with createPipelineConnection,
    createPipelineQueue, PIPELINE_QUEUE_NAME, PipelineJobDataSchema.
  - >-
    PipelineJobDataSchema fields: storyId, phase, priority (optional), metadata (optional record). NO threadId field.
    AC-4 supervisor status threadId should be read from job.data.metadata?.threadId or shown as N/A.
  - >-
    PipelineQueue wrapper only exposes add() and bullQueue. CLI uses pq.bullQueue for all read-only BullMQ Queue methods
    (getJobCounts, getJobs, getActive, getCompleted, getFailed).
  - >-
    @repo/pipeline-queue must be added to apps/api/pipeline/package.json dependencies. Run: pnpm add
    @repo/pipeline-queue --filter @repo/pipeline
  - >-
    eslint.config.js Node.js glob 'apps/api/**/*.{js,ts}' already covers apps/api/pipeline/src/cli/**. ST-1 is likely a
    no-op verify step; no glob extension needed.
  - >-
    Use vi.hoisted() pattern for Vitest mock factories that reference module-scope variables (KB lesson from APIP-0010
    unit tests).
  - Use vi.mock('@repo/pipeline-queue') at module level (not inside describe/it) per ESM mocking requirement.
  - ST-4 and ST-5 are parallel (both depend on ST-3) enabling concurrent implementation by executor.
  - >-
    The queue status command (AC-2) note from story: 'queue jobs' stage column should display job.data.phase
    (PipelineJobDataSchema field name is 'phase', not 'stage' as mentioned in some AC text).
  - >-
    Integration test pattern: test.skipIf(!process.env.REDIS_URL)('description', async () => { ... }) — must SKIP not
    FAIL when env not set.
