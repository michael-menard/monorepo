  - id: opp-2
    category: observability
    finding: >
      Token estimate is 150,000 (set in predictions with confidence: low). Per KB lesson
      (entry 64473990): stories delivering executable TypeScript CLI commands exceed token
      estimates by 4-8x. A CLI with 4 commands, connection lifecycle, output formatting,
      and a full test suite is squarely in the 4-6x overrun category. Realistic estimate
      is 600,000-900,000 tokens. The prediction metadata note acknowledges low confidence.
      Recommend updating token_estimate in predictions after APIP-0010 merges and the
      implementer can assess actual BullMQ API surface.
    effort: low
    decision: log_to_kb
    kb_entry_id: "1a7f8d2f-818e-433c-b05e-4ad61422bf8c"

  - id: opp-3
    category: edge_cases
    finding: >
      The APIP-1070 dependency in stories.index.md and story.yaml depends_on list may be
      overstated. The CLI's merge stage N/A stub requires only the stage enum value
      'merge' to exist in PipelineJobDataSchema (which comes from APIP-0010), not the
      actual APIP-1070 merge graph implementation. If the stage enum includes 'merge' in
      APIP-0010's schema, APIP-1070 could be dropped from depends_on, allowing APIP-5005
      to unblock earlier. This should be verified when APIP-0010 elaboration is reviewed.
    effort: low
    decision: log_to_kb
    kb_entry_id: "58995bbb-21bb-47b9-80a1-f29fcde2094a"

  - id: opp-4
    category: ux_polish
    finding: >
      The CLI has no --version flag. For operator tooling, a version flag (printing the
      pipeline package version or a build timestamp) is useful when debugging which CLI
      version is deployed on the pipeline server. Low complexity addition (one AC, one
      subtask) but deferred to APIP-2020 (Monitor UI) phase or as a follow-up polish
      story. Not MVP-blocking.
    effort: low
    decision: log_to_kb
    kb_entry_id: "fd78335c-b8ed-4498-8632-d8d0b9b682bf"

  - id: opp-5
    category: observability
    finding: >
      The graph status command queries all BullMQ jobs by stage via client-side filtering
      of job.data.stage. If the queue has a large number of completed/failed jobs (thousands),
      getJobs() with no limit could return a very large dataset. The story does not specify
      a max job fetch limit for the graph status command. For Phase 1 dev-time use with small
      queues this is not a concern, but worth noting for Phase 2+ when the pipeline processes
      many stories. Consider adding a default --limit flag or a configurable job fetch cap.
      Deferred to Phase 2+ (APIP-2020 Monitor UI).
    effort: low
    decision: log_to_kb
    kb_entry_id: "c449ef10-cc85-4e2e-b437-20ba01b1acf2"

