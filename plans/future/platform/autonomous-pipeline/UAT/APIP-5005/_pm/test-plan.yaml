strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  cli_touched: true
  redis_touched: true
  note: "Headless Node.js CLI tool; no HTTP endpoints, no frontend, no Aurora DB. ADR-006 E2E requirement does not apply."

preconditions:
  - "APIP-0010 must be merged before integration tests can run — @repo/pipeline-queue is the CLI primary data source"
  - "Docker Compose Redis running at localhost:6379 (infra/compose.lego-app.yaml) for integration tests"
  - "REDIS_URL environment variable must be set for integration tests (ADR-005)"

happy_path_tests:
  - id: HP-1
    title: "queue status command prints all five BullMQ queue counts"
    setup: "Mock BullMQ Queue.getJobCounts() to return { waiting: 3, active: 1, completed: 10, failed: 2, delayed: 0 }"
    action: "Invoke CLI with command 'queue status'"
    expected: "stdout contains 'waiting: 3', 'active: 1', 'completed: 10', 'failed: 2', 'delayed: 0'; process exits with code 0"
    evidence: "Unit test with vitest; capture stdout via process.stdout spy or console.log spy; assert exit code 0"
    acs: ["AC-2", "AC-6", "AC-7"]

  - id: HP-2
    title: "queue jobs command lists last 10 jobs with correct columns"
    setup: "Mock BullMQ Queue.getJobs() to return 10 mock job objects with storyId, stage, attemptsMade, status fields from PipelineJobDataSchema"
    action: "Invoke CLI with command 'queue jobs'"
    expected: "stdout contains column headers (ID, storyId, stage, attempts, status, age) and 10 rows of job data; process exits 0"
    evidence: "Unit test with vitest; assert all column fields present in formatted output string"
    acs: ["AC-3", "AC-6", "AC-7"]

  - id: HP-3
    title: "queue jobs --status active filters to active jobs only"
    setup: "Mock BullMQ Queue.getJobs(['active']) to return 2 active mock jobs"
    action: "Invoke CLI with command 'queue jobs --status active'"
    expected: "stdout shows 2 rows, all with status 'active'; process exits 0"
    evidence: "Unit test asserting that Queue.getJobs is called with ['active'] arg and output is filtered"
    acs: ["AC-3"]

  - id: HP-4
    title: "supervisor status command infers idle state when no active jobs"
    setup: "Mock BullMQ Queue.getActive() returns []; getCompleted() returns 1 recent completed job; getFailed() returns []"
    action: "Invoke CLI with command 'supervisor status'"
    expected: "stdout shows 'supervisor state: idle', last completed job storyId and outcome; process exits 0"
    evidence: "Unit test asserting output string contains 'idle' and last-completed job fields"
    acs: ["AC-4", "AC-6", "AC-7"]

  - id: HP-5
    title: "supervisor status command infers processing state when active job present"
    setup: "Mock BullMQ Queue.getActive() returns 1 active job with storyId, stage, threadId fields"
    action: "Invoke CLI with command 'supervisor status'"
    expected: "stdout shows 'supervisor state: processing', active job storyId + stage + threadId; process exits 0"
    evidence: "Unit test asserting output contains 'processing' and active job fields"
    acs: ["AC-4"]

  - id: HP-6
    title: "graph status command shows counts per pipeline stage"
    setup: "Mock BullMQ Queue.getJobs() to return jobs with stages: elaboration(2), implementation(1), review(0), qa(0), merge(0)"
    action: "Invoke CLI with command 'graph status'"
    expected: "stdout shows table with elaboration=2, implementation=1, review=0, qa=0, merge row shows 'N/A (pending APIP-1070)'; process exits 0"
    evidence: "Unit test asserting merge row displays N/A stub text, other rows show correct counts"
    acs: ["AC-5", "AC-6"]

  - id: HP-7
    title: "--help flag prints usage summary and exits 0"
    setup: "No special setup"
    action: "Invoke CLI with --help flag"
    expected: "stdout contains list of available commands (queue status, queue jobs, supervisor status, graph status); exits 0"
    evidence: "Unit test capturing stdout and asserting each command name appears"
    acs: ["AC-12"]

  - id: HP-8
    title: "Integration: queue status round-trip against Docker Compose Redis"
    setup: "REDIS_URL=redis://localhost:6379 set; Docker Compose Redis running; pipeline queue may be empty"
    action: "Invoke CLI with command 'queue status' against real Redis"
    expected: "Prints queue counts (may all be 0); process exits 0; no hanging processes"
    evidence: "Integration test file (test.skip if REDIS_URL not set); assert exit code 0 and stdout non-empty"
    acs: ["AC-10", "AC-8"]

error_cases:
  - id: EC-1
    title: "Redis connection failure prints actionable error message and exits 1"
    setup: "Mock createPipelineConnection() to throw ECONNREFUSED; REDIS_URL=redis://localhost:9999"
    action: "Invoke CLI with any command (e.g., 'queue status')"
    expected: "stderr/stdout contains 'Error: Cannot connect to Redis at redis://localhost:9999. Is the pipeline server running?'; process exits with code 1"
    evidence: "Unit test with vitest; mock ioredis connection error; assert process.exit(1) called with correct error message"
    acs: ["AC-7"]

  - id: EC-2
    title: "Unknown command prints usage and exits 1"
    setup: "No special setup"
    action: "Invoke CLI with unknown command 'invalidcmd'"
    expected: "stdout/stderr contains usage summary or 'Unknown command: invalidcmd'; process exits with code 1"
    evidence: "Unit test asserting exit code 1 and error message for unrecognized command"
    acs: ["AC-9", "AC-12"]

  - id: EC-3
    title: "queue jobs with unknown --status value exits 1 with validation error"
    setup: "No special setup"
    action: "Invoke CLI with 'queue jobs --status badvalue'"
    expected: "stdout/stderr shows validation error for invalid status value; process exits 1"
    evidence: "Unit test asserting Zod validation error is surfaced and exit code is 1"
    acs: ["AC-3", "AC-7"]

  - id: EC-4
    title: "All ioredis connections closed after successful command"
    setup: "Mock createPipelineConnection(); spy on connection.quit()"
    action: "Invoke CLI with 'queue status'"
    expected: "connection.quit() is called exactly once before process exits; process exits cleanly (no hang)"
    evidence: "Unit test using spy on ioredis connection mock; assert quit() was called"
    acs: ["AC-8"]

  - id: EC-5
    title: "All ioredis connections closed even when command throws"
    setup: "Mock createPipelineConnection(); mock Queue.getJobCounts() to throw"
    action: "Invoke CLI with 'queue status'"
    expected: "connection.quit() still called in finally/catch block; process exits 1 with error message"
    evidence: "Unit test asserting quit() is called in error path too"
    acs: ["AC-8", "AC-7"]

edge_cases:
  - id: ED-1
    title: "graph status with merge stage jobs returns real counts (APIP-1070 future state)"
    setup: "Mock jobs with stage='merge' present in BullMQ records"
    action: "Invoke CLI with 'graph status'"
    expected: "merge row shows actual count instead of N/A; no error thrown"
    evidence: "Unit test: when merge jobs exist, count displayed rather than N/A stub"
    acs: ["AC-5"]

  - id: ED-2
    title: "queue jobs when queue is empty returns empty list gracefully"
    setup: "Mock Queue.getJobs() to return []"
    action: "Invoke CLI with 'queue jobs'"
    expected: "stdout shows empty list or 'No jobs found' message; process exits 0"
    evidence: "Unit test asserting graceful empty-list handling"
    acs: ["AC-3"]

  - id: ED-3
    title: "supervisor status with no jobs at all shows idle with no last-completed info"
    setup: "Mock all BullMQ job queries to return []"
    action: "Invoke CLI with 'supervisor status'"
    expected: "stdout shows 'supervisor state: idle', last-completed and last-failed fields show 'none' or '-'; process exits 0"
    evidence: "Unit test asserting all-empty state is handled without exception"
    acs: ["AC-4"]

  - id: ED-4
    title: "REDIS_URL not set — integration test skipped, not failed"
    setup: "Remove REDIS_URL from environment"
    action: "Run integration test suite"
    expected: "Integration tests are skipped (not failed); unit tests still run and pass"
    evidence: "Test file uses test.skipIf(!process.env.REDIS_URL) pattern; CI output shows skip not failure"
    acs: ["AC-10"]

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "process.exit(0) called on success"
      - "process.exit(1) called on Redis failure"
      - "connection.quit() called before exit in all code paths"
      - "stdout contains expected column-aligned output fields"
  frontend: null

manual_cases:
  - id: MC-1
    title: "Live queue status against Docker Compose Redis with real BullMQ jobs"
    steps:
      - "Start Docker Compose: docker compose -f infra/compose.lego-app.yaml up -d"
      - "Enqueue 3 mock pipeline jobs via a test script"
      - "Run: npx tsx apps/api/pipeline/src/cli/index.ts queue status"
    expected: "Prints queue counts matching enqueued jobs; output is readable in terminal; process exits cleanly"

  - id: MC-2
    title: "Live supervisor status with active job"
    steps:
      - "Ensure a job is in active state in BullMQ"
      - "Run: npx tsx apps/api/pipeline/src/cli/index.ts supervisor status"
    expected: "Shows 'processing' state with active job storyId, stage, threadId; output aligned and readable"

  - id: MC-3
    title: "Live graph status showing per-stage breakdown"
    steps:
      - "Ensure jobs exist across multiple stages (elaboration, implementation)"
      - "Run: npx tsx apps/api/pipeline/src/cli/index.ts graph status"
    expected: "Each stage row shows correct count; merge row shows N/A until APIP-1070; output readable"

  - id: MC-4
    title: "ESLint passes on CLI source file"
    steps:
      - "Run: pnpm eslint apps/api/pipeline/src/cli/index.ts"
    expected: "No ESLint errors (console.log permitted via Node.js glob in eslint.config.js)"

  - id: MC-5
    title: "Type check passes for pipeline package"
    steps:
      - "Run: pnpm check-types --filter pipeline"
    expected: "No TypeScript errors"

fixture_definitions:
  - name: mockPipelineJob
    type: object
    description: "Mock BullMQ job object with id, data (PipelineJobDataSchema shape: storyId, stage, threadId), attemptsMade, status, timestamp"
  - name: mockQueueCounts
    type: object
    description: "Mock return from BullMQ Queue.getJobCounts() — { waiting: number, active: number, completed: number, failed: number, delayed: number }"
  - name: mockConnectionFactory
    type: mock
    description: "vi.mock of createPipelineConnection() from @repo/pipeline-queue; returns mock ioredis instance with spy on quit()"

risks:
  - "Integration tests depend on APIP-0010 merge — cannot run until @repo/pipeline-queue package exists"
  - "CLI output format could be brittle if tested via string matching — prefer key-presence checks over exact format tests"
  - "process.exit() calls in CLI code need mocking in Vitest (vi.spyOn(process, 'exit')) to prevent test runner termination"
  - "BullMQ Queue API method names (getJobs, getActive, getFailed) must match actual BullMQ v5 API — verify on APIP-0010 merge"
