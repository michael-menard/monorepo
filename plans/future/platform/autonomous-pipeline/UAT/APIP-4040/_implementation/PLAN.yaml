architectural_decisions:
  - id: ARCH-001
    question: APIP-3090 cron infrastructure — use canonical schemas or define locally?
    decision: >-
      Import from canonical cron/schemas.ts (CronJobDefinitionSchema, CronRunResultSchema, CronRunStatus). APIP-3090 is
      already delivered.
    rationale: >-
      packages/backend/orchestrator/src/cron/schemas.ts exists with CronJobDefinitionSchema and CronRunResultSchema.
      AC-10 local-schema caveat is now obsolete. Use canonical import.
    decided_by: auto
  - id: ARCH-002
    question: >-
      CronRunResult status values: AC-11 specifies lowercase (success|failure|timeout|skipped) but canonical
      CronRunStatusSchema uses uppercase (SUCCESS|FAILED|TIMEOUT|SKIPPED). Which takes precedence?
    decision: >-
      Use canonical uppercase enum values from cron/schemas.ts: SUCCESS | FAILED | TIMEOUT | SKIPPED. AC-11 wording will
      be interpreted accordingly.
    rationale: >-
      The cron/registry.ts already uses uppercase values and is the authoritative pattern in the codebase. Deviating
      would break the existing registry integration.
    decided_by: auto
  - id: ARCH-003
    question: Migration number for test_quality_snapshots table
    decision: Use migration number 0030. Latest confirmed is 0029_apip_3020_model_affinity.sql.
    rationale: 0028 is APIP-3010, 0029 is APIP-3020. Next sequential is 0030.
    decided_by: auto
  - id: ARCH-004
    question: >-
      Should the job file (test-quality-monitor.job.ts) implement CronRunResult logging directly, or rely on the
      registry wrapper in cron/registry.ts?
    decision: >-
      The job's runFn implements the graph execution and emits a CronRunResult via logger.info. The registry wrapper
      provides an outer timeout+result layer. Both operate: the job logs its own internal result; the registry logs the
      outer run completion.
    rationale: >-
      Looking at existing jobs (metrics-collection.job.ts), they are thin stubs. APIP-4040's job needs to produce its
      own structured CronRunResult per AC-11 for the test-quality-monitor specifically. The registry.ts wrapper handles
      the global TIMEOUT/FAILED cases; the job emits its own SUCCESS/SKIPPED result internally.
    decided_by: auto
complexity: complex
notes:
  - >-
    APIP-3090 is already delivered — cron/schemas.ts, cron/registry.ts, CronJobDefinitionSchema, CronRunResultSchema all
    exist. AC-10 local-schema caveat is obsolete.
  - Migration number is 0030 (0028=APIP-3010, 0029=APIP-3020).
  - 'CronRunStatus enum is uppercase: SUCCESS|FAILED|TIMEOUT|SKIPPED per cron/schemas.ts.'
  - AC-3 (MutationScoreCollector) is DEFERRED to APIP-4040-B — no mutation testing tooling installed.
  - ST-5 is DEFERRED — not included in steps.
  - >-
    TestQualitySnapshotSchema status field uses lowercase pass|warn|fail (internal domain concept distinct from
    CronRunStatus).
  - >-
    Fixture files for tests live under src/nodes/test-quality/__tests__/fixtures/ — excluded from OrphanedTestDetector
    per AC-4 (excludes fixtures/ directories).
  - >-
    The fixture files for density tests will contain actual TypeScript with a known count of expect() calls and
    it()/test() declarations for deterministic assertion counting.
  - >-
    CriticalPathCoverageCollector runs vitest with --coverage flag scoped to configurable patterns; it spawns a child
    process or uses programmatic API — recommend child_process.spawn with withTimeout wrapper.
  - All thresholds are env-var configurable per Architecture Notes table in the story.
