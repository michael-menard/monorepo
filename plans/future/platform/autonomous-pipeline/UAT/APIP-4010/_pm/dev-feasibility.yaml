  risks:
    - id: RISK-001
      severity: high
      description: >
        Merge-count tracking dependency on APIP-1070. APIP-4010's "every 5th merge"
        trigger requires a merge counter. APIP-1070 (In Elaboration) may not include
        this in its scope. If APIP-1070 finalizes without a mergeCount field in
        MergeArtifactSchema, APIP-4010 must implement a separate wint.merge_runs table.
      mitigation: >
        Design a self-contained wint.merge_runs counter table as a fallback. Coordinate
        with APIP-1070 team during elaboration to prefer adding optional mergeCount field
        to MergeArtifactSchema. Either path is viable — document both in the story subtasks
        and choose during implementation based on APIP-1070 status.

    - id: RISK-002
      severity: high
      description: >
        APIP-3090 cron infrastructure not yet available. APIP-4010 depends on APIP-3090
        for cron task registration, but APIP-3090 is in backlog and depends on APIP-0030
        (LangGraph Docker Deployment) and APIP-3020 (Model Affinity Profiles). This is
        a long dependency chain that makes APIP-4010 a Phase 4 story.
      mitigation: >
        Decouple the DB migration, Zod schemas, captureHealthSnapshot(), and
        detectDriftAndGenerateCleanup() from the cron registration. These can be
        implemented and tested independently. The cron wiring (AC-10) is deferred
        until APIP-3090 provides a stable registration interface.

    - id: RISK-003
      severity: medium
      description: >
        Metric capture complexity. The 8 metrics use heterogeneous collection methods:
        CLI stdout parsing (lint, type errors), JSON report parsing (coverage),
        build output reading (bundle size), external tool execution (madge for
        circular deps, ts-prune for dead exports). Each has its own failure mode.
      mitigation: >
        Decompose into 8 small, independently testable metric collector functions.
        Each accepts an injectable execFn/toolRunner. Failure of one metric collector
        does not block the others (partial capture with logger.warn).

    - id: RISK-004
      severity: medium
      description: >
        Threshold calibration is empirical. Initial thresholds must be configurable
        and documented. There is no established baseline to reference for reasonable
        initial values.
      mitigation: >
        Use a typed HealthGateThresholdsSchema with documented default values.
        Thresholds are loaded from a config object, NOT hardcoded constants.
        Document calibration guidance alongside the defaults (e.g., "start with
        lint_warnings_delta: 10, adjust after observing 3-4 health gate runs").

    - id: RISK-005
      severity: low
      description: >
        File write access for CLEANUP story YAML. Writing to plans/future/platform/
        autonomous-pipeline/backlog/ requires the orchestrator process to have write
        access to the plans directory on the dedicated server.
      mitigation: >
        Verify during APIP-5006 server provisioning review. On local dev the path
        is writable. Make the output directory configurable via the thresholds/config
        object so it can be overridden in tests and deployment.

