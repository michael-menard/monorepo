  implementation_notes:
    - >
      The wint.codebase_health table does NOT need a FK to a separate wint.health_baselines table.
      Use a simpler is_baseline boolean column (default false) on each snapshot row. Operators
      manually mark a row is_baseline=true after a known-good pipeline state.
    - >
      Do not implement automatic baseline promotion logic. Document the manual process:
      "After a successful pipeline run, UPDATE wint.codebase_health SET is_baseline=true
      WHERE id='<known-good-row-id>'". This avoids silent-drift-accepted risk.
    - >
      The pg_try_advisory_lock pattern (from APIP-3020/Pattern Miner) is recommended for
      defense-in-depth against concurrent cron runs. Include in cron task registration subtask.
    - >
      The orchestrator must export CodebaseHealthSnapshotSchema from the artifacts package
      for use by other stories (e.g., APIP-4070 Weekly Report).

