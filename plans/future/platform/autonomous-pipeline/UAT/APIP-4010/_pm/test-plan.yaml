---
story_id: APIP-4010
generated: "2026-02-25"
worker: pm-draft-test-plan
version: "1.0.0"
---

test_plan:
  summary: >
    APIP-4010 delivers three integrated components — a wint.codebase_health DB table,
    a captureHealthSnapshot() helper, and a detectDriftAndGenerateCleanup() function —
    plus a LangGraph cron task registration. Testing focuses on the helper functions
    and Zod schemas (coverage waiver applies to raw SQL migration files). All 8 metric
    capture paths must use injectable toolRunner/execFn parameters to support unit mocking.

  test_levels:

    unit:
      framework: vitest
      location: packages/backend/orchestrator/src/nodes/health/__tests__/
      notes: >
        Mock CLI tool execution via injected execFn. Mock fs/promises for CLEANUP story
        file writes. Mock the db parameter for DB insert helpers.
      cases:
        - id: UT-001
          description: captureHealthSnapshot() happy path — all 8 metrics captured, insert called once
          target: captureHealthSnapshot()
          assertions:
            - execFn called exactly 8 times (once per metric CLI invocation)
            - db.insert called once with a row conforming to CodebaseHealthSnapshotSchema
            - returned snapshot matches inserted row

        - id: UT-002
          description: captureHealthSnapshot() DB failure — logs warning, resolves without throwing
          target: captureHealthSnapshot()
          assertions:
            - db.insert rejects with an error
            - logger.warn called with failure message
            - function resolves (does not throw)
            - return value is null or undefined (fire-and-forget semantics)

        - id: UT-003
          description: captureHealthSnapshot() CLI tool failure for one metric — partial capture handled gracefully
          target: captureHealthSnapshot()
          assertions:
            - execFn throws for one metric
            - logger.warn called for that metric
            - remaining 7 metrics still captured
            - insert called with null/0 for the failed metric column

        - id: UT-004
          description: detectDriftAndGenerateCleanup() — all metrics within threshold (empty array returned)
          target: detectDriftAndGenerateCleanup()
          assertions:
            - returns empty array []
            - no story YAML written to disk

        - id: UT-005
          description: detectDriftAndGenerateCleanup() — exactly one metric over threshold (one CLEANUP story generated)
          target: detectDriftAndGenerateCleanup()
          assertions:
            - returns array with exactly one CLEANUP story ID
            - story ID matches APIP-CLEANUP-NNNN format
            - fs.writeFile called once with valid YAML path

        - id: UT-006
          description: detectDriftAndGenerateCleanup() — multiple metrics over threshold (multiple or combined CLEANUP stories)
          target: detectDriftAndGenerateCleanup()
          assertions:
            - returns array with one or more CLEANUP story IDs
            - each generated story YAML passes StoryArtifactSchema.parse()

        - id: UT-007
          description: detectDriftAndGenerateCleanup() — threshold at exact boundary (no drift vs drift boundary cases)
          target: detectDriftAndGenerateCleanup()
          assertions:
            - metric delta exactly equal to threshold → no story generated (within tolerance)
            - metric delta one unit above threshold → story generated
            - metric delta one unit below threshold → no story generated

        - id: UT-008
          description: detectDriftAndGenerateCleanup() — null/missing baseline (no baseline row)
          target: detectDriftAndGenerateCleanup()
          assertions:
            - when baseline is null, function returns empty array (no drift without baseline)
            - logger.warn called noting missing baseline

        - id: UT-009
          description: HealthGateThresholdsSchema — valid config object parses successfully
          target: HealthGateThresholdsSchema
          assertions:
            - HealthGateThresholdsSchema.parse() succeeds for a complete valid config
            - HealthGateThresholdsSchema.parse() succeeds for a partial config (optional fields default)

        - id: UT-010
          description: CodebaseHealthSnapshotSchema — valid snapshot row parses successfully
          target: CodebaseHealthSnapshotSchema (drizzle-zod generated)
          assertions:
            - parse succeeds for a row with all 8 metric columns populated
            - parse fails for a row missing required fields (id, merge_number, captured_at)

        - id: UT-011
          description: Generated CLEANUP story YAML passes StoryArtifactSchema.parse()
          target: CLEANUP story YAML generation logic
          assertions:
            - StoryArtifactSchema.parse() succeeds on the generated YAML string (parsed via js-yaml)
            - Story includes drifted metrics list, merge_number, and remediation description
            - Story id field matches APIP-CLEANUP-NNNN format

        - id: UT-012
          description: Merge-count gate logic — fires health check only on every 5th merge
          target: merge-count gate (coordinated with APIP-1070)
          assertions:
            - mergeCount % 5 !== 0 → health check NOT triggered
            - mergeCount % 5 === 0 → health check triggered
            - test mergeCount values: 1, 4, 5, 9, 10, 15

    integration:
      framework: vitest
      location: packages/backend/orchestrator/src/nodes/health/__tests__/
      tags: [integration, requires-db]
      database: "postgresql://postgres:postgres@localhost:5432/lego_dev"
      notes: >
        Requires APIP-5001 test database with wint.codebase_health migration applied.
        Do NOT use port 5433. Tag all integration tests to exclude from unit-only runs.
        Use a temp directory for CLEANUP story YAML file writes.
      cases:
        - id: IT-001
          description: Migration applies cleanly — wint.codebase_health table exists after migration
          assertions:
            - APIP-5007 migration runner applies 0NN_codebase_health.sql without errors
            - SELECT * FROM wint.codebase_health returns empty result set
            - drizzle-kit check passes with no schema drift

        - id: IT-002
          description: Insert + read-back of snapshot row — all columns round-trip correctly
          assertions:
            - Insert a row with all 8 metric values plus merge_number, is_baseline=false
            - SELECT the row back from wint.codebase_health
            - All column values match original insert
            - CodebaseHealthSnapshotSchema.parse() succeeds on the row

        - id: IT-003
          description: captureHealthSnapshot() with real DB connection writes row and returns snapshot
          assertions:
            - Function completes without throwing
            - Row appears in wint.codebase_health
            - Returned snapshot id matches inserted row id
            - captured_at timestamp is recent

        - id: IT-004
          description: Index on is_baseline column — baseline query performs correctly
          assertions:
            - INSERT a row with is_baseline=true
            - Query SELECT * FROM wint.codebase_health WHERE is_baseline=true returns that row
            - EXPLAIN shows index scan on is_baseline index

        - id: IT-005
          description: CLEANUP story YAML written to temp directory passes StoryArtifactSchema.parse()
          assertions:
            - detectDriftAndGenerateCleanup() runs with real drift
            - YAML file written to temp directory
            - File content parsed with js-yaml → StoryArtifactSchema.parse() succeeds

    drizzle_kit:
      - id: DK-001
        description: drizzle-kit check passes after migration and Drizzle schema definition both applied
        command: "pnpm drizzle-kit check"
        assertions:
          - Exit code 0
          - No schema drift warnings

  coverage_targets:
    captureHealthSnapshot: 90%
    detectDriftAndGenerateCleanup: 100%  # pure logic, all branches
    HealthGateThresholdsSchema: 80%
    CodebaseHealthSnapshotSchema: 80%
    cleanup_story_generator: 90%
    sql_migration_file: waived  # not testable via Vitest coverage

  coverage_waiver:
    applies_to: SQL migration file (0NN_codebase_health.sql)
    reason: >
      Pure SQL migration files are not executed through the Vitest coverage harness.
      Coverage is verified via drizzle-kit check and the IT-001 integration test.

  testing_notes:
    - All 8 metric capture functions must accept an injectable execFn/toolRunner — do not shell out directly in unit-testable code
    - Use vi.mock('fs/promises') for file write operations in unit tests; real temp dir in integration tests
    - Tag integration tests with [integration, requires-db] to exclude from unit-only CI runs
    - Integration tests MUST target DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev (port 5432, NOT 5433)
    - The merge-count gate (UT-012) should be tested independently of the full APIP-3090 cron infrastructure
    - detectDriftAndGenerateCleanup() is pure logic — aim for 100% branch coverage across all threshold boundary cases
