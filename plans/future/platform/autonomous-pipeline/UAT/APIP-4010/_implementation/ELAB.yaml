      cron is noted in architecture. No undisclosed auth, infra, or DB risks detected.

  - id: story_sizing
    status: WARN
    note: >
      13 ACs exceeds the 8-AC sizing indicator threshold. However: AC-10 is explicitly
      deferred (not implemented in this story), and AC-11/AC-12/AC-13 are test and quality
      ACs rather than new features. Effective functional AC count is 9 (AC-1 through AC-9).
      Two packages touched (database-schema + orchestrator) is within the 2-package boundary.
      No frontend. No API endpoints. The 8-metric collector decomposition in ST-04 (4h
      estimate) touches potentially 8+ files which is the main sizing concern. Total estimate
      sums to ~23 hours across 12 subtasks — above a typical 8-point story. The story is a
      coherent Phase 4 feature with strong internal decomposition; a SPLIT would create more
      coordination overhead than value. Recommend monitoring ST-04 during implementation and
      splitting metric collectors into a separate story only if they prove more complex than
      estimated.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      All 13 ACs are explicitly mapped to at least one subtask and the coverage matrix is
      complete. Blocked-by relationships form a valid DAG (ST-04 -> ST-05, ST-06 -> ST-07,
      ST-05+ST-06+ST-07 -> ST-10, ST-01+ST-02+ST-05 -> ST-11, ST-10+ST-11 -> ST-12).
      Two concerns: (1) No verification commands in the subtask table — the implementer cannot
      run a quick local check after completing each subtask. This should be remedied before
      implementation begins (each subtask should include a pnpm command or assertion to verify
      completion). (2) ST-04 (8 metric collector functions) will likely span more than 3 files
      (8 collector files + collectors/index.ts = 9 files minimum) which violates the
      no-subtask->3-files heuristic. Recommend splitting ST-04 into ST-04a (collect* functions
      for CLI-stdout metrics: lint_warnings, type_errors, any_count, eslint_disable_count) and
      ST-04b (collect* functions for structured-output metrics: test_coverage, circular_deps,
      bundle_size, dead_exports). Condition: add per-subtask verification commands and split
      ST-04 before marking ready-to-work.

gaps:
  - id: GAP-001
    severity: conditional
    description: >
      ST-04 spans 9+ files (8 individual collector files + collectors/index.ts) which exceeds
      the 3-file-per-subtask heuristic, increasing risk of incomplete implementation or
      difficult code review. The 8 collectors divide naturally into two groups by collection
      method (CLI stdout parsing vs structured output parsing). Recommend splitting into
      ST-04a and ST-04b before implementation begins. This is a process/sizing gap, not a
      functional gap — does not block correctness of the implementation.
    resolution: Split ST-04 into ST-04a (stdout-based collectors) and ST-04b (structured-output collectors) in the story before moving to ready-to-work.
    decision: add_ac
    ac_added: "AC-14: The metric collector subtask ST-04 is decomposed into ST-04a (stdout-based collectors: lint_warnings, type_errors, any_count, eslint_disable_count) and ST-04b (structured-output collectors: test_coverage, circular_deps, bundle_size, dead_exports), each touching at most 4 source files."

  - id: GAP-002
    severity: conditional
    description: >
      Subtask table lacks per-subtask verification commands. Without runnable checks, an
      implementer cannot confirm a subtask is complete before moving to the next. Each subtask
      should include at least one pnpm command (e.g., "pnpm check-types", "pnpm test -- --grep
      ST-01", "psql -c '\d wint.codebase_health'") to verify the artifact matches the AC.
    resolution: Add a verification_cmd field or inline note to each subtask row before moving to ready-to-work.
    decision: add_ac
    ac_added: "AC-15: Every subtask in the Subtasks table includes a runnable verification command (a pnpm invocation, psql query, or equivalent shell command) that an implementer can execute locally to confirm the subtask's artifact satisfies its AC coverage before moving to the next subtask."

