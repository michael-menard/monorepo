  - id: ports_adapters
    status: PASS
    note: >
      Core detection logic (detectDriftAndGenerateCleanup) is a pure function — no DB, no FS,
      no CLI dependencies. captureHealthSnapshot() uses injectable execFn: (cmd: string) =>
