      Architecture section documents the collector function signature explicitly.

  - id: testability
    status: PASS
    note: >
      12 unit tests (UT-001 through UT-012) and 5 integration tests (IT-001 through IT-005)
      are named with concrete scenarios. All 8 metric collector functions accept injectable
      execFn eliminating real pnpm invocations. File writes use vi.mock('fs/promises').
