      distributed cron, CLEANUP story workflow, and automatic baseline promotion — each
      corresponds to a referenced follow-up story (APIP-4070, APIP-2020) or a deliberate ADR.
      The two-option fallback for merge-count tracking (Option A: APIP-1070 coordination vs
      Option B: standalone wint.merge_runs) is documented in RISK-001 and ST-08 description.
      No contradictions between story.yaml acs and APIP-4010.md Acceptance Criteria sections.

  - id: reuse_first
