architecture_compliant: true
architecture_notes: >
  Zod-first: All runtime-validated data types (job payloads, config) use Zod schemas with z.infer<>.
  Two interface declarations found (GraphRunners, GraphCircuitBreakers) — these are structural
  contracts for dependency injection of test doubles, not data validation types. They hold no
  runtime-parsed data and represent an accepted pattern for DI seams in backend TypeScript.
  Logging: All source files use @repo/logger — no console.log found.
  No barrel files: supervisor/index.ts is the package entry point (main), not a re-export barrel.
  __types__/index.ts is the canonical type module for the supervisor domain, following CLAUDE.md structure.
  NodeCircuitBreaker correctly imported from @repo/orchestrator (not re-implemented).
  graph-types.ts uses type aliases (not interfaces) for structural compatibility with orchestrator types.

issues: []

lessons_to_record:
  - lesson: >
      Graph loader seam pattern (graph-loader.ts using require.resolve() + path string replacement
      to load dist/graphs/index.js) enables unit-testing of dispatch-router.ts without loading
      real LangGraph modules. Injectable runners parameter is the primary test isolation mechanism.
    category: pattern
    tags: ["backend", "testing", "bullmq", "langgraph", "dependency-injection"]

  - lesson: >
      ioredis type mismatch with BullMQ Worker connection parameter requires 'as any' cast.
      Root cause: ioredis 5.9.2 vs 5.9.3 (from BullMQ peer dep) type definitions diverge.
      Workaround is safe — runtime types are compatible.
    category: blocker
    tags: ["backend", "bullmq", "ioredis", "typescript"]

  - lesson: >
      vi.mock() hoisting requires inline vi.fn() inside factory — cannot reference variables
      declared at module scope inside the factory function. Use importOriginal pattern for
      partial module mocks that preserve real implementations.
    category: pattern
    tags: ["testing", "vitest", "mocking"]

  - lesson: >
      Two-catch error classification pattern: WallClockTimeoutError (instanceof check) must be
      the FIRST branch in catch block before isRetryableNodeError(). Enforces correct timeout
      handling — timeouts are neither PERMANENT nor TRANSIENT retries, they are their own category.
    category: pattern
    tags: ["backend", "error-handling", "bullmq", "supervisor"]

