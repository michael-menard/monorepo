feasible: true
confidence: high
rationale: >
  APIP-5004 is a well-scoped infrastructure library story. The injection points (three provider loadConfig() methods) are clearly identified in the codebase. The BaseProvider interface does not need to change — only the three concrete provider implementations are refactored. The Zod-first pattern is already established in the codebase (env.ts). The CloudFormation structure follows the existing infra/elasticache/template.yaml pattern. AWS SDK v3 (@aws-sdk/client-secrets-manager) is the standard modular SDK and is compatible with Node.js ESM. The primary risk is the static configCache pattern on each provider requiring careful reset logic in tests, which is manageable. No cross-package API changes required.
complexity: medium
change_surface:
  areas:
    - "packages/backend/orchestrator/src/secrets/ (new directory — SecretsClient module)"
    - "packages/backend/orchestrator/src/providers/anthropic.ts (loadConfig refactor)"
    - "packages/backend/orchestrator/src/providers/openrouter.ts (loadConfig refactor)"
    - "packages/backend/orchestrator/src/providers/minimax.ts (loadConfig refactor)"
    - "packages/backend/orchestrator/package.json (add @aws-sdk/client-secrets-manager)"
    - "infra/secrets/template.yaml (new CloudFormation stack)"
    - "infra/secrets/README.md (rotation procedure documentation)"
  endpoints: []
  deploy_touchpoints:
    - "Deploy infra/secrets/template.yaml to staging/production before server process starts"
    - "Set SECRETS_ENGINE=aws-secrets-manager and AWS_REGION in server environment (APIP-5006 coordination)"
    - "Pre-populate AWS Secrets Manager with provider API key values (operational step, not code)"

risks:
  - finding: "Static configCache fields on each provider class mean a rotated secret is not picked up until process restart unless the provider cache is also cleared."
    mitigation: "AC-7 rotation procedure must explicitly document this limitation. Optionally, expose a SecretsClient.flush() that also calls Provider.clearCache() — document this as the manual rotation signal. Flag for automated invalidation in Phase 2."
  - finding: "@aws-sdk/client-secrets-manager adds a non-trivial dependency to the orchestrator package. While bundle size is less critical for a dedicated server (per APIP-5006), the package must be compatible with Node ESM and the existing tsconfig."
    mitigation: "Verify 'type: module' in orchestrator package.json before adding the dependency. AWS SDK v3 supports ESM natively. Confirm with pnpm add --dry-run before implementation."

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter @repo/orchestrator passes with all unit tests for SecretsClient (HP-1 through HP-6, EC-1 through EC-4, ED-1 through ED-4)"
  - "pnpm check-types --filter @repo/orchestrator exits 0 after provider refactoring"
  - "cfn-lint or aws cloudformation validate-template succeeds on infra/secrets/template.yaml"
  - "AnthropicProvider.loadConfig() integration test passes with SECRETS_ENGINE=env"

subtasks:
