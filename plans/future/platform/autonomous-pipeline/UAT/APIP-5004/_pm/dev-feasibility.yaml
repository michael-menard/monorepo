    title: "Create SecretsClient module with env fallback and Zod config validation"
    goal: "Implement packages/backend/orchestrator/src/secrets/index.ts with SecretsClientConfigSchema, SecretsClient class, get() method with env fallback, and fail-fast startup validation."
    files_to_read:
      - "apps/api/knowledge-base/src/config/env.ts"
      - "packages/backend/orchestrator/src/providers/base.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/secrets/index.ts (CREATE)"
      - "packages/backend/orchestrator/package.json (add @aws-sdk/client-secrets-manager)"
    acs: ["AC-1", "AC-2", "AC-10"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 10000

  - id: ST-2
