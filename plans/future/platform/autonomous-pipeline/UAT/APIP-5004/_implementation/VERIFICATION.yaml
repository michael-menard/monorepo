lessons_to_record:
  - lesson: >-
      Static configCache fields on provider classes create process-lifetime coupling with SecretsClient. Rotation via
      SIGHUP requires clearing both SecretsClient cache AND each provider's static configCache.
    category: pattern
    tags:
      - backend
      - secrets
      - cache
      - rotation
  - lesson: >-
      Concurrent in-flight deduplication (Map<string, Promise<string>>) prevents thundering-herd on cache-miss. Reusable
      pattern for async caching in the orchestrator.
    category: reuse
    tags:
      - backend
      - caching
      - deduplication
      - orchestrator
  - lesson: >-
      cfn-lint unavailability requires manual template review fallback. Consider adding cfn-lint to devDependencies or
      CI for infra stories.
    category: blocker
    tags:
      - infra
      - cloudformation
      - ci
      - tooling
  - lesson: >-
      The prefetch-then-getSync pattern (ARCH-001) cleanly bridges async secrets retrieval with synchronous provider
      loadConfig() without modifying BaseProvider interface.
    category: pattern
    tags:
      - backend
      - secrets
      - architecture
      - providers
