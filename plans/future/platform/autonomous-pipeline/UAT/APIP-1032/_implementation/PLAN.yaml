architectural_decisions:
  - id: ARCH-001
    question: execSync vs spawn for micro-verify subprocess execution
    decision: Use child_process.spawn wrapped in Promise (matching run-unit-tests.ts pattern). No execSync, no execa.
    rationale: >-
      Established orchestrator pattern prevents event loop blocking. execa is not in package.json. GAP-1 from
      elaboration resolved by autonomous decider.
    decided_by: autonomous_decider
    elab_gap: GAP-1
  - id: ARCH-002
    question: 'OPP-2 microVerifyTimeoutMs: add configurable timeout or defer?'
    decision: >-
      Defer to follow-up story. Accept the risk. Mitigate CI hangs by adding 180_000ms Vitest test timeout to all
      integration tests.
    rationale: >-
      Non-Goals already defers this. Autonomous decider resolved ambiguity between Non-Goals and Architecture Notes in
      favor of deferral. GAP-2 resolved.
    decided_by: autonomous_decider
    elab_gap: GAP-2
  - id: ARCH-003
    question: yaml-artifact-writer mock path for ST-8
    decision: >-
      Use vi.mock('../../persistence/yaml-artifact-bridge.js') — the actual module import path used by
      evidence-production.ts
    rationale: >-
      GAP-3 from elaboration: 'yaml-artifact-writer' is not the actual module name. Wrong path silently fails to
      intercept. The actual module is yaml-artifact-bridge.ts in persistence/.
    decided_by: autonomous_decider
    elab_gap: GAP-3
  - id: ARCH-004
    question: IModelDispatch.dispatch() signature verification
    decision: >-
      IModelDispatch.dispatch() accepts ModelDispatchRequest {storyId, attemptNumber, prompt, modelOverride?} and
      returns Promise<ModelDispatchResponse>. AC-5 calls dispatch with storyId, attemptNumber, and ChangeSpec as the
      prompt body.
    rationale: >-
      GAP-4 coordination note resolved: APIP-1031 files are now present and i-model-dispatch.ts has been read. The
      signature is confirmed. No mismatch with AC-5 call pattern.
    decided_by: planner_verification
    elab_gap: GAP-4
complexity: complex
