      LOGGED. Non-blocking UX enhancement. generated_at is already in PipelineDashboardResponseSchema.
      Developer implementing ST-4 and ST-5 can compute Date.now() - new Date(generated_at).getTime()
      to display "Data from Xs ago" in the stale indicator. No API schema changes required.
      KB write attempted; fell back to ELAB.yaml record (KB unavailable).
    decision_type: "LOGGED"
    decided_at: "2026-02-25T00:00:00Z"

split_recommendation:
  recommended: true
  rationale: >
    The story has a 0.9 split_risk prediction and 10 ACs — 25% over the threshold.
    The SSE feature (AC-6, ST-3, HP-6, EC-2) is a clearly separable scope that:
    (a) has a hard infrastructure dependency (non-Lambda host) that may require APIP-0030
        to complete first;
    (b) requires EventSource frontend logic + exponential backoff + SSE fallback testing
        that adds significant complexity;
    (c) has a blocking scope decision that is unresolved (GAP-002).
    Removing SSE from this story yields a clean 8-AC story (AC-1 through AC-5, AC-7, AC-8,
    AC-9, AC-10) covering the full REST polling dashboard — which is the primary user
    journey operators need immediately.
  proposed_stories:
    - id: "APIP-2020"
      title: "Monitor UI v1 — REST Polling Dashboard"
      acs: ["AC-1", "AC-2", "AC-3", "AC-4", "AC-5", "AC-7", "AC-8", "AC-9", "AC-10"]
      subtasks: ["ST-1", "ST-2", "ST-4", "ST-5", "ST-6", "ST-7"]
      notes: >
        Remove ST-3 entirely. Simplify usePipelineMonitor hook (ST-4) to polling-only.
        This is a complete, deliverable story resolving RISK-009 operator visibility.
    - id: "APIP-2025"
      title: "Monitor UI v1 — SSE Live Updates"
      acs: ["AC-6"]
      subtasks: ["ST-3", "ST-4-partial"]
      depends_on: ["APIP-2020", "APIP-0030"]
      notes: >
        New story. Blocked on APIP-0030 (LangGraph non-Lambda host) for SSE to function
        without the 29s Lambda timeout. Adds EventSource + exponential backoff + fallback
        logic on top of the polling infrastructure delivered by APIP-2020.

