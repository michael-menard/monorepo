      LOGGED. Non-blocking. Developer implementing ST-2 should consider extracting
      PipelineDashboardResponseSchema, PipelineStorySchema, CostSummaryEntrySchema, and
      BlockedStorySchema to @repo/api-client for shared frontend/backend type safety.
