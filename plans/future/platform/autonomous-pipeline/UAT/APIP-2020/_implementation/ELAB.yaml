    decided_at: "2026-02-25T00:00:00Z"

  - id: OPP-002
    title: "Add ports/index.ts interface for MonitorRepository to enable easier unit testing"
    description: >
      The story follows the health domain's simplified pattern (no ports/). However, unlike
      health domain which has no external DB calls in its services, the monitor domain's
      services will make Drizzle queries. Adding a MonitorRepository interface in ports/
      would allow unit tests in ST-2 to mock the repository without a real DB connection,
      following the wishlist domain pattern. This is non-blocking but improves testability.
    effort: low
    risk: low
    autonomous_decision: >
      LOGGED. Non-blocking. If developer finds DB mocking difficult in ST-2 unit tests,
      add ports/index.ts defining MonitorRepository interface following the wishlist domain
      pattern at apps/api/lego-api/domains/wishlist/.
      KB write attempted; fell back to ELAB.yaml record (KB unavailable).
    decision_type: "LOGGED"
    decided_at: "2026-02-25T00:00:00Z"

  - id: OPP-003
    title: "Consider a configurable refresh interval via env var or dashboard settings"
    description: >
      AC-5 specifies a "configurable interval (default: 30 seconds)" but does not specify
      where configuration lives. Exposing this via a VITE_MONITOR_REFRESH_INTERVAL env var
      would allow operators to tune the polling rate without code changes, and would make
      the 30s assertion in HP-5 easier to test by setting a shorter interval in tests.
    effort: low
    risk: low
    autonomous_decision: >
      LOGGED. Non-blocking DX/ops improvement. Developer implementing ST-4 (usePipelineMonitor)
      should read interval from import.meta.env.VITE_MONITOR_REFRESH_INTERVAL with fallback
      to 30000ms. Enables HP-5 test to set a short interval without code changes.
      KB write attempted; fell back to ELAB.yaml record (KB unavailable).
    decision_type: "LOGGED"
    decided_at: "2026-02-25T00:00:00Z"

  - id: OPP-004
    title: "Reuse existing auth middleware pattern rather than building new auth check"
    description: >
      Once GAP-001 is resolved, if the decision is to reuse Cognito auth, the existing
      middleware at apps/api/lego-api/middleware/auth.ts should be applied to the monitor
      domain the same way other domains apply it (domain.use('*', auth)). This avoids
      building a custom auth check and leverages the existing middleware test coverage.
    effort: low
    risk: low
    autonomous_decision: >
      LOGGED. Non-blocking; conditional on AC-11 (GAP-001) resolution. If PM selects
      Cognito auth (option a), apply domain.use('*', auth) in monitor/routes.ts following
      existing domain auth registration pattern. No new auth code needed.
      KB write attempted; fell back to ELAB.yaml record (KB unavailable).
    decision_type: "LOGGED"
    decided_at: "2026-02-25T00:00:00Z"

  - id: OPP-005
    title: "Add stale-data timestamp to API response for frontend freshness indicator"
    description: >
      The PipelineDashboardResponseSchema includes generated_at. The frontend stale indicator
      (AC-5) could compare generated_at against the current time to show "Data from Xs ago"
      rather than just a binary stale/fresh state. This is a minor UX improvement that uses
      already-present data.
    effort: low
