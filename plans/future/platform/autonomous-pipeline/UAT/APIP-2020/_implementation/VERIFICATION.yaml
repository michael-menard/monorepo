lessons_to_record:
  - lesson: >-
      When a story fix (e.g. console→logger) is applied on a story branch, a subsequent story merging to main with a
      full file rewrite can silently revert the fix. Pre-merge checks should grep for console.* in all shared files to
      catch cross-story regressions.
    category: blocker
    tags:
      - git
      - merge
      - logger
      - code-quality
  - lesson: >-
      API-only Playwright E2E approach (hitting /monitor/pipeline directly without browser navigation) is sufficient for
      AC coverage when the frontend module is not wired into the main app shell routing. Reduces test complexity and
      avoids routing dependencies.
    category: pattern
    tags:
      - e2e
      - playwright
      - api-testing
  - lesson: >-
      Drizzle ORM raw SQL (sql tag) is required for wint.* schema tables because PostgreSQL enum comparisons need ::text
      casts that Drizzle's ORM query builder doesn't handle correctly. Document this constraint in domain files.
    category: pattern
    tags:
      - drizzle
      - postgresql
      - enum
      - sql
  - lesson: >-
      PipelineReadService created in orchestrator package for APIP-5005 reuse pattern: factory function export and
      DbClient interface abstraction allows the service to be consumed by both lego-api and CLI tools without
      cross-package dependency.
    category: reuse
    tags:
      - architecture
      - orchestrator
      - factory-pattern
  - lesson: >-
      Interface usage for service/repository contracts (MonitorService, MonitorRepository) is consistent with
      established codebase pattern across all domains and is compatible with the Zod-first types requirement.
      CLAUDE.md's Zod requirement applies to data shape types, not DI contracts.
    category: pattern
    tags:
      - typescript
      - zod
      - interfaces
      - architecture
