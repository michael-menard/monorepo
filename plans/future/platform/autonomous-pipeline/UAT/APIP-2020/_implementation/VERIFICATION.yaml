architecture_compliant: true
architecture_notes: >-
  All new backend files use @repo/logger (no console.*). Zod-first types used for all data shapes. Interface usage for
  service/repository contracts (MonitorService, MonitorRepository) is consistent with established codebase pattern
  across all domains. No barrel files created. Named exports throughout. Auth middleware reused (ARCH-001). Route
  registered in server.ts (ARCH-003). ADR-006 (Playwright E2E with live backend) followed. NOTE: server.ts on main
  currently has console.error/console.log due to APIP-2030 regression — the fix was correctly applied on story/APIP-2020
  branch (commit e4cb1bce) and is present there. APIP-2030 reverted it when landing on main (commit 550c34b6). This is a
  cross-story regression, not an APIP-2020 defect.
