architectural_decisions:
  - id: ARCH-001
    question: "change_telemetry column names differ from story ACs: model_id (not 'model'), outcome values 'pass'/'fail' (not 'success'/'failure'), tokens_in+tokens_out (not 'tokens'), retry_count (not 'attempts'). How should the aggregation SQL handle these discrepancies?"
    decision: "Use actual APIP-3010 implementation column names. Success condition = outcome = 'pass'. Total tokens = tokens_in + tokens_out. Attempts = retry_count + 1. Affinity key triple = (model_id, change_type, file_type)."
    rationale: "The change_telemetry.ts file is already committed to the repo with these exact column names. The story ACs describe an aspirational API that APIP-3010 implemented differently. The Pattern Miner must query real columns. Story notes already say 'If APIP-3010 column names differ slightly in implementation, update the aggregation SQL constant in one place.'"
    decided_by: agent

complexity: moderate

notes:
  - "CRITICAL: wint.change_telemetry uses model_id (not 'model'), outcome IN ('pass','fail','abort','budget_exhausted') not 'success'/'failure', tokens_in+tokens_out (not single 'tokens'), retry_count (not 'attempts'). Pattern Miner aggregation must use actual columns."
  - "confidenceLevelEnum must be defined with wintSchema.enum() (NOT pgEnum()) so it lives in the 'wint' schema namespace, matching the pgEnum pattern in telemetry.ts (telemetrySchema.enum). Calling pgEnum() would create it in 'public' schema."
  - "Migration sequence: next is 0029 (0028 was APIP-3010 change_telemetry). File: 0029_apip_3020_model_affinity.sql."
  - "Schema shape tests should be added to the existing wint-schema.test.ts (not a new file) to avoid duplication and stay consistent with project patterns."
  - "Integration tests are gated on APIP-3010 being deployed to test DB. The test file should be created and tagged @integration; CI may skip them until APIP-3010 is merged."
  - "The model_affinity table should be added to wint.ts (not a separate file) to match the story ACs scope specification: 'packages/backend/database-schema/src/schema/wint.ts — add modelAffinity table'."
  - "schema/index.ts must be updated to re-export new exports from wint.ts (confidenceLevelEnum, modelAffinity, ModelAffinityInsertSchema, ModelAffinitySelectSchema) — add to files_to_change if needed."
