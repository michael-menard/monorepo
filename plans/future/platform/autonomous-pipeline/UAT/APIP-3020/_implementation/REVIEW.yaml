findings:
  - id: "F-001"
    severity: info
    category: style
    file: "packages/backend/orchestrator/src/graphs/pattern-miner.ts"
    description: >
      Line widths on a few logger.info calls slightly exceed the 100-char limit (e.g., the
      'rows_aggregated' and 'upsert complete' log lines). This is cosmetic and would be caught
      by Prettier on next format pass; does not affect correctness.
    verdict: non-blocking

  - id: "F-002"
    severity: info
    category: sql
    file: "packages/backend/database-schema/src/migrations/app/0029_apip_3020_model_affinity.sql"
    description: >
      No rollback migration is provided. The migration footer explicitly documents this as a
      known omission ("manual rollback required"). This is acceptable for the current workflow
      where rollback scripts are handled operationally, but worth noting as a future improvement.
    verdict: non-blocking

checklist:
  typescript_zod:
    result: PASS
    notes: >
      All exported types are derived via z.infer<> from Zod schemas (PatternMinerConfigSchema,
      TelemetryAggRowSchema, ComputedProfileSchema, TrendSchema, ExistingAffinityRowSchema,
      PatternMinerRunResultSchema). The Drizzle schema uses createInsertSchema/createSelectSchema
      to generate ModelAffinityInsertSchema/ModelAffinitySelectSchema with types via z.infer<>.
      No TypeScript interfaces or standalone type aliases are used for data shapes.

  logging:
    result: PASS
    notes: >
      All log calls use logger from '@repo/logger'. No console.log, console.error, or
      console.warn calls found anywhere in pattern-miner.ts or the schema files.

  sql_idempotency:
    result: PASS
    notes: >
      Migration uses DO $$ BEGIN IF NOT EXISTS ... END$$ for the confidence_level enum,
      CREATE TABLE IF NOT EXISTS for the model_affinity table, and CREATE UNIQUE INDEX IF
      NOT EXISTS / CREATE INDEX IF NOT EXISTS for all three indexes. Fully idempotent.

  sql_injection:
    result: PASS
    notes: >
      The initial implementation used unsafe string interpolation (flagged in commit bc9f901f)
      but the fix commit 544db4ef replaced this with a parameterized UNNEST JOIN query using
      $1::text[], $2::text[], $3::text[] bound arrays. All other queries in fetchTelemetry
      and upsertProfiles use $1/$2/$3 parameter binding. No string interpolation in SQL.

  tests_coverage:
    result: PASS
    notes: >
      Unit tests (pattern-miner.test.ts) cover: confidence band assignment at all boundaries
      (HP-1 through HP-4, ED-1/ED-2), weighted average formula correctness including
      division-by-zero guard (EC-3, EC-4), trend direction classification for all three
      directions with threshold boundary cases (ED-3a through ED-3e), cold-start behavior
      with empty telemetry (AC-10/HP-6), watermark advancement (HP-6), dry-run mode
      (AC-6), and graph factory/entry-point smoke tests. 27 unit tests total.
      Integration tests (pattern-miner.integration.test.ts) are scaffolded with proper
      skip guards (canRun flag requiring TEST_DATABASE_URL + RUN_INTEGRATION_TESTS=true),
      covering HP-7 fixture aggregation, HP-8 upsert idempotency, HP-9 incremental
      watermark advancement, and ED-4 multi-combination profiles.

  build_types:
    result: PASS
    notes: >
      All schemas use z.infer<> derivation or Drizzle-generated schemas. State annotation
      uses LangGraph Annotation.Root pattern consistently. The dbClient is typed as unknown
      with a local cast to a structural interface — this is intentional to keep the graph
      decoupled from a specific pg client version and is a valid pattern.

  style:
    result: PASS
    notes: >
      No semicolons in TypeScript files. Single quotes used throughout (the initial fix
      commit 544db4ef corrected double-quote usage that was present in bc9f901f). Trailing
      commas present. No barrel files created — index.ts additions are re-exports from an
      existing file (wint.ts), not a new barrel. Arrow parens omitted for single-arg
      functions as per style rules.

  security:
    result: PASS
    notes: >
      All SQL queries use parameterized binding ($1, $2, ... placeholders). The UNNEST
      pattern for batch-fetching existing affinity rows correctly binds the arrays as
      parameters ($1::text[], $2::text[], $3::text[]) rather than interpolating values.
      No dynamic SQL string construction found.

summary: >
  APIP-3020 is well-implemented. The two-commit structure (implementation + fix) shows
  the self-review process working correctly — the SQL injection finding from the initial
  implementation was caught and remediated before this review. All checklist items pass.
  The two non-blocking findings (minor line-length cosmetics and absent rollback migration)
  do not warrant a FAIL verdict. The story is ready for QA.
