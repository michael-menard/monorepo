gaps:
  - id: gap-1
    check: risk_disclosure
    finding: "APIP-0020 missing from depends_on in story.yaml. The supervisor process (built by APIP-0020) must exist before drain mode or health endpoint can be added. Currently only APIP-0030 is listed. While APIP-0030 transitively depends on APIP-0020, making it explicit prevents scheduling confusion."
    severity: medium
    decision: metadata_fix
    ac_added: null
    resolution_note: "Added APIP-0020 to depends_on in story.yaml and updated stories.index.md dependency column."

  - id: gap-2
    check: ports_adapters
    finding: "Docker Compose stop_grace_period for supervisor service not mentioned in ACs. When Docker sends SIGTERM, if the container's stop_grace_period is shorter than drainTimeoutMs, Docker will SIGKILL the process before drain completes. The compose service definition should set stop_grace_period >= drainTimeoutMs + buffer."
    severity: high
    decision: add_ac
    ac_added: "AC-11: Docker Compose stop_grace_period for supervisor service set to drainTimeoutMs + 30s buffer (default: 330s) in infra/langgraph-server/compose.langgraph-server.yaml."

