feasible: true
confidence: high
rationale: >
  All required patterns exist and are well-established in the codebase. SIGTERM/SIGINT
  idempotent handler registration is demonstrated in packages/backend/db/src/telemetry-sdk/init.ts.
  Health check service layer pattern (pure functions + thin HTTP adapter) exists in
  apps/api/lego-api/domains/health/. BullMQ Worker.close() is already implemented in APIP-0020.
  The health server can be built with node:http (zero new dependencies). The only structural
  risk is coordination with APIP-0020 (in-progress), which is mitigated by implementing drain
  mode as an additive supervisor.drain() method rather than modifying supervisor.stop().
complexity: high
change_surface:
  areas:
    - "apps/api/pipeline/ (supervisor process — new drain module + new health server module)"
    - "infra/langgraph-server/compose.langgraph-server.yaml (HEALTHCHECK directive)"
    - "infra/langgraph-server/README.md (deployment runbook section)"
  endpoints:
    - "GET /health (new — supervisor health server, port 9091)"
    - "GET /live (new — liveness probe, supervisor health server)"
  deploy_touchpoints:
    - "Supervisor Docker Compose service definition update (HEALTHCHECK directive)"
    - "SUPERVISOR_DRAIN_TIMEOUT_MS and SUPERVISOR_HEALTH_PORT env vars must be set in deployment environment"
    - "Prometheus scrape config update in infra/prometheus/prometheus.yml"
risks:
  - finding: "APIP-0020 is in-progress — drain module must be additive, not modify supervisor.stop() contract"
    mitigation: "Implement supervisor.drain() as a new method that sets drain flag, pauses BullMQ Worker, awaits in-flight completion, then calls existing supervisor.stop(). Do not alter APIP-0020 stop() signature."
  - finding: "Drain timeout must exceed maximum stageTimeoutMs from APIP-0020 — if drain timeout is shorter than a running LangGraph elaboration stage, job will be aborted mid-execution"
    mitigation: "Default drainTimeoutMs = 300000ms (5 minutes). Document that SUPERVISOR_DRAIN_TIMEOUT_MS must be set >= stageTimeoutMs in production. Add assertion in supervisor init that warns if drain timeout < stage timeout."
  - finding: "Port 9091 must be confirmed free in compose environment — reserved port list from APIP-0030 must be cross-referenced"
    mitigation: "Port 9091 is not in the reserved list (5432, 5433, 6379, 9090, 3003, 4317, 4318, 9000, 9001, 8123, 8124). Document port 9091 assignment in infra/langgraph-server/README.md."
missing_requirements: []
evidence_expectations:
  - "Unit test: process.exit spy confirms exit(0) on clean drain and exit(1) on timeout"
  - "Unit test: BullMQ Worker.pause() or Worker.close() called on SIGTERM entry"
  - "Unit test: SIGTERM handler registered exactly once despite multiple supervisor.start() calls (idempotency)"
  - "Integration test: GET /health returns 200 with expected JSON schema (Zod-validated)"
  - "Integration test: GET /health returns 503 when Redis unreachable"
  - "Integration test: drain mode state transition healthy→draining→503 (server down) under real SIGTERM"
  - "Docker Compose: docker inspect shows 'healthy' after start_period"
subtasks:
  - id: ST-1
    title: "Create health service module with Zod schema and pure state functions"
    goal: "Define SupervisorHealthSchema (Zod), getSupervisorHealth() pure function that reads drain flag, active job count, circuit breaker state from supervisor context. No HTTP knowledge."
    files_to_read:
      - "apps/api/lego-api/domains/health/application/services.ts"
      - "apps/api/lego-api/domains/health/routes.ts"
    files_to_modify:
      - "apps/api/pipeline/health/services.ts (new)"
      - "apps/api/pipeline/health/__types__/index.ts (new)"
    acs: ["AC-3", "AC-4"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/pipeline && pnpm test --filter @repo/pipeline -- health/services"
    estimated_tokens: 6000

  - id: ST-2
    title: "Create health HTTP server module using node:http"
    goal: "Lightweight HTTP server on configurable port (default 9091) serving GET /health and GET /live using node:http stdlib. Delegates to health service from ST-1. No Hono/express."
    files_to_read:
      - "apps/api/pipeline/health/services.ts (from ST-1)"
    files_to_modify:
      - "apps/api/pipeline/health/server.ts (new)"
    acs: ["AC-3", "AC-4", "AC-5"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/pipeline && pnpm test --filter @repo/pipeline -- health/server"
    estimated_tokens: 7000

  - id: ST-3
    title: "Create drain module: drain mode state machine and SIGTERM/SIGINT handler"
    goal: "supervisor.drain() method: sets draining flag, pauses BullMQ Worker, awaits in-flight job completion or drainTimeoutMs hard timeout, then calls supervisor.stop(). Idempotent SIGTERM/SIGINT handler registration with guard flag. Structured log events on all lifecycle transitions."
    files_to_read:
      - "packages/backend/db/src/telemetry-sdk/init.ts"
      - "packages/backend/observability/src/tracing/index.ts"
      - "apps/api/pipeline/ (APIP-0020 supervisor implementation)"
    files_to_modify:
      - "apps/api/pipeline/drain/index.ts (new)"
      - "apps/api/pipeline/supervisor.ts (additive: add drain() method, register signal handlers)"
    acs: ["AC-1", "AC-2", "AC-6"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/pipeline && pnpm test --filter @repo/pipeline -- drain/"
    estimated_tokens: 10000

  - id: ST-4
    title: "Wire health server startup/shutdown lifecycle into supervisor.start() / drain()"
    goal: "Health server starts before BullMQ Worker in supervisor.start(). Health server shuts down after BullMQ Worker.close() completes in drain sequence. Structured lifecycle logs: health_server_started, health_server_stopped."
    files_to_read:
      - "apps/api/pipeline/health/server.ts (from ST-2)"
      - "apps/api/pipeline/drain/index.ts (from ST-3)"
      - "apps/api/pipeline/supervisor.ts"
    files_to_modify:
      - "apps/api/pipeline/supervisor.ts (lifecycle wiring)"
    acs: ["AC-5", "AC-6"]
    depends_on: ST-2
    verification: "pnpm check-types --filter @repo/pipeline && pnpm test --filter @repo/pipeline -- supervisor"
    estimated_tokens: 5000

  - id: ST-5
    title: "Unit tests: drain state machine, health service, idempotency (≥80% drain module coverage)"
    goal: "Vitest unit tests covering: drain entry on SIGTERM (Worker paused, drain flag set), drain timeout expiry (process.exit(1) via vi.useFakeTimers()), clean drain (process.exit(0)), health endpoint state machine, idempotent handler registration. Coverage gate: drain module ≥80%."
    files_to_read:
      - "apps/api/pipeline/drain/index.ts"
      - "apps/api/pipeline/health/services.ts"
      - "apps/api/pipeline/supervisor.ts"
    files_to_modify:
      - "apps/api/pipeline/__tests__/drain.test.ts (new)"
      - "apps/api/pipeline/__tests__/health.services.test.ts (new)"
    acs: ["AC-9"]
    depends_on: ST-3
    verification: "pnpm test --filter @repo/pipeline --coverage -- drain && check coverage threshold ≥80%"
    estimated_tokens: 8000

  - id: ST-6
    title: "Integration test: real Redis + BullMQ drain sequence (AC-10)"
    goal: "Vitest integration test using real Redis from infra/compose.lego-app.yaml: enqueue job, start supervisor, send SIGTERM, verify job completes before exit (or drain timeout fires), verify GET /health transitions healthy→draining→503."
    files_to_read:
      - "apps/api/pipeline/__tests__/drain.test.ts"
      - "infra/compose.lego-app.yaml (Redis service config)"
    files_to_modify:
      - "apps/api/pipeline/__tests__/drain.integration.test.ts (new)"
    acs: ["AC-10"]
    depends_on: ST-5
    verification: "docker compose -f infra/compose.lego-app.yaml up redis -d && pnpm test --filter @repo/pipeline -- drain.integration"
    estimated_tokens: 9000

  - id: ST-7
    title: "Docker Compose HEALTHCHECK directive + Prometheus scrape config + README runbook"
    goal: "Add HEALTHCHECK to supervisor service in infra/langgraph-server/compose.langgraph-server.yaml (CMD curl -f /live, interval 30s, timeout 5s, retries 3, start_period 10s). Add supervisor scrape target to infra/prometheus/prometheus.yml. Add rolling restart runbook section to infra/langgraph-server/README.md."
    files_to_read:
      - "infra/langgraph-server/compose.langgraph-server.yaml"
      - "infra/compose.lego-app.yaml"
      - "infra/prometheus/prometheus.yml"
    files_to_modify:
      - "infra/langgraph-server/compose.langgraph-server.yaml"
      - "infra/prometheus/prometheus.yml"
      - "infra/langgraph-server/README.md"
    acs: ["AC-7", "AC-8"]
    depends_on: ST-4
    verification: "docker compose -f infra/langgraph-server/compose.langgraph-server.yaml config (validate YAML); docker inspect health status after start_period"
    estimated_tokens: 5000
