  findings:
    - id: SEC-001
      severity: critical
      confidence: high
      category: command-injection

      issue: "Permission bypass + command injection in claude invocations"

      reasoning:
        observation: |
          Both scripts use --permission-mode bypassPermissions globally:

          implement-stories.sh:99
          ```bash
          CLAUDE_FLAGS="--allowedTools $ALLOWED_TOOLS --permission-mode bypassPermissions"
          ```

          implement-dispatcher.sh:105
          ```bash
          CLAUDE_FLAGS="--allowedTools $ALLOWED_TOOLS --permission-mode bypassPermissions"
          ```

          These flags are then passed directly to claude commands:

          implement-stories.sh:1218-1220
          ```bash
          claude -p "/dev-implement-story $FEATURE_DIR $STORY_ID $IMPL_FLAGS" \
               $CLAUDE_FLAGS \
               > "$IMPL_LOG" 2>&1 || true
          ```

          The --permission-mode bypassPermissions disables Claude's normal security boundaries,
          allowing arbitrary tool use regardless of intent. Combined with unquoted variable expansion
          in the command string, this creates a critical privilege escalation vector.

        standard: |
          Per CLAUDE.md: "All code must pass before commit... quality gates enforce security"
          Per security best practices (NIST, OWASP): Never bypass permission/authorization checks
          Per Claude Code documentation: --permission-mode bypassPermissions should only be used
          in fully controlled environments with human oversight, NOT in automated scripts.

        impact: |
          An attacker (or malicious story elaboration/implementation) could:
          1. Craft a STORY_ID or other input that breaks shell metacharacters (newline, semicolon, pipe)
          2. Inject arbitrary claude commands that bypass permission checks
          3. Execute unapproved tools (shell execution, file write without review, etc.)
          4. Exfiltrate secrets, modify production code, or escalate privileges

          Example attack:
          STORY_ID="APIP-1234; /eval echo 'malicious'" would inject eval into the claude invocation.
          With bypassPermissions enabled, malicious tools become executable.

        context: |
          This is automated CI/CD pipeline code running at high privilege. The bypass mode
          is particularly dangerous because:
          - No human is reviewing the claude invocations in real-time
          - The scripts run in the monorepo root with full git/pnpm access
          - Story IDs come from filesystem paths (user-controlled if attackers commit malicious directory names)
          - No sandboxing or isolation between stories

      evidence:
        - file: scripts/implement-stories.sh
          lines: "99"
          snippet: |
            CLAUDE_FLAGS="--allowedTools $ALLOWED_TOOLS --permission-mode bypassPermissions"
        - file: scripts/implement-stories.sh
          lines: "1218-1220"
          snippet: |
            claude -p "/dev-implement-story $FEATURE_DIR $STORY_ID $IMPL_FLAGS" \
                 $CLAUDE_FLAGS \
                 > "$IMPL_LOG" 2>&1 || true
        - file: scripts/implement-dispatcher.sh
          lines: "105"
          snippet: |
            CLAUDE_FLAGS="--allowedTools $ALLOWED_TOOLS --permission-mode bypassPermissions"
        - file: scripts/implement-dispatcher.sh
          lines: "383-385"
          snippet: |
            claude -p "/dev-implement-story $FEATURE_DIR $STORY_ID $IMPL_FLAGS" \
                 $CLAUDE_FLAGS \
                 > "$IMPL_LOG" 2>&1 || true

      precedent:
        kb_checked: false
        relevant_entries: []
        applies: false
        notes: "No prior exceptions for bypassPermissions in automated scripts"

      remediation: |
        CRITICAL: Remove --permission-mode bypassPermissions entirely.

        Replace:
        ```bash
        CLAUDE_FLAGS="--allowedTools $ALLOWED_TOOLS --permission-mode bypassPermissions"
        ```

        With:
        ```bash
        # Use only explicitly allowed tools, strict permission mode
        ALLOWED_TOOLS="Read,Write,Edit,Glob,Grep,Bash,Task,mcp__knowledge-base__kb_get,..."
        CLAUDE_FLAGS="--allowedTools $ALLOWED_TOOLS"
        # Remove --permission-mode flag — defaults to strict/conservative
        ```

        Additionally, quote all variable expansions in claude commands:
        ```bash
        claude -p "/dev-implement-story \"$FEATURE_DIR\" \"$STORY_ID\" $IMPL_FLAGS" \
             $CLAUDE_FLAGS \
             > "$IMPL_LOG" 2>&1 || true
        ```

        This ensures STORY_ID with shell metacharacters cannot break into the command structure.

    - id: SEC-002
      severity: critical
      confidence: high
      category: command-injection

      issue: "Unquoted TITLE variable in git commit message allows injection"

      reasoning:
        observation: |
          implement-stories.sh:683
          ```bash
          git -C "$WT_PATH" commit -m "feat(${STORY_ID}): ${TITLE}" --no-verify 2>/dev/null || true
          ```

          The TITLE is extracted from story.yaml without sanitization:
          implement-stories.sh:756
          ```bash
          grep -m1 "^title:" "${STORY_DIR}/story.yaml" 2>/dev/null | sed 's/^title: *//' | sed 's/^["'"'"']//;s/["'"'"']$//' || echo "Implementation"
          ```

          If a YAML file contains a malicious title like:
          title: "foo" --amend --reset=hard

          The git command becomes:
          git commit -m "feat(APIP-1234): foo" --amend --reset=hard

          Which executes unintended git operations.

        standard: |
          Per OWASP: "Treat all external input as untrusted"
          Per shell scripting best practices: Always quote variables in command substitution
          Per git documentation: Use --message-file or -m with quoted literals only

        impact: |
          An attacker could:
          1. Add a malicious story.yaml with a crafted title containing git flags
          2. Cause arbitrary git operations: amend previous commits, reset working directory,
             force push changes, modify author info, etc.
          3. Corrupt the git history or cause data loss
          4. Create a supply chain attack via malicious commits in the public repository

        context: |
          TITLE comes from user-editable YAML files in story directories. If an attacker
          can commit a malicious story.yaml (or a pull request with one), they can inject
          git commands. The --no-verify flag also bypasses git hooks that might catch this.

      evidence:
        - file: scripts/implement-stories.sh
          lines: "683"
          snippet: |
            git -C "$WT_PATH" commit -m "feat(${STORY_ID}): ${TITLE}" --no-verify 2>/dev/null || true
        - file: scripts/implement-stories.sh
          lines: "754-756"
          snippet: |
            get_story_title() {
              local STORY_DIR="$1"
              grep -m1 "^title:" "${STORY_DIR}/story.yaml" 2>/dev/null | sed 's/^title: *//' | sed 's/^["'"'"']//;s/["'"'"']$//' || echo "Implementation"
            }
        - file: scripts/implement-stories.sh
          lines: "711-712"
          snippet: |
            --title "${STORY_ID}: ${TITLE}" \
            --body "Automated implementation of ${STORY_ID}: ${TITLE}" \

      precedent:
        kb_checked: false
        relevant_entries: []
        applies: false
        notes: "No exceptions for unsanitized commit messages"

      remediation: |
        Properly escape the TITLE variable for git:

        ```bash
        # Option 1: Use git -C with message file (safest)
        echo "feat(${STORY_ID}): ${TITLE}" > /tmp/commit-msg
        git -C "$WT_PATH" commit -F /tmp/commit-msg --no-verify 2>/dev/null || true
        rm -f /tmp/commit-msg

        # Option 2: Sanitize TITLE by removing git-like flags
        # Remove anything that looks like a git flag
        SAFE_TITLE="${TITLE// --/-}"  # Remove --flags
        git -C "$WT_PATH" commit -m "feat(${STORY_ID}): ${SAFE_TITLE}" --no-verify 2>/dev/null || true

        # Option 3: Use printf for safer quoting
        git -C "$WT_PATH" commit -m "$(printf 'feat(%s): %s' "$STORY_ID" "$TITLE")" --no-verify 2>/dev/null || true
        ```

        Also apply same fix to PR creation (line 711-712):
        ```bash
        PR_TITLE="$(printf '%s: %s' "$STORY_ID" "$TITLE")"
        PR_URL=$(gh pr create \
          --title "$PR_TITLE" \
          --body "$(printf 'Automated implementation of %s: %s' "$STORY_ID" "$TITLE")" \
          --base main \
          --head "$BRANCH" 2>/dev/null) || true
        ```

    - id: SEC-003
      severity: high
      confidence: high
      category: command-injection

      issue: "Unquoted variable expansion in git branch names allows space/metacharacter injection"

      reasoning:
        observation: |
          Both scripts use unquoted $BRANCH in git operations:

          implement-stories.sh:650
          ```bash
          git worktree add -b "$BRANCH" "$WT_PATH" origin/main 2>/dev/null || true
          ```

          However the branch is derived from STORY_ID:
          implement-stories.sh:667
          ```bash
          local BRANCH="story/${STORY_ID}"
          ```

          While STORY_ID is typically validated by regex (line 779), if validation is bypassed
          or if filenames don't match regex, an attacker could create a directory with a malicious
          name like "APIP-1234/'; echo hacked; echo '".

          This would create a branch name with unquoted spaces/quotes, potentially breaking
          subsequent git operations.

        standard: |
          Per shell security: Always quote variables used as arguments to external commands
          Per git documentation: Branch names with special characters require quoting

        impact: |
          An attacker could:
          1. Create a directory with a malicious story name
          2. Cause git operations to fail silently
          3. Potentially inject commands if the branch name is used in other contexts

        context: |
          Medium risk because STORY_ID validation (line 779 regex) provides some protection,
          but defense-in-depth requires quoting all variables anyway.

      evidence:
        - file: scripts/implement-stories.sh
          lines: "650, 667-668"
          snippet: |
            git worktree add -b "$BRANCH" "$WT_PATH" origin/main 2>/dev/null || true
            ...
            local BRANCH="story/${STORY_ID}"
        - file: scripts/implement-stories.sh
          lines: "688, 697"
          snippet: |
            git -C "$WT_PATH" push -u origin "$BRANCH" --quiet 2>/dev/null || true
            local BRANCH="story/${STORY_ID}"

      precedent:
        kb_checked: false
        relevant_entries: []
        applies: false
        notes: "All variable expansions should be quoted per defensive scripting"

      remediation: |
        Already properly quoted in most places. Verify all branch operations use quotes:

        ```bash
        # Already good:
        git worktree add -b "$BRANCH" "$WT_PATH" origin/main
        git -C "$WT_PATH" push -u origin "$BRANCH" --quiet

        # Double-check other operations use quoted BRANCH
        ```

        This is minor because the existing code mostly does this correctly, but add
        explicit validation:

        ```bash
        # Add validation that BRANCH is safe
        if [[ ! "$BRANCH" =~ ^story/[A-Z]+-[0-9]+$ ]]; then
          echo "ERROR: Invalid branch name: $BRANCH"
          return 1
        fi
        ```

    - id: SEC-004
      severity: high
      confidence: high
      category: arbitrary-code-execution

      issue: "Unsafe sed usage with untrusted regex from file content"

      reasoning:
        observation: |
          implement-stories.sh:340
          ```bash
          touched_files:
          $(echo "$TOUCHED_FILES" | sed 's/^/  - /')
          ```

          While this specific sed is safe (fixed regex), the pattern of extracting content
          from git and piping to sed is risky if TOUCHED_FILES contains special characters.

          More critically, implement-stories.sh:756:
          ```bash
          grep -m1 "^title:" "${STORY_DIR}/story.yaml" 2>/dev/null | sed 's/^title: *//' | sed 's/^["'"'"']//;s/["'"'"']$//' || echo "Implementation"
          ```

          The sed delimiter changes mid-expression (/...//), and the substitution uses
          character classes that might not handle all edge cases (e.g., if title contains
          the string \x00 or other special bytes).

        standard: |
          Per OWASP: Avoid sed for parsing untrusted input; use proper parsing tools
          Per shell security: Limit sed usage to fixed patterns, never user input in regex

        impact: |
          If a malicious story.yaml contains a crafted title with sed metacharacters,
          it could:
          1. Break the sed parsing
          2. Cause unexpected output in EVIDENCE.yaml
          3. Potentially corrupt YAML if not properly escaped

        context: |
          Low exploitation probability because sed is read-only (doesn't execute), but
          improper parsing could cause data corruption or downstream failures.

      evidence:
        - file: scripts/implement-stories.sh
          lines: "756"
          snippet: |
            grep -m1 "^title:" "${STORY_DIR}/story.yaml" 2>/dev/null | sed 's/^title: *//' | sed 's/^["'"'"']//;s/["'"'"']$//' || echo "Implementation"

      precedent:
        kb_checked: false
        relevant_entries: []
        applies: false
        notes: "YAML parsing should use proper tools, not sed"

      remediation: |
        Use a more robust YAML parser or a safer extraction method:

        ```bash
        get_story_title() {
          local STORY_DIR="$1"
          # Option 1: Use yq if available
          if command -v yq &>/dev/null; then
            yq '.title' "${STORY_DIR}/story.yaml" 2>/dev/null || echo "Implementation"
          else
            # Fallback: Use safer awk to avoid sed complexities
            awk -F': ' '/^title:/ {gsub(/^["'"'"']|["'"'"']$/, ""); print $2}' "${STORY_DIR}/story.yaml" 2>/dev/null || echo "Implementation"
          fi
        }
        ```

        Or accept the TITLE as-is and properly escape it in all downstream usages.

    - id: SEC-005
      severity: high
      confidence: medium
      category: information-disclosure

      issue: "Logs containing sensitive command output redirected to world-readable /tmp"

      reasoning:
        observation: |
          Both scripts write logs to /tmp without access control:

          implement-stories.sh:82
          ```bash
          LOG_DIR="/tmp/${PLAN_SLUG}-impl-logs"
          ```

          implement-dispatcher.sh:87
          ```bash
          LOG_DIR="/tmp/${PLAN_SLUG}-impl-logs"
          ```

          Logs contain:
          - Full stderr/stdout from pnpm commands (includes dependency trees, paths, etc.)
          - Claude API requests/responses
          - Git repository state
          - Story implementation details

          By default, /tmp on Unix systems has mode 1777 (world-writable, sticky bit).
          Any user on the system can read these logs.

        standard: |
          Per NIST: "Sensitive information should not be logged in accessible locations"
          Per CWE-532: "Insertion of Sensitive Information into Log File"
          Per best practices: Use secure temp directories with mode 0700

        impact: |
          An attacker on the same machine could:
          1. Read CI/CD logs and extract secrets (API keys, tokens, database credentials)
          2. Gather intelligence about the codebase structure and dependencies
          3. Identify in-flight stories and potential vulnerabilities
          4. Monitor what's being implemented to time attacks

        context: |
          This is especially risky in shared hosting environments or container-as-a-service.
          The logs are created early and persisted for the entire script run.

      evidence:
        - file: scripts/implement-stories.sh
          lines: "82, 120"
          snippet: |
            LOG_DIR="/tmp/${PLAN_SLUG}-impl-logs"
            ...
            mkdir -p "$LOG_DIR"
        - file: scripts/implement-dispatcher.sh
          lines: "87, 90"
          snippet: |
            LOG_DIR="/tmp/${PLAN_SLUG}-impl-logs"
            ...
            mkdir -p "$LOG_DIR"

      precedent:
        kb_checked: false
        relevant_entries: []
        applies: false
        notes: "No approved exceptions for world-readable log directories"

      remediation: |
        Use a secure temporary directory with restrictive permissions:

        ```bash
        # Create secure temp directory
        LOG_DIR=$(mktemp -d) || exit 1
        trap "rm -rf \"$LOG_DIR\"" EXIT

        # Or create in user's home directory
        LOG_DIR="${HOME}/.cache/impl-logs/${PLAN_SLUG}-$(date +%s)"
        mkdir -p "$LOG_DIR"
        chmod 0700 "$LOG_DIR"

        # Ensure restrictive permissions on all created files
        umask 0077  # New files: rw-------, new dirs: rwx------
        ```

        Also consider:
        - Rotating/archiving logs to secure storage after completion
        - Encrypting sensitive log content
        - Using `syslog` or structured logging for audit trails

    - id: SEC-006
      severity: medium
      confidence: high
      category: missing-validation

      issue: "STORY_ID extracted from filesystem without validation before use in commands"

      reasoning:
        observation: |
          Stories are discovered from directory names:

          implement-dispatcher.sh:145
          ```bash
          grep -oE "${STORY_PREFIX}-[0-9]+" "$FEATURE_DIR/stories.index.md" | grep -oE "${STORY_PREFIX}-[0-9]+"
          ```

          While the grep pattern validates against the prefix and numbers, if the index file
          is malformed or if filesystem enumeration is used elsewhere, STORY_ID might not
          be validated.

          For example, if a directory is created manually:
          ```
          plans/future/platform/autonomous-pipeline/ready-to-work/APIP-1234; rm -rf /
          ```

          And if the script enumeration logic falls back to filesystem listing instead of the
          index, this would get used unsanitized.

        standard: |
          Per security principles: Validate all inputs, especially those used in command construction
          Per OWASP: Whitelist-based validation for story IDs

        impact: |
          Medium severity because there's regex validation in place, but if validation logic
          is bypassed or if fallback enumeration exists, a malicious STORY_ID could:
          1. Break out of expected command structure
          2. Inject shell metacharacters if quotes are missing
          3. Cause injection attacks in downstream commands

        context: |
          The validation regex exists (line 779), but good defense-in-depth practice would add
          explicit validation checks before each dangerous use of STORY_ID.

      evidence:
        - file: scripts/implement-dispatcher.sh
          lines: "145"
          snippet: |
            grep -oE "^\| ${STORY_PREFIX}-[0-9]+ \|" "$FEATURE_DIR/stories.index.md" | grep -oE "${STORY_PREFIX}-[0-9]+"
        - file: scripts/implement-stories.sh
          lines: "128-130"
          snippet: |
            discover_stories
            ALL_STORIES=("${DISCOVERED_STORIES[@]}")

      precedent:
        kb_checked: false
        relevant_entries: []
        applies: false
        notes: "No exceptions for unvalidated IDs"

      remediation: |
        Add explicit validation before dangerous uses:

        ```bash
        validate_story_id() {
          local ID="$1"
          local PREFIX="$2"

          # Must match PREFIX-NNNN pattern
          if [[ ! "$ID" =~ ^${PREFIX}-[0-9]{3,4}$ ]]; then
            echo "ERROR: Invalid story ID: $ID"
            return 1
          fi

          # Additional check: no shell metacharacters
          if [[ "$ID" =~ ['
          ;|&<>$(){}[\]*?!`"'"'"'"\\] ]]; then
            echo "ERROR: Story ID contains invalid characters: $ID"
            return 1
          fi

          return 0
        }

        # Use before any dangerous command:
        if ! validate_story_id "$STORY_ID" "$STORY_PREFIX"; then
          continue  # skip malformed ID
        fi
        ```

