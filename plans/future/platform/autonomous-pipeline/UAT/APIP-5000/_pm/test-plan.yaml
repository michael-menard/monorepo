strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "vitest.config.ts runs and produces coverage output"
    setup: "autonomous-pipeline package scaffold exists with package.json, tsconfig.json, src/"
    action: "Run `pnpm test` from apps/api/autonomous-pipeline"
    expected: "Test run completes, coverage report produced with >=45% statements/branches/functions/lines"
    evidence: "apps/api/knowledge-base vitest.config.ts uses identical structure; pnpm test:all passes in CI"

  - id: HP-2
    title: "createMockBullMQJob returns valid Zod-validated job fixture"
    setup: "BullMQ job Zod schema exported from APIP-0010's package"
    action: "Call `createMockBullMQJob()` with no arguments; call `createMockBullMQJob({ name: 'custom-job' })` with override"
    expected: "Both calls return objects that pass the BullMQ job Zod schema `.parse()` without throwing; override value is present in returned object"
    evidence: "Pattern from packages/backend/orchestrator/src/artifacts/__tests__/story.test.ts — createStoryArtifact() uses same spread-override approach with Zod parse"

  - id: HP-3
    title: "createMockBullMQWorker returns vi.fn()-based mock with correct interface shape"
    setup: "No external dependencies"
    action: "Call `createMockBullMQWorker()`; access `.on`, `.close` properties on result"
    expected: "All stubbed methods (on, close) are vi.fn() instances; calling `worker.on('completed', handler)` registers without throwing"
    evidence: "packages/tools/rate-limit/src/__tests__/limiter.test.ts demonstrates vi.fn() delegation pattern with mockStore"

  - id: HP-4
    title: "createMockQueue returns vi.fn()-based mock with correct interface shape"
    setup: "No external dependencies"
    action: "Call `createMockQueue()`; invoke `.add()`, `.getJob()`, `.pause()`, `.resume()`, `.close()` on result"
    expected: "All five methods are vi.fn() instances; calling any stub does not throw; return values are undefined unless configured"
    evidence: "Same vi.fn() pattern from rate-limit limiter tests"

  - id: HP-5
    title: "createSupervisorStateFixture returns valid Zod-validated state fixture"
    setup: "Supervisor state Zod schema exported from APIP-0020's package"
    action: "Call `createSupervisorStateFixture()` with no args; call with override `{ status: 'completed' }`"
    expected: "Both return objects that pass the supervisor state Zod schema; override value is present"
    evidence: "Same Zod fixture factory pattern as HP-2"

  - id: HP-6
    title: "Integration smoke test: supervisor loop processes a fixture job to terminal state"
    setup: "Real supervisor loop from APIP-0020 instantiated; BullMQ worker replaced with createMockBullMQWorker(); fixture job created with createMockBullMQJob()"
    action: "Run integration smoke test (AC-6)"
    expected: "Supervisor loop processes the job end-to-end and reaches a terminal state; no external service calls made (no real Redis, no LLM, no real LangGraph)"
    evidence: "apps/api/knowledge-base/src/embedding-client/__tests__/index.test.ts shows vi.mock() at module level for external clients; same pattern applicable here"

  - id: HP-7
    title: "All fixture return types use z.infer<ZodSchema>"
    setup: "TypeScript strict mode enabled"
    action: "Run `pnpm check-types --filter autonomous-pipeline` (or equivalent after package scaffold)"
    expected: "No TypeScript errors; no raw interface types on fixture factory return values"
    evidence: "CLAUDE.md: Zod-first types required — never use TypeScript interfaces"

error_cases:
  - id: EC-1
    title: "createMockBullMQJob rejects invalid override that violates Zod schema"
    setup: "BullMQ job Zod schema in place"
    action: "Call `createMockBullMQJob({ id: 123 })` where id must be a string per schema"
    expected: "Zod validation throws a ZodError with descriptive message; function does not silently return invalid object"
    evidence: "packages/backend/orchestrator/src/artifacts/__tests__/story.test.ts — test 'should require story ID to match pattern' shows Zod rejection behavior"

  - id: EC-2
    title: "createSupervisorStateFixture rejects invalid override"
    setup: "Supervisor state Zod schema in place"
    action: "Call `createSupervisorStateFixture({ unknownField: true })` with a field not in the schema using strict mode"
    expected: "Zod validation throws or strips unknown field per schema settings; no silent corruption of state shape"
    evidence: "Same Zod strict parse pattern"

  - id: EC-3
    title: "Integration smoke test fails fast when supervisor loop encounters unknown job type"
    setup: "Real supervisor loop; fixture job with unknown type set in mock"
    action: "Run smoke test with `createMockBullMQJob({ name: 'UNKNOWN_OPERATION' })`"
    expected: "Supervisor loop reaches an error terminal state (not an infinite loop); test asserts terminal state reached within timeout"
    evidence: "testTimeout: 30000 configured in vitest.config.ts prevents test hang"

edge_cases:
  - id: ED-1
    title: "createMockBullMQJob with all overrides provided still passes schema"
    setup: "All fields of the BullMQ job schema are overridden explicitly"
    action: "Call `createMockBullMQJob({ id: 'custom', name: 'op', data: { storyId: 'APIP-0010' } })` with all valid fields"
    expected: "Override object passes schema validation; returned fixture matches all overridden values"
    evidence: "Spread-override pattern from orchestrator story fixture factory"

  - id: ED-2
    title: "Coverage thresholds remain met as package grows"
    setup: "APIP-0010 and APIP-0020 implementation lands in autonomous-pipeline package"
    action: "Run `pnpm test` after implementation code is added"
    expected: "Coverage does not drop below 45% thresholds configured in vitest.config.ts"
    evidence: "apps/api/knowledge-base vitest.config.ts identical threshold structure enforced in CI"

  - id: ED-3
    title: "No barrel file imports leak into test utilities"
    setup: "Test utilities written without index.ts re-exports"
    action: "Grep for `from '../index'` or `from './index'` inside __fixtures__/ and __mocks__/ directories"
    expected: "No barrel imports found; all imports reference specific source files (e.g., '../__fixtures__/bullmq-job.js')"
    evidence: "CLAUDE.md: NO BARREL FILES — import directly from source files"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "Zod schema .parse() does not throw for valid fixture objects"
      - "vi.fn() stubs are callable and return undefined by default"
      - "pnpm test exits with code 0"
      - "Coverage output shows >=45% for statements, branches, functions, lines"
      - "TypeScript compilation exits with code 0 (check-types)"
  frontend:

manual_cases:
  - id: MC-1
    title: "Verify fixture Zod schemas reference production schema exports (not duplicates)"
    steps:
      - "Open createMockBullMQJob.ts fixture factory source"
      - "Confirm the Zod schema import comes from APIP-0010's exported schema, not a locally-defined copy"
      - "Open createSupervisorStateFixture.ts"
      - "Confirm the Zod schema import comes from APIP-0020's exported schema, not a locally-defined copy"
    expected: "No duplicate Zod schema definitions exist in test utilities; all fixture types derive from production schemas"

fixture_definitions:
  - name: BullMQJobFixture
    type: "z.infer<BullMQJobSchema>"
    description: "A mock BullMQ job object matching the Zod schema produced by APIP-0010. Accepts partial overrides; all fields have sensible defaults."
  - name: SupervisorStateFixture
    type: "z.infer<SupervisorStateSchema>"
    description: "A mock supervisor state object matching the state shape produced by APIP-0020. Accepts partial overrides."
  - name: BullMQWorkerMock
    type: "vi.fn()-based object implementing BullMQ Worker interface"
    description: "Vitest mock object with stubs for on('completed'), on('failed'), on('progress'), and close()."
  - name: QueueMock
    type: "vi.fn()-based object implementing BullMQ Queue interface"
    description: "Vitest mock object with stubs for add(), getJob(), pause(), resume(), and close()."

risks:
  - "Schema drift risk: If APIP-0010 or APIP-0020 schema changes after APIP-5000 is implemented, fixture factories will silently produce wrong objects unless tests import directly from production schemas"
  - "Sequencing risk: AC-2 and AC-5 cannot be implemented until APIP-0010 and APIP-0020 have exported Zod schemas — if neither has merged, implementer must coordinate or work from schema draft"
  - "Coverage inflation risk: If autonomous-pipeline package contains only test utilities at implementation time, coverage thresholds may appear met but will drop once production code lands — note this in the test plan as a deferred validation step"
  - "Integration smoke test fragility: AC-6 depends on real supervisor loop being importable; if APIP-0020 is not yet merged, this test cannot be written — it may need a stub supervisor for initial delivery"
