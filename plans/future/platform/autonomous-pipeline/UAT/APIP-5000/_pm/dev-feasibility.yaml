feasible: true
confidence: medium
rationale: "APIP-5000 is a well-scoped test infrastructure story with clear reference patterns in the codebase. The primary risk is sequencing: AC-2 and AC-5 depend on Zod schemas exported from APIP-0010 and APIP-0020 respectively. The blocking conflict (no autonomous-pipeline package exists) is resolved by explicitly scoping APIP-5000 to include package scaffolding if APIP-0010 has not yet delivered it. All implementation patterns are proven in the codebase."
complexity: medium
change_surface:
  areas:
    - "apps/api/autonomous-pipeline (new package — scaffold + test utilities)"
    - "packages/backend/orchestrator/src/artifacts/ (reference only, not modified)"
    - "apps/api/knowledge-base/vitest.config.ts (reference only, not modified)"
  endpoints: []
  deploy_touchpoints:
    - "Add autonomous-pipeline to Turborepo pipeline (turbo.json) if not already registered by APIP-0010"
    - "Confirm pnpm workspace includes apps/api/autonomous-pipeline"

risks:
  - finding: "APIP-0010 BullMQ job Zod schema may not be merged when APIP-5000 is picked up"
    mitigation: "Implementer must verify APIP-0010 branch status before starting AC-2. If schema not merged, coordinate with APIP-0010 implementer or work from schema draft in APIP-0010 plan artifacts. This is the single highest-impact sequencing risk."
  - finding: "apps/api/autonomous-pipeline package may not exist if APIP-0010 did not scaffold it"
    mitigation: "Scope explicitly includes package scaffolding (package.json, tsconfig.json, src/ directory) as ST-1. If APIP-0010 has already scaffolded the package, ST-1 becomes a verification step (~0.5 points saved)."
  - finding: "AC-6 integration smoke test requires importable supervisor loop from APIP-0020"
    mitigation: "If APIP-0020 is not merged, AC-6 must use a minimal stub supervisor that mimics the TypeScript async function signature. Document this fallback in the story."

missing_requirements:
  - "Explicit gate condition: story should not be picked up until APIP-0010 schema branch is confirmed (either merged or draft available in APIP-0010 plan artifacts)"
  - "Coverage target for supervisor loop component specifically — seed suggests 70% may be warranted given its central role; story leaves this at 45% minimum but should document the aspirational target"

evidence_expectations:
  - "pnpm check-types from autonomous-pipeline package exits 0"
  - "pnpm test from autonomous-pipeline package exits 0 with coverage output showing >=45% thresholds met"
  - "Grep confirms no barrel files (no index.ts re-exports) in __fixtures__/ or __mocks__/ directories"
  - "Grep confirms no console.log usage in test utilities (logger or no logging)"
  - "Import paths in consuming test files reference source files directly (e.g., '../__fixtures__/bullmq-job.js')"

subtasks:
  - id: ST-1
    title: "Scaffold autonomous-pipeline package (if not present from APIP-0010)"
    goal: "Create apps/api/autonomous-pipeline with package.json, tsconfig.json, src/ directory, and register in pnpm workspace and Turborepo pipeline"
    files_to_read:
      - "apps/api/knowledge-base/package.json"
      - "apps/api/knowledge-base/tsconfig.json"
      - "turbo.json"
    files_to_modify:
      - "apps/api/autonomous-pipeline/package.json (create)"
      - "apps/api/autonomous-pipeline/tsconfig.json (create)"
      - "turbo.json (add to pipeline if missing)"
    acs: ["AC-7"]
    depends_on: none
    verification: "ls apps/api/autonomous-pipeline/package.json && ls apps/api/autonomous-pipeline/src/"
    estimated_tokens: 4000

  - id: ST-2
    title: "Add vitest.config.ts to autonomous-pipeline package"
    goal: "Configure Vitest with environment:node, globals:true, include:src/**/*.test.ts, v8 coverage provider, and >=45% global thresholds"
    files_to_read:
      - "apps/api/knowledge-base/vitest.config.ts"
    files_to_modify:
      - "apps/api/autonomous-pipeline/vitest.config.ts (create)"
    acs: ["AC-1", "AC-7"]
    depends_on: ST-1
    verification: "pnpm --filter autonomous-pipeline test --run 2>&1 | grep 'coverage'"
    estimated_tokens: 3000

  - id: ST-3
    title: "Create BullMQ job fixture factory (createMockBullMQJob)"
    goal: "Implement fixture factory that accepts partial overrides, merges with defaults, and validates output against APIP-0010's BullMQ job Zod schema"
    files_to_read:
      - "packages/backend/orchestrator/src/artifacts/__tests__/story.test.ts"
      - "packages/backend/orchestrator/src/artifacts/story.ts"
      - "apps/api/autonomous-pipeline/src/[bullmq-job-schema-from-APIP-0010] (post-merge)"
    files_to_modify:
      - "apps/api/autonomous-pipeline/src/__fixtures__/bullmq-job.ts (create)"
    acs: ["AC-2", "AC-8", "AC-9", "AC-10"]
    depends_on: ST-1
    verification: "pnpm --filter autonomous-pipeline check-types && pnpm --filter autonomous-pipeline test --run src/__fixtures__/bullmq-job.test.ts"
    estimated_tokens: 6000

  - id: ST-4
    title: "Create BullMQ Worker and Queue mock factories"
    goal: "Implement vi.fn()-based mock factories for BullMQ Worker (on, close) and Queue (add, getJob, pause, resume, close) interfaces"
    files_to_read:
      - "packages/tools/rate-limit/src/__tests__/limiter.test.ts"
      - "apps/api/knowledge-base/src/embedding-client/__tests__/index.test.ts"
    files_to_modify:
      - "apps/api/autonomous-pipeline/src/__mocks__/bullmq-worker.ts (create)"
      - "apps/api/autonomous-pipeline/src/__mocks__/bullmq-queue.ts (create)"
    acs: ["AC-3", "AC-4", "AC-8", "AC-9", "AC-10"]
    depends_on: ST-1
    verification: "pnpm --filter autonomous-pipeline check-types && pnpm --filter autonomous-pipeline test --run src/__mocks__/"
    estimated_tokens: 5000

  - id: ST-5
    title: "Create supervisor state fixture factory (createSupervisorStateFixture)"
    goal: "Implement fixture factory that accepts partial overrides and validates against APIP-0020's supervisor state Zod schema"
    files_to_read:
      - "packages/backend/orchestrator/src/artifacts/__tests__/story.test.ts"
      - "apps/api/autonomous-pipeline/src/[supervisor-state-schema-from-APIP-0020] (post-merge)"
    files_to_modify:
      - "apps/api/autonomous-pipeline/src/__fixtures__/supervisor-state.ts (create)"
    acs: ["AC-5", "AC-8", "AC-9", "AC-10"]
    depends_on: ST-1
    verification: "pnpm --filter autonomous-pipeline check-types && pnpm --filter autonomous-pipeline test --run src/__fixtures__/supervisor-state.test.ts"
    estimated_tokens: 5000

  - id: ST-6
    title: "Write integration smoke test for supervisor loop with mocked BullMQ"
    goal: "Implement one integration test that instantiates the real supervisor loop (APIP-0020), injects mocked BullMQ worker and queue, processes a single fixture job, and asserts terminal state reached"
    files_to_read:
      - "apps/api/knowledge-base/src/embedding-client/__tests__/index.test.ts"
      - "apps/api/autonomous-pipeline/src/[supervisor-loop-from-APIP-0020] (post-merge)"
    files_to_modify:
      - "apps/api/autonomous-pipeline/src/__tests__/supervisor-smoke.test.ts (create)"
    acs: ["AC-6", "AC-7"]
    depends_on: "ST-4, ST-5"
    verification: "pnpm --filter autonomous-pipeline test --run src/__tests__/supervisor-smoke.test.ts"
    estimated_tokens: 7000
