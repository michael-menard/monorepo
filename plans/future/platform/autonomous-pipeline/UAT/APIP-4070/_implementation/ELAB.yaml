gaps:
  - id: gap-1
    check: internal_consistency
    finding: "AC-9 specifies triggerWeeklyReport(config, db, notificationConfig) but dispatchNotification() is described as a direct import from APIP-2010, which is not yet merged. The dispatch function must be injectable (passed as parameter) for parallel development and testability — not a compile-time import."
    severity: high
    decision: add_ac
    ac_added: "AC-15: triggerWeeklyReport() accepts dispatchNotification as injectable function parameter (not compile-time import). Signature: triggerWeeklyReport(config, db, dispatch, notificationConfig?)"

  - id: gap-2
    check: risk_disclosure
    finding: "pg_try_advisory_lock concurrency guard is specified in Architecture Notes and has a documented structured log event (weekly_report_skipped, reason: lock_held), but no AC covers this behavior and no test case verifies it."
    severity: medium
    decision: add_ac
    ac_added: "AC-16: triggerWeeklyReport() acquires pg_try_advisory_lock at start; if lock held, emits logger.info({ event: 'weekly_report_skipped', reason: 'lock_held' }) and returns early. Unit test verifies lock-held scenario."

