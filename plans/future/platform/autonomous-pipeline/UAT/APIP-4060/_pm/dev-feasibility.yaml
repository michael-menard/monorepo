feasible: true
confidence: high
rationale: >
  All infrastructure required by this story already exists: the knowledgeEntries table has archived/archivedAt fields,
  kb_update supports archival mutations, AuditLogger provides soft-fail logUpdate(), and the retention-policy.ts
  batch-loop pattern is a direct template for the freshness scanner. The primary implementation risk is the file path
  extraction heuristic (AC-3), which is a regex concern rather than a structural problem. The APIP-3090 dependency is
  non-blocking for story implementation — the function is designed as a standalone async function that APIP-3090 registers,
  so it can be fully implemented and tested without APIP-3090 being live.
complexity: medium
change_surface:
  areas:
    - packages/backend/orchestrator/src/nodes/freshness/
    - apps/api/knowledge-base/src/crud-operations/kb-update.ts (read-only reuse)
    - apps/api/knowledge-base/src/audit/audit-logger.ts (read-only reuse)
  endpoints: []
  deploy_touchpoints:
    - "No deploy step required — function is registered by APIP-3090 cron infra"

risks:
  - finding: "File path extraction heuristic (AC-3) uses regex on free-form text — may produce false positives/negatives on KB entries with embedded JSON, multi-line content, or paths in code blocks"
    mitigation: "Validate regex against a sample of real KB entries before finalizing. Use conservative match: only extract paths that appear to be standalone file references (e.g., not inside backtick blocks without a following extension). Start with: /(apps|packages|src)\/[^\s'"`,]+\.(ts|tsx|js|json|md)/g"
  - finding: "APIP-3090 cron interface contract not yet defined — runKbFreshnessCheck signature may need slight adjustment when APIP-3090 ships"
    mitigation: "Design as pure async function (deps, config) => Promise<KbFreshnessResult> with no LangGraph imports. APIP-3090 adapter wraps it. This is already the seed recommendation."

missing_requirements: []

evidence_expectations:
  - "pnpm check-types --filter @repo/orchestrator passes with no errors on new node files"
  - "Unit tests in __tests__/freshness.test.ts: all test cases in test plan pass"
  - "KbFreshnessResultSchema.parse(result) succeeds on actual function output in tests"
  - "No calls to kb_update during dry-run mode (verified via mock spy)"

subtasks:
  - id: ST-1
    title: "Create freshness node skeleton with Zod schemas"
    goal: "Establish the directory structure, KbFreshnessConfigSchema and KbFreshnessResultSchema in __types__/index.ts, and the function stub in index.ts"
    files_to_read:
      - packages/backend/orchestrator/src/nodes/elaboration/index.ts
      - apps/api/knowledge-base/src/audit/retention-policy.ts
    files_to_modify:
      - packages/backend/orchestrator/src/nodes/freshness/index.ts
      - packages/backend/orchestrator/src/nodes/freshness/__types__/index.ts
    acs: ["AC-1", "AC-7", "AC-8", "AC-9", "AC-11"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 8000

  - id: ST-2
    title: "Implement batch scan with staleness filter and file-existence check"
    goal: "Implement the batch query loop (AC-2) that fetches entries older than staleDays and not archived, then for each entry runs the file path extraction heuristic and fs.existsSync check (AC-3)"
    files_to_read:
      - apps/api/knowledge-base/src/audit/retention-policy.ts
      - apps/api/knowledge-base/src/crud-operations/kb-list.ts
    files_to_modify:
      - packages/backend/orchestrator/src/nodes/freshness/index.ts
    acs: ["AC-2", "AC-3", "AC-6", "AC-13"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 10000

  - id: ST-3
    title: "Implement archive and flag mutations with audit logging"
    goal: "Wire the mutation paths: auto-archive via kb_update (AC-4), flag via stale-candidate tag (AC-5), error isolation per entry (AC-12), and audit logging via AuditLogger.logUpdate"
    files_to_read:
      - apps/api/knowledge-base/src/crud-operations/kb-update.ts
      - apps/api/knowledge-base/src/audit/audit-logger.ts
    files_to_modify:
      - packages/backend/orchestrator/src/nodes/freshness/index.ts
    acs: ["AC-4", "AC-5", "AC-12"]
    depends_on: ST-2
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 8000

  - id: ST-4
    title: "Write unit tests covering all AC-10 scenarios"
    goal: "Implement __tests__/freshness.test.ts covering: dry-run (no mutations), non-existent file archived, existing file flagged, no-path entry skipped, batch size respected, error isolation, time truncation"
    files_to_read:
      - apps/api/knowledge-base/src/audit/__tests__/
      - packages/backend/orchestrator/src/nodes/freshness/index.ts
    files_to_modify:
      - packages/backend/orchestrator/src/nodes/freshness/__tests__/freshness.test.ts
    acs: ["AC-10"]
    depends_on: ST-3
    verification: "pnpm test --filter @repo/orchestrator -- freshness"
    estimated_tokens: 12000
