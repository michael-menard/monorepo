architectural_decisions:
  - id: ARCH-001
    question: "What sequence number should the migration file use?"
    decision: "Use 0028 — follows 0027_wint_0131_capabilities_feature_fk.sql as the last migration in migrations/app/"
    rationale: "0027 is the current highest sequence. 0028 is the next sequential slot."
    decided_by: auto
  - id: ARCH-002
    question: "Should change_type and file_type use PostgreSQL ENUM types or CHECK constraints?"
    decision: "Use CHECK constraints with 'unknown' placeholder (not ENUM types)"
    rationale: "Story AC-2 specifies CHECK constraints or ENUM types, and notes a follow-up expansion once APIP-1020 ADR is published. CHECK constraints are easier to ALTER without migration complexity. Pattern from 0026 uses ENUM; however, given the explicit placeholder/expansion requirement, CHECK with TEXT is simpler for evolving values. Consistent with story architecture note: 'use unknown placeholder until APIP-1020 ADR confirmed'."
    decided_by: auto
  - id: ARCH-003
    question: "Should writeTelemetry() use await or fire-and-forget?"
    decision: "Use await (fire-and-continue) wrapped in try/catch — default for correctness"
    rationale: "Story architecture notes specify: 'Default to await for correctness; document tradeoff in code comment.' The function catches all errors and returns void without rethrowing, so latency impact is minimal and row loss risk is eliminated."
    decided_by: auto

complexity: moderate

