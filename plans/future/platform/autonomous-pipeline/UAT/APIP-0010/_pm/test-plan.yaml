strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  packages_touched:
    - packages/backend/pipeline-queue (new)
  redis_touched: true
  coverage_waiver: true
  coverage_waiver_reason: "Infrastructure/library story with no business logic. QA gate = type-check pass + unit tests pass + integration test enqueue/dequeue."

happy_path_tests:
  - id: HP-1
    title: "PipelineJobDataSchema validates a fully-populated valid payload"
    setup: "Import PipelineJobDataSchema from @repo/pipeline-queue src/__types__/index.ts"
    action: "Call PipelineJobDataSchema.parse({ storyId: 'APIP-0010', phase: 'elaboration', priority: 1, metadata: { source: 'test' } })"
    expected: "Parse succeeds, returns typed object with all fields present"
    evidence: "No ZodError thrown; returned object equals input"

  - id: HP-2
    title: "PipelineJobDataSchema validates minimal required payload (no optional fields)"
    setup: "Import PipelineJobDataSchema"
    action: "Call PipelineJobDataSchema.parse({ storyId: 'APIP-0020', phase: 'implementation' })"
    expected: "Parse succeeds with only required fields"
    evidence: "No ZodError; priority and metadata are undefined"

  - id: HP-3
    title: "createPipelineQueue returns a BullMQ Queue with the correct queue name"
    setup: "Create a mock IORedis connection stub (unit test — no real Redis). Import createPipelineQueue, PIPELINE_QUEUE_NAME."
    action: "const queue = createPipelineQueue(mockConnection); assert queue.name === PIPELINE_QUEUE_NAME"
    expected: "Queue name equals 'apip-pipeline'"
    evidence: "queue.name === 'apip-pipeline'"

  - id: HP-4
    title: "createPipelineQueue accepts a custom queue name override"
    setup: "Create mock IORedis connection stub"
    action: "const queue = createPipelineQueue(mockConnection, 'custom-queue')"
    expected: "Queue name equals 'custom-queue'"
    evidence: "queue.name === 'custom-queue'"

  - id: HP-5
    title: "createPipelineConnection creates an IORedis instance from a redis URL"
    setup: "Import createPipelineConnection from @repo/pipeline-queue"
    action: "const conn = createPipelineConnection('redis://localhost:6379')"
    expected: "Returns an IORedis instance (instanceof IORedis is true)"
    evidence: "conn instanceof IORedis === true"

  - id: HP-6
    title: "PIPELINE_QUEUE_NAME constant is exported and equals 'apip-pipeline'"
    setup: "Import PIPELINE_QUEUE_NAME from @repo/pipeline-queue"
    action: "Assert PIPELINE_QUEUE_NAME === 'apip-pipeline'"
    expected: "Constant is 'apip-pipeline'"
    evidence: "typeof PIPELINE_QUEUE_NAME === 'string' && PIPELINE_QUEUE_NAME === 'apip-pipeline'"

  - id: HP-7
    title: "[Integration] Enqueue a valid job and verify it appears in the queue"
    setup: "Guard: skip if process.env.REDIS_URL is not set. Connect to local Redis on port 6379. Create queue via createPipelineQueue."
    action: "Enqueue a job with valid PipelineJobData payload. Retrieve waiting job count from queue."
    expected: "Waiting count increases by 1; job data matches enqueued payload"
    evidence: "queue.getWaitingCount() returns 1; job.data.storyId === 'APIP-0010'"

  - id: HP-8
    title: "[Integration] Dequeue a job with a BullMQ Worker and verify payload integrity"
    setup: "Guard: skip if REDIS_URL not set. Enqueue a job with valid payload using createPipelineQueue."
    action: "Create a BullMQ Worker targeting PIPELINE_QUEUE_NAME. Process one job. Capture job.data."
    expected: "Worker receives job with correct storyId and phase; PipelineJobDataSchema.parse(job.data) succeeds"
    evidence: "Job data round-trips through Zod parse without errors"

error_cases:
  - id: EC-1
    title: "PipelineJobDataSchema rejects payload missing required storyId"
    setup: "Import PipelineJobDataSchema"
    action: "Call PipelineJobDataSchema.parse({ phase: 'elaboration' })"
    expected: "ZodError thrown with issue on storyId field"
    evidence: "ZodError.issues[0].path includes 'storyId'"

  - id: EC-2
    title: "PipelineJobDataSchema rejects invalid phase enum value"
    setup: "Import PipelineJobDataSchema"
    action: "Call PipelineJobDataSchema.parse({ storyId: 'APIP-0010', phase: 'invalid-phase' })"
    expected: "ZodError thrown with issue on phase field"
    evidence: "ZodError.issues[0].path includes 'phase'"

  - id: EC-3
    title: "PipelineJobDataSchema rejects non-string storyId"
    setup: "Import PipelineJobDataSchema"
    action: "Call PipelineJobDataSchema.parse({ storyId: 12345, phase: 'qa' })"
    expected: "ZodError thrown with issue on storyId field"
    evidence: "ZodError.issues[0].code === 'invalid_type'"

  - id: EC-4
    title: "PipelineJobDataSchema rejects non-numeric priority"
    setup: "Import PipelineJobDataSchema"
    action: "Call PipelineJobDataSchema.parse({ storyId: 'APIP-0010', phase: 'review', priority: 'high' })"
    expected: "ZodError thrown with issue on priority field"
    evidence: "ZodError.issues[0].path includes 'priority'"

edge_cases:
  - id: ED-1
    title: "createPipelineQueue configures default job options: 3 attempts with exponential backoff"
    setup: "Import createPipelineQueue with mock IORedis"
    action: "Inspect the queue's defaultJobOptions after creation"
    expected: "defaultJobOptions.attempts === 3; defaultJobOptions.backoff.type === 'exponential'; defaultJobOptions.backoff.delay === 1000"
    evidence: "queue.defaultJobOptions matches expected config"

  - id: ED-2
    title: "Integration test is skipped when Redis is unavailable"
    setup: "Unset REDIS_URL environment variable in test environment"
    action: "Run integration test suite"
    expected: "Integration tests are skipped gracefully (test.skipIf pattern), not failed"
    evidence: "Test report shows 'skipped' not 'failed' for integration tests"

  - id: ED-3
    title: "PipelineJobDataSchema accepts all valid phase enum values"
    setup: "Import PipelineJobDataSchema"
    action: "Test each valid phase: 'elaboration', 'implementation', 'review', 'qa', 'merge'"
    expected: "All five parse without ZodError"
    evidence: "5/5 phase values parse successfully"

  - id: ED-4
    title: "Package is importable as @repo/pipeline-queue from external consumer"
    setup: "From a test consumer (e.g., a temporary test file in APIP-0020 package scope)"
    action: "import { createPipelineQueue, PIPELINE_QUEUE_NAME, PipelineJobDataSchema } from '@repo/pipeline-queue'"
    expected: "TypeScript resolves import without error; pnpm check-types passes"
    evidence: "No TS2305 or TS2307 errors"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "queue.name === 'apip-pipeline' (PIPELINE_QUEUE_NAME constant)"
      - "PipelineJobDataSchema.parse() succeeds for valid payloads"
      - "PipelineJobDataSchema.parse() throws ZodError for invalid payloads"
      - "createPipelineConnection() returns IORedis instance"
      - "queue.defaultJobOptions.attempts === 3"
      - "queue.defaultJobOptions.backoff.type === 'exponential'"
      - "[Integration] queue.getWaitingCount() === 1 after enqueue"
      - "[Integration] Worker receives job with Zod-valid data"
  frontend: ~

manual_cases:
  - id: MC-1
    title: "Bull Board mounts at /bull-board on dev server and shows apip-pipeline queue"
    steps:
      - "Follow README instructions to mount Bull Board on a dev Express server"
      - "Start the dev server with Redis running locally"
      - "Open http://localhost:<dev_port>/bull-board in browser"
      - "Enqueue a test job via createPipelineQueue"
    expected: "Bull Board UI shows 'apip-pipeline' queue with the enqueued job visible in waiting state"

  - id: MC-2
    title: "UAT: APIP-0020 dev imports @repo/pipeline-queue and adds a job without BullMQ boilerplate"
    steps:
      - "In a scratch file within APIP-0020 consumer scope, write: import { createPipelineQueue, PIPELINE_QUEUE_NAME, createPipelineConnection } from '@repo/pipeline-queue'"
      - "Create a connection and queue"
      - "Call queue.add(PIPELINE_QUEUE_NAME, { storyId: 'UAT-001', phase: 'elaboration' })"
    expected: "Job enqueues without error. No BullMQ boilerplate needed beyond factory call."

fixture_definitions:
  - name: validPipelineJobPayload
    type: "PipelineJobData"
    description: "{ storyId: 'APIP-0010', phase: 'elaboration', priority: 1, metadata: { source: 'test' } }"
  - name: minimalPipelineJobPayload
    type: "PipelineJobData"
    description: "{ storyId: 'APIP-0020', phase: 'implementation' } — only required fields"
  - name: mockIoRedisConnection
    type: "IORedis stub"
    description: "Minimal IORedis mock for unit tests — does not connect to real Redis. Used to instantiate createPipelineQueue without network calls."

risks:
  - "Integration tests require local Redis on port 6379. CI environment must have Redis available or tests must be gated behind REDIS_URL env var check."
  - "BullMQ version compatibility with existing ioredis version in the monorepo — must verify peer dep alignment before running integration tests."
  - "createPipelineConnection unit test must verify IORedis instance creation without actually connecting (use connection event mocking or inspect connection options instead of waiting for connect event)."
  - "Bull Board test is manual-only — no Playwright automation for operator tooling in Phase 0."
