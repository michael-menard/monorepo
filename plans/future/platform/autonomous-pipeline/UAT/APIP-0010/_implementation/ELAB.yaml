audit:
  - id: scope_alignment
    status: PASS
    note: >
      Story scope matches stories.index.md precisely. Index entry reads "BullMQ Work Queue
      Setup | none | Created" which aligns with the story's single deliverable:
      packages/backend/pipeline-queue. The story introduces no endpoints, no infrastructure
      changes, no database changes, and no frontend. Dependency declaration (blocks APIP-0020,
      APIP-0040, APIP-5000, APIP-5001, APIP-5007) matches index dependency graph exactly.
      The only workspace file touched beyond the new package is pnpm-workspace.yaml, which
      is required housekeeping for a new package — not scope creep.

  - id: internal_consistency
    status: PASS
    note: >
      Goals and Non-Goals are internally coherent. Goal is to create the pipeline-queue
      package; Non-Goals correctly fence out supervisor loop (APIP-0020), LangGraph graphs
      (APIP-1010+), deployment (APIP-5006), monitoring UI (APIP-2020), secrets management
      (APIP-5004), and database schema modifications. No Goal contradicts any Non-Goal.
      AC-6 (Bull Board documented/helper) is consistent with the Non-Goal of not building
      a full operator UI — AC-6 requires documentation or a thin helper, not a deployed UI.
      AC-7/AC-8/AC-9 (unit tests, integration tests, type-check) directly cover the
      testability goals stated in the Test Plan section. The Local Testing Plan (unit +
      integration split, Redis guard on integration tests) maps 1:1 to AC-7 and AC-8.
      One minor tension: AC-4 in APIP-0010.md adds "enableOfflineQueue: false" which is
      absent from the STORY-SEED.md initial AC-4 text — this is an elaboration improvement,
      not a contradiction. All decisions (Zod-at-enqueue, PIPELINE_QUEUE_NAME stability,
      no custom retry) align with Non-Goals and Architecture Notes.

  - id: reuse_first
    status: PASS
    note: >
      Reuse Plan is explicit and well-reasoned. Three canonical reuse targets identified:
      (1) packages/backend/rate-limiter/ skeleton for package config files and injected
      dependency pattern, (2) apps/api/lego-api/core/cache/redis-client.ts for ioredis
      connection factory pattern (adapted, not imported), (3) packages/backend/gallery-core/
      src/__types__/index.ts for Zod schema structure. The story correctly distinguishes
      between pattern reuse (adapt, do not import) and structural reuse (copy skeleton).
      No per-story one-off utilities introduced. New shared package (pipeline-queue) is
      justified: it forms the stable contract for 5 downstream stories. @repo/logger reuse
      for event logging is explicitly called out. No barrel files will be created per
      CLAUDE.md rules.

  - id: ports_adapters
    status: PASS
    note: >
      This story is a pure backend package with no HTTP endpoints. The ports-and-adapters
      concern here is whether the queue factory is transport-agnostic and properly abstracted.
      It is: createPipelineQueue accepts an IORedis connection parameter (dependency injection)
      rather than creating or importing a global singleton. The queue factory is agnostic to
      whether the caller is a Lambda, a long-running server, or a test harness. The connection
      factory (createPipelineConnection) is the adapter layer that isolates IORedis
      instantiation. Platform-specific concern (no lazyConnect, enableOfflineQueue: false for
      long-running process vs Lambda) is isolated entirely in createPipelineConnection.
      Bull Board adapter is documented as separate from the package core, keeping monitoring
      tooling out of the queue API surface. The factory pattern is correctly abstracted and
      the story explicitly prohibits importing the Lambda singleton pattern.

  - id: testability
    status: PASS
    note: >
      Test coverage is comprehensive and concrete. Unit tier (no Redis): 6 happy-path tests
      (HP-1 through HP-6), 4 error cases (EC-1 through EC-4), 3 edge cases (ED-1 through
      ED-3) — all named with specific setup/action/expected/evidence. Integration tier
      (Redis required): 2 tests (HP-7, HP-8) with explicit REDIS_URL guard and cleanup
      instructions. ED-2 covers the skip behavior explicitly. Test files are individually
      named (pipeline-job-schema.test.ts, pipeline-queue.test.ts,
      pipeline-queue.integration.test.ts). Fixture definitions are provided (validPipelineJobPayload,
      minimalPipelineJobPayload, mockIoRedisConnection). The test plan YAML includes one
      edge case (ED-4 — importability as @repo/pipeline-queue) that is not surfaced in the
      story's AC-7 unit test list but IS covered by AC-10. Coverage waiver is appropriate
      and documented.

  - id: decision_completeness
    status: PASS
    note: >
      No blocking TBDs found. All architectural decisions are resolved: BullMQ vs PostgreSQL
      queue (ADR-001), long-running process model vs Lambda (ADR-004), queue name stability
      (documented as immutable contract), Zod-at-enqueue pattern (explicitly specified),
      connection model (two IORedis connections documented). The one unresolved item —
      ElastiCache AOF tier verification for production — is explicitly acknowledged as a
      Phase 0 non-blocker with documentation requirement in README (AC-11). BullMQ ioredis
      peer dep version alignment is flagged as a pre-implementation verification step
      ("pnpm why ioredis"), not left as an open TBD. No unresolved design decisions block
      implementation start.

  - id: risk_disclosure
    status: PASS
    note: >
      Risks are clearly enumerated across multiple artifacts. Redis/infra risks: ElastiCache
      AOF tier limitation documented, CI Redis availability gate documented, integration test
      skip-if pattern specified. Dependency risks: BullMQ ioredis peer dep version conflict
      identified with specific mitigation ("pnpm why ioredis"). Architecture risks: two-
      connection BullMQ requirement documented with mitigation (pass config not instance).
      Downstream contract risk: PIPELINE_QUEUE_NAME immutability documented. Protected-file
      risks: database-schema/, @repo/db, redis-client.ts all listed as protected/do-not-touch.
      No hidden dependencies identified. The one risk not explicitly quantified is the
      createPipelineConnection unit test approach (test-plan.yaml risk item: "must verify
      IORedis instance creation without actually connecting") — this is a test implementation
      detail, not a blocking risk.

  - id: story_sizing
    status: WARN
    note: >
      11 ACs exceeds the 8-AC threshold, triggering the sizing flag. However, a split is
      NOT recommended for the following reasons: (1) All 11 ACs are tightly cohesive — every
      AC contributes to the single deliverable of a working, importable @repo/pipeline-queue
      package. There are no independently deployable sub-features. (2) AC-1 (scaffold),
      AC-2 (schema), AC-3/AC-4/AC-5 (factories + constant), AC-6 (Bull Board docs),
      AC-7/AC-8 (tests), AC-9 (CI gate), AC-10 (workspace), AC-11 (README) form a natural
      completeness checklist for a new package, not 11 separate features. (3) No endpoints,
      no UI, no DB — change surface is a single new directory. (4) The predicted split_risk
      of 0.8 in story metadata is high, but reflects the AC count heuristic, not actual
      complexity. (5) Splitting would create artificial intermediate states (e.g., package
      with schema but no factory) that are not independently shippable or testable. AC-6
      (Bull Board) is the only AC that could theoretically be deferred to a follow-on, but
      it is documentation-only (README instructions) with negligible implementation cost.
      Sizing flag: WARN (not SPLIT_REQUIRED). Story is P0 on the critical path — splitting
      would add coordination overhead with zero benefit.

  - id: subtask_decomposition
    status: PASS
    note: >
      7 subtasks (ST-1 through ST-7) cover all 11 ACs with no AC left uncovered: AC-1/AC-10
      (ST-1), AC-2 (ST-2), AC-4 (ST-3), AC-3/AC-5 (ST-4), AC-7/AC-9 (ST-5), AC-8 (ST-6),
      AC-6/AC-11 (ST-7). Dependency DAG is valid and acyclic: ST-1 → {ST-2, ST-3} →
      ST-4 → {ST-5, ST-7} → ST-6. No cycles. Each subtask has a verification command
      (pnpm check-types, pnpm build, pnpm test, or manual review). Each subtask specifies
      files_to_read (canonical references) and files_to_modify (concrete targets). Token
      estimates provided. File count per subtask: ST-1 touches 5 files (acceptable for a
      package scaffold), ST-2 through ST-7 touch 1-2 files each — all within the 3-file
      guideline. Canonical References section is present with 4 entries covering all
      pattern sources. One observation: ST-6 lists files_to_read as the ST-5 output file
      (pipeline-queue.test.ts) — this is a development reference, not a canonical reference,
      but it is a reasonable read target for consistency.

gaps:
  # MVP-blocking gaps only — issues that would prevent APIP-0020 from importing and using the package

  - id: GAP-001
    severity: MINOR
    title: "AC-4 enableOfflineQueue gap between STORY-SEED and elaborated story"
    description: >
      STORY-SEED.md AC-4 omits "enableOfflineQueue: false" from the createPipelineConnection
      specification. The elaborated APIP-0010.md AC-4 adds it. This is an improvement, not a
      conflict, but the dev-feasibility.yaml risk mitigation for the two-connection BullMQ
      requirement notes "pass connection config (not instance)" while AC-3 and AC-4 specify
      passing an IORedis instance. These are compatible approaches (BullMQ accepts either) but
      the implementer should be aware that the two-connection requirement is satisfied by
      BullMQ internally when given an IORedis config object. If an IORedis instance is passed,
      BullMQ clones it. Clarification is low-risk but worth noting.
    blocking: false
    resolution_hint: >
      Implementer should read BullMQ Queue constructor docs before ST-3. The AC-4/AC-3
      combination is correct as written — this is an informational gap, not a blocking one.
    decision: "out_of_scope"
    decision_note: "Informational gap. Both connection approaches valid per BullMQ docs."

  - id: GAP-002
    severity: MINOR
    title: "Zod-at-enqueue wiring not explicitly assigned to a subtask"
    description: >
      Architecture Notes specify "The queue factory should Zod-parse job data at enqueue time
      (PipelineJobDataSchema.parse(data)) to enforce the contract before data enters Redis."
      ST-4 description mentions "Wire @repo/logger for queue events" but does not explicitly
      call out the Zod-parse-at-enqueue wiring. No AC directly tests this behavior (AC-7
      tests queue factory behavior in unit tests, AC-8 tests round-trip). There is no test
      case that specifically validates: enqueue with invalid payload → ZodError thrown before
      Redis write. This is a minor gap; the behavior is architecturally specified but not
      test-asserted.
    blocking: false
    resolution_hint: >
      Add one error-case test in pipeline-queue.test.ts: call queue.add() with an invalid
      PipelineJobData payload and assert ZodError is thrown. This closes the gap without
      requiring an AC change.
    decision: "defer"
    decision_note: "Resolvable during implementation in ST-5. Architecture Notes specify the behavior."

opportunities:
  # Non-blocking enhancements for future consideration

  - id: OPP-001
    title: "Add queue.add() typed wrapper to enforce Zod at the call site"
    description: >
      Currently createPipelineQueue returns a raw BullMQ Queue<PipelineJobData>. Consumers
      call queue.add(name, data) directly. The Zod validation at enqueue is internal to the
      factory. A future enhancement could export a typed addJob(queue, data: PipelineJobData)
      helper that makes the Zod validation contract visible at the consumer call site and
      provides a cleaner API (queue.add takes a job name string which is slightly awkward).
    story: "APIP-0010 follow-on or APIP-0020 consumer convenience"
    effort: small
    decision: "log_to_kb"
    kb_entry_id: "b2770466-6377-4cec-b851-2c12243634f6"

  - id: OPP-002
    title: "Export phase enum as a Zod enum for consumer reuse"
    description: >
      The phase enum ('elaboration' | 'implementation' | 'review' | 'qa' | 'merge') is
      defined inline in PipelineJobDataSchema. Extracting it as a standalone exported
      PipelinePhaseSchema = z.enum([...]) would allow downstream stories (APIP-0020,
      APIP-1010+) to import and reuse the phase type without repeating the enum definition.
    story: "Consider in ST-2 implementation or defer to APIP-0020"
    effort: trivial
    decision: "log_to_kb"
    kb_entry_id: "b2770466-6377-4cec-b851-2c12243634f6"

  - id: OPP-003
    title: "CI environment documentation for Redis availability"
    description: >
      The test plan specifies integration tests are gated by REDIS_URL env var. There is no
      documentation for how to configure this in the monorepo CI pipeline (GitHub Actions or
      similar). A future story or CI configuration update should ensure Redis is available in
      the integration test environment, or explicitly document that integration tests are
      developer-local only for Phase 0.
    story: "APIP-5000 (Test Infrastructure) or CI config story"
    effort: small
    decision: "log_to_kb"
    kb_entry_id: "b2770466-6377-4cec-b851-2c12243634f6"

  - id: OPP-004
    title: "Consider @repo/pipeline-queue as the canonical queue name export for all APIP consumers"
    description: >
      Multiple Phase 0 stories (APIP-0020, APIP-0040, APIP-5000, APIP-5001, APIP-5007) all
      depend on APIP-0010. Once PIPELINE_QUEUE_NAME is exported as a constant, ensuring all
      downstream stories import it from @repo/pipeline-queue (rather than hardcoding
      'apip-pipeline') should be enforced by convention. A lint rule or ESLint no-restricted-
      syntax rule could enforce this.
    story: "APIP-5000 or code review convention"
    effort: trivial
    decision: "log_to_kb"
    kb_entry_id: "b2770466-6377-4cec-b851-2c12243634f6"

