architectural_decisions:
  - id: ARCH-001
    question: "pnpm-workspace.yaml update needed?"
    decision: "No change required — packages/backend/* glob already covers packages/backend/pipeline-queue"
    rationale: "Confirmed in pnpm-workspace.yaml: 'packages/backend/*' wildcard includes the new directory automatically"
    decided_by: auto

  - id: ARCH-002
    question: "ioredis version compatibility with BullMQ v5+"
    decision: "ioredis ^5.4.2 already in monorepo via apps/api/lego-api — compatible with BullMQ v5+"
    rationale: "Confirmed via grep: apps/api/lego-api/package.json has ioredis ^5.4.2. BullMQ v5+ requires ioredis v5+. No version conflict."
    decided_by: auto

  - id: ARCH-003
    question: "tsup vs tsc for build tooling in pipeline-queue"
    decision: "Use tsc (like rate-limiter) rather than tsup — rate-limiter uses plain tsc build; consistent with existing backend packages"
    rationale: "rate-limiter/package.json uses build: tsc script with no tsup. pipeline-queue should match. tsup.config.ts mentioned in story but rate-limiter doesn't have one — will omit tsup and use tsc."
    decided_by: auto

complexity: moderate

notes:
  - "ioredis ^5.4.2 already in monorepo — fully compatible with BullMQ v5+. No peer dep conflict."
  - "pnpm-workspace.yaml already includes packages/backend/* glob — no workspace.yaml edit required for AC-10."
  - "createPipelineConnection: remove lazyConnect, remove module-level singleton, add enableOfflineQueue: false. Adapt event logging from redis-client.ts."
  - "Zod parse at enqueue: createPipelineQueue should call PipelineJobDataSchema.parse(data) before Queue.add to enforce contract."
  - "Integration test guard pattern: const skipIntegration = !process.env.REDIS_URL; test.skipIf(skipIntegration)(...)."
  - "Coverage waiver applies: infrastructure/library story. QA gate = type-check + unit tests + integration enqueue/dequeue."
  - "PIPELINE_QUEUE_NAME = 'apip-pipeline' is a stable contract — cannot change once APIP-0020 depends on it."
  - "BullMQ requires two IORedis connections internally per Queue. Pass IORedis instance to createPipelineQueue; BullMQ manages connection multiplexing."
  - "rate-limiter uses tsc not tsup — follow same pattern, do not create tsup.config.ts."
  - "Bull Board: document-only per AC-6. No mountBullBoard function needed in package — README instructions suffice."
  - "AC-3 note: createPipelineQueue should validate job data with Zod at enqueue time, wrapping Queue.add."
