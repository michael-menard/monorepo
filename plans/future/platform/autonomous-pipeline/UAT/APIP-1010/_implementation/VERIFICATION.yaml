lessons_to_record:
  - lesson: >-
      The parseStructurerState pattern using Zod's safeParse on the full GraphState to extract only needed fields is a
      clean alternative to the raw (state as unknown as T) cast pattern. It provides type safety with graceful fallback
      and documents which state fields the node depends on.
    category: pattern
    tags:
      - langgraph
      - state
      - zod
      - orchestrator
  - lesson: >-
      The toStateUpdate helper function documents the single cast point where node return values are cast to
      Partial<GraphState>, making the type assertion visible and intentional rather than scattered through the node
      body.
    category: pattern
    tags:
      - langgraph
      - typescript
      - orchestrator
  - lesson: >-
      For heuristic-based complexity estimation nodes (no LLM call required), 21 unit tests with full scenario coverage
      (happy path, edge cases, boundary conditions, fallback) are achievable and sufficient for >80% coverage.
    category: pattern
    tags:
      - testing
      - orchestrator
      - elaboration
