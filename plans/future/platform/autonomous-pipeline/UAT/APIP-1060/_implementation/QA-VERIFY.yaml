issues:
  - id: TYPE-001
    severity: high
    description: >-
      Type errors in QA-scoped files detected by pnpm --filter @repo/orchestrator check-types.
      6 errors in src/graphs/qa.ts (lines 342-347): factory functions return NodeFunction
      (typed as (state: GraphState) => Promise<Partial<GraphState>>) but local NodeFactory
      type expects (state: Record<string, unknown>) => Promise<Record<string, unknown>>).
      TypeScript correctly flags incompatibility because GraphState has many required fields
      not present in Record<string, unknown>. 1 error in src/nodes/qa/verify-acs.ts (line 118):
      callModel(prompt) called with 1 argument but ModelClientSchema.callModel is typed via
      .args(z.string(), z.object({ model: z.string() }).optional()) which Zod resolves as
      requiring at least 2 arguments (TS2555). The second arg is semantically optional but
      Zod's .args() does not mark it optional for TypeScript's purposes. Evidence.yaml
      incorrectly claimed zero type errors in QA-scoped files. pnpm check-types exits with
      code 2.
    suggested_fix: >-
      For NodeFactory mismatch: change type NodeFactory = () => Promise<NodeFunction> and
      cast state inside makeNode with (state as unknown as Parameters<NodeFunction>[0]).
      Alternatively use 'as unknown as NodeFactory' at the addNode call sites.
      For callModel arity: change .args(z.string(), z.object(...).optional()) to
      .args(z.string()).and(z.function().args(z.string(), z.object(...).optional())) or
      simply update verify-acs.ts to pass the second arg: callModel(prompt, { model: 'claude' })
      or change ModelClientSchema to use a single optional second param typed correctly.

lessons_to_record:
  - lesson: >-
      When using Zod z.function().args() with an optional second argument, TypeScript infers
      it as a required overload from the .args() chain. Callers must explicitly pass all args
      listed in .args() or use a single z.tuple() with .rest(). Prefer z.function() without
      .args() and annotate the type separately if callers won't always provide the optional arg.
    category: pattern
    tags: ['zod', 'typescript', 'function-typing', 'backend']

  - lesson: >-
      When a QA graph node factory returns NodeFunction (typed against GraphState), wrapping
      it with a local NodeFactory type that uses Record<string, unknown> creates a structural
      incompatibility. The correct pattern is to either type the local wrapper to accept
      NodeFunction directly, or use 'as unknown as' casting at the assignment boundary. Do not
      define a separate NodeFactory alias that differs from NodeFunction.
    category: pattern
    tags: ['langgraph', 'typescript', 'type-casting', 'backend']

  - lesson: >-
      EVIDENCE.yaml check-types claims must be verified by re-running check-types in CI/QA.
      The implementation claimed 'No type errors in QA-scoped files' but 7 type errors existed.
      The likely cause: the developer ran check-types on only the new files in isolation
      (tsc --noEmit --files ...) rather than the full package, missing cross-file type
      incompatibilities surfaced by the full tsc run.
    category: blocker
    tags: ['evidence-quality', 'type-checking', 'qa-process']

