type_check_results:
  command: 'pnpm --filter @repo/orchestrator check-types'
  exit_code: 0
  errors_in_qa_files: 0
  notes: >-
    Clean pass. TYPE FIX 1 (qa.ts): makeNode typed as (state: any) => Promise<any> at cast boundary
    resolves 6 TS2345 errors. TYPE FIX 2 (verify-acs.ts): callModel(prompt, undefined) passes 2nd
    arg explicitly resolving TS2555. Both fixes are minimal and correct at the boundary — the
    actual runtime types are safe since nodes handle their own casting internally.

lessons_to_record:
  - lesson: >-
      Zod z.function().args(a, b_optional) types callers as needing both args from TypeScript's
      perspective. If callers may omit the second arg, pass undefined explicitly or use
      z.function() without .args() and annotate the type separately.
    category: pattern
    tags: ['zod', 'typescript', 'function-typing', 'backend']

  - lesson: >-
      When a LangGraph node factory returns NodeFunction (typed against GraphState), wrapping it
      with a local NodeFactory type using Record<string, unknown> creates structural incompatibility.
      Correct fix: type the wrapper factory parameter as (state: any) => Promise<any> at the
      cast boundary, keeping all internal types strong.
    category: pattern
    tags: ['langgraph', 'typescript', 'type-casting', 'backend']

  - lesson: >-
      EVIDENCE.yaml check-types claims must be validated by re-running full pnpm check-types in QA.
      Running tsc on individual files may miss cross-file type incompatibilities surfaced only by
      the full package build.
    category: blocker
    tags: ['evidence-quality', 'type-checking', 'qa-process']

