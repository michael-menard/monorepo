issues:
  - id: TYPE-001
    severity: high
    description: >-
      7 type errors in QA-scoped files. 6 in src/graphs/qa.ts (lines 342-347): NodeFunction/NodeFactory type
      incompatibility — factory functions typed as (state: GraphState) but local NodeFactory expects (state:
      Record<string, unknown>). 1 in src/nodes/qa/verify-acs.ts (line 118): callModel(prompt) called with 1 argument but
      Zod schema defines args(string, optional_object) causing TS2555. pnpm check-types exits with code 2. EVIDENCE.yaml
      incorrectly claimed zero type errors in QA-scoped files.
    suggested_fix: >-
      NodeFactory mismatch: type NodeFactory = () => Promise<NodeFunction> and handle casting in makeNode.
      verify-acs.ts: pass second arg to callModel or fix ModelClientSchema to allow single-arg calls.
lessons_to_record:
  - lesson: >-
      Zod z.function().args(a, b_optional) still types callers as needing both args from TypeScript's perspective. If
      callers may omit the second arg, use z.function() without .args() or type via a standard function type annotation
      alongside the Zod schema.
    category: pattern
    tags:
      - zod
      - typescript
      - function-typing
      - backend
  - lesson: >-
      When a QA node factory returns NodeFunction (typed against the full GraphState), a local NodeFactory alias using
      Record<string, unknown> creates structural incompatibility. Type the wrapper to accept NodeFunction directly or
      use 'as unknown as' casting at the correct boundary.
    category: pattern
    tags:
      - langgraph
      - typescript
      - type-casting
      - backend
  - lesson: >-
      EVIDENCE.yaml check-types claims must be validated by re-running full pnpm check-types in QA. Running tsc on
      individual files may miss cross-file type incompatibilities exposed only by the full package build.
    category: blocker
    tags:
      - evidence-quality
      - type-checking
      - qa-process
