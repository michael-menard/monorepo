summary: >
  The APIP-3040 implementation correctly delivers the three-tier routing upgrade to
  PipelineModelRouter. The core behavior — DB override → affinity-based routing →
  static escalation fallback — is fully implemented and tested. All AC-10 unit test
  sub-cases (a-g) pass. The AffinityReader injectable abstraction (AC-15) is properly
  designed via Zod schemas. All routing decision log calls include the required fields
  (AC-7). Code quality is good: no interfaces, no console.log, no semicolons, @repo/logger
  throughout.

  Two minor deviations exist but neither is blocking: (1) AC-9 schema uses .nonnegative()
  instead of .min(1) for affinityMinSampleSize and .optional() instead of .default(0.85)/
  .default(20), and (2) the ED-4 test (cheapest model wins with multiple profiles) is
  listed in the test plan but not implemented. AC-11 integration test is correctly
  deferred per story risk TR-1 (gated on APIP-3020 + APIP-5001 test DB).

