# ---------------------------------------------------------------------------
# Findings
# ---------------------------------------------------------------------------

findings:

  - id: F-1
    severity: minor
    category: schema_constraint
    ac: AC-9
    description: >
      PipelineModelRouterConfigSchema uses z.number().int().nonnegative() for
      affinityMinSampleSize instead of the story-specified z.number().int().min(1).
      Also uses .optional() rather than .default(0.85) / .default(20). The runtime
      defaults are correctly applied in the constructor via nullish coalescing, so
      behavior is functionally identical. Schema-level enforcement is slightly weaker
      than specified.
    blocking: false
    recommendation: "Change .nonnegative() to .min(1) and optionally use .default() in schema"

  - id: F-2
    severity: minor
    category: missing_test
    ac: AC-2, AC-14
    description: >
      ED-4 test ('Cheapest qualifying model selected when multiple profiles exist') is
      listed in the story test plan (edge_cases section) but not implemented in
      model-router.test.ts. The cost-first ordering contract is documented in the
      AffinityReaderSchema interface but cannot be verified by unit test without
      a mock that returns multiple profiles.
    blocking: false
    recommendation: >
      Add ED-4 test: configure affinityReader.query to return the cheapest qualifying
      profile and verify the dispatched model matches the lowest avg_cost_usd entry.
      Can be done with a mock returning a pre-sorted profile.

  - id: F-3
    severity: informational
    category: deferred_test
    ac: AC-11
    description: >
      ST-6 (integration test with real PostgreSQL and wint.model_affinity fixture rows)
      was not implemented. This is explicitly expected per story risk TR-1:
      'skip @integration if [APIP-3020 migration] not applied'. APIP-3020 is still
      in backlog. AC-11 is correctly deferred rather than unimplemented.
    blocking: false

  - id: F-4
    severity: informational
    category: design_note
    ac: AC-2, AC-14
    description: >
      Cost-first ordering (ORDER BY avg_cost_usd ASC) is delegated entirely to the
      AffinityReader implementation. The router calls affinityReader.query() and trusts
      the returned profile is already the cheapest qualifying one. This is the correct
      design for the injectable abstraction pattern (AC-15), but means the real
      Drizzle reader (APIP-3020) must be verified to apply the correct ORDER BY clause.
    blocking: false

