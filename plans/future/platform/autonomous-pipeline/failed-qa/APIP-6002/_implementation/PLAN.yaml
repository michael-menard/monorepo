architectural_decisions:
  - id: ARCH-001
    question: >-
      Should stuck-recovery logic be extracted to scripts/lib/stuck-recovery.sh, or added inline to
      implement-stories.sh?
    decision: Inline in implement-stories.sh — no separate lib file
    rationale: >-
      The detect_stuck_stories() and recover_story() functions need access to all local variables and helpers already
      defined in implement-stories.sh (FEATURE_DIR, WORKTREE_BASE, has_worktree_commits, move_story_to,
      validate_artifact, etc.). Sourcing a lib file creates coupling complexity without benefit. Precedent:
      validate_artifact_schema, generate_evidence, and other helpers are already inline.
    decided_by: auto
    tier: 1
  - id: ARCH-002
    question: How to detect 'stuck for >N hours' without associative arrays (macOS bash 3.2)?
    decision: >-
      Use stat -f %m (macOS) / stat -c %Y (Linux) on the story directory's mtime to get last-modified timestamp, compare
      to current epoch via date +%s. The directory mtime changes when story.yaml or _implementation/ artifacts are
      written.
    rationale: >-
      bash 3.2 has no date arithmetic with timestamps directly, but $(date +%s) gives current epoch and stat gives mtime
      epoch. Simple integer subtraction gives duration in seconds. macOS stat uses -f %m, Linux uses -c %Y — use a
      portable wrapper that tries macOS first. This is exactly the approach the existing implement-stories.sh uses for
      worktree timestamp checks.
    decided_by: auto
    tier: 1
  - id: ARCH-003
    question: Where should STUCK-RECOVERY.yaml and STUCK-ALERT.yaml be written?
    decision: >-
      Write to {STORY_DIR}/_implementation/STUCK-RECOVERY.yaml and {STORY_DIR}/_implementation/STUCK-ALERT.yaml (in the
      story's implementation directory, alongside EVIDENCE.yaml etc.)
    rationale: >-
      Consistent with all other pipeline artifacts (EVIDENCE.yaml, REVIEW.yaml, VERIFICATION.yaml, GATE-FAILURE.yaml).
      Makes the audit trail discoverable alongside other story state artifacts. The _implementation/ directory is the
      canonical location for pipeline-produced artifacts.
    decided_by: auto
    tier: 1
complexity: moderate
notes:
  - >-
    This story is purely a bash script addition to scripts/implement-stories.sh — no TypeScript or database changes
    required
  - >-
    SCOPE.yaml says 'packages: true' but all work is in scripts/ (shell), not packages/. The SCOPE.yaml was set
    conservatively. Actual touches are scripts/implement-stories.sh only.
  - macOS bash 3.2 compatibility is required — no declare -A, no readarray, use flat comparisons only
  - >-
    Recovery actions must be idempotent: check for existing STUCK-RECOVERY.yaml before writing to avoid duplicate
    artifacts
  - >-
    The exhausted-retries recovery is capped at 1 additional attempt per pipeline run (MAX_RECOVERY_ATTEMPTS variable)
    to prevent infinite recovery loops
  - >-
    APIP-6001 landed phase gate validation in implement-stories.sh — verify the gate functions are present before adding
    recovery (depends_on: APIP-6001)
  - >-
    Lesson from audit: default --max-retries was 0, now 1 after APIP-6001. Recovery loop is the backstop for the cases
    that slip through even with retries.
  - Stale worktree cleanup in AC-4 should use the existing merge_and_cleanup() helper pattern
