architectural_decisions:
  - id: ARCH-001
    question: "REVIEW.yaml write — YamlArtifactWriter does not support 'review' artifact type. Use writeProof() (exists) or write directly via fs/yaml?"
    decision: "Use direct fs/yaml write with the same atomic pattern as YamlArtifactWriter.atomicWrite. Import yaml from 'yaml' package, write to absolute path constructed from featureDir/storyId/REVIEW.yaml. This avoids modifying the persistence layer (out of scope) while staying consistent with existing patterns."
    rationale: "YamlArtifactWriter.writeProof() is the closest but would misname the file. Modifying path-resolver.ts to add 'review' type is out of APIP-1050 scope. Direct write is clean, localized, and consistent with how the review graph owns its own output."
    decided_by: autonomous

  - id: ARCH-002
    question: "ChangeSpec type — APIP-1020 not yet implemented. How should changeSpecs be typed in ReviewGraphState?"
    decision: "Type changeSpecs as z.string().array() (array of ChangeSpec IDs as strings) in the graph state. Workers receive them as opaque string IDs for now. The changeSpecId matching in fan-in performs a simple file-path string comparison. When APIP-1020 finalizes ChangeSpec schema, this can be migrated without breaking the fan-in logic."
    rationale: "Story specifies 'array of ChangeSpec IDs from APIP-1020' and mitigates missing schema with injectable mock override. String IDs are the safest forward-compatible shape."
    decided_by: autonomous

complexity: complex

notes:
  - "Story subtask ST-2 and ST-3 each exceed the 3-file-per-step recommendation (5 and 4 files respectively). This is acceptable because all workers follow the identical pattern — the repetition is deliberate and the elab/QA audit acknowledged this."
  - "APIP-0040 (model router) not yet built. LLM workers (react, typescript, reusability, accessibility, security) use injectable modelRouterOverride in their ConfigSchema. Unit tests pass mock implementations."
  - "APIP-1030 (implementation graph) not yet built. worktreePath is received as input to runReview() and passed through to workers. Tests use mock paths."
  - "RankedPatchSchema extension (changeSpecId: z.string().nullable().default(null)) has default(null) — all existing parse calls continue to work without modification."
  - "REVIEW.yaml is written directly using the yaml package + fs.promises (atomic pattern), not via YamlArtifactWriter — see ARCH-001."
  - "The fan-in node is the most complex node: it must handle partial results gracefully if a worker never wrote to state (append-reducer state means no worker is blocking)."
  - "NodeCircuitBreaker for security worker wraps only the Claude call — not the budget check. Budget check runs first (fast, no I/O), then circuit breaker gates the Claude call."
  - "Thread ID convention per APIP ADR-001: const threadId = storyId:review:attempt"
