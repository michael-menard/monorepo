feasible: true
confidence: high
rationale: >
  APIP-0040 is well-scoped and builds directly on proven existing infrastructure.
  The ModelRouter singleton, ILLMProvider interface, checkTokenBudget() enforcement,
  and Drizzle ORM wint schema all exist and are production-ready. The new
  PipelineModelRouter is an additive wrapper — no existing files in
  packages/backend/orchestrator/src/models/ are modified. Token-bucket rate
  limiting is a well-understood algorithm with no external dependencies beyond
  in-memory state. DB migration follows the established numbered SQL file pattern.
  Estimated implementation: 2-3 days for a developer familiar with the orchestrator codebase.
complexity: medium
change_surface:
  areas:
    - packages/backend/orchestrator/src/pipeline/ (new directory)
    - packages/backend/database-schema/src/schema/wint.ts (additive: new table reference)
    - apps/api/knowledge-base/src/db/migrations/016_wint_model_assignments.sql (new file)
  endpoints: []
  deploy_touchpoints:
    - "Run migration 016_wint_model_assignments.sql against wint schema before first pipeline dispatch"
    - "Set ANTHROPIC_API_KEY and OPENROUTER_API_KEY environment variables on dedicated pipeline server"
    - "Ensure Ollama is running locally on pipeline server (ADR-001 Decision 4)"

risks:
  - finding: "Token-bucket wait() using setTimeout must be compatible with vi.useFakeTimers() for deterministic testing"
    mitigation: "Implement bucket wait via setTimeout (not setInterval or Date.now loop). Vitest fake timers advance setTimeout natively. Document this requirement in the TokenBucket implementation comment."
  - finding: "BudgetExhaustedError prototype chain breaks across module boundaries in transpiled TypeScript"
    mitigation: "Set error.name explicitly in constructor: `this.name = 'BudgetExhaustedError'`. Add instanceof test in unit tests to verify prototype chain survives ts->js transpilation."
  - finding: "wint.model_assignments table must be idempotent (CREATE TABLE IF NOT EXISTS) so migration can be re-run safely"
    mitigation: "Migration SQL 016 uses CREATE TABLE IF NOT EXISTS wint.model_assignments (...). Verified pattern from existing numbered migration files."
  - finding: "Cache invalidation on write requires PipelineModelRouter to expose an invalidate() method or the DB write path must call it — coupling risk if DB writes happen from a different module"
    mitigation: "Expose public invalidateAssignmentsCache() method on PipelineModelRouter. Document that any write to wint.model_assignments must call this. Phase 0: single-process server means this is sufficient without distributed cache coordination."

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter @repo/orchestrator passes with all new unit tests green"
  - "pnpm check-types --filter @repo/orchestrator shows 0 type errors"
  - "Migration 016_wint_model_assignments.sql runs without error on test DB"
  - "PipelineModelRouterFactory.getInstance() === PipelineModelRouterFactory.getInstance() (singleton check)"
  - "BudgetExhaustedError thrown at hardBudgetCap; error.storyId, error.tokensUsed, error.budgetCap all present"
  - "Existing packages/backend/orchestrator/src/models/ files have no diff (AC-10)"

