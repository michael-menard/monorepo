feasible: true
confidence: medium
rationale: >
  The story is implementable using established patterns from the orchestrator package.
  The graph factory pattern (createMetricsGraph/runMetricsCollection) provides a clear
  structural template. The withTimeout runner primitive handles the mutation testing
  time-boxing requirement. The primary risk is the mutation testing tooling decision —
  if no vitest-stryker or equivalent plugin exists in the monorepo, AC-3 must be
  deferred to a follow-up story. All other ACs (assertion density, orphaned test
  detection, critical path coverage, decay detection, story generation, DB schema,
  cron registration, logging) are fully implementable without new external dependencies.
  Unit tests can proceed before APIP-3090 merges using InMemoryCronAdapter.
complexity: high
change_surface:
  areas:
    - "packages/backend/orchestrator/src/cron/jobs/test-quality-monitor.job.ts (new)"
    - "packages/backend/orchestrator/src/graphs/test-quality-monitor.ts (new)"
    - "packages/backend/orchestrator/src/collectors/assertion-density.ts (new)"
    - "packages/backend/orchestrator/src/collectors/mutation-score.ts (new)"
    - "packages/backend/orchestrator/src/collectors/orphaned-test.ts (new)"
    - "packages/backend/orchestrator/src/collectors/critical-path-coverage.ts (new)"
    - "packages/backend/orchestrator/src/collectors/decay-detector.ts (new)"
    - "packages/backend/orchestrator/src/collectors/test-improvement-story.ts (new)"
    - "packages/backend/database-schema/src/schema/wint.ts (add table — protected: existing tables unchanged)"
    - "packages/backend/database-schema/src/migrations/ (new sequential migration SQL)"
    - "packages/backend/orchestrator/src/graphs/__tests__/test-quality-monitor.test.ts (new)"
    - "packages/backend/orchestrator/src/collectors/__tests__/ (new test files per collector)"
  endpoints: []
  deploy_touchpoints:
    - "Run APIP-5007 migration runner to apply wint.test_quality_snapshots migration"
    - "Register test-quality-monitor cron job in CronJobRegistry (blocked on APIP-3090)"

risks:
  - finding: "Mutation testing tooling (vitest-stryker or equivalent) may not exist in monorepo"
    mitigation: >
      Dev feasibility must audit packages/backend/orchestrator/package.json for mutation
      testing plugins before starting AC-3. If no plugin exists, recommend splitting:
      deliver Part A (assertion density, orphaned test, coverage, decay, story gen, DB)
      immediately; defer Part B (mutation score) to a follow-up story after tooling is
      confirmed or added. This is the most likely split point.
  - finding: "Child process spawning for mutation runner may be unsafe in LangGraph Platform execution context"
    mitigation: >
      Scope mutation runs to a separate spawn/exec call with withTimeout wrapping. If
      spawning is blocked by the LangGraph Platform sandbox, fall back to executing
      mutation tests via a separate CI step and reading the results file; document this
      architectural decision in the story file.
  - finding: "Migration number must be coordinated with APIP-4010 and other Phase 4 stories"
    mitigation: >
      Check the highest existing migration number in packages/backend/database-schema/src/migrations/
      and assign the next sequential number. Do not assume a specific number — read the
      directory at implementation time.
  - finding: "withTimeout compatibility with vi.useFakeTimers() for MutationScoreCollector timeout tests"
    mitigation: >
      Verify that runner/timeout.ts uses setTimeout or Date.now in a way that vi.useFakeTimers()
      can intercept. If not, wrap the timeout mechanism to accept an injectable clock or
      use vi.spyOn(global, 'setTimeout') as fallback.

missing_requirements:
  - "Confirm whether vitest-stryker or a compatible mutation testing plugin is available or must be added to packages/backend/orchestrator/package.json"
  - "Confirm the snapshot store lookup strategy for MutationScoreCollector fallback — does it read from wint.test_quality_snapshots via DB query, or from an in-memory cache?"

evidence_expectations:
  - "pnpm check-types --filter @repo/orchestrator passes with no new errors"
  - "pnpm test --filter @repo/orchestrator passes with all new collector unit tests green"
  - "AssertionDensityCollector unit test with fixture files passes (HP-1)"
  - "OrphanedTestDetector unit test with fixture directory passes (HP-2, HP-3)"
  - "decayDetector unit test with snapshot pair showing mutation decay passes (HP-5)"
  - "generateTestImprovementStory unit test with StoryArtifactSchema validation passes (HP-6)"
  - "MutationScoreCollector timeout unit test with vi.useFakeTimers() passes (HP-9)"
  - "TestQualitySnapshotSchema parses a valid snapshot object without ZodError"
  - "CronRunResult logging test confirms @repo/logger called with correct fields (HP-8)"

