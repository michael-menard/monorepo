    subtask_id: "ST-1"
    description: "Design draft ChangeSpecSchema Zod schema with discriminated union variants (file_change, migration_change, config_change, test_change). Include schema: z.literal(1) version pinning. Cover all fields required by 6 consuming systems (implementation, review, QA, telemetry, affinity, merge). Export ChangeSpec type via z.infer<typeof ChangeSpecSchema>."
