      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-0010.yaml"
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-0020.yaml"
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-0040.yaml"
