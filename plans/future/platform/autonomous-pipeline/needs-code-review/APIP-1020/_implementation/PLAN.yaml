    dependencies:
      - 4
    slice: packages
    verification: "consumer-validation.yaml exists with all 6 systems documented and gap analysis complete"
    acs_covered:
      - "AC-4"

  - id: 6
    subtask_id: "ST-6"
    description: "Publish ADR-002-changespec-schema.md. Include: schema verdict (APPROVED / APPROVED WITH CONSTRAINTS / REVISION REQUIRED), decomposition quality metrics summary from quality-metrics.yaml, cost model (median token count + USD per story), model recommendation (Sonnet vs Haiku vs Opus), versioning strategy (z.literal increment process), and any field restrictions discovered during validation."
