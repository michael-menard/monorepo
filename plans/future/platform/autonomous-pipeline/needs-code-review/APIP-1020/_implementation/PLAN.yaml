    dependencies: []
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered:
      - "AC-1"
      - "AC-5"

  - id: 2
    subtask_id: "ST-2"
    description: "Write Vitest unit tests for ChangeSpecSchema covering all variants (HP-1 through HP-3), rejection cases (EC-1 through EC-3), edge cases (ED-1, ED-2), and the YAML decomposition parse test (HP-4). Follow plan.test.ts structure exactly."
