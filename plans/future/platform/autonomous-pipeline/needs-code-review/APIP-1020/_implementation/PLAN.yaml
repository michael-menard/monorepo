      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-5007.yaml"
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-5004.yaml"
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-5003.yaml"
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-5006.yaml"
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-5000.yaml"
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/quality-metrics.yaml"
    files_to_read:
      - "plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/decomposition-template.yaml"
      - "packages/backend/orchestrator/src/artifacts/change-spec.ts"
    dependencies:
      - 3
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator -- change-spec (HP-4 test: all YAMLs parse without ZodError)"
    acs_covered:
      - "AC-2"
      - "AC-3"
      - "AC-4"

  - id: 5
    subtask_id: "ST-5"
    description: "Validate ChangeSpec fields from all 6 consuming system perspectives using the APIP-0020 decomposition. For each system (implementation, review, QA, telemetry, affinity, merge), confirm all required fields per Architecture Notes table are present. Document any gaps. Write findings to consumer-validation.yaml."
