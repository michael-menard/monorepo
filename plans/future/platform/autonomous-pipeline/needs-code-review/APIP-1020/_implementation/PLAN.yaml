complexity: moderate

notes:
  - "This is a spike — all output is research artifacts (Zod schema, YAML decompositions, ADR). No integration code produced."
  - "AC-8 is a negative constraint: verify no step creates integration wiring. All files_to_change are schema definitions, test files, YAML data files, or documentation."
  - "ST-4 is the heaviest step (~20K tokens estimate). Each of the 10 decompositions should be timeboxed to 30 minutes per story feasibility notes."
  - "HP-4 (all 10+ decomposition YAMLs parse without ZodError) is the key regression test linking ST-4 back to ST-2. The test must glob-read the decompositions/ directory."
  - "Follow PlanSchema z.literal(1) pattern exactly from packages/backend/orchestrator/src/artifacts/plan.ts — do not import FileChangeSchema as-is, use as field-level inspiration only."
  - "APIP-1010 change_outline format is undefined at spike time — document this assumption in ADR-002 and note re-validation needed before APIP-1030."
  - "Step dependency chain is linear: ST-1 -> ST-2, ST-3 -> ST-4 -> ST-5 -> ST-6. ST-2 and ST-3 both depend only on ST-1 and can run in parallel."
  - "No Lambda, no APIGW, no DB changes, no frontend — pure packages/orchestrator + spike output files."
