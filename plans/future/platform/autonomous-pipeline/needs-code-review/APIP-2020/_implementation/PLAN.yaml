architectural_decisions:
  - id: ARCH-001
    question: "Which operator auth mechanism should protect GET /monitor/pipeline? Options: (a) reuse existing Cognito auth middleware, (b) static API key header, (c) VPN-only with no app-level auth"
    decision: "Option (a): Reuse existing Cognito auth middleware (apps/api/lego-api/middleware/auth.ts) with operator group/role check"
    rationale: "Aggressive autonomy default. Existing auth middleware has dev bypass (AUTH_BYPASS=true), JWT verification, and group-based access control. Applying domain.use('*', auth) in monitor/routes.ts is consistent with how gallery, wishlist, and mocs domains handle auth. No new auth code needed. For operator access, the monitor route can additionally check that user.groups includes 'operator' or 'admin' (same as adminAuth pattern)."
    decided_by: autonomous

  - id: ARCH-002
    question: "Should the monitor domain adapter use Drizzle ORM or raw SQL via DbClient interface?"
    decision: "Raw SQL via DbClient interface (same pattern as StoryRepository) for PipelineReadService in packages/backend/orchestrator; Drizzle ok/err for the lego-api monitor adapter layer"
    rationale: "PipelineReadService needs to use the wint.stories blocked_by VARCHAR column which is only on the raw SQL schema (story-repository.ts pattern). The lego-api domain adapter (repositories.ts) will use Drizzle with the unified-wint schema where possible, following the wishlist domain ok/err result type pattern. For blocked_by, will query metadata JSONB or fall back to the story_dependencies join — implementation detail for ST-2."
    decided_by: autonomous

  - id: ARCH-003
    question: "Where is the lego-api main entry point for route registration? (app.ts not found)"
    decision: "Route registration is in apps/api/lego-api/server.ts (not app.ts). Import monitor domain and call app.route('/monitor', monitor) after the existing domain route registrations."
    rationale: "Canonical reference in story points to apps/api/lego-api/src/app.ts but actual file is apps/api/lego-api/server.ts (confirmed by file read). Route registration pattern matches: import health from './domains/health/routes.js'; app.route('/health', health)."
    decided_by: autonomous

complexity: complex

