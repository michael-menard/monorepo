# ─────────────────────────────────────────────────────────────────────────────
# AC-11 Autonomous Resolution (aggressive autonomy)
# ─────────────────────────────────────────────────────────────────────────────
# Auth mechanism decision for GET /monitor/pipeline:
# Decision: Reuse existing Cognito auth middleware (option a from AC-11).
# Apply `domain.use('*', auth)` in monitor/routes.ts following the existing
# domain auth registration pattern (same as wishlist, gallery, etc.).
# The existing middleware at apps/api/lego-api/middleware/auth.ts handles
# JWT verification and dev bypass — no new auth code needed.
# Rationale: aggressive autonomy default is "use existing Cognito middleware".
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# AC-13 Kickoff Coordination Note
# ─────────────────────────────────────────────────────────────────────────────
# APIP-5005 (Minimal Operator Visibility CLI) is unmerged as of 2026-02-28.
# This story (APIP-2020) creates PipelineReadService at:
#   packages/backend/orchestrator/src/services/pipeline-read-service.ts
# APIP-5005 must reuse it when it merges.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Schema Note: Drizzle vs raw SQL divergence
# ─────────────────────────────────────────────────────────────────────────────
# The StoryRepository uses raw SQL against wint.stories (with blocked_by VARCHAR
# column). The Drizzle unified-wint schema uses storyDependencies table for
# blocking relationships. For this story's monitor domain adapter (ST-2),
# use raw SQL via the DbClient interface (as in story-repository.ts pattern)
# rather than Drizzle, since wint.stories raw SQL is more reliable for
# blocked_by reads. This matches how PipelineReadService in ST-1 will be built.
# ─────────────────────────────────────────────────────────────────────────────

