feasible: true
confidence: high
rationale: >
  All required DB tables exist and are queryable (wint.stories, wint.token_usage,
  wint.story_state_transitions). StoryRepository read methods are directly reusable.
  Hono domain route pattern is established in lego-api. The dashboard host
  (apps/web/app-dashboard) already has the component primitives needed (StatsCards,
  ActivityFeed, Card). The only non-trivial risk is SSE stability under Lambda/API
  Gateway (29s timeout), which has a clear mitigation path (polling fallback). Story
  is strictly read-only, eliminating write-path complexity.

complexity: high
# High because: full-stack story spanning new Hono domain + Drizzle queries +
# shared PipelineReadService + React dashboard page + SSE stream + polling fallback
# + accessibility + Playwright E2E. Individual pieces are straightforward but the
# breadth across backend and frontend makes it a high-effort story (suggest 5 points).

change_surface:
  areas:
    - "apps/api/lego-api/domains/monitor/ (new Hono domain)"
    - "packages/backend/orchestrator/src/services/pipeline-read-service.ts (new shared service)"
    - "apps/web/app-dashboard/src/pages/monitor-page.tsx (new page)"
    - "apps/web/app-dashboard/src/components/PipelineViewPanel/ (new component)"
    - "apps/web/app-dashboard/src/components/CostPanel/ (new component)"
    - "apps/web/app-dashboard/src/components/BlockedQueuePanel/ (new component)"
    - "apps/web/app-dashboard/src/hooks/usePipelineMonitor.ts (new hook for polling/SSE)"
  endpoints:
    - "GET /monitor/pipeline (REST snapshot)"
    - "GET /monitor/pipeline/stream (SSE live updates)"
  deploy_touchpoints:
    - "Register new Hono /monitor routes in lego-api main app router"
    - "Confirm API Gateway proxy rewrite /api/v2/monitor -> /monitor exists (ADR-001)"
    - "Add /monitor/pipeline/stream to allowed CORS origins if cross-origin"

risks:
  - finding: >
      SSE endpoint GET /monitor/pipeline/stream will be silently dropped by API Gateway
      after 29 seconds if deployed to Lambda-backed Hono. Lambda has hard 29s max for
      API Gateway integrations, making persistent SSE connections impossible in that host.
    mitigation: >
      Implement polling-first design: the dashboard uses configurable interval polling
      (default 30s) as the primary mode. SSE is additive and should only be wired up
      if the monitor is hosted outside Lambda (e.g., on the LangGraph server from
      APIP-0030 or a dedicated monitor process). For v1, defer SSE to a follow-up or
      make it conditional on host type. AC-6 (SSE) should be scoped as a stretch goal
      or explicitly note the Lambda constraint.

  - finding: >
      wint.token_usage.storyId is a UUID FK to wint.stories.id, but the pipeline view
      needs to join on story_id (VARCHAR like 'APIP-0010'). A join through wint.stories
      is required: SELECT s.story_id, SUM(tu.total_tokens) FROM wint.token_usage tu
      JOIN wint.stories s ON tu.story_id = s.id GROUP BY s.story_id. Existing indexes
      on token_usage_story_id_idx should make this performant.
    mitigation: >
      Use the existing token_usage_story_id_idx index. Validate query plan with EXPLAIN
      in dev before merging. No new indexes needed unless query timing exceeds 500ms
      with 500-story seed (AC-9).

  - finding: >
      Operator auth for GET /monitor/pipeline (AC-4) is unspecified. The seed says
      "protected by operator auth or internal-only access" but the lego-api currently
      has no operator-role middleware defined.
    mitigation: >
      For v1, use a static internal API key passed as Authorization: Bearer header,
      validated in Hono middleware. PM must define the auth mechanism before dev starts
      (add to AC-4 requirements). Alternatively, deploy behind a VPN/internal network
      boundary and skip application-level auth for v1.

  - finding: >
      The shared PipelineReadService must be coordinated with APIP-5005 (CLI).
      If APIP-5005 is already merged before APIP-2020 starts, dev must refactor
      APIP-5005's read queries into the shared service during this story, which adds scope.
    mitigation: >
      Coordinate hand-off at story kickoff. If APIP-5005 is unmerged, extract
      PipelineReadService in this story. If merged, refactor APIP-5005 to consume it
      as a follow-up (non-blocking for APIP-2020 UAT).

  - finding: >
      APIP-2010 (Blocked Queue and Notification System) must be complete before
      blocked queue data is meaningful in the dashboard. If APIP-2010 is not merged,
      the BlockedQueuePanel will show empty state in UAT.
    mitigation: >
      Design BlockedQueuePanel with explicit empty state (not an error). For dev
      testing, seed wint.stories with manually set state=blocked rows. UAT must
      gate on APIP-2010 completion.

missing_requirements:
  - "AC-4: Operator auth mechanism must be specified — static API key, Cognito role, or VPN-only. Dev cannot implement auth check without this decision."
  - "AC-6: SSE scope must be clarified — is SSE in scope for Lambda-hosted lego-api, or deferred to a non-Lambda host? Resolve before dev starts to avoid rework."

evidence_expectations:
  - "GET /monitor/pipeline returns 200 with correctly shaped JSON (Zod-validated in integration test)"
  - "Query timing: EXPLAIN output shows index scan on token_usage_story_id_idx for aggregation query"
  - "AC-9: integration test with 500-story seed completes under 500ms"
  - "Playwright test: pipeline view table visible with live backend (no MSW)"
  - "Accessibility: axe-core audit passes on MonitorDashboardPage (0 critical violations)"

subtasks:
  - id: ST-1
    title: "Create PipelineReadService with story and token aggregation queries"
    goal: >
      Extract shared read logic into packages/backend/orchestrator/src/services/pipeline-read-service.ts.
      Implement getPipelineView() (all stories with state), getCostSummary() (token aggregation by story_id),
      and getBlockedQueue() (stories with state=blocked). Use existing StoryRepository patterns.
    files_to_read:
      - "packages/backend/orchestrator/src/db/story-repository.ts"
      - "packages/backend/database-schema/src/schema/unified-wint.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/services/pipeline-read-service.ts (create)"
    acs: ["AC-1", "AC-2", "AC-3", "AC-9"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/orchestrator && pnpm test --filter @repo/orchestrator"
    estimated_tokens: 9000

  - id: ST-2
    title: "Create Hono monitor domain routes and register in lego-api router"
    goal: >
      Create apps/api/lego-api/domains/monitor/routes.ts (thin Hono routes),
      application/services.ts (calls PipelineReadService), adapters/repositories.ts
      (Drizzle queries for monitor domain). Register /monitor route in lego-api main
      app. Implement GET /monitor/pipeline returning PipelineDashboardResponse shape.
      Add operator auth middleware (static API key or pass-through per PM decision).
    files_to_read:
      - "apps/api/lego-api/domains/health/routes.ts"
      - "apps/api/lego-api/domains/wishlist/adapters/repositories.ts"
    files_to_modify:
      - "apps/api/lego-api/domains/monitor/routes.ts (create)"
      - "apps/api/lego-api/domains/monitor/application/services.ts (create)"
      - "apps/api/lego-api/domains/monitor/adapters/repositories.ts (create)"
      - "apps/api/lego-api/src/app.ts (register /monitor)"
    acs: ["AC-4"]
    depends_on: ST-1
    verification: "pnpm check-types --filter lego-api && pnpm test --filter lego-api"
    estimated_tokens: 12000

  - id: ST-3
    title: "Implement SSE endpoint GET /monitor/pipeline/stream (conditional on host type)"
    goal: >
      Add GET /monitor/pipeline/stream to monitor routes using Hono streaming response.
      Emit pipeline-update events when story state changes (poll DB every 5s or hook
      into DB LISTEN/NOTIFY if available). Include reconnect guidance in SSE response
      headers. Note: if Lambda-hosted, add comment warning about 29s timeout and
      instruct consumers to fall back to polling. This subtask may be marked
      stretch-goal per PM/AC-6 resolution.
    files_to_read:
      - "apps/api/lego-api/domains/monitor/routes.ts"
    files_to_modify:
      - "apps/api/lego-api/domains/monitor/routes.ts (add /stream route)"
      - "apps/api/lego-api/domains/monitor/application/services.ts (add streamPipelineUpdates)"
    acs: ["AC-6"]
    depends_on: ST-2
    verification: "Manual test: curl -N GET /monitor/pipeline/stream receives event within 10s of DB change"
    estimated_tokens: 8000

  - id: ST-4
    title: "Create usePipelineMonitor hook with polling and SSE fallback"
    goal: >
      Create apps/web/app-dashboard/src/hooks/usePipelineMonitor.ts.
      Hook manages: initial fetch of GET /api/v2/monitor/pipeline, configurable
      polling interval (default 30s), optional SSE subscription to
      GET /api/v2/monitor/pipeline/stream, stale data detection, loading/error state.
      Uses EventSource with automatic reconnect (exponential backoff, 3 retries max).
      Falls back to polling if SSE unavailable. Returns { data, isLoading, isError,
      isStale, isLive } shape.
    files_to_read:
      - "apps/web/app-dashboard/src/components/ActivityFeed/index.tsx"
      - "apps/web/app-dashboard/src/pages/main-page.tsx"
    files_to_modify:
      - "apps/web/app-dashboard/src/hooks/usePipelineMonitor.ts (create)"
    acs: ["AC-5", "AC-6"]
    depends_on: ST-2
    verification: "pnpm test --filter app-dashboard -- usePipelineMonitor"
    estimated_tokens: 10000

  - id: ST-5
    title: "Create PipelineViewPanel, CostPanel, BlockedQueuePanel components"
    goal: >
      Create three panel components in apps/web/app-dashboard/src/components/.
      Each panel: loading skeleton (animate-pulse), error state (non-blocking, retry button),
      empty state, data-populated state. Use Card/CardHeader/CardContent from
      @repo/app-component-library. State badges color-coded per uiux-notes.yaml spec.
      All panels have aria-label, table has caption, aria-live region for refresh
      announcements.
    files_to_read:
      - "apps/web/app-dashboard/src/components/ActivityFeed/index.tsx"
      - "apps/web/app-dashboard/src/components/StatsCards.tsx"
    files_to_modify:
      - "apps/web/app-dashboard/src/components/PipelineViewPanel/index.tsx (create)"
      - "apps/web/app-dashboard/src/components/CostPanel/index.tsx (create)"
      - "apps/web/app-dashboard/src/components/BlockedQueuePanel/index.tsx (create)"
    acs: ["AC-1", "AC-2", "AC-3", "AC-7", "AC-8"]
    depends_on: ST-4
    verification: "pnpm test --filter app-dashboard -- PipelineViewPanel CostPanel BlockedQueuePanel"
    estimated_tokens: 14000

  - id: ST-6
    title: "Create MonitorDashboardPage composing all three panels"
    goal: >
      Create apps/web/app-dashboard/src/pages/monitor-page.tsx composing PipelineViewPanel,
      CostPanel, BlockedQueuePanel with usePipelineMonitor hook. Include live/polling
      status indicator in page header. Register page in app router at /monitor path.
      Ensure keyboard navigation and focus management on data refresh (AC-8).
    files_to_read:
      - "apps/web/app-dashboard/src/pages/main-page.tsx"
    files_to_modify:
      - "apps/web/app-dashboard/src/pages/monitor-page.tsx (create)"
      - "apps/web/app-dashboard/src/app.tsx (register /monitor route)"
    acs: ["AC-5", "AC-7", "AC-8"]
    depends_on: ST-5
    verification: "pnpm test --filter app-dashboard -- MonitorDashboardPage"
    estimated_tokens: 9000

  - id: ST-7
    title: "Write Playwright E2E test for pipeline view with live backend"
    goal: >
      Create apps/web/playwright/tests/monitor-pipeline.spec.ts.
      Seed wint.stories and wint.token_usage in test setup. Navigate to /monitor.
      Assert: pipeline view table visible, state badges present, no loading skeleton.
      Run with VITE_ENABLE_MSW=false (live backend per ADR-006). Must be a happy-path
      test without mocking.
    files_to_read:
      - "apps/web/app-dashboard/src/pages/monitor-page.tsx"
    files_to_modify:
      - "apps/web/playwright/tests/monitor-pipeline.spec.ts (create)"
    acs: ["AC-10"]
    depends_on: ST-6
    verification: "pnpm exec playwright test monitor-pipeline.spec.ts --project=chromium"
    estimated_tokens: 6000
