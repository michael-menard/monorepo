strategy: unit+integration+e2e
scope:
  endpoints:
    - "GET /monitor/pipeline"
    - "GET /monitor/pipeline/stream"
  ui_touched: true
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "GET /monitor/pipeline returns full dashboard payload"
    setup: "Seed wint.stories with 3 stories in states: in-progress, ready-to-work, blocked. Seed wint.token_usage with token records for each story."
    action: "Send GET /monitor/pipeline with valid operator auth header"
    expected: "200 JSON with pipeline_view array (3 stories, sorted in-progress first), cost_summary array (per-story token totals), blocked_queue array (1 blocked story with blocked_by and updated_at)"
    evidence: "Vitest integration test asserting response shape matches PipelineDashboardResponseSchema (Zod)"

  - id: HP-2
    title: "Pipeline View panel renders stories sorted by state priority"
    setup: "Mock GET /api/v2/monitor/pipeline to return stories with states: backlog, ready-to-work, in-progress"
    action: "Mount PipelineViewPanel component and wait for data load"
    expected: "Rows appear in order: in-progress, ready-to-work, backlog; each row shows story ID, title, state badge, last-updated timestamp"
    evidence: "Vitest + RTL: getByRole('table') rows in correct order; state badges present"

  - id: HP-3
    title: "Cost Panel aggregates token totals per story by phase"
    setup: "Seed wint.token_usage with 3 records for story APIP-0010: elaboration (5000 tokens), implementation (12000 tokens), review (3000 tokens)"
    action: "Send GET /monitor/pipeline; inspect cost_summary for APIP-0010"
    expected: "cost_summary entry shows total_tokens: 20000, breakdown by phase, model name populated"
    evidence: "Vitest integration test asserting aggregation correctness"

  - id: HP-4
    title: "Blocked Queue Panel shows blocked stories with block reason"
    setup: "Seed wint.stories with state=blocked, blocked_by='APIP-2010 dependency', updated_at set"
    action: "Mount BlockedQueuePanel component with seeded data"
    expected: "Panel displays story ID, block reason text, updated_at timestamp; panel uses warning color styling"
    evidence: "Vitest + RTL: getByText('APIP-2010 dependency') present; warning color class applied"

  - id: HP-5
    title: "Dashboard auto-refreshes every 30 seconds without full page reload"
    setup: "Mount MonitorDashboardPage; fake timers enabled"
    action: "Advance fake timer by 30 seconds"
    expected: "Second fetch to GET /api/v2/monitor/pipeline is triggered; panel data updates; stale indicator hidden after successful refresh"
    evidence: "Vitest + RTL: fetch mock called twice; no navigation event; stale indicator state changes"

  - id: HP-6
    title: "SSE endpoint emits pipeline-update event on story state change"
    setup: "Connect EventSource to GET /monitor/pipeline/stream; trigger a story state transition in wint.stories"
    action: "DB story state updated from ready-to-work to in-progress"
    expected: "SSE connection receives pipeline-update event with updated story data within 2 seconds"
    evidence: "Vitest integration test with real DB connection (ADR-006 live backend); event received with correct story_id and new state"

  - id: HP-7
    title: "Playwright E2E: pipeline view renders with live backend"
    setup: "Live backend running; wint.stories has at least 1 story; wint.token_usage has records"
    action: "Navigate to monitor dashboard page; wait for pipeline view to load"
    expected: "Pipeline View panel shows story rows with state badges; no loading skeleton visible after data loaded; page title 'Pipeline Monitor' visible"
    evidence: "Playwright test: await expect(page.getByRole('table')).toBeVisible(); first row state badge visible"

error_cases:
  - id: EC-1
    title: "GET /monitor/pipeline returns 503 — all panels show error state with retry button"
    setup: "Mock GET /api/v2/monitor/pipeline to return 503"
    action: "Mount MonitorDashboardPage"
    expected: "All three panels show non-blocking error state; retry button visible in each panel; no crash"
    evidence: "Vitest + RTL: getByRole('button', { name: /retry/i }) found in each panel container"

  - id: EC-2
    title: "SSE connection drops — frontend falls back to polling"
    setup: "Mount MonitorDashboardPage with SSE enabled; simulate EventSource error event"
    action: "SSE connection emits error event"
    expected: "Frontend logs reconnect attempt; falls back to polling interval if reconnect fails after N retries; 'Refreshing every 30s' indicator shown"
    evidence: "Vitest + RTL: polling fallback state active; indicator text changed"

  - id: EC-3
    title: "GET /monitor/pipeline with no stories — empty state shown"
    setup: "Seed wint.stories with 0 rows"
    action: "Send GET /monitor/pipeline"
    expected: "200 response with empty pipeline_view: [], empty blocked_queue: []; frontend panels show empty state message not error"
    evidence: "Vitest integration test; RTL: getByText(/no stories/i) visible in pipeline panel"

  - id: EC-4
    title: "wint.token_usage has no records — cost panel shows zero totals"
    setup: "wint.stories has stories but wint.token_usage is empty"
    action: "Send GET /monitor/pipeline"
    expected: "cost_summary array returned with total_tokens: 0 entries or empty array; frontend cost panel shows empty state not error"
    evidence: "Vitest integration test; frontend RTL empty state assertion"

  - id: EC-5
    title: "Unauthorized request to GET /monitor/pipeline returns 401"
    setup: "No auth header or invalid token provided"
    action: "Send GET /monitor/pipeline without auth"
    expected: "401 Unauthorized response; no data leaked"
    evidence: "Vitest integration test asserting 401 status code"

edge_cases:
  - id: ED-1
    title: "wint.stories has 500 stories — query completes under 500ms"
    setup: "Seed wint.stories with 500 rows across all states; seed wint.token_usage with proportional records"
    action: "Send GET /monitor/pipeline; record query timing"
    expected: "Response received in under 500ms; all 500 stories in pipeline_view"
    evidence: "Vitest integration test with timing assertion (Date.now() delta)"

  - id: ED-2
    title: "Story has null blocked_by — blocked queue panel handles gracefully"
    setup: "Seed wint.stories with state=blocked and blocked_by=null"
    action: "Mount BlockedQueuePanel with this data"
    expected: "Panel shows story with 'Unknown' or dash for block reason; no crash"
    evidence: "Vitest + RTL: no error thrown; null handled by Zod optional field"

  - id: ED-3
    title: "SSE stream emits rapid successive events — frontend debounces panel updates"
    setup: "EventSource mock emits 10 pipeline-update events in 100ms"
    action: "10 events fired rapidly"
    expected: "UI renders final state; intermediate renders are debounced; no visible flicker"
    evidence: "Vitest + RTL: final panel state matches last event; render count checked with spy"

  - id: ED-4
    title: "Refresh interval configured to 60 seconds — respects custom config"
    setup: "Mount MonitorDashboardPage with refreshInterval={60000}"
    action: "Advance fake timer 30 seconds"
    expected: "No refetch triggered at 30s; fake timer advanced to 60s triggers refetch"
    evidence: "Vitest + RTL: fetch mock called only once after 30s advance"

tooling_evidence:
  backend:
    http_requests:
      - "GET /monitor/pipeline with Authorization: Bearer {operator_token}"
      - "GET /monitor/pipeline with no auth header (expect 401)"
      - "GET /monitor/pipeline/stream — SSE connection test"
    assertions:
      - "200 status, Content-Type: application/json"
      - "Response body matches PipelineDashboardResponseSchema (Zod)"
      - "pipeline_view[0].state === 'in-progress' (sorted first)"
      - "cost_summary[*].total_tokens is number"
      - "blocked_queue[*].blocked_by is string or null"
      - "SSE: Content-Type: text/event-stream"
  frontend:
    playwright_runs:
      - "Navigate to /monitor — pipeline view table visible"
      - "Wait for data load — no skeleton visible"
      - "State badge for each row visible"
      - "Cost panel shows at least one row with token count"
    assertions:
      - "page.getByRole('table') is visible"
      - "page.getByTestId('pipeline-view-panel') has rows"
      - "page.getByTestId('cost-panel') has at least one cost row"
      - "Keyboard navigation: Tab reaches all interactive elements"
      - "ARIA: all panels have aria-label"

manual_cases:
  - id: MC-1
    title: "SSE live update visible in browser"
    steps:
      - "Open monitor dashboard in browser"
      - "Confirm green 'Live' badge visible (SSE connected)"
      - "Trigger a story state change in DB"
      - "Observe panel update without page reload"
    expected: "Panel data updates within 2 seconds without manual refresh"

  - id: MC-2
    title: "Stale data indicator appears after missed refresh"
    steps:
      - "Open monitor dashboard"
      - "Disconnect network after initial load"
      - "Wait for next refresh cycle (30s)"
      - "Observe stale data indicator"
    expected: "Visual indicator (e.g., amber dot or text) shows data is stale"

fixture_definitions:
  - name: "seeded_pipeline_stories"
    type: "DB seed"
    description: "3 wint.stories rows with states: in-progress, ready-to-work, blocked"
  - name: "seeded_token_usage"
    type: "DB seed"
    description: "wint.token_usage rows for seeded stories: elaboration + implementation phases"
  - name: "blocked_story_seed"
    type: "DB seed"
    description: "1 wint.stories row with state=blocked, blocked_by='Test block reason'"
  - name: "large_story_set"
    type: "DB seed"
    description: "500 wint.stories rows for performance testing"
  - name: "operator_auth_token"
    type: "Auth fixture"
    description: "Valid operator JWT or internal API key for endpoint auth"

risks:
  - "SSE integration tests require a running server process — may need dedicated test server setup"
  - "Query performance test (ED-1) requires 500-row seed which may be slow to set up in CI"
  - "UAT depends on APIP-2010 being merged for blocked queue to have real data"
  - "Frontend polling interval tests rely on fake timers — ensure vitest fake timer setup does not interfere with Drizzle or other async operations"
  - "Operator auth mechanism not fully specified — AC-4 auth check may need adjustment based on infrastructure decision"
