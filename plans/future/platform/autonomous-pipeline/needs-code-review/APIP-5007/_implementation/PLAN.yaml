architectural_decisions:
  - id: ARCH-001
    question: "Where should the APIP pipeline SQL migration files live? apps/api/autonomous-pipeline/migrations/ or a new packages/backend/pipeline-schema/ directory?"
    decision: "apps/api/autonomous-pipeline/migrations/"
    rationale: "The APIP pipeline runs on a dedicated local Docker Compose server (ADR-001 Decision 4), not AWS Lambda. Placing migrations alongside the pipeline app code in apps/api/autonomous-pipeline/ is consistent with the KB pattern (apps/api/knowledge-base/src/db/migrations/). No shared package infrastructure is needed — this is a local-only server schema. The ADR-002 will confirm this path."
    decided_by: auto
    autonomy_tier: 1
  - id: ARCH-002
    question: "Should APIP-5007 attempt to actually run @langchain/langgraph-checkpoint-postgres to observe checkpoint tables (requires installing the package), or document the known table list from LangGraph documentation?"
    decision: "Document known table list from LangGraph source/documentation plus package.json inspection; do not attempt live package execution in ST-1"
    rationale: "ST-1 is a documentation spike, not a runtime test. The story's Architecture Notes already identifies the expected tables (checkpoints, checkpoint_blobs, checkpoint_writes, checkpoint_migrations). The spike output should verify these against LangGraph source/npm package contents without requiring a live database. Live execution testing belongs to HP-3 in the test plan. This avoids npm install side-effects in the planning artifact phase."
    decided_by: auto
    autonomy_tier: 1

complexity: moderate

