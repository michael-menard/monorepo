notable_decisions:
  - "Sequential SQL scripts pattern (matching KB API) chosen over Drizzle Kit — pipeline tables have no Drizzle ORM schema files, coupling DDL to Drizzle would be misleading"
  - "LangGraph checkpoint tables fully delegated to library setup() — prevents 014-style orphaned object accumulation"
  - "apip schema namespace isolates pipeline DDL from public schema (LangGraph) and main app tables"
  - "Thread ID format {story_id}:{stage}:{attempt_number} chosen for human readability and log correlation"
  - "Rollback categorized into three tiers (additive/destructive/enum) to give operators a clear risk profile before executing rollbacks"

known_deviations:
  - "No migration runner script implemented in this story — APIP-5007 scope is documentation + DDL only. Runner script is a dependency for APIP-5001."

