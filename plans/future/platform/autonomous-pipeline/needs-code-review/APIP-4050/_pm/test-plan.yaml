strategy: unit
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "DeadCodeReaperConfigSchema parses valid config with defaults"
    setup: "No setup required — pure schema validation"
    action: "Call DeadCodeReaperConfigSchema.parse({}) and DeadCodeReaperConfigSchema.parse({ minAgeDays: 60, maxFindingsPerRun: 25, dryRun: true })"
    expected: "First parse returns { minAgeDays: 30, excludePatterns: ['**/*.d.ts', '**/generated*', '**/__mocks__/**'], maxFindingsPerRun: 50, timeoutMs: 300000, dryRun: false }; second parse overrides specified fields"
    evidence: "Test assertion on parsed object fields"

  - id: HP-2
    title: "scanDeadExports extracts findings from mock ts-prune output"
    setup: "Mock execFn returns a string simulating ts-prune output: 'src/utils/helper.ts:42 - unusedHelper (function)\\nsrc/components/Button.tsx:10 - OldButton (class)'"
    action: "Call scanDeadExports(mockExecFn, config) where config.excludePatterns = []"
    expected: "Returns DeadExportFindingSchema[] with two entries: { filePath: 'src/utils/helper.ts', symbolName: 'unusedHelper', symbolType: 'function', lineNumber: 42, reason: 'unexported-with-no-callers' } and { filePath: 'src/components/Button.tsx', symbolName: 'OldButton', symbolType: 'class', lineNumber: 10, reason: 'unexported-with-no-callers' }"
    evidence: "Array length === 2, each entry validates against DeadExportFindingSchema"

  - id: HP-3
    title: "scanUnusedDeps extracts findings from mock depcheck JSON output"
    setup: "Mock execFn returns JSON string: '{\"dependencies\": [\"lodash\"], \"devDependencies\": [\"jest\"]}' for a given package.json path"
    action: "Call scanUnusedDeps(mockExecFn, config) targeting packages/backend/orchestrator/package.json"
    expected: "Returns UnusedDepFindingSchema[] with entries: { packageJsonPath: 'packages/backend/orchestrator/package.json', depName: 'lodash', depType: 'dependencies' } and { packageJsonPath: '...', depName: 'jest', depType: 'devDependencies' }"
    evidence: "Array length === 2, each entry validates against UnusedDepFindingSchema"

  - id: HP-4
    title: "microVerify returns status: safe when mock typecheck reports zero errors"
    setup: "Mock execFn returns empty string (no type errors); dryRun: false simulated by not writing real files"
    action: "Call microVerify(finding, mockExecFn, { dryRun: true }) where finding is a valid DeadExportFinding"
    expected: "Returns MicroVerifyResultSchema with { status: 'safe', typeCheckOutput: '', durationMs: <number> }"
    evidence: "result.status === 'safe', result.durationMs >= 0"

  - id: HP-5
    title: "microVerify returns status: false-positive when mock typecheck reports type errors"
    setup: "Mock execFn returns 'error TS2345: Argument of type...' simulating type check failure"
    action: "Call microVerify(finding, mockExecFn, { dryRun: true })"
    expected: "Returns MicroVerifyResultSchema with { status: 'false-positive', typeCheckOutput: 'error TS2345:...' }"
    evidence: "result.status === 'false-positive', result.typeCheckOutput contains 'error TS'"

  - id: HP-6
    title: "runDeadCodeReaper with dryRun:true returns DeadCodeReaperResultSchema-conformant result"
    setup: "Mock execFn returns valid ts-prune/depcheck output; config has dryRun: true, maxFindingsPerRun: 3, timeoutMs: 30000"
    action: "Call runDeadCodeReaper(config) with all three scan mocks returning 1 finding each"
    expected: "Returns object conforming to DeadCodeReaperResultSchema: { findings[], verifiedDeletions[], falsePositives[], unverified[], status: 'success' | 'partial' } with no file system writes"
    evidence: "DeadCodeReaperResultSchema.parse(result) succeeds without throwing"

  - id: HP-7
    title: "generateCleanupStory output passes StoryArtifactSchema.parse()"
    setup: "Provide a valid DeadCodeReaperResult with 2 verifiedDeletions, each with filePath, symbolName, and micro-verify evidence"
    action: "Call generateCleanupStory(result, config) and parse the written YAML with StoryArtifactSchema"
    expected: "Written YAML file at plans/future/platform/autonomous-pipeline/backlog/APIP-CLEANUP-NNNN/story.yaml parses without error via StoryArtifactSchema.parse()"
    evidence: "StoryArtifactSchema.parse(parsedYaml) does not throw; story id matches APIP-CLEANUP-NNNN pattern"

  - id: HP-8
    title: "CronRunResult log entry emitted with correct fields on successful run"
    setup: "Valid config, mock execFn returning minimal findings, dryRun: true"
    action: "Call runDeadCodeReaper(config) and capture structured log output"
    expected: "Log contains CronRunResult with jobName: 'dead-code-reaper', startedAt: <ISO string>, completedAt: <ISO string>, durationMs: <positive number>, status: 'success', findingsTotal, verifiedDeletions, falsePositives, cleanupStoriesGenerated"
    evidence: "Structured log assertion on captured @repo/logger output"

  - id: HP-9
    title: "excludePatterns filters out matching files from scanDeadExports results"
    setup: "Mock execFn returns findings including 'src/generated/types.d.ts:1 - GeneratedType (type)'; config.excludePatterns = ['**/*.d.ts', '**/generated*']"
    action: "Call scanDeadExports(mockExecFn, config)"
    expected: "Finding for 'src/generated/types.d.ts' is absent from results"
    evidence: "result.every(f => !f.filePath.includes('generated')) === true"

error_cases:
  - id: EC-1
    title: "DeadCodeReaperConfigSchema rejects invalid minAgeDays (negative number)"
    setup: "No setup required"
    action: "Call DeadCodeReaperConfigSchema.parse({ minAgeDays: -5 })"
    expected: "Throws ZodError with message referencing minAgeDays"
    evidence: "expect(() => parse({ minAgeDays: -5 })).toThrow(ZodError)"

  - id: EC-2
    title: "DeadCodeReaperConfigSchema rejects invalid timeoutMs (zero)"
    setup: "No setup required"
    action: "Call DeadCodeReaperConfigSchema.parse({ timeoutMs: 0 })"
    expected: "Throws ZodError"
    evidence: "expect(() => parse({ timeoutMs: 0 })).toThrow(ZodError)"

  - id: EC-3
    title: "microVerify returns status: error when execFn throws"
    setup: "Mock execFn throws Error('Command failed: pnpm check-types')"
    action: "Call microVerify(finding, throwingExecFn, { dryRun: true })"
    expected: "Returns MicroVerifyResultSchema with { status: 'error', typeCheckOutput: 'Command failed: pnpm check-types' }"
    evidence: "result.status === 'error'"

  - id: EC-4
    title: "runDeadCodeReaper returns status: partial on timeout via withTimeout"
    setup: "Use vi.useFakeTimers(); config.timeoutMs = 1; mock execFn that never resolves (simulating slow ts-prune)"
    action: "Call runDeadCodeReaper(config); advance fake timers past timeoutMs"
    expected: "Returns DeadCodeReaperResultSchema with status: 'partial', containing whatever findings were accumulated before deadline"
    evidence: "result.status === 'partial'; DeadCodeReaperResultSchema.parse(result) succeeds"

  - id: EC-5
    title: "Advisory lock skip — concurrent invocation exits with status: skipped"
    setup: "Mock pg_try_advisory_lock to return false (lock already held)"
    action: "Call runDeadCodeReaper(config) with mocked advisory lock"
    expected: "Returns CronRunResult with status: 'skipped'; no scan functions are invoked"
    evidence: "result.status === 'skipped'; mockExecFn.calls.length === 0"

  - id: EC-6
    title: "scanDeadExports with empty ts-prune output returns empty array"
    setup: "Mock execFn returns empty string"
    action: "Call scanDeadExports(mockExecFn, config)"
    expected: "Returns [] (empty array)"
    evidence: "result.length === 0"

  - id: EC-7
    title: "generateCleanupStory with zero verifiedDeletions produces no story file"
    setup: "DeadCodeReaperResult with verifiedDeletions: []"
    action: "Call generateCleanupStory(emptyResult, config)"
    expected: "No CLEANUP story files written; function returns null or empty result"
    evidence: "No new files exist in backlog directory after call"

edge_cases:
  - id: ED-1
    title: "Dynamic import guard — file only referenced via import(...) is NOT flagged by scanDeadExports"
    setup: "Mock execFn returns ts-prune output containing a file that is only used via dynamic import: 'src/lazy/widget.ts:1 - Widget (class)'; the file content (or ts-prune metadata) indicates dynamic import usage"
    action: "Call scanDeadExports(mockExecFn, config) where dynamic import guard is active"
    expected: "Widget from 'src/lazy/widget.ts' is absent from findings (filtered by dynamic import guard)"
    evidence: "result.every(f => f.filePath !== 'src/lazy/widget.ts') === true"

  - id: ED-2
    title: "maxFindingsPerRun cap — only N findings processed even if scans return more"
    setup: "Mock scan functions each return 20 findings (60 total); config.maxFindingsPerRun = 10"
    action: "Call runDeadCodeReaper(config)"
    expected: "Total findings processed <= 10; remaining findings are included in unverified[] with reason 'cap-reached'"
    evidence: "result.findings.length + result.unverified.length === 60; only 10 go through micro-verify"

  - id: ED-3
    title: "CLEANUP story ID sequencing — next available APIP-CLEANUP-NNNN is used"
    setup: "Backlog directory contains APIP-CLEANUP-0001/ and APIP-CLEANUP-0002/ directories"
    action: "Call generateCleanupStory(result, config)"
    expected: "New story is written to APIP-CLEANUP-0003/ with id: APIP-CLEANUP-0003"
    evidence: "Written story YAML has id: 'APIP-CLEANUP-0003'"

  - id: ED-4
    title: "scanUnusedDeps runs per-package.json, not a single top-level pass"
    setup: "Mock filesystem with 3 package.json files; mock execFn records which paths it receives"
    action: "Call scanUnusedDeps(mockExecFn, config)"
    expected: "execFn is called 3 times, once per package.json path"
    evidence: "mockExecFn.calls.length === 3; each call receives a different package.json path"

  - id: ED-5
    title: "withTimeout path — runDeadCodeReaper respects wall-clock deadline from config.timeoutMs"
    setup: "vi.useFakeTimers(); config.timeoutMs = 5000; mock execFn delays 3000ms per call"
    action: "Call runDeadCodeReaper(config); advance timers to 5001ms"
    expected: "Function resolves with status: 'partial' (not hanging); accumulated findings included"
    evidence: "result.status === 'partial'; test does not timeout in CI"

  - id: ED-6
    title: "scanUnusedFiles returns empty array when TypeScript compiler finds no orphan files"
    setup: "Mock execFn returns valid TypeScript compiler output with no 'no-importers' entries"
    action: "Call scanUnusedFiles(mockExecFn, config)"
    expected: "Returns [] (empty array)"
    evidence: "result.length === 0"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "DeadCodeReaperConfigSchema.parse() validates all required fields with defaults"
      - "DeadExportFindingSchema.parse() validates finding shape"
      - "UnusedFileFindingSchema.parse() validates file finding shape"
      - "UnusedDepFindingSchema.parse() validates dep finding shape"
      - "MicroVerifyResultSchema.parse() validates micro-verify result"
      - "DeadCodeReaperResultSchema.parse() validates full run result"
      - "StoryArtifactSchema.parse() validates generated CLEANUP story YAML"
      - "CronRunResult contains all required fields: jobName, startedAt, completedAt, durationMs, status, summary counts"
  frontend:
    playwright_runs: []
    assertions: []

manual_cases:
  - id: MC-1
    title: "Integration verification: ts-prune output parsing on real monorepo"
    steps:
      - "Tag test as [integration, requires-monorepo]"
      - "Run scanDeadExports with real execFn against packages/backend/orchestrator/"
      - "Inspect findings for false positives vs known dead exports"
    expected: "Findings list is non-empty; known dead symbols appear; dynamic imports and generated files are excluded"

fixture_definitions:
  - name: mockTsPruneOutput
    type: string
    description: "Simulated ts-prune stdout string with 2-3 entries in 'path:line - symbol (type)' format"
  - name: mockDepcheckJson
    type: string
    description: "Simulated depcheck JSON output with dependencies and devDependencies arrays"
  - name: mockTypeCheckEmpty
    type: string
    description: "Empty string representing zero type errors from pnpm check-types"
  - name: mockTypeCheckError
    type: string
    description: "String containing 'error TS2345:...' simulating type check failure"
  - name: validDeadCodeReaperConfig
    type: DeadCodeReaperConfig
    description: "Valid config object with all required fields; dryRun: true for unit test safety"
  - name: sampleDeadExportFinding
    type: DeadExportFinding
    description: "Single finding with filePath, symbolName: 'orphanHelper', symbolType: 'function', lineNumber: 42, reason: 'unexported-with-no-callers'"
  - name: sampleDeadCodeReaperResult
    type: DeadCodeReaperResult
    description: "Full result object with 2 verifiedDeletions, 1 falsePositive, status: 'success'"

risks:
  - "microVerify in non-dryRun mode makes real filesystem writes — unit tests MUST use dryRun: true to avoid state pollution"
  - "vi.useFakeTimers() for timeout tests (ED-5, EC-4) must be restored in afterEach to prevent leaking into sibling tests"
  - "CLEANUP story ID sequencing test (ED-3) requires temp directory cleanup after each test run"
  - "ts-prune output format may change between versions — pin ts-prune version and document expected output format in fixture"
  - "depcheck JSON schema varies by version — validate mock output matches currently installed depcheck version"
  - "Advisory lock test (EC-5) requires pg_try_advisory_lock mock — ensure the mock is scoped to the test module and not leaked globally"
