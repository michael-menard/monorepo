strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Schema unit tests pass without live DB"
    setup: "No setup required — pure in-memory Drizzle/Zod schema validation"
    action: "Run pnpm test in pipeline package — schema unit tests validate all checkpoint table definitions are exported and Zod schemas can parse valid insert/select shapes"
    expected: "All schema unit tests pass; Drizzle table definitions export correctly; Zod schemas parse valid checkpoint record shapes"
    evidence: "pnpm test output shows schema test suite passes with no failures"

  - id: HP-2
    title: "Migration runner applies SQL files in order to clean DB"
    setup: "Start test DB container via compose.test-db.yaml on port 5434; verify container healthy"
    action: "Run migration runner script (e.g., pnpm db:migrate:test) pointing at test DB URL"
    expected: "All numbered SQL files applied in sequence; checkpoint tables (checkpoints, checkpoint_blobs, checkpoint_writes, checkpoint_migrations) exist in DB; script exits 0"
    evidence: "Migration runner logs each file applied; psql query confirms table existence"

  - id: HP-3
    title: "testConnection() returns success against running test DB"
    setup: "Test DB container running and migrations applied"
    action: "Integration test calls testConnection() with PIPELINE_DB_HOST/PORT/etc env vars set to test container"
    expected: "testConnection() returns { success: true } within 30s timeout"
    evidence: "Integration test assertion passes; no pool exhaustion errors"

  - id: HP-4
    title: "Full fixture lifecycle: insert checkpoint record and read back"
    setup: "Test DB container running, migrations applied, test DB client configured"
    action: "Integration test inserts a minimal checkpoint record (thread_id, checkpoint_id, type, checkpoint blob) and reads it back via SELECT"
    expected: "Insert succeeds; SELECT returns inserted record with matching fields; teardown clears data between tests"
    evidence: "Test assertions pass on inserted vs. retrieved values"

  - id: HP-5
    title: "Migration runner is idempotent on already-migrated DB"
    setup: "Test DB with migrations already applied"
    action: "Run migration runner script a second time against same DB"
    expected: "Script exits 0 without errors; no duplicate tables or constraint violations; logs indicate migrations already applied or skipped"
    evidence: "Script exit code 0; no SQL errors in logs"

  - id: HP-6
    title: "vitest.config.ts sets fileParallelism: false and loads setupFiles"
    setup: "No runtime setup required"
    action: "Inspect vitest.config.ts in pipeline package; run pnpm test:pipeline"
    expected: "fileParallelism: false present; setupFiles references src/test/setup.ts; testTimeout: 30000; tests run sequentially"
    evidence: "vitest.config.ts file content check; test run completes without parallel DB contention errors"

error_cases:
  - id: EC-1
    title: "testConnection() returns failure when DB is unreachable"
    setup: "PIPELINE_DB_HOST set to invalid host or test container stopped"
    action: "Integration test calls testConnection() with bad credentials"
    expected: "testConnection() returns { success: false, error: '<sanitized error message>' } within timeout; no raw pg error leaked"
    evidence: "Error is sanitized (no stack traces, no password in output); { success: false } returned"

  - id: EC-2
    title: "Migration runner fails gracefully on invalid SQL file"
    setup: "Inject an invalid SQL file (e.g., 002_bad.sql with syntax error) into migrations directory"
    action: "Run migration runner script"
    expected: "Script exits with non-zero code; error message indicates which file failed; DB left in last successfully applied state (no partial apply)"
    evidence: "Exit code != 0; error output names failing file; prior migrations intact"

  - id: EC-3
    title: "Schema unit tests catch missing checkpoint table export"
    setup: "Temporarily remove one table export from checkpoint schema file"
    action: "Run schema unit tests"
    expected: "Tests fail with descriptive message indicating missing table definition"
    evidence: "Test failure output clearly identifies the missing export"

edge_cases:
  - id: ED-1
    title: "Pool does not share connections with @repo/db"
    setup: "Pipeline test DB client initialized alongside existing @repo/db usage"
    action: "Inspect test DB client source — verify Pool instance is standalone (not imported from @repo/db); verify max: 3 connection limit"
    expected: "Separate Pool instance; max: 3; no import from @repo/db package"
    evidence: "Code review / static analysis of client.ts confirms isolation"

  - id: ED-2
    title: "Test DB compose service does not conflict with ports 5432 / 5433"
    setup: "All existing compose services running (KB postgres on 5433, main postgres on 5432)"
    action: "Start compose.test-db.yaml service"
    expected: "Pipeline test DB starts on port 5434 (or another non-conflicting port); no port binding errors; KB and main postgres unaffected"
    evidence: "docker compose ps shows all services healthy; no EADDRINUSE errors"

  - id: ED-3
    title: "pnpm check-types passes with no errors for pipeline DB package"
    setup: "Pipeline DB package compiled"
    action: "Run pnpm check-types --filter pipeline (or equivalent)"
    expected: "Zero TypeScript errors; all Drizzle/Zod types inferred correctly"
    evidence: "check-types exits 0"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "testConnection() returns { success: boolean; error?: string }"
      - "Migration runner exits 0 on clean DB"
      - "Migration runner exits 0 on already-migrated DB (idempotent)"
      - "checkpoint, checkpoint_blobs, checkpoint_writes, checkpoint_migrations tables created"
      - "INSERT + SELECT checkpoint record round-trip succeeds"
      - "Pool max: 3 connections (isolated from @repo/db)"
  frontend: ~

manual_cases:
  - id: MC-1
    title: "Verify README.md documents test DB startup, migration, and teardown"
    steps:
      - "Open apps/api/pipeline/src/db/README.md (or equivalent)"
      - "Verify section: how to start the test DB"
      - "Verify section: how to run migrations"
      - "Verify section: how to add new migrations"
      - "Verify section: test isolation strategy (teardown between tests)"
    expected: "All four documentation requirements present and accurate"

  - id: MC-2
    title: "Verify pnpm commands exist for DB lifecycle (db:test:start, db:migrate:test)"
    steps:
      - "Open package.json in pipeline package"
      - "Confirm db:test:start or equivalent script starts test DB container"
      - "Confirm db:migrate:test or equivalent script applies migrations"
    expected: "Single pnpm command for each lifecycle action; consistent with KB postgres ergonomics"

fixture_definitions:
  - name: "MinimalCheckpointRecord"
    type: "DB insert fixture"
    description: "Minimal valid checkpoint record for insert/read-back tests: thread_id (UUID), checkpoint_id (UUID), type ('checkpoint'), checkpoint (BYTEA blob). Used in HP-4 and HP-7."

  - name: "TestDatabaseClient"
    type: "Test helper module"
    description: "Isolated Pool instance (max: 3) configured from PIPELINE_DB_* env vars; exports testConnection() returning { success: boolean; error?: string }. Modeled after KB client.ts."

  - name: "TestSetupFile"
    type: "Vitest setupFiles"
    description: "src/test/setup.ts that injects PIPELINE_DB_HOST, PIPELINE_DB_PORT, PIPELINE_DB_NAME, PIPELINE_DB_USER, PIPELINE_DB_PASSWORD env vars pointing to the test container before any test runs."

risks:
  - "LangGraph checkpoint-postgres package ships its own setup() method — if adopted, manual SQL migration files may be redundant. Must verify before writing custom schema SQL."
  - "Port 5434 assumed available; if occupied by another service, compose.test-db.yaml port must be adjusted."
  - "Integration test (HP-4) requires Docker daemon available in CI — must confirm CI environment supports Docker Compose compose file v3+ services."
  - "APIP-5007 may supersede the provisional migration runner — tests written against the runner script may need to be updated when APIP-5007 formalizes the migration framework."
  - "fileParallelism: false required for all test files sharing the test DB — missing this setting causes flaky test failures under concurrent vitest workers."
