feasible: true
confidence: high
rationale: >
  APIP-5001 is a well-scoped infrastructure story with clear canonical patterns to follow.
  The KB postgres setup (apps/api/knowledge-base/) provides exact templates for all four
  deliverables: test DB client, vitest setup file, vitest.config.ts, and migration runner.
  The @langchain/langgraph-checkpoint-postgres package ships its own SQL schema and setup()
  method, which may simplify or even replace the need for manual SQL migration files.
  The primary risk is determining whether the package's built-in setup() is sufficient
  (reducing scope) or whether custom SQL files are needed. This is a clarification,
  not a blocker — the story can proceed with either approach.
complexity: medium
change_surface:
  areas:
    - "apps/api/pipeline/src/db/ (new package/directory — checkpoint DB client, schema, migrations)"
    - "apps/api/pipeline/src/test/ (new test setup file)"
    - "apps/api/pipeline/vitest.config.ts (new or updated vitest config)"
    - "apps/api/pipeline/scripts/ (migration runner script)"
    - "infra/langgraph-server/ (compose.test-db.yaml or append to APIP-5006 compose file)"
    - "apps/api/pipeline/src/db/README.md (documentation)"
  endpoints: []
  deploy_touchpoints:
    - "Docker Compose service startup for test DB (local/CI)"
    - "Migration runner script execution (pnpm db:migrate:test)"

risks:
  - finding: >
      @langchain/langgraph-checkpoint-postgres may ship its own setup() method that
      handles schema creation internally. If so, custom SQL migration files (AC-2, AC-3)
      may be redundant or need to wrap the package's setup() rather than define schema SQL
      independently. Dev must inspect the package before writing SQL.
    mitigation: >
      Check @langchain/langgraph-checkpoint-postgres package source for a setup() or
      migrate() method. If available: (a) wrap it in a thin migration runner that calls
      setup() idempotently, (b) update AC-2/AC-3 to reflect this approach. If not
      available: write the SQL schema files manually based on the package's documented
      table requirements (checkpoints, checkpoint_blobs, checkpoint_writes,
      checkpoint_migrations).

  - finding: >
      APIP-5001 has a formal dependency on APIP-0010, but ADR-001 eliminated the
      PostgreSQL work queue. The actual dependency may be on APIP-0020 (which defines
      the checkpoint schema contract) or may have no meaningful dependency if the
      @langchain/langgraph-checkpoint-postgres package defines the schema itself.
    mitigation: >
      Dev should verify with the team: does any LangGraph-specific table schema need to
      be confirmed before writing migration SQL? If @langchain/langgraph-checkpoint-postgres
      defines the schema, APIP-5001 can proceed without waiting for APIP-0020. If custom
      schema columns are needed for the supervisor/worker graphs, align with APIP-0020 PM
      before writing SQL.

  - finding: >
      The apps/api/pipeline package may not yet exist as a proper pnpm workspace package.
      APIP-5001 deliverables (client.ts, vitest.config.ts, setup.ts, scripts/) all go in
      this package. If the package structure is not yet initialized (package.json,
      tsconfig.json, vitest.config.ts), those files must be created as part of this story.
    mitigation: >
      If apps/api/pipeline does not exist, create the minimal package scaffold as ST-1.
      Model the package.json, tsconfig.json, and vitest.config.ts after
      apps/api/knowledge-base/. Do not add to turbo pipeline until the package has
      meaningful source files.

missing_requirements:
  - >
    AC-2 says "or equivalent pipeline package location" — the exact location for
    apps/api/pipeline/ must be confirmed or created before implementation. If the
    pipeline package does not exist, ST-1 must create it.
  - >
    The story does not specify the PIPELINE_DB_PASSWORD variable name — must be
    consistent with PIPELINE_DB_HOST/PORT pattern. Document in AC-4 and README.

evidence_expectations:
  - "pnpm test passes (schema unit tests, HP-1)"
  - "pnpm test passes (integration lifecycle test, HP-4 / AC-7)"
  - "pnpm check-types passes with zero errors (AC-9)"
  - "Migration runner exits 0 on clean DB and on already-migrated DB (HP-2, HP-5)"
  - "testConnection() returns { success: true } against running test container (HP-3)"
  - "Docker Compose service starts on port 5434 without conflicting with 5432/5433 (ED-2)"

subtasks:
  - id: ST-1
    title: "Scaffold apps/api/pipeline package (if not yet initialized)"
    goal: >
      Create minimal pnpm workspace package for the pipeline service at apps/api/pipeline/.
      Includes package.json (with @langchain/langgraph-checkpoint-postgres, drizzle-orm,
      pg, drizzle-zod dependencies), tsconfig.json extending repo base, and
      vitest.config.ts modeled after apps/api/knowledge-base/vitest.config.ts with
      fileParallelism: false, testTimeout: 30000, setupFiles pointing to src/test/setup.ts.
    files_to_read:
      - "apps/api/knowledge-base/package.json"
      - "apps/api/knowledge-base/vitest.config.ts"
      - "apps/api/knowledge-base/tsconfig.json"
    files_to_modify:
      - "apps/api/pipeline/package.json (create)"
      - "apps/api/pipeline/tsconfig.json (create)"
      - "apps/api/pipeline/vitest.config.ts (create)"
    acs: ["AC-5", "AC-9"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/pipeline (or equivalent filter)"
    estimated_tokens: 6000

  - id: ST-2
    title: "Create test DB setup file (src/test/setup.ts)"
    goal: >
      Create apps/api/pipeline/src/test/setup.ts that injects PIPELINE_DB_HOST,
      PIPELINE_DB_PORT, PIPELINE_DB_NAME, PIPELINE_DB_USER, PIPELINE_DB_PASSWORD
      env vars pointing at the test container (localhost:5434) before any test runs.
      Pattern: exact copy of apps/api/knowledge-base/src/test/setup.ts with
      PIPELINE_DB_* variable names substituted for KB_DB_*.
    files_to_read:
      - "apps/api/knowledge-base/src/test/setup.ts"
    files_to_modify:
      - "apps/api/pipeline/src/test/setup.ts (create)"
    acs: ["AC-5"]
    depends_on: ST-1
    verification: "pnpm test --filter @repo/pipeline (setup file loads without error)"
    estimated_tokens: 4000

  - id: ST-3
    title: "Create checkpoint DB client module (src/db/client.ts)"
    goal: >
      Create apps/api/pipeline/src/db/client.ts with: isolated Pool instance (max: 3,
      NOT reusing @repo/db), env-var config reading PIPELINE_DB_* variables, error
      sanitization removing passwords from messages, testConnection() returning
      { success: boolean; error?: string }, getDbClient() returning Drizzle client,
      closeDbClient() for pool teardown. Direct model: apps/api/knowledge-base/src/db/client.ts.
    files_to_read:
      - "apps/api/knowledge-base/src/db/client.ts"
    files_to_modify:
      - "apps/api/pipeline/src/db/client.ts (create)"
    acs: ["AC-4"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/pipeline"
    estimated_tokens: 8000

  - id: ST-4
    title: "Check @langchain/langgraph-checkpoint-postgres setup() and define checkpoint schema"
    goal: >
      Inspect @langchain/langgraph-checkpoint-postgres package to determine if setup()
      handles schema creation internally. If yes: document the tables it creates and
      write a thin wrapper that calls setup() idempotently. If no: write
      001_langgraph_checkpoint_schema.sql under apps/api/pipeline/src/db/migrations/
      with tables: checkpoints, checkpoint_blobs, checkpoint_writes, checkpoint_migrations.
      Define corresponding Drizzle schema in apps/api/pipeline/src/db/schema.ts using
      drizzle-orm/pg-core + drizzle-zod.
    files_to_read:
      - "node_modules/@langchain/langgraph-checkpoint-postgres (package internals)"
      - "apps/api/knowledge-base/src/db/migrations/ (numbered SQL pattern)"
      - "packages/backend/database-schema/src/schema/__tests__/wint-schema.test.ts"
    files_to_modify:
      - "apps/api/pipeline/src/db/migrations/001_langgraph_checkpoint_schema.sql (create)"
      - "apps/api/pipeline/src/db/schema.ts (create)"
    acs: ["AC-2", "AC-6"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/pipeline; schema unit tests pass"
    estimated_tokens: 10000

  - id: ST-5
    title: "Create schema unit tests (no live DB)"
    goal: >
      Create apps/api/pipeline/src/db/__tests__/checkpoint-schema.test.ts that validates:
      all checkpoint table definitions are exported from schema.ts; Drizzle/Zod schemas
      can be constructed and parsed for each table's insert/select shape using valid
      fixture data; no live DB connection required. Pattern: directly follows
      packages/backend/database-schema/src/schema/__tests__/wint-schema.test.ts.
    files_to_read:
      - "packages/backend/database-schema/src/schema/__tests__/wint-schema.test.ts"
    files_to_modify:
      - "apps/api/pipeline/src/db/__tests__/checkpoint-schema.test.ts (create)"
    acs: ["AC-6"]
    depends_on: ST-4
    verification: "pnpm test --filter @repo/pipeline (schema unit tests pass)"
    estimated_tokens: 7000

  - id: ST-6
    title: "Create migration runner script (scripts/apply-migrations.ts)"
    goal: >
      Create apps/api/pipeline/scripts/apply-migrations.ts: reads all *.sql files from
      src/db/migrations/ in alphabetical order, applies each against the target DB URL
      (from env), idempotent (safe on already-migrated DB — use IF NOT EXISTS or
      checkpoint_migrations table tracking). Expose as pnpm db:migrate:test script in
      package.json. Design as minimal/throwaway — APIP-5007 will define the production
      migration framework and may supersede this script.
    files_to_read:
      - "apps/api/knowledge-base/src/db/migrations/ (SQL file naming pattern)"
      - "apps/api/pipeline/src/db/client.ts"
    files_to_modify:
      - "apps/api/pipeline/scripts/apply-migrations.ts (create)"
      - "apps/api/pipeline/package.json (add db:migrate:test script)"
    acs: ["AC-3"]
    depends_on: ST-3
    verification: "Run pnpm db:migrate:test against test container; exits 0; re-run exits 0 (idempotent)"
    estimated_tokens: 8000

  - id: ST-7
    title: "Create Docker Compose test DB service (infra/langgraph-server/compose.test-db.yaml)"
    goal: >
      Create infra/langgraph-server/compose.test-db.yaml (or append to APIP-5006 compose
      file if it exists) defining a PostgreSQL service for LangGraph checkpoint testing.
      Use port 5434 (not conflicting with 5432/5433/6379/9090). Include healthcheck,
      named volume, restart: unless-stopped. Environment: POSTGRES_USER=pipelineuser,
      POSTGRES_PASSWORD=TestPassword123!, POSTGRES_DB=pipeline_test.
      Add pnpm db:test:start script to pipeline package.json.
      Model: infra/compose.lego-app.yaml healthcheck/volume pattern.
    files_to_read:
      - "infra/compose.lego-app.yaml"
    files_to_modify:
      - "infra/langgraph-server/compose.test-db.yaml (create)"
      - "apps/api/pipeline/package.json (add db:test:start script)"
    acs: ["AC-1"]
    depends_on: ST-1
    verification: "docker compose -f infra/langgraph-server/compose.test-db.yaml up -d; service healthy"
    estimated_tokens: 6000

  - id: ST-8
    title: "Create integration test (full fixture lifecycle)"
    goal: >
      Create apps/api/pipeline/src/db/__tests__/checkpoint-integration.test.ts:
      (1) Call testConnection() — assert { success: true }
      (2) Insert minimal checkpoint record (thread_id, checkpoint_id, type, checkpoint blob)
      (3) SELECT and assert fields match
      (4) Teardown: DELETE inserted record
      Test must run against real test container (ADR-005); no mocks for DB calls.
      Requires test DB running (local: pnpm db:test:start + pnpm db:migrate:test).
      Mark test with skip/describe guard if PIPELINE_DB_HOST is not set to enable
      graceful CI behavior when test container is unavailable.
    files_to_read:
      - "apps/api/knowledge-base/src/db/client.ts"
      - "apps/api/pipeline/src/db/client.ts"
      - "apps/api/pipeline/src/db/schema.ts"
    files_to_modify:
      - "apps/api/pipeline/src/db/__tests__/checkpoint-integration.test.ts (create)"
    acs: ["AC-7"]
    depends_on: ["ST-3", "ST-5", "ST-6", "ST-7"]
    verification: "pnpm test --filter @repo/pipeline (with test DB running); integration test passes"
    estimated_tokens: 9000

  - id: ST-9
    title: "Write README.md for pipeline DB"
    goal: >
      Create apps/api/pipeline/src/db/README.md documenting:
      (1) How to start the test DB (pnpm db:test:start)
      (2) How to run migrations (pnpm db:migrate:test)
      (3) How to add new migrations (number the SQL file, drop in src/db/migrations/)
      (4) Test isolation strategy (DELETE/TRUNCATE in test teardown; fileParallelism: false)
      (5) Note that this migration runner is provisional and APIP-5007 will define the
      production migration strategy.
    files_to_read:
      - "apps/api/knowledge-base/README.md (if exists)"
    files_to_modify:
      - "apps/api/pipeline/src/db/README.md (create)"
    acs: ["AC-8"]
    depends_on: ["ST-6", "ST-7"]
    verification: "README.md contains all four required sections (manual review MC-1)"
    estimated_tokens: 4000
