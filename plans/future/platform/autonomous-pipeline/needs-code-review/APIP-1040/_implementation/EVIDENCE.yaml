notable_decisions:
  - "ARCH-001: 5 LLM workers use createLLMNode (60s/5-retries); KB Sync uses createToolNode (10s/2-retries) per AC-18"
  - "ARCH-002: Aggregate node is a dedicated sentinel-count pass-through distinct from DocReviewNode per AC-19"
  - "ARCH-003: ProposedFileChangeSchema operation enum excludes 'delete' intentionally; DocReviewNode blocks on any delete per EC-3"
  - "ARCH-004: gitCommitFn injectable in commit node config per OPP-005 for testability"
  - "OPP-001: createMockMergeEventPayload() shared fixture factory in api-docs-worker.test.ts, imported by all 6 test files"
  - "createDocGraphWithWorkers() factory added to enable injecting mock workers for testing without touching the default createDocGraph()"
  - "FIX-001 (fix-cycle-1): ElaborationResultSchema errors field expected string[] but state.errors contained NodeError[] from node-factory createBlockedUpdate. Fix: map errors to message strings in runElaboration result construction."
  - "FIX-002 (fix-cycle-1): afterStructurer routing added — structurer was hardwired to update_readiness, bypassing recalculateReadiness=false config. Fix: conditional edge using afterStructurer() checks recalculateReadiness flag."

known_deviations:
