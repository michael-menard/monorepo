steps:
  - id: 1
    subtask_id: "ST-1"
    description: >
      Define all Zod schemas at the top of doc-graph.ts: MergeEventPayloadSchema,
      DocWorkerResultSchema, DocWorkerConfigSchema, ProposedFileChangeSchema,
      DocCommitResultSchema, DocReviewResultSchema, and DocGraphConfigSchema.
      These are the type contracts for all downstream subtasks.
    files:
      - "packages/backend/orchestrator/src/graphs/doc-graph.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    dependencies: []
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-2", "AC-3", "AC-4", "AC-12", "AC-20"]

  - id: 2
    subtask_id: "ST-2"
    description: >
      Create DocGraphStateAnnotation using Annotation.Root() following the
      elaboration.ts pattern. Include all AC-1 fields: mergeEvent, workerResults
      (reducer: append), docReviewResult, proposedFileChanges (reducer: append),
      commitResult, docGraphComplete, and expectedWorkers sentinel.
    files:
      - "packages/backend/orchestrator/src/graphs/doc-graph.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    dependencies: [1]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-1"]

  - id: 3
    subtask_id: "ST-3"
    description: >
      Implement api-docs-worker.ts and component-docs-worker.ts. Each uses
      createLLMNode('doc-worker-api-docs', fn) (60s timeout, 5 retries per AC-18)
      and a createApiDocsWorkerNode(config)/createComponentDocsWorkerNode(config)
      factory. Workers read state.mergeEvent.changedFiles, propose file content
      changes (no filesystem writes), return DocWorkerResult with success/failure
      captured in result.error (never thrown).
    files:
      - "packages/backend/orchestrator/src/nodes/doc-workers/api-docs-worker.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/component-docs-worker.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/story/fanout-pm.ts"
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
      - "packages/backend/orchestrator/src/graphs/doc-graph.ts"
    dependencies: [1]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-5", "AC-6", "AC-18"]

  - id: 4
    subtask_id: "ST-4"
    description: >
      Implement architecture-docs-worker.ts, readme-guides-worker.ts, and
      changelog-worker.ts. Same pattern as ST-3. changelog-worker reuses Phase 6
      changelog drafting logic pattern from doc-sync.ts (semver bump + [DRAFT] entry).
      All three use createLLMNode (60s timeout) per AC-18.
    files:
      - "packages/backend/orchestrator/src/nodes/doc-workers/architecture-docs-worker.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/readme-guides-worker.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/changelog-worker.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/doc-workers/api-docs-worker.ts"
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
    dependencies: [3]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-5", "AC-6", "AC-18"]

  - id: 5
    subtask_id: "ST-5"
    description: >
      Implement kb-sync-worker.ts with mandatory deduplication guard from
      persist-learnings.ts. MUST inject kbSearchFn and kbAddFn via config.
      Call kbSearchFn(query, { limit: 5 }) and check relevance_score >= 0.85
      before any kbAddFn call. Tag proposed entries with
      ['auto-generated', 'source:{storyId}']. Never propose entry deletion.
      Uses createToolNode (10s) per AC-18 since it does not call an LLM.
    files:
      - "packages/backend/orchestrator/src/nodes/doc-workers/kb-sync-worker.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/completion/persist-learnings.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/api-docs-worker.ts"
    dependencies: [3]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-5", "AC-6", "AC-7", "AC-18"]

  - id: 6
    subtask_id: "ST-6"
    description: >
      Implement dispatch node in doc-graph.ts. Returns array of Send objects:
      enabledWorkers.map(w => new Send(w.nodeName, state)). Reads
      DocGraphConfig.workerConfigs to determine enabled workers. Sets
      state.expectedWorkers to the count of enabled workers. Disabled workers
      (config.enabled === false) are skipped silently.
    files:
      - "packages/backend/orchestrator/src/graphs/doc-graph.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    dependencies: [2]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-8"]

  - id: 7
    subtask_id: "ST-7"
    description: >
      Implement DocReviewNode in doc-graph.ts. Reads state.workerResults, counts
      success/failure per worker, checks KB Sync Worker did not propose any
      ProposedFileChange with operation 'delete' (only possible via schema bypass).
      Sets docReviewPassed: true if >= minSuccessThreshold (default 4) workers
      succeeded. Sets commitBlocked: true with human-readable reason if blocked.
      Also implement the aggregate node: checks state.workerResults.length >=
      state.expectedWorkers per AC-19, logs warning and proceeds on mismatch.
    files:
      - "packages/backend/orchestrator/src/graphs/doc-graph.ts"
    files_to_read: []
    dependencies: [6]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-9", "AC-19"]

  - id: 8
    subtask_id: "ST-8"
    description: >
      Implement commit node in doc-graph.ts. Reads state.proposedFileChanges and
      state.docReviewResult. If dryRun: true OR commitBlocked: true: log proposed
      changes via @repo/logger, skip all filesystem writes (return early).
      If review passed and not dry-run: write all proposed files atomically
      (write to temp then rename), create git commit with message
      'docs(auto): sync documentation for {storyId}'. Log commitBlocked,
      filesUpdated, durationMs via @repo/logger. Injectable gitCommitFn in config
      for testability per OPP-005.
    files:
      - "packages/backend/orchestrator/src/graphs/doc-graph.ts"
    files_to_read: []
    dependencies: [7]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-10", "AC-17"]

  - id: 9
    subtask_id: "ST-9"
    description: >
      Complete createDocGraph() factory in doc-graph.ts. Wire full graph:
      addEdge(START, 'dispatch'), add all 6 workers as nodes, add aggregate node,
      addEdge from each worker to 'aggregate', addEdge('aggregate', 'doc-review'),
      addConditionalEdges after 'doc-review' (commitBlocked → 'log-blocked' → END;
      else → 'commit' → END). Return graph.compile(). The aggregate node (per AC-19)
      is a distinct pass-through node that checks sentinel count before handing off
      to 'doc-review'.
    files:
      - "packages/backend/orchestrator/src/graphs/doc-graph.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    dependencies: [8]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-11", "AC-19"]

