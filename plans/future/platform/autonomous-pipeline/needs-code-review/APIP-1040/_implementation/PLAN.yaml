architectural_decisions:
  - id: ARCH-001
    question: "Node factory choice for LLM-calling workers vs KB Sync Worker"
    decision: >
      5 LLM workers (api-docs, component-docs, architecture-docs, readme-guides,
      changelog) use createLLMNode (60s timeout, 5 retries). KB Sync Worker uses
      createToolNode (10s timeout, 2 retries) since it only calls KB search/add APIs.
    rationale: "Mandated by AC-18 and ELAB GAP-001 resolution. createLLMNode preset matches expected LLM latency."
    decided_by: elab
  - id: ARCH-002
    question: "Aggregate node contract and location"
    decision: >
      Aggregate node is a dedicated pass-through node implemented in doc-graph.ts
      (ST-7/ST-9). It checks state.workerResults.length >= state.expectedWorkers,
      logs a warning via @repo/logger if not equal, and always passes to doc-review.
      It is distinct from DocReviewNode.
    rationale: "Mandated by AC-19 and ELAB GAP-002 resolution. Prevents deadlock while providing observability."
    decided_by: elab
  - id: ARCH-003
    question: "ProposedFileChangeSchema fields and operation enum"
    decision: >
      ProposedFileChangeSchema: filePath: z.string(), operation: z.enum(['create', 'update']),
      content: z.string(), reason: z.string(), workerName: z.enum([...6 worker names]).
      'delete' is intentionally excluded from operation to enforce append-only constraint.
    rationale: "Mandated by AC-20 and ELAB GAP-003 resolution."
    decided_by: elab
  - id: ARCH-004
    question: "Injectable gitCommitFn in commit node config (OPP-005)"
    decision: >
      Commit node config includes optional gitCommitFn injectable (defaults to
      child_process.exec git commit). This enables unit testing without mocking
      child_process.exec globally.
    rationale: "Matches kbSearchFn/kbAddFn pattern in KB Sync Worker. Non-blocking per ELAB OPP-005."
    decided_by: planning

complexity: complex

notes:
  - >
    Phase A = ST-1 through ST-9. Phase B = ST-10 through ST-12. Ship Phase A
    first; if token budget is exceeded, Phase B becomes explicit follow-through.
    Phase A gate: graph.compile() succeeds + type-check passes.
  - >
    All 5 LLM-calling workers (ST-3, ST-4) MUST use createLLMNode, not
    createToolNode. createToolNode has 10s timeout which is insufficient for LLM
    document generation. See AC-18 and ARCH-001.
  - >
    The aggregate node (ST-7/ST-9) is a sentinel-count pass-through ONLY.
    DocReviewNode (ST-7) evaluates results. These are two distinct nodes
    in the graph despite sharing ST-7 implementation scope.
  - >
    ProposedFileChangeSchema 'delete' operation is intentionally excluded.
    If a worker somehow proposes deletion (schema bypass), DocReviewNode
    blocks on it per EC-3. This is a defense-in-depth pattern.
  - >
    KB Sync Worker (ST-5): inject kbSearchFn and kbAddFn via config for
    testability — the same pattern as persist-learnings.ts. The dedup guard
    is mandatory and non-negotiable (protects KB from hallucinated entries).
  - >
    Shared test fixture factory createMockMergeEventPayload() should be
    created in ST-11 to reduce boilerplate across 6 test files (OPP-001).
  - >
    DocCommitResultSchema fields (OPP-003): committed: boolean,
    commitSha: string | null, filesWritten: string[], durationMs: number,
    error: string | null. Define in ST-1 alongside other schemas.
  - >
    DocReviewResultSchema fields (OPP-004): docReviewPassed: z.boolean(),
    commitBlocked: z.boolean(), commitBlockedReason: z.string().nullable(),
    workerSuccessCount: z.number(), workerFailureCount: z.number().
    Define in ST-1 alongside other schemas.
  - >
    ELAB verdict: CONDITIONAL_PASS with all 3 MVP gaps resolved via
    AC-18, AC-19, AC-20. Story is ready to implement. Final AC count: 20.
