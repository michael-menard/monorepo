      - "packages/backend/orchestrator/src/nodes/doc-workers/__tests__/component-docs-worker.test.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/__tests__/architecture-docs-worker.test.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/__tests__/readme-guides-worker.test.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/__tests__/changelog-worker.test.ts"
      - "packages/backend/orchestrator/src/nodes/doc-workers/__tests__/kb-sync-worker.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/doc-workers/index.ts"
    dependencies: [10]
    slice: backend
    verification: "pnpm test --filter @repo/orchestrator -- --testPathPattern=doc-workers"
    acs_covered: ["AC-14"]

  - id: 12
    subtask_id: "ST-12"
