    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-1", "AC-14"]

  - id: 2
    subtask_id: "ST-2"
    description: >
      Create PipelineJobPoller utility in helpers/job-poller.ts with: configurable
      pollIntervalMs (default 5000), maxWaitMs (default 1800000), exponential back-off
      capped at maxPollIntervalMs (default 60000), @repo/logger structured logging, and
      PollTimeoutError Zod-typed error class. Also create unit tests verifying exponential
      back-off schedule, cap behaviour, and PollTimeoutError on timeout.
    files:
      - "packages/backend/orchestrator/e2e/helpers/job-poller.ts"
      - "packages/backend/orchestrator/e2e/helpers/__tests__/job-poller.test.ts"
    files_to_read:
      - "apps/api/lego-api/core/cache/redis-client.ts"
      - "packages/backend/orchestrator/e2e/playwright.config.ts"
    dependencies: [1]
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator"
    acs_covered: ["AC-8"]

  - id: 3
    subtask_id: "ST-3"
    description: >
      Create artifact assertion helpers in helpers/artifact-assertions.ts:
      assertEvidenceArtifact, assertReviewArtifact, assertQaVerifyArtifact, assertMergeArtifact.
      Each reads the corresponding YAML file from storyDir and validates against the canonical
      Zod schema. assertMergeArtifact uses a stub MergeArtifactSchema with minimum fields
      { verdict: z.string(), story_id: z.string() } and a TODO comment pending APIP-1070.
      Also create unit tests validating happy and error paths for each assertion helper.
    files:
      - "packages/backend/orchestrator/e2e/helpers/artifact-assertions.ts"
      - "packages/backend/orchestrator/e2e/helpers/__tests__/artifact-assertions.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/artifacts/evidence.ts"
      - "packages/backend/orchestrator/src/artifacts/review.ts"
      - "packages/backend/orchestrator/src/artifacts/qa-verify.ts"
      - "packages/backend/orchestrator/src/persistence/yaml-artifact-reader.ts"
      - "packages/backend/orchestrator/e2e/helpers/job-poller.ts"
    dependencies: [1, 2]
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator"
    acs_covered: ["AC-4", "AC-13"]

  - id: 4
    subtask_id: "ST-4"
    description: >
      Create SyntheticTestStorySchema Zod schema and pre-built synthetic story fixture in
      fixtures/synthetic-story.ts. The fixture defines a minimal story with one AC and a
      ChangeSpec whose code change adds a documented constant + Vitest test to a non-critical
      utility file in packages/backend/orchestrator/. Includes all required YAML artifact stubs
      for mid-pipeline seeding. Unit tests verify SyntheticTestStorySchema.parse() succeeds
      against the fixture value.
    files:
      - "packages/backend/orchestrator/e2e/fixtures/synthetic-story.ts"
      - "packages/backend/orchestrator/e2e/fixtures/__tests__/synthetic-story.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/artifacts/evidence.ts"
      - "packages/backend/orchestrator/e2e/helpers/artifact-assertions.ts"
    dependencies: [3]
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator && pnpm test --filter @repo/orchestrator"
    acs_covered: ["AC-3"]

  - id: 5
    subtask_id: "ST-5"
    description: >
      Create PipelineTestFixtures using test.extend() in fixtures/pipeline.fixture.ts.
      Inject: queueClient (BullMQ Queue, name pipeline-e2e, connected to REDIS_URL),
      queueEvents (BullMQ QueueEvents, same queue name — separate Redis connection),
      pipelineStateReader (polls BullMQ job status + reads YAML artifacts from story
      feature dir), syntheticStory (pre-built SyntheticTestStory fixture).
      Teardown (afterAll): close both Redis connections; remove synthetic story feature
      directory; remove BullMQ test job if not cleanly completed. Teardown failures logged
      as @repo/logger warnings — never throw. Follow browser-auth.fixture.ts pattern exactly.
    files:
      - "packages/backend/orchestrator/e2e/fixtures/pipeline.fixture.ts"
    files_to_read:
      - "apps/web/playwright/fixtures/browser-auth.fixture.ts"
      - "packages/backend/orchestrator/e2e/fixtures/synthetic-story.ts"
      - "packages/backend/orchestrator/e2e/helpers/job-poller.ts"
    dependencies: [4]
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-2", "AC-12"]

  - id: 6
    subtask_id: "ST-6"
    description: >
      Create phase0-queue-supervisor.spec.ts E2E test spec. Tests: (a) queueClient.add()
      returns non-null jobId; (b) BullMQ job transitions from waiting to active within 30s
      configurable timeout, confirming supervisor polling is active; (c) job does not
      transition to failed within the observation window. Uses PipelineTestFixtures.
      Follows drag-preview.spec.ts test.describe / test.beforeEach / test() structure.
    files:
      - "packages/backend/orchestrator/e2e/tests/phase0-queue-supervisor.spec.ts"
    files_to_read:
      - "apps/web/playwright/tests/wishlist/drag-preview.spec.ts"
      - "packages/backend/orchestrator/e2e/fixtures/pipeline.fixture.ts"
    dependencies: [5]
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-5", "AC-10", "AC-11"]

  - id: 7
    subtask_id: "ST-7"
    description: >
      Create phase1-elaboration.spec.ts (skipIf APIP-1010 module unavailable — dynamic
      import check in test.beforeAll) and phase1-critical-path.spec.ts (skipIf any of
      APIP-1010/1020/1030/1050/1060/1070 unavailable). Full critical path spec asserts:
      non-null jobId, supervisor dispatch, EVIDENCE.yaml valid, REVIEW.yaml verdict not null,
      QA-VERIFY.yaml verdict in PASS|FAIL|BLOCKED, if PASS then MERGE.yaml verdict=MERGE_COMPLETE
      and git log contains squash commit, BullMQ job in completed state. If REVIEW.yaml
      verdict is FAIL, use expect.fail() with message indicating framework bug.
    files:
      - "packages/backend/orchestrator/e2e/tests/phase1-elaboration.spec.ts"
      - "packages/backend/orchestrator/e2e/tests/phase1-critical-path.spec.ts"
    files_to_read:
      - "packages/backend/orchestrator/e2e/tests/phase0-queue-supervisor.spec.ts"
      - "packages/backend/orchestrator/e2e/helpers/artifact-assertions.ts"
    dependencies: [6]
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-6", "AC-7", "AC-10", "AC-11"]

  - id: 8
    subtask_id: "ST-8"
    description: >
      Create PIPELINE-E2E-TEST-PLAN.md documentation covering: (a) synthetic story design
      and trivially-passable ChangeSpec rationale (pre-written code patch, no LLM required);
      (b) per-scenario dependency mapping (which APIP stories must be complete); (c) port
      isolation strategy preventing conflicts with QA graph Playwright subprocess (project
      name pipeline-e2e, workers:1, serialization requirement); (d) required environment
      variables (REDIS_URL, LANGGRAPH_SERVER_URL, TEST_STORY_FEATURE_DIR) and local run
      instructions; (e) phased activation strategy (Phase 0 vs Phase 1 tiers). Also document
      the CI job definition for Phase 0 E2E as a post-merge action item.
    files:
      - "packages/backend/orchestrator/e2e/PIPELINE-E2E-TEST-PLAN.md"
    files_to_read:
      - "packages/backend/orchestrator/e2e/playwright.config.ts"
      - "packages/backend/orchestrator/e2e/fixtures/synthetic-story.ts"
    dependencies: [7]
    slice: packages
    verification: "File exists with all 5 required sections present"
    acs_covered: ["AC-9"]

