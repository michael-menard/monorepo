notes:
  - "KB is intermittently failing — CHECKPOINT.yaml and context artifact not pre-loaded; proceeding without KB checkpoint validation."
  - "ELAB.yaml (CONDITIONAL_PASS) resolved all 5 gaps: AC-13 (stub MergeArtifactSchema), AC-14 (bullmq + @playwright/test devDeps + tsconfig.json). All gaps are reflected in the subtasks."
  - "BullMQ requires TWO separate Redis connections: one Queue (for enqueue/status) and one QueueEvents (for waitUntilFinished completion signaling). Both must be created in beforeAll and closed in afterAll."
  - "The e2e/ tsconfig.json cannot extend the orchestrator root tsconfig.json directly for compilation because rootDir:./src would conflict. It should extend the monorepo root tsconfig (tsconfig.json at repo root) with appropriate e2e-specific overrides."
  - "The SyntheticTestStory ChangeSpec MUST use a pre-written literal code patch (not LLM-generated) so micro-verify (pnpm check-types + pnpm test) passes deterministically."
  - "Per ELAB opp-3 guidance: if REVIEW.yaml verdict is FAIL in phase1-critical-path.spec.ts, use explicit expect.fail() with message 'Framework bug: synthetic ChangeSpec produced REVIEW.yaml FAIL verdict — investigate review graph'."
  - "Phase 0 E2E spec is runnable immediately after APIP-0010 + APIP-0020 complete. Phase 1 specs are guarded by dynamic import checks — they auto-activate when dependency graph modules become available."
  - "Port isolation from QA graph (APIP-1060): pipeline-e2e project name is distinct from all web app project names; workers:1 prevents concurrent runs; CI must serialize pipeline E2E with QA graph executions."
  - "redis-client.ts in lego-api uses ioredis directly. BullMQ manages its own Redis connections internally — do NOT use the ioredis singleton pattern from lego-api for BullMQ clients in E2E fixtures."
  - "All new test infrastructure is isolated to packages/backend/orchestrator/e2e/. apps/web/playwright/ must remain untouched."
