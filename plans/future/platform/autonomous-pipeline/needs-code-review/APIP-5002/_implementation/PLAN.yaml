    subtask_id: "ST-1"
    description: >
      Create Playwright E2E config for pipeline: playwright.config.ts with workers:1,
      timeout:1800000, forbidOnly:!!CI, project name pipeline-e2e, no webServer block.
      Create tsconfig.json in e2e/ extending root tsconfig with include covering e2e directory.
      Add bullmq and @playwright/test as devDependencies in orchestrator package.json, add e2e script.
