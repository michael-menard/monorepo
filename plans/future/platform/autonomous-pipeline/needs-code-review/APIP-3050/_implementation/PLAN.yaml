architectural_decisions:
  - id: "ARCH-001"
    question: "DB injection: AC-10 describes config.configurable.db but existing pattern uses z.unknown().optional() repo fields in ElaborationConfigSchema (storyRepo, workflowRepo). Which pattern to follow?"
    decision: "Follow existing ElaborationConfigSchema pattern — add affinityDb: z.unknown().optional() field, same as storyRepo/workflowRepo. Pass via ElaborationConfig.affinityDb → createStructurerNode."
    rationale: "KB finding (id: 27caad45) documents the mismatch. Existing codebase does NOT use config.configurable.db; all DB injection goes through ElaborationConfigSchema. Following established pattern avoids divergence. Autonomy level: aggressive — auto-accepted Tier 3 decision."
    decided_by: "auto"

complexity: moderate

notes:
  - "DB injection pattern: Use affinityDb: z.unknown().optional() in ElaborationConfigSchema (storyRepo/workflowRepo pattern) NOT config.configurable.db as described in AC-10. KB entry 27caad45 confirms this pattern mismatch."
  - "Model identifier format: Short form ('haiku', 'sonnet', 'opus') from ClaudeModelSchema in config/model-assignments.ts. Document in code comment in affinity-reader.ts."
  - "wint.model_affinity table: columns modelId, changeType, fileType, successRate, sampleCount, confidenceLevel. confidence_level enum: 'high'|'medium'|'low'|'unknown'."
  - "The extensions field on ChangeOutlineItemSchema is z.record(z.unknown()).optional() — already present from APIP-1010. Use extensions.preferredChangePattern (string) and optionally extensions.affinityMeta."
  - "Query deduplication: group ChangeOutlineItem[] by (changeType, fileType), query DB once per pair, fan results back to items. Avoids N+1 queries."
  - "StructurerResultSchema already has fallbackUsed: z.boolean() — no new field needed on result schema."
  - "metrics.ts interface anti-pattern (KB: dffb32dd): Do NOT use TypeScript interfaces in affinity-reader.ts. Use Zod schemas with z.infer<> exclusively."
  - "Affinity caching (KB: 59cf708b) is a future-work item — do not implement in APIP-3050."
