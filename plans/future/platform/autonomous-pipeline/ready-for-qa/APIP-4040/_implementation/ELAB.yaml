opportunities:
  - id: OPP-1
    category: reuse
    title: "Reuse existing metric collector node pattern from src/nodes/metrics/"
    description: >
      The existing metric collector nodes (collect-events.ts, calc-ttdc.ts, etc.) follow
      a consistent pattern: pure function taking state, returning partial state update.
      The test quality collectors should follow this same pattern rather than introducing
      a new abstraction.
    recommendation: "Follow src/nodes/metrics/ pattern for collector implementations"

  - id: OPP-2
    category: testing
    title: "Consider using withTimeoutResult for all timeout-aware collectors"
    description: >
      The withTimeoutResult variant returns { result, timedOut } without throwing,
      which aligns with the collector pattern of returning fallback values on timeout.
    recommendation: "Prefer withTimeoutResult over try/catch withTimeout for cleaner timeout handling"

  - id: OPP-3
    category: architecture
    title: "Split story before elaboration completion to reduce scope"
    description: >
      The story has 13 ACs, 9 subtasks, and a 0.9 split risk. The natural split point
      (AC-3 MutationScoreCollector) is well-documented. Splitting now before implementation
      reduces risk and token cost.
    recommendation: "Split: APIP-4040 = Part A (12 ACs), APIP-4040-B = Part B (AC-3 only, gated on mutation tooling)"

