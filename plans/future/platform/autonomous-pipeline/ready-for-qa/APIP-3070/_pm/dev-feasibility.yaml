risks:
  - id: RISK-001
    description: "Exploration budget cost spike during cold start if explorationMinSuccessRateFloor is not enforced or if exploration fraction is too high"
    mitigation: "Named constant explorationMinSuccessRateFloor = 0.3; when sample_size = 0, exploration allowed (no evidence of failure); when sample_size > 0 and success_rate < floor, skip exploration"
    severity: medium

  - id: RISK-002
    description: "Math.random() non-determinism makes exploration slot untestable without PRNG injection"
    mitigation: "Accept optional randomFn: () => number = Math.random in PipelineModelRouterConfig or as constructor arg. Default to Math.random in production, inject deterministic function in tests."
    severity: low

  - id: RISK-003
    description: "In-memory exploration state not shared across multiple processes (Phase 4+)"
    mitigation: "Document limitation explicitly per APIP ADR-001 Decision 4. No action needed for Phase 0-3. Single-process deployment makes in-memory state valid."
    severity: low

  - id: RISK-004
    description: "importAffinitySeeds() with manual benchmark data that does not reflect real pipeline performance"
    mitigation: "Seeding is always optional (AC-5 is additive utility). System operates safely without it via conservative OpenRouter defaults."
    severity: low

implementation_approach:
  cold_start_detection: |
    Use cached flag this._hasAnyHighConfidenceProfile: boolean | null (null = uninitialized).
    On first dispatch() after construction or after invalidateAffinityCache(), query wint.model_affinity
    for any row with confidence_level IN ('medium', 'high'). Cache result. If none found, skip tiers 2
    and 3, go directly to tier 4 (conservative default). Reset flag on invalidateAffinityCache().

  exploration_budget: |
    Insert as else-if branch after tier 2 (affinity check) in dispatch().
    Call internal _checkExplorationEligibility(changeType, fileType) helper:
      1. Sample randomFn() — if value >= explorationBudgetFraction, skip (fall to tier 4)
      2. Check wint.model_affinity for Ollama entry with success_rate < explorationMinSuccessRateFloor
         AND sample_size > 0 — if found, skip (fall to tier 4)
      3. Check Ollama provider availability — if unavailable, skip (fall to tier 4)
      4. Otherwise: route to Ollama exploration model, log { source: 'exploration' }

  affinity_seeder: |
    New file: packages/backend/orchestrator/src/pipeline/affinity-seeder.ts
    Export:
      - ManualAffinitySeedEntrySchema: z.object({ model, change_type, file_type, success_rate,
        sample_size, confidence_level (optional) })
      - SeedImportResultSchema: z.object({ seeded: number, skipped: number, errors: [] })
      - async importAffinitySeeds(seeds: ManualAffinitySeedEntry[], db: Db): Promise<SeedImportResult>
    Logic:
      1. Validate each seed entry against ManualAffinitySeedEntrySchema
      2. If confidence_level missing: derive from sample_size using CONFIDENCE_THRESHOLDS from pattern-miner.ts
      3. Upsert into wint.model_affinity using ON CONFLICT (model, change_type, file_type) DO UPDATE SET
      4. Return { seeded, skipped, errors }

routing_precedence_after_apip_3070:
  - tier: 1
    name: DB Override
    source: wint.model_assignments
    description: "Always wins; operator control"
  - tier: 2
    name: Affinity-Guided
    source: wint.model_affinity
    condition: "confidence_level IN ('medium', 'high') AND sample_size >= affinityMinSampleSize"
  - tier: 3
    name: Exploration Slot
    source: Ollama (random)
    condition: "randomFn() < explorationBudgetFraction AND success_rate >= explorationMinSuccessRateFloor (or sample_size = 0)"
  - tier: 4
    name: Conservative Default
    source: conservativeOpenRouterModel
    description: "Cold-start and all other fallbacks"

