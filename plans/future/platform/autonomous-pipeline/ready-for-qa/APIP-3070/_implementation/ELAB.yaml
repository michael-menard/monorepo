discovery:

  mvp_critical_gaps:

    - id: GAP-001
      severity: medium
      title: "APIP-3040 tier nomenclature mismatch — 'Tier 3' used for both static fallback and exploration"
      description: >
        APIP-3040 defines a three-tier routing structure where Tier 3 is the "Static
        Ollama → OpenRouter → Anthropic escalation chain (fallback)". APIP-3070 introduces
        a new four-tier structure where Tier 3 becomes "Exploration slot" and the static
        escalation chain becomes Tier 4. APIP-3040's AC-4 explicitly says: "falls back
        to the static Ollama → OpenRouter → Anthropic escalation chain exactly as
        implemented in APIP-0040 v1" and APIP-3040's AC-7 logs source: 'fallback' for
        this path. APIP-3070's architecture notes correctly renumber tiers, but
        implementors will be extending code written under APIP-3040's three-tier model.
        Risk: If APIP-3040 implementation uses 'Tier 3' as a variable name, constant,
        or comment for the static escalation chain, APIP-3070's implementation must
        update those references — potentially touching more than the 2 declared files
        if tier labels appear in shared types or __types__/index.ts.
      impact: "May cause confusion during code review; scope creep if __types__/index.ts uses tier constants"
      recommendation: >
        Add explicit note in ST-2 and ST-4 subtask descriptions: 'When extending
        APIP-3040 code, any references to static escalation as Tier 3 must be updated
        to Tier 4 to match the four-tier architecture. Check __types__/index.ts for
        tier-number constants or enums.' No story split required — this is a naming
        clarification handled within ST-2.

    - id: GAP-002
      severity: medium
      title: "Cold-start flag resets on invalidateAffinityCache() — but affinity cache re-query is not guaranteed atomic with cold-start re-evaluation"
      description: >
        AC-8 specifies that `invalidateAffinityCache()` resets `_hasAnyHighConfidenceProfile`.
        AC-2 specifies that on first dispatch after reset, the router queries
        wint.model_affinity once for any row with confidence_level IN ('medium', 'high').
        However, between the reset (on Pattern Miner cron run) and the first re-dispatch,
        the in-memory affinity profile cache (from APIP-3040 AC-6) is also invalidated.
        The story assumes both caches reset together via a single invalidateAffinityCache()
        call. This is correct per AC-8 and the Architecture Notes. However, the story does
        not explicitly specify whether the cold-start flag re-query (`_hasAnyHighConfidenceProfile`)
        uses the same Drizzle query path as the affinity profile cache or a separate query.
        If they are separate queries, there is a brief window where `_hasAnyHighConfidenceProfile`
        may return true (based on a newly inserted high-confidence profile) while the
        per-key affinity cache still returns null (not yet re-populated for a specific
        change_type/file_type). In this window, cold-start is correctly bypassed (the
        global flag correctly says "high-confidence profiles exist"), and the per-key
        affinity cache correctly does a lazy re-load. This is actually the correct behavior
        — no bug — but the story does not make this two-query sequence explicit.
      impact: "No functional bug, but implementation may add an unnecessary extra DB query if not understood"
      recommendation: >
        Add a sentence to Architecture Notes (or ST-2 subtask): 'The
        _hasAnyHighConfidenceProfile flag uses a single COUNT(*) > 0 query for any
        qualifying row — it does not reuse the per-key affinity cache. This is intentional:
        the global cold-start check is a cheap aggregate query that avoids iterating
        all (change_type, file_type) combinations on every dispatch.' No AC change required.

    - id: GAP-003
      severity: low
      title: "affinity-seeder.ts SeedImportResult and SeedImportError types not specified in Zod"
      description: >
        AC-5 specifies that importAffinitySeeds() returns
        { seeded: number, skipped: number, errors: SeedImportError[] }. The story
        specifies ManualAffinitySeedEntrySchema in Zod (AC-12), but SeedImportResult
        and SeedImportError are not specified as Zod schemas. Per project guidelines
        (CLAUDE.md), all types must use Zod schemas — never TypeScript interfaces or
        type aliases without Zod. If the implementor defines SeedImportResult as a
        TypeScript interface or plain type alias, it will violate project code standards
        and fail linting.
      impact: "Linting failure or code review rejection if implemented without Zod schemas"
      recommendation: >
        Add to AC-5 or AC-12: 'SeedImportResultSchema and SeedImportErrorSchema must
        be defined as Zod schemas in affinity-seeder.ts alongside ManualAffinitySeedEntrySchema.
        Example: SeedImportErrorSchema = z.object({ entry: ManualAffinitySeedEntrySchema,
        error: z.string() }). SeedImportResultSchema = z.object({ seeded: z.number().int(),
        skipped: z.number().int(), errors: z.array(SeedImportErrorSchema) }).'
        This is a low-severity gap because it does not block implementation, but left
        unaddressed it will cause a linting/code-review rejection.

  future_opportunities:

    - id: OPP-001
      priority: low
      title: "Exploration budget could track per-change_type/file_type slot usage for cost analytics"
      description: >
        The current exploration budget is a global per-dispatch probabilistic fraction
        (10% independent roll per ChangeSpec dispatch). This is correct for Phase 0–3.
        In Phase 4+, operators may want to understand how much of their actual token
        spend came from exploration vs. affinity routing vs. cold-start defaults.
        The current logging (AC-7) emits source: 'exploration' per dispatch, which is
        sufficient for manual analysis, but no aggregate counter tracks exploration slot
        assignment rate. This could be useful for APIP-5005's operator CLI.
      recommendation: "No action for APIP-3070. Consider adding an exploration-rate metric to APIP-5005 CLI story."

    - id: OPP-002
      priority: low
      title: "Manual seed file format not standardized — operators have no schema reference"
      description: >
        importAffinitySeeds() accepts a Zod-validated array. Operators who want to seed
        from benchmark data need to construct a JavaScript/TypeScript array conforming
        to ManualAffinitySeedEntrySchema. There is no JSON/YAML seed file format or
        CLI import command specified — APIP-5005 is scoped for CLI work but not
        specifically for seed file import. For Phase 0–3 this is acceptable (manual
        TypeScript invocation is fine for operators), but a seed-from-JSON-file utility
        would reduce operator friction.
      recommendation: "No action for APIP-3070. Add to APIP-5005 backlog: 'seed import from JSON file via CLI'."

    - id: OPP-003
      priority: low
      title: "APIP-3040 high split risk (0.9) may delay APIP-3070 start date"
      description: >
        APIP-3040's predictions block shows split_risk: 0.9 — very high probability
        that it will be split during elaboration. If split, APIP-3040's three-tier
        routing structure may be delivered across two or more sub-stories, each of
        which must merge before APIP-3070 can begin. APIP-3070's implementation_gate
        only specifies 'APIP-3040 must be merged', but if APIP-3040 splits, the gate
        becomes 'all APIP-3040 sub-stories must merge'. This is a schedule risk, not
        a design risk. APIP-3070's design remains stable regardless.
      recommendation: >
        When APIP-3040 elaboration completes, update APIP-3070's implementation_gate
        field to reference any resulting sub-story IDs explicitly. No AC change needed.

