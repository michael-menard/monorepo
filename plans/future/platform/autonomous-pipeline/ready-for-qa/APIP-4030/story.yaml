id: "APIP-4030"
title: "Dependency Auditor"
status: ready-for-qa
priority: medium
phase: 4
feature: "Post-merge cron that checks new packages added, detects overlap with existing deps, estimates bundle size impact, runs pnpm audit for vulnerabilities, and flags unmaintained packages — blocking queue for human review on high-risk findings"
goal: "Prevent dependency bloat, vulnerability accumulation, and redundant package introduction without blocking the autonomous pipeline for routine changes."
