gaps:
  - id: gap-1
    check: reuse_first
    finding: |
      kb_list cannot serve batch scan. The Reuse Plan table references kb_list for
      candidate enumeration but kb_list does not support offset-based pagination or the
      compound createdAt < cutoff AND archived = false filter. Max limit is 100. An
      implementer following the Reuse Plan table literally would be fundamentally blocked.
      The Architecture Notes batch loop pseudocode correctly uses direct db.select() with
      offset — it is the authoritative reference.
    severity: high
    decision: add_ac
    ac_added: "AC-14: Batch scan uses direct Drizzle queries, not kb_list. Architecture Notes batch loop pseudocode is authoritative."

  - id: gap-2
    check: subtask_decomposition
    finding: |
      AuditLogger.logUpdate requires full KnowledgeEntry objects for both previousEntry
      and newEntry. ST-3 description did not explicitly state the pattern for obtaining
      the pre-mutation entry. The story as written implied a separate per-entry fetch
      (N+1 queries), which is unnecessary because the batch db.select() already returns
      full KnowledgeEntry rows that can serve as previousEntry.
    severity: high
    decision: add_ac
    ac_added: "AC-15: In-memory batch entry serves as previousEntry for AuditLogger.logUpdate. No separate pre-mutation fetch required."

  - id: gap-3
    check: internal_consistency
    finding: |
