    goal: "Establish all typed contracts before any implementation — enables parallel development of detectors and score computation"
    files_to_read:
      - packages/backend/orchestrator/src/nodes/metrics/gap-analytics.ts
      - packages/backend/orchestrator/src/artifacts/story.ts
    files_to_modify:
