feasible: true
confidence: medium
rationale: >
  All required patterns and packages already exist in the codebase. The createToolNode
  factory, GapAnalyticsResultSchema shape, SYSTEM_REF_PATTERNS heuristic technique, and
  createStoryArtifact helper are all established and directly reusable. The primary
  complexity is calibrating regex heuristics and implementing the multi-phase algorithm
  (sample, detect, score, persist, generate stories) — this is known complexity, not
  unknown risk. The hard dependency on APIP-4010 for wint.cohesion_snapshots migration
  is documented; implementation must wait for APIP-4010 completion.
complexity: high
change_surface:
  areas:
    - packages/backend/orchestrator/src/nodes/cohesion/
    - packages/backend/orchestrator/src/graphs/cohesion-scanner.ts
    - packages/backend/database-schema/src/schema/
  endpoints: []
  deploy_touchpoints:
    - "New Drizzle migration for wint.cohesion_snapshots table (after APIP-4010)"
    - "LangGraph cron registration in APIP-3090 cron infrastructure (deferred)"

risks:
  - finding: >
      APIP-4010 (wint.codebase_health table and migration pattern) must be complete
      before wint.cohesion_snapshots can be designed with aligned conventions.
      Implementation will be blocked at ST-4 until APIP-4010 ships.
    mitigation: >
      Design the Drizzle schema definition file and migration structure in ST-4 using
      telemetry.ts as the pgSchema pattern reference. At APIP-4010 completion, verify
      alignment and adjust column naming conventions if needed. No blocking impact on
      ST-1 through ST-3 or ST-5 through ST-7.
  - finding: >
      Regex heuristics will produce false positives on edge cases (e.g., inline Zod
      objects without Schema suffix used legitimately, utility files without __tests__/).
      False positives inflate violation counts and depress cohesion scores inaccurately.
    mitigation: >
      Add a confidence field (high | medium | low) to PatternViolationSchema per seed
      recommendation. Score formula weights high-confidence violations at 1.0 and
      low-confidence at 0.3. Include an edge-case exclusion list in CohesionConfigSchema
      (pathExcludes, patternOverrides) to suppress known legitimate exceptions.
  - finding: >
      APIP-3090 (cron infrastructure) is not yet complete. The LangGraph weekly cron
      schedule cannot be wired until APIP-3090 ships.
    mitigation: >
      Implement scanner as a standalone LangGraph graph callable via direct invoke or
      BullMQ job. AC-9 cron integration is fulfilled via a thin wiring layer after
      APIP-3090; core scanner functionality is fully testable without it.

missing_requirements:
  - "AC-7 must specify the exact story ID format for generated CLEANUP stories to avoid index collisions — recommend APIP-CLEANUP-{CATEGORY}-{YYYYMMDD} with a numeric suffix for same-day deduplication"
  - "AC-8 deduplication window unit must be specified — assume days but should be explicit in CohesionScannerConfigSchema"

evidence_expectations:
  - "wint.cohesion_snapshots row inserted after successful scan run (SELECT assertion in integration test)"
  - "Cleanup story YAML written to backlog/ directory and passes StoryArtifactSchema validation"
  - "pnpm check-types passes after adding wint.cohesion_snapshots Drizzle table definition"
  - "Unit tests for each pure detector function achieve 70%+ coverage on detector files"

