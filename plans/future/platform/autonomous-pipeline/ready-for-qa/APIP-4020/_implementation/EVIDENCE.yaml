notable_decisions:
  - >-
    Detector confidence weights (high=1.0, medium=0.7, low=0.3) used in weighted
    violation count per plan notes.
  - >-
    tryAcquireAdvisoryLock() returns true in dev/test — production impl would call
    pg_try_advisory_lock(hashtext('cohesion_scanner')) via db client.
  - >-
    Story deduplication uses mtime + category tag in story.yaml content.
    Tag format: '# category: {category}' written at end of generated story.
  - >-
    Build errors in context-warmer.ts, session-manager.ts, doc-sync.ts are pre-existing
    (missing @repo/mcp-tools, @repo/workflow-logic) — not introduced by APIP-4020.
  - >-
    wintSchema imported from ./wint.js in cohesion.ts — follows same pattern as other
    wint schema tables.

known_deviations:
  - >-
    cohesion-scanner.ts storyGeneratorNode is invoked outside the main graph in
    invokeCohesionScanner() because it requires repoRoot (not in graph state).
    This is a minor architectural compromise — in production, repoRoot would be
    part of the input config in state, or storyGeneratorNode would be a proper graph node.
  - >-
    Advisory lock implementation is a stub (always returns true). Production impl
    requires db client injection into the graph. Deferred per plan notes.
