reason: >
  APIP-3080 is a pure backend/infrastructure story with no user-visible interface.
  The story extends the PipelineSupervisor with concurrent BullMQ worker dispatch,
  ConcurrencyController, and WorktreeConflictDetector. All output is structured log
  events via @repo/logger. No React components, no API endpoints with user-facing
  payloads, and no UI surfaces are touched.

  The Monitor UI story (APIP-2020) will surface concurrency status, active worktree
  count, and slot utilization in a future phase. That story will handle all UI/UX
  requirements for operator visibility into concurrent pipeline execution.
