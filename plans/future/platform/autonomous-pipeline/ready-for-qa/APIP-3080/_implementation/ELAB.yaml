schema: 1
story_id: "APIP-3080"
timestamp: "2026-02-25T12:00:00Z"

audit:
  - id: scope_alignment
    status: PASS
    note: >
      Story scope is well-bounded and matches the stated goal of extending PipelineSupervisor
      with 2-3 concurrent worktrees. Non-goals clearly exclude concurrency > 3, distributed
      multi-process supervisors, ChangeSpec deep inspection, model affinity, secrets mgmt, and
      Monitor UI — all properly deferred to other stories (APIP-3040, APIP-5004, APIP-2020,
      APIP-1020). The Phase 3 placement is appropriate given Phase 0 constraint lift. The scope
      statement (4 new files, 2 modified) is clear and achievable.

  - id: internal_consistency
    status: WARN
    note: >
      Minor inconsistency detected: The story refers to "PipelineModelRouter" and
      "TokenBucket.consume()" in multiple ACs and throughout the document, but the actual
      existing codebase class is "ModelRouter" (in unified-interface.ts) with a factory called
      "ModelRouterFactory.getInstance()" — there is no class named "PipelineModelRouter" or
      method named "TokenBucket.consume()" anywhere in the codebase today. The APIP-0040
      dependency is in needs-code-review status, so PipelineModelRouter/TokenBucket may be
      planned output of that story but are not yet in the codebase. This is not blocking
      (deferred to APIP-0040 merge) but the story should clarify: the AC-7 and EC-5 verbiage
      assumes APIP-0040 will introduce exactly these names. Recommend confirming the API
      surface naming contract from APIP-0040 during ST-4. Additionally, AC-4 states returning
      false "causes the BullMQ job to be delayed" — the mechanism for how a false return from
      ConcurrencyController propagates to BullMQ delay is not documented in the architecture
      notes (BullMQ nack vs. job.moveToDelayed() vs. worker retry).

  - id: reuse_first
    status: PASS
    note: >
      Reuse plan is strong and validated against actual codebase files. Confirmed existing:
      ParallelConfigSchema.maxConcurrency in parallel-executor.ts (maxConcurrency field exists,
      directly reusable as template for maxWorktrees), NodeCircuitBreaker with configurable
      failureThreshold and recoveryTimeoutMs in runner/circuit-breaker.ts (fully implemented,
      accepts Partial<CircuitBreakerConfig>), CircuitBreakerConfigSchema in runner/types.ts
      (failureThreshold defaults 5, recoveryTimeoutMs defaults 60000), WorkerStatusSchema in
      parallel-executor.ts (PASS/FAIL/TIMEOUT/ERROR/PENDING/RUNNING), StoryFileAdapter in
      adapters/story-file-adapter.ts (atomic write pattern confirmed). No new packages required
      — bullmq and @repo/logger are listed as existing. WARN: BullMQ is not currently in
      orchestrator/package.json dependencies — it must be added via pnpm. The story notes this
      as "already in orchestrator" but the package.json does not list it. This is a deployment
      touchpoint that needs explicit attention.

  - id: ports_adapters
    status: PASS
    note: >
      Architecture correctly follows ports and adapters principles. ConcurrencyController,
      WorktreeConflictDetector, and ConcurrencyConfig are new isolated modules with single
      responsibilities. The protected read-only files (models/ and runner/) are correctly
      scoped as read-only references. The new supervisor/ and conflicts/ directories create
      proper separation. The ModelRouterFactory singleton pattern already exists in
      unified-interface.ts and the story correctly identifies it as a shared singleton not to
      be replicated per-worker. Non-blocking cleanup pattern (WINT-1150) is architecturally
      sound and correctly specified in the code snippet in Architecture Notes.

  - id: testability
    status: PASS
    note: >
      Test plan is thorough with 6 happy path tests, 5 error cases, and 4 edge cases fully
      specified. Integration test fixtures defined (ConcurrencyConfigFixture, MockStoryFileSet,
      RealRedisConnection, RealGitRepo). Key risk RISK-1 (BullMQ true concurrency hard to test)
      has mitigation via artificial delay. RISK-4 (afterEach cleanup failures) addressed via
      try/catch pattern. vi.useFakeTimers() usage correctly scoped to circuit breaker tests
      only (ED-2), not BullMQ tests. The REDIS_TEST_URL env var requirement is documented.
      One gap: the test plan does not specify how the 'conflictPolicy: queue' behavior is
      tested — only 'reject' is covered in error cases. EC-2 covers 'reject' but 'queue'
      behavior (the other valid enum value) has no test case.

  - id: decision_completeness
    status: WARN
    note: >
      Two decisions are undecided or ambiguous: (1) The mechanism by which
      ConcurrencyController.tryAcquireSlot() returning false translates to BullMQ job delay
      is unspecified. The Architecture Notes show the Zod schema and slot map but not the
      BullMQ integration point — does the worker call job.moveToDelayed()? Does it throw a
      DelayedError? Does it rely on BullMQ's built-in rate limiter? The non-blocking cleanup
      snippet shows releaseSlot() in finally but not the dispatch-time tryAcquireSlot()
      integration. (2) The 'queue' conflictPolicy value is defined in the schema but not
      elaborated — what does queuing a conflicting story mean vs. nacking it? Is it
      job.moveToDelayed() with a fixed delay? With a listener on slot free? This ambiguity
      could lead to implementation gaps since EC-2 only covers 'reject'. The worktreeId
      stored in Map<storyId, worktreeId> is also not defined — is it the worktree path?
      A UUID? This is needed for ConcurrencyController to operate correctly.

  - id: risk_disclosure
    status: PASS
    note: >
      Four risks disclosed in test plan (RISK-1 through RISK-4) with mitigations. Dev
      feasibility risks also disclosed: TokenBucket race safety, git worktree CI identity,
      hard dependency blocking. The STORY-SEED conflict analysis calls out two explicit
      conflicts: dependency not yet merged (warning severity) and in-memory singleton not
      concurrency-safe without explicit contract (warning severity). Token estimate note
      acknowledges the 4-8x code story underestimate pattern (WKFL-004/007/010). The
      known knowledge base lesson references (WINT-1120, WINT-1150) are correctly applied.
      The sizing_warning field in story.yaml is false despite a 0.9 split_risk prediction —
      this is a minor documentation gap but not a blocking issue.

  - id: story_sizing
    status: SPLIT
    note: >
      Multiple sizing indicators trigger: (1) 12 ACs exceeds the 8-AC threshold significantly.
      (2) Cross-domain complexity spans BullMQ concurrency, git worktree lifecycle, conflict
      detection, circuit breaker isolation, and rate limiter concurrency safety — four distinct
      technical domains. (3) 5 subtasks with hard sequential dependencies (ST-2 gates on
      ST-1+APIP-0020; ST-4 gates on ST-2+APIP-0040; ST-5 gates on all others) create a
      long critical path. (4) Story itself has 0.9 predicted split risk — the highest confidence
      indicator. (5) Two external blocking dependencies (APIP-0020, APIP-0040) must merge before
      ~60% of the implementation can begin (ST-2, ST-4, ST-5). (6) 200K token estimate is
      acknowledged as likely conservative given 4-8x overrun pattern. (7) Integration tests with
      real Redis and real git worktrees constitute a substantial infrastructure setup burden that
      is self-contained enough for its own story.
      RECOMMENDED SPLIT:
        Split A (APIP-3080-A): ConcurrencyController + WorktreeConflictDetector core
          - ConcurrencyConfig Zod schema (AC-1, AC-12), ConcurrencyController (AC-4),
            WorktreeConflictDetector (AC-5, AC-6) — 3 ACs, 2 subtasks (ST-1, ST-3)
          - No external dependency on APIP-0020/0040, can start immediately
          - Estimated 22K tokens, unit tests only
        Split B (APIP-3080-B): BullMQ wiring + worktree lifecycle + circuit breaker
          - BullMQ Worker concurrency wiring (AC-2, AC-3, AC-9), per-worktree NodeCircuitBreaker (AC-8),
            shared PipelineModelRouter safety (AC-7) — 5 ACs, 3 subtasks (ST-2, ST-4, ST-5)
          - Depends on APIP-0020 and APIP-0040 merge + Split A
          - Integration tests with real Redis and real git worktrees
          - Estimated 46K+ tokens
      This split allows Split A to proceed immediately while waiting for APIP-0020/0040 to merge.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      AC-to-subtask coverage matrix is complete — all 12 ACs are mapped (verified in the
      story's coverage check table). Subtask dependencies are logical (ST-1→ST-2→ST-4;
      ST-1→ST-3; ST-2+ST-3+ST-4→ST-5). However, two conditions must be met: (1) If the
      story is split as recommended, subtask assignments must be redistributed across Split A
      and Split B. (2) The AC-4 implementation detail gap (how tryAcquireSlot false maps to
      BullMQ delay) must be resolved before ST-2 implementation begins. ST-4 depends on
      APIP-0040 merge which is not yet complete — this creates a risk of ST-4 becoming a
      blocker for ST-5 if APIP-0040 review cycle extends.

gaps:
  - id: gap-1
    check: internal_consistency
    finding: >
      BullMQ package is absent from orchestrator/package.json dependencies but the story
      states it is "already in orchestrator." The current package.json contains no bullmq
      dependency entry. This means ST-2 cannot proceed without first running
      `pnpm add bullmq --filter @repo/orchestrator` and verifying the concurrency API shape
      matches what the story documents. If APIP-0020 was supposed to add this dependency,
      the dependency merge must be confirmed before APIP-3080 starts ST-2.
    severity: high
    decision: null
    ac_added: null

  - id: gap-2
    check: decision_completeness
    finding: >
      The mechanism by which ConcurrencyController.tryAcquireSlot() returning false translates
      to a BullMQ job delay is unspecified. BullMQ has multiple delay mechanisms: job.moveToDelayed(timestamp),
      throwing a WaitingChildrenError, or using a rate limiter group. The choice affects whether
      the job is requeued automatically or requires explicit supervisor intervention. Without this
      decision, ST-2 implementers will make an ad-hoc choice that may not align with AC-4's
      "job is delayed (not rejected)" requirement. Recommend adding an architecture note specifying
      the exact BullMQ API call for delaying a job when no slot is available.
    severity: high
    decision: null
    ac_added: null

  - id: gap-3
    check: decision_completeness
    finding: >
      The 'conflictPolicy: queue' behavior is undefined beyond its presence in the Zod schema enum.
      AC-6 and EC-2 only specify 'reject' behavior (nack + requeue with delay). The 'queue' value
      implies a different behavior — presumably holding the job until the conflicting story completes
      and then auto-dispatching — but no mechanism is specified. If an implementer builds the
      conflictPolicy enum field but only implements 'reject', the 'queue' option will silently
      do nothing or throw an unhandled case. Either (a) add an AC for 'queue' behavior, or
      (b) explicitly scope 'queue' as a non-goal deferral to a future story and remove it from
      the schema in this story.
    severity: medium
    decision: null
    ac_added: null

  - id: gap-4
    check: testability
    finding: >
      The test plan covers conflictPolicy 'reject' (EC-2) but has no test for conflictPolicy
      'queue'. If 'queue' behavior is implemented (per gap-3's option a), it needs at least one
      integration test verifying that a queued conflicting job is eventually dispatched when the
      blocking story completes. Without this, the 'queue' path is untested dead code. This gap
      resolves if 'queue' is scoped out (per gap-3's option b).
    severity: low
    decision: null
    ac_added: null

  - id: gap-5
    check: internal_consistency
    finding: >
      The worktreeId type stored in Map<storyId, worktreeId> is not defined. The Architecture
      Notes show the Map type annotation but do not specify what worktreeId is — a UUID, the
      worktree path string, or a git worktree name. This ambiguity affects ConcurrencyController's
      ability to pass the correct worktree reference to cleanup functions and conflict detection.
      The story's Architecture Notes show `Map<storyId, worktreeId>` without defining the
      worktreeId type, while the worktree path is separately derived as
      `<repo_root>/.worktrees/<storyId>-<timestamp>/`. These two concepts should be unified
      or clearly distinguished.
    severity: low
    decision: null
    ac_added: null

opportunities:
  - id: opp-1
    category: observability
    finding: >
      The story logs dispatch/cleanup events via @repo/logger but does not specify structured
      log event names (e.g., 'worktree_acquired', 'worktree_released', 'conflict_detected',
      'slot_saturation'). Adding standardized event name constants to the ConcurrencyController
      would make log-based monitoring more reliable and set up a clean foundation for APIP-2020
      Monitor UI integration. Low effort, high long-term value given APIP-2020 will consume
      these events.
    effort: low
    decision: null
    kb_entry_id: null

  - id: opp-2
    category: observability
    finding: >
      activeSlots() is the only public read accessor on ConcurrencyController. Adding an
      activeStoryIds() method returning string[] would allow operators (and the future Monitor
      UI) to see which stories are currently in-flight without parsing log output. This would
      also make EC-4 (circuit breaker isolation test) cleaner to assert without relying on
      internal state access.
    effort: low
    decision: null
    kb_entry_id: null

  - id: opp-3
    category: edge_cases
    finding: >
      The story documents worktree path collision prevention via timestamp suffix (ED-3) but
      does not address what happens if the `.worktrees/` parent directory itself does not exist
      at first run. `git worktree add` requires the parent directory to exist (or uses the path
      as a new directory). If `.worktrees/` does not exist, the first worktree creation may fail.
      A one-time directory initialization in supervisor startup would prevent this.
    effort: low
    decision: null
    kb_entry_id: null

  - id: opp-4
    category: performance
    finding: >
      The WorktreeConflictDetector uses story-level path prefix comparison as a conservative
      proxy until APIP-1020 ChangeSpec is stable. The non-goals correctly defer ChangeSpec
      integration to APIP-1020. However, the story does not record a lesson or KB entry for
      future APIP-1020 integration that will upgrade the conflict detector. Adding a
      TODO comment or KB lesson at implementation time would ensure the upgrade path is not
      forgotten when APIP-1020 lands.
    effort: low
    decision: null
    kb_entry_id: null

  - id: opp-5
    category: edge_cases
    finding: >
      The test plan does not include a test for concurrent ConcurrencyController.tryAcquireSlot()
      calls racing simultaneously (two workers both see 0 active slots and both call tryAcquireSlot
      concurrently, potentially both returning true and exceeding maxWorktrees). Since BullMQ worker
      callbacks are concurrent within the same Node.js event loop, this is a real risk if
      tryAcquireSlot is not synchronous (i.e., if it uses any async operations). Confirming the
      implementation is purely synchronous (Map operations are sync in JS) would resolve this,
      but a unit test documenting the expectation would be valuable insurance.
    effort: medium
    decision: null
    kb_entry_id: null

  - id: opp-6
    category: integrations
    finding: >
      The story specifies BullMQ Worker concurrency but does not address BullMQ Queue configuration
      — specifically, whether the queue needs to be configured with a rate limiter or flow producer
      to coordinate with the ConcurrencyController's slot tracking. BullMQ has a built-in rate
      limiter (Queue.rateLimit) that could replace ConcurrencyController for slot management, but
      the story correctly chooses application-level ConcurrencyController for richer conflict
      detection integration. Documenting this architectural decision explicitly (why
      ConcurrencyController instead of BullMQ rate limiter) would prevent future implementers
      from second-guessing the design.
    effort: low
    decision: null
    kb_entry_id: null

split_recommendation:
  recommended: true
  reason: >
    0.9 split risk, 12 ACs (exceeds 8 threshold), cross-domain complexity (4 domains),
    sequential dependency chain gates 60% of work on two external unmerged stories
    (APIP-0020, APIP-0040), and the two natural split boundaries (config+detection vs
    BullMQ+lifecycle) map cleanly to the dependency structure.
  splits:
    - id: "APIP-3080-A"
      title: "Parallel Concurrency Foundation: ConcurrencyController and WorktreeConflictDetector"
      acs: ["AC-1", "AC-4", "AC-5", "AC-6", "AC-12"]
      subtasks: ["ST-1", "ST-3"]
      dependencies: []
      rationale: >
        Depends on nothing external — all work is new isolated modules (ConcurrencyConfig Zod schema,
        ConcurrencyController, WorktreeConflictDetector) with unit tests only. Can start immediately
        without waiting for APIP-0020 or APIP-0040 to merge. Estimated ~22K tokens, 2-3 ACs average.
      estimated_points: 2

    - id: "APIP-3080-B"
      title: "Parallel Concurrency Integration: BullMQ Wiring, Worktree Lifecycle, and Circuit Breaker"
      acs: ["AC-2", "AC-3", "AC-7", "AC-8", "AC-9", "AC-10", "AC-11"]
      subtasks: ["ST-2", "ST-4", "ST-5"]
      dependencies: ["APIP-3080-A", "APIP-0020", "APIP-0040"]
      rationale: >
        Depends on APIP-3080-A (ConcurrencyController and WorktreeConflictDetector), plus APIP-0020
        (supervisor Worker constructor shape) and APIP-0040 (PipelineModelRouter/TokenBucket API).
        Contains all integration tests with real Redis and real git worktrees. Estimated ~46K+ tokens.
      estimated_points: 3

