strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  notes: >
    No HTTP endpoints. No frontend surface. All cron registration is LangGraph Platform internal.
    ADR-006 E2E skip condition applies (frontend_impacted: false — no Playwright tests required).
    ADR-005 UAT: integration tests against real LangGraph Platform are gated behind APIP-0030 completion.

happy_path_tests:
  - id: HP-1
    title: "CronJobDefinitionSchema validates a well-formed job definition"
    setup: "Import CronJobDefinitionSchema from cron-registry module"
    action: >
      Parse a valid job definition object:
      { jobName: 'pattern-miner', scheduleExpression: '*/15 * * * *',
        runFn: async () => {}, timeoutMs: 60000, description: 'Pattern Miner aggregation' }
    expected: "Schema.parse() returns the object without throwing; all fields present and typed correctly"
    evidence: "Vitest assertion: expect(() => CronJobDefinitionSchema.parse(validDef)).not.toThrow()"

  - id: HP-2
    title: "CronScheduleRegistrySchema validates an array of job definitions"
    setup: "Construct array of 3 valid CronJobDefinition objects"
    action: "CronScheduleRegistrySchema.parse(jobArray)"
    expected: "Parses successfully; returns array of 3 validated entries"
    evidence: "expect(result).toHaveLength(3)"

  - id: HP-3
    title: "registerCronJobs registers all jobs with LangGraph Platform mock"
    setup: >
      Mock LangGraph Platform cron API (CronSchedulerAdapter) with vi.fn().
      Build registry with 2 job definitions (one with 15min interval, one daily).
    action: "await registerCronJobs(mockAdapter, registry)"
    expected: "mockAdapter.register called twice with correct jobName and scheduleExpression per job"
    evidence: "expect(mockAdapter.register).toHaveBeenCalledTimes(2)"

  - id: HP-4
    title: "Pattern Miner job — acquires advisory lock and runs successfully"
    setup: >
      Mock pg_try_advisory_lock to return true (lock acquired).
      Mock runPatternMiner to resolve successfully.
      Spy on logger.info.
    action: "Execute the Pattern Miner job wrapper function"
    expected: >
      runPatternMiner called once.
      CronRunResult logged with status: 'success', jobName: 'pattern-miner',
      durationMs >= 0.
    evidence: "expect(runPatternMiner).toHaveBeenCalledOnce(); expect(loggedResult.status).toBe('success')"

  - id: HP-5
    title: "Metrics collection job invokes runMetricsCollection on schedule trigger"
    setup: "Mock runMetricsCollection to resolve. Trigger the daily metrics job wrapper."
    action: "Execute metrics collection job wrapper function"
    expected: "runMetricsCollection called; CronRunResult with status: 'success' logged"
    evidence: "expect(runMetricsCollection).toHaveBeenCalledOnce()"

  - id: HP-6
    title: "Environment flag disables a job without redeployment"
    setup: "Set process.env.DISABLE_CRON_JOB_PATTERN_MINER = 'true' before building registry"
    action: "buildCronRegistry(env) — construct the job registry with env-awareness"
    expected: "Pattern Miner job absent from returned registry; remaining jobs still present"
    evidence: "expect(registry.some(j => j.jobName === 'pattern-miner')).toBe(false)"

  - id: HP-7
    title: "CronRunResult schema validates a complete success result"
    setup: "Construct a full CronRunResult with all required fields"
    action: "CronRunResultSchema.parse(successResult)"
    expected: "Parses without throwing; status field accepts 'success'"
    evidence: "expect(result.status).toBe('success')"

error_cases:
  - id: EC-1
    title: "Advisory lock not acquired — Pattern Miner skips with SKIPPED status"
    setup: >
      Mock pg_try_advisory_lock to return false (lock held by another process).
      Mock runPatternMiner to track calls (should not be called).
      Spy on logger.info.
    action: "Execute the Pattern Miner job wrapper"
    expected: >
      runPatternMiner NOT called.
      CronRunResult logged with status: 'skipped'.
      No error thrown to the scheduler.
    evidence: >
      expect(runPatternMiner).not.toHaveBeenCalled();
      expect(loggedResult.status).toBe('skipped')

  - id: EC-2
    title: "Code audit job exceeds 10-minute wall-clock deadline — logs TIMEOUT, no lock held"
    setup: >
      vi.useFakeTimers().
      Mock runCodeAudit to return a promise that never resolves.
      Configure code audit job with timeoutMs: 600000 (10 min).
    action: >
      Start code audit job wrapper.
      Advance fake timers by 600001ms.
    expected: >
      CronRunResult logged with status: 'timeout'.
      No error propagates to scheduler.
      Any held resources released (no dangling locks).
    evidence: >
      expect(loggedResult.status).toBe('timeout');
      await vi.runAllTimersAsync() — no unhandled rejections

  - id: EC-3
    title: "KB compression job exceeds 15-minute deadline — logs TIMEOUT"
    setup: >
      vi.useFakeTimers().
      Mock runKbCompression to return a promise that never resolves.
      Configure KB compression job with timeoutMs: 900000 (15 min).
    action: "Start KB compression job, advance fake timers by 900001ms"
    expected: "CronRunResult with status: 'timeout' logged; no error propagates"
    evidence: "expect(loggedResult.status).toBe('timeout')"

  - id: EC-4
    title: "CronJobDefinitionSchema rejects missing required field (jobName)"
    setup: "Construct job definition object omitting jobName"
    action: "CronJobDefinitionSchema.parse(invalidDef)"
    expected: "ZodError thrown with path including 'jobName'"
    evidence: "expect(() => parse(invalidDef)).toThrow(ZodError)"

  - id: EC-5
    title: "runFn throws unexpected error — CronRunResult captures error, status: 'failure'"
    setup: "Mock a job's runFn to throw an Error('unexpected')"
    action: "Execute job wrapper function"
    expected: >
      CronRunResult with status: 'failure', error: 'unexpected'.
      Error does NOT propagate to scheduler.
    evidence: "expect(loggedResult.status).toBe('failure'); expect(loggedResult.error).toBe('unexpected')"

edge_cases:
  - id: ED-1
    title: "Empty registry — registerCronJobs completes without error"
    setup: "Pass empty array to registerCronJobs"
    action: "await registerCronJobs(mockAdapter, [])"
    expected: "No error; mockAdapter.register not called"
    evidence: "expect(mockAdapter.register).not.toHaveBeenCalled()"

  - id: ED-2
    title: "Worktree pruning job respects configurable TTL via environment variable"
    setup: "Set CRON_WORKTREE_PRUNING_TTL_DAYS=3 in env. Mock git worktree list."
    action: "Execute worktree pruning job — should remove trees older than 3 days, not 7"
    expected: "Only worktrees older than 3 days are pruned; 3-day cutoff respected"
    evidence: "expect(pruneOlderThan).toHaveBeenCalledWith(3)"

  - id: ED-3
    title: "Pattern Miner job — pg_try_advisory_lock key is deterministic from jobName"
    setup: "Spy on pg client's query method"
    action: "Execute Pattern Miner job wrapper (with lock returning true)"
    expected: "Advisory lock called with hashtext('apip_cron_pattern-miner') — deterministic key"
    evidence: "expect(pgQuery).toHaveBeenCalledWith(expect.stringContaining('apip_cron_pattern-miner'))"

  - id: ED-4
    title: "All existing orchestrator tests pass after cron infrastructure is added"
    setup: "Run full test suite in packages/backend/orchestrator/"
    action: "pnpm test --filter @repo/orchestrator"
    expected: "No regressions; all pre-existing tests still pass"
    evidence: "CI green on packages/backend/orchestrator test suite"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "CronJobDefinitionSchema.parse() does not throw for valid inputs"
      - "CronJobDefinitionSchema.parse() throws ZodError for invalid inputs"
      - "pg_try_advisory_lock mock returning false → runFn never called"
      - "withTimeout wrapping causes TIMEOUT status when deadline exceeded"
      - "CronRunResult.status is one of: success | failure | timeout | skipped"
      - "logger.info called with structured CronRunResult fields per job run"
      - "DISABLE_CRON_JOB_* env vars remove corresponding jobs from registry"
  frontend:
    # omitted — ui_touched: false

manual_cases:
  - id: MC-1
    title: "Register cron jobs against real LangGraph Platform (APIP-0030 integration gate)"
    steps:
      - "Ensure APIP-0030 LangGraph Platform is deployed and running"
      - "Run registerCronJobs with full production registry"
      - "Open LangGraph Studio and navigate to cron job list"
      - "Verify all 6 jobs appear with correct schedule expressions"
      - "Wait for Pattern Miner 15-minute trigger and observe run log"
    expected: "All 6 jobs visible in Studio; Pattern Miner run produces structured log entry"
    notes: "Gated behind APIP-0030 completion. Cannot run in CI without LangGraph Platform."

fixture_definitions:
  - name: validCronJobDefinition
    type: object
    description: "A well-formed CronJobDefinition with all required fields populated"
  - name: mockCronSchedulerAdapter
    type: mock
    description: "vi.fn() mock implementing CronSchedulerAdapter interface (register, deregister)"
  - name: mockPgClient
    type: mock
    description: "Mock pg client with pg_try_advisory_lock query stub"
  - name: neverResolvingRunFn
    type: function
    description: "async () => new Promise(() => {}) — for timeout test scenarios"

risks:
  - "Integration tests against real LangGraph Platform are blocked by APIP-0030; must use mock adapter for unit tests"
  - "vi.useFakeTimers() required for all timeout tests — real wall-clock waits (10+ min) are unacceptable in CI"
  - "Pattern Miner job cannot be tested end-to-end until APIP-3020 delivers runPatternMiner"
  - "Advisory lock test relies on mocking pg client — must ensure mock matches actual pg_try_advisory_lock query signature"
  - "Phase 4 stub jobs (code audit, KB compression, doc sync, worktree pruning) have no real runFn; tests should verify stub behavior is logged correctly"
