# Consumer Validation: ChangeSpecSchema vs 6 Consuming Systems
# ---------------------------------------------------------------------------
# Reference decomposition: APIP-0020 (Supervisor Loop)
# Validates all 6 consuming system perspectives against actual ChangeSpec fields.
# ---------------------------------------------------------------------------
schema: 1
story_id: "APIP-1020"
reference_decomposition: "APIP-0020"
generated_at: "2026-02-26T00:00:00.000Z"

# ---------------------------------------------------------------------------
# Architecture Notes: Required fields per consuming system
# (derived from APIP-1020 story Architecture Notes section)
# ---------------------------------------------------------------------------

consumers:
  # =========================================================================
  # 1. Implementation System
  # What it needs: which files to touch, what to do, which ACs to satisfy
  # =========================================================================
  - system: "implementation"
    description: "Agent that writes code. Needs to know what files to create/modify, what the change does, and which ACs to satisfy."
    required_fields:
      - field: "change_type"
        present: true
        example_value: "file_change"
        notes: "Discriminator tells implementation agent what kind of artifact to produce"
      - field: "file_path"
        present: true
        example_value: "apps/api/pipeline/src/supervisor/dispatch-router.ts"
        notes: "Present in file_change, migration_change, config_change, test_change variants"
      - field: "description"
        present: true
        example_value: "Implement dispatch router: thread ID derivation, circuit check..."
        notes: "Human-readable task description for the implementation agent"
      - field: "ac_ids"
        present: true
        example_value: ["AC-3", "AC-4", "AC-5", "AC-6", "AC-7", "AC-8", "AC-9", "AC-15"]
        notes: "Links implementation work to acceptance criteria"
      - field: "test_hints"
        present: true
        example_value: ["Mock runElaboration() at module boundary", "WallClockTimeoutError caught before error classifier"]
        notes: "Hints to guide test authoring alongside implementation"
      - field: "file_action"
        present: true
        example_value: "create"
        notes: "create|modify|delete — implementation knows whether to create new file or modify existing"
      - field: "dependencies"
        present: true
        example_value: ["CS-3", "CS-4", "CS-5"]
        notes: "Informs implementation agent which other changes must complete first"
    gaps: []
    verdict: "PASS"
    notes: "All required fields present. file_path field appears in all 4 variants — excellent coverage"

  # =========================================================================
  # 2. Review System
  # What it needs: what changed, why, what was the intent, cost estimate
  # =========================================================================
  - system: "review"
    description: "Agent or human that reviews code changes. Needs context on why a change was made and its scope."
    required_fields:
      - field: "description"
        present: true
        example_value: "Implement dispatch router with thread ID derivation..."
        notes: "Summary of what the change does"
      - field: "rationale"
        present: true
        example_value: "Core dispatch logic: routes by stage, enforces AC-3/AC-4/AC-5..."
        notes: "Present — but marked as optional in schema. Review system must handle absent rationale"
      - field: "ac_ids"
        present: true
        example_value: ["AC-3", "AC-4", "AC-5"]
        notes: "Reviewers can map change to story ACs to verify completeness"
      - field: "estimated_tokens"
        present: true
        example_value: 6000
        notes: "Optional field — CS-7/CS-8 in APIP-0020 have estimates. Some changes omit this"
      - field: "complexity"
        present: true
        example_value: "high"
        notes: "Complexity helps reviewer calibrate review depth"
    gaps:
      - field: "rationale"
        severity: "minor"
        description: "rationale is optional in schema — some changes (e.g. config scaffolding) omit it. Review system must degrade gracefully when absent"
    verdict: "PASS"
    notes: "Core review fields present. Minor gap: rationale should ideally be required for code changes (file_change/test_change variants)"

  # =========================================================================
  # 3. QA System
  # What it needs: what to test, test strategy, expected behavior, AC linkage
  # =========================================================================
  - system: "qa"
    description: "QA agent or human verifying acceptance criteria are satisfied. Needs test strategy, expected behavior, and AC linkage."
    required_fields:
      - field: "ac_ids"
        present: true
        example_value: ["AC-10"]
        notes: "QA maps each ChangeSpec to the ACs it satisfies — present in all changes"
      - field: "test_hints"
        present: true
        example_value: ["Mock runElaboration() via vi.mock()", "vi.useFakeTimers() for wall clock timeout test"]
        notes: "Test generation hints — present in all code-producing changes"
      - field: "test_strategy"
        present: true
        example_value: "unit"
        notes: "Tells QA which test tier owns coverage for this change"
      - field: "expected_behavior"
        present: true
        example_value: "Dispatch router routes correctly for all stages; timeout and error paths work"
        notes: "Optional but present in all APIP-0020 changes — QA can write assertions from this"
      - field: "test_type"
        present: true
        example_value: "unit"
        notes: "Present in test_change variant — maps to test framework and type"
    gaps:
      - field: "expected_behavior"
        severity: "minor"
        description: "expected_behavior is optional in schema. QA system must handle absent expected_behavior gracefully"
    verdict: "PASS"
    notes: "QA fields are comprehensive. test_hints and expected_behavior together give QA enough context to write or verify test assertions"

  # =========================================================================
  # 4. Telemetry System
  # What it needs: story attribution, cost tracking, complexity metrics
  # =========================================================================
  - system: "telemetry"
    description: "Pipeline telemetry that tracks cost, complexity, and token usage per story and per change."
    required_fields:
      - field: "story_id"
        present: true
        example_value: "APIP-0020"
        notes: "Story attribution — on every ChangeSpec"
      - field: "change_type"
        present: true
        example_value: "file_change"
        notes: "Distribution of change types is a key pipeline metric"
      - field: "estimated_tokens"
        present: true
        example_value: 6000
        notes: "Optional — telemetry aggregates available estimates; missing values are skipped"
      - field: "complexity"
        present: true
        example_value: "high"
        notes: "Complexity distribution helps calibrate future estimates"
      - field: "id"
        present: true
        example_value: "CS-6"
        notes: "Change-level granularity for telemetry rows"
    gaps:
      - field: "estimated_tokens"
        severity: "moderate"
        description: "Optional field — telemetry cannot compute median unless all changes have estimates. Recommend making estimated_tokens required for file_change and test_change variants in v2"
      - field: "actual_tokens"
        severity: "moderate"
        description: "No actual_tokens field — telemetry cannot compute estimate accuracy without post-implementation actuals. This is a deliberate v1 limitation (spike); add in v2"
    verdict: "PASS WITH GAPS"
    notes: "Core attribution and classification fields present. Two gaps: optional estimated_tokens reduces aggregate reliability; no actual_tokens field prevents estimate accuracy calculation. Both are v2 candidates"

  # =========================================================================
  # 5. Affinity System
  # What it needs: file groupings, story attribution, AC clustering
  # =========================================================================
  - system: "affinity"
    description: "System that clusters related changes together (same file, same AC, same domain). Used for PR grouping and dependency detection."
    required_fields:
      - field: "story_id"
        present: true
        example_value: "APIP-0020"
        notes: "Story grouping — all changes share story_id"
      - field: "ac_ids"
        present: true
        example_value: ["AC-3", "AC-4", "AC-5"]
        notes: "AC clustering — changes sharing ac_ids are related"
      - field: "file_path"
        present: true
        example_value: "apps/api/pipeline/src/supervisor/dispatch-router.ts"
        notes: "File grouping — changes to same file are related. Present in all variants"
      - field: "change_type"
        present: true
        example_value: "file_change"
        notes: "Type-based grouping (all migrations together, all tests together)"
      - field: "dependencies"
        present: true
        example_value: ["CS-3", "CS-4", "CS-5"]
        notes: "Dependency graph — affinity follows dependency edges"
    gaps:
      - field: "domain_tag"
        severity: "minor"
        description: "No explicit domain_tag field — affinity must infer domain from file_path. Adding a domain_tag (e.g. 'auth', 'queue', 'telemetry') in v2 would improve clustering accuracy"
    verdict: "PASS WITH GAPS"
    notes: "File path + AC IDs + dependencies provide sufficient grouping for Phase 0. domain_tag would improve quality but is not blocking"

  # =========================================================================
  # 6. Merge System
  # What it needs: file paths, change ordering, story attribution, safe merge detection
  # =========================================================================
  - system: "merge"
    description: "System that coordinates safe merging of changes, detects conflicts, and orders PR merges."
    required_fields:
      - field: "story_id"
        present: true
        example_value: "APIP-0020"
        notes: "Story attribution for merge grouping"
      - field: "file_path"
        present: true
        example_value: "apps/api/pipeline/src/supervisor/index.ts"
        notes: "File-level conflict detection — present in all variants"
      - field: "change_type"
        present: true
        example_value: "file_change"
        notes: "Merge system handles migrations differently (ordering) vs code changes"
      - field: "dependencies"
        present: true
        example_value: ["CS-3", "CS-6"]
        notes: "Dependency ordering — merge system respects this DAG"
      - field: "file_action"
        present: true
        example_value: "create"
        notes: "create vs modify vs delete — merge conflict detection differs by action"
    gaps:
      - field: "merge_order"
        severity: "minor"
        description: "No explicit merge_order field — merge system must derive order from dependencies graph. A numeric merge_order hint would simplify this, but dependencies provides sufficient information"
    verdict: "PASS WITH GAPS"
    notes: "Core merge fields present. dependencies field provides the ordering DAG. No blocking gaps for Phase 0"

# ---------------------------------------------------------------------------
# Overall Assessment
# ---------------------------------------------------------------------------
overall_verdict: "SCHEMA APPROVED"
field_coverage_summary:
  implementation: "COMPLETE"
  review: "COMPLETE (minor: optional rationale)"
  qa: "COMPLETE (minor: optional expected_behavior)"
  telemetry: "PARTIAL (moderate: optional estimated_tokens; missing actual_tokens)"
  affinity: "COMPLETE (minor: no domain_tag)"
  merge: "COMPLETE (minor: no merge_order)"

v2_recommendations:
  - "Make estimated_tokens required for file_change and test_change variants (telemetry reliability)"
  - "Add actual_tokens field (optional) for post-implementation accuracy tracking"
  - "Add domain_tag optional field (affinity improvement)"
  - "Consider making rationale required for file_change variant (review quality)"
  - "APIP-1010 dependency: ChangeSpec does not model change_outline — this is a deliberate spike limitation. Re-validate when APIP-1010 defines StructurerResultSchema"

blocking_gaps: []
non_blocking_gaps:
  - "rationale is optional — review system must handle absence"
  - "expected_behavior is optional — QA system must handle absence"
  - "estimated_tokens is optional — telemetry aggregates have uncertainty"
  - "no actual_tokens field — accuracy tracking deferred to v2"
  - "no domain_tag field — affinity clustering uses file_path inference"
