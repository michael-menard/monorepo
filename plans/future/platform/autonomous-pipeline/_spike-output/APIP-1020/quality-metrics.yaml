# ChangeSpec Decomposition Quality Metrics
# ---------------------------------------------------------------------------
# Per-decomposition quality metrics for APIP-1020 spike.
# Populated after decomposing 10 real APIP backlog stories.
# ---------------------------------------------------------------------------
schema: 1
story_id: "APIP-1020"
generated_at: "2026-02-26T00:00:00.000Z"

metric_definitions:
  ac_count: "Number of ACs in the source story"
  change_count: "Number of ChangeSpec entries in the decomposition"
  changes_per_ac: "change_count / ac_count (decomposition density)"
  ambiguous_fields:
    description: "Fields that required judgment or guessing (not derived from story text)"
    examples:
      - "estimated_tokens when story has no token estimate"
      - "complexity when story only lists files without detail"
      - "rationale when story has no architecture notes"
  token_cost_estimate: "Sum of estimated_tokens across all changes in the decomposition"
  accuracy_verdict:
    description: "Qualitative verdict on how well the decomposition reflects the story"
    options:
      HIGH: "All ACs covered; no ambiguous fields; changes map cleanly to story scope"
      MEDIUM: "All ACs covered; 1-3 ambiguous fields; some judgment required"
      LOW: "Missing ACs or many ambiguous fields; significant inference required"
      INCOMPLETE: "Story scope was too vague to decompose confidently"

