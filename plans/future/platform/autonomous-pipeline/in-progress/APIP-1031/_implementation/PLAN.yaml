architectural_decisions:
  - id: ARCH-001
    question: >-
      Should create-worktree node use execSync (from Architecture Notes GAP-2 pattern) or injectable spawn-based
      gitRunner (from merge/cleanup-worktree.ts lesson)?
    decision: >-
      Use injectable gitRunner (spawn-based) as default, with void IIFE cleanup pattern from GAP-2. The injectable
      pattern is explicitly recommended by the KB lesson on subprocess-dependent LangGraph nodes and is already
      established in cleanup-worktree.ts. The void IIFE cleanup is retained exactly as specified in GAP-2 — execSync
      inside the IIFE is replaced by gitRunner call to keep the pattern testable.
    rationale: >-
      KB lesson (d006bf9a) recommends injectable runner for all subprocess-dependent nodes. The
      merge/cleanup-worktree.ts precedent already uses this pattern in this package. execSync is not injectable and
      would block unit tests from mocking git CLI calls. Aggressive autonomy level allows auto-accept of this Tier 2
      (preference) decision.
    decided_by: auto
  - id: ARCH-002
    question: Where should unit test files for nodes live — flat __tests__ under nodes/, or per-node subdirectories?
    decision: >-
      Use flat __tests__ directories: nodes/__tests__/load-story.test.ts, nodes/__tests__/create-worktree.test.ts,
      nodes/__tests__/evidence-production.test.ts. Graph tests go in graphs/__tests__/implementation.test.ts.
    rationale: >-
      Matches the existing pattern observed in graphs/__tests__/ directory (elaboration.test.ts, etc.) and the merge
      nodes pattern. Tier 1 (clarification) — auto-accepted at aggressive autonomy.
    decided_by: auto
complexity: moderate
notes:
  - >-
    GAP-1 (CommitRecordSchema): Must be defined in ST-1 (graphs/implementation.ts) so APIP-1032 can import it. If
    missing, APIP-1032 is blocked.
  - >-
    GAP-2 (non-blocking cleanup): void IIFE pattern adapted to use injectable gitRunner instead of raw execSync for
    testability. The async IIFE is still fire-and-forget (not awaited by caller).
  - >-
    GAP-3 (createToolNode scope): createToolNode is used ONLY for runImplementation() workflow adapter export. Internal
    graph nodes are plain async functions registered via StateGraph.addNode(). Do not wrap internal nodes with
    createToolNode.
  - >-
    KB lesson (4d887140): Catch TypeScript interface usage at implementation time — all new types must be z.object()
    schemas with z.infer<>. Zero interfaces allowed in node or graph files.
  - >-
    KB lesson (d006bf9a): Use injectable gitRunner for subprocess calls in create-worktree node — enables unit test
    mocking without real git CLI.
  - 'KB lesson (3eb763f1): Use Zod safeParse for state extraction in nodes rather than raw type casts.'
  - 'Thread ID convention: {storyId}:implementation:{attemptNumber} — consistent with APIP-0020 pattern.'
  - >-
    ST-5 test files include tests for all 5 new implementation files. The change-spec-schema.ts and i-model-dispatch.ts
    Zod schema validation test is included in the implementation.test.ts suite.
  - 'Regression guard: pnpm test --filter @repo/orchestrator must pass unchanged after all changes.'
