# ============================================================================
# MVP-FOCUSED GAP ANALYSIS (only gaps blocking core user journey)
# ============================================================================

mvp_gaps:

  gap_1:
    id: GAP-001
    title: "afterAggregate export required for HP-6/HP-7 test cases"
    severity: medium
    blocks: "ST-7 implementation of HP-6 and HP-7"
    detail: |
      HP-6 and HP-7 specify testing the 'afterAggregate routing function' directly by invoking it.
      Currently afterAggregate is a private module-level function in elaboration.ts. It cannot
      be imported in elaboration.test.ts without being exported.
      Two options:
      (a) Export afterAggregate from elaboration.ts — simple, enables direct testing
      (b) Test routing behavior via graph execution (invoke graph with mock state, check node reached)
      Option (a) is cleaner for unit testing. Option (b) is more integration-style.
      Story must resolve this before ST-7 can be implemented as specified.
    recommendation: "Add 'export' keyword to afterAggregate function definition in ST-4. Update ST-7 to import and test directly."
    decision: add_ac
    decision_details: |
      Added AC-15: "The afterAggregate conditional edge function in elaboration.ts is exported as
      a named function for direct unit testing in elaboration.test.ts."
      Updated ST-4 ACs covered to include AC-15.
      Updated ST-7 ACs covered to include AC-15.
      This blocks test implementation in ST-7 — resolving as AC is appropriate.
    resolved: true

  gap_2:
    id: GAP-002
    title: "createTestState fixture update not assigned to any subtask"
    severity: medium
    blocks: "ST-7 elaboration.test.ts compilation after ST-3 adds new state fields"
    detail: |
      ElaborationState (from ElaborationStateAnnotation) has an explicit TypeScript type.
      The createTestState fixture in elaboration.test.ts constructs a full ElaborationState object.
      When ST-3 adds changeOutline, splitRequired, splitReason, structurerComplete to
      ElaborationStateAnnotation, the ElaborationState type gains new required fields (or fields
      with defaults that TypeScript may require explicit initialization in tests).
      If createTestState does not include these fields, pnpm check-types will fail.
      ST-7 reads elaboration.test.ts but does not explicitly list 'update createTestState fixture'
      as a task. This is a silent dependency that will surface as a TypeScript error.
    recommendation: "Add to ST-7 scope: 'Update createTestState fixture to include new fields: changeOutline: null, splitRequired: false, splitReason: null, structurerComplete: false'"
    decision: implementation_note
    decision_details: |
      Not a new AC — fixture update is implicit in ST-7 scope (test maintenance).
      Added explicit implementation note to ST-7: "Update createTestState fixture to include
      new fields: changeOutline: null, splitRequired: false, splitReason: null,
      structurerComplete: false."
      This is a subtask scope clarification, not a story-level requirement change.
    resolved: true

  gap_3:
    id: GAP-003
    title: "AC-2 omits extensions escape hatch field documented in Architecture Notes"
    severity: low
    blocks: "APIP-1020 forward compatibility (not a blocker for APIP-1010 itself)"
    detail: |
      Architecture Notes specify: 'Include extensions: z.record(z.unknown()).optional() escape hatch
      for APIP-1020 spike additions.' This field is referenced in AC-2's parent section but not
      in the AC-2 field list itself. If an implementor reads only AC-2, they will omit extensions.
      This is explicitly a forward-compatibility feature — APIP-1020 may need to add fields to
      ChangeOutlineItem. Without extensions, APIP-1020 would need a schema-breaking change.
    recommendation: "Add extensions field to AC-2 explicitly OR note it as implementation detail in Architecture Notes. Low urgency but needed before APIP-1020."
    decision: add_ac
    decision_details: |
      Updated AC-2 to explicitly include extensions field:
      "extensions (z.record(z.unknown()).optional() — forward-compatibility escape hatch for
      APIP-1020 spike additions per ADR-001 Decision 3)."
      Explicitly referenced in ADR-001 Decision 3 and Architecture Notes — promoting to AC
      ensures implementors do not miss this field when reading ACs only. The extensions field
      is a named architectural requirement, not an optional enhancement.
    resolved: true

  gap_4:
    id: GAP-004
    title: "createToolNode vs ElaborationState type mismatch in AC-4"
    severity: medium
    blocks: "ST-2 implementation without TypeScript errors"
    detail: |
      AC-4 specifies: 'createToolNode(structurer, async (state: ElaborationState) => ...)'.
      But createToolNode's NodeImplementation type is: (state: GraphState, config?) => ...
      ElaborationState is not GraphState — it is typeof ElaborationStateAnnotation.State.
      Two resolutions:
      (a) Use createToolNode with internal cast: (state: GraphState) => { const s = state as ElaborationState; ... }
      (b) Use plain async function (state: ElaborationState) => ... and wire directly into addNode()
      Delta-detect.ts uses approach (a). Elaboration.ts inline nodes use approach (b).
      If approach (b) is used, createToolNode wrapper is NOT used, losing retry/circuit-breaker.
      The story's intent is to use createToolNode for infrastructure benefits.
      Recommended: Approach (a) — consistent with delta-detect.ts canonical reference.
    recommendation: "Clarify ST-2 to use: createToolNode('structurer', async (state: GraphState) => { const s = state as ElaborationState; ... })"
    decision: implementation_note
    decision_details: |
      Not a new AC — this is an implementation pattern clarification.
      Added explicit implementation note to ST-2: "Use createToolNode with GraphState signature
      and cast internally: createToolNode('structurer', async (state: GraphState) => {
      const s = state as ElaborationState; ... }) per delta-detect.ts pattern.
      Do NOT type the outer parameter as ElaborationState."
      This follows the delta-detect.ts canonical reference exactly and does not require
      story scope changes.
    resolved: true

