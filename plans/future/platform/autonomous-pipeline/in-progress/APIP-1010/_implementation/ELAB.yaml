  # 1. SCOPE ALIGNMENT
  # --------------------------------------------------------------------------
  scope_alignment:
    verdict: PASS
    score: 9/10
    findings:
      - finding: "Story scope is tightly constrained to packages/backend/orchestrator only"
        severity: info
        detail: "No frontend, no database, no infrastructure changes — single package scope"
      - finding: "Non-goals are explicit and well-bounded — APIP-1020 ChangeSpec schema, automated splitting, LLM-primary path all excluded"
        severity: info
        detail: "Non-goals prevent scope creep into downstream stories"
      - finding: "Critical path position (story #3 of 12) correctly stated with unblocking rationale"
        severity: info
        detail: "Unblocks APIP-1020 and APIP-1030"
      - finding: "Baseline gap clearly documented — no Structurer exists, no change_outline schema exists"
        severity: info
        detail: "All new files are net-new, no pre-existing Structurer to refactor"
      - finding: "MINOR: Story scope says 'Files to Modify: elaboration.ts' but this file is large (1156 lines) — changes are surgical and bounded"
        severity: low
        detail: "The scope is well-defined: extend 3 schemas, update afterAggregate, add node to graph"

  # --------------------------------------------------------------------------
  # 2. INTERNAL CONSISTENCY
  # --------------------------------------------------------------------------
  internal_consistency:
    verdict: PASS_WITH_GAPS
    score: 7/10
    findings:
      - finding: "AC-4 says createStructurerNode implements 'createToolNode(structurer, async (state: ElaborationState) => ...)' but createToolNode takes GraphState, not ElaborationState"
        severity: medium
        detail: |
          Actual createToolNode signature: NodeImplementation = (state: GraphState, config?) => ...
          The elaboration graph nodes (e.g., createInitializeNode) take ElaborationState directly
          without going through createToolNode. The delta-detect.ts createDeltaDetectionNode uses
          createToolNode with (state: GraphState) and casts internally.
          The story must clarify: use createToolNode with (state: GraphState) cast to ElaborationState,
          OR use plain async function (state: ElaborationState) => ... as the graph nodes in elaboration.ts do.
          Recommendation: Follow elaboration.ts inline node pattern (plain async function) for consistency
          within the elaboration graph, OR follow delta-detect.ts createToolNode pattern.
          Both are valid — but the story's AC-4 description is slightly ambiguous about which to use.
        decision: null

      - finding: "AC-4 lists state updates: changeOutline, splitRequired, splitReason, structurerComplete:true — but AC-6 also includes structurerComplete in ElaborationStateAnnotation"
        severity: info
        detail: "Consistent — AC-4 lists what to return, AC-6 defines the state field. No conflict."

      - finding: "AC-5 describes afterAggregate routing but afterAggregate is NOT currently exported from elaboration.ts"
        severity: medium
        detail: |
          Currently afterAggregate is a private module-level function. The story extends it inline.
          ST-7 tests the routing behavior. For testability of ST-7, afterAggregate should be
          exported as a named function. The story does not explicitly require exporting afterAggregate,
          but HP-6 and HP-7 test cases invoke the 'afterAggregate routing function' directly.
          Gap: Either afterAggregate must be exported, or HP-6/HP-7 must test routing via graph execution.
        decision: null

      - finding: "HP-1 through HP-8 test plan maps correctly to AC-1 through AC-14 coverage — good alignment"
        severity: info
        detail: "8 happy paths, 3 error cases, 6 edge cases provide thorough coverage"

      - finding: "AC-11 describes graceful fallback when 'model error (if LLM path used)' — heuristic-first means LLM may never be called"
        severity: low
        detail: |
          The fallback mechanism (AC-11) is primarily for future-proofing when LLM path is added.
          For v1 heuristic-only implementation, model errors cannot occur. The fallback field
          (fallbackUsed: false) will always be false in v1. This is acceptable design but the
          EC-1 test will require a mock to simulate the condition.

      - finding: "StructurerConfigSchema nodeTimeoutMs (default 60000) is a separate concern from createToolNode's hardcoded 10000ms"
        severity: medium
        detail: |
          createToolNode hardcodes timeoutMs=10000. StructurerConfigSchema nodeTimeoutMs=60000 is
          not wired into the createToolNode call — it would be the node's internal logic timeout.
          If heuristic estimation runs in < 1 second, this mismatch is harmless. But if a future
          LLM path is added, 10000ms wrapper timeout will conflict with 60000ms config.
          Story should document this distinction or use createLLMNode if LLM path is in scope.
        decision: null

      - finding: "ChangeOutlineItemSchema includes 'extensions: z.record(z.unknown()).optional()' per Architecture Notes — but this field is NOT listed in AC-2"
        severity: medium
        detail: |
          AC-2 defines ChangeOutlineItemSchema fields as: id, filePath, changeType, description,
          complexity, estimatedAtomicChanges, relatedAcIds. The Architecture Notes section adds
          'extensions: z.record(z.unknown()).optional()' as an escape hatch.
          This is a gap between ACs and architecture — implementations might miss the extensions field.
          Recommend: Either add extensions to AC-2 explicitly, or note it as optional enhancement.
        decision: null

