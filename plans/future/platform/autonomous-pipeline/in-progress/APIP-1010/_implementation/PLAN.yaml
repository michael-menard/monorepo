architectural_decisions:
  - id: ARCH-001
    question: "createToolNode vs plain async function for Structurer node implementation"
    decision: "Use createToolNode with internal GraphState cast (approach a from delta-detect.ts canonical reference)"
    rationale: "Maintains retry/circuit-breaker wrapper from node-factory.ts. Consistent with delta-detect.ts canonical reference. ELAB.yaml GAP-004 explicitly resolved this with implementation note confirming delta-detect.ts approach."
    decided_by: elab-autonomous-decider
  - id: ARCH-002
    question: "afterAggregate export strategy for testability"
    decision: "Export afterAggregate as a named function from elaboration.ts (export function afterAggregate)"
    rationale: "ELAB.yaml GAP-001 resolved this by adding AC-15. Direct export enables clean unit testing in elaboration.test.ts without requiring graph execution. Story explicitly requires this export per AC-15."
    decided_by: elab-autonomous-decider
  - id: ARCH-003
    question: "Heuristic complexity estimation midpoints"
    decision: "Low=2 (1-3 changes), Medium=5 (3-8 changes), High=11 (8-15 changes). Cross-cutting flag from escapeHatchResult bumps estimates up one level."
    rationale: "Explicitly specified in Architecture Notes of story file. Deterministic midpoints enable controlled test fixtures for AC-13f threshold tests."
    decided_by: story-author

complexity: moderate

notes:
  - "Single package scope: packages/backend/orchestrator only. No frontend, no DB writes, no infra changes."
  - "afterAggregate current return type is 'update_readiness' | 'save_to_db' — must be extended to include 'structurer'. Existing addConditionalEdges call must be updated with 'structurer' in routing map."
  - "createTestState fixture in elaboration.test.ts must be updated to include new state fields before ST-7 tests can compile. New fields: changeOutline: null, splitRequired: false, splitReason: null, structurerComplete: false."
  - "delta-detect.ts uses interface GraphStateWithDeltaDetection — story must NOT copy this pattern. Use ElaborationState from elaboration.ts for all type references."
  - "ElaborationResultSchema uses z.unknown().nullable() for complex fields — structurer result fields should use typed schemas (ChangeOutlineItemSchema) as story specifies typed output."
  - "Backward compatibility: all new ElaborationResult fields use .nullable().default(null) or .default(false). All new ElaborationConfig fields use .default({}). No existing callers affected."
  - "escapeHatchResult field for cross-cutting detection: inspect escape-hatch.ts to find the relevant field (likely 'triggered' or a cross-cutting-specific field in EscapeHatchResult schema)."
  - "ElaborationPhaseSchema may need 'structurer' added as a valid phase value if currentPhase is set during Structurer execution. Inspect current phases before modifying."
  - "Server restart required after elaboration graph update per Architecture Notes."
  - "Regression risk: afterAggregate type annotation change may affect existing elaboration.test.ts expectations. ED-4 regression guard (AC-14) must catch this."
  - "ST-3 and ST-4 both modify elaboration.ts — implement ST-3 first (schema changes), then ST-4 (graph wiring) to maintain clean incremental check-types verification."
