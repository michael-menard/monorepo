feasible: true
confidence: high
rationale: >
  APIP-1010 is a well-scoped backend-only story that extends an existing LangGraph graph
  with a new node following established patterns. The createToolNode factory, Zod-first
  schemas, and ElaborationStateAnnotation extension patterns are all proven in existing
  orchestrator nodes (delta-detect.ts). The heuristic-first estimation approach avoids
  LLM call blocking. Backward compat is maintained through nullable Zod fields with defaults.
  No new packages, no DB writes, no Lambda involvement.
complexity: high
change_surface:
  areas:
    - "packages/backend/orchestrator/src/nodes/elaboration/ (new structurer.ts)"
    - "packages/backend/orchestrator/src/nodes/elaboration/index.ts (export additions)"
    - "packages/backend/orchestrator/src/graphs/elaboration.ts (state annotation, graph wiring, result schema)"
    - "packages/backend/orchestrator/src/nodes/elaboration/__tests__/structurer.test.ts (new)"
    - "packages/backend/orchestrator/src/graphs/__tests__/elaboration.test.ts (extension)"
  endpoints: []
  deploy_touchpoints:
    - "LangGraph dedicated server restart after elaboration graph update (APIP ADR-001 Decision 4)"

risks:
  - finding: "Regressing ElaborationResultSchema may break APIP-0020 supervisor integration"
    mitigation: >
      All new ElaborationResult fields must use .nullable().default(null) or .default(false).
      Run pnpm test:all against orchestrator package after schema extension before declaring done.
      APIP-0020 implementation should be notified that changeOutline is an optional forward-compat field.
  - finding: "afterAggregate conditional edge rewrite must not break existing routing to update_readiness"
    mitigation: >
      Extract afterAggregate as a pure named function (not inline arrow) to enable direct unit testing.
      Add graph routing tests (HP-6, HP-7) to cover both enabled and disabled Structurer paths.
      Existing elaboration.test.ts routing tests must all pass (ED-4 regression gate).
  - finding: "Heuristic complexity estimation quality may be low for novel AC patterns"
    mitigation: >
      Design heuristic as v1 baseline (1/2/3+ distinct system references = low/medium/high).
      Set fallbackUsed:true only for model error path, not heuristic path.
      Document that LLM enhancement is a Phase 2 improvement (out of scope for APIP-1010).
  - finding: "Missing export from elaboration/index.ts will silently break downstream imports"
    mitigation: >
      Subtask ST-5 explicitly adds exports. TypeScript compilation (pnpm check-types) will catch missing exports.
      This is a known blocker from the seed's 'Blockers to Avoid' section.

missing_requirements: []

evidence_expectations:
  - "pnpm check-types --filter packages/backend/orchestrator passes with zero errors after all changes"
  - "pnpm test --filter packages/backend/orchestrator — all existing elaboration.test.ts tests pass (regression)"
  - "Vitest coverage on structurer.ts >= 80% (per seed test plan recommendations)"
  - "StructurerResultSchema.parse(result) succeeds on happy-path node output"
  - "graph.compile() does not throw after Structurer is wired into elaboration graph"

subtasks:
  - id: ST-1
    title: "Define Structurer Zod schemas in structurer.ts"
    goal: "Create the new file packages/backend/orchestrator/src/nodes/elaboration/structurer.ts with StructurerConfigSchema, ChangeOutlineItemSchema, and StructurerResultSchema at the top of the file."
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/elaboration/delta-detect.ts"
      - "packages/backend/orchestrator/src/artifacts/story.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/nodes/elaboration/structurer.ts (CREATE)"
    acs: ["AC-1", "AC-2", "AC-3"]
    depends_on: none
    verification: "pnpm check-types --filter packages/backend/orchestrator"
    estimated_tokens: 6000

  - id: ST-2
    title: "Implement createStructurerNode factory with heuristic estimation"
    goal: "Add createStructurerNode(config) factory to structurer.ts using createToolNode('structurer', async (state) => ...). Implement heuristic complexity estimation (1/2/3+ distinct system references = low/medium/high). Implement graceful fallback on model error (fallbackUsed:true, complexity:'unknown' per AC)."
    files_to_read:
      - "packages/backend/orchestrator/src/runner/node-factory.ts"
      - "packages/backend/orchestrator/src/nodes/elaboration/delta-detect.ts"
      - "packages/backend/orchestrator/src/nodes/story/synthesize.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/nodes/elaboration/structurer.ts"
    acs: ["AC-4", "AC-9", "AC-10", "AC-11"]
    depends_on: ST-1
    verification: "pnpm check-types --filter packages/backend/orchestrator"
    estimated_tokens: 12000

  - id: ST-3
    title: "Extend ElaborationStateAnnotation and ElaborationResultSchema and ElaborationConfigSchema"
    goal: "In elaboration.ts: extend ElaborationStateAnnotation with changeOutline, splitRequired, splitReason, structurerComplete fields. Extend ElaborationResultSchema with nullable changeOutline, totalEstimatedAtomicChanges, splitRequired, splitReason. Extend ElaborationConfigSchema with structurerConfig sub-object."
    files_to_read:
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    acs: ["AC-6", "AC-7", "AC-8"]
    depends_on: ST-1
    verification: "pnpm check-types --filter packages/backend/orchestrator && pnpm test --filter packages/backend/orchestrator"
    estimated_tokens: 8000

  - id: ST-4
    title: "Wire Structurer node into elaboration graph"
    goal: "In elaboration.ts: add .addNode('structurer', createStructurerNode(fullConfig.structurerConfig)). Update afterAggregate conditional edge to route to 'structurer' when enabled:true, else to 'update_readiness'. Add edge from 'structurer' to 'update_readiness'. Populate ElaborationResult fields from state."
    files_to_read:
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    acs: ["AC-5"]
    depends_on: "ST-2, ST-3"
    verification: "pnpm check-types --filter packages/backend/orchestrator"
    estimated_tokens: 6000

  - id: ST-5
    title: "Export Structurer symbols from elaboration/index.ts"
    goal: "Add exports for ChangeOutlineItemSchema, StructurerResultSchema, StructurerConfigSchema, ChangeOutlineItem, StructurerResult, StructurerConfig, createStructurerNode from packages/backend/orchestrator/src/nodes/elaboration/index.ts."
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/elaboration/index.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/nodes/elaboration/index.ts"
    acs: ["AC-12"]
    depends_on: ST-2
    verification: "pnpm check-types --filter packages/backend/orchestrator"
    estimated_tokens: 2000

  - id: ST-6
    title: "Write unit tests for Structurer node (structurer.test.ts)"
    goal: "Create packages/backend/orchestrator/src/nodes/elaboration/__tests__/structurer.test.ts with Vitest tests covering: (a) happy path with multiple ACs, (b) split flagging when total > threshold, (c) no-split when total <= threshold, (d) empty ACs fallback (warning, no error), (e) model error fallback sets fallbackUsed:true, (f) splitThreshold config respected (test with threshold 5 and 3 items). Target >80% coverage on structurer.ts."
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/elaboration/__tests__/ (existing test patterns)"
      - "packages/backend/orchestrator/src/nodes/elaboration/structurer.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/nodes/elaboration/__tests__/structurer.test.ts (CREATE)"
    acs: ["AC-13"]
    depends_on: ST-2
    verification: "pnpm test --filter packages/backend/orchestrator -- structurer.test.ts"
    estimated_tokens: 10000

  - id: ST-7
    title: "Extend elaboration graph tests for Structurer routing and regression"
    goal: "In elaboration.test.ts: add tests verifying graph.compile() succeeds, afterAggregate routes to 'structurer' when enabled, afterAggregate routes to 'update_readiness' when disabled, and all pre-existing elaboration tests still pass. Mock createStructurerNode to a no-op for graph-level tests."
    files_to_read:
      - "packages/backend/orchestrator/src/graphs/__tests__/elaboration.test.ts"
      - "packages/backend/orchestrator/src/graphs/elaboration.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/graphs/__tests__/elaboration.test.ts"
    acs: ["AC-14"]
    depends_on: "ST-4, ST-6"
    verification: "pnpm test --filter packages/backend/orchestrator -- elaboration.test.ts"
    estimated_tokens: 8000
