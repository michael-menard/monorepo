notable_decisions:
  - >-
    ARCH-001: Used child_process.spawn wrapped in Promise for all subprocess calls
    (pnpm check-types, pnpm test, git add, git commit) — no execSync, no execa.
    Matches run-unit-tests.ts pattern from orchestrator codebase.
  - >-
    ARCH-002: Deferred micro-verify timeout to follow-up story. All integration
    tests use 180_000ms Vitest timeout as CI hang mitigation.
  - >-
    ARCH-003: vi.mock path for yaml-artifact-bridge is '../../persistence/yaml-artifact-bridge.js'
    (actual module import path, not package name).
  - >-
    ARCH-004: IModelDispatch.dispatch() signature confirmed as (ModelDispatchRequest) =>
    Promise<ModelDispatchResponse>. Prompt field carries ChangeSpec serialized as JSON.
  - >-
    OPP-3: toStateUpdate() helper in change-loop.ts is the single cast point for
    Partial<ImplementationGraphState> returns.
  - >-
    OPP-4: Idempotency contract documented in JSDoc comments explaining completedChanges
    check semantics and re-entry behavior.

known_deviations:
  - >-
    Pre-existing type errors in elaboration.ts (Expected 0-1 args), affinity-reader.ts
    (cannot find drizzle-orm), and nodes/elaboration/index.ts (AffinityConfigSchema missing)
    existed before this story and are NOT introduced by our changes.
  - >-
    Pre-existing test failures in structurer-affinity.test.ts (4), health-gate.integration.test.ts
    (6), load-story.test.ts (1), and models/integration.test.ts (2) existed before this story
    and are NOT introduced by our changes.
  - >-
    changeLoopStatus field added to ImplementationGraphStateAnnotation since the graph needs
    it to route afterChangeLoop edges. Not explicitly in the original APIP-1031 state schema
    but required for APIP-1032 routing.

