architectural_decisions:
  - id: ARCH-001
    question: 'withTimeout API: bare number or TimeoutOptions object as second arg?'
    decision: 'Use TimeoutOptions object: { timeoutMs, nodeName } in all job wrappers'
    rationale: Matches actual withTimeout signature in runner/timeout.ts (GAP-1 resolution from user input)
    decided_by: user
  - id: ARCH-002
    question: 'Advisory lock key: hashtext() or integer constant?'
    decision: 'Use fixed integer constant: LOCK_KEYS.PATTERN_MINER = 42_001 in cron/constants.ts'
    rationale: >-
      hashtext() is a PostgreSQL internal function, not a JS function — would throw ReferenceError at runtime (GAP-2
      resolution from user input)
    decided_by: user
  - id: ARCH-003
    question: 'pg Pool access in cron module: where does the client come from?'
    decision: Create cron/db.ts exporting getCronDbClient() backed by POSTGRES_* env vars; mockable via vi.mock('../cron/db')
    rationale: >-
      No shared pg singleton exists in orchestrator; scripts create their own Pool instances; this follows the same
      pattern (GAP-3 resolution from user input)
    decided_by: user
  - id: ARCH-004
    question: 'metrics-collection cron job: call runMetricsCollection or ship as stub?'
    decision: Ship as stub like Phase 4 jobs; defer real implementation to APIP-4070
    rationale: >-
      runMetricsCollection(storyId, hygieneResult, config) requires story-execution context unavailable in a cron job;
      modifying metrics.ts is out of scope for APIP-3090 (GAP-4 resolution from user input)
    decided_by: user
complexity: moderate
notes:
  - 'Scope decision: full_story — all 12 ACs in one story despite split_risk: 0.9'
  - 'E2E exempt: infrastructure-only story, no frontend impact (ADR-006)'
  - Integration tests against real LangGraph Platform gated behind APIP-0030 — only unit tests ship with this story
  - runPatternMiner from APIP-3020 is lazy-imported with conditional guard in pattern-miner.job.ts
  - 'KB lesson: never use TypeScript interfaces — all types via Zod + z.infer<> (caught in WINT-9090)'
  - 'KB lesson: z.record() requires two arguments: z.record(z.string(), z.unknown())'
  - >-
    Session-level advisory locks (pg_try_advisory_lock) are automatically released on pg client disconnect — no manual
    cleanup needed on restart
  - >-
    vi.useFakeTimers() + vi.advanceTimersByTimeAsync(timeoutMs + 1) is the correct pattern for timeout tests — avoids
    race conditions with Promise microtasks
  - >-
    All 6 job wrappers must use withTimeout(() => runFn(config), { timeoutMs: N, nodeName: 'job-name' }) — not
    withTimeout(runFn, N)
  - z.function() schemas in adapter.ts are structural markers only — add inline comment to prevent future confusion
  - No modifications to any existing graph/artifact/runner files — protected scope
