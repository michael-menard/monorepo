architectural_decisions:
  - id: ARCH-001
    question: "Async vs sync loadConfig() — how does SecretsClient integrate with synchronous provider interface?"
    decision: "Prefetch pattern (Option B) — secretsClient.prefetch() called at pipeline startup; providers call getSync() from pre-populated cache"
    rationale: "Non-goal explicitly prohibits modifying BaseProvider abstract interface (ILLMProvider.loadConfig(): unknown). Prefetch pattern preserves synchronous loadConfig() contract without any interface changes."
    decided_by: elaboration
    decided_at: "2026-02-25T00:00:00Z"
  - id: ARCH-002
    question: "Should concurrent get() calls deduplicate to a single SDK call?"
    decision: "Implement in-flight promise deduplication using Map<string, Promise<string>> inflight map"
    rationale: >
      ED-2 test case explicitly requires concurrent get() to result in a single SDK call.
      Implementation uses a secondary inflight map: if a fetch is in-progress for a given
      secretName, subsequent get() calls await the same promise. Auto-accepted (aggressive autonomy,
      well-scoped pattern, no architectural risk).
    decided_by: auto
    tier: 1

complexity: moderate

