  - "Static configCache on providers means rotated secrets are not picked up until process restart OR explicit SecretsClient.flush() + configCache clear — README must document both"
  - "minimax.ts imports its schema from ./__types__/minimax.js — maintain this pattern when modifying minimax.ts"
  - "Existing provider test files: __tests__/base.test.ts, factory.test.ts, minimax.integration.test.ts, minimax.test.ts — anthropic.test.ts and openrouter.test.ts are new files to create"
  - "@aws-sdk/client-secrets-manager is ESM-compatible natively (AWS SDK v3); orchestrator package.json has 'type: module' — no compatibility issue"
  - "generateConfigHash() in base.ts already destructures away apiKey (line 158) — this invariant is preserved automatically; no code change needed; verified by ED-4 test"
  - "ST-5 (CloudFormation) has no code dependencies — can be parallelized with ST-1 in implementation"
