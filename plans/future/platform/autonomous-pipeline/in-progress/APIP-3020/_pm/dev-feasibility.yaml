feasible: true
confidence: high
rationale: "All patterns required exist in the codebase. wintSchema, Drizzle ORM table definition patterns, drizzle-zod Zod schema generation, LangGraph StateGraph cron pattern (metrics.ts), and SQL migration structure are all established and verifiable. The main risk is the upstream APIP-3010 dependency for change_telemetry column names — mitigated by using the authoritative column list from APIP-3010's feature spec. The story scope is well-bounded: one new Drizzle table, one SQL migration, one LangGraph cron graph. No new external dependencies required."
complexity: medium
change_surface:
  areas:
    - packages/backend/database-schema/src/schema/wint.ts
    - packages/backend/database-schema/src/schema/__tests__/
    - packages/backend/orchestrator/src/graphs/pattern-miner.ts
    - apps/api/knowledge-base/src/db/migrations/ (new migration file)
  endpoints: []
  deploy_touchpoints:
    - "Aurora PostgreSQL migration must run before Pattern Miner cron job starts"
    - "LangGraph Platform cron registration (APIP-3090 handles scheduling; APIP-3020 provides the graph entry point)"

risks:
  - finding: "APIP-3010 (wint.change_telemetry) is in backlog — column names not yet confirmed in implementation"
    mitigation: "Use authoritative column list from APIP-3010 story spec: change_type, file_type, model, outcome, attempts, escalated_to, tokens, cost, duration. Wrap aggregation SQL in a named constant so it can be updated in one place if column names differ."
  - finding: "Incremental watermark persistence strategy not fully specified — needs to be clear whether watermark lives in model_affinity.last_aggregated_at or a separate state row"
    mitigation: "Use MAX(last_aggregated_at) from wint.model_affinity as the watermark for each (model, change_type, file_type) group. For cold-start (no rows yet), default watermark to epoch (1970-01-01). This avoids a separate state table."
  - finding: "pgEnum type confidenceLevelEnum must be created before the model_affinity table in the migration — order dependency"
    mitigation: "In SQL migration, CREATE TYPE wint.confidence_level AS ENUM before CREATE TABLE. In Drizzle schema, define confidenceLevelEnum = wintSchema.enum(...) before the table definition."

missing_requirements: []

evidence_expectations:
  - "pnpm check-types --filter @repo/db passes with new modelAffinity table and exported schemas"
  - "pnpm test --filter @repo/db runs schema tests including new ModelAffinityInsertSchema shape test"
  - "Migration SQL file runs cleanly on test DB in BEGIN/COMMIT transaction"
  - "Integration test: insert fixture rows into wint.change_telemetry, run runPatternMiner(), assert wint.model_affinity row has correct aggregated values"
  - "pnpm check-types --filter orchestrator passes with new pattern-miner.ts graph"

subtasks:
  - id: ST-1
    title: "Define wint.model_affinity Drizzle ORM schema with pgEnum and indexes"
    goal: "Add modelAffinity table to packages/backend/database-schema/src/schema/wint.ts following the wintSchema.table() pattern; define confidenceLevelEnum; export ModelAffinityInsertSchema and ModelAffinitySelectSchema via drizzle-zod"
    files_to_read:
      - packages/backend/database-schema/src/schema/telemetry.ts
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - packages/backend/database-schema/src/schema/wint.ts
    acs: ["AC-1", "AC-2", "AC-3"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/db"
    estimated_tokens: 8000

  - id: ST-2
    title: "Write SQL migration for wint.model_affinity table and indexes"
    goal: "Create migration file in apps/api/knowledge-base/src/db/migrations/ following BEGIN/COMMIT pattern; CREATE TYPE wint.confidence_level; CREATE TABLE IF NOT EXISTS wint.model_affinity with all columns; CREATE UNIQUE INDEX on (model, change_type, file_type); CREATE INDEX on confidence_level and last_aggregated_at"
    files_to_read:
      - apps/api/knowledge-base/src/db/migrations/015_artifact_type_tables.sql
    files_to_modify:
      - apps/api/knowledge-base/src/db/migrations/ (new file: NNN_wint_model_affinity.sql)
    acs: ["AC-4"]
    depends_on: ST-1
    verification: "Run migration against test PostgreSQL DB; verify table and indexes exist"
    estimated_tokens: 5000

  - id: ST-3
    title: "Add schema shape tests for ModelAffinityInsertSchema and ModelAffinitySelectSchema"
    goal: "Add test to packages/backend/database-schema/src/schema/__tests__/ verifying both schemas accept valid objects and reject invalid ones; run existing schema test suite to confirm AC-13 regression guard passes"
    files_to_read:
      - packages/backend/database-schema/src/schema/__tests__/
    files_to_modify:
      - packages/backend/database-schema/src/schema/__tests__/ (new or existing wint schema test file)
