    goal: "Implement the core aggregation SQL (SELECT...FROM wint.change_telemetry WHERE created_at > $watermark GROUP BY model, change_type, file_type); implement weighted average upsert (INSERT...ON CONFLICT DO UPDATE); implement trend detection (compare new success_rate to previous; store as jsonb {direction, delta, computed_at}); persist watermark via MAX(last_aggregated_at)"
