architectural_decisions:
  - id: ARCH-001
    question: "PlaceholderChangeSpecSchema field names — use camelCase or snake_case?"
    decision: "Use snake_case to match the story's documented placeholder schema and existing DB schema conventions in this codebase (wint.model_affinity uses snake_case)"
    rationale: "Consistent with documented placeholder in story Architecture Notes section and existing DB schema conventions"
    decided_by: agent
  - id: ARCH-002
    question: "Should affinity-query.ts use a single batched query for all (model_id, change_type) pairs or multiple keyed queries?"
    decision: "Single batched query: SELECT all rows WHERE model_id = $1, then filter by change_type/file_type in-process during prompt assembly"
    rationale: "Story Architecture Notes explicitly prescribes this approach to avoid N queries per ChangeSpec. More efficient and matches the stated design intent."
    decided_by: agent
  - id: ARCH-003
    question: "wint.model_affinity column names are not yet confirmed (APIP-3020 not complete) — how to handle column references?"
    decision: "Define column names as named constants at the top of affinity-query.ts (e.g., COLUMN_MODEL_ID, COLUMN_CHANGE_TYPE) to enable single-location updates when APIP-3020 finalizes the schema"
    rationale: "Story dev_feasibility.risks explicitly prescribes this mitigation"
    decided_by: agent

complexity: moderate

notes:
  - "APIP-1020 (ChangeSpec Schema) not yet complete — PlaceholderChangeSpecSchema used throughout. Each fixture in tests must carry '// TODO: re-validate against ADR-002 before merge' comment."
  - "APIP-3020 (wint.model_affinity table) must exist in local Docker DB before integration tests can run. Unit tests mock @repo/db per ADR-005."
  - "Profile freshness lag (daily cron from APIP-3020) is accepted as advisory — documented in node JSDoc."
  - "MAX_WEAK_PATTERNS_INJECTED default=5, strong cap=3, WEAKNESS_THRESHOLD default=0.6, AFFINITY_CONFIDENCE_MIN default=medium per story Architecture Notes."
  - "ESCALATION_MODEL_DEFAULT default='claude-sonnet-4-6' per AC-9."
  - "Do NOT import LeaderboardSchema or LeaderboardEntry directly — use as conceptual reference only per story Reuse Plan non-goals."
  - "Story has 14 test cases (AC-7 lists 8 in headline but test plan table has HP-1..5 + EC-1..5 + ED-1..4 = 14). The '8' in AC-7 text appears to be a stale count; implement all 14."
  - "No barrel files — all imports use direct source paths per CLAUDE.md."
  - "e2e_exempt: true (frontend_impacted: false, ADR-006 skip condition)."
