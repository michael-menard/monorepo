    slice: packages
    verification: "pnpm test --filter @repo/orchestrator -- diff-planner/affinity-query"
    acs_covered: ["AC-1", "AC-4", "AC-5", "AC-8"]

  - id: 3
    subtask_id: "ST-3"
    description: >
      Define diff-planner-output.ts in artifacts. Include DiffPlannerOutputSchema with
      z.literal(1) versioning, profile_metadata as optional field (profile_used, model_id,
      confidence_level, weak_patterns_injected, escalation_preassigned), and
      PlaceholderChangeSpecSchema with documented TODO comment for APIP-1020 re-validation.
    files:
      - "packages/backend/orchestrator/src/artifacts/diff-planner-output.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/artifacts/plan.ts"
    dependencies: [1]
    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-6", "AC-8"]

  - id: 4
    subtask_id: "ST-4"
    description: >
      Implement prompt-assembly.ts: confidence threshold gate, affinity summary builder
      (weak patterns capped at MAX_WEAK_PATTERNS_INJECTED, strong patterns capped at 3,
      sorted by success_rate), prompt injection, ChangeSpec escalation_model annotation
      for patterns below WEAKNESS_THRESHOLD. Use z.discriminatedUnion('change_type')
      for change_type-specific injection dispatch. Wire prompt-assembly into index.ts.
    files:
      - "packages/backend/orchestrator/src/nodes/diff-planner/prompt-assembly.ts"
      - "packages/backend/orchestrator/src/nodes/diff-planner/index.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/story/fanout-ux.ts"
      - "packages/backend/orchestrator/src/nodes/diff-planner/affinity-query.ts"
      - "packages/backend/orchestrator/src/artifacts/diff-planner-output.ts"
    dependencies: [2, 3]
    slice: packages
    verification: "pnpm test --filter @repo/orchestrator -- diff-planner/prompt-assembly"
    acs_covered: ["AC-2", "AC-3", "AC-4"]

  - id: 5
    subtask_id: "ST-5"
    description: >
      Write Vitest unit test suite covering all 14 test cases from AC-7 and the test plan
      (HP-1 through HP-5, EC-1 through EC-5, ED-1 through ED-4). Mock @repo/db for DB
      error cases. Mark PlaceholderChangeSpecSchema fixtures with TODO comment for
      ADR-002 re-validation. All tests must pass via
      pnpm test --filter @repo/orchestrator -- diff-planner.
    files:
      - "packages/backend/orchestrator/src/nodes/diff-planner/__tests__/diff-planner.test.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/diff-planner/index.ts"
      - "packages/backend/orchestrator/src/nodes/diff-planner/affinity-query.ts"
      - "packages/backend/orchestrator/src/nodes/diff-planner/prompt-assembly.ts"
      - "packages/backend/orchestrator/src/artifacts/diff-planner-output.ts"
    dependencies: [4]
    slice: packages
