    slice: packages
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-6", "AC-9"]

  - id: 2
    subtask_id: "ST-2"
    description: >
      Implement affinity-query.ts: query wint.model_affinity via @repo/db keyed by
      (model_id, change_type). Implement three fallback paths: no rows → return null,
      DB error → log warning via @repo/logger and return null, Zod parse failure → log
      warning and return null. Update __types__/index.ts with AffinityProfileSchema.
    files:
      - "packages/backend/orchestrator/src/nodes/diff-planner/affinity-query.ts"
      - "packages/backend/orchestrator/src/nodes/diff-planner/__types__/index.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/model-selector/leaderboard.ts"
      - "packages/backend/orchestrator/src/model-selector/__types__/index.ts"
