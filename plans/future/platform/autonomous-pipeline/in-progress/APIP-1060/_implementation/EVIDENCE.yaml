notable_decisions:
  - >-
    ARCH-001: run-unit-tests and run-e2e-tests use createNode (not createToolNode) with large
    nodeTimeoutMs to accommodate the 5-minute subprocess timeout. createToolNode has a hardcoded
    10s timeout that would preempt the application-layer subprocess timeout.
  - >-
    Tests (c) and (f) in qa.test.ts use vi.useRealTimers() instead of fake timers because
    the full happy-path PASS flow through LangGraph with multiple async node hops and spawn
    mocks requires real async resolution. Other tests use fake timers successfully.
  - >-
    storyId added to QAGraphStateAnnotation (beyond story spec) to satisfy node-factory
    infrastructure which reads state.storyId in createNodeExecutionContext().

known_deviations:
  - >-
    pnpm build fails due to pre-existing type errors in src/__types__/index.ts,
    src/nodes/context/context-warmer.ts, and src/nodes/context/session-manager.ts (missing
    @repo/database-schema and @repo/mcp-tools packages). These errors exist in the baseline
    before APIP-1060 changes and are not caused by our new files.
  - >-
    ELAB OPP-004 (gate reasoning stored as string, structured data lost) deferred per
    AC-15 backward-compat constraint.
