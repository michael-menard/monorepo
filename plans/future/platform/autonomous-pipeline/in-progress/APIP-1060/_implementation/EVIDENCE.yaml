          run-e2e-tests logs qa_e2e_started/attempt/complete, verify-acs logs
          qa_ac_verification_started/qa_ac_verified, gate-decision logs qa_gate_decision.
          All tests verify stage:'qa', event, and relevant fields.

  - ac_id: AC-17
    ac_text: worktreeDir required field (no default) in QAGraphConfigSchema
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/graphs/qa.ts
