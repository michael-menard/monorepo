          compatible' verifies schema accepts partial data.

  - ac_id: AC-16
    ac_text: >-
      @repo/logger lifecycle events with correct fields at every transition
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/
