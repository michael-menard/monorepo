acceptance_criteria:
  - ac_id: AC-1
    ac_text: QAGraphConfigSchema with all required fields and defaults in qa.ts
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/graphs/qa.ts
        description: >-
          QAGraphConfigSchema defined via z.object() with all fields: worktreeDir (required,
          min(1)), storyId, enableE2e (default true), testFilter (default '@repo/orchestrator'),
          playwrightConfig, playwrightProject, testTimeoutMs (default 300000), testTimeoutRetries
          (default 1), playwrightMaxRetries (default 2), kbWriteBackEnabled (default false),
          artifactBaseDir (default '...'), gateModel (default 'claude-sonnet-4-5'), nodeTimeoutMs
          (default 60000). All defaults per spec.

  - ac_id: AC-2
    ac_text: QAGraphStateAnnotation with all required state fields
    status: PASS
    evidence_items:
      - type: file
        path: packages/backend/orchestrator/src/graphs/qa.ts
        description: >-
          QAGraphStateAnnotation with Annotation.Root() containing: storyId, evidence, review,
          config, preconditionsPassed, unitTestResult, unitTestVerdict, playwrightAttempts,
          e2eVerdict, acVerifications, qaVerdict, gateDecision, qaArtifact, qaComplete, errors
          (array reducer), warnings (array reducer). All fields with defaults.

  - ac_id: AC-3
    ac_text: check-preconditions node blocks when review FAIL or evidence null/invalid
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/check-preconditions.test.ts
        description: >-
          7 tests pass: PASS when valid, BLOCKED when review FAIL, BLOCKED when review null,
          BLOCKED when evidence null, BLOCKED when evidence fails schema validation, lifecycle
          logging tests. All pass via 'pnpm test --filter @repo/orchestrator'.

  - ac_id: AC-4
    ac_text: run-unit-tests node with timeout, retry, success paths and stdout capture
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/run-unit-tests.test.ts
        description: >-
          4 tests pass: PASS when exit code 0, FAIL when exit code 1, lifecycle logging,
          timedOut flag on timeout. Uses createNode (not createToolNode) with nodeTimeoutMs =
          testTimeoutMs * (retries+1) + 30000 per ARCH-001.

  - ac_id: AC-5
    ac_text: run-e2e-tests node with per-attempt retry, PASS if any attempt succeeds
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/run-e2e-tests.test.ts
        description: >-
          4 tests pass: attempt 1 fail + attempt 2 succeed = PASS, all attempts fail = FAIL,
          first attempt success = PASS (1 attempt recorded), lifecycle logging. Uses createNode
          per ARCH-001 with large timeout.

  - ac_id: AC-6
    ac_text: verify-acs node with PASS/FAIL/BLOCKED paths, model failure = BLOCKED per AC
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/verify-acs.test.ts
        description: >-
          5 tests pass: PASS from model, FAIL from model, model failure on AC-1 = BLOCKED
          (continues to AC-2+), null evidence gracefully returns empty array, lifecycle logging.
          Model failure on individual AC returns BLOCKED (not FAIL) and processing continues.

  - ac_id: AC-7
    ac_text: AC_VERIFICATION_PROMPT_V1 contains anti-hallucination instruction
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/verify-acs.test.ts
        description: >-
          Test 'AC_VERIFICATION_PROMPT_V1 contains anti-hallucination instruction' checks that
          the constant contains 'ANTI-HALLUCINATION', 'EXPLICITLY present', 'Do NOT infer',
          and 'fabricate'. All assertions pass.

  - ac_id: AC-8
    ac_text: gate-decision node with PASS/FAIL/BLOCKED aggregate and model failure = BLOCKED
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/gate-decision.test.ts
        description: >-
          6 tests pass: PASS when all ACs pass + model agrees, FAIL when ACs fail, BLOCKED on
          model failure, qaPassedSuccessfully() called before PASS, PASS downgraded to FAIL when
          qaPassedSuccessfully() fails, lifecycle logging.

  - ac_id: AC-9
    ac_text: write-qa-artifact node writes QA-VERIFY.yaml with correct path, conditional KB write-back
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/write-qa-artifact.test.ts
        description: >-
          7 tests pass: writes to correct path (worktreeDir/artifactBaseDir/storyId/QA-VERIFY.yaml),
          path contains storyId, no KB write when kbWriteBackEnabled=false, KB log written when
          kbWriteBackEnabled=true, handles write failure gracefully with qaComplete=false,
          lifecycle logging, backward compatibility.

  - ac_id: AC-10
    ac_text: StateGraph wiring with all conditional edges, graph.compile() succeeds
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/graphs/__tests__/qa.test.ts
        description: >-
          Test '(j) graph.compile() succeeds without throwing' verifies graph compiles.
          Tests (i) verifies enableE2e:false routes unit_tests→verify_acs (spawn called once).
          Tests (f)/(g) verify E2E routing. All 11 graph tests pass.

  - ac_id: AC-11
    ac_text: runQA() returns QAGraphResult with verdict, qaArtifact, durationMs, completedAt
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/graphs/__tests__/qa.test.ts
        description: >-
          Test 'runQA() returns QAGraphResult with verdict and qaArtifact' verifies all fields:
          storyId, verdict, qaArtifact, durationMs, completedAt, errors, warnings.
          Validated via QAGraphResultSchema.parse() in runQA() implementation.

  - ac_id: AC-12
    ac_text: qaPassedSuccessfully() invoked before PASS returned in gate-decision
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/gate-decision.test.ts
        description: >-
          Two tests: 'calls qaPassedSuccessfully() before returning PASS' verifies the check
          is invoked. 'downgrades PASS to FAIL when qaPassedSuccessfully() fails' verifies
          downgrade behavior when check fails. Both pass.

  - ac_id: AC-13
    ac_text: >-
      10 graph-level test scenarios covering all QA graph paths
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/graphs/__tests__/qa.test.ts
        description: >-
          All 10 scenarios pass: (a) preconditions BLOCKED review FAIL, (b) preconditions BLOCKED
          evidence null, (c) happy path PASS (25ms with real timers), (d) unit test FAIL,
          (e) AC verify FAIL, (f) E2E retry success attempt 1 fail attempt 2 succeed (12ms),
          (g) E2E all fail, (h) gate model failure BLOCKED, (i) enableE2e:false skips E2E,
          (j) graph.compile() succeeds. Plus runQA() result shape test.

  - ac_id: AC-14
    ac_text: 6 node test files in nodes/qa/__tests__/ covering all node scenarios
    status: PASS
    evidence_items:
      - type: test
        path: packages/backend/orchestrator/src/nodes/qa/__tests__/
        description: >-
          6 test files created: check-preconditions.test.ts (7 tests), run-unit-tests.test.ts
