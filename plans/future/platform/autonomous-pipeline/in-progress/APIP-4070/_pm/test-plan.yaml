strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "triggerWeeklyReport with all four data sources available returns dispatched summary"
    setup: "Seed wint.change_telemetry with 3 completed stories and 1 blocked story in 7-day window; seed wint.model_affinity_profiles with 2 model rows; seed wint.codebase_health with baseline + 1 recent snapshot; mock dispatchNotification to capture payload"
    action: "Call triggerWeeklyReport(config, db, notificationConfig) with valid config and mocked notificationConfig"
    expected: "Returns WeeklyPipelineSummary with throughput.stories_completed=3, costs.total_usd > 0, model_performance populated, codebase_health populated; dispatchNotification called once with valid Slack Block Kit payload; logger.info emitted with event=weekly_report_dispatched"
    evidence: "dispatchNotification mock call args; logger spy for weekly_report_dispatched event"

  - id: HP-2
    title: "aggregateThroughput returns correct stories_completed and success_rate"
    setup: "Injectable DB mock returning 5 rows: 4 status=completed, 1 status=blocked in 7-day window"
    action: "Call aggregateThroughput(mockDb, { start: '...', end: '...' })"
    expected: "Returns { stories_completed: 4, stories_blocked: 1, success_rate: 0.8 }"
    evidence: "Vitest assertion on return value shape and math"

  - id: HP-3
    title: "aggregateCosts returns total_usd and per-provider breakdown"
    setup: "Injectable DB mock returning rows: [{ model_provider: 'anthropic', estimated_cost_usd: 0.12 }, { model_provider: 'openai', estimated_cost_usd: 0.08 }, { model_provider: 'anthropic', estimated_cost_usd: 0.05 }]"
    action: "Call aggregateCosts(mockDb, window)"
    expected: "Returns { total_usd: 0.25, by_provider: { anthropic: 0.17, openai: 0.08 } }"
    evidence: "Vitest assertion on return value; floating-point within 0.001"

  - id: HP-4
    title: "aggregateModelPerformance returns per-model success rates and trend"
    setup: "Injectable DB mock returning [{ model_id: 'claude-3-haiku', first_try_success_rate: 0.72, escalation_rate: 0.15, trend_direction: 'improving' }]"
    action: "Call aggregateModelPerformance(mockDb, window)"
    expected: "Returns { by_model: { 'claude-3-haiku': { first_try_success_rate: 0.72, escalation_rate: 0.15, trend_direction: 'improving' } } }"
    evidence: "Vitest snapshot assertion"

  - id: HP-5
    title: "aggregateCodebaseHealth returns delta from baseline"
    setup: "Injectable DB mock returning baseline snapshot (is_baseline=true, lint_warnings=50) and recent snapshot (lint_warnings=73); both within 7-day window"
    action: "Call aggregateCodebaseHealth(mockDb, window)"
    expected: "Returns metrics_within_threshold, metrics_drifted includes 'lint_warnings', delta_from_baseline reflects +23 drift"
    evidence: "Vitest assertion on metrics_drifted array and delta fields"

  - id: HP-6
    title: "deriveTopImprovementAndConcern returns human-readable strings"
    setup: "WeeklyPipelineSummary with model first_try_success_rate improved from 0.62 to 0.78 for model-A; codebase_health lint_warnings drifted +23"
    action: "Call deriveTopImprovementAndConcern(summary)"
    expected: "Returns { top_improvement: string containing 'model-A' and improvement context, top_concern: string containing 'lint_warnings' }"
    evidence: "Vitest assertion on string content via toContain"

  - id: HP-7
    title: "formatSlackMessage produces valid Slack Block Kit JSON structure"
    setup: "Fully populated WeeklyPipelineSummary with all sections available"
    action: "Call formatSlackMessage(summary)"
    expected: "Returns object with blocks[] array; each section (throughput, costs, model_performance, codebase_health) has at least one block; no external library used; JSON.stringify(result) valid"
    evidence: "Vitest assertion blocks.length >= 4; snapshot for stable structure"

  - id: HP-8
    title: "Integration: triggerWeeklyReport with seeded DB produces non-empty summary"
    setup: "Docker Compose PostgreSQL at localhost:5432/lego_dev; seed wint.change_telemetry with 2 completed stories; mock dispatchNotification"
    action: "Call triggerWeeklyReport(config, realDb, mockedNotificationConfig)"
    expected: "Summary.throughput.stories_completed = 2; dispatchNotification mock called; no errors thrown"
    evidence: "Integration test with real DB connection; jest.fn or vi.fn for dispatchNotification"

error_cases:
  - id: EC-1
    title: "aggregateThroughput returns data_unavailable when wint.change_telemetry does not exist"
    setup: "Injectable DB mock throws PostgresError with code 42P01 (relation does not exist)"
    action: "Call aggregateThroughput(mockDb, window)"
    expected: "Returns { data_unavailable: true }; does NOT throw"
    evidence: "Vitest assertion on return value; no thrown exception"

  - id: EC-2
    title: "aggregateModelPerformance returns data_unavailable when wint.model_affinity_profiles does not exist"
    setup: "Injectable DB mock throws error with code 42P01"
    action: "Call aggregateModelPerformance(mockDb, window)"
    expected: "Returns { data_unavailable: true }; does NOT throw"
    evidence: "Vitest assertion"

  - id: EC-3
    title: "aggregateCodebaseHealth returns data_unavailable when wint.codebase_health does not exist"
    setup: "Injectable DB mock throws error with code 42P01"
    action: "Call aggregateCodebaseHealth(mockDb, window)"
    expected: "Returns { data_unavailable: true }; does NOT throw"
    evidence: "Vitest assertion"

  - id: EC-4
    title: "aggregateCodebaseHealth returns data_unavailable when fewer than 2 snapshots available"
    setup: "Injectable DB mock returns only 1 snapshot (baseline only, no recent snapshot)"
    action: "Call aggregateCodebaseHealth(mockDb, window)"
    expected: "Returns { data_unavailable: true } with no crash"
    evidence: "Vitest assertion"

  - id: EC-5
    title: "triggerWeeklyReport with all sections data_unavailable does NOT dispatch notification"
    setup: "All four aggregation functions mocked to return { data_unavailable: true }"
    action: "Call triggerWeeklyReport(config, mockDb, notificationConfig)"
    expected: "dispatchNotification NOT called; logger.warn emitted with event=weekly_report_skipped reason=no_data; function returns without throw"
    evidence: "dispatchNotification mock call count = 0; logger.warn spy"

  - id: EC-6
    title: "triggerWeeklyReport does NOT throw when dispatchNotification fails"
    setup: "Mock dispatchNotification to throw network error after valid summary generated"
    action: "Call triggerWeeklyReport(config, mockDb, notificationConfig)"
    expected: "Function completes without throwing; error is swallowed-and-logged per APIP-2010 fire-and-forget pattern"
    evidence: "No exception propagated; logger.warn or logger.error spy for dispatch failure"

  - id: EC-7
    title: "Notification config missing NOTIFICATION_WEBHOOK_URL causes process.exit(1) at startup"
    setup: "NotificationConfigSchema.safeParse with env vars missing NOTIFICATION_WEBHOOK_URL"
    action: "Invoke config validation path with missing env var"
    expected: "process.exit(1) called; error message logged"
    evidence: "vi.spyOn(process, 'exit'); logger spy"

edge_cases:
  - id: ED-1
    title: "Empty 7-day window (no telemetry rows) emits no_data warn and skips notification"
    setup: "Injectable DB mock returns empty arrays for all queries; wint tables exist but have no rows in window"
    action: "Call triggerWeeklyReport(config, mockDb, notificationConfig)"
    expected: "logger.warn emitted with event=weekly_report_skipped and reason=no_data; dispatchNotification not called; no throw"
    evidence: "logger.warn spy call args; dispatchNotification mock call count = 0"

  - id: ED-2
    title: "formatSlackMessage renders unavailable sections as italic unavailable text"
    setup: "WeeklyPipelineSummary with model_performance.data_unavailable=true and codebase_health.data_unavailable=true"
    action: "Call formatSlackMessage(summary)"
    expected: "Blocks for unavailable sections contain text matching '_Data unavailable — dependency story not yet merged_'"
    evidence: "Vitest toContain assertion on block text content"

  - id: ED-3
    title: "deriveTopImprovementAndConcern returns null for both when data insufficient"
    setup: "WeeklyPipelineSummary with all sections data_unavailable=true"
    action: "Call deriveTopImprovementAndConcern(summary)"
    expected: "Returns { top_improvement: null, top_concern: null }"
    evidence: "Vitest strict equality"

  - id: ED-4
    title: "WeeklyReportConfigSchema rejects missing minHistoryWeeks field"
    setup: "Config object without minHistoryWeeks key"
    action: "Call WeeklyReportConfigSchema.safeParse(badConfig)"
    expected: "safeParse.success === false; error.issues includes minHistoryWeeks path"
    evidence: "Vitest assertion on safeParse result"

  - id: ED-5
    title: "Cost aggregation handles zero rows without NaN (empty provider map)"
    setup: "Injectable DB mock returns empty array for cost query within window"
    action: "Call aggregateCosts(mockDb, window)"
    expected: "Returns { total_usd: 0, by_provider: {} } — no NaN or undefined"
    evidence: "Vitest assertion; isNaN check on total_usd"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "WeeklyPipelineSummarySchema.parse(result) passes Zod validation"
      - "dispatchNotification mock called with Slack Block Kit structure (blocks array)"
      - "logger.info spy: event=weekly_report_dispatched with required fields"
      - "logger.warn spy: event=weekly_report_skipped with reason=no_data"
      - "DB mock: confirm 7-day window filter applied (created_at >= NOW() - INTERVAL '7 days')"
  frontend: ~

manual_cases:
  - id: MC-1
    title: "UAT: Real Slack workspace delivery with seeded DB"
    steps:
      - "Set NOTIFICATION_WEBHOOK_URL to real test Slack workspace webhook"
      - "Seed wint.change_telemetry with at least 5 completed story rows in past 7 days"
      - "Call triggerWeeklyReport() manually (operator CLI or test script)"
      - "Inspect Slack channel for received message"
    expected: "Message appears in Slack with correct period header, 4 sections (or unavailable markers), top improvement/concern highlighted"

fixture_definitions:
  - name: weeklyWindow
    type: "{ start: string (ISO), end: string (ISO) }"
    description: "7-day lookback window; end = now, start = now - 7 days"
  - name: mockDb
    type: "Injectable DB interface (Drizzle-compatible)"
    description: "Vitest mock object implementing select/from/where query chain; returns seeded rows per test"
  - name: mockDispatchNotification
    type: "vi.fn()"
    description: "Replaces real dispatchNotification; captures payload for assertion"
  - name: completedStoryRow
    type: "wint.change_telemetry row"
    description: "{ story_id, status: 'completed', estimated_cost_usd, model_provider, created_at }"
  - name: blockedStoryRow
    type: "wint.change_telemetry row"
    description: "{ story_id, status: 'blocked', estimated_cost_usd: 0, model_provider, created_at }"
  - name: modelAffinityRow
    type: "wint.model_affinity_profiles row"
    description: "{ model_id, first_try_success_rate, escalation_rate, trend_direction }"
  - name: healthBaselineRow
    type: "wint.codebase_health row"
    description: "{ is_baseline: true, captured_at, lint_warnings, type_errors, test_coverage }"
  - name: healthRecentRow
    type: "wint.codebase_health row"
    description: "{ is_baseline: false, captured_at (within 7 days), lint_warnings, type_errors, test_coverage }"

risks:
  - "Integration test requires wint schema migrations to be run; APIP-3010, APIP-3020, APIP-4010 tables may not exist in CI without those stories merged — test must gracefully handle missing tables (same as unit EC-1..EC-3 pattern)"
  - "dispatchNotification is defined in APIP-2010 deliverable not yet merged; integration test must accept a local stub until dependency lands"
  - "Slack Block Kit structure can change; snapshot tests may become brittle if Block Kit schema evolves — prefer structural assertions (blocks.length, block.type checks) over full snapshots"
  - "Port 5432 conflict with other integration tests running in parallel; use test isolation with unique table name prefix or truncation after each test"
  - "pg_try_advisory_lock behavior in integration test environment may cause non-deterministic skips if advisory lock is held — document that integration tests should run sequentially, not in parallel"
