architectural_decisions:
  - id: ARCH-001
    question: Where should the dispatchNotification type be defined when APIP-2010 is not yet merged?
    decision: >-
      Define a local DispatchNotificationFn type alias in __types__/index.ts as a Zod-inferred function type or plain
      TypeScript type. When APIP-2010 lands, update the import to use theirs directly.
    rationale: >-
      APIP-2010 files do not exist on disk. Blocking on the import would cause compile failures. A local type alias
      matching the expected signature enables full unit test coverage now and is a trivial 2-line change when the real
      import is available.
    decided_by: planner
  - id: ARCH-002
    question: Should the integration test try to create wint.change_telemetry if it doesn't exist, or skip if absent?
    decision: >-
      Integration test uses CREATE TABLE IF NOT EXISTS wint.change_telemetry with the minimal columns needed (story_id,
      status, estimated_cost_usd, model_provider, created_at) in a beforeAll block, inserts seed rows, runs the test,
      then drops the table in afterAll. This avoids dependency on APIP-3010 being deployed.
    rationale: >-
      The story explicitly states integration tests must handle missing dependency tables. Creating a minimal schema in
      the test harness is the standard pattern for this project's integration tests and enables CI to pass without
      APIP-3010/3020/4010 merged.
    decided_by: planner
  - id: ARCH-003
    question: Should weekly-report.ts use the getCronDbClient Pool (pg.Pool) or a Drizzle db client for DB queries?
    decision: >-
      Use a pg.Pool (raw postgres client) injected as the db parameter, matching the pattern used in
      pattern-miner.job.ts and cron/db.ts. SQL queries are raw parameterized strings, not Drizzle ORM queries. This
      avoids adding a Drizzle dependency to the reporting node and keeps the query surface minimal.
    rationale: >-
      The canonical cron jobs (pattern-miner, code-audit) all use raw pg.Pool. The wint.ts schema file is referenced
      only for column name awareness. Drizzle is not imported in cron job contexts. Keeping raw pg queries is consistent
      and avoids Drizzle import complexity when the target tables may not exist.
    decided_by: planner
complexity: complex
