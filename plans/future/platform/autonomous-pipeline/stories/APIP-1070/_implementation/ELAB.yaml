# ==============================================================================
# GAP ANALYSIS
# ==============================================================================

gaps:
  - id: GAP-01
    severity: medium
    category: reuse_friction
    finding: >
      The YamlArtifactWriter is a class-based API (YamlArtifactWriter class with
      PathResolver dependency) but the story describes usage as "YAML artifact writer
      pattern" without specifying how the writer will be constructed (which PathResolver
      configuration to use, what feature/stage/storyId parameters to pass to
      writeArtifact()). The write-merge-artifact node writes to
      "plans/future/platform/autonomous-pipeline/in-progress/{storyId}/" but the
      YamlArtifactWriter expects (feature, stage, storyId, artifactType) parameters
      mapped through PathResolver. MERGE.yaml is not a registered YamlArtifactType
      (registered types: story, elaboration, plan, verification, proof, context, tokens).
      The implementer will need to use writeProof() or writeGenericYaml() as a
      workaround, or extend the writer. This is not a blocker if writeProof() is used,
      but it creates a naming mismatch (the artifact writes as proof.yaml not MERGE.yaml).
    recommendation: >
      Story should specify: use writeProof() with a custom PathResolver configured for
      the autonomous-pipeline feature directory, OR use direct fs.writeFile with atomic
      pattern (temp file → rename) bypassing YamlArtifactWriter, OR confirm that a
      new 'merge' artifact type will be registered. The implementer must resolve this
      before ST-10.
    decision: add_ac
    ac_added: >
      AC-18: The write-merge-artifact node writes MERGE.yaml using direct atomic
      filesystem write (write to temp file, then fs.rename() to final path) to
      {featureDir}/in-progress/{storyId}/MERGE.yaml. It does NOT use YamlArtifactWriter
      class — the merge artifact type is not registered in the writer's type system and
      this avoids unnecessary coupling. The atomic write pattern (temp + rename) ensures
      no partial writes on crash.

  - id: GAP-02
    severity: medium
    category: reuse_interface_mismatch
    finding: >
      The extract-learnings node states it "calls createPersistLearningsNode(config)
      from persist-learnings.ts with injected KB deps". However, createPersistLearningsNode
      returns a LangGraph node function (NodeFunction) that expects GraphState — it
      internally calls extractLearnings(state) which reads state.extractedLearnings
      and state.errors (from GraphState interface). The MergeGraphStateAnnotation does
      not extend GraphState and uses a different state shape. Directly invoking
      createPersistLearningsNode() inside the merge graph's extract-learnings node
      requires either: (a) calling the returned node function with a GraphState-shaped
      object cast, (b) calling the underlying persistLearnings() function directly
      with pre-extracted learnings, or (c) populating state.extractedLearnings in the
      merge state annotation.
      The story's AC-9 says to call createPersistLearningsNode(config) — but this
      factory returns a node function, not a direct call interface. The actual persist
      operation (persistLearnings()) is the function to call with a Learning[] array.
    recommendation: >
      Clarify the call pattern: the extract-learnings node should convert QA lessons
      to Learning[] (category mapping per Architecture Notes) then call persistLearnings()
      directly (exported from persist-learnings.ts), not createPersistLearningsNode().
      Alternatively, explicitly note that the LangGraph node wrapper is invoked with
      a state adapter. This is resolvable but the current AC-9 language is ambiguous
      enough to cause implementation friction.
    decision: add_ac
    ac_added: >
      AC-19: The extract-learnings node calls persistLearnings() directly (exported
      from persist-learnings.ts) with a pre-built Learning[] array — it does NOT use
      createPersistLearningsNode() factory, which returns a NodeFunction expecting a
      different GraphState shape than MergeGraphStateAnnotation.

  - id: GAP-03
    severity: low
    category: testability
    finding: >
      The createToolNode factory has a built-in 10s timeout (timeoutMs: 10000) and
      2 retry attempts. The poll-ci node's internal async loop can run for up to
      ciTimeoutMs (default 1,800,000ms = 30 minutes). Running poll-ci inside
      createToolNode will immediately timeout at 10s in production. The story
      architecture note says poll-ci uses "internal async loop" but does not address
      the createToolNode default timeout override needed. If createToolNode is used
      as-is, poll-ci will fail immediately in production.
    recommendation: >
      AC-6 should explicitly state that poll-ci uses createNode() with a custom
      timeout set to ciTimeoutMs (or slightly above), not the default createToolNode()
      10s timeout. Or specify a createSimpleNode() with no timeout, managing the
      timeout internally via the loop's Date.now() comparison. This is a runtime
      correctness issue, not just a test concern.

opportunities:
  - id: OPP-01
    category: observability
    finding: >
      AC-17 specifies 13 log event types but does not specify log level guidance for
      each event (info vs debug). In production, merge_ci_poll events at ciPollIntervalMs
      (30s default) could generate substantial log volume at info level (up to 60
      events per 30-min CI run). Recommending debug level for poll events with info
      only on state changes (pass/fail/timeout transitions) would reduce noise.
    blocking: false

  - id: OPP-02
    category: resilience
    finding: >
      The check-preconditions node checks gh auth status but does not check that
      config.worktreeDir exists on disk before running. A missing worktree would cause
      rebase-branch to fail immediately. A cheap fs.access() check in preconditions
      would give a cleaner MERGE_BLOCKED message vs a raw subprocess error from git.
    blocking: false

  - id: OPP-03
    category: resilience
    finding: >
      RISK-1070-04 (main branch advancement during CI polling causing stale PR checks)
      is disclosed but no mitigation is specified in architecture notes. A re-rebase
      after CI failure due to behind-HEAD could recover the situation. Currently,
      a stale PR failure routes to MERGE_FAIL with no recovery path.
    blocking: false

  - id: OPP-04
    category: testing
    finding: >
      ST-14 specifies 12 graph-level scenarios in merge.test.ts but the scenarios
      list in AC-14 only names 12 items (a through l). The test plan referenced
      (_pm/test-plan.yaml) is not present in the story directory. If the test plan
      file is expected to exist as a companion artifact, it should be created as part
      of elaboration or noted as a deliverable. Currently the story references
      "See _pm/test-plan.yaml for complete scenario list" but no _pm/ directory exists.
    blocking: false

  - id: OPP-05
    category: correctness
    finding: >
      The squash commit message format (Architecture Notes) includes
      "Co-authored-by: APIP Pipeline <noreply@pipeline>" but the email domain
      "noreply@pipeline" is not a valid RFC 5322 email address. GitHub may reject
      or silently drop the Co-authored-by trailer with an invalid email. Suggest
      using a valid format like "noreply@pipeline.local" or the repo's noreply address.
    blocking: false

  - id: OPP-06
    category: resilience
    finding: >
      The ciStatus field in MergeGraphStateAnnotation includes 'running' in its enum
      ('pending' | 'running' | 'pass' | 'fail' | 'timeout') but AC-6's polling logic
      only sets 'pass', 'fail', or 'timeout' as terminal states. 'pending' and
      'running' are intermediate states within the loop. It is not documented when
      these intermediate states are written to the graph state (every poll? never?).
      If LangGraph checkpoints after each poll iteration (it won't — the loop is
      internal), these would be useful. As-is, intermediate ciStatus values may only
      appear in the final artifact if the node is interrupted unexpectedly.
    blocking: false

# ==============================================================================
# VERDICT
# ==============================================================================

preliminary_verdict: CONDITIONAL_PASS

verdict_rationale: >
  The story is well-structured, internally consistent, and demonstrates strong
  reuse-first discipline with all canonical references verified against actual
  source files. The 9-point audit passes 8 items cleanly. The sizing WARN is
  architectural (not a decomposition problem) and split is not recommended.
  Three gaps were identified:
  GAP-01 (medium): MERGE.yaml write path requires clarification — YamlArtifactWriter
    does not have a 'merge' artifact type; writeProof() or direct fs write must be
    specified for ST-10.
  GAP-02 (medium): createPersistLearningsNode() interface mismatch with MergeGraphState —
    implementer must call persistLearnings() directly or adapt the state shape. AC-9
    language is ambiguous.
  GAP-03 (low): poll-ci uses createToolNode() which has a 10s hardcoded timeout,
    incompatible with 30-minute CI polling. Must use createNode() with custom timeout.
  None of these gaps block story start — they block specific subtasks (ST-10, ST-09,
  ST-06) and must be resolved before those subtasks begin. The story may proceed to
  implementation with the condition that these three gaps are addressed either via
  story amendment or implementer decision log before the relevant subtasks execute.

