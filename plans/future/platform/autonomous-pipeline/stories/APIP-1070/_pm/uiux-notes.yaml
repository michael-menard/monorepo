story_id: APIP-1070
generated: "2026-02-25"
skipped: true
reason: >
  APIP-1070 is a headless LangGraph worker graph with no UI components.
  There are no user-facing screens, no React components, and no frontend
  interactions for this story. Operator visibility is deferred to APIP-5005
  (Minimal Operator Visibility CLI).

artifact_ux_notes:
  description: >
    Although there is no UI, the MERGE.yaml artifact is the primary
    operator-readable output before APIP-5005 is built. The following
    guidelines apply to ensure the artifact is human-readable and actionable.
  guidelines:
    - field: verdict
      values: ["MERGE_COMPLETE", "MERGE_FAIL", "MERGE_BLOCKED"]
      note: >
        Use uppercase screaming-snake format. Downstream stories (APIP-5005,
        APIP-4010) and operators depend on exact string matching.

    - field: block_reason
      format: "Complete actionable sentence"
      good_example: "Rebase conflict on src/components/Foo.tsx — manual intervention required"
      bad_example: "Rebase failed"
      note: >
        The block_reason must tell an operator exactly what happened and what
        action to take. A vague reason like 'Rebase failed' forces the operator
        to dig through logs. A good reason includes the conflicting file(s) and
        the remediation step.

    - field: pr_url
      format: "Full GitHub URL"
      good_example: "https://github.com/org/repo/pull/123"
      bad_example: "123"
      note: >
        Must be a full URL that an operator can open directly in a browser
        without needing to know the repo owner/name.

    - field: error
      note: >
        Include the raw gh CLI or git stderr output when available. Operators
        need the original error message to understand failures without SSH
        access to the server.

  pr_body_ux:
    description: >
      The PR description template should be human-readable first, machine-
      parseable second. An operator reviewing the PR before merge should
      immediately understand what the story changed and what QA verified.
    recommended_sections:
      - "Story: {storyId} — {storyTitle}"
      - "QA Summary: {generateQaSummary(qaVerify)} output"
      - "Verified ACs: list of ac IDs from acs_verified"
      - "Changed Files: list from QA evidence"
      - "Note: Automated PR by APIP pipeline — do not manually merge"
    notes: >
      Keep the story ID and title at the top so operators can triage at a
      glance in the GitHub PR list. The 'do not manually merge' note prevents
      operator interference with the autonomous pipeline's squash-merge step.
