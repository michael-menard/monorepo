      - AC-1
      - AC-2
      - AC-3
      - AC-4
  - id: 2
    subtask_id: ST-2
    description: >-
      Implement scanDeadExports, scanUnusedFiles, and scanUnusedDeps in
      packages/backend/orchestrator/src/nodes/dead-code/scanners.ts. All three accept injectable execFn: (cmd: string)
      => Promise<string>. scanDeadExports runs ts-prune and parses output into DeadExportFinding[]. scanUnusedFiles runs
      TypeScript compiler analysis for no-importers. scanUnusedDeps loops over all package.json paths running depcheck.
      All three respect excludePatterns config. Dynamic import guard: files only referenced via import(...) are excluded
      from findings.
    files:
      - packages/backend/orchestrator/src/nodes/dead-code/scanners.ts
    files_to_read:
      - packages/backend/orchestrator/src/nodes/dead-code/schemas.ts
      - packages/backend/orchestrator/src/nodes/audit/lens-typescript.ts
