architectural_decisions:
  - id: ARCH-001
    question: LOCK_KEYS constant for DEAD_CODE_REAPER — which integer key to use?
    decision: Use 42_002 (PATTERN_MINER is 42_001; increment by 1 for the next cron job)
    rationale: >-
      ARCH-002 in the codebase mandates fixed integer constants (not hashtext()). 42_002 follows the established
      numbering sequence in cron/constants.ts.
    decided_by: planner
  - id: ARCH-002
    question: Should the CLEANUP story backlog directory scan use the worktree path or the repo root path?
    decision: >-
      Use the monorepo root path (not worktree path) for scanning existing CLEANUP-NNNN directories and writing new
      story.yaml files. The backlog is a shared resource in the repo, not per-worktree.
    rationale: >-
      CLEANUP stories are written to plans/future/platform/autonomous-pipeline/backlog/ which is a repo-level directory,
      not worktree-local. The Reaper writes to the live repo path, consistent with how story.yaml files are tracked in
      git.
    decided_by: planner
  - id: ARCH-003
    question: How should the CronRunResult for dead-code-reaper be extended with domain-specific summary counts (AC-11)?
    decision: >-
      Emit an extended log object via @repo/logger.info that includes all CronRunResult fields PLUS the domain counts
      (findingsTotal, verifiedDeletions, falsePositives, cleanupStoriesGenerated). Do not extend CronRunResultSchema —
      log the extra fields as a superset object. The cron registry's CronRunResultSchema.parse() is not involved in the
      runner's internal logging.
    rationale: >-
      CronRunResultSchema is defined in cron/schemas.ts and is not specific to dead-code-reaper. Extending it globally
      for one job's domain counts would pollute the shared schema. The runner logs its own richer summary independently
      before returning, keeping the shared cron infrastructure clean.
    decided_by: planner
complexity: complex
notes:
  - >-
    AC-14 supersedes AC-9 ID format: use CLEANUP-NNNN (e.g., CLEANUP-0001) not APIP-CLEANUP-NNNN. StoryArtifactSchema id
    regex is /^[A-Z]+-\d+$/.
  - >-
    AC-8 CRITICAL: withTimeout throws NodeTimeoutError — it does NOT return partial. runDeadCodeReaper MUST wrap in
    try/catch, catch NodeTimeoutError, and convert to {status:'partial', verifiedDeletions: accumulated}.
  - >-
    AC-10 cron registration is NOT deferred — APIP-3090 is complete and buildCronRegistry/registerCronJobs are
    available. Implement fully in ST-6.
  - >-
    ARCH-002 (codebase): pg_try_advisory_lock must use integer key from LOCK_KEYS constant, NOT hashtext(). Add
    DEAD_CODE_REAPER: 42_002 to cron/constants.ts.
  - All unit tests use dryRun:true and mock execFn — no real CLI invocations in CI.
  - vi.useFakeTimers() in timeout test MUST be restored in afterEach to prevent test leakage.
  - >-
    scanUnusedFiles uses TypeScript compiler analysis for no-importers (not a separate tool like unimported). Parse tsc
    --listFiles or similar output.
  - >-
    Backlog scan in generateCleanupStory: readdirSync on plans/future/platform/autonomous-pipeline/backlog/, filter for
    CLEANUP-\d{4} pattern, find max N, use N+1.
  - 'KB context note: opp-4 (shared runTsPrune helper with APIP-4010) is logged but NOT in scope for this story.'
  - >-
    KB context note: opp-2 (bounded concurrent micro-verify pool) is logged but NOT in scope — sequential is correct for
