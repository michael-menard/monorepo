  - id: 4
    subtask_id: ST-4
    description: >-
      Implement runDeadCodeReaper in packages/backend/orchestrator/src/nodes/dead-code/runner.ts. Orchestrates: (1)
      acquires pg_try_advisory_lock via LOCK_KEYS.DEAD_CODE_REAPER — exits with status:'skipped' if not acquired; (2)
      runs all three scanners concurrently via Promise.all up to maxFindingsPerRun total; (3) micro-verifies each safe
      candidate sequentially; (4) filters false-positives; (5) returns DeadCodeReaperResult. Wraps the full operation
      with withTimeout from runner/timeout.ts. MUST catch NodeTimeoutError explicitly and convert to
      DeadCodeReaperResult with status:'partial' and accumulated verifiedDeletions. Emits structured
      CronRunResult-shaped log via @repo/logger on completion (AC-11).
