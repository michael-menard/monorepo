feasible: true
confidence: high
rationale: "APIP-4050 follows well-established patterns already present in the orchestrator codebase. The createMetricsGraph()/runMetricsCollection() factory pattern is a direct template; the injectable execFn pattern from APIP-4010 is proven; withTimeout from runner/timeout.ts is already available. The primary complexity is the micro-verify loop cost and ts-prune false positive handling — both mitigated by dryRun mode, injectable mocks for testing, and the mandatory excludePatterns config. The cron registration is explicitly deferred (AC-10) pending APIP-3090, which removes the blocking dependency from this story's definition of done."
complexity: high
change_surface:
  areas:
    - "packages/backend/orchestrator/src/nodes/dead-code/ (new module)"
    - "packages/backend/orchestrator/src/graphs/ (new dead-code-reaper.ts graph — additive only)"
    - "packages/backend/orchestrator/src/artifacts/ (new dead-code schemas — additive)"
    - "packages/backend/orchestrator/src/cron/ (registration deferred to APIP-3090 gate)"
  endpoints: []
  deploy_touchpoints:
    - "No deploy changes required — new module is loaded lazily by cron scheduler (APIP-3090)"

risks:
  - finding: "ts-prune false positive rate on barrel-free monorepo"
    mitigation: "No-barrel-files policy (CLAUDE.md) reduces false positive risk significantly. Implement dynamic import guard (AC-5) to exclude files referenced only via import(...). Provide excludePatterns config (AC-1) for known dynamic patterns. Micro-verify (AC-6) is the ultimate safety net — no deletion proposed without passing typecheck."

  - finding: "Micro-verify cost: pnpm check-types per finding with maxFindingsPerRun:50 could take 12-50 minutes"
    mitigation: "Use targeted tsc --project packages/{pkg}/tsconfig.json instead of pnpm check-types:all for each micro-verify invocation. The 5-minute timeoutMs (AC-8) via withTimeout guarantees partial results rather than runaway cost. Monthly cron schedule means wall-clock cost is acceptable. Document the targeted-tsc approach in the implementation."

  - finding: "depcheck must run per-package.json in workspace context, not single top-level pass"
    mitigation: "Implement scanUnusedDeps as a loop over all package.json paths discovered by glob (exclude node_modules). Each invocation uses a separate depcheck call with the package's directory as cwd. This is a known pattern for pnpm workspaces."

  - finding: "CLEANUP story ID race condition with APIP-4010 concurrent execution"
    mitigation: "Use pg_try_advisory_lock (AC-10) to serialize Dead Code Reaper execution. APIP-4010 (Health Gate) and APIP-4050 (Dead Code Reaper) run on different schedules (every 5th merge vs monthly) — concurrent execution is unlikely. Additionally, fs.readdirSync on the backlog directory at story creation time + sequential ID increment provides a safe last-resort guard. Document coordination requirement in both stories."

  - finding: "ts-prune subprocess invocation without injectable execFn makes unit tests depend on real monorepo state"
    mitigation: "All scan functions accept injectable execFn: (cmd: string) => Promise<string> (AC-5). Unit tests mock execFn with fixture strings. Real execFn only used in integration tests tagged [integration, requires-monorepo] which are gated from standard CI."

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter @repo/orchestrator passes with all new unit tests (HP-1 through HP-9, EC-1 through EC-7, ED-1 through ED-6)"
  - "pnpm check-types --filter @repo/orchestrator passes with zero new errors"
  - "pnpm lint --filter @repo/orchestrator passes with zero new warnings"
  - "DeadCodeReaperConfigSchema.parse() with valid and invalid inputs demonstrates Zod validation"
  - "generateCleanupStory output passes StoryArtifactSchema.parse() — regression guard for story format"
  - "Timeout path test uses vi.useFakeTimers() and resolves in < 100ms wall-clock"

