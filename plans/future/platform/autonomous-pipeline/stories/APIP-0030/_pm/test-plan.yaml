strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
happy_path_tests:
  - id: HP-1
    title: "Compose config validates without errors"
    setup: "infra/langgraph-server/compose.langgraph-server.yaml exists"
    action: "docker compose -f infra/langgraph-server/compose.langgraph-server.yaml config"
    expected: "Command exits 0; valid YAML printed to stdout with all service definitions"
    evidence: "Exit code 0 in CI or local shell"
  - id: HP-2
    title: "All services healthy within 60 seconds of compose up"
    setup: "Server provisioned (APIP-5006 complete); Aurora accessible; ports 8123/8124 free"
    action: "docker compose -f infra/langgraph-server/compose.langgraph-server.yaml up -d && sleep 60 && docker compose ps"
    expected: "All services (langgraph-platform, langgraph-checkpoint-postgres, langgraph-checkpoint-init) show 'healthy' or 'exited 0' for init container"
    evidence: "docker compose ps output showing all healthy statuses"
  - id: HP-3
    title: "LangGraph Platform API responds to health check on port 8123"
    setup: "Services started per HP-2"
    action: "curl -f http://localhost:8123/ok || curl -f http://localhost:8123/health"
    expected: "HTTP 200 response within 60 seconds"
    evidence: "curl exit code 0; response body logged"
  - id: HP-4
    title: "Studio UI accessible on port 8124 from internal network"
    setup: "Services started per HP-2"
    action: "curl -f http://localhost:8124"
    expected: "HTTP 200 or redirect response; LangGraph Studio UI HTML served"
    evidence: "curl exit code 0; Content-Type: text/html in response"
  - id: HP-5
    title: "Restart restores service within 60 seconds"
    setup: "Services started per HP-2; API health confirmed"
    action: "docker compose restart langgraph-platform && sleep 60 && curl -f http://localhost:8123/ok"
    expected: "API health check passes within 60s; no data loss"
    evidence: "curl exit code 0 after restart"
  - id: HP-6
    title: "Aurora langgraph_checkpoint schema initialized; connection pool isolated"
    setup: "Services started per HP-2; langgraph-checkpoint-init completed"
    action: "psql $LANGGRAPH_CHECKPOINT_DATABASE_URL -c '\\dt' | grep checkpoint"
    expected: "LangGraph checkpoint tables present (e.g. checkpoints, checkpoint_blobs, checkpoint_writes); connection uses dedicated credentials, not @repo/db creds"
    evidence: "psql output shows checkpoint schema tables; credentials differ from main DB"
  - id: HP-7
    title: "Studio UI port 8124 bound to 127.0.0.1 only (not publicly exposed)"
    setup: "Services started per HP-2"
    action: "ss -tlnp | grep 8124"
    expected: "Listen address shows '127.0.0.1:8124', not '0.0.0.0:8124' or '*:8124'"
    evidence: "ss -tlnp output showing 127.0.0.1 bind"
error_cases:
  - id: EC-1
    title: "Init container fails fast when Aurora unreachable"
    setup: "Aurora connection string points to unreachable host"
    action: "docker compose up -d langgraph-checkpoint-init"
    expected: "Init container exits non-zero; clear error message in logs about connection failure; dependent services not started"
    evidence: "docker compose logs langgraph-checkpoint-init shows connection error; exit code non-zero"
  - id: EC-2
    title: "Compose fails with clear error on port conflict"
    setup: "Port 8123 or 8124 already in use on server"
    action: "docker compose up -d langgraph-platform"
    expected: "Docker reports bind error on conflicting port; compose exits non-zero"
    evidence: "docker compose output contains 'port is already allocated' or similar"
edge_cases:
  - id: ED-1
    title: "Checkpoint state recoverable after abrupt container kill"
    setup: "Start langgraph-platform; trigger a test graph execution to create at least one checkpoint write"
    action: "docker kill langgraph-platform; docker compose start langgraph-platform; verify checkpoint state in DB"
    expected: "After restart, previously checkpointed graph state readable from langgraph_checkpoint DB"
    evidence: "psql query shows checkpoint row created before kill still present after restart"
  - id: ED-2
    title: "Service version pinned — no 'latest' tag drift"
    setup: "Read compose file"
    action: "grep -E 'image:.*latest' infra/langgraph-server/compose.langgraph-server.yaml"
    expected: "No 'latest' tags; all images pinned to specific version (e.g. 0.0.9)"
    evidence: "grep returns no matches"
tooling_evidence:
  backend:
    http_requests:
      - "GET http://localhost:8123/ok — LangGraph API health"
      - "GET http://localhost:8124 — Studio UI availability"
    assertions:
      - "HTTP 200 on port 8123 health endpoint"
      - "HTTP 200 on port 8124 Studio UI"
      - "docker compose ps: all services healthy"
      - "ss -tlnp: 8124 bound to 127.0.0.1 only"
manual_cases:
  - id: MC-1
    title: "Operator README walkthrough"
    steps:
      - "Read infra/langgraph-server/README.md"
      - "Follow numbered deployment steps"
      - "Verify each step produces documented expected output"
    expected: "README is complete, numbered, commands produce expected output without undocumented errors"
  - id: MC-2
    title: "Studio UI operator inspection"
    steps:
      - "Open browser to http://localhost:8124 (or VPN-accessible host)"
      - "Verify Studio UI loads"
      - "Inspect available graphs, threads, checkpoint history"
    expected: "Studio UI operational; shows runtime state; accessible from internal network only"
fixture_definitions:
  - name: "aurora_langgraph_checkpoint_url"
    type: "environment variable"
    description: "PostgreSQL connection string to Aurora langgraph_checkpoint database: postgresql://<dedicated_user>:<password>@<aurora_host>:5432/langgraph_checkpoint"
  - name: "langgraph_platform_version"
    type: "compose image tag"
    description: "Pinned LangGraph Platform Docker image version (e.g. langchain/langgraph-api:0.0.9)"
risks:
  - "Smoke tests require real Aurora connection — cannot mock; APIP-5006 must complete first"
  - "LangGraph Platform health endpoint path may differ by version — verify with pinned image docs"
  - "Port 8124 localhost-only binding must be validated on actual server, not just compose file review"
  - "init container one-shot pattern success depends on langgraph-checkpoint-postgres image providing schema SQL — confirm image documentation"
coverage_waiver:
  applies: true
  reason: "Pure infrastructure story — no TypeScript business logic. QA gate = compose config valid + API reachable + smoke test pass. 45% coverage threshold not applicable."
e2e_exemption:
  applies: true
  reason: "frontend_impacted: false (ADR-006). No user-facing UI. Studio UI is an operator tool, not application UI. E2E Playwright tests not applicable."
