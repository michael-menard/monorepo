  - "curl http://localhost:8123/ok returns HTTP 200 within 60s"
  - "ss -tlnp shows 127.0.0.1:8124 (not 0.0.0.0)"
  - "psql $LANGGRAPH_CHECKPOINT_DATABASE_URL shows checkpoint schema tables"
