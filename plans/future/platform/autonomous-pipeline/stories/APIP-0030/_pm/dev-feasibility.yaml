rationale: "APIP-0030 is a pure infrastructure story delivering Docker Compose configuration and documentation. All patterns are established and directly reusable from infra/compose.lego-app.yaml. The primary risk is the hard dependency on APIP-5006 completion (server must be provisioned, Docker installed, base compose file present). Given that dependency is satisfied, implementation complexity is low: copy service definition patterns, adapt for LangGraph Platform images, configure checkpoint-postgres init container, bind Studio UI to 127.0.0.1. No TypeScript code changes. No monorepo package modifications."
complexity: low
change_surface:
  areas:
    - "infra/langgraph-server/ (new compose service definitions)"
    - "infra/prometheus/prometheus.yml (extend scrape targets)"
    - "infra/langgraph-server/README.md (new documentation)"
  endpoints: []
  deploy_touchpoints:
    - "docker compose -f infra/langgraph-server/compose.langgraph-server.yaml up -d on dedicated server"
    - "scp updated compose file to server (manual procedure)"
    - "Aurora: CREATE DATABASE langgraph_checkpoint + CREATE USER langgraph_checkpoint_user"
risks:
  - finding: "APIP-5006 not yet complete — infra/langgraph-server/compose.langgraph-server.yaml does not exist yet"
    mitigation: "Gate this story on APIP-5006 handoff checklist: server provisioned, Docker v2 installed, base compose file present and validates, ports 8123/8124 confirmed free. Do not begin implementation until handoff confirmed."
  - finding: "LangGraph Platform Docker image name and checkpoint schema init command are not yet confirmed"
    mitigation: "Pin to a specific released version (e.g. langchain/langgraph-api:0.0.9). Review langgraph-checkpoint-postgres image docs for schema init SQL/command before writing init container. Do not use 'latest'."
  - finding: "Aurora max_connections exhaustion if checkpoint pool uses wrong credentials or shares @repo/db pool"
    mitigation: "Dedicated pg.Pool instance (max 3), dedicated Aurora service account (langgraph_checkpoint_user), separate from @repo/db. Document connection string template explicitly in README.md."
missing_requirements:
  - "LangGraph Platform Docker image name and exact version tag must be confirmed before implementation"
  - "Aurora hostname/endpoint for langgraph_checkpoint database must be provided (APIP-5006 or infrastructure team)"
