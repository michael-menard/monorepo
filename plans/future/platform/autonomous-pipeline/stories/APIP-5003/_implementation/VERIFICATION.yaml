lessons_to_record:
  - lesson: >-
      Re-verification after branch merge succeeded cleanly. All 9 ACs passed on the second run.
      The previous failure was entirely due to the implementation branch not being merged to main —
      the implementation itself was complete and correct. Merge verification should be a pre-condition
      check in QA setup, not discovered during AC verification.
    category: pattern
    tags:
      - qa
      - worktree
      - merge
      - re-verification
  - lesson: >-
      For pure infra/documentation stories with no TypeScript code, test execution and coverage
      thresholds are not applicable. Evidence waiver declarations (E2E exemption, coverage waiver)
      are valid and should be accepted when story type is infra/config/documentation. QA should
      confirm the waiver is appropriate rather than failing for missing tests.
    category: pattern
    tags:
      - qa
      - infra
      - documentation
      - coverage-waiver
  - lesson: >-
      Container hardening patterns for Docker Compose: read_only: true + tmpfs for writable paths,
      cap_drop: [ALL] with selective cap_add for services that need specific capabilities (e.g.,
      PostgreSQL needs CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID for initialization), port binding
      to 127.0.0.1, :ro volume mounts for config files, ${VAR_NAME} references for secrets,
      .gitignore for .env files. These patterns are now documented in SECURITY.md as a reusable
      reference.
    category: reuse
    tags:
      - docker
      - security
      - container-hardening
      - infra

