schema: 2
story_id: APIP-5003
timestamp: '2026-03-01T16:00:00Z'
subtask_source: story
steps:
  - id: 1
    subtask_id: ST-1
    description: >-
      Research LangGraph Platform image hardening compatibility — determine which directives (read_only, user, cap_drop)
      work with langchain/langgraph-api:0.0.9 before writing compose changes
    files: []
    files_to_read:
      - infra/compose.lego-app.yaml
      - infra/langgraph-server/compose.langgraph-server.yaml
    dependencies: []
    slice: backend
    verification: >-
      Manual: run image with --read-only --cap-drop ALL and observe startup; document findings inline before ST-4
      proceeds
    acs_covered:
      - AC-3
  - id: 2
    subtask_id: ST-2
    description: >-
      Create infra/langgraph-server/SECURITY.md with network boundary statement, full port inventory table, Phase 2
      auth/authz deferred statement, and Phase 2 design placeholder section
    files:
      - infra/langgraph-server/SECURITY.md
    files_to_read:
      - infra/compose.lego-app.yaml
      - infra/elasticache/template.yaml
    dependencies: []
    slice: backend
    verification: test -f infra/langgraph-server/SECURITY.md && grep -c 'Phase 2' infra/langgraph-server/SECURITY.md
    acs_covered:
      - AC-1
      - AC-9
  - id: 3
    subtask_id: ST-3
    description: >-
      Apply port binding hardening to compose.langgraph-server.yaml — bind port 8123 to 127.0.0.1; create
      infra/langgraph-server/.gitignore with .env exclusion
    files:
      - infra/langgraph-server/compose.langgraph-server.yaml
      - infra/langgraph-server/.gitignore
    files_to_read:
      - infra/langgraph-server/compose.langgraph-server.yaml
      - infra/compose.lego-app.yaml
    dependencies:
      - 1
    slice: backend
    verification: >-
      docker compose -f infra/langgraph-server/compose.langgraph-server.yaml config | grep '127.0.0.1:8123' && grep
      '127.0.0.1:8124' infra/langgraph-server/compose.langgraph-server.yaml && grep '.env'
      infra/langgraph-server/.gitignore
    acs_covered:
      - AC-2
      - AC-6
  - id: 4
    subtask_id: ST-4
    description: >-
      Apply container hardening directives to compose.langgraph-server.yaml — add cap_drop, read_only (with tmpfs
      fallback if needed based on ST-1), non-root user (or gap documented), :ro volume mounts, confirm image tag pinned
    files:
      - infra/langgraph-server/compose.langgraph-server.yaml
    files_to_read:
      - infra/langgraph-server/compose.langgraph-server.yaml
      - infra/compose.lego-app.yaml
    dependencies:
      - 1
      - 3
    slice: backend
    verification: >-
      docker compose -f infra/langgraph-server/compose.langgraph-server.yaml config && grep -E 'read_only|cap_drop|:ro'
      infra/langgraph-server/compose.langgraph-server.yaml
    acs_covered:
      - AC-3
      - AC-4
      - AC-5
  - id: 5
    subtask_id: ST-5
    description: >-
      Add container secret injection documentation and operational verification checklist to SECURITY.md — document
      ${VAR_NAME} env pattern, .env gitignore requirement, APIP-5004 cross-reference, and numbered ss/docker-inspect
      checklist
    files:
      - infra/langgraph-server/SECURITY.md
    files_to_read:
      - infra/langgraph-server/SECURITY.md
      - infra/langgraph-server/compose.langgraph-server.yaml
    dependencies:
      - 2
      - 3
      - 4
    slice: backend
    verification: grep -c 'APIP-5004' infra/langgraph-server/SECURITY.md && grep -c 'ss -tlnp' infra/langgraph-server/SECURITY.md
    acs_covered:
      - AC-6
      - AC-7
  - id: 6
    subtask_id: ST-6
    description: >-
      Validate compose config and verify all ACs complete — run docker compose config, confirm SECURITY.md complete, no
      :latest tags, all hardening directives present
    files: []
    files_to_read:
      - infra/langgraph-server/compose.langgraph-server.yaml
      - infra/langgraph-server/SECURITY.md
    dependencies:
      - 3
      - 4
      - 5
    slice: backend
    verification: >-
      docker compose -f infra/langgraph-server/compose.langgraph-server.yaml config && grep 'image:'
      infra/langgraph-server/compose.langgraph-server.yaml | grep ':latest' | wc -l
    acs_covered:
      - AC-8
files_to_change:
  - path: infra/langgraph-server/SECURITY.md
    action: create
    reason: >-
      Primary deliverable: network boundary statement, port inventory, container hardening docs, secrets injection
      mechanism, operational verification checklist, Phase 2 placeholder (AC-1, AC-6, AC-7, AC-9)
  - path: infra/langgraph-server/compose.langgraph-server.yaml
    action: modify
    reason: >-
      Bind port 8123 to 127.0.0.1; add cap_drop, read_only/tmpfs, user directive, :ro volume mounts, confirm image
      pinning (AC-2, AC-3, AC-4, AC-5)
  - path: infra/langgraph-server/.gitignore
    action: create
    reason: Exclude .env file from git tracking per AC-6 secrets injection requirement
commands_to_run:
  - command: docker compose -f infra/langgraph-server/compose.langgraph-server.yaml config
    when: after all compose changes applied (ST-6)
    required: true
  - command: grep 'image:' infra/langgraph-server/compose.langgraph-server.yaml | grep ':latest'
    when: after ST-4 — must return empty output
    required: true
  - command: test -f infra/langgraph-server/SECURITY.md && echo PASS || echo FAIL
    when: after ST-2
    required: true
  - command: grep '.env' infra/langgraph-server/.gitignore
    when: after ST-3
    required: true
acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: >-
      File existence check: test -f infra/langgraph-server/SECURITY.md; manual review of network boundary statement and
      port inventory table sections
    evidence_type: file
  - ac_id: AC-2
    planned_evidence: docker compose config output showing 127.0.0.1:8123:8123 and 127.0.0.1:8124:8124 port bindings
    evidence_type: command
  - ac_id: AC-3
    planned_evidence: >-
      grep output showing cap_drop and read_only/tmpfs in compose.langgraph-server.yaml; ST-1 research documents user
      directive compatibility or gap
    evidence_type: command
  - ac_id: AC-4
    planned_evidence: grep output showing :ro suffix on all config file volume mounts in compose.langgraph-server.yaml
    evidence_type: command
  - ac_id: AC-5
    planned_evidence: grep ':latest' returns empty for compose.langgraph-server.yaml; image pinning rationale documented in SECURITY.md
    evidence_type: command
  - ac_id: AC-6
    planned_evidence: >-
      SECURITY.md contains env var injection section with ${VAR_NAME} pattern, .gitignore confirmed to exclude .env,
      APIP-5004 cross-reference present
    evidence_type: file
  - ac_id: AC-7
    planned_evidence: >-
      SECURITY.md contains numbered operational checklist with ss -tlnp, netstat fallback, docker inspect SecurityOpt,
      docker inspect CapDrop commands with expected output
    evidence_type: file
  - ac_id: AC-8
    planned_evidence: docker compose -f infra/langgraph-server/compose.langgraph-server.yaml config exits with code 0
    evidence_type: command
  - ac_id: AC-9
    planned_evidence: >-
      SECURITY.md Phase 2 section contains all four deferred items: LangGraph API auth, Studio UI access control,
      network policy enforcement, prerequisites
    evidence_type: file
architectural_decisions:
  - id: ARCH-001
    question: 'Does langchain/langgraph-api:0.0.9 support read_only: true and non-root user directive?'
    decision: >-
      ST-1 research step determines compatibility at runtime; if read_only incompatible, use tmpfs: for writable paths;
      if non-root unsupported, document gap with GitHub issue reference in SECURITY.md
    rationale: >-
      Image compatibility is an unknown that cannot be resolved statically — story explicitly gates ST-4 on ST-1
      research findings. Autonomy level aggressive: auto-accept tmpfs fallback pattern per story architecture notes.
    decided_by: auto
complexity: simple
notes:
  - No TypeScript code produced — pure infrastructure/documentation story
  - >-
    compose.langgraph-server.yaml already has image pinned to langchain/langgraph-api:0.0.9 and port 8124 bound to
    127.0.0.1; port 8123 currently uses '8123:8123' (unbound) — ST-3 fixes this
  - >-
    langgraph_data named volume already defined — remains read-write for checkpoint persistence; only config file mounts
    get :ro
  - >-
    langgraph-checkpoint-init is a one-shot init container — read_only directive applies only to langgraph-platform
    service; init container uses tmpfs or no read_only as appropriate
  - E2E exemption declared, coverage waiver declared — no pnpm test or pnpm build commands required for TypeScript
  - ST-1 research is non-destructive file reading + manual docker run test; no compose file changes in ST-1
  - >-
    APIP-5004 boundary: compose environment stanza uses ${VAR_NAME} references only; SECURITY.md documents APIP-5004
    provides runtime values
  - ST-2 and ST-1 have no dependencies on each other and can run in parallel
