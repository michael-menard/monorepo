lessons_to_record:
  - lesson: >
      Static configCache fields on provider classes create a process-lifetime coupling issue
      with SecretsClient. Rotation via SIGHUP requires clearing both SecretsClient cache AND
      each provider's static configCache. Document this explicitly in infra READMEs for all
      stories that use the provider pattern.
    category: pattern
    tags: ["backend", "secrets", "cache", "rotation"]

  - lesson: >
      Concurrent in-flight deduplication (Map<string, Promise<string>>) is a clean pattern
      for preventing thundering-herd on cache-miss fetches. This can be reused in any
      async caching module in the orchestrator.
    category: reuse
    tags: ["backend", "caching", "deduplication", "orchestrator"]

  - lesson: >
      cfn-lint unavailability in CI/local environments requires manual template review as a
      fallback. Consider adding cfn-lint to the devDependencies or CI pipeline to enable
      automated CloudFormation linting for infra stories.
    category: blocker
    tags: ["infra", "cloudformation", "ci", "tooling"]

  - lesson: >
      The prefetch-then-getSync pattern (ARCH-001) cleanly bridges async secrets retrieval
      with synchronous provider loadConfig() methods without modifying the BaseProvider
      interface. Reuse this pattern for any future secrets/config retrieval that must integrate
      with synchronous interfaces.
    category: pattern
    tags: ["backend", "secrets", "architecture", "providers"]

