# ─────────────────────────────────────────────────────────────────────────────
# AUDIT CHECKLIST (9 Points)
# ─────────────────────────────────────────────────────────────────────────────

audit:

  scope_alignment:
    result: PASS
    notes: >
      Story index lists APIP-5004 as "Secrets Engine and API Key Management" under Phase 0
      Foundation, with APIP-0040 as its sole dependency. The story file matches precisely:
      it delivers a SecretsClient library, refactors three provider loadConfig() methods, and
      adds an infra/secrets CloudFormation stack. No extra features are introduced. The
      APIP-5005 (operator CLI) and APIP-5003 (IAM boundary) exclusions are explicitly named
      in Non-Goals. Story scope is clean.

  internal_consistency:
    result: CONDITIONAL_PASS
    notes: >
      Goals, Non-Goals, and ACs are broadly consistent. One tension exists: the Goal states
      "rotatable without restarting the pipeline process" but AC-7 documents that rotation
      DOES require a cache flush signal (SIGHUP or CLI stub), and the static configCache on
      each provider means the old value persists for the process lifetime unless also cleared.
      This is disclosed in dev_feasibility risks and AC-7, but the Goal statement slightly
      overpromises. This is a documentation clarity issue, not a structural inconsistency.
      Recommend softening the Goal to "rotatable with a lightweight cache-flush signal rather
      than a full process restart."

      A second tension: AC-3 says "caching behaviour are unchanged" but ST-3 requires making
      loadConfig() async (or adopting the prefetch approach). The ILLMProvider interface
      defines loadConfig(): unknown (synchronous). Making it async without changing the
      interface signature would require the return type to become Promise<unknown> on the
      abstract class — a breaking change to BaseProvider. The story acknowledges this under
      Architecture Notes but leaves the resolution as "should be confirmed at implementation
      start." This is a blocking TBD (see decision_completeness below).

  reuse_first:
    result: PASS
    notes: >
      Reuse plan is thorough and accurately cites real code:
      - validateEnv() / EnvSchema pattern in apps/api/knowledge-base/src/config/env.ts
        confirmed. SecretsClientConfigSchema mirrors the Zod safeParse + throw approach.
        The .refine() chain for AWS_REGION is a correct extension of the pattern.
      - Static configCache pattern in packages/backend/orchestrator/src/providers/anthropic.ts
        confirmed at line 56. Story preserves this cache and only wraps the key retrieval step.
      - generateConfigHash() at base.ts:155 confirmed. It already destructures and excludes
        apiKey. ED-4 test explicitly validates this invariant is preserved post-refactor.
      - infra/elasticache/template.yaml confirmed as the canonical CloudFormation structure
        (Parameters/Resources/Outputs/tagging). The proposed infra/secrets/template.yaml
        follows the same conventions correctly.
      - @repo/logger usage is consistent with project-wide logging policy.
      No novel abstractions are introduced where existing patterns suffice.

  ports_and_adapters:
    result: PASS
    notes: >
      SecretsClient is a pure infrastructure adapter: its interface (get(secretName): Promise<string>)
      is transport-agnostic. The SECRETS_ENGINE env var selects the backing implementation at
      instantiation time rather than at the call site. Providers depend only on SecretsClient.get(),
      not on the AWS SDK directly, maintaining a clean boundary. The flush() method is correctly
      separated from the retrieval contract. The module-level singleton + separate class export
      pattern (recommended in APIP-5000 coordination notes) supports test injection without
      coupling tests to the singleton. Core orchestration logic in providers remains unchanged.

  testability:
    result: PASS
    notes: >
      Test plan is concrete and executable:
      - HP-1 through HP-8 map directly to runnable Vitest unit/integration tests with specific
        setup, action, expected, and evidence fields. All AWS SDK interactions are via mocked
        clients. Logger is mockable via @repo/logger spy.
      - EC-1 through EC-4 cover the primary error contracts (missing env var, missing AWS_REGION,
        AWS SDK failure, backward-compatible provider error).
      - ED-1 (TTL expiry via fake timers), ED-2 (concurrent deduplication), ED-3 (env var TTL
        config), ED-4 (hash exclusion) are well-specified edge cases.
      - ED-2 (concurrent deduplication) is explicitly marked "mark future if not built" in test
        risks — this is an honest flag, not a gap.
      - Static configCache reset requirement is called out in test risks, and ST-3/ST-4 reference
        AnthropicProvider.clearCaches() (confirmed at anthropic.ts:160).
      - cfn-lint as CI verification for AC-6 is appropriate; the risk note that cfn-lint must be
        available in CI is correctly flagged.
      UAT requirement against real AWS Secrets Manager in staging is defined.

  decision_completeness:
    result: FAIL
    notes: >
      One blocking TBD remains unresolved: the async/sync loadConfig() decision.

      The ILLMProvider interface at base.ts:90 defines: `loadConfig(): unknown` (synchronous).
      The BaseProvider abstract class at base.ts:362 declares: `abstract loadConfig(): unknown`.
      AnthropicProvider.loadConfig() at anthropic.ts:72 is currently synchronous.
      BaseProvider.getModel() at base.ts:317-344 calls `this.loadConfig()` synchronously.

      AC-3 requires providers to use SecretsClient.get() which returns Promise<string>. The
      story presents two resolution paths:
        Option A: Make loadConfig() async → requires changing ILLMProvider interface, BaseProvider
                  abstract method, and getModel() template method — a broader change than stated.
        Option B: Prefetch pattern → SecretsClient pre-populates cache at pipeline startup;
                  providers call getSync() (env fallback or cache read) synchronously.

      The story recommends Option B ("prefetch approach as lower risk") but does not commit to it.
      It explicitly says "The exact pattern should be confirmed at implementation start."

      This must be resolved before implementation begins because:
      1. Option A changes the ILLMProvider/BaseProvider contract — a Non-Goal states
         "Modifying the BaseProvider abstract interface — no change to the abstract contract."
         This means Option A is BLOCKED by the story's own Non-Goals.
      2. Option B (prefetch) requires an additional SecretsClient.prefetch() method not listed
         in AC-1 or AC-10. If prefetch is chosen, AC-1 should be updated to include this method.
      3. The call site in getModel() (base.ts:322) must be updated if Option A is chosen, but
         the Scope section does not list base.ts as a modified file.

      Resolution: Add a decision record to the story selecting Option B (prefetch), update AC-1
      to include SecretsClient.prefetch(secretNames: string[]): Promise<void>, and add base.ts
      read (not modify) to ST-3 file list. The Non-Goals already rule out Option A.

  risk_disclosure:
    result: PASS
    notes: >
      Risks are disclosed at multiple levels:
      - pm_artifacts.risks: cfn-lint CI availability, static configCache test reset,
        concurrent deduplication implementation dependency.
      - dev_feasibility.risks: static configCache not refreshing on rotation (with explicit
        mitigation: SecretsClient.flush() + README documentation), ESM compatibility of
        @aws-sdk/client-secrets-manager.
      - Architecture Notes explicitly document the APIP-5003 boundary (IAM policy ownership)
        and APIP-5000 coordination (test stub pattern).
      - The committed live OPENAI_API_KEY in .env is noted as the motivating anti-pattern.
      Missing: no explicit risk for the dependency on APIP-0040 (model router) being complete
      before this story ships — since providers are defined there. Low severity given APIP-5004
      only modifies existing files, but worth noting in a risk entry.

  story_sizing:
    result: CONDITIONAL_PASS
    notes: >
      Sizing indicators evaluated:
        [TRIGGERED] >8 ACs: 10 ACs present (threshold: >8).
        [TRIGGERED] Multiple packages: orchestrator package + infra/ directory (threshold: 2+).
        [NOT TRIGGERED] >5 endpoints: 0 API endpoints.
        [NOT TRIGGERED] Both FE+BE: backend + infra only, no frontend.
        [NOT TRIGGERED] Database changes: explicitly excluded.
        [TRIGGERED] New library module (SecretsClient) + 3 provider refactors + CloudFormation
                    stack: functional breadth spans 3 distinct concerns.

      With 2 explicit indicators triggered (>8 ACs, multiple packages) and 1 functional breadth
      indicator, the threshold for SPLIT_REQUIRED is met by the rules. However, the subtasks
      already decompose the story cleanly, the token estimate (150k) is high but within a single
      agent session, and the dev_feasibility assessment rates it medium complexity / high
      confidence feasible. The story's 5 subtasks map tightly to the 3 functional concerns:

        ST-1 + ST-2: SecretsClient core (AC-1, AC-2, AC-4, AC-5, AC-10)
        ST-3:        Provider refactoring (AC-3, AC-9)
        ST-4:        Tests (AC-8)
        ST-5:        CloudFormation + README (AC-6, AC-7)

      ST-5 is genuinely independent (no runtime dependency on ST-1 through ST-4). If token
      budget is tight, ST-5 can be split to APIP-5004b. For now, CONDITIONAL_PASS: proceed
      as a single story but flag ST-5 as a natural split point if the implementing agent
      hits context limits.

      split_recommendation: OPTIONAL — split ST-5 (infra/secrets/template.yaml + README) to
      APIP-5004b if token budget is exceeded. The CloudFormation work is fully independent
      and can be done in parallel with ST-1 through ST-4.

  subtask_decomposition:
    result: PASS
    notes: >
      All 10 ACs are covered by subtasks:
        AC-1 → ST-1
        AC-2 → ST-1
        AC-3 → ST-3
        AC-4 → ST-2
        AC-5 → ST-2
        AC-6 → ST-5
        AC-7 → ST-5
        AC-8 → ST-4
        AC-9 → ST-3
        AC-10 → ST-1
      No AC is orphaned.

      Dependency DAG:
        ST-1 → ST-2 → ST-3 → ST-4
        ST-5 (independent, parallel to all)
      DAG is acyclic. No circular dependencies. ST-4 correctly depends on ST-3 (needs
      refactored providers to test). ST-5 independence is correctly identified.

      Minor gap: ST-4 lists only secrets-client.test.ts (new) and anthropic.test.ts (update).
      HP-5 requires OpenRouterProvider and MiniMaxProvider integration tests. These should be
      included in the ST-4 file list (openrouter.test.ts, minimax.test.ts).

# ─────────────────────────────────────────────────────────────────────────────
# DISCOVERY ANALYSIS
# ─────────────────────────────────────────────────────────────────────────────

discovery:

  mvp_critical_gaps:
    - id: GAP-001
      severity: blocking
      description: >
        The async/sync loadConfig() decision is unresolved and the Non-Goals explicitly rule
        out changing the BaseProvider abstract interface. This means Option A (async loadConfig)
        is blocked. Option B (prefetch pattern) must be formally committed to before
        implementation starts. Without this decision, ST-3 cannot proceed deterministically
        and the implementer will make an ad-hoc choice that may conflict with downstream
        stories (APIP-5000 test stubs, APIP-5003 startup sequence).
      resolution: >
        Add a formal decision record in the story: "DECISION: Use Option B (prefetch pattern).
        SecretsClient.prefetch(secretNames: string[]): Promise<void> is added to the public API.
        Pipeline startup code (APIP-5006 scope) calls prefetch() before any provider is
        instantiated. loadConfig() remains synchronous; it reads from the SecretsClient cache
        via a synchronous getSync() that throws if the key is not yet cached. AC-1 updated to
        include prefetch() in the public API description. base.ts is NOT modified."

    - id: GAP-002
      severity: high
      description: >
        ST-4 file list omits openrouter.test.ts and minimax.test.ts. HP-5 explicitly requires
        integration tests for OpenRouterProvider and MiniMaxProvider loadConfig(). These
        providers are in scope for ST-3 refactoring and must be covered in ST-4.
      resolution: >
        Add packages/backend/orchestrator/src/providers/__tests__/openrouter.test.ts and
        minimax.test.ts to the ST-4 file modification list.

    - id: GAP-003
      severity: medium
      description: >
        The prefetch startup call site is not assigned to any subtask. If Option B is chosen
        (recommended), someone must write the startup invocation that calls
        secretsClient.prefetch([...]) before providers are accessed. This call site lives in
        APIP-5006 (server infrastructure), but APIP-5006 depends on APIP-5004 completing
        first. The cross-story coordination needs to be documented so APIP-5006 knows to
        add this startup step.
      resolution: >
        Add a cross-story note to the story: "APIP-5006 must call secretsClient.prefetch()
        at pipeline startup before the model router initializes. This dependency must be
        captured in APIP-5006's implementation notes."

  future_opportunities:
    - id: FUT-001
      description: >
        Concurrent deduplication (ED-2): multiple simultaneous get() calls resolve to a single
        AWS SDK call. The story marks this as "mark future if not built." This is a production
        reliability improvement for high-concurrency scenarios. Suitable for Phase 1 or a
        follow-on story.

    - id: FUT-002
      description: >
        Automatic cache invalidation via AWS Secrets Manager rotation events (SNS/EventBridge)
        is explicitly deferred to Phase 2. This would replace the manual SIGHUP/flush() approach.

    - id: FUT-003
      description: >
        The SecretsClient is scoped to model API keys. Extending it to database connection
        strings or other credentials is explicitly excluded. This is a natural follow-on once
        the pattern is proven.

    - id: FUT-004
      description: >
        The CloudFormation template does not populate SecretString values (by design). A
        bootstrap script or AWS CDK construct that seeds initial values from a secure local
        source (e.g., 1Password CLI) would improve the operational runbook beyond the current
        manual console/CLI approach.

