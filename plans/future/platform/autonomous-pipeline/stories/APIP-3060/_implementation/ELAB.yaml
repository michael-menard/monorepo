opportunities:
  - id: opp-1
    category: observability
    finding: >
      story.yaml sizing_warning is false but 3 sizing indicators are present and
      predictions.split_risk is 0.8. The sizing_warning field should be corrected to
      true for accurate downstream tooling behavior (e.g., pipeline risk dashboards).
      No story content change required.
    effort: low
