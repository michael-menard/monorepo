audit:
  - id: scope_alignment
    status: WARN
    note: >
      The stories.index.md lists APIP-3060 as depending only on APIP-3020, but story.yaml
      and APIP-3060.md correctly declare depends_on: [APIP-3020, APIP-3010]. APIP-3010
      (change_telemetry) is a required dependency — without it the experiment_id FK
      migration (AC-2, AC-5) and all telemetry aggregation logic (AC-7) have no target.
      The index entry is incomplete; the story itself is correct. The index should be
      updated to reflect the APIP-3010 dependency. No story changes required.

  - id: internal_consistency
    status: PASS
    note: >
      Goals, non-goals, ACs, and test plan are coherent. Non-goals explicitly defer
      A/B routing assignment (APIP-3040), HTTP API (APIP-2020/APIP-5005), multi-arm
      experiments, Bayesian statistics, cron scheduling (APIP-3090), cold-start
      (APIP-3070), and experiment_id population during routing (APIP-3040). All 14 ACs
      are traceable to the stated goal. Test plan happy-path, error, and edge cases all
      map to specific ACs. One minor ambiguity: AC-8 and AC-9 specify the graph-level
      MIN_SAMPLE_PER_ARM constant as the significance threshold, but the model_experiments
      table includes a per-row min_sample_per_arm column (AC-1). The story does not
      explicitly state whether the engine uses the per-row value or the global constant.
      AC-12 unit tests do not include a test for the per-row override path. This is
      logged as a non-blocking opportunity (opp-2).

  - id: reuse_first
    status: PASS
    note: >
      Reuse plan table is complete and accurate. Identifies wintSchema (existing),
      StateGraph/Annotation/END/START (@langchain/langgraph), createToolNode
      (node-factory.ts), updateState (state-helpers.ts), createInsertSchema/
      createSelectSchema (drizzle-zod), @repo/logger, @repo/db (injected via
      config.configurable), and SQL migration template (015_artifact_type_tables.sql).
      No per-story one-off utilities proposed. New shared artifacts (ModelExperimentInsertSchema,
      ModelExperimentSelectSchema) are added to the existing shared wint.ts schema file,
      not isolated per-story. Pattern is consistent with existing codebase conventions.

  - id: ports_adapters
    status: PASS
    note: >
      No HTTP endpoints. DB injection via config.configurable is explicitly mandated
      in the Reuse Plan and Architecture Notes: "Do NOT import @repo/db directly into
      graph nodes — inject via config.configurable". This mirrors the Pattern Miner
      (APIP-3020) approach and maintains full unit testability without a live DB.
      Core significance logic (isSignificant()) is specified as a pure function,
      transport-agnostic. ON CONFLICT DO UPDATE for model_affinity upsert and conditional
      UPDATE WHERE status='active' are correctness patterns, not adapter concerns.

  - id: testability
    status: PASS
    note: >
      No HTTP endpoints — .http files not required per checklist. No UI surface — Playwright
      not required (ADR-006 skip condition explicitly cited). Unit tests are concrete and
      executable without DB: significance boundary tests, expiry by rows/days, no-op,
      BakeOffConfigSchema Zod validation. Integration tests tagged @integration with
      explicit DB target (postgresql://postgres:postgres@localhost:5432/lego_dev), fixture
      definitions (SQL INSERT batch specs), and assertion SQL (SELECT evidence). Migration
      idempotency tests (ED-4) are present. Integration test gating on APIP-3010+APIP-3020
      is a known dependency constraint, not a testability gap. Regression guard for existing
      database-schema tests is explicit (AC-14).

  - id: decision_completeness
    status: PASS
    note: >
      No blocking TBDs. The only deferred decision is migration sequence number, which is
      explicitly handled: "glob for correct filename during implementation" (Infrastructure
      Notes). Architecture Notes resolve all design decisions: pgEnum ordering, partial unique
      index (Aurora PG15 support noted with verify step), named constants, FK definition order
      (Drizzle self-referencing lesson cited), idempotent upsert strategy. Tie-break behavior
      (delta < threshold → control preserved, no promotion) is specified in AC-12 unit test
      description but not explicitly in AC-8 or AC-9; logged as non-blocking opportunity opp-2.

  - id: risk_disclosure
    status: PASS
    note: >
      All material risks are disclosed with mitigations. (1) Dependency chain depth (5 stories)
      acknowledged with phased subtask strategy. (2) Statistical volume risk for low-throughput
      pipelines — graceful expiry path (AC-10) is the mitigation. (3) Concurrent cron race
      on experiment status transitions — mitigated by ON CONFLICT DO UPDATE and conditional
      UPDATE WHERE status='active'. (4) Additive FK migration safety when change_telemetry
      does not exist — ALTER TABLE IF EXISTS guard specified. (5) Migration sequence number
      shift (APIP-5007) — glob instruction provided. (6) DB port disambiguation (5432 vs 5433)
      explicitly called out. The APIP-3010+APIP-3020 blocking risk on integration tests is
      disclosed in both the test plan and dev_feasibility.risks. No hidden dependencies found.

  - id: story_sizing
    status: WARN
    note: >
      3 sizing indicators triggered: (1) 14 ACs (>8 threshold), (2) >3 distinct test scenarios
      (5 HP + 3 EC + 4 ED = 12 total), (3) touches 3 packages (database-schema, orchestrator,
      migrations). story.yaml has sizing_warning: false, which is inconsistent with predictions.split_risk: 0.8.
      However, a SPLIT_REQUIRED verdict is not recommended because the schema, migration, graph,
      and tests form a tightly coupled single capability — no candidate split is independently
      deployable or testable without the others. The subtask DAG (ST-1→ST-2→ST-3 and
      ST-1→ST-4→ST-5→ST-6→ST-7→ST-8) is already an internal phased decomposition that
      mitigates LLM context overload without requiring a formal story split. The story.yaml
      sizing_warning field should be corrected to true to reflect the 3 indicators.

  - id: subtask_decomposition
    status: PASS
    note: >
      All 14 ACs covered: AC-1→ST-1, AC-2→ST-3, AC-3→ST-1, AC-4→ST-2, AC-5→ST-3,
      AC-6→ST-4, AC-7→ST-5, AC-8→ST-5, AC-9→ST-6, AC-10→ST-6, AC-11→ST-4,
      AC-12→ST-7, AC-13→ST-8, AC-14→ST-7+ST-8. Each subtask modifies at most 1 file
      (all within 3-file limit). Subtask DAG has no cycles: two parallel chains merge at
      ST-7 (ST-1→ST-4→ST-5→ST-6→ST-7 and ST-1→ST-2→ST-3). Verification commands
      present for all subtasks (pnpm check-types, pnpm test, DB run). Canonical
      References section has 4 entries covering all required patterns (cron graph,
      Drizzle table, SQL migration, Zod-first schema). ST-4 reads 4 files for context
      (1 over the suggested read-files guideline) but only modifies 1 file — acceptable.

