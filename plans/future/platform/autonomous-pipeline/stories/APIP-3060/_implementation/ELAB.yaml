  - id: opp-2
    category: edge_cases
    finding: >
      AC-8 and AC-9 reference the graph-level MIN_SAMPLE_PER_ARM constant as the
      significance threshold, but the model_experiments table (AC-1) includes a
      per-row min_sample_per_arm column. The story does not explicitly state whether
      the Bake-Off Engine uses the per-row value (allowing per-experiment override) or
      always uses the global constant from BakeOffConfigSchema. The tie-break behavior
      (delta = 0, both arms equal success rate → control preserved, no promotion) is
      mentioned in AC-12 unit test description but not stated explicitly in AC-8 or
      AC-9. Recommend clarifying in AC-7 or AC-8 whether experiment.min_sample_per_arm
      takes precedence over BakeOffConfig.minSamplePerArm.
    effort: low
    decision: log_to_kb
    kb_entry_id: "566bf8e2-c7dd-4664-957e-d84365dc6260"

  - id: opp-3
    category: observability
    finding: >
      No structured log fields are specified for the per-run summary (e.g., total
      active experiments evaluated, concluded count, expired count, no-change count,
      total durationMs). AC-9 specifies promotion log fields and AC-10/AC-11 specify
      specific log payloads, but no aggregate run-summary log is required. Adding a
      run-summary structured log would aid operational visibility without adding DB writes.
    effort: low
    decision: log_to_kb
    kb_entry_id: "3fde3d8e-7794-4248-818f-a608e69d446f"

  - id: opp-4
    category: edge_cases
    finding: >
      EC-3 (migration idempotency when change_telemetry does not exist) tests the
      ALTER TABLE IF EXISTS guard but does not verify the FK constraint is correctly
      established after APIP-3010 runs and the migration is re-applied. A supplementary
      test scenario verifying that the FK is active post-APIP-3010 would complete the
      migration verification story. This is a future integration test enhancement, not
      a gap in current scope.
    effort: low
    decision: log_to_kb
    kb_entry_id: "5dfb6232-5751-4508-a303-75842e42e66f"

