id: "APIP-1020"
title: "ChangeSpec Schema Design Spike"
type: spike
status: uat
priority: high
phase: 1
feature: "Research spike: design and validate the ChangeSpec schema that defines the atomic change contract between Diff Planner, Implementation Graph, Review, QA, Telemetry, and Model Affinity systems. Decompose 10+ real stories into ChangeSpecs, measure quality, and publish schema as ADR."
goal: "Validate ChangeSpec schema design on real stories before any integration code is written, since this schema is the most irreversible decision in Phase 1."
depends_on: ["APIP-1010"]
endpoints: []
infrastructure: []
deliverables:
  - "ADR: ChangeSpec schema definition with Zod schema"
  - "10+ real story decompositions with quality assessment"
  - "Cost-per-decomposition metrics (tokens, latency)"
  - "Recommendation: proceed, modify, or redesign"
risk_notes: "ChangeSpec schema is foundational — all Phase 1+ systems depend on it. Schema changes after integration are extremely costly (6+ stories affected). This spike must complete before APIP-1030 integration begins."
sizing_warning: false
adr: "ADR-001 Decision 3: Spike before integration"
