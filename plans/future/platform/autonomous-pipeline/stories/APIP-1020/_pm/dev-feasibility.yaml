feasible: true
confidence: high
rationale: >
  APIP-1020 is explicitly scoped as a research spike. The primary deliverables are a Zod schema
  file, YAML decomposition artifacts, and a markdown ADR — no integration code, no Lambda handlers,
  no API endpoints, no database schema changes. All patterns required (Zod discriminated union,
  YAML artifact persistence, z.literal versioning) already exist in the orchestrator package.
  The spike can be completed entirely locally without external dependencies beyond the model API.
complexity: medium

change_surface:
  areas:
    - packages/backend/orchestrator/src/artifacts/       # change-spec.ts (new file)
    - packages/backend/orchestrator/src/artifacts/__tests__/  # change-spec.test.ts (new file)
    - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/  # YAML output dir
    - plans/future/platform/autonomous-pipeline/_epic-elab/   # ADR-002-changespec-schema.md
  endpoints: []
  deploy_touchpoints:
    - "pnpm check-types --filter @repo/orchestrator (schema type verification)"
    - "pnpm test --filter @repo/orchestrator (schema unit tests)"

risks:
  - finding: "Discriminated union design decision is non-trivial and gates AC-1 and AC-2"
    mitigation: >
      Start with a single flat schema with all optional fields, run decompositions, then
      refactor to discriminated union based on empirical field usage. Avoid premature union
      complexity before validating field coverage on 10+ real stories.
  - finding: "10+ manual story decompositions are time-intensive and subject to scope creep"
    mitigation: >
      Timebox each decomposition to 30 minutes. Prioritize APIP-0010, APIP-0020, APIP-0040,
      APIP-1010, APIP-5001, APIP-5007 (6 stories with concrete technical scope). Stop at 10
      minimum — additional decompositions are optional signal.
  - finding: "APIP-1010 Structurer Node is still backlog; its change_outline format is not yet defined"
    mitigation: >
      Spike can proceed with a placeholder change_outline format. Document the assumption in ADR-002.
      Schema ADR verdict must be re-validated against final APIP-1010 output before APIP-1030
      elaboration begins. This is the sequencing risk flagged in the seed conflict analysis.

missing_requirements: []

evidence_expectations:
  - "ChangeSpecSchema.parse() passes on all 10+ decomposition YAML files (schema regression test)"
  - "pnpm check-types passes after change-spec.ts is created"
  - "ADR-002-changespec-schema.md exists with a valid verdict field"
  - "Quality metrics table exists in ADR-002 with median token count and USD estimate"

subtasks:
  - id: ST-1
    title: "Design draft ChangeSpecSchema Zod schema with discriminated union variants"
    goal: >
      Create packages/backend/orchestrator/src/artifacts/change-spec.ts with a ChangeSpecSchema
      using z.discriminatedUnion on change_type. Include schema: z.literal(1) version pinning.
      Cover all fields required by the 6 consuming systems (implementation, review, QA,
      telemetry, affinity, merge). Export ChangeSpec type via z.infer<typeof ChangeSpecSchema>.
    files_to_read:
      - packages/backend/orchestrator/src/artifacts/plan.ts
      - packages/backend/orchestrator/src/artifacts/story.ts
      - packages/backend/orchestrator/src/nodes/elaboration/delta-detect.ts
    files_to_modify:
      - packages/backend/orchestrator/src/artifacts/change-spec.ts  # new file
    acs: ["AC-1", "AC-5"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 6000

  - id: ST-2
    title: "Write Vitest unit tests for ChangeSpecSchema"
    goal: >
      Create packages/backend/orchestrator/src/artifacts/__tests__/change-spec.test.ts.
      Test: valid parse for each discriminated union variant, rejection of missing required
      fields, rejection of wrong schema version, rejection of unknown change_type,
      exhaustiveness check via switch statement. Follow plan.test.ts pattern exactly.
    files_to_read:
      - packages/backend/orchestrator/src/artifacts/__tests__/plan.test.ts
      - packages/backend/orchestrator/src/artifacts/change-spec.ts
    files_to_modify:
      - packages/backend/orchestrator/src/artifacts/__tests__/change-spec.test.ts  # new file
    acs: ["AC-1", "AC-5"]
    depends_on: ST-1
    verification: "pnpm test --filter @repo/orchestrator -- change-spec"
    estimated_tokens: 4000

  - id: ST-3
    title: "Create _spike-output directory structure and decomposition template"
    goal: >
      Create directory plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/.
      Write a decomposition-template.yaml documenting all ChangeSpec fields with descriptions
      to guide the manual decomposition exercise. Also create a quality-metrics.yaml template
      for recording per-decomposition metrics (AC-3 fields: ac_count, ambiguous_fields, token_cost, accurate).
    files_to_read:
      - packages/backend/orchestrator/src/persistence/yaml-artifact-bridge.ts
    files_to_modify:
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/decomposition-template.yaml  # new
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/quality-metrics.yaml  # new
    acs: ["AC-2", "AC-3"]
    depends_on: ST-1
    verification: "Files exist and YAML is valid (yamllint or manual check)"
    estimated_tokens: 2000

  - id: ST-4
    title: "Decompose 10+ real APIP backlog stories into ChangeSpecs"
    goal: >
      Manually decompose at minimum: APIP-0010, APIP-0020, APIP-0040, APIP-1010,
      APIP-5001, APIP-5007, APIP-5004, APIP-5003, APIP-5006, APIP-5000 (10 stories).
      Write one YAML file per story in _spike-output/APIP-1020/decompositions/.
      Record quality metrics for each story in quality-metrics.yaml.
      Run ChangeSpecSchema.parse() on each decomposition to confirm schema fitness.
    files_to_read:
      - plans/future/platform/autonomous-pipeline/backlog/APIP-0010/
      - plans/future/platform/autonomous-pipeline/backlog/APIP-0020/
      - plans/future/platform/autonomous-pipeline/backlog/APIP-0040/
      - plans/future/platform/autonomous-pipeline/backlog/APIP-1010/
      - plans/future/platform/autonomous-pipeline/backlog/APIP-5001/
      - plans/future/platform/autonomous-pipeline/backlog/APIP-5007/
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/decomposition-template.yaml
    files_to_modify:
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/  # 10+ YAML files
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/quality-metrics.yaml
    acs: ["AC-2", "AC-3", "AC-4"]
    depends_on: ST-3
    verification: "All 10+ YAML files parse against ChangeSpecSchema without ZodError (pnpm test change-spec -- --run HP-4)"
    estimated_tokens: 20000

  - id: ST-5
    title: "Validate ChangeSpec fields from all 6 consuming system perspectives"
    goal: >
      For at least one decomposition (recommended: APIP-0020 as the richest story),
      simulate each of the 6 consuming systems reading the ChangeSpec:
      implementation loop, review graph, QA graph, telemetry, model affinity, merge graph.
      Confirm all required fields per system are present. Document any gaps.
      Write findings to _spike-output/APIP-1020/consumer-validation.yaml.
    files_to_read:
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/decompositions/APIP-0020.yaml
      - packages/backend/orchestrator/src/artifacts/change-spec.ts
    files_to_modify:
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/consumer-validation.yaml  # new
    acs: ["AC-4"]
    depends_on: ST-4
    verification: "consumer-validation.yaml exists; all 6 systems documented; zero MISSING_FIELD entries (or gaps documented for ADR)"
    estimated_tokens: 4000

  - id: ST-6
    title: "Publish ADR-002-changespec-schema.md with verdict, cost model, and versioning strategy"
    goal: >
      Write plans/future/platform/autonomous-pipeline/_epic-elab/ADR-002-changespec-schema.md.
      Include: schema verdict (APPROVED / APPROVED WITH CONSTRAINTS / REVISION REQUIRED),
      summary of decomposition quality metrics, cost model (median tokens + USD per story),
      model recommendation (Sonnet vs Haiku vs Opus), versioning strategy documentation,
      and any field restrictions if verdict is APPROVED WITH CONSTRAINTS.
    files_to_read:
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/quality-metrics.yaml
      - plans/future/platform/autonomous-pipeline/_spike-output/APIP-1020/consumer-validation.yaml
      - packages/backend/orchestrator/src/artifacts/change-spec.ts
    files_to_modify:
      - plans/future/platform/autonomous-pipeline/_epic-elab/ADR-002-changespec-schema.md  # new
    acs: ["AC-5", "AC-6", "AC-7", "AC-8"]
    depends_on: ST-5
    verification: "ADR file exists; verdict field is one of three valid values; cost_model section present with numeric values"
    estimated_tokens: 5000
