lessons_to_record:
  - lesson: >
      Spike stories benefit from a graceful-skip pattern in HP-4-style tests: check
      if the decompositions directory exists before iterating, allowing the test to
      pass during early subtasks (ST-1/ST-2) before data files exist (ST-4).
      This prevents flaky test failures during partial implementation.
    category: pattern
    tags: ["testing", "spike", "yaml-validation"]

  - lesson: >
      The ChangeSpec discriminated union design was validated on 10 real stories with
      0 LOW or INCOMPLETE accuracy verdicts. Discriminated union over flat schema with
      optional fields is the correct pattern for machine-executable change contracts
      where downstream systems narrow by change_type.
    category: pattern
    tags: ["schema-design", "zod", "discriminated-union", "autonomous-pipeline"]

  - lesson: >
      For schema design spikes, consumer-perspective validation (simulating each of
      N downstream systems reading the schema) is an effective technique for identifying
      field gaps before any integration code is written. Documenting gaps as v2 candidates
      rather than blocking criteria was the right call for Phase 0.
    category: pattern
    tags: ["spike", "schema-design", "consumer-validation", "autonomous-pipeline"]

  - lesson: >
      Token cost estimates for ChangeSpec decomposition: median 10,500 tokens at ~$0.084
      per story (Claude Sonnet). Range: 1,500 tokens (docs-only) to 30,500 tokens (complex
      supervisor story). Use these as baseline benchmarks for APIP-1030 LLM decomposition
      quality measurement.
    category: reuse
    tags: ["token-cost", "cost-model", "autonomous-pipeline", "apip-1030"]

