acceptance_criteria:

  AC-1:
    title: "dispatch() accepts change_type and file_type, performs affinity lookup before static chain"
    status: PASS
    evidence:
      - "PipelineDispatchOptionsSchema in __types__/index.ts adds changeType and fileType fields:
         changeType: z.string().default('unknown'), fileType: z.string().default('unknown')"
      - "dispatch() destructures changeType and fileType from options (model-router.ts line 166-170)"
      - "Tier 2 affinity lookup block at lines 208-246 calls _queryAffinityProfile(changeType, fileType)
         before the Tier 3 static escalation chain at lines 249-329"

  AC-2:
    title: "_queryAffinityProfile(changeType, fileType) queries wint.model_affinity"
    status: PASS_WITH_NOTE
    evidence:
      - "_queryAffinityProfile() private method defined at lines 340-360 in model-router.ts"
      - "Delegates to affinityReader.query(changeType, fileType, threshold, minSampleSize)"
      - "Returns AffinityProfile | null"
    note: >
      Ordering (ORDER BY avg_cost_usd ASC, success_rate DESC) is delegated to the
      AffinityReader implementation rather than enforced in the router itself. The interface
      contract passes threshold and minSampleSize params, but does not enforce sort order.
      Because APIP-3020 (real DB reader) is out of scope for this story and the router trusts
      the injected reader, this is an acceptable design decision consistent with AC-15's
      injectable abstraction. The ordering responsibility is correctly placed on the reader.

  AC-3:
    title: "Affinity model selected when qualifying profile exists; DB override takes absolute precedence"
    status: PASS
    evidence:
      - "Tier 1 (lines 178-203): _resolveDbAssignment(agentId) checked first; if non-null, dispatched
         immediately without consulting affinityReader"
      - "Tier 2 (lines 208-246): only reached when Tier 1 returns null"
      - "HP-2 test (line 380): DB assignment loaded, affinityReader configured; verifies
         mockAffinityReader.query was NOT called — DB override wins"
      - "HP-1 test (line 353): affinity model used when no DB assignment and qualifying profile exists"

  AC-4:
    title: "Fallback to static chain when no qualifying profile (cold-start, low confidence, below threshold)"
    status: PASS
    evidence:
      - "Affinity filter at lines 214-218: profile !== null AND success_rate >= threshold
         AND confidence_level not 'none' AND confidence_level not 'low'
         AND sample_size >= minSampleSize — all conditions must hold"
      - "When any condition fails, falls through to Tier 3 static chain"
      - "EC-2 test: success_rate 0.5 < 0.85 threshold → fallback (line 480)"
      - "EC-3 test: confidence_level 'none' → fallback (line 505)"
      - "EC-4 test: confidence_level 'low' → fallback (line 530)"
      - "EC-5 test: null profile (cold-start) → fallback (line 555)"

