audit:
  - id: scope_alignment
    status: WARN
    note: >
      The story's declared scope matches the stories.index.md entry (Learning-Aware Model
      Router, depends_on APIP-3020 + APIP-0040, Phase 3, In Elaboration) and correctly
      introduces no API endpoints or infrastructure. However the index header says
      "Phase 3: Learning System & Optimization (5 stories)" yet the table lists 9 stories
      (APIP-3010 through APIP-3090). This is an index metadata inconsistency, not a story
      scope defect, but it is worth flagging. Within the story itself, scope is clean:
      no extra endpoints, no infra, no UI, strictly additive to model-router.ts and
      __types__/index.ts. WARN issued for the index header mismatch only.

  - id: internal_consistency
    status: WARN
    note: >
      Goals and non-goals are coherent and do not contradict each other. ACs map
      consistently to scope. Test plan in _pm/test-plan.yaml maps correctly to all
      13 ACs. One ordering inconsistency found: AC-2 describes the SQL order as
      "success_rate DESC, cost_per_token ASC" (i.e., highest success_rate first),
      while the Architecture Notes SQL and AC description body say
      "ORDER BY avg_cost_usd ASC, success_rate DESC" (cheapest first). The intent
      expressed throughout the story — "cheapest qualifying model wins" — is
      cost-first, but the AC-2 text has the columns reversed compared to every other
      reference. AC-2's column name also uses "cost_per_token" while the SQL and
      all other references use "avg_cost_usd". This creates an ambiguity about the
      authoritative sort order and column name. WARN: AC-2 text must be reconciled
      with the Architecture Notes SQL before implementation begins (see GAP-001).

  - id: reuse_first
    status: PASS
    note: >
      The story explicitly and correctly identifies all reuse candidates:
      PipelineModelRouter (APIP-0040) extended in-place; invalidateAssignmentsCache()
      pattern mirrored for affinity cache; ModelAffinitySelectSchema from APIP-3020;
      BudgetExhaustedError / ProviderChainExhaustedError from APIP-0040 unchanged;
      getProviderForModel() from config/llm-provider.ts; @repo/logger for all logging;
      @repo/db / Drizzle ORM for the affinity query. No per-story one-off utilities
      are invented. All cross-package shared logic is referenced from its canonical
      location. The affinityReader abstraction (injectable mock interface) is an
      acceptable isolation pattern for testability, not a one-off utility.

  - id: ports_adapters
    status: PASS
    note: >
      Core routing logic is transport-agnostic: PipelineModelRouter is an in-process
      class with no HTTP surface. The affinityReader abstraction (injected via config)
      decouples the routing logic from the Drizzle/DB transport layer, enabling clean
      unit testing with mocked readers. The story preserves ADR-001 Decision 2 (graph
      config injection) so nodes call router.dispatch() through an injected reference
      rather than a hard import. Adapters are explicitly identified: DB adapter
      (Drizzle query on wint.model_affinity), logger adapter (@repo/logger). No
      transport-coupled logic in core routing tiers.

  - id: testability
    status: PASS
    note: >
      All 6 subtasks include concrete verification commands (pnpm check-types or
      pnpm test). Unit tests (ST-5) are fully runnable without a real database via
      the injectable affinityReader mock. Integration test (ST-6) is correctly
      tagged @integration and gated on APIP-3020 migration + APIP-5001 test DB,
      with explicit skip condition documented. Test cases in _pm/test-plan.yaml are
      concrete and executable (specific setup, action, expected values, evidence).
      Regression suite (AC-12 / ED-3) covers the full APIP-0040 unit test suite.
      ADR-005 compliance (real PostgreSQL for integration test) is explicitly
      referenced. No untestable "verify manually" cases.

  - id: decision_completeness
    status: WARN
    note: >
      Two unresolved decision points exist. (1) GAP-001: AC-2 column ordering and
      name ("success_rate DESC, cost_per_token ASC" vs "avg_cost_usd ASC,
      success_rate DESC") — this must be resolved before ST-2 begins; the SQL in
      Architecture Notes is the presumed authoritative version. (2) The
      affinityReader abstraction: the story mentions it as an "injectable"
      affinityReader but does not fully specify whether this is (a) a direct Drizzle
      query wrapped in a private method, or (b) a separately injected interface
      (defined in __types__/index.ts) passed via PipelineModelRouterConfig. ST-1 in
      dev-feasibility.yaml includes "Define AffinityProfileSchema" but does not
      explicitly define the AffinityReaderSchema/interface contract. This is a
      partial design gap — the STORY-SEED.md acknowledges it ("No new files required
      unless complexity warrants splitting to affinity-reader.ts") but leaves the
      decision open. See GAP-002. No other blocking TBDs found.

  - id: risk_disclosure
    status: PASS
    note: >
      Risks are well-disclosed across multiple artifacts. Hard gate dependencies on
      APIP-0040 and APIP-3020 are called out explicitly in story, STORY-SEED.md,
      dev-feasibility.yaml, and test-plan.yaml. DB migration dependency
      (wint.model_affinity from APIP-3020) is explicit. Cache staleness / invalidation
      coupling risk is identified. Integration test gating on APIP-3020 is documented
      with severity ratings. The 85% threshold calibration risk is surfaced in
      story.yaml risk_notes and STORY-SEED.md Blockers-to-Avoid section. Provider
      derivation failure guard is specified. No hidden auth, security, upload, or
      Lambda/infra risks — the story is correctly scoped to a local-process module.
      Regression risk against APIP-0040 tests is listed as TR-2 (high severity).

  - id: story_sizing
    status: WARN
    note: >
      Split risk is self-assessed at 0.9 (high) in risk-predictions.yaml.
      Indicators checked: 13 ACs (threshold >8) — YES; >5 endpoints — NO (0
      endpoints); significant FE+BE — NO (backend only); multiple independent
      features — BORDERLINE (cache layer + three-tier routing + logging + integration
      test are coupled but conceptually separable); >3 happy path scenarios — YES
      (4 happy paths); touches >2 packages — NO (2 packages modified: orchestrator +
      database-schema read-only). Count: 2 confirmed indicators (>8 ACs, >3 happy
      paths). Threshold for SPLIT recommendation is 2+ indicators. However, all 13
      ACs are tightly coupled to a single dispatch() method extension — they cannot
      be meaningfully split without either (a) shipping a half-functional router or
      (b) duplicating the class. The story is large but not decomposable into
      independent deliverables. 5 points with 6 subtasks is reasonable for this
      cohesion level. WARN rather than SPLIT: the sizing is on the edge but splitting
      is not recommended. If implementation reveals the integration test (ST-6) can
      be deferred as a separate follow-on story, that is the natural split point.
      sizing_warning=false in story.yaml is overly optimistic given the AC count.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      All 13 ACs are covered by at least one subtask (coverage table present and
      complete). Dependencies form a valid DAG (ST-1 → ST-2 → ST-3 → ST-4 →
      ST-5 → ST-6, strictly sequential with no cycles). Each subtask has a concrete
      verification command. The Canonical References section exists in the story.
      Conditional on two issues: (1) ST-5 mentions "model-router.test.ts (or
      affinity-routing.test.ts if splitting)" — the indecision on file path should
      be resolved before implementation (see OPP-001); (2) ST-2 and ST-3 both modify
      model-router.ts and are functionally sequential, but ST-3's "files_to_modify"
      could touch 3+ logical areas of that file (cache check, Tier 2 branch, try/catch
      for Tier 2 failure, Tier 3 fallthrough). This is within the spirit of the "no
      subtask touches >3 files" rule (it's still 1 file) but the 3-tier dispatch
      implementation in a single subtask is dense. This does not warrant a FAIL but
      annotators should flag it in code review planning.

gaps:
  - id: GAP-001
    title: "AC-2 sort order and column name contradict Architecture Notes SQL"
    severity: blocking
    description: >
      AC-2 states the query orders by "success_rate DESC, cost_per_token ASC"
      (highest success rate first, then cheapest). The Architecture Notes SQL,
      all reuse candidates, and ED-4 test case all describe "ORDER BY avg_cost_usd
      ASC, success_rate DESC" (cheapest first, then highest success rate as
      tiebreaker). The column name also differs: AC-2 says "cost_per_token" while
      the SQL and APIP-3020 schema references say "avg_cost_usd". If an implementor
      follows AC-2 literally, the routing logic will prefer high-success-rate models
      over cheap models, reversing the stated cost-first intent and breaking ED-4.
    resolution: >
      Update AC-2 text to read: "ordered by avg_cost_usd ASC, success_rate DESC
      (cheapest high-confidence model first)". Confirm "avg_cost_usd" as the
      authoritative column name from APIP-3020's wint.model_affinity schema.
      Do NOT modify APIP-3040.md during this elaboration phase — flag for the
      story owner to resolve before ST-2 begins.
    decision: add_ac
    ac_added: "AC-14: Authoritative sort order is ORDER BY avg_cost_usd ASC, success_rate DESC — supersedes AC-2 inline text"

  - id: GAP-002
    title: "affinityReader injection contract not fully specified in ST-1"
    severity: blocking
    description: >
      The story references an "injectable affinityReader abstraction" for unit
      test mocking but does not fully commit to how it is injected. ST-1 says
      "Define AffinityProfileSchema" but does not specify whether an
      AffinityReaderSchema (a Zod-typed reader interface, injectable via
      PipelineModelRouterConfig) is also defined in __types__/index.ts in ST-1,
      or whether the query is a private method on PipelineModelRouter using a
      direct Drizzle import. Unit tests (ST-5) use "mock affinityReader (vi.fn())"
      suggesting it IS injected — but ST-2 says "reads from injectable affinityReader
      (or direct Drizzle query)" leaving the choice open. If the implementor
      chooses a direct Drizzle query (not injected), unit tests cannot mock it
      without module-level vi.mock() patching, making the test architecture more
      fragile. This is a blocking design decision that ST-1 must resolve.
    resolution: >
      Specify in ST-1 that AffinityReaderSchema (z.object({ query: z.function() }))
      is defined in __types__/index.ts and injected as an optional field in
      PipelineModelRouterConfig (defaulting to the real Drizzle implementation).
      This makes unit test mocking straightforward and preserves the ports-and-adapters
      pattern already established by the story's architecture notes.
    decision: add_ac
    ac_added: "AC-15: AffinityReaderSchema defined in __types__/index.ts, injected via PipelineModelRouterConfig, enabling vi.fn() mocking"

