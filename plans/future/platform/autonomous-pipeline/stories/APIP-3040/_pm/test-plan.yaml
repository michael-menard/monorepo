strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
  packages_touched:
    - packages/backend/orchestrator/src/pipeline/model-router.ts
    - packages/backend/orchestrator/src/pipeline/__types__/index.ts
    - packages/backend/database-schema/src/schema/ # read wint.model_affinity (APIP-3020)

happy_path_tests:
  - id: HP-1
    title: "Affinity routing selected when qualifying high-confidence profile exists"
    setup: >
      Mock affinityReader.query(changeType, fileType) to return a profile:
      { model: 'ollama/qwen2.5-coder:7b', success_rate: 0.92, avg_cost_usd: 0.0001,
        confidence_level: 'high', sample_size: 50 }.
      PipelineModelRouterConfig.affinitySuccessRateThreshold = 0.85.
      No wint.model_assignments DB override for the matching agent_pattern.
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts', agentPattern: 'default' })
    expected: >
      Router selects 'ollama/qwen2.5-coder:7b'. Routing decision log emitted with
      source: 'affinity', model: 'ollama/qwen2.5-coder:7b', confidence_level: 'high',
      success_rate: 0.92, sample_size: 50. Static escalation chain NOT invoked.
    evidence: "Vitest unit test asserting dispatch result and logger.info call fields"

  - id: HP-2
    title: "wint.model_assignments DB override takes precedence over affinity match"
    setup: >
      Mock affinityReader to return a qualifying high-confidence profile for (code_change, ts).
      Mock DB model_assignments to return override: { model: 'anthropic/claude-3-haiku', agent_pattern: 'default' }.
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts', agentPattern: 'default' })
    expected: >
      Router selects 'anthropic/claude-3-haiku' from DB override, NOT the affinity candidate.
      Routing decision log has source: 'db_assignment'.
    evidence: "Vitest unit test asserting DB override wins over affinity"

  - id: HP-3
    title: "Integration test — affinity routing with real test PostgreSQL fixture rows (AC-11)"
    setup: >
      Using APIP-5001 test PostgreSQL instance with wint.model_affinity migration applied (APIP-3020).
      Insert fixture rows:
        Row 1 (high-confidence): change_type='code_change', file_type='ts', model='ollama/qwen2.5-coder:7b',
          success_rate=0.91, avg_cost_usd=0.0001, confidence_level='high', sample_size=60.
        Row 2 (low-confidence): change_type='code_change', file_type='ts', model='openrouter/gpt-4o-mini',
          success_rate=0.88, avg_cost_usd=0.002, confidence_level='low', sample_size=8.
      Configure PipelineModelRouter with real @repo/db client pointing to test DB.
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts' }) twice:
        - First dispatch: expect affinity routing to high-confidence row.
        - After calling invalidateAffinityCache(), dispatch again: expect fresh DB query.
    expected: >
      First dispatch selects 'ollama/qwen2.5-coder:7b' (high-confidence row). Low-confidence
      row is NOT selected. After cache invalidation, a new DB query is made and the result
      is still 'ollama/qwen2.5-coder:7b'. Log source: 'affinity'.
    evidence: "Vitest integration test tagged @integration; runs against APIP-5001 test DB"

  - id: HP-4
    title: "Cache populated on first dispatch and reused on second dispatch"
    setup: >
      Mock affinityReader with vi.fn() spy. First call returns qualifying profile for ('doc_change', 'md').
    action: >
      Call router.dispatch({ changeType: 'doc_change', fileType: 'md' }) twice.
    expected: >
      affinityReader.query spy called exactly once. Second dispatch uses cached result.
    evidence: "Vitest unit test asserting spy call count = 1"

error_cases:
  - id: EC-1
    title: "DB query failure — graceful fallback to static escalation chain (AC-13)"
    setup: >
      Mock affinityReader.query to throw new Error('Connection refused').
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts' })
    expected: >
      dispatch() does NOT throw. Router falls through to static Ollama → OpenRouter → Anthropic
      escalation chain. logger.warn called once with routing failure reason.
      Routing decision log has source: 'fallback'.
    evidence: "Vitest unit test asserting no throw + logger.warn spy called once"

  - id: EC-2
    title: "success_rate below threshold — fallback to static chain (AC-4)"
    setup: >
      Mock affinityReader to return profile: { success_rate: 0.79, confidence_level: 'high', sample_size: 40 }.
      affinitySuccessRateThreshold = 0.85.
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts' })
    expected: >
      Router ignores the profile (success_rate < threshold) and falls back to static chain.
      source: 'fallback' in routing log.
    evidence: "Vitest unit test on routing decision path"

  - id: EC-3
    title: "confidence_level 'none' — fallback to static chain (AC-4, AC-10c)"
    setup: >
      Mock affinityReader to return profile: { success_rate: 0.95, confidence_level: 'none', sample_size: 5 }.
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts' })
    expected: >
      Router ignores profile (confidence_level = 'none') and falls back to static chain.
    evidence: "Vitest unit test"

  - id: EC-4
    title: "confidence_level 'low' — fallback to static chain (AC-4, AC-10c)"
    setup: >
      Mock affinityReader to return profile: { success_rate: 0.95, confidence_level: 'low', sample_size: 12 }.
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts' })
    expected: >
      Router ignores profile (confidence_level = 'low') and falls back to static chain.
    evidence: "Vitest unit test"

  - id: EC-5
    title: "No matching affinity profile — fallback to static chain cold-start (AC-4, AC-10b)"
    setup: >
      Mock affinityReader.query to return null (no qualifying profile for this change_type/file_type).
    action: >
      Call router.dispatch({ changeType: 'unknown_new_type', fileType: 'rb' })
    expected: >
      Router uses static escalation chain. source: 'fallback'. No error thrown or logged.
    evidence: "Vitest unit test"

edge_cases:
  - id: ED-1
    title: "change_type and file_type not provided — default to 'unknown' (AC-8, AC-10g)"
    setup: >
      Mock affinityReader.query with vi.fn() spy.
    action: >
      Call router.dispatch({}) or router.dispatch({ agentPattern: 'default' }) with no changeType/fileType.
    expected: >
      Dispatch called with changeType='unknown', fileType='unknown'. affinityReader.query
      called with ('unknown', 'unknown'). No profile found; falls back to static chain.
      No error thrown.
    evidence: "Vitest unit test asserting spy called with 'unknown' defaults"

  - id: ED-2
    title: "invalidateAffinityCache() causes re-query on next dispatch (AC-6, AC-10f)"
    setup: >
      Mock affinityReader with vi.fn() spy. First dispatch populates cache.
    action: >
      Call dispatch() → assert spy called once.
      Call invalidateAffinityCache().
      Call dispatch() again.
    expected: >
      After invalidation, spy called a second time (cache was cleared). Total spy calls = 2.
    evidence: "Vitest unit test asserting spy call count after invalidation"

  - id: ED-3
    title: "Regression — existing APIP-0040 unit tests all pass (AC-12)"
    setup: >
      Run the full APIP-0040 test suite without modification.
    action: >
      pnpm test --filter @repo/orchestrator (existing tests for PipelineModelRouter v1:
      rate limiting, budget accumulation, escalation chain, BudgetExhaustedError,
      ProviderChainExhaustedError).
    expected: >
      All existing tests pass. Zero regressions. No files in
      packages/backend/orchestrator/src/models/ were modified.
    evidence: "CI green on existing test suite after APIP-3040 changes merged"

  - id: ED-4
    title: "Cheapest qualifying model selected when multiple profiles exist for same (change_type, file_type)"
    setup: >
      Mock affinityReader to return two high-confidence profiles for (code_change, ts):
        Profile A: model='openrouter/gpt-4o-mini', success_rate=0.93, avg_cost_usd=0.002, confidence_level='high'
        Profile B: model='ollama/qwen2.5-coder:7b', success_rate=0.90, avg_cost_usd=0.0001, confidence_level='high'
      Query ordered by avg_cost_usd ASC, success_rate DESC.
    action: >
      Call router.dispatch({ changeType: 'code_change', fileType: 'ts' })
    expected: >
      Router selects Profile B (ollama, cheaper) despite Profile A having higher success_rate.
    evidence: "Vitest unit test confirming cost-first ordering"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "dispatch() return value contains correct model and provider fields"
      - "logger.info called with source: 'affinity' | 'db_assignment' | 'fallback'"
      - "logger.warn called on DB failure in EC-1"
      - "affinityReader.query spy call count for cache tests"
      - "Static escalation chain invoked on all fallback paths"
  frontend:
    # omitted — ui_touched: false

manual_cases: []

fixture_definitions:
  - name: high_confidence_affinity_row
    type: PostgreSQL row (wint.model_affinity)
    description: >
      change_type='code_change', file_type='ts', model='ollama/qwen2.5-coder:7b',
      success_rate=0.91, avg_cost_usd=0.0001, confidence_level='high', sample_size=60,
      last_aggregated_at=NOW()
  - name: low_confidence_affinity_row
    type: PostgreSQL row (wint.model_affinity)
    description: >
      change_type='code_change', file_type='ts', model='openrouter/gpt-4o-mini',
      success_rate=0.88, avg_cost_usd=0.002, confidence_level='low', sample_size=8,
      last_aggregated_at=NOW()
  - name: mock_affinity_reader
    type: Vitest mock (vi.fn())
    description: >
      Injectable mock for the affinityReader abstraction. Used in all unit tests.
      Returns configurable AffinityProfile | null per test case.

risks:
  - id: TR-1
    description: >
      Integration test (HP-3, @integration) requires APIP-3020 wint.model_affinity migration
      applied to APIP-5001 test DB. If APIP-3020 is not yet merged, integration test must be
      skipped in CI. Use vitest @integration tag and document skip condition in test file.
    severity: medium
  - id: TR-2
    description: >
      APIP-0040 regression tests (ED-3) depend on PipelineModelRouter v1 existing in main.
      If APIP-0040 has not yet merged when APIP-3040 testing begins, regression suite cannot
      run. Gate: APIP-0040 merge is a hard prerequisite.
    severity: high
  - id: TR-3
    description: >
      Cache behavior tests (HP-4, ED-2) rely on spy call count which is fragile if the router
      implementation changes how it lazy-loads. Test must be tightly coupled to the cache key
      contract `${changeType}:${fileType}`.
    severity: low
