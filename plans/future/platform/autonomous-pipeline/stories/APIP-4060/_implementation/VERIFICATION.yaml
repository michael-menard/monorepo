lessons_to_record:
  - lesson: >-
      Abstracting the Drizzle batch query behind a FreshnessBatchQueryFn injectable eliminates the @repo/knowledge-base
      build dependency from the test layer while fully documenting the intended SQL semantics in JSDoc. This pattern
      enables complete unit test isolation without sacrificing specification clarity.
    category: pattern
    tags:
      - backend
      - dependency-injection
      - drizzle
      - testability
  - lesson: >-
      The AC-13 time-truncation check placement (after each full batch, before incrementing offset) is the correct
      pattern for bounded cron jobs: it ensures partial results are always internally consistent at a batch boundary and
      avoids mid-batch interruption.
    category: pattern
    tags:
      - backend
      - cron
      - batch-processing
      - time-bounds
