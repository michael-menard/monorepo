architectural_decisions:
  - id: ARCH-001
    question: >-
      Should run-unit-tests and run-e2e-tests use createToolNode (10s timeout) or createNode with overridden timeoutMs
      for the 5-minute subprocess?
    decision: >-
      Use createNode directly with timeoutMs set to testTimeoutMs + buffer (e.g., testTimeoutMs + 30000) for
      run-unit-tests and run-e2e-tests. The application-layer Promise.race handles the subprocess timeout; the
      node-factory timeout is a safety wrapper only. createToolNode's hardcoded 10s would preempt the application
      timeout.
    rationale: >-
      OPP-003 from ELAB.yaml explicitly flags this: createToolNode has a hard-coded 10-second timeout that would preempt
      the 5-minute testTimeoutMs. Using createNode directly with a configured timeoutMs resolves this correctness risk.
      The story says 'uses createToolNode factory' (AC-4, AC-5) but this is a clarification/fix to avoid a runtime bug —
      the node still uses the createNode infrastructure.
    decided_by: auto
    tier: 1
    autonomy_note: >-
      Tier 1 clarification auto-accepted at conservative level. The story says createToolNode but the elaboration
      explicitly flags that createToolNode's 10s timeout will preempt the 5-minute subprocess timeout. Using createNode
      directly is the correct implementation.
