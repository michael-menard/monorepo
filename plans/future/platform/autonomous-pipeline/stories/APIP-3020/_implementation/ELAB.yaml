gaps:
  - id: gap-1
    check: decision_completeness
    finding: "APIP-5007 (Database Schema Versioning) is in 'Created' status — migration naming convention is not yet established. Story references 'per APIP-5007 naming convention' but APIP-5007 has no implementation. Story should explicitly state fallback: use next sequential number (016_model_affinity.sql) if APIP-5007 is not complete."
    severity: medium
    decision: log_to_kb
    ac_added: null
    notes: "Non-blocking: fallback to sequential numbering (016_) is clear and works. Logged to KB for awareness."
    kb_entry_id: "17adef0d-38b5-4018-a2ff-21651a6a6e68"

  - id: gap-2
    check: risk_disclosure
    finding: "No advisory lock or concurrency guard documented for Pattern Miner. Story acknowledges APIP-3090 should ensure single-instance execution, but Pattern Miner itself has no protection against concurrent runs. If two instances run simultaneously, the watermark-based approach could cause duplicate aggregation or incorrect weighted averages."
    severity: medium
    decision: log_to_kb
    ac_added: null
    notes: "Non-blocking: APIP-3090 owns single-instance scheduling. Advisory lock is defense-in-depth, not MVP-critical. Logged to KB."
    kb_entry_id: "1f244cad-a29b-4246-8cae-198d8e788bbf"

opportunities:
  - id: opp-1
    category: performance
    finding: "Batch upsert: aggregation could use a single multi-row INSERT...ON CONFLICT instead of per-group individual upserts, reducing DB round-trips when many (model, change_type, file_type) combinations exist."
    effort: medium
    decision: log_to_kb
    kb_entry_id: "c11081ab-fd0e-4a14-9da8-69d9e1b290b3"

  - id: opp-2
    category: observability
    finding: "Structured metrics emission: Pattern Miner could emit per-group aggregation durations and row counts as structured log fields for operational monitoring, beyond the final summary log."
    effort: low
    decision: log_to_kb
    kb_entry_id: "be8aefc6-ecd6-46cc-8788-08a3a388f771"

  - id: opp-3
    category: edge_cases
    finding: "The metrics.ts canonical reference uses TypeScript interfaces (GraphStateWithMetrics) which contradicts the Zod-first types rule in CLAUDE.md. Pattern Miner implementation should use Zod schemas for all state types, not follow this specific anti-pattern."
    effort: low
    decision: log_to_kb
    kb_entry_id: "dffb32dd-da75-4fb0-a8e0-9d96a29b3aaf"

  - id: opp-4
    category: performance
    finding: "Trend delta computation reads the previous success_rate before upsert. This creates a read-then-write race window. A CTE-based approach (WITH old AS SELECT ... INSERT ... ON CONFLICT DO UPDATE RETURNING) would be atomic."
    effort: medium
    decision: log_to_kb
    kb_entry_id: "4783b718-9c36-4fbf-951b-e9d462b76c62"

