  @repo/logger used exclusively (no console.log). Parameterized SQL — no string interpolation (SQL injection finding
  from initial commit was remediated in fix commit per REVIEW.yaml). wintSchema.enum() correctly used for
  confidence_level enum in wint namespace. No barrel files created. No HTTP endpoints added (E2E exempt).
issues:
  - id: QA-001
    severity: fail
    ac: AC-8
    description: >-
      Confidence level thresholds do not match AC-8 specification. Story requires: 1-19 → low, 20-49 → medium, 50+ →
      high. Implementation uses: LOW=1 (1-9 → low), MEDIUM=10 (10-29 → medium), HIGH=30 (30+ → high). No architectural
      decision or design note in any planning artifact justifies this deviation. Unit tests pass because they test the
      implemented values, not the specified values. Downstream routing stories (APIP-3040, APIP-3050, APIP-3060) will
      see different confidence banding than designed.
    file: packages/backend/orchestrator/src/graphs/pattern-miner.ts
    line: 38-42
    recommendation: >-
      Either update CONFIDENCE_THRESHOLDS to match AC-8 spec (HIGH: 50, MEDIUM: 20, LOW: 1) and update unit tests
      accordingly, OR add an explicit architectural decision note in PLAN.yaml documenting why the thresholds were
      changed and have the story AC-8 amended.
lessons_to_record:
  - lesson: >-
      Confidence threshold constants that differ from story spec without a documented architectural decision are a QA
      FAIL. Even when unit tests all pass (because they test the implemented values), the deviation from spec must be
      explicitly documented and approved. The test naming HP-1 through HP-4 matching story test IDs can mask threshold
      deviations.
    category: anti_pattern
    tags:
      - qa
      - ac-verification
      - constants
      - threshold
  - lesson: >-
      When APIP-3010 column names differ from story spec, using an ARCH-xxx decision in PLAN.yaml to document the
      adaptation is an effective pattern. The ARCH-001 decision in PLAN.yaml cleanly justified model_id, sample_count,
      avg_retry_count, and avg_cost_usd omissions. This should be the standard for any column name adaptation.
    category: pattern
    tags:
      - database-schema
      - arch-decisions
      - column-mapping
  - lesson: >-
      Integration tests gated on an upstream story (APIP-3010) must be marked DEFERRED with an explicit canRun guard
      (TEST_DATABASE_URL + RUN_INTEGRATION_TESTS=true flag). The pattern used here — 1 smoke test that always runs + 4
      @integration tests that skip — is a good pattern to verify the file exists and loads without error while not
      blocking CI.
    category: pattern
    tags:
      - integration-tests
      - deferred
      - ci
      - upstream-dependency
  - lesson: >-
      Story test plan EC-4 quoted an incorrect math result (0.8545 instead of correct 0.8636 for (100*0.9 +
      10*0.5)/110). The implementation correctly uses the formula and toBeCloseTo against the actual result. Story test
      plan math errors should be caught in ELAB review.
    category: blocker
    tags:
      - test-plan
      - math
      - weighted-average
      - elab
