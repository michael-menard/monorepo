id: "APIP-6002"
title: "Stuck Story Recovery Loop"
status: elaboration
updated_at: "2026-03-04T12:00:00Z"
priority: high
phase: 5
epic: autonomous-pipeline
points: 3
story_type: feature
frontend_impacted: false
backend_impacted: true
feature: "Periodic sweep that detects stories stuck in intermediate pipeline stages and automatically recovers them"
goal: "Eliminate permanently stuck stories by detecting stalled pipeline progress and applying recovery actions (retry, move back, or flag for human intervention)."
depends_on:
  - "APIP-6001"
endpoints: []
infrastructure:
  - "Stuck story detector function in implement-stories.sh"
  - "Recovery action dispatcher"
  - "STUCK-RECOVERY.yaml artifact for audit trail"
  - "Integration with implement-dispatcher.sh polling loop"
risk_notes: "Recovery actions must be idempotent. Moving a story backward that is legitimately in-progress (just slow) could discard work."
sizing_warning: false
created: "2026-03-01"
source: "Pipeline audit — 5 stories permanently stuck in failed-code-review with max-retries=0"
acceptance_criteria_additions:
  - id: AC-11
    text: "Test harness with at least 3 test scenarios: (1) detect_stuck_stories finds stuck story in mock directory, (2) recover_story moves story and writes STUCK-RECOVERY.yaml, (3) idempotency — second recovery run is a no-op"
    added_by: autonomous-elaboration
    reason: "Previous implementation had 0 tests for recovery system"
  - id: AC-12
    text: "Story works independently of APIP-6001 — if phase gate validation functions are absent, recovery loop degrades gracefully (skips gate-dependent checks, logs warning)"
    added_by: autonomous-elaboration
    reason: "APIP-6001 dependency is in failed-code-review, not on main"
  - id: AC-13
    text: "Activity-based stuck detection: before recovering an in-progress story, check for recent worktree commits (last 30 min) — if recent activity exists, skip recovery and log 'RECOVERY SKIP: active worktree'"
    added_by: autonomous-elaboration
    reason: "Prevent false positive recovery of legitimately slow but active stories"
