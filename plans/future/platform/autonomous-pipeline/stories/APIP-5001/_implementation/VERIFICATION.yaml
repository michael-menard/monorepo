lessons_to_record:
  - lesson: >-
      LangGraph checkpoint schema should use PostgresSaver.setup() for migrations rather than raw SQL scripts. The SQL
      file serves as documentation only — LangGraph manages IF NOT EXISTS guards and checkpoint_migrations tracking
      internally.
    category: pattern
    tags:
      - langgraph
      - database
      - migrations
      - pipeline
  - lesson: >-
      When a package's source files live on an unmerged feature branch, QA must use the git worktree
      (tree/story/<STORY_ID>) rather than the main branch checkout. The test run count may differ slightly from
      re-verification evidence if the evidence was generated from a different snapshot.
    category: pattern
    tags:
      - qa
      - git
      - worktree
      - testing
  - lesson: >-
      For infrastructure-only stories (no HTTP endpoints, no UI), .http file execution is N/A and should be noted
      explicitly in the verification artifact to satisfy the agent's fail condition check.
    category: pattern
    tags:
      - qa
      - infrastructure
      - testing
