strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true  # reads from wint.model_affinity (APIP-3020)

happy_path_tests:
  - id: HP-1
    title: "Affinity-guided pattern selection applies correctly for high-confidence profile"
    setup: "StructurerConfig with affinityEnabled:true, minAffinityConfidence:'low', maxAffinityWeight:1.0. Mock DB returns profile (model='haiku', change_type='create', file_type='tsx', confidence_level='high', success_rate=0.92, sample_size=45)."
    action: "Call readAffinityProfiles() with changeOutline containing TSX create-type items."
    expected: "ChangeOutlineItem.extensions.preferredChangePattern === 'create-new-file'; extensions.affinityMeta.confidenceLevel === 'high'; extensions.affinityMeta.successRate === 0.92."
    evidence: "Unit test asserts extensions object shape matches AffinityGuidanceSchema fields."

  - id: HP-2
    title: "Config extension adds affinityEnabled and minAffinityConfidence with correct defaults"
    setup: "Parse StructurerConfigSchema with no overrides."
    action: "Parse empty object through updated StructurerConfigSchema."
    expected: "affinityEnabled defaults to true; minAffinityConfidence defaults to 'low'; maxAffinityWeight defaults to 0.5."
    evidence: "Unit test: StructurerConfigSchema.parse({}) returns expected defaults."

  - id: HP-3
    title: "AffinityGuidanceSchema validates correct shape"
    setup: "Construct valid AffinityGuidance object."
    action: "Parse through AffinityGuidanceSchema."
    expected: "Schema parses without error; all fields present with correct types."
    evidence: "Unit test: schema.parse({changeOutlineItemId:'item-1', preferredPattern:'create-new-file', confidenceLevel:'high', successRate:0.92, sampleSize:45}) passes."

  - id: HP-4
    title: "Integration: real DB fixture produces expected extensions"
    setup: "APIP-5001 test DB with wint.model_affinity row inserted: (model='haiku', change_type='create', file_type='tsx', confidence='high', success_rate=0.92, sample_size=45). Structurer configured with affinityEnabled:true."
    action: "Run Structurer with real DB injection against outline with TSX create-type items."
    expected: "extensions.preferredChangePattern === 'create-new-file' for matching items."
    evidence: "@integration tagged Vitest test asserts extensions match fixture data."

  - id: HP-5
    title: "Structural fields are not modified by affinity guidance"
    setup: "StructurerConfig with affinityEnabled:true, maxAffinityWeight:1.0. Profile present for all items."
    action: "Run Structurer on a changeOutline with known complexity/fileCount/estimatedAtomicChanges values."
    expected: "complexity, estimatedAtomicChanges, filePath, changeType, description, relatedAcIds are identical to input. Only extensions.preferredChangePattern is set."
    evidence: "Unit test: deep equal comparison of output item excluding extensions field."

  - id: HP-6
    title: "maxAffinityWeight blends affinity and heuristic proportionally"
    setup: "StructurerConfig with affinityEnabled:true, maxAffinityWeight:0.5. Affinity recommends 'create-new-file'. Heuristic would prefer 'modify-existing'."
    action: "Run affinity application with blended weight."
    expected: "Result reflects weighted decision (at 0.5, both signals factor equally — actual pattern depends on blending implementation)."
    evidence: "Unit test: maxAffinityWeight:0.0 produces no extensions; maxAffinityWeight:1.0 produces full affinity recommendation."

error_cases:
  - id: EC-1
    title: "DB unavailable: Structurer falls back gracefully and logs warn"
    setup: "StructurerConfig with affinityEnabled:true. Mock DB connection throws connection error."
    action: "Run Structurer with DB that throws on query."
    expected: "(a) Error is caught; (b) logger.warn called with storyId and error; (c) StructurerResult.fallbackUsed === true; (d) No extensions.preferredChangePattern set on any item; (e) Elaboration continues without throwing."
    evidence: "Unit test: spy on logger.warn; assert called once with expected fields. Assert output.fallbackUsed === true."

  - id: EC-2
    title: "DB timeout: same fallback path as connection error"
    setup: "Mock DB times out on query (Promise rejects after delay)."
    action: "Run Structurer."
    expected: "Same as EC-1: caught, warn logged, fallbackUsed:true, no extensions set."
    evidence: "Unit test with jest.useFakeTimers or equivalent timeout mock."

  - id: EC-3
    title: "minAffinityConfidence gate: 'low' confidence profile not applied when minimum is 'medium'"
    setup: "StructurerConfig with affinityEnabled:true, minAffinityConfidence:'medium'. Mock DB returns profile with confidence_level:'low'."
    action: "Run readAffinityProfiles()."
    expected: "Profile is not applied; extensions.preferredChangePattern is omitted (or 'no-preference')."
    evidence: "Unit test: assert no preferredChangePattern on output items when confidence below threshold."

  - id: EC-4
    title: "affinityEnabled:false — no DB call made"
    setup: "StructurerConfig with affinityEnabled:false. Spy on DB query function."
    action: "Run Structurer."
    expected: "DB is never called. Output is identical to APIP-1010 Structurer baseline. fallbackUsed is absent or false."
    evidence: "Unit test: spy on db.query or readAffinityProfiles; assert never called. Structurer output matches APIP-1010 test fixture."

  - id: EC-5
    title: "maxAffinityWeight:0.0 — no patterns applied despite data present"
    setup: "StructurerConfig with affinityEnabled:true, maxAffinityWeight:0.0. DB returns valid profiles."
    action: "Run Structurer."
    expected: "extensions.preferredChangePattern not set on any item. DB may or may not be called (implementation detail) but no affinity guidance applied to output."
    evidence: "Unit test: assert no extensions on output items."

  - id: EC-6
    title: "DB null injection (no db in config.configurable): fallback to plain heuristic"
    setup: "StructurerConfig with affinityEnabled:true but config.configurable.db is null/undefined."
    action: "Run Structurer node."
    expected: "logger.warn called with message about null DB; fallbackUsed:true; no extensions set."
    evidence: "Unit test: createToolNode invoked with config omitting db; assert warn and fallback."

edge_cases:
  - id: ED-1
    title: "Cold-start: no rows returned for any (changeType, fileType) combination"
    setup: "StructurerConfig with affinityEnabled:true. DB returns empty result set for all queries."
    action: "Run Structurer."
    expected: "fallbackUsed:true; logger.info called with reason:'cold-start — no affinity data'; no extensions set."
    evidence: "Unit test: spy on logger.info; assert called with expected fields."

  - id: ED-2
    title: "All items in changeOutline have same (changeType, fileType) — single DB query"
    setup: "changeOutline with 5 items all of type create/tsx. affinityEnabled:true."
    action: "Run readAffinityProfiles()."
    expected: "DB queried exactly once for (create, tsx) pair — not once per item."
    evidence: "Unit test: spy on DB query; assert called exactly 1 time."

  - id: ED-3
    title: "confidence_level:'none' row treated as cold-start sentinel"
    setup: "DB returns row with confidence_level:'none' for queried (changeType, fileType)."
    action: "Run readAffinityProfiles()."
    expected: "Row is ignored; treated as no data; fallbackUsed:true."
    evidence: "Unit test: assert extensions not populated when all returned rows have confidence_level:'none'."

  - id: ED-4
    title: "APIP-1010 regression: existing Structurer tests pass unchanged"
    setup: "Run full pnpm test --filter packages/backend/orchestrator with APIP-3050 changes in place."
    action: "Execute test suite."
    expected: "All pre-existing APIP-1010 Structurer tests pass. No fixture updates required."
    evidence: "CI output shows 0 regressions in structurer test suite."

  - id: ED-5
    title: "New schemas exported from elaboration index"
    setup: "After APIP-3050 implementation."
    action: "Run pnpm check-types --filter packages/backend/orchestrator."
    expected: "Zero TypeScript errors. AffinityGuidanceSchema importable from nodes/elaboration/index.ts."
    evidence: "pnpm check-types output clean."

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "StructurerConfigSchema.parse({}) returns { affinityEnabled: true, minAffinityConfidence: 'low', maxAffinityWeight: 0.5 }"
      - "AffinityGuidanceSchema validates { changeOutlineItemId, preferredPattern, confidenceLevel, successRate, sampleSize }"
      - "logger.warn spy called with { storyId, error } on DB failure"
      - "logger.info spy called with { storyId, reason: 'cold-start...' } on empty rows"
      - "StructurerResult.fallbackUsed === true on DB error or cold-start"
      - "ChangeOutlineItem.extensions.preferredChangePattern set to 'create-new-file' | 'modify-existing' | 'split-component' when profile matches"
      - "No structural fields (complexity, estimatedAtomicChanges, filePath, changeType, description, relatedAcIds) modified by affinity"
      - "pnpm check-types --filter packages/backend/orchestrator exits 0"

manual_cases: []

fixture_definitions:
  - name: "high_confidence_affinity_row"
    type: "DB fixture (wint.model_affinity)"
    description: "Row: model='haiku', change_type='create', file_type='tsx', success_rate=0.92, confidence_level='high', sample_size=45"
  - name: "low_confidence_affinity_row"
    type: "DB fixture (wint.model_affinity)"
    description: "Row with confidence_level='low' to test minimum confidence gate"
  - name: "none_confidence_affinity_row"
    type: "DB fixture (wint.model_affinity)"
    description: "Row with confidence_level='none' to test cold-start sentinel behavior"
  - name: "empty_affinity_table"
    type: "DB fixture (wint.model_affinity)"
    description: "Table with no rows — cold-start state"
  - name: "mock_db_connection_error"
    type: "Vitest mock"
    description: "Mock DB that throws Error('connection refused') on any query"
  - name: "baseline_structurer_config"
    type: "TypeScript constant"
    description: "StructurerConfig with affinityEnabled:false to test APIP-1010 baseline parity"
  - name: "tsx_create_change_outline"
    type: "TypeScript constant"
    description: "ChangeOutlineItem[] with 3 items all having changeType:'create', filePath ending in '.tsx'"

risks:
  - "Integration tests require APIP-3020 to be merged and wint.model_affinity table to exist — gate with @integration tag"
  - "APIP-1010 regression test requires structurer.ts to exist — APIP-1010 must merge first"
  - "maxAffinityWeight blending logic (HP-6) depends on implementation details not fully specified — may need clarification during dev elaboration"
  - "Model identifier format must match APIP-0040 exactly — integration test fixture must use same model identifier format as APIP-0040 router uses"
