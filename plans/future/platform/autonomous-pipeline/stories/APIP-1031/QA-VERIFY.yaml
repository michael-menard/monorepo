lessons_to_record:
  - lesson: >-
      When change-spec-schema.ts already exists with the real discriminated union schema (placed by
      another in-progress story), accept it as authoritative rather than creating a placeholder.
      This avoids schema duplication and produces a strictly better implementation.
    category: pattern
    tags: ['orchestrator', 'change-spec', 'schema-coordination']

  - lesson: >-
      For LangGraph workflow adapter shims (createToolNode exports for main workflow integration),
      a TypeScript interface extending a Zod-inferred base type is acceptable as a type-only overlay.
      The Zod-first requirement should apply to graph state annotations and domain types, not to
      internal adapter type machinery.
    category: pattern
    tags: ['langgraph', 'zod-first', 'adapter-pattern']

  - lesson: >-
      The injectable gitRunner pattern (spawn-based Promise wrapper) over execSync enables unit
      testing of git operations without exec mocking. Matches the existing cleanup-worktree.ts
      pattern. Prefer this for all new git-invoking nodes.
    category: reuse
    tags: ['git', 'testing', 'injectable-pattern', 'orchestrator']

