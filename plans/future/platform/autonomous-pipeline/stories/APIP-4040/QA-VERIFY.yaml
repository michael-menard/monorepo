lessons_to_record:
  - lesson: >-
      When a collector node spawns a child process (e.g., vitest --coverage), it cannot
      be unit tested in isolation. Document this in the test plan as a risk note and
      accept file-level type-check as evidence instead. Integration tests against a real
      DB/runtime are the appropriate gate for such nodes.
    category: pattern
    tags: [testing, orchestrator, child-process, coverage]

  - lesson: >-
      The nullable mutationScore field pattern (nullable().default(null)) is a clean
      way to stub out a deferred metric while keeping schema structure intact. Downstream
      consumers (decay detector, DB schema) all tolerate null cleanly without special cases.
    category: pattern
    tags: [schema-design, deferred-feature, zod, orchestrator]

  - lesson: >-
      Story split APIP-4040 → APIP-4040-B worked well: 12 ACs shipped cleanly with
      zero regressions; the split was identified at elaboration time (not mid-implementation)
      by auditing package.json for mutation testing tooling before writing code.
    category: pattern
    tags: [story-splitting, elaboration, tooling-audit]

