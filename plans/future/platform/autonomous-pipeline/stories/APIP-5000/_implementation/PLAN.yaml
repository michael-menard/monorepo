architectural_decisions:
  - id: ARCH-001
    question: >
      AC-2 and AC-5 require importing Zod schemas from APIP-0010/APIP-0020, but those
      are in worktrees not yet merged to main. Should we (A) create local Zod schema mirrors
      with TODO comments to replace on merge, or (B) block execution until those branches merge?
    decision: >
      Option A — create local Zod schema mirrors. The orchestrator pre-approved this decision
      with aggressive autonomy. Schema mirrors are placed in src/__types__/ with clearly marked
      TODO comments indicating they must be replaced once @repo/pipeline-queue and
      apps/api/pipeline merge.
    rationale: >
      Blocking on merge would halt APIP-5000 indefinitely. Local mirrors satisfy the
      structural intent of the ACs (Zod-validated factories, correct return types) while
      deferring the import wire-up to a follow-on PR. The TODO comments make the technical
      debt explicit and findable by grep.
    decided_by: orchestrator_auto_approved
  - id: ARCH-002
    question: >
      AC-6 requires instantiating the real PipelineSupervisor from APIP-0020, but that
      class is not yet on main. Should we (A) create a minimal TypeScript stub supervisor
      with the same constructor/start()/stop()/getWorker() signature, or (B) skip the smoke
      test and only test the fixture factories?
    decision: >
      Option A — create a minimal local stub supervisor in the smoke test file. The stub
      mirrors the PipelineSupervisor interface (constructor + start/stop/getWorker) using
      plain TypeScript with no external dependencies. A TODO marks where to swap in the
      real import. This satisfies AC-6 structurally while unblocking execution.
    rationale: >
      Skipping the smoke test would leave AC-6 unmet, which is the highest-value AC
      per the test plan. A structural stub that exercises the mock wiring is better than
      no test. The stub is replaced with the real import once APIP-0020 merges.
    decided_by: orchestrator_auto_approved

complexity: moderate

notes:
  - >
    pnpm-workspace.yaml uses 'apps/api/*' glob — apps/api/autonomous-pipeline is auto-included.
    No workspace file changes required.
  - >
    turbo.json must be checked in ST-1: if 'test' and 'check-types' tasks are defined with
    package-level filters, autonomous-pipeline may need to be added. If turbo.json uses
    global task patterns, no change needed.
  - >
    The ELAB.yaml verdict is FAIL (stub story), but the story was rewritten post-elab with
    full ACs, subtasks, and canonical references. The ELAB.yaml reflects the original stub,
    not the current story version. Planning proceeds on the current story content.
  - >
    No barrel files: each file in __fixtures__/ and __mocks__/ exports named functions
    directly. Consuming test files import from the source path, e.g.,
    import { createMockBullMQJob } from '../__fixtures__/bullmq-job.js'
  - >
    fileParallelism: false is appropriate — the smoke test uses module-level vi.mock()
    which can interfere with parallel test runners.
  - >
    coverage thresholds >=45% will be trivially met with only test infrastructure files.
    This is documented in the story and is expected until APIP-0010/0020 implementation
    code lands in the package.
