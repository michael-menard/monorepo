lessons_to_record:
  - lesson: >-
      Integration tests for a node:http health server work well when excluded from default vitest config (to avoid
      Redis/infra dependencies) and run separately with --config /dev/null. This pattern should be documented for
      infra-only packages.
    category: pattern
    tags:
      - testing
      - integration
      - infra
      - pipeline
  - lesson: >-
      Module-level boolean guard (_handlersRegistered) is the correct idempotency pattern for Node.js signal handler
      registration. The resetDrainHandlers() export for test cleanup is essential and should be paired with afterEach()
      in all drain handler tests.
    category: pattern
    tags:
      - nodejs
      - signals
      - testing
      - drain
      - pipeline
  - lesson: >-
      stop_grace_period in Docker Compose must equal drainTimeoutMs + buffer (630s = 600s + 30s). This relationship must
      be documented in the compose file comment to prevent silent breakage when defaults change.
    category: pattern
    tags:
      - docker
      - infra
      - deployment
      - pipeline
