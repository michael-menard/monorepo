strategy: unit+integration
scope:
  endpoints:
    - "GET /health"
    - "GET /live"
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "SIGTERM triggers drain mode and exits cleanly when no in-flight jobs"
    setup: "Start supervisor with no active BullMQ jobs; health server running on port 9091"
    action: "Send SIGTERM to supervisor process"
    expected: "Supervisor logs { event: 'drain_started', activeJobs: 0 }, calls BullMQ Worker.close(), exits with process.exit(0)"
    evidence: "Process exit code 0; structured log line with drain_started event; GET /health returns draining status before exit"

  - id: HP-2
    title: "SIGTERM with in-flight job: job completes within drainTimeoutMs, clean exit"
    setup: "Enqueue a job; start supervisor (real Redis via Docker Compose); job processing active"
    action: "Send SIGTERM while job is processing"
    expected: "Supervisor enters drain mode, job completes naturally, GET /health shows { status: 'draining' }, supervisor exits with process.exit(0)"
    evidence: "process.exit(0) called; job completion logged before exit; health endpoint transitioned healthy→draining→503 (server down)"

  - id: HP-3
    title: "GET /health returns 200 with healthy status when supervisor running normally"
    setup: "Supervisor started, BullMQ Worker connected to Redis, circuit breaker CLOSED"
    action: "HTTP GET http://localhost:9091/health"
    expected: "HTTP 200; JSON body { status: 'healthy', activeJobs: 0, circuitBreakerState: 'CLOSED', draining: false, uptimeMs: <positive> }"
    evidence: "HTTP 200 status; JSON fields present and correctly typed"

  - id: HP-4
    title: "GET /health returns 200 with draining status during drain window"
    setup: "Supervisor in drain mode (SIGTERM sent, in-flight job active)"
    action: "HTTP GET http://localhost:9091/health"
    expected: "HTTP 200; JSON body { status: 'draining', draining: true, activeJobs: 1 }"
    evidence: "HTTP 200; draining: true in response body; activeJobs >= 1"

  - id: HP-5
    title: "GET /live returns 200 as long as Node.js process is alive"
    setup: "Supervisor running in any state (healthy or draining)"
    action: "HTTP GET http://localhost:9091/live"
    expected: "HTTP 200; minimal response confirming process alive"
    evidence: "HTTP 200 status code"

  - id: HP-6
    title: "Health server starts before BullMQ Worker and responds during startup"
    setup: "Supervisor starting up; health server launched before BullMQ Worker.start()"
    action: "Poll GET /health immediately after process start (before BullMQ connects)"
    expected: "HTTP 200 returned; confirms health server is up before worker is ready"
    evidence: "Sequence of structured logs: 'health_server_started' appears before 'bullmq_worker_started'"

  - id: HP-7
    title: "HEALTHCHECK directive in Docker Compose succeeds for running supervisor"
    setup: "Supervisor container running via docker compose -f infra/langgraph-server/compose.langgraph-server.yaml"
    action: "docker inspect --format='{{.State.Health.Status}}' <supervisor-container>"
    expected: "Container health status is 'healthy' after start_period (10s)"
    evidence: "Docker health status 'healthy'; compose healthcheck CMD curl -f http://localhost:9091/live returns 0"

  - id: HP-8
    title: "Idempotent handler registration: starting supervisor twice does not duplicate SIGTERM handlers"
    setup: "Call supervisor.start() twice in test"
    action: "Inspect process event listeners for 'SIGTERM'"
    expected: "Only one SIGTERM listener registered; second start() is a no-op for handler registration"
    evidence: "process.listenerCount('SIGTERM') === 1 after two start() calls"

error_cases:
  - id: EC-1
    title: "Drain timeout exceeded: in-flight job does not complete within drainTimeoutMs"
    setup: "vi.useFakeTimers(); enqueue a job that will not complete; set drainTimeoutMs to 100ms in test config"
    action: "Send SIGTERM; advance fake timers past drainTimeoutMs"
    expected: "Supervisor logs { event: 'drain_timeout_exceeded', drainTimeoutMs: 100 }; calls process.exit(1)"
    evidence: "process.exit spy called with argument 1; drain_timeout_exceeded log present"

  - id: EC-2
    title: "GET /health returns 503 when BullMQ/Redis is unreachable"
    setup: "Supervisor running; Redis connection lost (stop Redis container)"
    action: "HTTP GET http://localhost:9091/health"
    expected: "HTTP 503; JSON body { status: 'unhealthy' }"
    evidence: "HTTP 503 status; status field 'unhealthy'"

  - id: EC-3
    title: "SIGINT triggers same drain behavior as SIGTERM"
    setup: "Supervisor running with no active jobs"
    action: "Send SIGINT (Ctrl+C equivalent)"
    expected: "Same drain_started log; process.exit(0) called; identical behavior to SIGTERM path"
    evidence: "drain_started log; exit code 0"

  - id: EC-4
    title: "Health server port conflict: supervisor fails to start if port 9091 already in use"
    setup: "Bind another process to port 9091 before starting supervisor"
    action: "Start supervisor"
    expected: "Supervisor logs structured error { event: 'health_server_start_failed', port: 9091 }; process exits non-zero or throws catchable error"
    evidence: "Error log present; process does not hang indefinitely"

edge_cases:
  - id: ED-1
    title: "Drain mode with circuitBreaker OPEN: health returns unhealthy during drain"
    setup: "Supervisor in drain mode; circuit breaker tripped to OPEN state"
    action: "HTTP GET http://localhost:9091/health"
    expected: "HTTP 503 or 200 with status 'unhealthy'; circuitBreakerState: 'OPEN' in response"
    evidence: "circuitBreakerState field is 'OPEN' in response body"

  - id: ED-2
    title: "drainTimeoutMs configurable via SUPERVISOR_DRAIN_TIMEOUT_MS env var"
    setup: "Set SUPERVISOR_DRAIN_TIMEOUT_MS=60000 in environment"
    action: "Start supervisor; inspect drainTimeoutMs internal config"
    expected: "Supervisor uses 60000ms drain timeout (not the 300000ms default)"
    evidence: "Drain timeout log on timeout exceeded shows drainTimeoutMs: 60000"

  - id: ED-3
    title: "Health endpoint port configurable: SUPERVISOR_HEALTH_PORT env var"
    setup: "Set SUPERVISOR_HEALTH_PORT=9092 in environment"
    action: "Start supervisor; attempt GET http://localhost:9092/health"
    expected: "HTTP 200 on port 9092; port 9091 not bound"
    evidence: "HTTP 200 on configured port; 9091 connection refused"

  - id: ED-4
    title: "Health endpoint responds during drain after BullMQ Worker.close() but before process.exit()"
    setup: "Supervisor in drain mode; BullMQ Worker.close() has been called; drain completing"
    action: "Poll GET /health immediately after Worker.close()"
    expected: "HTTP 200 with status 'draining' (health server still alive); server does not go dark until after process.exit()"
    evidence: "GET /health responds 200 until process exits; health_server_stopped log appears after BullMQ worker closed"

  - id: ED-5
    title: "Prometheus scrape target: GET /health returns parseable JSON for monitoring"
    setup: "Supervisor running; Prometheus configured with scrape target in infra/prometheus/prometheus.yml"
    action: "Prometheus scrape http://localhost:9091/health"
    expected: "JSON body parseable; Content-Type: application/json; scrape succeeds"
    evidence: "Prometheus scrape logs show 200 for target; no parse errors"

tooling_evidence:
  backend:
    http_requests:
      - "GET http://localhost:9091/health — expect 200, JSON body with status/activeJobs/circuitBreakerState/draining/uptimeMs"
      - "GET http://localhost:9091/live — expect 200, process-alive response"
      - "GET http://localhost:9091/health (during drain) — expect 200, draining: true"
      - "GET http://localhost:9091/health (Redis down) — expect 503, status: unhealthy"
    assertions:
      - "HTTP 200 for healthy/draining states; HTTP 503 for unhealthy state"
      - "Response body JSON: { status, activeJobs, circuitBreakerState, draining, uptimeMs } fields present"
      - "process.exit(0) on clean drain; process.exit(1) on drain timeout"
      - "Structured log events: drain_started, drain_timeout_exceeded, health_server_started, health_server_stopped"
  frontend: null

manual_cases:
  - id: MC-1
    title: "Deployment runbook: safe rolling restart procedure"
    steps:
      - "1. Send SIGTERM to supervisor: kill -TERM <pid>"
      - "2. Poll GET /health until HTTP 503 or process exits (confirm draining state transitions)"
      - "3. Confirm exit code: 0 = clean drain, 1 = timeout exceeded"
      - "4. Deploy new supervisor binary to server"
      - "5. Start new supervisor process"
      - "6. Poll GET /health until HTTP 200 is returned within 30s"
    expected: "New supervisor healthy; no in-flight job loss during restart"

  - id: MC-2
    title: "Docker Compose HEALTHCHECK verification"
    steps:
      - "1. docker compose -f infra/langgraph-server/compose.langgraph-server.yaml up supervisor"
      - "2. Wait 10s (start_period)"
      - "3. docker inspect <supervisor-container> --format='{{.State.Health.Status}}'"
      - "4. Expected: 'healthy'"
    expected: "Container marked healthy; HEALTHCHECK CMD succeeds"

fixture_definitions:
  - name: supervisorWithRedis
    type: integration-fixture
    description: "Docker Compose Redis instance from infra/compose.lego-app.yaml; BullMQ Worker connected; supervisor started in test process"
  - name: mockBullMQWorker
    type: unit-fixture
    description: "Vi.fn() mock of BullMQ Worker with .close(), .pause() spies; used in unit tests for drain state machine"
  - name: fakeTimers
    type: unit-fixture
    description: "vi.useFakeTimers() for drain timeout tests; advances time without real waiting"
  - name: processSpy
    type: unit-fixture
    description: "vi.spyOn(process, 'exit') to assert exit codes without actually terminating test process"
  - name: healthHttpClient
    type: integration-fixture
    description: "node:http client or supertest hitting real health server at http://localhost:9091 in integration tests"

risks:
  - "AC-10 integration test complexity: requires orchestrating Redis, BullMQ job, SIGTERM, and health polling in a single test — consider a dedicated test helper script"
  - "Drain timeout unit test relies on vi.useFakeTimers() — must ensure all setTimeout() calls in drain module are mockable (no process-level timers bypassing vitest)"
  - "Port conflict risk: tests must ensure port 9091 is free before starting health server in each test run — add port-check to test setup"
  - "vi.spyOn(process, 'exit') must be restored after each test to avoid contaminating other tests"
  - "Integration tests require Docker Compose Redis to be running — CI pipeline must include Redis service setup step"
