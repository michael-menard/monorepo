        category: pattern
        applies_because: >-
          CohesionScanResultSchema is consumed by persistence, story-gen, and test nodes — validate field completeness
          early in ST-1
      - story_id: APIP-general
        lesson: >-
          Use @repo/logger for all logging — never console.log. Always use Zod schemas with z.infer<> for types, never
          interfaces.
        category: reuse
        applies_because: Core constraint for all APIP stories — enforced by ESLint
