lessons_to_record:
  - lesson: >-
      When code review flags reusability duplication, QA should independently assess whether the flagged utilities truly
      overlap in purpose. Token-bucket (async refill-based LLM provider rate limiting) and @repo/resilience RateLimiter
      (HTTP/circuit-breaker patterns) are architecturally distinct despite the structural similarity.
    category: pattern
    tags:
      - code-review
      - reusability
      - qa
      - architecture
  - lesson: >-
      In-scope test count can grow after evidence is written if subsequent stories (APIP-3040, APIP-3070) add tests to
      the same test file. model-router.test.ts grew from 12 to 22 tests. This is expected and healthy — QA should run
      the current state, not compare counts rigidly.
    category: pattern
    tags:
      - qa
      - testing
      - evidence
      - test-count
  - lesson: >-
      Full-suite test failures that are outside story scope should be explicitly identified and noted with their owning
      story/context. health-gate.integration.test.ts failures are due to a missing DB migration from a separate story —
      not regressions from APIP-0040.
    category: pattern
    tags:
      - qa
