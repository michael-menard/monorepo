issues:
  - id: REVIEW-FAIL-ITER1
    severity: informational
    source: code_review iteration 1 (2026-03-08)
    description: >-
      Code review returned FAIL due to reusability findings (duplicate-rate-limiter-pattern, duplicate-budget-pattern).
      Both findings are acknowledged as potentially legitimate separate concerns in the review itself. QA assessment:
      token-bucket.ts serves async per-provider LLM API rate limiting with token refill semantics; @repo/resilience
      RateLimiter serves HTTP/circuit-breaker use cases. budget-accumulator.ts tracks cumulative per-story LLM dispatch
      tokens across dispatch calls; token-budget.ts tracks phase-level workflow token accounting with enforcement levels
      and phase keys. These are architecturally distinct. No QA action required — this finding should be escalated for
      architectural decision rather than blocking QA.
    qa_disposition: noted_not_blocking
    recommended_action: >-
      Engineering team to formally document the architectural decision separating LLM dispatch rate limiting from HTTP
      resilience rate limiting, and per-story dispatch budget from phase workflow budget.
