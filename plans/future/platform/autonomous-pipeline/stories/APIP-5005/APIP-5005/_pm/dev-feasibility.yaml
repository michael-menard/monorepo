feasible: true
confidence: high
rationale: >
  APIP-5005 is a low-to-medium complexity CLI tool. The primary work is composing BullMQ Queue API calls
  (getJobCounts, getJobs, getActive, getFailed) against an existing Redis instance, formatting results as
  human-readable text, and enforcing clean connection lifecycle. The core challenge is ESLint config
  (console.log in a Node.js glob) and proper ioredis connection teardown. All required packages and
  patterns already exist in the monorepo. Hard pre-condition: APIP-0010 must be merged first.
complexity: low
story_points: 3

change_surface:
  areas:
    - "apps/api/pipeline/src/cli/ (new directory — CLI entry point and command modules)"
    - "eslint.config.js (add CLI path to Node.js files glob)"
    - "@repo/pipeline-queue (read-only import of createPipelineConnection, createPipelineQueue, PIPELINE_QUEUE_NAME, PipelineJobDataSchema)"
  endpoints: []
  deploy_touchpoints:
    - "CLI is invoked locally via npx tsx — no Lambda deploy, no server deploy, no Docker changes"
    - "Same Redis instance as supervisor (infra/compose.lego-app.yaml port 6379)"

risks:
  - finding: "APIP-0010 not merged — @repo/pipeline-queue package does not exist yet"
    mitigation: >
      Block implementation start on APIP-0010 merge. CLI design and story elaboration proceed now.
      Document hard pre-condition: 'Implementation requires @repo/pipeline-queue to be published from APIP-0010.'
      All imports from @repo/pipeline-queue will fail to resolve until APIP-0010 ships.

  - finding: "ESLint no-console rule will fire on CLI source if path not in Node.js glob"
    mitigation: >
      As first subtask (ST-1), add 'apps/api/pipeline/src/cli/**/*.ts' to the Node.js files array in
      eslint.config.js. This must be done before any CLI code is written or linting will block.
      Reference KB lesson from KBAR-0060: CLI scripts need Node.js glob coverage.

  - finding: "ioredis connection leak will cause CLI process to hang after command completes"
    mitigation: >
      Always call await queue.close() then await connection.quit() in a finally block wrapping the
      command handler. Unit tests must mock ioredis and assert quit() is called in all code paths
      (success and error). BullMQ Queue.close() releases internal BullMQ timers; connection.quit()
      closes the underlying ioredis socket.

missing_requirements: []

evidence_expectations:
  - "pnpm check-types --filter pipeline exits 0 with no TypeScript errors"
  - "pnpm eslint apps/api/pipeline/src/cli/index.ts exits 0 (no console.log ESLint error)"
  - "Unit tests pass: output formatting, error handling, unknown command, connection cleanup"
  - "Integration test (REDIS_URL set): npx tsx apps/api/pipeline/src/cli/index.ts queue status exits 0 and prints queue counts"
  - "Process exits cleanly with no hanging ioredis connections after each command"

