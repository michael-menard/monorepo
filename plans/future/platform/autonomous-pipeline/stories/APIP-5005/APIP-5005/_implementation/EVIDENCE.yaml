notable_decisions:
  - >-
    eslint.config.js apps/api/**/*.{js,ts} glob already covers CLI path with no-console: off — ST-1 was a no-op verify
    (confirmed)
  - >-
    CLI exports main() and handleRedisError() for direct test invocation; auto-run guarded by !process.env.VITEST to
    prevent module-level side effects during testing
  - threadId read from job.data.metadata?.threadId since PipelineJobDataSchema has no threadId field (plan note applied)
  - >-
    queue jobs getState() called per-job since BullMQ v5 does not include state in job object directly — this is correct
    BullMQ v5 usage
  - >-
    Pre-existing type errors in apps/api/pipeline (logger/orchestrator resolution) are unrelated to this story —
    confirmed same failures existed before our changes via git stash test
known_deviations:
  - >-
    eslint.config.js was NOT modified (plan listed it as potential modify). The existing glob already covers the CLI
    path — no change required per ST-1 verification
  - >-
    Direct npx tsx invocation test skipped in verification due to workspace resolution complexity in worktree — tested
    via vitest mocked unit tests instead (per plan: unit tests are the primary evidence)
