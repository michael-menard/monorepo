lessons:
  - id: ad417a4f
    summary: >-
      CLI scripts in apps/api/** already covered by Node.js ESLint glob — no-console is off for that path. The
      eslint.config.js Node.js files glob includes 'apps/api/**/*.{js,ts}' which already covers
      apps/api/pipeline/src/cli/**. ST-1 eslint change may be a no-op verify step.
  - id: 254bd2d4
    summary: >-
      BullMQ v5 requires maxRetriesPerRequest=null on IORedis connection. Already applied in createPipelineConnection
      factory — do not re-implement.
  - id: a468147b
    summary: Use ConnectionOptions type from bullmq (not directly from ioredis) to avoid version mismatch in type resolution.
  - id: ac90387c
    summary: >-
      vi.hoisted() pattern required in Vitest when mock factory functions reference module-scope variables. Use for
      vi.mock('@repo/pipeline-queue') and vi.mock('bullmq').
  - id: 020b52b1
    summary: >-
      Use vi.mock() at module level (not inside test functions) for ESM modules. vi.spyOn() does not work on ESM module
      namespaces.
  - id: 3d0f994c
    summary: >-
      pnpm-workspace.yaml globs auto-cover new packages. No workspace edits needed. But @repo/pipeline-queue must be
      added to apps/api/pipeline/package.json dependencies before the CLI can import it.
adrs: []
critical_notes:
  - >-
    PipelineJobDataSchema fields: storyId, phase, priority, metadata — NO threadId field. AC-4 mentions threadId; it may
    be stored in job.data.metadata. Implementer must check actual job data shape or treat threadId as
    metadata?.threadId.
  - >-
    createPipelineQueue() wraps bullQueue — for CLI read-only queries (getJobCounts, getJobs, getActive, etc.), use
    queue.bullQueue (the underlying BullMQ Queue instance) directly, or call BullMQ Queue methods that are exposed on
    the PipelineQueue wrapper.
  - >-
    The PipelineQueue wrapper only exposes add() and bullQueue. CLI needs direct BullMQ Queue methods. Pattern: const
    conn = createPipelineConnection(url); const pq = createPipelineQueue(conn); const q = pq.bullQueue; // then use
    q.getJobCounts(), q.getJobs(), etc.
  - '@repo/pipeline-queue must be added to apps/api/pipeline/package.json dependencies. It is not currently listed there.'
