findings:

  - id: F-001
    severity: minor
    ac: AC-6
    title: "escalation_preassigned field is boolean, not number as specified"
    detail: >
      AC-6 specifies escalation_preassigned as a number (count). The implementation
      uses boolean (true/false) plus a separate escalation_count field. The count data
      is present and accessible; the field name and type diverge from the spec.
      Downstream consumers expecting escalation_preassigned to be a number will need
      to use escalation_count instead.
    recommendation: >
      Consider renaming escalation_count to escalation_preassigned (number) and
      deriving the boolean from escalation_count > 0, or align with QA on whether
      the boolean + count split is acceptable.
    blocking: false

  - id: F-002
    severity: minor
    ac: AC-7
    title: "AC-7(h) 4-variant ChangeSpec schema regression test absent"
    detail: >
      AC-7 requires a test verifying schema regression against all 4 ChangeSpec variants
      (file_change, migration_change, config_change, test_change). No such test exists.
      PlaceholderChangeSpecSchema uses z.string() for change_type so the variants are
      not enumerated, but the scenario was still expected per AC.
    recommendation: >
      Add a test that parses PlaceholderChangeSpecSchema with each of the 4 intended
      change_type strings and asserts no parse error. Mark with TODO for ADR-002
      re-validation per the story's test dependency note.
    blocking: false

  - id: F-003
    severity: minor
    ac: AC-1
    title: "file_type absent from AffinityProfileSchema; avg_attempts named sample_count"
    detail: >
      AC-1 specifies query keyed by (model_id, change_type, file_type) and retrieval
      of avg_attempts. The implemented schema uses sample_count and omits file_type.
      This is consistent with the story's own architecture notes which describe a bulk
      query by model_id, but diverges from the AC literal text.
    recommendation: >
      No immediate action — deviations follow the architecture notes. Flag for
      re-validation when APIP-3020 finalizes the wint.model_affinity schema.
    blocking: false

