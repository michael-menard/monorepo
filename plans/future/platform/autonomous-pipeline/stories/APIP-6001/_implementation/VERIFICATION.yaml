lessons_to_record:
  - tags:
      - bash
      - qa-verification
      - testing
    lesson: >-
      For bash-only stories, syntax check (bash -n) is the appropriate test gate substitute. The 45% Vitest coverage
      threshold does not apply and should be explicitly noted as exempt in the verification artifact.
    category: pattern
  - tags:
      - code-review
      - reusability
      - bash
    lesson: >-
      When a code review resolves reusability findings across iterations, the QA verifier should confirm no function
      redefinitions remain in consuming scripts via grep, not just trust the review artifact's assertion.
    category: pattern
  - tags:
      - bash
      - gate-validation
      - backward-compat
    lesson: >-
      The wildcard default case in validate_phase_gate (return 0 for unknown transitions) is an intentional
      backward-compatibility pattern. Document this explicitly in the function header so future reviewers do not flag it
      as a missing gate.
    category: pattern
