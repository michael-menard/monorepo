      Injectable dispatch pattern (no module-level singletons) makes notification-sending code trivially testable
      without vi.mock() module stubbing. Applied successfully in APIP-4070.
    category: pattern
    tags:
      - backend
      - testing
      - notifications
      - dependency-injection
  - lesson: >-
      data_unavailable sentinel (42P01 table-missing error) is a clean pattern for graceful degradation when dependency
      tables don't exist yet. Avoids hard failures during staged rollout.
    category: pattern
    tags:
      - backend
      - postgres
      - error-handling
      - graceful-degradation
