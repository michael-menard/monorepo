architecture_notes:
  - Uses @repo/logger throughout — no console.log/warn/error found
  - All types defined as Zod schemas with z.infer<> — no TypeScript interfaces
  - Injectable pool, window, and dispatch — no singletons (ARCH per design doc)
  - pg_try_advisory_lock prevents concurrent runs (ARCH-002)
  - LOCK_KEYS uses fixed integer constants instead of hashtext() (ARCH-002)
  - data_unavailable sentinel for 42P01 errors (graceful degradation)
  - Backend-only story — E2E EXEMPT per ADR-006
  - No .http files needed — cron/background job, not HTTP endpoint
