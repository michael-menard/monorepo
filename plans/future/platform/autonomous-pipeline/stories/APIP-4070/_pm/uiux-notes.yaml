reason: "APIP-4070 has no frontend component. This is a backend-only cron + notification story. The only output surface is a Slack Block Kit message payload dispatched via webhook — not a web UI component. frontend_impacted: false."
slack_message_guidance:
  note: "The following is advisory Slack message design guidance (not UI/UX in the traditional sense)"
  recommendations:
    - "Use Slack Block Kit divider sections to separate the four report sections: throughput, costs, model performance, codebase health"
    - "Sections with data_unavailable=true should render as italic text: '_Data unavailable — dependency story not yet merged_' (not omitted)"
    - "Top improvement should use [IMPROVEMENT] label prefix; top concern should use [CONCERN] label prefix — avoid emoji dependency for CI compatibility"
    - "Include the report period (e.g., 'Week of Feb 16–22, 2026') as the message header block"
    - "Cost figures formatted to 2 decimal places with $ prefix (e.g., '$0.25')"
    - "Success rates formatted as percentages (e.g., '72%')"
    - "Keep message scannable: operators should grasp pipeline health in under 30 seconds"
