      for all cron infrastructure types. No TypeScript interfaces.
    files_to_read:
      - packages/backend/orchestrator/src/artifacts/story.ts
    files_to_modify:
      - packages/backend/orchestrator/src/cron/schemas.ts (new file)
    acs: ["AC-1", "AC-9"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 6000

