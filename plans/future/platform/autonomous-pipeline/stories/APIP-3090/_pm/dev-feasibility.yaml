feasible: true
confidence: medium
rationale: >
  The cron infrastructure abstraction (registry schema, scheduler adapter, advisory lock pattern)
  can be fully built and unit-tested without a running LangGraph Platform (APIP-0030) by using a
  CronSchedulerAdapter interface with a no-op test double. The key constraint is that actual
  schedule registration with LangGraph Platform requires APIP-0030 to be complete — but that is
  an integration gate, not a blocker for the unit-testable core.
  Pattern Miner runFn (APIP-3020) can be stubbed with a conditional guard or lazy import.
  All 4 Phase 4 job stubs (code audit, KB compression, doc sync, worktree pruning) ship as
  async no-op functions with TODO comments pointing to the implementing story.
complexity: high
change_surface:
  areas:
    - packages/backend/orchestrator/src/cron/ (new module — CronJobRegistry, CronSchedulerAdapter, job definitions)
    - packages/backend/orchestrator/src/graphs/ (read-only reference — metrics.ts factory pattern)
    - packages/backend/orchestrator/src/runner/ (read-only reference — withTimeout, createToolNode)
    - packages/backend/orchestrator/src/artifacts/ (read-only reference — Zod schema pattern)
  endpoints: []
  deploy_touchpoints:
    - "LangGraph Platform cron API registration (requires APIP-0030 deployed LangGraph server)"
    - "PostgreSQL pg_try_advisory_lock (uses existing pg client — no new DB table)"

risks:
  - finding: >
      APIP-0030 (LangGraph Platform) is not yet complete; registerCronJobs cannot be fully
      integration-tested without a running LangGraph Platform instance.
    mitigation: >
      Define CronSchedulerAdapter interface and use a no-op InMemoryCronAdapter for all unit tests.
      Gate real LangGraph Platform registration behind a manual/integration test that runs only
      after APIP-0030 is complete. The abstraction layer means the registry logic is fully
      testable independently.
  - finding: >
      APIP-3020 (Pattern Miner) is ready-to-work but not yet implemented; runPatternMiner
      function does not exist yet.
    mitigation: >
      Design the cron registry as a declarative map of { jobName, schedule, runFn } entries.
      Pattern Miner job definition uses a conditional guard: import runPatternMiner lazily,
      wrapped with an existence check. Document as known integration point with APIP-3020.
  - finding: >
      createToolNode default timeout (10s) will silently kill expensive cron jobs (code audit ~10min,
      KB compression ~15min) if job wrapper nodes are created via createToolNode without explicit
      timeoutMs override.
    mitigation: >
      Do NOT use createToolNode for expensive job wrappers. Use withTimeout from
      packages/backend/orchestrator/src/runner/timeout.ts directly at the scheduler entry point,
      with timeoutMs read from the CronJobDefinition (AC-2). For the registry pattern, each job
      definition carries its own timeoutMs which is applied by the scheduler adapter.
  - finding: >
      Pattern Miner requires single-instance execution; concurrent runs corrupt weighted average
      aggregations (APIP-3020 contract).
    mitigation: >
      Implement pg_try_advisory_lock(hashtext('apip_cron_{jobName}')) at the Pattern Miner job
      wrapper entry point. Lock key is deterministic from job name. Lock released immediately after
      job completes (or times out). Concurrent invocations that fail to acquire lock exit with
      CronRunResult { status: 'skipped' } and a structured log entry — no error propagated.

missing_requirements: []

evidence_expectations:
  - "Unit tests: CronJobDefinitionSchema rejects objects missing required fields"
  - "Unit tests: pg_try_advisory_lock returning false → runFn not called, status: skipped logged"
  - "Unit tests: withTimeout wrapping a never-resolving runFn → status: timeout within timeoutMs (vi.useFakeTimers)"
  - "Unit tests: DISABLE_CRON_JOB_* env var causes job to be absent from built registry"
  - "pnpm check-types --filter @repo/orchestrator passes"
  - "All pre-existing packages/backend/orchestrator tests continue to pass"

