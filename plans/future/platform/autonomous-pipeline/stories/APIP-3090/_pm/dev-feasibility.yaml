    goal: >
      Create packages/backend/orchestrator/src/cron/registry.ts with registerCronJobs(adapter, registry)
      that registers each job, wraps runFn with withTimeout(timeoutMs), and logs CronRunResult
      via @repo/logger. Include buildCronRegistry(env) factory that reads DISABLE_CRON_JOB_*
      env vars to filter disabled jobs.
    files_to_read:
