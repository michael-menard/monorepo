      LangGraphPlatformAdapter implementation (real cron API) is stubbed with TODO comment.
    files_to_read:
      - packages/backend/orchestrator/src/cron/schemas.ts
    files_to_modify:
      - packages/backend/orchestrator/src/cron/adapter.ts (new file)
    acs: ["AC-2"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 5000

