lessons_to_record:
  - lesson: >-
      Evidence artifact test count can drift from actual run count when tests are refactored post-evidence (evidence
      said 30, actual is 27). QA should always trust the live test run, not the evidence count.
    category: anti_pattern
    tags:
      - testing
      - evidence
      - qa
  - lesson: >-
      For cron/infra modules with pg advisory locks, the most critical test path is the lock-skip scenario — mocking
      getCronDbClient to return acquired=false and asserting no downstream work is called. This pattern is reusable for
      future pg-lock-guarded jobs.
    category: pattern
    tags:
      - backend
      - cron
      - testing
      - advisory-lock
  - lesson: >-
      Lazy dynamic import (await import()) for the actual graph runner in a cron job effectively decouples the cron
      scaffold from graph implementation, allowing independent testing of both layers.
    category: pattern
    tags:
      - backend
      - cron
      - architecture
      - circular-dependency
