preliminary_verdict: split_required

# =============================================================================
# PRELIMINARY VERDICT
# =============================================================================
# split_required — 12 ACs (exceeds threshold of 8), split_risk 0.9, story itself
# documents the natural split (Part A: infrastructure + Pattern Miner; Part B:
# remaining 5 job registrations). Two blocking implementation gaps must be
# resolved before coding begins regardless of split decision.

# =============================================================================
# 9-POINT AUDIT
# =============================================================================

audit:

  # ---------------------------------------------------------------------------
  # 1. SCOPE ALIGNMENT
  # ---------------------------------------------------------------------------
  scope_alignment:
    status: pass
    notes: >
      Story index lists APIP-3090 as "Cron Job Infrastructure" in Phase 3:
      Learning System & Optimization. The story scope matches exactly — it
      establishes the cron infrastructure layer only, explicitly deferring all
      Phase 4 implementation to downstream stories (APIP-4010, APIP-4040,
      APIP-4050, APIP-4060). No extra endpoints, database tables, or UI
      components are introduced. Dependencies declared (APIP-0030, APIP-3020)
      match the index.
    gaps: []

  # ---------------------------------------------------------------------------
  # 2. INTERNAL CONSISTENCY
  # ---------------------------------------------------------------------------
  internal_consistency:
    status: warn
    notes: >
      Goals and non-goals are well-separated. ACs map cleanly to scope.
      Test plan happy-path and error-case tests cover the ACs they reference.
      Two minor consistency issues found.
    gaps:
      - id: IC-1
        severity: low
        description: >
          AC-3 specifies Pattern Miner interval as `*/15 * * * *` (every 15
          minutes) which matches the Cron Job Registry table. However the
          Registry table's Timeout column shows "5 min" for Pattern Miner while
          AC-3 itself does not specify a timeout budget for Pattern Miner — only
          the advisory lock. This omission means the implementer must infer the
          5-minute timeout from the registry table alone. The AC should
          explicitly state the timeout for Pattern Miner for completeness.
        recommendation: >
          Add `timeoutMs: 5 * 60 * 1000` to AC-3 or add a note cross-referencing
          the registry table.

      - id: IC-2
        severity: low
        description: >
          AC-7 (doc-sync) and AC-8 (worktree-pruning) do not specify timeout
          budgets in the AC text. The registry table shows 2min and 3min
          respectively. Implementer must infer from the table. For stubs this
          is low risk since no real workload runs, but once Phase 4 fills these
          stubs the timeout will be inherited from the job definition — which
          may never be revisited.
        recommendation: >
          Add explicit `timeoutMs` to AC-7 and AC-8 for completeness, even for
          stubs, so the field is populated at registration time.

  # ---------------------------------------------------------------------------
  # 3. REUSE-FIRST
  # ---------------------------------------------------------------------------
  reuse_first:
    status: warn
    notes: >
      Reuse plan identifies correct assets: `withTimeout`, `createToolNode`
      (read-only reference), `@repo/logger`, Zod artifact schema patterns,
      `runMetricsCollection`. However two reuse calls contain API
      mismatches against the actual implementations that will cause build
      failures.
    gaps:
      - id: RU-1
        severity: critical
        description: >
          The architecture notes show `withTimeout(runPatternMiner,
          config.timeoutMs)` treating `timeoutMs` as the second argument
          directly. The actual `withTimeout` signature in
          `packages/backend/orchestrator/src/runner/timeout.ts` is:
            `withTimeout<T>(operation: () => Promise<T>, options: TimeoutOptions)`
          where `TimeoutOptions` is an object `{ timeoutMs, nodeName, signal?,
          onTimeout?, context? }`. Passing a bare number as the second argument
          will cause a TypeScript type error and runtime failure.
        recommendation: >
          All job wrappers must call:
          `withTimeout(() => runPatternMiner(config), { timeoutMs: JOB_TIMEOUT_MS, nodeName: 'pattern-miner' })`
          Update architecture notes and ensure all 6 job wrappers use the
          correct `TimeoutOptions` shape.

      - id: RU-2
        severity: critical
        description: >
          The reuse plan says the metrics-collection job "invokes the existing
          metrics collection graph pattern following `runMetricsCollection`".
          The actual exported function signature is:
            `runMetricsCollection(storyId: string, hygieneResult: HygieneResult | null, config?: Partial<MetricsGraphConfig>): Promise<MetricsReport>`
          A cron job has no `storyId` or `hygieneResult` — these are
          story-execution context values. Calling `runMetricsCollection` without
          them will fail to compile or will produce incorrect output (undefined
          storyId means the epicPrefix computation returns NaN-like results).
          The metrics-collection cron job cannot simply delegate to
          `runMetricsCollection` as written.
        recommendation: >
          The metrics-collection job needs a cron-specific entry point: either
          (a) a new overloaded or alternate export from metrics.ts that accepts
          a cron context (no storyId), or (b) a dedicated
          `runPeriodicMetricsCollection()` function that aggregates across all
          stories rather than a single story's gap data. This is a design
          decision that must be resolved before ST-5. Consult with
          APIP-3020/4010 stakeholders on intended cron metrics scope.

  # ---------------------------------------------------------------------------
  # 4. PORTS & ADAPTERS
  # ---------------------------------------------------------------------------
  ports_and_adapters:
    status: pass
    notes: >
      `CronSchedulerAdapter` cleanly decouples registry logic from LangGraph
      Platform runtime. `InMemoryCronAdapter` test double enables full unit
      test coverage without APIP-0030. `LangGraphPlatformAdapter` production
      implementation is gated behind APIP-0030 integration. Advisory lock is
      correctly isolated to the Pattern Miner job file. All cron logic lives
      in a new `cron/` module with no modifications to existing adapters.
    gaps:
      - id: PA-1
        severity: low
        description: >
          The story uses `CronSchedulerAdapterSchema` as a Zod schema with
          `z.function()` to validate the adapter. `z.function()` in Zod 3.x
          does not perform runtime argument/return type validation — it only
          asserts the value is a function. This is acceptable for a test double
          boundary but implementers should be aware the schema does not actually
          validate argument types at runtime.
        recommendation: >
          Add an inline comment in adapter.ts noting that `z.function()` schemas
          are structural markers only and are not validated at runtime. This
          avoids future confusion when debugging adapter compliance.

  # ---------------------------------------------------------------------------
  # 5. LOCAL TESTABILITY
  # ---------------------------------------------------------------------------
  local_testability:
    status: warn
    notes: >
      Unit tests are concrete and executable via `InMemoryCronAdapter`. Fake
      timer approach for timeout testing (`vi.useFakeTimers()`) is the correct
      approach. Integration tests are properly gated behind APIP-0030.
    gaps:
      - id: LT-1
        severity: medium
        description: >
          The advisory lock test mocks `pg_try_advisory_lock` returning false.
          However, `pg_try_advisory_lock` is called via `pg.query('SELECT
          pg_try_advisory_lock($1)', [lockKey])`. The story does not establish
          how the `pg` Pool client is made available inside cron job files.
          Scripts in the orchestrator import `Pool` from `pg` directly, but
          there is no shared singleton pg client in the `cron/` module path.
          The test must mock the pg Pool constructor or a pg client factory —
          neither of which is established in the implementation plan.
        recommendation: >
          Add a `cron/db.ts` (or reuse an existing pg client factory if one
          exists) that exports a shared `getCronDbClient()` function. This
          makes the pg Pool mockable in tests via `vi.mock('./db')`. Document
          the mock strategy in AC-11 or the test plan.

      - id: LT-2
        severity: low
        description: >
          `vi.useFakeTimers()` interacts unexpectedly with some async
          LangGraph operations. The test plan notes this risk but the subtask
          description does not specify which fake timer advance API to use
          (`vi.advanceTimersByTime` vs `vi.runAllTimers`). This detail is
          needed for the timeout test to be deterministic.
        recommendation: >
          Specify in ST-6 that timeout tests use `vi.useFakeTimers()` +
          `vi.advanceTimersByTimeAsync(timeoutMs + 1)` to avoid race conditions
          with Promise microtasks.

  # ---------------------------------------------------------------------------
  # 6. DECISION COMPLETENESS
  # ---------------------------------------------------------------------------
  decision_completeness:
    status: warn
    notes: >
      Most decisions are resolved. Three items remain that could block
      implementation.
    gaps:
      - id: DC-1
        severity: critical
        description: >
          The advisory lock key is computed as
          `hashtext('apip_cron_pattern-miner')` in the architecture code.
          `hashtext` is a PostgreSQL internal function — it is NOT a JavaScript
          function available in Node.js. The code as written calls `hashtext`
          as if it were a local JS identifier, which will fail with
          `ReferenceError: hashtext is not defined`.
          Two resolution options exist: (a) use a fixed 32-bit integer constant
          as the lock key (e.g., `42_001` for pattern-miner — simple and
          deterministic), or (b) compute the hash in Node.js using
          `crypto.createHash('md5')` and truncate to 32-bit signed integer.
          Option (a) is preferred for simplicity and auditability.
        recommendation: >
          Replace `hashtext(...)` in architecture notes and AC-3 with an
          explicit integer constant per job (e.g., `PATTERN_MINER_LOCK_KEY =
          42001`), documented in `adapter.ts` or a `cron/constants.ts` file.
          Update the SQL call to:
          `SELECT pg_try_advisory_lock(42001)` or pass as a JS number literal.

      - id: DC-2
        severity: medium
        description: >
          The metrics-collection job's cron intent is unclear. The existing
          `runMetricsCollection` aggregates gap/hygiene metrics for a specific
          `storyId`. Running it as a cron job with no storyId raises the
          question: does the cron job iterate over all active stories, or
          does it aggregate pipeline-wide metrics independently? This design
          decision is unresolved and affects the AC-4 implementation.
        recommendation: >
          Clarify the metrics-collection cron job's scope in a brief design
          note before ST-5 begins. If it aggregates across all stories, a new
          entry point is needed in metrics.ts. If it is a no-op until APIP-4070
          (Weekly Pipeline Health Report), ship it as a stub alongside the
          Phase 4 jobs.

      - id: DC-3
        severity: low
        description: >
          The `doc-sync` job's Phase 4 owner story is listed as "TBD" in the
          registry table. This means there is no downstream story to hand off
          the stub to. If this becomes orphaned, the stub may remain forever.
        recommendation: >
          Identify or create the Phase 4 story for doc-sync before APIP-3090
          ships, and update the registry table. If no story exists, remove
          doc-sync from this story's scope until it has an owner.

  # ---------------------------------------------------------------------------
  # 7. RISK DISCLOSURE
  # ---------------------------------------------------------------------------
  risk_disclosure:
    status: pass
    notes: >
      Risk disclosure is thorough. Key risks are documented: APIP-0030 blocking
      integration tests, APIP-3020 blocking Pattern Miner E2E, `createToolNode`
      timeout conflict, advisory lock requirement, `vi.useFakeTimers()` for
      CI. No hidden auth, DB schema migration, or infra risks.
    gaps:
      - id: RD-1
        severity: low
        description: >
          The risk that Pattern Miner advisory locks could be left held if the
          process crashes mid-job is not disclosed. PostgreSQL session-level
          advisory locks (`pg_advisory_lock`) are automatically released on
          session disconnect, but the story uses `pg_try_advisory_lock` which
          is also session-scoped. A process crash will release the lock
          automatically — this is safe but worth documenting for operators who
          may wonder why a lock appears "stuck".
        recommendation: >
          Add a note in the Infrastructure Notes section confirming that
          session-level advisory locks are released automatically on pg client
          disconnect, and that no manual lock cleanup is required on restart.

  # ---------------------------------------------------------------------------
  # 8. STORY SIZING
  # ---------------------------------------------------------------------------
  story_sizing:
    status: fail
    indicators_present:
      - "12 ACs (exceeds threshold of 8)"
      - "11 new files (cron/ module + 6 job files + tests)"
      - ">3 distinct test scenarios (5 error cases + 7 happy path tests = 12 test cases)"
      - "split_risk: 0.9 from predictions"
    indicator_count: 4
    recommendation: split
    split_plan:
      part_a:
        id_suffix: "A"
        title: "Cron Job Infrastructure — Core Layer"
        acs: [AC-1, AC-2, AC-3, AC-9, AC-10, AC-11, AC-12]
        subtasks: [ST-1, ST-2, ST-3, ST-4, ST-6]
        rationale: >
          Core deliverable: schemas, adapter interface, registry function,
          Pattern Miner job (the only non-stub job), env-aware filtering,
          structured result logging, and the full unit test suite. This part
          can be code-reviewed and merged independently. It unblocks Phase 4
          consumers because the infrastructure layer is in place.
        est_tokens: 36000
        files:
          - "cron/schemas.ts"
          - "cron/adapter.ts"
          - "cron/registry.ts"
          - "cron/jobs/pattern-miner.job.ts"
          - "cron/__tests__/cron.test.ts"

      part_b:
        id_suffix: "B"
        title: "Cron Job Infrastructure — Phase 4 Job Registrations"
        acs: [AC-4, AC-5, AC-6, AC-7, AC-8]
        subtasks: [ST-5]
        rationale: >
          Additive stubs for 5 jobs whose implementations belong to Phase 4
          stories. These are low-risk, low-complexity, and parallelizable with
          Phase 4 story elaboration. Shipping separately keeps Part A reviewable
          at a reasonable size.
        est_tokens: 9000
        files:
          - "cron/jobs/metrics-collection.job.ts"
          - "cron/jobs/code-audit.job.ts"
          - "cron/jobs/kb-compression.job.ts"
          - "cron/jobs/doc-sync.job.ts"
          - "cron/jobs/worktree-pruning.job.ts"
    notes: >
      Split is strongly recommended. The story itself documents this exact split
      in its "Split Recommendation" section. Part B should be created as a new
      backlog story before Part A begins implementation.

  # ---------------------------------------------------------------------------
  # 9. SUBTASK DECOMPOSITION
  # ---------------------------------------------------------------------------
  subtask_decomposition:
    status: warn
    notes: >
      Subtask section is present and all 12 ACs are covered. DAG dependencies
      are correct (ST-1 → ST-2 → ST-3 → ST-4/ST-5 → ST-6). No subtask
      exceeds 3 distinct logical areas. Est. token budgets are reasonable.
    gaps:
      - id: SD-1
        severity: medium
        description: >
          No verification commands are provided for any subtask. The story
          lists ACs and est. tokens but not the commands implementers should
          run to verify each subtask is complete (e.g., `pnpm test:all`,
          `pnpm check-types`, or a specific test filter like
          `pnpm test --filter=orchestrator -- cron`).
        recommendation: >
          Add a `verification` field to each subtask. Suggested verification
          commands:
          - ST-1: `pnpm check-types --filter=orchestrator`
          - ST-2: `pnpm check-types --filter=orchestrator`
          - ST-3: `pnpm test --filter=orchestrator -- cron/registry`
          - ST-4: `pnpm test --filter=orchestrator -- pattern-miner`
          - ST-5: `pnpm check-types --filter=orchestrator`
          - ST-6: `pnpm test --filter=orchestrator -- cron`

      - id: SD-2
        severity: low
        description: >
          ST-5 covers 5 job definitions in a single subtask. Each job file is
          simple (stub + timeout + CronRunResult), so this is acceptable, but
          the metrics-collection job (AC-4) may be significantly more complex
          once DC-2 is resolved (see Decision Completeness). If the metrics job
          requires a new entry point in metrics.ts, ST-5 could exceed 3 file
          touches.
        recommendation: >
          Reassess ST-5 scope after DC-2 is resolved. If metrics-collection
          requires modifications to metrics.ts, split ST-5 into ST-5a
          (metrics-collection) and ST-5b (remaining stubs).

# =============================================================================
# DISCOVERY ANALYSIS
# =============================================================================

discovery:

  mvp_critical_gaps:
    description: >
      Gaps that block the core deliverable from compiling and passing tests.

    - id: GAP-1
      title: "withTimeout API mismatch in architecture code"
      severity: critical
      blocks: "ST-3, ST-4, ST-5 — all job wrappers"
      detail: >
        Architecture notes and the Pattern Miner code snippet use
        `withTimeout(runPatternMiner, config.timeoutMs)` with a number as the
        second argument. Actual `withTimeout` signature requires a `TimeoutOptions`
        object: `{ timeoutMs: number, nodeName: string, signal?, onTimeout?,
        context? }`. This will cause a TypeScript compile error and runtime
        failure on all job wrappers.
      resolution: >
        Update all job wrappers to use:
        `withTimeout(() => runFn(config), { timeoutMs: JOB_TIMEOUT_MS, nodeName: 'job-name' })`
      canonical_ref: "packages/backend/orchestrator/src/runner/timeout.ts:45"

    - id: GAP-2
      title: "`hashtext` used as if it were a JavaScript function"
      severity: critical
      blocks: "ST-4 — Pattern Miner advisory lock"
      detail: >
        The architecture code calls `hashtext('apip_cron_pattern-miner')` to
        generate the advisory lock key. `hashtext` is a PostgreSQL function —
        not a JavaScript/Node.js function. This code will throw
        `ReferenceError: hashtext is not defined` at runtime.
      resolution: >
        Replace with a fixed integer constant. Define in cron/constants.ts:
        `export const LOCK_KEYS = { PATTERN_MINER: 42_001 } as const`
        Use as: `SELECT pg_try_advisory_lock(42001)` with the integer literal.
      canonical_ref: "packages/backend/orchestrator/src/cron/jobs/pattern-miner.job.ts (new)"

    - id: GAP-3
      title: "pg Pool client not available in cron module — advisory lock and metrics blocked"
      severity: critical
      blocks: "ST-3, ST-4 — advisory lock + structured logging with db context"
      detail: >
        The `pg` Pool client is used only in scripts in the orchestrator
        (`src/scripts/`). No shared singleton pg client exists that cron job
        files can import. The Pattern Miner job requires a pg client to call
        `pg_try_advisory_lock`. Without a clearly-defined pg client accessor,
        the implementation is undefined and untestable (cannot mock what doesn't
        exist).
      resolution: >
        Add `cron/db.ts` exporting a `getCronDbClient(): Pool` function backed
        by the same connection string env vars used in scripts. This function
        is mockable via `vi.mock('../cron/db')` in tests. Document the
        environment variable it reads (DATABASE_URL or equivalent).
      canonical_ref: "packages/backend/orchestrator/src/scripts/populate-story-status.ts:54"

    - id: GAP-4
      title: "runMetricsCollection signature incompatible with cron invocation"
      severity: critical
      blocks: "ST-5 — metrics-collection job"
      detail: >
        The existing `runMetricsCollection(storyId, hygieneResult, config)`
        requires a storyId and HygieneResult — story-execution context values
        not available in a cron job. Calling it as a cron job without these
        arguments will produce a TypeScript error and runtime failure
        (undefined storyId causes incorrect epicPrefix computation).
      resolution: >
        Design decision required before ST-5. Options: (a) ship metrics-collection
        as a stub like the Phase 4 jobs (simplest; defer to APIP-4070), or
        (b) add `runPeriodicMetricsCollection()` to metrics.ts that aggregates
        without a storyId context (requires metrics.ts modification — touches
        a protected file category per the story's scope). Option (a) is
        recommended to keep APIP-3090 Part A scope clean.
      canonical_ref: "packages/backend/orchestrator/src/graphs/metrics.ts:513"

  opportunities:
    description: >
      Non-blocking improvements: edge cases, observability, and robustness.

    - id: OPP-1
      title: "CronRunResult should include advisory lock acquisition time"
      priority: low
      detail: >
        For Pattern Miner jobs that acquire the advisory lock, logging the time
        spent waiting (even with `pg_try_advisory_lock` which is non-blocking,
        logging the lock acquisition attempt timestamp) helps operators
        distinguish lock contention from job slowness.
      recommendation: >
        Add optional `lockAcquiredAt?: string` to `CronRunResultSchema` for
        jobs that use advisory locks.

    - id: OPP-2
      title: "Registry should log registered job count on startup"
      priority: low
      detail: >
        `registerCronJobs` silently registers jobs. A single info-level log
        after all registrations complete (e.g.,
        `logger.info('cron.registry.initialized', { jobCount: registry.length,
        jobs: registry.map(j => j.jobName) })`) gives operators visibility into
        which jobs are active at startup, especially useful when
        `DISABLE_CRON_JOB_*` vars are in use.
      recommendation: >
        Add a post-registration log call to `registerCronJobs`.

    - id: OPP-3
      title: "Consider adding `lastRunAt` tracking for environment-aware restarts"
      priority: low
      detail: >
        If a job is re-enabled via env var after a period of being disabled,
        there is no way to know when it last ran successfully. A simple
        in-memory `Map<jobName, Date>` within the `InMemoryCronAdapter` would
        provide this for tests and could be the interface for a future
        persistent last-run tracking.
      recommendation: >
        Add optional `lastRunAt?: Date` to `CronSchedulerAdapter` for future
        use. Not required for APIP-3090.

    - id: OPP-4
      title: "Pattern Miner lock release in finally block may not fire on SIGTERM"
      priority: medium
      detail: >
        If the process receives SIGTERM mid-job, the `finally` block releasing
        the advisory lock may not execute before process.exit(). Since
        PostgreSQL session-level advisory locks release automatically on
        disconnect, this is safe from a correctness standpoint — but APIP-2030
        (Graceful Shutdown) should be aware that cron jobs holding advisory
        locks require the pg client to stay alive until job completion or until
        the pg connection closes.
      recommendation: >
        Document in `pattern-miner.job.ts` that the advisory lock is
        session-scoped and will be released on pg client disconnect. Add a
        comment pointing to APIP-2030 as the graceful shutdown story.

