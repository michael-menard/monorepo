lessons_to_record:
  - lesson: >-
      Lazy boolean cache flag (_hasAnyHighConfidenceProfile: boolean | null = null) is an effective pattern for
      cold-start detection without extra DB queries on hot paths — null means unchecked, true/false means checked
    category: pattern
    tags:
      - backend
      - cold-start
      - caching
      - pipeline
  - lesson: >-
      Injecting randomFn as a constructor parameter makes probabilistic exploration budget testing deterministic without
      mocking Math.random globally
    category: pattern
    tags:
      - backend
      - testing
      - dependency-injection
      - pipeline
  - lesson: >-
      ON CONFLICT upsert pattern for seed data import allows idempotent bootstrapping — safe to re-run seed imports
      without data corruption
    category: pattern
    tags:
      - backend
      - database
      - seeding
      - upsert
