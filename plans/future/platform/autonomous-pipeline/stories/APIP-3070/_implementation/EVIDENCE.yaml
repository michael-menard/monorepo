notes:
  - >
    3-mode routing design: The router detects which mode to use at dispatch time:
    (1) four-tier mode when affinityReader + hasAnyQualifyingProfile both configured,
    (2) three-tier-affinity mode when only affinityReader configured (APIP-3040 compat),
    (3) legacy escalation mode when no affinityReader (APIP-0040 compat).
    This preserves full backward compatibility with all existing tests.
  - >
    CONFIDENCE_THRESHOLDS exported from model-router.ts (not pattern-miner.ts as originally noted
    in story — pattern-miner.ts does not export this constant).
  - >
    Pre-existing type errors in @repo/database-schema and @repo/mcp-tools are unrelated to
    APIP-3070 changes and were present before this implementation.
  - >
    E2E tests: Not applicable for this story (story_type: infra — backend routing logic only).
