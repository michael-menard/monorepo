acceptance_criteria:
  - ac_id: "AC-1"
    status: "PASS"
    evidence: >
      PipelineModelRouterConfigSchema extended with 5 new fields:
      conservativeOpenRouterModel (default: 'openrouter/anthropic/claude-3-haiku'),
      explorationBudgetFraction (default: 0.1), explorationMinSuccessRateFloor (default: 0.3),
      manualSeedEnabled (default: false), randomFn (optional).
    files:
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"

  - ac_id: "AC-2"
    status: "PASS"
    evidence: >
      Cold-start detection implemented in _dispatchFourTier(). When hasAnyQualifyingProfile()
      returns false, dispatch skips tiers 2 and 3, routes directly to tier 4 (conservative OpenRouter).
      Flag is lazily evaluated and cached in _hasAnyHighConfidenceProfile.
      UT-1 and UT-2 confirm behavior.
    files:
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"

  - ac_id: "AC-3"
    status: "PASS"
    evidence: >
      Tier 2 confidence gate in _dispatchFourTier(): profile qualifies only when
      confidence_level IN ('medium', 'high') AND sample_size >= affinityMinSampleSize.
      'none' and 'low' confidence profiles fall through to tier 3/4.
      UT-4 (medium passes), UT-7 (low rejected) confirm behavior.
    files:
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"

  - ac_id: "AC-4"
    status: "PASS"
    evidence: >
      _tryExplorationSlot() implements 10% exploration. randomFn() < explorationBudgetFraction
      triggers Ollama routing. Skip conditions: (a) success_rate < floor AND sample_size > 0,
      (b) Ollama unavailable. explorationBudgetFraction=0 disables, =1.0 always routes.
      sample_size=0 always allows exploration.
      UT-8, UT-9, UT-10, UT-12 confirm behavior.
    files:
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"

  - ac_id: "AC-5"
    status: "PASS"
    evidence: >
      importAffinitySeeds() standalone function in affinity-seeder.ts.
      Takes (seeds, db), upserts to wint.model_affinity using ON CONFLICT pattern.
      Returns { seeded, skipped, errors }.
      UT-11 tests cover all scenarios including mixed success/failure.
    files:
      - "packages/backend/orchestrator/src/pipeline/affinity-seeder.ts"

  - ac_id: "AC-6"
    status: "PASS"
    evidence: >
      deriveConfidenceLevel() function derives confidence_level from sample_size using
