notable_decisions:
  - "ARCH-001: Cognito auth middleware reused for operator auth (AC-11 option a); autonomous decision at kickoff."
  - "ARCH-002: Monitor repository uses Drizzle raw SQL (sql tag) to handle wint.* PostgreSQL enum types with ::text casts. Drizzle ORM generated queries do not handle enum comparisons correctly for this schema."
  - "ARCH-003: Route registered in server.ts (not a separate app.ts); consistent with all other domains in this codebase."
  - "SSE (AC-6/ST-3) deferred to APIP-2025 per AC-12 — Lambda 29s connection timeout makes SSE non-viable on current backend host."
  - "E2E tests use API-only approach: the /monitor route is in app-dashboard Module.tsx but not exposed via main-app shell routing. Playwright tests hit the backend API directly, which fully covers AC-10."
  - "PipelineReadService created in packages/backend/orchestrator for APIP-5005 reuse. Not imported by lego-api (no cross-package dep needed); both packages implement the same SQL patterns using their respective DB clients."
  - "Schema duplication across repository, pipeline-read-service, and frontend hooks acknowledged as technical debt (REVIEW.yaml). Acceptable for merge; consolidation into @repo/schemas deferred."

known_deviations:
  - "UI E2E: No Playwright test navigates to /monitor in a browser — app-dashboard Module is not wired into main-app shell routing in the test environment. API endpoint E2E (7 tests) fully covers AC-4 and AC-10 backend requirements."
  - "PipelineReadService (packages/backend/orchestrator) is not imported by apps/api/lego-api; both independently implement equivalent SQL. This avoids a cross-package dependency from the API to the orchestrator package, which would conflict with the existing dependency graph."
  - "z.function() used in component prop schemas for onRetry callbacks (non-blocking warning from REVIEW.yaml iteration 1). Deferred to future refactor; does not affect runtime behaviour."
  - "Frontend files (components, hooks, pages) exist on branch story/APIP-2020 but are not yet present on main branch. This is expected — the story is in ready-for-qa stage pending merge."
