lessons_to_record:
  - tags:
      - testing
      - redis
      - backend
      - ci
    lesson: >-
      ARCHITECTURE_READY status on Redis-gated ACs (AC-7, AC-10) is a valid evidence status when external dependencies
      are unavailable in the test environment. The architecture is proven via unit tests and integration tests that mock
      or bypass the dependency. Full validation occurs in CI with Redis.
    category: pattern
  - tags:
      - coverage
      - bullmq
      - backend
    lesson: >-
      Coverage reporting for BullMQ-heavy packages will show low statement coverage on the supervisor orchestration
      layer (supervisor/index.ts: 20%) because the BullMQ Worker callback path requires a live Redis connection.
      Branch/line coverage on individual modules (lifecycle, controller, detector) remains high. This is expected and
      acceptable above the 45% overall threshold.
    category: pattern
  - tags:
      - testing
      - redis
      - ci
      - integration-tests
    lesson: >-
      Using it.skipIf(!redisAvailable) with a runtime reachability check (IORedis connect/ping with 2s timeout) is the
      correct pattern for graceful Redis-gated test skipping. This avoids test infrastructure failures and provides a
      clear signal to enable these tests in CI.
    category: pattern
architecture_notes:
  - >-
    All types use Zod schemas with z.infer<> — no TypeScript interfaces in non-test source (ActiveSlot interface in
    concurrency-controller.ts is acceptable as it is a local structural type, not a domain model)
  - logger from @repo/logger used throughout — no console.log in production source
  - execFile used instead of exec for git commands — shell injection prevention
  - No barrel files introduced
  - Package placed at apps/api/pipeline (@repo/pipeline) per gap-decision, not in read-only @repo/orchestrator
  - NodeCircuitBreaker imported from @repo/orchestrator as read-only dependency
