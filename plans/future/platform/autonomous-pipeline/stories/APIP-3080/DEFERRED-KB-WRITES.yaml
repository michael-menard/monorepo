      # Story: APIP-3080 — Parallel Story Concurrency (2-3 Worktrees)

      ## Summary
      Extends the PipelineSupervisor (APIP-0020) to support 2-3 concurrent stories using
      BullMQ Worker concurrency parameter. Each concurrent story runs in an isolated git
      worktree. PipelineModelRouter singleton (APIP-0040) provides shared rate limiting.
      ConcurrencyController manages slot state. WorktreeConflictDetector prevents concurrent
      stories from touching the same file paths.

      ## Key Components
      - ConcurrencyConfig Zod schema: maxWorktrees (1-3), conflictPolicy, worktreeCircuitBreaker
      - ConcurrencyController: tryAcquireSlot() / releaseSlot() / activeSlots() using Map<storyId, worktreeId>
      - WorktreeConflictDetector: path-prefix comparison, returns conflicting storyIds
      - BullMQ Worker({ concurrency: N }) — primary parallelism mechanism
      - Per-worktree NodeCircuitBreaker with explicit thresholds
      - Non-blocking worktree cleanup (WINT-1150 pattern)

      ## Dependencies
      - APIP-0020 (Supervisor Loop) — must be merged before ST-2
      - APIP-0040 (Model Router v1) — must be merged before ST-4 (AC-7 router safety)

      ## Status
      - Phase: 3 (Learning System & Optimization)
      - Points: 5
      - Priority: medium
      - Status: backlog
      - Story directory: plans/future/platform/autonomous-pipeline/backlog/APIP-3080/

      ## Testing Strategy
      Integration tests with real Redis (BullMQ) and real git worktrees. No Playwright.
      Key: TokenBucket concurrent safety test with real BullMQ concurrency (not Promise.all).

