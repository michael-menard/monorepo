lessons_to_record:
  - lesson: "vi.hoisted() is required in Vitest when mock factory functions reference variables defined outside the factory scope. Without it, temporal dead zone errors occur at test collection time."
    category: pattern
    tags: ["testing", "vitest", "mocking", "bullmq"]

  - lesson: "BullMQ v5 requires maxRetriesPerRequest=null on the IORedis connection. Without it, BullMQ throws on startup. This must be documented explicitly in connection factory code."
    category: pattern
    tags: ["bullmq", "ioredis", "redis", "infrastructure"]

  - lesson: "When BullMQ and the monorepo both declare ioredis but different patch versions, use ConnectionOptions from bullmq (not the Redis type from ioredis) for function signatures to avoid TypeScript type conflicts between the two resolution paths."
    category: blocker
    tags: ["bullmq", "ioredis", "dependency-management", "typescript"]

  - lesson: "Zod v3.25.x changed how ZodError instances propagate through async chains. The try/catch + instanceof ZodError pattern is more reliable than expect().rejects.toThrow() for asserting Zod validation failures in async contexts."
    category: pattern
    tags: ["zod", "testing", "vitest", "error-handling"]

  - lesson: "The pnpm-workspace.yaml glob 'packages/backend/*' automatically covers new packages added to packages/backend/ without any workspace file edits. New infrastructure packages in this path are zero-config for workspace registration."
    category: reuse
    tags: ["pnpm", "workspace", "infrastructure", "onboarding"]

