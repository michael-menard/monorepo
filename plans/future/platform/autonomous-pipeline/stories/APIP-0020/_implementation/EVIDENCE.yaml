adr_decisions:
  - id: "ADR-001 Decision 2"
    decision: "Plain TypeScript supervisor, not LangGraph graph"
    rationale: "Simpler debugging, no LangGraph overhead for orchestration logic"

  - id: "Thread ID Convention (APIP-0020)"
    decision: "Format: {storyId}:{stage}:{attemptNumber}"
    irreversible: true
    rationale: "Changing post-Phase 0 requires LangGraph checkpoint data migration"

notable_fixes:
  - issue: "ioredis version mismatch (5.9.2 vs 5.9.3 from BullMQ)"
    fix: "Used 'as any' cast on connection parameter in Worker constructor"

  - issue: "Dynamic import @repo/orchestrator sub-path not in exports map"
    fix: "Created graph-loader.ts seam using require.resolve() + path manipulation to load dist/graphs/index.js at runtime, bypassing Vite static export validation"

  - issue: "vi.mock() hoisting error with external variable reference"
    fix: "Used inline vi.fn() inside factory + importOriginal pattern for partial module mock"
