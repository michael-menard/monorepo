verdict: PASS

summary: >
  Implemented APIP-0020 "Supervisor Loop (Plain TypeScript)" — a new apps/api/pipeline/ app
  providing a BullMQ-based supervisor process that dispatches pipeline jobs to LangGraph worker
  graphs (elaboration and story-creation). All acceptance criteria verified via unit tests (38/38
  passing) and orchestrator regression guard (133/133 test files passing).

acceptance_criteria:
  AC-1:
    description: "New app apps/api/pipeline/ with package.json named @repo/pipeline"
    status: PASS
    evidence: "apps/api/pipeline/package.json created with name: @repo/pipeline"

  AC-2:
    description: "BullMQ Worker with concurrency: 1 (Phase 0 single-story-at-a-time)"
    status: PASS
    evidence: "PipelineSupervisor creates Worker with concurrency: 1 in supervisor/index.ts"

  AC-3:
    description: "Thread ID derivation: {storyId}:{stage}:{attemptNumber} — IRREVERSIBLE ADR"
    status: PASS
    evidence: "dispatch-router.ts line 110: const threadId = `${data.storyId}:${data.stage}:${data.attemptNumber}`"

  AC-4:
    description: "Elaboration stage routes to runElaboration(payload as SynthesizedStory, null, {})"
    status: PASS
    evidence: "dispatch-router.ts line 170: graphRunners.runElaboration(data.payload as SynthesizedStory, null, {})"

  AC-5:
    description: "Story-creation stage routes to runStoryCreation(payload as StoryRequest, null, {})"
    status: PASS
    evidence: "dispatch-router.ts line 174: graphRunners.runStoryCreation(data.payload as StoryRequest, null, {})"

  AC-6:
    description: "Wall clock timeout via Promise.race() with configurable stageTimeoutMs (default 10min)"
    status: PASS
    evidence: >
      wall-clock-timeout.ts implements withWallClockTimeout(). Default stageTimeoutMs: 600_000.
      Test: HP-3 in dispatch-router.test.ts verifies timeout throws wall_clock_timeout error.

  AC-7:
    description: "Error classification: PERMANENT → immediate fail, TRANSIENT → BullMQ retry"
    status: PASS
    evidence: >
      dispatch-router.ts uses isRetryableNodeError() from @repo/orchestrator.
      Tests EC-1 through EC-4 in dispatch-router.test.ts verify PERMANENT/TRANSIENT classification.

  AC-8:
    description: "Per-graph circuit breaker check — OPEN state re-queues as delayed (not failed)"
    status: PASS
    evidence: >
      graph-circuit-breakers.ts creates two NodeCircuitBreaker instances (elaboration, storyCreation).
      dispatch-router.ts calls job.moveToDelayed() when !circuitBreaker.canExecute().
      Test: AC-8 in dispatch-router.test.ts verifies moveToDelayed called with correct delay.

  AC-9:
    description: "Structured lifecycle event logging with required fields"
    status: PASS
    evidence: >
      dispatch-router.ts logs: job_received, dispatching, completed, timeout, failed, circuit_open.
      All events include: event, storyId, stage, threadId, attemptNumber, durationMs.
      Test: ED-3 in dispatch-router.test.ts verifies all required fields present.

  AC-12:
    description: "Orchestrator regression guard: existing orchestrator tests still pass"
    status: PASS
    evidence: "pnpm test --filter @repo/orchestrator: 133 test files passed, 3334 tests passed, 0 failures"

  AC-13:
    description: "Zod-validated job payload schema discriminated on stage field"
    status: PASS
    evidence: "supervisor/__types__/index.ts: PipelineJobDataSchema z.discriminatedUnion('stage', [...])"

  AC-14:
    description: "NodeCircuitBreaker imported from @repo/orchestrator — NOT re-implemented"
    status: PASS
    evidence: "graph-circuit-breakers.ts: import { NodeCircuitBreaker } from '@repo/orchestrator'"

  AC-15:
    description: "Two-catch pattern: WallClockTimeoutError caught BEFORE error classification"
    status: PASS
    evidence: >
      dispatch-router.ts: single catch block, checks instanceof WallClockTimeoutError FIRST before
      calling isRetryableNodeError(). Test: AC-15 in dispatch-router.test.ts verifies WallClockTimeoutError
      bypasses isRetryableNodeError entirely.

