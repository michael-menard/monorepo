feasible: true
confidence: high
rationale: >
  APIP-4030 is architecturally sound and follows well-established patterns in the codebase.
  The five analysis functions are independently implementable and testable. DB table definitions
  follow the wintSchema.table() pattern already used across wint.ts. Fire-and-forget insert
  semantics follow persist-learnings.ts exactly. The blocked queue routing dependency on APIP-2010
  is acknowledged as a staging dependency — the auditor's detection logic can be built and tested
  independently using a stub interface; only the final routing wiring is gated on APIP-2010.
  Cron registration with APIP-3090 is similarly decoupled: the DepAuditCronTask interface is
  defined here, plugging in one line when APIP-3090 ships.
complexity: high
change_surface:
  areas:
    - packages/backend/database-schema/src/schema/wint.ts
    - packages/backend/orchestrator/src/nodes/ (new dep-audit/ directory)
    - packages/backend/orchestrator/src/config/dep-equivalences.yaml (new)
    - migrations/ (two new SQL files following APIP-5007 naming)
  endpoints: []
  deploy_touchpoints:
    - "Run migration against lego_dev (port 5432) to create wint.dep_audit_runs and wint.dep_audit_findings"
    - "drizzle-kit check must pass post-migration"
    - "Register DepAuditCronTask with APIP-3090 cron infrastructure when available"

risks:
  - finding: "APIP-2010 blocked queue API not yet stable — high-risk routing cannot be fully wired until APIP-2010 ships"
    mitigation: "Define DepBlockedQueueClient interface (Zod-typed); implement stub that logs a warning and records the would-be item. Wire real APIP-2010 API in a follow-on subtask or when APIP-2010 reaches Ready to Work."
  - finding: "pnpm audit --json schema varies between pnpm v7/v8/v9 — brittle parsing could silently miss vulnerabilities"
    mitigation: "Use .passthrough() on PnpmAuditOutputSchema; parse only the fields we need; log unknown fields at debug level; integration-test against the actual pinned pnpm version in this repo."
  - finding: "bundlephobia public API rate limit — estimateBundleImpact could fail under multiple concurrent audit runs"
    mitigation: "Mark bundle estimation as info-only severity (never block); implement graceful null return on any HTTP error; prefer local cost-of-modules CLI invocation if available; add exponential backoff with single retry."

missing_requirements: []

evidence_expectations:
  - "wint.dep_audit_runs and wint.dep_audit_findings tables exist in APIP-5001 test DB after migration"
  - "drizzle-kit check passes with no schema drift"
  - "DepAuditRunSchema.parse and DepAuditFindingSchema.parse succeed on round-trip rows"
  - "Unit tests cover all five analysis functions with injectable mocks"
  - "runDepAudit DB failure path: logger.warn called, no throw"
  - "pnpm check-types passes on all new TypeScript files"

subtasks:
  - id: ST-1
    title: "Define wint.dep_audit_runs and wint.dep_audit_findings Drizzle tables + Zod schemas"
    goal: "Create the two new wint-schema tables with proper column types, indices, and drizzle-zod auto-generated schemas exported from database-schema package."
    files_to_read:
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - packages/backend/database-schema/src/schema/wint.ts
    acs: ["AC-1", "AC-2", "AC-4"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/database-schema"
    estimated_tokens: 6000

  - id: ST-2
    title: "Write SQL migration files for dep_audit_runs and dep_audit_findings"
    goal: "Create two APIP-5007-compatible numbered migration SQL files that create both tables in the wint schema, including FK constraint and indices."
    files_to_read:
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - migrations/0NN_dep_audit_runs.sql
      - migrations/0NN_dep_audit_findings.sql
    acs: ["AC-1", "AC-2", "AC-3"]
    depends_on: ST-1
    verification: "Apply migration to APIP-5001 test DB; drizzle-kit check passes"
    estimated_tokens: 4000

  - id: ST-3
    title: "Implement detectNewPackages() — package.json diff across workspaces"
    goal: "Compare workspace package.json files before/after merge (via git diff) to produce a typed PackageChangeSummary (added, updated, removed arrays)."
    files_to_read:
      - packages/backend/orchestrator/src/nodes/completion/persist-learnings.ts
    files_to_modify:
