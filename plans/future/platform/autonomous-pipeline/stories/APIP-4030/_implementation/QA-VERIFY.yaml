issues: []

lessons_to_record:
  - lesson: >-
      Injectable tool runner pattern (fetchFn, toolRunner, db as constructor/param arguments)
      makes external-dependency-heavy analysis functions fully unit testable without real
      network calls or DB connections. Five independent analysis functions tested in isolation
      with zero flakiness.
    category: pattern
    tags: [backend, testing, orchestrator, dependency-audit]

  - lesson: >-
      pg_try_advisory_lock concurrency guard pattern (injected as db.tryAdvisoryLock()) can
      be unit tested by returning false from the mock, allowing the 'lock held' early-exit
      path to be tested without a real database.
    category: pattern
    tags: [backend, concurrency, postgres, testing]

  - lesson: >-
      Using .passthrough() on PnpmAuditOutputSchema outer schema for all nested objects
      allows the pnpm audit JSON parser to survive pnpm v7/v8/v9 schema changes without
      requiring schema updates. Only strictly-consumed fields are validated.
    category: pattern
    tags: [backend, pnpm, schema-resilience]

  - lesson: >-
      dep-equivalences.yaml as a committed YAML config file (not hardcoded in source)
      allows the overlap detector to be maintained and extended without code changes.
      Useful pattern for any detection heuristic that requires a versioned knowledge base.
    category: reuse
    tags: [backend, config, yaml, dependency-audit]

