lessons_to_record:
  - lesson: >-
      BudgetExhaustedError must be caught in two places in a retry loop: (1) at the
      dispatch call site within the try block, and (2) in the outer catch to handle
      re-throws from deeper stack frames. Single-location handling risks missing the error.
    category: pattern
    tags: [orchestrator, error-handling, budget-management]

  - lesson: >-
      child_process.spawn wrapped in Promise is the correct subprocess pattern for this
      codebase (ARCH-001). Using execSync or execa is a detectable deviation.
    category: pattern
    tags: [orchestrator, subprocess, architecture]

  - lesson: >-
      Integration tests for git operations require a real initial commit before
      git worktree add works — bare init without any commits will fail.
    category: blocker
    tags: [orchestrator, integration-testing, git]

