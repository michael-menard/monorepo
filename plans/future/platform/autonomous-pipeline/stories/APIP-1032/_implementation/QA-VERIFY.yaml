architecture_notes: >-
  Zod-first types used throughout (no TypeScript interfaces except GraphStateWithImplementation
  which extends an existing interface from the codebase).
  No barrel files created. @repo/logger used for all logging. No console.log.
  change-loop node is plain async function (NOT wrapped in createToolNode) per GAP-3 resolution.
  child_process.spawn used for all subprocesses (not execSync/execa) per ARCH-001.
  Integration tests use os.tmpdir() isolation; no real monorepo touched.

