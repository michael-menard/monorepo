# ─────────────────────────────────────────────────────────────────────────────
# MVP-CRITICAL GAPS (blocking or high-risk for implementation success)
# ─────────────────────────────────────────────────────────────────────────────
mvp_critical_gaps:

  GAP-1:
    title: "execSync vs spawn: subprocess execution strategy undecided"
    severity: MEDIUM
    blocking: false
    description: >
      The story specifies "child_process.execSync or execa" without committing
      to one approach. The existing orchestrator pattern (run-unit-tests.ts,
      run-e2e-tests.ts) uses child_process.spawn wrapped in Promise.race with
      a wall-clock timeout. execSync is synchronous/blocking and will hold the
      Node.js event loop for the full duration of pnpm check-types and pnpm
      test runs (potentially minutes per ChangeSpec). In a LangGraph server
      context this is less critical than in Lambda, but it is still a
      suboptimal pattern.
    recommendation: >
      Clarify in the story or PLAN.exec.md: use child_process.spawn with
      stdout/stderr capture (matching the qa/run-unit-tests.ts pattern) OR
      explicitly accept execSync as a simplification trade-off for this story
      and document it. Do NOT use execa unless it is added as a package
      dependency — it is not currently in the orchestrator package.json.
    affected_acs: [AC-7, AC-12]
    affected_subtasks: [ST-6, ST-9]

  GAP-2:
    title: "OPP-2 micro-verify timeout: decision left open between Non-Goals and Architecture Notes"
    severity: LOW
    blocking: false
    description: >
      The Non-Goals section lists "Micro-verify timeout guard (OPP-2)" as
      deferred. The Architecture Notes section says "consider adding to AC-7
      or as a follow-up AC." This creates ambiguity — the implementer may feel
      compelled to add a timeout or skip it based on conflicting guidance.
      Additionally, AC-12 requires micro-verify to run real pnpm commands in a
      tmp fixture, which has unbounded wall time without a timeout guard. A
      runaway micro-verify during integration tests could hang CI indefinitely.
    recommendation: >
      Make a definitive decision: either (a) add microVerifyTimeoutMs as a
      configurable parameter with a default of 120,000ms in AC-7, or (b)
      explicitly accept the risk and document it. The KB entry for OPP-2
      (from APIP-1030 elaboration) recommends option (a). Given that the
      integration tests run real pnpm commands, at minimum add a timeout to
      the integration test TempGitRepo fixture to prevent CI hangs.
    affected_acs: [AC-7, AC-12]
    affected_subtasks: [ST-6, ST-9]
    kb_reference: "OPP-2 KB entry: 'Future Opportunity: Micro-Verify Timeout Guard Missing in AC-7'"

  GAP-3:
    title: "yaml-artifact-writer mock path: naming mismatch with actual module"
    severity: LOW
    blocking: false
    description: >
      The Test Plan references "yaml-artifact-writer" as a mock boundary for
      EVIDENCE.yaml write assertions. The actual module in the codebase is
      packages/backend/orchestrator/src/persistence/yaml-artifact-bridge.ts.
      The mock in ST-8 must target the exact import path used by the
      implementation (per KB lesson on vi.mock() import path matching).
      Using the wrong path in vi.mock() will silently fail to intercept calls.
    recommendation: >
      When writing ST-8 unit tests, use:
        vi.mock('../../persistence/yaml-artifact-bridge.js', ...)
      or whatever relative path the change-loop node actually imports from.
      Do NOT use 'yaml-artifact-writer' as the mock path.
    affected_acs: [AC-11]
    affected_subtasks: [ST-8]

  GAP-4:
    title: "IModelDispatch interface does not yet exist in filesystem"
    severity: LOW
    blocking: false
    description: >
      i-model-dispatch.ts is an APIP-1031 output that does not yet exist.
      The story correctly acknowledges this dependency, but it is worth
      flagging that the IModelDispatch interface must be defined in APIP-1031
      before ST-6 can begin. The story should not define its own IModelDispatch
      — it must reuse the one from APIP-1031. This is correctly stated in the
      story but is a coordination risk if APIP-1031 defines the interface
      differently than expected.
    recommendation: >
      When APIP-1031 completes, verify that IModelDispatch.dispatch() signature
      accepts (storyId, agentId, messages/context) matching AC-5's call pattern
      before starting ST-6. If there is a mismatch, raise a blocker immediately
      rather than adapting the change-loop implementation.
    affected_acs: [AC-5, AC-6]
    affected_subtasks: [ST-6]

# ─────────────────────────────────────────────────────────────────────────────
# FUTURE OPPORTUNITIES (non-blocking, post-MVP)
# ─────────────────────────────────────────────────────────────────────────────
future_opportunities:

  OPP-1:
    title: "Promote execSync to async spawn pattern in a follow-up refactor"
    category: code-quality
    effort: LOW
    impact: LOW
    description: >
      If execSync is chosen for this story (simplicity), a future refactor to
      child_process.spawn (matching run-unit-tests.ts pattern) would eliminate
      event loop blocking and make the change-loop node consistent with
      established orchestrator node patterns.
    story_suggestion: "Add as a tech-debt note in change-loop.ts with a TODO comment referencing OPP-1."

  OPP-2:
    title: "microVerifyTimeoutMs configurable timeout guard"
    category: resilience
    effort: LOW
    impact: MEDIUM
    description: >
      Already identified in APIP-1030 elaboration KB entry. A configurable
      timeout (default: 120,000ms) wrapping micro-verify commands prevents
      indefinite hang on runaway test suites. TIMEOUT result treated as
      micro-verify FAIL, increments retry counter.
    story_suggestion: >
      If not added as an AC in this story, create a follow-up story after
      APIP-1032 completes. References: KB entry 'Future Opportunity:
      Micro-Verify Timeout Guard Missing in AC-7'.

  OPP-3:
    title: "toStateUpdate helper pattern for change-loop node return values"
    category: code-quality
    effort: LOW
    impact: LOW
    description: >
      KB lesson recommends a toStateUpdate helper to consolidate the single
      cast point for node return values to Partial<GraphState>. The change-loop
      node should adopt this pattern when implemented to maintain consistency
      with other nodes.
    kb_reference: "Lesson: Single cast point pattern for LangGraph node return values"

  OPP-4:
    title: "Idempotency contract documentation for atomic commit side effect"
    category: documentation
    effort: LOW
    impact: LOW
    description: >
      The atomic commit (execSync git commit) is a side-effecting operation.
      Per WINT-9105 ADR (error handling strategy), side-effecting nodes must
      have documented idempotency contracts. The completedChanges check (AC-8)
      provides idempotency but this contract should be explicitly documented
      in change-loop.ts as a code comment, not just in the story.

