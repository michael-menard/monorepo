# SUBPROCESS EXECUTION PATTERN DISCOVERY
# ─────────────────────────────────────────────────────────────────────────────
subprocess_execution_pattern:
  story_proposes: "child_process.execSync or execa with cwd: worktreePath"
  existing_orchestrator_pattern: >
    The QA graph nodes (run-unit-tests.ts, run-e2e-tests.ts) use
    child_process.spawn wrapped in Promise.race with wall-clock timeout. This
    is the established async, non-blocking pattern in the orchestrator. The
    story's use of execSync is synchronous/blocking and differs from the
    established pattern.
  execa_dependency: NOT_IN_PACKAGE_JSON
  recommendation: >
    GAP-1 (see below): The story specifies execSync (synchronous) but the
    established codebase pattern is spawn wrapped in Promise (async). The
    implementer must choose one approach and be consistent. execSync blocks
    the event loop during micro-verify runs (which can be minutes). The spawn
    pattern is preferred for production but acceptable to use execSync for
    simplicity in this story given the LangGraph server context (non-Lambda).
    Document the choice as an accepted trade-off if execSync is used.

