  - pattern: "vi.hoisted() required for mocking modules before import resolution in Vitest"
    application: >
      ST-8 unit tests mocking child_process.execSync and IModelDispatch must
      use vi.hoisted() for mock factory variables to avoid temporal dead zone
      errors.

  - pattern: "ESM module mocking in Vitest requires vi.mock() at module level"
    application: >
      child_process mock in change-loop.test.ts must use vi.mock('child_process')
      at module level (not inside test functions).

  - pattern: "Test mocks must target the actual import path used by the implementation"
    application: "GAP-3 — yaml-artifact-bridge.ts is the actual module, not 'yaml-artifact-writer'."

  - pattern: "Injectable dispatch pattern for notification testing"
    application: >
      IModelDispatch injection is already planned. Unit tests can pass a vi.fn()
