issues:
  - id: "ISSUE-1"
    severity: FAIL
    ac: "AC-6"
    description: >
      experiment-analyzer.agent.md Step 8 missing the claimed Insufficient Data Path section.
      EVIDENCE.yaml claims ST-4 added explicit YAML templates showing: (a) insufficient data path
      omitting primary_metric/secondary_metrics, and (b) normal path with full stats. Neither
      addition is present in the actual file. The step only has one template which includes all
      statistical fields regardless of data sufficiency. This means the insufficient data path has
      no documented output structure for the agent to follow when Step 4 redirects to Step 8 early.
    resolution_required: >
      Add "Insufficient Data Path" and "Normal Path" sections to Step 8 of
      .claude/agents/experiment-analyzer.agent.md with separate YAML templates. The insufficient
      data template must omit primary_metric and secondary_metrics and include a clear instruction
      not to include statistical claims.

  - id: "ISSUE-2"
    severity: warning
    ac: "AC-2, AC-3"
    description: >
      EVIDENCE.yaml claims cross-reference comments were added to two agent files (ST-2 and ST-3)
      to pin the integration contract between pm-story-generation-leader Phase 0.5a (write side)
      and dev-documentation-leader Step 5 (read/propagation side). Neither comment is present in
      the actual files.
    resolution_required: >
      Minor: Add cross-reference comments to both agent files as claimed. These do not block AC
      compliance but improve maintainability and were committed changes per the evidence.

lessons_to_record:
  - lesson: >
      Evidence files (EVIDENCE.yaml) must accurately reflect file modifications. When change_description
      claims specific text was added to a file, QA verification will spot-check and fail if the text
      is absent. Coder agents should verify their own writes before marking steps PASS.
    category: anti_pattern
    tags: ["evidence-quality", "workflow-learning", "qa-process"]

  - lesson: >
      For multi-path agent instruction documents (sufficient vs insufficient data paths), Step templates
      should use explicit conditional sections (e.g., "If insufficient data path:" / "If normal path:")
      rather than relying on agents to infer omission from earlier skip instructions. The sample guard
      in Step 4 is not sufficient to communicate the Step 8 output shape.
    category: pattern
    tags: ["experiment-analyzer", "agent-instructions", "workflow-learning"]

  - lesson: >
      Cross-reference comments between agent files (e.g., "This writes X; see Agent Y Step Z for
      the read side") are low-cost maintainability improvements. When planned, they should be added
      at the same time as the core change to avoid evidence/implementation drift.
    category: pattern
    tags: ["agent-instructions", "cross-references", "maintainability"]

