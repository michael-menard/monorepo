technical_notes: |
  ## experiments.yaml Schema

  ```yaml
  experiments:
    - id: exp-fast-track
      description: "Skip elaboration for trivial stories"
      status: active
      created_at: 2026-02-01
      traffic: 0.2  # 20%
      eligibility:
        ac_count_max: 2
        complexity: simple
      metrics:
        primary: gate_pass_rate
        secondary:
          - cycle_time
          - rework_rate
          - token_cost
      min_sample_size: 10

    - id: exp-parallel-review
      description: "Run code review + QA verify in parallel"
      status: active
      created_at: 2026-02-05
      traffic: 0.1  # 10%
      eligibility:
        all: true
      metrics:
        primary: time_to_merge
        secondary:
          - finding_overlap
          - gate_pass_rate
      min_sample_size: 10
  ```

  ## Story Tagging

  During story creation, check experiments:

  ```javascript
  for (const exp of active_experiments) {
    if (isEligible(story, exp.eligibility)) {
      if (Math.random() < exp.traffic) {
        story.experiment_variant = exp.id
        break
      }
    }
  }
  // If no experiment assigned, story.experiment_variant = 'control'
  ```

  ## EXPERIMENT-REPORT.yaml

  ```yaml
  report_date: 2026-02-15
  experiment: exp-fast-track

  variants:
    control:
      sample_size: 45
      gate_pass_rate: 0.82
      avg_cycle_time_hours: 4.2
      avg_tokens: 156000

    treatment:
      sample_size: 12
      gate_pass_rate: 0.83
      avg_cycle_time_hours: 2.8
      avg_tokens: 98000

  analysis:
    primary_metric: gate_pass_rate
    difference: +0.01 (not significant)
    p_value: 0.45
    confidence: low

    secondary_metrics:
      cycle_time:
        difference: -33%
        p_value: 0.02
        confidence: high

  recommendation:
    action: expand_traffic
    rationale: |
      Gate pass rate maintained (0.83 vs 0.82, p=0.45).
      Significant cycle time reduction (-33%, p=0.02).
      Recommend expanding to 50% traffic for more data.
    confidence: medium
  ```

  ## Rollout Actions

  - `expand_traffic`: Increase experiment traffic %
  - `rollout`: Make treatment the new default
  - `stop`: End experiment, keep control
  - `continue`: Need more data

  ## Subtask Decomposition (Implementation Note)

  No `subtasks:` section is present in this story. Before picking up implementation, the
  implementer should decompose work into at minimum the following sequential phases:

  1. Define and validate experiments.yaml schema (AC-1)
  2. Implement traffic routing hook in dev-documentation-leader.agent.md (AC-2, AC-7)
  3. Extend OUTCOME.yaml to include experiment_variant field (AC-3)
  4. Build experiment-analyzer agent with minimum sample guard (AC-4, AC-6)
  5. Implement /experiment-report command and EXPERIMENT-REPORT.yaml output (AC-5)
  6. End-to-end verification using fixture data covering both sufficient and insufficient sample sizes

  Each phase is independently verifiable and can be partially shipped. The routing hook (phase 2)
  must precede metric collection (phase 3) since variant tagging is a prerequisite for queryable
  per-variant data.

risks:
  - id: R-1
    title: "Experiment interference"
    description: |
      Two active experiments may both declare eligibility for the same story. The current routing
      pseudocode uses `break` after the first match, which prevents double-assignment, but the
      risk that a story silently misses an experiment it qualifies for is not surfaced to the
      experimenter. If the order of experiments in experiments.yaml changes, assignment rates
      shift without notice.
    severity: medium
    mitigation: "The `break`-after-first-match rule is documented in technical_notes. Experiment ordering in experiments.yaml should be treated as intentional priority ranking."

  - id: R-2
    title: "Statistical invalidity at low sample threshold (N=10)"
    description: |
      p-values computed on n=10 per variant are unreliable. The example in technical_notes
      shows p=0.45 (not significant) on a treatment sample of 12 — illustrating the problem.
      Consumers of EXPERIMENT-REPORT.yaml may over-interpret low-confidence findings if the
      statistical limitations of small N are not clearly communicated in the report output.
    severity: high
    mitigation: "AC-6 requires the report to suppress statistical claims below min_sample_size. All confidence fields must be accompanied by sample_size in the report YAML to make N visible to consumers."

  - id: R-3
    title: "Silent variant tagging breakage"
    description: |
      If the story creation flow is refactored (e.g., the agent file that hosts the routing hook
      changes), the variant tagging step could be silently removed. No integrity check currently
      validates that experiment_variant is being set at the expected rate for active experiments.
    severity: medium
    mitigation: "AC-7 pins the integration point to dev-documentation-leader.agent.md. A follow-on monitoring story could verify tagging rate against expected traffic % in experiments.yaml."

