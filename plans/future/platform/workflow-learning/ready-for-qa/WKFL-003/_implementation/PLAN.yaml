schema: 1
story_id: WKFL-003
created_at: "2026-02-22T00:00:00Z"

implementation_approach: |
  WKFL-003 is an agent-tooling story. All three deliverable files were implemented
  and committed to main in commit 522a8c94 as part of a broader workflow-learning
  batch (PR #356). The implementation consists entirely of markdown and YAML
  configuration files — no TypeScript, no UI, no database changes, and no API surface.

  The heuristic-evolver.agent.md defines a Sonnet-model worker agent that:
    1. Reads current tier definitions from decision-classification.yaml
    2. Queries the KB for all decision_outcome entries
    3. Groups outcomes by pattern and computes success rates (min 5 samples)
    4. Applies promotion logic (>95% success → propose tier - 1, capped at Tier 2)
    5. Applies demotion logic (<80% success → propose tier + 1; <50% → tier + 2)
    6. Writes proposals to HEURISTIC-PROPOSALS.yaml
    7. Runs an integrity check (git diff) to verify decision-classification.yaml was not modified

  The decision-outcome-schema.md defines all required KB entry fields and enumerates
  validation rules, integration points (producers and consumers), and the full
  data-flow lifecycle from decision through KB write through proposal generation.

  The HEURISTIC-PROPOSALS.yaml is the output template that the agent overwrites on
  each run. It ships in a zeroed/empty state so the repo is valid at rest.

  This plan is documentation-only — it records what was implemented for verification
  and QA purposes.

story_type: agent-tooling
e2e_required: false
e2e_exempt_reason: "Agent-only story: creates markdown agent, schema, and YAML config files only. No UI, API, or database changes."

deliverables:
  - file: ".claude/agents/heuristic-evolver.agent.md"
    status: exists_on_main
    commit: "522a8c94"
    purpose: "Sonnet worker agent that analyzes KB decision_outcome entries and generates tier-adjustment proposals"
    key_features:
      - "Phase 1: Reads decision-classification.yaml and queries KB for all decision_outcome entries via kb_search"
      - "Phase 2: Groups outcomes by pattern; computes success rate only for patterns with >= 5 samples"
      - "Phase 3: Promotion logic — success_rate > 0.95 → propose current_tier - 1 (single-step, capped at Tier 2)"
      - "Phase 4: Demotion logic — success_rate < 0.80 → propose current_tier + 1; success_rate < 0.50 → propose current_tier + 2"
      - "Phase 5: Writes results (promotions, demotions, no_change_patterns, insufficient_samples, unmatched_patterns) to HEURISTIC-PROPOSALS.yaml"
      - "Phase 6: Integrity check via git diff to confirm decision-classification.yaml was not modified; ABORTs if modified"
      - "Tier 4 patterns never promoted or demoted (always_escalate guard)"

  - file: ".claude/schemas/decision-outcome-schema.md"
    status: exists_on_main
    commit: "522a8c94"
    purpose: "Schema definition for KB decision_outcome entries with all required fields, validation rules, examples, integration points"
    key_features:
      - "Required core fields: type, schema_version, story_id, decision_id, pattern, timestamp"
      - "Required classification fields: tier (1-5), category, auto_accepted, autonomy_level"
      - "Required outcome field: user_outcome (enum: confirmed | overridden | modified)"
      - "Optional context fields: decision_text, options_considered, selected_option, override_reason"
      - "KB query examples for pattern-level, tier-level, and override-specific queries"

  - file: ".claude/config/HEURISTIC-PROPOSALS.yaml"
    status: exists_on_main
    commit: "522a8c94"
    purpose: "Output template and target for agent-generated tier-adjustment proposals; ships zeroed so repo is valid at rest"
    key_features:
      - "schema_version, generated_at, analyzed_stories, total_decisions header"
      - "promotions, demotions, no_change_patterns, insufficient_samples, unmatched_patterns arrays"
      - "analysis_summary block: counts, success-rate distribution, tier distribution, date range"
      - "review_notes: human reviewer instructions for applying/rejecting/archiving proposals"

acceptance_criteria_coverage:
  - ac_id: AC-1
    status: covered
    approach: >
      decision-outcome-schema.md defines all required AC-1 fields as Required: Yes —
      pattern, auto_accepted, user_outcome (confirmed/overridden/modified), tier,
      story_id, decision_id, and timestamp. KB query examples demonstrate queryability
      by pattern, tier, and override status.

  - ac_id: AC-2
    status: covered
    approach: >
      heuristic-evolver.agent.md Phase 2 explicitly states minimum 5 samples as a hard
      gate before computing success rates. Patterns with fewer than 5 entries are written
      to the insufficient_samples array rather than evaluated for tier changes.

  - ac_id: AC-3
    status: covered
    approach: >
      heuristic-evolver.agent.md Phase 3 defines promotion logic: success_rate > 0.95
      AND samples >= 5 triggers a single-step tier decrease (current_tier - 1).
      HEURISTIC-PROPOSALS.yaml promotions array captures proposals with pattern,
      current_tier, proposed_tier, success_rate, samples, rationale, and example_stories.

  - ac_id: AC-4
    status: covered
    approach: >
      heuristic-evolver.agent.md Phase 4 defines demotion logic: success_rate < 0.80
      triggers current_tier + 1; success_rate < 0.50 triggers current_tier + 2 (severe).
      HEURISTIC-PROPOSALS.yaml demotions array captures proposals with severity field.

  - ac_id: AC-5
    status: covered
    approach: >
      heuristic-evolver.agent.md explicitly states "CRITICAL: This agent generates
      PROPOSALS ONLY. It NEVER modifies decision-classification.yaml directly."
      Phase 6 runs a git diff integrity check and ABORTs if decision-classification.yaml
      was modified. Non-Negotiables rule #1 enforces this.

verification_approach:
  method: "file_inspection"
  autonomy_level: conservative
  steps:
    - "Confirm .claude/agents/heuristic-evolver.agent.md exists and contains all required logic"
    - "Verify Phase 2 contains the >= 5 samples guard (AC-2)"
    - "Verify Phase 3 contains success_rate > 0.95 promotion logic (AC-3)"
    - "Verify Phase 4 contains success_rate < 0.80 and < 0.50 demotion logic (AC-4)"
    - "Verify Phase 6 contains git diff integrity check (AC-5)"
    - "Confirm .claude/schemas/decision-outcome-schema.md defines all AC-1 required fields"
    - "Confirm .claude/config/HEURISTIC-PROPOSALS.yaml exists with correct structure"
    - "Confirm .claude/config/decision-classification.yaml is unchanged (git diff clean)"

notes:
  - "All files committed in 522a8c94 (PR #356). No new code to write."
  - "14 future-opportunity KB entries deferred during elaboration (KB write unavailable)"
  - "Two elaboration clarifications resolved: tier numbering (1-5 confirmed) and promotion/demotion step logic (single-step with safety bounds)"
