# Summary
summary: "Create system to track auto-accept success rates per decision pattern and propose tier promotions (>95% success) or demotions (<80% success) while maintaining human oversight."

elaboration: "completed"

# Key decisions from elaboration
key_decisions:
  - id: 1
    title: "Tier System (1-5)"
    decision: "Use full 1-5 tier system from autonomy-tiers.md"
    rationale: "Clarifies tier numbering inconsistency found during audit"
    details: |
      Tier 1: Clarification (auto-accept candidates)
      Tier 2: Preference (notify-only candidates)
      Tier 3: Ambiguous Scope (require-approval)
      Tier 4: Destructive/Irreversible (always escalate)
      Tier 5: External Dependency (escalate based on risk)

  - id: 2
    title: "Promotion Logic"
    decision: "Single-step tier changes toward higher autonomy"
    rationale: "Safer, more gradual approach with intermediate calibration points"
    details: |
      If success_rate > 0.95 AND samples >= 5 AND current_tier > 1:
        Propose: current_tier - 1 (move one tier toward Tier 1)
      Safety: Cap promotions at Tier 2 initially; Tier 1 requires human override

  - id: 3
    title: "Demotion Logic"
    decision: "Single-step or double-step tier changes toward lower autonomy"
    rationale: "Proportionate response to performance degradation"
    details: |
      If success_rate < 0.80 AND samples >= 5 AND current_tier < 5:
        Propose: current_tier + 1 (move one tier toward Tier 5)
      If success_rate < 0.50 (severely underperforming):
        Propose: current_tier + 2 (skip a tier for critical failures)

