lessons_to_record:
  - lesson: >
      Evidence files (EVIDENCE.yaml) must accurately reflect file modifications. When
      change_description claims specific text was added to a file, QA verification will
      spot-check and fail if the text is absent. Coder agents should verify their own writes
      before marking steps PASS.
    category: anti_pattern
    tags: ["evidence-quality", "workflow-learning", "qa-process"]

  - lesson: >
      For multi-path agent instruction documents (sufficient vs insufficient data paths), Step
      templates should use explicit conditional sections (e.g., "Insufficient Data Path:" /
      "Normal Path:") rather than relying on agents to infer field omission from earlier skip
      instructions. The sample guard in Step 4 alone is not sufficient to communicate the
      Step 8 output shape — the separate conditional templates in Step 8 are required.
    category: pattern
    tags: ["experiment-analyzer", "agent-instructions", "workflow-learning"]

  - lesson: >
      Cross-reference comments between agent files (e.g., "This writes X; see Agent Y Step Z
      for the read side") are low-cost maintainability improvements. When planned as part of a
      story, they should be written at the same time as the core change and verified before
      marking steps PASS — not deferred to a fix iteration.
    category: pattern
    tags: ["agent-instructions", "cross-references", "maintainability"]

  - lesson: >
      The Workflow Experimentation Framework (WKFL-008) pattern — experiments.yaml config +
      pm-story-generation traffic routing + OUTCOME.yaml variant propagation + experiment-analyzer
      statistical analysis — is a complete A/B testing pipeline for AI agents. The
      experiment_variant propagation chain (write at story creation → read at documentation →
      analyze at report time) is cleanly separated with no duplication across three agent files.
    category: reuse
    tags: ["experiment-framework", "a-b-testing", "workflow-learning", "wkfl-008"]

