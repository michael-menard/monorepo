issues:
  - id: I-001
    severity: minor
    blocking: false
    description: >
      Phase 7 "First run handling" block (lines 241-244) references a 50-proposal minimum
      threshold ("No historical data (minimum 50 proposals required)") while AC-5 baseline
      is triggered after 3 completed runs. These two thresholds can interact unexpectedly in
      the early-run window (runs 1-3 with < 50 cumulative proposals). The interaction is
      unexplained in the agent file. Flagged as non-blocking per REVIEW.yaml R-001; suitable
      for follow-up story.

lessons_to_record:
  - lesson: >
      Promise.allSettled() for multi-source data loading is a well-established pattern in
      this workflow-learning component suite (WKFL-006, WKFL-010). When authoring new
      agents that aggregate from multiple sources, use Promise.allSettled() rather than
      Promise.all() to ensure partial failures never block the full pipeline.
    category: pattern
    tags: ["workflow-learning", "agent-design", "resilience", "multi-source"]

  - lesson: >
      For agent-file-only stories (no TypeScript code), E2E tests and coverage metrics are
      legitimately exempt. The deliverable surface area (markdown agent configuration) has
      no Playwright-testable UI, no HTTP endpoints, and no TypeScript to measure. Document
      the exemption in EVIDENCE.yaml known_deviations with the reason rather than leaving
      e2e fields empty without explanation.
    category: pattern
    tags: ["testing", "e2e", "agent-file", "exemption"]

  - lesson: >
      When a story updates a formula or contract that was previously implemented with a
      different value (WKFL-010 ROI formula: was (impact/effort)*(10/9), corrected to
      impact_value*effort_inverse), the KNOWLEDGE-CONTEXT.yaml blocker list is effective
      at surfacing the gap before implementation begins. Blockers in KNOWLEDGE-CONTEXT.yaml
      should include specific line numbers and the old vs new values where possible.
    category: pattern
    tags: ["knowledge-context", "formula-alignment", "workflow-learning"]

