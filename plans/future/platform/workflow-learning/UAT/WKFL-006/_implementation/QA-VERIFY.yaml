    category: pattern
    tags: ["agent-tooling", "qa-verify", "verification", "workflow"]

  - lesson: "When AC specifies cosine similarity >= 0.85 but implementation uses Levenshtein 0.70, document the calibration rationale in EVIDENCE.yaml notes and DECISIONS.yaml to prevent QA false-fail"
    category: pattern
    tags: ["clustering", "similarity", "documentation", "elaboration"]

  - lesson: "Dual-mode data sources (primary + fallback with <10 threshold) should include explicit fallback logging in the agent spec; pattern established in WKFL-006 pattern-miner for OUTCOME.yaml -> VERIFICATION.yaml"
    category: reuse
    tags: ["data-sources", "fallback", "logging", "pattern-miner"]

  - lesson: "Template/example output files seeded during story delivery (not from actual /pattern-mine run) should include a prominent NOTE comment indicating regeneration is required; prevents confusion with real run outputs"
    category: pattern
    tags: ["output-files", "templates", "documentation"]

