architectural_decisions:
  - id: ARCH-001
    question: "Use text similarity (Levenshtein) or defer clustering entirely for MVP?"
    decision: "Use text similarity with 0.70 threshold for MVP clustering"
    rationale: |
      Provides meaningful clustering without external embedding API dependencies.
      Text similarity threshold 0.70 calibrated to approximate embedding similarity 0.85.
      Documented as interim solution with clear upgrade path to embeddings in WKFL-006-B.
    decided_by: autonomous
    source: "DEV-FEASIBILITY.md recommendation + DECISIONS.yaml clarification-4"

  - id: ARCH-002
    question: "Define pattern significance thresholds upfront or make fully configurable?"
    decision: "Use reasonable defaults (3 occurrences, 0.60 correlation) with command-line configurability"
    rationale: |
      Defaults based on workflow-retro agent patterns enable immediate use.
      CLI parameters (--min-occurrences, --min-correlation) allow tuning without code changes.
      Balances MVP speed with future flexibility.
    decided_by: autonomous
    source: "DECISIONS.yaml clarification-1"

  - id: ARCH-003
    question: "Weekly cron automation in scope for MVP?"
    decision: "Manual /pattern-mine command only for MVP, cron documented for future"
    rationale: |
      Weekly cron requires GitHub Actions infrastructure not yet defined.
      Manual command sufficient for MVP validation with 37 VERIFICATION.yaml files.
      Infrastructure Notes document cron setup for future activation.
    decided_by: autonomous
    source: "DECISIONS.yaml clarification-3"

  - id: ARCH-004
    question: "Data source selection: OUTCOME.yaml or VERIFICATION.yaml?"
    decision: "VERIFICATION.yaml fallback as primary for MVP (OUTCOME.yaml generation not active)"
    rationale: |
      0 OUTCOME.yaml files available (schema defined but generation not yet active).
      37 VERIFICATION.yaml files available for testing.
      Agent implements dual-mode: OUTCOME.yaml primary with automatic fallback to VERIFICATION.yaml.
    decided_by: autonomous
    source: "KNOWLEDGE-CONTEXT.yaml warnings"

complexity: moderate

