acceptance_criteria:
  - ac_id: "AC-1"
    ac_text: "Decision outcome tracking schema must define: pattern, auto_accepted, user_outcome (confirmed/overridden), tier, story_id, decision_id, timestamp"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/schemas/decision-outcome-schema.md"
        description: "Schema defines all required fields as Required: Yes in the Field Descriptions table"
        details: |
          Required fields confirmed in the schema table (lines 70-97):
          - pattern: Required Yes — "Regex pattern that triggered classification"
          - auto_accepted: Required Yes — "true = autonomous, false = escalated"
          - user_outcome: Required Yes — enum: confirmed | overridden | modified
          - tier: Required Yes — "Autonomy tier (1-5)"
          - story_id: Required Yes — "Story identifier"
          - decision_id: Required Yes — "Unique decision identifier from DECISIONS.yaml"
          - timestamp: Required Yes — "When decision was made (ISO 8601)"

  - ac_id: "AC-2"
    ac_text: "Compute success rate per pattern (minimum 5 samples)"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/agents/heuristic-evolver.agent.md"
        description: "Phase 2 explicitly states minimum 5 samples requirement and skips patterns with fewer"
        details: |
          Line 138: "For each pattern with **minimum 5 samples**:"
          Lines 154-155: "**Minimum Sample Size**: Patterns with fewer than 5 samples are skipped with a note in the output."
          Non-Negotiables line 364: "**Minimum 5 samples required** - Patterns with fewer samples are skipped"
          Test Case 5 (line 539): "Add 3 decision_outcome entries for pattern... Expected: Skipped with note 'Insufficient samples (3 < 5)'."
          Success rate formula (lines 140-146):
            function computeSuccessRate(outcomes) {
              const confirmed = outcomes.filter(o => o.user_outcome === "confirmed").length
              const total = outcomes.length
              return confirmed / total
            }
      - type: file
        path: ".claude/config/HEURISTIC-PROPOSALS.yaml"
        description: "Template shows insufficient_samples section for patterns with < 5 samples"
        details: |
          Lines 90-99: insufficient_samples section with example noting "Insufficient samples (3 < 5). Need more data before proposing tier change."

  - ac_id: "AC-3"
    ac_text: "Propose promotion when success rate > 95%"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/agents/heuristic-evolver.agent.md"
        description: "Phase 3 Promotion Logic explicitly states success_rate > 95% triggers tier promotion proposal"
        details: |
          Line 158: "**Rule**: If success_rate > 95%, propose tier decrease (higher autonomy)."
          Success Criteria section (lines 35-38):
            "Patterns with >95% confirmation rate are promoted (higher autonomy)"
          Non-Negotiables line 363: "**Minimum 5 samples required** - Patterns with fewer samples are skipped"
          Future Enhancements v1.1.0 (line 392): "promotion_threshold: 0.95   # Success rate for promotion"
      - type: file
        path: ".claude/config/HEURISTIC-PROPOSALS.yaml"
        description: "Promotions section header comment confirms >95% threshold"
        details: |
          Line 25: "# Promotion logic: success_rate > 95% → propose tier - 1 (single-step)"
          Example promotion entry shows success_rate: 0.957 (95.7%) triggering Tier 3 → Tier 2 proposal.

  - ac_id: "AC-4"
    ac_text: "Propose demotion when success rate < 80%"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/agents/heuristic-evolver.agent.md"
        description: "Phase 4 Demotion Logic explicitly states success_rate < 80% triggers demotion proposal"
        details: |
          Lines 185-186:
            "- If success_rate < 80%: propose tier increase (lower autonomy)"
            "- If success_rate < 50%: propose tier increase by 2 (severe issues)"
          Success Criteria section (lines 36-37):
            "Patterns with <80% confirmation rate are demoted (lower autonomy)"
            "Patterns with <50% confirmation rate are demoted two tiers (severe issues)"
          Non-Negotiables (line 365): "**Single-step tier changes** - Exception: <50% success allows 2-step demotion"
          Future Enhancements v1.1.0 (lines 393-394):
            "demotion_threshold: 0.80    # Success rate for demotion"
            "severe_threshold: 0.50      # Success rate for 2-step demotion"
      - type: file
        path: ".claude/config/HEURISTIC-PROPOSALS.yaml"
        description: "Demotions section header comment confirms <80% threshold with two demotion levels"
        details: |
          Lines 43-45:
            "# Demotion logic:"
            "#   - 50% <= success_rate < 80% → propose tier + 1 (single-step)"
            "#   - success_rate < 50% → propose tier + 2 (two-step, severe)"

  - ac_id: "AC-5"
    ac_text: "All changes are proposals only, not auto-applied — agent must NOT modify decision-classification.yaml; must have integrity check"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/agents/heuristic-evolver.agent.md"
        description: "Agent declares PROPOSALS ONLY in header, integrity check in Phase 6, and explicit Non-Negotiable rule"
        details: |
          Line 25 (header): "**CRITICAL**: This agent generates PROPOSALS ONLY. It NEVER modifies `decision-classification.yaml` directly. All tier changes require human review and approval."
          Phase 6 Verify Integrity (lines 263-270):
            "**CRITICAL**: Before completing, verify that `decision-classification.yaml` was NOT modified:"
            "git diff .claude/config/decision-classification.yaml"
            "If there are changes, **ABORT** and report error."
          Non-Negotiables line 363: "**DO NOT MODIFY decision-classification.yaml** - This agent generates proposals ONLY"
          Error Handling table (line 381): "decision-classification.yaml modified | ABORT with message 'Integrity violation: decision-classification.yaml was modified'"
      - type: file
        path: ".claude/config/HEURISTIC-PROPOSALS.yaml"
        description: "Output template file header warns PROPOSALS only and requires human review"
        details: |
          Lines 8-9: "# IMPORTANT: These are PROPOSALS only. Do NOT auto-apply."
          "# Human review required before updating decision-classification.yaml."
          Review notes (lines 139-164) instruct human reviewer on manual application steps.
      - type: command
        command: "git diff HEAD -- .claude/config/decision-classification.yaml"
        description: "Verified decision-classification.yaml has no uncommitted changes — file is unchanged from HEAD"
        result: "Empty output (no diff) — file not modified"

