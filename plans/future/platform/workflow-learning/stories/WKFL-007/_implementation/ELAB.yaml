  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      Subtask decomposition is entirely absent from story.yaml. There is no
      ## Subtasks section, no ## Canonical References section, no per-AC subtask
      coverage, and no verification commands. All 5 ACs are uncovered by
      subtasks. Estimated work (agent file + 2 schema extensions + KB query
      integration) is straightforward but without decomposition, small-context
      LLM executors will lack the step-by-step anchor needed for reliable
      execution. Recommend adding 4-5 subtasks before execution.

gaps:
  - id: gap-1
    check: risk_disclosure
    finding: >
      split_risk and review_cycles heuristics have no explicit fallback when
      similar_stories is empty (WKFL-006 data unavailable or sparse). The
      review_cycles formula references "similar_story_avg_cycles" without
      defining a default value when that average cannot be computed. This
      could produce NaN or undefined outputs in the first weeks of use before
      WKFL-006 data accumulates.
    severity: high
    decision: add_ac
    ac_added: "AC-6: All three heuristic functions define explicit fallback values when similar_stories is empty (no undefined/NaN outputs at cold-start)"
    notes: "Auto-resolved: blocks correct heuristic output at cold-start; undefined/NaN in prediction fields would break downstream consumers"

  - id: gap-2
    check: testability
    finding: >
      No runnable test plan is specified. The heuristic functions (split_risk,
      review_cycles, token_estimate) are pure deterministic logic and require
      at least a Vitest unit test fixture with known inputs and expected outputs
      to be verifiable. Without this, AC-1..5 cannot be automatically confirmed.
    severity: medium
    decision: add_ac
    ac_added: "AC-7: Vitest unit tests cover all three heuristic functions with at least: (a) cold-start case (empty similar_stories), (b) normal case with similar_stories data, (c) boundary values (ac_count=5, ac_count=8, files>5)"
    notes: "Auto-resolved: deterministic heuristics are easily unit-testable; without tests, AC-1..5 verification cannot be automated"

opportunities:
  - id: opp-1
    category: edge_cases
    finding: >
      Define explicit fallback values for all three heuristics when
      similar_stories is empty (e.g., review_cycles default: 1.5,
      split_risk: formula-only with no similar-story weighting).
      Document this as v1 behavior with a note that accuracy improves
      after N completed stories with OUTCOME.yaml data.
    effort: low
    decision: log_to_kb
    kb_entry_id: "11e582c3-29cc-453d-b34a-f4010f4176e6"

  - id: opp-2
    category: observability
    finding: >
      Add a confidence degradation signal: when similar_stories.length == 0,
      set predictions.confidence = "low" regardless of heuristic output.
      This helps consumers (e.g., /pm-story) surface a visual indicator that
      predictions are cold-start estimates.
    effort: low
    decision: log_to_kb
    kb_entry_id: "af400090-aab4-470a-97f0-aa0f095a94a6"

  - id: opp-3
    category: ux_polish
    finding: >
      The prediction schema uses float values for review_cycles (e.g., 2.3)
      but OUTCOME.yaml actuals tracks integer review_cycles. Define whether
      prediction accuracy for review_cycles uses rounding or a tolerance band
      (e.g., ±0.5 = "close enough") to avoid misleading accuracy scores in
      prediction_accuracy.review_cycles.
    effort: low
    decision: log_to_kb
    kb_entry_id: "1a8399b9-2ffc-4ce5-bcab-151f5c0f64a8"

  - id: opp-4
    category: performance
    finding: >
      The similar_stories KB query uses a broad text search on title + scope.
      As the KB grows, this may return noisy matches. Consider adding a
      tag filter (e.g., tags: ["outcome", "completed"]) to pre-filter to
      only stories with actuals. Already partially implied in technical_notes
      but worth making explicit in the agent prompt spec.
    effort: low
    decision: log_to_kb
    kb_entry_id: "7699958e-05cb-4bb5-8141-031b235d9098"

  - id: opp-5
    category: integrations
    finding: >
      AC-5 ties prediction accuracy to OUTCOME.yaml (written at story close by
      WKFL-001 Retro Agent). Consider whether the risk-predictor agent should
      also write a KB entry at prediction time (tagging predictions vs. actuals
      for later LERN-epic mining), enabling WKFL-006 to correlate prediction
      quality with story outcomes.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "2dd1696b-ca57-4f4a-916f-4e3e3a70f42f"

