      confidence will be systematically low at launch. The fallback (default
      150000 tokens) mitigates the token_estimate path, but split_risk and
      review_cycles have no explicit fallback when similar_stories is empty.
      Additionally, WKFL-001 OUTCOME.yaml schema stability is assumed without
      a versioning guard.

