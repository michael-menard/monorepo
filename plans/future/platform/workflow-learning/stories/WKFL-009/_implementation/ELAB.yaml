schema: 1
story_id: "WKFL-009"
timestamp: "2026-02-23T00:00:00Z"

audit:
  - id: scope_alignment
    status: PASS
    note: >
      stories.index.md lists WKFL-009 as 'Knowledge Compressor | elaboration' with no extra scope
      added. All items in scope.in (kb-compressor.agent.md, /kb-compress command, embedding clustering,
      canonical entry creation, archive mechanism, compression report) are tightly scoped to the stated
      goal. scope.out correctly excludes pattern mining (delegated to WKFL-006) and deletion. No
      additional infrastructure, endpoints, or features are introduced beyond the stated scope.

  - id: internal_consistency
    status: PASS
    note: >
      Goals 1-4 map directly to AC-1 through AC-4. Non-goal 'Deleting information' is consistent with
      AC-3 (archive with pointer, original preserved). Non-goal 'Real-time compression' is consistent
      with the monthly cron / /kb-compress on-demand model. AC-5 ('No loss of unique information')
      directly supports the safety principle in the goal. The safety_measures section in technical_notes
      (never delete, archived entries still queryable, rollback by unarchiving) does not contradict any
      AC or non-goal. Canonical entry schema and archived entry schema are internally coherent.

  - id: reuse_first
    status: WARN
    note: >
      The story correctly identifies KB tools (kb_search, kb_update) as must-reuse. However,
      'existing embedding infrastructure' is listed as must-reuse without specifying what that
      infrastructure is. PLAN.meta.md confirms pgvector is in the stack for KB embeddings, but the
      story does not identify a concrete reusable embedding generation utility (e.g., a node in
      packages/backend/orchestrator/src/ or a provider call pattern). If embedding generation for each
      KB entry requires new model calls via the model selector, that must be explicitly declared rather
      than implied. Recommend clarifying whether an embed() utility exists or whether it must be added
      to the orchestrator's learning nodes.

  - id: ports_adapters
    status: PASS
    note: >
      No HTTP API endpoints are involved. The architecture is correctly layered: the /kb-compress
      command (or monthly cron) acts as the trigger adapter, while kb-compressor.agent.md contains the
      core compression logic. The compression algorithm in technical_notes is transport-agnostic (query
      KB, compute embeddings, cluster, merge, archive, report). The story targets haiku as the model,
      which is appropriate for structured merge tasks. Per PLAN.exec.md, the agent maps to a LangGraph
      node in packages/backend/orchestrator/src/nodes/learning/ — no business logic leak into
      adapters.

  - id: testability
    status: WARN
    note: >
      Each AC has a 'verification' field describing what to check, but none provides a concrete,
      executable test command or test fixture. 'Run on test data' (AC-1) does not specify where test
      data lives, what format it takes, or how to invoke the run. 'COMPRESSION-REPORT.yaml has all
      stats' (AC-4) requires a full run to produce. The story needs: (1) a fixture set of KB entries
      with known similarity relationships for deterministic clustering verification; (2) a concrete
      test command (e.g., a Vitest integration test or a named script); (3) a verifiable threshold
      definition for 'no loss of unique information' in AC-5. Agent-based stories in this program
      (e.g., WKFL-006) define _testing/ directories with integration.test.md — this story should
      follow the same pattern.

  - id: decision_completeness
    status: WARN
    note: >
      Two unresolved decisions are present but not explicitly flagged. First: how embeddings are
      computed. The algorithm states 'Compute embeddings for each entry' but does not specify the
      embedding model, the endpoint, the token cost, or whether this goes through the model selector.
      Given that the KB could have hundreds of entries (the example report shows 847), embedding
      generation at scale has non-trivial cost implications that must be decided before implementation.
      Second: the similarity threshold is set at 0.9 but there is no stated rationale or tuning
      mechanism. The WKFL-006 story used 0.85 for pattern clustering (downgraded to text similarity
      0.70 for MVP in the UAT version) — WKFL-009 uses a stricter 0.9 without explaining why or how
      to calibrate it. These are not blockers but require decisions before subtask decomposition.

  - id: risk_disclosure
    status: WARN
    note: >
      Safety measures (never delete, rollback) are documented but formal risks are absent. Four
      material risks are undisclosed: (1) Embedding cost at scale — computing embeddings for 847+
      entries via a model provider has a token cost that could be significant; no budget is specified
      for the compression run itself. (2) False positive merges — at 0.9 similarity, merges should
      be rare but a single false merge loses the distinctness of two lessons; the canonical merge
      quality depends on haiku's synthesis capability. (3) Idempotency — the story does not describe
      what happens when the compressor runs a second time on already-canonical entries, or whether
      canonical entries are excluded from re-clustering. (4) WKFL-006 dependency risk — WKFL-009
      depends on WKFL-006 being complete; the story does not describe a fallback if WKFL-006
      patterns are not available (though WKFL-006 is in-qa so the dependency is likely satisfied).

  - id: story_sizing
    status: PASS
    note: >
      5 ACs (well under the 8-AC threshold). No HTTP endpoints. No frontend work. Single cohesive
      feature (compression pipeline). Happy path is one scenario (run compressor, verify clusters,
      verify canonical entries, verify report). Touches at most 2 packages: KB tools (existing) and
      the new agent/command files. Zero sizing indicators triggered. Story is appropriately sized
      for a P2 maintenance job.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      The story.yaml has no Subtasks section and no Canonical References section. Without subtask
      decomposition, the story may not be directly executable by a small-context LLM agent. The
      compression pipeline has 5 distinct implementation steps that should each be a subtask:
      (ST-1) scaffold kb-compressor.agent.md with algorithm skeleton; (ST-2) implement KB entry
      query and embedding generation; (ST-3) implement clustering algorithm with 0.9 threshold;
      (ST-4) implement canonical entry creation and archive update; (ST-5) implement report
      generation and /kb-compress command wiring. Each of these touches at most 2-3 files.
      Subtask decomposition missing — story may not be executable by small-context LLMs.

gaps:
  - id: gap-1
    check: decision_completeness
    finding: >
      Embedding generation mechanism is unspecified. The algorithm requires computing embeddings
      for each KB entry but does not identify the model, provider, cost, or whether the model
      selector is used. At scale (500-900 entries), this is a non-trivial computation with real
      token costs. Without this decision, the implementation cannot proceed to subtask decomposition.
    severity: high
    decision: add_as_ac
    ac_added: AC-6

  - id: gap-2
    check: testability
    finding: >
      No test fixtures or concrete test execution path defined. AC-1 verification says 'Run on
      test data' but no test dataset exists and no mechanism to run a scoped/dry-run compression
      is specified. A deterministic fixture set with known similarity groupings is required to
      verify clustering correctness without live KB data.
    severity: high
    decision: add_as_ac
    ac_added: AC-7

  - id: gap-3
    check: risk_disclosure
    finding: >
      Idempotency is not addressed. If the compressor runs on a KB that already contains canonical
      entries (from a prior run), it must skip canonical and archived entries. The algorithm as
      written ('Query all non-archived KB entries') partially addresses this, but canonical entries
      created in a prior run would be included in re-clustering, potentially creating
      canonical-of-canonical entries. A guard is needed.
    severity: high
    decision: add_as_ac
    ac_added: AC-8

opportunities:
  - id: opp-1
    category: observability
    finding: >
      Compression run should emit a workflow_event to the telemetry layer (per INFR event schema)
      so that KB health can be tracked over time in dashboards. Currently the report is a static
      YAML file only.
    effort: low
    decision: out_of_scope
    kb_entry_id: null

  - id: opp-2
    category: edge_cases
    finding: >
      Similarity threshold of 0.9 is fixed. A configurable threshold parameter (with a documented
      default) would allow tuning based on observed false positive/negative rates after the first
      production run.
    effort: low
    decision: out_of_scope
    kb_entry_id: null

  - id: opp-3
    category: ux_polish
    finding: >
      The /kb-compress command could support a --dry-run flag that produces the cluster report
      and proposed canonical entries without executing any writes, allowing human review before
      committing merges. This would reduce anxiety around irreversible (though reversible) operations.
    effort: medium
    decision: out_of_scope
    kb_entry_id: null

  - id: opp-4
    category: performance
    finding: >
      Embedding computation for all non-archived KB entries on every run is O(n) in model calls.
      Caching embeddings in the kb.* schema (e.g., a stored embedding column in pgvector) would
      reduce per-run cost to only entries added since the last compression run. PLAN.meta.md
      confirms pgvector is already in the stack.
    effort: medium
    decision: out_of_scope
    kb_entry_id: null

  - id: opp-5
    category: integrations
    finding: >
      The compression report (COMPRESSION-REPORT.yaml) could feed into WKFL-010 (Improvement
      Proposal Generator) as a signal for KB health. High compression ratios could indicate
      lesson quality is improving; low ratios could indicate redundant lesson creation patterns
      to address. The dependency direction already supports this (WKFL-009 blocks nothing but
      its output is directly useful to WKFL-010's analysis).
    effort: low
    decision: out_of_scope
    kb_entry_id: null

