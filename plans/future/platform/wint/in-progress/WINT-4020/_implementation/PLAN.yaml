architectural_decisions:
  - id: ARCH-001
    question: 'MCP wrappers: direct-call vs HTTP call to sidecar'
    decision: 'Direct-call: import compute functions directly from @repo/sidecar-rules-registry'
    rationale: >-
      Established pattern (ARCH-001) from context-pack-get.ts — avoids requiring sidecar HTTP server to be running when
      MCP tool is invoked
    decided_by: story
  - id: ARCH-002
    question: 'Conflict detection: database-level partial unique index vs application-level query'
    decision: >-
      Application-level query-then-compare (case-insensitive, trimmed) per story spec. OPP-1 (DB-level partial unique
      index) deferred to future story.
    rationale: >-
      Story explicitly specifies application-level text match. Adding DB-level constraint adds migration complexity
      beyond MVP scope. Deferred opportunity logged to KB.
    decided_by: story
  - id: ARCH-003
    question: Migration target database and directory
    decision: >-
      Use packages/backend/database-schema/src/migrations/app/ directory. Rules table is in the app database (same as
      other WINT tables like wint schema). Migration named 0035_wint_4020_add_rules_table.sql following established
      naming pattern.
    rationale: >-
      GAP-2 from ELAB: existing WINT migrations (e.g. 0019_wint_0040_telemetry_columns.sql) all reside in
      migrations/app/. Story refers to postgres-knowledgebase as the connection target, but migration files are in app/
      directory. Follow the same pattern as WINT-0040.
    decided_by: plan
complexity: complex
notes:
  - ST-2 and ST-3 can run in parallel after ST-1 completes (no dependency between them).
  - ST-7 (MCP wrappers) can run in parallel with ST-5 (HTTP handler) after ST-4 (compute functions) completes.
  - ST-8 (tests) depends on ST-4, ST-5, ST-6 — runs last; may need its own focused agent session per ELAB sizing note.
  - >-
    GAP-1 resolved: write SQL migration manually following 0034 pattern (not drizzle-kit generate) to match project
    conventions.
  - 'GAP-2 resolved: rules table targets migrations/app/ matching existing WINT migration pattern.'
  - pnpm workspace glob 'packages/backend/sidecars/*' auto-covers new package — no workspace root file edit needed.
  - 'Port 3093 verified unused: existing sidecars use 3090 (role-pack), 3091 (context-pack), 3092 (cohesion).'
  - OPP-1 (DB-level partial unique index for conflict detection) deferred — logged to KB in ELAB.
  - OPP-2 (rules_registry_promote MCP wrapper) deferred — logged to KB in ELAB.
  - No frontend changes. No infra changes.
