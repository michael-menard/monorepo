critical_decisions:
  - "Dispatcher MUST be conditional edge function (Send[]), NOT a node — implements createBatchProcessDispatcher as function returning Send[], not async (state) => Promise<Partial<State>>"
  - "append reducer MUST be used for workerResults, errors[], warnings[] — never use overwrite on these fields"
  - "Injectable stubs are config-based (z.unknown().optional()), NEVER imported directly — graph checks 'if (config.nodeProperty)' before invocation"
  - "Per-story retry logic uses dedicated retryCount field in BatchWorkerResult, not shared state — avoids reducer conflicts across parallel workers"
  - "Thread ID convention: ${batchId}:batch-process:${attempt} — required for checkpointer support"

