  - id: 2
    subtask_id: ST-2
    description: >
      Author .claude/config/escalation-rules.yaml: create the file with (1) meta block with
      version, created, owner_story, tier_definitions_source; (2) graduated_chain with exactly
      3 rules (Local→API-Cheap, API-Cheap→API-Mid, API-Mid→API-High); (3) hard_bypass with
      exactly 2 rules (security_or_architecture→API-High, critical→API-High); (4) escalation_log_schema
      with all 8 fields and correct types/required markers; (5) inline comments on failure_count: 2
      and confidence_threshold: 0.70 referencing WINT-0270.
    files:
      - .claude/config/escalation-rules.yaml
    files_to_read:
      - .claude/config/decision-classification.yaml
    dependencies:
      - 1
    slice: config
    verification: >
      python3 -c "import yaml, sys; yaml.safe_load(open('.claude/config/escalation-rules.yaml'))" &&
      echo "YAML valid" — must exit 0 with no parse errors.
    acs_covered:
      - AC-1
      - AC-2
      - AC-3
      - AC-4
      - AC-6

  - id: 3
    subtask_id: ST-3
    description: >
      Add README comment block at top of escalation-rules.yaml covering all 4 required topics:
      (1) purpose of the file, (2) which component reads it (llm-router, WINT-0230),
      (3) how to tune thresholds, (4) what to do when WINT-0270 benchmarks are available.
      Then perform final content audit: count rules, verify field counts, confirm tier name
      consistency, validate YAML syntax one final time.
    files:
      - .claude/config/escalation-rules.yaml
    files_to_read:
      - .claude/config/escalation-rules.yaml
    dependencies:
      - 2
    slice: config
    verification: >
      python3 -c "import yaml, sys; yaml.safe_load(open('.claude/config/escalation-rules.yaml'))" &&
      echo "Final YAML valid" — must exit 0; manually confirm comment block covers all 4 topics.
    acs_covered:
      - AC-8

files_to_change:
  - path: .claude/config/escalation-rules.yaml
    action: create
    reason: Primary deliverable — declarative escalation rules for multi-model routing (graduated chain + hard bypass + log schema)

commands_to_run:
  - command: "python3 -c \"import yaml; yaml.safe_load(open('.claude/config/escalation-rules.yaml'))\""
    when: after file creation
    required: true
  - command: "ls .claude/config/"
    when: after file creation
    required: true

acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: >
      File exists at .claude/config/escalation-rules.yaml; meta block present with
      version, created, owner_story: WINT-0250, tier_definitions_source: .claude/config/model-strategy.yaml
    evidence_type: file

  - ac_id: AC-2
    planned_evidence: >
      graduated_chain section contains exactly 3 rules:
      (1) from: Local, trigger: failure_count, threshold: 2, to: API-Cheap;
      (2) from: API-Cheap, trigger: confidence_below, threshold: 0.70, to: API-Mid;
      (3) from: API-Mid, trigger: failure_or_uncertainty, to: API-High
    evidence_type: file

  - ac_id: AC-3
    planned_evidence: >
      hard_bypass section contains exactly 2 rules:
      (1) condition: task_decision_type, value: security_or_architecture, to: API-High;
      (2) condition: task_label, value: critical, to: API-High
    evidence_type: file

  - ac_id: AC-4
    planned_evidence: >
      escalation_log_schema section defines all 8 fields with correct types and required/optional markers:
      from_tier (string, required), to_tier (string, required), task_type (string, required),
      reason (string, required), failure_count (integer, optional), confidence_score (float, optional),
      timestamp (ISO 8601 datetime, required), bypass_rule (boolean, required)
    evidence_type: file

  - ac_id: AC-5
    planned_evidence: >
      Tier names (Local, API-Cheap, API-Mid, API-High) match index-documented defaults from WINT-0220
      story entry; TODO comment present noting alignment required when WINT-0220 completes;
      model-strategy.yaml confirmed absent before file creation
    evidence_type: file

  - ac_id: AC-6
    planned_evidence: >
      Inline YAML comments present on failure_count: 2 and confidence_threshold: 0.70 explaining
      rationale, tuning guidance, and reference to WINT-0270 benchmark calibration
    evidence_type: file

  - ac_id: AC-7
    planned_evidence: >
      ls .claude/config/ confirms directory exists and contains only the expected files;
      no other files modified; only escalation-rules.yaml is new
    evidence_type: command

  - ac_id: AC-8
    planned_evidence: >
      Top-of-file YAML comment block covers all 4 required topics:
      purpose, which component reads it (llm-router/WINT-0230), how to tune thresholds,
      what to do after WINT-0270 benchmarks land
    evidence_type: file

