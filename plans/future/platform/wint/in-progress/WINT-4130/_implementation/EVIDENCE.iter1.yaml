known_deviations:
  - id: DEV-001
    title: wint schema absent — WINT-4030 and WINT-4050 not run
    severity: critical
    description: >-
      The wint schema (graph.features, graph.epics, graph.feature_capabilities, wint.rules) does not exist in the
      development PostgreSQL instance. WINT-4030 (graph population script) and WINT-4050 (cohesion rules seeding) are in
      needs-code-review state and have not been applied. This means all pre-flight checks fail and no live detection
      validation is possible.
    impact: AC-1 FAIL, AC-2 MISSING, AC-3 MISSING, AC-4 PARTIAL (agent ran but found 0 features)
    recommendation: >-
      Run WINT-4030 to apply schema and populate graph data, then run WINT-4050 to seed rules. Re-run WINT-4130
      validation after both complete.
    owner_story: WINT-4030
    owner_story_secondary: WINT-4050
    blocking: false
    note: Story designed for this degradation path (ARCH-003). Not a defect in this story.
  - id: DEV-002
    title: graph-checker.agent.md tool-to-function mismatch — fundamental design gap
    severity: high
    description: >-
      The graph-checker agent specifies tools: [Read, Grep, Glob] — filesystem tools only. Its Phase 2 execution
      contract requires calling graph_get_franken_features(), rulesRegistryGet(), and graph_get_capability_coverage()
      via 'direct-call pattern (ARCH-001)' — TypeScript functions that query the database. A filesystem-only agent
      cannot execute TypeScript imports or connect to PostgreSQL. The agent specification contains an irreconcilable
      internal inconsistency: it cannot do both. When invoked as a general-purpose Claude agent, the agent must produce
      graph-check-results.json by reasoning about what the functions WOULD return rather than actually calling them. In
      an empty-graph environment this produces correct degraded output, but in a populated environment it would produce
      fictitious results.
    impact: >-
      AC-4 cannot be fully verified with live data. In a populated environment, the agent would fabricate violation data
      rather than querying the DB. The ARCH-001 direct-call pattern cannot be implemented by a Claude agent with only
      file-system tools.
    recommendation: >-
      Fix in WINT-4060: Either (a) change the agent to use a 'Bash' tool to invoke a TypeScript runner script that calls
      the DB functions and writes results, or (b) implement the graph-checker as a LangGraph node (the intended end
      state per porting notes in the agent spec) that has actual DB access, or (c) add a pre-written JSON fixture file
      approach where a TypeScript script is run first and the agent reads the output file.
    owner_story: WINT-4060
    blocking: false
    note: >-
      In the current empty-graph environment, this gap is masked — the agent correctly produces a degraded result that
      matches the spec. The gap only becomes critical when graph data is populated and live detection is expected.
  - id: DEV-003
    title: upload-without-replace fixture not identifiable via CRUD_STAGES
    severity: medium
    description: >-
      The CRUD_STAGES constant in graph-get-franken-features.ts is ['create','read','update','delete']. The 'upload' and
      'replace' stage names are NOT in CRUD_STAGES. graph_get_franken_features() will never report a feature as missing
      'upload' or 'replace' — it only checks for the 4 CRUD stages. To identify upload-without-replace fixtures, a
      direct query to graph.feature_capabilities filtering by lifecycleStage = 'upload' would be required. The story's
      AC-2 fixture (upload-without-replace) cannot be detected by the graph-checker's primary tool.
    impact: >-
      AC-2 cannot be satisfied by the designed detection mechanism (graph_get_franken_features). The
      upload-without-replace franken-feature pattern is not detectable by the current tooling. This may indicate a
      mismatch between the story's fixture definitions and the implementation.
    recommendation: >-
      Clarify in WINT-4060 whether 'upload' and 'replace' are intended as additional lifecycle stages beyond CRUD, and
      if so, extend CRUD_STAGES accordingly. Alternatively, remove upload-without-replace from AC-2 and replace with a
      CRUD-based fixture (e.g., read-without-update).
    owner_story: WINT-4060
    owner_story_secondary: WINT-4030
    blocking: false
  - id: DEV-004
    title: graph-checker agent model (haiku) may have reduced reasoning for complex rule evaluation
    severity: low
    description: >-
      The graph-checker agent specifies model: haiku. For Phase 3 rule evaluation (matching feature_completeness rules
      against franken-features and generating actionable_hints), haiku may produce lower-quality hints than sonnet. This
      is a known tradeoff documented in the agent spec.
    impact: Minor — actionable_hint quality may be reduced. Not a blocking issue.
    recommendation: Monitor hint quality when graph data is available. Upgrade to sonnet if hint quality is insufficient.
    owner_story: WINT-4060
    blocking: false
