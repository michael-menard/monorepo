    ac_id: AC-2
    severity: high
    description: >-
      'upload' and 'replace' not in CRUD_STAGES=['create','read','update','delete']. Upload-without-replace fixture
      cannot be detected by graph_get_franken_features.
    owner: WINT-4060
    blocking: false
    resolution: Extend CRUD_STAGES to include 'upload'/'replace' or redefine AC-2 fixture to use CRUD-based stages.
