    severity: high
    description: >-
      graph-checker.agent.md specifies tools:[Read,Grep,Glob] but requires TypeScript DB function calls (ARCH-001).
      Filesystem-only agent cannot query PostgreSQL. In populated environment would produce fictitious results.
    owner: WINT-4060
    blocking: false
    resolution: Add Bash tool to agent spec to invoke a TypeScript runner script, or implement as LangGraph node with DB access.
