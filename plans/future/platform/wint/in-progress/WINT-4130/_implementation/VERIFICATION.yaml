lessons_to_record:
  - lesson: >-
      Spike stories that validate multi-layer dependency chains (A depends on B depends on C) need explicit environment
      readiness gates. WINT-4130 was gated on WINT-4030+WINT-4050+WINT-4060 all being applied in the same dev
      environment. When any upstream story is in needs-code-review or failed-code-review, the validation story will fail
      its pre-flight regardless of its own correctness.
    category: blocker
    tags:
      - spike
      - integration-validation
      - environment-readiness
      - dependency-chain
  - lesson: >-
      Agent tool declarations must be consistent with the agent's execution contract. graph-checker.agent.md declares
      tools:[Read,Grep,Glob] but its Phase 2 requires calling TypeScript DB functions (ARCH-001 direct-call pattern).
      This inconsistency is masked in empty-graph environments but becomes a critical correctness gap when data exists.
      Always verify that agent tool declarations can actually satisfy the agent's data access requirements.
    category: anti_pattern
    tags:
      - agents
      - tool-declarations
      - arch-001
      - graph-checker
      - WINT-4060
  - lesson: >-
      CRUD_STAGES constant defines detection scope. When a story's fixture definitions reference stage names not in
      CRUD_STAGES (e.g., 'upload', 'replace'), the primary detection tool will silently miss those fixtures. Stage name
      alignment between fixture requirements and the detection constant must be validated before writing ACs.
    category: blocker
    tags:
      - graph-checker
      - CRUD_STAGES
      - fixture-definitions
      - AC-design
      - WINT-4060
  - lesson: >-
      For validation/spike stories, the QA-verify step must clearly distinguish between 'the story produced correct
      deliverables' and 'the acceptance criteria were satisfied'. WINT-4130 produced complete, correct deliverables
      (EVIDENCE.yaml, VERIFICATION.md, graph-check-results.json) but AC-1/2/3 FAIL because environment pre-conditions
      were not met. These are fundamentally different failure modes.
    category: pattern
    tags:
      - qa-verify
      - spike
      - validation-story
      - deliverable-vs-AC
