# ─── Issues ───────────────────────────────────────────────────────────────────────
issues:
  - issue_id: ISSUE-1
    ac: AC-7
    severity: HIGH
    description: >
      Step 2.5 at line 77 states the DB write ALWAYS executes regardless of
      --update-status. The required guard clause that skips Step 2.5 when
      --update-status is provided is absent. This causes a double-write: both
      Step 2.5 (shimUpdateStoryStatus) and /story-update (via Step 4 delegation)
      would write to the DB. AC-7 explicitly requires the guard clause and
      db_updated: skipped behavior for this path. Step 4 (line 138) contradicts
      Step 2.5 by claiming no double-write — the command is internally inconsistent.
    fix_required: >
      Add a guard clause at the top of Step 2.5 (before the independence prose):
      "If --update-status was provided, skip this step entirely — set db_updated:
      skipped and proceed to Step 3. The DB write will be handled by /story-update
      in Step 4 (no double-write)." Remove the "ALWAYS executes" statement at line 77.

  - issue_id: ISSUE-2
    ac: AC-5
    severity: MEDIUM
    description: >
      AC-5 lists needs-code-review, failed-code-review, and failed-qa as examples
      of stages that should skip the DB write. The implementation includes all three
      in the SWIM_LANE_TO_STATE inline table and will attempt DB writes for them.
      The implementation is correct relative to the canonical __types__/index.ts
      constant (which does map these stages), but it violates AC-5 as written.
    fix_required: >
      AC CORRECTION (not implementation fix): Update AC-5 in WINT-1060.md to remove
      needs-code-review, failed-code-review, and failed-qa from the "unmapped" examples.
      These stages ARE mapped in the canonical SWIM_LANE_TO_STATE constant. The correct
      unmapped stages are: created, elaboration. Story file update required.

  - issue_id: ISSUE-3
    ac: AC-4
    severity: LOW
    description: >
      EVIDENCE.yaml and prior QA-VERIFY.yaml both claimed the inline table has "5 mapped
      stages." The actual table has 8 entries. The '5 entries' claim is factually wrong
      and indicates the prior verifier did not read the implementation file accurately.
      The implementation is correct; the evidence documentation is inaccurate.
    fix_required: >
      Update EVIDENCE.yaml notes for AC-4 to reflect the correct 8-entry table count.
      No code change required.

# ─── Gate Decision ────────────────────────────────────────────────────────────────
gate:
  decision: FAIL
  reason: >
    AC-7 (HIGH severity): The --update-status guard clause required to prevent
    double-write is absent from Step 2.5. Line 77 explicitly states the opposite
    of what AC-7 requires. This is a functional correctness issue in the command's
    prose that executing agents will follow.

    AC-5 (MEDIUM severity): The implementation maps needs-code-review,
    failed-code-review, and failed-qa to DB states, but AC-5 lists them as
    examples of unmapped stages that should skip the DB write. The AC text must
    be corrected or the implementation must be changed.

    2 issues require resolution before UAT PASS can be granted.
  blocking_issues:
    - ISSUE-1  # AC-7: missing --update-status guard clause (HIGH)
    - ISSUE-2  # AC-5: unmapped-stage examples contradict implementation (MEDIUM)

# ─── Lessons to Record ────────────────────────────────────────────────────────────
lessons_to_record:
  - lesson: >
      For docs-only stories, evidence claims about line numbers and table entry counts
      must be verified against the actual file. The prior QA pass misread line 77 of
      story-move.md — "This step ALWAYS executes" was mistakenly described as a guard
      clause. Independent verification must read the primary artifact, not just trust
      EVIDENCE.yaml descriptions.
    category: qa-process
    tags: ["qa-verify", "docs", "evidence-first", "independent-verification"]

  - lesson: >
      AC-5 examples for unmapped stages in WINT-1060 were written before the canonical
      SWIM_LANE_TO_STATE constant was confirmed. When writing ACs, unmapped-stage
      examples should be derived directly from the canonical __types__ source — not
      from assumptions. This caused an AC-vs-implementation divergence that required
      story AC correction rather than implementation fix.
    category: specification
    tags: ["ac-quality", "swim-lane", "canonical-source", "wint"]

  - lesson: >
      Internal contradictions within a command file are a category of defect unique
      to docs stories. Step 2.5 (line 77) said ALWAYS executes while Step 4 (line 138)
      said no double-write occurs. These contradictions will confuse executing agents.
      QA for docs stories must check for prose consistency across all steps, not just
      check individual ACs in isolation.
    category: qa-process
    tags: ["docs", "markdown-command", "internal-consistency", "qa-verify"]

