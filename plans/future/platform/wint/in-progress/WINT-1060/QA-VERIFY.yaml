  - ac_id: AC-3
    status: PASS
    evidence_ref: "story-move.md lines 105-107"
    notes: >
      Confirmed: Null-return branch logs warning via @repo/logger ('DB write failed
      for {STORY_ID}. Proceeding with directory mv.') and sets db_updated = false.
      Execution continues to Step 3 mv. No abort on DB failure.

  - ac_id: AC-4
    status: FAIL
    evidence_ref: "story-move.md lines 83-93; __types__/index.ts lines 30-40"
    notes: >
      PARTIAL FAIL — SCOPE DEVIATION FROM AC TEXT:

      AC-4 states: "The TO_STAGE → DB state conversion uses SWIM_LANE_TO_STATE from
      packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts — no
      hardcoded state mapping in the command. The mapping is documented inline in the
      command as a lookup table."

      The inline table IS present (pass for no-hardcoding requirement). However the
      inline table in story-move.md (lines 83-93) contains 8 entries (all stages
      except done and unmapped-only stages). The EVIDENCE.yaml claimed "5 mapped
      stages" but the actual implementation has 8. The 8-entry table CORRECTLY matches
      the canonical __types__/index.ts SWIM_LANE_TO_STATE constant (minus done which
      is appropriately noted as excluded). No hardcoded state strings exist.

      VERDICT: The no-hardcoding requirement passes. The '5 entries' claim in
      EVIDENCE.yaml and prior QA-VERIFY.yaml is factually wrong (8 entries exist)
      but the implementation is correct relative to the canonical source. MARKING FAIL
      because the EVIDENCE.yaml discrepancy indicates the prior verifier did not
      actually count the table entries — this undermines evidence integrity. The
      implementation itself is acceptable.

      Actual table entries in story-move.md:
        backlog → backlog
        ready-to-work → ready_to_work
        in-progress → in_progress
        needs-code-review → ready_for_review
        failed-code-review → failed_code_review
        ready-for-qa → ready_for_qa
        failed-qa → failed_qa
        UAT → in_qa

  - ac_id: AC-5
    status: FAIL
    evidence_ref: "story-move.md lines 83-93, 112; WINT-1060.md AC-5 definition"
    notes: >
      DIRECT AC VIOLATION:

      AC-5 states: "If TO_STAGE does not have a SWIM_LANE_TO_STATE entry (e.g.,
      needs-code-review, failed-code-review, failed-qa, created, elaboration), the DB
      write step is skipped with a logged warning, and the directory mv proceeds
      normally."

      The AC explicitly names needs-code-review, failed-code-review, and failed-qa
      as examples of unmapped stages that should SKIP the DB write.

      However, the actual story-move.md SWIM_LANE_TO_STATE inline table (lines 83-93)
      INCLUDES these three stages with DB state mappings:
        needs-code-review → ready_for_review
        failed-code-review → failed_code_review
        failed-qa → failed_qa

      So when TO_STAGE is needs-code-review, failed-code-review, or failed-qa, the
      implementation will ATTEMPT a DB write (not skip it). The unmapped-stage branch
      at line 112 only covers created and elaboration.

      NOTE: The implementation is technically MORE correct than AC-5 specifies —
      these stages DO exist in the canonical SWIM_LANE_TO_STATE constant. The story's
      AC-5 examples appear to have been written before the canonical constant was
      confirmed. The implementation follows the canonical source (__types__/index.ts)
      which is the right behavior. However this is an AC violation and must be flagged.

      RESOLUTION OPTIONS:
        a) Update AC-5 to remove needs-code-review, failed-code-review, failed-qa
           from the "unmapped" examples — these stages ARE mapped in the canonical
           constant. This would be an AC correction (not an implementation fix).
        b) Change implementation to skip DB write for those stages (makes it worse).
      Option (a) is recommended, but that requires story update, not code change.

  - ac_id: AC-6
    status: PASS
    evidence_ref: "story-move.md lines 150-155"
    notes: >
      Confirmed: Step 5 return YAML includes 'db_updated: true | false | skipped'
      with inline comments documenting all 3 trigger conditions:
        true = shimUpdateStoryStatus returned non-null (DB write succeeded)
        false = shimUpdateStoryStatus returned null (DB unavailable); mv proceeded
        skipped = TO_STAGE has no DB state mapping (unmapped stage)
      All 3 values documented. AC-6 PASS.

  - ac_id: AC-7
    status: FAIL
    evidence_ref: "story-move.md line 77; WINT-1060.md AC-7 definition"
    notes: >
      DIRECT AC VIOLATION — CONTRADICTORY PROSE:

      AC-7 states: "When --update-status is provided, Step 2.5 DB write is skipped
      (to avoid double-write; WINT-1050's /story-update handles the DB write for
      that path), and db_updated: skipped is reported."

      EVIDENCE.yaml for AC-7 claimed: "Step 2.5 opens with: 'If the --update-status
      flag was provided, skip this step entirely — the DB write will be handled by
      /story-update in Step 4.'"

      The PRE-EXISTING QA-VERIFY.yaml (line 59) confirmed: "Line 77 — --update-status
      guard clause at top of Step 2.5 sets db_updated: skipped and skips to Step 3."

      ACTUAL content at line 77 of story-move.md:
      "**This step ALWAYS executes for mapped stages**, regardless of whether
      --update-status was provided. The --update-status flag only controls Step 4
      (frontmatter + index update), not the DB write."

      This is the OPPOSITE of what AC-7 requires. The prior EVIDENCE.yaml and
      QA-VERIFY.yaml both described a guard clause that does NOT exist. The
      implementation performs a DB write even when --update-status is provided,
      causing the double-write scenario that AC-7 explicitly prohibits.

      Step 4 (line 138) acknowledges "no double-write occurs" and "db_updated is
      reported as skipped" — but Step 2.5 (line 77) says it ALWAYS executes,
      making Step 4's claim internally inconsistent with Step 2.5.

      This is a genuine AC violation that the prior verification agent missed by
      misreading line 77 as a guard clause when it is actually the opposite.

  - ac_id: AC-8
    status: PASS
    evidence_ref: "story-move.md lines 170-183"
    notes: >
      Confirmed: MOVE COMPLETE, MOVE SKIPPED: <reason>, MOVE FAILED: <reason>
      signals are present and unchanged. Error Handling table is fully preserved
      (lines 170-177). No new signals added. All existing error conditions retained.

  - ac_id: AC-9
    status: PASS
    evidence_ref: "story-move.md lines 41-64"
    notes: >
      Confirmed: Step 1 starts with 'DB-first lookup (WINT-1060)' section at line 41.
      shimGetStoryStatus is called first (line 44). Non-null result uses DB state
      (line 47). Null result triggers directory fallback (line 50). MOVE FAILED only
      when neither DB nor directory finds the story (line 64). AC-9 PASS.

  - ac_id: AC-10
    status: PASS
    evidence_ref: "story-move.md line 79"
