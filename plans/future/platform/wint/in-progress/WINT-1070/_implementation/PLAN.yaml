architectural_decisions:
  - id: ARCH-001
    question: "getAllStories() return type: StoryRow[] (raw DB rows) vs StoryArtifact[] (mapped)"
    decision: "StoryRow[] — raw DB rows"
    rationale: "Script needs DB-native field names directly without rowToStoryArtifact() overhead. StoryArtifact discards fields the script doesn't need and requires acs/risks stubs. StoryRow.state retains underscore format (ready_to_work) which STATE_TO_DISPLAY_LABEL converts — consistent with AC-4. Decision recorded in ST-1 of story file."
    decided_by: story_author

  - id: ARCH-002
    question: "--verify diff algorithm: use 'diff' npm package or inline implementation?"
    decision: "Inline line-by-line comparison — no new npm dependency"
    rationale: "The 'diff' package is not present in orchestrator's package.json dependencies. AC-8 explicitly states: 'if not available, implement an inline line-by-line comparison — no new npm dependencies may be added without confirming absence of diff in the workspace first.' Confirmed absent."
    decided_by: agent_autonomous

complexity: moderate

notes:
  - "STORY_STATE_ENUM constant must be defined first in ST-2 from a live DB audit of SELECT unnest(enum_range(NULL::wint.story_state)) before any rendering code is written (AC-13 gating requirement)"
  - "The stories.index.md Progress Summary table uses hyphened display labels (ready-to-work, in-progress) even though DB stores underscore format (ready_to_work, in_progress) — STATE_TO_DISPLAY_LABEL handles this conversion"
  - "Atomic write pattern: write to temp file then fs.rename() to prevent partial writes on large files (143+ stories)"
  - "YAML fallback is fail-soft: if StoryFileAdapter.read() throws StoryNotFoundError or ValidationError, render fields as dash (—) and log a warning, continue processing"
  - "stories.index.md created_at must be PRESERVED from the existing file — only updated_at should reflect the generation timestamp"
  - "No 'diff' npm package in orchestrator workspace — inline line-by-line comparison for --verify mode"
  - "Integration tests must use a real DB fixture (not mocks) per AC-11 test plan requirement"
  - "StoryFileAdapter is imported from '../adapters/story-file-adapter.js' per populate-story-status.ts pattern"
  - "generation-report.json is written to process.cwd() by default (same pattern as migration-log.json in populate-story-status.ts)"
