strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "createNode() factory produces isolated NodeCircuitBreaker per registration"
    setup: "Import createNode from packages/backend/orchestrator/src/runner/node-factory.ts; create two distinct node registrations for the same node type"
    action: "Register nodeA = createNode(llmConfig, implA) and nodeB = createNode(llmConfig, implB); force nodeA to OPEN state by exhausting failures; invoke nodeB"
    expected: "nodeB executes successfully — its circuit breaker is independent of nodeA's OPEN state"
    evidence: "Vitest unit test in packages/backend/orchestrator/src/runner/__tests__/; assert nodeB.status === 'success' while nodeA returns NodeCircuitOpenError"

  - id: HP-2
    title: "RETRY_PRESETS.llm applied by default when createLLMNode() is used"
    setup: "Import createLLMNode from node-factory.ts; create a node that returns a transient error on first call, succeeds on second"
    action: "Invoke the node once"
    expected: "Node retries transparently using RETRY_PRESETS.llm settings (maxAttempts: 3, backoff: exponential) and returns success on second attempt"
    evidence: "Vitest unit test with vi.useFakeTimers() asserting retry count and success result"

  - id: HP-3
    title: "classifyError() is the sole retry decision point"
    setup: "Create a node configured with createNode(); trigger a validation error (non-retryable) and a network error (retryable)"
    action: "Invoke node with each error type"
    expected: "Validation error is not retried (classified as non-retryable by classifyError); network error triggers retry"
    evidence: "Vitest unit test asserting attempt count: 1 for validation error, >1 for network error"

  - id: HP-4
    title: "NodeRetryExhaustedError routes to blocked flag in GraphState"
    setup: "Create a LangGraph node using createNode() configured with maxAttempts: 2; mock implementation to always fail with a retryable error; construct minimal GraphState with routing fields"
    action: "Invoke the node until retries exhausted"
    expected: "Node returns a state update with routing flag set to 'blocked', not an unhandled thrown exception"
    evidence: "Integration test in __tests__/integration.test.ts asserting returned state.routing === 'blocked' and error code present"

  - id: HP-5
    title: "Circuit breaker OPEN state returns blocked state with CIRCUIT_OPEN code"
    setup: "Create a node using createNode() with failureThreshold: 2; inject 2 failures to trigger OPEN state"
    action: "Attempt a third invocation while circuit is OPEN"
    expected: "Execution is blocked; returned GraphState update contains routing: 'blocked' and code: 'CIRCUIT_OPEN'"
    evidence: "Integration test driving node to exhaustion, asserting CIRCUIT_OPEN code in state update (AC-6 requirement)"

  - id: HP-6
    title: "Middleware accessible via documented import path"
    setup: "From a new test file outside the runner directory, attempt to import createNode, NodeCircuitBreaker, withNodeRetry, RETRY_PRESETS, classifyError"
    action: "Perform the imports and invoke a simple node creation"
    expected: "All imports resolve without error; createNode produces a callable node function"
    evidence: "TypeScript compilation passes (pnpm check-types --filter @repo/orchestrator); no TS errors"

  - id: HP-7
    title: "All existing runner tests pass without modification after changes"
    setup: "Run existing runner test suite without any modifications to existing test files"
    action: "pnpm test --filter @repo/orchestrator run packages/backend/orchestrator/src/runner/__tests__/"
    expected: "All existing tests pass; no regressions introduced"
    evidence: "Test output showing 0 failed tests in the runner __tests__/ directory"

error_cases:
  - id: EC-1
    title: "Non-retryable error (validation/programming) does not trigger retry loop"
    setup: "Create node with createNode(); implementation throws NodeExecutionError with category 'validation'"
    action: "Invoke node once"
    expected: "classifyError() returns isRetryable: false; node fails immediately without retry; attempt count: 1"
    evidence: "Vitest unit test asserting attempt count === 1 and error category === 'validation'"

  - id: EC-2
    title: "HALF_OPEN recovery path succeeds after circuit resets"
    setup: "Create node with createNode() with failureThreshold: 2, resetTimeout: 100ms; drive to OPEN state; wait for resetTimeout to elapse"
    action: "Send a probe request (first request after reset window)"
    expected: "Circuit enters HALF_OPEN state; probe succeeds → circuit closes (CLOSED state); subsequent requests execute normally"
    evidence: "Integration test with vi.useFakeTimers() advancing past resetTimeout; assert circuit state transitions: OPEN → HALF_OPEN → CLOSED"

  - id: EC-3
    title: "HALF_OPEN probe failure re-opens circuit"
    setup: "Drive circuit to OPEN; wait resetTimeout; send probe that fails"
    action: "Invoke probe request with failing implementation"
    expected: "Circuit remains OPEN (does not close on probe failure); subsequent requests still blocked"
    evidence: "Integration test asserting circuit state === OPEN after failed HALF_OPEN probe"

  - id: EC-4
    title: "Rate limit error triggers retry with backoff"
    setup: "Create LLM node; implementation returns NodeExecutionError with category 'rate_limit'"
    action: "Invoke node; observe retry behavior"
    expected: "classifyError() classifies rate_limit as retryable; node retries with exponential backoff per RETRY_PRESETS.llm"
    evidence: "Vitest test with vi.useFakeTimers() asserting multiple attempts and backoff intervals"

  - id: EC-5
    title: "Timeout error is classified and handled correctly"
    setup: "Create node with short timeout config; implementation hangs past timeout threshold"
    action: "Invoke node"
    expected: "NodeTimeoutError is thrown; classifyError classifies as retryable timeout; retry proceeds per preset"
    evidence: "Vitest test asserting NodeTimeoutError is thrown and retry is attempted"

edge_cases:
  - id: ED-1
    title: "Two nodes of same type have independent circuit breaker state"
    setup: "Register nodeA and nodeB both using createLLMNode(); exhaust nodeA failures until circuit OPEN"
    action: "Invoke nodeB with a succeeding implementation"
    expected: "nodeB succeeds without being affected by nodeA's OPEN circuit"
    evidence: "Unit test asserting nodeB returns success result while nodeA is blocked"

  - id: ED-2
    title: "RETRY_PRESETS.tool and RETRY_PRESETS.validation differ from llm preset"
    setup: "Inspect RETRY_PRESETS values for all three types"
    action: "Assert that maxAttempts and backoff differ between presets per spec"
    expected: "Each preset has distinct values appropriate to node type (tool: fewer retries, validation: no retry)"
    evidence: "Unit test asserting RETRY_PRESETS.llm.maxAttempts != RETRY_PRESETS.tool.maxAttempts"

  - id: ED-3
    title: "Gap analysis document or coverage confirmation produced"
    setup: "Read WINT-9105 ADR from packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md; read runner implementation files"
    action: "Compare WINT-9105 requirements against circuit-breaker.ts, retry.ts, node-factory.ts capabilities"
    expected: "A gap analysis artifact is produced (either documenting gaps to close, or confirming full coverage)"
    evidence: "Gap analysis document exists at a documented path OR story notes confirm full coverage with inline evidence"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "NodeCircuitBreaker instance isolation: separate instance per createNode() call"
      - "RETRY_PRESETS values match per-type spec (llm, tool, validation)"
      - "classifyError() return value determines retry decision in withNodeRetry"
      - "GraphState routing flag set to 'blocked' on retry exhaustion"
      - "GraphState code set to 'CIRCUIT_OPEN' when circuit breaker is OPEN"
      - "TypeScript: zero errors on pnpm check-types --filter @repo/orchestrator"
      - "ESLint: zero errors on new/changed files"
      - "Test coverage: >= 80% on new/changed code (pnpm test --coverage)"
      - "All existing runner tests pass (pnpm test --filter @repo/orchestrator)"

manual_cases:
  - id: MC-1
    title: "Verify WINT-9105 gap analysis against existing runner implementation"
    steps:
      - "Read the WINT-9105 ADR at packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"
      - "Review packages/backend/orchestrator/src/runner/circuit-breaker.ts, retry.ts, node-factory.ts, types.ts"
      - "For each WINT-9105 requirement, identify whether it is satisfied by existing code"
      - "Document any gaps as separate tasks; confirm coverage if no gaps found"
    expected: "Gap analysis or coverage confirmation exists and is referenced in story implementation notes"

fixture_definitions:
  - name: "FailingNodeImpl"
    type: "function"
    description: "A node implementation that always throws a configurable error type; used to drive retry and circuit breaker states"
  - name: "TransientFailNodeImpl"
    type: "function"
    description: "Node implementation that fails N times then succeeds; used to verify retry + eventual success"
  - name: "MinimalGraphState"
    type: "object"
    description: "Minimal LangGraph GraphState with routing and error fields for verifying state update behavior"

risks:
  - "WINT-9105 ADR may not yet be committed — if adr-langgraph-error-handling.md doesn't exist, AC-1 gap analysis must proceed against the story specification only"
  - "HALF_OPEN timing tests are fragile with real timers; use vi.useFakeTimers() in unit scope per ADR-005 guidance"
  - "If workflow-logic re-exports are added (AC-7), ensure no barrel files are created and TypeScript path resolution is verified"
  - "Integration test for AC-6 (CIRCUIT_OPEN → blocked state) requires a proper GraphState stub that matches the actual interface — verify with WINT-9110 target schema if available"
