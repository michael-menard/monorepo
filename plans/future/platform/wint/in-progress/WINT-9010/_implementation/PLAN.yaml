architectural_decisions:
  - id: ARCH-001
    question: "Should the new package use the same tsconfig pattern as mcp-tools (extends root, NodeNext resolution) or the orchestrator pattern (standalone, ES2022 target)?"
    decision: "Use mcp-tools pattern — extends root tsconfig with NodeNext module resolution and composite: true. The orchestrator pattern is standalone due to its direct TS execution needs; workflow-logic is a library package, same category as mcp-tools."
    rationale: "workflow-logic is a shared library (not a runnable script), so it mirrors the mcp-tools tsconfig pattern: extends root, NodeNext resolution, composite:true, declaration:true. This ensures consistent compile-time interop for both consumers (mcp-tools and orchestrator)."
    decided_by: auto
    tier: 1

  - id: ARCH-002
    question: "Should getStatusFromDirectory return WorkflowStoryStatus or a subset type? The SWIM_LANE_TO_STATE in mcp-tools maps only 6 directories to snake_case values — there is no 1:1 mapping for all 17 WorkflowStoryStatus values."
    decision: "getStatusFromDirectory returns WorkflowStoryStatus | null. The mapping covers the 6 swim-lane directories only (backlog→pending, ready-to-work→ready-to-work, in-progress→in-progress, ready-for-qa→ready-for-qa, UAT→uat, done→completed). Unknown directories return null. The function replaces the SWIM_LANE_TO_STATE lookup in the shim — it does NOT need to cover all 17 statuses, only the directories that exist on disk."
    rationale: "The current SWIM_LANE_TO_STATE in story-compatibility maps 6 directories to DB snake_case states. getStatusFromDirectory is the canonical hyphenated equivalent. Returning null for unknown dirs matches the existing behavior (no entry in SWIM_LANE_TO_STATE). The AC-3 description explicitly lists the 7 directories to map (backlog, elaboration, ready-to-work, in-progress, ready-for-qa, UAT, done) — elaboration maps to in-elaboration."
    decided_by: auto
    tier: 1

  - id: ARCH-003
    question: "For AC-7, which specific import(s) in story-compatibility/__types__/index.ts should be replaced by @repo/workflow-logic imports?"
    decision: "Replace STORY_ID_REGEX with isValidStoryId from @repo/workflow-logic. SWIM_LANE_TO_STATE can remain local in story-compatibility (it is tightly coupled to the snake_case DB model used by the shim) — it does NOT duplicate getStatusFromDirectory which operates in the WorkflowStoryStatus domain. This satisfies 'at least one existing function' per AC-7 without over-migrating."
    rationale: "STORY_ID_REGEX is a pure validation primitive with no DB coupling — isValidStoryId is its direct replacement. SWIM_LANE_TO_STATE is structurally different: it maps to snake_case DB values (not WorkflowStoryStatus), so it is NOT a duplicate of getStatusFromDirectory. Replacing STORY_ID_REGEX usage with isValidStoryId satisfies AC-7 cleanly. The mcp-tools team can replace SWIM_LANE_TO_STATE with getStatusFromDirectory + toDbStoryStatus in WINT-9020+ once the full migration path is validated."
    decided_by: auto
    tier: 1

complexity: moderate

notes:
  - "No Subtasks section in story file — steps generated from ACs and SCOPE.yaml analysis."
  - "The 17 WorkflowStoryStatus values come from story-state-machine.ts StoryStatusSchema — use these exact string literals."
  - "The 8 DbStoryStatus values (snake_case) come from mcp-tools __types__/index.ts state enums: backlog, ready_to_work, in_progress, ready_for_qa, in_qa, blocked, done, cancelled."
  - "toDbStoryStatus mapping: pending→backlog, generated→backlog, in-elaboration→backlog, needs-refinement→backlog, needs-split→backlog, ready-to-work→ready_to_work, in-progress→in_progress, ready-for-code-review→in_progress, code-review-failed→in_progress, ready-for-qa→ready_for_qa, in-qa→in_qa, needs-work→in_progress, uat→in_qa, completed→done, blocked→blocked, cancelled→cancelled, superseded→cancelled."
  - "STORY_ID_REGEX in story-compatibility is /^[A-Z]{2,10}-\\d{3,4}$/ — the shared isValidStoryId must maintain the same pattern for backward compat. ELAB noted extending to \\d{3,5} is low-priority; keep at \\d{3,4} for this story."
  - "Package must be ESM (type: module) to match mcp-tools and orchestrator."
  - "vitest.config.ts should match mcp-tools pattern with 80% coverage thresholds across lines, functions, branches, statements."
  - "pnpm install must be run after modifying package.json files — workspace symlinks are created at install time."
  - "No barrel files per CLAUDE.md: index.ts re-exports named exports, not re-exporting star. But individual module index.ts files are acceptable since they ARE the module entry points."
  - "logger import (@repo/logger) is permitted but not required if functions are pure — only add logger.debug/warn if there is meaningful runtime observability value."
