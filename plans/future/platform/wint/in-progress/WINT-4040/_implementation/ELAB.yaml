opportunities:  # Non-blocking
  - id: opp-1
    category: edge_cases
    finding: >
      packages/backend/mcp-tools/src/scripts/__types__/index.ts does not currently exist on the
      filesystem (confirmed: no __types__ directory under scripts/). ST-1 lists it as
      "files_to_modify" but it must be created. The story's Scope section says "new files" includes
      this path but under a different label. The subtask goal says "Create InferredCapabilitySchema"
      which implies creation. The implementing agent for ST-1 should treat this as a create, not
      modify. Low risk — implementer will discover this immediately — but noting it prevents confusion.
    effort: low
    decision: log_to_kb
    kb_entry_id: "43f81a24-5193-45da-9b34-f357cbcea528"

  - id: opp-2
    category: edge_cases
    finding: >
      The capabilities.lifecycle_stage column is a plain text field (not a pgEnum) enforced at the
      application level (see wint.ts line 1325 comment: "app-enforced"). The keyword mapping table
      must produce exactly 'create' | 'read' | 'update' | 'delete' strings. If a keyword lookup
      bug introduces a typo (e.g., 'reads' instead of 'read'), graph_get_capability_coverage will
      silently miss those rows in its CRUD aggregation (it checks stage === 'create' etc. explicitly).
      Per KB entry b78c01db (WINT-4030 opp): analogous enum mismatch risk exists for graph inserts.
      Recommendation: ST-2's Zod lookup table should use z.enum(['create','read','update','delete'])
      as the value type, providing compile-time enforcement of valid stage values.
    effort: low
    decision: log_to_kb
    kb_entry_id: "efa816ca-4049-46a6-a674-7b1762470f62"

  - id: opp-3
    category: observability
    finding: >
      Per KB entry f7f59027 (WINT-2040 opp-2 pattern): populate scripts could emit structured
      telemetry to wint.telemetry_events tracking run success rate, inference count, and execution
      time. The inferCapabilities() orchestrator already emits a PopulateResultSchema summary to
      stdout — adding a telemetry_events INSERT at the end of a successful run would enable
      monitoring inference freshness over time without changing the CLI API surface.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "27f15f93-4cf7-4321-b740-69a8d33644d0"

  - id: opp-4
    category: integrations
    finding: >
      WINT-4060 (graph-checker agent) depends on WINT-4040 and is the primary consumer of
      graph.capabilities data this story produces. The --validate flag output format (coverage
      report distinguishing complete vs. incomplete CRUD coverage per feature) could be structured
      to also serve as a quick manual QA proxy for WINT-4060's acceptance criteria before the agent
      is built. If the --validate output is machine-parseable (e.g., JSON), WINT-4060's test plan
      could reference it directly. Current story only requires human-readable output (MC-1) —
      adding a --validate --json flag variant would be a future enhancement.
    effort: low
    decision: log_to_kb
    kb_entry_id: "462e955d-ee18-4c14-b9bb-55478018c522"

  - id: opp-5
    category: edge_cases
