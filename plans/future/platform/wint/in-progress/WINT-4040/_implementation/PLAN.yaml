schema: 2
story_id: "WINT-4040"
timestamp: "2026-03-08T12:00:00Z"
subtask_source: story

steps:
  - id: 1
    subtask_id: "ST-1"
    description: "Define Zod schemas for capability inference types"
    goal: "Create InferredCapabilitySchema, CapabilityInferenceResultSchema, InferCapabilitiesOptionsSchema"
    files:
      - "packages/backend/mcp-tools/src/scripts/__types__/index.ts"
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts"
      - "packages/backend/database-schema/src/schema/wint.ts"
    dependencies: []
    slice: backend
    verification: "pnpm check-types --filter @repo/mcp-tools"
    acs_covered:
      - "AC-8"
    estimated_tokens: 4000
    notes:
      - "Model PopulateResultSchema from populate-domain-kb.ts"
      - "InferredCapabilitySchema must match capabilities table fields: capabilityName, capabilityType, lifecycleStage, maturityLevel, featureId"
      - "CapabilityInferenceResultSchema shape: { attempted, succeeded, failed, skipped }"
      - "InferCapabilitiesOptionsSchema: { dryRun?: boolean, validate?: boolean, insertFn?: injectable }"

  - id: 2
    subtask_id: "ST-2"
    description: "Implement keyword-to-lifecycle-stage mapping function"
    goal: "Create mapKeywordsToStages(text) pure function with Zod-validated lookup table"
    files:
      - "packages/backend/mcp-tools/src/scripts/infer-capabilities.ts"
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/__types__/index.ts"
    dependencies: [1]
    slice: backend
    verification: "pnpm test --filter @repo/mcp-tools -- mapKeywordsToStages"
    acs_covered:
      - "AC-3"
    estimated_tokens: 5000
    notes:
      - "Pure function, no side effects"
      - "Case-insensitive keyword matching"
      - "Mapping: create|add|new|upload → 'create'; read|view|get|download → 'read'; update|modify|edit → 'update'; delete|remove → 'delete'"
      - "Returns Set<'create' | 'read' | 'update' | 'delete'> for deduplication"
      - "AC-3 examples: 'add', 'create', 'upload' → 'create'; 'view', 'download' → 'read'"

  - id: 3
    subtask_id: "ST-3"
    description: "Implement story scanner that reads YAML files from plans/"
    goal: "Create scanStories(rootDir) reading story YAML files, extracting feature/title/epic prefix"
    files:
      - "packages/backend/mcp-tools/src/scripts/infer-capabilities.ts"
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts"
    dependencies: [1]
    slice: backend
    verification: "pnpm test --filter @repo/mcp-tools -- scanStories"
    acs_covered:
      - "AC-2"
    estimated_tokens: 6000
    notes:
      - "Recursively scan plans/future/platform/*/ for story.yaml and {STORY_ID}.md files"
      - "Extract: story_id, title, epic (epic prefix from story_id, e.g., WISH from WISH-001)"
      - "Extract AC text and feature description for keyword analysis"
      - "Return: Array<{ storyId, epic, title, text }>"
      - "AC-2 requirement: scan must handle missing files gracefully"

  - id: 4
    subtask_id: "ST-4"
    description: "Implement feature resolver that looks up UUID from graph.features by epic prefix"
    goal: "Create resolveFeatureId(epicPrefix, db) with injectable dbFn; handles not-found gracefully"
    files:
      - "packages/backend/mcp-tools/src/scripts/infer-capabilities.ts"
    files_to_read:
      - "packages/backend/database-schema/src/schema/wint.ts"
      - "packages/backend/db/src/index.ts"
    dependencies: [1]
    slice: backend
    verification: "pnpm test --filter @repo/mcp-tools -- resolveFeatureId"
    acs_covered:
      - "AC-4"
      - "AC-9"
    estimated_tokens: 5000
    notes:
      - "Query graph.features by featureName or epicPrefix"
      - "AC-4: Map story epic → feature UUID (e.g., WISH → uuid-for-wishlist-feature)"
      - "AC-9: If zero features found, exit early with warning 'No features found — run WINT-4030 script first'"
      - "Injectable dbFn allows tests to mock DB calls"
      - "Return: { featureId: UUID } | null (for unknown epic)"

  - id: 5
    subtask_id: "ST-5"
    description: "Implement main inferCapabilities() orchestrator with injectable insertFn"
    goal: "Orchestrate ST-2/3/4; handle dedup; emit PopulateResultSchema summary; support --dry-run"
    files:
      - "packages/backend/mcp-tools/src/scripts/infer-capabilities.ts"
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts"
      - "packages/backend/database-schema/src/schema/wint.ts"
    dependencies: [2, 3, 4]
    slice: backend
    verification: "pnpm test --filter @repo/mcp-tools -- inferCapabilities"
    acs_covered:
      - "AC-5"
      - "AC-6"
      - "AC-7"
      - "AC-8"
    estimated_tokens: 8000
    notes:
      - "AC-5: Orchestrate mapKeywordsToStages + scanStories + resolveFeatureId"
      - "AC-6: ON CONFLICT DO NOTHING deduplication (Drizzle .onConflictDoNothing())"
      - "AC-7: Set capability_name, capability_type='business', maturity_level='beta', lifecycle_stage, feature_id"
      - "AC-8: Emit PopulateResultSchema with { attempted, succeeded, failed, skipped } counts"
      - "Injectable insertFn: async (rows: InferredCapability[], dryRun: boolean) => Promise<void>"
      - "Dry-run: log table without writing to DB"

  - id: 6
    subtask_id: "ST-6"
    description: "Implement CLI entrypoint with --dry-run and --validate flag handling"
    goal: "Parse process.argv flags; call inferCapabilities(); for --validate call graph_get_capability_coverage per feature and print report"
    files:
      - "packages/backend/mcp-tools/src/scripts/infer-capabilities.ts"
    files_to_read:
      - "packages/backend/mcp-tools/src/graph-query/graph-get-capability-coverage.ts"
      - "packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts"
    dependencies: [5]
    slice: backend
    verification: "pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --help"
    acs_covered:
      - "AC-1"
      - "AC-7"
      - "AC-11"
    estimated_tokens: 5000
    notes:
      - "AC-1: CLI entrypoint with --dry-run flag (print would-be inserts without writing)"
      - "AC-11: --validate flag triggers post-population coverage report per feature"
      - "Print CRUD coverage table: feature | create | read | update | delete | missing_stages"
      - "Emit summary JSON to stdout for integration test parsing"

  - id: 7
    subtask_id: "ST-7"
    description: "Write unit test suite achieving >= 80% coverage"
    goal: "Cover: mapKeywordsToStages (all keyword branches), dedup logic, zero-features early exit, dry-run no-write, injectable insertFn isolation"
    files:
      - "packages/backend/mcp-tools/src/scripts/__tests__/infer-capabilities.test.ts"
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/infer-capabilities.ts"
    dependencies: [5, 6]
    slice: backend
    verification: "pnpm test --filter @repo/mcp-tools -- infer-capabilities --coverage"
    acs_covered:
      - "AC-10"
    estimated_tokens: 8000
    notes:
      - "Test fixtures: mockFeatureRows, mockCapabilityInsertFn, storyYamlFixture, emptyFeaturesFixture"
      - "Happy path: HP-1 (keyword mapping), HP-2 (DB insert), HP-3 (summary), HP-4 (--dry-run), HP-5 (--validate)"
      - "Error cases: EC-1 (zero features), EC-2 (ON CONFLICT), EC-3 (no keywords), EC-4 (unknown epic)"
      - "Edge cases: ED-1 (multiple CRUD stages), ED-2 (dedup), ED-3 (upload→create), ED-4 (download→read)"
      - "Target: >= 80% coverage per AC-10"

files_to_change:
  - path: "packages/backend/mcp-tools/src/scripts/__types__/index.ts"
    action: create
    reason: "Zod schemas for capability inference types (ST-1, AC-8)"

  - path: "packages/backend/mcp-tools/src/scripts/infer-capabilities.ts"
    action: create
    reason: "Main script: mapKeywordsToStages, scanStories, resolveFeatureId, inferCapabilities, CLI entrypoint (ST-2 through ST-6)"

  - path: "packages/backend/mcp-tools/src/scripts/__tests__/infer-capabilities.test.ts"
    action: create
    reason: "Unit test suite >= 80% coverage (ST-7, AC-10)"

commands_to_run:
  - command: "pnpm check-types --filter @repo/mcp-tools"
    when: "after ST-1 (schema definitions)"
    required: true

  - command: "pnpm test --filter @repo/mcp-tools -- mapKeywordsToStages"
    when: "after ST-2 (keyword mapping function)"
    required: true

  - command: "pnpm test --filter @repo/mcp-tools -- scanStories"
    when: "after ST-3 (story scanner)"
    required: true

  - command: "pnpm test --filter @repo/mcp-tools -- resolveFeatureId"
    when: "after ST-4 (feature resolver)"
    required: true

  - command: "pnpm test --filter @repo/mcp-tools -- inferCapabilities"
    when: "after ST-5 (main orchestrator)"
    required: true

  - command: "pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --help"
    when: "after ST-6 (CLI entrypoint)"
    required: true

  - command: "pnpm test --filter @repo/mcp-tools -- infer-capabilities --coverage"
    when: "after ST-7 (full test suite)"
    required: true

  - command: "pnpm build"
    when: "after all code changes"
    required: true

  - command: "pnpm test"
    when: "after all code changes"
    required: true

  - command: "pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --dry-run"
    when: "manual validation after all tests pass"
    required: false

  - command: "pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --validate"
    when: "manual validation after WINT-4030 is merged and data seeded"
    required: false

acceptance_criteria_map:
  - ac_id: "AC-1"
    description: "CLI entrypoint accepts --dry-run and --validate flags"
    planned_evidence: "Manual test: pnpm tsx infer-capabilities.ts --dry-run succeeds"
    evidence_type: manual

  - ac_id: "AC-2"
    description: "Script scans plans/future/platform/*/ for story YAML files"
    planned_evidence: "Unit test: scanStories returns array of story objects with extracted epic/title/text"
    evidence_type: test

  - ac_id: "AC-3"
    description: "mapKeywordsToStages() recognizes CRUD keywords and returns lifecycle stages"
    planned_evidence: "Unit tests: 'add'→'create', 'view'→'read', 'upload'→'create', 'download'→'read', 'delete'→'delete'"
    evidence_type: test

  - ac_id: "AC-4"
    description: "resolveFeatureId() looks up feature UUID from graph.features by epic prefix"
    planned_evidence: "Unit test: resolveFeatureId('WISH') returns feature UUID; unknown epic returns null"
    evidence_type: test

  - ac_id: "AC-5"
    description: "inferCapabilities() orchestrates keyword mapping, story scanning, and feature resolution"
    planned_evidence: "Unit test: full workflow produces InferredCapability objects ready for insertion"
    evidence_type: test

  - ac_id: "AC-6"
    description: "ON CONFLICT DO NOTHING handles duplicate capability_name silently"
    planned_evidence: "Unit test: second insert of same capability_name increments skipped count, no error"
    evidence_type: test

  - ac_id: "AC-7"
    description: "Each inferred capability has capability_type='business', maturity_level='beta', and correct lifecycle_stage"
    planned_evidence: "Unit test assertion: { capability_type: 'business', maturity_level: 'beta', lifecycle_stage: 'create'|'read'|'update'|'delete' }"
    evidence_type: test

  - ac_id: "AC-8"
    description: "Summary result emitted as PopulateResultSchema JSON: { attempted, succeeded, failed, skipped }"
    planned_evidence: "Unit test: result object passes Zod validation against PopulateResultSchema"
    evidence_type: test

  - ac_id: "AC-9"
    description: "Script exits early with warning if graph.features is empty"
    planned_evidence: "Unit test: resolveFeatureId with empty features array logs 'No features found' and returns early"
    evidence_type: test

  - ac_id: "AC-10"
    description: "Test suite achieves >= 80% coverage"
    planned_evidence: "pnpm test --filter @repo/mcp-tools -- infer-capabilities --coverage shows >= 80%"
    evidence_type: test

  - ac_id: "AC-11"
    description: "--validate flag triggers coverage report per feature using graph_get_capability_coverage"
    planned_evidence: "Manual test: --validate output prints CRUD coverage table with complete/incomplete features"
    evidence_type: manual

architectural_decisions: []

complexity: moderate

notes:
  - "Story has 7 explicit subtasks (ST-1 through ST-7) derived from story generation phase"
  - "Subtask dependencies form a directed graph: ST-1 is root; ST-2,3,4 depend on ST-1; ST-5 depends on ST-2,3,4; ST-6 depends on ST-5; ST-7 depends on ST-5,6"
  - "Canonical reference: populate-domain-kb.ts (similar populate script pattern with injectable DB query function)"
  - "Schema reference: wint.ts capabilities table has fields: id, capabilityName (unique), capabilityType, description, owner, metadata, maturityLevel, lifecycleStage, featureId (FK to features.id), createdAt, updatedAt"
  - "Prerequisite for integration testing: WINT-4030 must be merged so graph.features has data; unit tests use mocked DB via injectable insertFn"
  - "Risk: Keyword heuristic is approximate; --validate flag surfaces incomplete CRUD coverage for human review"
  - "Per CLAUDE.md: Use Zod schemas for all types, no barrel files, use @repo/logger not console, min 45% test coverage (aiming for 80%), named exports preferred"

