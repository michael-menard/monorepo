      Neither gap is blocking implementation but both are ambiguities worth resolving.

  - id: CHK-7
    name: Risk Disclosure
    status: PASS
    notes: >
      Three risks explicitly documented with mitigations:
      (1) cohesion-findings.json schema (WINT-4070, ready-for-qa) may shift before stabilizing —
