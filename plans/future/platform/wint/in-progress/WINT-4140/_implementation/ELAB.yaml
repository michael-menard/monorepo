# ---------------------------------------------------------------------------
# GAPS IDENTIFIED
# ---------------------------------------------------------------------------

gaps:
  mvp_critical:
    - id: gap-1
      title: "spawned_by field value under-specified"
      ac_ref: AC-1
      description: >
        AC-1 requires spawned_by in YAML frontmatter referencing "the elab orchestrator
        that sequences PO → DA → Round Table" but does not specify the orchestrator agent
        name. Implementer must infer from codebase context. If inferred incorrectly, the
        field value will be inconsistent with how other Phase 4 worker agents declare
        spawned_by, reducing agent discoverability (the exact problem this field was added
        to fix per WINT-4080 elab gap wint-4080-gap-4).
      severity: low
      blocking: false
      recommendation: >
        Specify the exact spawned_by value in AC-1 (e.g., spawned_by: [elab-epic-engineering]
        or the specific orchestrator agent file name). A single grep of existing Phase 4
        worker agents' spawned_by fields will identify the correct value.
      decision: log_to_kb
      decision_note: "Non-blocking — implementer can grep existing Phase 4 worker agents' spawned_by fields to resolve."

    - id: gap-2
      title: "elab-gaps.json producer not identified"
      ac_ref: "AC-2, AC-3"
      description: >
        AC-2 and AC-3 reference elab-gaps.json (or equivalent gap artifact) as an optional
        input to the Round Table. The story does not identify which agent produces this
        artifact. The Context section names only cohesion-prosecutor (WINT-4070) and
        scope-defender (WINT-4080) as upstream producers. The implementer must infer the
        elab-gaps producer from workflow context. If no agent currently produces this artifact,
        the optional input table in the agent spec may be authoring a dependency on a
        not-yet-existing artifact.
      severity: low
      blocking: false
      recommendation: >
        Clarify whether elab-gaps.json is produced by an existing agent (e.g., gap-analytics-agent
        or elab-analyst output) or is a future artifact. If future, explicitly note
        "not yet produced — degrade gracefully" in the agent spec's optional inputs table.
        This prevents the implementer from authoring the spec against a phantom input.
      decision: log_to_kb
      decision_note: "Non-blocking — optional input already has graceful degradation specified. Implementer note added."

  future_opportunities:
    - id: enh-1
      title: "final_acs[] output size not bounded"
      ac_ref: AC-5
      description: >
        AC-5 defines the final-scope.json schema including a final_acs[] array but specifies
        no maximum cardinality. scope-defender enforces a hard cap of 5 challenges.
        gap-analytics-agent enforces bounded output categories. Without a cap, final_acs[]
        could theoretically contain every AC from all three input sources, making the output
        less useful as a synthesized scope signal. A cap or synthesis rule (e.g., "final_acs[]
        must not exceed original story AC count") would prevent scope expansion through synthesis.
      severity: low
      blocking: false
      recommendation: >
        Add a non-negotiable: final_acs[] MUST NOT exceed the count of ACs in the original
        story brief. This preserves the synthesis-only constraint (AC-4) at the output level.
        Document as a note in AC-5 or Architecture Notes.
      decision: log_to_kb
      decision_note: "Future enhancement — AC-4 synthesis constraint already prevents new AC invention. Hard cap is nice-to-have."

    - id: enh-2
      title: "No idempotency statement for final-scope.json writes"
      ac_ref: AC-5
      description: >
        scope-defender.agent.md explicitly states "overwrite if exists (idempotent)" for
        scope-challenges.json writes. WINT-4140 does not include an equivalent idempotency
        statement for final-scope.json. Without this, re-running the Round Table on the same
        story could produce confusion about whether an existing file is a prior run or an
        external artifact.
      severity: very_low
      blocking: false
      recommendation: >
        Add to AC-5 or Architecture Notes: "If final-scope.json already exists in story_dir,
        overwrite it (idempotent — last run wins)." This aligns with scope-defender's pattern.
      decision: log_to_kb
      decision_note: "Very low severity — implementer can add idempotency statement during authoring."

    - id: enh-3
      title: "accepted_passthrough[] not present in AC-5 schema definition"
      ac_ref: "AC-5, AC-6"
      description: >
        The Edge Cases section and Architecture Notes section both specify that DA challenges
        with recommendation: accept-as-mvp are filtered into an "accepted pass-through list"
        or "accepted_passthrough[] section" distinct from followups[]. However, AC-5's schema
        definition does not include accepted_passthrough[] as a named field. The test plan
        (ED-1) tests for this behavior but the schema field is not enumerated. An implementer
        following AC-5 alone would not know to include this field.
      severity: medium
      blocking: false
      recommendation: >
        Add accepted_passthrough (array of DA items with recommendation: accept-as-mvp) to
        the AC-5 schema field list. This is mentioned in Examples, Edge Cases, and Architecture
        Notes but omitted from the authoritative schema definition. Inconsistency could cause
        the implementer to exclude it from the schema section.
      decision: log_to_kb
      decision_note: "Medium severity but non-blocking — AC-5 says 'at minimum' so additional fields are allowed. Implementer should reconcile accepted_passthrough[] into schema section."

