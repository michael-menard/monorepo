      plan items. All tests are executable against the deliverable file.

  - id: CHK-6
    name: Decision Completeness
    status: CONDITIONAL_PASS
    notes: >
      No hard blocking TBDs. However, two minor under-specifications exist:
      (1) spawned_by field value: AC-1 requires the field to reference "the elab orchestrator
      that sequences PO → DA → Round Table" but does not name the specific orchestrator agent.
      The implementer must infer this from the elaboration workflow context. This is low-risk
      (the orchestrator is discoverable in the codebase) but could produce inconsistent values
      across agent files.
      (2) elab-gaps.json producer: AC-2 and AC-3 list elab-gaps.json as an optional input but
