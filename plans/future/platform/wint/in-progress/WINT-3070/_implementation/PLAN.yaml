complexity: simple
notes:
  - This is a docs-only story — all changes are purely additive Markdown edits to .claude/commands/*.md files
  - No TypeScript code, no compilation, no test runners, no build steps required
  - telemetry-log skill exists at .claude/skills/telemetry-log/SKILL.md (WINT-3020 already merged)
  - >-
    Insertion pattern: locate phase completion boundary (often where token-log appears or where completion signal is
    emitted), insert telemetry-log block immediately after token-log (or at same boundary if token-log is absent)
  - >-
    Fire-and-forget constraint: telemetry call result must never block workflow — null or error from
    workflow_log_invocation is silently swallowed
  - >-
    Elaboration note (ELAB-OPP-1): token-log and telemetry-log use different phase vocabularies — do NOT use token-log
    phase names in telemetry calls; use only the WINT-3020 vocabulary: setup, plan, execute, review, qa
  - >-
    AC-14 (UAT) is gated on WINT-3020 merge — implementation can proceed and be verified structurally; runtime
    validation requires merged WINT-3020
  - >-
    Steps 2-7 are all independent of each other (each only depends on ST-1); they can be run in any order after ST-1 is
    complete
  - >-
    story-status.md is read-only — the decision on whether to add telemetry (or document exemption) should be made by
    re-reading the file during ST-6 execution
