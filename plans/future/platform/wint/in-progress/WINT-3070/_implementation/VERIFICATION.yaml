lessons_to_record:
  - lesson: >-
      For docs-only workflow stories, the review worker false-positive risk (reading main repo instead of worktree)
      should be flagged explicitly in the review artifact to avoid QA confusion. The REVIEW artifact for WINT-3070
      handled this correctly by documenting the false-positive source.
    category: pattern
    tags:
      - docs-only
      - worktree
      - code-review
  - lesson: >-
      Step renumbering deletions in git diff are expected and correct when inserting a new step before an existing final
      step. The EVIDENCE artifact should pre-document this to prevent QA from flagging them as logic deletions.
    category: pattern
    tags:
      - docs-only
      - git-diff
      - qa-verification
  - lesson: >-
      AC-14 UAT deferral pattern (gated on prerequisite story merge) should be established as a standard deferred-uat
      disposition with explicit prerequisite tracking. This avoids holding the story in QA for runtime validation when
      instrumentation is verifiably complete.
    category: pattern
    tags:
      - uat
      - deferral
      - ac-coverage
