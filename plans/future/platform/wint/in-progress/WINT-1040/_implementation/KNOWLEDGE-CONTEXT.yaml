  - id: L-WINT-1011-001
    title: "shimGetStoryStatus returns null on both DB-miss and DB-error"
    summary: "The shim does not distinguish between a DB connection failure and a DB record not found. Both cases trigger directory fallback. This is Phase 1 acceptable behavior per WINT-1011 DECISIONS.yaml."
    recommendation: "Command spec should document 'DB unavailable OR returns no result' as a single fallback trigger."
    tags: [wint, shim, fallback, mcp-tools]

  - id: L-WINT-1011-002
    title: "shimGetStoryStatus call signature: input.storyId (human-readable ID)"
    summary: "shimGetStoryStatus accepts StoryGetStatusInput which has a storyId field (human-readable string like WINT-1011). No UUID required. The shim handles DB lookup by storyId directly."
    recommendation: "Command spec step should pass storyId directly from argument normalization."
    tags: [wint, shim, mcp-tools, api-contract]

  - id: L-WINT-1030-001
    title: "story_get_status MCP tool is the agent-callable wrapper around shimGetStoryStatus"
    summary: "Agents call story_get_status({storyId: STORY_ID}) — this MCP tool delegates to shimGetStoryStatus internally. Commands do not call TypeScript functions directly; they invoke MCP tools."
    recommendation: "Command spec must use MCP tool invocation syntax: story_get_status({storyId: STORY_ID})."
    tags: [wint, mcp-tools, command-pattern]

  - id: L-STORY-UPDATE-001
    title: "story-update.md canonical pattern: command calls MCP tool inline in step sequence"
    summary: "story-update.md calls worktree_get_by_story and worktree_mark_complete MCP tools directly within its Execution Steps section — not as TypeScript imports. This is the pattern for command specs that need to invoke shim/tool behavior."
    recommendation: "story-status.md Feature+Story ID mode should mirror this: list MCP tool call as a numbered step with input/output handling inline."
    tags: [wint, command-pattern, mcp-tools, docs-pattern]

