# ---------------------------------------------------------------------------
# DISCOVERY ANALYSIS
# ---------------------------------------------------------------------------
discovery:

  mvp_critical_gaps: []
  # No gaps blocking the core user journey. All prerequisite schemas exist,
  # patterns are established, no missing canonical references.

  opportunities:
    - id: OPP-1
      title: "AC-13 is partially redundant with AC-9"
      severity: minor
      decision: log_to_kb
      kb_artifact_id: "4765cf75-7120-47f2-8a7e-81125482309e"
      detail: >
        AC-13 specifies Zod validation at tool entry returning structured error
        results. AC-9 already covers the broader resilient error handling
        pattern (catch, log, errorToToolResult). AC-13 is a subset of AC-9.
        This causes no implementation problem — both are achievable in a single
        try/catch with Schema.parse() at entry — but the implementer should
        treat them as one concern, not two separate code blocks. No action
        required; noting for AC count context.

    - id: OPP-2
      title: "ST-3 AC coverage includes AC-13 but AC-13 is also in ST-5 coverage"
      severity: minor
      decision: log_to_kb
      kb_write_status: failed_transient_db_error
      detail: >
        AC-13 appears in both ST-3's acs list and ST-5's acs list. This is
        intentional (input validation applies to implementation AND test
        verification), but the implementer should be aware that AC-13 is
        satisfied at handler implementation time (ST-3) and confirmed by tests
        at ST-5 time, not newly introduced in ST-5.

    - id: OPP-3
      title: "workflow_get_story_telemetry has no storyId filter on invocations"
      severity: low
      decision: log_to_kb
      kb_write_status: failed_transient_db_error
      detail: >
        agentInvocations.storyId is nullable (text, no notNull). The story
        correctly includes invocations in the telemetry query by storyId, but
        the query will only return invocations where storyId matches — rows
        logged without a storyId will never appear in telemetry reads. This
        is correct behavior per the non-goal of not modifying the schema, but
        the implementer should use `eq(agentInvocations.storyId, input.storyId)`
        and be aware of the nullable column (Drizzle will handle it safely).
        No action needed; documenting for implementer awareness.

    - id: OPP-4
      title: "Consider adding workflow_get_story_telemetry to mcp-integration tool list"
      severity: low
      decision: log_to_kb
      kb_write_status: failed_transient_db_error
      detail: >
        mcp-integration.test.ts line 73 validates the exact ordered list of
        tool names. Adding 4 new tools requires appending them in the correct
        position in that array, not just updating the length. ST-5 covers
        this, but the implementer should read both the length assertion AND the
        name list assertion. The story text only mentions "tool count assertion"
        which may be read as length-only.

