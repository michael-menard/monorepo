      create artificial dependencies and increase coordination cost without
      reducing risk. 5 subtasks already provide the decomposition granularity
      needed. Sizing is appropriate for a 3-point story.

  - id: "CHECK-9"
    name: "Subtask Decomposition"
    result: pass
    notes: >
      5 subtasks with a clear DAG: ST-1 (schemas, no deps) -> ST-2
      (invocation+outcome handlers) -> ST-3 (decision handler) -> ST-4
