audit:

  - id: "CHECK-1"
    name: "Scope Alignment"
    result: pass
    notes: >
      Story scope is tightly bounded: 4 MCP tools (3 write, 1 read) targeting
      3 existing telemetry tables in the wint schema. Files to modify/create
      are enumerated (tool-schemas.ts, tool-handlers.ts, mcp-integration.test.ts,
      new telemetry-tools-integration.test.ts). Non-goals explicitly exclude
      embedding generation (WINT-3040), batching (WINT-3010/3020), UI
      (WINT-3060), DDL changes, and the agent_decisions table. No scope
      ambiguity detected.

  - id: "CHECK-2"
    name: "Internal Consistency"
    result: pass
    notes: >
      Goals, non-goals, ACs, and test plan are mutually consistent.
      AC-1/AC-2 cover workflow_log_invocation schema + handler; HP-1 tests it.
      AC-3/AC-4 cover workflow_log_decision; HP-2 tests it. AC-5/AC-6 cover
      workflow_log_outcome upsert; HP-3/HP-4 test insert and update paths.
      AC-7/AC-8 cover workflow_get_story_telemetry; HP-5 tests it.
      AC-9/AC-10 are shared error-handling and ORM constraints applied to all
      4 tools. AC-11/AC-14 cover testing and documentation. Error cases EC-1
      through EC-4 align 1:1 with Zod validation ACs. No orphaned ACs or
      untested requirements found.

  - id: "CHECK-3"
    name: "Reuse-First"
    result: pass
    notes: >
      All three table objects (agentInvocations at wint.ts:658,
      hitlDecisions at wint.ts:947, storyOutcomes at wint.ts:997) verified
      present in packages/backend/database-schema/src/schema/wint.ts.
      Insert schemas (insertAgentInvocationSchema at line 1877,
      insertHitlDecisionSchema at line 1898, insertStoryOutcomeSchema at
      line 1904) are all confirmed exported. errorToToolResult, withRetry,
      and createMcpLogger all verified present in the mcp-server directory.
      zodToJsonSchema import confirmed in tool-schemas.ts. The reuse plan
      table is accurate. No re-implementation of existing infrastructure.

  - id: "CHECK-4"
    name: "Ports & Adapters"
    result: pass
    notes: >
      Backend only. All 4 handlers write/read directly to Aurora via Drizzle
      ORM — no HTTP calls from handlers, no sidecar, no Lambda intermediary.
      Architecture note explicitly references ADR from WINT-4010 lesson.
      No new API Gateway routes or Lambda configurations required. DB access
      uses existing Drizzle db client and withRetry pattern. Clean adapter
      boundary preserved.

  - id: "CHECK-5"
    name: "Testability"
    result: pass
    notes: >
      Integration test strategy via handleToolCall is the correct pattern
      (matches story-tools-integration.test.ts precedent). Tests do not
      require spinning up the full MCP server — direct handler invocation.
      Test plan covers 5 happy-path, 4 error-case, and 4 edge-case tests.
      Fixture definitions are concrete (minimal valid rows for each table).
      Manual case MC-1 is narrow and gated: verify WINT-0040 migration applied
      before running integration tests. Tool count drift risk is explicitly
      surfaced in AC-11 with implementer instruction to verify at start.

  - id: "CHECK-6"
    name: "Decision Completeness"
    result: pass
    notes: >
      No TBDs, no open questions, no deferred design choices within scope.
      The upsert conflict target is named explicitly
      ('story_outcomes_story_id_idx'). Embedding handling is defined
      (write as-is, no generation). Promise.all for the read tool is
      specified. Fire-and-forget error behavior is documented. All decision
      points that could block implementation are resolved.

  - id: "CHECK-7"
    name: "Risk Disclosure"
    result: pass
    notes: >
      Three risks are documented with mitigations: (1) WINT-0040 migration
      dependency — gate story if not applied, verify in dev DB before
      integration tests; (2) tool count drift in mcp-integration.test.ts —
      implementer must read actual count at start, not assume 62+4=66;
