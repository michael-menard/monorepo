      Reality baseline confirms current tool count (62) and migration file
      name. Risk surface is complete and proportionate.

  - id: "CHECK-8"
    name: "Story Sizing"
    result: pass
    notes: >
      14 ACs at first glance exceeds the 8-AC threshold, but the grouping is
      natural: AC-1/2 (invocation schema+handler), AC-3/4 (decision
      schema+handler), AC-5/6 (outcome schema+upsert), AC-7/8 (telemetry
      read schema+handler) = 8 ACs for 4 tools following the same pattern.
      AC-9 (error handling) and AC-10 (Drizzle only) are cross-cutting
