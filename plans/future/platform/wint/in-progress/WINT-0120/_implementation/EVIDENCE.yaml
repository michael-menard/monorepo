design_notes:
  - "@repo/database-schema/schema/wint is imported for agentInvocations, hitlDecisions, storyOutcomes tables"
  - "TelemetryOperationsDeps uses NodePgDatabase<any> to avoid schema type conflicts across packages"
  - "hitlDecisions.embedding is passed as-is (number[]) - no embedding generation needed per plan"
  - "workflow_log_outcome uses .onConflictDoUpdate({ target: storyOutcomes.storyId }) - one row per story"
  - "workflow_get_story_telemetry uses Promise.all for parallel DB queries across all 3 tables"
  - "All 4 tools are accessible to all roles (pm, dev, qa, all) in ACCESS_MATRIX"
