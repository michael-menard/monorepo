# ==============================================================================
# Architectural Decisions (user-approved)
# ==============================================================================

architectural_decisions:
  - id: ARCH-001
    question: "deepseek-coder-v2: model-assignments.yaml uses :33b (~20GB VRAM) but WINT-0220-STRATEGY.yaml Tier 2 primary uses :16b (~10GB VRAM). Which variant does the full fleet setup pull?"
    decision: "Include both: deepseek-coder-v2:16b as required Tier 2 primary + deepseek-coder-v2:33b as optional heavy variant with VRAM warning. --lite skips both. Health check requires :16b, marks :33b as optional."
    rationale: "Covers both use cases without breaking model-assignments.yaml agent expectations. Aligns with story Reality Baseline recommendation. Documents discrepancy with rationale per AC-7."
    decided_by: user
    options_considered:
      - "A (chosen): Include both :16b required + :33b optional"
      - "B: Strategy wins, :16b only"
      - "C: Assignments win, :33b only (not recommended)"

  - id: ARCH-002
    question: "llama3.2 variant: model-assignments.yaml uses llama3.2:8b but WINT-0220-STRATEGY.yaml Tier 3 specifies llama3.2:3b. Which does the fleet pull?"
    decision: "Use llama3.2:8b only (what agents actually reference in model-assignments.yaml). Document :3b as the lite-mode strategy alternative from WINT-0220 in the VRAM docs."
    rationale: "model-assignments.yaml is the runtime truth — agents call :8b. :3b is the strategy doc's preferred lean variant for Tier 3 but no agent currently uses it. Document discrepancy per AC-7."
    decided_by: user
    options_considered:
      - "A: Include both :8b and :3b"
      - "B (chosen): :8b only, document :3b as strategy alternative"
      - "C: :3b only (breaks agent assignments)"

  - id: ARCH-003
    question: "OLLAMA_ENABLE_FALLBACK is cited in AC-9 but does not appear in OllamaConfigSchema in ollama.ts. Should it be documented in --help and the VRAM docs?"
    decision: "Include with caveat: document OLLAMA_ENABLE_FALLBACK in --help output and docs/tech-stack/ollama-model-fleet.md with note that it is a runtime orchestration env var, not part of OllamaConfigSchema."
    rationale: "AC-9 explicitly requires all four env vars. Honest documentation with caveat is better than omission. Acknowledges the gap between the schema and the documented interface."
    decided_by: user
    options_considered:
      - "A (chosen): Include with caveat noting it is not in OllamaConfigSchema"
      - "B: Omit since it is not in OllamaConfigSchema"

