complexity: simple

notes:
  - "This is a shell script + documentation story only. No TypeScript, no pnpm build or test required."
  - "Full model list for setup script (full fleet): deepseek-coder-v2:16b (required), deepseek-coder-v2:33b (optional, ~20GB VRAM warning), codellama:13b, qwen2.5-coder:14b, qwen2.5-coder:7b, llama3.2:8b"
  - "Lite model list (--lite flag): qwen2.5-coder:7b, llama3.2:8b (satisfies Tier 3 minimum per WINT-0220-STRATEGY.yaml integration.ollama_requirements)"
  - "Health check required models: qwen2.5-coder:7b, codellama:13b, deepseek-coder-v2:16b, llama3.2:8b. deepseek-coder-v2:33b reported as optional."
  - "All model comments in scripts must cite: # Source: packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml tier 2/3 (per Architecture Note 2 in story)"
  - "Use ${OLLAMA_BASE_URL:-http://127.0.0.1:11434} pattern everywhere — never hardcode URL without fallback (Architecture Note 4)"
  - "No eval() or dynamic YAML parsing in shell scripts — static arrays only (Architecture Note 3)"
