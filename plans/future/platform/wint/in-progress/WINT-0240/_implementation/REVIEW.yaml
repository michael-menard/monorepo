detailed_context: |
  ## Root Cause Analysis

  The core issue stems from a design decision about qwen2.5-coder:14b:

  1. WINT-0220-STRATEGY.yaml lists qwen2.5-coder:14b as a Tier 2 secondary model
  2. model-assignments.yaml does NOT assign :14b to any agent
  3. The story accepts both documents as authoritative sources (AC-7)

  This creates ambiguity: Should the setup script and health check require :14b?

  **Current Implementation:**
  - setup-ollama-models.sh FULL_MODELS: includes :14b ✓
  - setup-ollama-models.sh REQUIRED_MODELS: omits :14b ✗
  - check-ollama-health.sh REQUIRED_MODELS: omits :14b ✗
  - docs/tech-stack/ollama-model-fleet.md: lists :14b as required ✗ (inconsistent)

  **Impact:**
  The setup script will pull :14b (complying with WINT-0220) but will NOT fail if :14b is missing post-install.
  The health check will not report :14b as missing. This inconsistency could cause confusion during deployment.

  ## Acceptance Criteria Assessment

  - AC-1: PASS (script is executable, has proper error handling)
  - AC-2: PASS (model list derived from WINT-0220, but verification is incomplete per finding #1)
  - AC-3: PASS (--lite flag works correctly)
  - AC-4: PARTIAL FAIL (post-install verification skips :14b)
  - AC-5: PARTIAL FAIL (health check REQUIRED_MODELS incomplete)
  - AC-6: PASS (VRAM documentation is comprehensive)
  - AC-7: PARTIAL FAIL (inconsistency between setup and health check violates alignment principle)
  - AC-8: PASS (old script superseded with deprecation notice)
  - AC-9: PASS (all 4 env vars documented)

  ## Recommended Fix Priority

  1. **CRITICAL PATH**: Fix findings #1 and #2 (add :14b to REQUIRED_MODELS in both scripts) OR add clear documentation about why :14b is pulled but not verified. This must be resolved before story can be marked complete.
  2. **FOLLOW-UP**: Improve grep pattern (finding #4) for robustness.
  3. **DOCUMENTATION**: Update docs to clarify :14b status (findings #3, #5, #6).

