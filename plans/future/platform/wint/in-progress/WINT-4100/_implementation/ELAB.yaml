opportunities:
  - id: opp-1
    category: edge_cases
    finding: >
      HP-2 in pm_artifacts.test_plan verifies scope and output_dir inputs via grep but
      does not include a grep evidence command for the optional deferred_writes_dir input
      (AC-2). If an implementing agent authors the agent file without deferred_writes_dir
      in the optional inputs table, HP-2 would still pass (it only checks scope and
      output_dir). A targeted check for deferred_writes_dir would close this gap.
    effort: low
    decision: defer
    kb_entry_id: null

  - id: opp-2
    category: ux_polish
    finding: >
      The risk_signal field in pm-review-batch.json items (AC-8) has no defined enum
      or value set. Downstream PM tooling or a LangGraph node consuming pm-review-batch.json
      cannot validate or filter by risk_signal without a known value set. Consider
      defining an enum (e.g., high | medium | low | unknown) in the output schema
      definition for AC-8. This would improve machine-readability and enable
      automated risk-based sorting in future iterations.
    effort: low
    decision: defer
    kb_entry_id: null

  - id: opp-3
    category: edge_cases
    finding: >
      Idempotency of output file writes is unspecified. The scope-defender agent
      explicitly states "overwrite scope-challenges.json if it already exists (idempotent)"
      in its non-negotiables. The backlog-curator agent story does not specify whether
      pm-review-batch.json and PM-REVIEW-REPORT.md are overwritten or appended when the
      curator runs multiple times against the same output_dir. Adding an idempotency
      statement to the agent's non-negotiables (matching scope-defender precedent)
      would close this ambiguity for implementing agents.
    effort: low
    decision: defer
    kb_entry_id: null

  - id: opp-4
    category: observability
    finding: >
      The PM-REVIEW-REPORT.md output format specifies "one section per item, ~5 lines"
      but does not define a summary header for truncated runs. Example 1 in the story
      references truncated: true but only mentions the JSON output. MC-2 checks for
      "section per item, description, deferral reason, recommended_action" but does not
      verify a truncation notice at the top of the report when items are capped.
      Scope-defender precedent includes a truncated flag in its JSON output; curator's
      human-readable report could echo this for PM awareness.
    effort: low
    decision: defer
    kb_entry_id: null

