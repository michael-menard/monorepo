schema: 2
story_id: WINT-3050
timestamp: '2026-03-08T00:00:00Z'
subtask_source: story
steps:
  - id: 1
    subtask_id: ST-3
    description: >-
      Update qa-verify-completion-leader.agent.md to add workflow_log_outcome calls in both PASS and FAIL completion
      flows. Inject as a non-blocking fire-and-forget step after verdict determination and before the story-update skill
      call. Compute qualityScore = max(0, 100 - (reviewIterations * 10) - (qaIterations * 15)). Populate primaryBlocker
      on FAIL; omit on PASS. Wrap in try/catch with logger.warn.
    files:
      - .claude/agents/qa-verify-completion-leader.agent.md
    files_to_read:
      - .claude/agents/qa-verify-completion-leader.agent.md
      - .claude/skills/token-log/SKILL.md
    dependencies: []
    slice: backend
    verification: grep -c 'workflow_log_outcome' .claude/agents/qa-verify-completion-leader.agent.md
    acs_covered:
      - AC-2
      - AC-3
      - AC-4
  - id: 2
    subtask_id: ST-4
    description: >-
      Update dev-implement-implementation-leader.agent.md to add a secondary workflow_log_outcome injection point at the
      IMPLEMENTATION BLOCKED path (after retry exhaustion or unrecoverable worker block). Call with
      final_verdict='blocked' or 'cancelled' as appropriate. Same fire-and-forget pattern: try/catch with logger.warn,
      never propagate.
    files:
      - .claude/agents/dev-implement-implementation-leader.agent.md
    files_to_read:
      - .claude/agents/dev-implement-implementation-leader.agent.md
      - .claude/skills/token-log/SKILL.md
    dependencies:
      - 1
    slice: backend
    verification: grep -c 'workflow_log_outcome' .claude/agents/dev-implement-implementation-leader.agent.md
    acs_covered:
      - AC-5
  - id: 3
    subtask_id: ST-5
    description: >-
      Write integration test file apps/api/knowledge-base/src/crud-operations/__tests__/story-outcomes.test.ts. Tests
      invoke workflow_log_outcome directly against real postgres-knowledgebase on port 5433 (ADR-005). AC-7: PASS
      scenario writes one row with final_verdict='pass'. AC-8: FAIL scenario writes one row with final_verdict='fail'
      and primary_blocker populated; upsert verified by calling twice and asserting COUNT(*) = 1. Also cover:
      quality_score clamp (floor=0), completedAt auto-populated. Clean up rows in afterEach using storyId unique
      constraint.
    files:
      - apps/api/knowledge-base/src/crud-operations/__tests__/story-outcomes.test.ts
    files_to_read:
      - apps/api/knowledge-base/src/crud-operations/__tests__/artifact-operations.integration.test.ts
      - tree/story/WINT-0120/apps/api/knowledge-base/src/crud-operations/telemetry-operations.ts
    dependencies:
      - 1
    slice: backend
    verification: pnpm test --filter @repo/knowledge-base -- story-outcomes
    acs_covered:
      - AC-7
      - AC-8
files_to_change:
  - path: .claude/agents/qa-verify-completion-leader.agent.md
    action: modify
    reason: Inject workflow_log_outcome in PASS and FAIL verdict flows (AC-2, AC-3, AC-4)
  - path: .claude/agents/dev-implement-implementation-leader.agent.md
    action: modify
    reason: Inject workflow_log_outcome at IMPLEMENTATION BLOCKED completion path (AC-5)
  - path: apps/api/knowledge-base/src/crud-operations/__tests__/story-outcomes.test.ts
    action: create
    reason: Integration tests for PASS and FAIL outcome logging flows (AC-7, AC-8)
commands_to_run:
  - command: pnpm test --filter @repo/knowledge-base -- story-outcomes
    when: after writing story-outcomes.test.ts (step 3)
    required: true
  - command: pnpm check-types --filter @repo/knowledge-base
    when: after all code changes
    required: true
