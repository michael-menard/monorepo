  - ac_id: AC-7
    planned_evidence: 'Integration test TC-001 in story-outcomes.test.ts: PASS scenario produces 1 row with final_verdict=''pass'''
    evidence_type: test
  - ac_id: AC-8
    planned_evidence: >-
      Integration test TC-002 in story-outcomes.test.ts: FAIL scenario produces 1 row with final_verdict='fail',
