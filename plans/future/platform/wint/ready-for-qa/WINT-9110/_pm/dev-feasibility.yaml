story_id: WINT-9110
generated: "2026-03-02"
feasibility: viable
complexity: high
estimated_points: 13
priority: high

summary: >
  Six new LangGraph graph files following established patterns from story-creation.ts, elaboration.ts, qa.ts,
  and review.ts. The pattern is well-documented and has proven production-grade across existing graphs. The
  primary risks are (1) dependency on 4 pending stories for node injection, and (2) the Send API fan-out in
  elab-epic.ts requiring correct LangGraph Send usage. Design strategy: injectable stubs for all pending deps,
  skeleton graphs first, wire real nodes as dependencies land.

risks:
  - id: R-1
    severity: high
    description: >
      WINT-9060, WINT-9070, WINT-9080, WINT-9100 are all pending. Full workflow graphs cannot be wired with
      real nodes until these land. Mitigation: accept all unimplemented node deps as z.unknown().optional()
      and wire with stub functions returning minimal valid state for now.
    blocking: false

  - id: R-2
    severity: medium
    description: >
      WINT-9107 retry/circuit-breaker middleware not yet available. Full workflow graphs must follow the ADR
      from WINT-9105 but cannot depend on it. Mitigation: inject middleware as z.unknown().optional() in all
      config schemas, document injection points in comments.
    blocking: false

  - id: R-3
    severity: medium
    description: >
      WINT-9106 PostgreSQL checkpointer not yet available. Mitigation: accept checkpointer as
      z.unknown().optional() in config, wire via graph.compile({ checkpointer }) when provided.
    blocking: false

  - id: R-4
    severity: low
    description: >
      Send API fan-out in elab-epic.ts is the most complex pattern — requires correct LangGraph Send
      object dispatch and fan-in aggregation. Canonical reference: review.ts demonstrates this pattern.
    blocking: false

implementation_notes:
  - "Follow story-creation.ts as the template for all six graph files (state annotation, config schema, node factories, conditional edges, entry function, node adapter)"
  - "Use z.unknown().optional() for all injectable dependencies (mlNodes, curatorNode, telemetryNode, retryMiddleware, checkpointer)"
  - "Wire checkpointer via graph.compile({ checkpointer: config.checkpointer })"
  - "Thread IDs: ${storyId}:${graphName}:${attempt} — must be set at state initialization"
  - "All six graphs must be registered in graphs/index.ts with explicit named exports"
  - "elab-story.ts wraps existing elaboration.ts via createElaborationGraph — do not duplicate elaboration logic"
  - "qa-verify.ts wraps existing qa.ts via createQAGraph — only adds lifecycle state transitions"

