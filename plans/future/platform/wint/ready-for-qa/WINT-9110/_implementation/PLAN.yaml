architectural_decisions:
  - id: ARCH-001
    question: Should GraphStateWithX adapter types use TypeScript interfaces (violating Zod-only mandate) or Zod schemas?
    decision: >-
      Accept existing codebase exception: GraphStateWithX interfaces are structural adapter types for node integration,
      not data schemas. Zod mandate applies only to data/business logic schemas.
    rationale: >-
      Elaboration GAP-3 — all existing graphs (story-creation, elaboration, qa, review) use interface-based
      GraphStateWith* types. Changing this pattern is out of scope and would break existing code.
    decided_by: auto
    tier: 2
  - id: ARCH-002
    question: Should conditional edge functions be exported for test access?
    decision: >-
      Yes — all afterX() conditional edge functions must be exported. Follow qa.ts pattern (exported), not
      story-creation.ts pattern (private).
    rationale: >-
      Elaboration GAP-5 — AC-9 routing tests require direct import of afterX() functions. Tests must call them with mock
      state objects.
    decided_by: auto
    tier: 1
  - id: ARCH-003
    question: How does qa-verify.ts pass modelClient to createQAGraph?
    decision: >-
      qa-verify.ts accepts modelClient: z.unknown().optional() in its own config schema, then casts and bridges it as
      deps = { modelClient: config.modelClient as ModelClient } when calling createQAGraph(qaConfig, deps).
    rationale: >-
      Elaboration GAP-2 — qa.ts uses createQAGraph(config, deps) with deps as a separate parameter, not via config
      schema. This is an established pattern in the codebase.
    decided_by: auto
    tier: 1
notes:
