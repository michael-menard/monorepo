notable_decisions:
  - >
    classifyEvidenceStrength uses per-type criteria first, then subjective language blocklist
    as an override. The blocklist is case-insensitive and checked on description field only.
  - >
    deriveAcVerdict signature includes _weakCount (with underscore prefix) to satisfy linter
    since weakCount is not needed for the binary decision rules but is part of the public API contract.
  - >
    The node gracefully handles missing worktreeDir by logging a warning and skipping the file write
    rather than throwing, ensuring robustness in test environments.
  - >
    Pure function tests import from @repo/workflow-logic (built dist) rather than direct file import
    to validate the full export chain.

