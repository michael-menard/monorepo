gaps:
  - id: gap-1
    check: scope_alignment
    finding: "Role enum mismatch: Story hardcodes RoleSchema = z.enum(['pm', 'dev', 'qa', 'po']) but actual WINT-0210 role pack files are dev.md, po.md, qa.md, da.md. Role 'pm' has no file on disk; role 'da' (devil's advocate / scope-defender) exists but is excluded from the enum. The sidecar will 404 on requests for 'pm' (no file) and cannot serve 'da' (not in enum). This blocks the core happy path for at least 2 of 4 roles."
    severity: critical
    decision: add_ac
    ac_added: "AC-10: Role enum matches actual WINT-0210 output files (dev/po/qa/da). AC-2 also updated in-place."
  - id: gap-2
    check: risk_disclosure
    finding: "pnpm-workspace.yaml uses 'packages/backend/*' glob (single level). packages/backend/sidecars/role-pack/ is two levels deep and will not be auto-discovered. ST-1 must explicitly add 'packages/backend/sidecars/*' to pnpm-workspace.yaml. Without this, pnpm install will not recognize the package, breaking the entire build."
    severity: high
    decision: add_ac
    ac_added: "AC-1 strengthened: explicit requirement to add 'packages/backend/sidecars/*' glob to pnpm-workspace.yaml"

