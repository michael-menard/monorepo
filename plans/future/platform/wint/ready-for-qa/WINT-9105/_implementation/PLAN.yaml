architectural_decisions:
  - id: ARCH-001
    question: >-
      Circuit breaker state ownership: node-local (current NodeCircuitBreaker) vs DB-shared
      (workflow.circuitBreakerState table)?
    decision: DB-shared state for LLM provider calls; node-local state for non-LLM categories
    rationale: >-
      Concurrent graph executions share LLM provider quota — a single node's circuit breaker cannot protect other graphs
      from the same failing provider. DB-shared state is required for cross-graph protection. Node-local remains
      appropriate for file_io, git, and db_write where each graph execution is isolated. This decision propagates to
      WINT-9107 AC-004 which must implement the workflow.circuitBreakerState migration.
    decided_by: story-seed
  - id: ARCH-002
    question: >-
      failureThreshold discrepancy: runner/circuit-breaker.ts uses 5, errors/workflow-errors.ts uses 3 — unify or
      preserve both?
    decision: Preserve both with explicit layer partition documentation
    rationale: >-
      Both values are correct for different concerns. failureThreshold=5 in runner/ governs per-node-invocation circuit
      breaking (the node failed 5 times in a row). failureThreshold=3 in workflow-errors.ts governs per-phase lifecycle
      circuit breaking (the phase encountered 3 workflow-level failures within a 5-minute window). These are
      conceptually different granularities. ADR documents this explicitly to prevent WINT-9107 from incorrectly unifying
      them.
    decided_by: story-seed
