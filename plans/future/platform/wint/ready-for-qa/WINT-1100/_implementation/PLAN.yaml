commands_to_run:
  - command: "pnpm --filter @repo/database-schema build"
    when: "before creating __types__ module"
    required: true
    reason: "Ensure database-schema package builds first to provide schema exports"

  - command: "pnpm --filter @repo/orchestrator build"
    when: "after __types__ module creation"
    required: true
    reason: "Build orchestrator package with new shared types"

  - command: "pnpm --filter @repo/orchestrator test src/__types__/__tests__/index.test.ts"
    when: "after __types__ tests creation"
    required: true
    reason: "Validate shared type schemas with unit tests"

  - command: "pnpm --filter @repo/orchestrator test src/db/__tests__/"
    when: "after repository migrations"
    required: true
    reason: "AC-8: Verify existing repository tests pass after migration"

  - command: "pnpm check-types --filter @repo/orchestrator"
    when: "after all code changes"
    required: true
    reason: "Ensure TypeScript compilation succeeds"

  - command: "pnpm lint --filter @repo/orchestrator"
    when: "after all code changes"
    required: true
    reason: "Ensure linting passes on all changed files"

acceptance_criteria_map:
  - ac_id: "AC-1"
    planned_evidence: "File exists: packages/backend/orchestrator/src/__types__/index.ts with imports from database-schema"
    evidence_type: file
    verification_command: "grep -r 'from.*database-schema' packages/backend/orchestrator/src/__types__/index.ts"

  - ac_id: "AC-2"
    planned_evidence: "Both insert and select schemas exported for all WINT tables"
    evidence_type: file
    verification_command: "grep -E '(insertStorySchema|selectStorySchema)' packages/backend/orchestrator/src/__types__/index.ts"

  - ac_id: "AC-3"
    planned_evidence: "Inferred TypeScript types exported using z.infer<typeof XSchema>"
    evidence_type: file
    verification_command: "grep 'type.*= z.infer' packages/backend/orchestrator/src/__types__/index.ts"

  - ac_id: "AC-4"
    planned_evidence: "JSDoc comments above each export documenting purpose and usage"
    evidence_type: file
    verification_command: "grep -B2 'export.*Schema' packages/backend/orchestrator/src/__types__/index.ts | grep '/**'"

  - ac_id: "AC-5"
    planned_evidence: "story-repository imports from __types__, local StoryRowSchema removed"
    evidence_type: file
    verification_command: "grep 'from.*__types__' packages/backend/orchestrator/src/db/story-repository.ts && ! grep 'const StoryRowSchema' packages/backend/orchestrator/src/db/story-repository.ts"

  - ac_id: "AC-6"
    planned_evidence: "workflow-repository imports from __types__, local schemas removed"
    evidence_type: file
    verification_command: "grep 'from.*__types__' packages/backend/orchestrator/src/db/workflow-repository.ts && ! grep 'const.*RecordSchema = z.object' packages/backend/orchestrator/src/db/workflow-repository.ts"

  - ac_id: "AC-7"
    planned_evidence: "Unit tests pass with >80% coverage for __types__ module"
    evidence_type: test
    verification_command: "pnpm test packages/backend/orchestrator/src/__types__/__tests__/index.test.ts"

  - ac_id: "AC-8"
    planned_evidence: "All existing repository tests pass after migration to shared types"
    evidence_type: test
    verification_command: "pnpm test packages/backend/orchestrator/src/db/"

  - ac_id: "AC-9"
    planned_evidence: "package.json exports field includes './__types__': './src/__types__/index.ts'"
    evidence_type: file
    verification_command: "cat packages/backend/orchestrator/package.json | jq '.exports'"

  - ac_id: "AC-10"
    planned_evidence: "README.md exists with import patterns and examples"
    evidence_type: file
    verification_command: "test -f packages/backend/orchestrator/src/__types__/README.md"

architectural_decisions: []

complexity: simple

notes:
  - "Per ADR Zod-First Types: All exports must be Zod schemas with inferred TypeScript types"
  - "Re-export pattern minimizes token cost - no need to duplicate schema definitions"
  - "drizzle-zod auto-generation ensures schemas stay in sync with database tables"
  - "Migration is low-risk - pure type definition work with existing test safety net"
  - "Build order: database-schema → orchestrator → consumers (prevents circular dependencies)"
  - "No E2E tests required - backend-only story with no UI impact (touches_frontend: false)"

risk_mitigation:
  - strategy: "Migrate repositories one at a time, validate tests between each"
    risk: "Type mismatches during migration"

  - strategy: "Run TypeScript strict mode to catch type mismatches at compile time"
    risk: "Runtime type errors"

  - strategy: "Maintain one-way import flow (database-schema → orchestrator → consumers)"
    risk: "Circular dependencies"

token_estimate: 18000
estimated_duration_minutes: 120
