key_findings:
  sessionUpdate_error_semantics: |
    sessionUpdate THROWS Error (not returns null) when:
    - Session not found
    - Session already completed (endedAt IS NOT NULL)
    Returns null only on DB errors.
    Agent must catch-and-skip on throw.

  sessionQuery_no_sessionId_filter: |
    sessionQuery does NOT accept sessionId as a filter field.
    Must query with activeOnly:true and filter client-side.

  cleanup_safety: |
    sessionCleanup defaults to dryRun:true.
    Only deletes completed sessions (endedAt IS NOT NULL).
    Active sessions NEVER deleted.

  no_uniqueness_constraint: |
    No DB uniqueness constraint on (agentName, storyId).
    Agent must enforce one-active-session invariant via
    sessionQuery pre-check (AC-3 leaked-session detection).
