## Discovery Analysis

gaps:
  mvp_critical: []

  minor_improvements:
    - id: GAP-001
      category: canonical_ref_gap
      description: >
        ST-2 lists token-log/SKILL.md as the canonical reference for fire-and-forget null-safe
        skill invocation. However, token-log/SKILL.md's error handling section reports errors
        to the user ("Report the error message") rather than silencing them — the opposite of
        the required behavior. The better pattern reference is kb-writer.agent.md's Fallback
        Behavior section ("Do NOT block the calling workflow"). Implementer should note this
        distinction during ST-2 execution.
      severity: low
      decision: noted
      decision_rationale: >
        Non-blocking implementer awareness item. No AC change required. Implementer should
        prioritize kb-writer.agent.md Fallback Behavior section over token-log/SKILL.md
        when implementing null-safe fire-and-forget behavior in ST-2.

    - id: GAP-002
      category: spawned_by_convention
      description: >
        AC-6 requires `spawned_by` in frontmatter as "at minimum: any workflow orchestrator
        agent that calls telemetry." The canonical reference kb-writer.agent.md does not use
        a `spawned_by` field at all (it uses prose: "Can be spawned by any agent"). The
        architect-barrel-worker.agent.md uses `spawned_by: [architect-frontend-leader]`
        (single specific agent). No existing pattern establishes a `spawned_by: [*]` wildcard
        convention. The implementer will need to establish this convention or use a prose
        statement in the Mission section, consistent with kb-writer.agent.md's approach.
        Recommend clarifying in ST-1 which convention to use.
      severity: low
      decision: noted
      decision_rationale: >
        Non-blocking implementer awareness item. No AC change required. Implementer should
        use kb-writer.agent.md prose pattern ("Can be spawned by any agent") as the model
        for the spawned_by convention, since no wildcard pattern is established.

    - id: GAP-003
      category: dependency_status_drift
      description: >
        The story's Reality Baseline lists WINT-3010 as "ready-for-qa" but current filesystem
        state shows WINT-3010 is in `failed-code-review`. WINT-3020 is in `needs-code-review`
        (matches the baseline). This means both direct dependencies have not yet passed their
        respective gates. The story is correctly blocked as backlog but implementers should
        verify dependency advancement before starting. No story change needed — the gating
        requirement is correct.
      severity: low
      decision: noted
      decision_rationale: >
        Non-blocking implementer awareness item. No story change required. Implementer must
        verify WINT-3010 has passed QA and WINT-3020 has passed code review before starting
        ST-1. Story gating language is correct as written.

    - id: GAP-004
      category: scope_defender_model_mismatch
      description: >
        scope-defender.agent.md (the primary canonical template) does NOT include `model: haiku`
        in its frontmatter — it uses `tools: [Read, Grep, Glob, Write]` and other fields, but
        not a model declaration. architect-barrel-worker.agent.md does include `model: haiku`.
        For AC-1 compliance (correct frontmatter with model: haiku), the implementer should
        use architect-barrel-worker.agent.md as the frontmatter template, not scope-defender.
        The story's ST-1 already lists both as canonical refs, so this is implicit — but the
        priority ordering should be explicit.
      severity: low
      decision: noted
      decision_rationale: >
        Non-blocking implementer awareness item. No AC change required. For ST-1 frontmatter
        construction, use architect-barrel-worker.agent.md as the primary frontmatter template
        (it has model: haiku) and scope-defender.agent.md for LangGraph Porting Notes and
        Non-Negotiables sections.

