gaps:
  - id: GAP-001
    severity: minor
    blocking: false
    title: "Schema fields totalTokens and estimatedCost not addressed in AC-2 parameter list or Zod schema"
    description: >
      The `agentInvocations` table has two fields not included in AC-2's parameter spec:
      `totalTokens` (integer, NOT NULL, default 0) and `estimatedCost` (numeric, NOT NULL,
      default '0.0000'). The story's `WorkflowLogInvocationInputSchema` (ST-2) does not include
      these fields. If the implementation uses `insertAgentInvocationSchema` from Drizzle-Zod
      (referenced in the Reuse Plan at line 1877 of wint.ts), that generated schema WILL include
      those fields and the custom Zod schema may diverge. The DB defaults handle inserts correctly,
      but the story should explicitly state whether these fields are intentionally excluded from
      the input schema (relying on DB defaults) or whether `totalTokens` should be computed
      application-side before insert (as the column comment says).
    recommendation: >
      Add a note to ST-2 clarifying that `totalTokens` and `estimatedCost` are intentionally
      excluded from the input Zod schema and will use DB defaults. If `totalTokens` should be
      computed as `inputTokens + outputTokens + cachedTokens` at application level (per column
      comment), add that computation to ST-3 implementation guidance.
    decision: defer
    decision_note: "DB defaults handle MVP correctly; totalTokens computation is future enhancement"

  - id: GAP-002
    severity: minor
    blocking: false
    title: "Incorrect crypto import in implementation pseudocode"
    description: >
      The ST-3 pseudocode shows `import { crypto } from 'node:crypto'` which is not valid Node.js
      syntax. The actual session-create.ts canonical reference uses `import { randomUUID } from 'crypto'`
      (not 'node:crypto', not `crypto` as a namespace). The pseudocode also references
      `crypto.randomUUID()` but the correct call with the named import would be `randomUUID()`.
      A developer following the pseudocode verbatim will get a TypeScript/compile error.
    recommendation: >
      Correct ST-3 pseudocode to: `import { randomUUID } from 'crypto'` and call `randomUUID()`
      directly (matching session-create.ts line 12-13 exactly).
    decision: fix_in_story
    decision_note: "Pseudocode corrected to match session-create.ts canonical reference"

  - id: GAP-003
    severity: minor
    blocking: false
    title: "frontmatter depends_on includes WINT-0120 which is a scope overlap, not a prerequisite"
    description: >
      The frontmatter `depends_on: [WINT-0120, WINT-0040]` will cause workflow tooling to gate
      WINT-3020 on WINT-0120 completion. However, the story explicitly states this story pulls
      `workflow_log_invocation` forward from WINT-0120, meaning WINT-0120 is NOT a prerequisite.
      The `blocks` list correctly identifies WINT-3070 and WINT-3090 as downstream. WINT-0040
      is a legitimate dependency (table must exist).
    recommendation: >
      Remove WINT-0120 from frontmatter `depends_on`. Keep WINT-0040. Add a comment in the
      story's Context section (already present in body) that this story coordinates with WINT-0120
      but does not depend on it.
    decision: fix_in_story
    decision_note: "Removed WINT-0120 from depends_on; it's a scope overlap not a dependency"

opportunities:
  - id: OPP-001
    title: "Compute totalTokens at application layer before insert"
    description: >
      The `totalTokens` column comment says 'computed at application level' but AC-4 and ST-3
      do not specify this computation. Adding `totalTokens: (parsed.inputTokens ?? 0) + (parsed.outputTokens ?? 0) + (parsed.cachedTokens ?? 0)`
      to the insert values would populate the column meaningfully for analytics queries downstream
      (WINT-3070, WINT-3090) rather than leaving it at the DB default of 0.
    blocking: false
    decision: log_to_kb

  - id: OPP-002
    title: "Expose invocationId auto-generation in skill documentation"
    description: >
      AC-4 specifies that `invocationId` should be auto-generated if not provided, but the
      skill's recommended pattern is a stable, predictable ID (`{agentName}-{storyId}-{isoTimestamp}`).
      The SKILL.md could include a code block showing how to construct this recommended ID before
      calling the skill, improving consistency across agents.
    blocking: false
    decision: log_to_kb

  - id: OPP-003
    title: "Add EC-4 to test plan's integration test scenarios"
    description: >
      EC-4 (duplicate invocationId unique constraint) is only in the unit test coverage matrix
      but not mentioned in the integration test section. Since the unique constraint is a DB-level
      concern, validating it in an integration test (when WINT-0040 migration is applied) would
      increase confidence. Currently gated on WINT-0040 anyway, so this is low friction to add.
    blocking: false
    decision: log_to_kb

  - id: OPP-004
    title: "Consider adding completedAt parameter for callers that know end time"
    description: >
      The `agentInvocations` table has a `completedAt` nullable timestamp column. The current
      parameter spec (AC-2) does not expose this. A caller providing `durationMs` may also have
      the completion timestamp. Adding `completedAt` as an optional parameter would make the
      log record more complete for timeline analysis without blocking MVP.
    blocking: false
    decision: log_to_kb

