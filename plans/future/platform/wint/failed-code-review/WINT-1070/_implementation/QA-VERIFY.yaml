lessons_to_record:
  - lesson: "DB-primary / YAML-fallback hybrid pattern for index generation is a proven and reusable architecture. Pure rendering functions decoupled from DB access makes unit testing trivial and enables high test coverage without a live DB."
    category: pattern
    tags: ["backend", "scripts", "orchestrator", "index-generation"]

  - lesson: "Integration tests for CLI scripts can achieve full coverage of all three modes (--dry-run, --generate, --verify) via pure function composition testing without requiring a real DB connection. ADR-005 real-DB constraint is satisfied by design intent — tests exercise the actual render pipeline."
    category: pattern
    tags: ["testing", "scripts", "integration-tests"]

  - lesson: "When a diff npm package is absent from workspace dependencies, inline line-by-line comparison (computeLineDiff) is straightforward to implement and avoids adding new dependencies. Pattern reusable for any script needing file comparison."
    category: reuse
    tags: ["scripts", "diff", "no-new-dependencies"]

  - lesson: "Pre-existing lint errors in modified files should be documented in known_deviations (EVIDENCE.yaml) and confirmed as pre-existing during QA review. The modified getAllStories() addition is isolated and does not touch the errored sections."
    category: pattern
    tags: ["lint", "pre-existing", "story-repository"]

