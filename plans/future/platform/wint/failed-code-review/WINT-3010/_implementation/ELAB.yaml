gaps:
  - id: GAP-001
    title: "missing_proofs field absent from AC-11 Zod discriminated union definition"
    blocking: true
    description: >
      AC-11 defines the discriminated union as { ok: true, data: T } | { ok: false, error: string }
      but the HTTP Contract Plan, AC-7, and all EC test cases include missing_proofs: string[] in
      the ok:false 422 response. If an implementer derives the Zod schema strictly from AC-11
      without also reading AC-7, the ok:false variant will be missing the missing_proofs field.
      The TypeScript inferred type will not match the HTTP contract, causing a type error when
      constructing the 422 response in the route handler.
    recommendation: >
      Update AC-11 or AC-7 to explicitly state that the ok:false variant has shape
      { ok: false, error: string, missing_proofs?: string[] } — with missing_proofs as an
      optional field present on 422 responses and absent on 400/404/405 responses. Alternatively,
      add a note in ST-1 that the ok:false Zod schema must include missing_proofs as z.array(z.string()).optional().
    decision: add_ac
    ac_added: "AC-11 updated to include missing_proofs?: string[] in ok:false variant — full shape is { ok: true, data: T } | { ok: false, error: string, missing_proofs?: string[] }"
    resolved_at: "2026-03-08T23:49:00.000Z"

  - id: GAP-002
    title: "ST-2 verification command references test file not yet created"
    blocking: false
    description: >
      ST-2 verification is "pnpm test --filter @repo/gatekeeper-sidecar" with a note about
      "unit tests all 4 stages" but ST-5 is where test files are created. ST-2 has no test
      file to run at the point of its own verification step. This will cause the verification
      to either fail (no test file found) or vacuously pass (no tests = 0 failures).
    recommendation: >
      Change ST-2 verification to "pnpm check-types --filter @repo/gatekeeper-sidecar" to match
      ST-1 and ST-3 (type-check only at scaffold stage). Reserve test execution for ST-5.
    decision: fix_in_story
    note: "ST-2 verification corrected to pnpm check-types --filter @repo/gatekeeper-sidecar in both YAML frontmatter and prose sections of WINT-3010.md"
    resolved_at: "2026-03-08T23:49:00.000Z"

opportunities:
  - id: OPP-001
    title: "Add stage field to 422 error response for caller debuggability"
    description: >
      The 422 error response { ok: false, error: "Gate check failed", missing_proofs: [...] } does
      not include the stage that was being validated. Callers that process multiple stage transitions
      would benefit from seeing which stage failed in the response body alongside missing_proofs,
      avoiding the need to correlate with the original request.
    effort: trivial
    blocking: false
    decision: log_to_kb
    kb_entry_id: "a93d7281-624d-4dab-b849-14862c0dcc9d"
    kb_artifact_name: "ELAB-OPP-001"
    defer_reason: "Non-blocking enhancement. Request body already contains stage for correlation. Defer to follow-on or add during implementation at implementer discretion."

  - id: OPP-002
    title: "Test case for oversized request body (MAX_BODY_SIZE_BYTES)"
    description: >
      The readBody utility from @repo/sidecar-http-utils throws when request body exceeds
      MAX_BODY_SIZE_BYTES (1MB). No test case covers this behavior for the gatekeeper endpoint.
      EC-5 covers malformed JSON but not oversized body. An integration test verifying HTTP 400
      on oversized body would close this gap and be consistent with defense-in-depth for the
      sidecar pattern.
    effort: small
    blocking: false
    decision: defer
    kb_entry_id: null
    defer_reason: "Non-blocking. readBody behavior covered by shared utility tests. Implementer may add as EC-10 in ST-5 if time permits. KB write failed with transient error."

