skipped: true
reason: "WINT-4010 is a backend-only sidecar (packages/backend/sidecars/cohesion/). No UI components, no frontend surfaces, and no Playwright E2E tests are applicable. frontend_impacted: false per seed context."
api_design_note: |
  The API surface is the primary 'UX' concern for downstream agents (WINT-4060 graph-checker,
  WINT-4070 cohesion-prosecutor). Recommendations:
  - CohesionAuditResult SHOULD include a top-level summary field with aggregate counts
    (totalFeatures, completeCount, incompleteCount) for quick signal before iterating frankenFeatures[]
  - CohesionCheckResult status field SHOULD be a discriminated union: 'complete' | 'incomplete' | 'unknown'
    allowing agents to gate on status without parsing violations array
  - Response shape follows established discriminated union pattern: { ok: true, data: ... } / { ok: false, error: string }
