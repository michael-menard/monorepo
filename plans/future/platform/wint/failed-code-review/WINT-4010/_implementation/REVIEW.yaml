findings:
  - id: CR-1
    severity: critical
    file: packages/backend/sidecars/cohesion/src/compute-audit.ts
    lines: "69"
    title: "innerJoin excludes features without capabilities"
    description: |
      The query uses .innerJoin(capabilities, ...) which excludes features that have
      zero capabilities from the result set. This means features without any CRUD
      mappings will be silently missing from the audit result and coverageSummary.
      They should appear as franken-features with all capabilities missing.
      Must change to .leftJoin so features with zero capabilities are included.
    fix: |
      Change .innerJoin(capabilities, eq(capabilities.featureId, features.id)) to
      .leftJoin(capabilities, eq(capabilities.featureId, features.id)).
      Also update the DrizzleDb type to expose leftJoin instead of (or in addition to) innerJoin.
      Handle nullable lifecycleStage in the downstream grouping logic (already handled at line 90).
    ac_impact: "AC-3, AC-8"

  - id: CR-2
    severity: nitpick
    file: packages/backend/sidecars/cohesion/src/compute-audit.ts
    lines: "74-77"
    title: "packageName filtering done in memory instead of as SQL predicate"
    description: |
      The current code fetches all feature+capability rows then filters by packageName
      in TypeScript. This reads every row into memory before narrowing. The packageName
      filter should be pushed into the DB query as a WHERE clause so the database can
      use indexes and return only the requested rows.
    fix: |
      Add a conditional .where(eq(features.packageName, request.packageName)) to the
      Drizzle query when request.packageName is provided. Remove the post-query
      rows.filter step (filteredRows) and use the query result directly.
      Update DrizzleDb type to expose .where() on the leftJoin result.
    ac_impact: "AC-3"
