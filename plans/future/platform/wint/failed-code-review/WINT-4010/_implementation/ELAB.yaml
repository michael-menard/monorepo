# ============================================================
# GAPS (MVP-blocking only)
# ============================================================

gaps:
  - id: GAP-01
    severity: low
    title: "Graph view terminology vs. actual Drizzle query pattern"
    description: >
      The story refers to "graph.franken_features view" and "graph.capability_coverage
      view" in the Context section and Reality Baseline. However, no Drizzle pgView
      definitions for these names exist in packages/backend/database-schema/src/ —
      the codebase uses direct Drizzle ORM queries against the features and
      capabilities tables (as demonstrated in graph-get-franken-features.ts).
      If an implementor expects a pre-built SQL view called franken_features in the
      wint schema and queries it directly, they will hit a runtime error.
    resolution: >
      Implementor must follow the graph-get-franken-features.ts pattern: query
      features + capabilities tables directly via Drizzle ORM, apply TypeScript-level
      grouping. The canonical reference file (ST-3, ST-4 guidance) makes this clear.
      The risk is low because ST-3 and ST-4 explicitly reference graph-get-franken-features.ts
      as the canonical pattern. No AC changes required; a comment in computeAudit.ts
      and computeCheck.ts clarifying this distinction would prevent future confusion.
    ac_impact: none
    blocks_happy_path: false
    decision: >
      acknowledge — GAP-01 is low severity, blocks_happy_path: false, and has a clear
      resolution path documented via the canonical reference (graph-get-franken-features.ts).
      The canonical reference files cited in ST-3 and ST-4 make the correct query pattern
      explicit. No AC changes required. Story proceeds to implementation as-is.

