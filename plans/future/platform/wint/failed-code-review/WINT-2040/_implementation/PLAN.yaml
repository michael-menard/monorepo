architectural_decisions:
  - id: ARCH-001
    question: "Should the populator use a standalone script structure (not a tx-based seeder) given it needs to connect its own DB and manage its own lifecycle?"
    decision: >-
      Standalone script pattern: export async function populateAgentMissionCache(db, agentsDir): PopulateResult.
      Accept db instance as parameter to allow testing with mock, while CLI entrypoint creates real db connection.
      Same pattern as the direct contextCachePut tool, not the tx-based agent-seeder.
    rationale: >-
      The populator is a one-shot script, not a transactional seed phase. DB errors per-agent should be caught
      and skipped (not rolled back). Accepting db as a parameter enables unit testing with mock DB (matching
      the test patterns in agent-seeder.test.ts). The story explicitly says 'direct Drizzle upsert' not
      'within a transaction'.
    decided_by: auto

  - id: ARCH-002
    question: "How should the content column type widening be done for AC-12?"
    decision: >-
      Add an AgentMissionContentSchema Zod object for type documentation and test validation. Use
      z.record(z.unknown()) for DB insert values (already accepted by insertContextPackSchema.content).
      No TypeScript interface — Zod schema only.
    rationale: >-
      The contextPacks.content column is already typed as jsonb (z.record(z.unknown())) at the DB level.
      The TypeScript error risk (AC-12) is in the insert values object. The existing insertContextPackSchema.content
      accepts z.record(z.unknown()) which handles this without further schema changes. AgentMissionContentSchema
      is additive documentation only.
    decided_by: auto

  - id: ARCH-003
    question: "What migration number to use given last migration is 0032?"
    decision: "Use 0033_wint_2040_agent_missions_enum.sql as the migration filename."
    rationale: >-
      Latest migration is 0032_wint_0040_hitl_decisions_story_outcomes.sql. Next sequential number is 0033.
      Pattern: {number}_{story_slug}_{description}.sql.
    decided_by: auto

complexity: moderate

notes:
  - "context_pack_type enum is in public schema (not wint schema) — migration must use ALTER TYPE public.context_pack_type ADD VALUE 'agent_missions' (confirmed from 0015_messy_sugar_man.sql)"
  - "SeedResult from phase-seeder has shape { success, rowCount, warnings } — story requires { totalFound, cached, skipped, warnings } — define new PopulateResultSchema in the populator file rather than reusing SeedResult"
  - "parseFrontmatter already returns { data, content } where content is the body string after gray-matter strips frontmatter — call parseFrontmatter per-file, pass content to extractMissionSummary, pass data to extractAgentMetadata inline"
  - "glob ignore pattern for _archive/: { ignore: ['**/_archive/**'] } in glob options"
  - "Integration test HP-5 requires live PostgreSQL on port 5433 and agent_missions migration applied — tag with vitest environment skip or .runIf(process.env.KB_INTEGRATION)"
  - "mcp-tools ContextCachePutInputSchema packTypeValues does NOT include agent_missions — do NOT use that schema for validation in the populator; use a local literal type or the Drizzle schema directly"
  - "WINT-0100 contextCachePut is in UAT — do NOT call it from the populator; use direct Drizzle upsert matching agent-seeder.ts pattern"
