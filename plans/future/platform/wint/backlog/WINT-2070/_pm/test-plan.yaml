strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Full cache-warm run: all four scripts succeed"
    setup: |
      - Dev environment running with postgres at port 5432 (lego_dev)
      - KB database running at port 5433 (lego_kb)
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev
      - KB_DATABASE_URL=postgresql://postgres:postgres@localhost:5433/lego_kb
      - wint.context_packs table accessible (may be empty or stale)
    action: "Run /cache-warm (invoke the skill, execute each pnpm tsx command in sequence)"
    expected: |
      - All four pnpm tsx commands exit 0
      - Summary block shows: 4/4 scripts succeeded
      - wint.context_packs has at least 15 rows (5 project-context + 6 domain-kb + 4 library-cache + 1+ agent-missions)
      - Final message: "Cache warm complete. Context packs are ready for agent use."
    evidence: "Summary block output + SELECT COUNT(*) FROM wint.context_packs; returns >= 15"

  - id: HP-2
    title: "Skill is invokable with --skip=agent-missions flag"
    setup: |
      - Same as HP-1
      - Caller passes --skip=agent-missions option
    action: "Run /cache-warm --skip=agent-missions"
    expected: |
      - Only three scripts run (project-context, domain-kb, library-cache)
      - agent-missions marked SKIP in summary
      - Summary block shows: 3/4 scripts succeeded (1 skipped)
    evidence: "Summary block shows SKIP: --skip flag for agent-missions entry"

  - id: HP-3
    title: "Skill frontmatter is valid (name, description present)"
    setup: "Read .claude/skills/cache-warm/SKILL.md"
    action: "Inspect frontmatter for name: cache-warm and non-empty description field"
    expected: |
      - name: cache-warm
      - description: non-empty string describing the skill
    evidence: "SKILL.md frontmatter parses correctly"

error_cases:
  - id: EC-1
    title: "DATABASE_URL missing: skill blocks with clear message"
    setup: "Unset DATABASE_URL from environment before invocation"
    action: "Run /cache-warm"
    expected: |
      - Skill emits: CACHE-WARM BLOCKED: DATABASE_URL is not set.
      - No scripts are run
      - Instructions include how to fix (set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev)
    evidence: "CACHE-WARM BLOCKED message emitted before any script execution"

  - id: EC-2
    title: "KB_DATABASE_URL missing: domain-kb skipped with warning (non-fatal)"
    setup: "Set DATABASE_URL correctly but leave KB_DATABASE_URL unset"
    action: "Run /cache-warm"
    expected: |
      - Warning emitted: KB_DATABASE_URL is not set. populate-domain-kb.ts will be skipped.
      - project-context, library-cache, agent-missions scripts still run normally
      - domain-kb marked SKIP in summary
      - Summary block shows: 3/4 scripts succeeded (1 skipped)
    evidence: "Summary block with domain-kb SKIP: KB_DATABASE_URL not set"

  - id: EC-3
    title: "Individual script fails: warm continues, partial report shown"
    setup: |
      - Temporarily cause one script to fail (e.g., break populate-library-cache.ts by
        passing an invalid environment variable, or by temporarily renaming the file)
      - Both DATABASE_URL and KB_DATABASE_URL set correctly
    action: "Run /cache-warm"
    expected: |
      - Failing script does not abort remaining scripts
      - Other scripts complete normally
      - Summary block shows: 3/4 scripts succeeded (1 failed)
      - Failures section shows error reason
      - Final message: CACHE-WARM PARTIAL: 3/4 scripts succeeded.
    evidence: "CACHE-WARM PARTIAL message + per-script status in summary"

edge_cases:
  - id: ED-1
    title: "Skill is LLM-executable (not just shell commands)"
    setup: "Review .claude/skills/cache-warm/SKILL.md content"
    action: "Verify instructions describe phases, decision points, and success signals in LLM-readable prose — not just shell script blocks"
    expected: |
      - Skill has phased execution sections (Phase 1 through Phase 6)
      - Each phase describes what to do, what success looks like, and what to do on failure
      - An LLM agent can follow the instructions without additional interpretation
    evidence: "Skill has Phase 1-6 sections with human-readable instructions"

  - id: ED-2
    title: "agent-mission-cache-populator.ts path is documented correctly"
    setup: "Read .claude/skills/cache-warm/SKILL.md"
    action: "Verify the skill references packages/backend/database-schema/src/seed/agent-mission-cache-populator.ts (not mcp-tools path)"
    expected: "Skill uses correct path: packages/backend/database-schema/src/seed/agent-mission-cache-populator.ts"
    evidence: "Grep for agent-mission-cache-populator path in SKILL.md confirms correct location"

  - id: ED-3
    title: "Skill port documentation is correct (5432 for lego_dev, 5433 for KB)"
    setup: "Read .claude/skills/cache-warm/SKILL.md environment reference section"
    action: "Verify DATABASE_URL targets port 5432 and KB_DATABASE_URL targets port 5433"
    expected: |
      - DATABASE_URL documented as port 5432 (lego_dev)
      - KB_DATABASE_URL documented as port 5433 (lego_kb)
    evidence: "Environment reference table in SKILL.md shows correct ports"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "SELECT COUNT(*) FROM wint.context_packs; returns >= 15 after full successful warm"
      - "SELECT pack_type, pack_key FROM wint.context_packs; shows entries for architecture, lessons_learned, codebase, agent_missions types"

manual_cases:
  - id: MC-1
    title: "Smoke test: run /cache-warm from clean state"
    steps:
      - "TRUNCATE wint.context_packs; (optional — confirms from-scratch behavior)"
      - "Set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev"
      - "Set KB_DATABASE_URL=postgresql://postgres:postgres@localhost:5433/lego_kb"
      - "Invoke /cache-warm"
      - "Observe all four phase outputs"
      - "Read summary block"
      - "SELECT COUNT(*) FROM wint.context_packs;"
    expected: "At least 15 rows in wint.context_packs; summary shows 4/4 succeeded"

  - id: MC-2
    title: "Partial failure resilience: omit KB_DATABASE_URL"
    steps:
      - "Unset KB_DATABASE_URL"
      - "Invoke /cache-warm"
      - "Confirm warning emitted for domain-kb"
      - "Confirm other 3 scripts run and succeed"
      - "Read summary block"
    expected: "3/4 scripts succeeded; domain-kb SKIP reason shown"

fixture_definitions:
  - name: "clean_context_packs"
    type: "sql"
    description: "TRUNCATE wint.context_packs; — empties the table to test from-scratch behavior"
  - name: "env_no_kb_url"
    type: "environment"
    description: "DATABASE_URL set to port 5432; KB_DATABASE_URL unset — tests domain-kb skip path"

risks:
  - "Skill is a markdown instruction file — no automated test suite can verify its correctness; all tests are manual"
  - "WINT-2040 (agent-mission-cache-populator.ts) was at failed-code-review at some point — if the script is broken, EC-3 covers resilience but HP-1 will show 3/4 not 4/4"
  - "Port confusion (5432 vs 5433) is the #1 historically observed failure mode — ED-3 specifically guards this"
  - "Test coverage depends on dev environment being fully running (both DBs up)"
