lessons_to_record:
  - lesson: |
      When QA iteration 1 fails due to EVIDENCE.yaml attestation without disk verification,
      iteration 2 must directly grep each disputed AC on disk. This pattern (EVIDENCE claims pass,
      disk reveals missing content) should trigger automatic disk grep for all file-type evidence
      items in future QA runs. The iteration 2 fix-cycle approach worked correctly here.
    category: pattern
    tags: ["qa-verify", "evidence", "doc-sync", "attestation"]

  - lesson: |
      Doc-only stories with no Vitest tests should document test exemption explicitly in
      QA-VERIFY.yaml with the rationale, not silently skip. This prevents QA confusion about
      whether tests were forgotten or intentionally excluded.
    category: pattern
    tags: ["qa-verify", "docs-story", "test-coverage"]

  - lesson: |
      EVIDENCE.yaml attestations can diverge from disk reality in doc-only stories where the
      leader executes changes without spawning a coder. QA verification by actual file inspection
      (grep/read) is essential — evidence self-attestation alone is insufficient. The fix-cycle
      iteration model successfully recovered from this class of failure.
    category: anti_pattern
    tags: ["doc-sync", "evidence", "attestation", "doc-only", "qa-verify"]

