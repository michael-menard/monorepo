  - lesson: >
      For documentation-only stories that modify agent instruction files, manual review
      of the markdown content against ACs is the correct verification method. No build,
      test, or coverage checks apply, but QA should still spot-check every AC against
      the actual file content rather than trusting EVIDENCE.yaml alone.
    category: pattern
    tags: ["docs", "qa", "documentation-only"]

  - lesson: >
      The ordered take-over sequence (worktree_mark_complete → check result → /wt:new)
      with a secondary 'abandon' confirmation and null-return guard is a reliable pattern
      for destructive operations that must never be auto-selected by autonomy levels.
    category: pattern
    tags: ["worktree", "conflict-resolution", "autonomy", "ux"]

