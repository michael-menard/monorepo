    relevant_to_scope:
      - story_id: KBAR-0110
        lesson: Use vi.useFakeTimers() for timeout tests — naive real-timer tests add up to 10s per test case in CI
        category: pattern
        applies_because: WINT-9107 has HALF_OPEN recovery tests that depend on recoveryTimeoutMs — must use fake timers for unit scope
      - story_id: APIP-1030
        lesson: >-
          Token bucket rate limiter patterns: vi.useFakeTimers() + while-loop setTimeout works cleanly for
          timing-sensitive tests
        category: pattern
        applies_because: Circuit breaker HALF_OPEN transition uses time-based recovery; same fake timer pattern applies
      - story_id: APIP-3030
        lesson: >-
          LangGraph createToolNode factory handler index.ts files are not unit-testable in isolation — test individual
          module functions instead
        category: pattern
        applies_because: Node factory tests should target createNode/createLLMNode directly, not any composed handler index.ts
      - story_id: APIP-2010
        lesson: >-
          Circuit-open detection gap: event-driven callback only fires on dispatch, not on state transitions without new
          jobs. Known trade-off.
        category: pattern
        applies_because: HALF_OPEN tests must actively trigger transitions — cannot rely on passive observation
    blockers_to_avoid:
      - Real wall-clock timers in HALF_OPEN recovery tests — use vi.useFakeTimers() in unit scope
      - Testing handler index.ts in isolation — test createNode/createLLMNode/createToolNode directly
    patterns_to_follow:
      - vi.useFakeTimers() + vi.advanceTimersByTimeAsync() for all timing-sensitive tests
      - Promise.allSettled for concurrent test scenarios to avoid unhandled rejection warnings
      - Test graph.compile() for routing validation without running full pipeline
    patterns_to_avoid:
      - Real timers in unit tests with recoveryTimeoutMs — fragile and slow CI
      - Generic artifact_search without domain scope
