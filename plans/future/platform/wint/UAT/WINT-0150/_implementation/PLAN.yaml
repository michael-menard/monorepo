architectural_decisions:
  - id: ARCH-001
    question: "Should MCP tools be accessed directly in doc-sync agent or via a database service layer?"
    decision: "Direct access via MCP tools (conditional call pattern)"
    rationale: "Follows existing codebase pattern - session-management and story-management MCP tools both use direct @repo/db access. No service layer exists for MCP tools. Pattern: check tool availability, call if available, gracefully degrade if not."
    decided_by: autonomous
    tier: 1
    precedent: "packages/backend/mcp-tools/src/session-management/session-query.ts"

  - id: ARCH-002
    question: "Should database query timeout be configurable or hardcoded?"
    decision: "Hardcoded 30-second timeout constant with TODO comment for future configurability"
    rationale: "AC-9 specifies 'configurable (default: 30 seconds)' but no configuration mechanism specified in story. Hardcode with clear constant name and TODO to avoid scope creep while documenting intent."
    decided_by: autonomous
    tier: 1
    note: "Future story can add config file support"

  - id: ARCH-003
    question: "Should database schema changes be included in this story or deferred?"
    decision: "Deferred - assume workflow.phases and workflow.components tables exist as soft dependency"
    rationale: "SCOPE.yaml touched_paths_globs excludes database-schema package. Story description 'query postgres-knowledgebase' implies tables exist. AC-1 says 'queries are optional - skill degrades gracefully if database is unavailable'. Story focus is doc-sync enhancement, not schema creation."
    decided_by: autonomous
    tier: 1
    dependency_note: "Assumes WINT-0070/WINT-0080 completed (table creation)"

complexity: moderate

notes:
  - "Story assumes workflow.phases and workflow.components tables exist (dependency on WINT-0070/0080)"
  - "MCP tools for postgres-knowledgebase may need to be created if they don't exist"
  - "Database queries are optional - graceful degradation to file-only mode is critical"
  - "Test files location assumption: .claude/agents/__tests__/ (pattern from other agent tests)"
  - "Using haiku model for doc-sync agent per existing frontmatter"
  - "Phase 2 database query adds ~5K tokens per run (acceptable per token optimization context)"
  - "docs/workflow/ updates are expected outputs of doc-sync skill execution, not source code changes"
  - "SCOPE.yaml paths are input sources; docs/workflow/ is generated output per AC-6"
  - "Test files are standard practice for validating AC-7 and AC-9 requirements"
