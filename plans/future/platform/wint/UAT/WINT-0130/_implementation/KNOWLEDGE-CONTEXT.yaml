# Generated: 2026-02-16

story_id: "WINT-0130"
story_title: "Create Graph Query MCP Tools"

# ============================================================================
# REUSABLE PATTERNS FROM EXISTING CODEBASE
# ============================================================================

reusable_patterns:
  mcp_tool_structure:
    source: "packages/backend/mcp-tools/src/session-management/"
    pattern_name: "MCP Tool Directory Structure"
    applies_to: "WINT-0130 graph-query tools"

    directory_layout:
      root: "packages/backend/mcp-tools/src/graph-query/"
      files:
        - "graph-check-cohesion.ts (tool implementation)"
        - "graph-get-franken-features.ts (tool implementation)"
        - "graph-get-capability-coverage.ts (tool implementation)"
        - "graph-apply-rules.ts (tool implementation)"
        - "__types__/index.ts (Zod schemas)"
        - "__tests__/graph-check-cohesion.test.ts"
        - "__tests__/graph-get-franken-features.test.ts"
        - "__tests__/graph-get-capability-coverage.test.ts"
        - "__tests__/graph-apply-rules.test.ts"
        - "index.ts (re-exports all tools)"

    reuse_recommendation: "Follow exact structure from session-management"

  zod_validation_pattern:
    source: "packages/backend/mcp-tools/src/session-management/__types__/index.ts"
    pattern_name: "Zod-First Input Validation"
    applies_to: "All 4 graph-query tools"

    example_schema: |
      import { z } from 'zod'

      export const SessionCreateInputSchema = z.object({
        sessionId: z.string().uuid('sessionId must be a valid UUID').optional(),
        agentName: z.string().min(1, 'agentName is required'),
        storyId: z.string().nullable().optional(),
        phase: z.string().nullable().optional(),
        inputTokens: z.number().int().min(0).optional().default(0),
      })

      export type SessionCreateInput = z.infer<typeof SessionCreateInputSchema>

    key_features:
      - "UUID validation with custom error messages"
      - "String length constraints (min, max)"
      - "Optional fields with .optional()"
      - "Nullable fields with .nullable()"
      - "Default values with .default()"
      - "Type inference via z.infer<typeof Schema>"

    reuse_recommendation: "Create FeatureIdSchema with dual ID support (UUID or feature name)"

  dual_id_support_pattern:
    source: "packages/backend/mcp-tools/src/story-management/story-get-status.ts"
    pattern_name: "Dual ID Support (UUID or Human-Readable)"
    applies_to: "graph_check_cohesion, graph_get_capability_coverage"

    schema_example: |
      // From story-management
      export const StoryIdSchema = z.string().uuid().or(z.string().min(1))

    query_example: |
      import { eq, or } from 'drizzle-orm'

      const [story] = await db
        .select()
        .from(stories)
        .where(or(eq(stories.id, parsed.storyId), eq(stories.storyId, parsed.storyId)))
        .limit(1)

    key_features:
      - "Accepts UUID format OR feature name string"
      - "Uses Drizzle .or() to query both id and featureName columns"
      - "Validates with z.string().uuid().or(z.string().min(1))"

    reuse_recommendation: "Apply to graph_check_cohesion and graph_get_capability_coverage"

  error_handling_pattern:
    source: "packages/backend/mcp-tools/src/session-management/session-create.ts"
    pattern_name: "Resilient Error Handling"
    applies_to: "All 4 graph-query tools"

    example_implementation: |
      import { logger } from '@repo/logger'

      try {
        const [session] = await db
          .insert(contextSessions)
          .values({ ... })
          .returning()

        return session
      } catch (error) {
        // Resilient error handling: log warning, don't crash
        logger.warn(
          `[mcp-tools] Failed to create session for agent '${parsed.agentName}':`,
          error instanceof Error ? error.message : String(error),
        )
        return null
      }

    key_features:
      - "Try/catch around all database operations"
      - "Log errors via @repo/logger (never console.log)"
      - "Return safe defaults: null, [], 'unknown' status"
      - "Never throw DB errors to MCP server (prevents agent crashes)"
      - "Error messages include context (tool name, entity ID)"

    safe_defaults:
      graph_check_cohesion: "{ status: 'unknown' }"
      graph_get_franken_features: "[] (empty array)"
      graph_get_capability_coverage: "null"
      graph_apply_rules: "[] (empty array)"

    reuse_recommendation: "Apply exact pattern to all 4 tools"

  drizzle_orm_query_pattern:
    source: "packages/backend/mcp-tools/src/story-management/story-get-status.ts"
    pattern_name: "Drizzle ORM Prepared Statements"
    applies_to: "All 4 graph-query tools"

    example_select_query: |
      import { eq, or } from 'drizzle-orm'
      import { db } from '@repo/db'
      import { stories } from '@repo/database-schema'

      const [story] = await db
        .select()
        .from(stories)
        .where(or(eq(stories.id, featureId), eq(stories.storyId, featureId)))
        .limit(1)

    example_insert_query: |
      const [session] = await db
        .insert(contextSessions)
        .values({
          sessionId,
          agentName: parsed.agentName,
          storyId: parsed.storyId ?? null,
        })
        .returning()

    example_join_query: |
      import { eq } from 'drizzle-orm'

      const results = await db
        .select()
        .from(features)
        .leftJoin(capabilities, eq(capabilities.featureId, features.id))
        .where(eq(features.packageName, packageName))

    example_aggregation_query: |
      import { count, eq } from 'drizzle-orm'

      const capabilityCounts = await db
        .select({
          lifecycleStage: capabilities.lifecycleStage,
          count: count(capabilities.id),
        })
        .from(capabilities)
        .where(eq(capabilities.featureId, featureId))
        .groupBy(capabilities.lifecycleStage)

    key_features:
      - "Uses Drizzle query builder methods (.select(), .from(), .where())"
      - "Operators imported from drizzle-orm (eq, or, and, count)"
      - "All dynamic values passed as query arguments (no string concatenation)"
      - "Drizzle generates parameterized SQL ($1, $2, etc.)"
      - "Prevents SQL injection by design"

    forbidden_patterns:
      - "db.execute() with string templates"
      - "Raw SQL concatenation"
      - "String interpolation in queries"

    reuse_recommendation: "Use Drizzle for ALL database access in graph-query tools"

  jsdoc_pattern:
    source: "packages/backend/mcp-tools/src/session-management/session-create.ts"
    pattern_name: "Comprehensive JSDoc Comments"
    applies_to: "All 4 graph-query tools"

    example_jsdoc: |
      /**
       * Create a new agent session in wint.contextSessions
       *
       * @param input - Session creation parameters
       * @returns Created session record or null if DB error occurs
       *
       * @example
       * ```typescript
       * const session = await sessionCreate({
       *   agentName: 'dev-execute-leader',
       *   storyId: 'WINT-0110',
       *   phase: 'execute',
       * })
       * ```
       */

    required_tags:
      - "@param: Each parameter with Zod schema constraints"
      - "@returns: Return type with all possible values (null, status values, etc.)"
      - "@example: Realistic usage with expected output"

    reuse_recommendation: "Add JSDoc to all 4 tools during Phase D"

  test_structure_pattern:
    source: "packages/backend/mcp-tools/src/session-management/__tests__/session-create.test.ts"
    pattern_name: "Vitest Test Organization"
    applies_to: "All 4 graph-query test files"

    test_file_structure: |
      import { describe, it, expect, beforeAll, afterAll } from 'vitest'
      import { db, contextSessions } from '@repo/db'
      import { sessionCreate } from '../session-create.js'

      describe('sessionCreate', () => {
        describe('happy path', () => {
          it('should create session with valid input', async () => { ... })
        })

        describe('validation', () => {
          it('should reject invalid UUID', async () => { ... })
        })

        describe('error handling', () => {
          it('should return null on DB error', async () => { ... })
        })

        describe('security', () => {
          it('should prevent SQL injection', async () => { ... })
        })
      })

    test_categories:
      - "Happy path scenarios"
      - "Validation (Zod schema enforcement)"
      - "Edge cases (empty results, null inputs)"
      - "Error scenarios (DB failures)"
      - "Security tests (SQL injection, XSS, DoS)"

    reuse_recommendation: "Apply structure to all 4 graph-query test files"

# ============================================================================
# GRAPH SCHEMA KNOWLEDGE (WINT-0060)
# ============================================================================

graph_schema_knowledge:
  source: "packages/backend/database-schema/src/schema/wint.ts"
  story: "WINT-0060 (Graph Relational for Cohesion)"
  status: "UAT (needs-work) - schema is stable"

  tables:
    features:
      schema: "wint.features"
      purpose: "Track features in codebase for dependency and cohesion analysis"
      columns:
        - id: "uuid (primary key)"
        - featureName: "text (unique, e.g., 'user-authentication')"
        - featureType: "text ('api_endpoint', 'ui_component', 'service', 'utility')"
        - packageName: "text (e.g., '@repo/ui', '@repo/api')"
        - filePath: "text (primary file implementing feature)"
        - description: "text"
        - tags: "jsonb (string[])"
        - metadata: "jsonb (Record<string, unknown>)"
        - isActive: "boolean (default true)"
        - deprecatedAt: "timestamp"
        - createdAt: "timestamp"
        - updatedAt: "timestamp"

      indexes:
        - "features_feature_name_idx (unique index on featureName)"
        - "features_feature_type_idx"
        - "features_package_name_idx"
        - "features_is_active_idx"
        - "features_package_feature_type_idx (composite)"

      drizzle_import: "import { features } from '@repo/database-schema'"

    capabilities:
      schema: "wint.capabilities"
      purpose: "Track high-level capabilities provided by features"
      columns:
        - id: "uuid (primary key)"
        - capabilityName: "text (unique, e.g., 'user-create-account')"
        - capabilityType: "text ('business', 'technical', 'infrastructure')"
        - description: "text"
        - owner: "text (team or person responsible)"
        - metadata: "jsonb"
        - maturityLevel: "text ('experimental', 'beta', 'stable', 'deprecated')"
        - lifecycleStage: "text ('create', 'read', 'update', 'delete')"
        - createdAt: "timestamp"
        - updatedAt: "timestamp"

      indexes:
        - "capabilities_capability_name_idx (unique)"
        - "capabilities_capability_type_idx"
        - "capabilities_maturity_level_idx"

      drizzle_import: "import { capabilities } from '@repo/database-schema'"

      note: "lifecycleStage is critical for CRUD coverage analysis in graph_get_capability_coverage and graph_get_franken_features"

    featureRelationships:
      schema: "wint.feature_relationships"
      purpose: "Track relationships between features for dependency graph"
      columns:
        - id: "uuid (primary key)"
        - sourceFeatureId: "uuid (foreign key to features.id)"
        - targetFeatureId: "uuid (foreign key to features.id)"
        - relationshipType: "enum ('depends_on', 'enhances', 'conflicts_with', 'related_to', 'supersedes')"
        - strength: "integer (0-100 scale, default 50)"
        - description: "text"
        - detectedBy: "text ('manual', 'static_analysis', 'runtime')"
        - createdAt: "timestamp"
        - updatedAt: "timestamp"

      indexes:
        - "feature_relationships_source_idx"
        - "feature_relationships_target_idx"
        - "feature_relationships_type_idx"
        - "feature_relationships_unique (unique on source, target, type)"

      self_referencing: true
      note: "Self-referencing table - both sourceFeatureId and targetFeatureId reference features.id"

      drizzle_import: "import { featureRelationships } from '@repo/database-schema'"

    cohesionRules:
      schema: "wint.cohesion_rules"
      purpose: "Define rules for feature cohesion and co-location"
      columns:
        - id: "uuid (primary key)"
        - ruleName: "text (unique, e.g., 'package-cohesion-rule')"
        - ruleType: "text ('package_cohesion', 'feature_coupling', 'layer_separation')"
        - conditions: "jsonb (RuleConditions type)"
        - maxViolations: "integer (default 0)"
        - severity: "text ('error', 'warning', 'info')"
        - isActive: "boolean (default true)"
        - createdAt: "timestamp"
        - updatedAt: "timestamp"

      indexes:
        - "cohesion_rules_rule_name_idx (unique)"
        - "cohesion_rules_rule_type_idx"
        - "cohesion_rules_is_active_idx"
        - "cohesion_rules_type_active_idx (composite)"

      jsonb_conditions_schema:
        type: "RuleConditions"
        fields:
          featurePatterns:
            include: "string[] (substring match in feature name)"
            exclude: "string[] (exclude if substring match)"
          packagePatterns:
            include: "string[] (package name filters)"
            exclude: "string[] (package name exclusions)"
          relationshipTypes: "string[] (relationship types to check)"

      drizzle_import: "import { cohesionRules } from '@repo/database-schema'"

      critical_notes:
        - "Only active rules (isActive = true) should be applied"
        - "JSONB conditions field requires type-safe parsing"
        - "MVP: Basic pattern matching (substring include/exclude)"
        - "Advanced regex/wildcards deferred to future"

  drizzle_relations:
    featuresRelations:
      outgoingRelationships: "many(featureRelationships, { relationName: 'sourceFeature' })"
      incomingRelationships: "many(featureRelationships, { relationName: 'targetFeature' })"

    featureRelationshipsRelations:
      sourceFeature: "one(features, { fields: [sourceFeatureId], references: [id] })"
      targetFeature: "one(features, { fields: [targetFeatureId], references: [id] })"

  query_patterns:
    self_referencing_outgoing:
      description: "Query outgoing relationships from a feature"
      drizzle_example: |
        import { eq } from 'drizzle-orm'
        const outgoing = await db
          .select()
          .from(featureRelationships)
          .where(eq(featureRelationships.sourceFeatureId, featureId))

    self_referencing_incoming:
      description: "Query incoming relationships to a feature"
      drizzle_example: |
        const incoming = await db
          .select()
          .from(featureRelationships)
          .where(eq(featureRelationships.targetFeatureId, featureId))

    capability_coverage_aggregation:
      description: "Count capabilities by lifecycleStage"
      drizzle_example: |
        import { count, eq } from 'drizzle-orm'
        const coverage = await db
          .select({
            lifecycleStage: capabilities.lifecycleStage,
            count: count(capabilities.id),
          })
          .from(capabilities)
          .where(eq(capabilities.featureId, featureId))
          .groupBy(capabilities.lifecycleStage)

    franken_features_detection:
      description: "Find features with < 4 CRUD capabilities"
      drizzle_example: |
        // Pseudo-code (actual implementation requires groupBy + having)
        const frankenFeatures = await db
          .select({
            featureId: features.id,
            featureName: features.featureName,
            capabilityCount: count(capabilities.id),
          })
          .from(features)
          .leftJoin(capabilities, eq(capabilities.featureId, features.id))
          .groupBy(features.id, features.featureName)
          .having(lt(count(capabilities.id), 4))

    active_rules_filter:
      description: "Query only active cohesion rules"
      drizzle_example: |
        import { eq, and } from 'drizzle-orm'
        const activeRules = await db
          .select()
          .from(cohesionRules)
          .where(and(
            eq(cohesionRules.isActive, true),
            eq(cohesionRules.ruleType, ruleType) // optional filter
          ))

# ============================================================================
# DRIZZLE ORM KNOWLEDGE
# ============================================================================

drizzle_orm_knowledge:
  version: "^0.44.3"
  package: "drizzle-orm"

  imports:
    query_operators: "import { eq, or, and, lt, gt, count } from 'drizzle-orm'"
    db_client: "import { db } from '@repo/db'"
    schema_tables: "import { features, capabilities, featureRelationships, cohesionRules } from '@repo/database-schema'"

  query_builder_methods:
    select: "db.select() - Start SELECT query"
    from: ".from(table) - Specify table"
    where: ".where(condition) - Add WHERE clause"
    leftJoin: ".leftJoin(table, condition) - LEFT JOIN"
    groupBy: ".groupBy(column) - GROUP BY clause"
    orderBy: ".orderBy(column) - ORDER BY clause"
    limit: ".limit(n) - LIMIT clause"
    returning: ".returning() - Return inserted/updated rows"

  operators:
    eq: "eq(column, value) - column = value"
    or: "or(cond1, cond2) - OR clause"
    and: "and(cond1, cond2) - AND clause"
    lt: "lt(column, value) - column < value"
    gt: "gt(column, value) - column > value"
    count: "count(column) - COUNT aggregation"

  prepared_statements:
    description: "Drizzle automatically generates parameterized queries"
    benefit: "Prevents SQL injection by design"
    sql_output_example: "SELECT * FROM wint.features WHERE id = $1"
    note: "All dynamic values passed as $1, $2, etc. (not concatenated)"

  type_safety:
    description: "Drizzle infers TypeScript types from schema"
    select_type: "Inferred from table schema + .select() fields"
    insert_type: "createInsertSchema() generates Zod schema"
    update_type: "Partial of insert schema"

  security:
    sql_injection_prevention: "Drizzle uses prepared statements (parameterized queries)"
    no_raw_sql: "Avoid db.execute() with string templates"
    validation: "Combine with Zod for input validation at entry point"

# ============================================================================
# ZOD VALIDATION KNOWLEDGE
# ============================================================================

zod_validation_knowledge:
  version: "^3.22.4"
  package: "zod"

  common_patterns:
    string_validation:
      uuid: "z.string().uuid('Custom error message')"
      min_length: "z.string().min(1, 'Must not be empty')"
      max_length: "z.string().max(255)"
      email: "z.string().email()"

    number_validation:
      integer: "z.number().int()"
      min: "z.number().min(0)"
      max: "z.number().max(100)"
      range: "z.number().int().min(0).max(100)"

    optional_nullable:
      optional: "z.string().optional() - field can be undefined"
      nullable: "z.string().nullable() - field can be null"
      optional_nullable: "z.string().nullable().optional() - both"
      default: "z.number().default(0) - default value if undefined"

    enums:
      string_enum: "z.enum(['value1', 'value2'])"
      enum_with_default: "z.enum(['a', 'b']).default('a')"

    unions:
      dual_id: "z.string().uuid().or(z.string().min(1)) - UUID OR string"

    objects:
      basic: "z.object({ field: z.string() })"
      nested: "z.object({ nested: z.object({ ... }) })"

    type_inference:
      infer_type: "type MyType = z.infer<typeof MySchema>"

  validation_execution:
    parse: |
      // Throws ZodError if validation fails
      const parsed = MySchema.parse(input)

    safeParse: |
      // Returns { success: boolean, data?: T, error?: ZodError }
      const result = MySchema.safeParse(input)
      if (!result.success) {
        // Handle validation errors
      }

    recommended_pattern: "Use .parse() at MCP tool entry - fail fast on invalid input"

  error_handling:
    example: |
      try {
        const parsed = MySchema.parse(input)
      } catch (error) {
        if (error instanceof ZodError) {
          // Zod validation error
          return { error: error.errors }
        }
      }

  security_benefits:
    input_sanitization: "Rejects malicious inputs before they reach DB"
    type_safety: "Prevents type confusion attacks"
    constraint_enforcement: "Enforces string length, number ranges, etc."

# ============================================================================
# SECURITY TESTING KNOWLEDGE
# ============================================================================

security_testing_knowledge:
  source: "WINT-0130 AC-3 (SQL Injection Risk Mitigation Testing)"

  test_categories:
    sql_injection:
      description: "Test malicious SQL inputs that attempt to manipulate queries"
      test_cases:
        - input: "'; DROP TABLE features; --"
          expected: "Zod validation error (invalid UUID format)"
          verification: "Database spy confirms no query executed"

        - input: "1' OR '1'='1"
          expected: "Zod validation error (invalid UUID format)"
          verification: "No data leakage (empty results or error)"

        - input: "uuid-here' UNION SELECT * FROM features --"
          expected: "Zod validation error (invalid UUID format)"
          verification: "Query never reaches database"

      prevention_mechanism:
        - "Drizzle ORM prepared statements (parameterized queries)"
        - "Zod validation rejects non-UUID formats"
        - "No raw SQL concatenation"

    xss_prevention:
      description: "Test XSS payloads in string inputs"
      test_cases:
        - input: "<script>alert('xss')</script>"
          expected: "Zod validation error (invalid UUID format)"
          verification: "No script execution in response"

        - input: "feature<img src=x onerror=alert('xss')>"
          expected: "Accepted if dual ID support, but escaped in output"
          verification: "No code execution"

      prevention_mechanism:
        - "Zod validates format before storage"
        - "Database stores as-is (no interpretation)"
        - "Frontend responsible for output encoding (out of scope)"

    dos_prevention:
      description: "Test extremely long strings to prevent DoS"
      test_cases:
        - input: "'a'.repeat(10000)"
          expected: "Zod validation error (string too long)"
          verification: "No performance degradation"

        - input: "Array of 10,000 package names"
          expected: "Rejected or paginated (limit enforcement)"
          verification: "Query completes in reasonable time"

      prevention_mechanism:
        - "Zod string length limits (.max(255))"
        - "Database column length constraints"
        - "Query result pagination (deferred to future)"

    invalid_format:
      description: "Test invalid UUID formats"
      test_cases:
        - input: "not-a-uuid"
          expected: "Zod validation error OR dual ID fallback (if supported)"
          verification: "Clear error message"

        - input: "null"
          expected: "Zod validation error (required field)"
          verification: "Rejected at entry"

        - input: "undefined"
          expected: "Zod validation error (required field)"
          verification: "Rejected at entry"

      prevention_mechanism:
        - "Zod .uuid() validation"
        - "Dual ID support with .or() for fallback"

  test_implementation_pattern:
    example: |
      describe('security: SQL injection prevention', () => {
        it('should reject SQL injection attempt: DROP TABLE', async () => {
          const maliciousInput = "'; DROP TABLE features; --"

          const result = await graph_check_cohesion({ featureId: maliciousInput })

          // Expect validation error or safe default
          expect(result).toEqual({ status: 'unknown' })

          // Verify no query executed (spy on db client)
          expect(dbSpy).not.toHaveBeenCalled()
        })

        it('should reject boolean SQL injection', async () => {
          const maliciousInput = "1' OR '1'='1"

          const result = await graph_check_cohesion({ featureId: maliciousInput })

          expect(result).toEqual({ status: 'unknown' })
        })
      })

  security_review_checklist:
    items:
      - "Input validation: All tools use Zod at entry"
      - "Prepared statements: All queries use Drizzle ORM (no string concat)"
      - "Error handling: All DB errors caught and logged (never thrown)"
      - "Logging: All errors use @repo/logger (never console.log)"
      - "SQL injection: All security tests pass"
      - "XSS prevention: All malicious inputs rejected or escaped"
      - "DoS prevention: String length limits enforced"

    compliance_target: "100%"
    verification: "Document in EVIDENCE.yaml with test results"

# ============================================================================
# ARCHITECTURE CONSTRAINTS (CLAUDE.md)
# ============================================================================

architecture_constraints:
  source: "/Users/michaelmenard/Development/monorepo/CLAUDE.md"

  zod_first_types:
    rule: "ALWAYS use Zod schemas for types - never use TypeScript interfaces"
    rationale: "Runtime validation, automatic type inference, self-documenting constraints"

    correct_pattern: |
      import { z } from 'zod'

      const UserSchema = z.object({
        id: z.string().uuid(),
        email: z.string().email(),
        name: z.string().min(1),
      })

      type User = z.infer<typeof UserSchema>

    incorrect_pattern: |
      // WRONG - never use interfaces
      interface User {
        id: string
        email: string
        name: string
      }

    applies_to: "All __types__/index.ts schemas in graph-query"

  no_barrel_files:
    rule: "NO BARREL FILES - import directly from source files"
    exception: "Directory-level index.ts to re-export tools is allowed (session-management pattern)"

    allowed: |
      // packages/backend/mcp-tools/src/graph-query/index.ts
      export { graph_check_cohesion } from './graph-check-cohesion.js'
      export { graph_get_franken_features } from './graph-get-franken-features.js'

    not_allowed: |
      // DON'T create intermediate barrel files in subdirectories

    applies_to: "graph-query directory exports"

  logging_requirement:
    rule: "ALWAYS use @repo/logger - never use console.log"

    correct_pattern: |
      import { logger } from '@repo/logger'
      logger.warn('[mcp-tools] Failed to create session:', error.message)

    incorrect_pattern: |
      console.log('Failed to create session:', error) // WRONG

    applies_to: "All error handling in graph-query tools"

  component_directory_structure:
    rule: "Follow standard component directory structure"

    structure: |
      graph-query/
        graph-check-cohesion.ts      # Main implementation
        graph-get-franken-features.ts
        graph-get-capability-coverage.ts
