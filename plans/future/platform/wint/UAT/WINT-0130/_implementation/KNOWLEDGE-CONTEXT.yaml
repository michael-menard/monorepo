# ============================================================================
# JSONB CONDITION EVALUATION KNOWLEDGE
# ============================================================================

jsonb_condition_evaluation:
  source: "WINT-0060 cohesionRules.conditions column"
  mvp_scope: "Basic pattern matching (substring include/exclude)"
  deferred_scope: "Advanced regex, wildcards, glob patterns"

  condition_schema:
    type: "RuleConditions"
    fields:
      featurePatterns:
        include: "string[] - substring match in feature name"
        exclude: "string[] - substring exclude in feature name"
      packagePatterns:
        include: "string[] - package name filters"
        exclude: "string[] - package name exclusions"
      relationshipTypes: "string[] - relationship types to validate"

  typescript_type: |
    type RuleConditions = {
      featurePatterns?: {
        include: string[]
        exclude?: string[]
      }
      packagePatterns?: {
        include: string[]
        exclude?: string[]
      }
      relationshipTypes?: string[]
    }

  parsing_pattern: |
    // Parse JSONB conditions with type safety
    const conditions = rule.conditions as RuleConditions

    // Check feature name patterns
    if (conditions.featurePatterns) {
      const { include, exclude } = conditions.featurePatterns
      const matches = include.some(pattern =>
        feature.featureName.includes(pattern)
      )
      const excluded = exclude?.some(pattern =>
        feature.featureName.includes(pattern)
      )
      return matches && !excluded
    }

  error_handling: |
    // Handle malformed JSONB gracefully
    try {
      const conditions = rule.conditions as RuleConditions
      // Evaluate conditions
    } catch (error) {
      logger.warn(`[mcp-tools] Malformed JSONB in rule '${rule.ruleName}':`, error.message)
      // Skip this rule, continue with others
      return false
    }

  edge_cases:
    malformed_json: "Skip rule, log warning, continue"
    missing_fields: "Treat as empty array (safe default)"
    type_mismatch: "Skip rule if conditions is not an object"

  future_enhancements:
    regex_support: "conditions.featurePatterns.regex: string[]"
    glob_patterns: "conditions.featurePatterns.glob: string[]"
    dependency_depth: "conditions.maxDependencyDepth: number"

