blocking_issues:
  - id: "BLOCK-001"
    severity: "CRITICAL"
    category: "Acceptance Criteria Violation"
    title: "Function Naming Convention Violation"

    description: |
      All 4 functions implemented in camelCase but WINT-0130 story explicitly requires
      snake_case naming per line 791-792 and MCP Server Integration section (lines 790-793).

      Story requirement: "Snake case: `graph_check_cohesion` (not `graphCheckCohesion`)"

    affected_files:
      - "packages/backend/mcp-tools/src/graph-query/graph-check-cohesion.ts"
      - "packages/backend/mcp-tools/src/graph-query/graph-get-franken-features.ts"
      - "packages/backend/mcp-tools/src/graph-query/graph-get-capability-coverage.ts"
      - "packages/backend/mcp-tools/src/graph-query/graph-apply-rules.ts"
      - "packages/backend/mcp-tools/src/graph-query/index.ts"
      - "packages/backend/mcp-tools/src/index.ts"

    current_implementation:
      - "export async function graphCheckCohesion(...)"
      - "export async function graphGetFrankenFeatures(...)"
      - "export async function graphGetCapabilityCoverage(...)"
      - "export async function graphApplyRules(...)"

    required_implementation:
      - "export async function graph_check_cohesion(...)"
      - "export async function graph_get_franken_features(...)"
      - "export async function graph_get_capability_coverage(...)"
      - "export async function graph_apply_rules(...)"

    impact: "Tools will be inaccessible to agents with correct names. AC-15 blocked."

    remediation:
      action: "Rename all 4 function definitions and update all exports"
      estimated_effort: "30 minutes"
      priority: "P0"

  - id: "BLOCK-002"
    severity: "HIGH"
    category: "Error Handling Gap"
    title: "Zod Validation Outside Try/Catch Blocks"

    description: |
      Two tools have Zod `.parse()` validation outside try/catch blocks, which means
      Zod validation errors will propagate to MCP server instead of being caught and
      handled gracefully with safe defaults. This violates AC-12 (Resilient Error Handling).

    affected_files:
      - "packages/backend/mcp-tools/src/graph-query/graph-get-franken-features.ts" (line 51)
      - "packages/backend/mcp-tools/src/graph-query/graph-get-capability-coverage.ts" (line 53)

    current_pattern: |
      GraphGetFrankenFeaturesInputSchema.parse(input)  // ❌ Outside try/catch

      try {
        // Business logic
      } catch (error) {
        // This does NOT catch Zod validation errors
      }

    required_pattern: |
      try {
        const parsed = GraphGetFrankenFeaturesInputSchema.parse(input)  // ✅ Inside try/catch
        // Business logic
      } catch (error) {
        // Now catches BOTH Zod validation errors AND runtime errors
        logger.warn('Failed to get Franken-features:', error)
        return []
      }

    impact: "Validation errors thrown to MCP server instead of returning safe defaults"

    remediation:
      action: "Move Zod validation inside try/catch blocks in both affected tools"
      estimated_effort: "30 minutes"
      priority: "P0"

