  block_002:
    id: "BLOCK-002"
    title: "Zod Validation Outside Try/Catch Blocks"
    severity: "HIGH"
    status: "FIXED"

    description: |
      Two tools had Zod .parse() validation outside try/catch blocks, which means
      Zod validation errors would propagate to MCP server instead of being caught
      and handled gracefully with safe defaults.

    fix_applied:
      action: "Moved Zod validation inside try/catch blocks in 2 affected tools"
      pattern_before: |
        GraphGetFrankenFeaturesInputSchema.parse(input)  // ❌ Outside try/catch

        try {
          // Business logic
        } catch (error) {
          // This does NOT catch Zod validation errors
        }

      pattern_after: |
        try {
          GraphGetFrankenFeaturesInputSchema.parse(input)  // ✅ Inside try/catch
          // Business logic
        } catch (error) {
          // Now catches BOTH Zod validation errors AND runtime errors
          logger.warn('Failed to get Franken-features:', error)
          return []
        }

    files_modified:
      - file: "packages/backend/mcp-tools/src/graph-query/graph-get-franken-features.ts"
