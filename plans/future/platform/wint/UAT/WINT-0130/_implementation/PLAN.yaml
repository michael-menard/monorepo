# ============================================================================
# RISK MITIGATION
# ============================================================================

risks_and_mitigations:
  wint_0060_schema_changes:
    risk: "Graph schema may change if WINT-0060 UAT finds issues"
    likelihood: "LOW"
    impact: "HIGH"
    mitigation:
      - "Verify WINT-0060 UAT status before starting"
      - "Use current wint.ts schema as baseline"
      - "Schema is stable (UAT issues are documentation, not structural)"

  graph_query_performance:
    risk: "Complex JOIN queries may be slow on large datasets"
    likelihood: "MEDIUM"
    impact: "MEDIUM"
    mitigation:
      - "Start with simple queries (no optimization premature)"
      - "Defer materialized views to future iteration"
      - "Log query performance metrics for future analysis"

  jsonb_condition_complexity:
    risk: "JSONB condition evaluation logic may be complex"
    likelihood: "MEDIUM"
    impact: "MEDIUM"
    mitigation:
      - "MVP: Basic pattern matching (substring, include/exclude)"
      - "Defer regex/wildcards to future iteration"
      - "Document condition schema clearly in JSDoc"
      - "Handle malformed JSONB gracefully (skip rule, log warning)"

  security_test_coverage:
    risk: "Comprehensive security testing is time-intensive"
    likelihood: "MEDIUM"
    impact: "HIGH"
    mitigation:
      - "Drizzle ORM prevents SQL injection by design"
