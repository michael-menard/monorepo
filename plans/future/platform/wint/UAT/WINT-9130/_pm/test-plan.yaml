strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  documentation_only: true

note: >
  WINT-9130 is a documentation-only story. The standard unit/integration/e2e test pipeline
  does not apply. This test plan defines a documentation quality checklist that substitutes
  for automated tests, per KB lesson (WKFL-001/006/008) on docs-only review.

happy_path_tests:
  - id: HP-1
    title: "Frontmatter schema validity"
    setup: "docs/workflow/langgraph-migration.md exists with YAML frontmatter block"
    action: "Inspect frontmatter fields: title, version, created_at, updated_at, status, tags"
    expected: "All required fields present; status === 'active'; version is a semver string; tags is a non-empty array"
    evidence: "Manual inspection of file header"

  - id: HP-2
    title: "Feature comparison table completeness"
    setup: "WINT-9120 parity test suite is complete with results available"
    action: "Cross-reference each row in the feature comparison table against WINT-9120 parity test dimensions"
    expected: "Every tested capability in WINT-9120 has a corresponding row with Parity Verdict populated from test evidence"
    evidence: "All WINT-9120 parity test capability dimensions are represented in the table"

  - id: HP-3
    title: "Decision guide covers all four scenarios"
    setup: "docs/workflow/langgraph-migration.md decision guide section is present"
    action: "Read decision guide section, verify all four scenarios are addressed: (a) new greenfield, (b) extending existing agent, (c) migrating existing agent, (d) parallel transition"
    expected: "All four scenarios have clear, opinionated guidance (not just options listing)"
    evidence: "Section headings or subsections explicitly address each scenario"

  - id: HP-4
    title: "Migration walkthrough step completeness"
    setup: "Migration walkthrough section present"
    action: "Verify walkthrough covers: identify agent contract, implement as LangGraph node, wire into graph, add tests"
    expected: "All four steps present with concrete code examples referencing WINT-9020 doc-sync node as canonical example"
    evidence: "Reference to packages/backend/orchestrator/src/nodes/sync/doc-sync.ts visible in walkthrough"

  - id: HP-5
    title: "Known Gotchas section minimum content"
    setup: "Known Gotchas section present"
    action: "Verify at minimum: Zod-first types requirement, PostgresSaver.setup() for checkpoint migrations, @repo/workflow-logic usage scope"
    expected: "All three gotchas documented with actionable guidance"
    evidence: "Section contains subsections or bullet points for each gotcha"

  - id: HP-6
    title: "Cross-reference link validity"
    setup: "All links/references in the document"
    action: "Verify all referenced docs exist: docs/workflow/README.md, docs/workflow/phases.md, docs/workflow/orchestration.md, docs/workflow/extending.md; verify no _implementation/ paths referenced"
    expected: "All files referenced exist at the specified paths; no stale _implementation/ references"
    evidence: "File existence check for each cross-referenced path"

  - id: HP-7
    title: "Filename correctness (index typo resolved)"
    setup: "File created at canonical path"
    action: "Verify file is at docs/workflow/langgraph-migration.md (double-g spelling), NOT langraph-migration.md"
    expected: "Canonical filename uses langgraph (double-g); stories.index.md entry updated to match"
    evidence: "File path inspection and index entry verification"

error_cases:
  - id: EC-1
    title: "Feature comparison table contains speculative data"
    setup: "Feature comparison table present in document"
    action: "Check each Parity Verdict cell — any cell not backed by a WINT-9120 test case should be flagged"
    expected: "No speculative or assumed parity verdicts; unknown rows should be marked 'Pending WINT-9120'"
    evidence: "Each verdict traces back to a named WINT-9120 test case or is explicitly marked as pending"

  - id: EC-2
    title: "TypeScript interface syntax in code snippets"
    setup: "Any code snippets or examples in the document"
    action: "Search all code blocks for 'interface ' keyword"
    expected: "No TypeScript interfaces present; all type definitions use Zod-style notation (z.object({...}))"
    evidence: "grep for 'interface ' returns no results in code blocks"

  - id: EC-3
    title: "Content duplication with existing workflow docs"
    setup: "Document complete"
    action: "Compare sections against docs/workflow/README.md and docs/workflow/phases.md for verbatim or near-verbatim duplication"
    expected: "No content duplicated — links used instead of repeating information already in other docs"
    evidence: "No section mirrors content of existing docs; all cross-references use markdown links"

edge_cases:
  - id: ED-1
    title: "Mermaid diagram renders in GitHub Markdown"
    setup: "Document contains one or more Mermaid diagrams"
    action: "Preview document in GitHub or a Mermaid-compatible renderer"
    expected: "All diagrams render without syntax errors; diagram is semantically correct"
    evidence: "GitHub preview or mermaid.live render screenshot"

  - id: ED-2
    title: "Document is readable without WINT-9120 context"
    setup: "Document complete"
    action: "Read the feature comparison table cold — can a new developer understand what was tested without reading the parity test suite?"
    expected: "Table rows are self-explanatory with capability names and clear verdicts; brief context note references WINT-9120"
    evidence: "Developer unfamiliar with WINT-9120 can interpret the table"

tooling_evidence:
  backend:
    http_requests: []
    assertions: []

manual_cases:
  - id: MC-1
    title: "Documentation quality review"
    steps:
      - "1. Open docs/workflow/langgraph-migration.md in an editor"
      - "2. Verify YAML frontmatter fields: title, version, created_at, updated_at, status (active), tags"
      - "3. Verify feature comparison table has three columns: 'Supported in Claude Code', 'Supported in LangGraph', 'Parity Verdict'"
      - "4. Verify decision guide covers all 4 scenarios (greenfield, extend, migrate, parallel)"
      - "5. Verify migration walkthrough references doc-sync node as canonical example"
      - "6. Verify Known Gotchas section covers Zod types, PostgresSaver.setup(), @repo/workflow-logic"
      - "7. Verify all cross-referenced files exist (check each link)"
      - "8. Verify no TypeScript interface syntax in any code block"
      - "9. Verify canonical filename is langgraph-migration.md (double-g)"
      - "10. Verify stories.index.md entry updated to canonical filename"
    expected: "All 10 checks pass without any blocking issues"

fixture_definitions: []

risks:
  - "Feature comparison table may be incomplete if WINT-9120 test suite does not cover all listed capabilities"
  - "Cross-reference links may break if future docs are renamed — prefer relative links with anchors"
  - "Mermaid syntax compatibility varies across markdown renderers — test in both VS Code preview and GitHub"
