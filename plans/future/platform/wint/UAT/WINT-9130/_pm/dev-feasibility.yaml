feasible: true
confidence: high
rationale: >
  WINT-9130 delivers a single markdown file with no code changes. The output path is
  well-defined (docs/workflow/langgraph-migration.md), the patterns to follow are
  canonical (docs/workflow/README.md frontmatter, WINT-0220-STRATEGY.md structure),
  and the content is grounded in completed WINT-9120 parity test results. The only
  hard dependency is WINT-9120 — implementer must not begin writing the feature
  comparison table until WINT-9120 is marked complete.
complexity: low
change_surface:
  areas:
    - docs/workflow/ (new file: langgraph-migration.md)
    - plans/future/platform/wint/stories.index.md (filename typo correction)
  endpoints: []
  deploy_touchpoints: []

risks:
  - finding: "WINT-9120 is a hard dependency — feature comparison table data cannot be assumed"
    mitigation: >
      Do not begin writing the feature comparison table until WINT-9120 is marked
      complete and its parity test results are available. The story has a Depends On:
      WINT-9120 constraint that enforces this. Write placeholder rows marked
      'Pending WINT-9120' if needed during authoring, and fill in before marking done.
  - finding: "Index typo (langraph vs langgraph) must be resolved explicitly"
    mitigation: >
      Create file at docs/workflow/langgraph-migration.md (correct double-g spelling).
      Update stories.index.md infrastructure entry from langraph-migration.md to
      langgraph-migration.md at the same time. AC-8 covers this explicitly.

missing_requirements: []

evidence_expectations:
  - "docs/workflow/langgraph-migration.md exists at canonical path (double-g spelling)"
  - "stories.index.md infrastructure entry updated to langgraph-migration.md"
  - "Frontmatter present with all required fields (title, version, created_at, updated_at, status: active, tags)"
  - "Feature comparison table populated from WINT-9120 test results (not speculative)"
  - "Manual documentation quality checklist passes (all 10 MC-1 checks)"

subtasks:
  - id: ST-1
    title: "Study canonical patterns and build document skeleton"
    goal: >
      Read docs/workflow/README.md, docs/workflow/phases.md, and
      packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md to internalize
      frontmatter schema and section structure. Create docs/workflow/langgraph-migration.md
      with YAML frontmatter and all section headings (no content yet).
    files_to_read:
      - docs/workflow/README.md
      - docs/workflow/phases.md
      - packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md
    files_to_modify:
      - docs/workflow/langgraph-migration.md
    acs: ["AC-1", "AC-6"]
    depends_on: none
    verification: "File exists at docs/workflow/langgraph-migration.md with valid YAML frontmatter"
    estimated_tokens: 6000

  - id: ST-2
    title: "Build feature comparison table from WINT-9120 parity test results"
    goal: >
      Enumerate all graphs under packages/backend/orchestrator/src/graphs/ and
      cross-reference against WINT-9120 parity test suite results. Build the
      three-column feature comparison table (Supported in Claude Code, Supported
      in LangGraph, Parity Verdict) with data grounded in test evidence.
    files_to_read:
      - packages/backend/orchestrator/src/graphs/elaboration.ts
      - packages/backend/orchestrator/src/graphs/story-creation.ts
      - packages/backend/orchestrator/src/graphs/qa.ts
      - packages/backend/orchestrator/src/graphs/review.ts
      - packages/backend/orchestrator/src/graphs/metrics.ts
      - packages/backend/orchestrator/src/graphs/code-audit.ts
      - packages/backend/orchestrator/src/graphs/doc-graph.ts
      - packages/backend/orchestrator/src/graphs/merge.ts
      - packages/backend/orchestrator/src/__tests__/parity/ (WINT-9120 output)
    files_to_modify:
      - docs/workflow/langgraph-migration.md
    acs: ["AC-2"]
    depends_on: ST-1
    verification: "Table has at least one row per major graph with Parity Verdict populated from test evidence"
    estimated_tokens: 12000

  - id: ST-3
    title: "Write decision guide and migration walkthrough"
    goal: >
      Author the decision guide (four scenarios: greenfield, extend existing, migrate,
      parallel transition) and the step-by-step migration walkthrough using
      packages/backend/orchestrator/src/nodes/sync/doc-sync.ts as the canonical example.
    files_to_read:
      - packages/backend/orchestrator/src/nodes/sync/doc-sync.ts
      - packages/backend/orchestrator/src/nodes/sync/__tests__/doc-sync.test.ts
      - docs/workflow/extending.md
    files_to_modify:
      - docs/workflow/langgraph-migration.md
    acs: ["AC-3", "AC-4"]
    depends_on: ST-1
    verification: "Decision guide covers all 4 scenarios; walkthrough references doc-sync.ts canonical example"
    estimated_tokens: 10000

  - id: ST-4
    title: "Add Known Gotchas section and finalize cross-references"
    goal: >
      Write the Known Gotchas section covering at minimum: Zod-first types requirement
      (no TypeScript interfaces in node files), PostgresSaver.setup() for checkpoint
      migrations, @repo/workflow-logic usage scope. Finalize all cross-reference links
      to existing docs/workflow/ files. Correct the stories.index.md infrastructure
      entry from langraph-migration.md to langgraph-migration.md.
    files_to_read:
      - plans/future/platform/wint/stories.index.md
      - docs/workflow/orchestration.md
    files_to_modify:
      - docs/workflow/langgraph-migration.md
      - plans/future/platform/wint/stories.index.md
    acs: ["AC-5", "AC-6", "AC-7", "AC-8"]
    depends_on: ST-3
    verification: >
      Known Gotchas covers all 3 minimum items; all cross-reference links resolve;
      stories.index.md updated to langgraph-migration.md (double-g)
    estimated_tokens: 6000
