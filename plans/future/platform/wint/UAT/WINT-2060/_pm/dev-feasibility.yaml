feasible: true
confidence: high
rationale: "Direct copy of populate-project-context.ts architecture (WINT-2030). All dependencies (contextCachePut via WINT-0100, context_packs table via WINT-0010) are UAT-complete. No new migrations, no new enum values, no new packages. The only novelty is 4 library-specific extraction functions instead of 5 tech-stack/conventions functions. Low risk of scope creep or unexpected blockers."
complexity: low
story_points: 3

change_surface:
  areas:
    - "packages/backend/mcp-tools/src/scripts/ (new file: populate-library-cache.ts)"
    - "packages/backend/mcp-tools/src/scripts/__tests__/ (new file: populate-library-cache.test.ts)"
  endpoints: []
  deploy_touchpoints:
    - "Manual script execution: pnpm tsx packages/backend/mcp-tools/src/scripts/populate-library-cache.ts"
    - "DATABASE_URL must target port 5432 (lego_dev)"

risks:
  - finding: "Port confusion — integration tests accidentally target port 5433 (KB) instead of 5432 (lego_dev)"
    mitigation: "Assert DATABASE_URL port in integration test setup. Documented as #1 failure mode in WINT-2040/2050 history."
  - finding: "packType enum constraint — attempting to use a value not in contextPackTypeEnum causes PostgreSQL type error at insert"
    mitigation: "Use 'codebase' which is confirmed present in wint.ts contextPackTypeEnum. Verified in seed conflict analysis. No migration needed."

missing_requirements: []

evidence_expectations:
  - "pnpm check-types --filter @repo/mcp-tools exits 0"
  - "pnpm tsx packages/backend/mcp-tools/src/scripts/populate-library-cache.ts exits 0 with { attempted: 4, succeeded: 4, failed: 0 } logged"
  - "SELECT COUNT(*) FROM wint.context_packs WHERE pack_key IN ('lib-react19','lib-tailwind','lib-zod','lib-vitest') = 4"
  - "pnpm test --filter @repo/mcp-tools passes all unit and integration tests"
  - "Running script twice produces same row count (idempotency)"
  - "SELECT DISTINCT pack_type FROM wint.context_packs WHERE pack_key LIKE 'lib-%' = ['codebase'] (no extra enum values)"

