        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (a) 'no active worktree found': 2 tests pass. Returns not_found, no mockWarn call, no mark-complete call, no wt-finish call."
      - type: file
        path: ".claude/agents/qa-verify-completion-leader.agent.md"
        description: "Step 0 Step B: 'If null → skip silently, continue to Step 1 below (AC-2)'"

  - ac_id: "AC-3"
    ac_text: "When active worktree found: invoke wt-finish with branchName and worktreePath"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (b) test: 'invokes wt-finish with branchName and worktreePath (AC-3, AC-10)'. Asserts mockWtFinish called with {branchName, worktreePath}."
      - type: file
        path: ".claude/agents/qa-verify-completion-leader.agent.md"
        description: "Step 0 Step C: 'Invoke: /wt:finish {branchName} {worktreePath}'"

  - ac_id: "AC-4"
    ac_text: "On wt-finish success: call worktree_mark_complete with status merged"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (b) test: 'calls worktree_mark_complete with status merged on success (AC-4, AC-10)'. Asserts called with {worktreeId: record.id, status: 'merged'}."
      - type: file
        path: ".claude/agents/qa-verify-completion-leader.agent.md"
        description: "Step 0 Step C: 'On success: call worktree_mark_complete({worktreeId: record.id, status: merged})'"

  - ac_id: "AC-5"
    ac_text: "On wt-finish failure (CI failing): defer with abandoned + metadata"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (c) 'ci-failing-defer': 4 tests pass. Asserts worktree_mark_complete called with {status: 'abandoned', metadata: {cleanup_deferred: true, reason: 'unknown'}} per AC-12 (no structured output from wt-finish)."

  - ac_id: "AC-6"
    ac_text: "On wt-finish failure (PR review): same as AC-5 with reason unknown per AC-12"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (d) 'pr-review-defer': 3 tests pass. PR-review failure maps to reason 'unknown' per AC-12. Same abandoned+deferred path as AC-5."

  - ac_id: "AC-7"
    ac_text: "Warning message contains branchName, worktreePath, reason, and /wt:finish {storyId} action"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (c) and (d) tests: 'emits warning containing branchName, worktreePath, and /wt:finish action (AC-7)'. Asserts warning contains branchName, worktreePath, 'unknown', '/wt:finish WINT-1150'."
      - type: file
        path: ".claude/agents/qa-verify-completion-leader.agent.md"
        description: "WARNING format: 'WARNING: Worktree {branchName} at {worktreePath} was not cleaned up. Reason: unknown. Action: Run /wt:finish {STORY_ID} when ready.'"

  - ac_id: "AC-8"
    ac_text: "story-update.md adds worktree cleanup check on completed transition"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/commands/story-update.md"
        description: "New section 'Worktree Cleanup on Completed Transition (WINT-1150)' added. Applies only to uat→completed. Steps A/B/C mirror qa-verify PASS branch. Version bumped to 2.1.0. Scope constraint documented."

  - ac_id: "AC-9"
    ac_text: "WorktreeCleanupResultSchema and WorktreeCleanupDeferralReasonSchema added using Zod; no TypeScript interfaces"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/mcp-tools/src/worktree-management/__types__/index.ts"
        description: "WorktreeCleanupDeferralReasonSchema (ci_failing|pr_review_pending|user_requested|unknown) and WorktreeCleanupResultSchema (success|deferred|skipped|not_found) added using z.enum(). No TypeScript interfaces introduced."
      - type: command
        command: "pnpm --filter @repo/mcp-tools type-check"
        result: SUCCESS
        output: "tsc --noEmit exits 0"
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "Schema validation section: 8 tests verifying valid/invalid values for both schemas. All pass."

  - ac_id: "AC-10"
    ac_text: "cleanup-integration.test.ts contains four named scenarios: no-worktree, cleanup-succeeds, ci-failing-defer, pr-review-defer"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "21 tests pass. Four describe blocks: 'scenario (a): no active worktree found', 'scenario (b): worktree found, wt-finish succeeds', 'scenario (c): worktree found, wt-finish fails (CI failing)', 'scenario (d): worktree found, wt-finish fails (PR review pending)'. All named scenarios present."

  - ac_id: "AC-11"
    ac_text: "Story completion never blocked by wt-finish failure; unexpected error path continues flow"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (e) 'unexpected exception in wt-finish': 4 tests. Does not propagate exceptions (resolves, not throws), still marks abandoned, emits warning, returns 'deferred'. AC-11 confirmed."
      - type: file
        path: ".claude/agents/qa-verify-completion-leader.agent.md"
        description: "'Continue PASS flow regardless of outcome (AC-11)' explicitly stated in Step 0."
      - type: file
        path: ".claude/commands/story-update.md"
        description: "'Continue status transition regardless of outcome — story completion is never blocked by worktree cleanup.' explicitly stated."

  - ac_id: "AC-12"
    ac_text: "DECISIONS.yaml documents wt-finish has no structured output; all failures treated as reason 'unknown'"
    status: PASS
    evidence_items:
      - type: file
        path: "plans/future/platform/wint/in-progress/WINT-1150/_implementation/DECISIONS.yaml"
        description: "implementation_discovery section added: documents wt-finish as 'interactive guided skill with no structured output schema', confirmed from SKILL.md. Implementation decision: 'All wt-finish failure paths → reason: unknown'."
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "scenario (c) test: 'maps any wt-finish failure to reason unknown (AC-12)'. Asserts metadata.reason === 'unknown'."

  - ac_id: "AC-13"
    ac_text: "All deferred paths call worktree_mark_complete with status abandoned, metadata {cleanup_deferred: true, reason: '...'}"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/mcp-tools/src/worktree-management/__tests__/cleanup-integration.test.ts"
        description: "Scenarios (c), (d), (e): all assert worktree_mark_complete called with {status: 'abandoned', metadata: {cleanup_deferred: true, reason: 'unknown'}}. 3 separate describe blocks confirm this pattern."

