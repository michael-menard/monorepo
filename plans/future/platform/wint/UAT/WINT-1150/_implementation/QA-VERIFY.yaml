lessons_to_record:
  - lesson: >
      Agent instruction testing pattern: when testing agent instruction logic that has no
      dedicated module, inline the orchestration logic as a local async function in the test
      file with mocked MCP tool calls. This allows full behavioral coverage of agent steps
      without requiring a running MCP server.
    category: pattern
    tags: ["testing", "agent-instructions", "mcp-tools", "worktree-management"]

  - lesson: >
      wt-finish is an interactive guided skill with no structured output. Any caller
      expecting machine-readable CI/PR failure reasons must fall back to 'unknown'.
      Document this constraint in DECISIONS.yaml before implementing error-reason logic.
    category: blocker
    tags: ["wt-finish", "agent-skills", "structured-output", "worktree-management"]

  - lesson: >
      Deferred worktree pattern: use status 'abandoned' + metadata {cleanup_deferred: true,
      reason: 'unknown'} for all deferred cleanup paths. This is compatible with the existing
      worktreeStatusEnum (merged|abandoned) without requiring schema changes.
    category: pattern
    tags: ["worktree-management", "database-schema", "cleanup-deferral"]

