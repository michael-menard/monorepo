architectural_decisions:
  - id: ARCH-001
    question: "Does wt-finish expose machine-readable CI/PR failure reasons (ci_failing, pr_review_pending)?"
    decision: "No. wt-finish/SKILL.md confirms it is an interactive guided skill with no structured output schema. Any wt-finish failure is treated as reason: 'unknown' per AC-12."
    rationale: "Confirmed by reviewing wt-finish/SKILL.md which describes interactive prompts and no structured output. AC-12 already encodes the fallback strategy. No modification to wt-finish required in scope."
    decided_by: pre-elaboration-discovery
    impact: "AC-5 and AC-6 cannot implement specific ci_failing/pr_review_pending reasons. All failures are deferred with reason: 'unknown'. This is documented and acceptable per AC-12."

  - id: ARCH-002
    question: "What status should deferred worktrees use in worktree_mark_complete?"
    decision: "Use status: 'abandoned' with metadata {cleanup_deferred: true, reason: 'unknown'} per AC-13."
    rationale: "worktree_mark_complete accepts only 'merged' or 'abandoned'. Using 'abandoned' removes the worktree from the active list (preventing sprawl) while the metadata JSONB column preserves deferral context for WINT-1170 batch cleanup."
    decided_by: pre-elaboration-discovery
    impact: "Deferred worktrees appear as 'abandoned' in DB. WINT-1170 must query by metadata.cleanup_deferred to distinguish deferred from truly abandoned worktrees."

  - id: ARCH-003
    question: "Can story-update.md (docs-only permission) invoke MCP tools like worktree_get_by_story?"
    decision: "Proceed with adding MCP tool invocation instructions to story-update.md. The command is the invocation specification; the actual MCP calls are made by the executing agent (haiku/sonnet) reading the command. Permission constraints apply to what the executing agent can do, not to what the command file specifies."
    rationale: "ANALYSIS.md Issue 4 flags this as low-severity. TEST-PLAN.md Scenario 7 already acknowledges it. The command file instructs the agent; the agent makes the MCP tool calls. docs-only refers to file system writes, not MCP tool access."
    decided_by: analysis-informed
    impact: "Implementation should verify that the agent executing story-update has MCP tool access. If not, an alternative is to emit a note instructing the user to manually call worktree_mark_complete. Document in implementation step."

complexity: moderate

notes:
  - "wt-finish SKILL.md confirmed: interactive guided skill, no structured output. AC-12 fallback strategy ('unknown' reason) is the only valid implementation for AC-5/AC-6 within this story's scope."
  - "The wt-finish command uses /wt:finish (colon notation) per SKILL.md, not /wt-finish (hyphen). Warning message in AC-7 must use /wt:finish to match canonical invocation syntax."
  - "worktree_mark_complete takes worktreeId (UUID), not storyId. After worktree_get_by_story returns a record, use record.id as the worktreeId input."
  - "Haiku agent budget constraint: qa-verify-completion-leader must keep cleanup logic as simple 3-step conditional (check → invoke → handle). Do not add complex branching."
  - "Integration tests for real DB (ADR-005 compliance) should be tagged/skipable for environments without PostgreSQL. Unit tests mock wt-finish response."
  - "No new MCP tools, no database migrations, no new packages required. This is purely agent/command instruction + minimal TypeScript schema additions."
  - "KNOWLEDGE-CONTEXT.yaml not generated (no live KB service during planning). Elaboration artifacts (ANALYSIS.md, DECISIONS.yaml) serve as full context substitute."
