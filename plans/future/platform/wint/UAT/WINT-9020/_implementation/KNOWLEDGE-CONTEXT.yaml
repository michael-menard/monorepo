story_scope: "Port doc-sync agent logic to native LangGraph node at nodes/sync/doc-sync.ts with 7-phase contract implementation"

# ============================================================================
# Relevant Lessons from Existing Codebase Patterns
# ============================================================================
lessons:
  - id: L-001
    title: "createToolNode is the correct factory for file I/O nodes"
    summary: >
      All non-LLM nodes in the orchestrator use createToolNode (lower retries, 10s timeout)
      rather than createLLMNode or createSimpleNode. See delta-detect.ts, kb-writer-node.ts.
      For doc-sync (file I/O + subprocess), createToolNode is appropriate.
    recommendation: "Use createToolNode('doc_sync', ...) in both docSyncNode and createDocSyncNode exports."
    source: "packages/backend/orchestrator/src/nodes/elaboration/delta-detect.ts"
    tags: [node-factory, pattern]

  - id: L-002
    title: "Zod-first schemas with z.infer<> — never TypeScript interfaces for data shapes"
    summary: >
      All data schemas in the orchestrator are defined with Zod and types are inferred.
      GraphStateWithX uses a TypeScript interface only to EXTEND the GraphState (not define data).
      DocSyncConfigSchema and DocSyncResultSchema already exist as Zod schemas in the
      subprocess node — reuse and extend them.
    recommendation: >
      Retain DocSyncConfigSchema, DocSyncResultSchema as Zod schemas. Add repoRoot and
      database_status fields. GraphStateWithDocSync remains a TypeScript interface extending GraphState.
    source: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    tags: [zod, types, pattern]

  - id: L-003
    title: "updateState() is the only correct way to produce partial state returns"
    summary: >
      All nodes return updateState({ ... }) — never plain object literals. This ensures
      LangGraph-compatible immutable partial state updates. The state-helpers module
      provides updateState, createBlockedUpdate, createErrorUpdate.
    recommendation: "All docSyncImpl return paths must use updateState({ docSync: { ... } })."
    source: "packages/backend/orchestrator/src/runner/state-helpers.ts"
    tags: [state-helpers, pattern]

  - id: L-004
    title: "nodes/index.ts uses section comments for each domain"
    summary: >
      The top-level nodes/index.ts groups exports by domain with comments like
      '// Workflow Nodes', '// Elaboration Nodes'. A new '// Sync Nodes' section
      must be added when exporting from nodes/sync/index.ts.
    recommendation: >
      Add a '// Sync Nodes' section to nodes/index.ts re-exporting from ./sync/index.js.
      Pattern to follow: the '// Workflow Nodes' section in nodes/index.ts.
    source: "packages/backend/orchestrator/src/nodes/index.ts"
    tags: [exports, pattern]

  - id: L-005
    title: "Subprocess approach in nodes/workflow/doc-sync.ts must be PRESERVED (not deleted)"
    summary: >
      ELAB resolved AC-1: create native implementation at nodes/sync/doc-sync.ts and
      RETAIN nodes/workflow/doc-sync.ts as subprocess variant. The nodes/workflow/index.ts
      and nodes/index.ts already export the subprocess version. The new sync/ exports
      must not conflict with existing workflow/ exports.
    recommendation: >
      Do NOT modify nodes/workflow/doc-sync.ts or nodes/workflow/index.ts.
      New exports from nodes/sync/ must use distinct names if there is a conflict,
      but since both export docSyncNode/createDocSyncNode, the consuming graph code
      must import from the correct path. nodes/index.ts will re-export the sync/
      version under a sync-specific comment section.
    source: "plans/future/platform/wint/in-progress/WINT-9020/ELAB-WINT-9020.md"
    tags: [path-resolution, architecture]

  - id: L-006
    title: "node:child_process exec (not spawn) for git commands in native nodes"
    summary: >
      For git diff (Phase 1), use exec() not spawn() because git diff output is
      line-delimited text that fits in a buffer and does not stream. The existing
      subprocess doc-sync uses spawn for agent delegation — Phase 1 only needs exec
      for git diff, not agent delegation.
    recommendation: >
      import { exec } from 'node:child_process' and promisify it, or use
      execAsync = promisify(exec). Use for git diff HEAD --name-only, git diff --cached.
      Wrap in try/catch to trigger timestamp fallback on ENOENT.
    source: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts (Architecture Notes)"
    tags: [subprocess, git, phase-1]

  - id: L-007
    title: "js-yaml for YAML frontmatter parsing"
    summary: >
      The codebase uses js-yaml for YAML parsing (confirmed via grep across orchestrator
      package). Frontmatter is delimited by --- markers. Extract the block between
      first --- and second --- and parse with yaml.load().
    recommendation: >
      import * as yaml from 'js-yaml'. Extract frontmatter with regex
      /^---\n([\s\S]*?)\n---/. parse() the extracted block. Catch yaml.YAMLException
      for malformed YAML — add file to manualReviewNeeded, continue.
    source: "SKILL.md Phase 2 specification"
    tags: [yaml, frontmatter, phase-2]

  - id: L-008
    title: "Pattern mapping table is static and complete in SKILL.md Phase 3"
    summary: >
      The 8-pattern mapping table in SKILL.md Phase 3 is the complete specification.
      pm-*.agent.md → phases.md, elab-*.agent.md → phases.md, dev-*.agent.md → phases.md,
      code-review-*.agent.md → phases.md, qa-*.agent.md → phases.md,
      architect-*.agent.md → agent-system.md, workflow-*.agent.md → orchestration.md,
      *.md (commands) → README.md. Unknown patterns go to manualReviewNeeded.
    recommendation: >
      Implement as a static Record<string, { docFile: string; section: string }> lookup.
      Use path.basename() to extract filename, then test against patterns in order.
      Default to manualReviewNeeded if no match.
    source: "SKILL.md Phase 3 specification"
    tags: [section-mapping, phase-3]

  - id: L-009
    title: "Phase 4 surgical file edits via fs/promises readFile + writeFile with regex"
    summary: >
      Documentation files use Markdown tables. Phase 4 must read the target doc file,
      locate the correct table/section via regex or string anchors, and insert/update/
      remove a row. For MVP, the table-row pattern is a pipe-delimited markdown row.
      The SKILL.md specifies agents tables in docs/workflow/phases.md, commands table
      in docs/workflow/README.md.
    recommendation: >
      Read doc file with fs.readFile, apply string surgery using regex to find section
      anchor (e.g., '| Phase | Agent | Output |'), then insert/update/remove the
      agent row. Write back with fs.writeFile. Wrap in checkOnly guard (skip writes
      when checkOnly=true). Track missing section anchors as manualReviewNeeded items.
    source: "SKILL.md Phase 4 specification"
    tags: [file-editing, phase-4]

  - id: L-010
    title: "Mermaid validation: graph TD prefix + balanced brackets + --> arrows"
    summary: >
      Phase 5 generates graph TD diagrams from spawns frontmatter field. Validation
      checks: (1) diagram starts with 'graph TD', 'flowchart', or 'sequenceDiagram',
      (2) balanced brackets [ ], (3) valid arrows -->. On failure: preserve existing
      diagram, add to manualReviewNeeded, continue.
    recommendation: >
      Use string template to generate Mermaid. Validate with regex checks before
      writing. If validation fails, skip write and increment manualReviewNeeded.
    source: "SKILL.md Phase 5 specification"
    tags: [mermaid, validation, phase-5]

  - id: L-011
    title: "Changelog version bump: parse from file, increment, insert at top"
    summary: >
      Phase 6 reads docs/workflow/changelog.md, extracts current version from
      first '## [X.Y.Z]' heading, increments based on change type (major/minor/patch),
      drafts entry, inserts at top with [DRAFT] tag. Version bump rules:
      major=breaking/removal, minor=new files, patch=metadata/typo.
    recommendation: >
      Parse version with /## \[(\d+\.\d+\.\d+)\]/, determine bump from filesChanged
      change types, increment, draft entry string, insert after changelog header.
    source: "SKILL.md Phase 6 specification"
    tags: [changelog, phase-6]

  - id: L-012
    title: "SYNC-REPORT.md structure and required summary fields"
    summary: >
      Phase 7 generates SYNC-REPORT.md with sections: Files Changed, Sections Updated,
      Diagrams Regenerated, Manual Review Needed, Changelog Entry, Database Query Status,
      Summary. The Summary section must contain the regex-parseable lines:
      'Total files changed: N', 'Total sections updated: N', etc.
      These are the lines that DocSyncResultSchema parses for its numeric fields.
    recommendation: >
      Generate SYNC-REPORT.md as a string template. Ensure summary counts use
      the exact format required by DocSyncResultSchema parsers. Write using fs.writeFile.
      Capture write errors in errors[] array.
    source: "SKILL.md Phase 7 + existing parseSyncReport() in workflow/doc-sync.ts"
    tags: [sync-report, phase-7]

  - id: L-013
    title: "DB graceful degradation: try/catch around MCP-like DB calls"
    summary: >
      Phase 2 DB queries must be wrapped in try/catch. On TIMEOUT error → database_status:
      'timeout'. On connection error → 'connection_failed'. On MCP unavailable (function
      undefined/not callable) → 'unavailable'. All three paths continue in file-only mode.
      The DB query interface in the node is an injected function (for testability) rather
      than a direct MCP call.
    recommendation: >
      Define a DbQueryFn type in DocSyncConfigSchema or as a type parameter. Default
      implementation attempts real MCP tool call; test mocks inject stubs. Check for
      timeout via AbortSignal or setTimeout race. Check for connection errors via error
      message pattern.
    source: "SKILL.md Phase 2 Steps 2.2-2.4"
    tags: [database, graceful-degradation, phase-2]

# ============================================================================
# Architectural Decisions (Pre-Resolved)
# ============================================================================
architectural_decisions:
  - id: ADR-001
    question: "Which path for native doc-sync node: nodes/sync/ or nodes/workflow/?"
    decision: "Create at nodes/sync/doc-sync.ts (new directory). Retain nodes/workflow/doc-sync.ts as subprocess variant."
    rationale: >
      Story index entry specifies nodes/sync/. ELAB auto-resolved this to coexist with the
      subprocess version. New sync/ directory provides clean separation between subprocess
      delegation (workflow/) and native TypeScript ports (sync/).
    decided_by: elaboration-auto
    story_ref: "WINT-9020 ELAB-WINT-9020.md Issue #1"

  - id: ADR-002
    question: "Should DocSyncResultSchema include database_status field?"
    decision: "Yes — add database_status: z.enum(['success','timeout','connection_failed','unavailable']).optional() to DocSyncResultSchema in ST-2."
    rationale: "Required by AC-4 (output contract) and AC-6 (graceful degradation). The field tracks DB query outcome for SYNC-REPORT.md."
    decided_by: elaboration-auto
    story_ref: "WINT-9020 ELAB-WINT-9020.md Issue #2"

  - id: ADR-003
    question: "How to distinguish EC-3 (DB unavailable) vs EC-4 (DB timeout) in tests?"
    decision: "Two distinct vi.mock paths: EC-3 throws ConnectionError → database_status: connection_failed; EC-4 throws TimeoutError → database_status: timeout."
    rationale: "AC-10 requires covering both distinct failure modes. Unified 'DB unavailable' mock would miss timeout-specific behavior."
    decided_by: elaboration-auto
    story_ref: "WINT-9020 ELAB-WINT-9020.md Issue #3"

