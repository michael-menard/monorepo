lessons_to_record:
  - lesson: >
      Native LangGraph node porting (subprocess → native TypeScript) benefits from a
      separate nodes/sync/ directory alongside nodes/workflow/ to cleanly separate
      subprocess-delegation nodes from native-implementation ports without breaking
      existing exports.
    category: pattern
    tags: ["orchestrator", "langgraph", "node-porting", "directory-structure"]

  - lesson: >
      When both subprocess and native variants of a node coexist and both export the
      same symbol names (docSyncNode, createDocSyncNode), the top-level nodes/index.ts
      re-export should alias the new variant (nativeDocSyncNode) to prevent collisions
      while preserving backward compatibility.
    category: pattern
    tags: ["orchestrator", "exports", "naming", "backward-compatibility"]

  - lesson: >
      Shared YAML frontmatter parsing utility (adapters/utils/yaml-parser.ts) is reusable
      across native nodes and should be the go-to for any node that parses agent .md files,
      eliminating gray-matter direct usage duplication.
    category: reuse
    tags: ["yaml", "frontmatter", "orchestrator", "adapters"]

