notes:
  - This is a revision/refresh story — all primary files exist; no new files created per Non-Goals
  - >-
    CRITICAL SEQUENCE: ST-3 must update validate-strategy.ts Zod schema (add 'openrouter') BEFORE adding openrouter
    entries to WINT-0220-STRATEGY.yaml to avoid validation failures during editing
  - >-
    PipelineModelRouter ESCALATION_CHAIN is ['ollama', 'openrouter', 'anthropic'] — strategy YAML must reflect this
    three-provider chain, not just two
  - >-
    DEFAULT_MODELS uses: ollama/qwen2.5-coder:7b, openrouter/anthropic/claude-3.5-haiku, anthropic/claude-haiku-3.5 —
    these are the canonical fallback model strings
  - >-
    Model identifier format in DB (provider/model slash separator) vs model-assignments.yaml (provider:model colon
    separator) — both formats are correct for their respective consumers; document the distinction
  - >-
    80 agents are unmapped — all architect/*, audit/*, metrics agents, pipeline-specific agents (risk-predictor,
    scope-defender, etc.) need tier assignments in model-assignments.yaml
  - strategy_version should bump from 1.0.0 to 1.1.0 (minor revision — backward-compatible expansion)
  - >-
    DB-backed overrides (wint.model_assignments) have single-process cache only — this constraint must be documented in
    the strategy
  - >-
    Ollama fleet: llama3.2:8b is runtime truth (not :3b as strategy YAML shows); strategy YAML should be updated to
    match actual fleet per ollama-model-fleet.md ARCH-002
  - >-
    Four-tier routing modes (legacy/three-tier-affinity/four-tier-APIP-3070) must be documented in strategy MD as
    distinct routing scenarios
  - >-
    task_types schema does NOT enforce min(10) in the Zod schema — it enforces z.array(TaskTypeSchema).min(10); adding
    20+ entries is well within schema bounds
