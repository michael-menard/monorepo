strategy: manual+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true  # wint.model_assignments table is consulted (read-only verification)

happy_path_tests:
  - id: HP-1
    title: "Strategy YAML passes Zod validation with zero errors"
    setup: "Updated WINT-0220-STRATEGY.yaml is in place at packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
    action: "Run: npx ts-node packages/backend/orchestrator/scripts/validate-strategy.ts"
    expected: "Script exits 0 with output 'Strategy YAML valid' or equivalent success message. Zero schema violations."
    evidence: "Terminal output showing zero errors from validate-strategy.ts"

  - id: HP-2
    title: "All current agent files are covered by strategy tier mappings"
    setup: "Updated strategy document is in place; agent roster is current as of 2026-03-02 (143+ agents)"
    action: "Run agent coverage check: count .claude/agents/*.agent.md files and verify each has a strategy tier mapping (either in model-assignments.yaml or strategy YAML's agent_assignments section)"
    expected: "Zero unmapped agents. New agents added after 2026-02-14 each have an assigned tier."
    evidence: "Coverage report showing 143+ agents mapped; no 'unmapped' entries"

  - id: HP-3
    title: "Strategy document review_date is updated to next review cycle"
    setup: "WINT-0220-STRATEGY.yaml has been revised"
    action: "Read packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml and inspect the review_date field"
    expected: "review_date is updated beyond 2026-03-15 (e.g., 2026-06-15 or next quarterly date)"
    evidence: "grep review_date packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml shows updated date"

  - id: HP-4
    title: "Model identifiers match PipelineModelRouter's agent_pattern convention"
    setup: "Updated WINT-0220-STRATEGY.yaml is in place"
    action: "Cross-reference model identifier strings in WINT-0220-STRATEGY.yaml with agent_pattern values in wint.model_assignments table (lego_dev, port 5432) and in packages/backend/orchestrator/src/pipeline/model-router.ts"
    expected: "All model identifier strings in strategy YAML match the exact string conventions used by PipelineModelRouter. No silent mismatches."
    evidence: "Manual comparison showing string equality between YAML identifiers and router constants/DB patterns"

  - id: HP-5
    title: "strategy-loader.ts loads updated YAML without runtime errors"
    setup: "Updated WINT-0220-STRATEGY.yaml is in place"
    action: "Run pnpm check-types --filter @repo/orchestrator and manually invoke strategy-loader.ts in a test harness or ts-node REPL"
    expected: "No TypeScript errors; strategy loaded successfully; all tier definitions accessible"
    evidence: "Type check passes; loader returns expected strategy structure"

  - id: HP-6
    title: "Task taxonomy covers minimum 12 task types, each mapped to a tier"
    setup: "Updated WINT-0220-STRATEGY.md is in place"
    action: "Read strategy document and count distinct task types with their tier assignments"
    expected: "At least 12 task types documented with: (1) task type name, (2) recommended model tier, (3) rationale, (4) candidate models"
    evidence: "Strategy document section showing 12+ task types in a structured table"

  - id: HP-7
    title: "Fallback chains verified end-to-end (Tier 3 → 2 → 1 → 0)"
    setup: "Updated WINT-0220-STRATEGY.yaml escalation_chain section is in place"
    action: "Read escalation_chain from WINT-0220-STRATEGY.yaml and trace the path: Tier 3 (Ollama Small) → Tier 2 (Ollama Large) → Tier 1 (Claude Haiku) → Tier 0 (Claude Sonnet/Opus)"
    expected: "Each tier defines a valid fallback to the next tier up. No tier points to itself. The chain terminates at Tier 0 (human escalation or Opus)."
    evidence: "Strategy YAML escalation_chain showing linear fallback graph with no cycles"

error_cases:
  - id: EC-1
    title: "validate-strategy.ts detects malformed YAML schema"
    setup: "Temporarily add an invalid field to WINT-0220-STRATEGY.yaml (e.g., missing required tier_name field)"
    action: "Run validate-strategy.ts against the malformed YAML"
    expected: "Script exits non-zero with clear Zod error message identifying the violated field"
    evidence: "Terminal output showing ZodError with field path and expected type"

  - id: EC-2
    title: "Circular dependency detection in escalation chain"
    setup: "Read current escalation_chain in WINT-0220-STRATEGY.yaml"
    action: "Manually trace each escalation path to verify no tier references itself or creates a cycle (e.g., Tier 2 → Tier 3 would be a cycle if Tier 3 → Tier 2 also exists)"
    expected: "Zero circular dependencies. Each tier's fallback points strictly upward in the tier hierarchy."
    evidence: "Documented trace of each escalation path showing linear progression"

  - id: EC-3
    title: "Unmapped agent detection"
    setup: "Agent roster enumerated from .claude/agents/*.agent.md"
    action: "Compare agent names against model-assignments.yaml and strategy tier assignments. Flag any agent not present in either source."
    expected: "List of unmapped agents is empty OR any unmapped agent is intentionally excluded with documented rationale"
    evidence: "Coverage matrix or absence of unmapped agents in check output"

  - id: EC-4
    title: "Model identifier mismatch flagged"
    setup: "Compare WINT-0220-STRATEGY.yaml model identifiers against wint.model_assignments rows (DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev)"
    action: "Query wint.model_assignments for distinct model_identifier values; compare against strategy YAML tier model lists"
    expected: "All model identifiers in strategy YAML exist as valid identifiers in the router. Any identifier in strategy YAML that does not exist in router's known models is flagged."
    evidence: "Query result showing model identifier alignment; no orphaned identifiers"

edge_cases:
  - id: ED-1
    title: "Agent added after 2026-02-14 is correctly mapped"
    setup: "Identify agents added to .claude/agents/ after 2026-02-14 (git log or file creation dates)"
    action: "Verify each new agent has a tier assignment in model-assignments.yaml or strategy YAML"
    expected: "Every post-2026-02-14 agent has an explicit tier assignment. No agent relies on implicit/default assignment."
    evidence: "List of new agents with their tier assignments documented in strategy"

  - id: ED-2
    title: "DB-backed override scenario documented"
    setup: "wint.model_assignments table in lego_dev (port 5432) has rows for DB-backed overrides"
    action: "Verify strategy document describes the DB override mechanism and its interaction with the strategy YAML"
    expected: "Strategy document explicitly states: DB-backed overrides (wint.model_assignments) take precedence over static YAML config; invalidation is single-process only (Phase 0 limitation)"
    evidence: "Section in WINT-0220-STRATEGY.md describing DB override mechanism and cache invalidation constraint"

  - id: ED-3
    title: "Ollama unavailability fallback path documented and verified"
    setup: "Strategy YAML tier 2 and tier 3 reference Ollama models (local fleet)"
    action: "Verify each Ollama-tier entry has a documented fallback to a cloud model (Claude Haiku minimum)"
    expected: "Every Tier 2 and Tier 3 task type has a fallback_to field pointing to a Tier 1 or Tier 0 model"
    evidence: "Strategy YAML showing fallback_to for all Ollama model assignments"

  - id: ED-4
    title: "Affinity-based routing scenario documented"
    setup: "APIP-3040/3050/3060 added learning-aware routing and model affinity after strategy v1.0.0"
    action: "Verify strategy document includes a new example scenario: pipeline execution with affinity-based routing where PipelineModelRouter uses learned model preferences"
    expected: "Section or scenario in WINT-0220-STRATEGY.md covering affinity routing, referencing APIP-3040/3050"
    evidence: "Scenario section in strategy doc showing affinity routing flow"

tooling_evidence:
  backend:
    http_requests: []  # No HTTP API surface
    assertions:
      - "validate-strategy.ts exits 0 with zero Zod errors"
      - "pnpm check-types --filter @repo/orchestrator passes"
      - "strategy-loader.ts loads YAML successfully in ts-node"
      - "wint.model_assignments DB query (port 5432) returns model identifiers matching strategy YAML"

manual_cases:
  - id: MC-1
    title: "Human review of strategy narrative quality"
    steps:
      - "Read packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md from top to bottom"
      - "Verify the decision flowchart section reflects the actual PipelineModelRouter escalation logic"
      - "Verify the cost analysis section has current pricing (Anthropic API pricing as of 2026-Q1)"
      - "Verify 5+ workflow scenarios are accurate and include the new affinity routing scenario"
    expected: "Strategy document reads as a coherent, internally-consistent reference document. No stale v1.0.0 references that contradict current pipeline state."

  - id: MC-2
    title: "ADR-005 compliance: UAT validation with real services"
    steps:
      - "With Ollama running locally (ollama serve), invoke strategy-loader.ts"
      - "Verify the loader correctly reads and structures the updated strategy YAML"
      - "Optionally: trigger a model request through PipelineModelRouter to verify identifier match"
    expected: "Real Ollama service accessed during UAT validation. No MSW mocks used."

fixture_definitions:
  - name: "WINT-0220-STRATEGY.yaml"
    type: "configuration file"
    description: "The primary machine-readable strategy YAML being revised. Located at packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml. Version 1.0.0 is the baseline; revision increments to 1.1.0 or 2.0.0 depending on scope of changes."

  - name: "model-assignments.yaml"
    type: "configuration file"
    description: "Live agent→model mapping at .claude/config/model-assignments.yaml. Read-only reference for validation; changes here require careful review since they take immediate effect."

  - name: "wint.model_assignments"
    type: "database table"
    description: "DB-backed model assignment overrides in lego_dev (DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev). Read-only for this story; used to verify model identifier string conventions."

risks:
  - "validate-strategy.ts Zod schema may not cover all new fields needed for expanded task taxonomy — if schema is too strict, YAML updates will fail validation until schema is also updated"
  - "143+ agent files is a large roster to audit manually; automated coverage check script may be needed if not already present"
  - "Strategy review_date 2026-03-15 is 13 days away — if this story takes longer than 13 days, the review cycle will have technically elapsed before completion"
  - "wint.model_assignments DB may have rows that do not appear in current strategy YAML (DB-only overrides); these must be acknowledged but not necessarily reconciled in this story"
