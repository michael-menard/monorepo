## Story Summary

**WINT-1040: Update /story-status Command to Use DB as Primary Source for Story Lookup**

**Phase**: Foundation (Phase 1)
**Status**: uat
**Type**: feature
**Points**: 2
**Priority**: high

**Problem Statement**: The `/story-status` command operated purely from directory structure and `stories.index.md`, giving stale results when story directories no longer reflected true state (post-WINT-1030 DB population).

**Solution**: Update "Feature + Story ID" mode to call shimGetStoryStatus (via MCP tool story_get_status) instead of scanning directories. DB-first with directory fallback. Added Data Source section and state mapping table. Left --depth and --deps-order modes unchanged (dependent on stories.index.md).

**Dependencies**:
- Depends On: WINT-1030 (Populate Story Status from Directories) — uat/PASS
- Blocks: WINT-1120 (Validate Foundation Phase)

**Key Learnings**:
1. shimGetStoryStatus null-return pattern: consolidate DB-miss and DB-error cases as single fallback trigger
2. story_get_status MCP tool is now canonical pattern for command specs calling MCP tools (mirrors worktree_get_by_story)

