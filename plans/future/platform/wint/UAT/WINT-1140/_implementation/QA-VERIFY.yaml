lessons_to_record:
  - lesson: "Inserting a step between numbered steps (1 and 2) using fractional numbering (1.3, 1.5) provides a clean extension pattern for orchestrator command docs without renumbering all existing steps."
    category: pattern
    tags: ["orchestrator", "command-docs", "dev-implement-story"]

  - lesson: "When adding a first-class field that .passthrough() would silently preserve, always add it explicitly to the Zod schema for type safety, createCheckpoint() awareness, and reliable downstream reads. Do not rely on passthrough alone."
    category: pattern
    tags: ["zod", "schema", "checkpoint", "orchestrator"]

  - lesson: "Interactive CLI skills (wt-new, wt-switch) cannot be invoked silently or with parameters — they are user-guided flows. Command documentation must describe them as 'guided' or 'interactive' steps, never as automatic/silent operations."
    category: pattern
    tags: ["worktree", "interactive-skills", "wt-new", "wt-switch", "orchestrator"]

  - lesson: "Autonomy-level branching in orchestrator command docs should govern only the orchestrator's own decision prompt (whether to ask the user), not the behavior of downstream interactive skills. The interactive skill itself always requires user interaction regardless of autonomy level."
    category: pattern
    tags: ["autonomy", "orchestrator", "command-docs", "worktree"]

