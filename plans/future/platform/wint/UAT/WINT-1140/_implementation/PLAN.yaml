architectural_decisions:
  - id: ARCH-001
    question: "How to reconcile AC-9 'autonomous auto-select' with the interactive nature of /wt:switch?"
    decision: "Auto-select in autonomous mode means the orchestrator skips its own 3-option confirmation prompt (a/b/c) and directly invokes /wt:switch guided flow. The user still interacts with /wt:switch itself (select from list, get cd command). The autonomy level governs whether the orchestrator's own decision prompt is shown — not whether the skill's interactive UI is bypassed."
    rationale: "wt-switch is confirmed interactive-only (no path parameter). AC-10 explicitly requires guided/assisted pattern. AC-9 'auto-select option (a)' means the orchestrator makes the 3-option decision autonomously and invokes /wt:switch — it does not mean silent headless switching."
    decided_by: inline
    confidence: high

complexity: moderate

notes:
  - "wt-new confirmed INTERACTIVE: prompts for base branch and feature branch — no parameter interface. All AC-1/AC-2/AC-9/AC-11 language must use 'guided' rather than 'automatically'. (wt-new/SKILL.md confirmed)"
  - "wt-switch confirmed INTERACTIVE: shows list and prompts for selection, provides cd command only — cannot change directory. All AC-3/AC-4a/AC-9/AC-10 language must use 'guided/assisted' rather than 'auto-switch'. (wt-switch/SKILL.md confirmed)"
  - "CheckpointSchema uses .passthrough() — adding worktree_id as explicit optional field is non-breaking and backward compatible."
  - "Integration tests (real DB against live WINT-1130 MCP tools) are blocked by WINT-1130 deployment confirmation. Command doc and schema changes can be implemented and tested independently."
  - "No new packages required. No MCP server changes. No Lambda changes. No DB migrations."
  - "SCOPE.yaml paths: packages/backend/orchestrator/** and packages/backend/mcp-server/** — only orchestrator package touched in this plan. mcp-server paths from SCOPE.yaml are not modified (WINT-1130 provided all needed tools)."
  - "Test coverage: checkpoint.test.ts is the unit test surface. Integration test for the orchestrator flow requires manual + WINT-1130 live tools. Command doc is verified by review (manual/file evidence type)."
  - "Steps 3 and 4 both touch .claude/commands/dev-implement-story.md and can be done in a single edit pass."
