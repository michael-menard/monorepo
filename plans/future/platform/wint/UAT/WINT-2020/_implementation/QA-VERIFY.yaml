lessons_to_record:
  - lesson: >-
      Integration tests that require DB availability should use vitest skip() or
      test.skipIf() rather than console.log + early return. The early-return pattern
      silently passes tests when DB is unavailable, which can mask real failures.
    category: anti_pattern
    tags: ["testing", "integration", "vitest"]

  - lesson: >-
      When multiple sidecars share an HTTP utility function (sendJson), extract to a
      shared package early — doing it post-code-review adds iteration cost. WINT-2020
      required iteration 3 specifically to extract to @repo/sidecar-utils (which was
      later reverted in iteration 6 for simplicity). Consider shared package creation
      as part of initial story scope for multi-sidecar work.
    category: time_sink
    tags: ["sidecar", "shared-utils", "architecture"]

  - lesson: >-
      DB enum schema migrations must be applied to local development DB before running
      the full @repo/mcp-tools test suite. Commit 7847d282 renamed story_state enum
      values (ready_to_work→ready) but the migration was not applied, causing 3 test
      failures in unrelated tests. QA verification agents should check for pending
      migrations as part of pre-flight checks.
    category: blocker
    tags: ["db-migration", "enum", "environment", "mcp-tools"]

  - lesson: >-
      The pattern of making KbSearchFn injectable (AssembleContextPackDeps) enables
      clean unit testing without real DB access. This is a reusable pattern for any
      sidecar that depends on external services — declare the dependency as a typed
      function parameter, default to a no-op, inject real implementation at runtime.
    category: reuse
    tags: ["dependency-injection", "testability", "sidecar", "pattern"]

