architectural_decisions:
  - id: ARCH-001
    question: Should the MCP tool context_pack_get call the HTTP sidecar endpoint or import assembleContextPack directly?
    decision: Direct import from @repo/context-pack-sidecar package
    rationale: >-
      Avoids requiring the sidecar to be running during MCP tool invocation. Uni-directional dependency (mcp-tools →
      sidecars/context-pack) is acceptable. Resolved during elaboration (GAP-001) — no user input required.
    decided_by: elaboration
complexity: complex
notes:
  - pnpm-workspace.yaml already includes 'packages/backend/sidecars/*' — no modification needed for ST-1
  - >-
    kb_search requires db + embeddingClient deps injected at runtime — mirror WINT-2010's initialization pattern in
    assembleContextPack
  - contextCachePut uses ON CONFLICT DO UPDATE — concurrent cache-miss requests are safe by design (WINT-0100)
  - estimateTokens(text) = Math.ceil(text.length / 4) — char-count approximation; use tolerance margin in assertions
  - packType 'story' confirmed available in contextPackTypeEnum from context-cache/__types__/index.ts
  - ST-7 integration tests require postgres-knowledgebase on port 5433 — may be skipped in CI without that service
  - Elaboration CONDITIONAL_PASS — 2 gaps resolved, 3 opportunities deferred to KB (telemetry, relevance ranking, auth)
