schema: 2
story_id: WINT-2020
timestamp: '2026-03-04T00:30:00Z'
subtask_source: story
steps:
  - id: 1
    subtask_id: ST-1
    description: >-
      Create context-pack sidecar package scaffold: package.json, tsconfig.json, src/ directory following role-pack
      structure. pnpm-workspace.yaml already covers packages/backend/sidecars/* — no modification needed.
    files:
      - packages/backend/sidecars/context-pack/package.json
      - packages/backend/sidecars/context-pack/tsconfig.json
    files_to_read:
      - packages/backend/sidecars/role-pack/package.json
      - packages/backend/sidecars/role-pack/tsconfig.json
    dependencies: []
    slice: packages
    verification: pnpm install && pnpm check-types --filter @repo/context-pack-sidecar
    acs_covered:
      - AC-1
  - id: 2
    subtask_id: ST-2
    description: >-
      Define Zod schemas in __types__/index.ts: ContextPackRequestSchema (story_id, node_type, role enum pm|dev|qa|po,
      optional ttl), ContextPackResponseSchema (story_brief, kb_facts[], kb_rules[], kb_links[], repo_snippets[]),
      CACHE_KEY_FORMAT constant, DEFAULT_TTL (3600), DEFAULT_MAX_TOKENS (2000), and estimateTokens() utility.
    files:
      - packages/backend/sidecars/context-pack/src/__types__/index.ts
    files_to_read:
      - packages/backend/mcp-tools/src/context-cache/__types__/index.ts
    dependencies:
      - 1
    slice: packages
    verification: pnpm check-types --filter @repo/context-pack-sidecar
    acs_covered:
      - AC-2
      - AC-5
      - AC-7
  - id: 3
    subtask_id: ST-3
    description: >-
      Implement assembleContextPack(input): generate packKey as '{story_id}:{node_type}:{role}', call contextCacheGet
      (cache hit → return), on miss call kb_search for each category (kb_facts/kb_rules/kb_links/repo_snippets), apply
      token budget trimming (repo_snippets first, then kb_links), call contextCachePut non-blocking (log warning on
      failure, continue), return assembled pack with empty arrays for missing sections.
    files:
      - packages/backend/sidecars/context-pack/src/assemble-context-pack.ts
    files_to_read:
      - packages/backend/mcp-tools/src/context-cache/context-cache-get.ts
      - packages/backend/mcp-tools/src/context-cache/context-cache-put.ts
      - apps/api/knowledge-base/src/search/kb-search.ts
    dependencies:
      - 2
    slice: packages
    verification: pnpm test --filter @repo/context-pack-sidecar
    acs_covered:
      - AC-3
      - AC-4
      - AC-5
      - AC-7
      - AC-8
      - AC-11
  - id: 4
    subtask_id: ST-4
    description: >-
      Implement HTTP server route handler: POST /context-pack route using Node.js built-in http (no Hono/Express),
      validate request with ContextPackRequestSchema (400 on failure with Zod error details), call assembleContextPack,
      return JSON response. Add src/server.ts and src/index.ts following role-pack pattern.
    files:
      - packages/backend/sidecars/context-pack/src/routes/context-pack.ts
      - packages/backend/sidecars/context-pack/src/server.ts
      - packages/backend/sidecars/context-pack/src/index.ts
    files_to_read:
      - packages/backend/sidecars/role-pack/src/server.ts
      - packages/backend/sidecars/role-pack/src/index.ts
    dependencies:
      - 3
    slice: packages
    verification: pnpm check-types --filter @repo/context-pack-sidecar
    acs_covered:
      - AC-1
      - AC-2
  - id: 5
    subtask_id: ST-5
    description: >-
      Implement context_pack_get MCP tool wrapper in packages/backend/mcp-tools/src/context-pack/context-pack-get.ts
      that imports assembleContextPack directly from @repo/context-pack-sidecar (direct import, not HTTP call — resolved
      in elaboration GAP-001). Register in apps/api/knowledge-base/src/mcp-server/tool-schemas.ts and tool-handlers.ts.
    files:
      - packages/backend/mcp-tools/src/context-pack/context-pack-get.ts
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
      - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    files_to_read:
      - packages/backend/mcp-tools/src/context-cache/context-cache-get.ts
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
      - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    dependencies:
      - 3
    slice: backend
    verification: pnpm check-types --filter @repo/mcp-tools && grep -r context_pack_get apps/api/knowledge-base/src/
    acs_covered:
      - AC-6
  - id: 6
    subtask_id: ST-6
    description: >-
      Write unit tests covering: Zod schema validation (valid/invalid inputs for all fields), token budget enforcement
      (trim repo_snippets first then kb_links using mockKbSearchResult fixture), cache key generation
      ('{story_id}:{node_type}:{role}' format), section trimming with oversizedContextPack fixture, empty array (not
      null) returned when sections absent.
    files:
      - packages/backend/sidecars/context-pack/src/__tests__/context-pack.unit.test.ts
    files_to_read:
      - packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-get.test.ts
      - packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-put.test.ts
    dependencies:
      - 3
    slice: packages
    verification: pnpm test --filter @repo/context-pack-sidecar
    acs_covered:
      - AC-2
      - AC-5
      - AC-8
      - AC-10
  - id: 7
    subtask_id: ST-7
    description: >-
      Write integration tests against real postgres-knowledgebase (port 5433, no DB mocking per ADR-005): (1) cache hit
      with timing < 100ms, (2) cache miss with timing < 2000ms, (3) concurrent cache-miss race condition — single
      contextPacks row after two simultaneous requests, (4) cache write failure resilience — 200 returned even when DB
      write errors, (5) expired cache entry triggers fresh assembly, (6) MCP tool context_pack_get returns
      ContextPackResponseSchema-valid response (HP-3 coverage).
    files:
      - packages/backend/sidecars/context-pack/src/__tests__/context-pack.integration.test.ts
    files_to_read:
      - packages/backend/mcp-tools/src/context-cache/__tests__/integration.test.ts
    dependencies:
      - 4
    slice: packages
    verification: pnpm test --filter @repo/context-pack-sidecar
    acs_covered:
      - AC-3
      - AC-6
      - AC-9
      - AC-11
      - AC-12
