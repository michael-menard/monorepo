notable_decisions:
  - decision: "Import from @repo/database-schema/schema/wint instead of package root"
    rationale: "Package root (index.ts) has import issues with missing .js extensions. Direct import from wint.ts avoids transitive compilation errors."
    impact: "Required adding './schema/wint' export to database-schema package.json"

  - decision: "Include legacy repository schemas in __types__ module"
    rationale: "Current repositories use 002_workflow_tables.sql schema (different from WINT schema). Including both prevents breaking changes while enabling gradual migration."
    impact: "Legacy schemas marked @deprecated, will be replaced in WINT-1090"

  - decision: "Use StoryStateSchema from existing enums module"
    rationale: "StoryStateSchema already exists in orchestrator/src/state/enums/story-state.ts with validated enum values. Reusing prevents duplication and maintains consistency."
    impact: "Added import of StoryStateSchema to use in legacy schemas"

known_deviations:
  - deviation: "WINT schema tests are validation-only (not full happy-path)"
    reason: "WINT schemas have many required fields. Tests focus on validation rules (UUID format, required fields) rather than complete valid objects to avoid brittleness."
    resolution: "Legacy schema tests (which are actively used) have comprehensive happy-path tests. WINT schema full testing deferred to WINT-1090 when repositories migrate."

