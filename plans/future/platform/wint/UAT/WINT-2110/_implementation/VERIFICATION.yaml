lessons_to_record:
  - lesson: >-
      When verifying mcp-tools test runs, cross-check total test counts against evidence baseline. Post-implementation
      commits from other stories can add new tests and introduce new failures that are unrelated to the story under
      verification. Always trace failing test files to their last git commit author before attributing blame.
    category: pattern
    tags:
      - qa-verify
      - mcp-tools
      - test-attribution
  - lesson: >-
      AC-9 corrective elaboration pattern worked well: original AC-7 had incorrect packType values (using packKeys as
      packTypes). The autonomous elaboration added AC-9 and AC-10 to enforce correct mapping before implementation. This
      prevented a runtime error where Zod validation would reject valid queries.
    category: pattern
    tags:
      - elaboration
      - zod
      - context-cache
      - packType
