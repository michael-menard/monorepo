issues:
  - id: ISSUE-001
    ac: AC-5
    severity: critical
    description: >-
      Proof schema fields diverge from AC-5 specification. AC-5 mandates per-stage proof objects that mirror artifact
      structures: POST_BOOTSTRAP requires {checkpoint:{phase:'setup_complete'}}, ELAB_COMPLETE requires
      {elab:{verdict:'PASS'|'CONDITIONAL_PASS', findings:[...]}}, SCOPE_OK requires {scope:{included_files:[...]} |
      scope:{no_scope_files:true}}, PATCH_COMPLETE requires {evidence:{touched_files:>0}}. The implementation uses flat,
      custom fields (setup_complete, worktree_path, elab_verdict, gaps_resolved, touched_files:number, build_passed,
      tests_passed, coverage_pct) which do not match the story's defined HTTP contract or test plan examples (HP-1
      through HP-6, EC-1 through EC-4).
    fix_required: >-
      Redefine proof schemas in src/__types__/index.ts and update gate-check.ts validation logic to use the nested
      structures mandated by AC-5. Update all tests accordingly.
lessons_to_record:
  - lesson: >-
      Proof schema drift: implementation teams may design intuitive flat schemas that diverge from AC-mandated
      artifact-mirroring structures. ACs describing nested proof structures (e.g. {checkpoint:{phase}}) must be taken
      literally — the gatekeeper's value is that it validates real artifact fields, not invented booleans.
    category: anti_pattern
    tags:
      - gatekeeper
      - proof-schema
      - ac-compliance
      - backend
  - lesson: >-
      AC-5 proof schemas should be reviewed early in implementation planning — the schema design affects both the HTTP
      contract and the compute logic. A mismatch between AC field names and implementation field names surfaces late and
      requires rework of types, compute function, route handler, and all tests.
    category: time_sink
    tags:
      - gatekeeper
      - backend
      - schema-design
