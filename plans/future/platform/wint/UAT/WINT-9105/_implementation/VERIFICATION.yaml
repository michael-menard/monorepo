lessons_to_record:
  - lesson: >-
      Documentation-only stories (ADR spikes) should skip unit/integration/E2E test execution entirely and rely on
      manual verification gates: file existence, section completeness, Zod compliance, and frontmatter sign-off.
    category: pattern
    tags:
      - documentation
      - adr
      - spike
      - qa-verification
  - lesson: >-
      When two overlapping implementations exist with different numeric thresholds (e.g., circuit breaker
      failureThreshold=5 vs =3), the correct resolution is explicit layer partitioning documented in an ADR rather than
      merging. Both values can be correct for different semantic scopes.
    category: pattern
    tags:
      - circuit-breaker
      - architecture
      - error-handling
      - adr
  - lesson: >-
      Budget-aware retry caps must be tracked at model tier level, not just preset level. Tier 0 LLM models (Claude Opus
      at $75/1M output) need a maxAttempts=2 hard cap enforced by middleware, not just by configuration.
    category: pattern
    tags:
      - llm
      - cost
      - retry
      - budget
      - langgraph
