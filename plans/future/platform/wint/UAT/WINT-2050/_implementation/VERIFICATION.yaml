lessons_to_record:
  - lesson: >-
      When @vitest/coverage-v8 is not installed in a package, coverage cannot be run via CLI even if configured in
      vitest.config.ts. Analytical coverage assessment from test completeness is an acceptable fallback for QA
      verification when the test-to-code ratio is high.
    category: blocker
    tags:
      - testing
      - coverage
      - vitest
  - lesson: >-
      Injectable kbQueryFn pattern (default real impl, mock in tests) allows unit and integration tests to run without
      real port 5433 KB database. This is the proven pattern for dual-database populate scripts.
    category: pattern
    tags:
      - backend
      - testing
      - dependency-injection
  - lesson: >-
      Content cap via capContent() trimming array fields from end until JSON.stringify < 8000 chars is a reliable
      pattern for preventing oversized JSONB writes to context_packs.
    category: pattern
    tags:
      - backend
      - database
      - wint
