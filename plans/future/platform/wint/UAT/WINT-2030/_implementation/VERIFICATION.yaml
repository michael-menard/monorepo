issues:
  - id: QA-ISSUE-1
    severity: FAIL
    description: >-
      EC-1 and EC-2 tests do not use vi.mock or mockImplementationOnce. The FIX-SUMMARY (iteration 1) artifact claimed
      these tests were fixed to inject actual failures, but the test file on disk contains the original weak
      implementations. No vi.mock, no mockImplementationOnce, no mockedPut, no mockedReadFileSync present in the test
      file.
    file: packages/backend/mcp-tools/src/scripts/__tests__/populate-project-context.test.ts
    lines: 146-207
    ac_affected: AC-7
    required_fix: >-
      EC-1 must use vi.mock('../../context-cache/context-cache-put.js') and mockImplementationOnce() to throw on the
      first call, then verify result.failed===1 and result.succeeded===4 with 4 DB rows written. EC-2 must use
      vi.mock('node:fs') and mockImplementationOnce() to throw ENOENT for CLAUDE.md, then verify result.failed===1 and
      result.succeeded===4.
lessons_to_record:
  - lesson: >-
      Fix summary artifacts can describe changes that were never written to disk. During QA verification, always read
      the actual source files to confirm the described fix was applied — do not trust artifact-level claims alone.
    category: anti_pattern
    tags:
      - qa
      - testing
      - evidence
      - artifacts
  - lesson: >-
      EC tests that only verify the happy path and claim resilience is 'structurally guaranteed' by code comments are
      not evidence of correct error handling. Resilience tests must inject actual failures via mocking to be meaningful.
    category: testing
    tags:
      - testing
      - mocking
      - resilience
      - error-handling
