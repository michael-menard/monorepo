issues: []
lessons_to_record:
  - lesson: >-
      Fix summary artifacts can describe changes that were never written to disk. During QA verification, always read
      the actual source files to confirm the described fix was applied — do not trust artifact-level claims alone.
    category: anti_pattern
    tags:
      - qa
      - testing
      - evidence
      - artifacts
  - lesson: >-
      EC tests that only verify the happy path and claim resilience is structurally guaranteed by code comments are not
      evidence of correct error handling. Resilience tests must inject actual failures via mocking to be meaningful.
    category: testing
    tags:
      - testing
      - mocking
      - resilience
      - error-handling
  - lesson: >-
      When running pnpm vitest run from the monorepo root against a specific test file, many other story worktree copies
      of the same test file can be picked up and cause confusing failures. Use pnpm --filter @repo/<package> exec vitest
      run to scope to the canonical package.
    category: pattern
    tags:
      - testing
      - vitest
      - monorepo
      - worktrees
