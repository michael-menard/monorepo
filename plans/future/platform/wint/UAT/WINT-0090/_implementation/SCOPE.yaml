# Summary and context
summary: |
  Extend postgres-knowledgebase MCP server with 4 new story management tools:
  story_get_status, story_update_status, story_get_by_status, story_get_by_feature.
  Backend-only MCP tool implementation with comprehensive Zod validation and test coverage.

elaboration: completed

# In scope
in_scope:
  - story_get_status tool with dual ID support (UUID and human-readable WINT-0090 format)
  - story_update_status tool with state transition tracking
  - story_get_by_status tool with pagination support
  - story_get_by_feature tool with pagination support
  - Zod validation schemas for all tool inputs/outputs
  - Comprehensive unit and integration test suite (≥80% coverage)
  - JSDoc documentation for all functions
  - Error handling with proper @repo/logger integration
  - Database transactions for state transitions

# Out of scope
out_of_scope:
  - Story creation tools (deferred to WINT-1000+)
  - Complex workflow validation with FSM (deferred to future)
  - Batch story operations (single-story operations only)
  - LangGraph integration (deferred to WINT-9XXX)
  - Story deletion/archival (soft-delete pattern deferred)
  - Dependency management tools (storyDependencies table unused)
  - Real-time change notifications/pub-sub

