    relevant_to_scope:
      - story_id: "WINT-1030"
        lesson: "Script CLI pattern (createDbPool, findMonorepoRoot, parseArgs) is fully established in populate-story-status.ts — copy and adapt, do not rewrite from scratch"
        category: reuse
        applies_because: "generate-stories-index.ts is architecturally identical to populate-story-status.ts; same pool creation, same monorepo root detection, same CLI argument pattern"

      - story_id: "WINT-1030"
        lesson: "StoryRow[] is the correct return type for getAllStories() — NOT StoryArtifact[]. rowToStoryArtifact() mapping adds overhead and strips DB-native underscore field names needed by STATE_TO_DISPLAY_LABEL"
        category: pattern
        applies_because: "AC-4 requires state enum values in underscore format (ready_to_work) that STATE_TO_DISPLAY_LABEL converts. StoryArtifact uses hyphenated format (ready-to-work) which would require an additional reverse mapping step"

      - story_id: "WINT-1030"
        lesson: "StoryFileAdapter.read() expects a file path string to the story .md file. It returns StoryArtifact (legacy/v2 compatible schema). For YAML fallback fields (phase, risk_notes, feature, infrastructure), access via the raw frontmatter fields not the mapped StoryArtifact fields"
        category: pattern
        applies_because: "ST-1 through ST-3 use StoryFileAdapter for YAML fallback. The adapter reads story files; phase and risk_notes are frontmatter-only fields that must be accessed from the parsed frontmatter"

      - story_id: "WINT-1030"
        lesson: "Fail-soft error handling pattern: collect errors, log warnings, continue processing. Never throw on a single story failure — log and skip with reason tracked in skipped_stories array"
        category: pattern
        applies_because: "143+ stories to process; a single malformed or missing YAML file must not abort the entire generation run"

    blockers_to_avoid:
      - "Adding new npm dependencies without first checking package.json — diff package is NOT in orchestrator dependencies; use inline line-by-line comparison for --verify mode (AC-8)"
      - "Using StoryArtifact[] return type for getAllStories() — use StoryRow[] to retain DB-native underscore state values"
      - "Writing to stories.index.md directly during atomic write — write to temp file then fs.rename() to prevent partial writes (architecture note in story)"
      - "Reading full stories.index.md (2400 lines) into memory for format inspection — read only the first 80 lines to understand format, then generate programmatically"
      - "Running SELECT unnest(enum_range(NULL::wint.story_state)) skip — AC-13 makes this mandatory before writing ANY rendering code. STORY_STATE_ENUM constant must be defined first"

    patterns_to_follow:
      - "Use @repo/logger for all logging — never console.log (CLAUDE.md requirement)"
      - "Zod-first types for all schemas: GenerationReportSchema, IndexFrontmatterSchema, StorySectionSchema (per CLAUDE.md and population.ts template)"
      - "Atomic file write: write to .tmp file, then fs.rename() to target path"
      - "Cache YAML reads in memory: if StoryFileAdapter.read() is called for a story, cache result to avoid re-reading same file"
      - "Dry-run outputs to stdout or stories-index-preview.md, never overwrites stories.index.md"
      - "FIELD_SOURCE_MAP constant at top of script documents DB vs YAML source for each field"

