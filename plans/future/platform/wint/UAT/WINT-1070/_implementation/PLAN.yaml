architectural_decisions: []

complexity: moderate

notes:
  - "diff npm package is NOT in packages/backend/orchestrator/package.json — AC-8 --verify mode must use inline line-by-line comparison. The story explicitly permits this: 'if not available, implement an inline line-by-line comparison'"
  - "StoryRow[] is the correct return type for getAllStories() per ST-1 design decision — avoids rowToStoryArtifact() mapping overhead and retains underscore-format state values for STATE_TO_DISPLAY_LABEL"
  - "AC-13 is a GATING constraint: STORY_STATE_ENUM constant must be defined from live DB enum query before any rendering code. The population.ts StoryStateSchema shows expected values: draft, backlog, ready_to_work, in_progress, ready_for_qa, in_qa, blocked, done, cancelled — but live DB may differ"
  - "StoryFileAdapter exists at packages/backend/orchestrator/src/adapters/story-file-adapter.ts — confirmed. Import pattern: import { StoryFileAdapter } from '../adapters/story-file-adapter.js'"
  - "No __tests__ directory exists yet under packages/backend/orchestrator/src/scripts/ — both test files are new creates"
  - "stories.index.md uses display labels with hyphens (ready-to-work, in-progress, etc.) but population.ts shows DB uses underscores (ready_to_work, in_progress, in_qa) — STATE_TO_DISPLAY_LABEL mapping bridges these"
  - "Atomic write pattern: write to temp file (.tmp extension) then fs.rename() to target path — same as StoryFileAdapter atomic write pattern"
  - "YAML fallback cache: use Map<string, StoryArtifact> in memory during run to avoid re-reading same story file multiple times for phase, risk_notes, feature, infrastructure fields"
  - "E2E tests skipped per ADR-006 skip condition: touches.frontend: false in SCOPE.yaml"
  - "Performance requirement: 143+ stories must complete generation in ≤10 seconds"
