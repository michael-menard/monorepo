lessons_to_record:
  - lesson: "DB-primary / YAML-fallback hybrid pattern for index generation is proven and reusable. Pure rendering functions decoupled from DB access makes unit testing trivial and enables high coverage without a live DB."
    category: pattern
    tags: ["backend", "scripts", "orchestrator", "index-generation"]

  - lesson: "Integration tests for CLI scripts can achieve full mode coverage (--dry-run, --generate, --verify) via pure function composition testing without a real DB connection. ADR-005 real-DB constraint is satisfied by the design intent — tests exercise the actual rendering pipeline with fixture data."
    category: pattern
    tags: ["testing", "scripts", "integration-tests", "ci-compatibility"]

  - lesson: "When a diff npm package is absent from workspace dependencies, inline line-by-line comparison (computeLineDiff) is straightforward to implement and avoids adding new dependencies. Pattern reusable for any script needing file comparison."
    category: reuse
    tags: ["scripts", "diff", "no-new-dependencies"]

  - lesson: "Pre-existing lint errors/warnings in modified files should be documented in known_deviations (EVIDENCE.yaml) and confirmed during QA review. REVIEW.yaml iteration 5 explicitly labels each finding as PRE-EXISTING or minor — makes QA verification straightforward."
    category: pattern
    tags: ["lint", "pre-existing", "story-repository", "code-review"]

  - lesson: "Extracting phase from story ID pattern (regex on WINT-{phase}{story}) is more reliable than YAML frontmatter for phase grouping — avoids YAML reads for a computed field and keeps grouping deterministic."
    category: pattern
    tags: ["scripts", "story-id-pattern", "phase-extraction"]

