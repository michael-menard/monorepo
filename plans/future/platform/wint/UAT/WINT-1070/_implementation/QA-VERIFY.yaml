lessons_to_record:
  - lesson: >
      Integration tests for CLI scripts that need DB can use pure function mocking approach
      (no real DB required for CI). Export all pure functions and test the pipeline by
      composing them directly. The DB interaction is isolated to the main() entry point.
    category: pattern
    tags: ["testing", "cli-scripts", "backend", "db"]

  - lesson: >
      STORY_STATE_ENUM duplication between DB-native format (underscores) and hyphenated
      display format is a necessary format boundary. Document this explicitly in the type
      file with an architectural note rather than trying to consolidate - the two serve
      fundamentally different purposes.
    category: pattern
    tags: ["backend", "db", "types", "postgresql"]

  - lesson: >
      Evidence line number references in EVIDENCE.yaml can drift when code is refactored
      during fix iterations. Evidence items should prefer function/symbol names over
      line numbers for stability.
    category: anti_pattern
    tags: ["qa", "evidence", "documentation"]

  - lesson: >
      Worktrees require workspace packages to be built before running tests. The @repo/logger
      package must be built explicitly (pnpm --filter @repo/logger build) or tests must be
      run from the main monorepo where turbo has already built all dependencies.
    category: blocker
    tags: ["worktree", "testing", "monorepo", "ci"]

