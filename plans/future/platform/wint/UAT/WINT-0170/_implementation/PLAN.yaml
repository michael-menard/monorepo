    evidence_type: manual
  - ac_id: "AC-8"
    planned_evidence: "Step 6.5 prose in elab-completion-leader.agent.md explicitly states: story directory has already been moved (Steps 3-5 ran before the gate); operator instruction to run /doc-sync then re-run elab-completion-leader; Steps 3-5 are idempotent on re-run; this only applies to PASS/CONDITIONAL PASS path"
    evidence_type: file

architectural_decisions: []

complexity: simple

notes:
  - "Zero TypeScript changes — no pnpm commands required. Verification is grep-based static inspection only."
  - "ST-2 depends on ST-1 for prose consistency (gate step language must match between the two agents)."
  - "Critical prose distinction: 'exit code 1' (blocking) vs 'invocation failure/infrastructure error' (non-blocking). Both gate steps must be unambiguous about this distinction."
  - "Model for gate step prose: qa-verify-completion-leader Step 0 (wt:merge-pr non-blocking gate) — 'attempt, warn on failure, continue regardless'."
  - "AC-8 is REQUIRED content in Step 6.5 of elab-completion-leader only (not qa-verify-completion-leader — its PASS path does not move directory)."
  - "DOC-SYNC COMPLETE (warnings) from doc-sync (file-only fallback mode) = treat as exit 0 = non-blocking. Gate must only block on explicit exit code 1."
  - "FAIL path of qa-verify-completion-leader is explicitly not touched (AC-3). ST-3 verification confirms this with git diff."
