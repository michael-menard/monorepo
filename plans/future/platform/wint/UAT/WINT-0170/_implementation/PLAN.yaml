  - ac_id: "AC-2"
    planned_evidence: "Step 7.5 present in qa-verify-completion-leader.agent.md PASS path with /doc-sync --check-only invocation, three-branch logic, COMPLETION BLOCKED signal text, and /doc-sync in skills_used frontmatter"
    evidence_type: file
  - ac_id: "AC-3"
    planned_evidence: "FAIL path section of qa-verify-completion-leader.agent.md is byte-for-byte unchanged from current v3.3.0 — grep confirms no doc-sync/COMPLETION BLOCKED lines in FAIL path section"
    evidence_type: file
  - ac_id: "AC-4"
    planned_evidence: "All original completion signal strings (ELABORATION COMPLETE: PASS, ELABORATION COMPLETE: CONDITIONAL PASS, ELABORATION COMPLETE: FAIL, ELABORATION COMPLETE: SPLIT REQUIRED, QA PASS, QA FAIL) remain present and unmodified in their respective sections; two new BLOCKED variants documented in gate step prose"
