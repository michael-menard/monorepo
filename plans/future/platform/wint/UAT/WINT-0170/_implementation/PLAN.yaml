  - ac_id: "AC-5"
    planned_evidence: "Gate step is positioned after state update steps and immediately before completion signal in both agents: Step 6.5 follows Step 6 (Verify Final State) in elab-completion-leader; Step 7.5 follows Step 7 (Update Story Status in KB) in qa-verify-completion-leader"
