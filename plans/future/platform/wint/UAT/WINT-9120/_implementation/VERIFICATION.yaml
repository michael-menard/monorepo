  - lesson: >-
      Parity test harness using vi.fn() injection produced 51 tests with 0 flakiness in a 279ms run. The pattern of
      injecting both claudeCodeRunner and langGraphRunner as vi.fn() mocks is highly effective for structural/schema
      parity testing without real AI calls.
    category: reuse
    tags:
      - parity-testing
      - vitest
      - dependency-injection
      - backend
  - lesson: >-
      Local Zod schema definitions in parity test files (rather than importing from src/artifacts/) avoids import cycles
      and keeps parity tests self-contained. When the shared schema evolves, parity tests intentionally lag until
      explicitly updated — this is a feature, not a bug.
    category: pattern
    tags:
      - parity-testing
      - zod
      - test-isolation
