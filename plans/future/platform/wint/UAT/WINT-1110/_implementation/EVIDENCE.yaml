build:
  status: "pass"
  command: "pnpm --filter @repo/orchestrator type-check"
  output: "Exit code 0 - no type errors"

e2e_tests:
  status: "exempt"
  reason: "Infrastructure migration script - no E2E tests required. Script requires real database connections to run end-to-end."

touched_files:
  - "packages/backend/orchestrator/src/scripts/__types__/migration.ts"
  - "packages/backend/orchestrator/src/scripts/migrate-langgraph-data.ts"
  - "packages/backend/orchestrator/src/scripts/migrate-langgraph-data-rollback.ts"
  - "packages/backend/orchestrator/src/scripts/__tests__/migrate-langgraph-data.test.ts"

key_decisions:
  - "Merged WINT-1110 types into existing __types__/migration.ts to avoid breaking migrate-flatten-stories.ts imports"
  - "Renamed MigrationLog/MigrationLogSchema to Wint1110MigrationLog/Wint1110MigrationLogSchema to avoid naming conflict"
  - "workflow_audit_log skipped from migration: execution_id FK is NOT NULL and requires a workflow_executions row"
  - "state_transitions migrated from workflow_events with state_change_* prefix filter"
  - "Both database pools share the same vi.mock object in tests - assertions use result counts instead of spy calls"

notes:
  - "The wint.workflow_audit_log table has execution_id FK NOT NULL - LangGraph workflow_events cannot be directly inserted without valid workflow_executions rows. These events are migrated to wint.state_transitions instead when they contain state values."
  - "pgvector embeddings are excluded from migration queries to avoid compatibility issues"
  - "Script requires both databases to be accessible; graceful degradation when LangGraph is unavailable"
