# ============================================================================
# GLOSSARY AND TERMINOLOGY
# ============================================================================

glossary:
  LangGraph: "Source database at port 5433 with public schema; holds original story/feature data"
  WINT: "Target database at port 5432 with wint schema; unified destination"
  story_state: "Enum for story lifecycle states (draft, backlog, ready_to_work, etc.)"
  normalization: "Converting hyphenated states (ready-to-work) to underscored (ready_to_work)"
  UPSERT: "INSERT ... ON CONFLICT DO NOTHING; prevents duplicate inserts"
  idempotent: "Running script twice produces identical result; safe to re-run"
  state_transitions: "Table tracking when stories move between states"
  workflow_audit_log: "General audit trail of all workflow events"
  embedding: "Vector representation (1536-dimensional) for semantic search; pgvector extension"
  pgvector: "PostgreSQL extension for vector operations; optional but recommended"

