# ============================================================================
# DATABASE CONNECTION DETAILS
# ============================================================================

database_connections:
  langgraph:
    name: "LangGraph Database"
    port: 5433
    schema: "public"
    connection_env_var: "LANGGRAPH_DATABASE_URL"
    env_var_fallback: |
      Host: process.env.LANGGRAPH_DB_HOST || 'localhost'
      Port: process.env.LANGGRAPH_DB_PORT || '5433'
      Database: process.env.LANGGRAPH_DB_NAME || 'postgres'
      User: process.env.LANGGRAPH_DB_USER || 'postgres'
      Password: process.env.LANGGRAPH_DB_PASSWORD || 'postgres'

    tables_to_read:
      - table: "public.stories"
        key_columns: "id, story_id, state, type, title, goal, non_goals, packages, surfaces, blocked_by, depends_on, follow_up_from, priority, embedding, created_at, updated_at"
        notes: "State values are hyphenated (ready-to-work, in-progress, ready-for-qa, uat)"

      - table: "public.features"
        key_columns: "id, name, description, embedding, created_at"
        notes: "name column must be mapped to wint.features.feature_name"

      - table: "public.workflow_events"
        key_columns: "id, entity_type, entity_id, event_type, old_value, new_value, actor, created_at"
        notes: "Route to state_transitions if state_change_*, else to workflow_audit_log"

  wint:
    name: "WINT Database"
    port: 5432
    schema: "wint"
    connection_env_var: "DATABASE_URL"
    env_var_fallback: |
      Host: process.env.POSTGRES_HOST || 'localhost'
      Port: process.env.POSTGRES_PORT || '5432'
      Database: process.env.POSTGRES_DATABASE || 'postgres'
      User: process.env.POSTGRES_USER || 'postgres'
      Password: process.env.POSTGRES_PASSWORD || 'postgres'

    tables_to_write:
      - table: "wint.stories"
        insert_columns: "story_id, feature_id, type, state, title, goal, points, priority, blocked_by, depends_on, follow_up_from, packages, surfaces, non_goals, created_at, updated_at"
        unique_constraint: "story_id (UNIQUE)"
        upsert_strategy: "ON CONFLICT (story_id) DO NOTHING"
        notes: "All story_ids must be unique; idempotent UPSERT"

      - table: "wint.features"
        insert_columns: "feature_name, feature_type, description, is_active, created_at, updated_at"
        unique_constraint: "feature_name (UNIQUE)"
        upsert_strategy: "ON CONFLICT (feature_name) DO NOTHING"
        notes: "LangGraph 'name' → wint 'feature_name'"

      - table: "wint.state_transitions"
        insert_columns: "entity_type, entity_id, from_state, to_state, triggered_by, reason, metadata, transitioned_at, created_at"
        unique_constraint: "none (natural ordering by transitioned_at)"
        notes: "For state_change_* events from LangGraph workflow_events"

      - table: "wint.workflow_audit_log"
        insert_columns: "entity_type, entity_id, event_type, actor, metadata, created_at"
        unique_constraint: "none (audit log appends)"
        notes: "For audit_* events from LangGraph workflow_events"

# ============================================================================
# CRITICAL GOTCHAS AND CONSTRAINTS
# ============================================================================

gotchas:
  - gotcha_id: "G-001"
    issue: "WINT uses uppercase priority (P0-P4) but LangGraph uses lowercase (p0-p3)"
    solution: |
      Map priority values:
      - LangGraph: p0, p1, p2, p3
      - WINT: P0, P1, P2, P3, P4

      Transformation: toUpperCase() + 'P' prefix if needed
      Test: All priorities must match valid WINT enum values

  - gotcha_id: "G-002"
    issue: "WINT.story_state uses underscored enum values, LangGraph uses hyphenated"
    solution: |
      normalizeStoryState() function must map:
      - 'ready-to-work' → 'ready_to_work'
      - 'in-progress' → 'in_progress'
      - 'ready-for-qa' → 'ready_for_qa'
      - 'uat' → 'in_qa' (semantic mapping - uat is intermediate state)

      Exhaustive mapping with fallback to 'backlog' for invalid values

  - gotcha_id: "G-003"
    issue: "LangGraph features.name must map to wint.features.feature_name"
    solution: |
      Not a direct copy - column rename required.
      In migration SQL: 'name' AS 'feature_name'
      In TypeScript: mapLangGraphFeatureToWint() explicitly maps name → feature_name

  - gotcha_id: "G-004"
    issue: "LangGraph workflow_events must be routed to different tables"
    solution: |
      Routing logic based on event_type prefix:
      - 'state_change_*' events → wint.state_transitions
        - from_state comes from old_value.state
        - to_state comes from new_value.state
      - 'audit_*' events → wint.workflow_audit_log
        - Standard audit fields with metadata JSONB

      Create splitWorkflowEventToWint() function to handle routing

  - gotcha_id: "G-005"
    issue: "UPSERT with ON CONFLICT DO NOTHING requires exact unique constraint name"
    solution: |
      Use story_id for stories (UNIQUE constraint)
      Use feature_name for features (UNIQUE constraint)

      SQL: INSERT INTO wint.stories (...) VALUES (...) ON CONFLICT (story_id) DO NOTHING
      This is idempotent - second run inserts 0 rows

  - gotcha_id: "G-006"
    issue: "LangGraph DB may be empty or unreachable"
    solution: |
      Handle gracefully:
      1. Test connection before migration
      2. If unreachable, log clear error message
      3. If empty, log 0 rows discovered and exit cleanly
      4. Don't crash script - provide feedback and opportunity to retry

  - gotcha_id: "G-007"
    issue: "WINT features table has additional columns not in LangGraph"
    solution: |
      LangGraph features only have: id, name, description, embedding, created_at
      WINT features have additional: feature_type, package_name, file_path, is_active, updated_at

      Set defaults:
      - feature_type: 'unknown' (or from metadata if available)
      - package_name: NULL
      - file_path: NULL
      - is_active: true (default)
      - updated_at: now()

  - gotcha_id: "G-008"
    issue: "Environment variables for both databases must be different"
    solution: |
      LangGraph connection uses: LANGGRAPH_DATABASE_URL or individual env vars
      WINT connection uses: DATABASE_URL or individual env vars

      Both connections must be configured independently.
      Test script with --dry-run first to verify connectivity.

  - gotcha_id: "G-009"
    issue: "Story type enum values differ between schemas"
    solution: |
      LangGraph has: feature, bug, tech-debt, spike, chore (hyphenated types)
      WINT has: feature, bug, tech-debt, spike, chore, infra, docs

      Map values: Remove hyphens if needed; default to 'feature' if unknown

  - gotcha_id: "G-010"
    issue: "Embeddings are pgvector columns - may cause connection issues"
    solution: |
      pgvector is optional (nullable):
      1. Migrate embeddings as-is if present
      2. Leave NULL if not present
      3. Don't fail on missing pgvector extension
      4. Future story (WINT-1111) can backfill embeddings

# ============================================================================
# ENUM MAPPINGS - DEFINITIVE REFERENCE
# ============================================================================

enum_mappings:
  story_state:
    label: "Story State Enum Normalization"
    source_format: "LangGraph (hyphenated)"
    target_format: "WINT (underscored)"
    values:
      "draft": "draft"
      "backlog": "backlog"
      "ready-to-work": "ready_to_work"
      "in-progress": "in_progress"
      "ready-for-qa": "ready_for_qa"
      "uat": "in_qa"
      "done": "done"
      "cancelled": "cancelled"
      "blocked": "blocked"
    additional_notes: |
      - 'uat' maps to 'in_qa' (semantic change: intermediate state in WINT)
      - 'blocked' is new in WINT (not in LangGraph)
      - Hyphenated states must all be normalized to underscored
      - Invalid values fall back to 'backlog'

  priority:
    label: "Story Priority Enum"
    source_format: "LangGraph (lowercase p0-p3)"
    target_format: "WINT (uppercase P0-P4)"
    values:
      "p0": "P0"
      "p1": "P1"
      "p2": "P2"
      "p3": "P3"
      "null": "P2"  # WINT default
    additional_notes: |
      - WINT adds P4 (new priority level)
      - Case conversion required (lowercase → uppercase)
      - Default priority in WINT is P2

  story_type:
    label: "Story Type Enum"
    source_format: "LangGraph (hyphenated)"
    target_format: "WINT (hyphenated, extended)"
    values:
      "feature": "feature"
      "bug": "bug"
      "tech-debt": "tech-debt"
      "spike": "spike"
      "chore": "chore"
      "unknown": "feature"  # fallback
    additional_notes: |
      - WINT adds: 'infra', 'docs'
      - Hyphenated names remain (tech-debt not tech_debt)
      - Default to 'feature' if unknown

# ============================================================================
# TRANSFORMATION FUNCTIONS SPECIFICATION
# ============================================================================

transformation_functions:
  - function: "normalizeStoryState"
    input: "state: string (from LangGraph)"
    output: "StoryState (WINT enum value)"
    logic: |
      // Exhaustive mapping
      switch(state.toLowerCase()) {
        case 'draft': return 'draft'
        case 'backlog': return 'backlog'
        case 'ready-to-work': return 'ready_to_work'
        case 'in-progress': return 'in_progress'
        case 'ready-for-qa': return 'ready_for_qa'
        case 'uat': return 'in_qa'
        case 'done': return 'done'
        case 'cancelled': return 'cancelled'
        case 'blocked': return 'blocked'
        default: return 'backlog'  // fallback
      }
    test_cases:
      - input: "ready-to-work"
        expected: "ready_to_work"
      - input: "in-progress"
        expected: "in_progress"
      - input: "uat"
        expected: "in_qa"
      - input: "UNKNOWN"
        expected: "backlog"
      - input: null
        expected: "backlog"

  - function: "mapLangGraphStoryToWint"
    input: "LangGraphStory"
    output: "WintStory (ready for INSERT)"
    fields_mapped:
      story_id: "story_id → story_id (no change)"
      title: "title → title (no change)"
      type: "type → type (normalize if hyphenated)"
      state: "state → state (via normalizeStoryState)"
      goal: "goal → goal"
      non_goals: "non_goals → non_goals"
      packages: "packages → packages (TEXT[] array)"
      surfaces: "surfaces → surfaces (TEXT[] array)"
      blocked_by: "blocked_by → blocked_by"
      depends_on: "depends_on → depends_on (TEXT[] array)"
      follow_up_from: "follow_up_from → follow_up_from"
      priority: "priority → priority (p0 → P0)"
      embedding: "embedding → embedding (nullable, kept as-is)"
      feature_id: "null (no feature mapping in this step)"
      points: "null (not in LangGraph)"
      created_at: "created_at → created_at (preserve)"
      updated_at: "updated_at → updated_at (preserve)"

  - function: "mapLangGraphFeatureToWint"
    input: "LangGraphFeature"
    output: "WintFeature (ready for INSERT)"
    fields_mapped:
      feature_name: "name → feature_name (column rename!)"
      description: "description → description"
      embedding: "embedding → embedding (nullable)"
      feature_type: "null → 'unknown' (not in LangGraph)"
      package_name: "null (not in LangGraph)"
      file_path: "null (not in LangGraph)"
      is_active: "null → true (default)"
      created_at: "created_at → created_at"
      updated_at: "now() (new record)"

  - function: "splitWorkflowEventToWint"
    input: "LangGraphWorkflowEvent"
    outputs: "WintStateTransition | WintWorkflowAuditLog (routed by event_type)"
    routing_logic: |
      if (event_type.startsWith('state_change_')) {
        return mapToStateTransition()
      } else if (event_type.startsWith('audit_')) {
        return mapToAuditLog()
      } else {
        return mapToAuditLog()  // default to audit log
      }
    state_transition_mapping:
      entity_type: "entity_type (e.g., 'story')"
      entity_id: "entity_id (story UUID)"
      from_state: "old_value.state"
      to_state: "new_value.state"
      triggered_by: "actor"
      reason: "reason (nullable)"
      metadata: "{ old_value, new_value, event_type } (JSON)"
    audit_log_mapping:
      entity_type: "entity_type"
      entity_id: "entity_id"
      event_type: "event_type"
      actor: "actor"
      metadata: "{ old_value, new_value } (JSON)"

# ============================================================================
# TESTING STRATEGY
# ============================================================================

testing_strategy:
  unit_tests:
    - test_group: "normalizeStoryState()"
      tests:
        - "All hyphenated states map to underscored"
        - "uat maps to in_qa"
        - "Pass-through values unchanged (backlog, done, draft, cancelled)"
        - "Invalid input falls back to backlog"
        - "Case insensitivity (DRAFT → draft)"
        - "Null/undefined handled gracefully"

    - test_group: "mapLangGraphStoryToWint()"
      tests:
        - "All fields mapped correctly"
        - "State normalized via normalizeStoryState()"
        - "Arrays preserved as TEXT[]"
        - "Null fields stay null"
        - "Timestamps preserved"

    - test_group: "Zod Schema Validation"
      tests:
        - "LangGraphStorySchema parses valid records"
        - "WintStorySchema rejects invalid state values"
        - "All schemas enforce required fields"

  integration_tests:
    - test_group: "Database Connection"
      tests:
        - "Connect to LangGraph on port 5433"
        - "Connect to WINT on port 5432"
        - "Graceful failure on unreachable database"
        - "Pool cleanup on error"

    - test_group: "UPSERT Behavior"
      tests:
        - "INSERT new record succeeds"
        - "Duplicate story_id triggers CONFLICT, inserts 0 rows"
        - "Running twice produces identical row counts"
        - "No data is overwritten"

    - test_group: "Batch Processing"
      tests:
        - "Process 50 records per batch"
        - "Error in one record doesn't stop batch"
        - "Track counts: inserted, skipped, errored"

  test_coverage_targets:
    unit: "≥90% for transformation functions"
    integration: "≥45% overall"
    critical_paths: "100%"

