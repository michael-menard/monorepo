# ============================================================================
# REUSABLE PATTERNS FROM CODEBASE
# ============================================================================

reuse_patterns:
  - pattern_id: "RP-001"
    name: "Database Script Pattern"
    source: "packages/backend/orchestrator/src/scripts/populate-story-status.ts"
    apply_to: "Main migration script structure (migrate-langgraph-data.ts)"
    pattern_details: |
      Structure for database CLI scripts:
      1. Parse CLI arguments (dry-run, execute, verify modes)
      2. Create database connection pool(s)
      3. Implement discovery/reading phase
      4. Implement processing phase
      5. Implement verification phase
      6. Write audit log to JSON file
      7. Handle errors gracefully with logging

    code_excerpt: |
      // From populate-story-status.ts (lines 93-103)
      function createDbPool(): Pool {
        const pool = new Pool({
          host: process.env.POSTGRES_HOST || 'localhost',
          port: parseInt(process.env.POSTGRES_PORT || '5432'),
          database: process.env.POSTGRES_DATABASE || 'postgres',
          user: process.env.POSTGRES_USER || 'postgres',
          password: process.env.POSTGRES_PASSWORD || 'postgres',
        })
        return pool
      }

  - pattern_id: "RP-002"
    name: "Zod Schema Pattern"
    source: "packages/backend/orchestrator/src/scripts/__types__/population.ts"
    apply_to: "Migration type definitions (__types__/migration.ts)"
    pattern_details: |
      REQUIRED per CLAUDE.md: Use Zod schemas for ALL types (never use interfaces).
      Pattern:
      1. Define Zod schema with constraints
      2. Export inferred type using z.infer<typeof SchemaName>
      3. Use schema.safeParse() for validation
      4. Leverage Zod for runtime validation at DB boundaries

    code_excerpt: |
      // CORRECT pattern (from CLAUDE.md)
      const UserSchema = z.object({
        id: z.string().uuid(),
        email: z.string().email(),
        name: z.string().min(1),
      })
      type User = z.infer<typeof UserSchema>

  - pattern_id: "RP-003"
    name: "Batch Processing Pattern"
    source: "packages/backend/orchestrator/src/scripts/populate-story-status.ts (lines 567-621)"
    apply_to: "migrateStories(), migrateFeatures(), migrateWorkflowEvents()"
    pattern_details: |
      Process large datasets in batches:
      1. Define BATCH_SIZE constant (50 records typical)
      2. Loop with i += BATCH_SIZE
      3. Use array.slice(i, i + BATCH_SIZE)
      4. Process each batch in transaction or atomic operation
      5. Catch and log individual record failures without stopping batch
      6. Track counts for audit logging

    code_excerpt: |
      // From populate-story-status.ts (lines 568-570)
      for (let i = 0; i < storiesArray.length; i += BATCH_SIZE) {
        const batch = storiesArray.slice(i, i + BATCH_SIZE)
        // process batch...
      }

  - pattern_id: "RP-004"
    name: "Error Handling Pattern"
    source: "packages/backend/orchestrator/src/scripts/populate-story-status.ts (lines 599-620)"
    apply_to: "Main migration functions"
    pattern_details: |
      Fail-soft error handling:
      1. Wrap individual operations in try-catch
      2. Log error with context (story_id, error message)
      3. Add to errors array, continue processing
      4. Track error_count separately
      5. Report summary at end

    code_excerpt: |
      try {
        // operation...
      } catch (error) {
        errors.push({
          story_id: location.story_id,
          error: error instanceof Error ? error.message : String(error),
          timestamp: new Date().toISOString(),
        })
        logger.warn('Failed to insert story', { storyId: location.story_id, error })
      }

  - pattern_id: "RP-005"
    name: "Logging Pattern"
    source: "packages/backend/orchestrator/src/scripts/populate-story-status.ts (lines 148-179)"
    apply_to: "All migration phases"
    pattern_details: |
      Structured logging via @repo/logger:
      1. Use logger.info() for phase transitions
      2. Use logger.warn() for non-fatal issues
      3. Use logger.error() for failures
      4. Include context objects with relevant IDs and counts
      5. Never use console.log (CLAUDE.md requirement)
      6. Write detailed audit log to migration-log.json

    code_excerpt: |
      import { logger } from '@repo/logger'
      logger.info('Discovery complete', { totalStories: locations.length })
      logger.warn('Failed to read story frontmatter', { storyId, error: error.message })

