lessons_to_record:
  - lesson: "Migration scripts that touch two separate databases benefit from independent pool factory functions (createWintPool / createLangGraphPool) with separate env var prefixes, making environment configuration explicit and testable."
    category: pattern
    tags: ["database", "migration", "scripts", "infrastructure"]

  - lesson: "When extending an existing __types__ file shared by multiple scripts, appending new schemas (prefixed with story ID, e.g. Wint1110MigrationLogSchema) avoids breaking existing imports while keeping types co-located."
    category: pattern
    tags: ["typescript", "zod", "types", "migration"]

  - lesson: "Rollback scripts should read a migration log (JSON file) written by the forward migration, enabling targeted DELETE of only migrated records without touching pre-existing data. Requires --execute flag; dry-run by default."
    category: pattern
    tags: ["migration", "rollback", "safety", "infrastructure"]

  - lesson: "ON CONFLICT DO NOTHING with a UNIQUE constraint (story_id, feature_name) is the simplest idempotency mechanism for one-time migration scripts. rowCount=0 on conflict is the key unit test assertion for skipped record tracking."
    category: pattern
    tags: ["database", "idempotency", "migration", "postgres"]

