risk_mitigations:
  - risk: "Data loss from overwriting existing WINT records"
    severity: "high"
    mitigation: "Use ON CONFLICT DO NOTHING; test idempotency; run in dry-run first"
    owner: "Developer running migration"

  - risk: "Database connection failures (LangGraph DB unreachable)"
    severity: "medium"
    mitigation: "Graceful error handling with clear messages; connection validation before migration"
    owner: "Test environment setup"

  - risk: "Invalid enum values causing INSERT failure"
    severity: "medium"
    mitigation: "normalizeStoryState() with exhaustive validation; 100% test coverage"
    owner: "Test suite validation"

  - risk: "Memory exhaustion with large datasets"
    severity: "medium"
    mitigation: "Batch processing; streaming queries; BATCH_SIZE configuration"
    owner: "Optimization during implementation"

  - risk: "Incomplete rollback leaving orphaned records"
    severity: "low"
    mitigation: "Rollback script tracks all inserted records; verify_rollback() confirmation"
    owner: "Rollback testing"

