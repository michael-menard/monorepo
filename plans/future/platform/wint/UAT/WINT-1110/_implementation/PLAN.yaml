# ============================================================================
# KEY TECHNICAL DECISIONS
# ============================================================================

technical_decisions:
  - id: "TD-001"
    title: "Dual Database Connection Pattern"
    decision: "Use separate Pool instances for LangGraph (5433) and WINT (5432)"
    rationale: "Prevents database consolidation; allows independent scaling and management"
    implementation: "createLangGraphPool() and createWintPool() functions with environment variables"

  - id: "TD-002"
    title: "Enum Normalization Strategy"
    decision: "Map hyphenated → underscored states; 'uat' → 'in_qa' semantic mapping"
    rationale: "WINT uses underscored naming; 'uat' is intermediate state, 'in_qa' is WINT semantic"
    implementation: "normalizeStoryState() pure function with exhaustive match"

  - id: "TD-003"
    title: "UPSERT with ON CONFLICT DO NOTHING"
    decision: "Preserve existing WINT data; don't overwrite on duplicate key"
    rationale: "Idempotent; safe to run multiple times; protects pre-existing WINT records"
    implementation: "All INSERT statements include ON CONFLICT (...) DO NOTHING clause"

  - id: "TD-004"
    title: "Batch Processing"
    decision: "Process stories in groups of 50 to manage memory"
    rationale: "Large LangGraph datasets require streaming; prevents memory exhaustion"
    implementation: "BATCH_SIZE constant; array.slice() for batch iteration"

  - id: "TD-005"
    title: "Workflow Events Routing"
    decision: "Route state_change_* events to state_transitions; audit_* to workflow_audit_log"
    rationale: "Semantic separation: state changes vs. general audit events"
    implementation: "splitWorkflowEventToWint() function with event_type prefix matching"

