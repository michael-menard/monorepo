lessons_to_record:
  - lesson: "ARCH-001: StoryRepository (orchestrator, raw pg) and MCP storyGetStatus (Drizzle ORM) both target the same physical wint.stories table in lego_dev on port 5432. The wint schema is in lego_dev (5432), not in the KB database (5433). Tests must set DATABASE_URL to port 5432."
    category: pattern
    tags: [wint, database, architecture, unified-schema, mcp-tools, orchestrator]

  - lesson: "Spike validation stories with CONDITIONAL_PASS design must explicitly account for manually-verified ACs (commands requiring live agent session) that cannot be re-run programmatically. QA verification yields BLOCKED when deferred ACs exist — plan for a follow-up manual session or explicitly waive those ACs with PM sign-off."
    category: pattern
    tags: [wint, spike, qa, conditional-pass, manual-verification]

  - lesson: "worktreeGetByStory returns storyId as the human-readable story_id from wint.stories (via JOIN), while worktreeRegister accepts and returns storyId as the UUID from wint.worktrees.story_id FK. Integration tests must account for this field semantic difference."
    category: pattern
    tags: [wint, worktree, mcp-tools, integration-test, field-semantics]

  - lesson: "afterEach cleanup of worktrees is essential in worktree integration tests to prevent unique constraint violations when a test fails mid-execution and leaves an active worktree in the DB blocking subsequent tests."
    category: pattern
    tags: [wint, worktree, integration-test, test-cleanup, vitest]

