known_issues:
  - id: ISSUE-1
    component: "storyGetStatus / storyUpdateStatus / storyGetByStatus / storyGetByFeature"
    description: >
      Postgres UUID cast error when using human-readable story IDs (e.g. 'WINT-1040').
      The OR(eq(stories.id, storyId), eq(stories.storyId, storyId)) clause attempts to
      cast a human-readable ID as UUID in the first branch, causing error code 42883.
      UUID lookups work correctly. The shim uses UUID path for DB operations.
    severity: medium
    workaround: "Use UUID storyId for direct MCP tool calls. Shim handles human-readable lookups via directory fallback."

  - id: ISSUE-2
    component: "worktreeRegister"
    description: >
      WorktreeRegisterInputSchema accepts both UUID and human-readable story IDs, but
      the function inserts storyId directly as a UUID FK (wint.worktrees.story_id → wint.stories.id).
      Passing a human-readable ID (e.g. 'WINT-1120') will fail silently (returns null).
    severity: medium
    workaround: "Always pass the story UUID when calling worktreeRegister."

  - id: ISSUE-3
    component: "worktree-management integration test (pre-existing)"
    description: >
      The existing integration.test.ts in worktree-management/__tests__/ fails because
      it inserts a story without the required NOT NULL storyType field. This is a
      pre-existing bug not introduced by WINT-1120.
    severity: low
    workaround: "WINT-1120 test uses storyType: 'feature' — correctly includes the required field."
