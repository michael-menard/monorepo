    capabilities:
      location: hardcoded from user-flows.schema.json
      status: VERIFIED
      count: 7 operations (create, read, edit, delete, upload, replace, download)

# Packages to Modify
packages:
  - name: packages/backend/database-schema
    operations:
      - create: src/seed/ directory structure
      - create: 5 seeder scripts
      - create: 3 parser utilities
      - create: test fixtures and test suite
      - modify: package.json (add seed scripts)

# Implementation Scope
implementation:
  seeders:
    - file: src/seed/phase-seeder.ts
      description: Seeds 8 workflow phases from stories.index.md
      tables: [wint.phases]
      idempotency: DELETE + INSERT, keyed by phase_name
      validation: Zod schema for phase data

    - file: src/seed/capability-seeder.ts
      description: Seeds 7 CRUD capabilities hardcoded
      tables: [wint.capabilities]
      idempotency: DELETE + INSERT, keyed by capability_name
      validation: Zod schema for capability data

    - file: src/seed/agent-seeder.ts
      description: Seeds agent metadata from .agent.md files
      tables: [wint.agents]
      idempotency: UPSERT keyed by agent name
      validation: Zod schema for agent metadata, frontmatter parsing

    - file: src/seed/command-seeder.ts
      description: Seeds command metadata from .claude/commands/ files
      tables: [wint.commands]
      idempotency: UPSERT keyed by command name
      validation: Zod schema for command metadata

    - file: src/seed/skill-seeder.ts
      description: Seeds skill metadata from .claude/skills/ directories
      tables: [wint.skills]
      idempotency: UPSERT keyed by skill name
      validation: Zod schema for skill metadata

  parsers:
    - file: src/seed/parsers/frontmatter-parser.ts
      description: Generic YAML frontmatter parser for .agent.md and .md files
      exports: [parseFrontmatter, validateFrontmatter]
      error_handling: Returns structured errors with line numbers

    - file: src/seed/parsers/index-parser.ts
      description: Parses stories.index.md to extract phase definitions
      exports: [parseStoriesIndex, extractPhases]
      dependencies: [frontmatter-parser]

    - file: src/seed/parsers/metadata-extractor.ts
      description: Extracts metadata from agent/command/skill files
      exports: [extractAgentMetadata, extractCommandMetadata, extractSkillMetadata]
      dependencies: [frontmatter-parser]

  entrypoint:
    - file: src/seed/index.ts
      description: CLI orchestration, transaction management, logging
      features:
        - CLI argument parsing (--target=phases|agents|commands|skills|capabilities|all)
        - Transactional seeding with rollback on error
        - Validation result aggregation
        - Summary reporting
      dependencies: [all seeders, @repo/db, @repo/logger]

# Test Infrastructure
tests:
  unit_tests:
    - frontmatter-parser.test.ts
    - index-parser.test.ts
    - metadata-extractor.test.ts
    - phase-seeder.test.ts
    - capability-seeder.test.ts
    - agent-seeder.test.ts
    - command-seeder.test.ts
    - skill-seeder.test.ts

  integration_tests:
    - integration.test.ts (full transaction cycle against test DB)

  fixtures:
    - test-agent.md (well-formed agent with all fields)
    - malformed-agent.md (invalid YAML, should fail gracefully)
    - minimal-agent.md (minimal but valid frontmatter)
    - test-commands/ (sample command files)
    - test-skills/ (sample skill directories)

# Package Script Additions
scripts:
  seed:wint: "tsx src/seed/index.ts"
  seed:wint:phases: "tsx src/seed/index.ts --target=phases"
  seed:wint:capabilities: "tsx src/seed/index.ts --target=capabilities"
  seed:wint:agents: "tsx src/seed/index.ts --target=agents"
  seed:wint:commands: "tsx src/seed/index.ts --target=commands"
  seed:wint:skills: "tsx src/seed/index.ts --target=skills"

# Dependencies
dependencies:
  runtime:
    - "@repo/db" (drizzle database client)
    - "@repo/logger" (logging utility)
    - "zod" (validation)
    - "js-yaml" (YAML parsing)
    - "glob" (file pattern matching)
  devDependencies:
    - "vitest" (testing)
    - "tsx" (CLI runner)

# Success Criteria
success_criteria:
  - All 5 seeders implemented with Zod validation
  - All 3 parsers implemented with error handling
  - Entrypoint CLI operational with all target options
  - Idempotency verified (safe to rerun)
  - Transaction safety verified (rollback on error)
  - Unit test coverage >= 80%
  - Integration tests pass against test DB
  - All scripts executable via pnpm package scripts

# Known Constraints
constraints:
  - Must be idempotent (safe to run multiple times)
  - Must be transactional (all-or-nothing on failure)
  - Must validate all data with Zod before insertion
  - Frontmatter parsing must handle variations in YAML formatting
  - Agent/command/skill files may have missing optional fields
  - Capability list is hardcoded (not dynamically generated)
  - No incremental/delta seeding (full replacement only)
  - Seed scripts do NOT modify production after 2026-02-16 (versioned)

# Deferred/Out of Scope
deferred:
  - Agent version history tracking (future: WINT-0087)
  - Incremental seed updates/delta mode (future: WINT-0087)
  - Agent dependency graph (spawned_by relationships tracking) - future story
  - Agent→skill→command relationship analytics - future story
  - Seed data export to JSON format - future story
  - Performance benchmarking for 205+ bulk inserts - future story
  - Rollback/undo mechanism for seed data - future story
