# Validation Strategy
validation:
  zod_validation:
    - All data validated before insert using createInsertSchema from drizzle-zod
    - Schemas imported from unified-wint.ts (insertPhaseSchema, insertAgentSchema, etc.)
    - Validation errors logged with context (file path, field name, error message)
    - Failed validation does NOT stop processing (log warning, continue)

  transaction_safety:
    - All seeding happens in single db.transaction() block
    - On any error: transaction rolls back, no partial data
    - On success: transaction commits, all changes atomic

  idempotency_verification:
    - Phase seeder: DELETE existing rows + INSERT new rows (deterministic)
    - Capability seeder: DELETE existing rows + INSERT new rows (deterministic)
    - Agent/Command/Skill seeders: UPSERT with ON CONFLICT (name) DO UPDATE SET
    - Test: Run seed twice, verify same database state both times

  data_integrity:
    - Row counts match expected totals (8 phases, 7 capabilities, ~143 agents, ~33 commands, ~14 skills)
    - No null values in required fields
    - JSONB fields properly formatted
    - Unique constraints respected (no duplicate names)

# Testing Strategy
testing:
  unit_tests:
    framework: vitest
    coverage_target: 80%
    test_files:
      - frontmatter-parser.test.ts (4 test cases)
      - index-parser.test.ts (2 test cases)
      - metadata-extractor.test.ts (3 test cases)
      - phase-seeder.test.ts (2 test cases)
      - capability-seeder.test.ts (1 test case)
      - agent-seeder.test.ts (2 test cases)
      - command-seeder.test.ts (1 test case, optional)
      - skill-seeder.test.ts (1 test case, optional)
    mocking_strategy: |
      - Mock db.transaction for unit tests
      - Mock file system for parser tests (use fixtures)
      - Real files for integration tests

  integration_tests:
    framework: vitest
    test_file: integration.test.ts
    test_cases:
      - Full seed against test database
      - Idempotency verification (run twice)
      - Transaction rollback on error
    database_setup: |
      - Use TEST_DATABASE_URL environment variable
      - Apply migrations before test
      - Truncate tables after test

  fixtures:
    location: src/seed/__fixtures__/
    files:
      - test-agent.md (well-formed, all fields)
      - malformed-agent.md (invalid YAML)
      - minimal-agent.md (minimal valid frontmatter)
      - test-command.md (optional)
      - test-skill/ (optional)

