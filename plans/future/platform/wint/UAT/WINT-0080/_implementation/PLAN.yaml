# Implementation Plan for WINT-0080: Seed Initial Workflow Data
# Detailed file-by-file breakdown with dependencies, validation, and testing strategy

# Overview
plan_summary: |
  Create idempotent seed data scripts to populate 5 workflow metadata tables with ~200 total records.
  Implement 5 specialized seeders, 3 parser utilities, and 1 CLI orchestrator.
  All operations transactional, validated with Zod, and safe to rerun.

estimated_duration: 12 hours
estimated_files: 17 new files (9 implementation + 8 tests)
estimated_tokens: 75000 total (50k implementation, 15k tests, 10k fixes)

# File-by-File Breakdown
files:
  # ============================================================================
  # Parsers (Foundation Layer)
  # ============================================================================

  - path: packages/backend/database-schema/src/seed/parsers/frontmatter-parser.ts
    purpose: Generic YAML frontmatter parser for .agent.md and .md files
    dependencies:
      npm: [gray-matter]
      internal: []
    exports:
      - name: parseFrontmatter
        signature: "(filePath: string) => Promise<{ data: unknown; content: string } | null>"
        description: Parses YAML frontmatter from markdown file, returns null on error
      - name: validateFrontmatter
        signature: "(data: unknown, schema: z.ZodSchema) => z.infer<schema> | null"
        description: Validates frontmatter data against Zod schema, returns null on validation error
    implementation_notes:
      - Use gray-matter library for frontmatter extraction
      - Try/catch per file with structured error logging
      - Return null on parse errors (graceful degradation)
      - Log warning with file path and error message on failure
    validation:
      - Unit tests with well-formed, malformed, and missing frontmatter files
      - Edge cases: empty files, YAML syntax errors, non-existent files
    estimated_lines: 80

  - path: packages/backend/database-schema/src/seed/parsers/index-parser.ts
    purpose: Parses stories.index.md to extract phase definitions
    dependencies:
      npm: []
      internal: [frontmatter-parser]
    exports:
      - name: parseStoriesIndex
        signature: "(indexPath: string) => Promise<PhaseData[]>"
        description: Extracts 8 phase definitions from stories index markdown
    implementation_notes:
      - Read stories.index.md file
      - Regex match on "## Phase N:" headers
      - Extract phase name from header text
      - Extract description from paragraph following header
      - Validate exactly 8 phases found (0-7)
      - Return array of { id, phaseName, description, phaseOrder }
    validation:
      - Unit test with actual stories.index.md
      - Verify 8 phases extracted with correct names and orders
      - Edge case: malformed headers, missing descriptions
    estimated_lines: 100

  - path: packages/backend/database-schema/src/seed/parsers/metadata-extractor.ts
    purpose: Extracts metadata from agent/command/skill files
    dependencies:
      npm: [gray-matter, glob]
      internal: [frontmatter-parser]
    exports:
      - name: extractAgentMetadata
        signature: "(agentFiles: string[]) => Promise<AgentMetadata[]>"
        description: Parses agent frontmatter and extracts required fields
      - name: extractCommandMetadata
        signature: "(commandFiles: string[]) => Promise<CommandMetadata[]>"
        description: Parses command metadata from markdown files
      - name: extractSkillMetadata
        signature: "(skillDirs: string[]) => Promise<SkillMetadata[]>"
        description: Extracts skill metadata from skill directories
    implementation_notes:
      - Use glob to discover files/directories
      - Parse frontmatter with frontmatter-parser
      - Extract fields with fallbacks (filename if name missing)
      - Handle optional fields gracefully (null if missing)
      - Log warnings for parsing failures but continue processing
    validation:
      - Unit tests with diverse frontmatter formats
      - Test missing optional fields, malformed YAML, filename fallbacks
    estimated_lines: 200

  # ============================================================================
  # Seeders (Data Layer)
  # ============================================================================

  - path: packages/backend/database-schema/src/seed/phase-seeder.ts
    purpose: Seeds wint.phases table with 8 workflow phases
    dependencies:
      npm: [drizzle-orm, zod, "@repo/logger"]
      internal: [parsers/index-parser]
    exports:
      - name: seedPhases
        signature: "(tx: Transaction, indexPath: string) => Promise<SeedResult>"
        description: Seeds phases table idempotently (DELETE + INSERT)
    implementation_notes:
      - Call parseStoriesIndex to extract phase data
      - Validate each phase with insertPhaseSchema (Zod)
      - Execute DELETE FROM wint.phases within transaction
      - Execute bulk INSERT for all 8 phases
      - Return success with row count and any warnings
    idempotency_strategy: DELETE existing rows + INSERT new data
    validation:
      - Zod schema validation before insert
      - Verify 8 rows inserted
      - Integration test: run twice, verify same result
    estimated_lines: 120

  - path: packages/backend/database-schema/src/seed/capability-seeder.ts
    purpose: Seeds wint.capabilities table with 7 CRUD capabilities
    dependencies:
      npm: [drizzle-orm, zod, "@repo/logger"]
      internal: []
    exports:
      - name: seedCapabilities
        signature: "(tx: Transaction) => Promise<SeedResult>"
        description: Seeds capabilities table idempotently (DELETE + INSERT)
    implementation_notes:
      - Hardcoded list of 7 capabilities (create, read, edit, delete, upload, replace, download)
      - Validate each capability with insertCapabilitySchema (Zod)
      - Execute DELETE FROM wint.capabilities within transaction
      - Execute bulk INSERT for all 7 capabilities
      - Map to capability_name, capability_type, description, maturity_level
    capabilities_data: |
      [
        { capability_name: "create", capability_type: "business", description: "Create new records", maturity_level: "stable" },
        { capability_name: "read", capability_type: "business", description: "View existing records", maturity_level: "stable" },
        { capability_name: "edit", capability_type: "business", description: "Modify existing records", maturity_level: "stable" },
        { capability_name: "delete", capability_type: "business", description: "Remove existing records", maturity_level: "stable" },
        { capability_name: "upload", capability_type: "technical", description: "Upload files or data", maturity_level: "stable" },
        { capability_name: "replace", capability_type: "technical", description: "Replace existing data", maturity_level: "stable" },
        { capability_name: "download", capability_type: "technical", description: "Download files or data", maturity_level: "stable" }
      ]
    idempotency_strategy: DELETE existing rows + INSERT new data
    validation:
      - Zod schema validation before insert
      - Verify 7 rows inserted
      - Integration test: run twice, verify same result
    estimated_lines: 100

  - path: packages/backend/database-schema/src/seed/agent-seeder.ts
    purpose: Seeds wint.agents table with agent metadata from .agent.md files
    dependencies:
      npm: [drizzle-orm, zod, "@repo/logger", glob]
      internal: [parsers/metadata-extractor]
    exports:
      - name: seedAgents
        signature: "(tx: Transaction, agentsDir: string) => Promise<SeedResult>"
        description: Seeds agents table idempotently (UPSERT by name)
    implementation_notes:
      - Use glob to find all .agent.md files in agentsDir
      - Call extractAgentMetadata to parse frontmatter
      - Validate each agent with insertAgentSchema (Zod)
      - Execute UPSERT (INSERT ... ON CONFLICT (name) DO UPDATE SET ...)
      - Map frontmatter fields to table columns (name, agent_type, permission_level, model, spawned_by, triggers, skills_used, metadata)
      - Handle missing optional fields with nulls
      - Log warnings for parse failures but continue
    idempotency_strategy: UPSERT keyed by agent name
    validation:
      - Zod schema validation before insert
      - Verify ~143 rows inserted (actual count may vary)
      - Integration test: run twice, verify no duplicates
    estimated_lines: 150

  - path: packages/backend/database-schema/src/seed/command-seeder.ts
    purpose: Seeds wint.commands table with command metadata
    dependencies:
      npm: [drizzle-orm, zod, "@repo/logger", glob]
      internal: [parsers/metadata-extractor]
    exports:
      - name: seedCommands
        signature: "(tx: Transaction, commandsDir: string) => Promise<SeedResult>"
        description: Seeds commands table idempotently (UPSERT by name)
    implementation_notes:
      - Use glob to find all .md files in commandsDir
      - Call extractCommandMetadata to parse files
      - Validate each command with insertCommandSchema (Zod)
      - Execute UPSERT (INSERT ... ON CONFLICT (name) DO UPDATE SET ...)
      - Map metadata to table columns (name, description, triggers, metadata)
    idempotency_strategy: UPSERT keyed by command name
    validation:
      - Zod schema validation before insert
      - Verify ~33 rows inserted (actual count may vary)
      - Integration test: run twice, verify no duplicates
    estimated_lines: 130

  - path: packages/backend/database-schema/src/seed/skill-seeder.ts
    purpose: Seeds wint.skills table with skill metadata from skill directories
    dependencies:
      npm: [drizzle-orm, zod, "@repo/logger", glob]
      internal: [parsers/metadata-extractor]
    exports:
      - name: seedSkills
        signature: "(tx: Transaction, skillsDir: string) => Promise<SeedResult>"
        description: Seeds skills table idempotently (UPSERT by name)
    implementation_notes:
      - Use glob to find all subdirectories in skillsDir
      - Call extractSkillMetadata to parse skill metadata
      - Validate each skill with insertSkillSchema (Zod)
      - Execute UPSERT (INSERT ... ON CONFLICT (name) DO UPDATE SET ...)
      - Map metadata to table columns (name, description, capabilities, metadata)
    idempotency_strategy: UPSERT keyed by skill name
    validation:
      - Zod schema validation before insert
      - Verify ~14 rows inserted (actual count may vary)
      - Integration test: run twice, verify no duplicates
    estimated_lines: 130

  # ============================================================================
  # CLI Orchestrator
  # ============================================================================

  - path: packages/backend/database-schema/src/seed/index.ts
    purpose: CLI entry point, orchestrates seeding with transaction management
    dependencies:
      npm: [drizzle-orm, "@repo/db", "@repo/logger"]
      internal: [phase-seeder, capability-seeder, agent-seeder, command-seeder, skill-seeder]
    exports:
      - name: main
        signature: "() => Promise<void>"
        description: Main CLI function
    implementation_notes:
      - Parse CLI arguments (--target=phases|capabilities|agents|commands|skills|all)
      - Resolve paths to data sources (relative to monorepo root)
      - Pre-flight checks (tables exist, data sources accessible)
      - Execute seeding within single transaction
      - Rollback on any error
      - Log summary (rows inserted, warnings, duration)
      - Exit with appropriate status code (0 success, 1 failure)
    cli_arguments:
      - flag: --target
        values: [phases, capabilities, agents, commands, skills, all]
        default: all
        description: "Which seeder(s) to run"
      - flag: --dry-run
        type: boolean
        default: false
        description: "Validate data without inserting (future enhancement, optional for MVP)"
    transaction_strategy: |
      await db.transaction(async (tx) => {
        if (target === 'all' || target === 'phases') {
          await seedPhases(tx, storiesIndexPath)
        }
        if (target === 'all' || target === 'capabilities') {
          await seedCapabilities(tx)
        }
        if (target === 'all' || target === 'agents') {
          await seedAgents(tx, agentsDir)
        }
        if (target === 'all' || target === 'commands') {
          await seedCommands(tx, commandsDir)
        }
        if (target === 'all' || target === 'skills') {
          await seedSkills(tx, skillsDir)
        }
      })
    validation:
      - Integration test: full seed run against test database
      - Verify all 5 tables populated
      - Verify transaction rollback on error
    estimated_lines: 200

