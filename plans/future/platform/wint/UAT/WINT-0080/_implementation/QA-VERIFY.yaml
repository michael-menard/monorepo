issues:
  - id: ISSUE-1
    severity: medium
    description: >
      SeedResult in phase-seeder.ts is exported as a TypeScript interface
      (export interface SeedResult) rather than a Zod schema. CLAUDE.md
      requires ALWAYS using Zod schemas, never TypeScript interfaces.
      This type is imported by capability-seeder.ts, agent-seeder.ts,
      command-seeder.ts, and skill-seeder.ts.
    file: packages/backend/database-schema/src/seed/phase-seeder.ts
    line: 6
    requirement: "CLAUDE.md: ALWAYS use Zod schemas for types - never use TypeScript interfaces"
    missed_in_review: >
      REVIEW.yaml iteration 2 fixed PhaseData, AgentMetadata, CommandMetadata,
      SkillMetadata interfaces - but SeedResult was not addressed.

  - id: ISSUE-2
    severity: low
    description: >
      @repo/db is imported in src/seed/index.ts but is NOT declared as a
      dependency in package.json. EVIDENCE.yaml claims it was added but the
      final package.json does not contain it. This creates a phantom dependency
      that works in monorepo dev environment via pnpm workspace hoisting but
      would fail in isolated builds or CI without hoisting.
    file: packages/backend/database-schema/package.json
    requirement: >
      Explicit dependency declarations required for all workspace imports.
      EVIDENCE.yaml incorrectly documents this as having been added.

lessons_to_record:
  - lesson: >
      When fixing Zod interface violations in code review, scan for ALL
      exported interfaces in the affected files, not just the ones named in
      the review finding. SeedResult was missed because the review findings
      named specific types (PhaseData, AgentMetadata, etc.) rather than
      scanning all exports.
    category: anti_pattern
    tags: ["code-review", "zod", "typescript", "database-schema"]

  - lesson: >
      Seed scripts that import from workspace packages (@repo/db) must have
      those packages explicitly listed in package.json dependencies.
      EVIDENCE.yaml should be validated against the actual package.json
      rather than trusting the agent's assertion that it was added.
    category: blocker
    tags: ["dependencies", "pnpm", "workspace", "seed-scripts"]

  - lesson: >
      Infrastructure seed scripts (no UI, no HTTP endpoints) with transaction-
      wrapped operations and Zod validation present a clean, reusable pattern
      for seeding reference data. The DELETE+INSERT (for static data) vs
      UPSERT (for dynamic data) split is a sound idempotency approach.
    category: pattern
    tags: ["seed", "idempotency", "drizzle", "transactions"]

