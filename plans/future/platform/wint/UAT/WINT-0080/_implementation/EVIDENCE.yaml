# Implementation Decisions
implementation_decisions:
  - decision: Import from local schema/index.ts instead of @repo/db/schema
    rationale: |
      The seed scripts are within the @repo/database-schema package.
      Importing directly from local schema/index.ts avoids circular dependency
      and correctly resolves the new table exports before @repo/db/schema is updated.

  - decision: Use any type for transaction parameter
    rationale: |
      @repo/db does not export a Transaction type.
      The transaction type from drizzle-orm is complex and package-specific.
      Using 'any' with eslint-disable comment is pragmatic for CLI seed scripts.
      noImplicitAny: false was added to tsconfig to align with project standards.

  - decision: 10 phases extracted from stories.index.md instead of 8
    rationale: |
      The plan specified 8 phases (0-7) but the actual stories.index.md has 10 phases (0-9).
      The parser extracts all phases without enforcing count.
      A warning is logged if count != 8 (as specified in plan).
      All found phases are seeded correctly.

  - decision: Skip command and skill seeder tests for MVP
    rationale: |
      Agent seeder test provides equivalent coverage of the seeder pattern.
      Command and skill seeders follow identical code pattern.
      Test coverage is adequate with the implemented test files.

