# Error Handling Patterns
error_handling:
  file_parsing_errors:
    strategy: Log warning, continue processing other files
    example: |
      try {
        const { data } = matter(fileContent)
        return data
      } catch (err) {
        logger.warn('Frontmatter parse failed', { file: filePath, error: err.message })
        return null
      }

  validation_errors:
    strategy: Log warning with validation details, skip record
    example: |
      const result = insertAgentSchema.safeParse(rawData)
      if (!result.success) {
        logger.warn('Validation failed', { file: filePath, errors: result.error.errors })
        return null
      }
      return result.data

  transaction_errors:
    strategy: Rollback entire transaction, log error, exit with code 1
    example: |
      try {
        await db.transaction(async (tx) => {
          // ... seeding operations
        })
      } catch (err) {
        logger.error('Seeding failed, transaction rolled back', { error: err })
        process.exit(1)
      }

# Performance Considerations
performance:
  bulk_insert_strategy:
    approach: Use db.insert().values([...]) with array of records (not loop)
    example: |
      const agentRecords = await extractAgentMetadata(agentFiles)
      await tx.insert(agents).values(agentRecords)
    notes: Drizzle optimizes bulk inserts with single SQL statement

  transaction_timeout:
    current_estimate: ~205 total inserts (8 + 7 + 143 + 33 + 14)
    expected_duration: <5 seconds (modern PostgreSQL)
    mitigation: None needed for MVP (monitor in production)

