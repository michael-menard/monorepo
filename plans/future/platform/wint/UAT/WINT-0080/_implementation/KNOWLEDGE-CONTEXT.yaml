# Common Pitfalls and How to Avoid
pitfalls:
  - pitfall: Forgetting to pass tx (transaction) to seeders
    solution: All seeder signatures must accept tx as first parameter
    example: "async function seedPhases(tx: Transaction, indexPath: string)"

  - pitfall: Using console.log instead of logger
    solution: ALWAYS use @repo/logger (import { logger } from '@repo/logger')
    violation: Project code style rule, pre-commit hook will fail

  - pitfall: Not handling null/undefined for optional fields
    solution: Use optional chaining and nullish coalescing
    example: "model: frontmatter.model ?? null"

  - pitfall: Hardcoding paths from wrong working directory
    solution: Resolve paths relative to monorepo root
    example: |
      import { fileURLToPath } from 'url'
      import path from 'path'
      const __dirname = path.dirname(fileURLToPath(import.meta.url))
      const monorepoRoot = path.resolve(__dirname, '../../../../..')
      const storiesIndexPath = path.join(monorepoRoot, 'plans/future/platform/wint/stories.index.md')

  - pitfall: Not validating data before insert
    solution: ALWAYS validate with Zod schema
    example: |
      const validated = insertPhaseSchema.parse(rawData)
      await tx.insert(phases).values(validated)

