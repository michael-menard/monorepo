# Existing Patterns to Reuse
patterns:
  # Database Client Pattern (from WINT-0090)
  - pattern_name: Drizzle Database Client
    source: packages/backend/mcp-tools/src/session-management/session-create.ts
    location: Lines 10-15
    example: |
      import { db } from '@repo/db'
      import { phases } from '@repo/db/schema'

      await db.insert(phases).values(phaseData).returning()
    usage_notes:
      - Always import db instance from @repo/db
      - Import table schemas from @repo/db/schema (re-exported from database-schema)
      - Use .returning() for insert operations to get inserted rows

  # Idempotent Insert Pattern
  - pattern_name: ON CONFLICT DO NOTHING (Upsert)
    source: packages/backend/orchestrator/src/db/story-repository.ts
    location: Lines 45-52
    example: |
      await db.insert(agents)
        .values(agentData)
        .onConflictDoUpdate({
          target: agents.name,
          set: {
            agentType: sql`EXCLUDED.agent_type`,
            permissionLevel: sql`EXCLUDED.permission_level`,
            model: sql`EXCLUDED.model`,
            spawnedBy: sql`EXCLUDED.spawned_by`,
            triggers: sql`EXCLUDED.triggers`,
            skillsUsed: sql`EXCLUDED.skills_used`,
            metadata: sql`EXCLUDED.metadata`,
            updatedAt: sql`NOW()`
          }
        })
    usage_notes:
      - Use for agents, commands, skills seeders (rerun-safe)
      - Update all fields on conflict to ensure latest data

  # Delete and Insert Pattern (for static data)
  - pattern_name: DELETE + INSERT (Full Replacement)
    source: N/A (standard SQL pattern)
    example: |
      await tx.delete(phases)  // Clear table
      await tx.insert(phases).values(phaseData)  // Insert fresh data
    usage_notes:
      - Use for phases and capabilities seeders (small, static datasets)
      - Guarantees exact match with source data
      - Requires DELETE and INSERT in same transaction

  # Transaction Pattern
  - pattern_name: Drizzle Transaction API
    source: packages/backend/orchestrator/src/db/workflow-repository.ts
    location: Lines 120-130
    example: |
      import { db } from '@repo/db'

      await db.transaction(async (tx) => {
        await tx.insert(phases).values(phaseData)
        await tx.insert(capabilities).values(capabilityData)
        // All inserts happen in single transaction
        // Rollback on any error
      })
    usage_notes:
      - Use for all seeding operations (atomicity required)
      - Pass tx to all seeder functions (not db)
      - Automatic rollback on error

  # Zod Validation Pattern
  - pattern_name: Zod Schema Validation with Drizzle
    source: packages/backend/database-schema/src/schema/unified-wint.ts
    location: Lines 1201-1204 (insertPhaseSchema)
    example: |
      import { insertPhaseSchema } from '@repo/db/schema'

      const validatedData = insertPhaseSchema.parse(rawData)
      // Throws ZodError if validation fails
    usage_notes:
      - All schemas auto-generated via createInsertSchema from drizzle-zod
      - Import from unified-wint.ts exports
      - Use .parse() for validation (throws on error)
      - Use .safeParse() for non-throwing validation (returns { success, data, error })

  # Logging Pattern
  - pattern_name: Structured Logging with @repo/logger
    source: packages/backend/mcp-tools/src/session-management/session-create.ts
    location: Lines 20-25
    example: |
      import { logger } from '@repo/logger'

      logger.info('Seeding phases', { count: phaseData.length })
      logger.warn('Parse failed', { file: filePath, error: err.message })
      logger.error('Seed failed', { error: err })
    usage_notes:
      - NEVER use console.log (project rule)
      - Always use @repo/logger for all logging
      - Include context objects for structured logs

