# Critical Constraints
constraints:
  # Idempotency
  - constraint: Idempotent Seeding
    requirement: All seed scripts must be safe to run multiple times
    implementation:
      phases: DELETE existing rows + INSERT new rows (deterministic)
      capabilities: DELETE existing rows + INSERT new rows (deterministic)
      agents: UPSERT on conflict (name) - update all fields
      commands: UPSERT on conflict (name) - update all fields
      skills: UPSERT on conflict (name) - update all fields
    verification: Run seed twice, verify identical database state

  # Transaction Safety
  - constraint: Atomic Transactions
    requirement: All seed operations must be wrapped in single transaction
    implementation: |
      await db.transaction(async (tx) => {
        await seedPhases(tx, ...)
        await seedCapabilities(tx)
        await seedAgents(tx, ...)
        await seedCommands(tx, ...)
        await seedSkills(tx, ...)
      })
    verification: Simulate error in one seeder, verify no partial data

  # Zod Validation
  - constraint: Schema Validation
    requirement: All data must be validated with Zod before insertion
    implementation: |
      import { insertPhaseSchema } from '@repo/db/schema'
      const validated = insertPhaseSchema.parse(rawData)
    validation_failure_handling:
      - Log warning with file path and error details
      - Continue processing other files (don't fail entire seed)
      - Summary reports validation failures at end

  # Frontmatter Parsing
  - constraint: Handle YAML Variations
    requirement: Parser must handle diverse frontmatter formats in agent files
    implementation:
      - Use gray-matter for robust YAML parsing
      - Try/catch per file (don't fail entire seed on one bad file)
      - Log warnings for parsing failures
      - Use filename as fallback for missing 'name' field
      - Null for missing optional fields
    known_variations:
      - Some agents have 'type' field, others don't
      - Some have 'model' field, others don't
      - Arrays may be empty or missing
      - YAML indentation may vary

  # Namespace Consistency
  - constraint: Schema Namespace
    requirement: All table references must use wint.* namespace (not workflow.* or graph.*)
    implementation: |
      import { phases, agents, commands, skills, capabilities } from '@repo/db/schema'
      // These are all in wint PostgreSQL schema
    verification: Check unified-wint.ts for correct namespace

  # Data Inventory
  - constraint: Expected Row Counts
    requirement: Verify expected row counts after seeding
    expected_counts:
      wint.phases: 8 rows (exactly)
      wint.capabilities: 7 rows (exactly)
      wint.agents: ~143 rows (may vary slightly)
      wint.commands: ~33 rows (may vary slightly)
      wint.skills: ~14 rows (may vary slightly)
    verification: Log actual counts, warn if significantly different

# Unique Constraints (Critical for Idempotency)
unique_constraints:
  wint.phases:
    - column: id (PRIMARY KEY)
    - column: phase_name (UNIQUE)
    strategy: DELETE + INSERT (keyed by id and phase_name)

  wint.capabilities:
    - column: capability_name (UNIQUE)
    strategy: DELETE + INSERT (keyed by capability_name)

  wint.agents:
    - column: name (UNIQUE)
    strategy: UPSERT ON CONFLICT (name) DO UPDATE SET

  wint.commands:
    - column: name (UNIQUE)
    strategy: UPSERT ON CONFLICT (name) DO UPDATE SET

  wint.skills:
    - column: name (UNIQUE)
    strategy: UPSERT ON CONFLICT (name) DO UPDATE SET

# Data Mapping Guides
data_mapping:
  # Phases Mapping
  phases:
    source: plans/future/platform/wint/stories.index.md
    extraction: |
      Regex match on "## Phase N: {Phase Name}"
      Extract description from paragraph following header
    target_columns:
      id: Phase number (0-7) extracted from header
      phase_name: Phase name extracted from header
      description: Description paragraph following header
      phase_order: Same as id (explicit ordering)
      created_at: NOW()
      updated_at: NOW()
    example: |
      Header: "## Phase 0: Bootstrap"
      Paragraph: "Bootstrap phase - Manual setup of database schemas..."
      Maps to:
        id: 0
        phase_name: "Bootstrap"
        description: "Bootstrap phase - Manual setup of database schemas..."
        phase_order: 0

  # Capabilities Mapping
  capabilities:
    source: Hardcoded in capability-seeder.ts
    target_columns:
      capability_name: "create" | "read" | "edit" | "delete" | "upload" | "replace" | "download"
      capability_type: "business" | "technical"
      description: Human-readable description
      owner: NULL (not specified for now)
      maturity_level: "stable" (all are stable)
      created_at: NOW()
      updated_at: NOW()
    example: |
      {
        capability_name: "create",
        capability_type: "business",
        description: "Create new records",
        maturity_level: "stable"
      }

  # Agents Mapping
  agents:
    source: .claude/agents/**/*.agent.md frontmatter
    target_columns:
      name: frontmatter.name OR filename (without .agent.md extension)
      agent_type: frontmatter.type (required: "worker" | "leader" | "orchestrator")
      permission_level: frontmatter.permission_level (required: "docs-only" | "read-only" | "read-write" | "admin" | "orchestrator")
      model: frontmatter.model (optional: "haiku" | "sonnet" | "opus" | null)
      spawned_by: frontmatter.spawned_by (array of agent names, or null)
      triggers: frontmatter.triggers (array of command triggers, or null)
      skills_used: frontmatter.skills_used (array of skill names, or null)
      metadata: Remaining frontmatter fields as JSONB (mission, scope, version, etc.)
      created_at: NOW()
      updated_at: NOW()
    example: |
      Frontmatter:
        name: pm
        type: orchestrator
        permission_level: orchestrator
        triggers: ["/pm-story", "/pm-fix-story"]
        skills_used: ["/token-log", "/story-update"]
      Maps to:
        name: "pm"
        agent_type: "orchestrator"
        permission_level: "orchestrator"
        model: null
        spawned_by: null
        triggers: ["/pm-story", "/pm-fix-story"]
        skills_used: ["/token-log", "/story-update"]
        metadata: {}

  # Commands Mapping
  commands:
    source: .claude/commands/**/*.md frontmatter
    target_columns:
      name: frontmatter.name OR filename (without .md extension)
      description: frontmatter.description (optional)
      triggers: frontmatter.triggers (array of trigger patterns, or null)
      metadata: Remaining frontmatter fields as JSONB
      created_at: NOW()
      updated_at: NOW()

  # Skills Mapping
  skills:
    source: .claude/skills/*/ directories (read skill.md or index.md)
    target_columns:
      name: Directory name OR frontmatter.name
      description: frontmatter.description (optional)
      capabilities: frontmatter.capabilities (array of capability names, or null)
      metadata: Remaining frontmatter fields as JSONB
      created_at: NOW()
      updated_at: NOW()

