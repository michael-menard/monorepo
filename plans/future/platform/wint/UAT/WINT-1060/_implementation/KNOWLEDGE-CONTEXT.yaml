  - "Executor places Step 2.5 AFTER the directory mv (Step 3) rather than before — ordering rationale requires DB write before mv."
  - "Executor forgets to document the done stage exclusion in Step 2.5 inline table (DECISIONS.yaml Gap-1 note)."
  - "Executor uses hardcoded state strings (e.g., 'in_progress') instead of referencing SWIM_LANE_TO_STATE in the inline table (violates AC-4)."
  - "Executor sets db_updated: false for the --update-status path instead of db_updated: skipped (violates AC-7)."

