schema: 1
story_id: WINT-1012
timestamp: '2026-02-17T23:30:00Z'
domain: backend-testing

lessons:
  - id: LESSON-KC-001
    title: "Zod-first schemas for observability fields"
    summary: "All new type definitions must use Zod schemas with z.infer<> for type inference. ShimDiagnostics and ShimDataSource should follow established patterns from WINT-1011."
    story_context: "WINT-1011 established ShimOptionsSchema pattern; WINT-1012 extends with ShimDiagnosticsSchema"

  - id: LESSON-KC-002
    title: "Optional observability metadata with _ prefix"
    summary: "Observability fields should be optional and prefixed with underscore (_diagnostics) to signal they are metadata, not part of canonical output contract. Callers not opting in incur no performance overhead."
    story_context: "AC-6 requires optional diagnostics field; _diagnostics prefix used in story narrative"

  - id: LESSON-KC-003
    title: "Data source tracking patterns"
    summary: "When implementing DB-first + fallback patterns, track which source produced the result (db | directory | not_found). Timestamp the query for observability during migration windows."
    story_context: "Story explicitly requires source: 'db' | 'directory' | 'not_found' and queried_at ISO timestamp"

  - id: LESSON-KC-004
    title: "Shim function signature consistency"
    summary: "All four shim functions (shimGetStoryStatus, shimUpdateStoryStatus, shimGetStoriesByStatus, shimGetStoriesByFeature) must have consistent parameter/return patterns for API stability."
    story_context: "WINT-1012 must extend all four functions uniformly; AC-6 applies to all"

  - id: LESSON-KC-005
    title: "80% coverage target for critical modules"
    summary: "Story-compatibility shim is migration-critical infrastructure. 80% coverage (above global 45% floor) covers: DB-hit path, DB-miss+fallback, DB-unavailable, invalid input edge cases."
    story_context: "AC-9 mandates 80% branch coverage; must cover 4 test paths per function × 4 functions"

adrs:
  - id: ADR-001
    title: "Observability field naming convention"
    decision: "Use _diagnostics field with _ prefix to signal observability metadata"
    rationale: "Distinguishes structured data (output) from monitoring data (diagnostics); no breaking change to existing callers"

  - id: ADR-002
    title: "Source tracking granularity"
    decision: "Track source at query level (db | directory | not_found), not at row level for list queries"
    rationale: "Phase 1 requirement; Phase 2/3 can extend to per-row granularity if needed (AC-6 non-goals)"

  - id: ADR-003
    title: "Diagnostics as opt-in field"
    decision: "Pass diagnostics: boolean flag in options parameter; default to false (off)"
    rationale: "Follows ShimOptionsSchema pattern from WINT-1011; no performance impact on existing callers"

constraints:
  - id: CONSTRAINT-001
    constraint: "Cannot modify core shim routing logic from WINT-1011"
    source: "Story non-goals"
    impact: "Only additive changes to functions; no refactoring of shimGetStoryStatus fallback flow"

  - id: CONSTRAINT-002
    constraint: "ShimDiagnostics is optional observability metadata only; canonical output must remain unchanged"
    source: "AC-6 and story architecture notes"
    impact: "Callers not opting in must see NO structural difference; _diagnostics field must be separate"

  - id: CONSTRAINT-003
    constraint: "Must achieve 80% coverage on story-compatibility module"
    source: "AC-9"
    impact: "Cannot skip edge case tests; must cover all four data paths for all four functions"

  - id: CONSTRAINT-004
    constraint: "No telemetry integration; no fallback_reason field"
    source: "Non-goals"
    impact: "ShimDiagnostics limited to source + queried_at; complex logging deferred to Phase 3 (WINT-3070)"

context_from_wint_1011:
  description: "Core shim module already delivered by WINT-1011; WINT-1012 builds observability on top"
  core_functions:
    - name: shimGetStoryStatus
      current_signature: "(input: StoryGetStatusInput, options?: ShimOptions) => Promise<StoryGetStatusOutput>"
      extension: "Add diagnostics?: boolean to options; return _diagnostics if opted in"

    - name: shimUpdateStoryStatus
      current_signature: "(input: StoryUpdateStatusInput, options?: ShimOptions) => Promise<StoryUpdateStatusOutput>"
      extension: "Add diagnostics?: boolean to options; track DB write success/failure as source"

    - name: shimGetStoriesByStatus
      current_signature: "(input: StoryGetByStatusInput, options?: ShimOptions) => Promise<StoryGetByStatusOutput[]>"
      extension: "Add diagnostics?: boolean to options; single source for entire result array"

    - name: shimGetStoriesByFeature
      current_signature: "(input: StoryGetByFeatureInput, options?: ShimOptions) => Promise<StoryGetByFeatureOutput[]>"
      extension: "Add diagnostics?: boolean to options; single source for entire result array"

testing_strategy:
  framework: vitest
  test_location: "packages/backend/mcp-tools/src/story-compatibility/__tests__/"
  test_paths:
    - DB-hit path: "DB returns result; _diagnostics.source = 'db' when opted in"
    - DB-miss + fallback: "DB returns null; directory scan runs; _diagnostics.source = 'directory'"
    - DB-unavailable: "storyGetStatus/storyGetByStatus returns null (error); _diagnostics.source = 'not_found' or fallback"
    - Invalid input: "Zod validation failure; error handling unchanged"
  coverage_target: "80% branch coverage on entire story-compatibility/ module"
  existing_test_structure: "Mocks are hoisted; @repo/logger and story-management are mocked; temporary directories for filesystem tests"
