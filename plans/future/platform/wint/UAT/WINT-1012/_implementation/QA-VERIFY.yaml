lessons_to_record:
  - lesson: >
      When extending shim functions with optional observability, use the _ prefix
      convention (e.g. _diagnostics) to clearly distinguish metadata from
      canonical output. This keeps the primary return type unchanged and avoids
      breaking callers.
    category: pattern
    tags: ["backend", "observability", "shim", "diagnostics"]

  - lesson: >
      Singleton functions (shimGetStoryStatus, shimUpdateStoryStatus) that return
      null on not-found cannot carry _diagnostics metadata on the null path without
      changing the return type contract. Document this deviation explicitly in
      DECISIONS.yaml and EVIDENCE.yaml. List functions can use a wrapper object
      { stories, _diagnostics } without breaking callers.
    category: pattern
    tags: ["backend", "shim", "api-contract", "null-handling"]

  - lesson: >
      Using buildDiagnostics() helper centralizes source and timestamp assignment
      across all shim functions. Reduces drift risk when the diagnostics schema
      is extended in future stories.
    category: reuse
    tags: ["backend", "helper-pattern", "diagnostics"]

