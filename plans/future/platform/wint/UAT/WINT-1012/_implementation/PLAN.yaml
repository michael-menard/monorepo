    description: "Extend ShimOptionsSchema and add ShimDiagnostics types"
    files:
      - "packages/backend/mcp-tools/src/story-compatibility/__types__/index.ts"
    dependencies: []
    slice: packages
    detail: |
      Add three new Zod schemas:
      - ShimDataSourceSchema: z.enum(['db', 'directory', 'not_found'])
      - ShimDiagnosticsSchema: object with source and queried_at fields
      - Extend ShimOptionsSchema to include diagnostics?: boolean
      Export all inferred types (ShimDataSource, ShimDiagnostics, ShimOptions)

  - id: 2
    description: "Implement shimGetStoryStatus with optional diagnostics"
    files:
      - "packages/backend/mcp-tools/src/story-compatibility/index.ts"
    dependencies: [1]
    slice: packages
    detail: |
      Modify shimGetStoryStatus to:
      - Accept options with diagnostics?: boolean parameter
      - Track data source: 'db' if DB returns result, 'directory' if fallback succeeds, 'not_found' if neither
      - Include _diagnostics field (with source and queried_at timestamp) in return value ONLY when diagnostics: true
      - Maintain backward compatibility (default diagnostics: false means NO _diagnostics field)

  - id: 3
    description: "Implement shimUpdateStoryStatus with diagnostics tracking"
    files:
      - "packages/backend/mcp-tools/src/story-compatibility/index.ts"
    dependencies: [1]
    slice: packages
    detail: |
      Modify shimUpdateStoryStatus to:
      - Accept options with diagnostics?: boolean parameter
      - Track source as 'db' for successful writes, 'not_found' if DB write fails
      - Include _diagnostics field in return value ONLY when diagnostics: true AND write succeeds
      - Log warning on DB failure (existing behavior); add diagnostic source tracking

  - id: 4
    description: "Implement shimGetStoriesByStatus with diagnostics tracking"
    files:
      - "packages/backend/mcp-tools/src/story-compatibility/index.ts"
    dependencies: [1]
    slice: packages
    detail: |
      Modify shimGetStoriesByStatus to:
      - Accept options with diagnostics?: boolean parameter
      - Track source: 'db' if DB returns non-empty array, 'directory' if fallback succeeds, 'not_found' if both fail
      - Include _diagnostics field (single source for entire array) in return value ONLY when diagnostics: true
      - DB-only states (blocked, cancelled) with no directory equivalent: source = 'not_found'

  - id: 5
