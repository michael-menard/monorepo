acceptance_criteria_map:
  - ac_id: "AC-6"
    planned_evidence: "Code inspection: _diagnostics field present in shimGetStoryStatus, shimUpdateStoryStatus, shimGetStoriesByStatus, shimGetStoriesByFeature return values when diagnostics: true"
    evidence_type: code
    detail: "ShimDiagnostics field (source + queried_at) is optional, off by default, opt-in via options.diagnostics = true"

  - ac_id: "AC-9"
    planned_evidence: "Coverage report: vitest coverage output showing 80%+ branch coverage on packages/backend/mcp-tools/src/story-compatibility/"
    evidence_type: test
    detail: "Tests cover all four data paths (db-hit, fallback, not-found, invalid) across all four shim functions; minimum 80% branch coverage"

architectural_decisions:
  - id: ARCH-001
    question: "Should _diagnostics field be part of the return type or a separate wrapper?"
    decision: "Optional field on the return type, only present when diagnostics: true is passed"
    rationale: "Per AC-6 architecture notes, callers not opting in should see no structural difference; using _diagnostics prefix signals observability metadata separate from canonical output"
    decided_by: story-spec

  - id: ARCH-002
    question: "Should diagnostics be tracked at row level or query level for list operations?"
    decision: "Query level (single source field for entire array result)"
    rationale: "Phase 1 acceptable granularity; Phase 2/3 can extend to per-row tracking if needed (non-goals)"
    decided_by: story-spec

  - id: ARCH-003
    question: "How should shimUpdateStoryStatus handle diagnostics on write failure?"
    decision: "Return null (existing behavior); add _diagnostics with source='not_found' only when write fails AND diagnostics: true"
    rationale: "Maintains backward compatibility for callers not using diagnostics; callers opting in see failure reason"
    decided_by: story-spec

complexity: moderate

notes:
