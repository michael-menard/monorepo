  - "80% coverage requirement (AC-9) is above global 45% floor; must cover all four data paths for all four functions"
  - "Phase 1-7 migration window: ShimDiagnostics enables monitoring of DB vs directory data sources during schema migration"
  - "Phase 2/3 extensions (WINT-3070) may add fallback_reason, telemetry integration; deferred per non-goals"
  - "Test infrastructure already established by WINT-1011; extending existing test files (no new files)"
