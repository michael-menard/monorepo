architectural_decisions: []

complexity: moderate

notes:
  - "storyGetStatus returns null on BOTH DB-miss and DB-error — shim treats both as 'not in DB, try directory fallback' for reads (acceptable per DECISIONS.yaml)"
  - "storyGetByStatus/storyGetByFeature return [] on BOTH empty result and DB error — shim triggers directory fallback on empty [] for list queries (documented in __types__/index.ts)"
  - "No barrel file: story-compatibility/index.ts exports the four functions directly; __types__/index.ts is imported directly in the shim implementation"
  - "Directory fallback scan: fs.readdirSync on each swim-lane directory, filter by story ID regex /^[A-Z]{2,10}-\\d{3,4}$/, infer state from parent dir name"
  - "shimUpdateStoryStatus does NOT create a directory fallback path — write-only, returns null on DB unavailable (AC-2 hard constraint)"
  - "STORIES_ROOT resolution order: options.storiesRoot ?? process.env.STORIES_ROOT ?? detectMonorepoRoot() — defined in __types__/index.ts as resolveStoriesRoot(options)"
  - "Integration test uses real PostgreSQL; requires live DB connection; test story uses epic='TEST', wave=99, priority='P4' to match existing integration test pattern"
  - "Vitest test command is 'pnpm --filter @repo/mcp-tools test' (runs vitest run); no --testPathPattern flag; integration tests are in __tests__/integration/ and will be included automatically"
  - "Per ELAB-WINT-1011.md: AC-6, AC-9, AC-11 are intentionally excluded from this story (split context)"
  - "vitest.config.ts in mcp-tools has 80% coverage thresholds — WINT-1012 owns the 80% requirement; this story targets 45% global floor minimum"
  - "No new pnpm package: shim co-locates in packages/backend/mcp-tools/src/story-compatibility/ per architecture decision in WINT-1011.md"
