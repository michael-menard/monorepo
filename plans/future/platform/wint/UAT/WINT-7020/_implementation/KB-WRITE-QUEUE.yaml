        **[WINT-7020] Rollback Granularity: Batch-Level Only — Per-Agent Rollback Not Possible**
        - **Finding**: The compatibility shim at `packages/backend/mcp-tools/src/story-compatibility/` provides batch-level rollback via directory fallback. If a single agent in a batch introduces a regression, the entire batch must be reverted — there is no mechanism to revert one agent while keeping others in their migrated state.
        - **Impact**: Medium - batch-level rollback increases the blast radius of a single-agent regression during migration execution
        - **Effort**: High - per-agent rollback would require the shim to track migration state per-agent (not per-batch), and potentially require a migration state table in the DB
        - **Recommendation**: Current shim design is correct and sufficient for Phase 7. Reverting an entire batch on regression is the right approach. Document this explicitly in the MIGRATION-PLAN.md rollback section: "Rollback is batch-level. If a single agent regresses, revert the entire batch." Defer per-agent rollback to Phase 8+ if the need materializes after Phase 7 execution.
