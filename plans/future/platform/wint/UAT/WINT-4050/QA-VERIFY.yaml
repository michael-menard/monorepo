lessons_to_record:
  - lesson: >
      seed:cohesion-rules script in package.json should use compiled node dist/ not tsx src/
      for production parity. tsx is fine during development but dist/ is the canonical
      invocation for seeding against production databases.
    category: pattern
    tags: ['backend', 'seed-scripts', 'rules-registry']

  - lesson: >
      Integration tests using graceful DB-unavailable skip pattern (checking dbAvailable flag
      inline per test, not via vitest.skipIf) allow tests to pass in CI without a DB while
      still being verifiable against a live DB during UAT — effective balance of CI safety
      and integration confidence.
    category: pattern
    tags: ['backend', 'testing', 'integration', 'ci']

  - lesson: >
      Inline snapshot tests (toMatchInlineSnapshot) in integration tests require the snapshot
      to match the exact DB output including sort order — sorting by rule_text before snapshot
      ensures deterministic ordering across DB runs.
    category: pattern
    tags: ['backend', 'testing', 'integration', 'vitest']

