# PHASE 1: PLANNING - IMPLEMENTATION PLAN
# Story: Create Context Cache MCP Tools
# Pattern: WINT-0110 (Session Management MCP Tools)

implementation_approach: |
  Test-Driven Development (TDD) approach following WINT-0110 pattern:
  1. Create Zod validation schemas first (AC-5)
  2. Write comprehensive test suites (AC-6)
  3. Implement tools to make tests pass
  4. Verify coverage ≥80%
  5. Add JSDoc documentation (AC-7)
  6. Update exports

ordered_steps:
  - step: 1
    name: Create Zod Validation Schemas
    description: |
      Create __types__/index.ts with 4 input schemas and inferred types.
      Note: packType must use enum values from contextPackTypeEnum, not free-form strings.
    acceptance_criteria: AC-5
    files_created:
      - packages/backend/mcp-tools/src/context-cache/__types__/index.ts
    dependencies: []
    estimated_effort: 30min
    
  - step: 2
    name: Create Test Files with Full Test Suites
    description: |
      Write all test cases BEFORE implementation (TDD approach).
      5 test files: 4 unit test files + 1 integration test.
      Total: 19 tests (9 happy path + 4 error cases + 6 edge cases).
    acceptance_criteria: AC-6
    files_created:
      - packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-get.test.ts
      - packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-put.test.ts
      - packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-invalidate.test.ts
      - packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-stats.test.ts
      - packages/backend/mcp-tools/src/context-cache/__tests__/integration.test.ts
    dependencies: [1]
    estimated_effort: 2h
    
  - step: 3
    name: Implement context-cache-get Tool
    description: |
      Retrieve cached context by packType and packKey.
      - Filter expired entries (expiresAt <= NOW())
      - Atomic hitCount increment
      - Update lastHitAt on success
      - Return null on miss/error
    acceptance_criteria: AC-1
    files_created:
      - packages/backend/mcp-tools/src/context-cache/context-cache-get.ts
    dependencies: [1, 2]
    estimated_effort: 1.5h
    test_command: pnpm test packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-get.test.ts
    
  - step: 4
    name: Implement context-cache-put Tool
    description: |
      Create or update context pack with upsert pattern.
      - Upsert on (packType, packKey) composite key
      - Calculate expiresAt = NOW() + ttl (default 7 days)
      - Reset hitCount on insert, preserve on update
      - Support optional version
    acceptance_criteria: AC-2
    files_created:
      - packages/backend/mcp-tools/src/context-cache/context-cache-put.ts
    dependencies: [1, 2]
    estimated_effort: 1.5h
    test_command: pnpm test packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-put.test.ts
    
  - step: 5
    name: Implement context-cache-invalidate Tool
    description: |
      Mark context as expired or delete stale entries.
      - Soft delete by default (update expiresAt = NOW() - 1)
      - Hard delete optional (physical DELETE)
      - Filter by packType, packKey, olderThan
      - Return invalidatedCount
    acceptance_criteria: AC-3
    files_created:
      - packages/backend/mcp-tools/src/context-cache/context-cache-invalidate.ts
    dependencies: [1, 2]
    estimated_effort: 1.5h
    test_command: pnpm test packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-invalidate.test.ts
    
  - step: 6
    name: Implement context-cache-stats Tool
    description: |
      Query aggregate cache effectiveness metrics.
      - COUNT active packs (expiresAt > NOW())
      - SUM hitCount
      - AVG hitCount (COALESCE to 0 if empty)
      - COUNT expired packs
      - Filter by packType and since date
    acceptance_criteria: AC-4
    files_created:
      - packages/backend/mcp-tools/src/context-cache/context-cache-stats.ts
    dependencies: [1, 2]
    estimated_effort: 1.5h
    test_command: pnpm test packages/backend/mcp-tools/src/context-cache/__tests__/context-cache-stats.test.ts
    
  - step: 7
    name: Update Package Exports
    description: |
      Export all 4 context cache tools from src/index.ts.
      Follow NO BARREL FILES rule - direct exports only.
    acceptance_criteria: All ACs
    files_modified:
      - packages/backend/mcp-tools/src/index.ts
    dependencies: [3, 4, 5, 6]
    estimated_effort: 15min
    
  - step: 8
    name: Run Full Test Suite and Verify Coverage
    description: |
      Run all tests including integration test.
      Verify ≥80% line coverage.
      Fix any failing tests.
    acceptance_criteria: AC-6
    dependencies: [3, 4, 5, 6, 7]
    estimated_effort: 1h
    test_command: |
      pnpm test packages/backend/mcp-tools/src/context-cache
      pnpm test:coverage packages/backend/mcp-tools/src/context-cache
    
  - step: 9
    name: Add JSDoc Documentation
    description: |
      Add comprehensive JSDoc comments to all 4 tools.
      Include usage examples, parameter descriptions, return types.
    acceptance_criteria: AC-7
    files_modified:
      - packages/backend/mcp-tools/src/context-cache/context-cache-get.ts
      - packages/backend/mcp-tools/src/context-cache/context-cache-put.ts
      - packages/backend/mcp-tools/src/context-cache/context-cache-invalidate.ts
      - packages/backend/mcp-tools/src/context-cache/context-cache-stats.ts
    dependencies: [8]
    estimated_effort: 30min
    
  - step: 10
    name: Build Verification
    description: |
      Verify TypeScript compilation and linting pass.
      Fix any type errors or lint violations.
    acceptance_criteria: All ACs
    dependencies: [9]
    estimated_effort: 30min
    test_command: |
      pnpm check-types --filter @repo/mcp-tools
      pnpm lint packages/backend/mcp-tools/src/context-cache

