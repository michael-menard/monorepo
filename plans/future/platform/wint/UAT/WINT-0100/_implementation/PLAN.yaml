test_strategy:
  framework: Vitest
  database: PostgreSQL (real database, not mocks)
  coverage_target: 80%
  
  test_categories:
    happy_path:
      count: 9
      examples:
        - Cache hit with hitCount increment (get)
        - Cache miss returns null (get)
        - Expired pack not returned (get)
        - New pack creation (put)
        - Existing pack update (put)
        - Upsert idempotence (put)
        - Soft delete by packType (invalidate)
        - Hard delete by packKey (invalidate)
        - Overall stats aggregation (stats)
        
    error_cases:
      count: 4
      examples:
        - Invalid input validation (empty strings, negative numbers)
        - Database connection failures
        - Not-found scenarios return null
        - Error logging without throwing
        
    edge_cases:
      count: 6
      examples:
        - Concurrent hit count increments remain atomic
        - Large JSONB content (1000+ elements)
        - Age-based invalidation (olderThan filter)
        - Empty database aggregates return zeros
        - TTL calculation accuracy
        - Soft vs hard delete behavior
        
  integration_test:
    description: Full workflow test
    steps:
      - put → create context pack
      - get → retrieve and increment hits
      - stats → verify metrics
      - invalidate → soft delete
      - get → returns null (expired)
      - stats → verify expired count

  test_execution:
    unit_tests: pnpm test packages/backend/mcp-tools/src/context-cache
    coverage: pnpm test:coverage packages/backend/mcp-tools/src/context-cache
    watch_mode: pnpm test --watch packages/backend/mcp-tools/src/context-cache

acceptance_validation_approach:
  AC-1:
    method: Unit tests verify get tool behavior
    evidence: Tests pass for cache hit/miss, expiration filtering, hit tracking
    
  AC-2:
    method: Unit tests verify put tool behavior
    evidence: Tests pass for create/update, upsert, TTL calculation
    
  AC-3:
    method: Unit tests verify invalidate tool behavior
    evidence: Tests pass for soft/hard delete, filtering, count return
    
  AC-4:
    method: Unit tests verify stats tool behavior
    evidence: Tests pass for aggregation accuracy, filtering, empty state
    
  AC-5:
    method: TypeScript compilation + Zod validation tests
    evidence: Types infer correctly, validation rejects invalid input
    
  AC-6:
    method: Coverage report + test execution
    evidence: All 19 tests pass, coverage ≥80%
    
  AC-7:
    method: JSDoc presence verification
    evidence: All 4 tools have comprehensive JSDoc with examples

risk_mitigation:
  concurrent_access:
    risk: Concurrent hit count increments could race
    mitigation: Use SQL-level atomic increment (hitCount + 1)
    test: Edge case test with concurrent get operations
    
  upsert_composite_key:
    risk: Upsert with (packType, packKey) composite index
    mitigation: Use Drizzle onConflictDoUpdate with both fields
    test: Upsert idempotence test verifies update, not duplicate
    
  expired_pack_filtering:
    risk: Expired packs incorrectly returned
    mitigation: WHERE expiresAt > NOW() in all select queries
    test: Expired pack test verifies null return
    
  aggregate_query_complexity:
    risk: PostgreSQL FILTER syntax may not work in Drizzle
    mitigation: Use sql template for raw SQL if needed
    test: Stats test verifies aggregate accuracy

dependencies:
  internal_packages:
    - "@repo/db": database connection, schema exports, SelectContextPack type
    - "@repo/logger": structured logging (never console.log)
    
  external_packages:
    - "drizzle-orm": type-safe queries, upsert, aggregates
    - "zod": input validation, type inference
    - "vitest": test framework
    - "postgres": PostgreSQL client
    
  database:
    - table: wint.contextPacks (protected schema, WINT-0010)
    - operations: SELECT, INSERT (upsert), UPDATE, DELETE, aggregates
    - indexes: (packType, packKey) unique, expiresAt, lastHitAt, packType

constraints:
  protected_schemas:
    - wint.contextPacks table schema (WINT-0010)
    - wint.contextSessions table schema (WINT-0010)
    - DO NOT modify any database schema
    
  code_style:
    - Zod-first types (no TypeScript interfaces)
    - @repo/logger only (no console.log)
    - No barrel files (direct imports)
    - Functional components/exports
    - Resilient error handling (log warnings, return null/empty)
    
  testing:
    - Real PostgreSQL database (no mocks)
    - Minimum 80% coverage
    - Vitest framework
    - Database cleanup before/after each test

estimated_total_effort: 10-12 hours

notes: |
  Implementation follows proven WINT-0110 pattern with TDD approach.
  All 4 tools follow identical error handling pattern: validate input, execute query, log errors, return null/empty on failure.
  Database schema uses contextPackTypeEnum for packType field - validation schemas must match enum values.
  Integration test covers full workflow to verify tool interactions.
