issues:
  - id: TD-WINT-0100-001
    severity: low
    blocker: false
    description: >
      Vitest parallel execution causes database state contamination between test files when
      run as a full suite. All 22 tests pass when run per-file. Code is correct — this is
      a test infrastructure issue. Mitigation: track as tech debt, run tests per-file in CI.

lessons_to_record:
  - lesson: >
      Drizzle ORM onConflictDoUpdate requires column array for composite key targets, not index
      object syntax: target: [table.col1, table.col2] (not target: { indexName }).
    category: pattern
    tags: ["drizzle-orm", "upsert", "postgresql", "backend"]

  - lesson: >
      Nullable timestamp columns (expiresAt IS NULL) must be handled in expiration filters using
      OR IS NULL: or(gt(expiresAt, sql`NOW()`), isNull(expiresAt)). Omitting this causes all
      packs with null expiresAt to fail retrieval.
    category: pattern
    tags: ["drizzle-orm", "postgresql", "nullable", "expiration", "backend"]

  - lesson: >
      PostgreSQL FILTER clause for conditional aggregates must be applied consistently across
      all aggregate expressions in the same SELECT. Inconsistent FILTER application returns
      incorrect counts for active vs. expired packs.
    category: pattern
    tags: ["postgresql", "aggregates", "sql", "backend"]

  - lesson: >
      Vitest parallel test execution with real PostgreSQL causes database isolation failures
      when multiple test files share the same table. Per-file execution avoids contamination.
      Consider pool-mode: forks or transaction-based cleanup for future stories.
    category: blocker
    tags: ["vitest", "postgresql", "test-isolation", "backend", "infrastructure"]

  - lesson: >
      olderThan timestamp filter for invalidation should NOT include isNull(lastHitAt) — new
      packs that have never been hit should not be invalidated by age-based filters targeting
      stale content.
    category: anti_pattern
    tags: ["invalidation", "filter-logic", "backend", "edge-case"]

