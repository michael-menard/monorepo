lessons_learned:
  from_wint_0110:
    - lesson: Resilient error handling prevents tool failures from crashing workflows
      impact: Tools log warnings but never throw, return null/empty instead
      apply_to: All 4 context cache tools
      
    - lesson: Zod validation at entry point catches invalid inputs early
      impact: Input validation happens before database operations
      apply_to: All tool implementations parse input first
      
    - lesson: Default safe behavior prevents accidental data loss
      impact: hardDelete defaults to false, soft delete is default
      apply_to: context-cache-invalidate tool
      
    - lesson: Auto-generated Zod schemas from drizzle-zod reduce duplication
      impact: SelectContextPack type is auto-generated, no manual typing needed
      apply_to: Return types for get and put tools
      
    - lesson: Real database tests catch schema mismatches early
      impact: Tests use actual PostgreSQL, not mocks
      apply_to: All 5 test files

decisions_from_story:
  default_ttl:
    decision: Default TTL = 7 days (604800 seconds)
    rationale: Balances context freshness vs storage efficiency
    implementation: ttl parameter optional with 604800 default
    
  soft_delete_default:
    decision: Soft delete by default (hardDelete defaults to false)
    rationale: Preserves audit trail, allows recovery
    implementation: Update expiresAt = NOW() - 1 for soft delete
    
  version_field_type:
    decision: version is integer, not string
    rationale: Matches database schema (integer column)
    implementation: z.number().int().optional() in Zod schema
    
  content_validation:
    decision: Use z.record(z.unknown()) for content field
    rationale: Flexible input validation, database enforces JSONB structure
    implementation: No per-packType content validation in MVP
    
  packkey_requires_packtype:
    decision: packKey filter requires packType
    rationale: Unique index on (packType, packKey) composite key
    implementation: Validate packKey only used with packType

database_schema_notes:
  contextPacks_table:
    schema: wint (PostgreSQL schema namespace)
    protected: true (WINT-0010, DO NOT MODIFY)
    
    fields:
      id: uuid (primary key, auto-generated)
      packType: contextPackTypeEnum (enum, NOT free-form string)
      packKey: text (NOT NULL)
      content: jsonb (typed JSONB structure)
      version: integer (default 1)
      expiresAt: timestamp with timezone (nullable, TTL)
      hitCount: integer (default 0)
      lastHitAt: timestamp with timezone (nullable)
      tokenCount: integer (nullable, future use)
      createdAt: timestamp (auto, NOT NULL)
      updatedAt: timestamp (auto, NOT NULL)
      
    indexes:
      - UNIQUE (packType, packKey)
      - INDEX (expiresAt)
      - INDEX (lastHitAt)
      - INDEX (packType)
      
    enum_values:
      contextPackTypeEnum:
        - codebase
        - story
        - feature
        - epic
        - architecture
        - lessons_learned
        - test_patterns
        
  important_constraints:
    - packType MUST be one of enum values, not arbitrary string
    - Unique constraint on (packType, packKey) enables upsert pattern
    - expiresAt is nullable but should always be set by put tool
    - hitCount and lastHitAt updated atomically by get tool

