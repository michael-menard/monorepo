# KNOWLEDGE CONTEXT - Implementation Context
# Patterns, constraints, lessons, and reference materials

patterns_to_follow:
  wint_0110_session_management:
    source: packages/backend/mcp-tools/src/session-management/
    description: Proven MCP tools pattern for database operations
    key_patterns:
      - Directory structure: __types__/, __tests__/, tool files at root
      - Zod validation at entry point with .parse() for fail-fast
      - Drizzle ORM for type-safe database queries
      - Resilient error handling: try/catch, log warnings, return null/empty
      - Auto-generated types from drizzle-zod (SelectContextPack)
      - Real PostgreSQL database in all tests
      - Comprehensive JSDoc with usage examples
    apply_to:
      - All 4 context cache tools
      - Test structure and setup
      - Error handling strategy
      
  zod_first_validation:
    source: CLAUDE.md requirement
    description: ALWAYS use Zod schemas with z.infer<>, NEVER TypeScript interfaces
    examples:
      correct: |
        const InputSchema = z.object({ ... })
        type Input = z.infer<typeof InputSchema>
      incorrect: |
        interface Input { ... }
    apply_to:
      - __types__/index.ts validation schemas
      - All input type definitions
      
  resilient_error_handling:
    source: WINT-0110 lessons learned
    description: Tools never throw errors to prevent workflow crashes
    pattern: |
      try {
        const validated = InputSchema.parse(input)
        const result = await db.query()
        return result
      } catch (error) {
        logger.warn('Operation failed', { error, context })
        return null // or empty array/object
      }
    apply_to:
      - All 4 context cache tools
      - Integration test error scenarios
      
  database_query_patterns:
    source: Drizzle ORM v0.44.3 + PostgreSQL
    patterns:
      upsert:
        description: INSERT with conflict resolution on composite key
        code: |
          await db.insert(contextPacks)
            .values({ packType, packKey, content, expiresAt })
            .onConflictDoUpdate({
              target: [contextPacks.packType, contextPacks.packKey],
              set: { content, expiresAt, updatedAt: sql`NOW()` }
            })
            
      atomic_increment:
        description: Concurrent-safe counter increment
        code: |
          await db.update(contextPacks)
            .set({
              hitCount: sql`${contextPacks.hitCount} + 1`,
              lastHitAt: sql`NOW()`
            })
            .where(...)
            
      expiration_filter:
        description: Filter out expired entries
        code: |
          await db.select()
            .from(contextPacks)
            .where(and(
              eq(contextPacks.packType, packType),
              gt(contextPacks.expiresAt, sql`NOW()`)
            ))
            
      aggregates:
        description: PostgreSQL FILTER syntax for conditional aggregation
        code: |
          const stats = await db.select({
            totalPacks: sql<number>`COUNT(*) FILTER (WHERE expires_at > NOW())`,
            hitCount: sql<number>`SUM(hit_count)`,
            avgHitsPerPack: sql<number>`COALESCE(AVG(hit_count), 0)`,
            expiredCount: sql<number>`COUNT(*) FILTER (WHERE expires_at <= NOW())`
          }).from(contextPacks)
    apply_to:
      - context-cache-get.ts (atomic increment, expiration filter)
      - context-cache-put.ts (upsert pattern)
      - context-cache-invalidate.ts (conditional update/delete)
      - context-cache-stats.ts (aggregate queries)

constraints_from_claude_md:
  no_barrel_files:
    rule: Never create index.ts re-exports within feature directories
    rationale: Direct imports improve tree-shaking and IDE navigation
    violation_example: src/context-cache/index.ts exporting tools
    correct_approach: Export directly from src/index.ts
    
  logger_usage:
    rule: MUST use @repo/logger, NEVER console.log
    rationale: Structured logging for production observability
    import: import { logger } from '@repo/logger'
    methods: logger.info(), logger.warn(), logger.error()
    
  zod_first_types:
    rule: Use Zod schemas for all types, never TypeScript interfaces
    rationale: Runtime validation + type inference + self-documenting constraints
    pattern: |
      const Schema = z.object({ ... })
      type Type = z.infer<typeof Schema>
    
  testing:
    framework: Vitest (NOT Jest)
    database: Real PostgreSQL (NOT mocks or in-memory)
    coverage_minimum: 80% line coverage
    test_command: pnpm test packages/backend/mcp-tools/src/context-cache

reference_files:
