lessons_to_record:
  - lesson: "AJV 8.17.1 requires the 2020 submodule (dist/2020.js) rather than the default Ajv class when validating schemas that declare $schema draft 2020-12 — using the base Ajv class throws 'no schema with key or ref' for the draft URI"
    category: blocker
    tags: ["schema", "ajv", "validation", "tooling"]

  - lesson: "patch-plan.schema.json pattern (JSON Schema draft 2020-12 with PatchStep/$defs/RepairLoop) is reusable for other ordered-step schemas requiring constraint enforcement without TypeScript code"
    category: reuse
    tags: ["schema", "orchestrator", "json-schema"]

  - lesson: "Compact single-line JSON objects in example files allow demonstrating 5+ distinct entries within a 25-line constraint — a viable pattern for constrained example files"
    category: pattern
    tags: ["schema", "examples", "documentation"]

