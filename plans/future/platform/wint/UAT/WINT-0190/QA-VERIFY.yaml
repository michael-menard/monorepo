lessons_to_record:
  - lesson: >
      AJV npx CLI may not be resolvable in pnpm monorepo environments; using the AJV package
      directly via node_modules/.pnpm/ajv@8.17.1 is a valid and equivalent approach for
      JSON Schema draft 2020-12 validation in this repo.
    category: blocker
    tags: ["ajv", "json-schema", "pnpm", "validation"]

  - lesson: >
      Pure documentation/schema stories (story_type=chore, touches_docs=true only) require schema
      validation tests rather than unit test coverage. The 45% coverage threshold is inapplicable;
      quality gate is schema enforcement correctness verified via AJV.
    category: pattern
    tags: ["qa", "schema", "documentation", "coverage"]

  - lesson: >
      JSON Schema draft 2020-12 cannot enforce array element ordering — ordering conventions must
      be documented and enforced at runtime (WINT-3010 scope). This is an expected limitation
      that should be called out explicitly in schema documentation.
    category: pattern
    tags: ["json-schema", "ordering", "design-decision"]

