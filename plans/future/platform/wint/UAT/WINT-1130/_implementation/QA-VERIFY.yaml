architecture_compliant: true
architecture_notes:
  - "Zod-first types: all types in __types__/index.ts use z.object() with z.infer<>. No TypeScript interfaces found."
  - "No console.log usage: all logging via @repo/logger with logger.warn()"
  - "Barrel file usage: index.ts at worktree-management/ level is the approved tool barrel - not a component barrel file. This follows the established WINT-0090 pattern."
  - "ESM imports: all relative imports use .js extension (e.g., './__types__/index.js')"
  - "Parameterized queries: all DB operations use Drizzle ORM which generates parameterized queries. JSONB merge uses sql template literal correctly."
  - "Resilient error handling pattern: all tools use try/catch, return null on DB errors, log warnings with [mcp-tools] prefix"
  - "any type used in worktree-mark-complete.ts for updateValues (line 65): acceptable per CLAUDE.md (noImplicitAny: false)"
  - "Directory structure follows component pattern: __types__/index.ts + __tests__/ subdirectories"

issues: []

lessons_to_record:
  - lesson: "Partial unique indexes with WHERE clause are a clean pattern for 'one active X per Y' constraints at the database level, eliminating need for application-level concurrency logic"
    category: pattern
    tags: ["database", "concurrency", "drizzle", "postgresql"]

  - lesson: "Integration tests that require a real database should be clearly structured to fail gracefully with missing env vars rather than producing cryptic errors - the 'Missing required database environment variables' error message is clear and expected"
    category: pattern
    tags: ["testing", "integration-tests", "ci"]

  - lesson: "JSONB metadata merge using sql template literal (COALESCE(col, '{}') || $1::jsonb) is the correct pattern for partial updates without overwriting existing metadata"
    category: pattern
    tags: ["database", "jsonb", "drizzle", "postgresql"]

  - lesson: "Dual ID support (UUID + human-readable format) via Zod union schema and inner join is a reusable pattern across all wint-schema MCP tools"
    category: pattern
    tags: ["mcp-tools", "zod", "drizzle"]

