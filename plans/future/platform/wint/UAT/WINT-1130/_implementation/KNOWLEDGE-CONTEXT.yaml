            .orderBy(desc(worktrees.createdAt))
            .limit(parsed.limit)
            .offset(parsed.offset)

          return results.map(wt => ({...}))
        } catch (error) {
          logger.warn(...)
          return []  // Empty array, not null
        }
      }
    notes:
      - "Default limit: 50"
      - "Max limit: 1000 (hard constraint)"
      - "Offset min: 0"
      - "Use .default() in Zod schema so fields are always present"
      - "Return empty array [] on error, not null"
      - "Order by createdAt DESC (newest first) for consistency"

  jsdoc_pattern:
    description: "Comprehensive JSDoc with usage examples"
    example: |
