# ============================================================================
# DATABASE SCHEMA PATTERNS (from unified-wint.ts)
# ============================================================================

schema_patterns:
  source: "packages/backend/database-schema/src/schema/unified-wint.ts"

  enum_pattern:
    description: "Pattern for creating PostgreSQL enums in wint schema"
    example: |
      // From unified-wint.ts lines 81-91
      export const storyStateEnum = pgEnum('story_state', [
        'draft',
        'backlog',
        'ready_to_work',
        'in_progress',
        'ready_for_qa',
        'in_qa',
        'blocked',
        'done',
        'cancelled',
      ])
    application_for_wint_1130: |
      export const worktreeStatusEnum = pgEnum('worktree_status', [
        'active',
        'merged',
        'abandoned',
      ])
    notes:
      - "Use lowercase with underscores for enum values"
      - "Enum name is singular (worktree_status not worktree_statuses)"
      - "Export from wintSchema namespace"

  table_pattern:
    description: "Pattern for creating tables in wint schema with proper FK constraints"
    example: |
      // From unified-wint.ts lines 198-257 (stories table)
      export const stories = wintSchema.table(
        'stories',
        {
          id: uuid('id').primaryKey().defaultRandom(),
          storyId: text('story_id').notNull().unique(),
          title: text('title').notNull(),
          state: storyStateEnum('state').notNull().default('backlog'),
          metadata: jsonb('metadata').$type<{...}>(),
          createdAt: timestamp('created_at', { withTimezone: true }).notNull().defaultNow(),
          updatedAt: timestamp('updated_at', { withTimezone: true }).notNull().defaultNow(),
        },
        table => ({
          storyIdIdx: uniqueIndex('stories_story_id_idx').on(table.storyId),
          stateIdx: index('stories_state_idx').on(table.state),
        }),
      )
    application_for_wint_1130: |
      export const worktrees = wintSchema.table(
        'worktrees',
        {
          id: uuid('id').primaryKey().defaultRandom(),
          storyId: uuid('story_id')
            .notNull()
            .references(() => stories.id, { onDelete: 'cascade' }),
          worktreePath: text('worktree_path').notNull(),
          branchName: text('branch_name').notNull(),
          status: worktreeStatusEnum('status').notNull().default('active'),
          createdAt: timestamp('created_at', { withTimezone: true }).notNull().defaultNow(),
          updatedAt: timestamp('updated_at', { withTimezone: true }).notNull().defaultNow(),
          mergedAt: timestamp('merged_at', { withTimezone: true }),
          abandonedAt: timestamp('abandoned_at', { withTimezone: true }),
          metadata: jsonb('metadata').$type<{...}>().default({}),
        },
        table => ({
          // Partial unique index: prevents concurrent active worktrees for same story
          uniqueActiveWorktree: uniqueIndex('unique_active_worktree')
            .on(table.storyId, table.status)
            .where(sql`${table.status} = 'active'`),
          storyIdIdx: index('idx_worktrees_story_id').on(table.storyId),
          statusIdx: index('idx_worktrees_status').on(table.status),
        }),
      )
    notes:
      - "Use wintSchema.table() not pgTable()"
      - "FK with onDelete: 'cascade' for automatic cleanup"
      - "defaultRandom() for UUID primary keys"
      - "defaultNow() for timestamp fields"
      - "Partial unique indexes use .where() clause"
      - "JSONB metadata field for schema flexibility"

  zod_export_pattern:
    description: "Pattern for exporting Zod schemas from Drizzle tables"
    example: |
      // From unified-wint.ts lines 905-908
      export const insertStorySchema = createInsertSchema(stories)
      export const selectStorySchema = createSelectSchema(stories)
      export type InsertStory = z.infer<typeof insertStorySchema>
      export type SelectStory = z.infer<typeof selectStorySchema>
    application_for_wint_1130: |
      export const insertWorktreeSchema = createInsertSchema(worktrees)
      export const selectWorktreeSchema = createSelectSchema(worktrees)
      export type InsertWorktree = z.infer<typeof insertWorktreeSchema>
      export type SelectWorktree = z.infer<typeof selectWorktreeSchema>
    notes:
      - "Always export both insert and select schemas"
      - "Always export TypeScript types via z.infer<>"
      - "Place at end of schema file after all table definitions"

  timestamp_pattern:
    description: "Pattern for lifecycle timestamp fields"
    example: |
      // From unified-wint.ts lines 239-241 (stories table)
      createdAt: timestamp('created_at', { withTimezone: true }).notNull().defaultNow(),
      updatedAt: timestamp('updated_at', { withTimezone: true }).notNull().defaultNow(),
    application_for_wint_1130: |
      createdAt: timestamp('created_at', { withTimezone: true }).notNull().defaultNow(),
      updatedAt: timestamp('updated_at', { withTimezone: true }).notNull().defaultNow(),
      mergedAt: timestamp('merged_at', { withTimezone: true }),  // Nullable
      abandonedAt: timestamp('abandoned_at', { withTimezone: true }),  // Nullable
    notes:
      - "Use withTimezone: true for all timestamps"
      - "createdAt and updatedAt are NOT NULL with defaultNow()"
      - "Lifecycle timestamps (mergedAt, abandonedAt) are nullable"
      - "Column names: snake_case (created_at not createdAt)"

  jsonb_metadata_pattern:
    description: "Pattern for JSONB metadata fields with type safety"
    example: |
      // From unified-wint.ts lines 223-232 (stories metadata)
      metadata: jsonb('metadata').$type<{
        surfaces?: { backend?: boolean; frontend?: boolean; database?: boolean; infra?: boolean }
        tags?: string[]
        experimentVariant?: 'control' | 'variant_a' | 'variant_b'
      }>(),
    application_for_wint_1130: |
      metadata: jsonb('metadata').$type<{
        sessionId?: string
        prNumber?: number
        reason?: string
        // Future fields can be added without schema migration
      }>().default({})
    notes:
      - "Use $type<> for TypeScript type safety"
      - "All fields should be optional (?) for forward compatibility"
      - "Set .default({}) for new tables to avoid null checks"
      - "Document expected keys in JSDoc comments"

  partial_unique_index_pattern:
    description: "Pattern for partial unique indexes with WHERE clause"
    example: |
      // From WINT-1130 design (not in existing schema yet)
      uniqueActiveWorktree: uniqueIndex('unique_active_worktree')
        .on(table.storyId, table.status)
        .where(sql`${table.status} = 'active'`)
    notes:
      - "Partial indexes enforce uniqueness only when WHERE condition is true"
      - "Perfect for 'one active X per Y' constraints"
      - "Requires importing sql from drizzle-orm"
      - "Use template literals with ${} for column references"

# ============================================================================
# MIGRATION PATTERNS (from 0023_wint_1090_workflow_artifacts.sql)
# ============================================================================

migration_patterns:
  source: "packages/backend/database-schema/src/migrations/app/0023_wint_1090_workflow_artifacts.sql"

  forward_migration_structure:
    description: "Structure for forward migration SQL script"
    example: |
      -- Migration: WINT-1090 Phase 0 - Add Workflow Artifact Tables
      -- Description: ...
      -- Pre-migration Checks: ...
      -- Required Privileges: ...

      -- Step 1: Create enums
      CREATE TYPE "wint"."verdict_type" AS ENUM('pass', 'fail', 'concerns', 'pending');

      -- Step 2: Create table
      CREATE TABLE "wint"."elaborations" (...);

      -- Step 3: Create indexes
      CREATE INDEX "elaborations_story_id_idx" ON "wint"."elaborations" ("story_id");
    application_for_wint_1130: |
      -- Migration: WINT-1130 - Track Worktree-to-Story Mapping
      -- Description: Adds worktrees table to wint schema for database-driven parallel work coordination
      -- Pre-migration Checks:
      -- 1. Verify wint schema exists
      -- 2. Verify stories table exists
      -- Required Privileges: CREATE on wint schema

      -- Step 1: Create worktree_status enum
      CREATE TYPE "wint"."worktree_status" AS ENUM('active', 'merged', 'abandoned');

      -- Step 2: Create worktrees table
      CREATE TABLE "wint"."worktrees" (
        "id" uuid PRIMARY KEY DEFAULT gen_random_uuid() NOT NULL,
        "story_id" uuid NOT NULL REFERENCES "wint"."stories"("id") ON DELETE CASCADE,
        "worktree_path" text NOT NULL,
        "branch_name" text NOT NULL,
        "status" "wint"."worktree_status" NOT NULL DEFAULT 'active',
        "created_at" timestamp with time zone DEFAULT now() NOT NULL,
        "updated_at" timestamp with time zone DEFAULT now() NOT NULL,
        "merged_at" timestamp with time zone,
        "abandoned_at" timestamp with time zone,
        "metadata" jsonb DEFAULT '{}'::jsonb
      );

      -- Step 3: Create partial unique index
      CREATE UNIQUE INDEX "unique_active_worktree"
        ON "wint"."worktrees" ("story_id", "status")
        WHERE "status" = 'active';

      -- Step 4: Create regular indexes
      CREATE INDEX "idx_worktrees_story_id" ON "wint"."worktrees" ("story_id");
      CREATE INDEX "idx_worktrees_status" ON "wint"."worktrees" ("status");
    notes:
      - "Always include migration header with description and pre-checks"
      - "Use double quotes around schema and table names"
      - "Use explicit 'wint' schema prefix for all objects"
      - "Document each step with SQL comments"
      - "Use DEFAULT gen_random_uuid() for UUIDs"
      - "Use DEFAULT now() for timestamps"
      - "Partial unique index syntax: WHERE \"status\" = 'active'"

  rollback_migration_structure:
    description: "Structure for rollback migration SQL script"
    example: |
      -- Rollback Migration: WINT-1090 Phase 0 - Remove Workflow Artifact Tables
      -- Description: ...
      -- WARNING: This script will DROP all data!
      -- Backup Command: pg_dump ...
      -- Required Privileges: DROP on wint schema

      -- Drop tables in reverse dependency order
      DROP TABLE IF EXISTS "wint"."token_usage" CASCADE;
      DROP TABLE IF EXISTS "wint"."elaborations" CASCADE;

      -- Drop enums
      DROP TYPE IF EXISTS "wint"."verdict_type" CASCADE;
    application_for_wint_1130: |
      -- Rollback Migration: WINT-1130 - Remove Worktree Tracking
      -- Description: Rolls back worktrees table and worktree_status enum
      -- WARNING: This script will DROP all worktree data!
      -- Backup Command:
      --   pg_dump -h <host> -U <user> -d <database> -n wint -t "wint.worktrees" > wint_worktrees_backup.sql
      -- Required Privileges: DROP on wint schema

      -- Drop indexes first (optional, CASCADE handles this)
      DROP INDEX IF EXISTS "wint"."unique_active_worktree" CASCADE;
      DROP INDEX IF EXISTS "wint"."idx_worktrees_story_id" CASCADE;
      DROP INDEX IF EXISTS "wint"."idx_worktrees_status" CASCADE;

      -- Drop table
      DROP TABLE IF EXISTS "wint"."worktrees" CASCADE;

      -- Drop enum
      DROP TYPE IF EXISTS "wint"."worktree_status" CASCADE;
    notes:
      - "Always include WARNING about data loss"
      - "Document backup command for recovery"
      - "Use DROP IF EXISTS for idempotency"
      - "Use CASCADE to handle dependencies"
      - "Drop in reverse order: indexes → tables → enums"
      - "Indexes are auto-dropped with table, but explicit drops are clearer"

