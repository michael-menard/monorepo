  - gotcha: "JSONB default value syntax"
    description: "Use empty object {}, not '{}' string"
    wrong: ".default('{}')"
    right: ".default({})"

  - gotcha: "Zod .parse() vs .safeParse()"
    description: "Use .parse() for fail-fast, .safeParse() only if you handle errors"
