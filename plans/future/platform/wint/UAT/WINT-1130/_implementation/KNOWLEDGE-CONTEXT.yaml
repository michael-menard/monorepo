test_patterns:
  source: "packages/backend/mcp-tools/src/story-management/__tests__/"

  unit_test_structure:
    description: "Unit test structure with mocked dependencies"
    example: |
      // From story-get-status.test.ts lines 1-167
      import { describe, it, expect, vi, beforeEach } from 'vitest'

      // Hoist mock functions
      const { mockLimit, mockWhere, mockFrom, mockSelect, mockWarn } = vi.hoisted(() => ({
        mockLimit: vi.fn(),
        mockWhere: vi.fn(),
        mockFrom: vi.fn(),
        mockSelect: vi.fn(),
        mockWarn: vi.fn(),
      }))

      vi.mock('@repo/db', () => ({
        db: { select: mockSelect },
        stories: { id: 'id', storyId: 'story_id', ... },
      }))

      vi.mock('@repo/logger', () => ({
        logger: { warn: mockWarn },
      }))

      describe('storyGetStatus', () => {
        beforeEach(() => {
          vi.clearAllMocks()
          mockLimit.mockResolvedValue([])
          mockWhere.mockReturnValue({ limit: mockLimit })
          mockFrom.mockReturnValue({ where: mockWhere })
          mockSelect.mockReturnValue({ from: mockFrom })
        })

        it('should retrieve story by UUID (AC-1)', async () => {
          const mockStory = { id: '...', storyId: 'WINT-0090', ... }
          mockLimit.mockResolvedValue([mockStory])

          const result = await storyGetStatus({ storyId: '...' })

          expect(result).toEqual({ id: '...', storyId: 'WINT-0090', ... })
          expect(mockWarn).not.toHaveBeenCalled()
        })
      })
    application_for_wint_1130: |
      describe('worktreeRegister', () => {
        beforeEach(() => {
          vi.clearAllMocks()
          mockReturning.mockResolvedValue([])
          mockValues.mockReturnValue({ returning: mockReturning })
          mockInsert.mockReturnValue({ values: mockValues })
        })

        it('should register new worktree (AC-5)', async () => {
          const mockWorktree = {
            id: randomUUID(),
            storyId: 'WINT-1130',
            worktreePath: '/tmp/wt',
            branchName: 'feature/test',
            status: 'active',
            createdAt: new Date(),
            updatedAt: new Date(),
          }
          mockReturning.mockResolvedValue([mockWorktree])

          const result = await worktreeRegister({
            storyId: 'WINT-1130',
            worktreePath: '/tmp/wt',
            branchName: 'feature/test',
          })

          expect(result).toEqual(mockWorktree)
          expect(mockWarn).not.toHaveBeenCalled()
        })
      })
    notes:
      - "Use vi.hoisted() for mock function references"
      - "Mock @repo/db and @repo/logger"
      - "Clear mocks in beforeEach()"
      - "Set up default mock return values"
      - "Test each AC separately"
      - "Assert both return value and side effects (e.g., mockWarn not called)"

  integration_test_structure:
    description: "Integration test structure with real database"
    example: |
      // From integration.test.ts lines 1-176
      import { describe, it, expect, beforeAll, afterAll } from 'vitest'
      import { randomUUID } from 'crypto'
      import { db } from '@repo/db'
      import { stories } from '@repo/database-schema'
      import { eq } from 'drizzle-orm'

      describe('Story Management Integration Tests', () => {
        let testStoryId: string
        let testStoryUuid: string

        beforeAll(async () => {
          testStoryId = 'TEST-9999'
          testStoryUuid = randomUUID()

          await db.insert(stories).values({
            id: testStoryUuid,
            storyId: testStoryId,
            title: 'Integration Test Story',
            state: 'backlog',
            // ... other fields
          })
        })

        afterAll(async () => {
          await db.delete(stories).where(eq(stories.id, testStoryUuid))
        })

        it('should complete full lifecycle: get → update → verify', async () => {
          const initialStatus = await storyGetStatus({ storyId: testStoryId })
          expect(initialStatus?.state).toBe('backlog')

          const updated = await storyUpdateStatus({
            storyId: testStoryId,
            newState: 'ready_to_work',
          })
          expect(updated?.state).toBe('ready_to_work')
        })
      })
    application_for_wint_1130: |
      describe('Worktree Management Integration Tests', () => {
        let testStoryId: string
        let testStoryUuid: string

        beforeAll(async () => {
          testStoryId = 'TEST-9999'
          testStoryUuid = randomUUID()

          await db.insert(stories).values({
            id: testStoryUuid,
            storyId: testStoryId,
            title: 'Integration Test Story for Worktrees',
            state: 'in_progress',
          })
        })

        afterAll(async () => {
          // Cascade deletes worktrees automatically
          await db.delete(stories).where(eq(stories.id, testStoryUuid))
        })

        it('should complete lifecycle: register → query → mark complete', async () => {
          // Register worktree
          const registered = await worktreeRegister({
            storyId: testStoryId,
            worktreePath: '/tmp/test-wt',
            branchName: 'test-branch',
          })
          expect(registered?.status).toBe('active')

          // Query by story
          const found = await worktreeGetByStory({ storyId: testStoryId })
          expect(found?.id).toBe(registered?.id)

          // Mark as merged
          await worktreeMarkComplete({
            worktreeId: registered!.id,
            status: 'merged',
          })

          // Verify status changed
          const updated = await db.query.worktrees.findFirst({
            where: eq(worktrees.id, registered!.id),
          })
          expect(updated?.status).toBe('merged')
        })
      })
    notes:
      - "Use real database connection (not mocks)"
      - "Create fixtures in beforeAll()"
      - "Clean up in afterAll() - use CASCADE FKs"
      - "Test full lifecycle scenarios"
      - "Verify database state with direct queries"
      - "Use unique test IDs (TEST-9999) to avoid conflicts"

  concurrent_registration_test:
    description: "Test pattern for concurrent operations and unique constraints"
    application_for_wint_1130: |
      it('should prevent concurrent registration of active worktrees (AC-12)', async () => {
        // Register first worktree
        const wt1 = await worktreeRegister({
          storyId: testStoryId,
          worktreePath: '/tmp/wt-1',
          branchName: 'branch-1',
        })
        expect(wt1).not.toBeNull()
        expect(wt1?.status).toBe('active')

        // Attempt to register second active worktree for same story
        const wt2 = await worktreeRegister({
          storyId: testStoryId,
          worktreePath: '/tmp/wt-2',
          branchName: 'branch-2',
        })

        // Second registration should fail (return null)
        expect(wt2).toBeNull()

        // Verify only one active worktree exists
        const active = await worktreeListActive({ limit: 100 })
        const storyWorktrees = active.filter(w => w.storyId === testStoryUuid)
        expect(storyWorktrees.length).toBe(1)
      })
    notes:
      - "Simulate race condition by sequential registration"
      - "Partial unique index enforces constraint at DB level"
      - "Verify second operation returns null (resilient error handling)"
      - "Query database to confirm only one record exists"

