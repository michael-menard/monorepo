mcp_tool_patterns:
  source: "packages/backend/mcp-tools/src/story-management/"

  zod_validation_pattern:
    description: "Fail-fast Zod validation at function entry"
    example: |
      // From story-get-status.ts lines 42-44
      export async function storyGetStatus(input: StoryGetStatusInput): Promise<StoryGetStatusOutput> {
        // Validate input - fail fast if invalid (AC-6)
        const parsed = StoryGetStatusInputSchema.parse(input)
    application_for_wint_1130: |
      export async function worktreeRegister(
        input: WorktreeRegisterInput
      ): Promise<WorktreeRegisterOutput> {
        // Validate input - fail fast if invalid
        const parsed = WorktreeRegisterInputSchema.parse(input)

        // ... rest of function uses parsed.storyId, parsed.worktreePath, etc.
      }
    notes:
      - "Parse input immediately at function entry"
      - "Use .parse() not .safeParse() - let Zod throw validation errors"
      - "Fail fast principle: validation errors are developer errors"
      - "Use parsed values throughout function (not raw input)"

  error_handling_pattern:
    description: "Resilient error handling - log warnings, return null, never throw DB errors"
    example: |
      // From story-get-status.ts lines 46-77
      try {
        const [story] = await db
          .select()
          .from(stories)
          .where(or(eq(stories.id, parsed.storyId), eq(stories.storyId, parsed.storyId)))
          .limit(1)

        if (!story) {
          return null
        }

        return {
          id: story.id,
          storyId: story.storyId,
          // ... other fields
        }
      } catch (error) {
        // Resilient error handling: log warning, return null
        logger.warn(
          `[mcp-tools] Failed to get status for story '${parsed.storyId}':`,
          error instanceof Error ? error.message : String(error),
        )
        return null
      }
    application_for_wint_1130: |
      try {
        const [worktree] = await db
          .insert(worktrees)
          .values({
            storyId: parsed.storyId,
            worktreePath: parsed.worktreePath,
            branchName: parsed.branchName,
            status: 'active',
          })
          .returning()

        return worktree
      } catch (error) {
        // FK constraint violation or unique constraint violation
        logger.warn(
          `[mcp-tools] Failed to register worktree for story '${parsed.storyId}':`,
          error instanceof Error ? error.message : String(error),
        )
        return null
      }
    notes:
      - "Wrap all DB operations in try/catch"
      - "Return null on error (not throw)"
      - "Log warnings with [mcp-tools] prefix"
      - "Include context in log message (storyId, etc.)"
      - "Use 'error instanceof Error' check for type safety"
      - "Not found is not an error - return null without logging"

  pagination_pattern:
    description: "Pagination with limit/offset validation and sensible defaults"
    example: |
      // From story-get-by-status.ts lines 45-72
      export async function storyGetByStatus(
        input: StoryGetByStatusInput,
      ): Promise<StoryGetByStatusOutput> {
        const parsed = StoryGetByStatusInputSchema.parse(input)

        try {
          const results = await db
            .select()
            .from(stories)
            .where(eq(stories.state, parsed.state))
            .orderBy(desc(stories.createdAt))
            .limit(parsed.limit)
            .offset(parsed.offset)

          return results.map(story => ({...}))
        } catch (error) {
          logger.warn(...)
          return []  // Empty array on error, not null
        }
      }

      // From __types__/index.ts lines 117-130
      export const StoryGetByStatusInputSchema = z.object({
        state: z.enum([...]),
        limit: z.number().int().min(1).max(1000, 'limit cannot exceed 1000').default(50),
        offset: z.number().int().min(0).default(0),
      })
    application_for_wint_1130: |
      export const WorktreeListActiveInputSchema = z.object({
        limit: z.number().int().min(1).max(1000, 'limit cannot exceed 1000').default(50),
        offset: z.number().int().min(0).default(0),
      })

      export async function worktreeListActive(
        input: WorktreeListActiveInput
      ): Promise<WorktreeListActiveOutput> {
        const parsed = WorktreeListActiveInputSchema.parse(input)

        try {
          const results = await db
            .select()
            .from(worktrees)
