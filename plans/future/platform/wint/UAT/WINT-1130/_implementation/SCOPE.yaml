      fields:
        - name: "id"
          type: "UUID"
          constraints: "PRIMARY KEY, DEFAULT gen_random_uuid()"
        - name: "storyId"
          type: "UUID"
          constraints: "FK to stories(id) ON DELETE CASCADE, NOT NULL"
        - name: "worktreePath"
          type: "TEXT"
          constraints: "NOT NULL"
        - name: "branchName"
          type: "TEXT"
          constraints: "NOT NULL"
        - name: "status"
          type: "worktree_status (enum)"
          constraints: "NOT NULL, DEFAULT 'active'"
        - name: "createdAt"
          type: "TIMESTAMP"
          constraints: "NOT NULL, DEFAULT NOW()"
        - name: "updatedAt"
          type: "TIMESTAMP"
          constraints: "NOT NULL, DEFAULT NOW()"
        - name: "mergedAt"
          type: "TIMESTAMP"
          constraints: "NULLABLE"
        - name: "abandonedAt"
          type: "TIMESTAMP"
          constraints: "NULLABLE"
        - name: "metadata"
          type: "JSONB"
          constraints: "DEFAULT '{}'"
      indexes:
        - name: "unique_active_worktree"
          type: "UNIQUE PARTIAL"
          on: "(storyId, status)"
          where: "status = 'active'"
        - name: "idx_worktrees_story_id"
          type: "REGULAR"
          on: "storyId"
        - name: "idx_worktrees_status"
          type: "REGULAR"
          on: "status"
      key_design_decisions:
        - "FK with CASCADE: if story deleted, worktrees auto-delete (orphaned worktrees have no value)"
        - "Partial unique index: prevents concurrent registration of multiple active worktrees for same story"
        - "JSONB metadata: flexible schema evolution for future fields (pr_number, session_id, reason, etc.)"
        - "Timestamp fields: separate mergedAt/abandonedAt for lifecycle tracking"
        - "Default status: new records default to 'active'"

  tables_modified: []

  enums_created:
