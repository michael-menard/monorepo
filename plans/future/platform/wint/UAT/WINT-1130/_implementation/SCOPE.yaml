        - "CREATE TABLE wint.worktrees (...)"
        - "CREATE UNIQUE INDEX unique_active_worktree"
        - "CREATE INDEX idx_worktrees_story_id"
        - "CREATE INDEX idx_worktrees_status"
    rollback:
