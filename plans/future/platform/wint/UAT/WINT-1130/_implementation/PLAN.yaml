  tasks:
    - task_id: "P4-T1"
      name: "Implement worktree_register tool"
      description: "Create worktree registration tool with FK constraint handling and concurrent registration prevention"
      file: "packages/backend/mcp-tools/src/worktree-management/worktree-register.ts"
      action: "CREATE"
      implementation: |
        /**
         * Worktree Register MCP Tool
         * WINT-1130 AC-5: Creates new worktree record in database
         *
         * Features:
         * - Zod validation at entry (fail fast)
         * - FK constraint enforcement (storyId must exist)
         * - Concurrent registration prevention (partial unique index)
         * - Resilient error handling (logs warnings, returns null on error)
         * - Auto-generated UUID for worktree ID
         */

        import { logger } from '@repo/logger'
        import { db } from '@repo/db'
        import { worktrees } from '@repo/database-schema'
        import {
          WorktreeRegisterInputSchema,
          type WorktreeRegisterInput,
          type WorktreeRegisterOutput,
        } from './__types__/index.js'

        /**
         * Register a new worktree in the database
         *
         * @param input - Worktree registration parameters (storyId, worktreePath, branchName)
         * @returns Created worktree record or null if registration failed
         *
         * @example Register worktree for story
         * ```typescript
         * const worktree = await worktreeRegister({
         *   storyId: 'WINT-1130',
         *   worktreePath: '/Users/dev/monorepo-wt-WINT-1130',
         *   branchName: 'feature/WINT-1130',
         * })
         * ```
         *
         * @example Handle FK constraint violation (story doesn't exist)
         * ```typescript
         * const worktree = await worktreeRegister({
         *   storyId: 'NONEXIST-0001',
         *   worktreePath: '/tmp/wt',
         *   branchName: 'test',
         * })
         * // Returns null, logs warning about FK constraint
         * ```
         *
         * @example Handle concurrent registration (unique constraint violation)
         * ```typescript
         * // First registration succeeds
         * const wt1 = await worktreeRegister({
         *   storyId: 'WINT-1130',
         *   worktreePath: '/tmp/wt-1',
         *   branchName: 'branch-1',
         * })
         *
         * // Second registration for same story fails (partial unique index enforced)
         * const wt2 = await worktreeRegister({
         *   storyId: 'WINT-1130',
         *   worktreePath: '/tmp/wt-2',
         *   branchName: 'branch-2',
         * })
         * // wt2 is null, logs warning about concurrent registration
         * ```
         */
        export async function worktreeRegister(
          input: WorktreeRegisterInput,
        ): Promise<WorktreeRegisterOutput> {
          // Validate input - fail fast if invalid
          const parsed = WorktreeRegisterInputSchema.parse(input)

          try {
            const [worktree] = await db
              .insert(worktrees)
              .values({
                storyId: parsed.storyId,
                worktreePath: parsed.worktreePath,
                branchName: parsed.branchName,
                status: 'active',
              })
              .returning()

            return {
              id: worktree.id,
              storyId: worktree.storyId,
              worktreePath: worktree.worktreePath,
              branchName: worktree.branchName,
              status: 'active',
              createdAt: worktree.createdAt,
              updatedAt: worktree.updatedAt,
            }
          } catch (error) {
            // FK constraint violation or unique constraint violation
            logger.warn(
              `[mcp-tools] Failed to register worktree for story '${parsed.storyId}':`,
              error instanceof Error ? error.message : String(error),
            )
            return null
          }
        }
      verification:
        - "Imports from ./__types__/index.js with .js extension"
        - "Uses WorktreeRegisterInputSchema.parse() at entry"
        - "Try/catch wraps DB operation"
        - "Returns null on error with logger.warn"
        - "JSDoc has @param, @returns, multiple @example blocks"
      acceptance_criteria: "AC-5, AC-9"

    - task_id: "P4-T2"
      name: "Implement worktree_get_by_story tool"
      description: "Create query tool to retrieve active worktree for a story"
      file: "packages/backend/mcp-tools/src/worktree-management/worktree-get-by-story.ts"
      action: "CREATE"
      implementation: |
        /**
         * Worktree Get By Story MCP Tool
         * WINT-1130 AC-6: Retrieves active worktree for a story (or null)
         *
         * Features:
         * - Dual ID support: UUID or human-readable storyId
         * - Returns active worktree only (status='active')
         * - Returns null if no active worktree found (not an error)
         * - Zod validation at entry
         * - Resilient error handling
         */

        import { eq, and, or } from 'drizzle-orm'
        import { logger } from '@repo/logger'
        import { db } from '@repo/db'
        import { worktrees, stories } from '@repo/database-schema'
        import {
          WorktreeGetByStoryInputSchema,
          type WorktreeGetByStoryInput,
          type WorktreeGetByStoryOutput,
        } from './__types__/index.js'

        /**
         * Get active worktree for a story by UUID or human-readable ID
         *
         * @param input - Story ID (UUID or WINT-1130 format)
         * @returns Active worktree record or null if not found
         *
         * @example Query by UUID
         * ```typescript
         * const worktree = await worktreeGetByStory({
         *   storyId: '123e4567-e89b-12d3-a456-426614174000',
         * })
         * ```
         *
         * @example Query by human-readable ID
         * ```typescript
         * const worktree = await worktreeGetByStory({
         *   storyId: 'WINT-1130',
         * })
         * ```
         *
         * @example Handle no active worktree
         * ```typescript
         * const worktree = await worktreeGetByStory({
         *   storyId: 'WINT-1130',
         * })
         * // Returns null if no active worktree (not an error)
         * ```
         */
        export async function worktreeGetByStory(
          input: WorktreeGetByStoryInput,
        ): Promise<WorktreeGetByStoryOutput> {
          // Validate input - fail fast if invalid
          const parsed = WorktreeGetByStoryInputSchema.parse(input)

          try {
            // Join with stories table to support both UUID and human-readable ID lookup
            const [worktree] = await db
              .select({
                id: worktrees.id,
                storyId: stories.storyId,
                worktreePath: worktrees.worktreePath,
                branchName: worktrees.branchName,
                status: worktrees.status,
                createdAt: worktrees.createdAt,
                updatedAt: worktrees.updatedAt,
                mergedAt: worktrees.mergedAt,
                abandonedAt: worktrees.abandonedAt,
                metadata: worktrees.metadata,
              })
              .from(worktrees)
              .innerJoin(stories, eq(worktrees.storyId, stories.id))
              .where(
                and(
                  or(eq(stories.id, parsed.storyId), eq(stories.storyId, parsed.storyId)),
                  eq(worktrees.status, 'active'),
                ),
              )
              .limit(1)

            if (!worktree) {
              return null
            }

            return worktree
          } catch (error) {
            // Database errors: log warning, return null
            logger.warn(
              `[mcp-tools] Failed to get worktree for story '${parsed.storyId}':`,
              error instanceof Error ? error.message : String(error),
            )
            return null
          }
        }
      verification:
        - "Joins with stories table for dual ID support"
        - "Filters by status='active'"
        - "Returns null if not found (no warning logged)"
        - "Returns null on DB error (warning logged)"
      acceptance_criteria: "AC-6, AC-9"

    - task_id: "P4-T3"
      name: "Implement worktree_list_active tool"
      description: "Create list tool with pagination support"
      file: "packages/backend/mcp-tools/src/worktree-management/worktree-list-active.ts"
      action: "CREATE"
      implementation: |
        /**
         * Worktree List Active MCP Tool
         * WINT-1130 AC-7: Lists all active worktrees with pagination
         *
         * Features:
         * - Pagination with limit (default 50, max 1000) and offset
         * - Filters by status='active'
         * - Results ordered by createdAt DESC (newest first)
         * - Zod validation at entry
         * - Resilient error handling (returns empty array on error)
         */

        import { eq, desc } from 'drizzle-orm'
        import { logger } from '@repo/logger'
        import { db } from '@repo/db'
        import { worktrees, stories } from '@repo/database-schema'
        import {
          WorktreeListActiveInputSchema,
          type WorktreeListActiveInput,
          type WorktreeListActiveOutput,
        } from './__types__/index.js'

        /**
         * Query all active worktrees with pagination
         *
         * @param input - Pagination parameters (limit, offset)
         * @returns Array of active worktree records
         *
         * @example Get all active worktrees (default pagination)
         * ```typescript
         * const worktrees = await worktreeListActive({})
         * // Returns up to 50 active worktrees
         * ```
         *
         * @example Get active worktrees with custom pagination
         * ```typescript
         * const worktrees = await worktreeListActive({
         *   limit: 100,
         *   offset: 50,
         * })
         * ```
         *
         * @example Handle empty result set
         * ```typescript
         * const worktrees = await worktreeListActive({
         *   offset: 999999,
         * })
         * // Returns empty array [] (not null)
         * ```
         */
        export async function worktreeListActive(
          input: WorktreeListActiveInput,
        ): Promise<WorktreeListActiveOutput> {
          // Validate input - fail fast if invalid
          const parsed = WorktreeListActiveInputSchema.parse(input)

          try {
            // Join with stories to get human-readable storyId
            const results = await db
              .select({
                id: worktrees.id,
                storyId: stories.storyId,
                worktreePath: worktrees.worktreePath,
                branchName: worktrees.branchName,
                status: worktrees.status,
                createdAt: worktrees.createdAt,
                updatedAt: worktrees.updatedAt,
                mergedAt: worktrees.mergedAt,
                abandonedAt: worktrees.abandonedAt,
                metadata: worktrees.metadata,
              })
              .from(worktrees)
              .innerJoin(stories, eq(worktrees.storyId, stories.id))
              .where(eq(worktrees.status, 'active'))
              .orderBy(desc(worktrees.createdAt))
              .limit(parsed.limit)
              .offset(parsed.offset)

            return results
          } catch (error) {
            // Database errors: log warning, return empty array (not null)
            logger.warn(
              '[mcp-tools] Failed to list active worktrees:',
              error instanceof Error ? error.message : String(error),
            )
            return []
          }
        }
      verification:
        - "Uses parsed.limit and parsed.offset from schema defaults"
        - "Orders by desc(worktrees.createdAt)"
        - "Returns empty array [] on error, not null"
        - "Joins with stories table to get human-readable storyId"
      acceptance_criteria: "AC-7, AC-9"

    - task_id: "P4-T4"
      name: "Implement worktree_mark_complete tool"
      description: "Create status update tool for marking worktrees as merged/abandoned"
      file: "packages/backend/mcp-tools/src/worktree-management/worktree-mark-complete.ts"
      action: "CREATE"
      implementation: |
        /**
         * Worktree Mark Complete MCP Tool
         * WINT-1130 AC-8: Updates worktree status (merged/abandoned) and timestamps
         *
         * Features:
         * - Updates status to 'merged' or 'abandoned'
         * - Sets corresponding timestamp (mergedAt or abandonedAt)
         * - Merges metadata with existing metadata object
         * - Zod validation at entry
         * - Resilient error handling (returns null if worktree not found)
         */

        import { eq, sql } from 'drizzle-orm'
        import { logger } from '@repo/logger'
        import { db } from '@repo/db'
        import { worktrees } from '@repo/database-schema'
        import {
          WorktreeMarkCompleteInputSchema,
          type WorktreeMarkCompleteInput,
          type WorktreeMarkCompleteOutput,
        } from './__types__/index.js'

        /**
         * Mark worktree as complete (merged or abandoned)
         *
         * @param input - Worktree ID, status (merged/abandoned), optional metadata
         * @returns Success indicator or null if update failed
         *
         * @example Mark worktree as merged
         * ```typescript
         * const result = await worktreeMarkComplete({
         *   worktreeId: '123e4567-e89b-12d3-a456-426614174000',
         *   status: 'merged',
         *   metadata: { prNumber: 123, reason: 'Merged to main' },
         * })
         * ```
         *
         * @example Mark worktree as abandoned
         * ```typescript
         * const result = await worktreeMarkComplete({
         *   worktreeId: '123e4567-e89b-12d3-a456-426614174000',
         *   status: 'abandoned',
         *   metadata: { reason: 'Story cancelled' },
         * })
         * ```
         *
         * @example Handle non-existent worktree
         * ```typescript
         * const result = await worktreeMarkComplete({
         *   worktreeId: '00000000-0000-0000-0000-000000000000',
         *   status: 'merged',
         * })
         * // Returns null (worktree not found)
         * ```
         */
        export async function worktreeMarkComplete(
          input: WorktreeMarkCompleteInput,
        ): Promise<WorktreeMarkCompleteOutput> {
          // Validate input - fail fast if invalid
          const parsed = WorktreeMarkCompleteInputSchema.parse(input)

          try {
            // Build update values dynamically based on status
            const now = new Date()
            const updateValues: any = {
              status: parsed.status,
              updatedAt: now,
            }

            // Set corresponding timestamp
            if (parsed.status === 'merged') {
              updateValues.mergedAt = now
            } else if (parsed.status === 'abandoned') {
              updateValues.abandonedAt = now
            }

            // Merge metadata if provided
            if (parsed.metadata) {
              updateValues.metadata = sql`
                COALESCE(${worktrees.metadata}, '{}'::jsonb) || ${JSON.stringify(parsed.metadata)}::jsonb
              `
            }

            const result = await db
              .update(worktrees)
              .set(updateValues)
              .where(eq(worktrees.id, parsed.worktreeId))
              .returning()

            if (result.length === 0) {
              // Worktree not found - return null (not an error)
              return null
            }

            return { success: true }
          } catch (error) {
            // Database errors: log warning, return null
            logger.warn(
              `[mcp-tools] Failed to mark worktree '${parsed.worktreeId}' as ${parsed.status}:`,
              error instanceof Error ? error.message : String(error),
            )
            return null
          }
        }
      verification:
        - "Sets mergedAt if status='merged'"
        - "Sets abandonedAt if status='abandoned'"
        - "Merges metadata using JSONB || operator"
        - "Returns null if result.length === 0 (not found)"
        - "Returns { success: true } on success"
      acceptance_criteria: "AC-8, AC-9"

