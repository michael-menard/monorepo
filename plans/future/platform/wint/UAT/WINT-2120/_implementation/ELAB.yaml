  - id: internal_consistency
    status: WARN
    note: >
      Goals, Non-goals, and ACs are internally consistent. ACs map cleanly to subtasks.
      Test plan matches ACs. However two minor inconsistencies exist:
      (1) The story's context section and Example output use pack names like "project_conventions"
      and "architecture_patterns" that do NOT exist in the actual packTypeValues enum or the
