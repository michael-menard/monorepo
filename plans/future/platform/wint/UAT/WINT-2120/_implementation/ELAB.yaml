gaps:
  - id: GAP-1
    severity: low
    title: "Pack type terminology mismatch between story narrative and actual enum values"
    description: >
      The story context, examples, and happy-path test cases (HP-2, HP-3) reference
      pack names like "project_conventions" and "architecture_patterns" as if they are
      packType values. In reality, the wint.contextPackTypeEnum and packTypeValues array
      use "architecture", "lessons_learned", "codebase", etc. The WINT-2110 AC-1 mapping
      shows that project conventions use packType="architecture", packKey="project-conventions".
      The benchmark must iterate over actual packTypeValues ("codebase", "story", "feature",
      "epic", "architecture", "lessons_learned", "test_patterns", "agent_missions") — not
      fictional pack type names. This affects the per-agent attribution logic in ST-4 since
      multiple agents share the same packType (e.g., "architecture") with different packKeys.
    ac_affected: ["AC-2", "AC-3", "AC-4"]
    resolution: >
      During ST-2 implementation, use packTypeValues from __types__/index.ts exactly as-is.
      The per-agent attribution in AC-4 should use the WINT-2110 AC-1 mapping table to
      associate (packType, packKey) pairs to specific agent workflows.
    decision: "log_to_kb"
    decision_rationale: >
      Low severity narrative inconsistency. Implementer will naturally discover and reconcile
      when reading __types__/index.ts. No new ACs required — existing ACs already cover the work.
      Logged to KB as artifact ELAB-GAP-1.

  - id: GAP-2
    severity: low
    title: "BENCHMARK-RESULTS.yaml output path will not match hardcoded backlog path"
    description: >
      The story body specifies the output artifact path as
      "plans/future/platform/wint/backlog/WINT-2120/_implementation/BENCHMARK-RESULTS.yaml"
      but the story file is in elaboration/WINT-2120/, not backlog/WINT-2120/. When the
      story moves through the workflow to in-progress, its directory will reflect the
      current stage — likely not backlog. The benchmark needs to compute the output path
      dynamically (relative to __dirname or the story's actual location) or use a
      configurable path.
    ac_affected: ["AC-5"]
    resolution: >
      During ST-5 implementation, derive the output path relative to the benchmark script's
      location or accept it as a configurable parameter. Do not hardcode "backlog".
    decision: "log_to_kb"
    decision_rationale: >
      Low severity path issue. Implementer will encounter this naturally at runtime and
      resolve dynamically. No new AC needed — AC-5 already covers writing the output
      artifact; the path computation is an implementation detail.

opportunities:
  - id: OPP-1
    title: "Use tokenCount column instead of char_count / 4 proxy when available"
    description: >
      The wint.context_packs schema includes a tokenCount column (integer, nullable) that
      directly stores estimated token counts when populated. The story proposes "content_char_count / 4"
      as the proxy. A simple improvement: check tokenCount first (if non-null, use it directly);
      fall back to content serialization + char_count / 4 only if tokenCount is null. This makes
      the benchmark more accurate when packs have been stored with token estimates.
    effort: trivial
    blocking: false
    decision: "log_to_kb"
    decision_rationale: >
      Non-blocking trivial enhancement. Implementer should prefer tokenCount when non-null in
      ST-2/ST-3. Logged to KB as implementation guidance.

  - id: OPP-2
    title: "Export calculateTokenReduction as a named export for potential reuse in WINT-3010"
    description: >
      The calculateTokenReduction pure function will be useful when Phase 3 telemetry
      (WINT-3010/0120) becomes available and actual token counts can be measured. Exporting
      it from a shared location (or at minimum flagging it with a TODO comment) would ease
      future reuse. Currently the story calls for it inline in the test file.
    effort: trivial
    blocking: false
    decision: "log_to_kb"
    decision_rationale: >
      Non-blocking trivial enhancement. Add a TODO comment in the benchmark file marking
      calculateTokenReduction for potential extraction to a shared utility in Phase 3.
      Logged to KB as implementation guidance.

  - id: OPP-3
    title: "Consider co-locating benchmark with orchestrator __tests__/integration, not adapters subdirectory"
    description: >
      The story places the new file at
      "packages/backend/orchestrator/src/__tests__/integration/token-reduction-benchmark.integration.test.ts".
      However the existing performance benchmark referenced as a canonical example lives at
      "packages/backend/orchestrator/src/adapters/__tests__/integration/performance-benchmarks.integration.test.ts"
      (a different integration test directory under adapters/). The story's placement is valid —
      the new benchmark is not adapter-specific — but the implementer should verify this is
      intentional and that the vitest config covers that __tests__/integration path.
    effort: trivial
    blocking: false
    decision: "log_to_kb"
    decision_rationale: >
      Non-blocking placement note. Story's choice to use src/__tests__/integration/ is intentional
      (benchmark is not adapter-specific). Implementer must verify vitest config covers this path
      before writing the file. Logged to KB as implementation guidance.

