architectural_decisions:
  - id: ARCH-001
    question: Should tokenCount column (when non-null) take precedence over char_count / 4 proxy?
    decision: >-
      Yes — use tokenCount from wint.context_packs when non-null; fall back to content serialization length / 4 only
      when tokenCount is null
    rationale: >-
      OPP-1 from ELAB.yaml: tokenCount is more accurate when populated. Fallback maintains compatibility with packs
      written before tokenCount was populated.
    decided_by: auto
    tier: 1
  - id: ARCH-002
    question: How should the benchmark derive the output path for BENCHMARK-RESULTS.yaml?
    decision: >-
      Derive path dynamically using __dirname relative to the benchmark test file location (resolving up 4 directories
      from src/__tests__/integration/ to the monorepo root, then constructing the story _implementation/ path)
    rationale: >-
      GAP-2 from ELAB.yaml: hardcoding 'backlog' would fail since story moves stages. Dynamic derivation based on
      __dirname makes the path stage-independent.
    decided_by: auto
    tier: 1
  - id: ARCH-003
    question: Which packType values to iterate — use actual enum values or story narrative names?
    decision: >-
      Use actual packTypeValues array from packages/backend/mcp-tools/src/context-cache/__types__/index.ts: ['codebase',
      'story', 'feature', 'epic', 'architecture', 'lessons_learned', 'test_patterns', 'agent_missions']
    rationale: >-
      GAP-1 from ELAB.yaml: story narrative uses fictional names like 'project_conventions'; actual enum values must be
      used for DB queries. Per-agent attribution uses WINT-2110 AC-1 mapping table associating (packType, packKey) pairs
      to workflows.
    decided_by: auto
    tier: 1
complexity: simple
