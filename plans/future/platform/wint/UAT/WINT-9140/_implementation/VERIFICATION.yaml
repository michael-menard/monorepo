  - lesson: >-
      The parity harness pattern (runParity + vi.fn() injected runners + fake timers) is highly reusable. The
      wint9110-workflows.parity.test.ts canonical pattern of 3 tests per workflow (matching, divergent, error) provides
      complete coverage of the parity verdict space with minimal boilerplate.
    category: reuse
    tags:
      - parity
      - testing
      - langgraph
      - wint
  - lesson: >-
      HiTL gate ACs (AC-6, AC-7, AC-8) are correctly expected to be pending_hitl at QA verification stage. QA
      verification should not fail on pending_hitl ACs — they represent intentional human checkpoints that are
      post-sign-off orchestrator actions.
    category: pattern
    tags:
      - hitl
      - qa
      - acceptance-criteria
