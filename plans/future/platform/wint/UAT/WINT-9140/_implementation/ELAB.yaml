    title: "Sign-off document could include a machine-readable deviation register table"
    category: observability
    description: >
      The story notes that "machine-readable portions (deviation register, workflow
      matrix) should use consistent table structure for downstream parsing if needed."
      Adding a lightweight structured table format (consistent column order, no merged
      cells, ID column first) to the deviation register section would make it parseable
      by future automation without requiring a separate YAML artifact. Low effort, high
      long-term value for Phase 10 planning.
    effort: low
    decision: log_to_kb
    kb_entry_id: "3a69a151-2a13-4e2a-8d6d-afedbea65e6b"

  - id: OPP-2
    title: "Coverage gate for parity suite should be verified before sign-off"
    category: quality
    description: >
      parity/README.md specifies ">= 80% branch coverage within src/__tests__/parity/"
      as a cutover sign-off criterion. The story's test plan and ACs do not explicitly
      reference this coverage gate. Running parity coverage as part of ST-2 and
      documenting the result in the sign-off workflow matrix would make the sign-off
      document fully self-contained against the README cutover criteria.
    effort: low
    decision: log_to_kb
    kb_entry_id: "6a37ddac-363c-4548-b2b6-06415690b7be"

  - id: OPP-3
    title: "KB MCP tool availability should be verified in ST-1, not assumed"
    category: risk-mitigation
    description: >
      AC-7 requires a KB entry written via mcp__knowledge-base__kb_add. During this
      analysis, the KB MCP tool was unavailable (INTERNAL_ERROR). If unavailability
      persists at sign-off time, AC-7 would be uncompletable without a fallback. ST-1
      dependency readiness check should include a KB health probe (kb_health or
      kb_list with limit 1). If KB is unavailable, record the finding and establish
      a fallback plan (e.g., defer KB write to WINT index update step; log the entry
      in the sign-off document for manual entry when KB is restored).
    effort: low
    decision: log_to_kb
    kb_entry_id: "2836f7fc-99d0-4190-87a5-5f530357a259"

  - id: OPP-4
    title: "docs/workflow/langgraph-migration.md path referenced with typo in story HP-8"
    category: accuracy
    description: >
      HP-8 setup field references "docs/workflow/langraph-migration.md" (missing 'g'
      in 'langgraph'). The actual file exists at
      docs/workflow/langgraph-migration.md (verified on disk). This does not affect
      execution but may cause confusion during MC-2 manual review. The body of the
      story correctly refers to the path in the non-goals and AC-9. Only HP-8 setup
      field has the typo.
    effort: trivial
    decision: log_to_kb
    kb_entry_id: "0e9d97bb-a0bf-41b4-ace1-8d8a0bf5b4ae"

