# ============================================================================
# Gap Analysis (MVP-blocking only)
# ============================================================================

gaps:
  - id: GAP-1
    title: "wint9110-workflows.parity.test.ts contains 18 it.todo() stubs — parity cannot execute until replaced"
    severity: blocking
    description: >
      src/__tests__/parity/wint9110-workflows.parity.test.ts has 18 it.todo() stub
      tests covering all 6 WINT-9110 workflow graphs (bootstrap, elab-epic, elab-story,
      dev-implement, qa-verify, backlog-review). The README states these stubs are
      "gated until WINT-9110 is in ready-for-qa state." WINT-9110 is now ready-for-qa,
      so the gate condition is met. However, AC-1 requires "Execute all parity test
      scenarios defined by WINT-9120 against both execution paths." The it.todo() stubs
      are not executable tests. Before ST-2 can run, ST-1 must confirm these stubs are
      replaced with passing tests as part of WINT-9120 completion criteria. This is a
      prerequisite gap: either WINT-9120 QA completion must include stub replacement,
      or this story must explicitly add a step to ST-1/ST-2 for it.
    ac_impacted: ["AC-1", "AC-2"]
    subtask_impacted: ["ST-1", "ST-2"]
    recommendation: >
      Add explicit note to ST-1 checklist: "Verify wint9110-workflows.parity.test.ts
      stubs are replaced before proceeding to ST-2. If not, create blocker issue against
      WINT-9120 and hold activation." The story already handles this pattern via the
      dependency gate concept; this gap just needs to be surfaced in the subtask
      description to prevent surprise at runtime.
    decision: add_ac
    ac_added: "AC-10: Before executing parity tests (ST-2), verify all it.todo() stubs in wint9110-workflows.parity.test.ts have been replaced with executable tests"

  - id: GAP-2
    title: "WINT-9120 baseline passing scenario list is not yet established"
    severity: conditional
    description: >
      AC-2 requires "all parity test scenarios that were passing in WINT-9120 continue
      to pass — no regressions introduced." WINT-9120 is currently in ready-for-qa
      status, meaning QA has not yet been completed and the definitive baseline of
      passing scenarios has not been formally established. The story's ST-1 ("Verify
      dependency readiness") is the intended gate for this, but the AC itself asserts
      "no regressions vs WINT-9120 baseline passing scenarios" as if that baseline
      exists. If WINT-9120 QA reveals that some scenarios fail at QA time, the baseline
      shifts. This is a sequencing risk: if WINT-9140 activates immediately after
      WINT-9120 reaches UAT (skipping QA completion), the baseline is ambiguous.
    ac_impacted: ["AC-2"]
    subtask_impacted: ["ST-1"]
    recommendation: >
      ST-1 should explicitly record the WINT-9120 baseline passing scenario count and
      test IDs before proceeding to ST-2. This can be done by running the parity suite
      (excluding wint9110-workflows stubs) at the start of ST-1 and recording results
      as the activation baseline in the sign-off document's workflow matrix.
    decision: add_ac
    ac_added: "AC-11: ST-1 records the WINT-9120 baseline passing scenario count and test IDs as activation baseline"

