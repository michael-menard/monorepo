schema: 2
story_id: WINT-9140
timestamp: '2026-03-03T21:00:00Z'
subtask_source: story
steps:
  - id: 1
    subtask_id: ST-1
    description: >-
      Verify dependency readiness: confirm WINT-9120 parity suite stubs are replaced in
      wint9110-workflows.parity.test.ts, run baseline parity suite (excluding wint9110 stubs) to establish WINT-9120
      passing scenario list, and record baseline count as activation baseline
    files: []
    files_to_read:
      - packages/backend/orchestrator/src/__tests__/parity/wint9110-workflows.parity.test.ts
      - packages/backend/orchestrator/src/__tests__/parity/README.md
      - packages/backend/orchestrator/src/__tests__/parity/doc-sync.parity.test.ts
    dependencies: []
    slice: backend
    verification: pnpm test --filter @repo/orchestrator -- --reporter=verbose src/__tests__/parity/ 2>&1 | head -60
    acs_covered:
      - AC-1
      - AC-2
      - AC-10
      - AC-11
  - id: 2
    subtask_id: ST-2
    description: >-
      Execute the full parity test suite (including newly-implemented wint9110-workflows.parity.test.ts tests) against
      both execution paths; capture pass/fail results with input/output comparison artifacts; document any divergent or
      error verdicts
    files:
      - packages/backend/orchestrator/src/__tests__/parity/wint9110-workflows.parity.test.ts
    files_to_read:
      - packages/backend/orchestrator/src/__tests__/parity/parity-harness.ts
      - packages/backend/orchestrator/src/__tests__/parity/doc-sync.parity.test.ts
      - packages/backend/orchestrator/src/graphs/bootstrap.ts
      - packages/backend/orchestrator/src/graphs/elab-epic.ts
      - packages/backend/orchestrator/src/graphs/elab-story.ts
      - packages/backend/orchestrator/src/graphs/dev-implement.ts
      - packages/backend/orchestrator/src/graphs/qa-verify.ts
      - packages/backend/orchestrator/src/graphs/backlog-review.ts
    dependencies:
      - 1
    slice: backend
    verification: pnpm test --filter @repo/orchestrator -- --reporter=verbose src/__tests__/parity/
    acs_covered:
      - AC-1
      - AC-2
  - id: 3
    subtask_id: ST-3
    description: >-
      Classify parity gaps from ST-2 run as blocking (must fix before sign-off) or acceptable deviations (document +
      follow-up story). Apply in-place fixes for any blocking gaps (e.g., minor node output differences). Create
      follow-up story stubs in KB for acceptable deviations. Re-run parity suite to confirm all blocking gaps resolved
    files:
      - packages/backend/orchestrator/src/nodes/
    files_to_read:
      - packages/backend/orchestrator/src/__tests__/parity/known-divergences.parity.test.ts
      - packages/backend/orchestrator/src/__tests__/parity/wint9110-workflows.parity.test.ts
    dependencies:
      - 2
    slice: backend
    verification: pnpm test --filter @repo/orchestrator -- --reporter=verbose src/__tests__/parity/
    acs_covered:
      - AC-3
      - AC-4
  - id: 4
    subtask_id: ST-4
    description: >-
      Write Phase 9 sign-off document at packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md. Document: (1)
      workflow matrix table (6 WINT-9110 workflows + doc-sync + story-creation + elaboration — all with pass/fail), (2)
      deviation register (blocking gaps resolved, acceptable deviations with follow-up story IDs), (3) sign-off
      statement. Format follows WINT-0220-STRATEGY.md pattern
    files:
      - packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md
    files_to_read:
      - packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md
    dependencies:
      - 3
    slice: backend
    verification: test -f packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md && echo 'File exists'
    acs_covered:
      - AC-5
  - id: 5
    subtask_id: ST-7
    description: >-
      Spot-check migration documentation: review docs/workflow/langgraph-migration.md against actual parity run findings
      from ST-2. Note any inaccuracies in the sign-off document migration doc review section. Create correction task
      story if material inaccuracies found
    files:
      - packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md
    files_to_read:
      - docs/workflow/langgraph-migration.md
    dependencies:
      - 4
    slice: backend
    verification: >-
      grep -q 'Migration Documentation' packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md && echo 'Section
      present'
    acs_covered:
      - AC-9
  - id: 6
    subtask_id: ST-5
    description: >-
      HiTL gate: present the completed WINT-9140-PHASE9-SIGNOFF.md to the human operator for review and confirmation.
      Human must: (1) verify workflow matrix covers all Phase 9 workflows, (2) verify deviation register is complete,
      (3) provide explicit sign-off confirmation
    files: []
    files_to_read:
      - packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md
    dependencies:
      - 5
    slice: backend
    verification: HiTL confirmation acknowledged by human operator
    acs_covered:
      - AC-6
  - id: 7
    subtask_id: ST-6
    description: >-
      Write KB entry recording Phase 9 completion (entry_type: decision, tags: [langgraph, phase-9, sign-off, wint]).
      Update WINT stories.index.md to set WINT-9140 status to completed
    files:
      - plans/future/platform/wint/stories.index.md
    files_to_read:
      - plans/future/platform/wint/stories.index.md
    dependencies:
      - 6
    slice: backend
    verification: grep -q 'WINT-9140' plans/future/platform/wint/stories.index.md && echo 'Index updated'
    acs_covered:
      - AC-7
      - AC-8
files_to_change:
  - path: packages/backend/orchestrator/src/__tests__/parity/wint9110-workflows.parity.test.ts
    action: modify
    reason: >-
      Replace 18 it.todo() stubs with executable parity tests for all 6 WINT-9110 workflow graphs (bootstrap, elab-epic,
      elab-story, dev-implement, qa-verify, backlog-review). Each gets matching/divergent/error verdict tests following
      doc-sync.parity.test.ts pattern
  - path: packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md
    action: create
    reason: >-
      New Phase 9 sign-off artifact (AC-5). Contains workflow validation matrix, deviation register, migration doc
      spot-check, and formal sign-off statement
  - path: plans/future/platform/wint/stories.index.md
    action: modify
    reason: Update WINT-9140 status to completed after HiTL sign-off (AC-8)
commands_to_run:
  - command: pnpm test --filter @repo/orchestrator -- --reporter=verbose src/__tests__/parity/
    when: 'ST-1: baseline run to establish passing scenario count'
    required: true
  - command: pnpm test --filter @repo/orchestrator -- --reporter=verbose src/__tests__/parity/
    when: 'ST-2: full parity run after wint9110 stubs replaced'
    required: true
  - command: pnpm test --filter @repo/orchestrator -- --reporter=verbose src/__tests__/parity/
    when: 'ST-3: re-run after blocking gap fixes to confirm resolution'
    required: true
  - command: pnpm check-types --filter @repo/orchestrator
    when: after any code changes in ST-2/ST-3
    required: true
  - command: pnpm test --filter @repo/orchestrator -- --coverage src/__tests__/parity/
    when: 'ST-2: verify >=80% branch coverage gate per parity README'
    required: true
acceptance_criteria_map:
  - ac_id: AC-1
    planned_evidence: pnpm test output showing all parity scenarios pass/fail with input/output comparison artifacts present
    evidence_type: command
  - ac_id: AC-2
    planned_evidence: ST-1 baseline scenario count recorded; ST-2 run shows zero regression vs baseline
    evidence_type: command
  - ac_id: AC-3
    planned_evidence: Deviation register in sign-off document — each gap entry has classification (blocking/acceptable)
    evidence_type: file
  - ac_id: AC-4
    planned_evidence: Deviation register shows 0 open blocking gaps; all acceptable deviations have follow-up story IDs
    evidence_type: file
  - ac_id: AC-5
    planned_evidence: >-
      File present at packages/backend/orchestrator/docs/WINT-9140-PHASE9-SIGNOFF.md with workflow matrix, deviation
      register, and sign-off statement
    evidence_type: file
  - ac_id: AC-6
    planned_evidence: Human operator explicit confirmation recorded in sign-off document
    evidence_type: manual
  - ac_id: AC-7
    planned_evidence: KB query with tags [langgraph, phase-9, sign-off, wint] returns Phase 9 completion entry
    evidence_type: manual
  - ac_id: AC-8
    planned_evidence: WINT-9140 status = completed in plans/future/platform/wint/stories.index.md
    evidence_type: file
  - ac_id: AC-9
    planned_evidence: Sign-off document contains migration doc review section noting any inaccuracies found during parity run
    evidence_type: file
  - ac_id: AC-10
    planned_evidence: 'ST-1 checklist confirms: all it.todo() stubs replaced before ST-2 proceeds; blocked if not'
    evidence_type: command
  - ac_id: AC-11
    planned_evidence: Baseline passing scenario count and test IDs recorded before ST-2 runs regression comparison
    evidence_type: command
architectural_decisions: []
complexity: moderate
notes:
  - >-
    ST-2 is the critical path: wint9110-workflows.parity.test.ts must replace 18 it.todo() stubs with executable tests
    following doc-sync.parity.test.ts pattern. Each of the 6 graphs needs 3 tests: matching/divergent/error verdict
  - >-
    Per parity README cutover criteria, coverage gate >=80% branch coverage within src/__tests__/parity/ must be met
    before sign-off
  - >-
    ST-3 may require minor node output fixes — these are constrained to src/nodes/ only. If blocking gap requires
    substantial remediation (new graph, new AC), escalate for follow-up story creation instead
  - >-
    HiTL gate (AC-6/ST-5) is non-automatable — plan accordingly. Sign-off document must be ready and human must
    explicitly confirm
  - >-
    KB write for AC-7 uses mcp__knowledge-base__kb_add with entry_type: decision, tags: [langgraph, phase-9, sign-off,
    wint]. Verify KB health in ST-1 before assuming availability
  - >-
    ADR-006 applies: E2E tests are exempt (backend-only story). ADR-005 does not apply to parity tests which use
    injected mocks, not real services
  - >-
    The sign-off document is Markdown (human narrative), not Zod-validated YAML — intentional for readability per
    Architecture Notes
  - >-
    ST-7 (migration doc spot-check) runs after ST-4 in this plan since it writes to the same sign-off document. Data
    comes from ST-2 observations
