lessons_to_record:
  - lesson: "For documentation-only chore stories, code review workers (lint, typecheck, build, react, typescript, accessibility) are all N/A. Only style, syntax, security, and reusability workers apply. This reduces review scope significantly."
    category: pattern
    tags: ["chore", "docs-only", "code-review"]

  - lesson: "When a framework document must grandfather existing files, an explicit 'Grandfathered gap' subsection with precise scope wording (e.g., 'core body only, not total file length') is the correct approach. This prevents future conformance disputes without requiring retroactive edits."
    category: pattern
    tags: ["documentation", "framework", "conformance"]

  - lesson: "Fix iteration on a documentation story may be needed to resolve template self-reference ambiguity (the reference template demonstrating all sections was initially counted toward the 10-25 line constraint it was describing). A 'Minimal Working Example' subsection solves this by showing a concrete conformant spec separately."
    category: pattern
    tags: ["documentation", "template-design", "ambiguity"]

