steps:
  - id: 1
    subtask_id: "ST-1"
    description: "Read both existing _specs/ pattern files and extract the implicit structure they share — frontmatter convention, Decision Rule format, Examples structure (positive/negative), Cross-Reference pattern. Document the structure map as a conformance basis for ST-4."
    files: []
    files_to_read:
      - ".claude/prompts/role-packs/_specs/patch-queue-pattern.md"
