      - ".claude/prompts/role-packs/FRAMEWORK.md"
    files_to_read:
      - ".claude/prompts/role-packs/_specs/patch-queue-pattern.md"
    dependencies: [1]
    slice: packages
    verification: "test -f .claude/prompts/role-packs/FRAMEWORK.md && grep -i 'pattern skeleton' .claude/prompts/role-packs/FRAMEWORK.md && echo 'PASS'"
    acs_covered: ["AC-1", "AC-2", "AC-3", "AC-5"]

  - id: 3
    subtask_id: "ST-3"
    description: "Extend .claude/prompts/role-packs/FRAMEWORK.md by appending: (1) Token Budget section — 150 token min, 300 token max for role instructions; 10-25 line constraint for pattern skeletons; line-count proxy (~1 line ≈ 5-10 tokens) as tokenizer fallback, (2) Proof Requirements Format section — template with verification_command field, expected artifact (file/command output/JSON), and escalation path, (3) Delivery Mechanisms section — all three mechanisms (file-based, KB MCP kb_search, context-pack sidecar) with usage guidance for each."
    files:
      - ".claude/prompts/role-packs/FRAMEWORK.md"
    files_to_read:
      - ".claude/prompts/role-packs/FRAMEWORK.md"
      - ".claude/prompts/role-packs/_specs/repair-loop-pattern.md"
    dependencies: [2]
    slice: packages
    verification: "grep -E '150|300|kb_search|sidecar' .claude/prompts/role-packs/FRAMEWORK.md | wc -l | xargs test 4 -le && echo 'PASS'"
    acs_covered: ["AC-4", "AC-6", "AC-7"]

  - id: 4
    subtask_id: "ST-4"
    description: "Read completed FRAMEWORK.md alongside both existing spec files. Perform conformance check: verify each spec's sections map to the framework's required sections. Document any grandfathered gaps (e.g., standalone Proof Requirements section). Confirm no modifications were made to either spec file. Run git diff to verify clean state."
    files: []
    files_to_read:
      - ".claude/prompts/role-packs/FRAMEWORK.md"
      - ".claude/prompts/role-packs/_specs/patch-queue-pattern.md"
      - ".claude/prompts/role-packs/_specs/repair-loop-pattern.md"
    dependencies: [3]
    slice: packages
    verification: "git diff HEAD -- .claude/prompts/role-packs/_specs/ | wc -c | xargs test 0 -eq && echo 'PASS: no modifications to existing specs'"
    acs_covered: ["AC-8"]

