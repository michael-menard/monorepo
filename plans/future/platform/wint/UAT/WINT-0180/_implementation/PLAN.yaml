    verification: "echo 'ST-1 is analysis only — no file changes to verify'"
    acs_covered: ["AC-8"]

  - id: 2
    subtask_id: "ST-2"
    description: "Create .claude/prompts/role-packs/FRAMEWORK.md with: (1) YAML-style frontmatter (version, story, status), (2) Overview section explaining the framework's purpose, (3) Directory structure section documenting role-packs/{role}.md and role-packs/_specs/{pattern}.md paths with purpose of each, (4) Pattern Skeleton Template section (10-25 lines with required sections: Decision Rule, Positive Examples max 2, Negative Example max 1, Proof Requirements), (5) Decision Rule Format section with boolean/threshold criteria and at least one worked example."
