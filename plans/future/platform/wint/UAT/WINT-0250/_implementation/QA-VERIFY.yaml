lessons_to_record:
  - lesson: >
      Config-only YAML stories (no TypeScript, no pnpm, no tests) can be fully implemented
      and verified without running any build toolchain. Node.js string analysis is sufficient
      for structural verification when pyyaml is not natively available. The venv workaround
      used during implementation is valid but Node.js inspection is a simpler QA alternative.
    category: pattern
    tags: ["config", "yaml", "qa-process", "wint"]

  - lesson: >
      When a dependency story (WINT-0220 / model-strategy.yaml) does not yet exist,
      using index-documented defaults with a TODO comment is the correct pattern.
      This avoids blocking the story while creating a clear forward reference for alignment.
    category: pattern
    tags: ["dependency-management", "forward-references", "wint", "config"]

  - lesson: >
      For config-only stories, EVIDENCE.yaml coverage fields (lines: null, branches: null)
      and test_summary (unit: {pass: 0, fail: 0}) are the expected output — not a deficiency.
      QA should not flag null coverage as a failure for stories with no runtime code.
    category: pattern
    tags: ["coverage", "qa-process", "config-only"]

