schema: 2
story_id: "WINT-2090"
timestamp: "2026-02-20T21:45:00Z"
subtask_source: story  # steps derived from story subtasks ST-1 through ST-6

steps:
  - id: 1
    subtask_id: "ST-1"
    description: "Verify WINT-0110 tool stability — run session-management test suite and confirm API is stable"
    files: []
    files_to_read:
      - "packages/backend/mcp-tools/src/session-management/__types__/index.ts"
      - "packages/backend/mcp-tools/src/session-management/session-create.ts"
    dependencies: []
    slice: backend
    verification: "pnpm --filter @repo/mcp-tools test 2>&1 | tail -20"
    acs_covered: []
    notes: "Prerequisite for all ACs. If tests fail, block and raise — do not proceed to ST-2."

  - id: 2
    subtask_id: "ST-2"
    description: "Create session-create/SKILL.md with frontmatter, usage section, sessionCreate invocation steps, and structured SESSION CREATED output block"
    files:
      - ".claude/skills/session-create/SKILL.md"
    files_to_read:
      - ".claude/skills/wt-new/SKILL.md"
      - "packages/backend/mcp-tools/src/session-management/__types__/index.ts"
    dependencies: [1]
    slice: backend
    verification: "head -6 .claude/skills/session-create/SKILL.md | grep -E '^name:|^description:'"
    acs_covered: ["AC-1", "AC-2", "AC-9"]
    notes: |
      Frontmatter requires 'name' and 'description' fields.
      SESSION CREATED output must match regex: /SESSION CREATED\n\s+session_id:\s+([0-9a-f-]{36})/
      sessionCreate required field: agentName. Optional: sessionId (UUID, auto-gen), storyId, phase.

  - id: 3
    subtask_id: "ST-3"
    description: "Add SESSION UNAVAILABLE null-return handling section to session-create/SKILL.md"
    files:
      - ".claude/skills/session-create/SKILL.md"
    files_to_read:
      - ".claude/skills/session-create/SKILL.md"
    dependencies: [2]
    slice: backend
    verification: "grep 'SESSION UNAVAILABLE' .claude/skills/session-create/SKILL.md"
    acs_covered: ["AC-3"]
    notes: |
      When sessionCreate returns null (DB error), skill must emit:
      'SESSION UNAVAILABLE — continuing without session tracking'
      Workflow must proceed normally — session tracking is telemetry, not a gate.

  - id: 4
    subtask_id: "ST-4"
    description: "Create session-inherit/SKILL.md with frontmatter, sessionQuery verification steps, confirmation/warning output, and incremental sessionUpdate example"
    files:
      - ".claude/skills/session-inherit/SKILL.md"
    files_to_read:
      - ".claude/skills/doc-sync/SKILL.md"
      - "packages/backend/mcp-tools/src/session-management/__types__/index.ts"
    dependencies: [1]
    slice: backend
    verification: "grep -c \"mode: 'incremental'\" .claude/skills/session-inherit/SKILL.md"
    acs_covered: ["AC-4", "AC-5", "AC-6", "AC-11"]
    notes: |
      CRITICAL - sessionQuery API constraints (AC-11):
        - sessionId is NOT a valid filter field in SessionQueryInputSchema
        - Correct pattern: sessionQuery({ activeOnly: true, limit: 50, storyId?: knownStoryId })
          then filter the returned array client-side for matching UUID
        - NEVER show sessionQuery({ sessionId: ... }) — this will cause a Zod validation error
      sessionUpdate incremental example must show mode: 'incremental' (default, concurrency-safe)
      mode: 'absolute' must be explicitly forbidden for workers

  - id: 5
    subtask_id: "ST-5"
    description: "Add prominent sessionComplete restriction section to session-inherit/SKILL.md"
    files:
      - ".claude/skills/session-inherit/SKILL.md"
    files_to_read:
      - ".claude/skills/session-inherit/SKILL.md"
    dependencies: [4]
    slice: backend
    verification: "grep 'sessionComplete' .claude/skills/session-inherit/SKILL.md"
    acs_covered: ["AC-10"]
    notes: |
      Must be visually distinct (e.g., WARNING block, callout, or bold header).
      Workers MUST NOT call sessionComplete.
      Only the leader that opened the session via session-create may call sessionComplete.
      Double-completion is a Business Logic Error (from WINT-0110).

  - id: 6
    subtask_id: "ST-6"
    description: "Add Session Lifecycle and Graceful Degradation sections to both skill files"
    files:
      - ".claude/skills/session-create/SKILL.md"
      - ".claude/skills/session-inherit/SKILL.md"
    files_to_read:
      - ".claude/skills/session-create/SKILL.md"
      - ".claude/skills/session-inherit/SKILL.md"
    dependencies: [3, 5]
    slice: backend
    verification: "grep -l 'Session Lifecycle' .claude/skills/session-create/SKILL.md .claude/skills/session-inherit/SKILL.md | wc -l"
    acs_covered: ["AC-7", "AC-8"]
    notes: |
      Session Lifecycle contract (4 steps):
        1. Leader opens: session-create → sessionCreate → SESSION CREATED
        2. Workers inherit: session-inherit → sessionQuery (active filter) → SESSION INHERITED
        3. Leader closes: sessionComplete (leader only)
        4. Periodic cleanup: sessionCleanup (future WINT-2100, retentionDays: 90)
      Graceful Degradation: DB unavailable or sessionCreate null → emit warning → workflow continues
      Both sections must appear in BOTH skill files.

files_to_change:
  - path: ".claude/skills/session-create/SKILL.md"
    action: create
    reason: "New skill file enabling leader agents to open context sessions via sessionCreate MCP tool (AC-1, AC-2, AC-3, AC-7, AC-8, AC-9)"

  - path: ".claude/skills/session-inherit/SKILL.md"
    action: create
    reason: "New skill file enabling worker agents to inherit active sessions, report token usage, and respect leader-only sessionComplete contract (AC-4, AC-5, AC-6, AC-7, AC-8, AC-10, AC-11)"

commands_to_run:
  - command: "pnpm --filter @repo/mcp-tools test 2>&1 | tail -20"
    when: "Step 1 — prerequisite verification before any skill authoring"
    required: true

  - command: "head -6 .claude/skills/session-create/SKILL.md | grep -E '^name:|^description:'"
    when: "after Step 2 — verify session-create frontmatter"
    required: true

  - command: "grep 'SESSION UNAVAILABLE' .claude/skills/session-create/SKILL.md"
    when: "after Step 3 — verify null-return handling text present"
    required: true

  - command: "grep -c \"mode: 'incremental'\" .claude/skills/session-inherit/SKILL.md"
    when: "after Step 4 — verify incremental mode documented"
    required: true

  - command: "grep 'sessionComplete' .claude/skills/session-inherit/SKILL.md"
    when: "after Step 5 — verify sessionComplete restriction present"
    required: true

  - command: "grep -l 'Session Lifecycle' .claude/skills/session-create/SKILL.md .claude/skills/session-inherit/SKILL.md | wc -l"
    when: "after Step 6 — verify Session Lifecycle sections in both files (must output 2)"
    required: true

  - command: "grep 'SESSION CREATED' .claude/skills/session-create/SKILL.md"
    when: "after Step 2 — verify output block text"
    required: true

acceptance_criteria_map:
  - ac_id: "AC-1"
    planned_evidence: "File check: head -6 .claude/skills/session-create/SKILL.md shows 'name:' and 'description:' fields"
    evidence_type: command

  - ac_id: "AC-2"
    planned_evidence: "File read: session-create/SKILL.md contains sessionCreate invocation with agentName, storyId, phase inputs and SESSION CREATED output block"
    evidence_type: file

  - ac_id: "AC-3"
    planned_evidence: "Command: grep 'SESSION UNAVAILABLE' .claude/skills/session-create/SKILL.md returns match"
    evidence_type: command

  - ac_id: "AC-4"
    planned_evidence: "File check: head -6 .claude/skills/session-inherit/SKILL.md shows 'name:' and 'description:' fields"
    evidence_type: command

  - ac_id: "AC-5"
    planned_evidence: "File read: session-inherit/SKILL.md contains sessionQuery step with activeOnly: true and emits SESSION INHERITED confirmation or SESSION NOT FOUND warning"
    evidence_type: file

  - ac_id: "AC-6"
    planned_evidence: "Command: grep -c \"mode: 'incremental'\" .claude/skills/session-inherit/SKILL.md returns >= 1"
    evidence_type: command

  - ac_id: "AC-7"
    planned_evidence: "Command: grep -l 'Session Lifecycle' both skill files | wc -l outputs 2"
    evidence_type: command

  - ac_id: "AC-8"
    planned_evidence: "File read: both skill files contain Graceful Degradation section documenting warning-then-continue behavior"
    evidence_type: file

  - ac_id: "AC-9"
    planned_evidence: "File read: SESSION CREATED output block format matches /SESSION CREATED\\n\\s+session_id:\\s+([0-9a-f-]{36})/"
    evidence_type: file

  - ac_id: "AC-10"
    planned_evidence: "Command: grep 'sessionComplete' .claude/skills/session-inherit/SKILL.md returns restriction text; visually distinct section confirmed by file read"
    evidence_type: command

  - ac_id: "AC-11"
    planned_evidence: "File read: session-inherit/SKILL.md shows sessionQuery({ activeOnly: true, limit: 50 }) pattern with client-side filter — NOT sessionQuery({ sessionId: ... })"
    evidence_type: file

architectural_decisions: []

complexity: simple

notes:
  - "This is a markdown-only story. No TypeScript, no packages, no migrations, no endpoints. All steps produce .md files."
  - "ST-1 (step 1) is a prerequisite verification — if pnpm test fails, block execution and raise before authoring any skill files."
  - "Steps 2 and 4 can run in parallel (both depend only on ST-1). Steps 3 and 5 can also run in parallel (depend on 2 and 4 respectively)."
  - "Step 6 depends on both 3 and 5 completing first."
  - "AC-11 (sessionQuery client-side filter pattern) is covered in ST-4. CRITICAL: never show sessionQuery({ sessionId: ... }) as sessionId is not a valid filter field."
  - "Per ADR-005: integration tests (HT-1 through HT-4) must use live postgres-knowledgebase. Docs checks (HT-5, EC-3, EG-4, EG-5) require only file reads."
  - "Per ADR-006: E2E tests not required — SCOPE.yaml touches_frontend: false and story explicitly excludes frontend."
  - "SCOPE.yaml risk_flags.auth: true — noted because sessions store agentName and storyId. No user auth changes, but the session data carries workflow identity context."
  - "Canonical skill references: wt-new/SKILL.md (simple structure pattern), doc-sync/SKILL.md (multi-phase + graceful degradation pattern)."
