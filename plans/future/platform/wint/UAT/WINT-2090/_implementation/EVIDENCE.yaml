acceptance_criteria:
  - ac_id: "AC-1"
    ac_text: "session-create/SKILL.md has valid frontmatter with 'name' and 'description' fields"
    status: PASS
    evidence_items:
      - type: command
        command: "head -6 .claude/skills/session-create/SKILL.md | grep -E '^name:|^description:'"
        result: "name: session-create\ndescription: Open a new context session at the start of a leader agent workflow..."

  - ac_id: "AC-2"
    ac_text: "session-create/SKILL.md documents sessionCreate invocation with agentName, storyId, phase inputs and emits SESSION CREATED output block"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/skills/session-create/SKILL.md"
        description: "Step 1 shows mcp__postgres_knowledgebase__sessionCreate({ agentName, storyId, phase }) invocation. Output section shows SESSION CREATED block with session_id, agent, story_id, phase fields."

  - ac_id: "AC-3"
    ac_text: "session-create/SKILL.md documents SESSION UNAVAILABLE null-return handling with workflow-continues behavior"
    status: PASS
    evidence_items:
      - type: command
        command: "grep 'SESSION UNAVAILABLE' .claude/skills/session-create/SKILL.md"
        result: "Multiple matches including: 'SESSION UNAVAILABLE — continuing without session tracking'"
      - type: file
        path: ".claude/skills/session-create/SKILL.md"
        description: "Null-return path section and Graceful Degradation table both document that DB error emits SESSION UNAVAILABLE and workflow continues normally"

  - ac_id: "AC-4"
    ac_text: "session-inherit/SKILL.md has valid frontmatter with 'name' and 'description' fields"
    status: PASS
    evidence_items:
      - type: command
        command: "head -6 .claude/skills/session-inherit/SKILL.md | grep -E '^name:|^description:'"
        result: "name: session-inherit\ndescription: Inherit an active context session opened by a leader agent..."

  - ac_id: "AC-5"
    ac_text: "session-inherit/SKILL.md documents sessionQuery step with activeOnly: true and emits SESSION INHERITED or SESSION NOT FOUND"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/skills/session-inherit/SKILL.md"
        description: "Step 1 shows sessionQuery({ activeOnly: true, limit: 50 }). Output section documents both SESSION INHERITED (found) and SESSION NOT FOUND (not found) outputs with full field listings."

  - ac_id: "AC-6"
    ac_text: "session-inherit/SKILL.md documents incremental sessionUpdate mode (mode: 'incremental')"
    status: PASS
    evidence_items:
      - type: command
        command: "grep -c \"mode: 'incremental'\" .claude/skills/session-inherit/SKILL.md"
        result: "8 — eight occurrences including Step 4, sessionUpdate table, examples, and integration notes"

  - ac_id: "AC-7"
    ac_text: "Both skill files contain a Session Lifecycle section documenting the 4-step lifecycle"
    status: PASS
    evidence_items:
      - type: command
        command: "grep -l 'Session Lifecycle' .claude/skills/session-create/SKILL.md .claude/skills/session-inherit/SKILL.md | wc -l"
        result: "2"
      - type: file
        path: ".claude/skills/session-create/SKILL.md"
        description: "Session Lifecycle section: 5 steps (leader opens, workers inherit, workers update tokens, leader closes, periodic cleanup)"
      - type: file
        path: ".claude/skills/session-inherit/SKILL.md"
        description: "Session Lifecycle section: same 5-step contract"

  - ac_id: "AC-8"
    ac_text: "Both skill files contain a Graceful Degradation section documenting warning-then-continue behavior"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/skills/session-create/SKILL.md"
        description: "Graceful Degradation section with 4-row table: DB unavailable, null return, MCP unavailable, network timeout — all emit warning and proceed"
      - type: file
        path: ".claude/skills/session-inherit/SKILL.md"
        description: "Graceful Degradation section with 5-row table: empty query result, MCP unavailable, no session match, DB unavailable, sessionUpdate failure — all non-fatal"

  - ac_id: "AC-9"
    ac_text: "SESSION CREATED output block matches regex /SESSION CREATED\\n\\s+session_id:\\s+([0-9a-f-]{36})/"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/skills/session-create/SKILL.md"
        description: |
          Output section contains:
          SESSION CREATED
            session_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          Two spaces indent before session_id: satisfies \\s+ in regex.
          Regex constraint is also documented inline: 'session_id line must match the regex: /SESSION CREATED\\n\\s+session_id:\\s+([0-9a-f-]{36})/'

  - ac_id: "AC-10"
    ac_text: "session-inherit/SKILL.md has a visually prominent sessionComplete restriction section"
    status: PASS
    evidence_items:
      - type: command
        command: "grep 'sessionComplete' .claude/skills/session-inherit/SKILL.md"
        result: "7 matches including WARNING section header and multiple prohibition statements"
      - type: file
        path: ".claude/skills/session-inherit/SKILL.md"
        description: "Section '## WARNING: sessionComplete is Restricted to the Leader' uses blockquote formatting with bold MUST NOT statements and explains Business Logic Error classification from WINT-0110"

  - ac_id: "AC-11"
    ac_text: "session-inherit/SKILL.md shows sessionQuery({ activeOnly: true, limit: 50 }) with client-side filter — NOT sessionQuery({ sessionId: ... })"
    status: PASS
    evidence_items:
      - type: file
        path: ".claude/skills/session-inherit/SKILL.md"
        description: |
          Step 1 explicitly shows CORRECT vs WRONG patterns:
          CORRECT: sessionQuery({ activeOnly: true, limit: 50 })
          WRONG (marked with comment): sessionQuery({ sessionId: ... }) — labeled INVALID DO NOT USE
          SessionQueryInput fields table explicitly excludes sessionId with a note: 'sessionId is NOT listed above because it is NOT a valid filter field'
          Client-side filter pattern using Array.find() is shown in Step 2 and Examples.

