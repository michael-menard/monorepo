architectural_decisions:
  - id: ARCH-001
    question: 'MCP wrappers: call HTTP endpoint or compute functions directly?'
    decision: Call computeAudit/computeCheck directly (not via HTTP fetch to localhost:3092)
    rationale: >-
      Avoids hard runtime dependency on server being up; matches context-pack-get.ts precedent; simplifies testing.
      OPP-04 from ELAB.yaml resolved this.
    decided_by: elaboration
  - id: ARCH-002
    question: 'FrankenFeatureItem / CapabilityCoverageOutput: import from @repo/mcp-tools or redefine?'
    decision: >-
      Import FrankenFeatureItemSchema from @repo/mcp-tools for the frankenFeatures array item type; define
      sidecar-specific CohesionCheckResult with boolean capabilityCoverage (different shape from
      CapabilityCoverageOutput which uses counts)
    rationale: >-
      FrankenFeatureItem shape is identical. CohesionCheckResult.capabilityCoverage uses booleans (create?:boolean) per
      AC-4 HTTP contract, which differs from CapabilityCoverageOutput.capabilities (counts). OPP-01 from ELAB.yaml
      confirmed.
    decided_by: elaboration
  - id: ARCH-003
    question: Graph views vs. direct Drizzle queries for franken_features and capability_coverage?
    decision: >-
      Use direct Drizzle ORM queries against features and capabilities tables (same pattern as
      graph-get-franken-features.ts); not SQL views
    rationale: >-
      No Drizzle pgView definitions exist for these view names. GAP-01 from ELAB.yaml identifies this; canonical
      reference file makes the correct pattern explicit.
    decided_by: elaboration
complexity: moderate
notes:
  - All architectural decisions resolved during elaboration — no user input required
  - >-
