  - 'OPP-04: MCP wrappers call compute functions directly, not HTTP — avoids runtime server dependency'
  - 'Port allocation: role-pack=3090, context-pack=3091, cohesion=3092 — document in server.ts comment'
  - SEC-002 comment required in route handlers per OPP-02 and context-pack precedent
  - pnpm-workspace.yaml glob packages/backend/sidecars/* already covers cohesion — no manual edit needed (AC-13)
  - Integration test must use --config /dev/null pattern per established sidecar convention
  - Empty graph must return graceful empty results (AC-8), not errors — critical for WINT-4030 dependency
