issues: []
lessons_to_record:
  - lesson: >-
      Shared sidecar utility extraction (@repo/sidecar-http-utils) is an effective pattern when multiple sidecar
      packages share identical sendJson/readBody helpers. Extract early during code review rather than
      post-implementation.
    category: pattern
    tags:
      - backend
      - sidecar
      - reusability
      - code-review
  - lesson: >-
      setTimeout(fn, 0) in Node.js http handler unit tests is the correct idiom for simulating IncomingMessage stream
      events (data/end/error). This is NOT an anti-pattern — it is distinct from the React waitFor anti-pattern. QA
      reviewers should not flag this.
    category: pattern
    tags:
      - testing
      - backend
      - nodejs
      - streams
      - qa-review
  - lesson: >-
      NodePgDatabase<any> from drizzle-orm/node-postgres is the preferred injectable Drizzle client type in this
      codebase — not structural type aliases. Using it directly eliminates as-any casts in dependency injection sites.
    category: pattern
    tags:
      - backend
      - drizzle
      - typescript
      - dependency-injection
  - lesson: >-
      For backend-only sidecar stories with no UI surface, E2E Playwright tests should be explicitly skipped in
      CHECKPOINT.yaml (e2e_gate: skipped_no_ui_surface). HTTP contract validation should be covered by HTTP integration
      tests instead.
    category: pattern
    tags:
      - testing
      - backend
      - e2e
      - sidecar
      - qa-verify
