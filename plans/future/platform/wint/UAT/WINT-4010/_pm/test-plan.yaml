strategy: unit+integration
scope:
  endpoints:
    - "POST /cohesion/audit"
    - "POST /cohesion/check"
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "POST /cohesion/audit returns full Franken-feature list when graph is populated"
    setup: "Graph DB populated with features that have incomplete CRUD capability coverage (mock DB via injectable dep)"
    action: "POST /cohesion/audit with empty body {}"
    expected: "Response { ok: true, data: { frankenFeatures: [...], coverageSummary: { totalFeatures: N, completeCount: X, incompleteCount: Y } } }"
    evidence: "computeAudit unit test with mock DB returning 2 complete + 1 incomplete feature; HTTP integration test with real server"

  - id: HP-2
    title: "POST /cohesion/audit filtered by packageName returns subset"
    setup: "Graph DB with features across two package names; mock DB dep"
    action: "POST /cohesion/audit with body { packageName: 'wish' }"
    expected: "Response { ok: true, data: { frankenFeatures: [...only 'wish' features...], coverageSummary: { totalFeatures: N, ... } } }"
    evidence: "computeAudit unit test verifying packageName filter is applied to Drizzle query where clause"

  - id: HP-3
    title: "POST /cohesion/check returns complete status for a fully-covered feature"
    setup: "Mock DB returns all CRUD capabilities for featureId 'wish'; no violations"
    action: "POST /cohesion/check with body { featureId: 'wish' }"
    expected: "Response { ok: true, data: { featureId: 'wish', status: 'complete', violations: [], capabilityCoverage: { create: true, read: true, update: true, delete: true } } }"
    evidence: "computeCheck unit test with mock DB injected; HTTP integration test against real server"

  - id: HP-4
    title: "POST /cohesion/check returns incomplete status with violations for partial feature"
    setup: "Mock DB returns only create+read capabilities for featureId 'wint'; delete missing"
    action: "POST /cohesion/check with body { featureId: 'wint' }"
    expected: "Response { ok: true, data: { featureId: 'wint', status: 'incomplete', violations: ['missing delete capability'], capabilityCoverage: { create: true, read: true, update: false, delete: false } } }"
    evidence: "computeCheck unit test"

  - id: HP-5
    title: "MCP wrapper cohesion_audit returns typed result"
    setup: "Sidecar server running on port 3092"
    action: "Call cohesion_audit() MCP tool wrapper"
    expected: "Returns CohesionAuditResult shaped object with frankenFeatures and coverageSummary"
    evidence: "Unit test for cohesion_audit wrapper with HTTP mock or direct computeAudit call"

  - id: HP-6
    title: "MCP wrapper cohesion_check returns typed result"
    setup: "Sidecar server running on port 3092"
    action: "Call cohesion_check({ featureId: 'wish' }) MCP tool wrapper"
    expected: "Returns CohesionCheckResult with status, violations, capabilityCoverage"
    evidence: "Unit test for cohesion_check wrapper"

error_cases:
  - id: EC-1
    title: "POST /cohesion/check with missing featureId returns 400 error"
    setup: "Server running"
    action: "POST /cohesion/check with body {} (missing required featureId)"
    expected: "Response { ok: false, error: 'Invalid input: featureId is required' } with HTTP 400"
    evidence: "Zod validation in route handler; integration test"

  - id: EC-2
    title: "POST /cohesion/check with invalid featureId type returns 400"
    setup: "Server running"
    action: "POST /cohesion/check with body { featureId: 123 } (number instead of string)"
    expected: "Response { ok: false, error: 'Invalid input: ...' } with HTTP 400"
    evidence: "Zod schema validation; unit test on route handler"

  - id: EC-3
    title: "POST /cohesion/audit with malformed JSON body returns 400"
    setup: "Server running"
    action: "POST /cohesion/audit with Content-Type: application/json but body 'not-json'"
    expected: "Response { ok: false, error: 'Invalid JSON body' } with HTTP 400"
    evidence: "readBody parse error handling; integration test"

  - id: EC-4
    title: "DB connection failure returns graceful 500 error response"
    setup: "computeAudit injected with DB dep that throws on query"
    action: "POST /cohesion/audit with valid body"
    expected: "Response { ok: false, error: 'Internal error' } with HTTP 500; error logged via @repo/logger; no uncaught exception"
    evidence: "computeAudit unit test with mock DB throwing; @repo/logger spy verifies log call"

  - id: EC-5
    title: "POST to unknown route returns 404"
    setup: "Server running"
    action: "POST /cohesion/unknown"
    expected: "Response { ok: false, error: 'Not found' } with HTTP 404"
    evidence: "Integration test"

edge_cases:
  - id: ED-1
    title: "Empty graph (no features) returns graceful empty audit result"
    setup: "Mock DB returns empty arrays for all graph queries (WINT-4030 not yet run)"
    action: "POST /cohesion/audit with empty body"
    expected: "Response { ok: true, data: { frankenFeatures: [], coverageSummary: { totalFeatures: 0, completeCount: 0, incompleteCount: 0 } } }"
    evidence: "computeAudit unit test with empty mock DB; critical for AC-8"

  - id: ED-2
    title: "POST /cohesion/check for unknown featureId returns unknown status"
    setup: "Mock DB returns no capabilities for featureId 'nonexistent'"
    action: "POST /cohesion/check with body { featureId: 'nonexistent' }"
    expected: "Response { ok: true, data: { featureId: 'nonexistent', status: 'unknown', violations: [], capabilityCoverage: {} } }"
    evidence: "computeCheck unit test handling empty DB result gracefully"

  - id: ED-3
    title: "PORT env variable respected at server startup"
    setup: "Set process.env.PORT = '4000' before server start"
    action: "Start server; check bound port"
    expected: "Server listens on port 4000 not default 3092"
    evidence: "Integration test or server.ts unit test reading process.env.PORT"

  - id: ED-4
    title: "POST /cohesion/audit with null packageName treated as no filter"
    setup: "Mock DB with multiple features across packages"
    action: "POST /cohesion/audit with body { packageName: null }"
    expected: "Returns full audit result across all packages (null treated as unfiltered)"
    evidence: "computeAudit unit test; Zod schema for packageName uses z.string().optional()"

tooling_evidence:
  backend:
    http_requests:
      - "POST http://localhost:3092/cohesion/audit Content-Type: application/json Body: {}"
      - "POST http://localhost:3092/cohesion/audit Content-Type: application/json Body: { \"packageName\": \"wish\" }"
      - "POST http://localhost:3092/cohesion/check Content-Type: application/json Body: { \"featureId\": \"wish\" }"
      - "POST http://localhost:3092/cohesion/check Content-Type: application/json Body: {}"
    assertions:
      - "HTTP 200 on valid requests"
      - "HTTP 400 on Zod validation failure"
      - "HTTP 500 on internal error"
      - "Response body always { ok: boolean, data?: ..., error?: string }"
      - "No uncaught exceptions thrown"
      - "All log calls via @repo/logger (verify no console.log in source)"
  frontend: null

manual_cases:
  - id: MC-1
    title: "Verify pnpm workspace glob coverage"
    steps:
      - "Review pnpm-workspace.yaml for packages/backend/sidecars/* glob"
      - "Confirm packages/backend/sidecars/cohesion/ is auto-detected"
      - "Run pnpm install to verify no errors"
    expected: "New package auto-detected; no manual workspace.yaml edit needed"

fixture_definitions:
  - name: MockDbWithPopulatedGraph
    type: injectable-dep
    description: "Mock DB object returning pre-canned Drizzle-shaped results for graph.features, graph.capabilities, graph.franken_features view"

  - name: MockDbEmpty
    type: injectable-dep
    description: "Mock DB object returning empty arrays for all graph queries — simulates pre-WINT-4030 state"

  - name: MockDbThrowsOnQuery
    type: injectable-dep
    description: "Mock DB object that throws on any query call — simulates DB connection failure for error path testing"

risks:
  - "Integration tests must run in separate vitest config (--config /dev/null pattern) to avoid interference with main vitest workspace config"
  - "graph.franken_features and graph.capability_coverage views depend on WINT-0060/WINT-0131 schema migrations — confirm views exist in test environment"
  - "MCP wrapper tests require deciding whether to call the HTTP endpoint or delegate directly to computeAudit/computeCheck — document approach in story"
  - "PORT 3092 must not conflict with other running sidecars in CI environment"
