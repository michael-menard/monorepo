lessons_to_record:
  - lesson: >-
      Pre-existing test failures (structurer-affinity: 4, integration.test: 2, health-gate.integration: 7) should be
      tracked and resolved separately — they block clean CI runs for all stories in the orchestrator package.
    category: blocker
    tags:
      - orchestrator
      - test-hygiene
      - ci
  - lesson: >-
      The GraphStateWithX extends GraphState interface pattern is canonical in orchestrator graph files and is an
      intentional architectural exception to the 'no interfaces' rule — these are structural extension interfaces, not
      data-type interfaces.
    category: pattern
    tags:
      - orchestrator
      - architecture
      - typescript
  - lesson: >-
      Send API fan-out tests should verify Send object count AND node target (checking s.node === 'elab_story_worker')
      to ensure dispatch targets are correct, not just the count.
    category: pattern
    tags:
      - langgraph
      - send-api
      - testing
  - lesson: >-
      For graph-level AC verification, checking that conditional edge functions are exported enables direct unit testing
      of routing logic without running the full compiled graph — this is the ARCH-002 pattern and should be mandated for
      all future graph stories.
    category: pattern
    tags:
      - langgraph
      - testing
      - routing
