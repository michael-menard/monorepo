architecture_notes:
  - >-
    Zod-first types: all domain types use z.infer<XSchema>. GraphStateWithX interfaces extending GraphState are an
    established pattern from canonical references (story-creation.ts, elaboration.ts) — per story instructions to follow
    those patterns exactly.
  - >-
    No console.log — @repo/logger not imported since graph nodes do not emit log messages directly (follows qa.ts and
    review.ts pattern).
  - No barrel files created.
  - createToolNode from runner/node-factory.ts used for all node adapters (AC-8).
  - updateState helper from runner/state-helpers.js used in all node adapters.
  - Conditional edge functions all named and exported (ARCH-002 pattern from story-creation.ts).
  - Injectable deps all typed as z.unknown().optional() per story ADR.
  - Checkpointer wired via graph.compile({ checkpointer }) pattern.
  - Send API fan-out follows review.ts pattern exactly (reviewed in elab-epic.ts).
