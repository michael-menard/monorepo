lessons_to_record:
  - lesson: "innerJoin in Drizzle ORM automatically filters rows where the join condition fails; isNotNull(capabilities.featureId) after innerJoin is technically redundant but serves as explicit documentation of intent. No functional impact."
    category: pattern
    tags: ["drizzle", "mcp-tools", "graph-query"]

  - lesson: "Capability coverage query uses .then(rows => rows.filter(...)) post-fetch pattern instead of SQL WHERE eq(capabilities.featureId, feature.id) to simplify vi.mock() DB chaining in unit tests. Both patterns are semantically equivalent."
    category: pattern
    tags: ["mcp-tools", "testing", "drizzle"]

  - lesson: "onDelete behavior must use 'set null' (space-separated) not 'setNull' (camelCase) in Drizzle ORM references() — UpdateDeleteAction type enforces this format."
    category: blocker
    tags: ["drizzle", "database-schema", "migration"]

  - lesson: "Migration journal meta/_journal.json is not updated by manually creating SQL migration files — only updated when db:generate or db:migrate runs against a live DB. Manual migration files should still be created for review but journal update deferred to deployment."
    category: pattern
    tags: ["database-schema", "migration", "drizzle"]

