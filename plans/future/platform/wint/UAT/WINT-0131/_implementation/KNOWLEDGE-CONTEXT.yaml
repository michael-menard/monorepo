tool_context:
  graph_get_franken_features:
    current_state: "stub — returns [] with schema-limitation warning"
    imports_needed: ["db from @repo/db", "features + capabilities from @repo/database-schema", "eq, isNotNull, innerJoin from drizzle-orm"]
    logic: |
      1. Parse input with GraphGetFrankenFeaturesInputSchema.parse(input) [already present]
      2. Query: SELECT featureId, featureName, capabilityType FROM capabilities INNER JOIN features ON capabilities.featureId = features.id WHERE capabilities.featureId IS NOT NULL
      3. Optionally filter by features.packageName if input.packageName provided
      4. Group rows by featureId in TypeScript using reduce
      5. For each featureId, compute which CRUD types are present in the capability types
      6. Features missing any of ['create', 'read', 'update', 'delete'] are Franken-features
      7. Build FrankenFeatureItem[] with featureId, featureName, missingCapabilities array
    return_on_db_error: "[] (already handles via catch block)"

  graph_get_capability_coverage:
    current_state: "stub — returns null with schema-limitation warning"
    imports_needed: ["db from @repo/db", "features + capabilities from @repo/database-schema", "eq, or from drizzle-orm"]
    logic: |
      1. Parse input with GraphGetCapabilityCoverageInputSchema.parse(input) [already present]
      2. Dual-ID lookup: SELECT FROM features WHERE id = parsed.featureId OR featureName = parsed.featureId LIMIT 1
      3. If !feature, return null
      4. SELECT FROM capabilities WHERE featureId = feature.id
      5. Aggregate in TypeScript: count capabilityType values matching create/read/update/delete
      6. Aggregate maturity levels: record of maturityLevel → count
      7. Return CapabilityCoverageOutput: { featureId: feature.id, capabilities: {create, read, update, delete}, maturityLevels, totalCount }
    return_on_db_error: "null (already handles via catch block)"

