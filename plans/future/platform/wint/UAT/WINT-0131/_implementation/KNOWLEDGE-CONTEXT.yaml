lessons:
  - story: "WINT-0130"
    lesson: "capabilityType in the capabilities table is a general text field ('business', 'technical', 'infrastructure'), but for Franken-feature detection, the CRUD capability types ('create', 'read', 'update', 'delete') are the semantic values used. These are application-enforced values stored in capabilityType. No DB enum exists — string comparison only."

  - story: "WINT-0130"
    lesson: "The isNotNull() Drizzle operator is needed for graph_get_franken_features to filter capabilities that have a featureId set."

  - story: "WINT-0090"
    lesson: "Test files for mcp-tools use vi.hoisted + vi.mock chain pattern. Each mock method in the chain (select → from → where → limit) must be individually mocked. mockInnerJoin will be needed for the innerJoin in graph_get_franken_features."

  - story: "WINT-0060"
    lesson: "featuresRelations already has outgoingRelationships and incomingRelationships. Adding capabilities: many(capabilities) must use a distinct relationName to avoid ambiguity if Drizzle requires it."
