notes:
  - "Migration number confirmed: next is 0027 (last applied is 0026_wint_1130_worktree_tracking per _journal.json idx=26)"
  - "capabilitiesRelations currently a placeholder: relations(capabilities, () => ({})). Must be updated to include one(features) for featureId FK."
  - "featuresRelations currently has outgoingRelationships + incomingRelationships only. Must add many(capabilities) to complete bidirectional relation."
  - "The capabilities.capabilityType field in wint.ts is documented as 'business', 'technical', 'infrastructure' — NOT CRUD types. The CRUD types (create, read, update, delete) are lifecycle_stage / or capabilityType values used in Franken-feature detection. Confirm: AC-5 refers to capabilityType field being one of 'create', 'read', 'update', 'delete' per the Architecture Notes. The existing schema has capabilityType as text — the CRUD lifecycle constraint is enforced at application level only."
  - "graph_get_franken_features must import capabilities + features from @repo/database-schema and db from @repo/db, following the pattern in graph-check-cohesion.ts."
  - "graph_get_capability_coverage must use isNotNull import from drizzle-orm for the featureId filter."
  - "ADR-005 constraint: tests must use real PostgreSQL. But existing story-management unit tests use vi.mock() for @repo/db. The test pattern to follow uses vi.mock — this is the unit test pattern (not integration test). Integration tests in story-management/integration.test.ts use real DB. Story specifies unit tests for graph query tools — mocked DB is acceptable for unit tests (only integration.test.ts uses real DB per the pattern reference)."
  - "Test mock pattern: mock @repo/db and @repo/database-schema following story-management/__tests__/story-get-status.test.ts vi.hoisted + vi.mock pattern."
  - "unified-wint.ts capabilities table is at approximately line 492 — only a TODO comment is added, no functional change."
  - "WINT-0130 decision_002: wint.ts is authoritative. Do NOT touch unified-wint.ts capabilities functionally — only add TODO comment."
  - "No changes to __types__/index.ts — Zod schemas already correctly define FrankenFeatureItemSchema and CapabilityCoverageOutputSchema."
  - "No changes to graph_check_cohesion.ts or graph_apply_rules.ts source — only test files are created for these."
