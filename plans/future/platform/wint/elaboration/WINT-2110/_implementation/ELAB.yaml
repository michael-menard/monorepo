audit:
  - id: scope_alignment
    status: WARN
    note: >
      stories.index.md describes "Update pm-bootstrap-workflow, dev-implement-story, elab-story,
      qa-verify-story, dev-fix-story to use context cache" (5 workflows). The story title says
      "5 High-Volume Agents" but the Scope section lists 7 .agent.md files. The story correctly
      explains this in a table — pm-bootstrap-workflow is split across 3 leader agents. This is
      internally consistent but the title "5 agents" is misleading; the actual deliverable is
      7 .agent.md files modified. Minor misalignment between title and actual scope. The story
      correctly calls this out in the Scope section with a clarifying table.

  - id: internal_consistency
    status: FAIL
    note: >
      CRITICAL INCONSISTENCY: The story's Architecture Notes section, AC-7, ST-2, HP-1, and
      the packTypeValues update block all claim that WINT-2030, WINT-2050, and WINT-2060
      introduce NEW pack type enum values ('project-conventions', 'blockers-known', 'lib-react19',
      'lib-tailwind', 'lib-zod', 'lib-vitest'). This is FALSE. Verification against the actual
      upstream story files shows:
      - WINT-2030: uses packType 'architecture' with packKey 'project-conventions' (NOT a new type)
      - WINT-2050: uses packType 'lessons_learned' with packKey 'blockers-known' (NOT a new type)
      - WINT-2060: uses packType 'codebase' with packKeys 'lib-react19', 'lib-tailwind', 'lib-zod',
        'lib-vitest' (NOT new types — WINT-2060 explicitly says "Do NOT add new contextPackTypeEnum
        values — use existing 'codebase' packType")
      The DB enum (wint.ts) currently has: codebase, story, feature, epic, architecture,
      lessons_learned, test_patterns, agent_missions (8 values — agent_missions added by migration
      0033 for WINT-2040). No additional enum values are needed.
      As a consequence, the entire ST-2 subtask and AC-7 are based on a false premise. The
      packTypeValues array update, if it follows the story's current instructions, would add
      invalid string values that do NOT exist in the DB enum, causing runtime Zod validation
      failures or DB constraint errors.
      Additionally, the subtask pack-type references in ST-3/ST-4/ST-5 use incorrect pack type
      strings: 'project-conventions/main' should be packType 'architecture' packKey
      'project-conventions'; 'blockers-known/main' should be packType 'lessons_learned' packKey
      'blockers-known'; 'lib-react19/main' etc should be packType 'codebase' packKey 'lib-react19'.

  - id: reuse_first
    status: PASS
    note: >
      Story correctly identifies context_cache_get() from packages/backend/mcp-tools as the
      integration point. Uses @repo/logger for fallback warnings. References qa-verify-setup-leader
      as structural template. TypeScript file reuse (update existing __types__/index.ts, not create
      new file) is correctly specified. No per-story one-off utilities introduced.

  - id: ports_adapters
    status: PASS
    note: >
      No new API endpoints. The integration is additive to agent .agent.md files (markdown
      documentation, not executable code) and a minor TypeScript constant update. The
      context_cache_get() tool itself is already ports/adapters compliant (verified in WINT-0100).
      N/A for new transport concerns.

  - id: testability
    status: WARN
    note: >
      Test strategy is reasonable for an agent-file-modification story: manual checklist review
      + grep verification + type-check commands. However, AC-8 specifies an integration smoke
      test against a live DB (seeded pack), which requires a running PostgreSQL instance. This
      is documented but requires the test executor to have the DB available. The manual nature
      of the primary verification (agent .agent.md file review) is inherent to the story type
      but cannot be fully automated. HP-1 (verify packTypeValues array) will FAIL if implemented
      as written because it expects 14 values including non-existent enum values. EC-2 will PASS
      correctly (Zod rejects invalid packTypes) but the test setup description is accurate.
      Automated verification is limited but documented. Tests are executable given correct
      environment.

  - id: decision_completeness
    status: PASS
    note: >
      No blocking TBDs. The pre-seeded AC-5 audit result (no paired TypeScript nodes) is
      explicitly documented, eliminating a potential unknown. The dependency on WINT-2040
      still-in-failed-code-review is documented with a clear mitigation (conditional fallback).
      dev_feasibility.missing_requirements is empty. All design decisions have been made.

  - id: risk_disclosure
    status: PASS
    note: >
      Key risks documented: WINT-2040 still in failed-code-review, LangGraph node audit scope,
      token budget guard, packTypeValues string literal cross-reference requirement, unbounded
      cache injection risk. The story notes "packTypeValues Zod enum requires exact DB enum
      string matches" as a risk — this risk is real and the story's own architecture section
      violates it (see internal_consistency). Caching risks are explicit. No auth or infra risks
      (none apply).

  - id: story_sizing
    status: PASS
    note: >
      8 ACs (exactly at the limit), backend-only (touches_frontend: false), touches 1 TypeScript
      package + 7 markdown agent files. The markdown edits are low-complexity additions (append
      a section). ST-3 touches 3 .agent.md files (at the file-count limit but these are markdown,
      not complex code). The story is appropriately sized for its scope. No split required.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      Subtasks are well-structured with dependency chains, estimated tokens, and verification
      commands. However:
      1. ST-2 (update packTypeValues) is based on the false premise identified in internal_consistency
         — it will need to be corrected before execution to add only 'agent_missions' (which is
         already in the DB enum per migration 0033, so may already be present or just needs
         confirmation).
      2. ST-3 reads and modifies 3 .agent.md files — exactly at the 3-file limit. Acceptable.
      3. ST-6 references 'plans/future/platform/wint/backlog/WINT-2110/WINT-2110.md' but the
         story is in 'elaboration/', not 'backlog/'. The file path in ST-1 and ST-6 is wrong.
      4. Each subtask has a verification command. AC coverage is complete.
      5. The pack type notation used in ST-3/ST-4/ST-5 ('project-conventions/main',
         'blockers-known/main', 'lib-react19/main') is ambiguous — it looks like packType/packKey
         but the actual calls need packType and packKey as separate fields with corrected values.

gaps:
  - id: gap-1
    check: internal_consistency
    finding: >
      AC-7 and ST-2 specify adding 'project-conventions', 'blockers-known', 'lib-react19',
      'lib-tailwind', 'lib-zod', 'lib-vitest' as new packType enum values. These do NOT exist
      in the DB enum and the upstream stories (WINT-2030, WINT-2050, WINT-2060) explicitly use
      existing packTypes with distinct packKeys instead. Adding these strings to packTypeValues
      would create a Zod enum that allows values the DB rejects, causing runtime failures when
      agents attempt context_cache_get() calls with these pack type strings. The entire AC-7/ST-2
      scope must be corrected: the only genuinely new pack type is 'agent_missions' (WINT-2040),
      and migration 0033 already adds it to the DB enum. The packTypeValues array update should
      add only 'agent_missions', and agent sections should reference correct packType+packKey pairs.
    severity: critical
    decision: add_ac
    ac_added: "AC-9: Correct packType/packKey mapping — only 'agent_missions' is a new packType enum value"

  - id: gap-2
    check: internal_consistency
    finding: >
      Agent cache integration sections in ST-3/ST-4/ST-5 specify incorrect packType values
      for the content they intend to retrieve. For example: pm-bootstrap-setup-leader should
      query packType 'architecture' packKey 'project-conventions' (not 'project-conventions/main'),
      and elab-analyst should query packType 'lessons_learned' packKey 'blockers-known' (not
      'blockers-known/main'). Using the incorrect packType strings will cause Zod validation
      to fail when context_cache_get() is called, defeating the entire story purpose.
    severity: critical
    decision: add_ac
    ac_added: "AC-10: All agent sections must use correct packType+packKey pairs per upstream stories"

  - id: gap-3
    check: subtask_decomposition
    finding: >
      ST-1 and ST-6 reference the story file as 'plans/future/platform/wint/backlog/WINT-2110/
      WINT-2110.md' but the story is currently in 'elaboration/' stage. When the story moves
      to in-progress for execution, the path will be different again. The subtask should
      reference the story via a stage-agnostic path or instruct the executor to locate the
      current path dynamically.
    severity: medium
    decision: log_to_kb
    ac_added: null
    kb_entry_id: "654c9c26-132b-43c4-9aa0-648d5a38046b"

  - id: gap-4
    check: scope_alignment
    finding: >
      The story title says "5 High-Volume Agents" but modifies 7 .agent.md files. This is
      not a functional gap but creates confusion in tooling that reads story titles for
      scope estimation (e.g., story sizing heuristics). The Scope section correctly explains
      the 5-workflow / 7-file distinction, but AC-2 and AC-4 explicitly count "7 target agent
      files" while HP-3, HP-4, HP-5, HP-6, MC-1 reference "5 agents". The ACs and test plan
      are inconsistent with each other on the count (some say 5, some say 7).
    severity: low
    decision: log_to_kb
    ac_added: null
    kb_entry_id: "a5a35b2f-a805-43f8-9466-88ce045dbfc7"

