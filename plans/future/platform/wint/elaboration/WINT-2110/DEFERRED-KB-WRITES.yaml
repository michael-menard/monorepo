deferred_at: "2026-03-03"
reason: "psql not available in environment at story generation time"
retry_when: "KB connection available"
writes:
  - type: sql
    table: stories
    operation: upsert
    sql: |
      INSERT INTO stories (
        story_id, feature, title, story_dir, story_file, story_type,
        points, priority, state, touches_backend, touches_frontend,
        touches_database, touches_infra
      ) VALUES (
        'WINT-2110',
        'wint',
        'Update 5 High-Volume Agents to Query Context Cache',
        'plans/future/platform/wint/backlog/WINT-2110',
        'plans/future/platform/wint/backlog/WINT-2110/WINT-2110.md',
        'feature',
        5,
        'high',
        'backlog',
        true,
        false,
        false,
        false
      )
      ON CONFLICT (story_id) DO UPDATE SET
        title = EXCLUDED.title,
        story_dir = EXCLUDED.story_dir,
        story_file = EXCLUDED.story_file,
        story_type = EXCLUDED.story_type,
        points = EXCLUDED.points,
        priority = EXCLUDED.priority,
        state = EXCLUDED.state,
        touches_backend = EXCLUDED.touches_backend,
        touches_frontend = EXCLUDED.touches_frontend,
        touches_database = EXCLUDED.touches_database,
        touches_infra = EXCLUDED.touches_infra;
