architectural_decisions:
  - id: ARCH-001
    question: 'AC-006 archive: separate table or status flag on active table?'
    decision: Use status='archived' on active wint.workflow_checkpoints table
    rationale: 'Avoids new table and migration. Existing status column accepts text. HP-5 query: WHERE status=''archived''.'
    decided_by: plan_leader
  - id: ARCH-002
    question: 'PHASE_TO_CHECKPOINT_MAP key type: integer or Phase string?'
    decision: Phase string keys (Record<Phase, string>) — not integers
    rationale: >-
      CheckpointSchema.current_phase is a Phase string enum. Integers were a misleading reference. Grounded in actual
      schema.
    decided_by: plan_leader
  - id: ARCH-003
    question: Next migration number?
    decision: 0034 (not 0033 as stated in story — 0033 already exists). MVP does NOT need a migration due to ARCH-001 decision.
    rationale: 'Verified via ls: 0033_wint_2040_agent_missions_enum.sql exists. ARCH-001 eliminates need for any migration.'
    decided_by: plan_leader
complexity: complex
