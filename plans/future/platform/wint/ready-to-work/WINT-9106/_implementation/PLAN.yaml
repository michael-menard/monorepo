schema: 2
story_id: WINT-9106
timestamp: '2026-03-06T21:30:00Z'
subtask_source: story
gap_resolutions:
  GAP-001:
    title: Cold-store archive table undefined
    decision: Use status='archived' on active wint.workflow_checkpoints table (no new table or migration needed)
    rationale: >-
      Existing status column accepts text values; 'archived' is a valid new status. Avoids migration complexity. HP-5
      query: WHERE status='archived'.
  GAP-002:
    title: PHASE_TO_CHECKPOINT_MAP entries ungrounded
    decision: >-
      Map uses Phase string keys (not integers). Mapping: setup->initialize, plan->seed, execute->synthesis,
      proof->save_to_db, review->hitl, fix->seed, qa-setup->gap_hygiene, qa-verify->readiness_scoring,
      qa-complete->complete, done->complete
    rationale: >-
      CheckpointSchema uses Phase string enum; story-creation.ts node names verified from source. HP-6 test inputs:
      (setup, initialize), (plan, seed), (execute, synthesis).
