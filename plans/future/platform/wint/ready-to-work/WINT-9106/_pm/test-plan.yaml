strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
happy_path_tests:
  - id: HP-1
    title: "State serialization round-trip — serialize then deserialize yields identical object"
    setup: "Construct a synthetic StoryCreationStateAnnotation object with known field values (storyId, epicPrefix, routingFlags, errors array, node execution history)"
    action: "Serialize state via checkpointer's serialize(), then deserialize() the result"
    expected: "Deserialized object deeply equals original object; no fields dropped or coerced"
    evidence: "Vitest assertion: expect(deserialize(serialize(state))).toEqual(state)"

  - id: HP-2
    title: "Checkpoint write on node completion — checkpoint row persisted after each node"
    setup: "Configure a test LangGraph graph with 3 nodes using the checkpointer; run graph to completion"
    action: "Execute graph with a known thread_id"
    expected: "DB contains checkpoint rows for each completed node; latest checkpoint matches final state"
    evidence: "Query wint.workflow_checkpoints WHERE execution_id = <test_thread_id> — row count equals node count"

  - id: HP-3
    title: "Graph resumes from last checkpoint — completed nodes not re-executed"
    setup: "Run graph to node 2 of 3, then simulate abort (throw AbortError from node 3 test hook)"
    action: "Call resume-graph --thread-id <id>; graph should resume from node 3 checkpoint"
    expected: "Node 1 and node 2 NOT re-executed; node 3 executes and graph completes; final state identical to uninterrupted run"
    evidence: "Execution counter on node 1 and node 2 = 1 (not 2); final state deep-equals expected"

  - id: HP-4
    title: "resume-graph CLI completes successfully and outputs progress"
    setup: "Interrupted graph checkpoint in DB with thread_id=test-123"
    action: "Run: npx tsx packages/backend/orchestrator/src/cli/resume-graph.ts --thread-id test-123"
    expected: "CLI outputs: thread ID, checkpoint timestamp, phase being resumed from, final outcome (success)"
    evidence: "CLI exit code 0; stdout contains thread_id, timestamp, phase name, 'COMPLETE'"

  - id: HP-5
    title: "Checkpoint TTL cleanup archives checkpoints older than CHECKPOINT_TTL_DAYS"
    setup: "Insert test checkpoint rows with created_at set to 8 days ago; CHECKPOINT_TTL_DAYS=7"
    action: "Run cleanup job"
    expected: "Rows older than 7 days are moved to archive table or marked archived=true; NOT deleted"
    evidence: "Query active checkpoint table: 0 rows older than 7 days. Query archive: rows present with original data"

  - id: HP-6
    title: "resume_from phase number maps to correct LangGraph checkpoint"
    setup: "Graph with 5 nodes; legacy CHECKPOINT.yaml with resume_from: 3"
    action: "Translate phase number via documented mapping; verify thread checkpoint at phase 3 equivalent"
    expected: "Correct LangGraph thread_ts/checkpoint_id retrieved for phase 3; graph resumes from node at that phase"
    evidence: "Module exports PHASE_TO_CHECKPOINT_MAP; mapping tested with known inputs/outputs"

error_cases:
  - id: EC-1
    title: "Thread ID not found — resume-graph exits with error"
    setup: "Empty checkpoint table (or nonexistent thread_id)"
    action: "Run: resume-graph --thread-id nonexistent-id"
    expected: "CLI exits with code 1; logs error 'No checkpoint found for thread ID: nonexistent-id'"
    evidence: "Process.exitCode = 1; @repo/logger.error called with thread_id in context"

  - id: EC-2
    title: "DB unavailable during checkpoint write — error propagates without silent data loss"
    setup: "Mock getPool() to throw connection error during checkpoint write"
    action: "Execute graph node that triggers checkpoint write"
    expected: "Error is logged via @repo/logger; checkpoint write failure is surfaced (not silently dropped)"
    evidence: "logger.error called; node does not continue as if checkpoint succeeded"

  - id: EC-3
    title: "Corrupted checkpoint payload — deserialization fails with clear error"
    setup: "Insert row in wint.workflow_checkpoints with state='malformed json'"
    action: "Attempt to restore graph from checkpoint"
    expected: "Zod safeParse returns error; @repo/logger.error logs 'Invalid checkpoint payload'; resumption aborted cleanly"
    evidence: "logger.error called with parse error details; no partial state restoration"

  - id: EC-4
    title: "Rollback intent recorded after node failure with partial side effects"
    setup: "Configure node to write artifact to DB then throw error"
    action: "Execute node; observe checkpoint after failure"
    expected: "Checkpoint payload includes rollback_actions: [{type: 'compensate', node: '...', artifact_id: '...'}]"
    evidence: "DB row state JSONB contains rollback_actions array; compensating transaction not executed"

edge_cases:
  - id: ED-1
    title: "Checkpoint write with max: 1 connection pool — no connection starvation"
    setup: "Use @repo/db getPool() with connection pool max=1; execute 10 sequential checkpoint writes"
    action: "Run benchmark: 10 nodes with checkpointing, measure p50/p99 write latency"
    expected: "p99 checkpoint write latency < 50ms; no ECONNRESET or pool exhaustion errors"
    evidence: "Benchmark test outputs latency metrics; no error logs during execution"

  - id: ED-2
    title: "CHECKPOINT_TTL_DAYS env var override — cleanup respects custom retention"
    setup: "CHECKPOINT_TTL_DAYS=1; checkpoint created 2 days ago"
    action: "Run cleanup job"
    expected: "Checkpoint archived (not deleted); respects 1-day TTL from env var"
    evidence: "Archived row present; active row absent"

  - id: ED-3
    title: "Retry count persisted in checkpoint payload across retry attempts"
    setup: "Node configured to fail 2 times then succeed; withNodeRetry wraps the node"
    action: "Execute node until success on 3rd attempt"
    expected: "Final checkpoint payload shows retry_counts: {'node-name': 2}"
    evidence: "DB state JSONB contains retry_counts with correct node key and value"

  - id: ED-4
    title: "Concurrent thread IDs do not interfere — isolated checkpoint namespacing"
    setup: "Run two graph instances simultaneously with different thread IDs"
    action: "Each instance completes; read checkpoints for each thread"
    expected: "Checkpoints are isolated by thread_id; no cross-contamination of state"
    evidence: "WHERE thread_id = 'thread-A' returns only thread-A rows; vice versa"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "wint.workflow_checkpoints rows written per completed node"
      - "state JSONB contains: node_history, state_snapshot, retry_counts, error_context"
      - "state JSONB contains rollback_actions array on node failure"
      - "archived checkpoints present in archive table after TTL"
      - "resume-graph CLI exit code 0 on success, 1 on error"

manual_cases:
  - id: MC-1
    title: "End-to-end crash recovery — real DB integration"
    steps:
      - "Start story-creation graph with test storyId via CLI"
      - "After first 2 nodes complete, kill the process (Ctrl+C or SIGTERM)"
      - "Run: resume-graph --thread-id <captured-id>"
      - "Verify graph continues from node 3 and completes"
    expected: "Final OUTCOME.yaml matches an uninterrupted run of the same graph"

fixture_definitions:
  - name: testCheckpointRow
    type: SQL insert
    description: "wint.workflow_checkpoints row with synthetic state JSONB, created_at, execution_id FK"
  - name: testExecutionRow
    type: SQL insert
    description: "wint.workflow_executions row for the test thread_id"
  - name: archivedCheckpointRow
    type: SQL insert
    description: "Checkpoint row with created_at 8 days ago for TTL cleanup tests"

risks:
  - "AC-007 crash simulation requires either a real process kill (fragile in CI) or a test hook (AbortError throw) — the AbortError approach is recommended but must be verified to trigger checkpoint flush before abort"
  - "Integration tests depend on WINT-0070 migration being applied to lego_dev — test setup must verify tables exist before running"
  - "If native PostgresSaver is used, test setup must call PostgresSaver.setup() before all tests — ensure idempotency"
  - "Connection pool max=1 may cause test flakiness if tests run in parallel with shared pool — tests should be serial or use isolated pool instances"
  - "Migration numbering: next migration after 0032 must be verified at implementation time to avoid collision"
