feasible: true
confidence: medium
rationale: >
  The story is implementable but has two hard blockers (WINT-9105 ADR, WINT-0070 DB migration)
  and one upfront architectural decision (native PostgresSaver vs. custom repository) that must
  be resolved before implementation begins. The native PostgresSaver path is lower risk because
  @langchain/langgraph-checkpoint-postgres handles schema migrations internally; the custom path
  requires implementing the full BaseCheckpointSaver interface and managing DB migrations manually.
  Neither @langchain/langgraph-checkpoint-postgres is present in orchestrator/package.json yet —
  adding it is a one-line pnpm add, but the team must validate version compatibility with
  @langchain/langgraph ^0.2.0. The connection pool constraint (max: 1) is a real risk for
  checkpoint write latency in Lambda; async fire-and-forget writes are viable but require
  care around Lambda lifecycle (cold start, in-flight writes on SIGTERM).
complexity: high
change_surface:
  areas:
    - packages/backend/orchestrator/src/checkpointer/       # new module
    - packages/backend/orchestrator/src/cli/                # resume-graph CLI
    - packages/backend/orchestrator/src/graphs/story-creation.ts  # wire checkpointer into compile()
    - packages/backend/database-schema/src/schema/wint.ts   # extend workflowCheckpoints if custom approach
    - packages/backend/database-schema/src/migrations/app/  # new migration if custom approach (next: 0033)
  endpoints: []
  deploy_touchpoints:
    - "pnpm add @langchain/langgraph-checkpoint-postgres --filter @repo/orchestrator (if native approach)"
    - "Apply WINT-0070 migration to lego_dev before running integration tests"
    - "Set CHECKPOINT_TTL_DAYS env var in Lambda environment config"
risks:
  - finding: "@langchain/langgraph-checkpoint-postgres not installed — version compatibility with @langchain/langgraph ^0.2.0 unverified"
    mitigation: "Run pnpm add @langchain/langgraph-checkpoint-postgres@latest; verify peer deps align with @langchain/langgraph ^0.2.0 before committing to native approach. If incompatible, use custom BaseCheckpointSaver subclass against wint.workflow_checkpoints."
  - finding: "WINT-0070 DB migration not yet applied — workflow_checkpoints and workflow_executions tables may not exist in lego_dev"
    mitigation: "Integration tests (AC-007) must verify tables exist in test setup; add a pretest check that queries INFORMATION_SCHEMA.tables. If WINT-0070 is still pending, integration tests will fail — must coordinate with WINT-0070 implementer."
  - finding: "Connection pool max: 1 per Lambda creates checkpoint write latency risk — synchronous write per node could add 20-100ms per node in worst case"
    mitigation: "Benchmark write latency in ED-1 test. If p99 > 50ms, implement configurable async checkpointing (fire-and-forget with Promise queue) for non-critical nodes. Synchronous checkpoint must remain for side-effecting nodes (AC-004 rollback intent)."
  - finding: "BaseCheckpointSaver interface requirements for custom approach — full interface implementation is ~300 LOC including list(), get(), put(), putWrites() methods"
    mitigation: "If custom approach chosen, stub non-critical methods (list(), putWrites()) with notImplemented() errors in MVP; implement only get() and put() for AC-001/AC-002. Document stubs as tech debt."
missing_requirements:
  - "Which approach (native PostgresSaver vs. custom BaseCheckpointSaver) is the ADR choice from WINT-9105 — story cannot be implemented without this decision"
  - "Confirm whether retry_count and error_context fields go inside state JSONB or as new columns on wint.workflow_checkpoints — affects migration scope"
evidence_expectations:
  - "pnpm check-types --filter @repo/orchestrator passes with no errors"
  - "pnpm test --filter @repo/orchestrator — all new tests pass including integration tests against lego_dev"
  - "Benchmark test output shows p50/p99 checkpoint write latency"
  - "resume-graph CLI executable via: npx tsx packages/backend/orchestrator/src/cli/resume-graph.ts --thread-id <id>"
  - "DB query proof: wint.workflow_checkpoints rows present after test graph execution"
subtasks:
  - id: ST-1
    title: "Verify/install @langchain/langgraph-checkpoint-postgres and decide checkpointer approach"
    goal: "Resolve the native PostgresSaver vs. custom BaseCheckpointSaver decision upfront; update package.json if native approach chosen"
    files_to_read:
      - packages/backend/orchestrator/package.json
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - packages/backend/orchestrator/package.json
    acs: ["AC-001"]
    depends_on: none
    verification: "pnpm install --filter @repo/orchestrator succeeds; pnpm check-types --filter @repo/orchestrator passes"
    estimated_tokens: 4000

  - id: ST-2
    title: "Implement Checkpointer module — serialize/restore + checkpoint write per node"
    goal: "Create packages/backend/orchestrator/src/checkpointer/ with CheckpointerSchema (Zod), CheckpointRepository (or PostgresSaver wrapper), and withCheckpointer() factory that wraps graph.compile({ checkpointer })"
    files_to_read:
      - packages/backend/orchestrator/src/graphs/story-creation.ts
      - packages/backend/orchestrator/src/db/workflow-repository.ts
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - packages/backend/orchestrator/src/checkpointer/index.ts
      - packages/backend/orchestrator/src/checkpointer/checkpoint-repository.ts
      - packages/backend/orchestrator/src/checkpointer/schemas.ts
    acs: ["AC-001", "AC-002", "AC-003"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/orchestrator; pnpm test --filter @repo/orchestrator -- checkpointer/serialize"
    estimated_tokens: 18000

  - id: ST-3
    title: "Wire checkpointer into story-creation graph compile()"
    goal: "Inject checkpointer into graph.compile({ checkpointer }) in story-creation.ts; ensure existing loadFromDb/saveToDb persistence nodes are not replaced or bypassed"
    files_to_read:
      - packages/backend/orchestrator/src/graphs/story-creation.ts
      - packages/backend/orchestrator/src/nodes/persistence/
    files_to_modify:
      - packages/backend/orchestrator/src/graphs/story-creation.ts
      - packages/backend/orchestrator/src/checkpointer/index.ts
    acs: ["AC-002"]
    depends_on: ST-2
    verification: "pnpm check-types --filter @repo/orchestrator; existing story-creation graph tests still pass"
    estimated_tokens: 8000

  - id: ST-4
    title: "Implement rollback intent recording — compensating transaction plan in checkpoint payload"
    goal: "When a node fails after partial side effects, write rollback_actions descriptor to checkpoint payload (AC-004). Not executing compensating transactions — only recording intent."
    files_to_read:
      - packages/backend/orchestrator/src/checkpointer/schemas.ts
      - packages/backend/orchestrator/src/runner/retry.ts
    files_to_modify:
      - packages/backend/orchestrator/src/checkpointer/schemas.ts
      - packages/backend/orchestrator/src/checkpointer/checkpoint-repository.ts
    acs: ["AC-004"]
    depends_on: ST-2
    verification: "pnpm test -- checkpointer/rollback; checkpoint payload contains rollback_actions array after node failure"
    estimated_tokens: 6000

  - id: ST-5
    title: "Implement resume-graph CLI command"
    goal: "Create packages/backend/orchestrator/src/cli/resume-graph.ts — accepts --thread-id, queries latest checkpoint from DB, restores graph state, continues execution from interrupted node"
    files_to_read:
      - packages/backend/orchestrator/src/checkpointer/index.ts
      - packages/backend/orchestrator/src/graphs/story-creation.ts
      - packages/backend/orchestrator/src/db/workflow-repository.ts
    files_to_modify:
      - packages/backend/orchestrator/src/cli/resume-graph.ts
    acs: ["AC-005"]
    depends_on: ST-3
    verification: "npx tsx packages/backend/orchestrator/src/cli/resume-graph.ts --help exits 0; --thread-id nonexistent exits 1 with error message"
    estimated_tokens: 10000

  - id: ST-6
    title: "Implement checkpoint TTL cleanup — auto-archive checkpoints older than CHECKPOINT_TTL_DAYS"
    goal: "Add archival logic (not deletion): checkpoints older than CHECKPOINT_TTL_DAYS (default 7) are moved to archive table or flagged archived=true. Configurable via env var."
    files_to_read:
      - packages/backend/orchestrator/src/checkpointer/checkpoint-repository.ts
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - packages/backend/orchestrator/src/checkpointer/checkpoint-cleanup.ts
      - packages/backend/orchestrator/src/cron/  # or wherever cron jobs are wired
    acs: ["AC-006"]
    depends_on: ST-2
    verification: "pnpm test -- checkpointer/cleanup; rows older than TTL archived in test DB"
    estimated_tokens: 8000

  - id: ST-7
    title: "Implement resume_from phase mapping — legacy CHECKPOINT.yaml semantics to LangGraph thread checkpoint"
    goal: "Export PHASE_TO_CHECKPOINT_MAP constant and translatePhaseToCheckpoint(phase: number, threadId: string) function; document the mapping in module README or inline JSDoc"
    files_to_read:
      - packages/backend/orchestrator/src/checkpointer/index.ts
      - packages/backend/orchestrator/src/graphs/story-creation.ts
    files_to_modify:
      - packages/backend/orchestrator/src/checkpointer/phase-mapping.ts
    acs: ["AC-008"]
    depends_on: ST-2
    verification: "pnpm test -- checkpointer/phase-mapping; unit tests verify known phase numbers map to correct graph node names"
    estimated_tokens: 5000

  - id: ST-8
    title: "Integration test — crash recovery proof against real lego_dev DB"
    goal: "Write integration test that: (1) starts story-creation graph, (2) aborts at node 3 via AbortError test hook, (3) resumes via resume-graph, (4) asserts final state equals uninterrupted run. Uses DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev"
    files_to_read:
      - packages/backend/orchestrator/src/checkpointer/index.ts
      - packages/backend/orchestrator/src/cli/resume-graph.ts
      - packages/backend/orchestrator/src/__tests__/
    files_to_modify:
      - packages/backend/orchestrator/src/__tests__/integration/checkpointer-crash-recovery.test.ts
    acs: ["AC-007"]
    depends_on: ST-5
    verification: "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lego_dev pnpm test -- checkpointer-crash-recovery -- PASS"
    estimated_tokens: 12000
