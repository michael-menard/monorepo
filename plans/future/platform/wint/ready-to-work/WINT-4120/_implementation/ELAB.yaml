audit:
  - id: scope_alignment
    status: PASS
    note: >
      Scope is tightly bounded to two markdown command files:
      .claude/commands/dev-implement-story.md and .claude/commands/qa-verify-story.md.
      No TypeScript, no migrations, no new packages, no infrastructure. Stated scope
      matches the story's declared change_surface exactly. No scope creep detected.

  - id: internal_consistency
    status: PASS
    note: >
      Goals and Non-goals are coherent. Non-goals explicitly exclude agent authoring
      (already done), hard gates (advisory-only v1.0), and unrelated commands. ACs
      map directly to the Goal. Signal routing tables in Architecture Notes match the
      ACs (AC-4 maps to GRAPH-CHECKER BLOCKED routing; AC-5 maps to EVIDENCE-JUDGE
      BLOCKED routing; AC-6 maps to FAIL verdict handling; AC-7 maps to INCOMPLETE-BLOCKED
      advisory). The --skip-cohesion flag pattern referenced in Architecture Notes is
      consistent with the --skip-worktree precedent cited in Reuse Plan. The
      test plan and its happy/error/edge cases align with the ACs.

  - id: reuse_first
    status: PASS
    note: >
      No new packages introduced. Story extends existing patterns (phase/step blocks,
      Task tool spawn, signal-based coordination, graceful degradation flag). References
      --skip-worktree as the canonical flag pattern. Reuse Plan section is explicit and
      accurate.

  - id: ports_adapters
    status: PASS
    note: >
      This is a docs-only story with no TypeScript code. No ports/adapters compliance
      issue applies. The spawned agents (graph-checker, cohesion-prosecutor,
      evidence-judge) each have their own ports/adapters contracts verified in their
      respective agent files. WINT-4120 only adds spawn hooks in orchestrator command
      files, which are not subject to API layer architecture rules.

  - id: testability
    status: PASS
    note: >
      Test plan is thorough. Five happy-path tests, four error cases, three edge cases,
      two manual smoke tests, and fixture definitions are all specified. Fixture files
      (graph-check-results.json, prosecution-verdict.json, ac-verdict.json variants) are
      well-defined. ADR-005 and ADR-006 citations are correct (manual+integration
      strategy, no E2E required). The "verification" field in each subtask is
      concrete and executable.

  - id: decision_completeness
    status: PASS
    note: >
      No blocking TBDs found. Two advisory conflicts are noted in the Reality Baseline
      (WINT-4070 and WINT-4090 not yet fully released; WINT-4110 deferred) and both
      have explicit mitigations (degrade gracefully; spawn directly rather than via
      /cohesion-check). The cohesion-prosecutor dependency is correctly flagged as a
      practical (non-hard) dependency with documented fallback behavior.

  - id: risk_disclosure
    status: WARN
    note: >
      Primary risks are disclosed: WINT-4070/WINT-4090 release dependency, and
      dev-implement-story production impact. However, one additional risk is not
      explicitly surfaced: the signal routing table in Architecture Notes does not
      include an explicit row for "GRAPH-CHECKER COMPLETE WITH WARNINGS + no violations"
      (i.e., degradation path producing WARNINGS but empty violations array). The story
      implies this continues to cohesion-prosecutor, but this routing decision is not
      stated explicitly, leaving ambiguity for the implementer. Not MVP-blocking
      (the story's graceful degradation intent is clear), but warrants a note. Also,
      cohesion-prosecutor.agent.md does not currently exist on disk (WINT-4070 has
      not been released/merged) — ST-2 lists it as files_to_read, which will fail
      unless WINT-4070 is resolved first.

  - id: story_sizing
    status: PASS
    note: >
      3 story points. 2 files modified. 9 ACs. 4 subtasks. No TypeScript code.
      No frontend. No backend. Does not trigger any story_sizing split indicators
      (< 8 ACs effective scope, < 5 endpoints, no dual frontend+backend, no packages).
      Story is appropriately sized.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      Overall decomposition is sound: ST-1 → ST-2 (dependency chain) and ST-3 (independent),
      ST-4 (depends on ST-3). DAG has no cycles. All 9 ACs are explicitly covered in
      the AC-Subtask Coverage Check. However, one gap: ST-4 depends_on ST-3 but also
      touches dev-implement-story.md (which is the output of ST-1 and ST-2). The
      dependency chain should be ST-4 depends_on [ST-2, ST-3] to avoid ST-4
      reading a stale dev-implement-story.md. Additionally, ST-2 lists
      .claude/agents/cohesion-prosecutor.agent.md as files_to_read, but this file
      does not currently exist on disk — implementer must know to fetch it from
      the WINT-4070 story directory or wait for the story to merge. This is a
      documentation gap in ST-2 (should note: "read from WINT-4070 story elaboration
      if not yet merged to main"). Minor but warrants flagging as CONDITIONAL.

  - id: clarity_format
    status: PASS
    note: >
      All three required sections present: Goal, Examples, Edge Cases. Examples are
      concrete and include field-level detail (verdict values, file paths, advisory
      message format). Edge cases cover the three most likely degradation scenarios.
      Story is executable by small-context LLMs.

gaps:
  - id: gap-1
    check: risk_disclosure
    finding: >
      cohesion-prosecutor.agent.md does not exist on disk at time of analysis
      (WINT-4070 is in needs-code-review / not yet merged to main). ST-2 lists
      it as a required read file. If an implementer runs ST-2 before WINT-4070
      merges, the file will be absent and the subtask cannot be completed accurately.
      The story notes WINT-4070 as a practical dependency and mentions graceful
      degradation, but the subtask-level read dependency is not guarded against this
      state.
    severity: high
    decision: "resolved — added note to ST-2 directing implementer to check WINT-4070 worktree/branch or design graceful degradation for missing agent file"
    ac_added: null

  - id: gap-2
    check: risk_disclosure
    finding: >
      Signal routing table in Architecture Notes omits explicit routing for
      "GRAPH-CHECKER COMPLETE WITH WARNINGS: N warnings" when the decision is
      whether to proceed to cohesion-prosecutor spawn. The table shows this signal
      routes to "spawn cohesion-prosecutor; log warning" but the story's Edge Case 1
      (empty graph → COMPLETE WITH WARNINGS, "No prosecution phase warning") seems
      to contradict this — it implies cohesion-prosecutor should NOT be spawned when
      the graph is empty. The routing is internally inconsistent between the
      Architecture Notes signal table and Edge Case 1 text. Implementer needs
      clarification: does "COMPLETE WITH WARNINGS" always proceed to
      cohesion-prosecutor, or only when violations exist?
    severity: high
    decision: "resolved — clarified Edge Case 1 text to show that COMPLETE WITH WARNINGS always spawns cohesion-prosecutor (routing table is authoritative); prosecutor handles empty graph gracefully and produces clean verdict (no advisory surfaced)"
    ac_added: null

opportunities:
  - id: opp-1
    category: ux_polish
    finding: >
      The --skip-cohesion flag is referenced in Architecture Notes but not listed
      in the Flags table of dev-implement-story.md (the current command file has a
      flags table). ST-4 (documentation) should add this flag to the flags table,
      not just as inline prose. This would improve discoverability and consistency
      with the --skip-worktree flag pattern.
    effort: low
    decision: "logged — implementer should add --skip-cohesion to flags table in ST-4"
    kb_entry_id: null

  - id: opp-2
    category: observability
    finding: >
      The story does not define where cohesion/evidence-judge advisory messages are
      written when surfaced in review/evidence artifacts. The UI/UX Notes section
      provides a human-readable format example for advisory messages but does not
      specify whether the advisory goes into EVIDENCE.yaml, REVIEW.yaml, or a new
      field. The evidence-judge FAIL is said to go into "QA report" — specifying
      the exact KB artifact field or file path would make the integration more
      precise and prevent implementer interpretation variance.
    effort: low
    decision: "logged — non-blocking; implementer can use existing REVIEW.yaml advisory_notes field for dev and QA report warnings field for qa"
    kb_entry_id: null

  - id: opp-3
    category: edge_cases
    finding: >
      No test case covers the scenario where cohesion-prosecutor produces a
      "PROSECUTION COMPLETE" signal but the prosecution-verdict.json file is
      absent (write failure). This mirrors EC-2 (graph-check-results.json absent)
      and EC-4 (ac-verdict.json absent) but is missing for the prosecutor. A
      corresponding EC-5 would complete the graceful degradation coverage symmetry.
    effort: low
    decision: "logged — nice-to-have; existing graceful degradation pattern covers this implicitly"
    kb_entry_id: null

  - id: opp-4
    category: performance
    finding: >
      graph-checker and cohesion-prosecutor are currently specified as sequential
      spawns within Phase 2.5. Since cohesion-prosecutor depends on
      graph-check-results.json as optional input (not required), a future
      optimization could spawn them in parallel and have the prosecutor fall back
      gracefully if the graph-checker has not yet written its output. Not applicable
      for v1.0 but worth noting for WINT-4140 (Round Table) design.
    effort: high
    decision: "deferred — v2.0 optimization; sequential is correct for v1.0"
    kb_entry_id: null

  - id: opp-5
    category: observability
    finding: >
      The evidence-judge agent can emit "EVIDENCE-JUDGE COMPLETE WITH WARNINGS"
      (e.g., when EVIDENCE.yaml is missing). The qa-verify-story signal routing
      table in the story only shows COMPLETE and BLOCKED — it does not define
      how "COMPLETE WITH WARNINGS" from evidence-judge is handled at the
      qa-verify-story orchestrator level. Adding this to the signal routing
      table would make the integration complete and unambiguous.
    effort: low
    decision: "logged — implementer should add COMPLETE WITH WARNINGS row to evidence-judge signal routing table in ST-4"
    kb_entry_id: null

