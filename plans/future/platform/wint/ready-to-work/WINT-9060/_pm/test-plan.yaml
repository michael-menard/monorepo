strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
happy_path_tests:
  - id: HP-1
    title: "Graph compiles and returns expected exports"
    setup: "Import batch-process.ts module in Vitest"
    action: "Call createBatchProcessGraph({}) with default config"
    expected: "Returns a compiled LangGraph StateGraph without throwing; all exported symbols are defined"
    evidence: "typeof createBatchProcessGraph === 'function'; compiled graph does not throw on construction"
  - id: HP-2
    title: "Dispatcher fans out exactly N Send objects for N story IDs"
    setup: "Create dispatcher via createBatchProcessDispatcher({}) with state containing storyIds: ['WINT-001', 'WINT-002', 'WINT-003']"
    action: "Invoke dispatcher with that state"
    expected: "Returns array of 3 Send objects each pointing to 'story_worker' node"
    evidence: "result.length === 3; result.every(s => s instanceof Send && s.node === 'story_worker')"
  - id: HP-3
    title: "Fan-in aggregates results from parallel workers via append reducer"
    setup: "Mock two workers each returning a BatchWorkerResult with success: true"
    action: "Invoke createBatchProcessFanInNode() with state.workerResults containing both results"
    expected: "storiesSucceeded: 2, storiesFailed: 0 in final aggregate"
    evidence: "fan-in output contains correct success/failure counts; workerResults.length === 2"
  - id: HP-4
    title: "runBatchProcess completes successfully with stubbed sub-pipeline"
    setup: "Provide batchId='batch-001', storyIds=['WINT-001'], inject devImplementNode stub that always returns success"
    action: "await runBatchProcess({ batchId: 'batch-001', storyIds: ['WINT-001'], config: { devImplementNode: stubSuccess } })"
    expected: "Returns BatchProcessResult with success: true, storiesQueued: 1, storiesSucceeded: 1, storiesFailed: 0"
    evidence: "BatchProcessResultSchema.parse(result) does not throw"
  - id: HP-5
    title: "Logs graph_started and graph_completed with @repo/logger"
    setup: "Spy on logger.info calls during runBatchProcess invocation"
    action: "Run graph with valid config and stub workers"
    expected: "logger.info called with { event: 'graph_started' } and { event: 'graph_completed' } including batchId field"
    evidence: "loggerInfoSpy.mock.calls contains entries with event: 'graph_started' and 'graph_completed'"
error_cases:
  - id: EC-1
    title: "Per-story retry bounded by maxRetriesPerStory"
    setup: "Inject devImplementNode stub that always throws; config.maxRetriesPerStory = 2"
    action: "Run graph with storyIds: ['WINT-001']"
    expected: "Worker retries exactly maxRetriesPerStory times then marks story failed; storiesFailed: 1, storiesRetried >= 1"
    evidence: "BatchProcessResult.storiesFailed === 1; workerResults[0].retryCount === 2; no infinite loop"
  - id: EC-2
    title: "Graph logs graph_failed on unhandled exception"
    setup: "Force graph invocation to throw"
    action: "Call runBatchProcess with state that causes invocation failure"
    expected: "Returns BatchProcessResult with success: false; logger.error called with event: 'graph_failed'"
    evidence: "loggerErrorSpy called; result.success === false; result.errors.length > 0"
  - id: EC-3
    title: "Empty storyIds produces zero-story result without error"
    setup: "storyIds: []"
    action: "await runBatchProcess({ batchId: 'batch-empty', storyIds: [] })"
    expected: "Returns success: true, storiesQueued: 0, storiesSucceeded: 0, storiesFailed: 0"
    evidence: "BatchProcessResultSchema.parse(result) succeeds; no exceptions thrown"
edge_cases:
  - id: ED-1
    title: "Graceful skip when injectable nodes absent"
    setup: "Create graph without providing cohesionProsecutorNode, scopeDefenderNode, evidenceJudgeNode"
    action: "Run graph with one story ID"
    expected: "Graph completes; warnings array includes messages indicating injectable nodes not configured"
    evidence: "result does not crash; warnings contain stub skip messages"
  - id: ED-2
    title: "Retry succeeds on second attempt — storiesRetried count accurate"
    setup: "devImplementNode stub fails on attempt 1, succeeds on attempt 2; maxRetriesPerStory = 2"
    action: "Run graph with storyIds: ['WINT-001']"
    expected: "storiesSucceeded: 1, storiesRetried: 1, storiesFailed: 0"
    evidence: "workerResults[0].retryCount === 1; workerResults[0].success === true"
  - id: ED-3
    title: "Thread ID follows convention when checkpointer provided"
    setup: "Create graph with mock checkpointer and batchId='mybatch', attempt=3"
    action: "Invoke runBatchProcess with attempt: 3"
    expected: "Thread ID is 'mybatch:batch-process:3'"
    evidence: "Spy on graph.invoke configurable.thread_id; assert value matches convention"
tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "BatchProcessResultSchema.parse(result) passes without throw"
      - "All exported symbols are typeof function or ZodSchema"
      - "pnpm check-types --filter @repo/orchestrator exits 0"
      - "pnpm test --filter @repo/orchestrator -- graphs/__tests__/batch-process exits 0"
  frontend: null
manual_cases: []
fixture_definitions:
  - name: stubDevImplementSuccess
    type: function
    description: "Async function returning BatchWorkerResult with success: true, retryCount: 0"
  - name: stubDevImplementFail
    type: function
    description: "Async function throwing Error('stub failure') always"
  - name: stubDevImplementFailThenSucceed
    type: function
    description: "Stateful stub: throws on first call, returns success on second — for retry tests"
  - name: mockBatchState
    type: object
    description: "Minimal BatchProcessState with batchId, storyIds array, empty workerResults"
risks:
  - "WINT-9030/9040/9050 nodes not yet implemented — tests must use injectable stubs, never real node imports"
  - "Send API dispatcher is a conditional edge function not a node — test must verify it is wired as addConditionalEdges(START, ...) not addNode"
  - "append reducer on workerResults is critical — integration test must verify both worker results survive fan-in (not just last)"
