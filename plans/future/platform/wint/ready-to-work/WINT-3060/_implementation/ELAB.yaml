discovery_analysis:

  mvp_critical_gaps:
    - id: GAP-1
      severity: minor
      title: "WINT-0120 interface read is subtask-gated but not story-gated"
      finding: >
        ST-2 directs the implementer to read WINT-0120.md before writing the
        Implementation section, which is the correct approach. However, WINT-0120
        is currently in-progress and its tool interface (parameter names,
        return shape) may change before WINT-3060 reaches ready-to-work.
        The story correctly gates UAT on WINT-0120 reaching UAT, but does not
        gate implementation start on WINT-0120 reaching a stable interface
        (e.g., needs-code-review). If WINT-3060 moves to ready-to-work before
        WINT-0120 is stable, ST-2 could produce an incorrect Implementation
        section that must be revised during UAT.
      recommendation: >
        No story change required. The feasibility risk mitigation already states:
        "Gate implementation start on WINT-0120 reaching ready-for-code-review
        at minimum." This is adequate as a documented constraint. Implementer
        must honor this gate.
      blocking: false
      decision: defer
      decision_notes: "Already documented in feasibility risk mitigation. No AC needed."

    - id: GAP-2
      severity: minor
      title: "ST-4 file path references backlog/ not elaboration/"
      finding: >
        ST-4 files_to_read includes:
        "plans/future/platform/wint/backlog/WINT-3060/WINT-3060.md"
        The story is currently in elaboration/, not backlog/. This path will
        be stale by the time ST-4 executes (story will have moved to
        ready-to-work). A 404 on this read will not block ST-4 since the
        story file is also accessible from the final location, but it is a
        navigational inaccuracy in the subtask spec.
      recommendation: >
        During implementation, the implementer should read the story from its
        actual location rather than the stale backlog/ path. This is a minor
        navigational issue that does not affect deliverable quality.
      blocking: false
      decision: defer
      decision_notes: "Implementer will resolve at execution time. No story modification needed."

  non_blocking_opportunities:
    - id: OPP-1
      title: "Consider documenting --limit 0 behavior (show all rows)"
      finding: >
        The story documents --limit N overrides the 20-row default cap, but
        does not specify what --limit 0 means (show all, or error, or no-op).
        High-volume stories (50+ invocations) may prompt power users to attempt
        --limit 0 as a "show all" shorthand.
      recommendation: >
        Implementer can address this in the command file inline by documenting
        that --limit 0 is treated as "no limit" (show all rows) or "invalid input"
        per their judgment. Not required to unblock UAT.
      decision: log_to_kb
      decision_notes: "Non-blocking polish item. Logged for implementer awareness."

    - id: OPP-2
      title: "Signal format uses {reason} placeholder in TELEMETRY ERROR — should clarify valid reasons"
      finding: >
        AC-9 specifies TELEMETRY ERROR: {reason} as the error signal. EC-1 and
        ED-1 show specific reason values (service_unavailable). The command file
        could enumerate the known reason strings (service_unavailable,
        invalid_story_id, etc.) to make parsing by downstream tooling consistent.
      recommendation: >
        Implementer can document an enum of known reason values in the Error
        Handling section. Not a blocking gap — one known reason (service_unavailable)
        is already specified verbatim in AC-4 and EC-1.
      decision: log_to_kb
      decision_notes: "Non-blocking enhancement. One reason value already specified in ACs."

    - id: OPP-3
      title: "model-leaderboard.md uses type: utility-skill not type: utility"
      finding: >
        The story's Reuse Plan cites model-leaderboard.md for the frontmatter
        pattern, but model-leaderboard.md uses type: utility-skill while the
        story specifies type: utility for the new command (matching
        calibration-report.md). This is not an inconsistency in the story —
        type: utility is the correct choice as specified in AC-1 — but the
        implementer referencing model-leaderboard.md as the frontmatter pattern
        source should not copy its type field verbatim.
      recommendation: >
        ST-1 correctly lists both model-leaderboard.md and calibration-report.md
        as pattern sources. Implementer should take permission_level: docs-only
        from model-leaderboard.md and type: utility from calibration-report.md.
        This is a minor implementation-time note, not a story defect.
      decision: log_to_kb
      decision_notes: "Implementer awareness note. Story AC-1 already specifies correct type: utility."

