opportunities:
  - id: OPP-001
    note: >
      AC-9 requires canonical references section include `graph_get_capability_coverage.ts`,
      but the Test Plan grep for AC-9 does not test for `graph-get-capability-coverage` —
      only `graph-get-franken` and `rules-registry-get`. The verification command could
      produce a false-pass if the capability-coverage reference is omitted. Low-risk since
      the file is already in the Canonical References table and ST-1 files-to-read, but the
      grep could be tightened. Non-blocking.
  - id: OPP-002
    note: >
      The `spawned_by` frontmatter field is required by AC-1 and grep-tested by HP-1, but
      the story does not specify which agent spawns graph-checker (elab-completion-leader?
      cohesion-prosecutor?). The authoring agent will need to make this choice. Minor
      authoring ambiguity — document the likely spawner (e.g., elab-completion-leader or
      future cohesion-prosecutor) in the agent file to avoid a vague `spawned_by: TBD`.
      Non-blocking since the AC only requires the field exist.
  - id: OPP-003
    note: >
      AC-10 verification command uses `grep -c 'GRAPH-CHECKER'` and expects `>= 3`, but
      the three signals share the prefix, so false positives from inline mentions in other
      sections are possible. A tighter grep anchoring to the Completion Signals section
      would be more robust. Non-blocking — the structural check is sufficient for
      verification purposes.

