feasible: true
confidence: high
rationale: "All required infrastructure is in place: wint.rules table (WINT-4020), proposeRule/promoteRule/getRules API (@repo/sidecar-rules-registry), and direct-call patterns are established. The core work is authoring rule text definitions and wiring a seed script. The only design decision is AC-5 (upload/replace rule type), which is recommended as prompt_injection advisory to keep scope bounded and avoid requiring CRUD_STAGES extension."
complexity: low
change_surface:
  areas:
    - "packages/backend/sidecars/rules-registry/src/seeds/ (new seed script)"
    - "packages/backend/sidecars/rules-registry/ (package.json pnpm script entry)"
  endpoints:
    - "proposeRule() direct-call via @repo/sidecar-rules-registry"
    - "promoteRule() direct-call via @repo/sidecar-rules-registry"
    - "getRules() direct-call via @repo/sidecar-rules-registry"
  deploy_touchpoints:
    - "pnpm seed:cohesion-rules must be run once against target DB after deploy"
risks:
  - finding: "upload/replace lifecycle stages not in CRUD_STAGES — if stored as gate rule, cohesion sidecar cannot enforce it without extension"
    mitigation: "Store upload/replace rule as rule_type: prompt_injection (advisory) — no sidecar extension needed. Document decision in ELAB (AC-5)."
  - finding: "proposeRule() conflict detection is case-insensitive — duplicate rule text will be rejected without error being thrown; seed must handle conflict response"
    mitigation: "Check ok field of proposeRule() response; if ok: false and conflicting_ids present, log and skip promote for that rule."
missing_requirements: []
evidence_expectations:
  - "pnpm seed:cohesion-rules runs without error against test DB"
  - "getRules({ status: 'active' }) returns all 4 seeded rules with correct fields"
  - "Re-running seed is a no-op (idempotency verified by integration test)"
  - "Unit tests pass with mocked proposeRule/promoteRule"
subtasks:
  - id: ST-1
    title: "Define cohesion rule payloads (Zod schemas + rule text constants)"
    goal: "Author the 4 canonical rule definitions using ProposeRuleInputSchema from @repo/sidecar-rules-registry; no DB writes yet — pure data definitions"
    files_to_read:
      - "packages/backend/sidecars/rules-registry/src/__types__/index.ts"
      - "packages/backend/sidecars/cohesion/src/compute-check.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/seeds/cohesion-rules.ts (new)"
    acs: ["AC-1", "AC-5"]
    depends_on: "none"
    verification: "pnpm check-types --filter @repo/sidecar-rules-registry"
    estimated_tokens: 5000

  - id: ST-2
    title: "Implement seed script: propose → check conflict → promote lifecycle"
    goal: "Wire the seed script to call proposeRule() for each rule definition, handle conflict responses (idempotency), then call promoteRule() with source_story_id: 'WINT-4050'"
    files_to_read:
      - "packages/backend/sidecars/rules-registry/src/rules-registry.ts"
      - "packages/backend/mcp-tools/src/rules-registry/rules-registry-propose.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/seeds/cohesion-rules.ts"
    acs: ["AC-1", "AC-2", "AC-3"]
    depends_on: "ST-1"
    verification: "pnpm check-types --filter @repo/sidecar-rules-registry && pnpm lint --filter @repo/sidecar-rules-registry"
    estimated_tokens: 7000

  - id: ST-3
    title: "Add pnpm script entry and document invocation"
    goal: "Register seed:cohesion-rules in package.json of @repo/sidecar-rules-registry so the seed is invocable via pnpm"
    files_to_read:
      - "packages/backend/sidecars/rules-registry/package.json"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/package.json"
    acs: ["AC-8"]
    depends_on: "ST-2"
    verification: "pnpm seed:cohesion-rules --filter @repo/sidecar-rules-registry (dry-run or test DB)"
    estimated_tokens: 2000

  - id: ST-4
    title: "Write unit tests for seed script (happy path, idempotency, promote failure)"
    goal: "Unit-test the seed script with mocked proposeRule/promoteRule covering: all rules seeded (happy path), conflict on re-run (idempotency), promoteRule error handling"
    files_to_read:
      - "packages/backend/sidecars/rules-registry/src/seeds/cohesion-rules.ts"
      - "packages/backend/sidecars/rules-registry/src/__types__/index.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/seeds/__tests__/cohesion-rules.test.ts (new)"
    acs: ["AC-4", "AC-7"]
    depends_on: "ST-2"
    verification: "pnpm test --filter @repo/sidecar-rules-registry"
    estimated_tokens: 8000

  - id: ST-5
    title: "Write integration test verifying seed against live wint.rules table"
    goal: "Integration test that runs the seed against a real test DB wint.rules table, verifies getRules({ status: 'active' }) returns all 4 rules, verifies idempotency, and checks source_story_id"
    files_to_read:
      - "packages/backend/sidecars/rules-registry/src/seeds/cohesion-rules.ts"
      - "packages/backend/sidecars/rules-registry/src/rules-registry.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/seeds/__tests__/cohesion-rules.integration.test.ts (new)"
    acs: ["AC-2", "AC-3", "AC-6", "AC-7"]
    depends_on: "ST-4"
    verification: "pnpm test:integration --filter @repo/sidecar-rules-registry"
    estimated_tokens: 6000
