strategy: unit
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
happy_path_tests:
  - id: HP-1
    title: "Node produces scope-challenges.json with valid challenges for a complete story"
    setup: "Mock state with story_id, story_brief, acceptance_criteria (5 items, none MVP-critical), gap_analysis=null, role_pack_path=null"
    action: "Call scopeDefendNode with mocked state"
    expected: "scope-challenges.json written to {story_dir}/_implementation/scope-challenges.json with up to 5 challenges, truncated=false"
    evidence: "vi.spyOn(fs, 'writeFile') captures written JSON; parse and assert schema compliance"
  - id: HP-2
    title: "Node caps challenges at 5 and sets truncated=true when >5 candidates qualify"
    setup: "Mock state with 8 non-MVP-critical ACs, all qualifying as challenge candidates"
    action: "Call scopeDefendNode"
    expected: "scope-challenges.json contains exactly 5 challenges, truncated=true"
    evidence: "Assert challenges.length === 5 and challenges.truncated === true in written JSON"
  - id: HP-3
    title: "Node excludes MVP-critical items from challenges"
    setup: "Mock state with 3 ACs where 1 is marked MVP-critical in gap_analysis"
    action: "Call scopeDefendNode"
    expected: "MVP-critical AC is not present in scope-challenges.json challenge list"
    evidence: "Assert no challenge.ac_ref matches the MVP-critical AC id"
error_cases:
  - id: EC-1
    title: "Node gracefully degrades when gap_analysis is null"
    setup: "Mock state with gap_analysis=null; all other required fields present"
    action: "Call scopeDefendNode"
    expected: "Node executes to completion; warning_count incremented by 1; scope-challenges.json written"
    evidence: "Assert returned state.warning_count >= 1; verify writeFile was called"
  - id: EC-2
    title: "Node gracefully degrades when role_pack_path is null"
    setup: "Mock state with role_pack_path=null; all other required fields present"
    action: "Call scopeDefendNode"
    expected: "Node executes to completion; warning_count incremented by 1; scope-challenges.json written"
    evidence: "Assert returned state.warning_count >= 1; verify writeFile was called"
  - id: EC-3
    title: "Node overwrites existing scope-challenges.json on repeat runs"
    setup: "Mock writeFile to simulate pre-existing file; call node twice with same state"
    action: "Call scopeDefendNode twice"
    expected: "Second call overwrites first output; no error thrown; both calls succeed"
    evidence: "vi.spyOn(fs, 'writeFile') called twice; both calls resolve without rejection"
edge_cases:
  - id: ED-1
    title: "Node handles zero ACs gracefully"
    setup: "Mock state with acceptance_criteria=[]"
    action: "Call scopeDefendNode"
    expected: "scope-challenges.json written with challenges=[], truncated=false"
    evidence: "Assert challenges array is empty; writeFile called without error"
  - id: ED-2
    title: "Node handles all ACs being MVP-critical (no challengeable items)"
    setup: "Mock state with 3 ACs all marked MVP-critical in gap_analysis"
    action: "Call scopeDefendNode"
    expected: "scope-challenges.json written with challenges=[], truncated=false"
    evidence: "Assert challenges.length === 0; no exception thrown"
tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "scope-challenges.json conforms to schema from scope-defender.agent.md"
      - "challenges.length <= 5"
      - "truncated boolean matches whether candidates > 5"
      - "warning_count incremented for each missing optional input"
      - "pnpm test --filter @repo/orchestrator passes 0 failures"
manual_cases: []
fixture_definitions:
  - name: "completeStateFixture"
    type: "GraphState object"
    description: "Full state with story_id, story_brief, acceptance_criteria (5 items), gap_analysis, role_pack_path"
  - name: "sparseStateFixture"
    type: "GraphState object"
    description: "Minimal state with gap_analysis=null, role_pack_path=null"
  - name: "mvpCriticalStateFixture"
    type: "GraphState object"
    description: "State with 1 MVP-critical AC in gap_analysis to test exclusion"
  - name: "largeACStateFixture"
    type: "GraphState object"
    description: "State with 8 non-critical ACs to test truncation at 5"
risks:
  - "File I/O mock leakage between tests — use vi.restoreAllMocks() in afterEach"
  - "gap_analysis schema from scope-defender.agent.md must be stable before tests finalize"
  - "state field names must exactly match LangGraph porting notes"
