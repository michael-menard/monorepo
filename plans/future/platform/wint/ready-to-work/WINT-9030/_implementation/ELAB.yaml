gaps:
  - id: GAP-1
    severity: blocking
    category: missing-file
    description: >
      @repo/cohesion-sidecar is NOT listed as a dependency in
      packages/backend/orchestrator/package.json. The preferred implementation strategy
      (direct import of computeCheck, computeAudit, and Zod types from @repo/cohesion-sidecar)
      will fail at build time without this dependency. The orchestrator currently depends on
      @repo/database-schema, @repo/logger, @repo/mcp-tools, @repo/workflow-logic — but not
      @repo/cohesion-sidecar.
    recommendation: >
      Add "@repo/cohesion-sidecar": "workspace:*" to the dependencies section of
      packages/backend/orchestrator/package.json before beginning ST-2. This is a one-line
      change but it gates all subsequent import work.

  - id: GAP-2
    severity: warning
    category: api-mismatch
    description: >
      The Architecture Notes code example in the story shows the wrong argument order for
      createToolNode: `export const cohesionCheckNode = createToolNode(cohesionCheckImpl,
      defaultConfig)`. The actual API is createToolNode(name: string, implementation:
      NodeImplementation). The implementation pattern in attack.ts confirms:
      createToolNode('story_attack', async (state) => {...}). Using the story's example
      code verbatim will cause a TypeScript compilation error.
    recommendation: >
      Use the correct signature: createToolNode('cohesion_check', async (state: GraphState)
      => {...}). Disregard the story's architecture example code for the createToolNode call.
      The factory function createCohesionCheckNode should follow attack.ts's createAttackNode
      pattern exactly.

  - id: GAP-3
    severity: warning
    category: schema-gap
    description: >
      AC-4 requires GraphStateWithCohesionCheck as a z.object() Zod schema, but the gold
      standard reference (doc-sync.ts) and all sibling nodes (attack.ts, seed.ts,
      fanout-pm.ts, fanout-qa.ts) use TypeScript interfaces for their GraphStateWith*
      extension types. There is a codebase-wide pattern inconsistency. If code review
      follows the same reviewers who approved attack.ts with an interface, a z.object()
      approach might be flagged as inconsistent. However, CLAUDE.md is unambiguous: Zod
      schemas, never interfaces.
    recommendation: >
      Implement GraphStateWithCohesionCheckSchema as z.object() per CLAUDE.md and AC-4.
      Add a comment noting: "Using z.object() per CLAUDE.md Zod-first requirement (AC-4).
      Sibling nodes use TypeScript interfaces but this story follows the correct pattern."
      This also means the return type cast pattern used in attack.ts
      (`as Partial<GraphStateWithAttackAnalysis>`) will need to use
      `as Partial<z.infer<typeof GraphStateWithCohesionCheckSchema>>` or the inferred type
      alias.

  - id: GAP-4
    severity: warning
    category: api-mismatch
    description: >
      The story states WINT-4010 is in "failed-code-review" and WINT-9010 is "in-qa".
      Both dependencies are actually in UAT as of 2026-03-08. The dependency gate condition
      in the story ("WINT-4010 must reach ready-for-qa before finalizing import strategy")
      has been surpassed. The story's fallback strategy (self-contained copy with TODO
      comment) is no longer necessary. Using it anyway would introduce needless duplication.
    recommendation: >
      Use the direct import strategy: import computeCheck and computeAudit from
      @repo/cohesion-sidecar. Import Zod types from the same package. Do NOT copy the
      compute logic — WINT-4010 is stable in UAT.

  - id: GAP-5
    severity: info
    category: test-gap
    description: >
      The parity test (AC-14, ST-5, ED-3/MC-1) requires the cohesion sidecar running
      locally with a seeded graph DB. This is a manual verification step and is marked
      as "may be flaky in CI without proper setup" in the story's own risk list. The
      story counts AC-14 as covered by ST-5, but ST-5 has no automated test file — it
      is a manual verification step.
    recommendation: >
      Document AC-14 as satisfied by construction (node calls same computeCheck function
      as sidecar HTTP handler) and provide a manual test script or integration test that
      can be run locally. Mark in EVIDENCE.yaml that parity is architectural rather than
      requiring a live sidecar comparison in CI.

  - id: GAP-6
    severity: info
    category: missing-file
    description: >
      The story's reuse plan says to import DrizzleDb type. DrizzleDb is currently exported
      from both compute-check.ts and compute-audit.ts (both have their own `export type
      DrizzleDb = NodePgDatabase<any>`). This duplication means the cohesion node will need
      to import DrizzleDb from one of these files, or from drizzle-orm/node-postgres directly.
      There is no central DrizzleDb type in @repo/cohesion-sidecar's index.ts re-export —
      only the result types are re-exported, not DrizzleDb.
    recommendation: >
      Import DrizzleDb directly from drizzle-orm/node-postgres as NodePgDatabase<any> and
      define a local `type DrizzleDb = NodePgDatabase<any>` in the cohesion-check.ts node
      file. This avoids depending on an internal sidecar file path that bypasses the
      package's public exports field.

opportunities:
  - id: OPP-1
    category: reuse
    description: >
      Since WINT-4010 is in UAT and its index.ts explicitly exports computeCheck, computeAudit,
      CohesionCheckResultSchema, CohesionAuditResultSchema, CohesionStatusSchema, and
      CapabilityCoverageSchema, the implementation can be extremely clean: import everything
      needed from '@repo/cohesion-sidecar' (once the dependency is added to package.json).
      The inner compute functions become trivial wrappers adapting the calling convention.
    recommendation: >
      Keep the implementation minimal — the node's cohesionCheckImpl and cohesionAuditImpl
      can be one-liners delegating to computeCheck/computeAudit respectively. The value
      of this node is the LangGraph integration layer (state extension, createToolNode
      wrapping, updateState return), not the compute logic itself.

  - id: OPP-2
    category: simplification
    description: >
      The story defines two separate inner functions (cohesionCheckImpl and cohesionAuditImpl)
      but the story's GraphState extension puts both results in the same state object
      (cohesionCheck and cohesionAudit fields). The node handler could dispatch to one or
      the other based on whether featureId or packageName is present in config/state.
      This single-node-two-mode design is clean and matches how computeCheck vs computeAudit
      work in the sidecar.
    recommendation: >
      Implement the node with a single handler that inspects state/config: if featureId is
      present, run cohesionCheckImpl; if packageName is present, run cohesionAuditImpl; if
      both are absent, log a warning and return a no-op state update. This avoids needing
      two separate node exports for essentially the same functionality.

  - id: OPP-3
    category: test-improvement
    description: >
      The existing __tests__ directory contains 8 test files already following the injectable
      mock pattern. The cohesion-check test will be the first to use computeCheck/computeAudit
      mocks specifically. Consider creating a shared mock helper for DrizzleDb that can be
      reused by future tests in this directory.
    recommendation: >
      In cohesion-check.test.ts, define the mockDb factory clearly enough that it can serve
      as a pattern reference. No shared fixture file needed — just clear inline mock setup
      per test case, consistent with how the existing sibling test files work.

