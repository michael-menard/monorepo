writes:
  # Non-blocking gaps from FUTURE-OPPORTUNITIES.md

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Configurable per-codebase limit overrides for max_files and max_diff_lines"
    content: |
      - **Finding**: `max_files` (10) and `max_diff_lines` (300) defaults in `patch-plan.schema.json`
        are described as starting estimates; no config/override mechanism is designed.
      - **Impact**: Medium | **Effort**: Medium
      - **Recommendation**: Deferred to a future configuration story, potentially WINT-3xxx
        alongside Gatekeeper Sidecar. Current story establishes defaults only; per-codebase
        tuning is an explicit Non-Goal of WINT-0190.
    tags:
      - non-blocking
      - future-work
      - configuration
      - gatekeeper

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Runtime ordering enforcement for patch_type sequence (WINT-3010 scope)"
    content: |
      - **Finding**: JSON Schema draft 2020-12 cannot enforce ordered sequence of `patch_type`
        values in the `patches` array — ordering (`types_schema → api → ui → tests → cleanup`)
        is a documented convention only, not machine-enforced by the schema.
      - **Impact**: Medium | **Effort**: High
      - **Recommendation**: Runtime enforcement is explicitly WINT-3010 scope. Future option:
        Gatekeeper validation step that checks array order by `patch_type` sequence at
        commit/CI time. Could also explore `patternProperties` or `unevaluatedItems` constraints.
    tags:
      - non-blocking
      - integration
      - future-work
      - gatekeeper
      - schema-design

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Add minItems:1 constraint to patches array to prevent empty plans"
    content: |
      - **Finding**: No `minItems: 1` constraint on the `patches` array — a technically valid
        document with zero patches would pass schema validation without error.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Add `minItems: 1` to `patches` array definition. Very low effort,
        could be added by implementer during ST-1 without scope change. Deferred here as it
        is not AC-specified but would improve schema correctness.
    tags:
      - non-blocking
      - edge-case
      - schema-design
      - future-work

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Optional verification_command leaves patches without proof-of-completion signal"
    content: |
      - **Finding**: `verification_command` is optional per AC-1 spec — patches that omit it
        provide no proof-of-completion signal for the Gatekeeper at runtime.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Deferred to WINT-3010 which will enforce runtime validation rules.
        Future option: add a warning-level AJV annotation or custom validation rule if
        `verification_command` is absent from a patch step.
    tags:
      - non-blocking
      - edge-case
      - observability
      - future-work
      - gatekeeper

  # Enhancement opportunities from FUTURE-OPPORTUNITIES.md

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Add top-level description field to patch-plan.schema.json for human-readable summaries"
    content: |
      - **Finding**: `patch-plan.schema.json` has no top-level `description` field for
        human-readable plan summaries (e.g., "Add wishlist feature to main app").
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Add optional `description: string` to root object in a v1.1 schema
        bump. Consistent with `user-flows.schema.json` which includes `featureName`.
    tags:
      - non-blocking
      - ux-polish
      - enhancement
      - schema-design

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Add description fields to RepairLoop properties to guide implementers"
    content: |
      - **Finding**: No `$comment` or `description` fields on `RepairLoop.rerun_command` or
        other RepairLoop fields to guide implementers on valid values (e.g., `pnpm lint`,
        `pnpm check-types`).
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Add `description` fields inline in schema for each field. Zero
        schema-version change needed — purely informational annotations.
    tags:
      - non-blocking
      - ux-polish
      - enhancement
      - schema-design

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Add _specs/README.md index for pattern documentation discoverability"
    content: |
      - **Finding**: Pattern documentation files (`patch-queue-pattern.md`,
        `repair-loop-pattern.md`) will be standalone with no index; discoverability depends
        on knowing the file names.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Add a `_specs/README.md` index listing all spec files in a future
        pass. Potentially in scope for WINT-0210 which will add additional pattern docs.
    tags:
      - non-blocking
      - ux-polish
      - enhancement

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Create standalone validate-patch-plan.sh script to improve DX"
    content: |
      - **Finding**: AJV validation steps are documented inline in pattern docs but not
        as a standalone runnable script; developers must manually construct the ajv command.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Out of scope for WINT-0190 (no TypeScript/scripts). Could be
        added in WINT-3010 or as a standalone chore. Consider a `scripts/validate-patch-plan.sh`
        wrapper in `packages/backend/orchestrator/`.
    tags:
      - non-blocking
      - ux-polish
      - observability
      - enhancement

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Create patch-plan.full-example.json demonstrating all 5 patch_type steps"
    content: |
      - **Finding**: `patch-plan.example.json` is constrained to 10-25 lines to satisfy
        WINT-0210 AC-1 skeleton requirements. A richer full-example demonstrating all 5
        `patch_type` steps (types_schema, api, ui, tests, cleanup) would be more useful
        for documentation and onboarding.
      - **Impact**: Medium | **Effort**: Low
      - **Recommendation**: Create a separate `patch-plan.full-example.json` in
        `packages/backend/orchestrator/src/schemas/examples/` outside WINT-0190 scope.
        Future documentation story.
    tags:
      - non-blocking
      - ux-polish
      - enhancement

  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0190"
    category: future-opportunities
    subject: "WINT-0190: Add machine-readable schema_ref frontmatter to pattern documentation files"
    content: |
      - **Finding**: No machine-readable link between `patch-queue-pattern.md` and
        `patch-plan.schema.json` — the cross-reference is prose only, not navigable by tooling.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Future: add a YAML frontmatter `schema_ref` field to pattern docs
        linking to the canonical schema path. Would require `examples-framework.md` v1.1
        format update to establish the convention.
    tags:
      - non-blocking
      - future-work
      - integration
      - enhancement
