strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Keyword mapping produces correct lifecycle stage"
    setup: "Pure function with no DB dependency"
    action: "Call mapKeywordsToStages('create a new epic') and mapKeywordsToStages('view all features')"
    expected: "Returns 'create' for first, 'read' for second"
    evidence: "Unit test assertion on return value"

  - id: HP-2
    title: "Script inserts inferred capability rows with correct fields"
    setup: "DB with graph.features populated (WINT-4030 data), graph.capabilities empty"
    action: "Run infer-capabilities.ts without --dry-run"
    expected: "Rows inserted in graph.capabilities with feature_id FK set, lifecycle_stage in {create,read,update,delete}, capability_type='business', maturity_level='beta'"
    evidence: "SELECT count(*) FROM graph.capabilities WHERE maturity_level='beta' returns > 0"

  - id: HP-3
    title: "Structured summary emitted at end of run"
    setup: "DB with graph.features populated"
    action: "Run script and capture stdout"
    expected: "Output includes { attempted, succeeded, failed, skipped } object matching PopulateResultSchema"
    evidence: "Parse stdout JSON; Zod validation passes"

  - id: HP-4
    title: "--dry-run mode logs inferences without writing to DB"
    setup: "DB with graph.features populated, graph.capabilities empty"
    action: "Run infer-capabilities.ts --dry-run"
    expected: "Terminal shows dry-run table of would-be inserts; graph.capabilities remains empty"
    evidence: "SELECT count(*) FROM graph.capabilities returns 0 after dry-run"

  - id: HP-5
    title: "--validate flag prints capability coverage report after population"
    setup: "DB with graph.features and freshly-populated graph.capabilities"
    action: "Run infer-capabilities.ts --validate"
    expected: "Coverage report printed showing complete vs. incomplete CRUD coverage per feature"
    evidence: "Stdout includes 'CRUD coverage' or equivalent summary section"

error_cases:
  - id: EC-1
    title: "Zero features in graph.features causes early exit with clear warning"
    setup: "DB with graph.features empty (WINT-4030 not yet run)"
    action: "Run infer-capabilities.ts"
    expected: "Script exits with warning: 'No features found — run WINT-4030 script first'; exit code non-zero"
    evidence: "Unit test with mock DB returning empty features array; stderr contains expected message"

  - id: EC-2
    title: "Duplicate capability_name skipped (ON CONFLICT DO NOTHING)"
    setup: "graph.capabilities already has a row with name 'wint-create-inferred'"
    action: "Run infer-capabilities.ts again"
    expected: "No DB error; skipped count increments; no duplicate row"
    evidence: "SELECT count(*) FROM graph.capabilities WHERE capability_name='wint-create-inferred' returns 1 (not 2)"

  - id: EC-3
    title: "Story with no capability keywords produces no inserts for that story"
    setup: "Story YAML has title and feature description with no mapping keywords"
    action: "Run inference against that single story"
    expected: "No capabilities inserted for that story; attempted=0 or failed=0 for that entry"
    evidence: "Unit test with mock story text containing no keywords"

  - id: EC-4
    title: "Epic prefix not found in graph.features skips gracefully with warning"
    setup: "Story has epic prefix 'XYZ' not present in graph.features"
    action: "Run inference"
    expected: "Script logs warning 'Feature not found for prefix XYZ', skips insert, continues processing other stories"
    evidence: "Unit test with mock DB returning no match for lookup; skipped count increments"

edge_cases:
  - id: ED-1
    title: "Story text with multiple matching keyword types produces multiple lifecycle stages"
    setup: "Story AC text contains 'create widget' and 'view widget' and 'delete widget'"
    action: "Run inference on this story"
    expected: "3 capability rows inserted: one for create, one for read, one for delete"
    evidence: "SELECT count(*) FROM graph.capabilities WHERE feature_id = <id> returns 3"

  - id: ED-2
    title: "Duplicate lifecycle stage within same feature is deduplicated"
    setup: "Story has 'add item' and 'create item' in same feature text (both map to 'create')"
    action: "Run inference; second insert attempt for same capability_name"
    expected: "Only one 'create' capability row inserted; no error"
    evidence: "ON CONFLICT DO NOTHING prevents duplicate; skipped count shows 1 skipped"

  - id: ED-3
    title: "upload keyword maps to 'create' lifecycle stage"
    setup: "Story text: 'upload image to collection'"
    action: "Call mapKeywordsToStages with upload text"
    expected: "Returns 'create'"
    evidence: "Unit assertion"

  - id: ED-4
    title: "download keyword maps to 'read' lifecycle stage"
    setup: "Story text: 'download instruction PDF'"
    action: "Call mapKeywordsToStages with download text"
    expected: "Returns 'read'"
    evidence: "Unit assertion"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "SELECT count(*) FROM graph.capabilities WHERE maturity_level='beta' > 0 (post-run)"
      - "SELECT count(*) FROM graph.capabilities after --dry-run = 0"
      - "SELECT count(*) FROM graph.capabilities WHERE capability_name='{featureName}-{stage}-inferred' = 1 (no duplicates)"

manual_cases:
  - id: MC-1
    title: "Validate --validate flag output readability"
    steps:
      - "Run: pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --validate"
      - "Review terminal output for coverage report format"
    expected: "Coverage table clearly distinguishes features with all 4 CRUD stages vs. incomplete; missing stages listed per feature"

  - id: MC-2
    title: "Validate --dry-run output readability"
    steps:
      - "Run: pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --dry-run"
      - "Review dry-run table for completeness"
    expected: "Each row shows featureName, inferredStage, keyword that triggered it, wouldInsert: true — human can verify accuracy"

fixture_definitions:
  - name: mockFeatureRows
    type: "Array<{ id: string; name: string; epicPrefix: string }>"
    description: "Mock graph.features rows for unit tests; avoids live DB dependency"
  - name: mockCapabilityInsertFn
    type: "vi.fn() returning Promise<void>"
    description: "Injectable DB write function mock; allows dry-run and insert tests without live DB"
  - name: storyYamlFixture
    type: "object (story frontmatter)"
    description: "Minimal story YAML fixture with known keywords for unit testing keyword extraction"
  - name: emptyFeaturesFixture
    type: "Array (empty)"
    description: "Empty features array to test AC-9 early-exit path"

risks:
  - "Keyword mapping heuristic is approximate — coverage report is the primary validation tool; human review required post-population"
  - "Integration test requires WINT-4030 data present in DB; must be gated on WINT-4030 merge"
  - "graph.capabilities unique constraint on capability_name could cause test pollution if test data is not cleaned between integration test runs"
