notable_decisions:
  - >
    Injectable insertFn and dbFn pattern follows populate-domain-kb.ts precedent exactly,
    enabling full unit test isolation without any live DB connections.
  - >
    In-memory deduplication via capabilityMap<capabilityName, InferredCapability> runs before
    Drizzle .onConflictDoNothing() to reduce unnecessary DB round-trips within a single run.
  - >
    findStoryFiles() recursively scans plans/future/platform/ matching both story.yaml and
    {STORY_ID}.md patterns to handle both YAML-only and markdown-frontmatter story formats.
  - >
    printValidationReport() uses dynamic import for graph-get-capability-coverage to avoid
    circular dependency at module load time and to stay consistent with defaultInsertFn pattern.
  - >
    E2E tests marked exempt: this is a CLI script with no web UI. Integration testing requires
    WINT-4030 to be merged and graph.features seeded, which is post-merge scope.

known_deviations:
  - >
    AC-10 coverage percentage not numerically confirmed (--coverage flag requires @vitest/coverage-v8
    which is not installed in this package). Coverage quality assessed by examining all 33 tests
    which exercise all exported functions across all branches including error paths.
  - >
    --validate flag's graph_get_capability_coverage integration cannot be fully tested in unit tests
    without live DB. The mock in tests returns null, verifying the null-guard path. Full validation
    requires post-WINT-4030 integration environment.

