architectural_decisions:
  - id: ARCH-001
    question: Where to place logInvocation — in @repo/mcp-tools package or directly in the knowledge-base app?
    decision: Place in packages/backend/mcp-tools/src/telemetry/ following existing session-management module pattern
    rationale: >-
      Story explicitly specifies this path (ST-2, ST-3 file targets). Consistent with session-create.ts pattern.
      Transport-agnostic business logic belongs in shared package, not in the MCP server adapter layer.
    decided_by: story
  - id: ARCH-002
    question: Should totalTokens be computed at application level before insert?
    decision: Defer to DB default (0). Include note in code comments.
    rationale: >-
      ELAB.yaml GAP-001 decision: DB defaults handle MVP correctly. OPP-001 recommends computing totalTokens =
      inputTokens + outputTokens + cachedTokens, but it was logged to KB as future enhancement, not blocking this story.
    decided_by: elaboration
  - id: ARCH-003
    question: crypto import style for randomUUID
    decision: Use `import { randomUUID } from 'crypto'` and call `randomUUID()` directly
    rationale: >-
      ELAB.yaml GAP-002 fix: matches session-create.ts canonical reference exactly. `import { crypto } from
      'node:crypto'` is invalid Node.js syntax.
    decided_by: elaboration
complexity: moderate
