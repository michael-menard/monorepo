architectural_decisions:
  - id: ARCH-001
    question: Should ST-3 (UserFlowsSchema re-export) be merged into ST-9 (index.ts update) or kept as a separate step?
    decision: >-
      Merge UserFlowsSchema re-export into ST-9 (index.ts). ST-3 touches index.ts and ST-9 also touches index.ts —
      consolidating avoids double-write conflicts. ST-3's verification (check-types) is identical to ST-9's.
    rationale: >-
      Both ST-3 and ST-9 modify index.ts. Running them separately risks merge conflicts in the file. Agents implementing
      ST-9 will have already read index.ts and can add both the UserFlowsSchema re-export and all 7 new schema exports
      in a single pass. ST-3 remains as a logical step (id: 3) but its file changes are subsumed into step 9.
    decided_by: planner
complexity: simple
notes:
  - Steps 1-8 are fully parallelizable. Steps 9 and 10 depend on 1,2,4,5,6,7 completing first.
  - >-
    ST-3 (UserFlowsSchema re-export) is folded into ST-9 since both touch index.ts — the step remains for AC tracking
    but its file output is produced in step 9.
  - >-
    scope-challenges.ts field names (recommendation enum, deferral_note, risk_if_deferred) come from AC-4 text directly;
    story-attack-agent.agent.md read in ST-4 is for alignment verification only.
  - >-
    final-scope.ts uses z.literal('1.0') to distinguish from WINT-4140 provisional schema_version '1.0-draft'. This is
    the key formalization this story delivers.
  - >-
    elab-completion-leader gate must use 'warn if missing, do not block' language explicitly — AC-10 edge case ED-3
    requires graceful degradation for pre-WINT-4150 elaborations.
  - >-
    No E2E tests required — pure schema definitions; pnpm test --filter @repo/orchestrator is the primary validation
    gate.
  - >-
    All new schema files follow scope.ts pattern: single-file, Zod schema export, factory function export, type export
    via z.infer<>.
  - >-
    IMPORTANT: index.ts uses .js extensions in import paths (ESM). All new exports must follow the pattern: export { ...
    } from './gaps.js'
