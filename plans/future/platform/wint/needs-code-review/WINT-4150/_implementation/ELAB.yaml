gaps:
  - id: gap-1
    check: decision_completeness
    finding: >
      AC-4's ScopeChallengeSchema field names do not match scope-defender.agent.md's
      actual output contract. AC-4 specifies 'feature' and 'severity' fields on
      each challenge item, but scope-defender produces 'target' (not 'feature'),
      'challenge' (a one-line explanation field not listed in AC-4), and
      'risk_if_deferred' (not 'severity'). Additionally, the top-level
      scope-challenges.json has four fields not captured in AC-4's schema:
      total_candidates_reviewed (integer), truncated (boolean), warnings (array),
      warning_count (integer). If AC-4 is implemented as written, the resulting
      ScopeChallengesSchema will reject all real scope-defender output as invalid
      on the first parse attempt. This is a direct contradiction of the story's
      goal ("aligned with scope-defender output contract") and would require
      post-implementation correction.
    severity: high
    decision: add_ac
    ac_added: "AC-4 updated: field names corrected to match scope-defender output contract (target, challenge, risk_if_deferred instead of feature, severity; top-level fields added)"

