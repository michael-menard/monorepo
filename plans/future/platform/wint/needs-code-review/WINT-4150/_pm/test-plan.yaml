strategy: unit
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
happy_path_tests:
  - id: HP-1
    title: "gaps.ts schema parses valid gaps.json input"
    setup: "Create valid GapsSchema-conformant object with schema_version, story_id, generated_at, gaps array"
    action: "GapsSchema.parse(validInput)"
    expected: "Parsed object matches input without throwing"
    evidence: "pnpm test --filter @repo/orchestrator -- gaps"
  - id: HP-2
    title: "cohesion-findings.ts schema parses valid input with 5 findings and 2 blocking"
    setup: "Create CohesionFindingsSchema input with 5 findings array and 2 blocking_findings"
    action: "CohesionFindingsSchema.parse(validInput)"
    expected: "Parsed successfully"
    evidence: "pnpm test --filter @repo/orchestrator -- cohesion-findings"
  - id: HP-3
    title: "scope-challenges.ts schema parses valid input with 5 challenges"
    setup: "Create ScopeChallengesSchema input with exactly 5 challenges"
    action: "ScopeChallengesSchema.parse(validInput)"
    expected: "Parsed successfully"
    evidence: "pnpm test --filter @repo/orchestrator -- scope-challenges"
  - id: HP-4
    title: "final-scope.ts schema parses valid input with schema_version '1.0'"
    setup: "Create FinalScopeSchema input with schema_version: '1.0', story_id, generated_at, final_acs, followups, warnings"
    action: "FinalScopeSchema.parse(validInput)"
    expected: "Parsed successfully"
    evidence: "pnpm test --filter @repo/orchestrator -- final-scope"
  - id: HP-5
    title: "mvp-slice.ts schema parses valid input"
    setup: "Create MvpSliceSchema input with all required fields"
    action: "MvpSliceSchema.parse(validInput)"
    expected: "Parsed successfully"
    evidence: "pnpm test --filter @repo/orchestrator -- mvp-slice"
  - id: HP-6
    title: "evidence-expectations.ts schema parses valid input"
    setup: "Create EvidenceExpectationsSchema input with expectations array"
    action: "EvidenceExpectationsSchema.parse(validInput)"
    expected: "Parsed successfully"
    evidence: "pnpm test --filter @repo/orchestrator -- evidence-expectations"
  - id: HP-7
    title: "UserFlowsSchema re-export does not alter schema"
    setup: "Import UserFlowsSchema from both original path and artifacts index"
    action: "Compare schema shape and constraints"
    expected: "Both imports resolve to same schema object"
    evidence: "pnpm check-types --filter @repo/orchestrator"
  - id: HP-8
    title: "All 7 factory functions produce schema-valid objects"
    setup: "Call each create{ArtifactName}() factory"
    action: "Parse factory output through its own schema"
    expected: "All 7 factory outputs pass schema parse without error"
    evidence: "pnpm test --filter @repo/orchestrator"
  - id: HP-9
    title: "All schemas exported from index.ts"
    setup: "Import from packages/backend/orchestrator/src/artifacts/index.ts"
    action: "Destructure each new schema export"
    expected: "All imports resolve without TypeScript error"
    evidence: "pnpm check-types --filter @repo/orchestrator"
error_cases:
  - id: EC-1
    title: "cohesion-findings with 3 blocking items fails max(2) constraint"
    setup: "Create input with blocking_findings array of length 3"
    action: "CohesionFindingsSchema.parse(input)"
    expected: "Throws ZodError with message indicating max array length violated"
    evidence: "pnpm test --filter @repo/orchestrator -- cohesion-findings"
  - id: EC-2
    title: "scope-challenges with 6 items fails max(5) constraint"
    setup: "Create input with challenges array of length 6"
    action: "ScopeChallengesSchema.parse(input)"
    expected: "Throws ZodError with message indicating max array length violated"
    evidence: "pnpm test --filter @repo/orchestrator -- scope-challenges"
  - id: EC-3
    title: "final-scope with schema_version '1.0-draft' fails z.literal('1.0') constraint"
    setup: "Create FinalScopeSchema input with schema_version: '1.0-draft'"
    action: "FinalScopeSchema.parse(input)"
    expected: "Throws ZodError — literal '1.0' mismatch"
    evidence: "pnpm test --filter @repo/orchestrator -- final-scope"
  - id: EC-4
    title: "cohesion-findings with 6 total findings fails max(5) constraint"
    setup: "Create input with findings array of length 6"
    action: "CohesionFindingsSchema.parse(input)"
    expected: "Throws ZodError"
    evidence: "pnpm test --filter @repo/orchestrator -- cohesion-findings"
  - id: EC-5
    title: "scope-challenges with invalid recommendation enum fails"
    setup: "Create challenge with recommendation: 'delete-feature'"
    action: "ScopeChallengesSchema.parse(input)"
    expected: "Throws ZodError — invalid enum value"
    evidence: "pnpm test --filter @repo/orchestrator -- scope-challenges"
edge_cases:
  - id: ED-1
    title: "gaps.json with empty gaps array (no gaps found)"
    setup: "Create GapsSchema input with gaps: []"
    action: "GapsSchema.parse(input)"
    expected: "Parses successfully — gaps array unbounded, zero length is valid"
    evidence: "pnpm test --filter @repo/orchestrator -- gaps"
  - id: ED-2
    title: "evidence-expectations with optional verification_command absent"
    setup: "Create EvidenceExpectationSchema item without verification_command field"
    action: "EvidenceExpectationsSchema.parse(input)"
    expected: "Parses successfully — verification_command is optional"
    evidence: "pnpm test --filter @repo/orchestrator -- evidence-expectations"
  - id: ED-3
    title: "elab-completion-leader gate does not block when new artifacts are absent"
    setup: "Story directory with only ELAB.yaml (predates WINT-4150)"
    action: "Review gate logic section for graceful degradation wording"
    expected: "Gate step contains 'warn if missing' language; PASS verdict not blocked"
    evidence: "grep -A 5 'warn.*missing' .claude/agents/elab-completion-leader.agent.md"
  - id: ED-4
    title: "final-scope followup item with conflict: false parses correctly"
    setup: "Create followup item with conflict: false"
    action: "FinalScopeSchema.parse(input)"
    expected: "Parses successfully — conflict is boolean, both values valid"
    evidence: "pnpm test --filter @repo/orchestrator -- final-scope"
tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "ZodError thrown when array max constraints violated"
      - "z.literal('1.0') rejects '1.0-draft'"
      - "All exports resolve from index.ts (check-types)"
      - "Factory functions produce schema-valid output"
manual_cases:
  - id: MC-1
    title: "Verify story-brief-schema.md follows elab-schema.md format"
    steps:
      - "Open .claude/schemas/elab-schema.md"
      - "Open .claude/schemas/story-brief-schema.md"
      - "Confirm structure matches: title, version, description, required fields, optional fields, validation rules"
    expected: "story-brief-schema.md follows the same markdown doc format as elab-schema.md"
  - id: MC-2
    title: "Verify elab-completion-leader gate step is correctly inserted"
    steps:
      - "Open .claude/agents/elab-completion-leader.agent.md"
      - "Locate gate validation step after Step 1"
      - "Confirm step says 'warn if missing, do not block'"
    expected: "Gate step is clearly labeled with graceful degradation language"
fixture_definitions:
  - name: validGapsInput
    type: object
    description: "Minimal valid GapsSchema input with schema_version, story_id, generated_at, empty gaps array"
  - name: validCohesionFindingsInput
    type: object
    description: "Valid CohesionFindingsSchema input with 5 findings, 2 blocking_findings"
  - name: validScopeChallengesInput
    type: object
    description: "Valid ScopeChallengesSchema input with 5 challenges using all recommendation enum values"
  - name: validFinalScopeInput
    type: object
    description: "Valid FinalScopeSchema input with schema_version '1.0', final_acs, followups, all warning arrays"
risks:
  - "Schema misalignment: Zod schemas may not match actual agent output — verify by reading agent .md files before writing schemas"
  - "UserFlowsSchema re-export path: if import path changes, TypeScript may create two schema instances"
  - "Gate logic: elab-completion-leader gate must explicitly handle missing artifact files gracefully"
