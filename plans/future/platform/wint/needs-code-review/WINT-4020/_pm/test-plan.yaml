strategy: unit+integration
scope:
  endpoints:
    - "GET /rules"
    - "POST /rules"
    - "POST /rules/:id/promote"
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "GET /rules returns all active rules with no filters"
    setup: "Seed rules table with 3 active rules of different types (gate, lint, prompt_injection)"
    action: "GET /rules (no query params)"
    expected: "{ ok: true, data: [3 rules with status=active] }"
    evidence: "Response JSON matches RulesListResponseSchema; all 3 rules present"

  - id: HP-2
    title: "GET /rules filtered by type=gate returns only gate rules"
    setup: "Seed rules table with 2 gate rules, 1 lint rule, 1 prompt_injection rule"
    action: "GET /rules?type=gate"
    expected: "{ ok: true, data: [2 gate rules only] }"
    evidence: "Response contains exactly 2 items, all with rule_type=gate"

  - id: HP-3
    title: "GET /rules filtered by scope=global returns only global rules"
    setup: "Seed rules table with 2 global rules and 1 story-scoped rule (scope=WINT-4020)"
    action: "GET /rules?scope=global"
    expected: "{ ok: true, data: [2 global rules only] }"
    evidence: "Response contains exactly 2 items, all with scope=global"

  - id: HP-4
    title: "GET /rules filtered by status=proposed returns proposed rules"
    setup: "Seed rules table with 1 active rule and 2 proposed rules"
    action: "GET /rules?status=proposed"
    expected: "{ ok: true, data: [2 proposed rules] }"
    evidence: "Response contains exactly 2 items with status=proposed"

  - id: HP-5
    title: "POST /rules creates a new rule with status=proposed"
    setup: "Empty rules table (or known state). Live postgres-knowledgebase on port 5433."
    action: "POST /rules with body: { rule_text: 'Do not use TypeScript interfaces', rule_type: 'lint', scope: 'global', severity: 'error', source_story_id: 'WINT-4020' }"
    expected: "HTTP 201; { ok: true, data: { id: <uuid>, rule_text: '...', status: 'proposed', ... } }"
    evidence: "Response contains valid UUID, status=proposed, rule_text preserved"

  - id: HP-6
    title: "POST /rules/:id/promote promotes proposed rule to active"
    setup: "Seed one rule with status=proposed. Capture its ID."
    action: "POST /rules/{id}/promote with body: { source_story_id: 'WINT-4020' }"
    expected: "HTTP 200; { ok: true, data: { id: <uuid>, status: 'active', ... } }"
    evidence: "Response shows status=active; DB record updated"

  - id: HP-7
    title: "GET /rules combined filters: type=lint&status=active"
    setup: "Seed 1 active lint rule, 1 proposed lint rule, 1 active gate rule"
    action: "GET /rules?type=lint&status=active"
    expected: "{ ok: true, data: [1 active lint rule only] }"
    evidence: "Exactly 1 rule returned matching both filters"

  - id: HP-8
    title: "MCP tool rules_registry_get returns rules via direct-call"
    setup: "Seed 2 active rules in DB"
    action: "Call rules_registry_get({ status: 'active' }) via MCP tool"
    expected: "Returns array of 2 rules without making HTTP request to sidecar"
    evidence: "Vitest unit test: import getRules directly from @repo/sidecar-rules-registry; mock DB; assert return value"

  - id: HP-9
    title: "MCP tool rules_registry_propose creates rule via direct-call"
    setup: "Empty rules table"
    action: "Call rules_registry_propose({ rule_text: '...', rule_type: 'gate', scope: 'global', severity: 'warning' }) via MCP tool"
    expected: "Returns { ok: true, data: { id: <uuid>, status: 'proposed' } } without HTTP call"
    evidence: "Vitest unit test: import proposeRule directly; mock DB; assert return"

error_cases:
  - id: EC-1
    title: "POST /rules returns 400 when rule_text is missing"
    setup: "Running sidecar server on port 3093"
    action: "POST /rules with body: { rule_type: 'gate', scope: 'global', severity: 'error' } (no rule_text)"
    expected: "HTTP 400; { ok: false, error: 'Validation error: rule_text is required' }"
    evidence: "Zod parse failure propagated as 400 with descriptive error message"

  - id: EC-2
    title: "POST /rules returns 400 when rule_type is invalid"
    setup: "Running sidecar server on port 3093"
    action: "POST /rules with body: { rule_text: '...', rule_type: 'invalid_type', scope: 'global', severity: 'error' }"
    expected: "HTTP 400; { ok: false, error: 'Validation error: rule_type must be gate|lint|prompt_injection' }"
    evidence: "Zod enum validation fails; 400 returned"

  - id: EC-3
    title: "POST /rules returns 409 when duplicate rule_text already exists and is not deprecated"
    setup: "Seed one active rule with rule_text='Do not use TypeScript interfaces'"
    action: "POST /rules with body: { rule_text: 'do not use typescript interfaces', rule_type: 'lint', scope: 'global', severity: 'error' } (case-insensitive match)"
    expected: "HTTP 409; { ok: false, error: 'Conflict: rule already exists', conflicting_ids: ['<existing-uuid>'] }"
    evidence: "Response contains conflicting_ids array with the pre-existing rule's UUID"

  - id: EC-4
    title: "POST /rules/:id/promote returns 422 when source_story_id and source_lesson_id are both absent"
    setup: "Seed one proposed rule, capture its ID"
    action: "POST /rules/{id}/promote with empty body {}"
    expected: "HTTP 422; { ok: false, error: 'source_story_id or source_lesson_id required to promote' }"
    evidence: "Validation rejects promotion without source reference"

  - id: EC-5
    title: "POST /rules/:id/promote returns 404 when rule ID does not exist"
    setup: "Empty rules table or rules table without target ID"
    action: "POST /rules/non-existent-uuid/promote with body: { source_story_id: 'WINT-4020' }"
    expected: "HTTP 404; { ok: false, error: 'Rule not found' }"
    evidence: "DB lookup fails to find rule; 404 returned"

  - id: EC-6
    title: "GET /rules returns 400 when status param is invalid"
    setup: "Running sidecar server"
    action: "GET /rules?status=unknown_status"
    expected: "HTTP 400; { ok: false, error: 'Validation error: status must be proposed|active|deprecated' }"
    evidence: "Zod enum parse on query params catches invalid value"

  - id: EC-7
    title: "POST /rules/:id/promote returns 409 when rule is already active"
    setup: "Seed one active rule (status=active), capture its ID"
    action: "POST /rules/{id}/promote with body: { source_story_id: 'WINT-4020' }"
    expected: "HTTP 409; { ok: false, error: 'Rule is already active' }"
    evidence: "Promote endpoint checks current status before update"

edge_cases:
  - id: ED-1
    title: "GET /rules with 100+ active rules completes within 500ms"
    setup: "Seed 100 active rules in postgres-knowledgebase"
    action: "GET /rules?status=active"
    expected: "HTTP 200 with all 100 rules within 500ms response time"
    evidence: "Integration test times the response; assert elapsed < 500"

  - id: ED-2
    title: "POST /rules conflict detection is case-insensitive and trims whitespace"
    setup: "Seed rule with rule_text='No barrel files'"
    action: "POST /rules with rule_text='  NO BARREL FILES  '"
    expected: "HTTP 409 Conflict with conflicting rule ID"
    evidence: "Lower-trim normalization applied before duplicate check"

  - id: ED-3
    title: "GET /rules with no rules in DB returns empty array (not 404)"
    setup: "Empty rules table"
    action: "GET /rules"
    expected: "HTTP 200; { ok: true, data: [] }"
    evidence: "Empty result set is valid — never a 404 for list endpoints"

  - id: ED-4
    title: "Sidecar responds 404 for unknown routes"
    setup: "Running sidecar on port 3093"
    action: "GET /unknown-path"
    expected: "HTTP 404; { ok: false, error: 'Not found' }"
    evidence: "Route guard in http-handler returns 404 for unmatched pathname"

  - id: ED-5
    title: "POST /rules with deprecated duplicate allows re-proposal"
    setup: "Seed rule with rule_text='No barrel files' and status=deprecated"
    action: "POST /rules with rule_text='no barrel files'"
    expected: "HTTP 201; new rule created with status=proposed (deprecated rules do not block re-proposal)"
    evidence: "Conflict detection skips deprecated rules; new proposed rule inserted"

  - id: ED-6
    title: "PORT environment variable overrides default 3093"
    setup: "Set PORT=4099 before starting sidecar"
    action: "Start sidecar; send GET /rules to port 4099"
    expected: "HTTP 200 response on port 4099 (not 3093)"
    evidence: "process.env.PORT ?? '3093' pattern respected"

tooling_evidence:
  backend:
    http_requests:
      - "GET http://localhost:3093/rules"
      - "GET http://localhost:3093/rules?type=gate&status=active"
      - "GET http://localhost:3093/rules?scope=global"
      - "POST http://localhost:3093/rules (with JSON body)"
      - "POST http://localhost:3093/rules/:id/promote (with JSON body)"
    assertions:
      - "Response Content-Type: application/json"
      - "Response body matches RulesListResponseSchema (Zod parse)"
      - "HTTP status codes: 200 (GET), 201 (POST create), 200 (promote), 400, 404, 409, 422"
      - "conflicting_ids array present in 409 responses"
      - "All rules have valid UUID id field"

manual_cases:
  - id: MC-1
    title: "Verify sidecar package is correctly registered in pnpm workspace"
    steps:
      - "cd monorepo root"
      - "Run: pnpm install"
      - "Run: pnpm -r ls | grep sidecar-rules-registry"
    expected: "@repo/sidecar-rules-registry appears in workspace listing"

  - id: MC-2
    title: "Verify Drizzle migration creates rules table in postgres-knowledgebase"
    steps:
      - "Run migration against postgres-knowledgebase (port 5433)"
      - "Connect to DB: psql -p 5433"
      - "Query: \\d rules"
    expected: "rules table exists with all required columns (id, rule_text, rule_type, scope, severity, status, source_story_id, source_lesson_id, created_at, updated_at)"

fixture_definitions:
  - name: "activeGateRule"
    type: "DB record"
    description: "A rule with rule_type=gate, scope=global, severity=error, status=active"
  - name: "proposedLintRule"
    type: "DB record"
    description: "A rule with rule_type=lint, scope=WINT-4020, severity=warning, status=proposed"
  - name: "deprecatedRule"
    type: "DB record"
    description: "A rule with status=deprecated, used to test re-proposal edge case"
  - name: "100ActiveRules"
    type: "DB seed set"
    description: "100 active rules of mixed types for performance testing"

risks:
  - "Integration tests require live postgres-knowledgebase on port 5433 (ADR-005) — CI must have DB available"
  - "Port 3093 conflict risk if cohesion sidecar (WINT-4010) allocated a different port than expected — verify before integration tests"
  - "WINT-2020 (dependency) is in failed-qa — integration tests cannot run end-to-end until WINT-2020 completes"
  - "Rule conflict detection case-insensitive trimming must be applied consistently in both compute layer and DB query"
  - "promote endpoint's 409 'already active' check could race with concurrent promote requests — document as known limitation"
