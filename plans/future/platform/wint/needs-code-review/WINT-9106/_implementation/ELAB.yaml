opportunities:
  - id: OPP-001
    title: "Integration test skip guard — allow CI runs without live DB"
    description: >
      Integration tests (HP-2, HP-3, HP-4, HP-5, AC-007) require a live lego_dev DB on
      port 5432. If run in CI without a DB, they will throw connection errors rather than
      skip gracefully. Adding a Vitest `beforeAll` skip guard (e.g.,
      `if (!process.env.DATABASE_URL) { skip('requires live DB') }`) allows the test
      suite to run in unit-only mode. This also improves the developer experience for
      contributors who haven't applied the WINT-0070 migration. Not MVP-blocking because
      the story explicitly documents the DB requirement and the real DB path is necessary
      for AC-007 proof.
    decision: null
    decided_at: null

  - id: OPP-002
    title: "Replace ED-1 benchmark with a concrete Vitest timing assertion"
    description: >
      ED-1 specifies "run benchmark measuring p50/p99 write latency" with "Benchmark
      output; no error logs" as evidence. Benchmarks are not standard Vitest tests and
      `pnpm test` will not run them automatically. Options: (a) implement ED-1 as a
      Vitest test with a timing assertion (`expect(elapsed).toBeLessThan(50)` for p99
      approximation over 10 sequential writes); (b) implement as a standalone benchmark
      script (e.g., packages/backend/orchestrator/scripts/benchmark-checkpoint.ts) with
      results committed as evidence. Option (a) is preferred as it keeps CI coverage.
      This is non-blocking because the performance data is informational (informs the
      async checkpointing decision) rather than a hard correctness gate.
    decision: null
    decided_at: null

  - id: OPP-003
    title: "ST-2 file decomposition — split into types/serde subtask and implementation subtask"
    description: >
      ST-2 covers serialize/restore + checkpoint write per node and is estimated at
      18,000 tokens. At this size it will likely touch 4+ files (types.ts, serializer.ts,
      postgres-saver.ts or custom-saver.ts, index.ts) which exceeds the 3-file subtask
      guideline. Splitting into ST-2a (Zod schemas + serde layer, ~6,000 tokens) and
      ST-2b (checkpoint write implementation, ~12,000 tokens) would produce a cleaner
      review surface and reduce rework if the WINT-9105 decision changes the persistence
      layer. Non-blocking because this is a subtask decomposition preference, not a
      correctness gap.
    decision: null
    decided_at: null

  - id: OPP-004
    title: "ST-1 output artifact — document decision in checkpointer module entry comment"
    description: >
      ST-1 (Verify/install and decide checkpointer approach) produces no code artifact and
      has no machine-verifiable output. Adding a requirement that ST-1 produce a brief
      decision record (e.g., a DECISION.md or inline module header comment in
      src/checkpointer/index.ts documenting which path was taken and why) provides
      an audit trail and prevents the decision from living only in an agent's execution
      context. This is low-priority but improves maintainability.
    decision: null
    decided_at: null

  - id: OPP-005
    title: "Async fire-and-forget checkpoint path — formalize the opt-in API in ST-2"
    description: >
      The Architecture Notes describe "configurable async checkpointing (fire-and-forget
      Promise queue) for non-critical nodes" as a mitigation if p99 > 50ms. This is
      referenced but not surfaced in any AC, subtask, or Zod schema. If the async path
      is implemented, it needs a typed API (e.g., `{ async?: boolean }` option on the
      checkpoint write call) and at least one unit test verifying the fire-and-forget
      behavior doesn't swallow errors. Formalizing this in AC-001 or as a separate
      sub-note would prevent ad-hoc implementation. Non-blocking because it's only
      triggered if ED-1 benchmark fails.
    decision: null
    decided_at: null

  - id: OPP-006
    title: "Native PostgresSaver.setup() migration collision risk — document mitigation"
    description: >
      If the native PostgresSaver approach is chosen, PostgresSaver.setup() manages its
      own tables via an internal `checkpoint_migrations` table. The story notes this but
      does not document what happens if setup() is called against a DB that already has
      the wint.workflow_checkpoints table. If native PostgresSaver creates its own tables
      (e.g., checkpoints, checkpoint_writes) in the public schema, these may conflict with
      or duplicate wint.workflow_checkpoints. A clarifying note in the Architecture Notes
      about schema isolation (native tables in public vs wint schema) would help the
      implementer avoid a migration conflict. Non-blocking since WINT-9105 ADR will
      specify the path, but the risk is worth logging.
    decision: null
    decided_at: null

