  exempt_reason: >-
    story_type: feature with touches_frontend: false. ADR-006 skip condition applies.
    Backend infrastructure only — no UI components, no API endpoints.
  tests_written: false

coverage:
  note: >-
    New checkpointer module: ~85% estimated (all happy paths, error paths, and edge cases tested).
    Pre-existing package coverage not measured (pre-existing build failures in other modules).

notable_decisions:
  - >-
    ARCH-001: Archive uses status='archived' on active wint.workflow_checkpoints table
    (no new table/migration needed). Existing status column accepts text values.
  - >-
    ARCH-002: PHASE_TO_CHECKPOINT_MAP uses Phase string keys (Record<Phase, string>),
    not integer keys. Grounded in CheckpointSchema.current_phase Phase enum.
  - >-
    ARCH-003: No migration needed for MVP. ARCH-001 decision (status='archived')
    eliminates need for separate archive table. Next migration would be 0034 if needed.
  - >-
    Native @langchain/langgraph-checkpoint-postgres NOT used: version 1.0.1 requires
    @langchain/core ^1.0.1, incompatible with project's @langchain/langgraph ^0.2.0
    which requires @langchain/core <0.3.0. Custom repository approach used instead.
  - >-
    workflow_status enum value is 'in_progress' not 'running' (verified against live DB).
    Fixed during integration test execution.

known_deviations:
  - >-
    AC-007 full crash simulation (AbortError hook mid-node during graph.invoke()) was
    not implemented as a true process-abort test. The core crash recovery mechanism
    (write checkpoint -> process dies -> read checkpoint -> restore state -> reinvoke)
    is tested via the integration tests which verify each step individually with live DB.
    A true AbortError-during-invoke test would require mocking LangGraph internals which
    is outside scope and brittle.
  - >-
    pnpm build --filter @repo/orchestrator fails due to pre-existing errors in
    src/graphs/elaboration.ts (TS2554), src/nodes/elaboration/affinity-reader.ts (drizzle-orm),
    and src/nodes/elaboration/index.ts (missing exports). These are unrelated to WINT-9106.
    New checkpointer files compile with zero errors.
  - >-
    ED-1 benchmark test uses mock DB (not live DB). p99 < 50ms with mock.
    Real-DB benchmark not implemented as automated test; connection pool constraint
    (max: 1) documented in code. Live DB integration tests run sequentially without
    contention issues.

