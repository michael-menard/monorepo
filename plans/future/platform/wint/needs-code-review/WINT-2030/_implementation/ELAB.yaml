    status: CONDITIONAL
    note: |
      Subtask coverage of ACs:
      - ST-1 → AC-8 only
      - ST-2 → AC-1, AC-6, AC-10
      - ST-3 → AC-2, AC-3, AC-4, AC-6, AC-10
