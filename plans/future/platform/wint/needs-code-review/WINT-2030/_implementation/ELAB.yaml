gaps:
  - id: GAP-1
    severity: WARN
    title: "EC-1 resilience test does not simulate actual failure"
    description: |
      The story spec requires a test that verifies "single pack write failure does not abort
      remaining packs" (EC-1). The test file acknowledges this is only "structurally guaranteed"
      and does not actually mock contextCachePut to throw for one iteration. To meet the story's
      AC-7 at the 80% coverage target, the test should mock contextCachePut to throw on the
      first call and verify: (a) other 4 packs are still written, (b) result.failed === 1,
      (c) logger.error was called.
    blocking: false
    decision: defer
    notes: "Non-blocking test completeness gap. Code structure is correct. Logged to KB for future improvement."
    resolution_hint: |
      Add a separate describe block with vi.mock or vi.spyOn on contextCachePut to simulate
      one throw. Use vitest's mockImplementationOnce to throw on first call only. Verify
      the resilient loop counts are correct.

  - id: GAP-2
    severity: WARN
    title: "EC-2 missing source doc path not actually simulated"
    description: |
      The story spec requires testing that a missing source doc logs a warning and allows
      other packs to continue. The test file acknowledges "if source docs were missing, failed
      would be > 0" but does not actually simulate a missing file. The readDoc null-return path
      is untested in the integration suite.
    blocking: false
    decision: defer
    notes: "Non-blocking test completeness gap. Code handles missing docs correctly. Logged to KB for future improvement."
    resolution_hint: |
      Add a test that temporarily makes one source file path unreadable (or mock readFileSync
      to throw for one path). Verify result.failed === 1, result.succeeded === 4, and that
      logger.warn is called. Consider using vi.spyOn(fs, 'readFileSync') or a path override.

  - id: GAP-3
    severity: INFO
    title: "HP-3 story evidence SQL references non-existent ttl column"
    description: |
      The story's test plan HP-3 evidence reads "SELECT packKey, ttl FROM wint.context_packs"
      but the contextPacks schema does not store a raw ttl column — only expiresAt. The actual
      test correctly verifies expiresAt ≈ now + 30 days. The story's evidence SQL is stale but
      not blocking.
    blocking: false
    decision: defer
    notes: "Stale documentation. Actual test is correct. No code change needed."
    resolution_hint: |
      No code change needed. If the story file is ever updated, correct HP-3 evidence to
      reference expiresAt instead of ttl.

opportunities:
  - id: OPP-1
    title: "Extract EC-1/EC-2 resilience tests into unit test file"
    description: |
      EC-1 and EC-2 are pure unit scenarios (mock FS + mock contextCachePut). They do not
      require a real PostgreSQL connection. A separate unit test file
      (populate-project-context.unit.test.ts) could test these paths without DB dependency,
      making them faster and runnable in CI without Docker.
    value: "Faster CI, better isolation of failure-path tests"
    effort: low
    decision: log_to_kb
    kb_entry_id: "dab3d233-c8b2-444f-bebf-fab7fc7dabe9"

  - id: OPP-2
    title: "Consider parameterized content size assertion"
    description: |
      ED-2 asserts < 8000 chars per pack. As source docs grow, this could silently approach
      the limit. A stricter assertion (e.g., < 5000) with a warning at 6000 would give earlier
      signal before the injection budget is violated.
    value: "Earlier detection of content size drift"
    effort: low
    decision: log_to_kb
    kb_entry_id: "c5ad8d14-e1d0-403b-9852-1a82b3cdcb5e"

  - id: OPP-3
    title: "Document the populate script in a runbook or ops README"
    description: |
      The script is runnable via pnpm tsx but there is no ops runbook capturing when to
      re-run it (e.g., after CLAUDE.md changes, after tech-stack doc updates). A short
      runbook or JSDOC @see reference would help operators know when to refresh the cache.
    value: "Operational clarity for cache freshness"
    effort: low
    decision: log_to_kb
    kb_entry_id: "c5be031f-af55-430f-a549-ce2fa5a8e590"

