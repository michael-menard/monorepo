architectural_decisions:
  - id: ARCH-001
    question: "StoryRepository (LangGraph) uses wint.stories via raw pg client; MCP tools use core.stories via Drizzle. Are these the same physical table?"
    decision: "Verify in ST-1 via information_schema.tables query. The story already documents the expected result as a single row (wint or core schema per WINT-1080 outcome). If schemas differ, AC-8 and AC-9 will be marked FAIL and a fix story filed. No code change is within scope — this is proof-only."
    rationale: "The story explicitly states this is a parity check, not a repair. If the tables differ, the finding triggers a fix story (AC-14). Planning does not need to resolve this upfront."
    decided_by: agent
  - id: ARCH-002
    question: "AC-11 (conflict detection three-option dialog) requires dev-implement-story command invocation — this is a command-level behavior, not a function-level behavior. How to verify?"
    decision: "AC-11 is verified manually by invoking the dev-implement-story command against a story that already has an active worktree record in DB, then observing the dialog output. Evidence is captured in EVIDENCE.yaml as a manual verification entry. The integration test covers the DB-level worktree registration (AC-10) which is the foundation for conflict detection."
    rationale: "The conflict detection logic fires at the command orchestration layer, not the MCP tool layer. Testing it programmatically would require an agent harness outside the scope of this spike. Manual verification is sufficient per ADR-006 exemption (frontend_impacted: false) and the story's explicit delineation of manual vs automated ACs."
    decided_by: agent

complexity: moderate

notes:
  - "This is a spike story — scope is PROOF only. No production code changes are permitted. Any bugs found trigger fix story filing (AC-14), not inline repair."
  - "ADR-005 prohibits DB mocking — all integration tests use real postgres-knowledgebase on port 5433."
  - "ADR-006 exemption applies — no Playwright E2E tests required (frontend_impacted: false)."
  - "StoryRepository (orchestrator) uses raw pg client querying wint.stories; MCP tools use Drizzle querying core.stories — confirm physical table identity in ST-1 before AC-8/AC-9."
  - "The shim integration test pattern from story-compatibility/__tests__/integration/shim.integration.test.ts already demonstrates the DB-hit and DB-miss scenarios. WINT-1120 test extends this with cross-system parity checks and worktree roundtrip."
  - "The StoryIdSchema in mcp-tools enforces /^[A-Z]{2,10}-\\d{3,4}$/ — use TEST-8001 pattern (not TEST-99999) for test story IDs to avoid Zod validation failures."
  - "worktreeGetByStory only returns active worktrees (status: active). After worktreeMarkComplete, the record returns null from worktreeGetByStory — verify DB directly for AC-12 proof."
  - "Steps ST-3 and ST-4 write to EVIDENCE.yaml only (no production code). The integration test file is the only new code artifact."
  - "Implementation gate per story: all five dependencies (WINT-1040, WINT-1050, WINT-1060, WINT-1070, WINT-1160) must be at uat or completed before ST-2 begins."
