strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Script populates all 4 library cache packs successfully"
    setup: "Clean wint.context_packs of any lib-* keys. DATABASE_URL set to port 5432 lego_dev. CLAUDE.md and docs/tech-stack/*.md present."
    action: "Run populateLibraryCache() (or pnpm tsx packages/backend/mcp-tools/src/scripts/populate-library-cache.ts)"
    expected: "Returns { attempted: 4, succeeded: 4, failed: 0 }. 4 rows inserted in wint.context_packs with packType='codebase' and packKeys lib-react19, lib-tailwind, lib-zod, lib-vitest."
    evidence: "SELECT COUNT(*) FROM wint.context_packs WHERE pack_key IN ('lib-react19','lib-tailwind','lib-zod','lib-vitest') AND pack_type='codebase' = 4"

  - id: HP-2
    title: "Script is idempotent — re-run produces same 4 rows"
    setup: "Run populateLibraryCache() once so 4 rows exist."
    action: "Run populateLibraryCache() a second time."
    expected: "Returns { attempted: 4, succeeded: 4, failed: 0 }. Row count remains exactly 4 (upsert, not double-insert)."
    evidence: "SELECT COUNT(*) FROM wint.context_packs WHERE pack_key IN ('lib-react19','lib-tailwind','lib-zod','lib-vitest') = 4 (same count both times)"

  - id: HP-3
    title: "Each pack content has required structured JSONB fields"
    setup: "Run populateLibraryCache() against real DB."
    action: "Query each row and inspect content JSONB."
    expected: "Each row's content has: summary (string, length > 10), patterns (array, length >= 3), rules (array, length >= 1). JSON.stringify(content).length < 8000."
    evidence: "SELECT pack_key, content->>'summary', jsonb_array_length(content->'patterns') FROM wint.context_packs WHERE pack_key LIKE 'lib-%'"

  - id: HP-4
    title: "contextCachePut called with correct TTL on all 4 writes"
    setup: "Unit test — inject mock contextCachePutFn spy."
    action: "Call populateLibraryCache({ contextCachePutFn: mockFn })."
    expected: "mockFn called 4 times, each call has ttl: 2592000."
    evidence: "expect(mockFn).toHaveBeenCalledTimes(4); calls.forEach(call => expect(call.args[0].ttl).toBe(2592000))"

  - id: HP-5
    title: "Script exits 0 with logged summary when run via pnpm tsx"
    setup: "DATABASE_URL set to port 5432 lego_dev."
    action: "pnpm tsx packages/backend/mcp-tools/src/scripts/populate-library-cache.ts"
    expected: "Process exits with code 0. Logger output includes { attempted: 4, succeeded: 4, failed: 0 }."
    evidence: "exit code check; grep for 'succeeded: 4' in log output"

error_cases:
  - id: EC-1
    title: "Single pack write failure does not abort remaining packs"
    setup: "Unit test — inject contextCachePutFn that throws on the 2nd call only."
    action: "Call populateLibraryCache({ contextCachePutFn: mockThrowOnSecond })."
    expected: "Returns { attempted: 4, succeeded: 3, failed: 1 }. Error logged via @repo/logger for failed pack. Remaining 3 packs succeed."
    evidence: "expect(result.failed).toBe(1); expect(result.succeeded).toBe(3); expect(logger.warn or logger.error).toHaveBeenCalledOnce()"

  - id: EC-2
    title: "Missing source document is handled gracefully"
    setup: "Unit test — mock readDoc() to return null for CLAUDE.md."
    action: "Call populateLibraryCache() with mocked readDoc."
    expected: "Pack(s) dependent on CLAUDE.md are skipped with a logged warning. Script does not throw. Result.failed incremented."
    evidence: "expect(result.failed).toBeGreaterThan(0); expect(logger.warn).toHaveBeenCalled(); no unhandled exception"

  - id: EC-3
    title: "All 4 write failures still returns clean result"
    setup: "Unit test — inject contextCachePutFn that always throws."
    action: "Call populateLibraryCache({ contextCachePutFn: alwaysThrows })."
    expected: "Returns { attempted: 4, succeeded: 0, failed: 4 }. All errors logged. No unhandled exception."
    evidence: "expect(result).toEqual({ attempted: 4, succeeded: 0, failed: 4 })"

  - id: EC-4
    title: "Wrong database port rejected at startup (misconfiguration)"
    setup: "DATABASE_URL set to port 5433 (KB port)."
    action: "Run populateLibraryCache() integration test."
    expected: "Connection error thrown/logged. Script does not silently write to wrong DB."
    evidence: "Integration test assertion: must target port 5432. CI env asserts DATABASE_URL port."

edge_cases:
  - id: ED-1
    title: "Content extraction from minimal/empty source doc"
    setup: "Unit test — mock readDoc() to return a near-empty string for docs/tech-stack/frontend.md."
    action: "Call extractReact19Patterns(emptyContent) and extractTailwindPatterns(emptyContent)."
    expected: "Returns a valid content object with non-null summary (may be a fallback), patterns may be empty array. Does not throw. Content still passes JSON.stringify length check."
    evidence: "result.summary !== null; JSON.stringify(result).length < 8000; no throw"

  - id: ED-2
    title: "Content size guard prevents oversized JSONB"
    setup: "Unit test — mock extraction to return an extremely verbose patterns array (many long strings)."
    action: "Run pack construction with oversized content."
    expected: "Content is truncated or capped so JSON.stringify(content).length < 8000. Either extraction caps output or script logs warning and truncates."
    evidence: "expect(JSON.stringify(content).length).toBeLessThan(8000)"

  - id: ED-3
    title: "packType constraint enforced — only 'codebase' written"
    setup: "Integration test — run populate function successfully."
    action: "Query DISTINCT pack_type for lib-* keys."
    expected: "Only 'codebase' returned. No other packType values exist for these keys."
    evidence: "SELECT DISTINCT pack_type FROM wint.context_packs WHERE pack_key LIKE 'lib-%' = ['codebase']"

  - id: ED-4
    title: "Result conforms to PopulateResultSchema"
    setup: "Unit test — run populateLibraryCache() with all successful mocks."
    action: "Parse result with PopulateResultSchema.safeParse(result)."
    expected: "safeParse returns { success: true }. Shape is exactly { attempted: number, succeeded: number, failed: number }."
    evidence: "expect(PopulateResultSchema.safeParse(result).success).toBe(true)"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "SELECT COUNT(*) FROM wint.context_packs WHERE pack_key IN ('lib-react19','lib-tailwind','lib-zod','lib-vitest') AND pack_type='codebase' = 4"
      - "SELECT DISTINCT pack_type FROM wint.context_packs WHERE pack_key LIKE 'lib-%' = ['codebase']"
      - "pnpm check-types --filter @repo/mcp-tools exits 0"
      - "pnpm test --filter @repo/mcp-tools passes all unit and integration tests"
      - "pnpm tsx packages/backend/mcp-tools/src/scripts/populate-library-cache.ts exits 0"

manual_cases: []

fixture_definitions:
  - name: "mockContextCachePut"
    type: "vi.fn() spy"
    description: "Injected as contextCachePutFn parameter to populateLibraryCache(). Tracks calls and TTL values."
  - name: "mockContextCachePutThrowOnN"
    type: "vi.fn() that throws on Nth call"
    description: "Used in EC-1 and EC-3 to test error isolation. Created with a call counter."
  - name: "mockReadDoc"
    type: "vi.fn() returning string | null"
    description: "Replaces file I/O in unit tests. Returns fixture markdown content or null for missing doc simulation."
  - name: "integrationDbCleanup"
    type: "beforeEach/afterEach Drizzle delete"
    description: "db.delete(contextPacks).where(inArray(contextPacks.packKey, ['lib-react19','lib-tailwind','lib-zod','lib-vitest'])) — same pattern as populate-project-context.test.ts"

risks:
  - "Port confusion (5432 vs 5433) is the #1 failure mode for WINT populate stories. CI must enforce DATABASE_URL targets port 5432."
  - "Content extraction quality is hard to unit test without real docs — integration test must validate patterns array has meaningful content."
  - "Idempotency test depends on clean beforeEach — if cleanup is incomplete, count assertions fail intermittently."
  - "If populate-project-context.ts is modified while WINT-2060 is in development, extracted helpers (readDoc, extractSections) may diverge — verify at PR time."
