        - **Finding**: When `checkOnly=true` and `force=true` are both set, the priority logic in `docSyncImpl` must be explicit: `force` governs which files are included in the file list (all `.claude/agents/*.agent.md` and `.claude/commands/*.md`), while `checkOnly` governs write permission (no doc files written). The combined behavior is: all files checked, none written (EG-5).
        - **Impact**: Low - without explicit precedence, a dev could implement conflicting behavior (e.g., force overriding checkOnly's no-write constraint)
        - **Effort**: Low - add an explicit comment in ST-6 `docSyncImpl` function header documenting flag precedence; EG-5 test in ST-7 confirms the behavior
        - **Recommendation**: Add a flag precedence comment block in `docSyncImpl`: "force=true → use all-files discovery; checkOnly=true → no writes regardless of force; both=true → all-files discovery, zero writes." EG-5 test must assert no doc files are written when both flags are true.
