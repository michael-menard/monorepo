        - **Effort**: Medium - section index caching requires a cache invalidation strategy when writes occur between files in the same batch; a simple "read once, batch all writes, write once" approach may be sufficient
        - **Recommendation**: Defer to a follow-up story after benchmarking real-world performance on 50+ agent files. If Phase 4 latency exceeds 2s for a 50-file batch, implement a "read-all, batch-updates, write-all" pattern where all doc files are read once, all section mutations are accumulated in memory, and all writes occur in a single pass.
