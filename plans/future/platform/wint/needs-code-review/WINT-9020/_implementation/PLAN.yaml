# ============================================================================
# Steps (1:1 mapping from story subtasks ST-1 through ST-8)
# ============================================================================
steps:
  - id: 1
    subtask_id: "ST-1"
    description: "Resolve path and create directory scaffold — create nodes/sync/ directory with doc-sync.ts skeleton and index.ts, then update nodes/index.ts to include sync exports"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
      - "packages/backend/orchestrator/src/nodes/sync/index.ts"
      - "packages/backend/orchestrator/src/nodes/index.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/elaboration/delta-detect.ts"
      - "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
      - "packages/backend/orchestrator/src/nodes/workflow/index.ts"
      - "packages/backend/orchestrator/src/nodes/index.ts"
    dependencies: []
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-1", "AC-9"]
    notes: >
      Create nodes/sync/ directory. doc-sync.ts skeleton should have the module-level
      JSDoc comment, empty exports for docSyncNode and createDocSyncNode (stub implementations
      that throw 'not implemented'). index.ts exports those two symbols. nodes/index.ts
      gets a new '// Sync Nodes' section re-exporting from './sync/index.js'.
      DO NOT modify nodes/workflow/doc-sync.ts or nodes/workflow/index.ts.

  - id: 2
    subtask_id: "ST-2"
    description: "Port Zod schemas and state interface — move/extend DocSyncConfigSchema, DocSyncResultSchema, GraphStateWithDocSync into nodes/sync/doc-sync.ts with database_status field and repoRoot addition"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
      - "packages/backend/orchestrator/src/runner/state-helpers.ts"
      - "plans/future/platform/wint/in-progress/WINT-9020/ELAB-WINT-9020.md"
    dependencies: [1]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator"
    acs_covered: ["AC-3", "AC-4", "AC-8"]
    notes: >
      DocSyncConfigSchema additions: repoRoot z.string().optional() (git subprocess cwd),
      dbQueryTimeoutMs z.number().default(30000).
      DocSyncResultSchema additions: database_status z.enum(['success','timeout','connection_failed','unavailable']).optional().
      DbQueryFn injectable type for testability:
        type DbQueryComponents = (opts: { timeout: number }) => Promise<unknown[]>
        type DbQueryPhases = (opts: { timeout: number }) => Promise<unknown[]>
      Add these to DocSyncConfigSchema as optional fields:
        queryComponents: z.function().optional()
        queryPhases: z.function().optional()
      GraphStateWithDocSync interface extends GraphState with docSync?: DocSyncResult.
      All types use z.infer<> — no standalone TypeScript interfaces for data shapes.

  - id: 3
    subtask_id: "ST-3"
    description: "Implement Phase 1 (File Discovery) and Phase 2 (Frontmatter Parsing) — discoverChangedFiles() with git diff primary + timestamp fallback, and parseFrontmatter() with YAML extraction + optional DB merge"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
    files_to_read:
      - ".claude/skills/doc-sync/SKILL.md"
      - "packages/backend/orchestrator/src/nodes/elaboration/delta-detect.ts"
    dependencies: [2]
    slice: backend
    verification: "Unit test for Phase 1 with mocked git subprocess passes"
    acs_covered: ["AC-2", "AC-6"]
    notes: >
      Phase 1 (discoverChangedFiles):
        - Primary: exec('git diff HEAD --name-only --diff-filter=AMR .claude/') from repoRoot.
          Filter output to .claude/agents/*.agent.md and .claude/commands/*.md.
          Parse D/A/M prefix from git diff output for change type.
        - force=true bypass: enumerate all files in .claude/agents/ and .claude/commands/
          via fs.readdir() — no git diff.
        - Fallback: if git exec throws, use fs.stat() on .claude/agents/ and .claude/commands/
          to find files modified in last 24h. Log logger.warn('git unavailable, using timestamp fallback').
        - Returns: Array<{ path: string; changeType: 'added'|'modified'|'deleted' }>
      Phase 2 (parseFrontmatter):
        - Read each file with fs.readFile(). Extract YAML between --- delimiters.
        - Parse with yaml.load(). On YAMLException: add to manualReviewItems, skip file.
        - DB query (Step 2.2): if config.queryComponents is provided, call with timeout.
          Wrap in try/catch: TIMEOUT error → database_status='timeout', CONNECTION_FAILED → 'connection_failed',
          undefined/unavailable → 'unavailable'. Store result in databaseStatus local var.
        - Merge: if DB components available, merge with file frontmatter (DB overrides file).
        - Returns: Array<{ path: string; changeType: string; frontmatter: Record<string,unknown>; source: 'file'|'hybrid' }>
          plus databaseStatus: 'success'|'timeout'|'connection_failed'|'unavailable'

  - id: 4
    subtask_id: "ST-4"
    description: "Implement Phase 3 (Section Mapping) and Phase 4 (Documentation Updates) — mapAgentToSection() and updateDocumentation() with surgical table edits"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
    files_to_read:
      - ".claude/skills/doc-sync/SKILL.md"
    dependencies: [3]
    slice: backend
    verification: "Unit test verifying pm-*.agent.md maps to phases.md Phase 2 section"
    acs_covered: ["AC-2"]
    notes: >
      Phase 3 (mapAgentToSection):
        - Static lookup table based on SKILL.md Phase 3 mapping:
            pm-* → { docFile: 'docs/workflow/phases.md', section: 'Phase 2: PM Story Generation' }
            elab-* → { docFile: 'docs/workflow/phases.md', section: 'Phase 3: QA Elaboration' }
            dev-* → { docFile: 'docs/workflow/phases.md', section: 'Phase 4: Dev Implementation' }
            code-review-* → { docFile: 'docs/workflow/phases.md', section: 'Phase 5: Code Review' }
            qa-* → { docFile: 'docs/workflow/phases.md', section: 'Phase 6/7: QA Verification' }
            architect-* → { docFile: 'docs/workflow/agent-system.md', section: 'Architecture Agents' }
            workflow-* → { docFile: 'docs/workflow/orchestration.md', section: 'Cross-Cutting Concerns' }
            commands/*.md → { docFile: 'docs/workflow/README.md', section: 'Commands Overview' }
          Unknown patterns → add to manualReviewItems.
        - Returns mapping per file.
      Phase 4 (updateDocumentation):
        - checkOnly guard: if checkOnly=true, skip all writes, just count what would change.
        - For each file+section mapping, read the doc file.
          Find the markdown table section using the section anchor string.
          For 'added': append new row. For 'modified': update existing row.
          For 'deleted': remove row or mark as deprecated.
          If section anchor not found: add to manualReviewItems, increment manualReviewCount.
        - Write updated content back to doc file (skip if checkOnly=true).
        - Track sectionsUpdated count.
        - Handle deleted files (changeType='deleted'): remove agent row from table.

  - id: 5
    subtask_id: "ST-5"
    description: "Implement Phase 5 (Mermaid Diagram Regeneration) and Phase 6 (Changelog Entry Drafting)"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
    files_to_read:
      - ".claude/skills/doc-sync/SKILL.md"
    dependencies: [4]
    slice: backend
    verification: "Unit tests for Mermaid generation and version bump logic pass"
    acs_covered: ["AC-2"]
    notes: >
      Phase 5 (regenerateMermaidDiagram):
        - For each parsed file with a 'spawns' array in frontmatter, generate Mermaid:
            graph TD
                agentName[agentName] --> spawn1[spawn1]
                agentName --> spawn2[spawn2]
        - Validate: starts with 'graph TD'/'flowchart'/'sequenceDiagram', brackets balanced,
          --> arrows present (if spawns > 0).
        - On validation failure: preserve existing diagram (do NOT write), add to manualReviewItems.
        - On success: write diagram into the appropriate section of the doc file (checkOnly guard).
        - Track diagramsRegenerated count.
      Phase 6 (draftChangelog):
        - Read docs/workflow/changelog.md. Parse current version from /## \[(\d+\.\d+\.\d+)\]/.
        - Determine bump: if any deleted agents → major; if any added agents/commands → minor;
          otherwise → patch (metadata changes).
        - Increment version per bump type.
        - Draft entry in SKILL.md format with [DRAFT] marker.
        - Insert after changelog header (first line of the file or after YAML frontmatter if present).
        - checkOnly guard: skip write if checkOnly=true.
        - Track changelogDrafted boolean.

  - id: 6
    subtask_id: "ST-6"
    description: "Implement Phase 7 (SYNC-REPORT.md generation), wire all 7 phases into docSyncImpl(), and map 4 completion signals to return states"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
    files_to_read:
      - ".claude/skills/doc-sync/SKILL.md"
    dependencies: [5]
    slice: backend
    verification: "Integration test with all mocks produces valid DocSyncResultSchema output"
    acs_covered: ["AC-2", "AC-5", "AC-7"]
    notes: >
      Phase 7 (generateSyncReport):
        - Assemble SYNC-REPORT.md content with all sections from SKILL.md Phase 7 spec.
        - Must include the exact summary lines for regex parsing:
            '- Total files changed: N'
            '- Total sections updated: N'
            '- Total diagrams regenerated: N'
            '- Manual review items: N'
        - Include Database Query Status section with databaseStatus, components count, phases count.
        - Write to reportPath using fs.writeFile. On EACCES/write error: add to errors[], set success=false.
      docSyncImpl() orchestration:
        - Run phases 1-7 in sequence.
        - Track: filesChanged, sectionsUpdated, diagramsRegenerated, manualReviewNeeded, errors[].
        - Completion signal mapping (AC-5):
            DOC-SYNC COMPLETE: success=true, manualReviewNeeded=0, errors=[]
            DOC-SYNC COMPLETE (warnings): success=true, manualReviewNeeded>0
            DOC-SYNC CHECK FAILED: success=false (checkOnly mode, out-of-sync)
            DOC-SYNC BLOCKED: success=false, errors=[reason]
        - No-changes path: filesChanged=0 → still success=true, skip phases 4-6.
        - @repo/workflow-logic usage (AC-7): if Phase 1 filters files with story ID patterns,
          use isValidStoryId(). If Phase 3 uses directory-based status, use getStatusFromDirectory().
      docSyncNode = createToolNode('doc_sync', async (state) => docSyncImpl(state, {}))
      createDocSyncNode(config) = createToolNode('doc_sync', async (state) => docSyncImpl(state, config))

  - id: 7
    subtask_id: "ST-7"
    description: "Write unit test suite with ≥80% coverage — all TEST-PLAN.md scenarios (HP-1 to HP-5, EC-1 to EC-5, EC-6, EG-1 to EG-6)"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/__tests__/doc-sync.test.ts"
    files_to_read:
      - "plans/future/platform/wint/in-progress/WINT-9020/_pm/TEST-PLAN.md"
      - "packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts"
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
    dependencies: [6]
    slice: backend
    verification: "pnpm test --filter @repo/orchestrator -- --coverage (≥80% on nodes/sync/doc-sync.ts)"
    acs_covered: ["AC-10", "AC-13"]
    notes: >
      Mock setup required:
        - vi.mock('node:child_process', () => ({ exec: vi.fn() })) — for git diff (Phase 1)
        - vi.mock('node:fs/promises', ...) — for readFile, writeFile, readdir, stat
        - vi.mock('@repo/logger', ...) — standard logger mock (matches workflow/__tests__ pattern)
        - DB queries: injected via config.queryComponents / config.queryPhases (no module mock needed)
      Test scenarios:
        HP-1: all 7 phases succeed with one changed agent file, DB unavailable (file-only)
        HP-2: checkOnly=true, out-of-sync detected, no writes to doc files
        HP-3: checkOnly=true, empty git diff → success=true, filesChanged=0
        HP-4: force=true, all agent files processed (5+ files), filesChanged>=5
        HP-5: DB available, queryComponents returns 10 items → database_status='success'
        EC-1: git exec throws ENOENT → timestamp fallback, logger.warn called
        EC-2: two files, one with malformed YAML → manualReviewNeeded>=1, success=true
        EC-3: queryComponents throws ConnectionError → database_status='connection_failed', file-only
        EC-4: queryComponents throws TimeoutError → database_status='timeout', logger.warn called
        EC-5: writeFile for SYNC-REPORT.md throws EACCES → errors.length>0, success=false
        EC-6: no files found (empty git + no timestamp files) → success=false, errors populated
        EG-1: empty git diff, no force → success=true, all counts=0
        EG-2: spawns with invalid chars → Mermaid validation fails, existing preserved, manualReviewNeeded>=1
        EG-3: git diff returns 'D .claude/agents/obsolete.agent.md' → sectionsUpdated>=1
        EG-4: 50 files via force mode → filesChanged=50, no crash
        EG-5: checkOnly=true + force=true → no doc writes, success=false (some out-of-sync)
        EG-6 (AC-13): same fixture input run twice → identical DocSyncResult (deep equality)
      NOTE: The existing tests in nodes/workflow/__tests__/doc-sync.test.ts test the subprocess
      node — they must NOT be modified (keep passing for the subprocess variant).

  - id: 8
    subtask_id: "ST-8"
    description: "TypeScript and ESLint cleanup — zero type errors and zero lint errors across all new/changed files"
    files:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
      - "packages/backend/orchestrator/src/nodes/sync/index.ts"
      - "packages/backend/orchestrator/src/nodes/sync/__tests__/doc-sync.test.ts"
      - "packages/backend/orchestrator/src/nodes/index.ts"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/sync/doc-sync.ts"
      - "packages/backend/orchestrator/src/nodes/sync/index.ts"
      - "packages/backend/orchestrator/src/nodes/sync/__tests__/doc-sync.test.ts"
      - "packages/backend/orchestrator/src/nodes/index.ts"
    dependencies: [7]
    slice: backend
    verification: "pnpm check-types --filter @repo/orchestrator && pnpm lint --filter @repo/orchestrator"
    acs_covered: ["AC-11", "AC-12"]
    notes: >
      Run pnpm check-types --filter @repo/orchestrator — fix all TypeScript errors.
      Run pnpm lint --filter @repo/orchestrator — fix all ESLint errors on new/changed files only.
      Common issues to pre-check:
        - Import paths must use .js extension (ESM convention in this codebase)
        - No console.log — use logger from @repo/logger
        - Zod schema objects must not use TypeScript interfaces (use z.infer<>)
        - No barrel file additions (direct source imports only)
        - Trailing commas, single quotes, no semicolons per Prettier config

