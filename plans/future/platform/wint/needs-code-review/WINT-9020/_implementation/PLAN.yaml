# ============================================================================
# Architectural Decisions
# ============================================================================
architectural_decisions:
  - id: ARCH-001
    question: "Path for native doc-sync node: nodes/sync/ vs nodes/workflow/?"
    decision: "Create at nodes/sync/doc-sync.ts. Retain nodes/workflow/doc-sync.ts unchanged."
    rationale: "ELAB auto-resolved. Story index entry specifies nodes/sync/. Coexistence with subprocess variant during Phase 9 parity work."
    decided_by: elaboration-auto

  - id: ARCH-002
    question: "How to inject DB query functions for testability?"
    decision: "Add optional queryComponents and queryPhases fields to DocSyncConfigSchema (z.function().optional()). Default implementation attempts real call; tests inject mocks."
    rationale: "Avoids module-level vi.mock complexity for DB. Aligns with dependency injection pattern used elsewhere in orchestrator config objects."
    decided_by: plan

  - id: ARCH-003
    question: "Should nodes/index.ts re-export the sync/ node (creating a name collision with workflow/ docSyncNode)?"
    decision: "Yes, add sync/ exports under a new '// Sync Nodes' comment section. The workflow/ section already exports docSyncNode — graph code importing from nodes/index.ts may get the sync version after this change. Existing consumers that need the subprocess version must import directly from './workflow/index.js'."
    rationale: "ST-1 specifies updating nodes/index.ts. The sync/ node is the primary going forward; workflow/ subprocess version is retained for backward compatibility but de-emphasized."
    decided_by: plan

# ============================================================================
# Complexity Assessment
# ============================================================================
complexity: complex

# ============================================================================
# Notes
# ============================================================================
notes:
  - "All file paths use .js extension in imports (ESM convention)."
  - "Do NOT modify nodes/workflow/doc-sync.ts, nodes/workflow/index.ts, or existing tests in nodes/workflow/__tests__/."
  - "The nodes/index.ts currently exports docSyncNode from ./workflow/index.js. After ST-1, it will also export from ./sync/index.js. Consumers must be aware of the dual export — the '// Sync Nodes' section export is the native port."
  - "Phase 1 uses exec() (promisified) not spawn() — git diff output is buffered, not streamed."
  - "DB injection via config.queryComponents/queryPhases is the testability pattern — avoids mocking MCP module internals."
  - "AC-13 determinism: SYNC-REPORT.md timestamp will vary — test must compare structural counts only, not full string equality."
  - "The 9 existing tests in nodes/workflow/__tests__/doc-sync.test.ts mock spawn and readFile. These remain valid for the subprocess node and must continue passing."
  - "From ELAB: repoRoot defaults to workingDir — git subprocess cwd uses repoRoot, file operations use workingDir."
  - "Flag precedence (ELAB gap-2): force governs file list, checkOnly governs write permission. Combined checkOnly+force: all files evaluated, none written."
