summary: >
  Implemented generate-stories-index.ts CLI script that reads story state from
  wint.stories database, supplements with YAML frontmatter fallback for phase/
  risk_notes/feature/infrastructure fields, and writes a DO NOT EDIT generated
  version of stories.index.md. All 13 ACs satisfied.

  Fix iteration 1 (REVIEW-001): Replaced TypeScript interface GenerationResult
  with Zod schema GenerationResultSchema per CLAUDE.md Zod-first types requirement.
  Updated imports to include StoryRowSchema and StorySectionSchema. Added
  vi.mock('../../__types__/index.js') in both test files to stub out the
  StoryRowSchema import (which transitively pulls in @repo/database-schema,
  unavailable in the worktree test environment). All 78 tests still pass.

