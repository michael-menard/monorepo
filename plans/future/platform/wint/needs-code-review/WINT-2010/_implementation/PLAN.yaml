architectural_decisions:
  - id: ARCH-001
    question: 'HTTP server library choice: Node.js built-in http module vs Hono (already used in apps/api/lego-api/server.ts)'
    decision: Use Node.js built-in http module
    rationale: >-
      Sidecar is a simple single-endpoint service with no routing complexity. Adding Hono as a new dependency to
      packages/backend/sidecars/role-pack/ is unnecessary overhead. Built-in http is sufficient and avoids new npm
      dependency. Autonomy: aggressive — Tier 2 preference auto-accepted.
    decided_by: auto
  - id: ARCH-002
    question: 'Frontmatter parsing: regex vs gray-matter library'
    decision: Use regex-first frontmatter extraction
    rationale: >-
      ELAB.yaml decision_completeness note confirms regex-first approach decided. Pattern: /^---\n([\s\S]*?)\n---/
      extracts YAML block; simple key:value parse for version field. gray-matter is not a current monorepo dependency —
      avoids new package. Autonomy: aggressive — Tier 5 external dependency auto-accepted as low-risk per regex
      alternative.
    decided_by: auto
  - id: ARCH-003
    question: 'Role enum: [''dev'',''po'',''qa'',''da''] vs previous [''pm'',''dev'',''qa'',''po'']'
    decision: Use ['dev','po','qa','da'] matching actual WINT-0210 output files
    rationale: >-
      ELAB gap-1 resolution and AC-10 explicitly require this. 'pm' has no corresponding file; 'da' (devil's advocate)
      is the correct 4th role per WINT-0210. All story subtask descriptions and test fixtures must use dev/po/qa/da.
    decided_by: auto
complexity: moderate
