strategy: unit+integration
scope:
  endpoints:
    - "GET /role-pack?role={pm|dev|qa|po}&v={optional integer}"
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "HTTP GET /role-pack returns 200 with content for valid role"
    setup: "Start sidecar; ensure .claude/prompts/role-packs/dev.md exists with version: 1 frontmatter"
    action: "GET /role-pack?role=dev"
    expected: "HTTP 200, Content-Type: application/json, body: { content: '...' } with non-empty string ≤ 300 tokens"
    evidence: "HTTP response status 200 and body parsed successfully"

  - id: HP-2
    title: "HTTP GET /role-pack with explicit version returns correct content"
    setup: "Start sidecar; .claude/prompts/role-packs/pm.md has frontmatter version: 1"
    action: "GET /role-pack?role=pm&v=1"
    expected: "HTTP 200, body.content matches file content (frontmatter stripped)"
    evidence: "Response body.content is non-empty, version matches file"

  - id: HP-3
    title: "MCP tool rolePackGet returns content string for valid role"
    setup: "role-packs/qa.md exists with version: 1 frontmatter"
    action: "rolePackGet({ role: 'qa' })"
    expected: "Returns non-null string containing role pack content"
    evidence: "Unit test assertion: result !== null, typeof result === 'string'"

  - id: HP-4
    title: "MCP tool rolePackGet with version param returns content"
    setup: "role-packs/po.md exists with version: 2 frontmatter"
    action: "rolePackGet({ role: 'po', version: 2 })"
    expected: "Returns content string"
    evidence: "Unit test result is non-null string"

  - id: HP-5
    title: "File reader caches content in memory"
    setup: "role-packs/dev.md exists; reader called once"
    action: "Call reader twice for same role; modify file on disk between calls"
    expected: "Second call returns same content as first (cache hit, no re-read)"
    evidence: "Unit test mock fs.readFile called exactly once despite two reader invocations"

  - id: HP-6
    title: "All 4 roles (pm, dev, qa, po) return valid content"
    setup: "All 4 fixture files present in src/__fixtures__/"
    action: "GET /role-pack?role=pm, /role-pack?role=dev, /role-pack?role=qa, /role-pack?role=po"
    expected: "All return HTTP 200 with non-empty content"
    evidence: "4 x HTTP 200 responses"

error_cases:
  - id: EC-1
    title: "Unknown role returns 404"
    setup: "Sidecar running"
    action: "GET /role-pack?role=architect"
    expected: "HTTP 404, body: { error: 'Unknown role' }"
    evidence: "Response status 404, body.error present"

  - id: EC-2
    title: "Missing role query param returns 400"
    setup: "Sidecar running"
    action: "GET /role-pack (no role param)"
    expected: "HTTP 400, body: { error: 'role is required' }"
    evidence: "Response status 400"

  - id: EC-3
    title: "Version specified but not found returns 404 with available version"
    setup: "role-packs/dev.md has version: 1 frontmatter"
    action: "GET /role-pack?role=dev&v=99"
    expected: "HTTP 404, body: { error: 'Version not found', available: 1 }"
    evidence: "Response status 404, body.available field present"

  - id: EC-4
    title: "Role pack file not found returns 404"
    setup: "role-packs/pm.md does not exist (WINT-0210 not yet landed); no fixture fallback configured"
    action: "GET /role-pack?role=pm"
    expected: "HTTP 404, body: { error: 'Unknown role' } or similar; logger.warn called"
    evidence: "HTTP 404; logger.warn spy called with role details"

  - id: EC-5
    title: "MCP tool rolePackGet returns null on missing file"
    setup: "role-packs/pm.md does not exist"
    action: "rolePackGet({ role: 'pm' })"
    expected: "Returns null; logger.warn called"
    evidence: "Unit test: result === null, warn spy called"

  - id: EC-6
    title: "MCP tool throws ZodError on invalid role input"
    setup: "None"
    action: "rolePackGet({ role: 'invalid' })"
    expected: "Throws ZodError (not null, not silent failure)"
    evidence: "Unit test: expect(() => rolePackGet({role:'invalid'})).rejects.toThrow(ZodError)"

  - id: EC-7
    title: "File read error (permissions) handled gracefully"
    setup: "role-packs/qa.md exists but unreadable (mocked fs.readFile to throw)"
    action: "GET /role-pack?role=qa"
    expected: "HTTP 404 (not 500); logger.warn called with error details"
    evidence: "Response status is 404, not 500; warn spy called"

edge_cases:
  - id: ED-1
    title: "Malformed frontmatter in role pack file"
    setup: "role-packs/dev.md has invalid YAML in frontmatter (e.g. unclosed brace)"
    action: "GET /role-pack?role=dev"
    expected: "Returns 404 or serves content without version; does not 500; logger.warn called"
    evidence: "No 500; warn spy called; version defaults to null/undefined"

  - id: ED-2
    title: "Empty role pack file"
    setup: "role-packs/pm.md is empty (0 bytes)"
    action: "GET /role-pack?role=pm"
    expected: "HTTP 404 or empty content; logger.warn called; does not 500"
    evidence: "No uncaught exception; status is not 500"

  - id: ED-3
    title: "Role pack file with no frontmatter returns content without version"
    setup: "role-packs/po.md has plain markdown content, no YAML frontmatter"
    action: "GET /role-pack?role=po (no v param)"
    expected: "HTTP 200 with full file content; version treated as undefined/null"
    evidence: "Response 200, content non-empty"

  - id: ED-4
    title: "Version param is non-integer rejected at HTTP layer"
    setup: "Sidecar running"
    action: "GET /role-pack?role=dev&v=abc"
    expected: "HTTP 400 (invalid v param) or 404 (no match); not 500"
    evidence: "Status is 400 or 404, not 500"

  - id: ED-5
    title: "Concurrent requests for same role served from cache"
    setup: "role-packs/dev.md exists; cache populated on first request"
    action: "50 concurrent GET /role-pack?role=dev requests"
    expected: "All return 200; fs.readFile called at most once"
    evidence: "Unit test: read mock called exactly once; all promises resolve to same content"

tooling_evidence:
  backend:
    http_requests:
      - "GET http://localhost:{PORT}/role-pack?role=dev — expect 200 { content: string }"
      - "GET http://localhost:{PORT}/role-pack?role=dev&v=1 — expect 200 { content: string }"
      - "GET http://localhost:{PORT}/role-pack?role=unknown — expect 404 { error: 'Unknown role' }"
      - "GET http://localhost:{PORT}/role-pack — expect 400 { error: 'role is required' }"
      - "GET http://localhost:{PORT}/role-pack?role=dev&v=99 — expect 404 { error: 'Version not found', available: N }"
    assertions:
      - "status: 200 with body.content string"
      - "status: 400 with body.error message"
      - "status: 404 with body.error message"
      - "Content-Type: application/json on all responses"
      - "logger.warn called on miss/error (spy assertion)"
      - "fs.readFile call count matches cache behavior"
  frontend: []

manual_cases:
  - id: MC-1
    title: "UAT: Real sidecar with WINT-0210 role pack files"
    steps:
      - "Ensure WINT-0210 role pack files exist in .claude/prompts/role-packs/"
      - "Start role-pack sidecar process"
      - "Send GET /role-pack?role=dev — verify content is dev-appropriate"
      - "Send GET /role-pack?role=pm — verify content is pm-appropriate"
      - "Send GET /role-pack?role=qa — verify content is qa-appropriate"
      - "Send GET /role-pack?role=po — verify content is po-appropriate"
      - "Verify content token count is 150-300 per role"
    expected: "All 4 roles return valid non-empty content within token budget"

fixture_definitions:
  - name: "dev.md"
    type: "role-pack-fixture"
    description: "Stub role pack for dev role with version: 1 frontmatter, ~10 placeholder tokens"
  - name: "pm.md"
    type: "role-pack-fixture"
    description: "Stub role pack for pm role with version: 1 frontmatter"
  - name: "qa.md"
    type: "role-pack-fixture"
    description: "Stub role pack for qa role with version: 1 frontmatter"
  - name: "po.md"
    type: "role-pack-fixture"
    description: "Stub role pack for po role with version: 1 frontmatter"

risks:
  - "WINT-0210 content not available — mitigated by fixture stubs for unit tests; UAT must use real files per ADR-005"
  - "HTTP server port conflicts in CI — sidecar should use configurable PORT env var"
  - "Version parsing ambiguity in malformed frontmatter — parser must not throw on bad YAML"
  - "In-memory cache makes cache-hit tests stateful — tests must clear cache between runs or use fresh instances"
  - "Frontmatter stripping completeness — test must assert content does not include '---' YAML delimiters in output"
