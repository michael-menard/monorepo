feasible: true
confidence: high
rationale: "WINT-2010 is a greenfield backend package with clear canonical patterns. The MCP tool structure is well-established in packages/backend/mcp-tools/. The HTTP server layer is a single-endpoint handler. The only non-trivial aspect is YAML frontmatter parsing for versioning, which can be handled with a lightweight regex or gray-matter. No database dependency, no Lambda deployment, no auth complexity. High confidence this is implementable in a single dev phase."
complexity: medium
change_surface:
  areas:
    - "packages/backend/sidecars/role-pack/ (new package — greenfield)"
    - "pnpm-workspace.yaml (new package registration)"
    - "turbo.json (new package in pipeline, if not auto-discovered)"
  endpoints:
    - "GET /role-pack?role={pm|dev|qa|po}&v={optional integer}"
  deploy_touchpoints:
    - "New package must be added to pnpm workspace"
    - "turbo.json pipeline may need update if sidecars/ not already in glob pattern"
    - "Sidecar runs as local process, not deployed to AWS Lambda"

risks:
  - finding: "pnpm-workspace.yaml glob may not include packages/backend/sidecars/** — new package might not be auto-discovered"
    mitigation: "Check workspace glob pattern during scaffolding; add explicit entry if needed. Verify with pnpm list after scaffold."
  - finding: "YAML frontmatter parsing: if gray-matter is not already a monorepo dependency, adding it requires a pnpm add step"
    mitigation: "Use a simple regex (/^---\\n([\\s\\S]*?)\\n---/) for v1 frontmatter extraction to avoid new dependency. If gray-matter already exists in workspace, prefer it."
  - finding: "In-memory cache is process-scoped — multiple sidecar instances (e.g. in parallel worktrees) will have independent caches"
    mitigation: "Acceptable for v1. Document in README. Callers should not rely on cache coherence across processes."

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter @repo/sidecar-role-pack passes"
  - "pnpm check-types --filter @repo/sidecar-role-pack passes"
  - "HTTP integration test: GET /role-pack?role=dev returns 200 { content: string }"
  - "All 3 test files present: role-pack-reader.test.ts, role-pack-get.test.ts, http-endpoint.test.ts"
  - "Coverage report shows ≥80% line coverage for all new src files"

subtasks:
  - id: ST-1
    title: "Scaffold package at packages/backend/sidecars/role-pack/"
    goal: "Create the package directory with package.json (@repo/sidecar-role-pack), tsconfig.json, vitest.config.ts, and register in pnpm workspace. Confirm pnpm install recognises the new package."
    files_to_read:
      - "packages/backend/mcp-tools/package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
    files_to_modify:
      - "packages/backend/sidecars/role-pack/package.json (create)"
      - "packages/backend/sidecars/role-pack/tsconfig.json (create)"
      - "pnpm-workspace.yaml (add packages/backend/sidecars/** glob if missing)"
    acs: ["AC-1"]
    depends_on: none
    verification: "pnpm install && pnpm check-types --filter @repo/sidecar-role-pack"
    estimated_tokens: 6000

  - id: ST-2
    title: "Define Zod schemas in src/__types__/index.ts"
    goal: "Create RoleSchema (z.enum pm/dev/qa/po), RolePackGetInputSchema, RolePackGetOutputSchema. All types inferred with z.infer<>, no TypeScript interfaces."
    files_to_read:
      - "packages/backend/mcp-tools/src/context-cache/__types__/index.ts"
    files_to_modify:
