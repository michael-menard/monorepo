gaps:
  - id: gap-1
    check: risk_disclosure
    finding: >
      The seed script invocation (pnpm seed:cohesion-rules) requires a database connection but
      the story does not document any guard against accidental production environment targeting.
      While idempotency makes re-seeding safe (proposeRule returns conflict, no duplicates),
      a missing environment-safety pattern means the seed could be run in the wrong environment
      without a clear warning or barrier. Recommend documenting: (a) which environment variable
      or config flag determines the DB target, and (b) whether the script should emit a
      confirmation prompt or NODE_ENV check before executing against non-local DBs.
    severity: low
    decision: log_to_kb
    ac_added: false
    decision_rationale: >
      Low severity. Idempotency already mitigates production-run risk (proposeRule returns
      conflict, no data destroyed). This is a documentation/disclosure concern, not a
      core-journey blocker. The seed can still run successfully without this guard. Logged
      to KB as a future seed-script authoring pattern.
    kb_entry_id: "1ebf9666-3bd6-4328-92f9-569fc28e9034"

opportunities:
  - id: opp-1
    category: observability
    finding: >
      The seed script could emit a structured summary log at completion (e.g., "Seed complete:
      4 proposed, 4 promoted, 0 conflicts, 0 failures") via @repo/logger. This would provide
      post-deploy confidence without requiring a manual getRules() call. Low implementation
      effort since @repo/logger is already a required dependency.
    effort: low
    decision: log_to_kb
    kb_entry_id: "cc42119d-d578-4ce2-a0cd-a14f03ddca74"

  - id: opp-2
    category: ux_polish
    finding: >
      EC-2 (promote failure handling) uses the phrase "exits cleanly or reports failure count"
      — the "or" leaves behavior ambiguous. For operational clarity, recommend specifying exact
      behavior: non-zero exit code on any promote failure (so CI/CD pipelines can detect
      partial seed failures) combined with a logged count per-rule. This is a story-authoring
      refinement that would improve implementer confidence, not a blocking gap.
    effort: low
    decision: log_to_kb
    kb_entry_id: "abe2eef9-a5e1-4415-80e7-0a926a346096"

  - id: opp-3
    category: observability
    finding: >
      A snapshot test is mentioned in the Test Plan but not mapped to a dedicated subtask.
      ST-4 covers "unit tests" and ST-5 covers "integration tests." The snapshot test appears
      to be bundled into ST-5 implicitly (integration test asserts exact rule set), but having
      it explicitly named in the subtask goal would prevent it from being deprioritized under
      time pressure. Low-risk omission since the snapshot is implied by HP-3 in the test plan.
    effort: low
    decision: log_to_kb
    kb_entry_id: "e3a2ca6b-36fb-46c6-863d-0869082b9e83"

  - id: opp-4
    category: integrations
    finding: >
      The story notes that WINT-4120 (prosecutor/judge integration) depends on this story's
      active ruleset. Consider adding a `getRules({ status: 'active' }).length >= 4` assertion
      as a health-check that can be called by the WINT-4120 bootstrap to validate prerequisites
      before running enforcement logic. This would make the inter-story contract explicit and
      machine-verifiable, rather than relying on documentation cross-references.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "f8253bde-829a-4820-8d6a-770ad067d86f"

