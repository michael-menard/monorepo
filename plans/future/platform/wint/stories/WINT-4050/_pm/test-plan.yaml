strategy: unit+integration
scope:
  endpoints:
    - "proposeRule() direct-call via @repo/sidecar-rules-registry"
    - "promoteRule() direct-call via @repo/sidecar-rules-registry"
    - "getRules() direct-call via @repo/sidecar-rules-registry"
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Seed script proposes and promotes all canonical rules on first run"
    setup: "Clean wint.rules table (no existing cohesion rules); @repo/sidecar-rules-registry connected to test DB"
    action: "Run the seed script (e.g., pnpm seed:cohesion-rules)"
    expected: "proposeRule() called for each of 4 rules; promoteRule() called for each; getRules({ status: 'active' }) returns exactly 4 rules with correct rule_text, rule_type, severity"
    evidence: "Integration test asserts getRules({ status: 'active' }).length === 4 and each rule has source_story_id === 'WINT-4050'"

  - id: HP-2
    title: "All seeded rules carry source_story_id WINT-4050"
    setup: "Seed script ran successfully (HP-1 complete)"
    action: "Call getRules({ status: 'active' }) and inspect each rule's source_story_id"
    expected: "All 4 active rules have source_story_id === 'WINT-4050'"
    evidence: "Integration test assertion on source_story_id field for all returned rules"

  - id: HP-3
    title: "Snapshot: exact rule set after seeding matches expected specification"
    setup: "Clean DB; seed script executed"
    action: "Call getRules({ status: 'active' }), extract rule_text + rule_type + severity for each"
    expected: |
      Snapshot matches:
      - "A feature with a 'create' capability must have a corresponding 'delete' capability" | gate | error
      - "A feature with a 'delete' capability must have a corresponding 'create' capability" | gate | error
      - "A feature with an 'update' capability must have a corresponding 'read' capability" | gate | warning
      - "A feature with an 'upload' capability must have a corresponding 'replace' or 'update' capability" | prompt_injection | warning
    evidence: "Snapshot test in unit test suite asserting exact rule definitions"

error_cases:
  - id: EC-1
    title: "Idempotency: re-running seed does not duplicate rules"
    setup: "Seed script already ran successfully; all 4 rules are active in wint.rules"
    action: "Run the seed script a second time"
    expected: "proposeRule() returns { ok: false, conflicting_ids: [...] } for each rule; seed script logs conflict gracefully and does not call promoteRule() again; getRules({ status: 'active' }) still returns exactly 4 rules"
    evidence: "Integration test runs seed twice; asserts rule count unchanged; no exception thrown"

  - id: EC-2
    title: "Promote failure: seed script handles promoteRule returning an error"
    setup: "Mock promoteRule() to return { ok: false, error: 'source_story_id missing' }"
    action: "Run seed script with mocked promoteRule"
    expected: "Seed script catches the error, logs via @repo/logger, and either throws with a clear message or skips that rule and reports failure count"
    evidence: "Unit test with mocked promoteRule verifies error is logged and execution continues or exits cleanly"

  - id: EC-3
    title: "proposeRule conflict detection: identical rule text is case-insensitively rejected"
    setup: "Rule with text 'a feature with a create capability must have a corresponding delete capability' already exists (lowercase)"
    action: "Call proposeRule() with the canonical capitalized rule text"
    expected: "proposeRule() returns { ok: false, conflicting_ids: [<existing_id>] }; seed script handles gracefully"
    evidence: "Unit test mocking proposeRule conflict response; seed script logs and continues"

edge_cases:
  - id: ED-1
    title: "Upload/replace rule stored as prompt_injection (not gate) without CRUD_STAGES extension"
    setup: "Seed script configured with upload/replace rule as rule_type: prompt_injection"
    action: "Run seed; call getRules({ status: 'active', rule_type: 'prompt_injection' })"
    expected: "Upload/replace rule is returned with rule_type: prompt_injection and severity: warning — not enforced as a hard gate"
    evidence: "Integration test filters by rule_type=prompt_injection and finds the upload/replace rule"

  - id: ED-2
    title: "Partial failure: proposeRule succeeds but promoteRule fails for one rule"
    setup: "Mock proposeRule() to succeed for all 4 rules; mock promoteRule() to fail for the 3rd rule"
    action: "Run seed script"
    expected: "3 rules promoted successfully; 1 rule remains in 'proposed' status; seed script logs the partial failure; does not crash"
    evidence: "Unit test asserting correct call counts and error log for the failed promote"

  - id: ED-3
    title: "Empty wint.rules table: seed script handles missing table gracefully"
    setup: "wint.rules table truncated to zero rows"
    action: "Run seed script"
    expected: "All 4 rules proposed and promoted successfully from a clean state"
    evidence: "Integration test using truncated table (or freshly migrated test DB)"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "getRules({ status: 'active' }).length === 4"
      - "All rules have source_story_id === 'WINT-4050'"
      - "rule_type values: gate (×3) and prompt_injection (×1)"
      - "severity values: error (×2), warning (×2)"
      - "No duplicate rule_text after idempotency re-run"
  frontend: null

manual_cases: []

fixture_definitions:
  - name: "cohesion-rules-seed"
    type: "seed script"
    description: "TypeScript seed script that proposes and promotes the 4 canonical cohesion rules into wint.rules"
  - name: "mock-propose-rule"
    type: "test mock"
    description: "Vi.fn() mock for proposeRule that can simulate success, conflict, or failure"
  - name: "mock-promote-rule"
    type: "test mock"
    description: "Vi.fn() mock for promoteRule that can simulate success or error"

risks:
  - "proposeRule conflict detection is case-insensitive text match — test DB must not have pre-existing rules with similar text from other test runs"
  - "Integration tests require a live wint.rules table (ADR-005) — test environment must have DB access"
  - "upload/replace rule type decision (AC-5) affects test assertions — snapshot test must reflect the final decision"
