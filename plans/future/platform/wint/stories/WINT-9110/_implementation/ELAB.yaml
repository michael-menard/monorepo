# =============================================================================
# Gaps (MVP-blocking if unaddressed)
# =============================================================================
gaps:
  - id: GAP-1
    severity: medium
    category: pattern_mismatch
    title: "index.ts only exports 4/8 existing graphs — new graphs follow incomplete pattern"
    description: >
      AC-7 says "following the existing pattern" but graphs/index.ts currently only exports
      metrics, story-creation, elaboration, code-audit. Review, qa, merge, and doc-graph are
      NOT exported from index.ts — consumers import them directly. The story should decide:
      (a) add all 6 new graphs to index.ts (consistent with AC-7), or (b) also add the 4
      missing existing graphs. Recommendation: only add the 6 new graphs per AC-7 scope;
      registering missing existing graphs is out of scope.
    recommendation: "Add clarification to AC-7: register the 6 new graphs only; do not retroactively add missing existing graphs"
    blocking: false

  - id: GAP-2
    severity: low
    category: pattern_mismatch
    title: "Injectable deps pattern inconsistency — config schema vs function parameter"
    description: >
      Story proposes z.unknown().optional() in config schema for all injectable deps (following
      story-creation.ts pattern). However, qa.ts uses a separate `deps` function parameter:
      `createQAGraph(config, deps)`. Since qa-verify.ts wraps qa.ts, it must pass deps as a
      function argument, not via config. The story should clarify that qa-verify.ts accepts
      modelClient in its own config and passes it as deps to createQAGraph.
    recommendation: "Add note to AC-5: qa-verify.ts must bridge between config.modelClient and createQAGraph(config, { modelClient })"
    blocking: false

  - id: GAP-3
    severity: low
    category: convention
    title: "GraphStateWithX uses TypeScript interface — conflicts with Zod-only mandate"
    description: >
      Existing graphs use `interface GraphStateWithX extends GraphState` for node adapter type
      widening. CLAUDE.md mandates Zod schemas only. This is a known exception in the codebase —
      GraphState intersection types are structural, not validated at runtime. Story should
      acknowledge this is an accepted exception.
    recommendation: "Document as accepted exception — GraphStateWith* interfaces are structural adapter types, not data schemas"
    blocking: false

  - id: GAP-4
    severity: medium
    category: missing_detail
    title: "elab-epic.ts dispatcher should be conditional edge function, not a node"
    description: >
      AC-2 describes fan-out dispatch but doesn't specify whether the dispatcher is a node or
      conditional edge function. In review.ts, the dispatcher is a conditional edge function
      wired via addConditionalEdges(START, createDispatcherNode()) that returns Send[]. The
      story's architecture notes section correctly shows this pattern but AC-2 text is ambiguous.
    recommendation: "AC-2 is sufficient — architecture notes clarify the Send[] conditional edge pattern. No AC change needed."
    blocking: false

  - id: GAP-5
    severity: low
    category: missing_detail
    title: "Conditional edge functions should be exported for testability"
    description: >
      AC-9 requires routing tests for conditional edge functions. In qa.ts, these are exported
      (afterCheckPreconditions, etc.). In story-creation.ts, they are private (not exported).
      Since the test plan requires direct routing tests, all afterX() functions must be exported.
    recommendation: "Add to implementation notes: export all afterX() conditional edge functions for routing test access"
    blocking: false

# =============================================================================
# Opportunities (non-blocking enhancements)
# =============================================================================
opportunities:
  - id: OPP-1
    severity: low
    category: enhancement
    title: "Shared graph result schema"
    description: >
      All 6 graphs return the same result envelope: {storyId, success, durationMs, completedAt,
      errors, warnings}. A shared BaseGraphResultSchema could be extended per-graph. However,
      this is a premature abstraction for 6 files — each graph may diverge in future fields.
    recommendation: "Skip — keep result schemas per-graph following existing pattern"

  - id: OPP-2
    severity: low
    category: enhancement
    title: "Shared overwrite reducer utility"
    description: >
      Each graph file defines `const overwrite = <T>(_: T, b: T): T => b` locally. Could be
      extracted to a shared utility. However, it's a single line and extraction adds import
      complexity for minimal benefit.
    recommendation: "Skip — keep inline per-file following existing pattern"

  - id: OPP-3
    severity: low
    category: testing
    title: "Shared createTestState() helper"
    description: >
      story-creation.test.ts defines createTestState() for fixture building. Each new test file
      will need its own. Could share a factory builder, but state shapes differ per graph.
    recommendation: "Skip — per-graph test fixtures are clearer than a generic factory"

# =============================================================================
# Preliminary Verdict
# =============================================================================
preliminary_verdict: CONDITIONAL_PASS

verdict_rationale: >
  Story is exceptionally well-prepared. 13 ACs cover all functional requirements, subtask
  decomposition is logical, canonical references are correct and verified against codebase,
  test plan with 34 unit tests is comprehensive. All pending dependencies are properly handled
  via injectable stubs (z.unknown().optional()). The 5 gaps identified are minor clarifications
  (pattern documentation, not missing functionality). No blocking gaps. The 13-point estimate
  and 3-subtask split are appropriate for the scope (~3000-4000 lines of new code across 6
  graph files, 12+ test files, and index registration).

conditions:
  - "GAP-1: Clarify AC-7 scope — register 6 new graphs only, not retroactive existing graph registration"
  - "GAP-2: Add implementation note for qa-verify.ts to bridge config → deps parameter for createQAGraph"
  - "GAP-5: Export all afterX() conditional edge functions for routing test access"

