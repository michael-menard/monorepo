architectural_decisions: []
complexity: simple
notes:
  - >-
    Tool count at seed time was 62. VERIFY actual getToolDefinitions().length before updating mcp-integration.test.ts —
    do not assume 62+4=66 if concurrent stories added tools.
  - >-
    storyOutcomes upsert MUST use .onConflictDoUpdate({ target: storyOutcomes.storyId, set: {...} }) — conflict target
    is the unique index 'story_outcomes_story_id_idx' on storyId column.
  - >-
    hitlDecisions.embedding is vector(1536) — pass number[] as-is; do not attempt embedding generation (deferred to
    WINT-3040).
  - >-
    Import DB schema tables directly from 'packages/backend/database-schema/src/schema/wint.ts' — no barrel files per
    CLAUDE.md policy.
  - >-
    workflow_get_story_telemetry must use Promise.all for three parallel DB queries; outcome is null (not empty array)
    when no row exists.
  - >-
    WINT-0040 migration dependency: wint.hitl_decisions and wint.story_outcomes tables must exist in the target DB
    before integration tests for those two tools can pass. Manual case MC-1 confirms this.
  - All 4 tools are backend-only. No frontend changes, no new npm packages, no infrastructure changes.
  - >-
    Pattern reference for Zod validation + Drizzle + error handling:
    packages/backend/mcp-tools/src/graph-query/graph-get-franken-features.ts
  - >-
    Pattern reference for upsert: apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    (storyDetails.onConflictDoUpdate)
