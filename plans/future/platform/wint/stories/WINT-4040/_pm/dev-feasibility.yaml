feasible: true
confidence: high
rationale: "This is a standalone populate script following an established pattern (populate-domain-kb.ts, populate-library-cache.ts). All infrastructure (graph.capabilities table, graph.features table, @repo/db, @repo/database-schema) is deployed. The dependency injection pattern is proven and testable. The only execution gate is WINT-4030 merge (feature rows must exist), but unit testing is fully independent."
complexity: medium
change_surface:
  areas:
    - packages/backend/mcp-tools/src/scripts/
    - packages/backend/mcp-tools/src/scripts/__tests__/ (or __tests__ at script level)
    - packages/backend/mcp-tools/src/__types__/ (new Zod schemas)
  endpoints: []
  deploy_touchpoints:
    - "Run script manually after WINT-4030 data is verified in DB"
    - "No Lambda deployment needed — standalone CLI script"

risks:
  - finding: "Keyword heuristic will miss capabilities not lexically expressed in story text (e.g., implicit read on any feature that has a create)"
    mitigation: "Mark all inferred rows maturity_level='beta'; --validate flag surfaces gaps for human review post-population; WINT-4050 can refine rules"
  - finding: "WINT-4030 (populates graph.features) is at needs-code-review — feature rows may not exist until it merges"
    mitigation: "AC-9 early exit guard detects zero features and exits cleanly; unit tests use injected mocks so they run without live data; add explicit prerequisite note to story"
  - finding: "capability_name UNIQUE constraint will throw if insert is attempted without ON CONFLICT handling"
    mitigation: "AC-6 requires ON CONFLICT DO NOTHING semantics; Drizzle's .onConflictDoNothing() satisfies this; enforced by AC-6 unit test"

missing_requirements: []

evidence_expectations:
  - "pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --dry-run exits cleanly and shows inference table"
  - "Unit tests: pnpm test --filter @repo/mcp-tools -- infer-capabilities achieves >= 80% coverage"
  - "Post-run: SELECT count(*) FROM graph.capabilities WHERE maturity_level='beta' returns > 0"
  - "Post-run: SELECT count(*) FROM graph.capabilities GROUP BY feature_id shows multiple features covered"
  - "--validate output shows at least one feature with CRUD coverage data"

subtasks:
  - id: ST-1
    title: "Define Zod schemas for capability inference types"
    goal: "Create InferredCapabilitySchema, CapabilityInferenceResultSchema, and InferCapabilitiesOptionsSchema in __types__/index.ts"
    files_to_read:
      - packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - packages/backend/mcp-tools/src/scripts/__types__/index.ts
    acs: ["AC-8"]
    depends_on: "none"
    verification: "pnpm check-types --filter @repo/mcp-tools"
    estimated_tokens: 4000

  - id: ST-2
    title: "Implement keyword-to-lifecycle-stage mapping function"
    goal: "Create mapKeywordsToStages(text: string): LifecycleStage[] pure function with Zod-validated lookup table"
    files_to_read:
      - packages/backend/mcp-tools/src/scripts/__types__/index.ts
    files_to_modify:
      - packages/backend/mcp-tools/src/scripts/infer-capabilities.ts
    acs: ["AC-3"]
    depends_on: "ST-1"
    verification: "pnpm test --filter @repo/mcp-tools -- mapKeywordsToStages"
    estimated_tokens: 5000

  - id: ST-3
    title: "Implement story scanner that reads YAML files from plans/"
    goal: "Create scanStories(rootDir: string) that reads story YAML files from plans/future/platform/*/ and extracts feature, title, epic prefix"
    files_to_read:
      - packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts
    files_to_modify:
      - packages/backend/mcp-tools/src/scripts/infer-capabilities.ts
    acs: ["AC-2"]
    depends_on: "ST-1"
    verification: "pnpm test --filter @repo/mcp-tools -- scanStories"
    estimated_tokens: 6000

  - id: ST-4
    title: "Implement feature resolver that looks up UUID from graph.features by epic prefix"
    goal: "Create resolveFeatureId(epicPrefix: string, db: DB) with injectable dbFn for testability; handles not-found gracefully"
    files_to_read:
      - packages/backend/database-schema/src/schema/wint.ts
      - packages/backend/db/src/index.ts
    files_to_modify:
      - packages/backend/mcp-tools/src/scripts/infer-capabilities.ts
    acs: ["AC-4", "AC-9"]
    depends_on: "ST-1"
    verification: "pnpm test --filter @repo/mcp-tools -- resolveFeatureId"
    estimated_tokens: 5000

  - id: ST-5
    title: "Implement main inferCapabilities() orchestrator with injectable insertFn"
    goal: "Orchestrate ST-2/3/4; handle dedup (AC-6); emit PopulateResultSchema summary (AC-8); support --dry-run (AC-7)"
    files_to_read:
      - packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts
      - packages/backend/database-schema/src/schema/wint.ts
    files_to_modify:
      - packages/backend/mcp-tools/src/scripts/infer-capabilities.ts
    acs: ["AC-5", "AC-6", "AC-7", "AC-8"]
    depends_on: "ST-2,ST-3,ST-4"
    verification: "pnpm test --filter @repo/mcp-tools -- inferCapabilities"
    estimated_tokens: 8000

  - id: ST-6
    title: "Implement CLI entrypoint with --dry-run and --validate flag handling"
    goal: "Parse process.argv flags; call inferCapabilities(); for --validate, call graph_get_capability_coverage per feature and print report"
    files_to_read:
      - packages/backend/mcp-tools/src/graph-query/graph-get-capability-coverage.ts
      - packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts
    files_to_modify:
      - packages/backend/mcp-tools/src/scripts/infer-capabilities.ts
    acs: ["AC-1", "AC-7", "AC-11"]
    depends_on: "ST-5"
    verification: "pnpm tsx packages/backend/mcp-tools/src/scripts/infer-capabilities.ts --help"
    estimated_tokens: 5000

  - id: ST-7
    title: "Write unit test suite achieving >= 80% coverage"
    goal: "Cover: mapKeywordsToStages (all keyword branches), dedup logic, zero-features early exit, dry-run no-write, injectable insertFn isolation"
    files_to_read:
      - packages/backend/mcp-tools/src/scripts/infer-capabilities.ts
    files_to_modify:
      - packages/backend/mcp-tools/src/scripts/__tests__/infer-capabilities.test.ts
    acs: ["AC-10"]
    depends_on: "ST-5,ST-6"
    verification: "pnpm test --filter @repo/mcp-tools -- infer-capabilities --coverage"
    estimated_tokens: 8000
