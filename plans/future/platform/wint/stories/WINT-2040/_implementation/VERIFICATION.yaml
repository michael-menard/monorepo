architecture_notes: >
  - No console.log — all output via @repo/logger (verified by grep, zero matches)
  - No TypeScript interfaces — all types via Zod schemas with z.infer<>
  - No barrel files introduced
  - Direct Drizzle upsert (not contextCachePut MCP tool) — correctly independent of WINT-0100 UAT
  - packKey derived deterministically from path.basename(filePath, '.agent.md')
  - glob ignore pattern correctly excludes _archive/ subdirectory
  - Dependency injection used for db parameter enables unit testing without DB

issues: []

lessons_to_record:
  - lesson: >
      Dependency injection of the DB instance (accepting `db: any` parameter) enables
      unit-testing Drizzle upsert scripts without a live database, using a chainable
      vi.fn() mock that mirrors insert().values().onConflictDoUpdate() chain.
    category: pattern
    tags: ["testing", "drizzle", "seed-scripts", "database-schema"]

  - lesson: >
      Section-based regex extraction from Markdown (.agent.md body) using H2/H3 heading
      anchors is reliable for structured content but produces null for agents with
      non-standard formatting. Designing with graceful null-return and continuing rather
      than skipping allows 97%+ success rates even in heterogeneous corpora.
    category: pattern
    tags: ["parsing", "agent-files", "mission-extraction", "wint"]

  - lesson: >
      ALTER TYPE ... ADD VALUE IF NOT EXISTS (PostgreSQL 12+) is safe and non-blocking.
      The IF NOT EXISTS clause makes migrations idempotent, matching the upsert pattern
      used in the application layer. This should be standard for all enum extension migrations.
    category: pattern
    tags: ["migrations", "postgres", "enum", "idempotency"]

  - lesson: >
      The .$type<unknown>() Drizzle column type annotation (established in WINT-2030) is
      sufficient to accommodate arbitrary JSONB shapes without per-story schema changes —
      runtime Zod validation in the inserting code provides the actual type safety.
    category: reuse
    tags: ["drizzle", "jsonb", "typescript", "wint", "WINT-2030"]

