strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Script discovers all non-archived .agent.md files"
    setup: "Live .claude/agents/ directory with 142 agent files; _archive/ subdirectory excluded"
    action: "Run agent-mission-cache-populator script"
    expected: "Discovers all .agent.md files outside _archive/, counts >= 142"
    evidence: "result.totalFound >= 142"

  - id: HP-2
    title: "Standard-format agent frontmatter extracted correctly"
    setup: "Agent file with full frontmatter: name, type, permissionLevel, model, spawned_by, triggers, skills_used"
    action: "Run parseFrontmatter + extractAgentMetadata on the file"
    expected: "All fields extracted and match Zod schema AgentMetadataSchema"
    evidence: "Zod parse succeeds with no errors; all fields populated"

  - id: HP-3
    title: "Mission/scope extracted from standard-format agent body"
    setup: "Agent file with ## Mission and ## Scope sections in body"
    action: "Run body content mission extractor on file"
    expected: "mission field is non-empty string (<=200 chars), scope field populated"
    evidence: "Returned MissionSummarySchema parses correctly"

  - id: HP-4
    title: "Cache entry written to wint.context_packs with deterministic key"
    setup: "Mock DB (vi.mock('@repo/db')); agent file parsed successfully"
    action: "Call contextCachePut (or direct upsert) with packType and packKey = agent name without extension"
    expected: "DB insert called with correct packType, packKey = 'pm-bootstrap-workflow' (example), content JSONB with mission/scope/triggers/model/permissionLevel/spawnedBy"
    evidence: "DB mock verifies insert args match expected schema"

  - id: HP-5
    title: "Full population run achieves >= 90% success rate against live directory"
    setup: "Live .claude/agents/ directory; real PostgreSQL on port 5433 (KB database)"
    action: "Run agent-mission-cache-populator script end-to-end"
    expected: "result.cached >= 130 (90% of 142+ files)"
    evidence: "result object: { totalFound, cached, skipped, warnings }; cached/totalFound >= 0.90"

  - id: HP-6
    title: "Script produces summary result object"
    setup: "Mock DB; 5 sample agent files (3 valid, 1 malformed frontmatter, 1 missing Mission section)"
    action: "Run script end-to-end"
    expected: "Result: { totalFound: 5, cached: 3, skipped: 2, warnings: [<messages>] }"
    evidence: "Returned result matches SeedResultSchema"

error_cases:
  - id: EC-1
    title: "Malformed YAML frontmatter in agent file — skip with warning"
    setup: "Agent file with invalid YAML in frontmatter (unclosed quotes)"
    action: "Run parseFrontmatter on malformed file"
    expected: "Parse throws, error is caught, warning logged via @repo/logger, file is skipped; script continues"
    evidence: "result.skipped incremented; result.warnings contains filename; subsequent agents still processed"

  - id: EC-2
    title: "Missing Mission section in agent body — uses fallback or empty string"
    setup: "Agent file with only frontmatter, no body headings"
    action: "Run body content extractor on file"
    expected: "mission field is null or empty string; warning logged; entry still written with partial data"
    evidence: "Cache entry written with mission: null (or ''); result.warnings mentions file"

  - id: EC-3
    title: "DB write failure on single agent — skips and continues"
    setup: "Mock DB configured to throw on second insert call"
    action: "Process 3 agent files"
    expected: "First and third succeed; second skipped with error in warnings; result.skipped = 1, cached = 2"
    evidence: "Mock DB call count = 2 successful; result.warnings non-empty"

  - id: EC-4
    title: "Agent with no frontmatter at all — skipped cleanly"
    setup: "Agent file containing only markdown body text, no --- delimiters"
    action: "Run parseFrontmatter on file"
    expected: "Returns empty/null frontmatter; Zod validation fails; file skipped with warning"
    evidence: "result.skipped incremented; @repo/logger warning emitted"

  - id: EC-5
    title: "Script run when no .agent.md files exist in directory — returns zero-count result"
    setup: "Point script at empty temp directory"
    action: "Run script"
    expected: "result: { totalFound: 0, cached: 0, skipped: 0, warnings: [] }; no DB calls made; no crash"
    evidence: "Script exits cleanly with zero-count result"

edge_cases:
  - id: ED-1
    title: "_archive/ subdirectory files are excluded"
    setup: "Test fixture with 3 agent files in root and 2 in _archive/ subfolder"
    action: "Run glob discovery"
    expected: "Only 3 files discovered; archive files not processed"
    evidence: "result.totalFound = 3; archive agents not in DB mock calls"

  - id: ED-2
    title: "Idempotency — running script twice produces no duplicate rows"
    setup: "Real KB PostgreSQL (port 5433); first run completes successfully"
    action: "Run script twice in succession"
    expected: "Second run upserts (onConflictDoUpdate); row count unchanged; no duplicate rows for (packType, packKey)"
    evidence: "DB row count identical before and after second run; hitCount not reset unexpectedly"

  - id: ED-3
    title: "Agent file with partial frontmatter — extracts available fields, uses defaults for missing"
    setup: "Agent file with only 'type: worker' in frontmatter (no model, spawned_by, triggers)"
    action: "Run extractAgentMetadata"
    expected: "type='worker' extracted; model=null; spawned_by=null; triggers=null; Zod optional fields handle gracefully"
    evidence: "AgentMetadataSchema parses without error using .optional() chains"

  - id: ED-4
    title: "packKey is derived deterministically from filename (no extension)"
    setup: "Agent file at .claude/agents/pm-bootstrap-workflow.agent.md"
    action: "Run script on file"
    expected: "packKey = 'pm-bootstrap-workflow' (filename without .agent.md)"
    evidence: "DB mock called with packKey: 'pm-bootstrap-workflow'"

  - id: ED-5
    title: "agent_missions enum value (or packKey convention) is consistently applied"
    setup: "Run against 5 agent files with new packType (if migration added) or packKey convention"
    action: "Inspect DB writes"
    expected: "All entries use same packType value; packKeys follow consistent pattern"
    evidence: "All DB mock calls have identical packType; packKeys match expected convention"

  - id: ED-6
    title: "Mission text truncated to <= 200 characters"
    setup: "Agent file with Mission section containing 500+ character paragraph"
    action: "Run body content extractor"
    expected: "mission field in cache content is <= 200 characters"
    evidence: "mission.length <= 200"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "result.totalFound (number)"
      - "result.cached (number)"
      - "result.skipped (number)"
      - "result.warnings (string array)"
      - "DB upsert called with correct packType, packKey, content JSONB"
      - "No duplicate rows after second run"
      - "cached / totalFound >= 0.90 (integration test)"

manual_cases:
  - id: MC-1
    title: "Verify cache entries readable via context_cache_get MCP tool"
    steps:
      - "Run agent-mission-cache-populator script against live KB DB"
      - "Call context_cache_get({ packType: '<agreed-type>', packKey: 'pm-bootstrap-workflow' })"
      - "Inspect returned content JSON"
    expected: "Content contains mission, role/scope, triggers, model, permissionLevel fields; all readable"

  - id: MC-2
    title: "Inspect log output format for observability"
    steps:
      - "Run script in terminal"
      - "Observe log output format (should be JSON lines via @repo/logger)"
    expected: "Structured JSON log lines with level, message, and context fields; no raw console.log"

fixture_definitions:
  - name: standardAgentFile
    type: "string (file content)"
    description: "Agent .md file with full frontmatter (name, type, permissionLevel, model, spawned_by, triggers, skills_used) and body with ## Mission, ## Scope sections"
  - name: minimalAgentFile
    type: "string (file content)"
    description: "Agent .md file with only 'type: worker' in frontmatter, no body sections"
  - name: malformedFrontmatterFile
    type: "string (file content)"
    description: "Agent .md file with invalid YAML syntax in frontmatter block"
  - name: archiveAgentFile
    type: "string (file content)"
    description: "Valid agent file placed in _archive/ subdirectory — must be excluded"
  - name: longMissionAgentFile
    type: "string (file content)"
    description: "Agent file with 500+ character Mission section for truncation test"
  - name: mockDb
    type: "Vitest vi.mock"
    description: "Mock of @repo/db Drizzle client; tracks insert/onConflictDoUpdate calls"

risks:
  - "Body content parsing relies on regex/string extraction — 10% of agents may have unusual section formats that reduce cached count below 90% threshold (ED integration test may flap)"
  - "Integration test requires live KB PostgreSQL on port 5433 — test will fail if DB is not running"
  - "If agent_missions enum migration not run before integration test, pack type insert will fail at DB level (hard gate)"
  - "Idempotency test (ED-2) requires sequential execution — do not run in parallel with other DB tests that modify context_packs"
  - "hitCount behavior on second run depends on onConflictDoUpdate strategy — verify hitCount is reset vs. incremented per WINT-0100 pattern"
