feasible: true
confidence: high
rationale: >
  All required infrastructure is in place. The wint.context_packs table (WINT-0010) is deployed.
  The contextCachePut MCP tool (WINT-0100) is implemented and in UAT. Frontmatter parsing (WINT-0080)
  is deployed and tested. The agent-seeder.ts pattern provides a direct structural template.
  The only blocking decision is the agent_missions enum gap — Option A (migration) is recommended
  and is a low-risk ALTER TYPE ADD VALUE operation. All dependencies (gray-matter, glob, @repo/logger,
  Drizzle ORM) are already installed in the database-schema package.
complexity: medium
change_surface:
  areas:
    - packages/backend/database-schema/src/seed/
    - packages/backend/database-schema/src/migrations/
    - packages/backend/database-schema/src/schema/wint.ts
  endpoints: []
  deploy_touchpoints:
    - "Run database migration to add agent_missions value to contextPackTypeEnum"
    - "Run agent-mission-cache-populator script after migration (one-time + re-run on agent changes)"
risks:
  - finding: "contextPackTypeEnum lacks agent_missions value — writing with unsupported enum value causes PostgreSQL type error at insert"
    mitigation: "Add agent_missions to contextPackTypeEnum via ALTER TYPE migration (Option A). Migration is a single ADD VALUE statement — safe, non-destructive, no table lock required in PostgreSQL 12+. Option B (use existing type + key convention) is acceptable fallback but creates semantic confusion."
  - finding: "WINT-0030 (Context Cache Tables) is listed as a dependency but wint.context_packs already exists from WINT-0010. If WINT-0030 adds schema changes that affect context_packs, this story may need a compatibility review."
    mitigation: "Verify wint.context_packs columns before implementation. Per seed analysis, WINT-0030 adds other tables; context_packs is stable. Low risk."
  - finding: "WINT-0100 is in UAT — contextCachePut tool is not yet merged. If implementation begins before WINT-0100 completes, direct Drizzle upsert must be used instead of the MCP tool."
    mitigation: "Use direct DB upsert (onConflictDoUpdate) as primary implementation approach — mirrors what contextCachePut does internally. This is independent of WINT-0100 UAT status and matches agent-seeder.ts pattern."
missing_requirements:
  - "Decision on packType: which value to use for agent missions (new 'agent_missions' enum value via migration, or existing type). Story must document this decision in Architecture Notes."
evidence_expectations:
  - "pnpm check-types --filter @repo/database-schema passes after schema update"
  - "Migration file created under packages/backend/database-schema/src/migrations/"
  - "result.cached / result.totalFound >= 0.90 when script runs against live .claude/agents/"
  - "Idempotency verified: running script twice produces identical DB row count"
  - "pnpm test --filter @repo/database-schema passes all new unit tests"
subtasks:
  - id: ST-1
    title: "Add agent_missions enum value via database migration"
    goal: "Extend contextPackTypeEnum to include 'agent_missions' so cache entries can be written with correct pack type"
    files_to_read:
      - packages/backend/database-schema/src/schema/wint.ts
      - packages/backend/database-schema/src/migrations/app/0031_wint_0220_hitl_decisions.sql
    files_to_modify:
      - packages/backend/database-schema/src/schema/wint.ts
      - packages/backend/database-schema/src/migrations/app/ (new file)
    acs: ["AC-3", "AC-11"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/database-schema && pnpm migrate:apply (local DB)"
    estimated_tokens: 6000

  - id: ST-2
    title: "Create agent body content mission extractor"
    goal: "Extract mission, scope, and signals from .agent.md body Markdown using section-based regex"
    files_to_read:
      - packages/backend/database-schema/src/seed/parsers/metadata-extractor.ts
      - packages/backend/database-schema/src/seed/parsers/frontmatter-parser.ts
    files_to_modify:
      - packages/backend/database-schema/src/seed/parsers/mission-extractor.ts (new file)
    acs: ["AC-2", "AC-7"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/database-schema"
    estimated_tokens: 8000

  - id: ST-3
    title: "Create agent-mission-cache-populator script"
    goal: "Implement the main population script: glob discovery, parse, extract, upsert to wint.context_packs"
    files_to_read:
      - packages/backend/database-schema/src/seed/agent-seeder.ts
      - packages/backend/mcp-tools/src/context-cache/context-cache-put.ts
      - packages/backend/mcp-tools/src/context-cache/__types__/index.ts
    files_to_modify:
      - packages/backend/database-schema/src/seed/agent-mission-cache-populator.ts (new file)
    acs: ["AC-1", "AC-3", "AC-4", "AC-5", "AC-6", "AC-8", "AC-9"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/database-schema && node packages/backend/database-schema/src/seed/agent-mission-cache-populator.ts"
    estimated_tokens: 12000

  - id: ST-4
    title: "Write unit and integration tests"
    goal: "Cover frontmatter extraction, body mission parsing, upsert behavior, error handling, archive exclusion, idempotency"
    files_to_read:
      - packages/backend/database-schema/src/seed/__tests__/agent-seeder.test.ts
      - packages/backend/database-schema/src/seed/agent-mission-cache-populator.ts
    files_to_modify:
      - packages/backend/database-schema/src/seed/__tests__/agent-mission-cache-populator.test.ts (new file)
    acs: ["AC-10"]
    depends_on: ST-3
    verification: "pnpm test --filter @repo/database-schema"
    estimated_tokens: 10000
