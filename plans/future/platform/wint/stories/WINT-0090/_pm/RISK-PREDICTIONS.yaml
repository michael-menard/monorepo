## Appendix: Risk Scoring Methodology

**Likelihood Scale:**
- NEGLIGIBLE: 0-10%
- LOW: 10-30%
- MEDIUM: 30-60%
- HIGH: 60-90%
- CRITICAL: 90-100%

**Impact Scale:**
- NEGLIGIBLE: No visible effect
- LOW: Minor rework, <2 hours
- MEDIUM: Moderate rework, 2-8 hours
- HIGH: Major rework or redesign, >8 hours
- CRITICAL: Story failure or major pivot

**Severity Calculation:**
- Severity = Likelihood × Impact
- Aggregated to overall risk level with confidence weighting
