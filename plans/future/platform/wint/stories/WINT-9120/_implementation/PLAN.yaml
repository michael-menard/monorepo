architectural_decisions: []
complexity: moderate
notes:
  - >-
    WINT-9110 dependency gate: ST-5 must not begin until WINT-9110 is in ready-for-qa state. ST-1 through ST-4 and ST-6
    can proceed immediately.
  - >-
    WINT-9010 dependency: Do not import @repo/workflow-logic types in parity harness until WINT-9010 QA passes. Use
    local type inferences from existing graph exports.
  - >-
    vitest.config.ts: current config has no resolve.alias block — ST-1 must verify if @langchain/langgraph alias is
    needed and add it under resolve.alias if missing.
  - >-
    Existing __tests__ directory at src/__tests__/ already has fixtures/ subdirectory with README.md and STORY-TEST —
    parity/ will be a sibling directory at src/__tests__/parity/.
  - >-
    DocSyncInput is not a separate schema — the DocSyncConfigSchema (with injectable queryComponents/queryPhases) serves
    as the input contract. Parity tests should inject config to avoid real filesystem/git calls.
  - >-
    Timestamp determinism: use vi.useFakeTimers() in beforeEach and vi.useRealTimers() in afterEach, matching the
    node-factory.test.ts pattern.
  - >-
    ParityResult diff field paths use Zod schema notation (e.g., 'synthesizedStory.title', 'docSync.filesChanged') for
    consistency with schema-first design.
  - >-
    The Claude Code agent path for doc-sync is nodes/workflow/doc-sync.ts (subprocess delegation); the LangGraph native
    path is nodes/sync/doc-sync.ts (7-phase native implementation). Both accept the same DocSyncConfig-compatible input.
  - >-
    For story-creation and elaboration, the 'Claude Code agent path' in the parity context refers to direct invocation
    of the individual node functions (createStorySeedNode, createCompleteNode, etc.) vs the compiled graph
    runStoryCreation()/runElaboration() paths. Both paths ultimately produce SynthesizedStory/ElaborationResult outputs
    that can be Zod-validated.
