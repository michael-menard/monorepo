feasible: true
confidence: high
rationale: >
  The parity test harness is technically straightforward: it wraps two callable runners and compares their
  Zod-validated outputs. The key patterns (dependency injection, graph compilation tests, fixture factories,
  vi.mock for logger) are all proven in existing orchestrator tests. The main risk is timing — WINT-9010
  and WINT-9110 must reach stable states before full parity assertions can be finalized. The doc-sync and
  story-creation/elaboration parity tests (AC-1 through AC-4) can be scaffolded immediately against existing
  graphs. AC-5 (WINT-9110 workflows) must wait for WINT-9110. The @langchain/langgraph vitest alias needs
  verification but is a one-line config change if missing.
complexity: medium
change_surface:
  areas:
    - packages/backend/orchestrator/src/__tests__/parity/
    - packages/backend/orchestrator/vitest.config.ts
  endpoints: []
  deploy_touchpoints: []

risks:
  - finding: "WINT-9110 graphs do not yet exist — AC-5 parity tests cannot be written until WINT-9110 is at least ready-for-qa"
    mitigation: "Scaffold parity-harness.ts and doc-sync/story-creation/elaboration parity tests first; add WINT-9110 workflow tests when graphs are available. Story must not enter dev-implement until WINT-9110 is in ready-for-qa."
  - finding: "@langchain/langgraph vitest alias may be missing in packages/backend/orchestrator/vitest.config.ts"
    mitigation: "ST-1 explicitly verifies and adds the alias as first action. This is a one-line fix if absent. Reference: APIP-3030 lesson."
  - finding: "WINT-9010 (@repo/workflow-logic) QA not complete — shared Zod types used by parity harness may shift"
    mitigation: "Do not import @repo/workflow-logic types in parity harness until WINT-9010 QA passes. Use local type copies or defer type-based assertions to after WINT-9010 completes."
  - finding: "Existing graphs may have hardcoded external dependencies (non-injectable toolRunners) that prevent deterministic parity testing"
    mitigation: "ST-2 audits each graph for injection boundaries before writing parity tests. If injection gaps found, raise a blocker note — fixing those graphs is out of scope for WINT-9120."

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter @repo/orchestrator passes the full parity suite with exit code 0"
  - "Coverage report shows >= 80% branch coverage within packages/backend/orchestrator/src/__tests__/parity/"
  - "ParityResult schema Zod validation passes for at least one 'matching' and one 'divergent' result per workflow"
  - "No real network calls in unit parity tests (verified by mocking all external dependencies)"
  - "README.md present in parity/ directory"

subtasks:
  - id: ST-1
    title: "Verify/add @langchain/langgraph vitest alias and create parity directory scaffold"
    goal: "Ensure module resolution works for LangGraph imports in parity tests; create directory structure and parity-harness.ts skeleton"
    files_to_read:
      - packages/backend/orchestrator/vitest.config.ts
      - packages/backend/orchestrator/src/graphs/__tests__/story-creation.test.ts
    files_to_modify:
      - packages/backend/orchestrator/vitest.config.ts
      - packages/backend/orchestrator/src/__tests__/parity/parity-harness.ts
    acs: ["AC-1", "AC-10"]
    depends_on: "none"
    verification: "pnpm check-types --filter @repo/orchestrator && pnpm test --filter @repo/orchestrator src/__tests__/parity/parity-harness"
    estimated_tokens: 6000

  - id: ST-2
    title: "Design and implement ParityResult Zod schema with structured diff support"
    goal: "Define ParityResult Zod schema (verdict: matching|divergent|error, diff array with fieldPath/actual/expected, optional knownDivergences); wire into parity-harness.ts"
    files_to_read:
      - packages/backend/orchestrator/src/artifacts/
      - packages/backend/orchestrator/src/__tests__/parity/parity-harness.ts
    files_to_modify:
      - packages/backend/orchestrator/src/__tests__/parity/parity-harness.ts
      - packages/backend/orchestrator/src/__tests__/parity/parity-result.schema.ts
    acs: ["AC-1", "AC-7"]
    depends_on: "ST-1"
    verification: "pnpm check-types --filter @repo/orchestrator"
    estimated_tokens: 7000

