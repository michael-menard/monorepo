architectural_decisions:
  - id: ARCH-001
    question: 'ST-2: Should packTypeValues add only ''agent_missions'' or also the packKey-named values from WINT-2030/2050/2060?'
    decision: >-
      Add ONLY 'agent_missions' — project-conventions/blockers-known/lib-* are packKeys under existing packTypes, not
      new packType enum values
    rationale: >-
      Elaboration (ELAB.yaml gap-1) confirmed upstream stories use existing packTypes with new packKeys. Adding
      non-existent enum values would cause Zod validation failures at runtime.
    decided_by: autonomous_elaboration
