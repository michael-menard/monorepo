complexity: simple
notes:
  - 'Per ARCH-001 (WINT-1120): integration tests must target lego_dev on port 5432, NOT KB database on port 5433'
  - >-
    Per lesson APIP-2020: if enum-typed columns are queried in filters, use sql`column::text` (raw SQL tag) rather than
    Drizzle query builder enum handling
  - 'Per lesson APIP-3020: both tables are high-volume write targets; design for bulk insert not row-by-row'
  - >-
    Per lesson WINT-1060: add JSDoc comment insertion points for WINT-3070 (telemetry-log skill) in both hitlDecisions
    and storyOutcomes tables
  - >-
    vector customType must be defined locally in wint.ts — cross-package import from knowledge-base would create
    inappropriate dependency
  - >-
    ivfflat index cannot be expressed via standard Drizzle index() builder; manually append to generated migration after
    db:generate
  - >-
    Migration numbering confirmed: current max is 0031; 0032 is next safe number (note: two 0030_* files exist,
    collision already occurred)
  - No architectural decisions requiring user input — all patterns are established with clear precedents
  - ST-4 and ST-5 are independent and can run in parallel (both depend on ST-3 only)
