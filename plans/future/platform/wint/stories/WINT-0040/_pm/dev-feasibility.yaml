    title: "Add vector customType and hitlDecisions table to wint.ts"
    goal: "Define the hitlDecisions Drizzle table with all specified columns, indexes, and the vector(1536) embedding column. Add customType and vector definition to wint.ts imports/top section."
    files_to_read:
      - "packages/backend/database-schema/src/schema/wint.ts"
      - "apps/api/knowledge-base/src/db/schema.ts"
    files_to_modify:
      - "packages/backend/database-schema/src/schema/wint.ts"
    acs: ["AC-1", "AC-2"]
    depends_on: "none"
    verification: "pnpm check-types --filter @repo/database-schema"
    estimated_tokens: 6000
  - id: ST-2
    title: "Add storyOutcomes table to wint.ts"
    goal: "Define the storyOutcomes Drizzle table with all specified columns and indexes (unique on storyId, btree on finalVerdict, btree on completedAt, composite btree on finalVerdict+completedAt). Add after hitlDecisions in the telemetry section."
    files_to_read:
