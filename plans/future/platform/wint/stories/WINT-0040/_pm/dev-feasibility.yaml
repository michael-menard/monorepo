feasible: true
confidence: high
rationale: >
  This is a pure database schema extension with well-established patterns already present in wint.ts.
  The agentInvocations, agentDecisions, agentOutcomes, and stateTransitions tables provide direct
  canonical references. The only novel element is the vector(1536) column on hitlDecisions, which
  requires adding a customType definition (copied from apps/api/knowledge-base/src/db/schema.ts).
  The ivfflat index is the one syntax risk — Drizzle may not express it natively, requiring a
  post-generation manual edit. Both new tables are additive with no modification of existing tables.
complexity: low
change_surface:
  areas:
    - "packages/backend/database-schema/src/schema/wint.ts"
    - "packages/backend/database-schema/src/schema/__tests__/wint-schema.test.ts"
    - "packages/backend/database-schema/src/migrations/app/ (generated migration)"
  endpoints: []
  deploy_touchpoints:
    - "pnpm --filter @repo/database-schema db:generate (generate migration)"
    - "pnpm --filter @repo/database-schema db:migrate (apply to lego_dev port 5432)"
risks:
  - finding: "vector customType not yet imported in wint.ts — requires adding customType to drizzle-orm/pg-core imports and defining a vector customType function (identical to the one in apps/api/knowledge-base/src/db/schema.ts lines 43-58)"
    mitigation: "Copy the vector customType definition from knowledge-base schema.ts into wint.ts before defining hitlDecisions table. Add customType to the drizzle-orm/pg-core import list."
  - finding: "ivfflat index on hitl_decisions.embedding cannot be expressed via standard Drizzle index() builder — Drizzle does not support USING ivfflat WITH (lists=100) syntax natively"
    mitigation: "After running db:generate, manually add the ivfflat CREATE INDEX statement to the generated migration SQL: CREATE INDEX idx_hitl_decisions_embedding_ivfflat ON wint.hitl_decisions USING ivfflat (embedding vector_cosine_ops) WITH (lists = 100). This is consistent with how knowledge-base handles its embedding index."
  - finding: "Migration number must be verified — current max is 0031; concurrent story generation could claim 0032"
    mitigation: "Check ls packages/backend/database-schema/src/migrations/app/ | sort | tail -1 immediately before running db:generate. Use the next number after the current maximum."
missing_requirements: []
evidence_expectations:
  - "wint-schema.test.ts AC-004 describe block passes with hitlDecisions and storyOutcomes assertions"
  - "pnpm --filter @repo/database-schema test exits with code 0"
  - "pnpm build exits with code 0 (no TypeScript errors)"
  - "Generated migration SQL contains CREATE TABLE IF NOT EXISTS wint.hitl_decisions and wint.story_outcomes"
  - "psql SELECT on lego_dev returns both tables in information_schema.tables"
subtasks:
