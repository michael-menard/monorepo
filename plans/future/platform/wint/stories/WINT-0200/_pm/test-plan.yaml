strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "Schema exists and passes meta-schema validation"
    setup: "Navigate to packages/backend/orchestrator/src/schemas/"
    action: "Run: npx ajv validate -s https://json-schema.org/draft/2020-12/schema -d packages/backend/orchestrator/src/schemas/user-flows.schema.json"
    expected: "Command exits 0, output indicates validation passed"
    evidence: "Terminal output showing exit code 0 and no validation errors"

  - id: HP-2
    title: "Schema contains all required fields and structure"
    setup: "Open packages/backend/orchestrator/src/schemas/user-flows.schema.json"
    action: "Audit file for: $schema (draft 2020-12), $id, title, schema_version field with semver pattern, flows array with maxItems:5, UserFlowState enum (5 values), UserFlowCapability enum (7 values), UserFlowStep.capabilities maxItems:7, UserFlow.steps maxItems:7"
    expected: "All fields present and match spec exactly"
    evidence: "File content diff or checklist showing each required field verified"

  - id: HP-3
    title: "Canonical example validates against user-flows schema"
    setup: "Ensure user-flows.example.json exists at packages/backend/orchestrator/src/schemas/examples/"
    action: "Run: npx ajv validate -s packages/backend/orchestrator/src/schemas/user-flows.schema.json -d packages/backend/orchestrator/src/schemas/examples/user-flows.example.json"
    expected: "Command exits 0, no validation errors"
    evidence: "Terminal output showing exit code 0"

  - id: HP-4
    title: "Example file is within 10-25 line budget"
    setup: "Navigate to packages/backend/orchestrator/src/schemas/examples/"
    action: "Run: wc -l packages/backend/orchestrator/src/schemas/examples/user-flows.example.json"
    expected: "Line count is between 10 and 25 (inclusive)"
    evidence: "wc -l output showing line count in range [10, 25]"

  - id: HP-5
    title: "Example demonstrates required content (2+ flows, states, capabilities, featureName)"
    setup: "Open packages/backend/orchestrator/src/schemas/examples/user-flows.example.json"
    action: "Inspect file for: featureName field, at least 2 flows, each flow uses at least one UserFlowState value, each flow uses at least one UserFlowCapability value"
    expected: "All content requirements met"
    evidence: "File content review with each requirement checked off"

  - id: HP-6
    title: "WINT-0210 schema path compatibility confirmed"
    setup: "Open plans/future/platform/wint/ready-to-work/WINT-0210/WINT-0210.md"
    action: "Search for user-flows.schema.json path reference in AC-7 and PO role pack scope; verify the path matches packages/backend/orchestrator/src/schemas/user-flows.schema.json exactly"
    expected: "Path in WINT-0210 matches actual schema file location"
    evidence: "Side-by-side comparison of path in WINT-0210.md and actual file path"

error_cases:
  - id: EC-1
    title: "flows array with 6 items fails maxItems:5 constraint"
    setup: "Create a temporary test file /tmp/test-overflow-flows.json with schema_version and a flows array containing 6 items"
    action: "Run: npx ajv validate -s packages/backend/orchestrator/src/schemas/user-flows.schema.json -d /tmp/test-overflow-flows.json"
    expected: "Command exits non-zero; AJV reports maxItems violation on flows array"
    evidence: "Terminal output showing validation failure with maxItems error on flows"

  - id: EC-2
    title: "steps array with 8 items fails maxItems:7 constraint"
    setup: "Create a temporary test file /tmp/test-overflow-steps.json with schema_version, 1 flow, and that flow's steps array containing 8 items"
    action: "Run: npx ajv validate -s packages/backend/orchestrator/src/schemas/user-flows.schema.json -d /tmp/test-overflow-steps.json"
    expected: "Command exits non-zero; AJV reports maxItems violation on steps array"
    evidence: "Terminal output showing validation failure with maxItems error on steps"

  - id: EC-3
    title: "Invalid UserFlowState value rejected"
    setup: "Create /tmp/test-bad-state.json with a step using an invalid state value (e.g., 'error' instead of 'server_error')"
    action: "Run: npx ajv validate -s packages/backend/orchestrator/src/schemas/user-flows.schema.json -d /tmp/test-bad-state.json"
    expected: "Command exits non-zero; AJV reports enum constraint violation"
    evidence: "Terminal output showing enum validation failure"

  - id: EC-4
    title: "Missing required schema_version field rejected"
    setup: "Create /tmp/test-no-version.json with flows array but no schema_version field"
    action: "Run: npx ajv validate -s packages/backend/orchestrator/src/schemas/user-flows.schema.json -d /tmp/test-no-version.json"
    expected: "Command exits non-zero; AJV reports missing required field schema_version"
    evidence: "Terminal output showing required field violation"

edge_cases:
  - id: ED-1
    title: "Empty flows array (minItems:0) is valid"
    setup: "Create /tmp/test-empty-flows.json with schema_version and empty flows array"
    action: "Run: npx ajv validate -s packages/backend/orchestrator/src/schemas/user-flows.schema.json -d /tmp/test-empty-flows.json"
    expected: "Command exits 0 — empty flows array is valid per minItems:0"
    evidence: "Terminal output showing exit code 0"

  - id: ED-2
    title: "Flow with exactly 5 flows and exactly 7 steps each passes (boundary)"
    setup: "Create /tmp/test-boundary.json with exactly 5 flows each having exactly 7 steps"
    action: "Run: npx ajv validate -s packages/backend/orchestrator/src/schemas/user-flows.schema.json -d /tmp/test-boundary.json"
    expected: "Command exits 0 — boundary values are valid"
    evidence: "Terminal output showing exit code 0"

  - id: ED-3
    title: "AJV v8 strict mode compatibility (--strict=false if needed)"
    setup: "Note the AJV version installed: npx ajv --version"
    action: "If AJV v8 strict mode causes issues with draft 2020-12, retry validation with --strict=false flag"
    expected: "Validation passes with or without --strict=false; follow pattern from WINT-0190 if flag needed"
    evidence: "AJV version output and final passing command documented"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "AJV exit code 0 for positive validation cases (HP-1, HP-3)"
      - "AJV exit code non-zero for negative validation cases (EC-1, EC-2, EC-3, EC-4)"
      - "wc -l output in range [10, 25] for example file (HP-4)"
      - "Schema file contains all 5 UserFlowState enum values: loading, empty, validation_error, server_error, permission_denied"
      - "Schema file contains all 7 UserFlowCapability enum values: create, view, edit, delete, upload, replace, download"

manual_cases:
  - id: MC-1
    title: "Visual audit of schema structure matches spec"
    steps:
      - "Open packages/backend/orchestrator/src/schemas/user-flows.schema.json"
      - "Verify $schema is https://json-schema.org/draft/2020-12/schema"
      - "Verify $id is https://lego-moc-platform.com/schemas/user-flows.schema.json"
      - "Verify title is User Flows Schema or similar"
      - "Verify schema_version has semver pattern constraint"
      - "Verify flows.maxItems is 5"
      - "Verify UserFlow.steps.maxItems is 7"
      - "Verify UserFlowStep.capabilities.maxItems is 7"
      - "Verify UserFlowState enum has exactly 5 values"
      - "Verify UserFlowCapability enum has exactly 7 values"
    expected: "All checks pass with no discrepancies from the index spec"

fixture_definitions:
  - name: "user-flows.example.json"
    type: "JSON fixture"
    description: "Canonical example file at packages/backend/orchestrator/src/schemas/examples/user-flows.example.json — 10-25 lines, 2+ flows, demonstrates states and capabilities"

  - name: "test-overflow-flows.json"
    type: "Temporary negative test fixture"
    description: "Ad-hoc JSON file with 6 flows to verify maxItems:5 rejection — created during testing, discarded after"

  - name: "test-overflow-steps.json"
    type: "Temporary negative test fixture"
    description: "Ad-hoc JSON file with 8 steps in one flow to verify maxItems:7 rejection — created during testing, discarded after"

risks:
  - "AJV v8 may require --strict=false flag for draft 2020-12 validation — check WINT-0190 commands for precedent"
  - "npx ajv may need ajv-formats package for certain string format validations — not expected for this schema but check if meta-schema validation fails"
  - "WINT-0210 path reference may point to ready-to-work/ directory which may have moved to UAT/ — verify current location of WINT-0210.md before AC-6 check"
  - "wc -l counts differ between macOS (counts newlines) and Linux — example file should stay well within 10-25 range to avoid off-by-one issues"
