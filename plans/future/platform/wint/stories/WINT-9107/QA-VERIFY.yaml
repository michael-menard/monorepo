lessons_to_record:
  - lesson: >-
      Scoping coverage with --coverage.include="src/<module>/**" isolates meaningful coverage
      numbers when the package has many untested modules. Without scoping, coverage appears
      misleadingly low (3.33% statements) because untouched adapters/graphs are included.
    category: pattern
    tags: ['testing', 'coverage', 'vitest', 'orchestrator']

  - lesson: >-
      vi.useFakeTimers() in beforeEach with vi.useRealTimers() in afterEach is the correct
      pattern for HALF_OPEN circuit breaker tests — avoids flaky real-timer waits while
      maintaining per-test isolation. Documented in node-author-guide.md per ADR-005.
    category: pattern
    tags: ['testing', 'vitest', 'circuit-breaker', 'fake-timers']

  - lesson: >-
      Pre-existing TS errors in unrelated modules (elaboration/) should not block story QA
      when the story scope is explicitly limited to runner/ and all runner/ files compile cleanly.
      PARTIAL verdict on AC-10 is acceptable when REVIEW verdict is PASS and errors are documented.
    category: pattern
    tags: ['typescript', 'qa', 'pre-existing-errors']

