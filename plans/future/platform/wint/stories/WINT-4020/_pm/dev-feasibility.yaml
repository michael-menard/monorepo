    verification: "pnpm check-types --filter @repo/sidecar-rules-registry"
    estimated_tokens: 8000

  - id: ST-6
    title: "Implement HTTP server (server.ts) on port 3093"
    goal: "Create server.ts using Node.js built-in http module, PORT env var pattern, port table comment block"
    files_to_read:
      - "packages/backend/sidecars/role-pack/src/server.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/server.ts (create)"
    acs:
