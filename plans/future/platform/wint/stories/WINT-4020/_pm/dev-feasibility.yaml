  - id: ST-7
    title: "Implement MCP tool wrappers (rules_registry_get, rules_registry_propose)"
    goal: "Create direct-call MCP wrappers in @repo/mcp-tools following context-pack-get.ts pattern (ARCH-001)"
    files_to_read:
