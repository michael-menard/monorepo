feasible: true
confidence: high
rationale: >
  WINT-4020 follows a well-established sidecar pattern used by role-pack (port 3090), context-pack (port 3091),
  and cohesion (port 3092/WINT-4010). All structural components have direct canonical references. The primary
  novel element is the rules table Drizzle migration, which is a straightforward schema addition to
  postgres-knowledgebase. The conflict detection algorithm is simple (case-insensitive text match) and defers
  semantic similarity to future stories. Blocking dependency: WINT-2020 must reach UAT before implementation starts.
complexity: high
change_surface:
  areas:
    - "packages/backend/sidecars/rules-registry/ (new package)"
    - "packages/backend/mcp-tools/src/rules-registry/ (new MCP wrapper files)"
    - "packages/backend/database-schema/ (new Drizzle migration for rules table)"
  endpoints:
    - "GET /rules (sidecar, port 3093)"
    - "POST /rules (sidecar, port 3093)"
    - "POST /rules/:id/promote (sidecar, port 3093)"
  deploy_touchpoints:
    - "pnpm install (workspace auto-detects new sidecar package)"
    - "Drizzle migration run against postgres-knowledgebase (port 5433)"
    - "Sidecar process startup (node dist/server.js, PORT=3093)"

risks:
  - finding: "Blocking dependency: WINT-2020 (Context Pack Sidecar) is in failed-qa. Implementation cannot start until WINT-2020 reaches UAT."
    mitigation: "Story can be fully seeded, elaborated, and worktree pre-provisioned now. Do not mark ready-to-work until WINT-2020 clears QA. Monitor WINT-2020 status in stories.index.md."
  - finding: "Drizzle migration requires adding a new rules table to postgres-knowledgebase without modifying any protected existing tables. If migration tooling or DB access is broken, the story cannot proceed."
    mitigation: "Follow exact migration pattern established in WINT-0060/WINT-0131 migrations. Verify DB connection to port 5433 before starting. Test migration in isolation before integration tests."
  - finding: "Port 3093 must be confirmed unused. If cohesion sidecar (WINT-4010) or another service expanded its port range, conflict could silently break server startup."
    mitigation: "Check all existing sidecar server.ts files for PORT assignments before starting. Document port 3093 assignment in server.ts comment block referencing full port table."

missing_requirements: []

evidence_expectations:
  - "pnpm check-types --filter @repo/sidecar-rules-registry passes (0 TypeScript errors)"
  - "pnpm test --filter @repo/sidecar-rules-registry passes with >=45% coverage"
  - "Integration test against postgres-knowledgebase port 5433 passes for GET /rules and POST /rules"
  - "Drizzle migration creates rules table with all required columns (verify with \\d rules in psql)"
  - "pnpm check-types --filter @repo/mcp-tools passes after adding rules-registry wrappers"

subtasks:
  - id: ST-1
    title: "Scaffold @repo/sidecar-rules-registry package"
    goal: "Create package directory, package.json, tsconfig.json, vitest.config.ts following role-pack template"
    files_to_read:
      - "packages/backend/sidecars/role-pack/package.json"
      - "packages/backend/sidecars/role-pack/tsconfig.json"
      - "packages/backend/sidecars/role-pack/vitest.config.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/package.json (create)"
      - "packages/backend/sidecars/rules-registry/tsconfig.json (create)"
      - "packages/backend/sidecars/rules-registry/vitest.config.ts (create)"
    acs:
      - "AC-1"
    depends_on: "none"
    verification: "pnpm install && pnpm -r ls | grep sidecar-rules-registry"
    estimated_tokens: 4000

  - id: ST-2
    title: "Create Drizzle migration for rules table"
    goal: "Add rules table to postgres-knowledgebase with all required columns and enums"
    files_to_read:
      - "packages/backend/database-schema/src/migrations/ (latest migration for pattern)"
      - "packages/backend/database-schema/src/schemas/ (existing schema files for pattern)"
    files_to_modify:
      - "packages/backend/database-schema/src/migrations/<next-number>-add-rules-table.ts (create)"
      - "packages/backend/database-schema/src/schemas/rules.ts (create)"
    acs:
      - "AC-3"
      - "AC-4"
    depends_on: "ST-1"
    verification: "Run migration against local postgres-knowledgebase; psql -p 5433 -c '\\d rules'"
    estimated_tokens: 6000

  - id: ST-3
    title: "Define Zod schemas in src/__types__/index.ts"
    goal: "Create all input/output/HTTP response Zod schemas for rules endpoints following role-pack pattern"
    files_to_read:
      - "packages/backend/sidecars/role-pack/src/__types__/index.ts"
      - "packages/backend/sidecars/context-pack/src/__types__/index.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/__types__/index.ts (create)"
    acs:
      - "AC-5"
      - "AC-6"
    depends_on: "ST-1"
    verification: "pnpm check-types --filter @repo/sidecar-rules-registry"
    estimated_tokens: 5000

  - id: ST-4
    title: "Implement core compute functions (getRules, proposeRule, promoteRule)"
    goal: "Create DB-backed compute functions using @repo/db client; export for direct-call by MCP wrappers"
    files_to_read:
