      - "packages/backend/sidecars/rules-registry/src/rules-registry.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/http-handler.ts (create)"
    acs:
      - "AC-2"
      - "AC-3"
      - "AC-4"
      - "AC-6"
      - "AC-10"
