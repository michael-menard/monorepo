      - "packages/backend/sidecars/rules-registry/src/__types__/index.ts"
    files_to_modify:
      - "packages/backend/sidecars/rules-registry/src/rules-registry.ts (create)"
      - "packages/backend/sidecars/rules-registry/src/conflict-detector.ts (create)"
    acs:
      - "AC-2"
      - "AC-3"
      - "AC-4"
      - "AC-10"
