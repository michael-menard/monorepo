    goal: "Define kbQueryFn parameter (injectable, defaults to real Drizzle connection to port 5433). Query KB for lesson-learned entries, group by domain area tag. Query for constraint/blocker entries. Extract structured JSONB per group with content length capped at 8000 chars."
    files_to_read:
