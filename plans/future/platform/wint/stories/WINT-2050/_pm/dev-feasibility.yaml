    goal: "Read plans/stories/ADR-LOG.md, extract ADR entries using extractSections() pattern, produce structured { summary, adrs: [{id, title, constraint, status}] } JSONB, write via contextCachePut() with packType:'architecture', packKey:'active-adrs'"
    files_to_read:
