notes:
  - "Markdown-only deliverable — no TypeScript, no new packages, no migrations, no infra changes."
  - "All 3 steps touch the same single file (.claude/commands/story-move.md) in sequence — ST-1 first, ST-2 builds on ST-1 output, ST-3 finalizes."
  - "SWIM_LANE_TO_STATE exact mapping from __types__/index.ts: backlog→backlog, ready-to-work→ready_to_work, in-progress→in_progress, ready-for-qa→ready_for_qa, UAT→in_qa, done→done (done is in constant but NOT a valid TO_STAGE target for /story-move)."
  - "Unmapped stages (no DB write): created, elaboration, needs-code-review, failed-code-review, failed-qa."
  - "story-update.md v3.0.0 is the canonical sibling pattern — use Step 3 shimUpdateStoryStatus call block as structural template for Step 2.5, excluding the worktree cleanup section."
  - "AC-10 independence prose must appear verbatim in Step 2.5: locate null does not suppress write path."
  - "Version bump: frontmatter version: 2.0.0 → 2.1.0; updated: 2026-01-24 → 2026-02-18."
  - "db_updated: true = DB write succeeded; false = DB write returned null (unavailable); skipped = TO_STAGE unmapped or --update-status flag provided."
