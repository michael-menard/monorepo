lessons_to_record:
  - lesson: >-
      Benchmark integration tests that self-skip on DB unavailability are a clean pattern — the isDatabaseAvailable()
      guard lets unit tests run in CI without a live DB while integration coverage is preserved for local/DB-provisioned
      runs.
    category: pattern
    tags:
      - backend
      - testing
      - integration
      - benchmark
  - lesson: >-
      When a story's only touched file is a test file, type-check errors in the overall package can be pre-existing and
      should be scoped by file path during QA rather than blocking a PASS verdict on unrelated failures.
    category: pattern
    tags:
      - qa
      - typecheck
      - pre-existing
