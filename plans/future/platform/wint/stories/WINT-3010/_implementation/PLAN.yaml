architectural_decisions:
  - id: ARCH-001
    question: 'Proof schema design: how to enforce per-stage required fields with passthrough for extra fields'
    decision: >-
      Use z.discriminatedUnion('stage', [...]) at request level where each branch defines its own required proof shape.
      Proof sub-objects use .passthrough() to allow extra fields without failure.
    rationale: Explicitly specified in story Architecture Notes and AC-5. Matches elaboration PASS decision on ports_adapters.
    decided_by: story
  - id: ARCH-002
    question: 'MCP wrapper transport: direct import vs HTTP call'
    decision: Import compute function directly from @repo/gatekeeper-sidecar — no fetch('http://localhost:3094/...')
    rationale: >-
      OPP-04 lesson from WINT-4010. Direct-call pattern established by context-pack-get.ts. Avoids runtime HTTP
      coupling.
    decided_by: story
  - id: ARCH-003
    question: ok:false discriminated union variant shape for 422 vs 400/404/405 responses
    decision: >-
      ok:false variant includes missing_proofs?: z.array(z.string()).optional(). This field is populated on 422
      responses and absent (undefined) on 400/404/405 responses.
    rationale: >-
      GAP-001 from ELAB resolved this: AC-11 updated to include missing_proofs?: string[] in ok:false variant.
      Consistent with HTTP Contract Plan and all EC test expectations.
    decided_by: elaboration
complexity: moderate
