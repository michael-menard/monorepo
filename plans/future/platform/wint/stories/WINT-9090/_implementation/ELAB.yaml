opportunities:
  - id: opp-1
    category: edge_cases
    finding: >
      session-query.ts exists in packages/backend/mcp-tools/src/session-management/
      (confirmed via filesystem) but is not included in the session-manager node's
      operation dispatch table. The node supports create/update/complete/cleanup but
      not query/read operations. Depending on downstream graph requirements
      (WINT-9110), a query operation may be needed to retrieve session state for
      conditional routing decisions.
    effort: low
    decision: log_to_kb
    kb_entry_id: "4ba2979f-a4f7-4b1d-9cc1-a57898595a5f"

  - id: opp-2
    category: edge_cases
    finding: >
      AC-13 and ST-3 specify cache invalidation as accessible "via the context-warmer
      node or a companion utility" — the implementation approach (operation mode vs
      separate export vs utility function) is left to the implementer. Documenting
      the chosen approach in the index.ts re-export surface would aid WINT-9110
      integration discovery.
    effort: low
    decision: log_to_kb
    kb_entry_id: "c4b19448-879e-479b-ab7a-60b014033d7a"

  - id: opp-3
    category: observability
    finding: >
      No structured metrics or telemetry are specified for the context nodes (cache hit
      rate, session creation latency, TTL expiry frequency). These would complement
      the telemetry nodes being built in WINT-9100 and would make operational
      monitoring of the LangGraph execution path practical.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "cae969fc-6665-49e1-a9e9-bfb76e2a0ac7"

  - id: opp-4
    category: performance
    finding: >
      ED-1 tests concurrent reads on the same cache key but does not specify a
      database-level concurrency control mechanism (e.g., SELECT FOR UPDATE, advisory
      locks, or optimistic locking via version column). Without explicit locking,
      concurrent cache misses could produce race conditions on the INSERT path.
      This is a test coverage gap for an edge case scenario, not an MVP blocker.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "d6470d30-38d6-4829-bb1f-3f496b832e98"

  - id: opp-5
    category: ux_polish
    finding: >
      The @repo/workflow-logic ambiguity (whether it is needed) could be resolved
      by adding a single line to the story confirming "workflow-logic exports are
      NOT required for context/session nodes — MCP __types__/ imports are sufficient."
      This would eliminate the decision_completeness WARN for implementers and reduce
      their discovery overhead.
    effort: low
    decision: log_to_kb
    kb_entry_id: "d4134991-53ad-43f0-9255-58e5ddb21757"

