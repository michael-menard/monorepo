    goal: "Establish the new nodes/context/ directory with index.ts re-export stub, consistent with nodes/sync/ and nodes/reality/ conventions."
    files_to_read:
      - packages/backend/orchestrator/src/nodes/sync/index.ts
      - packages/backend/orchestrator/src/nodes/reality/load-knowledge-context.ts
    files_to_modify:
      - packages/backend/orchestrator/src/nodes/context/index.ts (create)
    acs: ["AC-3"]
    depends_on: none
