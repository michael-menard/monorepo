strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Context warmer node — cache hit returns cached content and updates hit count"
    setup: "Seed context_cache.contextPacks with a pack (type: 'project_context', key: 'monorepo', content: 'cached data', ttl not expired). Create node with injectable db."
    action: "Invoke contextWarmerNode with GraphState containing a cache key for an existing pack."
    expected: "State field contextCacheHit = true, contextPackContent = 'cached data'. DB hit count incremented by 1 in contextPacks row."
    evidence: "Query contextPacks after invocation; verify hit_count incremented. Assert state output matches cached content."

  - id: HP-2
    title: "Context warmer node — cache miss populates cache and stores result"
    setup: "Ensure no row exists in context_cache.contextPacks for the target key. Provide a content generator in config."
    action: "Invoke contextWarmerNode with GraphState requesting a cache key that does not exist."
    expected: "State field contextCacheHit = false, newly generated content stored. DB row inserted into contextPacks with correct type/key/content/ttl."
    evidence: "Query contextPacks after invocation; verify new row exists with expected values."

  - id: HP-3
    title: "Session manager node — creates new session and returns session ID in state"
    setup: "Ensure context_cache.contextSessions is available. No pre-existing session for story."
    action: "Invoke sessionManagerNode with operation='create' in GraphState."
    expected: "State field sessionId is a valid UUID string. DB row inserted into contextSessions with lifecycle_status='active'."
    evidence: "Query contextSessions where id = state.sessionId; verify row exists with expected lifecycle fields."

  - id: HP-4
    title: "Session manager node — update operation tracks token counts"
    setup: "Pre-create a session row in contextSessions. Provide session ID and token delta in state."
    action: "Invoke sessionManagerNode with operation='update', sessionId, and token update payload."
    expected: "DB row updated with incremented token counts. State reflects updated session data."
    evidence: "Query contextSessions after invocation; verify token_count fields incremented correctly."

  - id: HP-5
    title: "Session manager node — complete operation closes session lifecycle"
    setup: "Pre-create an active session in contextSessions."
    action: "Invoke sessionManagerNode with operation='complete', sessionId, and outcome summary."
    expected: "DB row updated with lifecycle_status='completed' and completed_at timestamp. State reflects closed session."
    evidence: "Query contextSessions; verify lifecycle_status='completed' and completed_at is not null."

  - id: HP-6
    title: "Context warmer node — invalidation clears affected packs"
    setup: "Seed two contextPacks rows: one with type='project_context', one with type='domain_kb'."
    action: "Invoke contextWarmerNode (or companion utility) with invalidation request targeting type='project_context'."
    expected: "Only the project_context pack is removed/invalidated. domain_kb pack remains."
    evidence: "Query contextPacks; verify project_context row absent, domain_kb row present."

  - id: HP-7
    title: "Both nodes use createToolNode from node-factory.ts"
    setup: "Import contextWarmerNode and sessionManagerNode."
    action: "Check that each node is produced by createToolNode() by inspecting the exported value's type/origin."
    expected: "Both exports are LangGraph-compatible NodeFunction wrappers produced by createToolNode."
    evidence: "Unit test: instantiate nodes and verify they accept (state, config?) => Promise<Partial<GraphState>> signature."

  - id: HP-8
    title: "Factory functions accept injectable db for test isolation"
    setup: "Create a mock db object implementing the required query interface."
    action: "Invoke createContextWarmerNode({ db: mockDb }) and createSessionManagerNode({ db: mockDb })."
    expected: "Nodes execute using the injected mock db without any real DB connection."
    evidence: "Unit test with mock db spy confirms injected db methods are called."

error_cases:
  - id: EC-1
    title: "Context warmer node — DB unavailable returns null state fields without throwing"
    setup: "Inject a db mock that throws a connection error on every query."
    action: "Invoke contextWarmerNode with a valid GraphState."
    expected: "No exception thrown. State fields contextCacheHit = null (or false), contextPackContent = null. Error logged via @repo/logger."
    evidence: "Assert function resolves (not rejects). Check logger.error was called. Verify state has null/false fallback fields."

  - id: EC-2
    title: "Session manager node — DB unavailable returns null session ID without throwing"
    setup: "Inject a db mock that throws on insert."
    action: "Invoke sessionManagerNode with operation='create'."
    expected: "No exception thrown. State field sessionId = null. Error logged via @repo/logger."
    evidence: "Assert function resolves. Check logger.error was called. Verify sessionId = null in returned state."

  - id: EC-3
    title: "Context warmer node — expired TTL treated as cache miss"
    setup: "Insert a contextPacks row with expires_at in the past."
    action: "Invoke contextWarmerNode requesting that pack."
    expected: "State field contextCacheHit = false. Expired row deleted or ignored. Fresh content generated/stored."
    evidence: "Query contextPacks after invocation; expired row absent or replaced."

  - id: EC-4
    title: "Session manager node — update on non-existent session ID is handled gracefully"
    setup: "Provide a sessionId that does not exist in contextSessions."
    action: "Invoke sessionManagerNode with operation='update' and the invalid sessionId."
    expected: "No exception thrown. State returns error indicator. Logger called with warning."
    evidence: "Verify state does not throw; check logger output."

edge_cases:
  - id: ED-1
    title: "Context warmer node — concurrent reads on same key produce consistent state"
    setup: "Seed one contextPacks row. Invoke contextWarmerNode twice concurrently with same key."
    action: "Run two parallel invocations against the same cache key."
    expected: "Both invocations return the cached content (hit). No duplicate row inserted."
    evidence: "Query contextPacks; verify single row exists. Both state outputs have contextCacheHit = true."

  - id: ED-2
    title: "Session cleanup — stale sessions older than threshold are pruned"
    setup: "Insert contextSessions rows with created_at older than the cleanup threshold and lifecycle_status='active'."
    action: "Invoke sessionManagerNode with operation='cleanup'."
    expected: "Stale session rows deleted or marked as 'abandoned'. Recent sessions unaffected."
    evidence: "Query contextSessions after; verify stale rows absent, recent rows intact."

  - id: ED-3
    title: "nodes/context/index.ts re-exports both nodes"
    setup: "Import from nodes/context/index.ts."
    action: "Verify that contextWarmerNode and sessionManagerNode are both named exports."
    expected: "Both symbols are importable from the index file without error."
    evidence: "TypeScript compilation passes. Unit test imports both and verifies they are defined."

  - id: ED-4
    title: "Zod schemas imported from MCP tool __types__ (not duplicated)"
    setup: "Inspect import statements in context-warmer.ts and session-manager.ts."
    action: "Verify imports reference packages/backend/mcp-tools/src/context-cache/__types__/ and session-management/__types__/ rather than local schema definitions."
    expected: "No duplicate schema definitions exist in nodes/context/. All schemas are imports."
    evidence: "Code review / grep confirms no re-definition of contextPack or session schemas in the new node files."

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "contextPacks table: row count, hit_count, expires_at correctness"
      - "contextSessions table: lifecycle_status transitions, token_count accuracy"
      - "State field types: contextCacheHit (boolean | null), sessionId (string | null)"
      - "Logger calls: error level on DB failure, info level on cache hit/miss"

manual_cases:
  - id: MC-1
    title: "Integration test against live postgres-knowledgebase"
    steps:
      - "Ensure postgres-knowledgebase is running with context_cache schema initialized"
      - "Run pnpm test --filter @repo/orchestrator packages/backend/orchestrator/src/nodes/context/__tests__/"
      - "Verify all HP test cases pass against real DB"
      - "Check test coverage report meets >= 80% threshold for context-warmer.ts and session-manager.ts"
    expected: "All integration tests pass. Coverage >= 80%."

fixture_definitions:
  - name: contextPackFixture
    type: "DB row"
    description: "A contextPacks row with type, key, content, ttl, hit_count, expires_at fields. Used in cache hit and miss tests."
  - name: contextSessionFixture
    type: "DB row"
    description: "A contextSessions row with id, story_id, agent, lifecycle_status, token_count, created_at. Used in session lifecycle tests."
  - name: mockDb
    type: "Vitest mock"
    description: "Injectable db mock with spy implementations of select, insert, update, delete Drizzle methods. Used in unit error-case tests."

risks:
  - "Integration tests require live postgres-knowledgebase DB — CI environment must have DB accessible for full test suite to pass (ADR-005)"
  - "WINT-9010 dependency: if @repo/workflow-logic exports are needed for type imports, unit tests may fail to compile until WINT-9010 passes QA"
  - "Cache TTL clock skew in tests — ensure test fixtures use explicit future/past timestamps rather than relative offsets"
  - "Concurrent write tests (ED-1) may be fragile under Vitest parallel execution — consider serial test grouping for concurrency cases"
