gaps:
  - id: GAP-001
    severity: MEDIUM
    ac_affected: ["AC-7", "AC-8"]
    title: "AC-7/AC-8 wording implies agent-level invocation but test target is MCP tool layer"
    description: >
      AC-7 states "running qa-verify-completion-leader in a PASS scenario for a test
      story results in exactly one row in wint.story_outcomes". This implies an agent
      E2E invocation, but the test file is located in
      apps/api/knowledge-base/src/crud-operations/__tests__/story-outcomes.test.ts,
      which is the MCP tool integration test layer. An agent-level test is neither
      feasible in this test location nor required for verifying persistence correctness.
      The AC wording should be clarified to "calling workflow_log_outcome directly"
      rather than "running qa-verify-completion-leader", or the test target description
      needs to match the actual test scope.
    resolution: >
      Implementer should treat AC-7/AC-8 as testing the workflow_log_outcome MCP tool
      directly (not the full agent). Reword the AC verification statement accordingly
      so QA reviewers assess the right artifact.
    decision: defer
    notes: "Non-blocking clarity issue — AC intent is correct, test approach is correct. Implementer guidance added; no AC modification needed."

  - id: GAP-002
    severity: LOW
    ac_affected: ["AC-1"]
    title: "ST-2 references stale backlog file path — formula already present in elaboration story"
    description: >
      ST-2 instructs modification of plans/future/platform/wint/backlog/WINT-3050/WINT-3050.md
      to document the quality score formula. However, the formula is already fully
      documented in the current story file at elaboration/WINT-3050/WINT-3050.md
      (## Quality Score Formula section with rationale). The backlog path may no
      longer exist or may be a superseded artifact.
    resolution: >
      During implementation, treat ST-2 as pre-satisfied. Verify the formula is
      present in the current story file (it is), confirm the backlog path no longer
      needs modification, and proceed directly to ST-3. No story file edits required.
    decision: resolved
    notes: "Pre-satisfied — formula already documented in story. ST-2 should be marked complete without action."

