    data:
      title: "elab-completion-leader Steps 3-5 idempotency not formally documented"
      content: |
        - **Gap**: Re-run behavior after ELABORATION BLOCKED is implicit. If the operator runs
          /doc-sync and then re-runs elab-completion-leader, Steps 3-5 are expected to be
          idempotent — but this is not formally documented. In practice, /story-update and
          /index-update should be safe to re-run.
        - **Impact**: Low | **Effort**: Low
        - **Recommendation**: Document idempotency expectations for Steps 3-5 in a future
          elab-completion-leader maintenance pass. Not blocking for WINT-0170.
          Note: AC-8 addresses the operator-facing prose for the re-run path; this finding
          tracks the deeper formal idempotency guarantee.

