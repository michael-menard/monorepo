gaps:
  - id: gap-1
    check: risk_disclosure
    finding: >
      PipelineModelRouter's ESCALATION_CHAIN is ['ollama', 'openrouter', 'anthropic'] and
      DEFAULT_MODELS includes openrouter/anthropic/claude-3.5-haiku as an intermediate
      fallback. However, the validate-strategy.ts Zod schema enforces
      provider: z.enum(['anthropic', 'ollama']) — 'openrouter' is not a valid provider in
      the schema. The strategy YAML (v1.0.0) has zero mention of OpenRouter as a provider
      tier. AC-3 requires aligning model identifiers with APIP-0040 conventions, but if
      the implementer adds openrouter models to the strategy YAML, Zod validation will fail
      unless validate-strategy.ts is updated first. This is a concrete sequence risk for ST-3
      and ST-6 that is not called out in the story. The story must update the Zod schema
      to add 'openrouter' to ProviderModelSchema before adding any openrouter model entries.
    severity: high
    decision: add_ac
    ac_added: "AC-9: OpenRouter Provider Added to Zod Schema and Strategy YAML"
    notes: "Auto-resolved: blocks core journey — ST-3/ST-6 sequence risk is a concrete implementation blocker"

  - id: gap-2
    check: risk_disclosure
    finding: >
      The WINT-0220-STRATEGY.yaml integration section has modl_0010.status: "in-progress"
      but the story explicitly states MODL-0010 is "now in UAT" (Architecture Notes section).
      AC-6 requires "Strategy confirms alignment with MODL-0010 provider adapter interfaces
      (now in UAT)" but the story does not explicitly add updating this stale status field
      as a deliverable. ST-4 (WINT-0220-STRATEGY.md update) should catch this in the
      narrative, but the YAML field modl_0010.status is a machine-readable field that will
      remain "in-progress" unless explicitly updated. This is a minor but concrete gap in
      the stated deliverables for ST-3.
    severity: medium
    decision: add_ac
    ac_added: "AC-10: MODL-0010 Integration Status Updated to UAT in Strategy YAML"
    notes: "Auto-resolved: data integrity issue — machine-readable status field left stale without explicit AC coverage"

opportunities:
  - id: opp-1
    category: ux_polish
    finding: >
      The strategy YAML escalation_triggers section describes a conceptual tier-based fallback
      (Tier 3 → 2 → 1 → 0) while the actual PipelineModelRouter escalation chain is
      provider-based (ollama → openrouter → anthropic). The tier concept in the strategy
      is used for assignment guidance, not for runtime escalation sequencing. The strategy
      document could clarify this distinction explicitly — "tiers are assignment guidance,
      escalation_chain is the runtime provider fallback order" — to reduce future confusion.
    effort: low
    decision: log_to_kb
    kb_entry_id: "c629f6b0-06b2-4ca7-aa3a-2964e39eebf4"
    notes: "Non-blocking documentation clarity improvement. KB-logged for future reference."

  - id: opp-2
    category: observability
    finding: >
      AC-7 refreshes cost analysis but the current cost_analysis section in the strategy YAML
      references a baseline_scenario of "All Claude (current informal practice)" — this
      baseline predates the pipeline's actual usage. Now that WINT-0230/0240/0250 are in UAT
      and PipelineModelRouter is live, actual telemetry data may be available to replace
      the estimated cost figures with real measured values from wint.telemetry or
      INFR-0040 if it has shipped. Using actual telemetry would make AC-7 more meaningful.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "25da740d-07ef-4e73-b653-2de04e65e3c9"
    notes: "Non-blocking observability enhancement. AC-7 already covers cost refresh; real telemetry is a bonus. KB-logged."

  - id: opp-3
    category: integrations
    finding: >
      The model-assignments.yaml uses a flat 'provider:model' string format
      (e.g., 'ollama:qwen2.5-coder:7b') while PipelineModelRouter's DB schema uses
      separate 'provider' and 'model' columns and constructs 'provider/model' strings
      at runtime (e.g., 'ollama/qwen2.5-coder:7b'). The colon vs. slash separator
      difference between the two config sources is a potential source of confusion.
      The strategy document could add a callout clarifying the format convention difference
      between model-assignments.yaml (colon separator) and DB model_assignments (slash
      separator), to avoid future misconfiguration.
    effort: low
    decision: log_to_kb
    kb_entry_id: "23181b94-2b94-4248-a99c-42b1cd4eca87"
    notes: "Non-blocking integration documentation note. Beyond WINT-0220 MVP scope. KB-logged."

  - id: opp-4
    category: edge_cases
    finding: >
      The affinity routing system (APIP-3040/3050/3060) introduced a four-tier routing mode
      in PipelineModelRouter (DB override → Affinity → Exploration slot → Conservative fallback).
      The strategy YAML has no representation of the exploration slot (10% random Ollama for
      telemetry collection) or cold-start shortcut behavior. AC-8 adds an affinity routing
      scenario to the strategy document, but the exploration slot is a distinct pipeline
      behavior worth documenting in the scenario section for completeness.
    effort: low
    decision: log_to_kb
    kb_entry_id: "fb722327-61bc-4ce2-9d05-b3cfa126ae0b"
    notes: "Non-blocking edge case. AC-8 covers affinity routing generally; exploration slot detail is future enhancement. KB-logged."

