feasible: true
confidence: high
rationale: "This is a revision/review story on a fully-implemented foundation. All primary deliverables (WINT-0220-STRATEGY.md, WINT-0220-STRATEGY.yaml, validate-strategy.ts, strategy-loader.ts) exist and were QA-verified (PASS, 2026-02-14). The scope is narrowly bounded: read existing artifacts, identify gaps versus the current pipeline state (PipelineModelRouter, affinity routing, expanded agent roster), update YAML/MD in-place, and rerun the existing Zod validation script. No new architecture is required."
complexity: low
estimated_points: 5

change_surface:
  areas:
    - "packages/backend/orchestrator/docs/ — primary revision target (WINT-0220-STRATEGY.md and WINT-0220-STRATEGY.yaml)"
    - "packages/backend/orchestrator/scripts/ — validate-strategy.ts (read-only; may need minor Zod schema extension if new fields added to YAML)"
    - "packages/backend/orchestrator/src/models/ — strategy-loader.ts (read-only verification; update only if YAML structure changes require loader changes)"
    - ".claude/config/ — model-assignments.yaml (read for reconciliation; write only if agent mapping gaps found)"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required. YAML file changes take effect when strategy-loader.ts reads the file at startup."
    - "model-assignments.yaml changes take immediate effect for Claude-side agents — deploy consideration: do not introduce model identifiers that are not yet available in the Ollama fleet or Claude API."

risks:
  - finding: "Model identifier string mismatch between WINT-0220-STRATEGY.yaml and PipelineModelRouter's agent_pattern convention — APIP-3050 lesson shows this causes silent cold-start fallback behavior without errors"
    mitigation: "Read packages/backend/orchestrator/src/pipeline/model-router.ts as the first subtask before modifying any YAML. Document the exact string convention used and cross-reference all tier model identifiers before writing."

  - finding: "validate-strategy.ts Zod schema may be too strict for expanded task taxonomy fields — adding new fields to WINT-0220-STRATEGY.yaml could cause schema validation to fail"
    mitigation: "Read validate-strategy.ts Zod schema in full before adding new YAML fields. If new fields are needed, update the Zod schema in the same PR as the YAML change."

  - finding: "model-assignments.yaml changes take immediate effect for all Claude-side agents — incorrect assignment could degrade agent quality system-wide"
    mitigation: "Review model-assignments.yaml changes in isolation; verify changed agent names still exist before writing. Do not delete existing mappings without confirming the agent file is also removed."

missing_requirements: []

evidence_expectations:
  - "validate-strategy.ts exits 0 with zero Zod errors against the updated WINT-0220-STRATEGY.yaml"
  - "pnpm check-types --filter @repo/orchestrator passes after any TypeScript changes"
  - "Updated WINT-0220-STRATEGY.md contains a task taxonomy section with minimum 12 task types, each mapped to a tier with rationale"
  - "Updated review_date field in WINT-0220-STRATEGY.yaml is set beyond 2026-03-15"
  - "Agent coverage: no agent in .claude/agents/*.agent.md is unmapped from strategy tiers (or documented exclusions are explicit)"

subtasks:
  - id: ST-1
    title: "Read existing deliverables and pipeline consumers to understand current state"
    goal: "Establish a complete picture of what exists (v1.0.0 strategy) vs. what the pipeline now requires. Identify gaps before writing any changes."
    files_to_read:
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md"
      - "packages/backend/orchestrator/src/pipeline/model-router.ts"
      - "packages/backend/orchestrator/src/models/strategy-loader.ts"
      - ".claude/config/model-assignments.yaml"
      - "docs/tech-stack/ollama-model-fleet.md"
    files_to_modify: []
    acs: ["AC-1", "AC-3", "AC-5"]
    depends_on: none
    verification: "No files modified. Documented understanding of gaps captured in _implementation/SCOPE.yaml or equivalent notes."
    estimated_tokens: 12000

  - id: ST-2
    title: "Audit agent roster and identify unmapped agents"
    goal: "Enumerate all agents in .claude/agents/*.agent.md, cross-reference against model-assignments.yaml and strategy YAML tier assignments, identify any agents added after 2026-02-14 that are unmapped."
    files_to_read:
      - ".claude/agents/ (glob *.agent.md)"
      - ".claude/config/model-assignments.yaml"
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
    files_to_modify: []
    acs: ["AC-2", "AC-4"]
    depends_on: ST-1
    verification: "Coverage matrix produced. List of unmapped agents (if any) documented before proceeding to write phase."
    estimated_tokens: 10000

  - id: ST-3
    title: "Update WINT-0220-STRATEGY.yaml — expand task taxonomy, update model identifiers, update review_date"
    goal: "Revise the machine-readable strategy YAML in-place: (1) expand task_types from 6 to 12+ entries, (2) align model identifier strings with PipelineModelRouter conventions from ST-1, (3) update escalation_chain to match actual PipelineModelRouter logic, (4) update review_date to next cycle (2026-06-15 or equivalent), (5) add affinity routing scenario from APIP-3040/3050."
    files_to_read:
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
      - "packages/backend/orchestrator/scripts/validate-strategy.ts"
    files_to_modify:
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
    acs: ["AC-2", "AC-3", "AC-5", "AC-6"]
    depends_on: ST-1
    verification: "npx ts-node packages/backend/orchestrator/scripts/validate-strategy.ts exits 0"
    estimated_tokens: 14000

  - id: ST-4
    title: "Update WINT-0220-STRATEGY.md — revise narrative, update task taxonomy table, refresh cost analysis and scenarios"
    goal: "Revise the human-readable strategy document in-place: (1) update decision flowchart to reflect actual PipelineModelRouter routing logic, (2) expand task type table to 12+ entries matching YAML, (3) add DB override mechanism section referencing wint.model_assignments, (4) refresh cost analysis with current pricing, (5) add affinity-based routing scenario, (6) update DB cache invalidation edge case."
    files_to_read:
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md"
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
    files_to_modify:
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md"
    acs: ["AC-1", "AC-2", "AC-7", "AC-8"]
    depends_on: ST-3
    verification: "Document reads consistently with updated YAML. No stale v1.0.0 references remain."
    estimated_tokens: 10000

  - id: ST-5
    title: "Reconcile model-assignments.yaml with strategy tier definitions; map any unmapped agents"
    goal: "Using the gap list from ST-2, add missing agent-to-model assignments to .claude/config/model-assignments.yaml. Ensure all new agents since 2026-02-14 are explicitly mapped. Do not remove or rename existing mappings unless confirmed safe."
    files_to_read:
      - ".claude/config/model-assignments.yaml"
      - "packages/backend/orchestrator/docs/WINT-0220-STRATEGY.yaml"
    files_to_modify:
      - ".claude/config/model-assignments.yaml"
    acs: ["AC-4"]
    depends_on: ST-2
    verification: "model-assignments.yaml contains entries for all agents identified as unmapped in ST-2. No existing entries removed."
    estimated_tokens: 8000

  - id: ST-6
    title: "Run validate-strategy.ts and verify integration; update Zod schema if needed"
    goal: "Execute the validation script against the updated WINT-0220-STRATEGY.yaml. If new fields added in ST-3 cause Zod schema errors, update validate-strategy.ts Zod schema to accommodate the new shape. Verify strategy-loader.ts can load the updated YAML without errors."
    files_to_read:
      - "packages/backend/orchestrator/scripts/validate-strategy.ts"
      - "packages/backend/orchestrator/src/models/strategy-loader.ts"
    files_to_modify:
      - "packages/backend/orchestrator/scripts/validate-strategy.ts"
    acs: ["AC-6"]
    depends_on: ST-3
    verification: "npx ts-node packages/backend/orchestrator/scripts/validate-strategy.ts exits 0. pnpm check-types --filter @repo/orchestrator passes."
    estimated_tokens: 6000
