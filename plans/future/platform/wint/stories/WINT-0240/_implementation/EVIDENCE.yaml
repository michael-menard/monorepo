notable_decisions:
  - decision: "ARCH-001 — include both deepseek-coder-v2:16b (required) and :33b (optional)"
    rationale: ":16b is WINT-0220-STRATEGY.yaml Tier 2 primary; :33b is model-assignments.yaml runtime truth for dev-implement coders. Both included: :16b required for health check, :33b optional with VRAM warning. --lite skips both."

  - decision: "ARCH-002 — pull llama3.2:8b, document :3b as lean alternative"
    rationale: "model-assignments.yaml uses :8b for 4 agents. WINT-0220-STRATEGY.yaml prefers :3b as Tier 3 lean variant. Runtime truth wins; :3b documented as alternative but not pulled."

  - decision: "ARCH-003 — OLLAMA_ENABLE_FALLBACK documented with caveat"
    rationale: "AC-9 requires documentation of this env var, but it is not in OllamaConfigSchema. Documented in --help and docs with explicit note that it is a runtime orchestration variable."

  - decision: "qwen2.5-coder:14b included as required model"
    rationale: "WINT-0220-STRATEGY.yaml lists it as Tier 2 secondary. No agent currently consumes it in model-assignments.yaml, but AC-7 requires alignment with WINT-0220 strategy. Included as REQUIRED per AC-7; comment documents no current consumer."

