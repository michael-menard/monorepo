strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  note: >
    WINT-9105 is a documentation-only story. The deliverable is a single ADR Markdown
    file at packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md.
    No source code changes are permitted. All tests are content-review / structural
    verification checks performed manually or via simple file-existence assertions.

happy_path_tests:
  - id: HP-1
    title: "ADR file exists at canonical path"
    setup: "Story implementation complete"
    action: "Check file exists at packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"
    expected: "File is present and non-empty (>500 words)"
    evidence: "ls -la packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"

  - id: HP-2
    title: "ADR contains all 11 AC sections"
    setup: "ADR file written"
    action: "Grep for each AC keyword: 'retry policy', 'circuit breaker', 'dead-letter', 'idempotency',
      'timeout', 'partial-success', 'budget-aware', 'parity mapping', 'error propagation', 'consolidat'"
    expected: "All section headings present for AC-001 through AC-011"
    evidence: "Manual review of ADR table of contents against AC checklist"

  - id: HP-3
    title: "ADR includes signed-off status header (AC-011)"
    setup: "ADR file written"
    action: "Check frontmatter or header block for 'status: accepted' or equivalent sign-off field"
    expected: "ADR header contains status, decision-date, and deciders fields"
    evidence: "Manual inspection of ADR file header"

  - id: HP-4
    title: "All retry preset categories documented (AC-001)"
    setup: "ADR file written"
    action: "Verify ADR defines retry config for: llm, file_io, db_write, git categories"
    expected: "Table or Zod schema block present with backoffMs, maxAttempts, maxBackoffMs, jitterFactor per category"
    evidence: "Manual review of retry policy section"

  - id: HP-5
    title: "Circuit breaker state decision is explicit (AC-003)"
    setup: "ADR file written"
    action: "Locate circuit breaker section; verify it states either 'node-local' or 'DB-shared' with rationale"
    expected: "Decision is unambiguous with a rationale paragraph; if DB-shared, note propagates to WINT-9107 AC-004"
    evidence: "Manual review of circuit breaker section"

  - id: HP-6
    title: "Budget-aware retry caps reference WINT-0220 tier table (AC-009)"
    setup: "ADR file written"
    action: "Locate budget-aware section; confirm it references Tier 0 (Claude Opus, $15/$75/1M),
      Tier 1 (Claude Sonnet, $3/$15/1M), Tier 2/3 (Ollama/OpenRouter, $0–$0.08/1M)"
    expected: "Max retry spend per invocation defined for each model tier"
    evidence: "Manual review of budget-aware retry caps section"

  - id: HP-7
    title: "Layer consolidation decision documented (AC-010)"
    setup: "ADR file written"
    action: "Locate consolidation section; verify it explicitly names runner/ as node-execution layer
      and errors/workflow-errors.ts as workflow-lifecycle layer, or alternative partition with rationale"
    expected: "Unambiguous ownership declaration — no reader ambiguity about which module to extend"
    evidence: "Manual review of consolidation decision section"

error_cases:
  - id: EC-1
    title: "ADR file missing from canonical path"
    setup: "Story marked done but ADR file not committed"
    action: "Attempt to read packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"
    expected: "Story should be blocked — file must exist before status moves to UAT"
    evidence: "File-existence check in CI or reviewer checklist step"

  - id: EC-2
    title: "ADR omits circuit breaker state decision"
    setup: "ADR written but section is ambiguous ('either approach works')"
    action: "Review circuit breaker section for decisiveness"
    expected: "Reviewer rejects ADR — downstream WINT-9107 cannot start without explicit decision"
    evidence: "Manual code review finding noted in PR comments"

  - id: EC-3
    title: "ADR includes source code changes (scope violation)"
    setup: "Implementation incorrectly modifies runner/ or workflow-errors.ts"
    action: "Run git diff to inspect changed files"
    expected: "Only docs/architecture/adr-langgraph-error-handling.md is new/modified"
    evidence: "git diff --name-only HEAD~1 should show only the ADR file"

  - id: EC-4
    title: "ADR uses TypeScript interfaces instead of Zod schemas for error type examples"
    setup: "ADR includes code examples"
    action: "Grep ADR for 'interface ' keyword"
    expected: "No TypeScript interfaces found — all type examples use z.object() / z.infer<>"
    evidence: "grep -n 'interface ' packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"

  - id: EC-5
    title: "ADR contradicts existing RETRY_PRESETS without migration note"
    setup: "ADR defines new retry values that differ from runner/types.ts"
    action: "Compare ADR retry values against RETRY_PRESETS in packages/backend/orchestrator/src/runner/types.ts"
    expected: "Either ADR values match existing presets, or ADR explicitly notes the change and migration path for WINT-9107"
    evidence: "Manual comparison of threshold values in ADR vs runner/types.ts"

edge_cases:
  - id: ED-1
    title: "WINT-9010 not yet merged when ADR is written"
    setup: "WINT-9010 in-qa but package @repo/workflow-logic not yet published"
    action: "ADR references @repo/workflow-logic for shared error utilities"
    expected: "ADR notes the dependency with conditional language: 'pending WINT-9010 merge — path may shift'"
    evidence: "Manual review of dependency references in ADR"

  - id: ED-2
    title: "failureThreshold discrepancy between runner/ (5) and workflow-errors.ts (3)"
    setup: "Both modules are read and their defaults extracted"
    action: "ADR consolidation section encounters the discrepancy"
    expected: "ADR declares a canonical value and explains why the other is superseded or retained for its layer"
    evidence: "Manual review of consolidation decision section"

  - id: ED-3
    title: "Budget-aware caps for Tier 2/3 Ollama (cost = $0)"
    setup: "ADR attempts to define cost cap for Ollama nodes"
    action: "Review budget-aware section for free-tier handling"
    expected: "ADR specifies retry cap for Ollama is latency-bound (e.g., max 3 retries at 30s each = 90s timeout cap) rather than cost-bound"
    evidence: "Manual review of budget-aware retry caps section"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "File exists: packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"
      - "No TypeScript interface declarations in ADR"
      - "All 11 AC sections addressable from ADR content"
      - "Git diff shows only ADR file modified (no source changes)"
  frontend: ~

manual_cases:
  - id: MC-1
    title: "ADR Technical Review — AC Coverage Checklist"
    steps:
      - "Open ADR at packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"
      - "Verify AC-001: Retry policy table with per-category config (llm, file_io, db_write, git)"
      - "Verify AC-002: Error propagation rules — retryable vs terminal, saga vs fail-fast per graph type"
      - "Verify AC-003: Circuit breaker decision — node-local vs DB-shared, explicit rationale"
      - "Verify AC-004: DLQ strategy for batch workflows with graph.deadLetterQueue reference"
      - "Verify AC-005: Idempotency contracts per side-effecting node category"
      - "Verify AC-006: Timeout mapping from max_turns to LangGraph timeoutMs"
      - "Verify AC-007: Partial-success semantics — N-of-M failure threshold and commit semantics"
      - "Verify AC-008: Claude Code policy parity table (dev-implement, elab-story, elab-epic, phase-contracts)"
      - "Verify AC-009: Budget-aware retry caps per model tier referencing WINT-0220"
      - "Verify AC-010: Layer consolidation decision (runner/ vs errors/workflow-errors.ts)"
      - "Verify AC-011: Status header with sign-off fields present"
    expected: "All 11 ACs pass review; no blocking gaps found"

  - id: MC-2
    title: "Downstream Propagation Check — WINT-9107 Dependency"
    steps:
      - "Identify circuit breaker state decision in ADR"
      - "If DB-shared: confirm ADR explicitly mentions WINT-9107 AC-004 as implementation target"
      - "Confirm retry category additions (git, db_write, file_io) note WINT-9107 as executor"
      - "Confirm DLQ table creation is deferred to WINT-9107 (not created in this story)"
    expected: "ADR clearly demarcates this story's doc scope from WINT-9107's implementation scope"

fixture_definitions:
  - name: "adr_file_path"
    type: "string"
    description: "Canonical path: packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"
  - name: "existing_retry_presets"
    type: "object"
    description: "From packages/backend/orchestrator/src/runner/types.ts — RETRY_PRESETS.llm, .tool, .validation"
  - name: "runner_cb_defaults"
    type: "object"
    description: "From runner/types.ts — failureThreshold=5, recoveryTimeoutMs=60000"
  - name: "workflow_errors_cb_defaults"
    type: "object"
    description: "From errors/workflow-errors.ts — failureThreshold=3, recoveryTimeMs=60000, failureWindowMs=300000"

risks:
  - "ADR scope creep: developer begins writing middleware code in WINT-9105 — test EC-3 catches this"
  - "Sign-off requirement (AC-011) is process-dependent — if no explicit reviewer is named, ADR may sit unsigned"
  - "Circuit breaker state decision (AC-003) may be left ambiguous — EC-2 catches this; downstream WINT-9107 is blocked without it"
  - "Budget caps for Tier 2/3 are non-obvious (latency vs cost bound) — ED-3 documents the expected handling"
