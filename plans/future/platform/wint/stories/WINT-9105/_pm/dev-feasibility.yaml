feasible: true
confidence: high
rationale: >
  WINT-9105 is a documentation-only story producing a single ADR Markdown file.
  All necessary inputs exist: the runner/ module, workflow-errors.ts, WINT-0220-STRATEGY.md,
  and model-assignments.yaml. The consolidation conflict (runner/ failureThreshold=5 vs
  workflow-errors.ts failureThreshold=3) is known and well-documented in the seed.
  The story requires intellectual synthesis of existing material, not code authoring.
  No migrations, no schema changes, no new packages. Risk is low. The only non-trivial
  decision is the circuit breaker state ownership (node-local vs DB-shared), which
  gates WINT-9107 scope but does not block this story from being written.
complexity: low
change_surface:
  areas:
    - packages/backend/orchestrator/docs/architecture/   # new ADR file only
  endpoints: []
  deploy_touchpoints: []

risks:
  - finding: >
      Circuit breaker state decision (AC-003) gates WINT-9107 AC-004 scope.
      If the ADR decides DB-shared state is required, WINT-9107 gains a DB migration subtask
      (new workflow.circuitBreakerState table). This is not a blocker for WINT-9105 but
      must be documented clearly to avoid WINT-9107 scope ambiguity.
    mitigation: >
      ADR must include a 'Decision Impact' callout box in the circuit breaker section
      explicitly stating: 'If DB-shared: WINT-9107 must add workflow.circuitBreakerState
      migration. If node-local: WINT-9107 reuses existing NodeCircuitBreaker.'
  - finding: >
      Threshold discrepancy between runner/ (failureThreshold=5, recoveryTimeoutMs=60000)
      and errors/workflow-errors.ts (failureThreshold=3, recoveryTimeMs=60000, failureWindowMs=300000).
      ADR must declare a canonical value; if the wrong one is chosen, WINT-9107 will
      implement with incorrect defaults.
    mitigation: >
      Recommended: runner/ layer (failureThreshold=5) is the node-execution primitive —
      keep it as-is. workflow-errors.ts layer (failureThreshold=3) is workflow-lifecycle —
      keep it for phase-level orchestration. ADR explicitly partitions the two layers.

missing_requirements: []

evidence_expectations:
  - "ADR file committed to packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md"
  - "ADR status header includes: status: accepted, decision-date, deciders"
  - "git diff shows no changes to src/ files"
  - "No TypeScript interfaces in ADR code examples — Zod schemas only"

subtasks:
  - id: ST-1
    title: "Read all canonical reference files and extract current defaults"
    goal: >
      Gather exact values from runner/types.ts (RETRY_PRESETS, CircuitBreakerConfigSchema),
      circuit-breaker.ts (failureThreshold=5), errors/workflow-errors.ts (failureThreshold=3,
      failureWindowMs), and WINT-0220-STRATEGY.md (model tier cost table). Build a working
      notes document with all raw values to drive ADR section content.
    files_to_read:
      - packages/backend/orchestrator/src/runner/types.ts
      - packages/backend/orchestrator/src/runner/circuit-breaker.ts
      - packages/backend/orchestrator/src/runner/error-classification.ts
      - packages/backend/orchestrator/src/runner/retry.ts
      - packages/backend/orchestrator/src/runner/errors.ts
      - packages/backend/orchestrator/src/errors/workflow-errors.ts
      - packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md
      - .claude/config/model-assignments.yaml
    files_to_modify: []
    acs: ["AC-001", "AC-003", "AC-009", "AC-010"]
    depends_on: none
    verification: "All source values extracted and cross-referenced — no ADR value is invented"
    estimated_tokens: 6000

  - id: ST-2
    title: "Draft ADR sections for retry policy, error propagation, and layer consolidation"
    goal: >
      Write ADR sections covering AC-001 (node-level retry policy with category table),
      AC-002 (graph-level error propagation — saga vs fail-fast), and AC-010 (layer
      consolidation decision: runner/ = node-execution layer, errors/workflow-errors.ts =
      workflow-lifecycle layer). Use ST-1 values. All code examples must use Zod schemas.
    files_to_read:
      - packages/backend/orchestrator/src/runner/types.ts
      - packages/backend/orchestrator/src/errors/workflow-errors.ts
    files_to_modify:
      - packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md
    acs: ["AC-001", "AC-002", "AC-010"]
    depends_on: ST-1
    verification: "ADR file exists; sections for retry policy, error propagation, and consolidation are present"
    estimated_tokens: 8000

  - id: ST-3
    title: "Draft ADR sections for circuit breaker, DLQ strategy, and idempotency contracts"
    goal: >
      Write ADR sections covering AC-003 (circuit breaker decision: node-local vs DB-shared
      with explicit rationale and WINT-9107 impact callout), AC-004 (DLQ strategy for batch
      workflows with graph.deadLetterQueue schema reference), and AC-005 (idempotency contracts
      per side-effecting node type: KB writes, git commits, file writes, index updates).
    files_to_read:
      - packages/backend/orchestrator/src/runner/circuit-breaker.ts
      - packages/backend/orchestrator/src/errors/workflow-errors.ts
    files_to_modify:
      - packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md
    acs: ["AC-003", "AC-004", "AC-005"]
    depends_on: ST-2
    verification: "ADR circuit breaker section contains unambiguous state ownership decision with rationale"
    estimated_tokens: 8000

  - id: ST-4
    title: "Draft ADR sections for timeout mapping, partial-success, Claude Code parity, and budget caps"
    goal: >
      Write ADR sections covering AC-006 (timeout mapping from max_turns to LangGraph timeoutMs
      for LLM, tool, and graph-level deadlines), AC-007 (partial-success semantics — N-of-M threshold
      and independent commit behavior), AC-008 (Claude Code policy parity table: dev-implement,
      elab-story, elab-epic, phase-contracts), and AC-009 (budget-aware retry caps referencing
      WINT-0220 Tier 0-3 cost table with per-invocation max-spend caps).
    files_to_read:
      - packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md
      - .claude/config/model-assignments.yaml
    files_to_modify:
      - packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md
    acs: ["AC-006", "AC-007", "AC-008", "AC-009"]
    depends_on: ST-3
    verification: "Budget caps section references specific dollar amounts from WINT-0220; parity table covers all 4 Claude Code policies"
    estimated_tokens: 9000

  - id: ST-5
    title: "Add ADR status header, sign-off fields, and finalize document"
    goal: >
      Add standard ADR header block (status: accepted, decision-date, deciders, supersedes,
      context summary). Review full document for: (a) no TypeScript interfaces — Zod only,
      (b) no source code modifications, (c) all 11 ACs addressable from content. Commit ADR.
    files_to_read:
      - packages/backend/orchestrator/docs/WINT-0220-STRATEGY.md
    files_to_modify:
      - packages/backend/orchestrator/docs/architecture/adr-langgraph-error-handling.md
    acs: ["AC-011"]
    depends_on: ST-4
    verification: "git diff --name-only shows only adr-langgraph-error-handling.md; ADR header has status: accepted"
    estimated_tokens: 4000
