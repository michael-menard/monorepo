#### OPP-1: Skill discoverability — no central skill registry

description: |
  The story creates a new skill at `.claude/skills/cache-warm/SKILL.md` but there is no
  central skill index or registry file (e.g. `.claude/skills/README.md` or a skills manifest).
  The lint-fix skill documents "who should call this" and integration notes, but the skills
  directory does not have a top-level inventory. As the skill count grows (currently 23+ skills),
  discoverability becomes harder for agents picking which skill to invoke.

  This is not a WINT-2070 gap — the story's scope is the skill file itself. But it is a
  good follow-on candidate.

