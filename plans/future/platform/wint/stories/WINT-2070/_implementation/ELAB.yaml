#### OPP-2: Summary output format not machine-parseable by regex

description: |
  AC-8 and ED-2 require the summary block to be parseable by the context-warmer agent (WINT-2080).
  The example summary format is human-readable but lacks a machine-parseable anchor (e.g. a
  consistent prefix like `CACHE_WARM_RESULT:` or a JSON block). The dev_feasibility notes
  "ensure summary output is machine-parseable before WINT-2080 authoring" as a follow-on.

  This is partially addressed (the structured table format is regular enough for regex), but
  the story does not specify an exact parse pattern. WINT-2080 will need to define what it
  expects. If WINT-2070 and WINT-2080 are authored independently, there is a coordination risk.

  Recommendation: the SKILL.md should include a comment noting that the summary block format
  is a contract for WINT-2080 and should not be changed without updating that agent. This
  does not change any AC but reduces interface drift risk.

mvp_critical: false
suggested_action: "Add a note in the SKILL.md's Phase 6 section: 'Summary block format is consumed by context-warmer agent (WINT-2080) — treat as interface contract'"
decision: implementation_note
decision_rationale: "Low-effort one-liner in Phase 6; implementer should include it but not as a new AC"

