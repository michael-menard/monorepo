lessons_to_record:
  - lesson: >
      For documentation-only stories (agent.md, skill.md, etc.), QA verification
      reduces to direct file content inspection against AC requirements — no test
      execution, coverage, or build steps apply. EVIDENCE.yaml is sufficient as
      primary source when all ACs pass; the agent file spot-check confirms accuracy.
    category: pattern
    tags: ["qa-verify", "documentation-only", "agent-spec"]

  - lesson: >
      Agent specification files can encode both behavioral contracts (phases, error handling,
      output format) and forward-compatibility contracts (LangGraph porting interface).
      This dual-purpose pattern reduces the cost of future ports by making the interface
      explicit at authoring time.
    category: reuse
    tags: ["agent-spec", "langgraph", "interface-contract"]

