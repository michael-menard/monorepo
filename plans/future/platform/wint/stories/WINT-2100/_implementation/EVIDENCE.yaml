  - path: ".claude/agents/session-manager.agent.md"
    action: created
    description: "Haiku worker agent for session lifecycle orchestration"

acceptance_criteria:
  AC-1:
    status: pass
    evidence: |
      Agent file exists at .claude/agents/session-manager.agent.md with frontmatter:
      type: worker, model: haiku, created: 2026-02-21, updated: 2026-02-21,
      version: 1.0.0, permission_level: telemetry, spawned_by: [context-warmer-agent, batch-coordinator-agent]

  AC-2:
    status: pass
    evidence: |
      Phase 1 documents session creation — delegates to session-create skill (WINT-2090).
      Null-return handling documented with configurable policy: warn (default) or halt.
      Output format for null case: result: warned with message.

  AC-3:
    status: pass
    evidence: |
      Phase 1 includes leaked-session detection via sessionQuery pre-check:
      sessionQuery({ agentName, storyId, activeOnly: true, limit: 50 }).
      Two options documented: (1) complete leaked session + create new, (2) resume leaked session.

  AC-4:
    status: pass
    evidence: |
      Phase 2 documents sessionUpdate with mode: 'incremental' (required default).
      Throw handling documented: sessionUpdate throws on session-not-found and already-completed.
      Agent catches throw, emits warning, skips update (no crash).

  AC-5:
    status: pass
    evidence: |
      Phase 3 documents sessionComplete with idempotent guard.
      Handles "already completed" throw case: catches, emits result: skipped.

  AC-6:
    status: pass
    evidence: |
      Phase 4 documents mandatory dryRun: true first step.
      Reports deletedCount and cutoffDate from preview.
      Requires explicit confirmation before dryRun: false.
      Documents that active sessions (endedAt IS NULL) are never deleted.

  AC-7:
    status: pass
    evidence: |
      Output Format section documents structured YAML for all 4 actions:
      create, update, complete, cleanup. Each includes action, session_id (if applicable),
      result (success/warned/skipped/failed), and token totals where relevant.

  AC-8:
    status: pass
    evidence: |
      Frontmatter spawned_by lists: [context-warmer-agent, batch-coordinator-agent].
      context-warmer is from WINT-2080 (minimum required per AC-8).

  AC-9:
    status: pass
    evidence: |
      Non-Negotiables section explicitly states all three required prohibitions:
      1. "Do NOT implement session skills — delegate to session-create and session-inherit (WINT-2090)"
      2. "Do NOT delete active sessions (endedAt IS NULL)"
      3. "MUST default cleanup to dryRun: true"

  AC-10:
    status: pass
    evidence: |
      LangGraph Porting Interface Contract section present with:
      - Target path: packages/backend/orchestrator/src/nodes/context/
      - 4 node interfaces: session-create-node, session-update-node,
        session-complete-node, session-cleanup-node
      - Each has input/output TypeScript interfaces and phase mapping
      - Graph edges documented

