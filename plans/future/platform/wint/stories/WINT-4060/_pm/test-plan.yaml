strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
happy_path_tests:
  - id: HP-1
    title: "graph-checker.agent.md file exists with valid YAML frontmatter"
    setup: "Story delivered: .claude/agents/graph-checker.agent.md written"
    action: "Read .claude/agents/graph-checker.agent.md and parse YAML frontmatter"
    expected: "Frontmatter contains created, updated, version, type: worker, model: haiku, name: graph-checker, spawned_by"
    evidence: "grep -E '^(type|model|name|spawned_by):' .claude/agents/graph-checker.agent.md"
  - id: HP-2
    title: "Agent defines 4-phase execution workflow"
    setup: "graph-checker.agent.md exists"
    action: "Read agent file and verify phases: Load Inputs, Query Graph, Apply Rules, Produce Output"
    expected: "All four phases present in execution flow section"
    evidence: "grep -i 'Load Inputs|Query Graph|Apply Rules|Produce Output' .claude/agents/graph-checker.agent.md"
  - id: HP-3
    title: "Output schema defines required fields"
    setup: "graph-checker.agent.md exists"
    action: "Read agent file and verify graph-check-results.json schema section"
    expected: "Schema includes story_id, generated_at, franken_features_found, violations array, warnings array, warning_count"
    evidence: "grep -E 'story_id|generated_at|franken_features_found|violations|warnings|warning_count' .claude/agents/graph-checker.agent.md"
  - id: HP-4
    title: "Completion signals section defines exactly three outcomes"
    setup: "graph-checker.agent.md exists"
    action: "Read completion signals section"
    expected: "Exactly three signals: GRAPH-CHECKER COMPLETE, GRAPH-CHECKER COMPLETE WITH WARNINGS, GRAPH-CHECKER BLOCKED"
    evidence: "grep 'GRAPH-CHECKER' .claude/agents/graph-checker.agent.md | wc -l"
error_cases:
  - id: EC-1
    title: "Graceful degradation when graph is empty (WINT-4030 not yet stable)"
    setup: "graph.features and graph.epics tables empty"
    action: "Invoke graph-checker agent with empty graph"
    expected: "Agent emits warning and returns empty violations list; GRAPH-CHECKER COMPLETE WITH WARNINGS: 1"
    evidence: "Verify graceful degradation section in agent spec describes this scenario"
  - id: EC-2
    title: "Graceful degradation when rules registry empty"
    setup: "rulesRegistryGet returns [] (no active rules)"
    action: "Invoke graph-checker agent with empty rules"
    expected: "Agent increments warning count, returns empty violations list"
    evidence: "Verify graceful degradation section covers empty rules scenario"
edge_cases:
  - id: ED-1
    title: "Optional package name filter provided — scoped query"
    setup: "Agent invoked with optional package name filter parameter"
    action: "Verify agent spec documents filter usage in Phase 2 query step"
    expected: "Filter parameter applied to graph_get_franken_features call"
    evidence: "grep -i 'filter|package.*name' .claude/agents/graph-checker.agent.md"
  - id: ED-2
    title: "LangGraph porting notes present with full input/output/execution contracts"
    setup: "graph-checker.agent.md exists"
    action: "Read LangGraph porting notes section"
    expected: "Section documents state fields, 4-phase execution contract, output contract, target node path nodes/feature-cohesion/graph-check.ts"
    evidence: "grep -i 'LangGraph|graph-check.ts' .claude/agents/graph-checker.agent.md"
tooling_evidence:
  backend:
    http_requests: []
    assertions: []
manual_cases:
  - id: MC-1
    title: "Structural review: all 10 ACs verifiable via file inspection"
    steps:
      - "Read .claude/agents/graph-checker.agent.md"
      - "Check YAML frontmatter keys against AC-1"
      - "Verify inputs section (AC-2)"
      - "Verify 4-phase workflow (AC-3)"
      - "Verify graceful degradation section (AC-4)"
      - "Verify graph-check-results.json schema (AC-5, AC-6)"
      - "Verify non-goals section (AC-7)"
      - "Verify LangGraph porting notes (AC-8)"
      - "Verify canonical references section (AC-9)"
      - "Count completion signals = 3 (AC-10)"
    expected: "All 10 ACs pass structural inspection"
fixture_definitions: []
risks:
  - "WINT-4030 instability means runtime testing of the agent is not possible until graph is populated — document as known_deviation in EVIDENCE.yaml"
  - "Structural-only QA cannot verify runtime behaviour — document as known deviation"
