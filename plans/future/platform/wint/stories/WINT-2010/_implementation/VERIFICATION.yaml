issues:
  - id: ISSUE-1
    ac: AC-7
    severity: blocking
    description: >-
      HTTP version mismatch not implemented. GET /role-pack?role=dev&v=99 returns 200 instead of 404 when file has
      version: 1. The 'v' query param is parsed in http-handler.ts but never compared against pack.version. No test
      covers this path.
    file: packages/backend/sidecars/role-pack/src/http-handler.ts
    required_behavior: >-
      If v param provided and pack.version !== v, return 404 { ok: false, error: 'Version not found', available:
      pack.version }
  - id: ISSUE-2
    ac: AC-6
    severity: blocking
    description: >-
      @vitest/coverage-v8 is not declared in devDependencies. pnpm test:coverage fails with ERR_LOAD_URL. Coverage
      threshold compliance (>= 80%) cannot be confirmed.
    file: packages/backend/sidecars/role-pack/package.json
    required_fix: Add @vitest/coverage-v8 to devDependencies and run pnpm test:coverage to confirm thresholds pass
lessons_to_record:
  - lesson: >-
      HTTP sidecar version mismatch logic must be explicitly tested with a version-mismatch case in
      http-endpoint.test.ts. The 'v' query param being parsed but unused is an easy-to-miss gap.
    category: anti_pattern
    tags:
      - http
      - versioning
      - sidecar
      - test-coverage
  - lesson: >-
      When configuring vitest coverage (provider: v8, thresholds in vitest.config.ts), the @vitest/coverage-v8 package
      must be added to devDependencies — it is not implicitly available from the workspace root. Omitting it causes pnpm
      test:coverage to fail silently at the module load stage.
    category: blocker
    tags:
      - vitest
      - coverage
      - devDependencies
      - sidecar
