feasible: true
confidence: high
rationale: >
  All dependencies are available: graph.features table (WINT-0060 UAT PASS), @repo/db Drizzle client,
  @repo/database-schema with wint schema exports, and the populate-domain-kb.ts canonical script pattern.
  The one gap — the missing graph.epics table — is explicitly scoped into this story (AC-1, AC-2) with
  a clear design in the seed. The script pattern (injectable deps, Zod result shape, per-item try/catch,
  onConflictDoNothing) is proven across 3 existing scripts. Story is fully implementable as specified.
complexity: medium
change_surface:
  areas:
    - packages/backend/database-schema/src/schema/wint.ts
    - packages/backend/database-schema/src/migrations/app/
    - packages/backend/mcp-tools/src/scripts/
    - packages/backend/mcp-tools/src/scripts/__tests__/
  endpoints: []
  deploy_touchpoints:
    - "Apply migration 0036_wint_4030_graph_epics.sql to dev DB before running script"
    - "Update @repo/database-schema package exports if epics table export needed by downstream"

risks:
  - finding: "graph.epics table does not exist — INSERT will fail at runtime if migration not applied before script runs"
    mitigation: "AC-1 and AC-2 mandate creating the table first. Implementation order: migration → schema → script. Dev agent must apply migration to local DB before testing script."

  - finding: "Feature extraction heuristic may produce noise (non-feature directories matched)"
    mitigation: "Seed explicitly acknowledges this as a known risk ('may need manual validation'). Script output is a baseline, not authoritative. Use onConflictDoNothing to make subsequent corrections safe."

  - finding: "features_feature_name_idx is a unique index — duplicate featureName inserts will silently conflict"
    mitigation: "Use onConflictDoNothing on featureName in all inserts. Script is designed to be idempotent. Unit tests must validate conflict handling."

missing_requirements: []

evidence_expectations:
  - "pnpm tsx packages/backend/mcp-tools/src/scripts/populate-graph-features.ts runs without error"
  - "SELECT COUNT(*) FROM graph.epics returns >= 4 after first run"
  - "SELECT COUNT(*) FROM graph.features returns > 0 after first run"
  - "Running script twice returns identical row counts (idempotency)"
  - "pnpm check-types passes with 0 errors"
  - "ESLint passes on new/changed files"
  - "Unit tests pass without live DB (mocked dbInsertFn)"

subtasks:
  - id: ST-1
    title: "Add graph.epics Drizzle schema to wint.ts and create migration 0036"
    goal: "Define the epics table in the wint pg schema and produce a SQL migration file that creates it"
    files_to_read:
      - "packages/backend/database-schema/src/schema/wint.ts"
      - "packages/backend/database-schema/src/migrations/app/0035_wint_4020_rules_registry.sql"
    files_to_modify:
      - "packages/backend/database-schema/src/schema/wint.ts"
      - "packages/backend/database-schema/src/migrations/app/0036_wint_4030_graph_epics.sql"
    acs: ["AC-1", "AC-2"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/database-schema && psql -c 'SELECT * FROM graph.epics;' (0 rows, no error)"
    estimated_tokens: 6000

  - id: ST-2
    title: "Write populate-graph-features.ts script with injectable deps"
    goal: "Create the CLI population script following populate-domain-kb.ts pattern: Zod result schema, injectable dbInsertEpicFn/dbInsertFeatureFn, monorepo root resolution, per-item try/catch, @repo/logger"
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/populate-domain-kb.ts"
      - "packages/backend/database-schema/src/schema/wint.ts"
    files_to_modify:
      - "packages/backend/mcp-tools/src/scripts/populate-graph-features.ts"
    acs: ["AC-3", "AC-4", "AC-5", "AC-6", "AC-7", "AC-8"]
    depends_on: ST-1
    verification: "pnpm tsx packages/backend/mcp-tools/src/scripts/populate-graph-features.ts (exits 0, logs succeeded counts)"
    estimated_tokens: 10000

  - id: ST-3
    title: "Write unit tests for populate-graph-features.ts"
    goal: "Achieve full unit test coverage with mocked DB calls — no live DB required in CI. Mirror populate-domain-kb.test.ts pattern."
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/__tests__/populate-domain-kb.test.ts"
      - "packages/backend/mcp-tools/src/scripts/populate-graph-features.ts"
    files_to_modify:
      - "packages/backend/mcp-tools/src/scripts/__tests__/populate-graph-features.test.ts"
    acs: ["AC-9", "AC-10"]
    depends_on: ST-2
    verification: "pnpm test --filter @repo/mcp-tools (all tests pass, no live DB needed)"
    estimated_tokens: 8000

  - id: ST-4
    title: "Type-check, lint, and run full test suite"
    goal: "Confirm zero TypeScript errors and zero ESLint errors on all new/modified files"
    files_to_read:
      - "packages/backend/mcp-tools/src/scripts/populate-graph-features.ts"
      - "packages/backend/mcp-tools/src/scripts/__tests__/populate-graph-features.test.ts"
      - "packages/backend/database-schema/src/schema/wint.ts"
    files_to_modify: []
    acs: ["AC-11", "AC-12"]
    depends_on: ST-3
    verification: "pnpm check-types && pnpm test:all (all pass)"
    estimated_tokens: 3000
