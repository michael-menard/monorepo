lessons_to_record:
  - lesson: >-
      PR merge that only changes tsconfig.tsbuildinfo is a red flag — always verify that implementation source files are
      included in the merge commit tree before advancing to QA. This caused WINT-4030 to require a second QA pass.
    category: anti_pattern
    tags:
      - git
      - merge
      - qa-gate
      - process
  - lesson: >-
      Evidence test counts should be verified against current test run counts as a cheap sanity check for whether
      implementation was actually merged — a significant count delta indicates files are missing from HEAD.
    category: pattern
    tags:
      - qa-verify
      - evidence-validation
      - test-count
  - lesson: >-
      Migration sequence numbers can be consumed by concurrent stories. When a migration slot is taken, document the
      deviation in both the migration file header and the QA verification to avoid future confusion.
    category: blocker
    tags:
      - database
      - migrations
      - sequence
      - wint
