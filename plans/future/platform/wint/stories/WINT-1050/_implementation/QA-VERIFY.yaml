lessons_to_record:
  - lesson: >
      Docs-only command versioning: inserting a new sub-step (3a) between existing steps
      without renumbering downstream steps (4, 5) minimises diff noise and preserves external
      references. This is the preferred pattern for docs-only command spec augmentation.
    category: pattern
    tags: ["docs-only", "command-spec", "wint", "story-update"]

  - lesson: >
      For DB integration in command specs, the db_updated field should use only true/false
      (not a third 'skipped' value) when both null-return and unmapped-status cases should
      be treated identically by downstream consumers. The 'skipped' third value is deferred
      observability â€” good for UAT tooling but creates complexity for Phase 1 consumers.
    category: pattern
    tags: ["db-integration", "command-spec", "wint", "result-yaml"]

  - lesson: >
      Sibling story references (WINT-1060/story-move.md) are highly effective as parallel
      pattern sources for docs-only stories. Reading the sibling's implementation first
      reduces ambiguity in mapping table format, pseudocode style, and WARNING format
      without requiring story file re-reads.
    category: reuse
    tags: ["docs-only", "sibling-pattern", "wint"]

