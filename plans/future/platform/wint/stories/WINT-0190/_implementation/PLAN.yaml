  - ".claude/prompts/role-packs/_specs/ directory must be created if absent (ST-3)"
  - "AJV v8 required for draft 2020-12 support — use npx ajv (not npx ajv-cli which is v4)"
  - "ST-3 file path reference to 'backlog/WINT-0190/_pm/STORY-SEED.md' in story is stale; use story ACs directly"
