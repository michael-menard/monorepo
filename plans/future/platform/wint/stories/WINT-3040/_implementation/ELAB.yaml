# ─── GAP ANALYSIS ──────────────────────────────────────────────────────────────

gap_analysis:

  mvp_critical: []
  # No MVP-critical gaps found. All 9 ACs are unambiguous, subtask decomposition is complete,
  # risk mitigations are concrete, and the single deliverable is clearly specified.

  future_opportunities:

    - id: FO-1
      title: "WINT-0120 dependency is still in-progress (status: ready-to-work in filesystem)"
      severity: blocker_external
      category: dependency
      notes: >
        At analysis time, WINT-0120 is in the in-progress directory but its frontmatter shows
        status: ready-to-work, indicating it has not yet been implemented. WINT-3040 cannot
        begin ST-1 (or at minimum ST-2) until workflow_log_decision is a callable MCP tool.
        The story already gates on this dependency — this is a scheduling note, not a story gap.
        Recommend verifying WINT-0120 completion before moving WINT-3040 to ready-to-work.

    - id: FO-2
      title: "AC-9 verification relies on environment preconditions outside implementer control"
      severity: low
      category: testability
      notes: >
        ST-2 (smoke test) requires lego_dev running on port 5432, WINT-0120 deployed, and
        OPENAI_API_KEY set. If these preconditions are not met, ST-2 cannot be verified and
        AC-9 would be blocked. The story documents this clearly. Consider whether AC-9 should
        be split into a structural AC (always passable) and an integration AC (environment-gated)
        to allow the story to pass code review on ST-1 alone, with ST-2 tracked separately.
        This is editorial polish, not a blocking gap.

    - id: FO-3
      title: "embedding field type (number[]) not explicitly documented in SKILL.md spec"
      severity: negligible
      category: clarity
      notes: >
        The story specifies that embedding is a 1536-dim vector but does not explicitly state
        the JavaScript type passed to workflow_log_decision (number[] array). The implementer
        can infer this from tool-schemas.ts (referenced in ST-1 files_to_read), but making it
        explicit in the Canonical References or Architecture Notes would reduce ambiguity.
        Low risk given the explicit instruction to read tool-schemas.ts before writing SKILL.md.

    - id: FO-4
      title: "No guidance on decisionText length limits for embedding input"
      severity: negligible
      category: edge_case
      notes: >
        AC-3 specifies concatenation of decisionText + context for embedding input. Edge Case 1
        documents large context JSON (2000 chars) but does not address what happens if the
        combined input exceeds OpenAI's token limit for text-embedding-3-small (8191 tokens).
        The story says "the error is surfaced to the operator" — acceptable for a docs-only
        story. A future story could add truncation logic if production usage reveals this path.

