feasible: true
confidence: high
rationale: >
  This story delivers a single .agent.md file (~150-200 lines). No TypeScript source code,
  no schema changes, no new packages. The implementation pattern is well-established —
  scope-defender.agent.md and kb-writer.agent.md provide direct templates for frontmatter,
  execution phases, graceful degradation, completion signals, and LangGraph porting notes.
  The only risk is the WINT-2070 skill API being undefined, which is handled via a
  placeholder contract section in the agent file.
complexity: low
change_surface:
  areas:
    - ".claude/agents/ (new file: context-warmer.agent.md)"
  endpoints: []
  deploy_touchpoints: []
risks:
  - finding: "WINT-2070 (cache-warm skill) API surface is not yet defined — agent must use a placeholder invocation contract"
    mitigation: "Add a clearly marked TODO in the skill invocation section: '# TODO: Update when WINT-2070 skill API is finalized'. The placeholder contract must document expected inputs/outputs so WINT-2070 can use it as a spec."
missing_requirements: []
evidence_expectations:
  - "cat .claude/agents/context-warmer.agent.md — file is present and all 9 ACs are satisfied by reading the file"
  - "grep 'CACHE-WARM' .claude/agents/context-warmer.agent.md — shows all three completion signal variants"
  - "grep 'model: haiku' .claude/agents/context-warmer.agent.md — confirms haiku model assignment"
  - "grep 'LangGraph Porting Notes' .claude/agents/context-warmer.agent.md — section present for WINT-9090 compatibility"
subtasks:
  - id: ST-1
    title: "Write frontmatter, mission, and non-goals sections"
    goal: "Establish the agent file with valid WINT frontmatter and bounded mission statement"
    files_to_read:
      - ".claude/agents/scope-defender.agent.md"
      - ".claude/agents/kb-writer.agent.md"
    files_to_modify:
      - ".claude/agents/context-warmer.agent.md"
    acs: ["AC-1", "AC-2", "AC-9"]
    depends_on: none
    verification: "cat .claude/agents/context-warmer.agent.md | head -30 — confirm frontmatter and mission"
    estimated_tokens: 4000

  - id: ST-2
    title: "Write execution phases with placeholder cache-warm skill API contract"
    goal: "Define phased execution model with explicit TODO for WINT-2070 skill API"
    files_to_read:
      - ".claude/agents/scope-defender.agent.md"
    files_to_modify:
      - ".claude/agents/context-warmer.agent.md"
    acs: ["AC-3", "AC-4", "AC-5"]
    depends_on: ST-1
    verification: "grep -c 'Phase' .claude/agents/context-warmer.agent.md — should show ≥4 phases"
    estimated_tokens: 5000

  - id: ST-3
    title: "Write graceful degradation, embedded constraints, and completion signals"
    goal: "Ensure all failure paths are documented and exactly three completion signals are defined"
    files_to_read:
      - ".claude/agents/scope-defender.agent.md"
      - ".claude/agents/kb-writer.agent.md"
    files_to_modify:
      - ".claude/agents/context-warmer.agent.md"
    acs: ["AC-4", "AC-5", "AC-6", "AC-8"]
    depends_on: ST-2
    verification: "grep 'CACHE-WARM' .claude/agents/context-warmer.agent.md — shows 3 signal variants"
    estimated_tokens: 4000

  - id: ST-4
    title: "Write LangGraph Porting Notes section"
    goal: "Document input/output contract for WINT-9090 node port at nodes/context/context-warmer.ts"
    files_to_read:
      - ".claude/agents/scope-defender.agent.md"
    files_to_modify:
      - ".claude/agents/context-warmer.agent.md"
    acs: ["AC-7"]
    depends_on: ST-3
    verification: "grep 'LangGraph Porting Notes' .claude/agents/context-warmer.agent.md — section present"
    estimated_tokens: 3000
