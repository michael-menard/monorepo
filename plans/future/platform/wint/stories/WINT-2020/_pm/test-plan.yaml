strategy: unit+integration
scope:
  endpoints:
    - "POST /context-pack"
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "Cache miss: assemble context pack from KB and store in cache"
    setup: "Ensure no contextPacks row exists for packKey 'WINT-2020:dev_execute:dev'. Start postgres-knowledgebase on port 5433."
    action: "POST /context-pack with { story_id: 'WINT-2020', node_type: 'dev_execute', role: 'dev' }"
    expected: "200 response with { story_brief: string, kb_facts: array, kb_rules: array, kb_links: array, repo_snippets: array }. A new contextPacks row is upserted with packType='story' and packKey='WINT-2020:dev_execute:dev'."
    evidence: "Verify response body shape matches ContextPackResponseSchema. Query contextPacks table to confirm row inserted."

  - id: HP-2
    title: "Cache hit: return cached context pack without re-querying KB"
    setup: "Insert a contextPacks row with packType='story', packKey='WINT-2020:pm_seed:pm', content={story_brief:'cached',kb_facts:[],kb_rules:[],kb_links:[],repo_snippets:[]}, ttl=3600, expiresAt=future timestamp."
    action: "POST /context-pack with { story_id: 'WINT-2020', node_type: 'pm_seed', role: 'pm' }"
    expected: "200 response returning the cached content. No KB queries executed. Response time < 100ms."
    evidence: "Assert response body matches inserted cache content. Assert elapsed time < 100ms."

  - id: HP-3
    title: "MCP tool context_pack_get returns same shape as HTTP endpoint"
    setup: "KB available on port 5433."
    action: "Call context_pack_get MCP tool with { story_id: 'WINT-2020', node_type: 'qa_gate', role: 'qa' }"
    expected: "Returns object with same keys as HTTP response: story_brief, kb_facts[], kb_rules[], kb_links[], repo_snippets[]."
    evidence: "Assert response schema passes ContextPackResponseSchema Zod parse."

  - id: HP-4
    title: "Custom TTL stored in cache"
    setup: "No cache entry for packKey 'WINT-2020:dev_execute:dev' with ttl=7200."
    action: "POST /context-pack with { story_id: 'WINT-2020', node_type: 'dev_execute', role: 'dev', ttl: 7200 }"
    expected: "Cache row inserted with ttl=7200. Response contains assembled context."
    evidence: "Query contextPacks table and verify ttl=7200 on inserted row."

  - id: HP-5
    title: "Empty array returned for sections with no KB results"
    setup: "Story ID that has no associated KB entries (e.g., 'NONEXISTENT-9999'). No cache entry."
    action: "POST /context-pack with { story_id: 'NONEXISTENT-9999', node_type: 'dev_execute', role: 'dev' }"
    expected: "200 response with kb_facts=[], kb_rules=[], kb_links=[], repo_snippets=[] (not null/undefined). story_brief may be empty string."
    evidence: "Assert each array field is [] not null/undefined using strict type assertions."

error_cases:
  - id: EC-1
    title: "Invalid role enum rejected with 400"
    setup: "Sidecar running."
    action: "POST /context-pack with { story_id: 'WINT-2020', node_type: 'dev_execute', role: 'invalid_role' }"
    expected: "400 response with Zod validation error message indicating role must be pm|dev|qa|po."
    evidence: "Assert response status 400. Assert error body contains 'role' field name."

  - id: EC-2
    title: "Missing required fields rejected with 400"
    setup: "Sidecar running."
    action: "POST /context-pack with {} (empty body)"
    expected: "400 response indicating story_id, node_type, role are required."
    evidence: "Assert response status 400. Assert Zod error details list missing fields."

  - id: EC-3
    title: "Cache write failure does not block response"
    setup: "Simulate DB error on contextPacks upsert (e.g., disconnect DB after cache-miss KB query, or inject error in unit test). KB query succeeds."
    action: "POST /context-pack with valid body triggering cache miss."
    expected: "200 response with freshly assembled context. Warning logged via @repo/logger. No 500 error thrown."
    evidence: "Assert 200 status and valid response body. Assert logger.warn was called with cache write failure message."

  - id: EC-4
    title: "Expired cache entry triggers fresh assembly"
    setup: "Insert contextPacks row with expiresAt=past timestamp (expired TTL)."
    action: "POST /context-pack for the same packKey."
    expected: "Cache miss path followed — fresh KB assembly, new cache write. Response reflects fresh content."
    evidence: "Assert new contextPacks row written with updated expiresAt. Assert KB was queried."

edge_cases:
  - id: ED-1
    title: "Token budget enforcement: trim repo_snippets first"
    setup: "Assemble a context pack where total estimated tokens > 2000. repo_snippets section is large."
    action: "POST /context-pack with valid body; no custom max_tokens (default 2000)."
    expected: "repo_snippets trimmed until total tokens <= 2000. Other sections (story_brief, kb_facts, kb_rules, kb_links) preserved if possible."
    evidence: "Assert estimateTokens(JSON.stringify(response)) <= 2000. Assert repo_snippets shorter than raw KB results."

  - id: ED-2
    title: "Token budget enforcement: trim kb_links after repo_snippets exhausted"
    setup: "Construct scenario where trimming all repo_snippets still leaves total > 2000 tokens. Large kb_links section."
    action: "POST /context-pack or unit test calling trimming logic directly."
    expected: "kb_links trimmed after repo_snippets until budget satisfied."
    evidence: "Unit test asserts kb_links trimmed in second pass. estimateTokens(result) <= configured budget."

  - id: ED-3
    title: "Concurrent cache-miss race condition: ON CONFLICT DO UPDATE prevents duplicate rows"
    setup: "Two simultaneous requests with same story_id+node_type+role. No cache entry exists."
    action: "Fire two concurrent POST /context-pack requests."
    expected: "Both requests return valid 200 responses. contextPacks table has exactly one row for that packKey (no duplicate key error)."
    evidence: "Assert single row in contextPacks for that packKey after concurrent calls complete."

  - id: ED-4
    title: "Cache hit response time < 100ms"
    setup: "Pre-populated contextPacks row for packKey (non-expired)."
    action: "POST /context-pack and measure response time."
    expected: "Response time < 100ms."
    evidence: "Integration test timing assertion: assert elapsed < 100."

  - id: ED-5
    title: "Cache miss response time < 2000ms"
    setup: "No cache entry. KB available on port 5433."
    action: "POST /context-pack and measure end-to-end time including KB query and cache write."
    expected: "Total response time < 2000ms."
    evidence: "Integration test timing assertion: assert elapsed < 2000."

  - id: ED-6
    title: "All four role values accepted"
    setup: "Sidecar running."
    action: "POST /context-pack four times with role=pm, dev, qa, po respectively."
    expected: "All four return 200 with valid response shape."
    evidence: "Assert 200 and schema-valid response for each role."

tooling_evidence:
  backend:
    http_requests:
      - "POST /context-pack with valid body { story_id, node_type, role }"
      - "POST /context-pack with invalid role to trigger 400"
      - "POST /context-pack with empty body to trigger 400"
      - "POST /context-pack with ttl parameter"
    assertions:
      - "Status 200 on success"
      - "Status 400 on Zod validation failure"
      - "Response body matches ContextPackResponseSchema"
      - "contextPacks row inserted with correct packType, packKey, ttl"
      - "estimateTokens(response) <= max_tokens"
      - "Cache hit elapsed < 100ms"
      - "Cache miss elapsed < 2000ms"
  frontend: null

manual_cases: []

fixture_definitions:
  - name: "validContextPacksRow"
    type: "database row"
    description: "A contextPacks table row with packType='story', packKey='WINT-TEST:dev_execute:dev', content={story_brief:'Test brief',kb_facts:[],kb_rules:[],kb_links:[],repo_snippets:[]}, ttl=3600, expiresAt=future timestamp. Used for cache-hit tests."
  - name: "mockKbSearchResult"
    type: "object"
    description: "Mock return value from kb_search for unit-level token budget testing. Contains arrays of kb_facts, kb_rules, kb_links, repo_snippets with known token counts to verify trimming logic without DB dependency."
  - name: "oversizedContextPack"
    type: "object"
    description: "An assembled context pack object where estimated tokens > 2000, used to test trimming logic in unit tests. repo_snippets contains 5+ large items."

risks:
  - "Integration tests require postgres-knowledgebase (port 5433) — CI must have this running"
  - "Token estimation via character-count/4 may produce different results than actual token counts — tests should use a tolerance margin"
  - "Concurrent race condition test requires precise timing — may be flaky without proper synchronization"
  - "KB search results may vary if test data is not seeded — integration tests need deterministic test data or assertion on shape not content"
