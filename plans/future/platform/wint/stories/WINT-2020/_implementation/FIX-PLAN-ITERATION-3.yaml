overview: |
  Iteration 3 is the final permitted fix cycle per story policy (max_iterations: 3).
  Story went through two prior iterations:
  - Iteration 1 (REVIEW.yaml): 22 typecheck errors, 1 reusability violation
  - Iteration 2 (FIX-SUMMARY.yaml): Security issues, Zod violations, syntax suggestions

  The code was marked as "verified" and "ready-for-code-review" at iteration 2, but
  the subsequent code review (iteration 1 review cycle) revealed the issues persisted.
  This plan addresses all identified blockers.

critical_blockers:
  - id: TC-001
    severity: CRITICAL
    category: typecheck
    count: 22
    description: "Missing 'ttl' parameter in test calls across three test files"
    affected_files:
      - packages/backend/sidecars/context-pack/src/__tests__/context-pack.integration.test.ts
      - packages/backend/sidecars/context-pack/src/__tests__/context-pack.unit.test.ts
      - packages/backend/mcp-tools/src/context-pack/__tests__/context-pack-get.test.ts
    root_cause: |
      ContextPackRequestSchema defines 'ttl' as optional (.optional().default(DEFAULT_TTL)),
      but test calls do not pass the parameter. This may indicate either:
      (a) Schema was changed to make ttl required after tests were written, OR
      (b) Tests incorrectly omit a required parameter
    fix_strategy: |
      1. Verify ContextPackRequestSchema.ttl definition in __types__/index.ts
      2. If optional with default: test calls are valid, add .default() to schema if missing
      3. If required: add ttl parameter to all test calls (use DEFAULT_TTL constant)
      4. Remove unused 'DEFAULT_TTL' declaration and 'timingKey' variable
      5. Remove unused 'makeKbSearchResult' helper
    priority: HIGHEST
    blocking: true

  - id: REUS-001
    severity: CRITICAL
    category: reusability
    count: 1
    description: "Duplicated sendJson() HTTP utility function"
    affected_files:
      - packages/backend/sidecars/context-pack/src/routes/context-pack.ts
      - packages/backend/sidecars/role-pack/src/routes/... (same function exists)
    root_cause: |
      sendJson() is a simple HTTP utility that should be shared across sidecars.
      Current approach: each sidecar implements its own copy (violates DRY).
    fix_strategy: |
      Option 1: Extract to @repo/sidecar-utils package (preferred, long-term)
        - Create packages/backend/sidecar-utils/ with sendJson() export
        - Update context-pack and role-pack to import from @repo/sidecar-utils
      Option 2: Use a common backend utility package if available
        - Check if @repo/backend-utils or similar exists
        - If not, create one
      Option 3: Document as intentional (last resort)
        - Add a comment explaining why duplication is acceptable
      For WINT-2020 iteration 3: Use Option 1 or 2 to fix blocking violation.
    priority: HIGHEST
    blocking: true

  - id: SEC-001
    severity: CRITICAL
    category: security
    source: FIX-SUMMARY.yaml
    description: "SQL injection via sql.raw() with untrusted context parameter"
    affected_files:
      - packages/backend/sidecars/context-pack/src/assemble-context-pack.ts
      - Line: 158 (mentioned in REVIEW.yaml as non-null assertion)
    root_cause: |
      Original code may have used sql.raw() with user-controlled ttl parameter.
      This allows SQL injection if ttl is not properly validated.
    fix_verification: |
      Current code (lines 196-199) shows:
        const expiresAt = sql`NOW() + (${ttl} * '1 second'::INTERVAL)`
      This is CORRECT — uses parameterized template literal, not sql.raw().
      ttl is validated as positive integer by ContextPackRequestSchema.
      No SQL injection risk present.
      Keep this implementation as-is.
    priority: HIGH
    blocking: false (already fixed)

  - id: SEC-003
    severity: HIGH
    category: security
    description: "Unbounded request body size"
    affected_files:
      - packages/backend/sidecars/context-pack/src/routes/context-pack.ts
    fix_verification: |
      Current code (lines 29-53) shows:
        const MAX_BODY_SIZE_BYTES = 1 * 1024 * 1024 // 1 MB
        async function readBody(req: IncomingMessage): Promise<string> {
          ...
          if (size > MAX_BODY_SIZE_BYTES) {
            reject(new Error(`Request body exceeds ${MAX_BODY_SIZE_BYTES} bytes`))
            ...
      This is CORRECT — enforces 1 MB limit with explicit error on overflow.
    priority: HIGH
    blocking: false (already fixed)

  - id: SEC-004
    severity: HIGH
    category: security
    description: "'as any' type assertions found"
    affected_files:
      - packages/backend/sidecars/context-pack/src/assemble-context-pack.ts
    root_cause: |
      Using 'as any' bypasses TypeScript strict mode and hides type errors.
      Per CLAUDE.md: "Strict mode enabled. Don't skip type errors — fix them."
    fix_strategy: |
      1. Search for all 'as any' in context-pack files
      2. For each occurrence:
         - Use proper Zod parsing instead of type assertion
         - Or use a more specific type cast
         - Or restructure code to avoid the assertion
      3. Ensure all DB return types are properly validated via Zod
    priority: HIGH
    blocking: true

  - id: TS-ZOD-001
    severity: CRITICAL
    category: typescript
    description: "TypeScript interfaces instead of Zod schemas (3 violations)"
    affected_files:
      - packages/backend/sidecars/context-pack/src/assemble-context-pack.ts
    root_cause: |
      Per CLAUDE.md: "ALWAYS use Zod schemas for types - never use TypeScript interfaces"
      Code uses interfaces (KbSearchResultEntry, KbSearchResult, AssembleContextPackDeps)
      instead of Zod schemas with z.infer<>.
    fix_verification: |
      Lines 41-87 show:
        - KbSearchResultEntrySchema: ✓ Zod schema
        - KbSearchResultEntry: ✓ z.infer<> type (not interface)
        - KbSearchResultSchema: ✓ Zod schema
        - KbSearchResult: ✓ z.infer<> type
        - AssembleContextPackDepsSchema: ✓ Zod schema
        - AssembleContextPackDeps: ✗ Manual type definition (not z.infer<>)

      Fix: Convert AssembleContextPackDeps to use z.infer<typeof AssembleContextPackDepsSchema>
    priority: CRITICAL
    blocking: true

  - id: SYN-001-002
    severity: MEDIUM
    category: syntax
    description: "Optional chaining and nullish coalescing suggestions"
    affected_files:
      - packages/backend/sidecars/context-pack/src/assemble-context-pack.ts
      - packages/backend/sidecars/context-pack/src/routes/context-pack.ts
    fix_strategy: |
      Replace verbose null checks with modern JavaScript operators:
        obj != null ? obj.prop : undefined  →  obj?.prop
        val === null || val === undefined ? default : val  →  val ?? default
      This improves readability without changing behavior.
    priority: MEDIUM
    blocking: false

  - id: COMMENT-001
    severity: LOW
    category: code_quality
    description: "Non-null assertion without justification comment (line 158)"
    affected_files:
      - packages/backend/sidecars/context-pack/src/assemble-context-pack.ts
    fix_strategy: |
      Add explanatory comment above non-null assertion explaining why null is impossible:
        // expiresAt is guaranteed non-null because or() always returns a valid condition
        const expiresAt = ...!
    priority: LOW
    blocking: false

fix_strategy_summary: |
  Priority 1 (MUST FIX - blocking):
    1. Add 'ttl' parameter to all test calls or fix schema default
    2. Extract/deduplicate sendJson() HTTP utility
    3. Remove 'as any' type assertions
    4. Convert AssembleContextPackDeps to Zod-based type
    5. Verify security fixes (SQL, body size) are properly implemented

  Priority 2 (SHOULD FIX - non-blocking):
    6. Apply optional chaining (?.) and nullish coalescing (??)
    7. Add comment to non-null assertion

  Priority 3 (VERIFY):
    8. Run full test suite: build, typecheck, test, lint
    9. All ACs remain met after fixes
    10. Integration tests pass (postgres-knowledgebase on 5433)

