lessons_to_record:
  - lesson: >
      Agent instruction files can evolve post-implementation before QA runs. The PROOF and EVIDENCE
      describe implementation intent at time of writing; the actual file may have been subsequently
      refined (e.g., /wt-finish → /wt:merge-pr). QA should spot-check the actual file, not just trust the PROOF.
    category: pattern
    tags: ["qa", "agent-instructions", "evidence-verification"]

  - lesson: >
      Testing agent instruction logic as pure functions (cleanupWorktreeForStory) is effective for
      behavioral coverage even when the real execution environment is an LLM agent. The test file
      documents the expected behavior contract independently.
    category: pattern
    tags: ["testing", "agents", "behavioral-testing"]

  - lesson: >
      Worktree cleanup as a non-blocking step in PASS flow is a solid pattern: check DB → invoke
      cleanup skill → handle result → continue regardless. The 'never block story completion'
      invariant is the critical safety property to test.
    category: reuse
    tags: ["worktree", "cleanup", "pattern", "non-blocking"]

