notes:
  - "featureType in graph.features is plain text (not pgEnum) — values 'api_endpoint', 'ui_component', 'service', 'utility' are unconstrained at DB level (OPP-3 N/A)"
  - "Elab PASS with 0 gaps — no unresolved design decisions entering implementation"
  - "wint-graph-schema.test.ts referenced in HP-4 is not in ST-1 files_to_modify — implementing agent should create it as part of ST-1 scope if it does not exist"
  - "Migration order enforced by subtask DAG: ST-1 (schema+migration) → ST-2 (script) → ST-3 (tests) → ST-4 (check-types+test:all)"
  - "onConflictDoNothing chosen over onConflictDoUpdate — epics and features are stable identifiers; overwrites would silently corrupt canonical data"
  - "Story sizing WARN from elab (12 ACs, 5 happy paths) — monitor token budget across steps; each step scoped to ≤2 files"
  - "Canonical pattern: populate-domain-kb.ts — Zod schemas for result types, injectable deps, attempted/succeeded/failed shape, per-item try/catch, @repo/logger throughout"
