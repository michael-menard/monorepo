  - id: ports_adapters
    status: WARN
    note: >
      The story is a standalone sidecar service (packages/backend/sidecars/), not a
      lego-api domain, so the hexagonal architecture prescribed in docs/architecture/api-layer.md
      for apps/api/lego-api/domains/ does not strictly apply. However, the sidecar architecture
      as described conflates assembly logic (assembleContextPack) with the HTTP route layer
      without defining explicit ports/interfaces. The transport-agnostic core (assembleContextPack
      in assemble-context-pack.ts) is correctly separated from the HTTP handler (ST-4),
      satisfying the spirit of ports & adapters. The MCP tool wrapper (ST-5) calls
      assembleContextPack directly, demonstrating transport-agnosticism. The primary gap:
      no explicit port interface is defined for the KB search or cache dependencies within
      the sidecar — they are called directly. This is acceptable given the sidecar pattern
      established by WINT-2010 and the simpler scope, but is a minor deviation from strict
      hexagonal compliance. No platform-specific logic leaks identified.

  - id: testability
    status: PASS
    note: >
      Unit tests (ST-6) cover Zod validation, token budget enforcement, cache key generation,
      section trimming, and empty array behavior — all pure logic, no infrastructure required.
      Integration tests (ST-7) require real postgres-knowledgebase on port 5433 per ADR-005.
