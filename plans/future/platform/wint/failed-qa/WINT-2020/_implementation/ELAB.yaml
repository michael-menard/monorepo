  - id: reuse_first
    status: PASS
    note: >
      All six canonical references verified to exist on disk:
      contextCacheGet (packages/backend/mcp-tools/src/context-cache/context-cache-get.ts),
      contextCachePut (packages/backend/mcp-tools/src/context-cache/context-cache-put.ts),
