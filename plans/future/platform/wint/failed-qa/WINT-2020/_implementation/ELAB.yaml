      covers testing the MCP tool output — ST-5 only verifies type-check passes and tool
      appears in tool list.

  - id: decision_completeness
    status: WARN
    note: >
      Two unresolved design decisions found:
      (1) ST-5 description says the MCP tool wrapper 'calls assembleContextPack directly
      (or HTTP internally)' — the 'or HTTP internally' is an open design choice with no
      resolution criteria. If the MCP tool calls assembleContextPack directly, it requires
      the sidecar package as a dependency of mcp-tools, which may introduce circular or
      unexpected package-level coupling. This should be resolved before dev picks up ST-5.
      (2) The HTTP server framework/pattern for the sidecar is deferred to reviewing WINT-2010
      before implementation — this is acceptable as a dependency gate, but the story has no
      fallback decision documented if WINT-2010's pattern is significantly different than
      assumed. Both decisions are blocked on WINT-2010 reaching UAT, which is explicitly
      documented as a dependency gate. Not blocking for elaboration sign-off, but dev should
      resolve (1) before starting ST-5.

  - id: risk_disclosure
    status: PASS
    note: >
      Risks explicitly disclosed: WINT-2010 dependency gate (critical path blocker),
      kb_search initialization requiring db+embeddingClient injection at startup,
      concurrent cache-miss race condition (mitigated by ON CONFLICT DO UPDATE),
      token estimation approximation (char-count/4 with tolerance margin guidance),
      packTypeEnum 'story' verified to exist in contextPacks table (confirmed in
      context-cache/__types__/index.ts line 15-22). Integration test infrastructure risk
      (port 5433 requirement) is disclosed in both test-plan.yaml and Risk Predictions.
      No hidden auth, upload, or infra risks identified. Auth explicitly deferred to later
      phase (Non-Goals). No DB migration required.

  - id: story_sizing
    status: WARN
    note: >
      Sizing indicators triggering review: 12 ACs (threshold: 8), 7 test scenarios
      (threshold: 3), touches 3 packages (new sidecars/context-pack + modified mcp-tools +
      modified apps/api/knowledge-base). Story self-flags split_risk: medium. However,
      all 12 ACs form a single coherent capability (cache-first context assembly) — they
      are not independent features bundled together. The story explicitly identifies a natural
      split point at ST-5 (MCP tool) if token budget runs out. Estimated token floor is
      200,000 with 4-6x multiplier. At 5 story points, the sizing is aggressive but not
      immediately requiring a forced split. Recommend monitor token usage during ST-1 through
      ST-4; if budget exhausted before ST-5, split ST-5 (MCP tool wrapper) into WINT-2020b.
      Verdict: WARN rather than SPLIT — story is coherent and split point is documented.

  - id: subtask_decomposition
    status: CONDITIONAL
    note: >
      All 12 ACs are covered by at least one subtask (verified above). DAG is valid with
      no cycles: ST-1 → ST-2 → ST-3 → {ST-4, ST-5, ST-6}; ST-4 → ST-7. No subtask
      creates/modifies more than 3 files (ST-4 creates 2 new files; ST-5 creates 1 new file
