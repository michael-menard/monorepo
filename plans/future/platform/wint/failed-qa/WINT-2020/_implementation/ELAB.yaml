      (1) ST-5 verification command 'pnpm check-types && MCP tool appears in tool list' is
      not fully executable as written — 'MCP tool appears in tool list' requires manual MCP
      session inspection. Replace with a concrete alternative such as
      'pnpm check-types --filter @repo/mcp-tools && grep -r context_pack_get apps/api/knowledge-base/src/'.
      (2) HP-3 (MCP tool returns same shape as HTTP endpoint) from test-plan.yaml has no
      corresponding subtask test coverage — ST-6 or ST-7 should explicitly include MCP tool
      response shape assertion.
      These are minor and do not block dev pickup, but should be addressed during ST-5 planning.

gaps:
  - id: GAP-001
    severity: MEDIUM
    category: decision_completeness
    description: >
      ST-5 has an unresolved architectural decision: 'context_pack_get MCP tool calls
      assembleContextPack directly (or HTTP internally)'. The direct-call option requires
      packages/backend/mcp-tools to depend on packages/backend/sidecars/context-pack, creating
      an unusual cross-package dependency (mcp-tools depending on sidecars rather than the reverse).
      The HTTP-internally option avoids the coupling but adds network overhead and requires the
      sidecar to be running when the MCP tool is invoked. This decision affects package boundaries
      and deployment assumptions. Must be resolved before ST-5 dev pickup.
    recommendation: >
      Extract the core assembleContextPack logic into a standalone, importable function in
      packages/backend/mcp-tools/src/context-pack/ (not in the sidecar), and have both
      the HTTP route handler and the MCP tool import it directly. This avoids the bidirectional
      dependency entirely. Alternatively, document explicitly that the MCP tool calls the
      sidecar via HTTP and specify the port/config convention.
    decision: resolved_with_default
    resolution: >
      Resolved during autonomous elaboration: MCP tool imports assembleContextPack directly
      from sidecar package (uni-directional dependency mcp-tools → sidecars/context-pack).
      Architecture decision note added to ST-5 in story.

  - id: GAP-002
    severity: LOW
    category: testability
    description: >
      HP-3 from test-plan.yaml ('MCP tool context_pack_get returns same shape as HTTP endpoint')
      is listed in the test plan but no subtask covers writing this test. ST-5 only has a
      type-check verification. The AC-6 requirement ('returning the same response shape') is
      not covered by any integration or unit test subtask.
    recommendation: >
      Add an assertion to ST-7 (integration tests) or create a minimal test in ST-5 that
      calls the MCP tool function directly and asserts ContextPackResponseSchema.safeParse()
      passes on the result.
    decision: resolved_with_default
    resolution: >
      Added HP-3 MCP tool response shape test to ST-7 integration tests. Updated ST-7 ACs
      covered to include AC-6.

opportunities:
  - id: OPP-001
    category: observability
    description: >
      The story specifies logging cache write failures (AC-11) but no structured telemetry
      for cache hit/miss ratio, assembly latency, or KB query result counts. Given that
      token reduction is the primary Phase 2 KPI, instrumenting the context pack assembly
      with hit/miss counters and token-before/after-trimming metrics would enable measuring
      actual token savings.
    track_for: WINT-2030 or a dedicated telemetry story
    decision: log_to_kb

  - id: OPP-002
    category: performance
    description: >
      The token budget trimming (AC-5) removes items from the end of arrays (lowest priority
      first). Future optimization: rank KB results by relevance score before storing, so
      trimming removes lowest-relevance items rather than last-inserted items. This requires
      kb_search to return relevance scores, which it may already support given the hybrid
      RRF search implementation.
    track_for: Post-WINT-2020 iteration
    decision: log_to_kb

  - id: OPP-003
    category: resilience
    description: >
      The story defers auth to a later phase (Non-Goal). For local/CI operation this is
      fine, but if the sidecar HTTP endpoint is ever exposed beyond localhost, the absence
      of auth is a security gap. Adding an explicit note in the sidecar README or a
      localhost-only binding in the server config would document this assumption formally.
    track_for: Phase 3 security hardening
    decision: log_to_kb

