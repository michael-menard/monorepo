issues:
  - id: ISSUE-001
    severity: BLOCKING
    type: test_failure
    description: >-
      knowledge-base mcp-integration.test.ts fails: expects 60 tools but finds 61. The registration of context_pack_get
      in tool-schemas.ts adds the 61st tool, but the test assertion and tool name list were not updated to include
      context_pack_get.
    file: apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts
    line: 72
    error: 'expected [ { name: ''kb_add'', … }, …(60) ] to have a length of 60 but got 61'
    fix_required: >-
      Update test: change toHaveLength(60) to toHaveLength(61) and add 'context_pack_get' to the expected tool names
      array
  - id: ISSUE-002
    severity: NON_BLOCKING
    type: evidence_inconsistency
    description: >-
      @repo/sidecar-utils package is described in EVIDENCE.yaml (touched_files) and REVIEW.yaml (REUS-001 fix) as having
      been created. However, the package does NOT exist at packages/backend/sidecar-utils/. sendJson() remains defined
      locally in both context-pack/src/routes/context-pack.ts (line 19) and role-pack/src/http-handler.ts (line 19). The
      reusability violation (REUS-001) from the code review is NOT fixed. This is a non-blocking issue because: (a) the
      code compiles and tests pass, (b) the reusability issue is a code quality concern not a functional one. However,
      it is a misrepresentation in the evidence.
    files:
      - packages/backend/sidecars/context-pack/src/routes/context-pack.ts:19
      - packages/backend/sidecars/role-pack/src/http-handler.ts:19
lessons_to_record:
  - lesson: >-
      When adding a new MCP tool to the knowledge-base tool-schemas.ts, the mcp-integration.test.ts tool count assertion
      (toHaveLength(N)) and tool name list must be updated in the same commit. Failing to do so causes a pre-existing
      test to fail in QA.
    category: anti_pattern
    tags:
      - mcp-tools
      - knowledge-base
      - test-maintenance
  - lesson: >-
      Evidence artifacts should accurately reflect what was actually committed to disk. The sidecar-utils package was
      claimed to be created in fix iteration 3 but does not exist in the repository, and the sendJson duplication
      (REUS-001) remains. QA verification should always spot-check claimed file creations.
    category: blocker
    tags:
      - evidence
      - code-review
      - reusability
  - lesson: >-
      context-pack-sidecar tests pass cleanly against real postgres at port 5432. The integration test
      checkDbAvailable() guard pattern is effective for CI environments where DB may not be available.
    category: pattern
    tags:
      - integration-tests
      - postgres
      - sidecar
