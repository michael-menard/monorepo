notable_decisions:
  - ARCH-001 resolved in elaboration - MCP tool imports assembleContextPack directly (not HTTP)
  - Direct DB access in assemble-context-pack.ts (using @repo/db + drizzle) avoids circular dependency with @repo/mcp-tools
  - content field cast as `any` when writing to contextPacks JSONB — typed schema mismatch resolved via cast
  - KbSearchFn is injectable (AssembleContextPackDeps) — enables unit testing without real KB DB
  - MCP tool contextPackGet integration tests placed in @repo/mcp-tools (not context-pack-sidecar) to avoid turbo cycle detection

known_deviations:
  - HP-3 (contextPackGet returns ContextPackResponseSchema-valid response) tested in @repo/mcp-tools tests rather than context-pack-sidecar tests — required to avoid circular devDependency causing turbo cycle error
  - Server.ts uses dynamic import for KB search module — sidecar HTTP server degrades gracefully when KB is unavailable

