feasible: true
confidence: medium
rationale: >
  The story is technically sound and all key dependencies exist: contextCacheGet/Put tools,
  KB hybrid search, contextPacks table with 'story' packType, @repo/db and @repo/logger.
  The primary risk is the dependency gate — implementation cannot begin until WINT-2010
  (role pack sidecar) is at UAT to establish the sidecar package structure and HTTP server
  pattern. Once WINT-2010 is done, this story follows a clear cache-first assembly pattern
  with well-defined inputs and outputs. Token budget enforcement via character-count/4
  estimation is simple to implement. Confidence is medium (not high) due to unknown
  WINT-2010 package layout decisions that may require adjustment.
complexity: high
change_surface:
  areas:
    - "packages/backend/sidecars/context-pack/ (new package — follows WINT-2010 pattern)"
    - "packages/backend/mcp-tools/ (register context_pack_get MCP tool)"
    - "apps/api/knowledge-base/ (potentially register MCP tool in kb MCP server)"
  endpoints:
    - "POST /context-pack (new, in context-pack sidecar)"
  deploy_touchpoints:
    - "New sidecar package must be added to pnpm workspace"
    - "context_pack_get tool registration in knowledge-base MCP server"
    - "No DB migration required (reuses existing contextPacks table)"

risks:
  - finding: "Dependency gate: WINT-2010 must be at UAT before implementation begins"
    mitigation: "Block story from dev pickup until WINT-2010 status = uat|completed. Review WINT-2010 package layout before writing first line of code."
  - finding: "kb_search requires both db and embeddingClient injected at startup — initialization pattern must match WINT-2010's startup approach"
    mitigation: "Read WINT-2010's sidecar initialization code before implementing. Mirror the dependency injection pattern exactly."
  - finding: "Concurrent cache-miss race condition: two simultaneous requests for same packKey could cause duplicate INSERT attempts"
    mitigation: "contextCachePut already uses ON CONFLICT DO UPDATE (upsert) — reuse this pattern directly. No additional logic needed."
  - finding: "Token estimation via character-count/4 is approximate and could cause flaky tests if assertions are too tight"
    mitigation: "Use a reasonable tolerance margin in tests (e.g., budget + 10%). Define estimateTokens as a pure function in __types__/ for easy unit testing."
  - finding: "packTypeEnum 'story' must already exist in contextPacks table — verify schema before assuming it is available"
    mitigation: "Confirmed: contextPackTypeEnum in packages/backend/mcp-tools/src/context-cache/__types__/index.ts includes 'story'. Direct reuse confirmed."

missing_requirements: []

evidence_expectations:
  - "POST /context-pack returns 200 with ContextPackResponseSchema-valid body"
  - "contextPacks row inserted after cache miss (query DB to confirm)"
  - "cache hit returns within 100ms (timing assertion in integration test)"
  - "cache miss returns within 2000ms (timing assertion in integration test)"
  - "token budget enforcement trims repo_snippets before kb_links (unit test proof)"
  - "context_pack_get MCP tool registered and callable from Claude Code"
  - "pnpm check-types passes with no errors"
  - "All unit + integration tests pass"

subtasks:
  - id: ST-1
    title: "Create context-pack sidecar package scaffold"
    goal: "Initialize packages/backend/sidecars/context-pack/ following WINT-2010's role-pack structure. Create package.json, tsconfig.json, src/ directory."
    files_to_read:
      - "packages/backend/sidecars/role-pack/package.json"
      - "packages/backend/sidecars/role-pack/tsconfig.json"
    files_to_modify:
      - "packages/backend/sidecars/context-pack/package.json (new)"
      - "packages/backend/sidecars/context-pack/tsconfig.json (new)"
      - "pnpm-workspace.yaml (add new package)"
    acs: ["AC-1"]
    depends_on: "none"
    verification: "pnpm install && pnpm check-types --filter @repo/context-pack-sidecar"
    estimated_tokens: 6000

  - id: ST-2
    title: "Define Zod schemas in __types__/index.ts"
    goal: "Create all request/response Zod schemas: ContextPackRequestSchema (story_id, node_type, role enum, optional ttl), ContextPackResponseSchema (story_brief, kb_facts[], kb_rules[], kb_links[], repo_snippets[]), CACHE_KEY_FORMAT constant, DEFAULT_TTL and DEFAULT_MAX_TOKENS constants, estimateTokens utility."
    files_to_read:
      - "packages/backend/mcp-tools/src/context-cache/__types__/index.ts"
    files_to_modify:
      - "packages/backend/sidecars/context-pack/src/__types__/index.ts (new)"
    acs: ["AC-2", "AC-5", "AC-7"]
    depends_on: "ST-1"
    verification: "pnpm check-types --filter @repo/context-pack-sidecar"
    estimated_tokens: 8000

  - id: ST-3
    title: "Implement cache-key generation and cache-first assembly logic"
    goal: "Implement the core assembleContextPack function: generate packKey as '{story_id}:{node_type}:{role}', call contextCacheGet, on hit return cached content, on miss call KB search, apply token budget trimming (repo_snippets first, then kb_links), call contextCachePut (non-blocking on failure), return assembled pack."
    files_to_read:
      - "packages/backend/mcp-tools/src/context-cache/context-cache-get.ts"
      - "packages/backend/mcp-tools/src/context-cache/context-cache-put.ts"
      - "apps/api/knowledge-base/src/search/kb-search.ts"
    files_to_modify:
      - "packages/backend/sidecars/context-pack/src/assemble-context-pack.ts (new)"
    acs: ["AC-3", "AC-4", "AC-5", "AC-7", "AC-8", "AC-11"]
    depends_on: "ST-2"
    verification: "pnpm test --filter @repo/context-pack-sidecar (unit tests)"
    estimated_tokens: 20000

  - id: ST-4
    title: "Implement HTTP server route handler"
    goal: "Add POST /context-pack route handler to the sidecar HTTP server (following WINT-2010 server pattern). Validate request with ContextPackRequestSchema (fail fast with 400), call assembleContextPack, return JSON response."
    files_to_read:
      - "packages/backend/sidecars/role-pack/src/server.ts"
      - "packages/backend/sidecars/role-pack/src/index.ts"
    files_to_modify:
      - "packages/backend/sidecars/context-pack/src/routes/context-pack.ts (new)"
      - "packages/backend/sidecars/context-pack/src/server.ts (new)"
    acs: ["AC-1", "AC-2"]
    depends_on: "ST-3"
    verification: "curl -s -X POST localhost:{port}/context-pack -d '{...}' | jq ."
    estimated_tokens: 10000

  - id: ST-5
    title: "Implement context_pack_get MCP tool wrapper"
    goal: "Create context_pack_get MCP tool in packages/backend/mcp-tools/src/context-pack/ that accepts the same parameters as the HTTP endpoint and calls assembleContextPack directly (or HTTP internally). Register in knowledge-base MCP server."
    files_to_read:
      - "packages/backend/mcp-tools/src/context-cache/context-cache-get.ts"
      - "apps/api/knowledge-base/src/ (MCP server registration)"
    files_to_modify:
      - "packages/backend/mcp-tools/src/context-pack/context-pack-get.ts (new)"
      - "apps/api/knowledge-base/src/ (register tool)"
    acs: ["AC-6"]
    depends_on: "ST-3"
    verification: "pnpm check-types && MCP tool appears in tool list"
    estimated_tokens: 10000

  - id: ST-6
    title: "Write unit tests"
    goal: "Unit tests covering: Zod schema validation (valid/invalid inputs), token budget enforcement logic (trim repo_snippets first then kb_links), cache key generation ('{story_id}:{node_type}:{role}' format), section trimming with oversized mock data, empty array returned on no KB results."
    files_to_read:
      - "packages/backend/mcp-tools/src/context-cache/__tests__/ (pattern reference)"
    files_to_modify:
      - "packages/backend/sidecars/context-pack/src/__tests__/context-pack.unit.test.ts (new)"
    acs: ["AC-2", "AC-5", "AC-8", "AC-10"]
    depends_on: "ST-3"
    verification: "pnpm test --filter @repo/context-pack-sidecar"
    estimated_tokens: 15000

  - id: ST-7
    title: "Write integration tests against real postgres-knowledgebase"
    goal: "Integration tests (port 5433, no mocking per ADR-005): cache hit path with timing assertion (<100ms), cache miss path with timing assertion (<2000ms), concurrent cache-miss race condition with ON CONFLICT upsert verification, cache write failure resilience (returns context even on DB error)."
    files_to_read:
      - "packages/backend/mcp-tools/src/context-cache/__tests__/ (integration test patterns)"
    files_to_modify:
      - "packages/backend/sidecars/context-pack/src/__tests__/context-pack.integration.test.ts (new)"
    acs: ["AC-3", "AC-9", "AC-11", "AC-12"]
    depends_on: "ST-4"
    verification: "pnpm test --filter @repo/context-pack-sidecar (integration suite, requires DB on port 5433)"
    estimated_tokens: 18000
