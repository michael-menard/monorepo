issues:
  - issue_id: "ISSUE-1"
    severity: blocking
    description: |
      vitest.config.ts is missing from the committed branch. It is listed in EVIDENCE.yaml
      touched_files (action: created) but was never committed. Running
      `pnpm --filter @repo/workflow-logic test` exits with code 1 because vitest falls back
      to the root vitest.config.ts, which specifies setupFiles: ['./__tests__/setup.ts'] pointing
      to a path that does not exist in the workflow-logic package.
    fix: |
      Add vitest.config.ts to packages/backend/workflow-logic/ (matching the mcp-tools pattern):

        import { defineConfig } from 'vitest/config'
        export default defineConfig({
          test: {
            globals: true,
            environment: 'node',
            coverage: {
              provider: 'v8',
              reporter: ['text', 'json', 'html'],
              include: ['src/**/*.ts'],
              exclude: ['node_modules/', 'dist/', '**/*.test.ts', '**/__tests__/**', 'src/index.ts', 'vitest.config.ts'],
              thresholds: { lines: 80, functions: 80, branches: 80, statements: 80 },
            },
          },
        })

      Then commit the file and verify: pnpm --filter @repo/workflow-logic test (should show 82/82 pass).

lessons_to_record:
  - lesson: "EVIDENCE.yaml touched_files entries must be cross-referenced against the actual git commit diff. A file can appear in touched_files but not be committed. QA must run the test command and fail fast rather than trust evidence claims."
    category: anti_pattern
    tags: ["qa-process", "evidence-validation", "vitest", "missing-config"]

  - lesson: "Backend library packages (e.g., @repo/workflow-logic) must include a package-local vitest.config.ts to prevent fallback to the root config. The root vitest.config.ts contains setupFiles targeting a path that only exists in frontend app contexts."
    category: pattern
    tags: ["vitest", "backend-library", "package-setup", "worktree"]

  - lesson: "When verifying a new package, check that all tooling config files (vitest.config.ts, tsconfig.json) exist on the branch before declaring tests pass. The git commit diff is the authoritative source."
    category: blocker
    tags: ["qa-process", "new-package", "vitest-config"]

