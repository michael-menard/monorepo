test_execution_notes: |
  Command `pnpm --filter @repo/workflow-logic test` exited with code 1.
  Root cause: vitest.config.ts was NOT committed to the feature branch despite being
  listed in EVIDENCE.yaml touched_files. Without its own vitest.config.ts, the package
  falls back to the root vitest.config.ts which specifies `setupFiles: ['./__tests__/setup.ts']`.
  That path resolves to /packages/backend/workflow-logic/__tests__/setup.ts which does not exist.
  All 4 test suites fail to load with: "Cannot find module ... __tests__/setup.ts".

  IMPORTANT: The 82 unit tests themselves are correct and pass when run with a proper
  package-local vitest config (verified manually with a temporary config). The defect is
  solely the missing vitest.config.ts in the commit.

