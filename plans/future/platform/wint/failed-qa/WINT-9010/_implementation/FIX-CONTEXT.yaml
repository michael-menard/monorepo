  - action: "If all ACs pass, move story from failed-qa to ready-for-qa"

# Lessons Recorded
lessons:
  - category: "qa-process"
    lesson: |
      When a file is listed in EVIDENCE.yaml touched_files but test execution fails,
      cross-reference the git commit diff FIRST before declaring the AC failed.
      The diff is the source of truth.
  - category: "backend-library-setup"
    lesson: |
      Backend packages must include a package-local vitest.config.ts to prevent
      fallback to root config, which may contain frontend-specific setupFiles paths.
  - category: "new-package-checklist"
    lesson: |
      For new packages: verify all tooling config files (vitest.config.ts, tsconfig.json)
      exist in git BEFORE declaring tests pass.
