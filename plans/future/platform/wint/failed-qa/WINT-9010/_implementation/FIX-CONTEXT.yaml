mode: fix
failure_source: qa-verify

# QA Failure Summary
failure_reason: "vitest.config.ts missing from commit - AC-9 cannot be verified"
failure_ac: AC-9
qa_verdict: FAIL
blocking_issue: |
  The QA process executed `pnpm --filter @repo/workflow-logic test` which exited with code 1.
  Root cause: packages/backend/workflow-logic/vitest.config.ts was listed in EVIDENCE.yaml
  touched_files as "created" but was never committed to the feature branch.

  Without its own vitest.config.ts, vitest falls back to the monorepo root config, which
  specifies setupFiles: ['./__tests__/setup.ts']. This path resolves to a non-existent
  location in the workflow-logic package context, causing all 4 test suites to fail
  with "Cannot find module".

  The 82 unit tests themselves are correct and pass when run with a proper package-local
  vitest config (verified manually in QA).

# Fix Strategy
fix_type: missing_file_commit
affected_packages:
  - "@repo/workflow-logic"
affected_files:
  - path: "packages/backend/workflow-logic/vitest.config.ts"
    action: create
    reason: "Package-local config to override root vitest fallback behavior"
    status: needs_creation

# Root Cause Analysis
analysis:
  issue: "EVIDENCE.yaml was inaccurate"
  root_cause: |
    During implementation, vitest.config.ts was created and used locally to run tests,
    but was not staged and committed to the git branch. QA discovered this by running
    the test command, which immediately failed due to missing setupFiles path.

    Lesson: Files listed in EVIDENCE.yaml touched_files must be verified to actually
    exist in the git commit diff. A file can be created and used locally without being
    committed.

  qa_discovery_method: |
    QA executed `pnpm --filter @repo/workflow-logic test` as part of AC-9 verification.
    Command exited code 1. QA ran git commit diff and confirmed vitest.config.ts was
    not in the commit. QA then manually created a temporary vitest.config.ts with the
    same structure as mcp-tools package and verified all 82 tests pass.

# Fix Implementation Guidance
fix_implementation:
  step_1:
    description: "Create vitest.config.ts in packages/backend/workflow-logic/"
    rationale: |
      The package is a backend library (Node.js, not browser-based). The config must
      specify:
      - environment: 'node' (not jsdom)
      - globals: true (to enable vitest globals without imports)
      - Coverage provider v8 with 80% threshold across lines/functions/branches/statements
      - Exclude __tests__ and built artifacts from coverage
      - Exclude src/index.ts (re-export barrel, not implementation)
    template_source: "packages/backend/mcp-tools/vitest.config.ts (same structure)"
    file_content: |
      import { defineConfig } from 'vitest/config'

      export default defineConfig({
        test: {
          globals: true,
          environment: 'node',
          coverage: {
            provider: 'v8',
            reporter: ['text', 'json', 'html'],
            include: ['src/**/*.ts'],
            exclude: ['node_modules/', 'dist/', '**/*.test.ts', '**/__tests__/**', 'src/index.ts', 'vitest.config.ts'],
            thresholds: {
              lines: 80,
              functions: 80,
              branches: 80,
              statements: 80,
            },
          },
        },
      })

    notes: |
      - include: ['src/**/*.ts'] ensures only implementation files count toward coverage
      - exclude excludes test files and config from coverage calculation
      - thresholds set to 80% to match AC-9 requirement

  step_2:
    description: "Stage and commit vitest.config.ts"
    command: |
      cd /Users/michaelmenard/Development/monorepo/tree/feature/wint-9010-shared-business-logic
      git add packages/backend/workflow-logic/vitest.config.ts
      git commit -m "fix: add vitest.config.ts for workflow-logic package"
    rationale: "Commit must be present in the branch history for QA to verify"

  step_3:
    description: "Verify fix resolves AC-9"
    command: |
      cd /Users/michaelmenard/Development/monorepo/tree/feature/wint-9010-shared-business-logic
      pnpm --filter @repo/workflow-logic test
      pnpm --filter @repo/workflow-logic test:coverage
    expected_result: |
      - `test` should exit code 0 with "82 pass"
      - `test:coverage` should report >=80% coverage across all metrics
      - Coverage report should include all 5 modules: transitions, directory, validation, adapter, __types__

# AC-9 Re-Verification Checklist
ac9_verification:
  requirement: "Unit test suite with minimum 80% line coverage across packages/backend/workflow-logic/src/"
  prior_verdict: FAIL (test suite failed to load)
  after_fix_expected: PASS
  verification_steps:
    - step: "Run test command"
      command: "pnpm --filter @repo/workflow-logic test"
      expected: "82/82 tests pass, exit code 0"
    - step: "Run coverage"
      command: "pnpm --filter @repo/workflow-logic test:coverage"
      expected: "Lines: >=80%, Functions: >=80%, Branches: >=80%, Statements: >=80%"
    - step: "Verify in git"
      command: "git show HEAD:packages/backend/workflow-logic/vitest.config.ts"
      expected: "File exists and contains proper defineConfig structure"

