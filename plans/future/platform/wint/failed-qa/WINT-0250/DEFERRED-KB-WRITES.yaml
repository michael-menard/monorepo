      - **Impact**: Low | **Effort**: Medium
      - **Recommendation**: Add optional `meta.mode` field (`production` / `simulation`) in a future
        version. When set to `simulation`, llm-router logs escalation events without changing the
        model used. Defer to WINT-0230 implementation phase.
    additional_tags:
