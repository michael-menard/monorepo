  # Gap #1: Local tier sub-progression
  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0250"
    category: "future-opportunities"
    content: |
      **[WINT-0250] Edge Case: Local Tier Sub-Progression**
      - **Finding**: `graduated_chain` rule `from: Local` groups Local-Small and Local-Large under
        a single shared failure count. A task that fails twice on Local-Small but succeeds on
        Local-Large would still escalate to API-Cheap instead of being retried at Local-Large first.
      - **Impact**: Medium | **Effort**: Medium
      - **Recommendation**: After WINT-0270 benchmark results are available, introduce a sub-tier
        progression: Local-Small → Local-Large → API-Cheap, replacing the flat `from: Local` rule.
        Schema addition to `graduated_chain`, backward-compatible via version bump.
    additional_tags:
      - "non-blocking"
      - "edge-case"
      - "future-work"
      - "local-tier-progression"
      - "wint-0270-dependency"

  # Gap #2: task_label critical mechanism unspecified
  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0250"
    category: "future-opportunities"
    content: |
      **[WINT-0250] Edge Case: task_label Critical Mechanism Unspecified**
      - **Finding**: `hard_bypass` rule `condition: task_label, value: critical` has no story in the
        current phase defining how the `critical` label is applied to task metadata. If llm-router
        (WINT-0230) has no tagging mechanism, the bypass rule is unreachable at runtime.
      - **Impact**: Medium | **Effort**: Low
      - **Recommendation**: WINT-0230 elaboration must explicitly define how task labels are set —
        either as a field in the `llm.complete(...)` call options or derived from story metadata.
        An inline comment in escalation-rules.yaml would clarify intent for implementers.
    additional_tags:
      - "non-blocking"
      - "edge-case"
      - "future-work"
      - "task-label-mechanism"
      - "wint-0230-dependency"

  # Gap #3: Missing story_id / session_id in escalation_log_schema
  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0250"
    category: "future-opportunities"
    content: |
      **[WINT-0250] Observability: Missing story_id / session_id in escalation_log_schema**
      - **Finding**: `escalation_log_schema` has no `session_id` or `story_id` field. WINT-0260
        (cost tracking) needs to aggregate escalation events per story. Without a story-level
        grouping key, cost attribution becomes approximate.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: When WINT-0260 elaboration begins, evaluate adding `story_id`
        (string, optional) and `session_id` (string, optional) to escalation_log_schema.
        Non-breaking, backward-compatible additions.
    additional_tags:
      - "non-blocking"
      - "observability"
      - "monitoring"
      - "cost-attribution"
      - "wint-0260-dependency"

  # Gap #4: No API-High fallback rule
  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0250"
    category: "future-opportunities"
    content: |
      **[WINT-0250] Edge Case: No API-High Fallback Rule Defined**
      - **Finding**: No rule for `API-High → [anything]`. Current rules only define upward promotion.
        If a hard bypass fires and API-High (Claude) itself returns low confidence or an error,
        there is no defined fallback or retry behavior.
      - **Impact**: Low | **Effort**: Medium
      - **Recommendation**: Post-MVP de-escalation story (deferred per Non-goals) should address
        API-High failure modes explicitly. In the interim, a YAML comment in `hard_bypass` noting
        this gap clarifies intent for llm-router implementers.
    additional_tags:
      - "non-blocking"
      - "edge-case"
      - "future-work"
      - "api-high-failure-modes"
      - "de-escalation"

  # Enhancement #1: Per-task-type threshold overrides
  - entry_type: finding
    source_stage: elab
    story_id: "WINT-0250"
    category: "future-opportunities"
    content: |
      **[WINT-0250] Performance: Per-Task-Type Threshold Overrides**
      - **Finding**: `failure_count: 2` threshold applies globally across all task types. Repair loops
        and other flaky task types would benefit from per-task-type overrides (e.g., `failure_count: 3`
        for `repair-loop` tasks). Current schema does not support this.
      - **Impact**: Medium | **Effort**: Medium
      - **Recommendation**: Add optional `per_task_type_overrides` subsection to `graduated_chain`
        rules in a v1.1.0 revision. Additive, non-breaking. Defer until WINT-0270 benchmark data
        confirms which task types need different thresholds.
    additional_tags:
      - "non-blocking"
      - "performance"
      - "optimization"
      - "per-task-type-thresholds"
      - "wint-0270-dependency"

