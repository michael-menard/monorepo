commands_to_run:
  - command: >-
      PGPASSWORD=$KB_DB_PASSWORD psql -h localhost -p $KB_DB_PORT -U $KB_DB_USER -d $KB_DB_NAME -c "SELECT table_schema,
      table_name FROM information_schema.tables WHERE table_catalog = 'knowledgebase' AND table_schema NOT IN
      ('pg_catalog', 'information_schema') ORDER BY table_schema, table_name"
    when: Step 1 — table inventory
    required: true
  - command: >-
      PGPASSWORD=$KB_DB_PASSWORD psql -h localhost -p $KB_DB_PORT -U $KB_DB_USER -d $KB_DB_NAME -c "SELECT schema_name
      FROM information_schema.schemata WHERE catalog_name = 'knowledgebase' ORDER BY schema_name"
    when: Step 3 — confirm wint schema absence
    required: true
