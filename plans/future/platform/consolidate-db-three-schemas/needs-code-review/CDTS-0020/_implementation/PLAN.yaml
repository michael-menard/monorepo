architectural_decisions: []
complexity: simple
notes:
  - This is a documentation/audit story — no application code is produced
  - >-
    KEY FINDING: No wint schema exists in live knowledgebase DB (port 5433). Only schemas: public, drizzle, and system
    schemas. This resolves ENG-001.
  - >-
    model_experiments, model_assignments, and change_telemetry were defined in migration SQL files (016/017) but were
    NEVER applied to the live DB — wint schema was never created
  - >-
    All 33 tables are in public schema (plus 1 in drizzle). Bootstrap context listing them as 'wint' tables was an
    assumption from the migration SQL, not ground truth.
  - >-
    Live FK count: 7 constraints across 6 tables. Missing FKs to flag: story_artifacts.story_id -> stories.story_id and
    work_state.story_id -> stories.story_id
  - schema_migrations table already exists in public schema — CDTS-0010 migration runner is confirmed present
  - 'story_token_usage is the only table that moves: public -> analytics per bootstrap design'
  - >-
    The three wint tables (model_experiments, model_assignments, change_telemetry) will be created directly in analytics
    (not moved) since they don't exist in live DB
  - 'Per bootstrap AGENT-CONTEXT.md: migration numbering starts at 020 (last existing is 019 in KB migrations dir)'
  - No pnpm build/test required — this story produces only documentation files
