issues_blocking: []

issues_advisory:
  - id: ADV-001
    severity: cosmetic
    description: >
      analytics.ts import block has an extra blank line between 'timestamp,' and 'uuid,'
      (line 24). This is a minor Prettier formatting artifact. It does not affect
      compilation or runtime behaviour. Auto-fixed on next `pnpm format` run.

  - id: ADV-002
    severity: informational
    description: >
      The SQL migration does not issue GRANT on SEQUENCES for analytics schema (e.g.,
      for UUID defaults from gen_random_uuid()). This is acceptable because gen_random_uuid()
      uses the pg_crypto extension function, not a sequence, so no sequence GRANTs are needed.
      Confirmed non-issue.

  - id: ADV-003
    severity: informational
    description: >
      The migration does not issue ALTER DEFAULT PRIVILEGES for future tables in the analytics
      schema. This is not required for the current story scope — only the four specific tables
      are in scope. Future stories adding tables to analytics schema should consider
      ALTER DEFAULT PRIVILEGES for completeness.
