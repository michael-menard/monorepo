checks:

  - id: SQL-001
    area: SQL correctness
    status: PASS
    notes: >
      Migration file 0034_cdts_1010_analytics_schema.sql is syntactically correct.
      All statements follow valid PostgreSQL DDL syntax. Section ordering is logical:
      schema creation -> GRANT USAGE -> enum -> table moves -> table creates -> table GRANTs.
      The experiment_status enum is created before model_experiments, which references it.
      change_telemetry FK references model_experiments(id) which is defined above it.

  - id: SQL-002
    area: SQL idempotency
    status: PASS
    notes: >
      All DDL guards are present and correct:
      - CREATE SCHEMA IF NOT EXISTS analytics
      - Enum guarded by DO $$ block checking pg_type JOIN pg_namespace
      - ALTER TABLE story_token_usage SET SCHEMA guarded by DO $$ checking pg_tables
        WHERE schemaname='public' AND tablename='story_token_usage'
      - CREATE TABLE IF NOT EXISTS for all three new tables
      - CREATE INDEX IF NOT EXISTS for all indexes
      - GRANTs are idempotent by PostgreSQL semantics (re-granting same privilege is a no-op)
      MINOR OBSERVATION: On a second migration run after story_token_usage has already been
      moved, the GRANT on analytics.story_token_usage at line 141 will succeed because the
      table exists in analytics. This is correct behavior.

  - id: SQL-003
    area: schema / GRANT requirements
    status: PASS
    notes: >
      - CREATE SCHEMA IF NOT EXISTS analytics: present (line 17)
      - GRANT USAGE ON SCHEMA analytics TO kbuser: present (line 22)
      - GRANT SELECT, INSERT, UPDATE, DELETE on all four tables to kbuser: present (lines 141-144)

  - id: SQL-004
    area: table presence and FK
    status: PASS
    notes: >
      All four tables are present in analytics schema:
      - analytics.story_token_usage (moved from public via idempotent DO $$ block)
      - analytics.model_experiments (created fresh, CREATE TABLE IF NOT EXISTS)
      - analytics.model_assignments (created fresh, CREATE TABLE IF NOT EXISTS)
      - analytics.change_telemetry (created fresh, CREATE TABLE IF NOT EXISTS)
      FK on analytics.change_telemetry.experiment_id REFERENCES analytics.model_experiments(id)
      is present and correctly ordered (model_experiments created before change_telemetry).
      The FK is nullable (no NOT NULL), which is correct — a telemetry row may exist without
      an associated experiment.

