architectural_decisions:
  - id: ARCH-001
    question: 'Migration filename: prompt says 0021 but worktree already has migrations up to 0033. Use next available number?'
    decision: Use 0034_cdts_1010_analytics_schema.sql — next available sequential number in the worktree
    rationale: >-
      0021 already exists (0021_wealthy_sunfire.sql). Sequential numbering is required to avoid conflicts. The 0021
      reference in the prompt is stale.
    decided_by: auto
  - id: ARCH-002
    question: >-
      Story ACs mention ALTER TABLE wint.* SET SCHEMA analytics but CDTS-0020 audit confirms wint schema never existed.
      How to handle?
    decision: >-
      Use CREATE TABLE analytics.* for model_experiments, model_assignments, change_telemetry. Skip the ALTER TABLE
      wint.* DDL from story ACs.
    rationale: >-
      CDTS-0020 audit (WINT-TABLE-DEFS.md) definitively confirms wint schema and these 3 tables never existed in the
      live DB. Creating them fresh in analytics is the correct approach. The story ACs are based on incorrect
      assumptions pre-dating the CDTS-0020 audit.
    decided_by: auto
  - id: ARCH-003
    question: >-
      change_telemetry already has a Drizzle definition in change-telemetry.ts targeting wintSchema. How to handle the
      analytics version?
    decision: >-
      Create analyticsChangeTelemetry in analytics.ts targeting analyticsSchema. The change-telemetry.ts / wintSchema
      version remains untouched (it targets wint.change_telemetry which is the version for the non-KB database). The
      analytics version is for the knowledgebase DB.
    rationale: >-
      Per MANIFEST.md, the analytics.change_telemetry table is a fresh CREATE in the knowledgebase DB. The
      wint.change_telemetry definition in change-telemetry.ts targets a different DB deployment (main app DB, port
      5432). These are distinct tables in distinct databases.
    decided_by: auto
  - id: ARCH-004
    question: >-
      experimentStatusEnum: story says it needs to be created in analytics schema. wint.ts has
      pgEnum('experiment_status', ...) which creates it in public schema. How to handle?
    decision: >-
      Define experiment_status as analyticsSchema.enum('experiment_status', [...]) in analytics.ts — scoped to the
      analytics schema. This avoids conflict with any potential public-schema experiment_status enum.
    rationale: >-
      Pattern from telemetry.ts: wintSchema.enum() and telemetrySchema.enum() create enums scoped to their schema. The
      analytics schema-scoped enum is the correct approach per the story AC and avoids public schema pollution.
    decided_by: auto
  - id: ARCH-005
    question: >-
      story_token_usage cross-schema FK: MANIFEST.md notes analytics.story_token_usage.story_id ->
      public.stories.story_id. But stories.story_id is TEXT and not a FK target in the live DB (no unique constraint).
      Include or omit FK?
    decision: >-
      Omit cross-schema FK from story_token_usage in the migration. The FK is listed in the MANIFEST under CDTS-1010
      scope, but the FK-EDGE-MAP.md shows this FK does not currently exist and public.stories.story_id has no unique
      constraint. Adding a FK to a column without a unique constraint will fail. Defer FK to CDTS-1020 which handles FK
      additions.
    rationale: >-
      FK-EDGE-MAP.md section 'Tables With No FK Constraints (potentially missing)' lists story_token_usage.story_id as a
      MISSING FK. CDTS-1020 is the story that adds FKs. Adding this FK in CDTS-1010 before CDTS-1020 creates a story_id
      unique constraint would fail.
    decided_by: auto
complexity: moderate
notes:
  - >-
    The story ACs reference ALTER TABLE wint.* SET SCHEMA — these are WRONG per CDTS-0020 audit. wint schema never
    existed. Use CREATE TABLE analytics.* instead.
  - >-
    Migration number 0034 is used (not 0021 from prompt — 0021 already exists in the worktree as
    0021_wealthy_sunfire.sql).
  - >-
    story_token_usage moves from public schema via ALTER TABLE public.story_token_usage SET SCHEMA analytics — this
    table IS in the live DB (per MANIFEST.md).
  - >-
    change_telemetry in analytics.ts is exported as analyticsChangeTelemetry to avoid name collision with
    changeTelemetry from change-telemetry.ts.
  - >-
    experimentStatusEnum is scoped to analyticsSchema (analyticsSchema.enum) to follow the pattern from telemetry.ts /
    wint.ts schema-scoped enums.
  - >-
    The cross-schema FK analytics.story_token_usage.story_id -> public.stories.story_id is deferred to CDTS-1020 per
    ARCH-005 decision.
