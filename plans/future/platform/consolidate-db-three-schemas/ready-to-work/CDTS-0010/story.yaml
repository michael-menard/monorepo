id: CDTS-0010
title: Establish Migration Runner and Safety Preamble
status: backlog
priority: high
phase: 0
feature: "Create the migration infrastructure: schema_migrations tracking table in the knowledgebase DB, reusable safety preamble that asserts current_database() = 'knowledgebase', RUNNER.md documenting the canonical psql command, and a proof-of-concept migration (020_cdts_safety_preamble.sql)."
goal: "Migration runner strategy defined and proven with a real migration. Every future CDTS migration inherits the safety preamble pattern."
depends_on: []
endpoints: []
infrastructure: []
acceptance_criteria:
  # Migration tracking table
  - "Create schema_migrations table in knowledgebase DB: id SERIAL, filename TEXT UNIQUE, applied_at TIMESTAMPTZ DEFAULT now(), applied_by TEXT"
  - "Migration 020_cdts_safety_preamble.sql creates the schema_migrations table and inserts its own row as proof of concept"

  # Safety preamble
  - "Every CDTS migration must begin with: DO $$ BEGIN IF current_database() != 'knowledgebase' THEN RAISE EXCEPTION 'Wrong database: expected knowledgebase, got %', current_database(); END IF; END $$;"
  - "020_cdts_safety_preamble.sql includes this preamble and is verified against a wrong-database connection (should fail with clear error)"

  # Runner documentation
  - "Create RUNNER.md documenting canonical command: psql -h localhost -p 5433 -U kbuser -d knowledgebase -f migrations/NNN.sql"
  - "RUNNER.md includes: pre-flight checklist (verify port, verify database name, backup), execution steps, rollback procedure, post-flight verification queries"

  # Proof of concept
  - "020_cdts_safety_preamble.sql applied successfully to knowledgebase DB"
  - "schema_migrations table contains exactly one row for 020_cdts_safety_preamble.sql"
risk_notes: "Migration runner is manual psql — no CI/CD integration yet. Safety preamble only catches wrong database, not wrong host. Port 5433 must be explicitly verified by operator."
resolves_blockers:
  - "PLAT-001: No migration runner"
  - "PLAT-002: No safety guardrails"
sizing_warning: false
