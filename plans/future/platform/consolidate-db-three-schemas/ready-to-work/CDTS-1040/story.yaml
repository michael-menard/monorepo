id: CDTS-1040
title: Update MCP Tool SQL
status: backlog
priority: medium
phase: 1
feature: "Schema-qualify raw SQL in semantic.ts, keyword.ts, kb-get-related.ts with explicit public. prefix. Update list tools to query header tables only; get-by-id tools JOIN to detail tables. Add WHERE deleted_at IS NULL to all entity queries. Update analytics.story_token_usage references in token-operations.ts."
goal: "All MCP tool queries work correctly with the new schema layout. List queries are fast (header only), detail queries JOIN on demand, soft-deleted rows hidden by default."
depends_on:
  - CDTS-1030
endpoints: []
infrastructure: []
acceptance_criteria:
  # Schema qualification
  - "Raw SQL in semantic.ts uses FROM public.knowledge_entries (explicit schema prefix)"
  - "Raw SQL in keyword.ts uses FROM public.knowledge_entries (explicit schema prefix)"
  - "Raw SQL in kb-get-related.ts uses FROM public.knowledge_entries (explicit schema prefix)"

  # Header/detail split queries
  - "kb_list_stories, kb_list_plans, kb_get_next_story query header tables only (no JOIN to details)"
  - "kb_get_story JOINs stories + story_details; kb_get_plan JOINs plans + plan_details"
  - "List query response shape unchanged — no breaking API changes"

  # Soft-delete filtering
  - "All queries on plans, stories, tasks, knowledge_entries add WHERE deleted_at IS NULL"
  - "Admin/audit queries can optionally include soft-deleted rows (include_deleted parameter)"

  # Analytics schema references
  - "token-operations.ts references analytics.story_token_usage (Drizzle ORM handles schema qualification)"
  - "Analytics queries (kb_get_token_summary, kb_get_bottleneck_analysis, kb_get_churn_analysis) use analytics-schema tables"

  # Tests
  - "pnpm test:all passes"
  - "pnpm check-types passes"
risk_notes: "High query count — grep scope must cover all MCP src files including crud-operations/, search/, and mcp-server/. Drizzle ORM handles schema qualification for Drizzle queries automatically; only raw sql`` queries need manual prefixing."
resolves_blockers:
  - "ENG-003: Atomic deployment (code ready before migration)"
sizing_warning: false
