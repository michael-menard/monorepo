lessons_to_record:
  - lesson: >-
      When resolving merge conflicts between schema migration stories, columns added by the intersecting story
      (KFMB-1020) may need to remain in the header table even if the current story (CDTS-1030) intended to move them to
      a detail table. Document this duplication in evidence deviations rather than removing KFMB columns.
    category: pattern
    tags:
      - schema
      - merge-conflicts
      - drizzle
  - lesson: >-
      Self-referencing Drizzle FK (e.g., plans.parentPlanId → plans.id) requires inline type import syntax:
      .references((): import('drizzle-orm/pg-core').AnyPgColumn => table.col, { onDelete: 'restrict' }). Document this
      in the schema file as a reference pattern.
    category: pattern
    tags:
      - drizzle
      - schema
      - self-referencing-fk
  - lesson: >-
      Drizzle does not support CHECK constraints natively. When the DDL migration defines a CHECK constraint (e.g.,
      link_type enum values), the Drizzle schema must delegate that enforcement to the DB migration and document it
      clearly in the column comment.
    category: pattern
    tags:
      - drizzle
      - schema
      - check-constraints
      - postgres
  - lesson: >-
      Integration tests that require DB migration (CDTS-1020) will fail during QA of CDTS-1030 schema changes. The QA
      agent should not count these as blocking failures when the root cause is a pre-requisite migration story not yet
      applied to the test DB.
    category: blocker
    tags:
      - testing
      - integration-tests
      - schema-migration
      - qa
