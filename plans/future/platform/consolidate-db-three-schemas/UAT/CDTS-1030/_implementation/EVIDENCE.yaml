acceptance_criteria:
  - ac_id: AC1
    ac_text: Add planDetails table definition (1:1 with plans) matching CDTS-1020 DDL
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema.ts
        description: >-
          planDetails table exported with id (uuid PK), planId (uuid FK→plans.id RESTRICT, unique),
          rawContent (text notNull), phases (jsonb), dependencies (jsonb string[]), sourceFile (text),
          contentHash (text), kbEntryId (uuid FK→knowledgeEntries.id set null), importedAt (timestamp notNull defaultNow),
          archivedAt (timestamp), updatedAt (timestamp notNull defaultNow).
          Indexes: idx_plan_details_plan_id, idx_plan_details_content_hash.

  - ac_id: AC2
    ac_text: Add storyDetails table definition (1:1 with stories) matching CDTS-1020 DDL
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema.ts
        description: >-
          storyDetails table exported with id (uuid PK), storyId (text FK→stories.storyId RESTRICT, unique),
          storyDir (text), storyFile (text default story.yaml), blockedReason (text), blockedByStory (text),
          touchesBackend (boolean default false), touchesFrontend (boolean default false),
          touchesDatabase (boolean default false), touchesInfra (boolean default false),
          startedAt (timestamp), completedAt (timestamp), fileSyncedAt (timestamp), fileHash (text),
          updatedAt (timestamp notNull defaultNow).
          Index: idx_story_details_story_id.

  - ac_id: AC3
    ac_text: Add planDependencies table definition matching CDTS-1020 DDL
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema.ts
        description: >-
          planDependencies table exported with id (uuid PK), planSlug (text FK→plans.planSlug RESTRICT),
          dependsOnSlug (text FK→plans.planSlug RESTRICT), satisfied (boolean default false),
          createdAt (timestamp notNull defaultNow).
          Unique index on (planSlug, dependsOnSlug). Additional indexes on each FK column.

  - ac_id: AC4
    ac_text: Add storyKnowledgeLinks table with link_type CHECK enum and confidence score
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema.ts
        description: >-
          storyKnowledgeLinks table exported with id (uuid PK), storyId (text FK→stories.storyId RESTRICT),
          kbEntryId (uuid FK→knowledgeEntries.id RESTRICT), linkType (text notNull), confidence (real default 1.0),
          createdBy (text), createdAt (timestamp notNull defaultNow).
          Unique index on (storyId, kbEntryId, linkType). Indexes on storyId and kbEntryId.
          NOTE: CHECK constraint on link_type (produced_lesson, applied_constraint, referenced_decision,
          similar_pattern, blocked_by) enforced at DB level by CDTS-1020 migration; Drizzle does not support
          CHECK constraints natively.

  - ac_id: AC5
    ac_text: Remove migrated columns from plans and stories table definitions
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema.ts
        description: >-
          plans table no longer has rawContent, phases, dependencies, sourceFile, contentHash, kbEntryId,
          importedAt, archivedAt columns.
          stories table no longer has storyDir, storyFile, blockedReason, blockedByStory,
          touchesBackend, touchesFrontend, touchesDatabase, touchesInfra, startedAt, completedAt,
          fileSyncedAt, fileHash columns.
          Call sites updated in plan-operations.ts, story-crud-operations.ts, migrate-plans-to-kb.ts,
          seed-kb-first-stories.ts, seed-kb-stories.ts.
      - type: command
        command: pnpm --filter @repo/knowledge-base check-types
        result: SUCCESS
        description: Zero TypeScript errors after removing columns and updating all call sites.

  - ac_id: AC6
    ac_text: Add deleted_at and deleted_by columns to plans, stories, tasks, knowledge_entries
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema.ts
        description: >-
          deletedAt (timestamp withTimezone) and deletedBy (text) columns added to:
          knowledgeEntries, tasks, stories, plans tables.

  - ac_id: AC7
    ac_text: All new FK .references() calls use onDelete restrict
    status: PASS
    evidence_items:
      - type: file
        path: apps/api/knowledge-base/src/db/schema.ts
        description: >-
          All new FK references use { onDelete: 'restrict' }:
          plans.parentPlanId → plans.id (self-ref inline import syntax),
          planDetails.planId → plans.id, planDetails.kbEntryId → knowledgeEntries.id (set null),
          storyDetails.storyId → stories.storyId,
          planDependencies.planSlug → plans.planSlug, planDependencies.dependsOnSlug → plans.planSlug,
          storyKnowledgeLinks.storyId → stories.storyId, storyKnowledgeLinks.kbEntryId → knowledgeEntries.id,
          planStoryLinks.planSlug → plans.planSlug, planStoryLinks.storyId → stories.storyId,
          storyDependencies.storyId → stories.storyId, storyDependencies.targetStoryId → stories.storyId,
          storyArtifacts.storyId → stories.storyId,
          workState.storyId → stories.storyId (unique), workStateHistory.storyId → stories.storyId.

  - ac_id: AC8
    ac_text: analyticsSchema tables (if CDTS-1010 merged) compile alongside new tables
    status: PARTIAL
    evidence_items:
      - type: command
        command: pnpm --filter @repo/knowledge-base check-types
        result: SUCCESS
        description: >-
          CDTS-1010 (analytics schema) is in needs-code-review and not yet merged to main.
          Check-types passes for current codebase state. AC is aspirational pending CDTS-1010 merge.

  - ac_id: AC9
    ac_text: pnpm check-types passes with zero errors
    status: PASS
    evidence_items:
      - type: command
        command: pnpm --filter @repo/knowledge-base check-types
        result: SUCCESS
        description: tsc --noEmit exits with 0 errors after all schema and call-site changes.

