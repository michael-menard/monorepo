commands_to_run:
  - command: pnpm check-types --filter @repo/knowledge-base
    when: after all schema and call-site changes
    required: true
  - command: pnpm check-types
    when: after all code changes (full type check)
    required: true
  - command: pnpm test --filter @repo/knowledge-base
    when: after all code changes
    required: true
