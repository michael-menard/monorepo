    evidence_type: command
architectural_decisions:
  - id: ARCH-001
    question: >-
      Where to define planDetails/storyDetails/planDependencies/storyKnowledgeLinks — in schema.ts alongside existing
      tables or in separate files?
    decision: >-
      Define in apps/api/knowledge-base/src/db/schema.ts alongside existing tables, consistent with current pattern
      where all public schema tables are co-located in schema.ts
    rationale: >-
      All public schema tables currently live in schema.ts; splitting into separate files would require updating all
      imports and create a file boundary inconsistency. The setup agent's SCOPE.yaml pointing to
      packages/backend/database-schema was wrong — actual target is the knowledge-base schema.ts.
    decided_by: auto
  - id: ARCH-002
    question: How to handle removed columns from plans and stories — should call sites be updated in this story or a follow-up?
    decision: >-
      Update call sites in this story. The AC requires 'pnpm check-types passes with zero errors' which means all
      TypeScript references to moved columns must be updated.
    rationale: >-
      Type safety cannot be deferred. If columns are removed from the schema, TypeScript will fail at compilation until
      all references are updated.
    decided_by: auto
complexity: complex
notes:
  - >-
    SCOPE.yaml glob 'packages/backend/database-schema/**' is incorrect — actual target is
    apps/api/knowledge-base/src/db/schema.ts; all public schema tables (plans, stories, tasks, knowledge_entries) live
    there
  - >-
    CDTS-1010 (analytics schema) is in needs-code-review and not yet merged — AC8 about analyticsSchema compilation is
    aspirational but check-types will pass if it's not yet in the codebase
  - >-
    The plans table has parentPlanId as uuid('parent_plan_id') with no .references() call currently — need to add {
    onDelete: 'restrict' } reference
  - >-
    storyTokenUsage.story_id -> stories.story_id FK cannot be added in Drizzle if storyTokenUsage will move to analytics
    schema in CDTS-1010 — defer that FK to CDTS-1050
  - >-
    planStoryLinks currently has no FK constraints in Drizzle — add FK references for planSlug->plans.planSlug and
    storyId->stories.storyId
  - link_type on storyKnowledgeLinks uses CHECK constraint (not pgEnum) per CDTS-1020 DDL spec
  - >-
    Self-referencing FK on plans.parentPlanId requires table be defined before referencing itself — use sql callback
    syntax for self-ref in Drizzle
