    planned_evidence: >-
      planDetails table exported from schema.ts with id, planId FK->plans.id RESTRICT, rawContent, phases, dependencies,
      sourceFile, contentHash, kbEntryId FK, importedAt, archivedAt, updatedAt
    evidence_type: file
  - ac_id: AC2
    planned_evidence: >-
      storyDetails table exported from schema.ts with id, storyId FK->stories.story_id RESTRICT, storyDir, storyFile,
      blockedReason, blockedByStory, touchesBackend, touchesFrontend, touchesDatabase, touchesInfra, startedAt,
      completedAt, fileSyncedAt, fileHash, updatedAt
    evidence_type: file
  - ac_id: AC3
    planned_evidence: planDependencies table with plan_slug->plans.plan_slug RESTRICT and depends_on_slug->plans.plan_slug RESTRICT
    evidence_type: file
  - ac_id: AC4
    planned_evidence: >-
      storyKnowledgeLinks table with link_type CHECK (produced_lesson, applied_constraint, referenced_decision,
      similar_pattern, blocked_by), confidence REAL DEFAULT 1.0, FK to stories.story_id RESTRICT, FK to
      knowledgeEntries.id RESTRICT, UNIQUE(story_id, kb_entry_id, link_type)
