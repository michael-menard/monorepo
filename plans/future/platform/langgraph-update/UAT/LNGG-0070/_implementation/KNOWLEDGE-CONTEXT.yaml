schema: 1
story_id: "LNGG-0070"
timestamp: "2026-02-15T00:00:00Z"

patterns_to_follow:
  - name: "Vitest integration test pattern"
    source: "packages/backend/orchestrator/src/adapters/__tests__/story-file-adapter.integration.test.ts"
    description: "Integration tests use fs.mkdtemp() for temp directories, clean up in afterEach hooks, mock @repo/logger, and test real file operations. Use describe blocks for scenario grouping."

  - name: "Temp directory pattern"
    source: "packages/backend/orchestrator/src/adapters/__tests__/story-file-adapter.integration.test.ts"
    description: "Use fs.mkdtemp(path.join(os.tmpdir(), 'test-name-')) in beforeEach, store in local variable, clean up with fs.rm(tempDir, { recursive: true, force: true }) in afterEach."

  - name: "Real file testing pattern"
    source: "packages/backend/orchestrator/src/adapters/__tests__/index-adapter.integration.test.ts"
    description: "Integration tests can use real story files from plans/ directories. Use absolute paths with path.join(__dirname, '../../..') to navigate to monorepo root."

  - name: "Logger mocking pattern"
    source: "All existing adapter tests"
    description: "Always mock @repo/logger in tests with vi.mock('@repo/logger'). Use vi.clearAllMocks() in beforeEach to prevent test pollution."

  - name: "Performance measurement pattern"
    source: "Node.js performance API"
    description: "Use performance.now() for high-resolution timing. Sample 50-100 operations, store results in array, sort, calculate percentiles (p50 = median, p95 = 95th percentile, p99 = 99th percentile)."

  - name: "Zod-first type definitions"
    source: "packages/backend/orchestrator/src/artifacts/*.ts"
    description: "All types must be defined using Zod schemas with z.infer<> for TypeScript types. Never use TypeScript interfaces without Zod schemas."

  - name: "ESM module pattern"
    source: "packages/backend/orchestrator/package.json"
    description: "Package uses 'type: module' in package.json. All imports must use .js extensions. Use import/export syntax, not CommonJS require."

  - name: "@repo/logger usage"
    source: "CLAUDE.md"
    description: "Always use @repo/logger, never console.log. Import with: import { logger } from '@repo/logger'. Use logger.info, logger.warn, logger.error."

  - name: "Test fixture reuse"
    source: "packages/backend/orchestrator/src/adapters/__tests__/__fixtures__/"
    description: "Reuse existing fixtures from __fixtures__/ (checkpoint files) and fixtures/ (story files, stage-test-epic). 60% reuse expected per story goals."

  - name: "Backward compatibility testing"
    source: "packages/backend/orchestrator/src/adapters/__tests__/story-file-adapter.integration.test.ts"
    description: "Test both legacy format (status, epic, acceptance_criteria) and v2 format (state, feature, acs). Use passthrough() in schemas to allow unknown fields."

  - name: "Error path coverage"
    source: "All adapter unit tests"
    description: "Test at least one error scenario per adapter: file not found, invalid YAML, schema validation failure, file permission errors. Ensures branch coverage >80%."

constraints:
  - "All imports must use .js extension for ESM compatibility"
  - "No console.log - use @repo/logger exclusively"
  - "No TypeScript interfaces without Zod schemas - use z.infer<typeof Schema>"
  - "Integration tests must use temp directories and clean up in afterEach"
  - "Code coverage target: >80% line and branch coverage (AC-7)"
  - "Performance targets are advisory only - log environment details with results"
  - "Quality comparison uses 5-point checklist, not subjective evaluation"
  - "KB Writer tests use deferred mode only (no real KB instance required)"
  - "Test files go in packages/backend/orchestrator/src/adapters/__tests__/integration/"
  - "Each AC maps to one test file for modularity"

risks:
  - id: 1
    description: "Test pollution from shared state across integration tests"
    mitigation: "Use temp directories per test with fs.mkdtemp(). Clean up in afterEach. Reset all mocks with vi.clearAllMocks(). Use isolated temp paths to prevent conflicts."

  - id: 2
    description: "Performance measurement variability across environments"
    mitigation: "Performance benchmarks are advisory only. Document measurement environment (CPU, OS, Node version, file system) in test setup. Log environment details to EVIDENCE.yaml alongside results. Do not fail tests on performance targets."

  - id: 3
    description: "Adapter API changes during LNGG-0060 (Checkpoint) Ready-for-QA phase"
    mitigation: "LNGG-0060 is in Ready-for-QA, API is stable. Review adapter interfaces before starting implementation to catch any changes."

  - id: 4
    description: "Flaky tests due to timing issues in performance benchmarks"
    mitigation: "Use large sample sizes (50-100 operations). Do not rely on exact timing values. Use percentiles (p95, p99) which are more stable than raw measurements."

  - id: 5
    description: "Quality comparison subjectivity (AC-8)"
    mitigation: "Use concrete 5-point checklist: (1) All YAML fields present, (2) No Zod errors, (3) Structure matches template, (4) Checkpoint files valid, (5) Index metrics accurate. Compare 3 samples against Claude Code baseline."

  - id: 6
    description: "Missing KB instance for AC-4 KB Writer integration tests"
    mitigation: "AC-4 tests deferred write mode only (writes to DEFERRED-KB-WRITES.yaml). No real KB instance required. Real KB integration tests deferred to LNGG-0073."

  - id: 7
    description: "8 ACs may exceed 8-hour estimate"
    mitigation: "Contingency plan: defer AC-6 (Performance Benchmarks) and AC-8 (Quality Comparison) to follow-up story LNGG-0071 if work exceeds 6 hours."

lessons_learned:
  - story_id: "LNGG-0010"
    lesson: "Backward compatibility is critical - test both legacy and v2 story formats to prevent schema regression"
    category: "pattern"
    applies_because: "AC-5 requires real story file compatibility testing"

  - story_id: "LNGG-0020"
    lesson: "Integration tests with real files catch schema mismatches that unit tests miss"
    category: "pattern"
    applies_because: "All 6 ACs involve multi-adapter integration scenarios"

  - story_id: "LNGG-0030"
    lesson: "Atomic write pattern (temp + rename) prevents file corruption on error"
    category: "pattern"
    applies_because: "Integration tests will exercise file write operations under error conditions"

  - story_id: "LNGG-0040"
    lesson: "Separate unit tests (functionality) from integration tests (workflow scenarios)"
    category: "pattern"
    applies_because: "This story focuses on integration tests validating adapter combinations"

  - story_id: "LNGG-0050"
    lesson: "Always use absolute paths and temp directories for test isolation"
    category: "blocker"
    applies_because: "All integration tests require file system isolation to prevent test pollution"

  - story_id: "LNGG-0060"
    lesson: "Clean up all temp files in afterEach hooks to prevent disk space issues in CI"
    category: "blocker"
    applies_because: "Integration tests create many temp directories and files"

blockers_to_avoid:
  - "Hardcoded file paths - use path.join and temp directories"
  - "Skipping cleanup in afterEach - causes test pollution and disk space issues"
  - "Manual YAML parsing - use gray-matter or js-yaml"
  - "console.log debugging - use @repo/logger"
  - "Shared test state - isolate with beforeEach/afterEach"

architectural_decisions:
  - id: "ADR-005"
    title: "Testing Strategy - UAT Must Use Real Services"
    status: "active"
    constraint: "Integration tests should use real adapter implementations, not mocks. Unit tests can use partial mocks."
    applies_to: ["testing", "backend"]

