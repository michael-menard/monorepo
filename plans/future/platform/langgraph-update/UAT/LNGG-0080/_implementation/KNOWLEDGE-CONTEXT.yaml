# Knowledge context for LNGG-0080: Workflow Command Integration
# Findings from codebase analysis for adapter integration patterns

codebase_findings:
  node_patterns:
    - finding: "doc-sync.ts provides excellent node wrapper pattern"
      location: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
      pattern: |
        1. Create Zod schemas for config and result
        2. Create node implementation function (async)
        3. Use createToolNode() factory for file I/O operations
        4. Return Partial<GraphState> with updateState() helper
        5. Handle errors with try/catch, return error state
      relevance: "Template for all 6 adapter wrapper nodes"

    - finding: "Node factory provides 3 presets: createNode, createLLMNode, createToolNode"
      location: "packages/backend/orchestrator/src/runner/node-factory.ts"
      pattern: |
        - createToolNode: Lower retries (2x), shorter timeout (10s), for file I/O
        - createLLMNode: Higher retries (5x), longer timeout (60s), for LLM calls
        - createSimpleNode: No retry (1x), for validation
      relevance: "Use createToolNode for all adapter nodes (file operations)"

    - finding: "State helpers provide immutable update patterns"
      location: "packages/backend/orchestrator/src/runner/state-helpers.ts"
      pattern: |
        - updateState(): Creates partial state updates
        - createErrorUpdate(): Handles error state
        - createBlockedUpdate(): Handles retry exhaustion
      relevance: "Use updateState() for all node return values"

  adapter_patterns:
    - finding: "All adapters use Zod-first type definitions"
      location: "packages/backend/orchestrator/src/adapters/"
      pattern: |
        - Schema defined with z.object()
        - Type inferred with z.infer<>
        - Validation with .parse() or .safeParse()
        - No TypeScript interfaces allowed
      relevance: "All node state schemas must use Zod"

    - finding: "StoryFileAdapter provides atomic file operations"
      location: "packages/backend/orchestrator/src/adapters/story-file-adapter.ts"
      methods: |
        - read(filePath): Promise<StoryArtifact>
        - write(filePath, story): Promise<void>
        - update(filePath, partial): Promise<void>
        - exists(filePath): Promise<boolean>
        - readBatch(paths[]): Promise<BatchReadResult>
      errors: "StoryNotFoundError, InvalidYAMLError, ValidationError, WriteError"
      relevance: "Direct wrapping in story-file-node.ts"

    - finding: "IndexAdapter provides index management"
      location: "packages/backend/orchestrator/src/adapters/index-adapter.ts"
      methods: |
        - readIndex(filePath): Promise<IndexStructure>
        - updateStoryStatus(storyId, status, indexPath): Promise<void>
        - addStory(entry, indexPath): Promise<void>
        - removeStory(storyId, indexPath): Promise<void>
        - validate(index): ValidationResult
      errors: "InvalidIndexError, CircularDependencyError, DuplicateStoryIdError"
      relevance: "Direct wrapping in index-node.ts"

    - finding: "StageMovementAdapter uses flat directory structure"
      location: "packages/backend/orchestrator/src/adapters/stage-movement-adapter.ts"
      methods: |
        - moveStage(request): Promise<MoveStageResult>
        - batchMoveStage(request): Promise<BatchMoveStageResult>
      pattern: "Updates status field in YAML frontmatter (legacy format)"
      errors: "InvalidStageError, InvalidTransitionError, StoryNotFoundError"
      relevance: "Direct wrapping in stage-movement-node.ts"

    - finding: "CheckpointAdapter supports phase tracking"
      location: "packages/backend/orchestrator/src/adapters/checkpoint-adapter.ts"
      methods: |
        - read(filePath): Promise<Checkpoint>
        - write(filePath, checkpoint): Promise<void>
        - update(filePath, partial): Promise<void>
        - advancePhase(filePath, from, to): Promise<void>
      backward_compatibility: "Converts numeric phase to string with warning"
      relevance: "Direct wrapping in checkpoint-node.ts"

    - finding: "DecisionCallback system has 3 implementations"
      location: "packages/backend/orchestrator/src/adapters/decision-callbacks/"
      implementations: |
        - CLIDecisionCallback: Interactive inquirer prompts
        - AutoDecisionCallback: Rule-based auto-decisions
        - NoopDecisionCallback: Testing mode
      pattern: "Registry pattern for callback selection"
      relevance: "Node should use registry for callback selection"

    - finding: "KBWriterAdapter is non-blocking"
      location: "packages/backend/orchestrator/src/adapters/kb-writer/"
      methods: |
        - writeLesson(request): Promise<KbWriteResult>
        - writeDecision(request): Promise<KbWriteResult>
        - writeConstraint(request): Promise<KbWriteResult>
        - batchWrite(requests[]): Promise<KbBatchWriteResult>
      behavior: "Failures logged but don't block workflow"
      relevance: "Node must handle KB unavailable gracefully"

  test_patterns:
    - finding: "Integration tests use real temp directories"
      location: "packages/backend/orchestrator/src/adapters/__tests__/"
      pattern: |
        - beforeEach: fs.mkdtemp() for temp directory
        - afterEach: fs.rm(tempDir, { recursive: true })
        - Real file operations with absolute paths
        - Vitest with async/await
      coverage: "90%+ target per file"
      relevance: "Reuse for node integration tests"

    - finding: "Test fixtures in __tests__/fixtures/"
      location: "packages/backend/orchestrator/src/adapters/__tests__/fixtures/"
      fixtures: |
        - minimal-story.yaml
        - full-story.yaml
        - minimal-index.md
        - valid-checkpoint.yaml
      relevance: "60% reuse target from LNGG-0070"

    - finding: "Mock pattern for logger and subprocess"
      location: "packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts"
      pattern: |
        - vi.mock('@repo/logger')
        - vi.mock('node:fs/promises')
        - vi.mock('node:child_process')
      relevance: "Use for node unit tests"

  graph_patterns:
    - finding: "Story creation graph uses StateGraph from @langchain/langgraph"
      location: "packages/backend/orchestrator/src/graphs/story-creation.ts"
      pattern: |
        - Annotation.Root() for state definition
        - StateGraph(stateAnnotation) for graph creation
        - addNode(name, nodeFunction) for nodes
        - addEdge(from, to) for edges
        - addConditionalEdges(from, condition, mapping) for routing
      relevance: "Pattern for integrating adapter nodes into graphs"

    - finding: "Graphs compose multiple nodes sequentially"
      example: "load_baseline → retrieve_context → seed → fanout → attack → synthesis"
      relevance: "Adapter nodes will be composed similarly"

relevant_lessons:
  - id: "LNGG-0070-L1"
    lesson: "Real file testing catches edge cases mocks miss"
    application: "Use temp directories for integration tests"

  - id: "LNGG-0070-L2"
    lesson: "Atomic operations require temp file + rename pattern"
    application: "Adapters already implement this, nodes should not re-implement"

  - id: "LNGG-0070-L3"
    lesson: "Backward compatibility requires schema flexibility"
    application: "Nodes inherit backward compat from adapters"

  - id: "WRKF-NODE-L1"
    lesson: "Node factory provides infrastructure (retry, circuit breaker, logging)"
    application: "Use createToolNode for all adapter nodes"

  - id: "WRKF-NODE-L2"
    lesson: "Nodes return Partial<GraphState>, not full state"
    application: "Use updateState() helper for all returns"

relevant_adrs:
  - id: "ADR-ZODS-001"
    decision: "Zod-first type definitions required (no TypeScript interfaces)"
    impact: "All node state schemas must use z.object() + z.infer<>"

  - id: "ADR-ESMS-001"
    decision: "ESM modules with .js extensions in imports"
    impact: "All imports must use .js extension"

  - id: "ADR-LOGS-001"
    decision: "@repo/logger required (never console.log)"
    impact: "All nodes must use logger from @repo/logger"

  - id: "ADR-ATOM-001"
    decision: "Atomic writes use temp file + rename pattern"
    impact: "Adapters handle this, nodes delegate to adapters"

architectural_constraints:
  - constraint: "Do not modify existing adapters (LNGG-001 through LNGG-006 are complete)"
    rationale: "Adapters are tested and validated (96.5% coverage, 48/48 tests passing)"

  - constraint: "Node wrappers are thin delegation layers"
    rationale: "Business logic stays in adapters, nodes handle state flow only"

  - constraint: "Command files are documentation, not executable code"
    rationale: "AC-11 clarifies: update docs only, not markdown file code"

  - constraint: "Performance targets from LNGG-0070 are advisory, not hard requirements"
    rationale: "Test failures do not block story completion"

integration_notes:
  - note: "Nodes integrate adapters into LangGraph graphs, not command files"
    clarification: |
      Command files (.claude/commands/*.md) document how to use workflows.
      LangGraph graphs (src/graphs/*.ts) are the executable code.
      Nodes (src/nodes/workflow/*.ts) are invoked by graphs, not commands.

  - note: "Decision callbacks enable autonomous mode"
    clarification: |
      CLI mode: CLIDecisionCallback prompts user
      Auto mode: AutoDecisionCallback uses rules
      Test mode: NoopDecisionCallback (no-op)

  - note: "KB writer failures are non-blocking"
    clarification: |
      KB unavailable → log to DEFERRED-KB-WRITES.yaml
      Workflow continues regardless of KB status
      Manual retry for deferred entries

