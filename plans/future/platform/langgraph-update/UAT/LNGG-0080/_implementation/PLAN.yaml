architectural_decisions:
  - id: ARCH-001
    question: "Should nodes use createToolNode or createLLMNode factory?"
    decision: "Use createToolNode for all adapter nodes"
    rationale: |
      Adapter nodes perform file I/O operations (not LLM calls).
      createToolNode provides:
      - Lower retries (2x) appropriate for file operations
      - Shorter timeout (10s) appropriate for local file I/O
      - Circuit breaker for repeated failures
      Pattern matches doc-sync.ts (existing workflow node).
    decided_by: autonomous

  - id: ARCH-002
    question: "Should nodes re-implement adapter logic or delegate to adapters?"
    decision: "Nodes delegate to adapters (thin wrapper pattern)"
    rationale: |
      Adapters are fully tested (96.5% coverage, 48/48 tests passing).
      Nodes should not duplicate business logic.
      Nodes handle state flow only (Partial<GraphState> in/out).
      This follows Single Responsibility Principle.
    decided_by: autonomous

  - id: ARCH-003
    question: "Should nodes use mocked adapters or real adapters in tests?"
    decision: "Unit tests: mocked adapters. Integration tests: real adapters."
    rationale: |
      Unit tests validate node behavior in isolation (90%+ coverage target).
      Integration tests validate end-to-end flow with real file I/O (70%+ coverage target).
      Pattern matches LNGG-0070 test strategy.
    decided_by: autonomous

  - id: ARCH-004
    question: "Should command files (.claude/commands/*.md) be modified as code or documentation?"
    decision: "Documentation-only changes (AC-11 clarification)"
    rationale: |
      Commands are markdown documentation, not executable TypeScript.
      LangGraph graphs (src/graphs/*.ts) are the executable code.
      Nodes are invoked by graphs, not by command files.
      AC-11 added to clarify this scope ambiguity.
    decided_by: autonomous

  - id: ARCH-005
    question: "Should performance tests block story completion on failure?"
    decision: "Performance tests are advisory benchmarks (non-blocking)"
    rationale: |
      Performance targets from LNGG-0070 are guidelines, not hard requirements.
      Test failures logged for regression tracking but don't block QA.
      Story focuses on integration, not performance optimization.
    decided_by: autonomous

complexity: complex

