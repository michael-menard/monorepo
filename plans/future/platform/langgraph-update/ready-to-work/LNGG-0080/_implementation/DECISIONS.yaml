implementation_notes_added:
  - section: "Architecture Notes"
    subsection: "Error Handling in Graphs"
    content: |
      **Error Propagation Pattern:**
      Node errors should route through LangGraph conditional edges based on state.error field:

      ```typescript
      const graph = new StateGraph(WorkflowState)
        .addNode('operation', operationNode)
        .addNode('error_handler', errorHandlerNode)
        .addConditionalEdges('operation', (state) => {
          return state.error ? 'error_handler' : END
        })
      ```

  - section: "Test Plan"
    subsection: "Integration Tests - Scenario 5"
    content: |
      **Checkpoint Resume Test Scope:**
      Integration test focuses on **cross-phase resume** (e.g., resuming from Phase 1 into Phase 2)
      while unit tests focus on **atomic checkpoint operations** (read/write/validate).
      This avoids duplicate testing effort between unit and integration tests.

  - section: "Architecture Notes"
    subsection: "KB Writer Failure Strategy"
    content: |
      **KB Write Failure Handling:**
      KB write failures are logged to DEFERRED-KB-WRITES.yaml for manual retry.
      No automatic retry to avoid blocking workflows. Non-blocking operation ensures
      workflow continues even if KB is unavailable.

  - section: "Test Plan"
    subsection: "Performance Tests"
    content: |
      **Performance Test Blocking Behavior:**
      Performance tests are advisory benchmarks. Test failures do not block story completion
      but should be logged for performance regression tracking. Targets from LNGG-0070 apply
      as guidelines, not hard requirements.

  - section: "Architecture Notes"
    subsection: "Node Testing Strategy"
    content: |
      **Integration vs Unit Testing:**
      Nodes should be tested within graph context in integration tests to avoid duplicate
      testing effort. Unit tests validate individual node behavior with mocked adapters.
      Integration tests validate nodes work correctly when composed in LangGraph graphs.
