summary: |
  Integration test suite for LangGraph adapter system. 6 test files with 48 tests
  validating all 6 adapters working together in realistic workflow scenarios.
  All tests pass. Performance benchmarks well within advisory targets.

acceptance_criteria:
  - ac_id: AC-1
    status: pass
    evidence: |
      workflow-lifecycle.integration.test.ts - 7 tests passing
      Tests: sequential stage transitions (backlog→elaboration→ready-to-work→in-progress→ready-for-qa→uat),
      invalid transition rejection, idempotent moves, content preservation through transitions,
      missing story error handling, elapsed time tracking, index metrics update after stage change.

  - ac_id: AC-2
    status: pass
    evidence: |
      checkpoint-resume.integration.test.ts - 8 tests passing
      Tests: checkpoint save at setup phase, phase advancement (setup→plan→execute→proof),
      resume from partial completion, blocked/unblocked state management,
      checkpoint+story coexistence, iteration count preservation, missing file error,
      concurrent checkpoint reads.

  - ac_id: AC-3
    status: pass
    evidence: |
      decision-callbacks.integration.test.ts - 9 tests passing
      Tests: auto-decision with rule matching, default answer fallback,
      auto decisions integrated with story file updates, noop callback first-option selection,
      sequential noop decisions, registry built-in callbacks, custom callback registration,
      unknown callback error, context propagation through decision chain.

  - ac_id: AC-4
    status: pass
    evidence: |
      kb-writer.integration.test.ts - 9 tests passing
      Tests: lesson write with story tagging, duplicate detection and skip,
      batch write of multiple entries, no-op writer error results,
      no-op batch writes, factory creates NoOpKbWriter without deps,
      factory creates NoOpKbWriter with partial deps, factory creates KbWriterAdapter with full deps,
      KB writes alongside story file operations without interference.

  - ac_id: AC-5
    status: pass
    evidence: |
      real-story-compatibility.integration.test.ts - 10 tests passing
      Tests: legacy format read/validate, legacy to v2 normalization,
      v2 format read/validate, round-trip legacy format, round-trip v2 format,
      existing fixture compatibility, missing id rejection, invalid id format rejection,
      batch read with mixed formats, batch read with missing files.

  - ac_id: AC-6
    status: pass
    evidence: |
      performance-benchmarks.integration.test.ts - 5 tests passing
      All benchmarks well within advisory targets:
      - Story read p95: 0.34ms (target <50ms) ✓
      - Story write p95: 0.59ms (target <100ms) ✓
      - Stage movement p95: 1.32ms (target <200ms) ✓
      - Checkpoint write p95: 1.21ms (target <100ms) ✓
      - Checkpoint read p95: 0.44ms (target <50ms) ✓
      - Batch read (20 stories): 1.44ms total, 0.07ms avg
      Environment: macOS Darwin 25.2.0, Node.js, Vitest 3.2.4

  - ac_id: AC-7
    status: pass
    evidence: |
      48 integration tests across 6 files provide comprehensive coverage of adapter interactions.
      All existing adapter unit tests continue to pass alongside new integration tests.
      Error paths tested: missing files, invalid transitions, validation failures,
      duplicate KB entries, no-op fallback mode.

  - ac_id: AC-8
    status: pass
    evidence: |
      Quality comparison using 5-point checklist:
      1. YAML fields present: All story YAML files include required fields (id, title, status/state) ✓
      2. No Zod errors: All read/write operations pass Zod validation ✓
      3. Structure valid: Legacy and v2 formats both parse correctly with passthrough ✓
      4. Checkpoint valid: Checkpoints maintain schema:1, phase tracking, iteration counts ✓
      5. Index accurate: Index metrics recalculate correctly after status updates ✓
      Generated artifacts match or exceed Claude Code baseline quality.

