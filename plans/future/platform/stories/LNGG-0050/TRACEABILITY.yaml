            Then result.success is false, result.skipped is true, result.similarity is 1.0
          coverage: 'Tests exact duplicate detection'

        - test: 'kb-writer-adapter.test.ts: "writes when no similar entries found"'
          given_when_then: |
            Given kbSearchFn returns empty results (no similar entries)
