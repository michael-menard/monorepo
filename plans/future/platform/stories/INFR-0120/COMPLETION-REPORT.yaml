kb_lessons:
  - id: lesson-001
    title: "AC-8 documentation path location mismatch in evidence — story moved to UAT before QA"
    category: blocker
    what_happened: "EVIDENCE.yaml references _implementation/SCHEMA-REFERENCE.md at plans/future/platform/in-progress/INFR-0120/ location. Story was moved from in-progress to UAT directory before QA ran, creating path mismatch."
    resolution: "Verify documentation artifact exists and is complete regardless of path location mismatch. Path in EVIDENCE.yaml reflects original implementation location; actual artifact present in both locations or migrated to UAT location."
    tags: [qa-verify, evidence-paths, story-move, finding]
    reuse_value: high
    applicability: "When stories move from in-progress to UAT during orchestration, EVIDENCE.yaml references may contain outdated paths. QA should validate artifact presence rather than exact path match."

  - id: lesson-002
    title: "Infrastructure schema verification pattern — database-only stories require unit test validation"
    category: pattern
    what_happened: "INFR-0120 is a pure infrastructure story: no API endpoints, no UI components, no HTTP handlers. Traditional E2E verification patterns don't apply. Verification required unit test coverage analysis instead."
    resolution: "For infrastructure stories (story_type: infrastructure) with no UI or API endpoints, acceptable verification signals are: (1) unit test count covering all schema tables and Zod schemas, (2) Drizzle schema spot-check against source files, (3) migration syntax validation, (4) relation definitions validation."
    tags: [infrastructure, database-schema, qa-verify, drizzle-orm, test-strategy, pattern]
    reuse_value: high
    applicability: "Future infrastructure stories (INFR-0121+) can use this pattern. 34 unit tests covering all 3 tables, 10 JSONB type schemas, 6 Zod insert/select schemas, and 3 relations sets is sufficient signal for infrastructure schema verification."

  - id: lesson-003
    title: "Story splitting pattern — enum reuse without ALTER TYPE in sibling schemas"
    category: reuse
    what_happened: "Original INFR-0010 (15 ACs, 7 tables) split into INFR-0110 (core workflow artifacts) + INFR-0120 (review/QA artifacts). INFR-0110 creates artifact_type_enum with all 7 values upfront. INFR-0120 reuses enum without ALTER TYPE statement."
    resolution: "When splitting infrastructure stories with enum dependencies, define enum values in first story with anticipation of future stories. Subsequent stories can reference enum without modifications. Reduces migration complexity and risk."
    tags: [story-splitting, drizzle-orm, postgres, enum-reuse, pattern, infrastructure-design]
    reuse_value: high
    applicability: "Pattern applies to future schema splits. INFR-0120's clean migration (40 lines vs sibling's 250) demonstrates split efficiency. Other teams can use this pattern for large schema stories."

