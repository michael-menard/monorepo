### Adapter Class Signature
```typescript
import { z } from 'zod'
import { StoryArtifactSchema, type StoryArtifact } from '../artifacts/story.js'

export class StoryFileAdapter {
  constructor(private monorepoRoot: string) {}

  async read(relativePath: string): Promise<StoryArtifact>
  async write(relativePath: string, artifact: StoryArtifact): Promise<void>
  async update(relativePath: string, updates: Partial<StoryArtifact>): Promise<void>
  async readBatch(relativePaths: string[]): Promise<StoryArtifact[]>
  async exists(relativePath: string): Promise<boolean>
}
```

### Error Classes
```typescript
// Custom error hierarchy for adapter errors
class StoryNotFoundError extends Error {
  code: 'ENOENT'
  filePath: string
}

class InvalidYAMLError extends Error {
  code: 'INVALID_YAML'
  parseError: Error
  filePath: string
}

class StoryValidationError extends Error {
  code: 'VALIDATION_FAILED'
  zodErrors: z.ZodError
  filePath: string
}

class FilePermissionError extends Error {
  code: 'EACCES'
  filePath: string
}

class AtomicWriteError extends Error {
  code: 'WRITE_FAILED'
  filePath: string
  originalError: Error
}
```

### Atomic Write Pattern
```typescript
async function atomicWrite(filePath: string, content: string): Promise<void> {
  const tmpPath = `${filePath}.tmp`
  try {
    await fs.writeFile(tmpPath, content, 'utf-8')
    await fs.rename(tmpPath, filePath) // Atomic operation
  } catch (error) {
    // Clean up temp file on error
    try {
      await fs.unlink(tmpPath)
    } catch {
      // Ignore cleanup errors
    }
    throw new AtomicWriteError(...)
  }
}
```

### Performance Targets
- Single read: <50ms (target), <100ms (max)
- Single write: <100ms (target), <200ms (max)
- Batch read (50 files): <5s (requirement)
- Validation overhead: <10ms per file

