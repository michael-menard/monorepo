### 3. Operational Risks

#### Risk 3.1: Session Cleanup Safety
- **Severity**: High
- **Likelihood**: Low (10%)
- **Impact**: Critical (accidental deletion of active sessions breaks workflows)
- **Timing**: Production cleanup operations
- **Mitigation Strategy**:
  - Default `dryRun=true` (requires explicit opt-in)
  - Validate `endedAt IS NOT NULL` before deletion
  - Log all cleanup operations with details
  - Require manual confirmation for bulk deletes
  - Add safeguard: prevent deletion if session active
- **Contingency Plan**: Database backups + rollback procedure
- **Residual Risk**: Very Low (multiple safeguards in place)

#### Risk 3.2: Session Retention Policy Undefined
- **Severity**: Low
- **Likelihood**: High (70%)
- **Impact**: Minor (database bloat or premature deletion)
- **Timing**: Post-implementation operations
- **Mitigation Strategy**:
  - Document recommended retention period (30-90 days)
  - Make retentionDays configurable per cleanup call
  - Monitor session growth rate
  - Provide retention policy guidelines in docs
- **Contingency Plan**: Adjust retention policy based on storage usage
- **Residual Risk**: Very Low (easily adjustable)

