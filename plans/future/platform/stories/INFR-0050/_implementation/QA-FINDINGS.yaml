lessons_captured:
  - id: "LESSON-001"
    title: "Dynamic require() with graceful fallback for optional peer dependencies"
    category: "pattern"
    what_happened: >
      The SDK uses dynamic require() to import @repo/observability for OTel context extraction.
      This allows the SDK to function independently without requiring @repo/observability to be
      fully initialized, providing graceful degradation if the observability package is unavailable.
    resolution: >
      Dynamic require() with try-catch fallback is a valid pattern for optional peer dependencies
      in backend SDKs. The SDK extracts correlation_id from the active span, but if @repo/observability
      is not available, it gracefully falls back to null, allowing the SDK to continue functioning.
    applicability: "Backend SDKs, optional peer dependencies, graceful degradation scenarios"
    reuse_in_future_stories:
      - potential_use: "Any backend SDK that needs optional integration with observability/monitoring"
      - potential_use: "Feature flags or optional middleware in backend frameworks"
    tags:
      - "backend"
      - "sdk"
      - "observability"
      - "infra"
      - "pattern"

  - id: "LESSON-002"
    title: "Internal structural types in SDKs can use TypeScript interfaces"
    category: "pattern"
    what_happened: >
      The SDK defines BufferedEvent, BufferState, and SDK instance types as TypeScript interfaces
      rather than Zod schemas. These are internal structural types not exposed for external validation,
      unlike the public TelemetrySdkConfigSchema which uses Zod.
    resolution: >
      The Zod-first rule applies to externally-facing configuration and data types. Internal
      structural types for SDK state management (BufferedEvent, BufferState, SDK instance interface)
      can reasonably use TypeScript interfaces since they are never externally validated or received
      from outside the SDK boundary. This reduces validation overhead for internal plumbing.
    applicability: "SDK design, internal type definitions, performance optimization for internal state"
    reuse_in_future_stories:
      - potential_use: "Other backend SDKs where internal plumbing differs from external API contracts"
      - potential_use: "Database ORMs or connection pool managers with private state interfaces"
    tags:
      - "typescript"
      - "zod"
      - "sdk"
      - "backend"
      - "architecture"

  - id: "LESSON-003"
    title: "vi.useFakeTimers() prevents flaky buffer flush interval tests"
    category: "pattern"
    what_happened: >
      The SDK includes a flush timer that auto-flushes events every 5000ms. Testing this timer-based
      behavior required reliable control over time progression. Using vi.useFakeTimers() allowed tests
      to advance time deterministically, avoiding race conditions and CI flakiness from real timers.
    resolution: >
      vi.useFakeTimers() is the correct pattern for testing flush-interval behavior in buffered systems.
      Tests can call vi.advanceTimersByTime(ms) to verify timer triggers exactly when expected.
      This approach avoids flaky CI behavior caused by timing variations on different machines.
    applicability: "Any buffer/queue system, time-dependent operations, polling mechanisms"
    reuse_in_future_stories:
      - potential_use: "Rate limiting implementations that rely on timed resets"
      - potential_use: "Cache expiration mechanisms with background cleanup timers"
      - potential_use: "Debounce/throttle utility testing"
    tags:
      - "testing"
      - "vitest"
      - "backend"
      - "sdk"
      - "timers"
      - "pattern"

