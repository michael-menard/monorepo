ac_verdicts:
  AC-1:
    status: pass
    evidence: >
      withStepTracking implementation in packages/backend/db/src/telemetry-sdk/hooks.ts
      (lines 71-134). Wraps operations, measures duration, captures tokens/model metadata,
      emits step_completed event on success/error, extracts correlation_id from active OTel
      span, returns original operation result unchanged. Tests HOOK-001 through HOOK-004
      in hooks.test.ts verify all paths.

  AC-2:
    status: pass
    evidence: >
      withStateTracking implementation in packages/backend/db/src/telemetry-sdk/hooks.ts
      (lines 136-169). Emits item_state_changed event immediately (bypasses buffer as
      specified), captures reason and itemType. Tests HOOK-005 through HOOK-007 verify
      immediate emission, reason capture, and itemType capture.

  AC-3:
    status: pass
    evidence: >
      Event buffer in packages/backend/db/src/telemetry-sdk/utils/buffer.ts (lines 1-138).
      Configurable size threshold (default 100 events), interval-based auto-flush (default
      5000ms), three overflow strategies (drop-oldest/error/block). Flush timer in
      flush-timer.ts. Tests BUF-001 through BUF-009 cover all scenarios including concurrent
      additions, overflow strategies, and flush state management.

  AC-4:
    status: pass
    evidence: >
      insertWorkflowEventsBatch in packages/backend/db/src/telemetry-sdk/batch-insert.ts
      (lines 1-86). Uses Drizzle db.insert().values().onConflictDoNothing() for idempotency.
      Batch chunker in utils/batch-chunker.ts splits at 6500 events (65,000 params ÷ 10
      fields, safe margin below 65,535 limit). Tests BATCH-001 through BATCH-005 verify
      single batch, idempotency, error handling, chunking, and empty array.

  AC-5:
    status: pass
    evidence: >
      extractCorrelationId() in packages/backend/db/src/telemetry-sdk/hooks.ts (lines 22-45).
      Extracts trace ID from active OTel span at event creation time (not flush time per
      ARCH-002), gracefully handles missing OTel dependency with null fallback. Tests
      OTEL-001 through OTEL-003 verify extraction with/without active span and timing.

  AC-6:
    status: pass
    evidence: >
      shutdown() function in packages/backend/db/src/telemetry-sdk/init.ts (lines 72-94).
      Flushes remaining events with 5s timeout, stops flush timer, clears internal state.
      registerShutdownHandlers() at lines 96-113 registers SIGTERM and SIGINT handlers.
      Tests SHUT-001 through SHUT-004 verify SIGTERM, SIGINT, timeout, and deduplication.

  AC-7:
