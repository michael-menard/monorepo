lessons_to_record:
  - lesson: "Dynamic require() with graceful fallback is a valid pattern for optional peer dependencies in backend SDKs. Allows the SDK to work even when @repo/observability is not initialized."
    category: pattern
    tags: ["backend", "sdk", "observability", "infra"]

  - lesson: "Internal structural types for an SDK (BufferedEvent, BufferState, SDK instance interface) can reasonably use TypeScript interfaces rather than Zod schemas since they are not externally validated — the Zod-first rule applies to externally-facing configuration and data types."
    category: pattern
    tags: ["typescript", "zod", "sdk", "backend"]

  - lesson: "vi.useFakeTimers() is the correct pattern for testing flush-interval behavior in buffered systems. Buffer tests for timed flush operations should always use fake timers to avoid flaky CI behavior."
    category: pattern
    tags: ["testing", "vitest", "backend", "sdk"]

