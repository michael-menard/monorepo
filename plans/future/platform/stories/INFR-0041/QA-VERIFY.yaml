lessons_to_record:
  - lesson: >
      For internal-only helper parameter composition types (never exported, used only
      within a single file), a TypeScript interface is ESLint-clean but technically
      diverges from CLAUDE.md Zod-first rule. The code review accepted it. Teams should
      decide whether to require Zod for all internal types or allow interface for purely
      local composition.
    category: pattern
    tags: [backend, zod, typescript, style]

  - lesson: >
      Discriminated union pattern with WorkflowEventSchemas[event_type] provides
      compile-time and runtime type safety for heterogeneous event payloads without
      needing separate switch/case blocks.
    category: reuse
    tags: [backend, typescript, zod, workflow-events]

