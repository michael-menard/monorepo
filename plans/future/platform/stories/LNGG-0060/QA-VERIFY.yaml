lessons_to_record:
  - lesson: "Using .passthrough() on Zod schema combined with explicitly typed optional fields is the optimal strategy for backward compatibility with legacy YAML files. It provides type safety for known fields while preserving unknown fields."
    category: pattern
    tags: ["zod", "backward-compatibility", "yaml", "orchestrator"]

  - lesson: "Numeric phase detection should be handled in the adapter layer (not schema layer) with explicit conversion and warning logging. This avoids modifying existing files while providing forward compatibility."
    category: pattern
    tags: ["backward-compatibility", "phase-management", "orchestrator"]

  - lesson: "setTimeout(resolve, 10) is acceptable in timestamp comparison tests where you need to verify that a timestamp changed after an update operation. This is distinct from using setTimeout as a waitFor replacement."
    category: pattern
    tags: ["testing", "timestamps"]

