audit:
  - id: scope_alignment
    status: FAIL
    note: >
      Critical scope mismatch. The elaboration/ST-3010/story.yaml (title: "Elaboration Analyst —
      Subtask and Clarity Format Audit", depends_on: ["ST-2020"]) diverges completely from
      stories.index.md (title: "Dev Plan Leader: Map Story Subtasks 1:1 to PLAN.yaml Steps",
      depends_on: ST-1040). A second conflicting canonical story.yaml exists at ST-3010/story.yaml
      in the feature root, which matches the index. The story under audit appears to be a
      re-scoped version (created 2026-03-03 vs 2026-02-28 for the root version) that has not
      been reconciled with the index or the root-level story file. The scope in the elaboration
      stub also overlaps substantially with ST-2010 (subtask decomposition audit, already
      implemented in elab-analyst v3.2.0) and ST-2020 (clarity format audit check). All three
      conflicts must be resolved before this story can proceed.

  - id: internal_consistency
    status: FAIL
    note: >
      The story is a minimal YAML stub with no acceptance criteria, no subtasks, no test plan,
      and no full markdown story file. Internal consistency cannot be fully assessed, but what
      is present contains a structural problem: the feature field claims to add both "subtask
      audit check and clarity format audit check" to the elaboration analyst, yet: (1) the
      subtask decomposition audit (Audit Check #9) is already fully implemented in
      elab-analyst.agent.md v3.2.0 per stories.index.md implementation notes; (2) the clarity
      format audit is already scoped as ST-2020. This story's stated scope is therefore either
      a duplicate of existing functionality or a duplicate of ST-2020, with no clear
      differentiation documented. The risk_notes reference "hard block vs soft warning"
      distinction but do not resolve which audit check this applies to or how it differs from
      the existing CONDITIONAL PASS logic in Audit Check #9.

  - id: reuse_first
    status: WARN
    note: >
      No implementation details exist in the stub to evaluate reuse patterns. The scope
      (modifying elab-analyst.agent.md) is a single agent file modification with no shared
      package implications, which is appropriate. However, the story does not reference the
      existing Audit Check #9 implementation in elab-analyst v3.2.0 as a baseline to extend,
      which would be the correct reuse-first approach if new work is genuinely needed.

  - id: ports_adapters
    status: PASS
    note: >
      No API endpoints or infrastructure changes. Scope is limited to agent file modification
      (elab-analyst.agent.md). Ports and adapters architecture is not applicable to this
      story type. No concerns.

  - id: testability
    status: FAIL
    note: >
      No test plan exists. No acceptance criteria defined. No fixture stories specified for
      testing audit check behavior. The story does not describe how the new checks would be
      validated (e.g., fixture story files with missing/present sections, expected ELAB.yaml
