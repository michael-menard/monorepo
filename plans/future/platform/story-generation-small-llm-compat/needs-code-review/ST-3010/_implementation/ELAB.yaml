analyst_notes: >
  ST-3010 as presented in elaboration/ST-3010/story.yaml is a minimal YAML stub that cannot
  be elaborated, planned, or implemented in its current state. It fails on scope alignment
  (dual conflicting definitions, overlap with ST-2010 and ST-2020), internal consistency
  (no ACs, no distinguishable scope from existing work), testability (no test plan or
  fixtures), decision completeness (hard block vs soft warning policy unresolved), and
  subtask decomposition (no subtasks possible without ACs).

  Recommended resolution path before re-submitting for elaboration:
  1. Designate one canonical story.yaml for ST-3010 (archive or renumber the other).
  2. If re-scope to "Elaboration Analyst — Subtask and Clarity Format Audit" is intended,
     confirm this is genuinely distinct from ST-2020 (which covers clarity format) and
     ST-2010 (which covers subtask decomposition, already implemented). If not distinct,
     close ST-3010 and fold any delta scope into ST-2020.
  3. If ST-3010 is kept as a distinct story, write a full markdown story file with:
     - ## Goal (one sentence)
     - ## Acceptance Criteria (minimum 2 ACs)
     - ## Examples (2+ input/output pairs)
     - ## Edge Cases (2+ scenarios)
     - ## Subtasks (with verification commands and canonical references)
     - ## Test Plan (fixture specifications with expected ELAB.yaml outputs)
  4. Resolve the hard block vs soft warning design decision explicitly in the story body.
  5. Update stories.index.md to reflect the reconciled ST-3010 scope.
