  - id: decision_completeness
    status: FAIL
    note: >
      The risk_notes contain an unresolved design decision: "Audit logic must distinguish
      between missing sections (hard block) and low-quality content (soft warning)." This
      decision is not resolved — no specific rules are documented for what constitutes
      "missing" vs "low-quality", what the threshold for hard block vs soft warning is,
      or which audit check(s) this policy applies to. This is a blocking TBD that would
      prevent a developer from implementing the story without further design work.

  - id: risk_disclosure
    status: WARN
    note: >
      The risk_notes are present but incomplete. Missing disclosures: (1) The subtask
      decomposition audit is already fully implemented in elab-analyst v3.2.0 — this story
