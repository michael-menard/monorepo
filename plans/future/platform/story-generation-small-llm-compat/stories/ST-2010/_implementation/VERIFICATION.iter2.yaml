lessons_to_record:
  - lesson: >-
      Prompt-only QA requires careful AC-vs-implementation comparison when prior REVIEW
      artifacts contain incorrect line number references. In iteration 1, the reviewer
      incorrectly trusted evidence claiming "include" language at line 214 when the
      actual text said "omit". Always read actual file content rather than trusting
      line references in prior artifacts.
    category: anti_pattern
    tags:
      - qa
      - prompt-stories
      - evidence-accuracy

  - lesson: >-
      For prompt-only stories with AC requirements specifying exact YAML key placement
      (e.g., pm_artifacts.dev_feasibility.subtasks), verification must be against the
      actual agent file text, not inferred from summaries. A "different but arguably
      equivalent" placement (e.g., ## Subtasks markdown section) fails the letter of
      the AC even if functionally similar.
    category: pattern
    tags:
      - qa
      - acceptance-criteria
      - prompt-stories

  - lesson: >-
      Fix iteration 2 pattern: when a QA FAIL is caused by a specific line of agent
      instruction prose, the fix should be a targeted single-line edit with before/after
      documentation in FIX-SUMMARY.yaml. This makes iteration 2 QA verification
      straightforward — read the line, confirm the fix text is in place.
    category: pattern
    tags:
      - qa
      - fix-iteration
      - agent-files

