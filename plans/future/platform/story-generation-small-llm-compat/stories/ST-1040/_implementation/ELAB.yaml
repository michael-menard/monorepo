  - id: testability
    status: WARN
    note: >
      The story.yaml contains no explicit test plan or verification commands. For an agent
      specification story (modifying .md files), traditional .http or Playwright tests do not
      apply, but the story should specify how to verify the change worked: e.g., run
      /pm-story generate on a sample STORY-SEED.md and confirm the output story file contains
