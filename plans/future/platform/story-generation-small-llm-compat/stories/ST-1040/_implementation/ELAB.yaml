    note: >
      The story.yaml goal is internally consistent: it calls for all five new sections and
      AC-subtask coverage warning. The risk_notes correctly identify that Canonical References
      and Subtasks are already implemented in v4.3.0 and that Goal/Examples/Edge Cases
