opportunities:  # Non-blocking
  - id: opp-1
    category: edge_cases
    finding: >
      Quality gates table in pm-story-generation-leader.agent.md currently shows Canonical
      References and Subtasks as SHOULD (non-blocking). The story should decide whether
      Goal, Examples, and Edge Cases should also be SHOULD (warn but continue) or MUST
      (block story generation). This distinction affects developer behavior and should be
      made explicit in the story ACs.
    effort: low
    decision: log_to_kb
    kb_entry_id: "dd1d02cb-7961-4436-bc70-2fb54484b0c1"

  - id: opp-2
    category: observability
    finding: >
      The generation leader could emit a structured warning to BLOCKERS.md or a dedicated
      QUALITY-WARNINGS.md file when Goal/Examples/Edge Cases are missing from the synthesized
      story, making gaps machine-readable for downstream pipeline tooling. Currently only a
      log warning is implied.
    effort: low
    decision: log_to_kb
    kb_entry_id: "355fc42d-6e08-4626-ac64-42a009994e67"

  - id: opp-3
    category: edge_cases
    finding: >
      The story does not address what happens when STORY-SEED.md is missing the ## Canonical
      References section (e.g., seed agent produced an older format). The Phase 4 block
      should specify graceful degradation: omit the section and log a warning rather than
      failing story generation. This is already handled for Subtasks ("log warning but do not
      block") but should be explicitly extended to the Goal/Examples/Edge Cases enforcement.
    effort: low
    decision: log_to_kb
    kb_entry_id: "fc9cf83f-1bde-497f-ac70-333f92bcf301"

  - id: opp-4
    category: ux_polish
    finding: >
      pm-spawn-patterns.md Story File Structure currently lists 17 items numbered 1-17. Adding
      ## Examples and ## Edge Cases will require renumbering or inserting sub-items (e.g.,
      4a, 4b) after the existing ## Goal item 4. The story should clarify the final ordering:
      Goal → Examples → Edge Cases → Non-goals → Scope → ACs, or a different order. The
      stories.index.md ST-1020 entry says "## Goal (one sentence), ## Examples (2+), ## Edge
      Cases (2+) before ACs and Subtasks" which implies a specific position. ST-1040 should
      confirm this ordering is enforced in Phase 4 synthesis.
    effort: low
    decision: log_to_kb
    kb_entry_id: "976fb2cf-d412-4de4-8a54-e2b710d97e2a"

