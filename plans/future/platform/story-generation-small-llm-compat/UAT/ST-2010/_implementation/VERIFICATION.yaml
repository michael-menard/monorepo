lessons_to_record:
  - lesson: >-
      Prompt-only QA requires careful AC-vs-implementation comparison when REVIEW artifacts contain incorrect line
      number references. The reviewer claimed line 214 contained include language but the actual text was omit. Always
      read the actual file content rather than trusting line references in prior artifacts.
    category: anti_pattern
    tags:
      - qa
      - prompt-stories
      - evidence-accuracy
  - lesson: >-
      For prompt-only stories, AC-3-type requirements specifying exact YAML key placement
      (pm_artifacts.dev_feasibility.subtasks) must be verified against the actual agent file text, not inferred from a
      summary. The leader agent chose a different but arguably equivalent placement (## Subtasks section) — this is a
      valid design choice but fails the letter of AC-3.
