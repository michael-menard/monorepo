id: 'CDBE-1010'
title: 'Valid Transitions Lookup Table and State Machine Trigger'
status: backlog
priority: medium
phase: 1
feature: |
  Create valid_transitions lookup table defining all legal from_state→to_state pairs; implement INSERT trigger on story_state_history that rejects illegal transitions at DB level and closes the previous open row (sets exited_at, computes duration_seconds).
goal: |
  Enforce story state machine rules at the database level so invalid transitions are impossible regardless of caller.
