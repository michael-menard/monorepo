issues: []
lessons_to_record:
  - lesson: >-
      For BEFORE INSERT triggers that must also UPDATE the same table (closing prior rows), confirm UPDATE GRANT is
      explicitly given to calling roles. Migration 1005 omitted UPDATE on story_state_history for agent_role — migration
      1010 caught and fixed this, issuing a column-scoped GRANT UPDATE (exited_at, duration_seconds).
    category: blocker
    tags:
      - database
      - rls
      - grants
      - triggers
  - lesson: >-
      When a trigger function runs as SECURITY INVOKER and issues an UPDATE on the same table, the calling role needs
      UPDATE permission — not just the function definer. Document SECURITY INVOKER vs SECURITY DEFINER implications
      explicitly in migration comments.
    category: pattern
    tags:
      - database
      - security
      - triggers
      - rls
  - lesson: >-
      pgtap idempotency tests (ADD COLUMN IF NOT EXISTS, DROP TRIGGER IF EXISTS + CREATE TRIGGER, CREATE INDEX IF NOT
      EXISTS inside lives_ok) are an effective inline pattern for verifying idempotency without a full second migration
      run.
    category: pattern
    tags:
      - database
      - pgtap
      - testing
      - idempotency
