issues: []
lessons_to_record:
  - lesson: >-
      For pure DDL/SQL migration stories, pgTAP test files with BEGIN/ROLLBACK provide correct QA verification. E2E gate
      exemption is valid when no application code paths are added.
    category: pattern
    tags:
      - database
      - migration
      - pgtap
      - partitioning
  - lesson: >-
      PostgreSQL FK from non-partitioned child to partitioned parent requires a per-partition UNIQUE INDEX on the FK
      column alone (not including the partition key) when the child table does not carry the partition key. This is the
      correct pattern when child tables hold only invocation_id (uuid) without started_at.
    category: pattern
    tags:
      - database
      - partitioning
      - foreign-keys
      - postgresql
  - lesson: >-
      Pre-existing unit test failures in unrelated packages (mcp-server tool count assertions) must be explicitly
      documented in QA verification to distinguish them from story regressions. The CDBE-5010 commit touches only 4
      files — all unrelated to the failing test files.
    category: pattern
    tags:
      - qa
      - test-failures
      - pre-existing
