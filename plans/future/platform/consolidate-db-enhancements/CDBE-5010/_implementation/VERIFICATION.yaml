architecture_compliant: true
architecture_notes: >-
  Migration follows established patterns from 1001-1070. Single BEGIN/COMMIT transaction. Rename+copy strategy
  appropriate for PostgreSQL partitioning constraints. FK strategy (per-partition UNIQUE INDEX on id for child table
  references without started_at) is correct PostgreSQL pattern. TypeScript schema changes are comment-only — Drizzle ORM
  does not express PARTITION BY, which is documented inline.
