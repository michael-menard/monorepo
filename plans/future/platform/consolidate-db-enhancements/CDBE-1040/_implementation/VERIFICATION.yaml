lessons_to_record:
  - lesson: >-
      When AC-14 specifies an auditable column name that differs from the actual schema column name (e.g., 'description'
      vs 'summary' for workflow.plans), the migration should audit the actual column name and document the discrepancy
      in both inline comments and COMMENT ON FUNCTION statements. This avoids silent missed auditing.
    category: pattern
    tags:
      - database
      - audit-trigger
      - schema-drift
  - lesson: >-
      AFTER UPDATE triggers have their return value ignored by PostgreSQL for row-level operations, so both RETURN NEW
      (audit_story_mutations) and RETURN NULL (audit_plan_mutations) are technically correct. However, RETURN NULL is
      the idiomatic choice for AFTER triggers since the row has already been written.
    category: pattern
    tags:
      - database
      - plpgsql
      - trigger-design
  - lesson: >-
      Hardcoded constant arrays in PL/pgSQL trigger functions (vs. a lookup table) eliminate per-invocation SELECT
      overhead. For high-frequency triggers like row-level audit triggers, this is the correct MVP tradeoff — document
      the decision in COMMENT ON FUNCTION for future maintainers.
    category: pattern
    tags:
      - database
      - plpgsql
      - performance
      - audit-trigger
