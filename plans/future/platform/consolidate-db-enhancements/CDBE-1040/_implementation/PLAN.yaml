architectural_decisions:
  - id: ARCH-001
    question: >-
      AC-2 offers two options for sensitive columns definition: (a) workflow.sensitive_audit_columns table or (b)
      hardcoded constant array in function body. Which to use?
    decision: Hardcoded constant array within redact_sensitive_value function body
    rationale: >-
      AC-2 explicitly recommends this for MVP: zero SELECT overhead per trigger invocation, no extra table to maintain,
      fully self-contained in the function. The story's own recommendation aligns with MVP scope.
    decided_by: story_recommendation
  - id: ARCH-002
    question: >-
      AC-14 lists points and epic as auditable columns on workflow.stories, but neither column exists in the current
      schema (confirmed by Drizzle schema and migration audit). How should the migration handle this?
    decision: >-
      Add points integer and epic text to workflow.stories using ADD COLUMN IF NOT EXISTS in this migration, before the
      trigger function body that references them. This keeps the migration self-contained and idempotent.
    rationale: >-
      The trigger body must compile against the actual column set at CREATE FUNCTION time. PostgreSQL validates column
      references in trigger functions at execution time (not compile time for PL/pgSQL), so the columns must exist when
      the trigger fires. ADD COLUMN IF NOT EXISTS is idempotent and consistent with the pattern used in
      999_consolidate_story_tables.sql. The story AC-14 is authoritative on auditable column scope.
    decided_by: autonomous
