architectural_decisions:
  - id: ARCH-001
    question: >-
      workflow.plans.status type: the story document says plan_status_enum (PostgreSQL ENUM), but the actual schema uses
      text with CHECK constraint. Which comparison form should the trigger use?
    decision: >-
      Use text comparison: NEW.status = 'archived' (no cast needed, column is text). The OLD.status IS DISTINCT FROM
      NEW.status guard works on text columns.
    rationale: >-
      Direct schema inspection of 999_full_schema_baseline.sql line 1224 confirms status is text with CONSTRAINT
      plans_status_check CHECK (status = ANY (ARRAY[...])). The story document's claim of plan_status_enum is incorrect.
      Text comparison is simpler and correct.
    decided_by: auto
  - id: ARCH-002
    question: >-
      AC-15 prerequisite handling: should migration 1020 INSERT the backlog→deferred transition, or only raise an error
      if absent?
    decision: >-
      Migration 1020 inserts the backlog→deferred row using INSERT ... ON CONFLICT DO NOTHING before the pre-condition
      guard check, ensuring idempotent self-healing deployment. The guard still validates afterward.
    rationale: >-
      AC-15 (autonomously added during elab) explicitly says implementation must insert this row. The story non-goals
      say 'prefer flagging absence with an error' but AC-15 overrides this for the specific backlog→deferred row. Using
      INSERT ... ON CONFLICT DO NOTHING is idempotent.
    decided_by: auto
complexity: moderate
