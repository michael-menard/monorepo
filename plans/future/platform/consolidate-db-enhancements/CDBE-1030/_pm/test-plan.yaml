# Test Plan for CDBE-1030: Artifact Write and Plan Archival Cascade Triggers
# Generated by pm-draft-test-plan worker
# Story: Pure database migration — pgtap tests only (no API/UI surface)

strategy: integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

# ── Happy Path Tests ──────────────────────────────────────────────────────────

happy_path_tests:
  - id: HP-1
    title: 'Trigger 1 supersedes prior artifact on second insert for same (story_id, artifact_type)'
    setup: |
      BEGIN;
      INSERT INTO workflow.stories (story_id, feature, state, title) VALUES ('TEST-1030-ART', 'cdbe-1030-test', 'backlog', 'pgtap test story') ON CONFLICT DO NOTHING;
      INSERT INTO artifacts.story_artifacts (story_id, artifact_type, iteration, phase) VALUES ('TEST-1030-ART', 'dev_proof', 1, 'dev');
    action: |
      INSERT INTO artifacts.story_artifacts (story_id, artifact_type, iteration, phase) VALUES ('TEST-1030-ART', 'dev_proof', 2, 'dev');
    expected: |
      First row (iteration=1) has superseded_at IS NOT NULL set to approximately NOW().
      Second row (iteration=2) has superseded_at IS NULL.
      workflow.stories.updated_at for TEST-1030-ART is bumped to approximately NOW().
    evidence: |
      pgtap: ok(EXISTS(SELECT 1 FROM artifacts.story_artifacts WHERE story_id='TEST-1030-ART' AND iteration=1 AND superseded_at IS NOT NULL), 'prior artifact iteration superseded')
      pgtap: ok(EXISTS(SELECT 1 FROM artifacts.story_artifacts WHERE story_id='TEST-1030-ART' AND iteration=2 AND superseded_at IS NULL), 'new artifact iteration not superseded')
      pgtap: ok(EXISTS(SELECT 1 FROM workflow.stories WHERE story_id='TEST-1030-ART' AND updated_at >= NOW() - interval '5 seconds'), 'stories.updated_at bumped')

  - id: HP-2
    title: 'Trigger 2 defers all backlog stories when plan archived'
    setup: |
      BEGIN;
      INSERT INTO workflow.plans (plan_slug, title, status) VALUES ('test-plan-1030', 'Test Plan', 'active') ON CONFLICT DO NOTHING;
      INSERT INTO workflow.stories (story_id, feature, state, title) VALUES ('TEST-1030-S1', 'cdbe-1030-test', 'backlog', 'story 1'), ('TEST-1030-S2', 'cdbe-1030-test', 'backlog', 'story 2') ON CONFLICT DO NOTHING;
      INSERT INTO workflow.plan_story_links (plan_slug, story_id) VALUES ('test-plan-1030', 'TEST-1030-S1'), ('test-plan-1030', 'TEST-1030-S2') ON CONFLICT DO NOTHING;
    action: |
      UPDATE workflow.plans SET status = 'archived' WHERE plan_slug = 'test-plan-1030';
    expected: |
      Both TEST-1030-S1 and TEST-1030-S2 have state = 'deferred'.
    evidence: |
      pgtap: ok(NOT EXISTS(SELECT 1 FROM workflow.stories WHERE story_id IN ('TEST-1030-S1','TEST-1030-S2') AND state != 'deferred'), 'all linked backlog stories deferred on plan archival')

  - id: HP-3
    title: 'Migration is idempotent — second run exits 0 with no errors'
    setup: 'Migration 1020 has been applied once.'
    action: 'Apply migration 1020 a second time.'
    expected: |
      No errors. CREATE OR REPLACE FUNCTION succeeds. ADD COLUMN IF NOT EXISTS no-ops. DROP TRIGGER IF EXISTS no-ops. CREATE TRIGGER succeeds. CREATE INDEX IF NOT EXISTS no-ops.
    evidence: |
      pgtap: lives_ok applying migration SQL a second time within transaction

# ── Error Cases ───────────────────────────────────────────────────────────────

error_cases:
  - id: EC-1
    title: 'Trigger 2 cascade blocked if backlog → deferred not in valid_transitions'
    setup: |
      Temporarily DELETE FROM workflow.valid_transitions WHERE from_state = 'backlog' AND to_state = 'deferred';
      Set up plan with linked backlog stories.
    action: 'UPDATE workflow.plans SET status = ''archived'' WHERE plan_slug = ...'
    expected: |
      SQLSTATE 23514 raised by enforce_story_state_history_transition (migration 1010) when the record_state_transition function fires for each deferred story. The cascade is blocked.
    evidence: |
      pgtap: throws_ok(..., '23514', NULL, 'cascade blocked when backlog→deferred missing from valid_transitions')
    notes: 'This is the AC-14 safety guard — migration must pre-check this transition exists.'

  - id: EC-2
    title: 'Migration pre-condition guard raises EXCEPTION if backlog → deferred missing'
    setup: 'Delete backlog → deferred from valid_transitions before running migration.'
    action: 'Run migration 1020.'
    expected: |
      DO $$ block raises EXCEPTION with message indicating backlog → deferred is missing from valid_transitions.
    evidence: |
      pgtap: throws_ok wrapping the DO block, SQLSTATE P0001 (raise_exception)

# ── Edge Cases ────────────────────────────────────────────────────────────────

edge_cases:
  - id: ED-1
    title: 'Trigger 1 first insert (no prior row) — no-op, no error'
    setup: |
      No prior artifacts.story_artifacts row for (TEST-1030-ART, 'code_review') exists.
    action: |
      INSERT INTO artifacts.story_artifacts (story_id, artifact_type, iteration, phase) VALUES ('TEST-1030-ART', 'code_review', 1, 'review');
    expected: |
      Trigger executes without error. No existing row has superseded_at set. stories.updated_at is bumped (UPDATE still fires even with 0 rows superseded).
    evidence: |
      pgtap: lives_ok($$INSERT INTO artifacts.story_artifacts...$$, 'first insert for artifact type succeeds without error')
      pgtap: ok(NOT EXISTS(SELECT 1 FROM artifacts.story_artifacts WHERE story_id='TEST-1030-ART' AND artifact_type='code_review' AND superseded_at IS NOT NULL), 'no rows superseded on first insert')

  - id: ED-2
    title: 'Trigger 1 multiple prior non-superseded rows — only most recent (created_at DESC LIMIT 1) is closed'
    setup: |
      Insert two rows manually (bypassing trigger) for same (story_id, artifact_type) both with superseded_at IS NULL.
    action: |
      INSERT a third row normally (triggering the trigger).
    expected: |
      Only the most recently created prior row has superseded_at set. The older row remains with superseded_at IS NULL.
    evidence: |
      pgtap: ok(count of superseded rows = 1, 'only one prior row superseded per trigger fire')

  - id: ED-3
    title: 'Trigger 2 with zero linked backlog stories — no error'
    setup: |
      Plan exists with no plan_story_links rows, or all linked stories are in non-backlog state (e.g., ready, in_progress).
    action: |
      UPDATE workflow.plans SET status = 'archived' WHERE plan_slug = 'empty-plan';
    expected: |
      Trigger fires, UPDATE affects 0 rows, no error raised.
    evidence: |
      pgtap: lives_ok($$UPDATE workflow.plans SET status='archived'...$$, 'plan archival with zero linked backlog stories succeeds')

  - id: ED-4
    title: 'Trigger 2 does not defer non-backlog linked stories'
    setup: |
      Plan with linked stories in states: ready, in_progress, UAT.
    action: |
      UPDATE workflow.plans SET status = 'archived';
    expected: |
      Stories in ready/in_progress/UAT remain in their current state. Only backlog stories would be deferred (and there are none to defer here).
    evidence: |
      pgtap: ok(NOT EXISTS(SELECT 1 FROM workflow.stories WHERE story_id IN (...) AND state = 'deferred'), 'non-backlog stories not affected by plan archival')

  - id: ED-5
    title: 'Trigger 2 non-archived status change — no stories modified'
    setup: |
      Plan with status active. Linked backlog stories exist.
    action: |
      UPDATE workflow.plans SET status = 'in-progress' WHERE plan_slug = 'test-plan-1030';
    expected: |
      Trigger fires but condition NEW.status = 'archived' is false. Zero story rows updated.
    evidence: |
      pgtap: ok(NOT EXISTS(SELECT 1 FROM workflow.stories WHERE story_id IN (...) AND state = 'deferred'), 'backlog stories unchanged when plan status not archived')

  - id: ED-6
    title: 'Trigger 2 does not fire again on re-archive (OLD.status already archived)'
    setup: |
      Plan already archived. Some stories already deferred.
    action: |
      UPDATE workflow.plans SET status = 'archived' again (no change, or update some other column).
    expected: |
      IS DISTINCT FROM check prevents re-firing side effects. No additional story state changes.
    evidence: |
      pgtap: ok(..., 'no additional deferral when plan already archived')

