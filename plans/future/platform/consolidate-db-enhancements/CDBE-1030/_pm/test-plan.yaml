manual_cases:
  - id: MC-1
    title: 'Verify migration runs without error on staging database'
    steps:
      - 'Apply migration 1020 to staging KB database'
      - 'Check psql exit code = 0'
      - 'Confirm superseded_at column present on artifacts.story_artifacts'
      - 'Confirm artifact_versions_supersede trigger present'
      - 'Confirm plan_archival_cascade trigger present'
      - 'Confirm partial index present'
    expected: 'All objects created. No errors in psql output.'

fixture_definitions:
  - name: test_story_1030_artifact
    type: workflow.stories row + artifacts.story_artifacts rows
    description: 'Story TEST-1030-ART with two sequential artifact inserts for same artifact_type'
  - name: test_plan_1030_with_backlog_stories
    type: workflow.plans + workflow.stories + workflow.plan_story_links rows
    description: 'Plan test-plan-1030 with 2 linked backlog stories for Trigger 2 cascade test'
  - name: test_plan_1030_non_backlog
    type: workflow.plans + workflow.stories (in_progress/ready) + workflow.plan_story_links
    description: 'Plan with linked non-backlog stories to verify Trigger 2 filter is state=backlog only'

risks:
  - 'SAVEPOINT + DO block required for all CREATE TRIGGER DDL inside pgtap — omitting causes transaction abort (KB lesson 23ea4ba2)'
  - 'Trigger 2 cascade fires enforce_story_state_history_transition (1010) — backlog→deferred MUST be in valid_transitions or pgtap tests fail with SQLSTATE 23514'
  - 'RLS: agent_role needs GRANT UPDATE (superseded_at) on artifacts.story_artifacts — verify migration 1005 grants or add to 1020'
  - 'Multiple prior rows test (ED-2) requires bypassing the trigger for setup — use direct INSERT with superseded_at=NULL or SECURITY DEFINER helper'
  - 'plan_status_enum cast: trigger condition must use NEW.status::text = ''archived'' or ENUM cast — test with actual ENUM value not text literal'
