risks:
  - finding: 'Trigger 2 cascade fires 1010 trigger (enforce_story_state_history_transition). If backlog→deferred is absent from workflow.valid_transitions, the cascade will fail with SQLSTATE 23514 for every linked story.'
    mitigation: 'AC-14 pre-condition DO block guard checks for the transition before migration proceeds. If absent, RAISE EXCEPTION with clear message. Do not silently insert the transition — force the operator to investigate.'
  - finding: 'plan_status_enum ENUM type requires correct comparison in PL/pgSQL. Bare text comparison may fail depending on PostgreSQL implicit casting.'
    mitigation: 'Use NEW.status = ''archived''::plan_status_enum (explicit ENUM cast) in trigger body. Test with actual ENUM value, not text literal.'
  - finding: 'SAVEPOINT + DO block pattern is mandatory for pgtap CREATE TRIGGER DDL — omission aborts entire test transaction (KB lesson 23ea4ba2).'
    mitigation: 'Wrap all CREATE TRIGGER DDL in test file with SAVEPOINT + DO block checking pg_proc for function existence. Reference 1010_story_state_history_trigger_test.sql for exact pattern.'

