key_decisions:
  - decision: Use story_cascade_dispatch() as trigger entry point with logic inlined
    reason: >
      PL/pgSQL cannot call a RETURNS TRIGGER function from another function using
      PERFORM or SELECT. The named cascade functions (story_completion_cascade and
      story_cancellation_cascade) exist as standalone testable trigger functions
      but the actual trigger uses the dispatch wrapper.

  - decision: to_state = 'blocked' for blocker flag INSERTs
    reason: >
      The 1010 trigger validates that NULL → to_state is a recognized initial_insert
      target in workflow.valid_transitions. NULL → NULL is not present but
      NULL → 'blocked' is (line 85 of 1004_valid_transitions.sql). Using 'blocked'
      avoids a trigger rejection while remaining semantically accurate.

  - decision: Capture v_blocked_ids BEFORE soft-deleting blocker rows
    reason: >
      AC-8 requires flagging stories that WERE blocked, including rows about to be
      soft-deleted. The ARRAY_AGG must run before the UPDATE on story_blockers.

  - decision: pg_class guard for story_worktrees table
    reason: >
      The worktrees table is managed outside SQL migrations. The migration cannot
      reference it in a way that would fail if the table doesn't exist. The pg_class
      existence check satisfies AC-3's graceful handling requirement.

  - decision: SECURITY INVOKER on all functions
    reason: >
      Consistent with the pattern established by 1010_story_state_history_trigger.sql.
      Caller privileges (agent_role) are required rather than bypassing RLS.
