architectural_decisions:
  - id: ARCH-001
    question: 'AC-8 flag mechanism: which table/column to use for recording a cancellation flag on downstream stories?'
    decision: >-
      INSERT into workflow.story_state_history with event_type='blocker', story_id=<downstream_story_id>,
      from_state=<current_state>, to_state=<current_state> (same state, flag-only). The 'blocker' event_type is already
      in the check constraint (999_full_schema_baseline.sql line 1313). Existing indexes
      idx_workflow_story_state_history_story_id and idx_workflow_story_state_history_event_type support efficient agent
      queries. No new table required.
    rationale: >-
      The story_state_history check constraint already includes 'blocker' as a valid event_type. This reuses the
      existing audit infrastructure, is queryable by agents via (story_id, event_type='blocker'), and requires no new
      DDL. The from_state=to_state pattern records a flag-only event without any state mutation. Consistent with the
      established pattern used by record_state_transition() in migration 1001/1010.
    decided_by: dev-plan-leader
  - id: ARCH-002
    question: >-
      Trigger dispatcher pattern: single dispatcher function calling completion/cancellation, or each function checks
      NEW.state internally?
    decision: >-
      Each cascade function includes its own early-exit guard (IF NEW.state NOT IN ('completed', 'cancelled') THEN
      RETURN NEW END IF). The story_cascade_trigger calls both functions in sequence: story_completion_cascade for
      completed, story_cancellation_cascade for cancelled. However, since PostgreSQL triggers can only call one function
      per trigger, a single dispatcher function workflow.story_cascade_dispatch() is preferred that checks NEW.state and
      calls the appropriate function internally, returning the result.
    rationale: >-
      A single trigger with a single dispatcher function ensures deterministic ordering per AC-11 ('single AFTER UPDATE
      trigger'). This prevents the risk of two triggers firing in unspecified order. The dispatcher reads NEW.state once
      and branches to the appropriate cascade. Each cascade function still includes its own early-exit guard as a
      defense-in-depth measure.
    decided_by: dev-plan-leader
complexity: moderate
notes:
  - >-
    worktrees table is confirmed in Drizzle schema (workflow.ts line 62-75) with merged_at and abandoned_at columns but
    is NOT present in 999_full_schema_baseline.sql. The table exists in the live DB via Drizzle migration history.
    Implementation MUST document this in migration header (AC-16).
  - >-
    depends_on_id is confirmed as the correct column name in workflow.story_dependencies (999_full_schema_baseline.sql
    line 1272). AC-2 trigger body must use depends_on_id, not depends_on_story_id (AC-15).
  - >-
    story_state_history event_type check constraint allows: state_change, transition, phase_change, assignment, blocker,
    metadata_version (baseline line 1313). The 'blocker' event_type is available for AC-8 flag events without any DDL
    changes.
  - >-
    story_state_history has a BEFORE INSERT trigger (enforce_story_state_history_transition from migration 1010) that
    validates transitions against workflow.valid_transitions. AC-8 flag inserts use from_state=current_state,
    to_state=current_state — this is an idempotent/self-transition that may fail validation. The flag INSERT must bypass
    this trigger or use a different event_type='blocker' with NULL from_state to avoid the valid_transitions check.
    Recommend using NULL from_state (initial-insert semantics) in the flag INSERT to avoid the trigger guard.
  - >-
    The agent_role UPDATE grant on workflow.story_assignments and workflow.story_blockers is already in migration 1050
    (GRANT SELECT, INSERT, UPDATE ... TO agent_role). The worktrees table grants must be verified — if agent_role does
    not have UPDATE on workflow.worktrees, the completion cascade will fail for agent_role callers.
  - Migration slot 1060 is confirmed unoccupied — no 1060_*.sql file exists in the migrations directory.
  - >-
    Opportunity opp-3 noted: AC-2 UPDATE should guard with AND resolved_at IS NULL to be idempotent (avoid overwriting a
    previously recorded resolution timestamp). This is already in the plan step description for ST-1.
  - >-
    pgtap AT-1 atomicity test: use a DO block inside the test transaction that inserts a story, begins cascade, then
    calls a deliberately invalid operation (e.g., UPDATE workflow.stories SET state=NULL WHERE story_id=...) inside the
    cascade context and verifies full rollback. Alternatively, use a mock that raises EXCEPTION. The approach must be
    confirmed at implementation time.
