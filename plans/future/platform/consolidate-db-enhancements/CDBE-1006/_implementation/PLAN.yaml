architectural_decisions: []
complexity: moderate
notes:
  - Slot 1005 confirmed free as of 2026-03-18 (ls output shows no 1005_*.sql files).
  - >-
    CRITICAL: RLS enable and first policy creation for each table must be atomic in the same DO block. If ENABLE ROW
    LEVEL SECURITY runs without any policy, all non-superuser connections receive implicit DENY. The DO block must
    CREATE POLICY before (or within the same transaction as) ALTER TABLE ... ENABLE ROW LEVEL SECURITY.
  - >-
    kbuser BYPASSRLS: ALTER ROLE kbuser BYPASSRLS is harmless if kbuser is a superuser (rolsuper=true) and required if
    not. Include unconditionally. ST-4 verifies the actual pg_roles status and documents the finding.
  - >-
    SECURITY DEFINER trigger (1001 migration) bypasses RLS on workflow.stories regardless of session role. This is
    expected PostgreSQL behaviour and is a documented limitation in the migration header — not a defect.
  - >-
    Use current_role (not current_user) in policy USING clauses when SET ROLE is in use — the two diverge after role
    switching.
  - 'No Drizzle schema changes: RLS policies are not representable in Drizzle ORM. workflow.ts is not touched.'
  - >-
    pgtap permission tests (AC-13) use SET LOCAL ROLE inside a SAVEPOINT/ROLLBACK TO SAVEPOINT pattern so the throws_ok
    statement can revert the role change and the outer transaction remains intact.
  - >-
    Pattern reference: 1004_valid_transitions.sql for idempotent DO block structure; 1001_canonical_story_states.sql for
    COMMENT ON style with migration number prefix; 1004_valid_transitions_test.sql for pgtap file layout.
  - >-
    All four tables confirmed to exist in workflow schema: stories (line 33), plans (line 137), story_state_history
    (line 94), workflow_audit_log (line 292) in apps/api/knowledge-base/src/db/schema/workflow.ts.
  - No telemetry schema exists in KB database. The story already corrects this — all RLS targets are in workflow schema.
