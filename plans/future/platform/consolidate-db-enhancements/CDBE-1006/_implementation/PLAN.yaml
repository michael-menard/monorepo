    action: create
    reason: >-
      New idempotent migration: create three least-privilege roles, enable+force RLS on four workflow tables, create
      permissive SELECT policies per role, grant per-role DML privileges, grant kbuser BYPASSRLS, add COMMENT ON
      TABLE/POLICY with 1005: prefix
  - path: apps/api/knowledge-base/src/db/migrations/pgtap/1005_workflow_rls_test.sql
