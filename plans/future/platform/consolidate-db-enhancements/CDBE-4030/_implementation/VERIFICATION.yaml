lessons_to_record:
  - lesson: >-
      When using pg.Client NOTIFY/LISTEN with withRetry (which internally uses setTimeout), fake timers conflict with
      the retry handler's setTimeout. Use real timers for tests that exercise the write-back path with withRetry, and
      fake timers only for pure batching/windowing tests.
    category: pattern
    tags:
      - testing
      - vitest
      - postgresql
      - fake-timers
  - lesson: >-
      pgvector requires the ::vector cast when writing embedding arrays via parameterized queries. Passing a plain array
      string without the cast results in a type mismatch. Pattern: `[${embedding.join(',')}]::vector` as the parameter
      value.
    category: pattern
    tags:
      - postgresql
      - pgvector
      - embeddings
      - sql
  - lesson: >-
      Exponential backoff reconnect for pg.Client should reset the attempt counter on successful reconnect and re-issue
      LISTEN after the new connection is established — both are required for correct steady-state behavior after a
      transient DB drop.
    category: pattern
    tags:
      - postgresql
      - reconnect
      - backoff
      - listen-notify
