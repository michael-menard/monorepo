lessons_to_record:
  - lesson: >-
      SAVEPOINT + DO block pattern (checking pg_proc before CREATE TRIGGER) is the correct way to write pgtap tests for
      trigger functions that depend on stories not yet deployed. This allows all behavioral assertions to execute via
      manual simulation while protecting the transaction from abort.
    category: pattern
    tags:
      - pgtap
      - database
      - triggers
      - testing
      - isolation
  - lesson: >-
      The pg_isready guard pattern in bash CI scripts (with psql SELECT 1 fallback) correctly prevents hard failures in
      environments without a database container. The exit-0-with-SKIP approach is the right behavior for optional DB
      test suites.
    category: pattern
    tags:
      - bash
      - ci
      - database
      - guard-pattern
      - pgtap
  - lesson: >-
      For stories that produce only SQL and bash artifacts (no TypeScript), the review and verification workflow should
      skip lint/typecheck workers that have no applicability — the 'skipped' verdict is correct, not a gap.
    category: pattern
    tags:
      - workflow
      - review
      - qa
      - sql
      - bash
