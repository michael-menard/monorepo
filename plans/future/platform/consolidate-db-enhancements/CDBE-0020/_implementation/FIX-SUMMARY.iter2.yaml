      (requires). Script executed and confirmed via kb_get_story. CDBE-0020 now has 3 declared dependencies: CDBE-0010,
      CDBE-1020, CDBE-1030.
  - ac: AC-6
    severity: BLOCKER
    description: Added pg_isready guard to scripts/db/run-pgtap.sh
    files_changed:
