note_on_elaboration_gaps: >-
  Elaboration gap resolutions G1 ('created_at') and G2 ('public schema') were incorrect. The actual schema.ts confirms
  telemetry.workflow_events partitioned on ts. The implementation correctly used the actual schema — the developer
  checked schema.ts directly during implementation. The elaboration resolutions were based on stale/incorrect
  pre-drizzle-migration backup schema analysis. No AC failures result from this discrepancy; the implementation is
  correct.
lessons_to_record:
  - lesson: >-
      Elaboration gap resolutions can be wrong if based on pre-migration backup schema rather than current Drizzle
      schema.ts. Always verify against current schema.ts as ground truth, not DB backups.
    category: blocker
    tags:
      - elaboration
      - db-migration
      - schema
  - lesson: >-
      Prettier line-length violations on function signatures are not caught by code review if reviewer does not run
      ESLint locally. QA must run ESLint as a mandatory gate even when code review PASS.
    category: anti_pattern
    tags:
      - prettier
      - eslint
      - code-review
      - qa
  - lesson: >-
      Advisory lock pattern (pg_try_advisory_lock + fixed integer key in constants.ts) for singleton cron jobs is
      well-established in this codebase. New cron jobs should always follow this pattern.
    category: pattern
    tags:
      - cron
      - advisory-lock
      - orchestrator
