architectural_decisions:
  - id: ARCH-001
    question: 'Partition key column name: story description said ''ts'' but elaboration confirmed the actual column is ''created_at'''
    decision: Use created_at as partition key (confirmed by elaboration gap G1)
    rationale: >-
      The actual public.workflow_events table uses created_at as its timestamp column; 'ts' does not exist. Elaboration
      resolved this as a blocking gap.
    decided_by: elaboration
  - id: ARCH-002
    question: >-
      Schema prefix: story description said 'telemetry.workflow_events' but elaboration confirmed table is in public
      schema
    decision: Use public.workflow_events (not telemetry.workflow_events)
    rationale: No telemetry schema exists in the lego_dev DB. Table lives in public schema per elaboration gap G2.
    decided_by: elaboration
  - id: ARCH-003
    question: 'Partition management scheduler mechanism: pg_cron vs Lambda vs orchestrator cron job'
    decision: >-
      Use orchestrator cron job (patternMinerJob pattern) — Node.js cron infrastructure already built and tested
      (APIP-3090)
    rationale: >-
      Elaboration resolved gap G3 to Lambda/Node.js. Story .md and WORKING-SET.md both confirm patternMinerJob pattern
      in packages/backend/orchestrator/src/cron/. No new infrastructure needed. pg_cron requires Aurora cluster
      configuration. Lambda requires SAM/serverless.yml changes. Orchestrator cron is zero-config and already tested.
    decided_by: elaboration
  - id: ARCH-004
    question: 'Migration file location: packages/backend/db/src/migrations/ vs standalone deployment script'
    decision: Create packages/backend/db/src/migrations/ directory and place SQL migration as 001_partition_workflow_events.sql
    rationale: >-
      No existing migrations directory exists in @repo/db (Drizzle manages schema via schema.ts). Since pnpm db:generate
      is broken (WINT-0040) and Drizzle cannot express partitioned tables, a raw SQL migration directory is the correct
      home. Naming convention starts at 001 since no existing numbered migrations are present.
    decided_by: auto
  - id: ARCH-005
    question: 'Archival/detachment of old partitions: include or descope?'
    decision: Descoped as explicit non-goal. Pre-creation only.
    rationale: No data retention policy defined. Elaboration gap G4 resolved this. Story .md non-goals confirm same.
    decided_by: elaboration
complexity: complex
notes:
  - >-
    CRITICAL: elaboration corrected two schema errors from the original story description — partition key is
    'created_at' (not 'ts'), table is 'public.workflow_events' (not 'telemetry.workflow_events'). All migration SQL and
    runPartitionManager() must use these corrected values.
  - >-
    CDBE-5010 is a PRODUCTION DEPLOYMENT blocker only, not an implementation blocker. Steps 1-5 can be implemented in
    parallel with CDBE-5010. Both must be merged before production deployment in the same maintenance window.
  - Migration file directory packages/backend/db/src/migrations/ does not exist yet — must be created as part of step 1.
  - >-
    Partition naming convention: workflow_events_y<YYYY>m<MM> (zero-padded month, e.g., workflow_events_y2026m03). This
    is lowercase only, consistent with PostgreSQL naming conventions.
  - The advisory lock pattern auto-releases when pool.end() is called in the finally block — no manual unlock needed.
  - >-
    Do NOT modify packages/backend/db/src/schema.ts — Drizzle ORM does not support partitioned table definitions. The
    workflowEvents table definition remains as-is; pg driver handles transparent routing.
  - >-
    Partition management job env var filtering: DISABLE_CRON_JOB_PARTITION_MANAGER=true (hyphens in job name
    'partition-manager' become underscores in env key per buildCronRegistry() normalization).
  - >-
    Step 6 (ST-6) is verification-only — no source files to modify. If existing telemetry SDK tests do not exercise the
    partitioned table (they run against a mock/test DB), this step documents the transparent compatibility guarantee.
  - >-
    Opportunity O1 (consolidated partition manager for CDBE-5010 + CDBE-5020 tables) is out of scope for this story.
    Implement for workflow_events only; CDBE-5010 covers agent_invocations and token_usage separately.
  - >-
    Partition table rewrite strategy (for migration SQL): (1) RENAME workflow_events TO workflow_events_old, (2) CREATE
    TABLE workflow_events PARTITION BY RANGE (created_at) with identical columns, (3) CREATE child partitions for
    current+2 months, (4) INSERT INTO workflow_events SELECT * FROM workflow_events_old, (5) DROP TABLE
    workflow_events_old, (6) CREATE indexes on parent. Include IF NOT EXISTS / IF EXISTS guards for idempotency.
