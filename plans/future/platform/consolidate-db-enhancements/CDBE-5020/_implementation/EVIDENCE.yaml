acceptance_criteria:
  - ac_id: AC-1
    status: MET
    evidence_type: file
    description: >-
      SQL migration created at packages/backend/db/src/migrations/001_partition_workflow_events.sql.
      Contains: (a) lego_dev safety preamble (raises exception if current_database() != 'lego_dev'),
      (b) partitioned parent with identical column set via CREATE TABLE PARTITION BY RANGE (ts),
      (c) data migration from workflow_events_old via INSERT SELECT,
      (d) initial partitions for 2026-01 through 2026-05 plus catch-all for prior data,
      (e) all indexes recreated on partitioned parent (idx_workflow_events_event_id_unique,
      idx_workflow_events_event_type_ts, idx_workflow_events_run_id_ts, idx_workflow_events_item_id,
      idx_workflow_events_workflow_name, idx_workflow_events_agent_role, idx_workflow_events_status,
      idx_workflow_events_ts), (f) idempotency guards (DO $$ IF relkind='r' THEN ... ELSE NOTICE).
    files:
      - packages/backend/db/src/migrations/001_partition_workflow_events.sql

  - ac_id: AC-2
    status: MET
    evidence_type: test
    description: >-
      pnpm --filter @repo/db test: 118 tests pass across all telemetry SDK test files including
      src/__tests__/workflow-events.test.ts (31 tests). The telemetry SDK insertWorkflowEvent()
      and batch-insert.ts operate via Drizzle ORM on telemetry.workflow_events — after the partition
      migration, inserts continue to work transparently via PostgreSQL partition routing without any
      application code changes required. Tests use mocked DB client so run independent of migration
      deployment; compatibility is guaranteed by PostgreSQL's transparent partition routing for the
      same INSERT statement.
    command_output: '118 passed (118) — pnpm --filter @repo/db test'

  - ac_id: AC-3
    status: MET
    evidence_type: test
    description: >-
      packages/backend/orchestrator/src/cron/jobs/partition-manager.job.ts exports partitionManagerJob
      with: (a) schedule '0 5 1 * *', (b) advisory lock via tryAcquireAdvisoryLock(LOCK_KEYS.PARTITION_MANAGER),
      (c) lazy import of runPartitionManager, (d) pool.end() in finally block.
      CronJobDefinitionSchema.parse(partitionManagerJob) succeeds in test (a) of partition-manager.test.ts.
    files:
      - packages/backend/orchestrator/src/cron/jobs/partition-manager.job.ts
    command_output: '17 passed — pnpm --filter @repo/orchestrator test -- partition-manager'

  - ac_id: AC-4
    status: MET
    evidence_type: file
    description: >-
      LOCK_KEYS.PARTITION_MANAGER = 42_005 added to packages/backend/orchestrator/src/cron/constants.ts.
      Confirmed does not conflict with existing keys 42_001 (PATTERN_MINER), 42_002 (DEP_AUDIT),
      42_003 (WEEKLY_REPORT), 42_004 (DEAD_CODE_REAPER). pnpm check-types --filter @repo/orchestrator
      exits 0.
    files:
      - packages/backend/orchestrator/src/cron/constants.ts
    command_output: 'pnpm --filter @repo/orchestrator check-types: exit 0'

  - ac_id: AC-5
    status: MET
    evidence_type: test
    description: >-
      runPartitionManager() in partition-manager.ts accepts dbClient (Pool) and optional config
      (PartitionManagerConfig with monthsAhead default 2). Generates correct partition names
      (workflow_events_y<YYYY>m<MM>), executes CREATE TABLE IF NOT EXISTS telemetry.<name>
      PARTITION OF telemetry.workflow_events FOR VALUES FROM ('<start>') TO ('<end>') for each
      upcoming month. Tests cover December->January rollover (workflow_events_y2027m01), February
      boundary, and monthsAhead=2 default.
    files:
      - packages/backend/orchestrator/src/cron/partition-manager.ts
    command_output: '17 passed — pnpm --filter @repo/orchestrator test -- partition-manager'

  - ac_id: AC-6
    status: MET
    evidence_type: test
    description: >-
      DB errors in runPartitionManager are caught per-partition and logged via logger.error with
      partition details (partitionName, rangeFrom, rangeTo, error). The function does not throw.
      IF NOT EXISTS guard prevents duplicate partition error on idempotent runs.
      Test "catches DB error and logged it without crashing (AC-6)" verifies this.
    command_output: '17 passed — pnpm --filter @repo/orchestrator test -- partition-manager'

  - ac_id: AC-7
    status: MET
    evidence_type: test
    description: >-
      partitionManagerJob is imported and exported in packages/backend/orchestrator/src/cron/registry.ts
      via ALL_CRON_JOBS array. buildCronRegistry() filters it when DISABLE_CRON_JOB_PARTITION_MANAGER=true.
      Test "excludes partition-manager when DISABLE_CRON_JOB_PARTITION_MANAGER=true" verifies exclusion.
      Test "includes partition-manager when absent" verifies inclusion.
    files:
      - packages/backend/orchestrator/src/cron/registry.ts
    command_output: '17 passed — pnpm --filter @repo/orchestrator test -- partition-manager'

  - ac_id: AC-8
    status: MET
    evidence_type: test
    description: >-
      PartitionManagerConfigSchema defined as z.object({ monthsAhead: z.number().int().positive().default(2) })
      in partition-manager.ts. No TypeScript interfaces in any new file. Type PartitionManagerConfig
      is z.infer<typeof PartitionManagerConfigSchema>. pnpm check-types exits 0.
    files:
      - packages/backend/orchestrator/src/cron/partition-manager.ts
    command_output: 'pnpm --filter @repo/orchestrator check-types: exit 0'

  - ac_id: AC-9
    status: MET
    evidence_type: test
    description: >-
      partition-manager.test.ts (17 tests) covers: (a) CronJobDefinitionSchema validation,
      (b) advisory lock skip path with mock db returning false, (c) December->January year rollover
      generates workflow_events_y2027m01 with range 2027-01-01 to 2027-02-01, (d) February boundary
      generates correct range ending 2026-03-01, (e) idempotency via IF NOT EXISTS guard (no throw
      on second run), (f) DB error caught and logged, does not crash. Uses InMemoryCronAdapter
      and mock pg Pool.
    files:
      - packages/backend/orchestrator/src/cron/__tests__/partition-manager.test.ts
    command_output: '17 passed — pnpm --filter @repo/orchestrator test -- partition-manager'

  - ac_id: AC-10
    status: MET
    evidence_type: command
    description: >-
      pnpm --filter @repo/orchestrator check-types exits 0 after all changes. No interface keyword
      in any new file (partition-manager.ts, partition-manager.job.ts, partition-manager.test.ts).
      All types derived via z.infer<>.
    command_output: 'pnpm --filter @repo/orchestrator check-types: exit 0'

  - ac_id: AC-11
    status: MET
    evidence_type: manual
    description: >-
      registerCronJobs() in registry.ts calls logger.info('cron.job.registered', { jobName, schedule })
      for each job. When buildCronRegistry([partitionManagerJob]) is called and registerCronJobs is
      invoked, the log 'cron.job.registered' with jobName='partition-manager' and
      schedule='0 5 1 * *' is emitted. This is the same pattern used for all other registered jobs.
      Direct code inspection confirms the logging call at registry.ts line 39.
    files:
      - packages/backend/orchestrator/src/cron/registry.ts

  - ac_id: AC-12
    status: MET
    evidence_type: file
    description: >-
      Migration SQL file contains rollback comment block (lines starting with -- ROLLBACK INSTRUCTIONS)
      documenting inverse steps: rename partitioned table to backup, create plain replacement table,
      INSERT SELECT data back, DROP partitioned table CASCADE (removes all child partitions),
      recreate unique constraint and indexes on plain table.
    files:
      - packages/backend/db/src/migrations/001_partition_workflow_events.sql

