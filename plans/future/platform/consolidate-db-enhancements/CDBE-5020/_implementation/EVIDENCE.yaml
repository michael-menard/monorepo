notes:
  - >-
    CDBE-5010 is a production deployment blocker. Both CDBE-5010 and CDBE-5020 must be deployed
    in the same maintenance window before any AC-2 validation against a live lego_dev database.
  - >-
    Migration includes catch-all partitions for 2026-01 and 2026-02 plus a y2025_and_prior partition
    covering MINVALUE to 2026-01-01 to safely handle historical data migration.
  - >-
    The migration uses hardcoded partition dates (2026-03 through 2026-05). The runPartitionManager
    cron job handles creating future partitions dynamically going forward.
  - >-
    ALL_CRON_JOBS array added to registry.ts provides a canonical job list. The array currently
    contains only partitionManagerJob; other jobs (pattern-miner, dep-audit, etc.) are imported
    separately in their respective graph entry points.
  - >-
    All failing tests in the orchestrator suite (44 failures) are pre-existing regressions from
    other stories (story state enum validation, missing platform.stories.index.md, structurer-affinity).
    None relate to partition-manager code.
