lessons_to_record:
  - lesson: >-
      For pure DDL stories (SQL view migrations), pgtap is the complete test harness — unit, integration, e2e, and build
      checks are all legitimately exempt. The evidence/QA artifacts should record this as status: exempt with an
      explicit reason referencing the relevant AC (e.g. AC-12).
    category: pattern
    tags:
      - ddl
      - pgtap
      - test-strategy
      - exemption
  - lesson: >-
      CREATE OR REPLACE VIEW satisfies both AC-1 (idempotency) and AC-10 (second-run safety) with a single DDL form. No
      DROP VIEW guard is needed. Idempotency should also be tested in pgtap with lives_ok() to provide a runnable proof.
    category: pattern
    tags:
      - ddl
      - idempotency
      - pgtap
      - sql
  - lesson: >-
      LEFT JOIN LATERAL with ON true is the canonical pattern for joining a single latest-row per foreign key in
      PostgreSQL views. It cleanly handles the NULL case (no matching rows) without COALESCE and leverages partial
      indexes efficiently.
    category: pattern
    tags:
      - sql
      - lateral-join
      - postgresql
      - view
