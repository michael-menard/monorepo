    evidence_type: test
architectural_decisions:
  - id: ARCH-001
    question: >-
      story_dependencies AC-2 originally specified DELETE+INSERT pattern, but the UNIQUE constraint uq_story_dependency
      already exists. Should we use ON CONFLICT DO NOTHING (idempotent append) or DELETE+INSERT (replace-all semantics)?
    decision: >-
      Use ON CONFLICT(story_id, depends_on_id) DO NOTHING — idempotent append semantics. The UNIQUE constraint is
      already present and DELETE+INSERT would remove dependencies that are in the DB but not in the incoming payload,
      which is destructive for partial-update calls. AC-3 explicitly acknowledges the UNIQUE constraint exists and
      allows either pattern; we choose the safer approach.
    rationale: >-
      DELETE+INSERT would silently drop existing dependencies not present in the current payload. The idempotent append
      pattern preserves existing data and is consistent with how story_content uses ON CONFLICT by section_name. A
      separate explicit removeStoryDependency operation should be used if deletion is needed.
    decided_by: planner
  - id: ARCH-002
    question: >-
      The story JSONB payload needs to map to workflow.stories, workflow.story_details, workflow.story_content, and
      workflow.story_dependencies. Should story_details be an upsert (INSERT ... ON CONFLICT DO UPDATE) or a plain
      UPDATE?
    decision: >-
      Use INSERT ... ON CONFLICT (story_id) DO UPDATE for story_details — same idempotent pattern as stories. This
      ensures a first-time ingest of a story that has no story_details row yet works correctly without a prior INSERT.
    rationale: >-
      A plain UPDATE would silently no-op if the story_details row doesn't exist yet. INSERT ON CONFLICT handles both
      the new-row and update-in-place cases atomically.
    decided_by: planner
  - id: ARCH-003
    question: >-
      Should the MCP tool accept story_yaml as a raw JSONB object (z.record) or as a fully typed Zod schema matching the
      JSONB shape?
    decision: >-
      Accept story_yaml as z.record(z.unknown()) at the MCP/TypeScript layer, with runtime JSONB schema validation
      enforced inside the stored procedure. The stored procedure is the authoritative validator.
    rationale: >-
      Duplicating the full JSONB shape as a Zod schema in TypeScript creates a second source of truth that can drift
      from the SQL. The stored procedure already validates the JSONB shape (AC-1), so the TypeScript layer only needs to
      ensure the field is present and is an object.
    decided_by: planner
complexity: moderate
