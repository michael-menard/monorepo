issues:
  - id: ISSUE-1
    severity: FAIL
    category: test_quality
    description: >-
      Flaky tmpdir naming in persist-findings.test.ts, persist-trends.test.ts, and deduplicate.test.ts. All three use
      `join(tmpdir(), 'audit-test-' + Date.now())` in beforeEach. When Vitest runs these files in parallel, Date.now()
      returns the same millisecond value causing tmpdir path collisions. One file's afterEach rm -rf destroys the other
      file's testDir mid-test.
    affected_files:
      - packages/backend/orchestrator/src/nodes/audit/__tests__/persist-findings.test.ts
      - packages/backend/orchestrator/src/nodes/audit/__tests__/persist-trends.test.ts
      - packages/backend/orchestrator/src/nodes/audit/__tests__/deduplicate.test.ts
    fix: >-
      Use crypto.randomUUID() or Math.random() appended to Date.now() to ensure unique tmpdir names. Example:
      join(tmpdir(), 'audit-test-' + Date.now() + '-' + Math.random().toString(36).slice(2))
pre_existing_failures:
  - src/nodes/elaboration/__tests__/structurer-affinity.test.ts (4 failures) - from APIP-3050, not AUDT-0030
  - src/models/__tests__/integration.test.ts (2 failures) - strategy version mismatch, pre-existing
  - >-
    src/nodes/health/__tests__/health-gate.integration.test.ts (7 failures) - wint.codebase_health table not migrated in
    test DB, from APIP-4010
lessons_to_record:
  - lesson: >-
      Using Date.now() alone for tmpdir names causes flaky tests when multiple test files with the same naming pattern
      run in parallel under Vitest. Append Math.random() or crypto.randomUUID() to guarantee uniqueness.
    category: anti_pattern
    tags:
      - testing
      - vitest
      - tmpdir
      - flakiness
  - lesson: >-
      Hermetic test isolation via optional auditDir/plansDir parameters passed to node functions is an effective pattern
      for testing filesystem-dependent audit nodes without mocking fs.
    category: pattern
    tags:
      - testing
      - audit
      - backend
      - hermetic
