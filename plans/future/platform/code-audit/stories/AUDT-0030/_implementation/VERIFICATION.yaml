test_quality:
  verdict: FAIL
  anti_patterns:
    - >-
      persist-findings.test.ts and persist-trends.test.ts use Date.now() for tmpdir naming, causing intermittent ENOENT
      failures when run in parallel with other test files that use the same naming pattern. Specifically:
      audit-test-${Date.now()} collides across deduplicate.test.ts, persist-findings.test.ts, and
      persist-trends.test.ts. Tests pass in isolation but fail ~50% of the time when run together.
    - scan-scope.test.ts (pre-existing, not AUDT-0030) also uses same tmpdir naming pattern
  flakiness_confirmed: true
  flakiness_root_cause: >-
    Three test files all use `join(tmpdir(), 'audit-test-' + Date.now())` in beforeEach. Vitest runs test files in
    parallel; when tests start within the same millisecond, they get identical tmpdir paths. One file's afterEach
    cleanup (rm -rf) destroys files written by the other file's test body.
