  code_style_compliance: |
    Follows CLAUDE.md conventions:
    - No semicolons ✓
    - Single quotes ✓ (except where necessary for template literals and jsx)
    - Named imports from vitest, path, fs ✓
    - Async/await patterns (createFile async, beforeEach/afterEach async) ✓
    - Function declarations (makeState, createFile) ✓
    - Proper indentation (2 spaces) ✓
