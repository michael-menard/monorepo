      - "test-infrastructure"
    title: "All 9 lens tests use Date.now() for temp dir uniqueness; crypto.randomUUID() would be more robust"
    content: |
      - **Finding**: Under fast parallel test execution, two tests starting within the same millisecond
        could theoretically produce identical `Date.now()` values and collide on temp dir names.
      - **Impact**: Low | **Effort**: Low
      - **Why non-blocking**: Collision has not been observed in practice. Vitest parallelizes at the
        file level (not test level within a file), so same-millisecond collisions within a file are
        impossible. Cross-file collision is theoretically possible but astronomically unlikely.
      - **Recommendation**: Replace `Date.now()` with `Math.random().toString(36).slice(2)` in all 9
        `beforeEach` blocks for robustness. One-line change per file, 9 files total.
      - **Suggested timing**: Batch change in any future test infrastructure cleanup.

