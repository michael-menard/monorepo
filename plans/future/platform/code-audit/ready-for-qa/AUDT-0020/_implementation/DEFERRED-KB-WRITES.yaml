        this is acceptable. As the codebase grows or external repos are audited, a 1MB+ file could
        slow down a full scan.
      - **Impact**: Medium | **Effort**: Medium
      - **Why non-blocking**: Current monorepo largest source files are <300KB. No performance issue observed.
      - **Recommendation**: Defer to AUDT-0030 or a dedicated tech-debt story. Implement a shared
        `guardFileSizeKB(content, limitKB)` utility in a new `nodes/audit/utils.ts` and test it
        independently. Suggested limit: 1MB (1024KB).
      - **Suggested story**: post-AUDT-0030 tech-debt
      - **Affected files**: All `nodes/audit/lens-*.ts` implementations

