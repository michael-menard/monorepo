      - "lens-security"
    title: "Binary file guard not implemented in lens-security; null-byte check would prevent false positives"
    content: |
      - **Finding**: `readFile(path, 'utf-8')` on binary content silently returns garbled text. The
        security lens is highest-risk for false positives because keyword patterns (secrets, eval, etc.)
        could match binary noise from accidentally included `.wasm` or compiled artifacts.
      - **Impact**: Medium | **Effort**: Low
      - **Why non-blocking**: Current codebase does not contain binary files in source directories.
        AC-11 (binary buffer test) is being added in ST-3 of AUDT-0020. If that test reveals real
        false positives, promote the implementation guard to current scope.
      - **Recommendation**: If AC-11 test does not reveal false positives, add to lens-security.ts
        implementation as a 2-line guard post-AUDT-0020: `if (content.includes('\x00')) return emptyResult`.
      - **Suggested story**: post-AUDT-0020 tech-debt
      - **Conditional**: Only implement if AC-11 test in ST-3 reveals actual false positives.

