architectural_decisions: []
complexity: moderate
notes:
  - >-
    ST-1 is the sole prerequisite for ST-3, ST-4, ST-6 — it adds optional path params without changing defaults, so
    production behavior is preserved
  - >-
    ST-2 and ST-5 have no dependency on ST-1 — synthesize, devils-advocate, and roundtable nodes are pure state
    transformations with no filesystem I/O
  - >-
    Finding ID ordering discrepancy: runDevilsAdvocate receives findings from lensResults with id:'' — tests must set
    explicit non-empty IDs on fixture findings for challengeMap lookup to work
  - 'E2E target: use packages/backend/orchestrator/src/artifacts/ as fixture — stable, small, no binary files'
  - All filesystem nodes use tmpdir() + beforeEach/afterEach cleanup pattern from scan-scope.test.ts
  - 'Zod compliance pattern: const parsed = parse(yamlContent); expect(() => Schema.parse(parsed)).not.toThrow()'
  - >-
    deduplicate.ts already has loadExistingStoryTitles accepting plansDir — the export function deduplicate(state) just
    needs the param added
  - persistFindings hardcodes auditDir='plans/audit' inline at line 62 — needs to be param
  - persistTrends hardcodes auditDir='plans/audit' at lines 58 and 59 — needs to be param
