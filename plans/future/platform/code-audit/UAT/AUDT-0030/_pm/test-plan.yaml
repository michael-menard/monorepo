strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "synthesize merges lens results, deduplicates by file+title, sorts by severity, assigns sequential IDs"
    setup: "Construct CodeAuditState with lensResults containing 3 findings — two with same file+title but different severity (critical vs medium), one unique high-severity finding"
    action: "Call synthesize(state) directly"
    expected: "Output has 2 findings (duplicate merged to critical), sorted critical→high, IDs AUDIT-001 and AUDIT-002"
    evidence: "synthesize.ts lines 26-55: dedupMap key is file+title, severity comparison uses SEVERITY_ORDER, forEach assigns padded IDs"

  - id: HP-2
    title: "synthesize caps output at 100 findings"
    setup: "Construct CodeAuditState with lensResults containing 105 findings (all unique file+title pairs)"
    action: "Call synthesize(state) directly"
    expected: "state.findings has exactly 100 entries; no throw"
    evidence: "synthesize.ts line 55: deduped.slice(0, 100)"

  - id: HP-3
    title: "deduplicate flags >0.8 Jaccard similarity finding as 'duplicate'"
    setup: |
      Create temp dir with plans/future/test-feature/stories.index.md containing:
      '| TEST-001 | Remove Hardcoded API Keys from Config Files | backlog |'
      Construct state.findings with one finding titled 'Hardcoded API Keys in Config Files'
    action: "Call deduplicate(state) with plansDir pointing to temp dir (after refactor)"
    expected: "finding.dedup_check.verdict === 'duplicate', similarity_score > 0.8"
    evidence: "deduplicate.ts lines 74-79: wordSimilarity threshold 0.8"

  - id: HP-4
    title: "deduplicate flags <0.5 Jaccard similarity finding as 'new'"
    setup: "Same temp dir with TEST-001; finding titled 'Missing ARIA Labels on Buttons'"
    action: "Call deduplicate(state)"
    expected: "finding.dedup_check.verdict === 'new', similar_stories: []"
    evidence: "deduplicate.ts lines 88-93: else branch for similarity < 0.5"

  - id: HP-5
    title: "persistFindings writes FINDINGS-{date}.yaml matching AuditFindingsSchema"
    setup: |
      Construct full CodeAuditState with mode: 'pipeline', scope: 'full', target: tmpDir, lenses: ['security'],
      2 findings, deduplicationResult populated. Pass auditDir param (tmpDir) after refactor.
    action: "Call persistFindings(state) with auditDir = tmpDir"
    expected: "FINDINGS-{today}.yaml written; AuditFindingsSchema.parse(parsedYaml) does not throw; fields schema, timestamp, mode, scope, target, lenses_run, summary, findings, metrics all present"
    evidence: "persist-findings.ts lines 37-84; AuditFindingsSchema in artifacts/audit-findings.ts lines 138-156"

  - id: HP-6
    title: "persistTrends aggregates 2+ FINDINGS files and writes TRENDS.yaml matching TrendSnapshotSchema"
    setup: |
      Create tmpDir with 2 synthetic FINDINGS YAML files (different dates, different finding counts).
      Pre-populate state as needed.
    action: "Call persistTrends(state) with auditDir = tmpDir"
    expected: "TRENDS.yaml written; TrendSnapshotSchema.parse(parsedYaml) does not throw; audits_analyzed >= 2; timeline.length >= 2"
    evidence: "persist-trends.ts lines 57-152; TrendSnapshotSchema lines 254-292"

  - id: HP-7
    title: "runDevilsAdvocate schema compliance — ChallengeResultSchema valid"
    setup: "Construct state.lensResults with 3 findings of mixed confidence/severity"
    action: "Call runDevilsAdvocate(state)"
    expected: "ChallengeResultSchema.parse(result.devilsAdvocateResult) does not throw; total_reviewed === 3"
    evidence: "devils-advocate.ts lines 77-105; ChallengeResultSchema lines 179-198"

  - id: HP-8
    title: "runDevilsAdvocate downgrades low-confidence high-severity finding"
    setup: "Construct finding with confidence: 'low', severity: 'high'"
    action: "Call runDevilsAdvocate(state)"
    expected: "challenge.decision === 'downgraded', challenge.final_severity === 'medium'"
    evidence: "devils-advocate.ts lines 25-31: low confidence → downgradeSeverity"

  - id: HP-9
    title: "runDevilsAdvocate downgrades test-file high-severity finding to medium"
    setup: "Construct finding with file: 'src/__tests__/auth.test.ts', severity: 'high', confidence: 'high'"
    action: "Call runDevilsAdvocate(state)"
    expected: "challenge.decision === 'downgraded', challenge.final_severity === 'medium'"
    evidence: "devils-advocate.ts lines 34-45"

  - id: HP-10
    title: "runRoundtable excludes false_positive findings from vetted_findings"
    setup: |
      Construct state.lensResults with 2 findings (id: 'fp-1', id: 'confirm-1').
      Construct state.devilsAdvocateResult with challenges:
        [{finding_id: 'fp-1', decision: 'false_positive', ...}, {finding_id: 'confirm-1', decision: 'confirmed', ...}]
    action: "Call runRoundtable(state)"
    expected: "roundtableResult.vetted_count === 1; vetted_findings contains only 'confirm-1'; removed.false_positives === 1"
    evidence: "roundtable.ts lines 49-53"

  - id: HP-11
    title: "runRoundtable schema compliance — RoundtableResultSchema valid"
    setup: "Full state with lensResults + devilsAdvocateResult"
    action: "Call runRoundtable(state)"
    expected: "RoundtableResultSchema.parse(result.roundtableResult) does not throw"
    evidence: "RoundtableResultSchema lines 202-222"

  - id: HP-12
    title: "Pipeline mode E2E — runCodeAudit writes FINDINGS and TRENDS to tmpDir"
    setup: |
      Create tmpDir with a small fixture directory (3 .ts files from orchestrator/src/artifacts/).
      Override auditDir to tmpDir.
    action: "Call runCodeAudit({ mode: 'pipeline', lenses: ['security'], target: fixtureDir })"
    expected: "FINDINGS-{date}.yaml and TRENDS.yaml written; AuditFindingsSchema.parse() and TrendSnapshotSchema.parse() both no-throw"
    evidence: "code-audit.ts runCodeAudit lines 316-334"

  - id: HP-13
    title: "Roundtable mode E2E — runCodeAudit exercises devil's advocate + roundtable nodes"
    setup: "Same fixture dir as HP-12, mode: 'roundtable'"
    action: "Call runCodeAudit({ mode: 'roundtable', lenses: ['security'], target: fixtureDir })"
    expected: "FINDINGS-{date}.yaml written; AuditFindingsSchema.parse() no-throw"
    evidence: "code-audit.ts graph routing: lens_parallel → devils_advocate → roundtable → synthesize → ..."

error_cases:
  - id: EC-1
    title: "persistTrends empty-summaries early return — no FINDINGS files in auditDir"
    setup: "Create empty tmpDir; pass as auditDir to persistTrends"
    action: "Call persistTrends(state) with empty auditDir"
    expected: "Returns { completed: true } without throwing; TRENDS.yaml NOT written"
    evidence: "persist-trends.ts lines 61-63: summaries.length === 0 early return"

  - id: EC-2
    title: "persistFindings write failure — returns error in state.errors"
    setup: "Pass read-only auditDir or non-writable path; construct minimal state"
    action: "Call persistFindings(state)"
    expected: "Returns { auditFindings, errors: ['Failed to write ...'] }; does not throw"
    evidence: "persist-findings.ts lines 76-79: catch block appends to errors"

  - id: EC-3
    title: "deduplicate handles empty findings list"
    setup: "Construct state with findings: []"
    action: "Call deduplicate(state)"
    expected: "DedupResultSchema.parse(result.deduplicationResult) no-throw; total_checked: 0, duplicates_found: 0"
    evidence: "deduplicate.ts line 57: const findings = state.findings || []"

  - id: EC-4
    title: "runRoundtable with no devilsAdvocateResult — passes all findings through"
    setup: "Construct state with lensResults but devilsAdvocateResult: null"
    action: "Call runRoundtable(state)"
    expected: "vetted_count === original_count; removed.false_positives === 0"
    evidence: "roundtable.ts lines 22-33: !daResult early return"

  - id: EC-5
    title: "synthesize with empty lensResults — returns empty findings array"
    setup: "Construct state with lensResults: []"
    action: "Call synthesize(state)"
    expected: "state.findings === []; no throw"
    evidence: "synthesize.ts lines 21-22: flatMap on empty array"

edge_cases:
  - id: ED-1
    title: "synthesize deduplication — same file + different titles produce two findings"
    setup: "Two findings with same file but different titles, both severity: 'high'"
    action: "Call synthesize(state)"
    expected: "output.findings.length === 2; both retained with AUDIT-001 and AUDIT-002"
    evidence: "synthesize.ts line 27: key is file + title"

  - id: ED-2
    title: "deduplicate 0.5–0.8 Jaccard similarity — flags as 'related'"
    setup: "Story title with partial word overlap (4/7 words shared); finding with same partial overlap"
    action: "Call deduplicate(state)"
    expected: "finding.dedup_check.verdict === 'related'; similarity_score between 0.5 and 0.8"
    evidence: "deduplicate.ts lines 80-84"

  - id: ED-3
    title: "persistTrends timeline has exactly N entries for N FINDINGS files"
    setup: "Pre-populate tmpDir with 3 FINDINGS YAML files at different dates"
    action: "Call persistTrends(state)"
    expected: "trendSnapshot.timeline.length === 3; audits_analyzed === 3"
    evidence: "persist-trends.ts lines 113-120"

  - id: ED-4
    title: "runRoundtable cross-references detected — same file flagged by two lenses"
    setup: |
      Two findings from different lenses (security + typescript) on the same file.
      Both confirmed by devil's advocate.
    action: "Call runRoundtable(state)"
    expected: "roundtableResult.cross_references.length >= 1; relationship string mentions both lenses"
    evidence: "roundtable.ts lines 102-119"

  - id: ED-5
    title: "runDevilsAdvocate config/setup file downgrade"
    setup: "Finding with file: 'vite.config.ts', severity: 'high', confidence: 'high'"
    action: "Call runDevilsAdvocate(state)"
    expected: "challenge.decision === 'downgraded', final_severity === 'medium'"
    evidence: "devils-advocate.ts lines 48-56"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "AuditFindingsSchema.parse(parsedYaml) — no throw"
      - "TrendSnapshotSchema.parse(parsedYaml) — no throw"
      - "DedupResultSchema.parse(result.deduplicationResult) — no throw"
      - "ChallengeResultSchema.parse(result.devilsAdvocateResult) — no throw"
      - "RoundtableResultSchema.parse(result.roundtableResult) — no throw"
      - "pnpm test --filter orchestrator passes green"
      - "pnpm check-types --filter orchestrator passes with no new errors"

manual_cases: []

fixture_definitions:
  - name: makeAuditFinding
    type: "helper function"
    description: "Builds a minimal AuditFinding with overrideable fields. id defaults to '', status defaults to 'new'."
  - name: makeLensResult
    type: "helper function"
    description: "Wraps an array of AuditFindings into a LensResult with correct by_severity counts."
  - name: makeCodeAuditState
    type: "helper function"
    description: "Builds a partial CodeAuditState (Partial<CodeAuditState>) for direct node invocation."
  - name: syntheticFindingsYaml
    type: "file fixture"
    description: "Minimal FINDINGS-{date}.yaml YAML string with schema:1, summary.total_findings, and findings:[] for use in persistTrends temp dir."
  - name: syntheticStoriesIndex
    type: "file fixture"
    description: "Minimal stories.index.md content with one pipe-table row containing a known story title for Jaccard similarity tests."

risks:
  - "deduplicate node hardcodes 'plans' path — requires refactor to accept plansDir param OR careful temp directory setup that mirrors real path structure. Recommend refactor (3-line change)."
  - "persistFindings hardcodes 'plans/audit' path — requires refactor to accept auditDir param. Without it, all tests pollute the real audit directory."
  - "persistTrends hardcodes 'plans/audit' path — same refactor needed."
  - "Finding IDs are empty string before synthesize runs — devil's advocate and roundtable tests must manually set id fields on fixture findings to test the challengeMap lookup."
  - "E2E tests that call runCodeAudit() go through the full graph including real lens nodes — keep lenses:['security'] and use a tiny fixture directory to prevent timeouts."
