    title: "Refactor deduplicate, persist-findings, persist-trends to accept optional path params"
    goal: "Add optional plansDir param to deduplicate and optional auditDir param to persistFindings/persistTrends so tests can redirect filesystem I/O to temp directories"
    files_to_read:
      - "packages/backend/orchestrator/src/nodes/audit/deduplicate.ts"
      - "packages/backend/orchestrator/src/nodes/audit/persist-findings.ts"
      - "packages/backend/orchestrator/src/nodes/audit/persist-trends.ts"
    files_to_modify:
      - "packages/backend/orchestrator/src/nodes/audit/deduplicate.ts"
      - "packages/backend/orchestrator/src/nodes/audit/persist-findings.ts"
      - "packages/backend/orchestrator/src/nodes/audit/persist-trends.ts"
    acs: ["AC-1", "AC-2", "AC-3", "AC-4", "AC-5"]
    depends_on: "none"
    verification: "pnpm check-types --filter orchestrator"
    estimated_tokens: 4000

