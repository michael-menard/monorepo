feasible: true
confidence: high
rationale: |
  All 6 orchestration nodes are fully implemented with no stubs. The test pattern is already established
  by scan-scope.test.ts. The primary work is authoring test files and performing two small refactors
  (adding optional auditDir/plansDir parameters) to make nodes testable without filesystem pollution.
  The devil's advocate / roundtable state coupling is the most complex setup but is tractable.
  AUDT-0020 dependency is in UAT — implementation must wait for it to clear.
complexity: medium
change_surface:
  areas:
    - "packages/backend/orchestrator/src/nodes/audit/deduplicate.ts (add optional plansDir param)"
    - "packages/backend/orchestrator/src/nodes/audit/persist-findings.ts (add optional auditDir param)"
    - "packages/backend/orchestrator/src/nodes/audit/persist-trends.ts (add optional auditDir param)"
    - "packages/backend/orchestrator/src/nodes/audit/__tests__/ (new test files x6)"
    - "packages/backend/orchestrator/src/graphs/__tests__/code-audit.integration.test.ts (new E2E file)"
  endpoints: []
  deploy_touchpoints: []

risks:
  - finding: "persistFindings and persistTrends hardcode 'plans/audit' path — tests will pollute real audit directory without refactor"
    mitigation: "Add optional auditDir parameter defaulting to 'plans/audit' in both nodes. 5-line change each. Graph wrapper passes undefined to use default. Test passes tmpDir."
  - finding: "deduplicate hardcodes loadExistingStoryTitles('plans') — tests will scan real monorepo plans/ directory"
    mitigation: "Add optional plansDir parameter defaulting to 'plans'. 3-line change. Test passes temp dir containing a minimal plans/future/test/stories.index.md fixture."
  - finding: "Finding IDs are empty string before synthesize runs — runDevilsAdvocate and runRoundtable receive findings with id:'' in real pipeline"
    mitigation: "For unit tests of devil's advocate and roundtable, manually set id fields on fixture findings. For the roundtable unit test, the challengeMap lookup by finding_id will work correctly with explicit IDs. This is a data consistency issue in the real pipeline (not a blocker for tests) — document in test comments."

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter orchestrator passes green after all new test files added"
  - "pnpm check-types --filter orchestrator passes with no new type errors"
  - "AuditFindingsSchema.parse() called in every persistFindings test without throw"
  - "TrendSnapshotSchema.parse() called in every persistTrends test without throw"
  - "DedupResultSchema.parse() called in deduplicate tests without throw"
  - "ChallengeResultSchema.parse() called in devils-advocate tests without throw"
  - "RoundtableResultSchema.parse() called in roundtable tests without throw"
  - "tmpdir() used for all filesystem I/O in tests; afterEach cleanup verified"

subtasks:
