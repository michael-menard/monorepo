notable_decisions:
  - id: D-1
    description: "syncStatus 'synced' in output schema vs 'completed' in DB"
    rationale: "kbar_sync_status DB enum does not have 'synced'. Output schema SyncArtifactToDatabaseOutputSchema uses z.enum(['synced','skipped','failed']) to distinguish artifact sync results from KBAR-0030 story sync results which use 'completed'. DB artifact rows use syncStatus: 'completed' (valid enum value)."
  - id: D-2
    description: "conflictsDetected omitted from BatchSyncByTypeOutputSchema"
    rationale: "Batch-by-type discovery does not invoke conflict detection as a separate step — conflicts would need to be explicitly detected per artifact. Omission is intentional per AC-10 documentation requirement."
  - id: D-3
    description: "triggeredBy uses ?? operator to handle undefined from Zod .default()"
    rationale: "Zod schema uses .default('user') but TypeScript infers the field as string | undefined after transform. Using triggeredBy ?? 'user' ensures DB inserts receive a string."

known_deviations:
  - id: KD-1
    description: "Integration tests are skipped without testcontainers (CI environment)"
    impact: low
    rationale: "Integration tests in artifact-sync.integration.test.ts are structurally valid but require a live PostgreSQL instance. They run via testcontainers in local development. Unit tests cover all AC scenarios."
  - id: KD-2
    description: "conflictsDetected field not in BatchSyncByTypeOutputSchema"
    impact: low
    rationale: "Batch-by-type does not run conflict detection as part of its flow. Documented in AC-10."

