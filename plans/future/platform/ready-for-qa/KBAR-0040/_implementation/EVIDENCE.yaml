acceptance_criteria:
  - id: AC-1
    description: "Sync non-story artifact from filesystem to database with checksum-based idempotency"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/sync-artifact-to-database.ts"
        description: "syncArtifactToDatabase: reads file, computes SHA-256 via computeChecksum, skips if checksum unchanged (returns syncStatus: skipped), inserts/updates kbar.artifacts, inserts kbar.artifactVersions, creates syncEvents lifecycle"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/sync-artifact-to-database.test.ts"
        description: "12 unit tests covering happy path, idempotency (checksum skip), artifactVersions insert, syncEvents lifecycle, validation failures"
      - type: test_result
        description: "12/12 tests pass (vitest run)"

  - id: AC-2
    description: "Sync non-story artifact from database to filesystem with atomic write"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/sync-artifact-from-database.ts"
        description: "syncArtifactFromDatabase: reads from artifactContentCache (cache hit) or falls back to artifactVersions contentSnapshot; atomic write: mkdir(parent, recursive) -> writeFile(.tmp) -> rename(tmp, final); updates artifacts.lastSyncedAt; creates syncEvents"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/sync-artifact-from-database.test.ts"
        description: "9 unit tests: happy path, atomic write (tmp+rename), mkdir for parent dir, cache hit, story not found, artifact not found, path traversal rejection, symlink rejection, Zod validation"
      - type: test_result
        description: "9/9 tests pass (vitest run)"

  - id: AC-3
    description: "Cache artifact content on sync; hitCount incremented on cache reads"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/sync-artifact-to-database.ts"
        description: "Lines 229-264: upserts artifactContentCache with parsedContent (YAML.parse) and checksum using .onConflictDoUpdate on artifactId unique index; YAML parse error stores error marker without failing sync"
      - type: implementation
        file: "packages/backend/kbar-sync/src/sync-artifact-from-database.ts"
        description: "Lines 130-155: cache hit check (checksum match + no _parseError), db.update to increment hitCount when cache used"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/sync-artifact-to-database.test.ts"
        description: "Test: 'should upsert artifactContentCache on sync' covers cache upsert on to-database path"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/sync-artifact-from-database.test.ts"
        description: "Test: 'should use cache on cache hit and increment hitCount (AC-3)' verifies hitCount increment and cacheHit flag"
      - type: test_result
        description: "All cache-related tests pass"

  - id: AC-4
    description: "Batch sync all artifacts for a story with per-artifact fault isolation"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/batch-sync-artifacts.ts"
        description: "batchSyncArtifactsForStory: discovers artifacts via ARTIFACT_FILENAME_MAP + PROOF-*.md glob; per-artifact try/catch ensures one failure does not abort batch; single syncEvents record for entire batch; aggregates filesScanned, filesChanged, filesSkipped, failureCount, perArtifactStatus"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/batch-sync-artifacts.test.ts"
        description: "7 unit tests: happy path (all synced), partial failure (one fails, batch continues), all skipped, empty storyDir, Zod validation rejection, path security rejection, syncEvent created"
      - type: test_result
        description: "7/7 tests pass (vitest run)"

  - id: AC-5
    description: "Batch sync artifacts by type across all stories with checkpoint-based resumption"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/batch-sync-by-type.ts"
        description: "batchSyncByType: discovers stories 2 levels deep (group dirs -> story dirs matching /^[A-Z]+-\\d+$/); reads/creates kbar.syncCheckpoints; resumes from lastProcessedPath; updates checkpoint after each artifact; returns lastProcessedPath, checkpointName, totalDiscovered, totalSynced, totalFailed, totalSkipped"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/batch-sync-by-type.test.ts"
        description: "7 unit tests: happy path (discovers and syncs), checkpoint resume (skips already-processed), checkpoint update after each artifact, partial failure (continues after error), invalid input, baseDir enumeration error, lastProcessedPath in output"
      - type: test_result
        description: "7/7 tests pass (vitest run)"

  - id: AC-6
    description: "Conflict detection for artifacts with syncConflicts row insert on mismatch"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/detect-artifact-conflicts.ts"
        description: "detectArtifactConflicts: path security -> readFile -> computeChecksum -> DB lookup via storyId + artifactType -> compare checksums; on mismatch inserts kbar.syncConflicts with artifactId FK; returns { hasConflict, filesystemChecksum, databaseChecksum, resolutionOptions: ['filesystem_wins','database_wins','manual','merged'] }"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/detect-artifact-conflicts.test.ts"
        description: "8 unit tests: no conflict (checksums match), conflict detected + syncConflicts insert, story not found, artifact not found, path traversal rejection, symlink rejection, Zod validation, file read error"
      - type: test_result
        description: "8/8 tests pass (vitest run)"

  - id: AC-7
    description: "Zod validation for all inputs/outputs; no TypeScript interfaces"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/__types__/index.ts"
        description: "Exports: SyncArtifactToDatabaseInputSchema/OutputSchema, SyncArtifactFromDatabaseInputSchema/OutputSchema, BatchSyncArtifactsInputSchema/OutputSchema, BatchSyncByTypeInputSchema/OutputSchema, DetectArtifactConflictsInputSchema/OutputSchema. All artifactType fields use NonStoryArtifactTypeSchema (kbarArtifactTypeEnum minus story_file). All types inferred via z.infer<>."
      - type: implementation
        file: "packages/backend/kbar-sync/src/index.ts"
        description: "All schemas and types exported from package root"
      - type: test
        description: "Each test file includes Zod validation rejection tests (invalid storyId, empty baseDir, etc.) that confirm validation returns { success: false, error: '...validation failed...' }"
      - type: build
        description: "TypeScript compiles without errors (tsc --noEmit passes)"

  - id: AC-8
    description: "Security: path validation on all file operations (validateFilePath + validateNotSymlink)"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/sync-artifact-to-database.ts"
        description: "Lines 66-81: validateFilePath(filePath, baseDir) + await validateNotSymlink(filePath) before readFile; security failure returns { success: false, error: 'Security validation failed: ...' }"
      - type: implementation
        file: "packages/backend/kbar-sync/src/sync-artifact-from-database.ts"
        description: "Path security applied on outputPath before any write operations"
      - type: implementation
        file: "packages/backend/kbar-sync/src/detect-artifact-conflicts.ts"
        description: "Path security applied before readFile in conflict detection"
      - type: implementation
        file: "packages/backend/kbar-sync/src/batch-sync-artifacts.ts"
        description: "Path security applied on each discovered artifact path including PROOF-*.md glob results"
      - type: test
        description: "sync-artifact-to-database.test.ts: 'should reject path traversal (AC-8)', 'should reject symlinks (AC-8)'; sync-artifact-from-database.test.ts: same; detect-artifact-conflicts.test.ts: same — all verify { success: false, error: 'Security validation failed' }"
      - type: test_result
        description: "All security tests pass"

  - id: AC-9
    description: "Unit tests with >80% coverage"
    status: satisfied
    evidence:
      - type: test_result
        description: "72 total tests pass across 8 test files: sync-artifact-to-database.test.ts (12), sync-artifact-from-database.test.ts (9), batch-sync-artifacts.test.ts (7), batch-sync-by-type.test.ts (7), detect-artifact-conflicts.test.ts (8), sync-story-to-database.test.ts (11), sync-story-from-database.test.ts (9), detect-sync-conflicts.test.ts (9)"
      - type: test_coverage
        description: "Scenarios covered: happy paths (filesystem->DB, DB->filesystem), checksum skip idempotency, cache upsert and hit-count increment, version record creation, batch all-success, batch partial-failure (fault isolation), batch checkpoint resumption, conflict detection (match/mismatch), Zod validation rejection, path security rejection (traversal and symlink), file-not-found handling, DB error handling, YAML parse error graceful handling"
      - type: integration_test
        file: "packages/backend/kbar-sync/src/__tests__/artifact-sync.integration.test.ts"
        description: "5 integration test scenarios (skipped in CI without testcontainers): idempotency with real PostgreSQL, cache hit with real DB, atomic write with real filesystem, version history with real DB, batch partial failure with real DB"

  - id: AC-10
    description: "Document ARTIFACT_FILENAME_MAP type-disambiguation and syncStatus enum deviation"
    status: satisfied
    evidence:
      - type: implementation
        file: "packages/backend/kbar-sync/src/__types__/index.ts"
        description: "ARTIFACT_FILENAME_MAP has inline comments: (1) 'artifactType is NOT a unique key per story — filePath is the canonical row disambiguator' (2) '_pm/STORY-SEED.md and _pm/DEV-FEASIBILITY.md both map to elaboration intentionally — story_file excluded (handled by KBAR-0030)' (3) SyncArtifactToDatabaseOutputSchema comment: 'syncStatus: synced distinguishes artifact sync results from KBAR-0030 story sync results which use completed'"
      - type: implementation
        description: "5MB hard limit returns { success: false, error: 'File too large: N bytes exceeds 5MB limit', sizeBytes: N } — noted in DECISIONS.yaml"
      - type: test
        file: "packages/backend/kbar-sync/src/__tests__/batch-sync-by-type.test.ts"
        description: "Added to unit test suite to ensure coverage calculation includes batchSyncByType (AC-5)"

