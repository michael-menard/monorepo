      **[KBAR-0040] Edge Cases Discovered**

      - **BatchSyncByTypeOutput missing conflictsDetected**: BatchSyncArtifactsOutputSchema
        includes conflictsDetected count but BatchSyncByTypeOutputSchema does not. This
        asymmetry could confuse callers of batchSyncByType who expect consistent conflict
        reporting across batch functions.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Add conflictsDetected to BatchSyncByTypeOutputSchema in a follow-up
        or clarify the omission in AC-5 as intentional during implementation.

