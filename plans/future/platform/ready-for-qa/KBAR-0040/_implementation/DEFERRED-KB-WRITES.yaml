    content: |
      **[KBAR-0040] Edge Cases Discovered**

      - **Cache TTL not configurable per artifact type**: artifactContentCache TTL is hardcoded
        to 24h default. Checkpoint artifacts change frequently (potentially multiple times per
        day) and would benefit from a shorter TTL (e.g., 1h). Evidence artifacts rarely change
        and could use a longer TTL.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Track as KBAR-0040 follow-up. Add per-type TTL config map when
        monitoring reveals stale cache issues.

