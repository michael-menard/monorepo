      **[KBAR-0040] Observability Opportunities**

      - **Batch metrics emission**: Batch functions return aggregate counts but do not emit
        structured telemetry events with per-artifact detail beyond the summary. Future KBAR
        tooling (KBAR-0110, KBAR-0140) would benefit from richer batch event records.
      - **Impact**: Low | **Effort**: Medium
      - **Recommendation**: Add structured metric emission when TELE-0010 (Docker Telemetry
        Stack) is complete.

