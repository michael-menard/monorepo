    content: |
      **[KBAR-0040] Integration Opportunities**

      - **Conflict auto-resolution for simple cases**: AC-6 intentionally defers conflict
        resolution. For the common case where the filesystem version is newer than DB (common
        after manual edits), an opt-in resolveWith: 'filesystem_wins' parameter could be
        accepted by detectArtifactConflicts to immediately apply resolution.
      - **Impact**: Medium | **Effort**: Medium
      - **Recommendation**: Defer to a future KBAR conflict resolution story. The resolutionOptions
        array returned by AC-6 already sets up the interface for this.

