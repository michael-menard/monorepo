    content: |
      **[KBAR-0040] Schema / Type Evolution Opportunity**

      - **'feasibility' artifact type not in enum**: _pm/DEV-FEASIBILITY.md currently maps to
        'elaboration' type in ARTIFACT_FILENAME_MAP. If a DEV-FEASIBILITY.md-specific type
        is needed in future, kbarArtifactTypeEnum would require a DDL extension.
      - **Current state**: Confirmed safe — no unique constraint on (storyId, artifactType) in
        kbar.artifacts. Two 'elaboration' rows per story are permitted.
      - **Impact**: Low | **Effort**: Medium
      - **Recommendation**: Track as a future KBAR schema story when feasibility-specific
        querying is required.

