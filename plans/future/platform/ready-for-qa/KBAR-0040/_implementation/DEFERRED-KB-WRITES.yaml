    content: |
      **[KBAR-0040] Future Opportunities**

      - **Progress reporting in batch sync**: batchSyncByType (AC-5) returns a summary result
        only at completion. For long-running bootstraps (hundreds of stories, 1000+ artifacts),
        a progress callback or event emitter would allow KBAR-0050 CLI to display a progress bar.
      - **Impact**: Medium | **Effort**: Medium
      - **Recommendation**: Implement in KBAR-0050 or KBAR-0060. Add optional onProgress callback
        parameter to batchSyncByType in a future iteration.

