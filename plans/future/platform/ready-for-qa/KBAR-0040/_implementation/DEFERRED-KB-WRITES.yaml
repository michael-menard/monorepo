    content: |
      **[KBAR-0040] Performance Opportunities**

      - **Bulk insert for batch artifact rows**: batchSyncArtifactsForStory calls
        syncArtifactToDatabase per artifact — one transaction per artifact. For large batches,
        a bulk-upsert path (single multi-row insert with ON CONFLICT DO UPDATE) would
        dramatically reduce DB round trips.
      - **Impact**: Medium | **Effort**: High
      - **Recommendation**: Defer to a future KBAR performance story. Current per-artifact
        approach is acceptable for MVP bootstrap scenarios.

