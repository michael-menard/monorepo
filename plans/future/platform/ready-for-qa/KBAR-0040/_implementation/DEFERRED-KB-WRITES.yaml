      **[KBAR-0040] Edge Cases Discovered**

      - **Batch discovery merge algorithm unspecified**: ARTIFACT_FILENAME_MAP uses static keys
        but PROOF-*.md files require glob pattern matching. The algorithm to merge static-key
        matches with glob-pattern matches during batch file discovery in batchSyncArtifactsForStory
        is not defined in any AC. Clarify in AC-4 or Architecture Notes.
      - **Impact**: Low | **Effort**: Low
      - **Recommendation**: Add a sentence to AC-4 or Architecture Notes clarifying static/glob
        composition during batch file discovery.

