  - lesson: "Clarify migration deployment timeline"
    context: "Story mentions generating migration scripts but deployment deferred to WINT-1090"
    recommendation: "Explicitly document when scripts are generated vs deployed"

  - lesson: "Enum migrations are complex and require data transformation"
    context: "Hyphenated vs underscored enums create compatibility issues across codebase"
    recommendation: "Consider dual enum period to avoid breaking changes"

  - lesson: "Two databases can coexist during migration phase"
    context: "Main app database and knowledge-base database operate independently"
    recommendation: "Document coexistence strategy and source of truth boundaries"

  - lesson: "pgvector extension must be validated before migration"
    context: "Migration assumes pgvector is installed, but no pre-flight check"
    recommendation: "Add pgvector extension validation to pre-migration checks"

  - lesson: "Drizzle ORM adoption for existing codebases requires separate story"
