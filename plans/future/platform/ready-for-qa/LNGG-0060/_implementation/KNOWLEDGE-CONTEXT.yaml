## Lessons Learned from LNGG-0010

### Lesson 1: Schema Mismatch Blocker

**Context**: LNGG-0010 was blocked for 3 iterations due to StoryArtifact type missing `content?: string` field.

**Root Cause**: Adapter assumed content field existed, but schema didn't define it.

**Impact on LNGG-0060**:
- AC-9 requires pre-implementation schema survey to identify missing optional fields
- Extend CheckpointSchema with discovered optional fields (e2e_gate, completed_at, qa_verdict)
- Use .passthrough() to preserve unknown fields for backward compatibility

**Mitigation**:
- Survey 10+ existing CHECKPOINT.yaml files before coding (completed in Phase 0)
- Add optional fields to CheckpointSchema for high-frequency extras
- Test with real checkpoint files, not just synthetic fixtures

### Lesson 2: Logger API Confusion

**Context**: LNGG-0010 had 16 compilation errors due to incorrect logger method names.

**Root Cause**: Used logger.log() instead of logger.info().

**Impact on LNGG-0060**:
- Use only: logger.error(), logger.warn(), logger.info(), logger.debug()
- Never use: logger.log() (doesn't exist)
- Check @repo/logger API before writing logging code

**Correct Usage**:
```typescript
logger.info('Checkpoint file read successfully', { filePath, storyId })
logger.debug('Phase advanced', { from: oldPhase, to: newPhase })
logger.warn('Legacy phase format detected', { phase: numericPhase })
```

### Lesson 3: Import Path Extensions Required

**Context**: LNGG-0010 required .js extensions in import paths for ESM compatibility.

**Example**:
```typescript
// CORRECT
import { writeFileAtomic } from './utils/file-utils.js'

// WRONG (causes compilation error)
import { writeFileAtomic } from './utils/file-utils'
```

**Impact on LNGG-0060**:
- All relative imports must include .js extension
- Package imports (e.g., @repo/logger) do NOT need extension
- Check existing adapters for correct import format

### Lesson 4: Batch Operation Error Handling

**Context**: readBatch must continue on individual errors, not throw on first failure.

**Pattern**:
```typescript
await Promise.all(
  filePaths.map(async filePath => {
    try {
      const checkpoint = await this.read(filePath)
      results.push(checkpoint)
    } catch (error) {
      errors.push({ filePath, error: error as Error })
    }
  })
)

return { results, errors }  // Both successes and failures
```

**Impact on LNGG-0060**:
- CheckpointAdapter.readBatch must match this pattern
- Caller decides whether partial failures are acceptable
- Logging should occur at info level for failures (not error)

