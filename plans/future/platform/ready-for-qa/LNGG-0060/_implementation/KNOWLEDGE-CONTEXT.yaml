## Known Architectural Decisions from LNGG-0010

### ADR-001: Use Zod for Runtime Validation

**Decision**: All file adapters use Zod schemas for runtime validation, not just TypeScript types.

**Rationale**: TypeScript types are compile-time only; Zod provides runtime validation and type inference.

**Impact on LNGG-0060**:
- CheckpointSchema must use z.infer<> for type generation
- All read/write operations must validate against CheckpointSchema
- ValidationError must include Zod error details

**Example**:
```typescript
import { CheckpointSchema, type Checkpoint } from '../artifacts/checkpoint.js'

const result = CheckpointSchema.safeParse(data)
if (!result.success) {
  throw new ValidationError(filePath, result.error.errors)
}
```

### ADR-002: Atomic Writes via Temp File + Rename

**Decision**: All write operations use temp file + rename pattern to prevent corruption.

**Rationale**: Prevents partial file corruption if write operation fails mid-way. Rename is atomic on POSIX systems.

**Impact on LNGG-0060**:
- Reuse writeFileAtomic from file-utils.ts
- Temp file must use .tmp extension
- Cleanup must happen in error handler

**Trade-offs Accepted**:
- Slight performance overhead (extra rename operation)
- Temp file cleanup on error (not guaranteed if process crashes)
- Assumes POSIX filesystem (atomic rename)

### ADR-003: Error Types Extend Base Error Class

**Decision**: Custom error types extend base Error class with additional context.

**Rationale**: Type-safe error handling, better error messages, structured logging.

**Impact on LNGG-0060**:
- Create CheckpointNotFoundError extending StoryFileAdapterError
- Reuse ValidationError, ReadError, WriteError from __types__/index.ts
- Include filePath in all error constructors

**Example**:
```typescript
export class CheckpointNotFoundError extends StoryFileAdapterError {
  constructor(public readonly filePath: string) {
    super(`Checkpoint file not found: ${filePath}`, { filePath })
    this.name = 'CheckpointNotFoundError'
  }
}
```

### ADR-004: Logging via @repo/logger, not console

**Decision**: Use @repo/logger for all logging, never console.log.

**Rationale**: Structured logging, log levels, consistent format across codebase.

**Impact on LNGG-0060**:
```typescript
import { logger } from '@repo/logger'

logger.info('Reading checkpoint file', { filePath, storyId })
logger.debug('Checkpoint validated', { phase: checkpoint.current_phase })
logger.warn('Numeric phase detected', { phase: rawPhase })
```

**Levels**:
- error: Unhandled errors, throw after logging
- warn: Expected edge cases (legacy formats, deprecations)
- info: Key operations (read, write, update)
- debug: Detailed execution (validation, temp file paths)

