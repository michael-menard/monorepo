### Pattern 2: Atomic Write Implementation

**Source**: `packages/backend/orchestrator/src/adapters/utils/file-utils.ts`

**Pattern**: writeFileAtomic function
```typescript
export async function writeFileAtomic(filePath: string, content: string): Promise<void> {
  const tempPath = `${filePath}.tmp`
  try {
    await ensureDirectory(path.dirname(filePath))
    await fs.writeFile(tempPath, content, 'utf-8')
    await fs.rename(tempPath, filePath)  // Atomic rename
    logger.debug('File written atomically', { filePath })
  } catch (error) {
    try { await fs.unlink(tempPath) } catch {}  // Cleanup temp file
    throw new WriteError(filePath, error as Error)
  }
}
```

**Reuse Strategy**:
- Import writeFileAtomic directly from utils/file-utils.ts
- Already implements parent directory creation via ensureDirectory()
- Already handles temp file cleanup on error
- No modification needed for CheckpointAdapter

**Critical Success Factors**:
- Temp file must use .tmp extension
- Cleanup must happen in catch block (try/catch inside catch)
- Parent directory creation must happen before write
- Rename is atomic on POSIX filesystems (prevents corruption)

### Pattern 3: Zod Validation with Error Handling

**Source**: `packages/backend/orchestrator/src/adapters/story-file-adapter.ts` (lines 85-93)

**Pattern**: safeParse with ValidationError
```typescript
const result = StoryArtifactSchema.safeParse(parsed.frontmatter)

if (!result.success) {
  const errors = result.error.errors.map(err => ({
    path: err.path.map(String),
    message: err.message,
  }))
  throw new ValidationError(filePath, errors)
}

return result.data  // Type-narrowed to StoryArtifact
```

**Adaptation for CheckpointAdapter**:
- Replace StoryArtifactSchema with CheckpointSchema
- Same error mapping pattern (path + message)
- Same ValidationError constructor signature
- Return result.data (type-narrowed to Checkpoint)

**Key Insights**:
- Use safeParse (not parse) to get ZodError details
- Map ZodError.errors to simplified { path, message } format
- ValidationError class already exists in __types__/index.ts
- Type narrowing happens automatically after successful validation

### Pattern 4: File Read with Custom Error Types

**Source**: `packages/backend/orchestrator/src/adapters/story-file-adapter.ts` (lines 74-109)

**Pattern**: readFileSafe + ENOENT handling
```typescript
try {
  const content = await readFileSafe(filePath)
  const parsed = parseFrontmatter(content, filePath)
  const result = CheckpointSchema.safeParse(parsed)
  // ... validation ...
} catch (error) {
  if ((error as NodeJS.ErrnoException).code === 'ENOENT') {
    throw new StoryNotFoundError(filePath)
  }
  throw error
}
```

**Adaptation for CheckpointAdapter**:
- Create CheckpointNotFoundError (same pattern as StoryNotFoundError)
- Add to __types__/index.ts
- Same ENOENT detection logic
- readFileSafe already handles other read errors as ReadError

**Error Hierarchy**:
```
Error
└─ StoryFileAdapterError (base)
   ├─ StoryNotFoundError (ENOENT)
   ├─ CheckpointNotFoundError (ENOENT) ← NEW
   ├─ InvalidYAMLError (parse failure)
   ├─ ValidationError (Zod schema mismatch)
   ├─ ReadError (other read failures)
   └─ WriteError (write failures)
```

### Pattern 5: Batch Read Operation

**Source**: `packages/backend/orchestrator/src/adapters/story-file-adapter.ts` (lines 213-245)

**Pattern**: Parallel reads with error collection
```typescript
async readBatch(filePaths: string[]): Promise<BatchReadResult> {
  const results: StoryArtifact[] = []
  const errors: Array<{ filePath: string; error: Error }> = []

  await Promise.all(
    filePaths.map(async filePath => {
      try {
        const story = await this.read(filePath)
        results.push(story)
      } catch (error) {
        errors.push({ filePath, error: error as Error })
      }
    })
  )

  return { results, errors }
}
```

**Adaptation for CheckpointAdapter**:
- Replace StoryArtifact with Checkpoint
- Same BatchReadResult interface pattern
- Same Promise.all with error collection
- Continue on individual errors (don't throw on first failure)

**Key Insights**:
- Uses Promise.all for parallel execution
- Errors don't fail entire batch
- Both results and errors are returned together
- Caller decides how to handle partial failures

### Pattern 6: YAML Parsing (Checkpoint-specific)

**Source**: `packages/backend/orchestrator/src/adapters/utils/yaml-parser.ts`

**Existing Pattern**: parseFrontmatter (for story files with --- delimiters)
```typescript
export function parseFrontmatter(fileContent: string, filePath: string): ParsedStory {
  const result = matter(fileContent)  // gray-matter library
  return {
    frontmatter: result.data,
    content: result.content.trim(),
  }
}
```

**Checkpoint Adaptation Required**:
- Checkpoint files are pure YAML (no markdown content)
- Do NOT use gray-matter (overkill for pure YAML)
- Use js-yaml directly: `yaml.load(content)`
- Create new parseCheckpointYAML function in yaml-parser.ts or inline in adapter

**Recommended Approach**:
```typescript
import yaml from 'js-yaml'

function parseCheckpointYAML(content: string, filePath: string): unknown {
  try {
    return yaml.load(content)
  } catch (error) {
    throw new InvalidYAMLError(filePath, error as Error)
  }
}
```

**Rationale**: Checkpoint files don't have frontmatter delimiters, so gray-matter is not needed.

