- **Tags**: non-blocking, observability, telemetry, monitoring, performance

## Enhancement Opportunities (8 entries)

### Enhancement 1: Batch write operation missing
- **Category**: ux-polish
- **Impact**: Medium - Dashboard/bulk updates require serial writes
- **Effort**: Low
- **Recommendation**: Add `writeBatch(updates: Array<{filePath, checkpoint}>): Promise<BatchWriteResult>` for parallel atomic writes. Useful for batch checkpoint updates.
- **Tags**: enhancement, ux-polish, batch-operations, performance

### Enhancement 2: Schema migration helper needed
- **Category**: future-proofing
- **Impact**: Medium - Need migration path when CheckpointSchema v2 arrives for 100+ files
- **Effort**: Medium
- **Recommendation**: Add `migrateCheckpoint(v1Checkpoint): v2Checkpoint` helper function. Enables gradual migration of 100+ existing files when schema evolves.
- **Tags**: enhancement, future-proofing, schema-migration, v2-preparation

### Enhancement 3: Validation-only mode missing
- **Category**: ux-polish
- **Impact**: Low - Cannot validate checkpoints without reading full file
- **Effort**: Low
- **Recommendation**: Add `validate(filePath): Promise<ValidationResult>` method that checks schema compliance without parsing content field. Useful for CI/pre-commit hooks.
- **Tags**: enhancement, ux-polish, validation, ci-integration

### Enhancement 4: Partial update with validation bypass
- **Category**: edge-case
- **Impact**: Low - update() always validates merged result, blocks intentional schema violations during migration
- **Effort**: Low
- **Recommendation**: Add optional `{ skipValidation: true }` flag to update() for migration scenarios where temporary schema violations are acceptable.
- **Tags**: enhancement, edge-case, migration, validation-bypass

### Enhancement 5: JSON export/import for API exposure
- **Category**: integration
- **Impact**: Medium - No way to convert checkpoint to/from JSON for REST APIs
- **Effort**: Low
- **Recommendation**: Add `toJSON(checkpoint): JSONCheckpoint` and `fromJSON(json): Checkpoint` helpers. Enables REST API endpoints for checkpoint inspection (future WINT stories).
- **Tags**: enhancement, integration, json, api, future-wint

### Enhancement 6: Checkpoint templating
- **Category**: ux-polish
- **Impact**: Low - Each new checkpoint created from scratch
- **Effort**: Low
- **Recommendation**: Add `createFromTemplate(storyId, featureDir, template: CheckpointTemplate)` factory with common templates (feature, bug-fix, infrastructure). Reduces boilerplate.
- **Tags**: enhancement, ux-polish, templating, developer-experience

### Enhancement 7: Watch mode for checkpoint changes
- **Category**: integration
- **Impact**: Medium - Dashboard cannot reactively update on checkpoint writes
- **Effort**: High - Requires event emitter pattern
- **Recommendation**: Add optional `watch(filePath, callback)` method using Node.js fs.watch. Enables real-time dashboard updates. Requires event emitter pattern.
- **Tags**: enhancement, integration, watch-mode, dashboard, real-time

### Enhancement 8: Checkpoint schema inference
- **Category**: future-proofing
- **Impact**: Low - No way to detect schema version from file content before parsing
- **Effort**: Low
- **Recommendation**: Add `detectSchemaVersion(filePath): Promise<number>` that peeks at schema field without full parse. Enables smart version routing when v2 arrives.
- **Tags**: enhancement, future-proofing, schema-version, smart-routing

