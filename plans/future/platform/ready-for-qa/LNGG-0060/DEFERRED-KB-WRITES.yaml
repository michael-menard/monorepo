### Gap 2: No concurrent access locking at file level
- **Category**: architecture-decision
- **Impact**: Low - Workflow-level locking already handled by idempotency.ts
- **Effort**: Medium
- **Recommendation**: Document that file-level locking is NOT provided by adapter (out of scope per Non-Goals). Consumers must handle concurrency via workflow-level phase locking.
- **Tags**: non-blocking, concurrency, documented-limitation, architecture

