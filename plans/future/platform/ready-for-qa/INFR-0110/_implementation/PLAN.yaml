architectural_decisions:
  - id: ARCH-001
    question: "Where to define artifact_type_enum - artifacts schema or public schema?"
    decision: "Define in public schema for cross-namespace reusability"
    rationale: "KBAR sync tools need to reference artifact types from both artifacts and kbar schemas. Placing enum in public schema avoids cross-schema dependencies and allows INFR-0120 to add remaining 3 types without ALTER TYPE"
    decided_by: agent

  - id: ARCH-002
    question: "JSONB denormalization vs normalized tables for acceptance_criteria, file_changes?"
    decision: "Use JSONB arrays for co-location"
    rationale: "Max ~20 ACs per story, ~50 file changes per plan. JSONB fits performance profile (<100KB), simplifies queries, matches WINT-0010 pattern. No current need to query individual ACs"
    decided_by: agent

  - id: ARCH-003
    question: "Foreign key cascade behavior - CASCADE, RESTRICT, or SET NULL?"
    decision: "Use ON DELETE CASCADE for all artifact FKs to wint.stories"
    rationale: "Story deletion should automatically clean up artifacts, prevents orphaned records. Story deletion is rare and intentional. Document in SCHEMA-REFERENCE.md with warning"
    decided_by: agent

  - id: ARCH-004
    question: "Index strategy - which columns to index?"
    decision: "Composite indexes on (story_id, artifact_type), (created_at DESC), (story_id, phase)"
    rationale: "Supports common query patterns: filter by story + type, time-range queries, checkpoint phase queries. Avoid GIN indexes on JSONB until performance optimization needed"
    decided_by: agent

complexity: moderate

