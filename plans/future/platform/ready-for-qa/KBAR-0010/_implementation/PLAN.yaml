notes:
  - "Following WINT schema pattern from migration 0015_messy_sugar_man.sql"
  - "All enums prefixed with 'kbar_' to avoid namespace collisions"
  - "CASCADE delete behavior defined for artifacts, story_states, story_dependencies on stories delete"
  - "JSONB metadata columns for extensible story and artifact metadata"
  - "All FK columns indexed for query performance"
  - "Zod schemas auto-generated via drizzle-zod (createInsertSchema, createSelectSchema)"
  - "Unit tests written alongside schema implementation to avoid post-implementation fix phase"
  - "Migration is idempotent (CREATE SCHEMA IF NOT EXISTS, CREATE TABLE IF NOT EXISTS)"
