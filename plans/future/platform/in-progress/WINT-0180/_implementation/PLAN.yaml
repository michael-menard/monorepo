architectural_decisions:
  - id: "ARCH-001"
    question: "Storage strategy: database table, filesystem YAML, or hybrid?"
    decision: "Hybrid approach - database table (wint.examples) for common examples, filesystem YAML for agent-specific examples"
    rationale: "Balances queryability with simplicity. Common examples in database enable ML pipeline and cross-agent learning. Agent-specific examples in frontmatter enable quick iteration without migrations. Progressive enhancement path."
    decided_by: user

  - id: "ARCH-002"
    question: "Schema versioning strategy: semver or simple integer?"
    decision: "Semantic versioning (semver)"
    rationale: "Follows industry standard, enables clear communication of breaking vs additive changes. Field: schema_version: string (e.g., '1.0.0')"
    decided_by: agent

  - id: "ARCH-003"
    question: "Query function error handling: throw or return empty array?"
    decision: "Return empty array, never throw"
    rationale: "Graceful degradation. Agent can continue with no examples rather than crashing on query failure"
    decided_by: agent

  - id: "ARCH-004"
    question: "Create KB-AGENT-INTEGRATION.md or extend decision-handling.md?"
    decision: "Create separate examples-framework.md and extend decision-handling.md"
    rationale: "KB-AGENT-INTEGRATION.md not found at expected location. Separate framework doc keeps concerns isolated while decision-handling.md integration shows usage"
    decided_by: agent

complexity: moderate

notes:
  - "DECISION RESOLVED: Hybrid storage strategy chosen (wint.examples table + inline agent examples)"
  - "Database table: For common examples shared across agents, ML training data"
