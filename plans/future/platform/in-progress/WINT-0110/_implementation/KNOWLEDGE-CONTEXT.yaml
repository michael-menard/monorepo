error_handling:
  - pattern: "Resilient error handling (never throw on DB errors)"
    example: |
      try {
        await db.insert(contextSessions).values(...)
      } catch (error) {
        logger.warn('[mcp-tools] Failed to create session:', error)
        // Do NOT throw - log and continue
      }

  - pattern: "Fail fast on input validation errors"
    example: |
      const validated = SessionCreateInputSchema.parse(input) // Throws on invalid input

  - pattern: "Return clear error messages for business logic failures"
    example: |
      if (!session) {
        throw new Error('Session not found')
      }
      if (session.endedAt !== null) {
        throw new Error('Session already completed')
      }

performance_notes:
  - "Use composite index (agentName, storyId) for filtered queries"
  - "Default limit=50 for session_query to prevent unbounded results"
  - "Use SQL arithmetic (input_tokens + ?) for incremental mode to avoid race conditions"
  - "Batch operations not needed - session management is low-volume"

validation_rules:
  - "sessionId: UUID format string (z.string().uuid())"
  - "Token counts: non-negative integers (z.number().int().min(0))"
  - "agentName: non-empty string (z.string().min(1))"
  - "mode: enum 'incremental' | 'absolute' with default 'incremental'"
  - "dryRun: boolean with default true"
  - "retentionDays: positive integer (z.number().int().min(1))"
  - "limit: positive integer with default 50, max 1000"
  - "offset: non-negative integer with default 0"

concurrency_handling:
  - scenario: "Multiple agents updating same session"
    mitigation: "Incremental mode uses SQL arithmetic to avoid race conditions"
    sql_example: "UPDATE sessions SET input_tokens = input_tokens + $1"

  - scenario: "Session already completed"
    mitigation: "Check endedAt IS NULL before allowing updates"
    error: "Session already completed"

safety_mechanisms:
  - mechanism: "dryRun=true default for session_cleanup"
    enforcement: "Zod schema default value"
    override: "Must explicitly pass dryRun=false"

  - mechanism: "Active session protection"
    enforcement: "WHERE endedAt IS NOT NULL in cleanup query"
    guarantee: "Never deletes sessions with endedAt=null"

  - mechanism: "Retention validation"
    enforcement: "Positive integer validation for retentionDays"
    error: "Prevents negative or zero retention periods"

