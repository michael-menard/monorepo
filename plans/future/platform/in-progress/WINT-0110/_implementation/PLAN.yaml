architectural_decisions:
  - id: ARCH-001
    question: "Package location for MCP tools infrastructure"
    decision: "packages/backend/mcp-tools/"
    rationale: "New standalone package for reusability across future MCP tool development. Separates MCP infrastructure from orchestrator and db packages."
    decided_by: auto

  - id: ARCH-002
    question: "Default mode for session_update incremental vs absolute"
    decision: "mode='incremental' as default"
    rationale: "Safer default prevents accidental token count overwrites. Incremental mode uses SQL arithmetic for concurrent-safe updates."
    decided_by: auto

  - id: ARCH-003
    question: "Default dryRun value for session_cleanup"
    decision: "dryRun=true as default"
    rationale: "High-severity safety mechanism. Requires explicit opt-in (dryRun=false) to prevent accidental data deletion."
    decided_by: auto

  - id: ARCH-004
    question: "Query result ordering for session_query"
    decision: "ORDER BY started_at DESC (most recent first)"
    rationale: "Aligns with typical use case of viewing recent sessions first. Matches existing WINT schema patterns."
    decided_by: auto

  - id: ARCH-005
    question: "Schema reuse vs custom Zod schemas"
    decision: "Use auto-generated Drizzle Zod schemas from @repo/db for output types, custom Zod schemas for tool inputs"
    rationale: "Reuses existing schema infrastructure. Input schemas need tool-specific validation (defaults, optionals) that differ from DB schema."
    decided_by: auto

complexity: moderate

notes:
  - "Schema already exists in wint.contextSessions (WINT-0010), no migrations needed"
  - "Pattern follows insertWorkflowEvent() from @repo/db for resilient error handling"
  - "Test pattern follows workflow-events.test.ts: mock db, validate inputs, check error paths"
  - "All tools are standalone functions, MCP server integration deferred to future story"
  - "Each tool function will be async and return Promise for database operations"
  - "Use drizzle-orm's eq, and, isNull, isNotNull, lt, desc for type-safe queries"
  - "Import contextSessions schema and auto-generated Zod schemas from @repo/db"
  - "Session IDs use text field (not UUID type) to match schema - auto-generate UUID string with crypto.randomUUID()"
  - "NO BARREL FILES - import directly from source files (session-create.ts, session-update.ts, etc.)"
  - "Each tool exports named functions - consumers import from specific files, not index.ts"
