blocking_issues:
  - issue_id: BLOCK-001
    title: "Drizzle ORM Version Mismatch"
    description: |
      Multiple drizzle-orm versions resolved by pnpm:
      - drizzle-orm@0.44.7 (from database-schema@0.44.3)
      - drizzle-orm@0.38.4 (cached from previous db/mcp-tools versions)

      TypeScript cannot reconcile types between these versions.

    impact: "Blocks TypeScript compilation and test execution"
    resolution_steps:
      - "Update @repo/db package.json to use drizzle-orm@0.44.3 (currently 0.38.3)"
      - "Run: pnpm store prune (clears pnpm cache)"
      - "Run: rm -rf node_modules/.pnpm/drizzle-orm@0.38.*"
      - "Run: pnpm install --force"
      - "Run: pnpm build --filter @repo/db --filter @repo/mcp-tools --force"
      - "Run: pnpm test --filter @repo/mcp-tools"
    estimated_time: "5-10 minutes"

  - issue_id: BLOCK-002
    title: "E2E Gate Status"
    description: "Story marked for E2E testing, but these are backend tools with no user-facing components"
    impact: "None - backend infrastructure story"
    resolution: "Update story to mark E2E gate as EXEMPT"
    estimated_time: "1 minute"

architectural_decisions_made:
  - id: ARCH-001
    decision: "Package location: packages/backend/mcp-tools/"
    rationale: "New standalone package for MCP infrastructure, reusable for future tools"

  - id: ARCH-002
    decision: "Default mode='incremental' for session_update"
    rationale: "Safer default, uses SQL arithmetic for concurrent-safe updates"

  - id: ARCH-003
    decision: "Default dryRun=true for session_cleanup"
    rationale: "High-severity safety - requires explicit opt-in to delete data"

  - id: ARCH-004
    decision: "ORDER BY started_at DESC for session_query"
    rationale: "Most recent sessions first, aligns with typical use case"

  - id: ARCH-005
    decision: "Re-use auto-generated Drizzle Zod schemas from @repo/db for output types"
    rationale: "Avoids schema duplication, ensures consistency with database"

  - id: ARCH-006
    decision: "NO BARREL FILES - direct imports from source files"
    rationale: "Per CLAUDE.md requirements, import directly from session-create.ts, etc."

  - id: ARCH-007
    decision: "Import from '@repo/db' not '@repo/db/client' or '@repo/db/schema'"
    rationale: "Package exports configuration - main export includes all schemas"

