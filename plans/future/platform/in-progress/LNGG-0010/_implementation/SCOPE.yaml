schema: 1
story_id: LNGG-0010
timestamp: "2026-02-13T21:45:00Z"
gen_mode: false

touches:
  backend: true
  frontend: false
  packages: true
  db: false
  contracts: false
  ui: false
  infra: false

touched_paths_globs:
  - "packages/backend/orchestrator/src/adapters/**"
  - "packages/backend/orchestrator/src/artifacts/**"
  - "packages/backend/orchestrator/__tests__/**"

risk_flags:
  auth: false
  payments: false
  migrations: false
  external_apis: false
  security: true
  performance: true

summary: "Create type-safe Story File Adapter for YAML read/write with backward-compatible schema support"
elaboration: completed

# Acceptance Criteria from story
acceptance_criteria:
  - id: AC-1
    description: Adapter reads existing story YAML files and parses into typed StoryArtifact objects using Zod validation
    testable: true
    priority: critical

  - id: AC-2
    description: Adapter writes StoryArtifact objects to disk with valid YAML frontmatter + Markdown content
    testable: true
    priority: critical

  - id: AC-3
    description: Adapter updates existing story files (merges frontmatter changes, preserves content)
    testable: true
    priority: high

  - id: AC-4
    description: Adapter validates story structure before read/write operations
    testable: true
    priority: high

  - id: AC-5
    description: Adapter uses atomic writes (temp file + rename) to prevent partial corruption
    testable: true
    priority: high

  - id: AC-6
    description: Adapter handles error conditions gracefully with typed errors
    testable: true
    priority: high

  - id: AC-7
    description: Adapter handles schema compatibility with existing story files using backward-compatible StoryArtifactSchema v2
    testable: true
    priority: critical

# Key files to create/modify
key_files:
  create:
    - packages/backend/orchestrator/src/adapters/story-file-adapter.ts
    - packages/backend/orchestrator/src/adapters/__tests__/story-file-adapter.test.ts
    - packages/backend/orchestrator/src/adapters/__tests__/story-file-adapter.integration.test.ts
    - packages/backend/orchestrator/src/adapters/__types__/index.ts
    - packages/backend/orchestrator/src/adapters/utils/yaml-parser.ts
    - packages/backend/orchestrator/src/adapters/utils/file-utils.ts
    - packages/backend/orchestrator/src/adapters/__tests__/fixtures/minimal-story.yaml
    - packages/backend/orchestrator/src/adapters/__tests__/fixtures/full-story.yaml
    - packages/backend/orchestrator/src/adapters/__tests__/fixtures/invalid-missing-id.yaml

  modify:
    - packages/backend/orchestrator/package.json  # Add gray-matter and js-yaml dependencies

# Dependencies
dependencies:
  external_packages:
    - gray-matter@^4.0.3
    - js-yaml@^4.1.0
    - "@types/js-yaml@^4.0.5"

  internal_packages:
    - "@repo/logger"
    - "zod"

  blocking_stories: []

  depends_on_features: []

# Key constraints
constraints:
  - requirement: "Zod-first types - use z.infer<> for all types, never TypeScript interfaces"
    source: CLAUDE.md
    enforced_by: linting

  - requirement: "No barrel files - import directly from source files"
    source: CLAUDE.md
    enforced_by: linting

  - requirement: "Use @repo/logger instead of console.log"
    source: CLAUDE.md
    enforced_by: linting

  - requirement: "Backward-compatible schema v2 must support both legacy and new formats"
    source: story.yaml (RISK-1 mitigation, RESOLUTION-SUMMARY.md)
    enforced_by: tests

  - requirement: "Atomic writes required - prevent partial file corruption"
    source: story.yaml (AC-5)
    enforced_by: tests

  - requirement: "Performance targets: single read <100ms, batch read (50 files) <5s"
    source: story.yaml
    enforced_by: benchmarking

  - requirement: "Handle 50+ existing story files without breaking changes"
    source: RESOLUTION-SUMMARY.md
    enforced_by: integration tests

# Quality gates
quality_gates:
  - gate: TypeScript compilation
    command: "pnpm check-types"
    required: true

  - gate: ESLint
    command: "pnpm lint"
    required: true

  - gate: Unit tests
    command: "pnpm test packages/backend/orchestrator/src/adapters"
    required: true
    coverage_minimum: 80

  - gate: Integration tests
    command: "pnpm test packages/backend/orchestrator/src/adapters/__tests__/story-file-adapter.integration.test.ts"
    required: true

  - gate: Type checking
    command: "pnpm check-types packages/backend/orchestrator"
    required: true

# Implementation phases
implementation_phases:
  phase_1:
    name: "Core read/write implementation"
    effort_days: 1-2
    outputs:
      - story-file-adapter.ts (main class)
      - yaml-parser.ts (utilities)
      - file-utils.ts (atomic write helpers)
      - Basic unit tests

  phase_2:
    name: "Validation & error handling"
    effort_days: 1
    outputs:
      - Error class hierarchy
      - Validation logic
      - Error handling tests

  phase_3:
    name: "Update & batch operations"
    effort_days: 1
    outputs:
      - update() method
      - readBatch() method
      - exists() method
      - Batch operation tests

  phase_4:
    name: "Integration & compatibility"
    effort_days: 1
    outputs:
      - Integration tests with real story files
      - Backward-compatibility validation
      - Performance benchmarks

  phase_5:
    name: "Polish & documentation"
    effort_days: 0.5
    outputs:
      - Inline documentation
      - Error message polish
      - Final test coverage

# Schema decision
schema_resolution:
  status: resolved
  approach: "Option A - Backward-Compatible Schema (v2)"
  files_created:
    - packages/backend/orchestrator/src/artifacts/story-v2-compatible.ts
    - packages/backend/orchestrator/src/artifacts/__tests__/story-v2-compatible.test.ts
  blockers_unblocked: 1
  notes: "Existing 50+ story files now compatible without migration"
