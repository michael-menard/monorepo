# Issues Found
issues:
  - issue_id: CRITICAL-1
    severity: critical
    category: build_failure
    title: "TypeScript compilation failure - logger API signature mismatch"
    description: |
      All logger calls use incorrect signature:
      - Current (incorrect): logger.info({ filePath }, 'Reading story file')
      - Expected (correct): logger.info('Reading story file', { filePath })

      The SimpleLogger from @repo/logger expects (message, ...args) but the
      implementation uses (object, message) which is the pino.js API.

      This affects 16 call sites across 3 files.
    files_affected:
      - src/adapters/story-file-adapter.ts (10 calls)
      - src/adapters/utils/file-utils.ts (2 calls)
      - src/adapters/utils/yaml-parser.ts (4 calls)
    fix_required: |
      Change all logger calls from:
        logger.info({ data }, 'message')
      To:
        logger.info('message', { data })
    blocks_acceptance: true

  - issue_id: HIGH-1
    severity: high
    category: test_coverage
    title: "Vitest doesn't catch TypeScript errors in strict mode"
    description: |
      Tests pass in vitest but TypeScript compilation fails. This is because
      vitest transpiles TypeScript without strict type checking. The build
      step (tsc) is what catches these errors.

      This is a workflow issue - tests should not pass if build would fail.
    fix_required: |
      Add TypeScript checking to test phase OR ensure build runs before tests
      in the verification workflow.
    blocks_acceptance: false
    note_for_future: "Consider running tsc --noEmit before vitest in CI/CD"

