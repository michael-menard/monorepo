    code: "TS-001"
    severity: "high"
    domain: "typescript"
    title: "Type Assertion without Proper Type Narrowing"
    file: "packages/backend/kbar-sync/src/__types__/index.ts"
    line: 240
    issue: |
      Line 240 uses '(error as any).code === ENOENT' to check for file not found.
      This bypasses TypeScript type checking with 'as any' type assertion.
      Proper type narrowing with type guards should be used instead.
    context: "validateNotSymlink() function uses (error as any).code === 'ENOENT'"
    auto_fixable: false
    fix_strategy: |
      1. Create a type guard function: function isNodeError(error: unknown): error is NodeJS.ErrnoException
      2. Use type guard instead of 'as any' assertion
      3. Access error.code safely after type narrowing
      4. Add unit test verifying type guard works correctly

