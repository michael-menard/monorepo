architectural_decisions:
  - id: ARCH-001
    question: "Conflict resolution strategy when both filesystem and database have changed since last sync?"
    decision: "Log conflict to syncConflicts table and return conflict status. Require manual resolution (no automatic merge)."
    rationale: "Safer approach for MVP. Automatic merge could cause data loss. Manual resolution ensures user review of conflicting changes."
    decided_by: story_scope

  - id: ARCH-002
    question: "Which source should be considered source of truth for sync operations?"
    decision: "Filesystem is source of truth. Database is treated as a cache/query layer."
    rationale: "Story files in git are version controlled. Database can be rebuilt from filesystem. Aligns with KBAR design philosophy."
    decided_by: story_scope

  - id: ARCH-003
    question: "Which checksum algorithm to use for change detection?"
    decision: "SHA-256 via Node.js crypto.createHash('sha256')"
    rationale: "Strong collision resistance, standard algorithm, matches KBAR-0010 schema design, built into Node.js (no external dependency)."
    decided_by: story_scope

  - id: ARCH-004
    question: "Granularity of sync event tracking (per-file vs per-batch)?"
    decision: "One syncEvent per story sync operation"
    rationale: "Better audit trail for individual story changes. Batch operations deferred to KBAR-0040."
    decided_by: story_scope

  - id: ARCH-005
    question: "Transaction isolation level for concurrent sync operations?"
    decision: "Use Drizzle ORM transactions with default isolation (READ COMMITTED). Check checksums inside transaction before update."
    rationale: "Prevents race conditions where two syncs modify same story simultaneously. Checksum verification inside transaction ensures data consistency."
    decided_by: implementation_best_practice

