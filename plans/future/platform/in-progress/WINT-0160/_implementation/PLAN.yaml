      Implement LangGraph node that wraps doc-sync agent.
      
      KEY PATTERNS TO FOLLOW:
      - Use createToolNode() factory from runner/node-factory.ts (for file I/O operations)
      - Zod schemas first (no TypeScript interfaces)
      - Use @repo/logger (never console)
      - Node.js child_process for subprocess invocation
      - Graceful error handling with errors array population
      
      REFERENCE IMPLEMENTATIONS:
      - packages/backend/orchestrator/src/nodes/reality/load-baseline.ts (file reading/parsing pattern)
      - packages/backend/orchestrator/src/nodes/llm/code-review-lint.ts (external tool invocation pattern)
      
      DOC-SYNC AGENT:
      - Located at .claude/agents/doc-sync.agent.md
      - Invoked via /doc-sync command
      - Generates SYNC-REPORT.md with structured sections
      - Flags: --check-only (dry-run), --force (ignore cache)
      
      SYNC-REPORT.md STRUCTURE:
      - Files Changed: count
      - Sections Updated: count  
      - Diagrams Regenerated: count
      - Manual Review Needed: array of items
      - Changelog Entry: drafted status
      - Summary: overall status
      
      IMPLEMENTATION NOTES:
      - Use child_process.spawn or execFile for subprocess
      - Parse SYNC-REPORT.md using regex or line-by-line parsing
      - Extract numeric counts from "Total files changed: N" pattern
      - Handle missing report file gracefully (populate errors array)
      - Return structured result even on failure

