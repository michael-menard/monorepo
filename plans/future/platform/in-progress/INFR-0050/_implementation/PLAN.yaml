architectural_decisions:
  - id: ARCH-001
    question: "Should buffer overflow use drop-oldest, error, or block strategy?"
    decision: "Use 'drop-oldest' as default (configurable via overflowStrategy)"
    rationale: "Graceful degradation - losing old events is acceptable vs crashing orchestrator or blocking execution. Story specifies this in Architecture Notes."
    decided_by: story

  - id: ARCH-002
    question: "When to extract correlation_id from OTel span - at event creation or flush?"
    decision: "Extract at event creation time"
    rationale: "Active span may end before flush occurs. Store trace ID immediately when hook called."
    decided_by: story

  - id: ARCH-003
    question: "Should hook functions return event_id for debugging?"
    decision: "Return original operation result unchanged (transparent wrapper)"
    rationale: "SDK should not alter operation behavior. Use @repo/logger debug mode for debugging instead."
    decided_by: story

  - id: ARCH-004
    question: "Single SDK instance or multiple instances per process?"
    decision: "Singleton pattern - single SDK instance per process"
    rationale: "One event buffer per process simplifies state management. initTelemetrySdk() returns cached instance on subsequent calls."
    decided_by: story

  - id: ARCH-005
    question: "What PostgreSQL batch size limit for chunking?"
    decision: "Chunk at 6500 events per INSERT"
    rationale: "PostgreSQL param limit ~65535; 10 fields/event = 65,000 params (safe margin). Story specifies this in Architecture Notes."
    decided_by: story

  - id: ARCH-006
    question: "Should testcontainers be production dependency or devDependency?"
    decision: "Add @testcontainers/postgresql to devDependencies"
    rationale: "Only needed for integration tests, not runtime. Follows standard Node.js package dependency patterns."
    decided_by: autonomous

  - id: ARCH-007
    question: "Should SDK use existing insertWorkflowEvent or create new batch-specific function?"
    decision: "Create new insertWorkflowEventsBatch function that uses Drizzle batch insert API directly"
    rationale: "insertWorkflowEvent is optimized for single events. Batch inserts are more efficient with db.insert().values([...]) pattern. AC-4 explicitly requires new batch function."
    decided_by: story

complexity: moderate

