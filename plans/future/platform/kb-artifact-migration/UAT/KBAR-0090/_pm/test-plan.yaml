strategy: unit
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "Returns story: null with candidates_count: 0 when no stories match epic"
    setup: "Mock kb_get_next_story to return { story: null, candidates_count: 0, blocked_by_dependencies: [], message: 'No stories found' }"
    action: "Call handleKbGetNextStory with valid epic, authorized context"
    expected: "Returns MCP tool result with JSON containing story: null and candidates_count: 0"
    evidence: "Snapshot of tool result JSON output"

  - id: HP-2
    title: "Returns story: null with blocked_by_dependencies when all candidates are blocked"
    setup: "Mock kb_get_next_story to return { story: null, candidates_count: 3, blocked_by_dependencies: ['KBAR-0080 (blocked by: KBAR-0070)'], message: 'All candidates blocked' }"
    action: "Call handleKbGetNextStory with valid epic, authorized context"
    expected: "Returns MCP tool result with story: null and non-empty blocked_by_dependencies array"
    evidence: "Snapshot of tool result JSON output; blocked_by_dependencies length > 0"

  - id: HP-3
    title: "Returns first unblocked candidate by priority then createdAt"
    setup: "Mock kb_get_next_story to return { story: { storyId: 'KBAR-0090', epic: 'kbar', state: 'ready', priority: 'high', ... }, candidates_count: 2, blocked_by_dependencies: [], message: 'Found next story' }"
    action: "Call handleKbGetNextStory with valid epic, authorized context"
    expected: "Returns MCP tool result with story object containing storyId: 'KBAR-0090'"
    evidence: "Snapshot of tool result JSON; story.storyId matches expected value"

  - id: HP-4
    title: "include_backlog: true considers ready and backlog states"
    setup: "Mock kb_get_next_story to return story in backlog state when include_backlog: true passed"
    action: "Call handleKbGetNextStory with epic and include_backlog: true"
    expected: "DB function called with include_backlog: true; result returned correctly"
    evidence: "vi.fn() call assertion confirms include_backlog: true was forwarded to mock"

  - id: HP-5
    title: "exclude_story_ids filters out specified IDs"
    setup: "Mock kb_get_next_story to verify it receives exclude_story_ids in params"
    action: "Call handleKbGetNextStory with exclude_story_ids: ['KBAR-0080', 'KBAR-0070']"
    expected: "DB function called with exclude_story_ids array; result returned correctly"
    evidence: "vi.fn() call assertion confirms exclude_story_ids forwarded to mock"

  - id: HP-6
    title: "feature filter forwards to DB function"
    setup: "Mock kb_get_next_story to return filtered result"
    action: "Call handleKbGetNextStory with epic and feature: 'kb-artifact-migration'"
    expected: "DB function called with feature param; filtered result returned"
    evidence: "vi.fn() call assertion confirms feature forwarded to mock"

error_cases:
  - id: EC-1
    title: "Authorization error for unauthorized role"
    setup: "Create MCP context with role that is NOT in [all, dev, qa, pm]"
    action: "Call handleKbGetNextStory with unauthorized context"
    expected: "enforceAuthorization throws AuthorizationError; errorToToolResult wraps it; no DB call made"
    evidence: "Return value is error tool result; mock DB function not called (call count = 0)"

  - id: EC-2
    title: "Zod validation error for missing epic"
    setup: "Provide input with epic field missing or empty string"
    action: "Call handleKbGetNextStory with { } (no epic)"
    expected: "KbGetNextStoryInputSchema.parse throws ZodError; errorToToolResult wraps it"
    evidence: "Return value is error tool result containing Zod error message"

  - id: EC-3
    title: "DB function throws unexpected error"
    setup: "Mock kb_get_next_story to throw new Error('DB connection failed')"
    action: "Call handleKbGetNextStory with valid input and authorized context"
    expected: "Error caught by catch block; errorToToolResult returns error tool result"
    evidence: "Return value is error tool result; original error message present in response"

edge_cases:
  - id: ED-1
    title: "include_backlog omitted defaults to ready-state-only behavior"
    setup: "Mock kb_get_next_story; do not pass include_backlog in input"
    action: "Call handleKbGetNextStory with only epic provided"
    expected: "DB function called without include_backlog or with include_backlog: false; ready-only result returned"
    evidence: "vi.fn() call args inspection; no include_backlog: true present in forwarded params"

  - id: ED-2
    title: "mcp-integration.test.ts tool count matches actual toolDefinitions.length"
    setup: "Read getToolDefinitions() from tool-schemas.ts to get actual count; read mcp-integration.test.ts expected count"
    action: "Compare mcp-integration.test.ts assertion value against actual getToolDefinitions().length"
    expected: "Counts match; kb_update_story present in expected names array"
    evidence: "Test passes; no count mismatch assertion failure"

  - id: ED-3
    title: "exclude_story_ids as empty array does not filter anything"
    setup: "Mock kb_get_next_story to return story; pass exclude_story_ids: []"
    action: "Call handleKbGetNextStory with exclude_story_ids: []"
    expected: "DB function called with empty array; story returned normally"
    evidence: "vi.fn() call args; story present in result"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "handleKbGetNextStory returns { content: [{ type: 'text', text: JSON.stringify(result, null, 2) }] }"
      - "errorToToolResult used in catch block produces correct MCP error shape"
      - "enforceAuthorization called before Zod parse (authorization checked first)"
      - "vi.fn() call count = 0 when authorization fails"
      - "vi.fn() call args match expected params when authorization succeeds"

manual_cases: []

fixture_definitions:
  - name: "noStoriesResult"
    type: "KbGetNextStoryResult"
    description: "{ story: null, candidates_count: 0, blocked_by_dependencies: [], message: 'No stories found in kbar epic' }"

  - name: "allBlockedResult"
    type: "KbGetNextStoryResult"
    description: "{ story: null, candidates_count: 2, blocked_by_dependencies: ['KBAR-0080 (blocked by: KBAR-0070)'], message: 'All candidates blocked' }"

  - name: "successResult"
    type: "KbGetNextStoryResult"
    description: "{ story: { storyId: 'KBAR-0090', epic: 'kbar', state: 'ready', priority: 'high', createdAt: new Date() }, candidates_count: 1, blocked_by_dependencies: [], message: 'Found next story' }"

  - name: "unauthorizedContext"
    type: "McpContext"
    description: "MCP context with role not in permitted set (e.g. role: 'unknown')"

  - name: "authorizedContext"
    type: "McpContext"
    description: "MCP context with role: 'dev' (or 'pm', 'qa', 'all')"

risks:
  - "Tool count in mcp-integration.test.ts may have drifted from 53 by implementation time — must re-verify at implementation start via getToolDefinitions().length"
  - "story-tools.test.ts may already exist if KBAR-0080 landed first — must check before creating new file"
  - "Mock return shape must exactly match TypeScript return type of kb_get_next_story — read lines 369-496 of story-crud-operations.ts before writing mocks"
  - "ESM mock path must use .js extension: 'story-crud-operations.js' not 'story-crud-operations.ts'"
