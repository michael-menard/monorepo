notable_decisions:
  - >
    Mocked story-crud-operations.js (with .js extension) directly rather than through
    crud-operations/index.js to avoid accidentally mocking other crud operations
    and to follow the ESM module mock requirement noted in the plan.
  - >
    AC-7 tested by casting 'unknown' string as AgentRole type — enforceAuthorization
    uses AgentRoleSchema.safeParse internally which rejects any string not in
    ['pm', 'dev', 'qa', 'all'], returning FORBIDDEN error.
  - >
    E2E tests marked exempt: this is a pure test-file story with no UI, no HTTP
    endpoints, and no browser-testable surface.

