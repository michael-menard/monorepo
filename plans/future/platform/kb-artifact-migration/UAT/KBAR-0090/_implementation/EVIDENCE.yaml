acceptance_criteria:
  - ac_id: "AC-1"
    ac_text: "When no stories match the epic filter, kb_get_next_story returns story: null with candidates_count: 0"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Test: 'should return null story with zero candidates when queue is empty'.
          Mock returns { story: null, candidates_count: 0, blocked_by_dependencies: [], message: '...' };
          asserts parsed.story is null and candidates_count is 0.

  - ac_id: "AC-2"
    ac_text: "When all candidates are blocked by dependencies, kb_get_next_story returns story: null with non-empty blocked_by_dependencies"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Test: 'should return null story with blocked_by_dependencies list when all are blocked'.
          Mock returns { story: null, candidates_count: 3, blocked_by_dependencies: ['KBAR-0080 (blocked by: KBAR-0070)', ...], ... };
          asserts blocked_by_dependencies.length is 3.

  - ac_id: "AC-3"
    ac_text: "When an unblocked story exists, kb_get_next_story returns the first eligible story"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Test: 'should return the first unblocked story when one is available'.
          Mock returns story fixture with storyId: 'KBAR-0090';
          asserts parsed.story.storyId === 'KBAR-0090'.

  - ac_id: "AC-4"
    ac_text: "include_backlog parameter is forwarded to the underlying CRUD operation"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Two tests: (a) include_backlog: true forwarded — checks callArgs[1] matches { include_backlog: true };
          (b) omitting include_backlog — checks callArgs[1] matches { include_backlog: false } (default).

  - ac_id: "AC-5"
    ac_text: "exclude_story_ids parameter is forwarded to the underlying CRUD operation"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Test: 'should forward exclude_story_ids array to crud operation'.
          Calls with exclude_story_ids: ['KBAR-0080', 'KBAR-0070'];
          asserts callArgs[1] matches { exclude_story_ids: ['KBAR-0080', 'KBAR-0070'] }.

  - ac_id: "AC-6"
    ac_text: "feature filter parameter is forwarded to the underlying CRUD operation"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Test: 'should forward feature filter to crud operation and return correct result'.
          Calls with feature: 'kb-artifact-migration';
          asserts callArgs[1] matches { feature: 'kb-artifact-migration' }.

  - ac_id: "AC-7"
    ac_text: "Authorization is enforced — invalid roles are rejected and the CRUD operation is not called"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Test: 'should reject invalid role and not call crud operation'.
          Creates context with agent_role: 'unknown' as AgentRole;
          asserts result.isError === true and mockKbGetNextStory not called.

  - ac_id: "AC-8"
    ac_text: "Missing required epic field produces a Zod validation error response"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts"
        description: >
          Test: 'should return isError true with Zod error message when epic is missing'.
          Calls handleKbGetNextStory with empty input {};
          asserts result.isError === true and content[0].text is truthy.

  - ac_id: "AC-9"
    ac_text: "mcp-integration.test.ts tool count assertion updated to 53 and kb_update_story present in expected names"
    status: PASS
    evidence_items:
      - type: test
        path: "apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts"
        description: >
          toHaveLength(53) replaces toHaveLength(52);
          'kb_update_story' added to expected names array between 'kb_update_story_status' and 'kb_get_next_story'.
          All 28 mcp-integration tests pass.

  - ac_id: "AC-10"
    ac_text: "No TypeScript errors and all tests pass for @repo/knowledge-base"
    status: PASS
    evidence_items:
      - type: command
        command: "pnpm --filter @repo/knowledge-base exec tsc --noEmit"
        result: SUCCESS
        output: "Exit 0 — no TypeScript errors"
      - type: command
        command: "pnpm test --filter @repo/knowledge-base"
        result: SUCCESS
        output: "45 test files, 1086 tests passed"

