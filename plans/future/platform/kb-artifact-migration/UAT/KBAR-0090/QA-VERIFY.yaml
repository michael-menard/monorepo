lessons_to_record:
  - lesson: >
      When writing unit tests for MCP handler tools that use ESM modules, the vi.mock() path must
      use the .js extension (e.g., '../../crud-operations/story-crud-operations.js') even though
      source files are .ts. This is an ESM module resolution requirement — failing to use .js will
      cause the mock not to intercept the import.
    category: pattern
    tags: ["testing", "vitest", "esm", "mcp", "knowledge-base"]

  - lesson: >
      For MCP handler authorization tests, casting an invalid string as AgentRole
      (e.g., 'unknown' as AgentRole) is the correct pattern to simulate an unauthorized caller.
      enforceAuthorization uses AgentRoleSchema.safeParse internally and rejects any value not in
      ['pm', 'dev', 'qa', 'all'], returning a FORBIDDEN error without calling the DB layer.
    category: pattern
    tags: ["testing", "authorization", "mcp", "knowledge-base"]

  - lesson: >
      Pure test-file stories (no UI, no HTTP endpoints, no browser-testable surface) correctly
      exempt E2E / Playwright tests. The exempt_reason should reference story_type and the
      specific scope fields (ui_touched: false, endpoints: []) to make the exemption auditable.
    category: pattern
    tags: ["testing", "e2e", "playwright", "scope"]

