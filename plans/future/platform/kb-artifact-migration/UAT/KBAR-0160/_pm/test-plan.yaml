strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
happy_path_tests:
  - id: HP-1
    title: "dev-setup-leader CHECKPOINT write uses artifact_write with file_path"
    setup: "KBAR-0160 changes merged; artifact_write tool available (KBAR-0110 landed); test story directory with _implementation/ parent exists"
    action: "Run /dev-implement-story for a canary story; observe dev-setup-leader step 4 (implement mode)"
    expected: "artifact_write called with artifact_type: 'checkpoint', phase: 'setup', iteration: 0, file_path pointing to _implementation/CHECKPOINT.yaml; file appears on filesystem"
    evidence: "Verify _implementation/CHECKPOINT.yaml exists at the expected path after setup completes"
  - id: HP-2
    title: "dev-setup-leader SCOPE write uses artifact_write with file_path"
    setup: "Same as HP-1"
    action: "Run /dev-implement-story for a canary story; observe dev-setup-leader step 5 (implement mode)"
    expected: "artifact_write called with artifact_type: 'scope', phase: 'setup', iteration: 0, file_path pointing to _implementation/SCOPE.yaml; file appears on filesystem"
    evidence: "Verify _implementation/SCOPE.yaml exists at the expected path after setup completes"
  - id: HP-3
    title: "dev-plan-leader PLAN write uses artifact_write with file_path"
    setup: "KBAR-0160 changes merged; run setup phase first to produce CHECKPOINT artifact"
    action: "Run planning phase; observe dev-plan-leader step 8"
    expected: "artifact_write called with artifact_type: 'plan', phase: 'planning', iteration: 0, file_path pointing to _implementation/PLAN.yaml; file appears on filesystem"
    evidence: "Verify _implementation/PLAN.yaml exists at the expected path after plan phase completes"
  - id: HP-4
    title: "KB read path still works after migration (read via kb_read_artifact)"
    setup: "HP-1 or HP-2 completed (artifact written via artifact_write)"
    action: "Invoke kb_read_artifact for the written CHECKPOINT or SCOPE artifact"
    expected: "Artifact is retrievable from KB (dual-write: file AND KB indexed)"
    evidence: "kb_read_artifact returns artifact content matching the written file"
  - id: HP-5
    title: "dev-setup-leader frontmatter kb_tools includes artifact_write"
    setup: "KBAR-0160 changes merged"
    action: "Read dev-setup-leader.agent.md frontmatter"
    expected: "kb_tools list contains artifact_write (write operations) and kb_read_artifact (read operations)"
    evidence: "Manual diff of dev-setup-leader.agent.md frontmatter before/after"
  - id: HP-6
    title: "dev-plan-leader frontmatter kb_tools includes artifact_write"
    setup: "KBAR-0160 changes merged"
    action: "Read dev-plan-leader.agent.md frontmatter"
    expected: "kb_tools list contains artifact_write (write operations) and kb_read_artifact (read operations)"
    evidence: "Manual diff of dev-plan-leader.agent.md frontmatter before/after"
error_cases:
  - id: EC-1
    title: "KB write failure during artifact_write does not block setup phase"
    setup: "Simulate KB unavailability (network partition or DB down); file system available"
    action: "Run dev-setup-leader; trigger CHECKPOINT write via artifact_write"
    expected: "file_written: true returned; kb_write_warning logged; setup phase proceeds without blocking. _implementation/CHECKPOINT.yaml still written."
    evidence: "Setup completes; CHECKPOINT.yaml present on filesystem; warning (not error) in agent output"
  - id: EC-2
    title: "KB write failure during artifact_write does not block planning phase"
    setup: "Simulate KB unavailability; file system available"
    action: "Run dev-plan-leader; trigger PLAN write via artifact_write"
    expected: "file_written: true returned; kb_write_warning logged; planning phase proceeds without blocking"
    evidence: "Planning completes; PLAN.yaml present on filesystem; warning (not error) in agent output"
edge_cases:
  - id: ED-1
    title: "dev-setup-leader fix mode CHECKPOINT update uses artifact_write with incremented iteration"
    setup: "KBAR-0160 changes merged; prior CHECKPOINT exists (iteration 0)"
    action: "Trigger dev-setup-leader fix mode step 3 (CHECKPOINT update)"
    expected: "artifact_write called with updated checkpoint content, iteration incremented beyond 0"
    evidence: "Updated _implementation/CHECKPOINT.yaml on filesystem; KB also updated"
  - id: ED-2
    title: "dev-plan-leader CHECKPOINT update (step 7) uses artifact_write with current_phase: plan"
    setup: "KBAR-0160 changes merged; prior CHECKPOINT exists from setup phase"
    action: "Run dev-plan-leader step 7"
    expected: "artifact_write called with current_phase: 'plan' in checkpoint content"
    evidence: "CHECKPOINT.yaml on filesystem reflects current_phase: plan"
  - id: ED-3
    title: "kb_read_artifact calls in both agents are unchanged"
    setup: "KBAR-0160 changes merged"
    action: "Review dev-setup-leader and dev-plan-leader for kb_read_artifact usage"
    expected: "All kb_read_artifact calls remain exactly as before migration; only write calls changed"
    evidence: "Manual diff shows no kb_read_artifact removals or modifications"
tooling_evidence:
  backend:
    http_requests: []
    assertions: []
manual_cases:
  - id: MC-1
    title: "Verify dev-setup-leader non-negotiable updated"
    steps:
      - "Open .claude/agents/dev-setup-leader.agent.md"
      - "Check Non-Negotiables section"
      - "Confirm 'Do NOT create _implementation/ directories' removed or updated to note artifact_write creates it"
      - "Confirm 'MUST write artifacts via artifact_write' (or equivalent) present"
    expected: "Non-negotiables reflect the new artifact_write tool requirement"
  - id: MC-2
    title: "Verify graceful failure documentation in both agents"
    steps:
      - "Open dev-setup-leader.agent.md"
      - "Find the artifact_write call documentation"
      - "Confirm KB failure semantics documented: file_written: true, kb_write_warning on KB failure"
      - "Repeat for dev-plan-leader.agent.md"
    expected: "Both agents document graceful KB write failure behavior"
  - id: MC-3
    title: "Verify file_path arguments use canonical _implementation/ paths"
    steps:
      - "Open dev-setup-leader.agent.md; find artifact_write calls for CHECKPOINT and SCOPE"
      - "Confirm file_path resolves to {FEATURE_DIR}/in-progress/{STORY_ID}/_implementation/CHECKPOINT.yaml"
      - "Confirm file_path resolves to {FEATURE_DIR}/in-progress/{STORY_ID}/_implementation/SCOPE.yaml"
      - "Open dev-plan-leader.agent.md; find artifact_write call for PLAN"
      - "Confirm file_path resolves to {FEATURE_DIR}/in-progress/{STORY_ID}/_implementation/PLAN.yaml"
    expected: "All file_path arguments use explicit canonical _implementation/ paths (not relying on tool internal defaults)"
fixture_definitions: []
risks:
  - "Functional validation requires the full KBAR dependency chain (KBAR-0110 through KBAR-0150) to be landed — cannot validate artifact_write behavior until that chain is complete"
  - "KB write failure path is not unit-testable via agent markdown; relies on observational validation during canary story run"
  - "canonical path computation: if artifact_write's internal default path is used instead of explicit file_path, canary test may produce files in unexpected locations"
