lessons_to_record:
  - lesson: >-
      Validation spikes running inside active agent sessions cannot recursively invoke workflow commands (/elab-story,
      /dev-implement-story, etc.). Live canary runs must be planned as standalone fresh-session activities. This
      architectural constraint should be documented in spike story templates.
    category: blocker
    tags:
      - spike
      - validation
      - canary
      - recursive-invocation
      - kb-artifact-migration
  - lesson: >-
      'uat' is a WorkPhaseSchema value (filesystem directory label), NOT a StoryStateSchema terminal state. Terminal DB
      state after QA PASS is 'completed'. Always verify against StoryStateSchema at
      apps/api/knowledge-base/src/__types__/index.ts when writing state machine assertions.
    category: pattern
    tags:
      - storystate
      - kb
      - terminal-state
      - schema-verification
  - lesson: >-
      Static analysis verification of agent/command migration files is a viable and thorough validation approach when
      live canary runs cannot be executed. Grep-based version and call-site confirmation produces high-confidence
      evidence at low token cost.
    category: pattern
    tags:
      - static-analysis
      - validation-spike
      - migration-verification
      - kb-artifact-migration
  - lesson: >-
      Minor internal count inconsistencies in EVIDENCE.yaml summary blocks (e.g. ac_pass_count vs execution_summary
      acs_pass) are non-blocking but worth flagging. Consider adding a summary-generation step at EVIDENCE.yaml
      completion to ensure all count fields are consistent.
    category: anti_pattern
    tags:
      - evidence-yaml
      - consistency
      - counting
