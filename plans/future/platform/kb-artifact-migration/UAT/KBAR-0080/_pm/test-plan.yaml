strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "mcp-integration.test.ts correctly lists kb_update_story and has count 54"
    setup: "No DB required — unit-level test reading toolDefinitions array"
    action: "Call getToolDefinitions() and check length + names array"
    expected: "Length is 54; 'kb_update_story' present in names array alongside kb_get_story, kb_list_stories, kb_update_story_status, kb_get_next_story"
    evidence: "Test passes in pnpm test --filter @repo/knowledge-base"

  - id: HP-2
    title: "kb_list_stories filters by single state"
    setup: "DB with 3 stories: state=backlog, state=in_progress, state=completed"
    action: "Call handleKbListStories with { state: 'in_progress' }"
    expected: "Returns stories array with only the in_progress story; total=1"
    evidence: "Unit test: mockKbListStories returns filtered result; assert stories.length=1"

  - id: HP-3
    title: "kb_list_stories filters by states[] array (plural takes precedence)"
    setup: "DB with stories across states backlog/ready/in_progress/completed"
    action: "Call handleKbListStories with { state: 'backlog', states: ['ready', 'in_progress'] }"
    expected: "Returns only ready and in_progress stories (states[] overrides state)"
    evidence: "Unit test asserting mock called with states param, state param ignored"

  - id: HP-4
    title: "kb_list_stories returns total count and updatedAt DESC ordering"
    setup: "DB with 5 stories with different updatedAt timestamps"
    action: "Call handleKbListStories with { limit: 2, offset: 0 }"
    expected: "Response has total=5, stories.length=2, first story has most recent updatedAt"
    evidence: "Unit test asserting response shape and ordering"

  - id: HP-5
    title: "kb_update_story_status sets startedAt on transition to in_progress"
    setup: "DB story with state=ready, startedAt=null"
    action: "Call handleKbUpdateStoryStatus with { story_id: 'KBAR-TEST-001', state: 'in_progress' }"
    expected: "DB story has startedAt set to current timestamp; response updated=true"
    evidence: "Unit test: mock returns story with startedAt set; integration test verifies DB column"

  - id: HP-6
    title: "kb_update_story_status startedAt is idempotent (no overwrite on second transition)"
    setup: "DB story with state=in_progress, startedAt='2026-01-01T00:00:00Z'"
    action: "Call handleKbUpdateStoryStatus with { story_id: 'KBAR-TEST-001', state: 'in_progress' }"
    expected: "startedAt remains '2026-01-01T00:00:00Z'; NOT overwritten; updated=true"
    evidence: "Unit test asserting mock was called with null startedAt guard"

  - id: HP-7
    title: "kb_update_story_status sets completedAt on transition to completed"
    setup: "DB story with state=in_qa, completedAt=null"
    action: "Call handleKbUpdateStoryStatus with { story_id: 'KBAR-TEST-001', state: 'completed' }"
    expected: "DB story has completedAt set; updated=true"
    evidence: "Unit test asserting completedAt set in update payload"

  - id: HP-8
    title: "kb_update_story_status clears blocked fields when blocked:false"
    setup: "DB story with blocked=true, blockedReason='Waiting on KBAR-070', blockedByStory='KBAR-0070'"
    action: "Call handleKbUpdateStoryStatus with { story_id: 'KBAR-TEST-001', blocked: false }"
    expected: "Story has blocked=false, blockedReason=null, blockedByStory=null"
    evidence: "Unit test asserting clearance of those fields in the update payload"

  - id: HP-9
    title: "kb_update_story updates only supplied metadata fields"
    setup: "DB story with title='Old Title', epic='platform', points=3"
    action: "Call handleKbUpdateStory with { story_id: 'KBAR-TEST-001', title: 'New Title' }"
    expected: "title='New Title'; epic and points unchanged; updated=true"
    evidence: "Unit test: mock asserts only title in update payload; other fields untouched"

  - id: HP-10
    title: "All three handlers permit pm role"
    setup: "Context with role=pm, valid story ID"
    action: "Call each handler with pm role context"
    expected: "All handlers execute without AuthorizationError"
    evidence: "Unit tests for handleKbListStories, handleKbUpdateStoryStatus, handleKbUpdateStory with pm role"

error_cases:
  - id: EC-1
    title: "kb_update_story_status returns updated:false for non-existent story ID"
    setup: "DB with no story for ID 'NONEXISTENT-999'"
    action: "Call handleKbUpdateStoryStatus with { story_id: 'NONEXISTENT-999', state: 'in_progress' }"
    expected: "Response: { updated: false, story: null }; no error thrown"
    evidence: "Unit test: mock returns { updated: false, story: null }; handler returns JSON with those values"

  - id: EC-2
    title: "kb_update_story returns updated:false for non-existent story ID"
    setup: "DB with no story for ID 'NONEXISTENT-999'"
    action: "Call handleKbUpdateStory with { story_id: 'NONEXISTENT-999', title: 'New Title' }"
    expected: "Response: { updated: false, story: null }; no error thrown"
    evidence: "Unit test matching EC-1 pattern for update handler"

  - id: EC-3
    title: "Unauthorized role blocked on handleKbListStories"
    setup: "Context with unknown role 'unknown_role'"
    action: "Call handleKbListStories with unauthorized context"
    expected: "Returns error result with AuthorizationError message"
    evidence: "Unit test asserting errorToToolResult wraps AuthorizationError"

  - id: EC-4
    title: "Unauthorized role blocked on handleKbUpdateStoryStatus"
    setup: "Context with role 'unknown_role'"
    action: "Call handleKbUpdateStoryStatus with unauthorized context"
    expected: "Returns error result with AuthorizationError"
    evidence: "Unit test matching EC-3 pattern"

  - id: EC-5
    title: "Unauthorized role blocked on handleKbUpdateStory"
    setup: "Context with role 'unknown_role'"
    action: "Call handleKbUpdateStory with unauthorized context"
    expected: "Returns error result with AuthorizationError"
    evidence: "Unit test matching EC-3 pattern"

  - id: EC-6
    title: "Terminal-state guard rejects completed → backlog transition"
    setup: "DB story with state=completed"
    action: "Call kb_update_story_status (via CRUD layer or handler) with { state: 'backlog' }"
    expected: "Throws or returns error with descriptive message: 'Cannot transition from terminal state completed'"
    evidence: "Unit test with mock returning story.state='completed'; guard throws; handler returns error result"

  - id: EC-7
    title: "Terminal-state guard rejects cancelled → in_progress transition"
    setup: "DB story with state=cancelled"
    action: "Call kb_update_story_status with { state: 'in_progress' }"
    expected: "Error: 'Cannot transition from terminal state cancelled'"
    evidence: "Unit test asserting guard for cancelled terminal state"

  - id: EC-8
    title: "Terminal-state guard rejects deferred → ready transition"
    setup: "DB story with state=deferred"
    action: "Call kb_update_story_status with { state: 'ready' }"
    expected: "Error: 'Cannot transition from terminal state deferred'"
    evidence: "Unit test asserting guard for deferred terminal state"

  - id: EC-9
    title: "Invalid input rejected by Zod schema validation"
    setup: "Handler called with invalid state value"
    action: "Call handleKbUpdateStoryStatus with { story_id: 'X', state: 'invalid_state' }"
    expected: "Zod parse error returned via errorToToolResult"
    evidence: "Unit test asserting Zod validation failure path"

edge_cases:
  - id: ED-1
    title: "Same-state transition is idempotent (no error, no guard rejection)"
    setup: "DB story with state=in_progress"
    action: "Call kb_update_story_status with { state: 'in_progress' } (same state)"
    expected: "Succeeds with updated=true (or updated=false if no change); no guard error"
    evidence: "Unit test verifying terminal guard only blocks from terminal states, not same-state no-ops"

  - id: ED-2
    title: "failed_code_review and failed_qa are terminal — guard blocks transitions from them"
    setup: "DB story with state=failed_code_review"
    action: "Call kb_update_story_status with { state: 'in_progress' }"
    expected: "Guard rejects with terminal state error (failed_code_review is terminal per StoryStateSchema)"
    evidence: "Unit test for failed_code_review; separate test for failed_qa"

  - id: ED-3
    title: "kb_list_stories with all filters combined returns correct subset"
    setup: "DB with stories across features/states/priorities/blocked statuses"
    action: "Call with { feature: 'wish', state: 'in_progress', priority: 'high', blocked: false }"
    expected: "Only stories matching ALL filters returned"
    evidence: "Unit test: mock asserts all filter params passed to kb_list_stories CRUD function"

  - id: ED-4
    title: "kb_list_stories pagination with offset correctly skips rows"
    setup: "DB with 10 stories"
    action: "Call with { limit: 3, offset: 7 }"
    expected: "Returns last 3 stories; total=10"
    evidence: "Unit test asserting offset param forwarded to CRUD function"

  - id: ED-5
    title: "kb_update_story with empty update (no fields) does not crash"
    setup: "DB story exists"
    action: "Call handleKbUpdateStory with { story_id: 'KBAR-TEST-001' } (no other fields)"
    expected: "Succeeds or returns updated=false; no crash"
    evidence: "Unit test asserting graceful handling of empty update"

  - id: ED-6
    title: "completedAt idempotency — second completed transition does not overwrite completedAt"
    setup: "DB story with state=completed, completedAt='2026-01-15T00:00:00Z'"
    action: "Attempt second call to kb_update_story_status — blocked by terminal guard"
    expected: "Terminal guard rejects the transition (completed → completed is blocked OR idempotent)"
    evidence: "Clarify behavior in test: either guard rejects OR same-state no-op; document the chosen behavior"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "Response JSON has { stories: [], total: N } shape for list operations"
      - "Response JSON has { updated: boolean, story: object|null } shape for update operations"
      - "Error response has { content: [{ type: 'text', text: '...' }] } shape from errorToToolResult"
      - "Tool count in mcp-integration.test.ts matches getToolDefinitions().length (54)"
      - "kb_update_story present in tool names array in integration test"
  frontend:
    # ui_touched: false — no frontend evidence required

manual_cases: []

fixture_definitions:
  - name: "story-test-backlog"
    type: "DB row"
    description: "Story in state=backlog, priority=medium, no blocked fields, feature=kbar"
  - name: "story-test-in-progress"
    type: "DB row"
    description: "Story in state=in_progress, startedAt set, not blocked"
  - name: "story-test-completed"
    type: "DB row"
    description: "Story in state=completed, completedAt set — used for terminal guard tests"
  - name: "story-test-cancelled"
    type: "DB row"
    description: "Story in state=cancelled — used for terminal guard tests"
  - name: "story-test-blocked"
    type: "DB row"
    description: "Story with blocked=true, blockedReason='waiting', blockedByStory='KBAR-0070'"
  - name: "mock-crud-story-operations"
    type: "vi.hoisted mock"
    description: "Mocked kb_list_stories, kb_update_story_status, kb_update_story functions from story-crud-operations.ts"

risks:
  - "Tool count assertion in mcp-integration.test.ts must be verified against actual getToolDefinitions().length before updating — count is 54 as of 2026-02-23 but may drift if other KBAR stories add tools concurrently"
  - "Terminal state definition must match StoryStateSchema: completed, cancelled, deferred, failed_code_review, failed_qa are terminal — verify complete list before implementing guard"
  - "Integration tests (AC-2 through AC-8) require real PostgreSQL on port 5433 per ADR-005 — if running in CI without DB access, tests must be tagged as integration and excluded from unit-only runs"
  - "ED-6 behavior (completed → completed same-state) is ambiguous — either the terminal guard blocks it or it is a no-op; behavior must be explicitly defined and tested"
  - "The vi.mock for story-crud-operations.ts must use the .js extension in the mock path to align with the module resolution used in tool-handlers.ts imports"
