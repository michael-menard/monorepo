lessons_to_record:
  - lesson: >
      Evidence artifacts stored only in the filesystem UAT/_implementation/EVIDENCE.yaml
      may not be migrated to KB. Always fall back to reading EVIDENCE.yaml from the story's
      UAT directory when kb_read_artifact returns null for the evidence type.
    category: pattern
    tags: ["qa-verify", "evidence", "kb-migration"]

  - lesson: >
      Unit tests for MCP handlers that mock the DB CRUD layer only verify handler
      pass-through and response parsing — they do not independently exercise each filter
      parameter against actual query logic. AC requirements for 'each filter independently
      tested' must distinguish between DB-layer tests (integration) and handler-layer tests
      (unit with mocks). Handler-layer unit tests should still exercise each filter
      parameter through the handler's argument parsing to confirm Zod schemas accept them.
    category: pattern
    tags: ["testing", "unit-tests", "filters", "mcp-handlers", "ac-precision"]

  - lesson: >
      Tool count in mcp-integration.test.ts drifts with each new story that adds tools.
      Story KBAR-0080 spec claimed 54 but actual verified count at implementation time was 53.
      The context artifact correctly warned about this. Story specs should not hardcode tool
      counts — reference getToolDefinitions().length dynamically or re-verify at setup time.
    category: blocker
    tags: ["tool-count", "mcp-integration", "spec-drift", "KBAR"]

  - lesson: >
      A QA-VERIFY.yaml FAIL verdict citing missing filter tests was resolved by a targeted
      fix cycle that added 7 independent filter tests to story-tools.test.ts. When re-verifying
      after a fix cycle, always independently read the source test file to confirm the additions
      are actually present before issuing a PASS verdict — do not rely solely on the updated
      EVIDENCE.yaml.
    category: pattern
    tags: ["qa-verify", "fix-cycle", "re-verification", "KBAR"]

