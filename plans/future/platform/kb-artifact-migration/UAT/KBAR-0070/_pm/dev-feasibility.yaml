feasible: true
confidence: high
rationale: >
  All required data (stories, story_artifacts, story_dependencies) already exists in the
  database. This story is a purely additive, read-only extension to an existing MCP tool.
  No schema migrations, no new tables, no new infrastructure. The implementation pattern
  is already established by kb_get_story and kb_list_stories in the same file. The primary
  risk is backward compatibility with existing callers — mitigated by using optional fields
  with default(false) on the input schema. Implementation risk is LOW.
complexity: low

change_surface:
  areas:
    - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    - apps/api/knowledge-base/src/mcp-server/__tests__/tool-handlers.test.ts
  endpoints: []
  deploy_touchpoints:
    - "Lambda function redeployment (apps/api) after code change — no DB migration required"

risks:
  - finding: "Backward compatibility: existing callers pass only { story_id } and expect { story, message }"
    mitigation: >
      Use z.boolean().optional().default(false) for both new fields. When both flags are false
      (default), return type is { story, message } — identical to today. When flags are true,
      response extends to { story, artifacts, dependencies, message }. No breaking change.

  - finding: "Return type shape must be expressed as Zod schema, not TypeScript interface"
    mitigation: >
      Define KbGetStoryResultSchema = z.object({ story: ..., artifacts: z.array(...).optional(),
      dependencies: z.array(...).optional(), message: z.string() }) and use z.infer<> for the
      return type. Avoids 'as any' casts and maintains type safety.

  - finding: "Secondary queries must not execute when story is null (N+1 guard)"
    mitigation: >
      After primary story query returns null, immediately return { story: null, artifacts: [],
      dependencies: [], message: 'Story X not found' } without executing artifact/dependency
      selects. Single early-return guard.

missing_requirements: []

evidence_expectations:
  - "pnpm check-types --filter knowledge-base passes after changes"
  - "pnpm test --filter knowledge-base passes (unit tests for new code paths)"
  - "Integration test against real PostgreSQL validates artifact and dependency eager loading"
  - "Backward compatibility: existing callers with only story_id receive unchanged response shape"

subtasks:
  - id: ST-1
    title: "Extend KbGetStoryInputSchema and define result Zod schema"
    goal: >
      Add include_artifacts: z.boolean().optional().default(false) and
      include_dependencies: z.boolean().optional().default(false) to KbGetStoryInputSchema.
      Define KbGetStoryResultSchema with optional artifacts and dependencies arrays.
      Export KbGetStoryResult type via z.infer<>.
    files_to_read:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
      - apps/api/knowledge-base/src/db/schema.ts
    files_to_modify:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    acs: ["AC-1"]
    depends_on: none
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 6000

  - id: ST-2
    title: "Add conditional artifact query in kb_get_story service function"
    goal: >
      In kb_get_story, after fetching the story: if story is null, return early with
      artifacts: []. If include_artifacts is true, execute a secondary SELECT from
      storyArtifacts WHERE storyId = story_id and include results in response.
      Import storyArtifacts from ../db/schema.js.
    files_to_read:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
      - apps/api/knowledge-base/src/db/schema.ts
    files_to_modify:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    acs: ["AC-2", "AC-4"]
    depends_on: ST-1
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 5000

  - id: ST-3
    title: "Add conditional dependency query in kb_get_story service function"
    goal: >
      After the artifact query: if include_dependencies is true, execute a single
      SELECT from storyDependencies WHERE storyId = story_id OR targetStoryId = story_id
      using Drizzle or() operator. Include results as dependencies in response.
      When story is null, return dependencies: [] (same early-return guard as ST-2).
    files_to_read:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
      - apps/api/knowledge-base/src/db/schema.ts
    files_to_modify:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    acs: ["AC-3", "AC-4"]
    depends_on: ST-2
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 5000

  - id: ST-4
    title: "Update tool handler logging to include new flag values"
    goal: >
      In handleKbGetStory (tool-handlers.ts): update the input cast log and timing log
      to include include_artifacts and include_dependencies flag values for observability.
      Verify handler still passes through new optional params to kb_get_story — likely
      no structural change needed since KbGetStoryInputSchema.parse() handles the new fields.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    acs: ["AC-6"]
    depends_on: ST-1
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 3000

  - id: ST-5
    title: "Update getToolDefinitions in tool-schemas.ts to expose new parameters"
    goal: >
      Update kbGetStoryToolDefinition in tool-schemas.ts to add include_artifacts and
      include_dependencies as optional boolean parameters with clear description strings
      explaining eager loading behavior. Use zodToMcpSchema(KbGetStoryInputSchema) if that
      function is used — the schema update in ST-1 will automatically reflect; otherwise
      manually add the parameter descriptions.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    acs: ["AC-5"]
    depends_on: ST-1
    verification: "pnpm check-types --filter knowledge-base"
    estimated_tokens: 3000

  - id: ST-6
    title: "Write unit tests for new code paths"
    goal: >
      Following the vi.hoisted + vi.mock pattern in tool-handlers.test.ts:
      Add unit tests for handleKbGetStory covering: (1) include_artifacts:true with records,
      (2) include_artifacts:true with empty result, (3) include_dependencies:true with records,
      (4) include_dependencies:true with empty result, (5) story not found with both flags true.
      Mock kb_get_story service function to return controlled results.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/__tests__/tool-handlers.test.ts
      - apps/api/knowledge-base/src/mcp-server/__tests__/test-helpers.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/__tests__/tool-handlers.test.ts
    acs: ["AC-7"]
    depends_on: ST-4
    verification: "pnpm test --filter knowledge-base"
    estimated_tokens: 8000

  - id: ST-7
    title: "Write integration test against real PostgreSQL"
    goal: >
      Using the existing integration test setup (testcontainers or dev-pg per ADR-005):
      Create a test that seeds story + artifact + dependency records, calls kb_get_story
      with include_artifacts:true and include_dependencies:true, and validates the returned
      arrays match seeded data. Also validates backward-compat: call with only story_id
      and verify no artifact/dependency data returned.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/__tests__/tool-handlers.test.ts
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/__tests__/tool-handlers.test.ts
    acs: ["AC-8"]
    depends_on: ST-3
    verification: "pnpm test:integration --filter knowledge-base (real PostgreSQL)"
    estimated_tokens: 9000
