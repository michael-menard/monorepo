issues_to_fix:
  - id: ISSUE-1
    severity: HIGH
    ac_ids: [AC-2, AC-3]
    file: apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    line: 213
    issue: >
      Missing required `query: string` parameter from ArtifactSearchInputSchema.
      Story title and AC-2/AC-3 explicitly require natural language query input.
      The implementation instead uses a tag-filter-only approach, building a synthetic
      query from tag values. This changes the tool from a natural language semantic
      search to a structured browse/filter tool.
    resolution: >
      Add `query: z.string().min(1)` (required per AC-3) to ArtifactSearchInputSchema.
      Pass validated.query to kb_search as the query field.
    auto_fixable: false

  - id: ISSUE-2
    severity: MEDIUM
    ac_ids: [AC-2, AC-6]
    file: apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    line: 213
    issue: >
      Missing `min_confidence` and `explain` optional parameters from schema and handler.
      AC-2 explicitly lists these as part of the tool input shape. The handler hardcodes
      min_confidence: 0.0 and does not support explain mode.
    resolution: >
      Add min_confidence: z.number().min(0).max(1).optional() and explain: z.boolean().optional()
      to ArtifactSearchInputSchema. Pass them through to the kb_search call.
    auto_fixable: false

  - id: ISSUE-3
    severity: LOW
    ac_ids: [AC-9]
    file: apps/api/knowledge-base/src/mcp-server/__tests__/artifact-search-tools.test.ts
    line: 0
    issue: >
      Missing test for empty/invalid query validation (AC-9 requires 'invalid query (Zod error
      for empty string)'). Also missing min_confidence and explain pass-through tests per
      story test plan ED-3.
    resolution: >
      Once query field is added, add tests for: empty string rejection, missing query rejection,
      min_confidence/explain pass-through.
    auto_fixable: false

