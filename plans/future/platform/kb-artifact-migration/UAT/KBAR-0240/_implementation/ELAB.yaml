      Verification commands are runnable: ST-1 uses pnpm check-types, ST-2 uses
      pnpm regenerate:index --help, ST-3 uses pnpm run regenerate:index --help,
      ST-4 uses pnpm test. One gap: the unit test for the DB error path (AC-5,
      EC-1) mocks generateStoriesIndex to throw a connection error, but the
      story does not clarify whether the exit-2 detection relies on error message
