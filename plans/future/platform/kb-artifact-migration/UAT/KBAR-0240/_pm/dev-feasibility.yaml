feasible: true
confidence: high
rationale: >
  KBAR-0240 is a thin CLI wrapper following a well-established, fully-documented pattern in
  sync-epic.ts and sync-story.ts within the same package. All required tooling (tsx, zod, @repo/logger)
  is already present. The only novel element is the --dry-run diff comparison logic, which is standard
  Node.js string comparison. No new packages required. Implementation is blocked until KBAR-0230
  (generateStoriesIndex) is merged, but PM and elaboration artifacts can be produced now.
complexity: low
implementation_gate: "KBAR-0230 must be merged to main before implementation starts. The function signature and return type of generateStoriesIndex() must be stable before the CLI wrapper can be written."

change_surface:
  areas:
    - "packages/backend/kbar-sync/scripts/regenerate-index.ts (new file)"
    - "packages/backend/kbar-sync/scripts/__types__/cli-options.ts (add RegenerateIndexCLIOptionsSchema)"
    - "packages/backend/kbar-sync/package.json (add regenerate:index script entry)"
    - "packages/backend/kbar-sync/scripts/__tests__/ (new unit test file)"
  endpoints: []
  deploy_touchpoints:
    - "No deployment required — local CLI script"
    - "Pre-commit hook integration is stretch goal only; not required for story completion"

risks:
  - finding: "generateStoriesIndex() API surface is unknown until KBAR-0230 lands"
    mitigation: "Write CLI against an interface stub; update import when KBAR-0230 merges. This is the implementation gate — do not start coding until function signature is stable."
  - finding: "rethrowExitError omission causes test suite to crash on process.exit calls"
    mitigation: "Copy rethrowExitError verbatim from sync-epic.ts. This is a known footgun from KBAR-0050 lessons."

missing_requirements: []

evidence_expectations:
  - "pnpm --filter @repo/kbar-sync regenerate:index -- --help exits 0 without DB env vars"
  - "Unit tests pass for: --help, arg parsing, Zod validation errors, --dry-run path, success path with mocked generateStoriesIndex"
  - "Exit codes 0, 1, 2 verified via mocked process.exit spy in unit tests"

subtasks:
  - id: ST-1
    title: "Add RegenerateIndexCLIOptionsSchema to cli-options.ts"
    goal: "Define Zod schema for CLI option validation alongside existing SyncStoryCLIOptionsSchema and SyncEpicCLIOptionsSchema"
    files_to_read:
      - "packages/backend/kbar-sync/scripts/__types__/cli-options.ts"
    files_to_modify:
      - "packages/backend/kbar-sync/scripts/__types__/cli-options.ts"
    acs: ["AC-4"]
    depends_on: "none"
    verification: "pnpm check-types --filter @repo/kbar-sync"
    estimated_tokens: 4000

  - id: ST-2
    title: "Implement regenerate-index.ts CLI script"
    goal: "Create the CLI entry point following sync-epic.ts pattern: HELP_TEXT, parseArgs, RegenerateIndexCLIOptionsSchema.safeParse, rethrowExitError, dynamic import of generateStoriesIndex, exit codes 0/1/2"
    files_to_read:
      - "packages/backend/kbar-sync/scripts/sync-epic.ts"
      - "packages/backend/kbar-sync/scripts/__types__/cli-options.ts"
    files_to_modify:
      - "packages/backend/kbar-sync/scripts/regenerate-index.ts (new)"
    acs: ["AC-1", "AC-2", "AC-3", "AC-5", "AC-8"]
    depends_on: "ST-1"
    verification: "pnpm --filter @repo/kbar-sync regenerate:index -- --help"
    estimated_tokens: 14000

  - id: ST-3
    title: "Register regenerate:index in package.json"
    goal: "Add pnpm script entry so CLI is invocable via pnpm --filter @repo/kbar-sync regenerate:index"
    files_to_read:
      - "packages/backend/kbar-sync/package.json"
    files_to_modify:
      - "packages/backend/kbar-sync/package.json"
    acs: ["AC-7"]
    depends_on: "ST-2"
    verification: "pnpm --filter @repo/kbar-sync run regenerate:index -- --help"
    estimated_tokens: 2000

  - id: ST-4
    title: "Write unit tests for regenerate-index.ts"
    goal: "Test file covering: --help output, argument parsing, Zod validation errors, --dry-run path (no file written, exit 0/1 based on diff), success write path (generateStoriesIndex mocked), DB error path (exit 2)"
    files_to_read:
      - "packages/backend/kbar-sync/scripts/__tests__/integration/sync-cli.integration.test.ts"
      - "packages/backend/kbar-sync/scripts/regenerate-index.ts"
    files_to_modify:
      - "packages/backend/kbar-sync/scripts/__tests__/regenerate-index.test.ts (new)"
    acs: ["AC-6"]
    depends_on: "ST-3"
    verification: "pnpm test --filter @repo/kbar-sync"
    estimated_tokens: 12000
