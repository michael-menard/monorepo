architectural_decisions:
  - id: ARCH-001
    question: >-
      Round-trip test (TC-07/AC-7) requires parseStoriesIndex() which reads from a file path — how to test against a
      generated string?
    decision: >-
      Write generated markdown string to a temporary file (os.tmpdir()) in the test, pass its path to
      parseStoriesIndex(), then clean up. This avoids modifying the parser signature.
    rationale: >-
      parseStoriesIndex() reads from filesystem and cannot be called with a raw string. Writing to tmpdir is idiomatic
      for Node.js test round-trips. Autonomy level is aggressive — Tier 1 clarification auto-accepted.
    decided_by: auto
  - id: ARCH-002
    question: >-
      The kbar.stories schema stores story data in flat columns plus a jsonb metadata field. Fields like 'Feature',
      'Infrastructure', 'Goal', 'Risk Notes' (per AC-5) are NOT in named columns — they would need to be in metadata
      jsonb or derived from description/title. How to handle missing per-story fields?
    decision: >-
      Map available DB columns to the required fields: title -> Goal header, description -> Goal body, storyType ->
      Feature prefix, metadata.surfaces -> Infrastructure list. Use empty string or 'N/A' for fields with no DB column
      equivalent (Risk Notes). Document this mapping in code comments.
    rationale: >-
      The kbar.stories schema has title, description, storyType, metadata.surfaces — these can be mapped to the required
      per-story section fields. Risk Notes has no dedicated column so defaults to empty/N/A. This is a Tier 3 ambiguous
      scope decision auto-accepted at aggressive autonomy.
    decided_by: auto
  - id: ARCH-003
    question: >-
      The kbar.stories.status field values (e.g., 'backlog', 'ready_to_work', 'in_progress') differ from the
      stories.index.md display values (e.g., 'pending', 'ready-to-work', 'in-progress'). Should the generator normalize
      these?
    decision: >-
      Use status values as-is from the DB. The Progress Summary table should use whatever status strings are stored in
      the DB. The round-trip test only verifies phase headers, not status string formats.
    rationale: >-
      No transformation layer needed — the DB is authoritative. Tier 1 clarification auto-accepted at aggressive
      autonomy.
    decided_by: auto
complexity: moderate
notes:
  - The generate/ directory does not yet exist — it must be created as part of ST-01
  - >-
    parseStoriesIndex() expects exactly 8 phase headers (## Phase N: Name) — the generator must include these phase
    headers in addition to per-story sections; the AC-14 scoping means round-trip test only asserts on phase header
    extraction, not individual story data
  - >-
    IMPORTANT: The existing stories.index.md format uses per-story sections (## KBAR-XXX: Title) NOT per-phase sections.
    The parseStoriesIndex() parser looks for ## Phase N headers specifically. The generated markdown should include
    Phase headers as structural dividers to satisfy AC-7/AC-14 round-trip. Phase N maps to kbar.stories.currentPhase or
    storyPoints for numeric ordering.
  - >-
    The kbar schema storyDependencies.storyId is a UUID FK to stories.id — the JOIN for human-readable labels requires
    alias to distinguish source vs target story in the same table join
  - >-
    onConflictDoUpdate for indexEntries: target is the uniqueEntry index on (indexId, storyId) — Drizzle uses the
    constraint name 'index_entries_unique' or the column tuple
  - >-
    The DB type for kbar stories uses kbar.stories not the KB API stories table — these are different schemas in
    different packages
  - >-
    skill-seeder.ts demonstrates the onConflictDoUpdate pattern with target column and set object for the upsert pattern
    needed in ST-06
