acceptance_criteria:
  - ac_id: "AC-1"
    ac_text: "sync:story --story-id <id> --story-dir <path> syncs story file to database; exits 0 on success, 1 on sync failure, 2 on DB connection failure"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-story.ts"
        description: "CLI command implements --story-id, --story-dir flags with Zod validation and syncStoryToDatabase delegation"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "Tests: exits 0 on success, exits 1 on sync failure, exits 2 on DB connection failure (9 tests in default/from-db sections)"
      - type: command
        command: "pnpm --filter @repo/kbar-sync run sync:story -- --help"
        result: SUCCESS

  - ac_id: "AC-2"
    ac_text: "sync:story --artifacts syncs all artifacts via batchSyncArtifactsForStory; --artifact-file/--artifact-type syncs single artifact via syncArtifactToDatabase"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-story.ts"
        description: "Lines 427-508: --artifacts calls batchSyncArtifactsForStory; --artifact-file+--artifact-type calls syncArtifactToDatabase"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "5 tests for --artifacts mode (success/failure); 5 tests for --artifact-file/--artifact-type mode (success/failure/security/DB errors)"

  - ac_id: "AC-3"
    ac_text: "sync:story --check-conflicts calls detectSyncConflicts; exits 1 with conflict details unless --force; also detects artifact conflicts via detectArtifactConflicts"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-story.ts"
        description: "Lines 334-388: --check-conflicts with conflict detection, --force override, artifact conflict sub-check"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "5 tests: no conflict (exit 0), conflict without force (exit 1), --force proceeds, artifact conflict (exit 1), detection failure (exit 1)"

  - ac_id: "AC-4"
    ac_text: "sync:epic --base-dir discovers all story directories (2 levels deep), syncs each via syncStoryToDatabase, continues on failures (fail-soft), prints per-story and final summary"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-epic.ts"
        description: "discoverStoryDirs() searches 2 levels; main() loop with fail-soft error handling; SUMMARY line at end"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-epic.test.ts"
        description: "5 tests for discoverStoryDirs (top-level, lifecycle dirs, filter, missing file, unreadable dir); 3 tests for fail-soft batch sync (failure continues, all succeed, no stories found)"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-epic.test.ts"
        description: "DB connection failure in batch loop exits 2; non-connection error continues (fail-soft); skipped status counts"

  - ac_id: "AC-5"
    ac_text: "sync:epic --artifact-type <type> calls batchSyncByType with --checkpoint passthrough; prints artifact count and checkpoint name"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-epic.ts"
        description: "Lines 357-401: --artifact-type calls batchSyncByType with artifactType and checkpointName; prints count and checkpoint"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-epic.test.ts"
        description: "3 tests: batchSyncByType called with correct args+checkpoint; exits 1 on failures; exits 2 on DB connection error"

  - ac_id: "AC-6"
    ac_text: "Dry-run uses CLI-layer checksum comparison (computeChecksum + direct DB read) without calling syncStoryToDatabase; sync:epic --dry-run uses single batch query (N+1 prevention)"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-story.ts"
        description: "dryRunStory() uses computeChecksum + queryDbChecksum(pg); syncStoryToDatabase is NOT called in dry-run path"
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-epic.ts"
        description: "dryRunEpic() uses batchQueryDbChecksums() — single batch query via IN clause for all story IDs"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "dryRunStory() tests: syncStoryToDatabase not called (zero-mutation assertion, 3 tests)"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-epic.test.ts"
        description: "dryRunEpic() N+1 prevention test: exactly ONE pool.query call for 3 stories; syncStoryToDatabase not called"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/integration/sync-cli.integration.test.ts"
        description: "Integration: dryRunEpic with 3 stories against real PostgreSQL — all result in dbChecksum null (not in DB), single query verified"

  - ac_id: "AC-7"
    ac_text: "package.json registers sync:story and sync:epic scripts; both --help exit 0 and print usage"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/package.json"
        description: "scripts.sync:story = 'tsx scripts/sync-story.ts'; scripts.sync:epic = 'tsx scripts/sync-epic.ts'"
      - type: command
        command: "pnpm --filter @repo/kbar-sync run sync:story -- --help"
        result: SUCCESS
        output: "Prints sync:story help text with all flags; exits 0"
      - type: command
        command: "pnpm --filter @repo/kbar-sync run sync:epic -- --help"
        result: SUCCESS
        output: "Prints sync:epic help text with all flags; exits 0"

  - ac_id: "AC-8"
    ac_text: "All CLI option types use Zod schemas (SyncStoryCLIOptionsSchema, SyncEpicCLIOptionsSchema); no TypeScript interfaces; no as any casts in schema definitions"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/__types__/cli-options.ts"
        description: "SyncStoryCLIOptionsSchema and SyncEpicCLIOptionsSchema defined with Zod; types via z.infer<>; no interfaces"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "Zod validation tests: exits 1 on missing --story-id, missing --story-dir, invalid --artifact-type"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-epic.test.ts"
        description: "Zod validation tests: exits 1 on missing --base-dir, invalid --artifact-type"
      - type: command
        command: "pnpm --filter @repo/kbar-sync check-types"
        result: SUCCESS

  - ac_id: "AC-9"
    ac_text: "Errors written to stderr; progress/summary written to stdout; exit codes 0/1/2 used as specified"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "Tests verify: ERROR messages on stderr; SUCCESS/progress on stdout; exit codes 0 (success), 1 (failure/conflict/validation), 2 (DB connection)"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-epic.test.ts"
        description: "Tests verify: SUMMARY on stdout; DB errors on stderr; exit codes 0 (all success), 1 (partial failure), 2 (DB connection abort)"

  - ac_id: "AC-10"
    ac_text: "Unit tests achieve >80% line coverage on sync-story.ts and sync-epic.ts"
    status: PASS
    evidence_items:
      - type: command
        command: "pnpm test --filter @repo/kbar-sync -- --coverage"
        result: SUCCESS
        output: "sync-story.ts: 93.48% lines; sync-epic.ts: 90.28% lines; global: 89.03% lines; all 139 tests pass"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "63 unit tests covering parseArgs, --help, Zod validation, dryRunStory, --dry-run, --check-conflicts, default sync, --from-db, --artifacts, --artifact-file/--artifact-type, path traversal, failure paths"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-epic.test.ts"
        description: "76 unit tests covering parseArgs, discoverStoryDirs, dryRunEpic, --help, Zod validation, --dry-run, fail-soft batch sync, --artifact-type mode, DB connection failure, skipped status, verbose output"

  - ac_id: "AC-11"
    ac_text: "Integration tests using @testcontainers/postgresql cover: dry-run zero-mutation, happy-path story sync write, dryRunEpic single batch query (N+1 prevention)"
    status: PASS
    evidence_items:
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/integration/sync-cli.integration.test.ts"
        description: "3 integration tests with real PostgreSQL (testcontainers): (1) dry-run zero-mutation - row count unchanged; (2) happy-path sync write - story row with correct checksum persisted; (3) dryRunEpic single batch query with real pg"
      - type: command
        command: "pnpm --filter @repo/kbar-sync test:integration"
        result: SUCCESS
        output: "3 tests pass; dry-run PASS; happy-path PASS; dryRunEpic PASS"

  - ac_id: "AC-12"
    ac_text: "sync:story --dry-run uses Approach 2 (computeChecksum + direct DB read); syncStoryToDatabase is NOT called during dry-run; zero-mutation guarantee enforced"
    status: PASS
    evidence_items:
      - type: file
        path: "packages/backend/kbar-sync/scripts/sync-story.ts"
        description: "dryRunStory() calls computeChecksum + queryDbChecksum(pg Pool); syncStoryToDatabase is never imported or called in dry-run code path"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/sync-story.test.ts"
        description: "3 tests assert syncStoryToDatabase not called in dry-run (up-to-date, not-in-DB, checksum-differs cases)"
      - type: test
        path: "packages/backend/kbar-sync/scripts/__tests__/integration/sync-cli.integration.test.ts"
        description: "Integration: dry-run zero-mutation assertion — kbar.stories row count unchanged after dryRunStory() with real PostgreSQL"

