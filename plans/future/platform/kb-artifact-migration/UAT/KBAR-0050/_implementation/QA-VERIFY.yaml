lessons_to_record:
  - lesson: "vi.hoisted() is required when unit tests need shared mock instances across multiple vi.mock() factory calls in Vitest — plain vi.fn() at module scope is not hoisted before vi.mock() executes"
    category: pattern
    tags: ["testing", "vitest", "mocking", "kbar-sync"]

  - lesson: "Dynamic imports (await import()) in CLI scripts prevent @repo/db module-level initialization from failing when running --help without DB env vars; essential for CLI ergonomics"
    category: pattern
    tags: ["cli", "esm", "lazy-import", "kbar-sync"]

  - lesson: "Separate vitest.integration.config.ts avoids @repo/db module initialization failures when integration tests run alongside src/ unit tests in the same Vitest process"
    category: pattern
    tags: ["testing", "vitest", "integration", "testcontainers"]

  - lesson: "batchQueryDbChecksums() with SQL IN clause is the correct N+1 prevention pattern for sync:epic --dry-run; eliminates per-story DB round trips"
    category: pattern
    tags: ["performance", "database", "dry-run", "kbar-sync"]

