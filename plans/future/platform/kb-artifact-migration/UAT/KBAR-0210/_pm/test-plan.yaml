strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  files_touched:
    - .claude/commands/dev-implement-story.md
    - .claude/commands/elab-story.md
    - .claude/commands/qa-verify-story.md
    - .claude/commands/dev-fix-story.md
    - .claude/commands/dev-code-review.md
    - .claude/commands/story-update.md
    - .claude/commands/story-move.md

happy_path_tests:
  - id: HP-1
    title: "elab-story.md PASS path sets state to 'ready' (verified valid)"
    setup: "Story KBAR-0210 exists in DB in 'backlog' state"
    action: "Review elab-story.md PASS path — confirm kb_update_story_status call uses state: 'ready'"
    expected: "state value is 'ready', which is a valid StoryStateSchema enum value. If instead it used 'ready_to_work', that would be invalid and must be corrected."
    evidence: "Diff review of elab-story.md PASS path call site against StoryStateSchema enum values in apps/api/knowledge-base/src/__types__/index.ts"

  - id: HP-2
    title: "dev-implement-story.md Step 0.6 claim sets state to 'in_progress'"
    setup: "Story in 'ready' state, worktree verified"
    action: "Review dev-implement-story.md for Step 0.6 claim block with kb_update_story_status state: 'in_progress', guard, and abort recovery"
    expected: "Step 0.6 block is present with all three elements (claim call, guard, abort recovery instruction)"
    evidence: "Diff review of dev-implement-story.md Step 0.6 section"

  - id: HP-3
    title: "All workflow commands document graceful failure for kb_update_story_status"
    setup: "Each command file open for review"
    action: "Check each command for graceful failure note: if kb_update_story_status returns null or throws, emit WARNING and continue"
    expected: "Each command file (dev-implement-story, elab-story, dev-fix-story) documents WARNING + continue semantics for KB unavailability"
    evidence: "Diff review of each command file — grep for 'WARNING' near kb_update_story_status calls"

  - id: HP-4
    title: "dev-fix-story.md guard and abort recovery pattern present"
    setup: "dev-fix-story.md open for review"
    action: "Verify Step 0.6 claim (state: 'in_progress'), idempotency note, and abort recovery instruction"
    expected: "All three elements present — consistent with dev-code-review.md and qa-verify-story.md patterns"
    evidence: "Diff review of dev-fix-story.md Step 0.6 section"

  - id: HP-5
    title: "qa-verify-story.md and dev-code-review.md are already correct (no changes needed)"
    setup: "qa-verify-story.md and dev-code-review.md open for review"
    action: "Confirm no state string corrections needed, guard patterns present, abort recovery present"
    expected: "Both files pass audit with no changes required"
    evidence: "Grep for kb_update_story_status in both files — verify state strings against StoryStateSchema"

error_cases:
  - id: EC-1
    title: "elab-story.md uses incorrect state string"
    setup: "elab-story.md PASS path calls kb_update_story_status"
    action: "If state string used is NOT a valid StoryStateSchema enum value, identify and correct it"
    expected: "State string matches one of: backlog, ready, in_progress, ready_for_review, in_review, ready_for_qa, in_qa, completed, cancelled, deferred, failed_code_review, failed_qa"
    evidence: "Before/after diff showing state string correction in elab-story.md"

  - id: EC-2
    title: "dev-implement-story.md done-path uses correct state string"
    setup: "dev-implement-story.md Done sections (state: 'ready_for_review')"
    action: "Verify 'ready_for_review' is a valid StoryStateSchema enum value"
    expected: "'ready_for_review' is valid per StoryStateSchema — no correction needed"
    evidence: "Grep confirmation: 'ready_for_review' in StoryStateSchema enum in __types__/index.ts"

  - id: EC-3
    title: "story-update.md or story-move.md has a regression"
    setup: "Both files open for review"
    action: "Audit shimUpdateStoryStatus call sites for regressions"
    expected: "No regressions found — both files remain unchanged"
    evidence: "Audit log entry confirming no changes made"

edge_cases:
  - id: ED-1
    title: "Parallel dev-implement-story runs without Step 0.6 claim — DB state not set to in_progress"
    setup: "Two parallel agents attempt dev-implement-story on same story"
    action: "Confirm dev-implement-story.md Step 0.6 claim prevents second agent from double-claiming (guard check)"
    expected: "Guard detects state already 'in_progress', second agent stops with clear message"
    evidence: "Manual test with two concurrent sessions or documented guard logic review"

  - id: ED-2
    title: "Abort recovery for interrupted qa-verify-story"
    setup: "qa-verify-story.md run interrupted mid-execution with story in 'in_qa' state"
    action: "Follow abort recovery instruction in qa-verify-story.md to reset state"
    expected: "Recovery instruction resets story to prior state (ready_for_qa) using kb_update_story_status"
    evidence: "Manual test with live KB server (ADR-005 compliance) confirming state reset"

  - id: ED-3
    title: "kb_update_story_status graceful failure — KB unavailable during elab-story PASS"
    setup: "KB server down during elab-story PASS path execution"
    action: "Confirm elab-story.md documents WARNING + continue behavior if kb_update_story_status throws"
    expected: "WARNING emitted, workflow continues — story file status updated even if DB write fails"
    evidence: "Diff review showing graceful failure documentation in elab-story.md"

tooling_evidence:
  backend:
    http_requests: []
    assertions: []
  frontend: null

manual_cases:
  - id: MC-1
    title: "Full canary story workflow after landing KBAR-0210 changes"
    steps:
      - "Create a test story in 'backlog' state"
      - "Run /elab-story — confirm KB state transitions to 'ready'"
      - "Run /dev-implement-story — confirm KB state transitions to 'in_progress' at Step 0.6"
      - "Run /dev-code-review — confirm KB state transitions to 'in_review' at Step 0.6"
      - "Run /qa-verify-story — confirm KB state transitions to 'in_qa' at Step 0.6"
      - "Confirm all transitions visible in DB (SELECT state FROM stories WHERE story_id = '<id>')"
    expected: "All state transitions recorded correctly in DB at each workflow step"

  - id: MC-2
    title: "Abort recovery verification for qa-verify-story"
    steps:
      - "Start /qa-verify-story on a test story"
      - "Interrupt execution mid-Phase 1"
      - "Follow abort recovery instruction in qa-verify-story.md"
      - "Confirm story DB state is reset to 'ready_for_qa'"
    expected: "Recovery instruction works correctly with live KB server"

fixture_definitions:
  - name: test_story_for_canary
    type: story
    description: "A story in 'backlog' state used to run the full canary workflow end-to-end after KBAR-0210 lands"

risks:
  - "State string audit depends on reading StoryStateSchema enum at implementation time — must re-verify at dev time"
  - "Live KB server required for MC-1 and MC-2 (ADR-005) — cannot be automated without test harness"
  - "Command markdown changes are human-reviewed, not unit-tested — correctness is diff-review-only until live system runs"
