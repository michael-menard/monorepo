strategy: unit
scope:
  endpoints: []
  ui_touched: false
  data_touched: true

happy_path_tests:
  - id: HP-1
    title: "handleKbReadArtifact returns JSON-serialized ArtifactResponse when artifact exists"
    setup: "mockKbReadArtifact resolves with a valid ArtifactResponse fixture"
    action: "Call handleKbReadArtifact with valid { story_id, artifact_type } input and mockDeps"
    expected: "Returns McpToolResult with content[0].text = JSON.stringify(artifact, null, 2)"
    evidence: "Assert result.content[0].type === 'text' and JSON.parse(result.content[0].text).id matches fixture id"

  - id: HP-2
    title: "handleKbWriteArtifact returns JSON-serialized ArtifactResponse on successful write"
    setup: "mockKbWriteArtifact resolves with a valid ArtifactResponse fixture"
    action: "Call handleKbWriteArtifact with valid { story_id, artifact_type, content } input"
    expected: "Returns McpToolResult with content[0].text = JSON.stringify(artifact, null, 2)"
    evidence: "Assert result.content[0].type === 'text' and JSON.parse(result.content[0].text).story_id matches"

  - id: HP-3
    title: "handleKbListArtifacts returns artifact list with count"
    setup: "mockKbListArtifacts resolves with { artifacts: [artifact1, artifact2], total: 2 }"
    action: "Call handleKbListArtifacts with valid { story_id } input"
    expected: "Returns McpToolResult with JSON body containing artifacts array and total: 2"
    evidence: "Assert JSON.parse(result.content[0].text).total === 2"

  - id: HP-4
    title: "handleKbDeleteArtifact returns { deleted: true, artifact_id } on successful deletion"
    setup: "mockKbDeleteArtifact resolves with true"
    action: "Call handleKbDeleteArtifact with valid { artifact_id: validUUID }"
    expected: "Returns McpToolResult with content[0].text = JSON.stringify({ deleted: true, artifact_id })"
    evidence: "Assert JSON.parse(result.content[0].text).deleted === true"

  - id: HP-5
    title: "handleKbListArtifacts with include_content: true returns content field on items"
    setup: "mockKbListArtifacts resolves with artifacts that include content field"
    action: "Call handleKbListArtifacts with { story_id, include_content: true }"
    expected: "Returned artifact items include content field"
    evidence: "Assert first artifact in result has content property defined"

error_cases:
  - id: EC-1
    title: "handleKbReadArtifact returns 'null' text when artifact not found"
    setup: "mockKbReadArtifact resolves with null (DB miss)"
    action: "Call handleKbReadArtifact with valid input for non-existent artifact"
    expected: "Returns McpToolResult with content[0] = { type: 'text', text: 'null' }"
    evidence: "Assert result.content[0].text === 'null' (not JSON null, but string 'null')"

  - id: EC-2
    title: "handleKbReadArtifact returns MCP error result on invalid input"
    setup: "No mock setup needed — Zod parse will fail"
    action: "Call handleKbReadArtifact with { story_id: '', artifact_type: 'checkpoint' } (empty story_id)"
    expected: "Returns MCP error result from errorToToolResult (isError: true or error content)"
    evidence: "Assert result.isError === true or result.content[0].text contains error message"

  - id: EC-3
    title: "handleKbReadArtifact returns MCP error result on DB rejection"
    setup: "mockKbReadArtifact rejects with new Error('DB connection failed')"
    action: "Call handleKbReadArtifact with valid input"
    expected: "Returns MCP error result, does not throw"
    evidence: "Assert result.isError === true"

  - id: EC-4
    title: "handleKbWriteArtifact returns MCP error result on missing required fields"
    setup: "No mock setup — Zod parse will fail"
    action: "Call handleKbWriteArtifact with {} (no fields)"
    expected: "Returns MCP error result from errorToToolResult"
    evidence: "Assert result.isError === true or error content present"

  - id: EC-5
    title: "handleKbWriteArtifact returns MCP error result on DB rejection"
    setup: "mockKbWriteArtifact rejects with new Error('Constraint violation')"
    action: "Call handleKbWriteArtifact with valid input"
    expected: "Returns MCP error result, does not throw"
    evidence: "Assert result.isError === true"

  - id: EC-6
    title: "handleKbListArtifacts returns empty result when no artifacts exist"
    setup: "mockKbListArtifacts resolves with { artifacts: [], total: 0 }"
    action: "Call handleKbListArtifacts with valid { story_id }"
    expected: "Returns McpToolResult with JSON containing artifacts: [] and total: 0"
    evidence: "Assert JSON.parse(result.content[0].text).total === 0 && artifacts.length === 0"

  - id: EC-7
    title: "handleKbListArtifacts returns MCP error result on DB rejection"
    setup: "mockKbListArtifacts rejects with new Error('Query timeout')"
    action: "Call handleKbListArtifacts with valid input"
    expected: "Returns MCP error result, does not throw"
    evidence: "Assert result.isError === true"

  - id: EC-8
    title: "handleKbDeleteArtifact returns not-found response when artifact returns false"
    setup: "mockKbDeleteArtifact resolves with false (artifact not found in DB)"
    action: "Call handleKbDeleteArtifact with valid UUID that does not match any artifact"
    expected: "Returns McpToolResult with JSON containing deleted: false"
    evidence: "Assert JSON.parse(result.content[0].text).deleted === false"

  - id: EC-9
    title: "handleKbDeleteArtifact returns MCP error result on invalid UUID"
    setup: "No mock setup — Zod parse will fail on non-UUID string"
    action: "Call handleKbDeleteArtifact with { artifact_id: 'not-a-uuid' }"
    expected: "Returns MCP error result from errorToToolResult"
    evidence: "Assert result.isError === true"

  - id: EC-10
    title: "handleKbDeleteArtifact returns MCP error result on DB rejection"
    setup: "mockKbDeleteArtifact rejects with new Error('DB error')"
    action: "Call handleKbDeleteArtifact with valid UUID"
    expected: "Returns MCP error result, does not throw"
    evidence: "Assert result.isError === true"

edge_cases:
  - id: ED-1
    title: "handleKbReadArtifact with explicit iteration: 0 retrieves correct artifact"
    setup: "mockKbReadArtifact resolves with fixture matching iteration 0"
    action: "Call handleKbReadArtifact with { story_id, artifact_type, iteration: 0 }"
    expected: "Returns artifact; mock called with exactly { story_id, artifact_type, iteration: 0 }"
    evidence: "Assert mockKbReadArtifact.mock.calls[0][0].iteration === 0"

  - id: ED-2
    title: "handleKbWriteArtifact with iteration > 0 (fix cycle) passes iteration through"
    setup: "mockKbWriteArtifact resolves with fixture with iteration: 2"
    action: "Call handleKbWriteArtifact with { story_id, artifact_type, content, iteration: 2 }"
    expected: "Mock called with iteration: 2; response reflects iteration: 2"
    evidence: "Assert JSON.parse(result.content[0].text).iteration === 2"

  - id: ED-3
    title: "handleKbListArtifacts with artifact_type filter passes filter to operation"
    setup: "mockKbListArtifacts resolves with filtered artifacts"
    action: "Call handleKbListArtifacts with { story_id, artifact_type: 'checkpoint' }"
    expected: "mockKbListArtifacts called with artifact_type: 'checkpoint'"
    evidence: "Assert mockKbListArtifacts.mock.calls[0][0].artifact_type === 'checkpoint'"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "result.content[0].type === 'text'"
      - "result.isError === true for error paths"
      - "JSON.parse(result.content[0].text) matches ArtifactResponse shape"
      - "mockKbReadArtifact called with validated input (not raw)"
      - "string 'null' returned (not JSON null) for KB miss in handleKbReadArtifact"

manual_cases: []

fixture_definitions:
  - name: createMockArtifact
    type: "() => ArtifactResponse"
    description: "Factory returning a valid ArtifactResponse with crypto.randomUUID() id, test story_id, artifact_type: 'checkpoint', phase: 'implementation', iteration: 0, content: { status: 'test' }, summary: null, created_at/updated_at as Date"

  - name: createMockArtifactListItem
    type: "() => ArtifactListItem"
    description: "Factory returning a valid ArtifactListItem (without content by default). Mirrors createMockArtifact but omits content field."

  - name: mockDeps
    type: "ToolHandlerDeps"
    description: "{ embeddingClient: createMockEmbeddingClient(), db: {} as any } — same pattern as story-tools.test.ts"

risks:
  - "null-return path: the handler returns the string 'null' not JSON null. Tests must assert text === 'null' literally."
  - "authorization: enforceAuthorization is called before operation. If context has wrong role, handler returns error before mock is invoked. Tests should verify this doesn't throw."
  - "Zod default for iteration: KbReadArtifactInputSchema iteration is optional; KbWriteArtifactInputSchema iteration defaults to 0. Test with and without explicit iteration."
  - "ArtifactResponse uses interface not Zod schema — fixture factory must use inline object matching the interface shape."
