complexity: simple

notes:
  - "Mock isolation critical: vi.mock('../../crud-operations/artifact-operations.js') — NOT crud-operations/index.js"
  - "null-return path: handleKbReadArtifact returns { content: [{ type: 'text', text: 'null' }] } (string 'null') when kb_read_artifact returns null. EC-1 asserts result.content[0].text === 'null' (string, not null value)."
  - "kb_delete_artifact takes a bare string (not an input object) — the handler calls kb_delete_artifact(validated.artifact_id, { db }) not kb_delete_artifact(validated, { db })"
  - "ArtifactResponse and ArtifactListItem are TypeScript interfaces (not Zod schemas) — createMockArtifact() fixture must return inline object matching the interface shape"
  - "KbWriteArtifactInputSchema.iteration defaults to 0 via Zod .default(0); KbReadArtifactInputSchema.iteration is optional with no default"
  - "ST-2, ST-3, ST-4 can be worked in parallel (all depend only on ST-1); plan agent should complete ST-2 and ST-3 before ST-4 for token budget consistency"
  - "Tool count in mcp-integration.test.ts must remain 53 — no new tools are added in this story"
  - "elab=PASS, no gaps, 2 opportunities (iteration:2 coverage in write, filter forwarding in list) — both are captured in ST-3 (ED-2) and ST-4 (ED-3) respectively"
