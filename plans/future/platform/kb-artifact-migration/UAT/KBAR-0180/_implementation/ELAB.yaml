    finding: >
      The REVIEW artifact content includes a tokens field (tokens.in, tokens.out) for
      the aggregator's own token usage. After migration to artifact_write, each dual-write
      will also generate KB indexing tokens. If future analysis of total workflow cost per
      review iteration is needed, capturing kb_write_tokens in the REVIEW artifact's
      tokens field (or in a separate cost_metadata field) would enable it. Not MVP-blocking.
    effort: low
    decision: log_to_kb
    kb_entry_id: "ee59ab2a-7947-4191-8190-11e639e636ff"

  - id: opp-3
    category: integrations
    finding: >
      Once REVIEW artifacts are written to _implementation/REVIEW.yaml via dual-write,
      KBAR-0020 (KB-Driven Index Generation) and KBAR-0025 (Lesson Extraction from Evidence)
      could be extended to also scan REVIEW artifacts for recurring patterns (e.g. which
      workers most frequently FAIL across stories). This cross-story review analytics use
      case is enabled by the dual-write but not in scope for KBAR-0180.
    effort: medium
    decision: log_to_kb
    kb_entry_id: "351750cc-060c-4f42-b4a8-b8a049b73f95"

