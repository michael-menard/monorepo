feasible: true
confidence: high
rationale: >
  KBAR-0180 is a documentation-only migration: one agent markdown file (review-aggregate-leader.agent.md)
  needs its REVIEW artifact write call updated from kb_write_artifact to artifact_write, along with
  frontmatter kb_tools update and graceful failure semantics documentation. Scope confirmed by grep
  showing only review-aggregate-leader.agent.md calls kb_write_artifact in the code review agent family.
  The 10 worker agents (code-review-syntax, security, react, typescript, style-compliance, reusability,
  accessibility, build, lint, typecheck) return YAML output to orchestrator context only — no direct KB writes.
  No TypeScript code changes needed. Hard dependency on KBAR-0160 (needs-code-review) and transitively
  KBAR-0110 (UAT); implementation must not start until both are merged.

complexity: low

change_surface:
  areas:
    - .claude/agents (agent markdown documentation)
  endpoints: []
  deploy_touchpoints:
    - "No deployment steps: agent markdown is config/documentation, not compiled code"

scope_confirmation:
  files_confirmed_in_scope:
    - path: ".claude/agents/review-aggregate-leader.agent.md"
      reason: "Only file that calls kb_write_artifact in the code review agent family (grep-confirmed)"
      changes:
        - "Step 5 (Write Review Artifact to KB): replace kb_write_artifact call with artifact_write"
        - "Add explicit file_path argument: {feature_dir}/in-progress/{story_id}/_implementation/REVIEW.yaml"
        - "Add iteration parameter: {iteration}"
        - "Update frontmatter kb_tools: remove kb_write_artifact, add artifact_write"
        - "Document graceful failure semantics: file_written:true + kb_write_warning pattern"
  files_confirmed_out_of_scope:
    - pattern: ".claude/agents/code-review-*.agent.md (10 files)"
      reason: "None call kb_write_artifact; return YAML output to orchestrator context only"
    - path: ".claude/agents/code-review-security.agent.md"
      reason: "Uses kb_search/kb_add_lesson/kb_add_decision — knowledge capture, not REVIEW artifact writes"
    - path: "packages/backend/orchestrator/src/artifacts/review.ts"
      reason: "Content schema unchanged — only write mechanism migrated"

iteration_naming_resolution:
  decision: "Option A — _implementation/REVIEW.yaml (overwrite each iteration)"
  rationale: >
    KBAR-0160 established the canonical pattern: CHECKPOINT.yaml, SCOPE.yaml, PLAN.yaml all use
    fixed filenames without iteration suffix (overwrite on each call). The review-aggregate-leader
    already receives an iteration parameter passed to kb_write_artifact, but the file_path convention
    from KBAR-0160 uses plain artifact-type names. Overwriting REVIEW.yaml on each iteration keeps
    the pattern consistent. The KB write leg of artifact_write stores each write as a separate KB
    artifact record with an iteration field — so pattern analysis across iterations is still possible
    via KB queries even with a single file on disk. Option B (REVIEW-{N}.yaml) adds complexity
    without clear benefit given KB storage handles history. Dev should verify with KBAR-0160 at
    implementation time; if KBAR-0160 establishes a different precedent for iterable artifacts,
    follow that instead.
  file_path_template: "{feature_dir}/in-progress/{story_id}/_implementation/REVIEW.yaml"

risks:
  - finding: "Hard dependency on KBAR-0160 (needs-code-review) and KBAR-0110 (UAT) — cannot implement until both are merged"
    mitigation: "Story index reflects Created status. Gate implementation start behind KBAR-0160 merge."
  - finding: "artifact_write input schema must be verified from landed KBAR-0110 at implementation time — field names may differ from assumed shape"
    mitigation: "ST-1 explicitly reads KBAR-0110 final implementation before writing any agent call documentation"

missing_requirements: []

evidence_expectations:
  - "REVIEW.yaml present at expected _implementation/ path after /dev-code-review workflow run"
  - "artifact_search returns the REVIEW artifact for the story (confirms KB write leg succeeded)"
  - "Diff of review-aggregate-leader.agent.md shows only REVIEW write step and frontmatter changes — no content schema changes"
  - "grep -rn 'kb_write_artifact' .claude/agents/code-review*.agent.md returns no output (confirming workers unchanged)"

subtasks:
  - id: ST-1
    title: "Verify artifact_write tool schema and KBAR-0160 file_path convention"
    goal: "Confirm the exact artifact_write input shape from landed KBAR-0110 and the canonical file_path convention from KBAR-0160 before writing agent documentation"
    files_to_read:
      - "plans/future/platform/kb-artifact-migration/UAT/KBAR-0110/KBAR-0110.md"
      - "plans/future/platform/kb-artifact-migration/ready-to-work/KBAR-0160/KBAR-0160.md"
      - ".claude/agents/dev-setup-leader.agent.md"
      - ".claude/agents/review-aggregate-leader.agent.md"
    files_to_modify: []
    acs: []
    depends_on: "none"
    verification: "Confirm artifact_write input fields, confirm iteration naming convention matches KBAR-0160 pattern"
    estimated_tokens: 4000

  - id: ST-2
    title: "Migrate review-aggregate-leader.agent.md REVIEW write to artifact_write"
    goal: "Replace kb_write_artifact call in Step 5 with artifact_write using explicit file_path; update frontmatter kb_tools; document graceful failure semantics"
    files_to_read:
      - ".claude/agents/review-aggregate-leader.agent.md"
    files_to_modify:
      - ".claude/agents/review-aggregate-leader.agent.md"
    acs: ["AC-1", "AC-2", "AC-3", "AC-4", "AC-5", "AC-6", "AC-7"]
    depends_on: "ST-1"
    verification: "grep -rn 'kb_write_artifact' .claude/agents/review-aggregate*.agent.md returns no results; grep -rn 'artifact_write' .claude/agents/review-aggregate*.agent.md returns the new call; frontmatter shows artifact_write in kb_tools"
    estimated_tokens: 5000

  - id: ST-3
    title: "Human review and canary code review workflow validation"
    goal: "Confirm diff against all 7 ACs; functional test via running a canary story through /dev-code-review"
    files_to_read:
      - ".claude/agents/review-aggregate-leader.agent.md"
    files_to_modify: []
    acs: ["AC-1", "AC-2", "AC-3", "AC-4", "AC-5", "AC-6", "AC-7"]
    depends_on: "ST-2"
    verification: "_implementation/REVIEW.yaml exists after /dev-code-review run; artifact_search returns REVIEW for the story"
    estimated_tokens: 3000
