  - id: story_sizing
    status: PASS
    note: >
      9 ACs (1 over threshold of 8), but story points=3 and complexity=medium. No frontend work.
      0 new HTTP endpoints. 5 files modified, touching only 1 package (apps/api/knowledge-base).
      1 distinct happy path. Sizing_warning:true in frontmatter indicates this was reviewed.
