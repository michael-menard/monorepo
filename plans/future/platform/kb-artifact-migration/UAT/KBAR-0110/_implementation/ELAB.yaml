  - id: subtask_decomposition
    status: PASS
    note: >
      6 subtasks (ST-1 through ST-6) form a clean linear DAG with no cycles.
      AC coverage: AC-1=ST-4, AC-2=ST-2, AC-3/AC-4/AC-5/AC-6=ST-3, AC-7=ST-5,
      AC-8/AC-9=ST-6. All 9 ACs covered. File counts per subtask: ST-1=reads only (0 writes),
