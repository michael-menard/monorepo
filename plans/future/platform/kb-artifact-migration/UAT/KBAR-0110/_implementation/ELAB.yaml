gaps:  # MVP-blocking only
  - id: gap-1
    check: testability
    finding: >
      AC-7 enumerates only 4 test scenarios (HP-1, EC-1, EC-2, HP-2) but the authoritative
      test_plan includes HP-4, ED-1, EC-4, ED-2, ED-3. ST-5 implementation may only cover
      the 4 AC-7 scenarios and omit the others, creating a coverage gap for optional fields,
      explicit skip_kb:false, and timeout behavior.
    severity: low
    decision: add_ac
    ac_added: "AC-7: Expanded to enumerate all 8 test_plan cases (HP-1, HP-2, HP-4, EC-1, EC-2, EC-4, ED-1, ED-2)"

opportunities:  # Non-blocking
  - id: opp-1
    category: performance
    finding: >
      EC-4 timeout test mocks kb_write_artifact to delay 10000ms then reject. This will
      cause the test to take up to 10s in CI unless vi.useFakeTimers() is used or a
      Promise.race with a short timeout constant is employed. Recommend using fake timers
      or reducing the mock delay to 100ms with a race mechanism to keep CI fast.
    effort: low
    decision: log_to_kb
    kb_entry_id: "d7b88057-010f-41e9-a7bd-1717c269e5c0"

  - id: opp-2
    category: edge_cases
    finding: >
      The story does not specify behavior when file_path points to a directory rather than
      a file (e.g., ends in /). fs/promises.writeFile would throw EISDIR. This edge case
      is not tested. Could be added as an ED-4 test in ST-5 if desired.
    effort: low
    decision: log_to_kb
    kb_entry_id: "e6a04e25-2808-45e6-97d1-447cc672ce56"

  - id: opp-3
    category: observability
    finding: >
      The dual-write response shape (AC-6) does not include a timestamp for when each write
      completed. Adding write_timestamp or kb_artifact_created_at could help agents debug
      timing issues in production. Not MVP-critical.
    effort: low
    decision: log_to_kb
    kb_entry_id: "95d541c1-4726-4649-8654-9a62a5487e08"

