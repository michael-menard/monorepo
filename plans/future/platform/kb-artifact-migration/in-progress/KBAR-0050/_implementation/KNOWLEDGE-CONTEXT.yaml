# ============================================================================
# Lessons from Prior Stories
# ============================================================================

lessons:
  - id: LS-001
    title: "N+1 prevention for batch dry-run queries"
    from_story: "KBAR-0040"
    detail: |
      Batch dry-run (sync:epic --dry-run) must use a single SELECT IN query
      to fetch all story checksums at once. Avoid per-story round trips.
      Pattern: SELECT story_id, checksum FROM kbar.stories WHERE story_id = ANY($1)

  - id: LS-002
    title: "ESM .js extensions required in imports"
    from_story: "KBAR-0030, KBAR-0040"
    detail: |
      All internal imports in TypeScript ESM files must end in .js even if
      the source file is .ts. TSX and tsc both resolve correctly.
      Example: import { computeChecksum } from '../src/__types__/index.js'

  - id: LS-003
    title: "Fail-soft pattern for batch operations"
    from_story: "KBAR-0040"
    detail: |
      Individual item failures must not abort the batch. Catch errors per-item,
      push to errors array, continue processing, print summary at end, exit 1
      if any failures. This is the established pattern in batchSyncArtifactsForStory.

  - id: LS-004
    title: "Exit code 2 for dependency failures"
    from_story: "KBAR-0050 AC-9"
    detail: |
      DB connection failure and @repo/kbar-sync import failure → exit code 2.
      Wrap main() DB connection in try/catch, catch connection errors specifically
      and call process.exit(2) before the general process.exit(1).

  - id: LS-005
    title: "Exported helper functions required for testability"
    from_story: "KBAR-0050 integration test scaffolding"
    detail: |
      The integration test file imports dryRunStory() from sync-story.ts and
      dryRunEpic() from sync-epic.ts as named exports. These helper functions
      must be exported (not just used internally in main()) to enable direct
      testing without spawning a subprocess.
