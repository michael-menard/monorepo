# ============================================================================
# Confirmed Patterns (from canonical reference files)
# ============================================================================

confirmed_patterns:
  - id: CP-001
    title: "Script entry point pattern"
    source: "packages/backend/orchestrator/src/scripts/populate-story-status.ts"
    details: |
      - Shebang: #!/usr/bin/env npx tsx
      - Zod-based CliOptionsSchema for arg parsing
      - parseArgs() reads process.argv.slice(2) directly
      - Fail-soft: errors caught per-item, collected, logged at end
      - Stats aggregation object built incrementally
      - process.exit(1) on failure, exit(0) on success
      - Guard: `if (import.meta.url === 'file://${process.argv[1]}') { main() }`
      - @repo/logger for structured trace output
      - Plain console.log/console.error for human-readable progress (stdout/stderr)

  - id: CP-002
    title: "Zod CLI option schema pattern"
    source: "apps/api/knowledge-base/src/cli/index.ts"
    details: |
      - Each command has its own Zod schema (e.g., CliAddNoteSchema, CliListTasksSchema)
      - z.object() with explicit field types
      - .default() for optional flags with default values
      - z.boolean().default(false) for flag-style options
      - .safeParse() used for validation; never .parse() in CLI scripts
      - type = z.infer<typeof Schema> immediately after schema definition
      - parseOptions() function parses --key value pairs from process.argv

  - id: CP-003
    title: "kbar-sync function call pattern and result handling"
    source: "packages/backend/kbar-sync/src/batch-sync-artifacts.ts"
    details: |
      - Functions return typed result objects with success/error fields
      - Per-item fault isolation: errors caught per item, processing continues
      - Batch result aggregation: synced/skipped/failed counts
      - All inputs validated with Zod schemas before function call
      - syncStoryToDatabase({ storyId, filePath, triggeredBy }) - no dryRun param
      - syncStoryToDatabaseInputSchema has no dryRun or force parameters (AC-12 confirmed)

  - id: CP-004
    title: "Dry-run implementation (Approach 2 - mandatory per AC-12)"
    source: "KBAR-0050.md Architecture Notes"
    details: |
      - Do NOT call syncStoryToDatabase or any sync function during --dry-run
      - CLI computes filesystem checksum via computeChecksum() from src/__types__/index.ts
      - computeChecksum is NOT exported from src/index.ts (only from src/__types__/index.ts)
      - In scripts, import: import { computeChecksum } from '../src/__types__/index.js'
      - Query kbar.stories.checksum via @repo/db (read-only SELECT)
      - Compare checksums and print "would sync" or "would skip"
      - For sync:epic --dry-run: single batch SELECT for all stories (N+1 prevention)
      - --force flag: CLI skips its pre-check; always calls syncStoryToDatabase (upsert)

  - id: CP-005
    title: "Path security validation"
    source: "packages/backend/kbar-sync/src/__types__/index.ts"
    details: |
      - validateFilePath(filePath, baseDir) exported from src/__types__/index.ts
      - Rejects paths with '..' components (path traversal)
      - isSymbolicLink() check via lstat (also available in src/__types__)
      - CLI layer must validate --story-dir, --base-dir, --artifact-file before delegating
      - Path traversal → exit 1 with security error (AC-9)

  - id: CP-006
    title: "Integration test pattern with testcontainers"
    source: "packages/backend/kbar-sync/src/__tests__/artifact-sync.integration.test.ts"
    details: |
      - PostgreSqlContainer('postgres:16-alpine') from @testcontainers/postgresql
      - describe.skipIf(shouldSkip) with SKIP_TESTCONTAINERS env var
      - beforeAll: start container, connect pg.Client, set env vars, create schema + tables
      - afterAll: client.end(), container.stop(), rm(testDir)
      - 90000ms timeout for container startup (beforeAll)
      - 30000ms timeout per test
      - testDir created in tmpdir() for test story files
      - Integration test file already exists in worktree at:
        packages/backend/kbar-sync/scripts/__tests__/integration/sync-cli.integration.test.ts

