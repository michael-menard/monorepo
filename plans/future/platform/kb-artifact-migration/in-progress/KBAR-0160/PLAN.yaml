# artifact_write input schema (verified from KBAR-0110 story spec — tool not yet in TypeScript):
# artifact_write({
#   story_id: string,            # required
#   artifact_type: string,       # required (e.g. "checkpoint", "scope", "plan")
#   content: object,             # required — the artifact payload
#   file_path?: string,          # optional — explicit filesystem path; use for canonical _implementation/ paths
#   skip_kb?: boolean,           # optional — skip KB indexing (default: false)
#   phase?: string,              # optional — phase context (e.g. "setup", "planning")
#   iteration?: number           # optional — iteration counter
# })
#
# NOTE: ST-1 confirmed artifact_write is NOT yet in tool-schemas.ts or tool-handlers.ts.
# KBAR-0110 is still in-progress. Schema above is sourced from KBAR-0110 story specification.
# Dual-write semantics: file write is PRIMARY (blocking), KB write is SECONDARY (best-effort).
# On KB write failure: file_written: true is returned + kb_write_warning logged. Agent proceeds.

