strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
  mcp_tools_touched: true
  files_touched:
    - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    - apps/api/knowledge-base/src/mcp-server/__tests__/artifact-search-tools.test.ts
    - apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts

happy_path_tests:
  - id: HP-1
    title: "artifact_search returns ranked results for a valid natural language query"
    setup: >
      Mock kb_search via vi.mock('../../search/index.js') to return
      { results: [{ id: 'uuid-1', content: 'evidence about OpenAI timeout', relevance_score: 0.92, ... }],
        metadata: { total: 1, fallback_mode: false, query_time_ms: 80, search_modes_used: ['semantic','keyword'] } }
    action: >
      Call handleArtifactSearch({ query: 'OpenAI timeout handling' }, mockDeps, mockContext)
    expected: >
      Returns { content: [{ type: 'text', text: JSON.stringify({ results: [...], metadata: { total: 1, fallback_mode: false, ... } }) }] }.
      kb_search called once with tags containing 'artifact' and query 'OpenAI timeout handling'.
    evidence: >
      vi.mocked(kb_search).mock.calls[0][0].tags includes 'artifact';
      result.content[0].text parses to { results, metadata }.

  - id: HP-2
    title: "artifact_search with story_id filter translates to KB tag"
    setup: >
      Mock kb_search to return non-empty results.
    action: >
      Call handleArtifactSearch({ query: 'checkpoint status', story_id: 'KBAR-0110' }, mockDeps, mockContext)
    expected: >
      kb_search called with tags array including both 'artifact' and 'KBAR-0110'.
    evidence: >
      vi.mocked(kb_search).mock.calls[0][0].tags includes 'KBAR-0110'.

  - id: HP-3
    title: "artifact_search with artifact_type filter translates to KB tag"
    setup: >
      Mock kb_search to return results.
    action: >
      Call handleArtifactSearch({ query: 'review findings', artifact_type: 'REVIEW' }, mockDeps, mockContext)
    expected: >
      kb_search called with tags array including 'REVIEW'.
    evidence: >
      vi.mocked(kb_search).mock.calls[0][0].tags includes 'REVIEW'.

  - id: HP-4
    title: "artifact_search with phase filter translates to KB tag"
    setup: >
      Mock kb_search to return results.
    action: >
      Call handleArtifactSearch({ query: 'implementation evidence', phase: 'dev_implementation' }, mockDeps, mockContext)
    expected: >
      kb_search called with tags including 'dev_implementation'.
    evidence: >
      vi.mocked(kb_search).mock.calls[0][0].tags includes 'dev_implementation'.

  - id: HP-5
    title: "artifact_search with all three optional filters applied simultaneously"
    setup: >
      Mock kb_search to return results.
    action: >
      Call handleArtifactSearch({ query: 'zod schema', story_id: 'KBAR-0090', artifact_type: 'EVIDENCE', phase: 'dev_implementation' }, mockDeps, mockContext)
    expected: >
      kb_search called with tags containing all of: 'artifact', 'KBAR-0090', 'EVIDENCE', 'dev_implementation'.
    evidence: >
      All four tag values present in vi.mocked(kb_search).mock.calls[0][0].tags.

  - id: HP-6
    title: "artifact_search appears in mcp-integration.test.ts tool list"
    setup: >
      Standard getToolDefinitions() call.
    action: >
      Call getToolDefinitions() and check for 'artifact_search' in names list.
    expected: >
      tools.map(t => t.name) includes 'artifact_search'; tools.length equals (prior count + 1).
    evidence: >
      getToolDefinitions() returns array with 'artifact_search' present.

error_cases:
  - id: EC-1
    title: "artifact_search rejects empty query string with Zod validation error"
    setup: >
      No mock needed.
    action: >
      Call handleArtifactSearch({ query: '' }, mockDeps, mockContext)
    expected: >
      Returns a structured error response (not an unhandled exception).
      Error content includes validation failure message about non-empty query.
    evidence: >
      result.content[0].text parseable as JSON containing error field;
      result.isError is true or content signals validation failure.

  - id: EC-2
    title: "artifact_search rejects missing query field"
    setup: >
      No mock needed.
    action: >
      Call handleArtifactSearch({}, mockDeps, mockContext)
    expected: >
      Returns structured error response; Zod parse failure on required 'query' field.
    evidence: >
      result.content[0].text contains 'query' in error message.

  - id: EC-3
    title: "artifact_search rejects invalid artifact_type value"
    setup: >
      No mock needed.
    action: >
      Call handleArtifactSearch({ query: 'test', artifact_type: 'INVALID_TYPE' }, mockDeps, mockContext)
    expected: >
      Returns structured Zod validation error; not an unhandled throw.
    evidence: >
      result.content[0].text parseable as JSON; contains enum validation error.

  - id: EC-4
    title: "artifact_search propagates kb_search error as structured response"
    setup: >
      Mock kb_search to throw new Error('DB connection failed').
    action: >
      Call handleArtifactSearch({ query: 'find evidence' }, mockDeps, mockContext)
    expected: >
      Returns structured error response (not an unhandled exception at tool boundary).
      Error message references the failure.
    evidence: >
      result.content[0].text parseable as JSON with error key;
      vi.mocked(kb_search) called once.

edge_cases:
  - id: ED-1
    title: "artifact_search returns empty results as a success response (not an error)"
    setup: >
      Mock kb_search to return
      { results: [], metadata: { total: 0, fallback_mode: false, query_time_ms: 10, search_modes_used: ['semantic','keyword'] } }
    action: >
      Call handleArtifactSearch({ query: 'nonexistent artifact content xyz' }, mockDeps, mockContext)
    expected: >
      Returns { content: [{ type: 'text', text: JSON.stringify({ results: [], metadata: { total: 0, ... } }) }] }.
      No error. results array is empty. total is 0.
    evidence: >
      Parsed result.content[0].text has results: [] and metadata.total: 0;
      result.isError is falsy.

  - id: ED-2
    title: "artifact_search propagates fallback_mode: true when kb_search uses keyword-only mode"
    setup: >
      Mock kb_search to return
      { results: [...], metadata: { total: 1, fallback_mode: true, query_time_ms: 50, search_modes_used: ['keyword'] } }
    action: >
      Call handleArtifactSearch({ query: 'any query' }, mockDeps, mockContext)
    expected: >
      Response metadata.fallback_mode is true.
      Caller is informed that results are keyword-only (OpenAI unavailable).
    evidence: >
      JSON.parse(result.content[0].text).metadata.fallback_mode === true.

  - id: ED-3
    title: "artifact_search with limit and min_confidence passes through to kb_search"
    setup: >
      Mock kb_search to return results.
    action: >
      Call handleArtifactSearch({ query: 'checkpoint', limit: 5, min_confidence: 0.8 }, mockDeps, mockContext)
    expected: >
      kb_search called with limit: 5 and min_confidence: 0.8 in composed SearchInput.
    evidence: >
      vi.mocked(kb_search).mock.calls[0][0].limit === 5;
      vi.mocked(kb_search).mock.calls[0][0].min_confidence === 0.8.

  - id: ED-4
    title: "artifact_search with explain: true passes through to kb_search"
    setup: >
      Mock kb_search to return results with explain field.
    action: >
      Call handleArtifactSearch({ query: 'find pattern', explain: true }, mockDeps, mockContext)
    expected: >
      kb_search called with explain: true.
    evidence: >
      vi.mocked(kb_search).mock.calls[0][0].explain === true.

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "vi.mocked(kb_search).mock.calls[0][0].tags includes 'artifact'"
      - "JSON.parse(result.content[0].text).results is Array"
      - "JSON.parse(result.content[0].text).metadata.fallback_mode is boolean"
      - "JSON.parse(result.content[0].text).metadata.total is number"
      - "getToolDefinitions().map(t => t.name).includes('artifact_search')"
      - "getToolDefinitions().length === <prior_count_plus_one> (verify at implementation time)"
  frontend:
    # ui_touched: false — no frontend tests

manual_cases: []

fixture_definitions:
  - name: mockArtifactSearchResult
    type: object
    description: >
      Mock return value for vi.mocked(kb_search) — shaped as SearchResult with results array
      and metadata { total, fallback_mode, query_time_ms, search_modes_used }.
  - name: mockArtifactEntry
    type: object
    description: >
      Single search result entry with id, content, role, tags, relevance_score, createdAt, updatedAt.
      Use createMockKnowledgeEntry() from test-helpers.ts to generate.

risks:
  - "Tool count in mcp-integration.test.ts must be re-verified at implementation time — KBAR-0110 and KBAR-0120 must land first (each adds one tool). Do not hardcode the expected count without running getToolDefinitions().length."
  - "KB tag filter logic: if kb_search uses OR semantics for tags, multi-filter combinations (story_id + artifact_type + phase) may return unexpected results. Test each filter in isolation and in combination."
  - "vi.mock('../../search/index.js') must use async importOriginal pattern (see search-tools.test.ts) to avoid stripping SearchInputSchema from the mock — schemas must remain real for Zod parse to work."
  - "ADR-005 applies: any integration tests that exercise real kb_search (non-mocked) must run against a real PostgreSQL KB instance, not in CI unit test suite."
