feasible: true
confidence: high
rationale: >
  artifact_search is an intentionally thin wrapper over the existing kb_search function.
  The pattern is established: handleKbSearch in tool-handlers.ts is the direct structural
  template. The Zod schema composes SearchInputSchema with artifact-specific filters.
  The filter-to-tags translation is a straightforward array prepend. No new packages,
  no DB schema changes, no new service layer. One focused work session (2-4 hours).
complexity: low
change_surface:
  areas:
    - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    - apps/api/knowledge-base/src/mcp-server/__tests__/artifact-search-tools.test.ts
    - apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts
  endpoints: []
  deploy_touchpoints:
    - "MCP server restart required after tool-schemas.ts changes (Lambda redeploy in prod)"

risks:
  - finding: >
      Tool count in mcp-integration.test.ts must match the actual count at implementation time.
      KBAR-0110 (artifact_write) and KBAR-0120 (artifact_read) are listed as Created but not
      merged. Each adds one tool. KBAR-0130 must not begin until both are merged. The implementer
      must run getToolDefinitions().length before writing the count assertion to avoid CI failure.
    mitigation: >
      At implementation start, run: node -e "import('./apps/api/knowledge-base/src/mcp-server/tool-schemas.js').then(m => console.log(m.getToolDefinitions().length))"
      or check the failing test assertion. Use the live count, not any hardcoded number from this story.

  - finding: >
      KB tag filter semantics: kb_search applies OR logic across tags array. Multiple artifact
      filters (story_id + artifact_type + phase) all in one tags array means the search returns
      artifacts matching ANY of those tags, not strictly all three. This may produce broader
      results than expected for multi-filter queries.
    mitigation: >
      Document this behavior in the tool description so callers understand the semantics.
      Consider a compound-tag approach (e.g., 'artifact:KBAR-0110:EVIDENCE') as an alternative
      for strict AND filtering. For MVP, OR semantics is acceptable — callers can post-filter.
      Include a note in AC-4 about expected tag-filter semantics.

missing_requirements:
  - >
    The expected tag convention that artifact_write (KBAR-0110) uses when indexing artifacts
    into knowledge_entries must be confirmed before KBAR-0130 implementation starts.
    artifact_search must use matching tag values. If KBAR-0110 is not yet merged, coordinate
    with the implementer to agree on the convention (e.g., does it write 'artifact', 'KBAR-0110',
    'EVIDENCE' as separate tags, or compound tags like 'artifact:KBAR-0110:EVIDENCE'?).

evidence_expectations:
  - "Unit tests pass: pnpm test --filter @repo/knowledge-base (artifact-search-tools.test.ts)"
  - "mcp-integration.test.ts passes with updated tool count and artifact_search in names list"
  - "pnpm check-types --filter @repo/knowledge-base passes (no TypeScript errors)"
  - "handleArtifactSearch is registered in toolHandlers map in tool-handlers.ts"
  - "ArtifactSearchInputSchema exported from tool-schemas.ts (or the handler file)"

subtasks:
  - id: ST-1
    title: "Define ArtifactSearchInputSchema in tool-schemas.ts"
    goal: >
      Create the Zod input schema for artifact_search that extends SearchInputSchema
      with artifact-specific filters (story_id, artifact_type, phase).
      Export it for use by the handler and unit tests.
    files_to_read:
      - apps/api/knowledge-base/src/search/schemas.ts
      - apps/api/knowledge-base/src/search/index.ts
      - apps/api/knowledge-base/src/__types__/index.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    acs: ["AC-1", "AC-2", "AC-3"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/knowledge-base"
    estimated_tokens: 6000

  - id: ST-2
    title: "Implement handleArtifactSearch handler in tool-handlers.ts"
    goal: >
      Implement the MCP handler following the handleKbSearch structural template:
      ArtifactSearchInputSchema.parse(input) → translate artifact filters to KB tags →
      kb_search(composedInput, deps) → log timing → return { content: [{ type: 'text', text: JSON.stringify(result) }] }.
      Handle empty results as success. Propagate fallback_mode. Catch and return structured errors.
      Register in toolHandlers map.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
      - apps/api/knowledge-base/src/search/kb-search.ts
      - apps/api/knowledge-base/src/search/schemas.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/tool-handlers.ts
    acs: ["AC-4", "AC-5", "AC-6", "AC-7", "AC-8"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/knowledge-base"
    estimated_tokens: 12000

  - id: ST-3
    title: "Register artifact_search tool in getToolDefinitions()"
    goal: >
      Add the artifact_search tool entry to getToolDefinitions() in tool-schemas.ts
      using zodToMcpSchema(ArtifactSearchInputSchema) with name 'artifact_search'
      and a clear description. Position after existing artifact tools.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    acs: ["AC-1"]
    depends_on: ST-1
    verification: "pnpm check-types --filter @repo/knowledge-base"
    estimated_tokens: 3000

  - id: ST-4
    title: "Write unit tests for handleArtifactSearch"
    goal: >
      Create apps/api/knowledge-base/src/mcp-server/__tests__/artifact-search-tools.test.ts
      following the search-tools.test.ts pattern (vi.mock async importOriginal pattern).
      Cover: happy path with results, empty results as success, fallback_mode propagation,
      story_id/artifact_type/phase filter translation to tags, Zod rejection of empty query,
      Zod rejection of invalid artifact_type, all optional filters together,
      limit/min_confidence/explain pass-through.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/__tests__/search-tools.test.ts
      - apps/api/knowledge-base/src/mcp-server/__tests__/test-helpers.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/__tests__/artifact-search-tools.test.ts
    acs: ["AC-9"]
    depends_on: ST-2
    verification: "pnpm test --filter @repo/knowledge-base artifact-search-tools"
    estimated_tokens: 16000

  - id: ST-5
    title: "Update mcp-integration.test.ts tool count and names list"
    goal: >
      1. Re-verify current getToolDefinitions().length by running the tests or a scratch script.
      2. Update the tool count assertion to prior_count + 1.
      3. Add 'artifact_search' to the tools.map(t => t.name) expected array in the correct position.
      4. Update the test description string to mention artifact_search.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts
    acs: ["AC-10", "AC-11"]
    depends_on: ST-3
    verification: "pnpm test --filter @repo/knowledge-base mcp-integration"
    estimated_tokens: 4000
