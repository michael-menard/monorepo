issues:
  - id: ISSUE-1
    severity: HIGH
    ac_ids: ["AC-2", "AC-3"]
    file: "apps/api/knowledge-base/src/mcp-server/tool-schemas.ts"
    line: 213
    description: >
      Missing required `query: string` parameter from ArtifactSearchInputSchema. Story title and
      AC-2/AC-3 explicitly require natural language query input. The implementation instead uses a
      tag-filter-only approach, building a synthetic query from tag values. This changes the tool
      from a natural language semantic search to a structured browse/filter tool.
    resolution: >
      Add `query: z.string().min(1).optional()` (or required per AC-3) to ArtifactSearchInputSchema.
      Pass validated.query to kb_search as the query field. Add min_confidence and explain optional
      fields per AC-2.

  - id: ISSUE-2
    severity: MEDIUM
    ac_ids: ["AC-2", "AC-6"]
    file: "apps/api/knowledge-base/src/mcp-server/tool-schemas.ts"
    line: 213
    description: >
      Missing `min_confidence` and `explain` optional parameters from schema and handler. AC-2
      explicitly lists these as part of the tool input shape. The handler hardcodes min_confidence: 0.0
      and does not support explain mode.
    resolution: >
      Add min_confidence: z.number().min(0).max(1).optional() and explain: z.boolean().optional()
      to ArtifactSearchInputSchema. Pass them through to the kb_search call.

  - id: ISSUE-3
    severity: LOW
    ac_ids: ["AC-9"]
    file: "apps/api/knowledge-base/src/mcp-server/__tests__/artifact-search-tools.test.ts"
    description: >
      Missing test for empty/invalid query validation (AC-9 requires 'invalid query (Zod error for
      empty string)'). Also missing min_confidence and explain pass-through tests per story test
      plan ED-3.
    resolution: >
      Once query field is added, add tests for: empty string rejection, missing query rejection,
      min_confidence/explain pass-through.

lessons_to_record:
  - lesson: >
      QA verification caught a schema deviation: ArtifactSearchInputSchema was implemented without
      the required `query: string` field specified in AC-2/AC-3. The tool became a filter-only tool
      rather than the natural language semantic search tool described in the story title and ACs.
      This type of deviation (omitting a core parameter) can pass code review if reviewers focus on
      structural correctness rather than AC-specification fidelity.
    category: anti_pattern
    tags: ["mcp-tools", "schema", "ac-deviation", "qa"]

  - lesson: >
      When a story title explicitly names a feature ('Natural Language' search) and the ACs enumerate
      required parameters, QA verification should check schema field names against AC field names
      directly — not just check that the tool 'works'. A working tool that omits a required field is
      an AC failure even if all tests pass.
    category: pattern
    tags: ["qa", "ac-verification", "schema-first"]

