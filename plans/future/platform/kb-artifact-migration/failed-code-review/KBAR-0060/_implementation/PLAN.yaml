notes:
  - "vitest.integration.config.ts currently only includes scripts/**/*.integration.test.ts — must update include to ['scripts/**/*.integration.test.ts', 'src/**/*.integration.test.ts'] so the new sync-integration.integration.test.ts is picked up by pnpm test:integration"
  - "Use CREATE TYPE IF NOT EXISTS (not CREATE TYPE) in shared helper to avoid duplicate enum errors — pattern from artifact-sync.integration.test.ts (KBAR-0040)"
  - "SKIP_TESTCONTAINERS env var is the canonical skip guard per sync-cli.integration.test.ts; the older integration.integration.test.ts uses a different pattern — prefer SKIP_TESTCONTAINERS throughout KBAR-0060"
  - "Query count instrumentation for AC-6: use client.on('query', ...) counter before and after dryRunEpic call"
  - "Symlink test (AC-7 TC-7.1) may fail in CI without fs.symlinkSync — wrap in try/catch with descriptive skip message per QA discovery note"
  - "ST-4 extends the existing sync-cli.integration.test.ts file — do NOT replace existing AC-11 tests; append new describe blocks"
  - "Per lesson L-002: CLI scripts use POSTGRES_USER env var, not POSTGRES_USERNAME — set both in beforeAll for compatibility"
