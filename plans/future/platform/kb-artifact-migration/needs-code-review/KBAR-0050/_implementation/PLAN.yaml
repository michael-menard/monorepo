architectural_decisions:
  - id: ARCH-001
    question: "computeChecksum is not exported from @repo/kbar-sync public API (src/index.ts). CLI scripts need it for dry-run. Should we (a) import it from the internal path src/__types__/index.js, or (b) add it to the public API exports in src/index.ts?"
    decision: "Import from internal path: import { computeChecksum } from '../src/__types__/index.js'"
    rationale: |
      The integration test scaffolding (already in the worktree) already uses this pattern:
      import { computeChecksum } from '../../../src/__types__/index.js'
      Since scripts/ are part of the same package (not an external consumer), importing
      from internal src/ paths is acceptable and avoids unnecessary API surface expansion.
      The story Non-Goals explicitly prohibit modifications to src/ (KBAR-0030/0040 function
      modifications). Adding a new export to index.ts would be additive but is unnecessary
      since scripts are co-located.
    decided_by: auto
    tier: 1

  - id: ARCH-002
    question: "The integration test file (sync-cli.integration.test.ts) already exists in the worktree with scaffolding that expects dryRunStory() and dryRunEpic() to be exported named functions from sync-story.ts and sync-epic.ts. Should we export these helpers?"
    decision: "Yes, export dryRunStory and dryRunEpic as named exports from their respective scripts"
    rationale: |
      The existing integration test scaffolding imports these directly:
        import { dryRunStory } from '../../sync-story.js'
        import { dryRunEpic } from '../../sync-epic.js'
      Exporting these functions enables direct unit and integration testing without
      subprocess spawning, which is cleaner and matches the project's testing patterns.
      This is consistent with how populate-story-status.ts exports individual functions
      (generatePopulationPlan, executePopulation, etc.) for testability.
    decided_by: auto
    tier: 1

complexity: moderate

