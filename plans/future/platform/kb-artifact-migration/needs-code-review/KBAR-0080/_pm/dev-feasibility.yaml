feasible: true
confidence: high
rationale: >
  All three core operations (kb_list_stories, kb_update_story_status, kb_update_story) and
  their MCP handlers are already implemented and registered. The true scope is narrow:
  (1) fix a stale integration test (tool count 52→54, add kb_update_story to expected names),
  (2) write unit tests for handler behaviors using the established vi.hoisted mock pattern,
  (3) add a lightweight terminal-state guard inline in kb_update_story_status.
  No new infrastructure, no schema changes, no new packages. The pattern is well-established
  with handleKbGetStory as the canonical reference.
complexity: low
change_surface:
  areas:
    - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    - apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts
    - apps/api/knowledge-base/src/mcp-server/__tests__/story-tools.test.ts (new file)
  endpoints: []
  deploy_touchpoints:
    - "pnpm test --filter @repo/knowledge-base to verify all tests pass"
    - "pnpm check-types --filter @repo/knowledge-base to verify no TypeScript errors"

risks:
  - finding: "Tool count in mcp-integration.test.ts will be stale if concurrent stories add tools"
    mitigation: >
      At implementation time, verify the actual count by calling getToolDefinitions().length
      or counting the toolDefinitions array in tool-schemas.ts. Current count is 54 (verified
      by direct grep of tool-schemas.ts on 2026-02-23 — 54 entries with `name:` field in
      toolDefinitions array). The integration test currently asserts 52 and is missing
      'kb_update_story' in the expected names list. Update assertion to 54.
  - finding: "State transition guard scope needs precise definition to avoid over-blocking"
    mitigation: >
      Guard only blocks terminal→non-terminal transitions (completed/cancelled/deferred → any
      non-terminal state). Same-state transitions (terminal→same-terminal) should be allowed
      for idempotency. The guard is implemented inline in kb_update_story_status before the
      update object is built — no separate validator file needed.

missing_requirements: []

evidence_expectations:
  - "pnpm test --filter @repo/knowledge-base passes with 0 failures"
  - "mcp-integration.test.ts tool count assertion uses 54"
  - "mcp-integration.test.ts expected names list includes 'kb_update_story'"
  - "story-tools.test.ts covers AC-2 through AC-9 with vi.hoisted mock pattern"
  - "kb_update_story_status in story-crud-operations.ts includes terminal-state guard before update object"
  - "pnpm check-types --filter @repo/knowledge-base passes with 0 errors"

subtasks:
  - id: ST-1
    title: "Fix stale mcp-integration.test.ts tool count and names list"
    goal: >
      Update mcp-integration.test.ts to assert 54 tools (not 52) and add 'kb_update_story'
      to the expected tool names array. This closes the stale test gap from AC-1.
    files_to_read:
      - apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts
      - apps/api/knowledge-base/src/mcp-server/tool-schemas.ts
    files_to_modify:
      - apps/api/knowledge-base/src/mcp-server/__tests__/mcp-integration.test.ts
    acs: ["AC-1"]
    depends_on: none
    verification: "pnpm test --filter @repo/knowledge-base -- mcp-integration"
    estimated_tokens: 4000

  - id: ST-2
    title: "Add terminal-state guard to kb_update_story_status"
    goal: >
      Add inline state transition guard in kb_update_story_status() (in story-crud-operations.ts)
      that rejects transitions from terminal states (completed, cancelled, deferred) to
      non-terminal states with a descriptive error message. Same-state transitions are allowed.
      This satisfies AC-8.
    files_to_read:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
      - apps/api/knowledge-base/src/__types__/index.ts
    files_to_modify:
      - apps/api/knowledge-base/src/crud-operations/story-crud-operations.ts
    acs: ["AC-8"]
    depends_on: none
    verification: "pnpm check-types --filter @repo/knowledge-base"
    estimated_tokens: 5000

  - id: ST-3
