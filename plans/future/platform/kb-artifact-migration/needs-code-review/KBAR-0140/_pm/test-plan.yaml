      iterations_used: 2
    expected_summary_keys: [status, iterations_used]

  # --- Unit: Fallback / edge cases ---

  - id: TC-014
    ac: AC-4
    level: unit
    title: "unknown artifact type returns top-level scalars (max 5 keys)"
    input_type: "custom_artifact_xyz"
    fixture:
      name: "foo"
      count: 3
      nested:
        deep: "ignored"
    expected: only scalar fields returned, nested object excluded, max 5 keys

  - id: TC-015
    ac: AC-4
    level: unit
    title: "empty content object returns empty summary"
    fixture: {}
    expected: empty object returned

  - id: TC-016
    ac: AC-3, AC-4
    level: unit
    title: "evidence with missing ac_total returns 0 or undefined gracefully"
    fixture:
      version: 1
    expected: no exception thrown, missing fields return null/0/undefined

  - id: TC-017
    ac: AC-4
    level: unit
    title: "all-null content fields returns graceful summary"
    input_type: "review"
    fixture:
      verdict: null
      iteration: null
      ranked_patches: null
    expected: summary returned with null values, no exception

  # --- Unit: Opt-out mechanism ---

  - id: TC-018
    ac: AC-6
    level: unit
    title: "caller-provided summary takes precedence over auto-extracted summary"
    notes: >
      Pass an explicit summary override to artifact_write and verify the override
      is what gets written to KB, not the auto-extracted summary.

  # --- Integration: artifact_write auto-summary ---

  - id: TC-019
    ac: AC-5
    level: integration
    title: "artifact_write with write_to_kb=true and no summary produces non-null summary in DB"
    setup: Insert story into stories table, then call artifact_write with artifact_type=checkpoint
    assertion: SELECT summary FROM story_artifacts WHERE story_id=? IS NOT NULL
    notes: Uses real Postgres per ADR-005

  - id: TC-020
    ac: AC-6
    level: integration
    title: "artifact_write with explicit summary field persists caller's summary, not auto-extracted"
    setup: Call artifact_write with explicit summary = { custom_key: true }
    assertion: DB summary equals { custom_key: true }, not the auto-extracted checkpoint summary

  # --- Regression ---

  - id: TC-021
    ac: AC-8
