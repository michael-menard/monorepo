    title: "All existing artifact-tools.test.ts tests continue to pass after changes"
    notes: Run without modification to confirm no regression before touching artifact_write

  - id: TC-022
    ac: AC-8
    level: integration
    title: "All existing artifact-tools-integration.test.ts tests continue to pass"
    notes: Run before and after integration change to confirm no breakage

  - id: TC-023
    ac: AC-9
