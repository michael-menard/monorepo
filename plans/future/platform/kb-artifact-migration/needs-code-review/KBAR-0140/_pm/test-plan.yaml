summary: >
  Unit-focused test plan for the extractArtifactSummary shared utility. All 13 artifact types
  must be covered with representative inline fixture objects. Integration coverage targets
  the artifact_write → kb_write_artifact path to verify auto-summary population in the
  storyArtifacts jump table.

test_levels:
  unit:
    required: true
    framework: vitest
    location: apps/api/knowledge-base/src/crud-operations/__tests__/artifact-summary.test.ts
    notes: >
      Pure function — no DB, no network. Use inline fixture objects per artifact type.
      Follow the mock pattern from artifact-tools.test.ts.

  integration:
    required: true
    framework: vitest
    location: apps/api/knowledge-base/src/crud-operations/__tests__/artifact-operations.integration.test.ts
    notes: >
      Verify that calling artifact_write with write_to_kb=true and no explicit summary
      results in a non-null summary column in the storyArtifacts jump table.
      Must use a real DB per ADR-005 (no MSW or in-memory DB for integration/UAT).

  e2e:
    required: false
    skip_reason: "ADR-006 skip condition applies — frontend_impacted: false"

test_cases:

  # --- Unit: extractArtifactSummary per artifact type ---

  - id: TC-001
    ac: AC-2, AC-3
    level: unit
    title: "checkpoint: extracts current_phase, last_successful_phase, iteration, blocked"
    fixture:
      current_phase: "execute"
      last_successful_phase: "plan"
      iteration: 2
      blocked: false
    expected_summary_keys: [current_phase, last_successful_phase, iteration, blocked]

  - id: TC-002
    ac: AC-2, AC-3
    level: unit
    title: "scope: extracts touches and risk_flags"
    fixture:
      touches_backend: true
      touches_frontend: false
      touches_database: true
      touches_infra: false
      file_count: 5
      risk_flags: ["schema change"]
    expected_summary_keys: [touches, risk_flags]

  - id: TC-003
    ac: AC-2, AC-3
    level: unit
    title: "plan: extracts version, approved, chunks_count, estimated fields"
    fixture:
      version: 1
      approved: false
      chunks: [{}, {}, {}]
      estimates:
        files: 4
        tokens: 8000
    expected_summary_keys: [version, approved, chunks_count, estimated_files, estimated_tokens]

  - id: TC-004
    ac: AC-2, AC-3
    level: unit
    title: "evidence: extracts version, story_id, touched_files_count, commands_run_count, ac_count"
    fixture:
      version: 1
      story_id: "KBAR-0140"
      touched_files: ["a.ts", "b.ts"]
      commands_run: ["pnpm test"]
      acceptance_criteria: [{}, {}]
    expected_summary_keys: [version, story_id, touched_files_count, commands_run_count, acceptance_criteria_count]

  - id: TC-005
    ac: AC-2, AC-3
    level: unit
    title: "verification: extracts verdict, finding_count, critical_count"
    fixture:
      verdict: "PASS"
      finding_count: 0
      critical_count: 0
    expected_summary_keys: [verdict, finding_count, critical_count]

  - id: TC-006
    ac: AC-2, AC-3
    level: unit
    title: "analysis: extracts analysis_type and summary_text"
    fixture:
      analysis_type: "dead-code"
      summary_text: "Found 3 unused exports"
    expected_summary_keys: [analysis_type, summary_text]

  - id: TC-007
    ac: AC-2, AC-3
    level: unit
    title: "context: extracts story_id, feature_dir, phase"
    fixture:
      story_id: "KBAR-0140"
      feature_dir: "plans/future/platform/kb-artifact-migration"
