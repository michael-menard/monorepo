    expected_summary_keys: [verdict, split_required, gaps_count, follow_ups_count]

  - id: TC-011
    ac: AC-2, AC-3
    level: unit
    title: "review: extracts verdict, iteration, issues_count"
    fixture:
      verdict: "APPROVE"
      iteration: 1
      ranked_patches: []
    expected_summary_keys: [verdict, iteration, issues_count]

  - id: TC-012
    ac: AC-2, AC-3
    level: unit
    title: "qa_gate: extracts decision, reviewer, finding_count, blocker_count"
    fixture:
      decision: "PASS"
      reviewer: "qa-agent"
      finding_count: 1
      blocker_count: 0
    expected_summary_keys: [decision, reviewer, finding_count, blocker_count]

  - id: TC-013
    ac: AC-2, AC-3
    level: unit
    title: "completion_report: extracts status, iterations_used"
    fixture:
