    expected_summary_keys: [story_id, feature_dir, phase]

  - id: TC-008
    ac: AC-2, AC-3
    level: unit
    title: "fix_summary: extracts iteration, issues_fixed, issues_remaining"
    fixture:
      iteration: 1
      issues_fixed: 3
      issues_remaining: 0
    expected_summary_keys: [iteration, issues_fixed, issues_remaining]

  - id: TC-009
    ac: AC-2, AC-3
    level: unit
    title: "proof: extracts completed_at, summary_points, deliverables_count, tests_passed, all_acs_verified"
    fixture:
      completed_at: "2026-03-02T12:00:00Z"
      summary: ["point 1", "point 2"]
      deliverables: ["lib/artifact-summary.ts"]
      verification:
        tests_passed: 42
        all_acs_verified: true
    expected_summary_keys: [completed_at, summary_points, deliverables_count, tests_passed, all_acs_verified]

  - id: TC-010
    ac: AC-2, AC-3
    level: unit
    title: "elaboration: extracts verdict, split_required, gaps_count, follow_ups_count"
    fixture:
      verdict: "PROCEED"
      split_required: false
      gaps: []
