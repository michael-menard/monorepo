gaps:  # MVP-blocking only
  - id: gap-1
    check: decision_completeness
    finding: >
      Tag convention dependency on KBAR-0110 is a hard implementation gate. The story correctly
      documents this, but does not provide a fallback protocol if KBAR-0110 tag values differ from
      what AC-4 specifies (e.g., if KBAR-0110 uses compound tags like 'artifact:EVIDENCE' rather than
      separate 'artifact' and 'EVIDENCE' tags). If the conventions diverge, artifact_search will return
      zero results silently — not an error, just useless results. The story should add an explicit
      pre-implementation verification step: read the KBAR-0110 implementation to confirm tag values
      before writing a single line of KBAR-0130 code.
    severity: high
    decision: add_ac
    ac_added: "AC-12: Before writing any KBAR-0130 implementation code, verify merged KBAR-0110 tag convention matches AC-4's tag composition pattern; update if divergent"

opportunities:  # Non-blocking
  - id: opp-1
    category: observability
    finding: >
      The story documents OR semantics for multi-filter queries (AC-4 note) but does not specify
      logging of the composed tags array at INFO level. handleKbSearch logs query, role, tags, limit
      at invocation time — handleArtifactSearch should similarly log the composed tags array so
      operators can debug filter translation without needing to instrument the handler.
    effort: low
    decision: log_to_kb
    kb_entry_id: "7ddc170b-6038-41dc-8766-4d6f60384ce0"

  - id: opp-2
    category: edge_cases
    finding: >
      AC-4 specifies OR semantics for multi-filter queries, which means searching for story_id=KBAR-0090
      AND artifact_type=EVIDENCE may return all artifacts from KBAR-0090 PLUS all EVIDENCE artifacts from
      any story. The tool description should explicitly warn callers about OR semantics so they can
      construct queries accordingly. The story notes this but does not specify the exact wording for
      the tool description field in getToolDefinitions().
    effort: low
    decision: log_to_kb
    kb_entry_id: "7008d8f3-a337-4875-9d00-e2a6091f7866"

  - id: opp-3
    category: performance
    finding: >
      handleKbSearch uses withTimeout() wrapping. The story's Architecture Notes say "no timeout
      wrapping needed unless pattern requires it" but the pattern (handleKbSearch) does use withTimeout.
      Consider documenting the explicit decision to omit timeout wrapping in handleArtifactSearch, or
      follow the template exactly and include it.
    effort: low
    decision: log_to_kb
    kb_entry_id: "8e98cfb7-b372-42f2-a748-f92fb16d145f"

