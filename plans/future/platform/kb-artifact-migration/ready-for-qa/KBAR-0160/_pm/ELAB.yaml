opportunities:  # Non-blocking
  - id: opp-1
    category: observability
    finding: >
      The AC-8 requirement ("document graceful failure behavior") is defined at the story level
      but does not prescribe exactly where in each agent file this documentation should appear.
      Both agents currently have no fallback/warning documentation for KB write operations.
      Adding a dedicated "KB Write Failure Behavior" subsection to each agent (or at minimum
      an inline comment in the artifact_write call block) would make the graceful failure
      contract discoverable without requiring a full agent re-read.
    effort: low
    decision: include_in_story
    note: >
      ST-2 and ST-3 should add a dedicated inline note (e.g., "On KB write failure: artifact_write
      returns { file_written: true, kb_write_warning: '...' } — setup/planning phase continues,
      KB write failure is non-blocking") immediately after each artifact_write call block.
      This is within scope of the existing AC-8 and requires no AC change.

  - id: opp-2
    category: spec_clarity
    finding: >
      The fix mode step 4 in dev-setup-leader (Write Fix Summary Artifact, line ~323) also uses
      kb_write_artifact. The story ACs (AC-1 through AC-3) only explicitly call out CHECKPOINT
      write (step 4), SCOPE write (step 5), and fix-mode CHECKPOINT update (step 3). Fix mode
      step 4 (fix_summary artifact) is not mentioned in ACs but is in scope given the story's
      stated goal of migrating all kb_write_artifact write calls in the agent. This could cause
      an implementer to miss migrating the fix_summary write call.
    effort: low
    decision: log_finding
    note: >
      Recommend the ST-2 implementer explicitly review all kb_write_artifact call sites in
      dev-setup-leader (lines 159, 186, 306, 323) and migrate all of them. The fix_summary
      artifact (line 323) is also a write call that should be migrated even though it is not
      explicitly called out in ACs. If only AC-enumerated calls are migrated, the fix mode
      step 4 will regress. ST-2 verification step should include a grep for remaining
      kb_write_artifact calls after the migration.

