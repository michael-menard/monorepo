  - finding: "artifact_write input schema may differ from assumed shape. The seed assumes: { story_id, artifact_type, content, file_path, skip_kb?, phase?, iteration? }. If KBAR-0110 landed with different field names, ACs must be updated."
    mitigation: "ST-1 explicitly reads the landed KBAR-0110 implementation to verify the exact input schema before writing any agent call documentation. This is the first subtask."
  - finding: "File path convention: whether agents should pass explicit file_path or rely on canonical path computation in artifact_write must be resolved. Undefined behavior at implementation time if not clarified."
    mitigation: "Option A (explicit file_path) is recommended per seed conflict analysis. Agents pass file_path: '{FEATURE_DIR}/in-progress/{STORY_ID}/_implementation/{ARTIFACT_TYPE}.yaml' explicitly. This makes agent behavior transparent and avoids dependence on artifact_write internal defaults."
