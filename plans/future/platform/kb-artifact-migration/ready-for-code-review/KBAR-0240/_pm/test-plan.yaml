strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false

happy_path_tests:
  - id: HP-1
    title: "regenerate:index --help exits 0 without DB env vars"
    setup: "Unset all DB env vars (DATABASE_URL, etc.)"
    action: "Run `pnpm --filter @repo/kbar-sync regenerate:index -- --help`"
    expected: "Prints HELP_TEXT to stdout; exits with code 0; no DB connection attempted"
    evidence: "Process exits 0; stdout contains flag descriptions and examples"

  - id: HP-2
    title: "regenerate:index --epic KBAR --output <path> writes index and exits 0"
    setup: "DB available; generateStoriesIndex mocked (unit) or real (integration) returning valid content"
    action: "Run CLI with `--epic KBAR --output /tmp/test-index.md`"
    expected: "File written to /tmp/test-index.md; exit code 0"
    evidence: "Output file exists with expected content; exit 0 confirmed"

  - id: HP-3
    title: "regenerate:index --dry-run --epic KBAR prints content without writing"
    setup: "DB available; generateStoriesIndex returns content matching current index on disk"
    action: "Run CLI with `--dry-run --epic KBAR`"
    expected: "Content printed to stdout; no file written; exit code 0 (content matches)"
    evidence: "stdout has generated content; target file unchanged; exit 0"

  - id: HP-4
    title: "pnpm script registration works"
    setup: "Package installed"
    action: "Run `pnpm --filter @repo/kbar-sync run regenerate:index -- --help`"
    expected: "Help text printed; exits 0"
    evidence: "Process exits 0 via registered pnpm script"

  - id: HP-5
    title: "RegenerateIndexCLIOptionsSchema validates valid options"
    setup: "Import schema from cli-options.ts"
    action: "Call schema.safeParse({ epic: 'KBAR', output: '/tmp/out.md', dryRun: false, verbose: false, force: false })"
    expected: "success: true; parsed object matches input"
    evidence: "Unit test assertion passes"

error_cases:
  - id: EC-1
    title: "DB connection failure produces exit code 2"
    setup: "DB connection mocked to throw ECONNREFUSED"
    action: "Run CLI with `--epic KBAR`"
    expected: "stderr contains '[regenerate:index] ERROR: DB connection failed'; exit code 2"
    evidence: "process.exit(2) called; stderr message present"

  - id: EC-2
    title: "Missing required --epic flag produces exit code 1 without DB connection"
    setup: "No DB env vars required"
    action: "Run CLI with no arguments"
    expected: "Error message on stderr describing missing --epic; exit code 1; no DB connection"
    evidence: "Zod validation fires before any import; exit 1"

  - id: EC-3
    title: "Invalid option type fails Zod validation with exit 1"
    setup: "None"
    action: "Run CLI with `--epic 123` (or other invalid types)"
    expected: "Zod validation error on stderr; exit code 1"
    evidence: "safeParse returns success: false; descriptive error printed"

  - id: EC-4
    title: "generateStoriesIndex failure produces exit code 1"
    setup: "generateStoriesIndex mocked to throw generic error"
    action: "Run CLI with `--epic KBAR --output /tmp/out.md`"
    expected: "Error message on stderr; exit code 1"
    evidence: "Error caught; exit(1) called"

  - id: EC-5
    title: "dry-run content differs from current index exits 1"
    setup: "generateStoriesIndex returns content that does NOT match current stories.index.md"
    action: "Run CLI with `--dry-run --epic KBAR`"
    expected: "Diff or warning printed to stdout; exit code 1"
    evidence: "Exit 1; stdout describes mismatch"

edge_cases:
  - id: ED-1
    title: "--output path in non-existent directory fails with descriptive error"
    setup: "Output directory does not exist"
    action: "Run CLI with `--output /nonexistent/dir/index.md`"
    expected: "Error message indicating write failure; exit code 1"
    evidence: "ENOENT or similar caught; exit 1"

  - id: ED-2
    title: "--verbose flag enables progress logging without changing exit code"
    setup: "Normal successful run conditions"
    action: "Run CLI with `--epic KBAR --output /tmp/out.md --verbose`"
    expected: "Additional progress lines in stdout/stderr; exit code 0"
    evidence: "More output lines than non-verbose run; exit 0"

  - id: ED-3
    title: "--force flag skips staleness check and always regenerates"
    setup: "Index already up-to-date"
    action: "Run CLI with `--epic KBAR --output /tmp/out.md --force`"
    expected: "Index regenerated regardless of staleness; exit code 0"
    evidence: "File written; exit 0; no 'index up-to-date' skip message"

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "Exit code 0 on success"
      - "Exit code 1 on validation or generation error"
      - "Exit code 2 on DB connection failure"
      - "stdout contains HELP_TEXT on --help"
      - "stderr contains '[regenerate:index] ERROR: DB connection failed' on ECONNREFUSED"
      - "No file written in --dry-run mode"
  frontend: null

manual_cases:
  - id: MC-1
    title: "UAT: Full round-trip with real DB and real stories.index.md"
    steps:
      - "Start local DB (Docker Compose or TestContainer)"
      - "Ensure KB has KBAR story records"
      - "Run: pnpm --filter @repo/kbar-sync regenerate:index -- --epic KBAR --output /tmp/kbar-index-uat.md"
      - "Compare /tmp/kbar-index-uat.md with plans/future/platform/kb-artifact-migration/stories.index.md"
    expected: "Generated file matches or is structurally equivalent to current index"

fixture_definitions:
  - name: "MockGenerateStoriesIndex"
    type: "vitest vi.fn()"
    description: "Mock of generateStoriesIndex() — returns static KBAR index content string or throws configurable errors"

  - name: "MockProcessExit"
    type: "vitest vi.spyOn(process, 'exit')"
    description: "Spy on process.exit to assert exit codes without terminating test process; requires rethrowExitError helper"

risks:
  - "generateStoriesIndex() API surface is unknown until KBAR-0230 is implemented; mock contract may need updating"
  - "UAT test must use real DB — test container setup may add friction if Docker not available locally"
  - "rethrowExitError pattern is required for process.exit mocking; forgetting it causes test suite crash"
