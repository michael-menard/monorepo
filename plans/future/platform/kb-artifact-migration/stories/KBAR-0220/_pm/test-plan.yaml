strategy: manual
scope:
  endpoints: []
  ui_touched: false
  data_touched: true
  mcp_tools_used:
    - kb_get_story
    - artifact_search
    - artifact_write
    - kb_read_artifact
    - kb_update_story_status
  e2e_exempt: true
  e2e_exempt_reason: "No UI surface. Validation story — canary workflow run IS the test. ADR-006 exempt."
  adr_005_compliance: "Real KB server (port 5433), real DB (port 5432), real filesystem required. No mocking."

happy_path_tests:
  - id: HP-1
    title: "Canary story elab completes and DB state transitions to ready"
    setup: "Canary story created in DB in backlog state. Docker Compose running (KB port 5433, DB port 5432). KBAR-0160 through KBAR-0210 all merged."
    action: "Run /elab-story on canary story ID."
    expected: "Command completes without fatal errors. kb_get_story returns state: ready."
    evidence: "Record output of kb_get_story after elab; attach story.state value in EVIDENCE.yaml."
  - id: HP-2
    title: "dev-implement-story Step 0.6 sets DB state to in_progress"
    setup: "Canary story in ready state. Docker Compose running."
    action: "Run /dev-implement-story on canary. Observe Step 0.6 execution."
    expected: "After Step 0.6, kb_get_story returns state: in_progress."
    evidence: "Record kb_get_story result immediately after Step 0.6 executes (before subsequent steps)."
  - id: HP-3
    title: "dev-setup-leader writes CHECKPOINT.yaml and SCOPE.yaml to _implementation/"
    setup: "Canary story in in_progress state. dev-setup-leader executes during /dev-implement-story."
    action: "Allow dev-setup-leader to complete its setup phase."
    expected: "_implementation/CHECKPOINT.yaml and _implementation/SCOPE.yaml exist in the canary story directory. Both files contain valid YAML conforming to respective artifact schemas."
    evidence: "ls _implementation/ output. Read and validate each file against checkpoint.ts and scope.ts Zod schemas."
  - id: HP-4
    title: "dev-plan-leader writes PLAN.yaml to _implementation/"
    setup: "Canary story in in_progress state. dev-plan-leader executes during /dev-implement-story."
    action: "Allow dev-plan-leader to complete its planning phase."
    expected: "_implementation/PLAN.yaml exists. Contains valid YAML conforming to plan.ts Zod schema."
    evidence: "ls _implementation/ output. Read and validate PLAN.yaml against plan.ts schema."
  - id: HP-5
    title: "dev-execute-leader writes EVIDENCE.yaml to _implementation/"
    setup: "PLAN.yaml present. dev-execute-leader runs during /dev-implement-story."
    action: "Allow dev-execute-leader to complete its execution phase."
    expected: "_implementation/EVIDENCE.yaml exists. Contains valid YAML conforming to evidence.ts Zod schema."
    evidence: "ls _implementation/ output. Read and validate EVIDENCE.yaml against evidence.ts schema."
  - id: HP-6
    title: "dev-implement-story Done path sets DB state to ready_for_review"
    setup: "All implementation artifacts written. Done path executing."
    action: "Allow /dev-implement-story Done path to complete."
    expected: "kb_get_story returns state: ready_for_review."
    evidence: "Record kb_get_story result at Done path completion."
  - id: HP-7
    title: "artifact_search returns canary story artifacts after implementation phase"
    setup: "CHECKPOINT.yaml, SCOPE.yaml, PLAN.yaml, EVIDENCE.yaml all written."
    action: "Run artifact_search({story_id: CANARY_ID}) via MCP tool."
    expected: "At least one artifact result returned matching the canary story ID."
    evidence: "Record artifact_search result count and artifact types in EVIDENCE.yaml."
  - id: HP-8
    title: "knowledge-context-loader invokes artifact_search without error during setup"
    setup: "Canary story in in_progress state. dev-setup-leader executing."
    action: "Monitor knowledge-context-loader agent invocation during setup phase."
    expected: "artifact_search is invoked; returns results or empty result with no error (no fatal failure)."
    evidence: "Note presence of artifact_search invocation in dev-setup-leader output log."
  - id: HP-9
    title: "dev-code-review Step 0.6 sets DB state to in_review"
    setup: "Canary story in ready_for_review state."
    action: "Run /dev-code-review on canary. Observe Step 0.6 execution."
    expected: "After Step 0.6, kb_get_story returns state: in_review."
    evidence: "Record kb_get_story result at Step 0.6 of code review."
  - id: HP-10
    title: "review-aggregate-leader writes REVIEW.yaml; state transitions to ready_for_qa"
    setup: "Canary story in in_review state."
    action: "Allow /dev-code-review to complete its PASS path."
    expected: "_implementation/REVIEW.yaml exists. kb_read_artifact returns the review artifact. kb_get_story returns state: ready_for_qa."
    evidence: "ls _implementation/ output. kb_read_artifact result. kb_get_story state."
  - id: HP-11
    title: "qa-verify-story Step 0.6 sets DB state to in_qa"
    setup: "Canary story in ready_for_qa state. KBAR-0190 merged."
    action: "Run /qa-verify-story on canary. Observe Step 0.6 execution."
    expected: "After Step 0.6, kb_get_story returns state: in_qa."
    evidence: "Record kb_get_story result at Step 0.6 of QA verify."
  - id: HP-12
    title: "qa-verify-completion-leader writes QA artifact; state transitions to terminal"
    setup: "Canary story in in_qa state."
    action: "Allow /qa-verify-story to complete its PASS path."
    expected: "QA verification artifact exists in _implementation/. kb_get_story returns terminal state (uat or completed)."
    evidence: "ls _implementation/ output. kb_get_story terminal state value."
  - id: HP-13
    title: "Canary story cleanup"
    setup: "Canary workflow fully validated (or validation complete up to furthest achievable phase)."
    action: "Mark canary story as cancelled in DB via kb_update_story_status or delete from DB."
    expected: "Canary story no longer appears in kb_get_next_story results. Story queue unpolluted."
    evidence: "kb_get_story returns cancelled or 404. kb_get_next_story does not return canary."

error_cases:
  - id: EC-1
    title: "KBAR-0190 not yet merged — QA phase validation deferred"
    setup: "KBAR-0190 still in needs-code-review at time of canary run."
    action: "Attempt to validate QA phase of canary workflow."
    expected: "Validation stops at ready_for_qa. EVIDENCE.yaml documents deferral reason. QA phase marked as 'deferred: KBAR-0190 not merged'."
    evidence: "EVIDENCE.yaml deferral entry with KBAR-0190 status note."
  - id: EC-2
    title: "Defect found in prior KBAR story during canary run"
    setup: "Any phase of canary workflow."
    action: "Phase fails due to defect in KBAR-0160 through KBAR-0210 implementation."
    expected: "Workflow stops at failed phase. Defect documented in EVIDENCE.yaml with: story ID, AC that failed, observed vs expected behavior. Fix story filed. KBAR-0220 validation marked partial."
    evidence: "EVIDENCE.yaml defect entry. Fix story ID filed."
  - id: EC-3
    title: "KB server unavailable during canary run"
    setup: "Docker Compose KB service not running or crashed during workflow."
    action: "Attempt artifact_write or kb_update_story_status during canary workflow."
    expected: "Agent continues with WARNING (graceful failure path). File write still succeeds. KB search validation for that phase marked as 'skipped: KB unavailable'."
    evidence: "WARNING message in agent output. File artifact present. EVIDENCE.yaml documents KB unavailability."

edge_cases:
  - id: ED-1
    title: "Canary story state already advanced before validation starts"
    setup: "Canary story accidentally transitioned to non-backlog state before validation begins."
    action: "Attempt to run /elab-story on canary story."
    expected: "Step 0.6 guard in elab-story detects non-backlog state and either aborts with clear error or recovers gracefully."
    evidence: "Log output of elab-story Step 0.6 check."
  - id: ED-2
    title: "artifact_search returns empty results after artifact_write"
    setup: "artifact_write called successfully. KB indexing completes."
    action: "Run artifact_search by story_id."
    expected: "Empty result is logged; does not constitute a fatal failure. EVIDENCE.yaml notes empty result as potential KB indexing delay issue."
    evidence: "artifact_search response. EVIDENCE.yaml note."
  - id: ED-3
    title: "CHECKPOINT.yaml written but fails Zod schema validation"
    setup: "dev-setup-leader writes CHECKPOINT.yaml via artifact_write."
    action: "Validate CHECKPOINT.yaml against checkpoint.ts Zod schema."
    expected: "If schema validation fails, document as defect in EVIDENCE.yaml. Flag for KBAR-0160 fix story."
    evidence: "Schema validation result. EVIDENCE.yaml defect entry if applicable."

tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - "kb_get_story.state === 'ready' after elab"
      - "kb_get_story.state === 'in_progress' after dev-implement Step 0.6"
      - "kb_get_story.state === 'ready_for_review' after dev-implement Done"
      - "kb_get_story.state === 'in_review' after dev-code-review Step 0.6"
      - "kb_get_story.state === 'ready_for_qa' after dev-code-review PASS"
      - "kb_get_story.state === 'in_qa' after qa-verify Step 0.6"
      - "artifact_search({story_id: CANARY_ID}).length >= 1 after implementation"
      - "fs.existsSync('_implementation/CHECKPOINT.yaml') === true"
      - "fs.existsSync('_implementation/SCOPE.yaml') === true"
      - "fs.existsSync('_implementation/PLAN.yaml') === true"
      - "fs.existsSync('_implementation/EVIDENCE.yaml') === true"
      - "fs.existsSync('_implementation/REVIEW.yaml') === true"
  frontend:
    playwright_runs: []
    assertions: []

manual_cases:
  - id: MC-1
    title: "Full canary story workflow traversal with artifact verification"
    steps:
      - "1. Verify all KBAR-0160 through KBAR-0210 are merged (read agent/command files, check git log)"
      - "2. Start Docker Compose: verify KB service on port 5433, main DB on port 5432"
      - "3. Create canary story in DB: use kb_update_story_status or a real simple KBAR backlog story"
      - "4. Verify initial DB state via kb_get_story: state should be backlog"
      - "5. Run /elab-story CANARY_ID — observe completion, record state via kb_get_story"
      - "6. Run /dev-implement-story CANARY_ID — observe Step 0.6 state claim; check _implementation/ after each phase boundary"
      - "7. Run artifact_search({story_id: CANARY_ID}) — record result count and types"
      - "8. Note knowledge-context-loader artifact_search invocation in logs"
      - "9. Run /dev-code-review CANARY_ID — observe Step 0.6 claim (in_review); verify REVIEW.yaml; verify state → ready_for_qa"
      - "10. Confirm KBAR-0190 merged. If not, defer QA phase and document."
      - "11. Run /qa-verify-story CANARY_ID — observe Step 0.6 claim (in_qa); verify QA artifact; verify terminal state"
      - "12. Clean up: mark canary cancelled or delete from DB"
      - "13. Write EVIDENCE.yaml: document all observations, state values, artifact paths, any defects found"
    expected: "All 13 ACs verified. EVIDENCE.yaml complete. Canary story cleaned up."
  - id: MC-2
    title: "Partial validation run (if KBAR-0190 not merged)"
    steps:
      - "1-9. Follow MC-1 steps 1-9 (elab through code review)"
      - "10. Document QA phase deferral in EVIDENCE.yaml: 'KBAR-0190 not merged at validation time; QA phase deferred'"
      - "11. Mark KBAR-0220 as partial validation complete; schedule QA phase re-run after KBAR-0190 merges"
    expected: "ACs 1-10 verified. ACs 8-9 deferred with documented reason."

fixture_definitions:
  - name: "CANARY_STORY"
    type: "DB story record"
    description: "A real, simple KBAR backlog story (e.g., KBAR-0230 or purpose-built KBAR-TEST-001) created in DB in backlog state. Must be cleaned up after validation."
  - name: "CANARY_STORY_DIR"
    type: "filesystem directory"
    description: "The story directory for the canary story, containing _implementation/ subdirectory where artifact files will be written during the canary run."

risks:
  - "KBAR-0190 not merged at validation time — QA phase must be deferred (non-blocking for partial validation)"
  - "KB server not running — artifact_search validation will be skipped; file-only validation still possible"
  - "Docker Compose state unknown at implementation start — implementer must verify services before starting"
  - "Canary story selection: using a real story (e.g., KBAR-0230) risks advancing its workflow state unintentionally; prefer KBAR-TEST-001 purpose-built stub"
  - "Defect discovery may terminate validation mid-run — EVIDENCE.yaml must be written at each phase boundary, not just at completion"
