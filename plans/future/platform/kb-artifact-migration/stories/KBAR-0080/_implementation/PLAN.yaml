architectural_decisions: []

complexity: simple

notes:
  - "CRITICAL: Tool count in mcp-integration.test.ts must be verified at implementation time via getToolDefinitions().length. Current dist count is 53 (verified 2026-02-24). Story claims 54, ELAB claims 53. Implement-time verification is required per risk disclosure in story."
  - "story-crud-operations.ts already has: auto-timestamps for in_progress/completed, blocked:false clearing, not-found soft-return — confirmed at lines 284-349. Only the terminal-state guard is missing."
  - "The vi.mock path for story handlers is '../../crud-operations/story-crud-operations.js' (not crud-operations/index.js which is for CRUD tools)."
  - "Terminal-state guard return shape: { story: null, updated: false, message: \"Cannot transition from terminal state '${currentState}' to '${targetState}'...\" } — do NOT throw, do NOT use isError: true."
  - "ST-1 and ST-2 can run in parallel. ST-3 can also run in parallel with ST-1/ST-2. ST-4 depends on ST-3. ST-5 depends on ST-4. ST-6 depends on ST-1+ST-2+ST-5."
  - "Per ADR-005: integration tests must use real PostgreSQL. Unit tests (story-tools.test.ts) use vi.mock — no testcontainers needed for unit tests."
  - "Per ADR-006: no E2E tests required for this backend-only story."
  - "No barrel file imports — import directly from story-crud-operations.ts or __types__/index.ts."
  - "Use createMcpLogger() from mcp-server/logger.ts — never console.log."
