gaps: []

opportunities:
  - id: opp-1
    category: edge_cases
    finding: >
      The state lifecycle in AC-8 implicitly assumes only states defined in StoryStateSchema are
      valid in existing rows, but there is no test covering the case where existing[0].state is
      not a recognized terminal or non-terminal value (e.g., a legacy or corrupted row with an
      unexpected state string). The Zod schema prevents writing invalid states but does not protect
      against reading legacy data. An additional test scenario in ST-4 could explicitly assert
      guard behavior when existing state is outside the known terminal list.
    effort: low
    decision: log_to_kb
    kb_entry_id: "41cefe28-8d64-4c4c-9a09-0038bd0ab147"

  - id: opp-2
    category: observability
    finding: >
      The handleKbUpdateStoryStatus handler logs state and phase on invocation but does not log
      the previous state before the transition. Adding previous_state to the success log entry
      would make audit trails for state transitions debuggable without requiring a separate DB
      query to reconstruct the before/after pair.
    effort: low
    decision: log_to_kb
    kb_entry_id: "0638488d-bcdf-468e-8f95-8ba2a2dedf67"

  - id: opp-3
    category: edge_cases
    finding: >
      AC-4 says startedAt is set "only if not already set" (idempotent) and completedAt similarly.
      The test plan mentions startedAt idempotency but does not include a dedicated test for the
      idempotent second-call scenario for completedAt (transitioning to 'completed' a second time
      must not overwrite the original completedAt timestamp). The implementation correctly handles
      this (story-crud-operations.ts lines 304-306) but the test coverage for completedAt
      idempotency should be explicitly verified in ST-4.
    effort: low
    decision: log_to_kb
    kb_entry_id: "9eff82eb-7e3f-40a2-a4c0-63f8e390e1ae"

  - id: opp-4
    category: edge_cases
    finding: >
      The mcp-integration.test.ts mock covers only crud-operations/index.js (kb_add, kb_get,
      kb_update, kb_delete, kb_list). story-crud-operations are NOT mocked in the integration
      test. If any future tool invocation test for story tools is added to mcp-integration.test.ts,
      a separate mock for story-crud-operations.js will be required. Not a gap for this story's
      scope but relevant for KBAR-0090 and the KBAR-010 integration test story.
    effort: low
    decision: log_to_kb
    kb_entry_id: "a5f62305-b8de-4b1d-8f3d-c385004328e5"

  - id: opp-5
    category: edge_cases
    finding: >
      Tool count must be re-verified at implementation time before updating the assertion in
      mcp-integration.test.ts. The story claims a verified count of 54 (2026-02-23) and instructs
      updating 52→54, but source audit at elaboration time counts 53 entries in the toolDefinitions
      array in tool-schemas.ts. The story correctly warns "tool count may drift if concurrent
      stories add tools — verify at implementation time." The implementation team must run
      getToolDefinitions().length before setting the assertion value.
    effort: low
    decision: log_to_kb
    kb_entry_id: "5721d886-aa7f-4820-aaab-a3c622947d11"

