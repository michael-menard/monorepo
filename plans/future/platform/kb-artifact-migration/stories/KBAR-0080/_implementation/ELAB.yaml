audit:
  - id: scope_alignment
    status: WARN
    note: >
      stories.index.md KBAR-008 describes "Implement MCP tools for listing stories with filters
      and updating status/phase" — but the tools are already implemented. The story's actual scope
      is narrower: fix stale integration test (AC-1), write unit tests (AC-2 through AC-9), and
      add a terminal-state guard (AC-8). The index description is stale and aspirational rather
      than strictly conflicting. No extra endpoints, infrastructure, or packages are introduced.
      Assessed as WARN rather than FAIL because the index entry is high-level and the story
      correctly scopes to three discrete gaps against what already exists.

  - id: internal_consistency
    status: PASS
    note: >
      Goals, Non-goals, Acceptance Criteria, Subtasks, and Architecture Notes are fully consistent.
      The state lifecycle in AC-8 (backlog → ready → in_progress → ready_for_review → in_review
      → ready_for_qa → in_qa → completed | cancelled | deferred | failed_code_review | failed_qa)
      matches the StoryStateSchema enum values confirmed in
      apps/api/knowledge-base/src/__types__/index.ts (lines 780-793). The terminal-state guard
      Non-goal ("do NOT implement a full FSM") is consistent with the AC-8 guard spec. The
      Architecture Notes clarify the guard return shape (soft-return pattern matching the not-found
      branch, lines 284-290 of story-crud-operations.ts), which is internally consistent with AC-8.
      The "blocked: false clears blockedReason and blockedByStory" behavior in AC-5 is confirmed
      already implemented in story-crud-operations.ts lines 317-324. No contradictions found.

  - id: reuse_first
    status: PASS
    note: >
      Reuse Plan explicitly identifies all five existing operations in story-crud-operations.ts.
      The vi.hoisted mock pattern is reused from tool-handlers.test.ts (canonical reference confirmed
      as an existing file). The mcp-integration.test.ts is updated (not replaced). StoryStateSchema
      is reused from __types__/index.ts for terminal-state constants. No new shared packages
      introduced. No per-story one-off utilities proposed. Architecture Notes explicitly state
      no barrel imports — import directly from story-crud-operations.ts or __types__/index.ts.

  - id: ports_adapters
    status: PASS
    note: >
      Backend-only story with no HTTP/REST endpoints. The terminal-state guard is placed inline in
      the DB operations layer (story-crud-operations.ts), which is appropriate — it is a data-layer
      business rule, not transport-specific logic. All three tool handlers already follow the correct
      pattern: enforceAuthorization → Zod parse → DB operation → log → return JSON. No HTTP types
      in the service layer. docs/architecture/api-layer.md check not applicable — no new API
      endpoints are added or modified.

  - id: testability
    status: PASS
    note: >
      Test commands are concrete and executable: `pnpm test --filter @repo/knowledge-base --
      mcp-integration` (ST-1 verification), `pnpm test --filter @repo/knowledge-base -- story-tools`
      (ST-3/4/5 verification), and `pnpm check-types --filter @repo/knowledge-base` (ST-2/6
      verification). Each subtask has a specific verification command. The vi.hoisted mock pattern
      reference (tool-handlers.test.ts) is a confirmed real file. ADR-005 requirement (real
      PostgreSQL for integration tests) is documented. No .http file tests required — this is an
      MCP protocol story with no REST endpoints; Vitest unit+integration strategy is appropriate
      per ADR-006 (no E2E tests for backend-only stories).

  - id: decision_completeness
    status: PASS
    note: >
      The terminal-state guard return shape is fully specified in the Architecture Notes. The story
      explicitly states (Architecture Notes, AC-8 clarification block): the guard MUST use the
      soft-return pattern consistent with the not-found branch (lines 284-290 of
      story-crud-operations.ts), returning { story: null, updated: false, message: "Cannot
      transition from terminal state '${currentState}' to '${targetState}'..." }. The story
      explicitly states "Do NOT throw — the guard is a business rule soft-rejection, not an
      exceptional error" and further specifies that ST-4 test assertions must verify updated: false
      and message field presence, not isError. No blocking TBDs or unresolved design decisions
      remain.

  - id: risk_disclosure
    status: PASS
    note: >
      Four explicit risks disclosed in pm_artifacts.dev_feasibility.risks: tool count drift
      (concurrent stories), state transition same-state edge case, vi.hoisted mock ordering, and
      real PostgreSQL requirement for integration tests. The Reality Baseline explicitly states the
