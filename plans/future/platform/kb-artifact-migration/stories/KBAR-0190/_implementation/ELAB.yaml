opportunities:
  - id: opp-1
    category: edge_cases
    finding: >
      dev-fix-fix-leader Step 7 increments the review artifact iteration but does not
      include a file_path for a FIX-CONTEXT.yaml / fix_summary artifact. The Architecture
      Notes mention "dev-fix-fix-leader's fix_summary artifact write (if any)" but the
      current agent (v5.0.0) has no Step that explicitly writes a fix_summary artifact
      with kb_write_artifact. AC-4 and AC-5 cover evidence and review writes. If a future
      story adds a fix_summary write step to dev-fix-fix-leader, that step must also
      use artifact_write with file_path pointing to _implementation/FIX-CONTEXT.yaml.
      Worth tracking — not MVP-blocking since the current agent has no fix_summary write.
    effort: low
    decision: log_to_kb
    kb_entry_id: "47e6eab6-0126-4727-98ca-0a8bb4623770"

  - id: opp-2
    category: observability
    finding: >
      The graceful failure documentation required by AC-7 specifies that kb_write_warning
      must not cause rollback of the QA verdict. However, the story does not specify whether
      agents should log the kb_write_warning to token-log or to a structured output field.
      Adding a note in the graceful failure section about surfacing kb_write_warning in the
      agent's output format (e.g., in the QA-VERIFY.yaml or the completion-leader output
      YAML) would improve observability without changing the migration scope.
    effort: low
    decision: log_to_kb
    kb_entry_id: "84ef2ff2-6192-43b1-9705-4acee0c9b026"

  - id: opp-3
    category: integrations
    finding: >
      qa-verify-completion-leader (v3.3.0) lists kb_write_artifact in kb_tools but also
      has kb_add_lesson, kb_add_task, kb_sync_working_set, kb_archive_working_set, and
      kb_update_story_status. The migration only touches the kb_write_artifact calls for
      verification artifact updates. The overall kb_tools frontmatter update (AC-6) needs
      to add artifact_write while keeping kb_write_artifact listed only if there are
      remaining kb_write_artifact call sites. Based on the current agent, the two
      verification artifact writes (PASS Step 2, FAIL Step 2) are the only kb_write_artifact
      sites — so kb_write_artifact can be removed from frontmatter entirely after migration.
      This is already implied by AC-6 but worth flagging as an opportunity to clean up
      the frontmatter rather than only appending artifact_write.
    effort: low
    decision: log_to_kb
    kb_entry_id: "a02b635f-3869-49a6-90c9-640d27106770"

