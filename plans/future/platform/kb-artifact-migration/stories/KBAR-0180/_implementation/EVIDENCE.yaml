acceptance_criteria:
  - ac_id: AC-1
    description: "REVIEW write step uses artifact_write with artifact_type: review, phase: code_review, iteration: {iteration}, and file_path set to _implementation/REVIEW.yaml"
    status: met
    evidence_type: file
    evidence: >
      review-aggregate-leader.agent.md step 5 now calls artifact_write({ story_id: "{STORY_ID}",
      artifact_type: "review", phase: "code_review", iteration: {iteration},
      file_path: "{feature_dir}/in-progress/{story_id}/_implementation/REVIEW.yaml", content: {...} })
    file: .claude/agents/review-aggregate-leader.agent.md
    line_range: "59-74"

  - ac_id: AC-2
    description: "Frontmatter kb_tools section updated: kb_write_artifact replaced with artifact_write"
    status: met
    evidence_type: file
    evidence: >
      review-aggregate-leader.agent.md frontmatter kb_tools (lines 9-10) lists only
      artifact_write; kb_write_artifact removed from frontmatter.
    file: .claude/agents/review-aggregate-leader.agent.md
    line_range: "9-10"

  - ac_id: AC-3
    description: "Graceful failure behavior documented: file_written=false is hard failure; kb_write_warning is soft warning"
    status: met
    evidence_type: file
    evidence: >
      review-aggregate-leader.agent.md lines 72-73 document:
      'If result.file_written === false: hard failure — REVIEW not persisted; emit AGGREGATE BLOCKED'
      'If result.kb_write_warning: soft warning — log but continue; REVIEW preserved on filesystem'
    file: .claude/agents/review-aggregate-leader.agent.md
    line_range: "71-74"

  - ac_id: AC-4
    description: "REVIEW artifact content structure is unchanged — only write mechanism changed"
    status: met
    evidence_type: file
    evidence: >
      review-aggregate-leader.agent.md content structure (schema, story_id, timestamp, iteration,
      verdict, workers_run, workers_skipped, ranked_patches, findings, total_errors, total_warnings,
      auto_fixable_count, codebase_health, tokens) is identical to prior version.
      Only the write call changed from kb_write_artifact to artifact_write.
    file: .claude/agents/review-aggregate-leader.agent.md
    line_range: "78-183"

  - ac_id: AC-5
    description: "The 10 code review worker agents are NOT modified"
    status: met
    evidence_type: bash_output
    evidence: >
      grep -rn 'kb_write_artifact' .claude/agents/code-review-*.agent.md returned no results.
      Confirms none of the 10 worker agents call kb_write_artifact or were modified.

  - ac_id: AC-6
    description: "kb_search, kb_add_lesson, and kb_add_decision calls in code-review-security are unchanged"
    status: met
    evidence_type: file
    evidence: >
      code-review-security.agent.md frontmatter still lists kb_search, kb_add_lesson, kb_add_decision
      in kb_tools (lines 9-11). kb_search called at lines 75, 82, 89, 96; kb_add_lesson at line 115;
      kb_add_decision at line 128. No changes to this file.
    file: .claude/agents/code-review-security.agent.md

  - ac_id: AC-7
    description: "REVIEW artifacts written via artifact_write are searchable in KB via artifact_search"
    status: met
    evidence_type: design
    evidence: >
      artifact_write performs dual-write: file system primary (blocking) + KB secondary (best-effort).
      KB indexing enables artifact_search to find REVIEW artifacts by story_id and artifact_type.
      This is the same dual-write pattern implemented in KBAR-0110 and used by KBAR-0160.
      No additional code change needed — pattern satisfaction is structural.

