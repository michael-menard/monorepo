lessons_to_record:
  - lesson: >
      CLI scripts that depend on a not-yet-merged function (cross-story dependency) should use
      dynamic import with null-safety check and clear error messaging pointing to the blocking story.
      This allows the CLI scaffold to pass review and QA independently while the dependency lands.
    category: pattern
    tags: ["cli", "cross-story-dependency", "backend", "kbar-sync"]

  - lesson: >
      Unit test coverage for CLI scripts that contain large integration-only code paths (e.g.,
      sync-epic.ts, sync-story.ts) will naturally appear low in package-wide coverage reports.
      Coverage thresholds in vitest.config.ts should account for this split or use per-file
      thresholds. Pre-existing package-level coverage debt should be tracked separately from
      story-specific coverage achievements.
    category: time_sink
    tags: ["coverage", "cli", "vitest", "kbar-sync", "technical-debt"]

