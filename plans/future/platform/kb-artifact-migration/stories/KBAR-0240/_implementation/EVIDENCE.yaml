summary: >
  Implemented regenerate:index CLI script following the sync-epic.ts pattern.
  Added RegenerateIndexCLIOptionsSchema to cli-options.ts, created regenerate-index.ts
  with full CLI argument parsing, dynamic import of generateStoriesIndex (with graceful
  fallback when KBAR-0230 not yet merged), --dry-run comparison logic, --output write
  logic, and registered the script in package.json. 22 unit tests all pass.

acceptance_criteria:
  - id: AC-1
    description: "RegenerateIndexCLIOptionsSchema added to cli-options.ts"
    status: PASS
    evidence:
      - file: packages/backend/kbar-sync/scripts/__types__/cli-options.ts
        detail: >
          Added RegenerateIndexCLIOptionsSchema with epic (required string), output (optional string),
          dryRun (optional boolean, default false), verbose (optional boolean, default false),
          force (optional boolean, default false). Exported type RegenerateIndexCLIOptions.

  - id: AC-2
    description: "regenerate-index.ts CLI script created following sync-epic.ts pattern"
    status: PASS
    evidence:
      - file: packages/backend/kbar-sync/scripts/regenerate-index.ts
        detail: >
          New file. Contains HELP_TEXT constant, rethrowExitError helper (verbatim from sync-epic.ts),
          parseArgs function, and main() function. Dynamic import of generateStoriesIndex from
          ../src/index.js with graceful handling when function not yet exported (KBAR-0230).
          Handles --dry-run (compare with existing file, exit 0/1), --output (write to file),
          --force (skip staleness check). DB errors → exit 2. Other errors → exit 1.
          Uses @repo/logger for verbose logging. import.meta.url guard at bottom.

  - id: AC-3
    description: "regenerate:index registered in package.json"
    status: PASS
    evidence:
      - file: packages/backend/kbar-sync/package.json
        detail: >
          Added "regenerate:index": "tsx scripts/regenerate-index.ts" to scripts section.

  - id: AC-4
    description: "Unit tests written and passing"
    status: PASS
    evidence:
      - file: packages/backend/kbar-sync/scripts/__tests__/regenerate-index.test.ts
        detail: >
          22 tests across 4 describe blocks: parseArgs (7 tests), RegenerateIndexCLIOptionsSchema
          validation (6 tests), main() behavior (7 tests). All pass. Covers: --help exits 0,
          all flags parsed correctly, Zod validation (valid/invalid/defaults), main() success path,
          --dry-run matching exits 0, --dry-run differing exits 1, DB error exits 2,
          generateStoriesIndex unavailable exits 1, missing --epic validation error exits 1.

