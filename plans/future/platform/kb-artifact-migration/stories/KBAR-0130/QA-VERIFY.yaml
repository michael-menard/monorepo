lessons_to_record:
  - lesson: >
      Fix commits that claim to address a parameter pass-through must be verified at the downstream
      call site, not just at the schema level. A schema field can be added without being wired to the
      underlying function call — the commit message may describe the intent but the code diff is the
      ground truth. QA should always check the kb_search call arguments directly.
    category: anti_pattern
    tags: ["qa", "fix-cycle", "schema", "handler", "pass-through"]

  - lesson: >
      When AC-9 explicitly lists 'limit/min_confidence/explain pass-through', all three must be
      tested. A missing explain test is invisible if reviewers only confirm that some pass-through
      tests exist. QA must enumerate each listed parameter and verify coverage for each one.
    category: pattern
    tags: ["qa", "ac-coverage", "test-completeness"]

  - lesson: >
      False-negative QA cycles (QA marks FAIL but code is already correct) waste fix cycles.
      The root cause in KBAR-0130 was QA reading stale evidence or a prior snapshot rather than
      reading the actual source files on disk. Evidence-first QA must cross-check by reading
      the source file at the exact line reference given in EVIDENCE.yaml — not inferring from
      prior QA artifacts or commit messages alone.
    category: anti_pattern
    tags: ["qa", "false-negative", "evidence-first", "source-verification"]

