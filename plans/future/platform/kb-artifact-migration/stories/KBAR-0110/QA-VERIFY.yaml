lessons_to_record:
  - lesson: >
      When adding a new MCP tool whose underlying function uses dynamic ESM imports (e.g.,
      `await import('js-yaml')`, `await import('fs/promises')`), vitest module mocks for those
      dynamic imports must use vi.mock() at the top level with the bare module name (e.g.,
      vi.mock('fs/promises', ...)). This allows the mocks to intercept the dynamic import inside
      the function under test, enabling filesystem behavior to be fully controlled in tests.
    category: pattern
    tags: ["testing", "vitest", "esm", "dynamic-import", "mcp", "knowledge-base"]

  - lesson: >
      For MCP tools that do dual-write (filesystem + DB), inject the DB write function as an
      optional parameter (kbWriteFn = kb_write_artifact) rather than calling the module-level
      function directly. This allows vi.importActual() in tests to obtain the real function and
      pass a mock kbWriteFn, cleanly separating handler-level tests (mock the whole function)
      from dual-write unit tests (test the real function with a mock DB fn).
    category: pattern
    tags: ["testing", "dependency-injection", "mcp", "knowledge-base", "dual-write"]

  - lesson: >
      The access-control.ts ToolNameSchema enum must include every tool name registered in
      toolHandlers. If a new tool name is omitted from the enum, enforceAuthorization() will
      deny all roles since the schema.safeParse will fail. Always add new tool names to both
      the ToolNameSchema enum and the ACCESS_MATRIX in the same commit.
    category: blocker
    tags: ["mcp", "authorization", "knowledge-base", "access-control"]

