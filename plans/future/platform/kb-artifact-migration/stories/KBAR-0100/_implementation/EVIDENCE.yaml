acceptance_criteria:
  - ac_id: AC-1
    ac_text: >
      handleToolCall('kb_get_story', { story_id: 'KBAR-0080' }, deps) returns a non-error result
      with content[0].text parseable as { story: {...}, message: string } when the mock CRUD
      operation resolves successfully.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-1: returns story when found' and 'AC-1: returns null story when not found' pass.
          handleToolCall('kb_get_story', ...) correctly dispatches to handler and returns parseable JSON.

  - ac_id: AC-2
    ac_text: >
      handleToolCall('kb_get_story', { story_id: '' }, deps) returns isError: true with
      code: 'VALIDATION_ERROR' — Zod validation fires through the dispatch layer.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-2: returns VALIDATION_ERROR for empty story_id' and related tests for all 5 tools.
          Zod validation propagates through handleToolCall dispatch layer for empty/invalid inputs.

  - ac_id: AC-3
    ac_text: >
      handleToolCall('kb_list_stories', { feature: 'kbar', limit: 20 }, deps) returns a non-error
      result with { stories: [...], total: number, message: string } shape.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-3: returns filtered stories list' and 'AC-3: returns empty list when no stories
          match' pass. Response shape verified with stories array length and total count.

  - ac_id: AC-4
    ac_text: >
      handleToolCall('kb_update_story_status', ...) returns { updated: true, story: {...} } on
      success; returns { updated: false, message: '...terminal state...' } when terminal-state guard
      fires.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-4: updates state when valid transition', 'AC-5: blocks transition from terminal
          state (completed -> in_progress)' and 'AC-5: blocks transition from terminal state
          (cancelled -> ready)' all pass. Terminal-state guard message verified.

  - ac_id: AC-5
    ac_text: >
      handleToolCall('kb_update_story', ...) returns { updated: true, story: {...} } on success;
      { updated: false, story: null } when mock returns not-found.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-4: updates story metadata fields' and 'AC-4: returns not-found when story does
          not exist' pass. AC-6 idempotent same-state transition also verified.

  - ac_id: AC-6
    ac_text: >
      handleToolCall('kb_get_next_story', { epic: 'platform' }, deps) returns
      { story: {...}, candidates_count: N } on success; { story: null, candidates_count: 0 } when
      no candidates exist.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-5: returns next available story in epic', 'AC-5: returns null when no stories
          available in epic', and 'AC-5: returns blocked dependency info...' all pass.

  - ac_id: AC-7
    ac_text: >
      All five story tools return isError: true with a sanitized error message (no DB credentials
      or stack traces) when the underlying mock CRUD operation rejects with a MockDatabaseError.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-7: sanitizes DB connection errors (no credentials in message)' for kb_get_story,
          kb_update_story_status, and kb_update_story all verify that connection strings with
          passwords/credentials are stripped from error messages.

  - ac_id: AC-8
    ac_text: >
      handleToolCall('kb_get_story', args, deps, { agent_role: 'dev' }) succeeds — story tools
      are accessible to dev role; no FORBIDDEN response for non-admin story tools.
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Test 'AC-8: dev role can call kb_get_story' passes. dev role receives no FORBIDDEN error
          and gets a successful response with parsed story data.

  - ac_id: AC-9
    ac_text: >
      handleToolCall('kb_update_story_status', args, deps, { agent_role: 'all' }) succeeds —
      story tools are accessible to all role per access-control configuration (not admin-only).
    status: PASS
    evidence_items:
      - type: test
        path: apps/api/knowledge-base/src/mcp-server/__tests__/story-tools-integration.test.ts
        description: >
          Tests 'AC-9: all 4 roles (pm, dev, qa, all) can call kb_list_stories', 'AC-9: all 4
          roles can call kb_update_story_status', 'AC-9: all 4 roles can call kb_update_story',
          and 'AC-9: all 4 roles can call kb_get_next_story' all pass.

  - ac_id: AC-10
