lessons_to_record:
  - lesson: >
      Test-only stories that add handler unit tests for already-implemented tools
      (pattern: KBAR-0090, KBAR-0120) should be exempted from full-suite coverage
      threshold failures when run in single-file filter mode. Coverage gates apply
      to full suite runs only.
    category: pattern
    tags: ["testing", "coverage", "qa-verify", "kb-artifact-migration"]
  - lesson: >
      The mcp-integration.test.ts tool count assertion is a recurring source of
      pre-existing failures that need disambiguation in QA. Each new story touching
      the knowledge-base package should note the current expected vs actual count
      to establish a clear before/after baseline.
    category: blocker
    tags: ["mcp-integration", "tool-count", "knowledge-base", "qa-verify"]
  - lesson: >
      EC-1 (literal string 'null' vs JSON null) is a subtle serialization edge case
      that must be explicitly tested. The handler returns JSON.stringify(null) = 'null'
      (string), not the JSON value null. This pattern may apply to other handlers
      with nullable return types.
    category: pattern
    tags: ["serialization", "null-handling", "mcp-tools", "kb-artifact-migration"]

