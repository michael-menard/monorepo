gaps:  # MVP-blocking only
  - id: gap-1
    check: risk_disclosure
    finding: >
      `or` from drizzle-orm is NOT currently imported in story-crud-operations.ts. The Reuse Plan
      incorrectly states it is "already imported." The dependency query in ST-3 uses `or()` from
      drizzle-orm for the OR condition on storyId / targetStoryId. Without adding `or` to the
      import, ST-3 will fail to compile. Implementation must add `or` to the existing drizzle-orm
      import line.
    severity: high
    decision: add_ac
    ac_added: "AC-9: Add `or` to drizzle-orm import in story-crud-operations.ts"
    notes: "Auto-resolved: missing import blocks core journey (ST-3 compile failure)"

  - id: gap-2
    check: risk_disclosure
    finding: >
      `storyArtifacts` is not currently imported in story-crud-operations.ts. The file imports
      `{ stories, storyDependencies }` from db/schema.ts but not `storyArtifacts`. ST-2 requires
      this import to query the story_artifacts table. Implementation must add `storyArtifacts` to
      the db/schema.ts import line in story-crud-operations.ts.
    severity: high
    decision: add_ac
    ac_added: "AC-10: Add `storyArtifacts` to db/schema.ts import in story-crud-operations.ts"
    notes: "Auto-resolved: missing import blocks core journey (ST-2 compile failure)"

opportunities:  # Non-blocking
  - id: opp-1
    category: edge_cases
    finding: >
      Return type design (Architecture Notes) uses optional keys (artifacts?, dependencies?) but
      AC-4 specifies that missing-story case returns populated empty arrays: artifacts: [],
      dependencies: []. The Zod result schema should clarify whether arrays are optional (absent
      when flags are false) vs. always present as empty arrays. Consider using conditional
      population: when flag=false, key is absent; when flag=true, key is always an array (even if
      empty). This distinction should be explicit in KbGetStoryResultSchema to avoid consumer
      confusion.
    effort: low
    decision: log_to_kb
    kb_entry_id: "14f6f35e-6653-42db-b44e-998e8540f13e"

  - id: opp-2
    category: observability
    finding: >
      EC-1 test relies on a DB spy to verify secondary queries are NOT executed when story is null.
      The story specifies "spy on deps.db.select" but the handler currently uses
      enforceAuthorization and passes deps.db directly to the service. For unit tests, the mock
      pattern (vi.mock on service layer) would naturally prevent any secondary queries from
      executing. For integration tests, a DB spy would require intercepting the Drizzle client.
      Consider documenting the spy mechanism more concretely in ST-7 to avoid test implementation
      ambiguity.
    effort: low
    decision: log_to_kb
    kb_entry_id: "02f35032-8c01-47d3-8eb2-0f5faee9b117"

  - id: opp-3
    category: performance
    finding: >
      When both include_artifacts and include_dependencies are true, the implementation makes 3
      sequential DB round-trips. For a future optimization, these two secondary queries could be
      issued in parallel via Promise.all() since they are independent. Not needed for MVP but would
      reduce latency for the common "full context" use case.
    effort: low
    decision: log_to_kb
    kb_entry_id: "78b97163-fe99-40fa-91a5-1dbf879a4105"

