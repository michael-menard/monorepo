architectural_decisions:
  - id: ARCH-001
    question: "Should dev-implement-story.md add a Step 0.6 DB claim given that Step 1.3 worktree verification already prevents parallel work conflicts at the filesystem level?"
    decision: "Add Step 0.6 DB claim (state: 'in_progress') to dev-implement-story.md"
    rationale: "All other workflow commands that initiate active work claim DB state at Step 0.6. The worktree check provides filesystem isolation but not DB state consistency. Adding the Step 0.6 claim ensures the DB reflects 'in_progress' at the correct moment (implementation start), consistent with the architecture applied to dev-code-review.md, qa-verify-story.md, and dev-fix-story.md. This also enables future tooling that queries story DB state to correctly reflect active implementation. Recommendation from story architecture notes."
    decided_by: plan

complexity: simple

