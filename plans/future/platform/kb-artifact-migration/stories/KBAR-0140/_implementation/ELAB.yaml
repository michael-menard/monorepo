gaps:
  mvp_critical:
    - id: GAP-01
      title: "Wrong ArtifactTypeSchema import path in ST-1 step 7"
      severity: medium
      description: >
        ST-1 implementation step 7 instructs: "No barrel files; import ArtifactTypeSchema
        directly from '../mcp-server/__types__/index.js'". This path does not exist.
        The correct import is '../__types__/index.js' (src/__types__/index.ts). Following
        the stated path will cause a TypeScript module resolution error.
      evidence: "artifact-operations.ts line 35 confirms: import { ArtifactTypeSchema } from '../__types__/index.js'"
      remediation: >
        Implementer must use '../__types__/index.js' as the import path for ArtifactTypeSchema
        in the new artifact-summary.ts file. Story author should update ST-1 step 7.
      blocking: true
      decision: corrected_in_story
      ac_added: null
      notes: "Fixed import path from '../mcp-server/__types__/index.js' to '../__types__/index.js' directly in story markdown (ST-1 step 7)"

  non_blocking_opportunities:
    - id: OPP-01
      title: "verification and proof summary fields differ between prototype and story"
      severity: low
      description: >
        The prototype extractSummary() for 'verification' uses nested access to
        content.code_review and content.qa sub-objects. The story's Architecture Notes
        table specifies flat fields (verdict, finding_count, critical_count). Similarly,
        'proof' in the prototype accesses content.verification.tests_passed whereas the
        story table uses direct fields. These are intentional simplifications. Implementer
        should follow the story's Architecture Notes table (not the prototype) for these two
        types, as the simpler field set is more robust to content variation.
      blocking: false

    - id: OPP-02
      title: "TC-019/TC-020 integration tests require real Postgres — test isolation note"
      severity: low
      description: >
        The integration test file artifact-operations.integration.test.ts is listed as a new
        file to create in the test plan. The existing crud-operations/__tests__/ directory
        contains only KB-level tests (kb-add, kb-delete, kb-get, kb-list, kb-update) that
        use test-helpers.ts. The new integration test should follow the same real-Postgres
        pattern per ADR-005 but will need to import the artifact_write function and set up
        a real storyArtifacts row. The implementer should check whether a shared Postgres
        test setup helper exists in crud-operations/__tests__/test-helpers.ts before
        duplicating setup code.
      blocking: false

    - id: OPP-03
      title: "tokens artifact type in prototype is not a production type"
      severity: low
      description: >
        The prototype extractSummary() includes a 'tokens' case which is not in the
        13 production artifact types (ARTIFACT_TYPES constant). Implementer should NOT
        port this case to the new utility. The story correctly identifies 9/13 production
        types covered by the prototype.
      blocking: false

    - id: OPP-04
      title: "Default fallback only returns scalar fields — consider boolean inclusion"
      severity: low
      description: >
        The prototype's default case filters out all objects (checking typeof value !== 'object'),
        which excludes booleans. Wait — booleans pass this check (typeof true !== 'object' is true).
        The filter correctly includes strings, numbers, and booleans. However, arrays are excluded
        (typeof [] === 'object'). This is correct per AC-4 ("top-level scalar fields"). No change
        needed; this observation confirms the existing prototype behavior aligns with AC-4.
      blocking: false
      decision: log_to_kb
      notes: "Confirmed existing behavior aligns with AC-4; no change needed"

