lessons_to_record:
  - lesson: >
      Shared testcontainer across describe blocks (one container per test file)
      is required when @repo/db uses a pg.Pool singleton. Stopping and starting
      new containers between describe blocks causes the drizzle pool to fail.
      Use a single sharedCtx in beforeAll at the file level.
    category: pattern
    tags: ["testcontainers", "postgresql", "kbar-sync", "integration-testing"]

  - lesson: >
      CLI integration tests (sync-cli) that share the same pool singleton as
      sync-integration tests must be separated into different files so each
      gets its own Vitest worker with an independent module cache. Colocating
      them in the same file causes pool invalidation when containers are torn down.
    category: pattern
    tags: ["testcontainers", "vitest", "worker-isolation", "kbar-sync"]

  - lesson: >
      CLI scripts in .claude/scripts/**/*.{js,ts} must be added to the Node.js
      files glob in eslint.config.js to allow console statements. The no-console
      rule is appropriate for library code but not for CLI entry points. This
      avoids unnecessary @repo/logger wiring in CLI scripts that output user-facing
      messages.
    category: pattern
    tags: ["eslint", "no-console", "cli-scripts", "claude-scripts"]

  - lesson: >
      When a required field (QueueItem.stage) is populated via a helper function
      (buildStageMap), the helper must be explicitly called in the main parser
      function. TypeScript does not catch the case where a function is implemented
      but never invoked — only runtime testing reveals the missing call.
    category: blocker
    tags: ["typescript", "work-queue", "refresh-work-queue", "code-review"]

