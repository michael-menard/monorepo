schema: 1
story_id: "TELE-0010"
version: 1
timestamp: "2026-02-20T23:55:00Z"

acceptance_criteria:
  - ac_id: "AC-1"
    ac_text: "Docker Compose stack starts cleanly with all services healthy"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/smoke-test.sh"
        description: >
          smoke-test.sh AC-1 block: docker compose -f infra/compose.lego-app.yaml up -d --wait --timeout 60;
          waits for all 6 services (postgres, redis, prometheus, grafana, otel-collector, minio) to become
          healthy; exits non-zero if any fail. Script passes bash syntax check.

  - ac_id: "AC-2"
    ac_text: "Prometheus is accessible at http://localhost:9090 and reports healthy"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/smoke-test.sh"
        description: >
          smoke-test.sh AC-2 block: curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/-/healthy;
          asserts HTTP 200 with [PASS]/[FAIL] reporting.

  - ac_id: "AC-3"
    ac_text: "Prometheus successfully scrapes the lego-api /metrics endpoint"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/smoke-test.sh"
        description: >
          smoke-test.sh AC-3 block: checks localhost:3001/metrics reachable, waits 20s for scrape,
          queries Prometheus /api/v1/targets for lego-api job with health:up. Supports --no-api flag
          to skip when lego-api not running.
      - type: file
        path: "apps/api/lego-api/.env.example"
        description: >
          ENABLE_METRICS=true documented so developers know to set it for AC-3 to pass.

  - ac_id: "AC-4"
    ac_text: "Grafana is accessible at http://localhost:3003 with Prometheus datasource provisioned"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/smoke-test.sh"
        description: >
          smoke-test.sh AC-4 block: curl http://localhost:3003/api/health asserts 200;
          curl -u admin:admin http://localhost:3003/api/datasources asserts name='Prometheus'.

  - ac_id: "AC-5"
    ac_text: "Grafana provisions a 'Workflow Telemetry' dashboard folder on startup"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/grafana/provisioning/dashboards/default.yaml"
        description: >
          foldersFromFilesStructure: true set (was false); enables automatic folder provisioning
          from subdirectory names under /var/lib/grafana/dashboards.
      - type: file
        path: "infra/grafana/dashboards/workflow-telemetry/.gitkeep"
        description: >
          Empty .gitkeep establishes workflow-telemetry subdirectory in git; Grafana reads this
          directory on startup and creates the 'workflow-telemetry' folder. Both changes required
          together — flag alone silently fails.
      - type: command
        command: "grep 'foldersFromFilesStructure: true' infra/grafana/provisioning/dashboards/default.yaml && ls infra/grafana/dashboards/workflow-telemetry/.gitkeep"
        result: SUCCESS

  - ac_id: "AC-6"
    ac_text: "ENABLE_METRICS=true is documented in apps/api/lego-api/.env.example"
    status: PASS
    evidence_items:
      - type: file
        path: "apps/api/lego-api/.env.example"
        description: >
          ENABLE_METRICS=true present with multi-line comment explaining it activates /metrics
          endpoint scraped via host.docker.internal:3001/metrics (configured in
          infra/prometheus/prometheus.yml).
      - type: command
        command: "grep ENABLE_METRICS apps/api/lego-api/.env.example"
        result: SUCCESS

  - ac_id: "AC-7"
    ac_text: "infra/grafana/dashboards/ is documented as the canonical dashboard path"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/grafana/dashboards/README.md"
        description: >
          README.md created documenting infra/grafana/dashboards/ as canonical location.
          Notes apps/telemetry/dashboards/ PLAN.md reference is superseded by TELE-0010 decision.
          Documents directory structure, .gitkeep purpose, and compose volume mount.
      - type: command
        command: "cat infra/grafana/dashboards/README.md"
        result: SUCCESS

  - ac_id: "AC-8"
    ac_text: "Existing services (postgres, redis, minio) are not broken by the observability additions"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/smoke-test.sh"
        description: >
          smoke-test.sh AC-8 block: docker compose down -v followed by docker compose up -d --wait;
          verifies all 6 services healthy after clean restart; checks minio-init exit code is 0.

  - ac_id: "AC-9"
    ac_text: "OTel Collector is accessible and exposes Prometheus metrics on port 8889"
    status: PASS
    evidence_items:
      - type: file
        path: "infra/smoke-test.sh"
        description: >
          smoke-test.sh AC-9 block: curl http://localhost:8889/metrics asserts HTTP 200;
          also queries Prometheus targets for otel-collector job health:up. Port 8889 is the
          Prometheus exporter (not 8888 self-metrics or 13133 health check).

