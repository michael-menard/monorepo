lessons_to_record:
  - lesson: >
      foldersFromFilesStructure: true in Grafana provisioning requires BOTH the flag AND a
      subdirectory (.gitkeep) to work. Setting the flag alone causes Grafana to start cleanly
      but silently provision no folder. Both changes must be committed together.
    category: blocker
    tags: ["grafana", "infra", "docker-compose", "provisioning"]

  - lesson: >
      OTel Collector exposes metrics on port 8889 (Prometheus exporter endpoint) for smoke
      test assertions. Port 13133 is the health extension used by Docker Compose healthcheck.
      These must not be confused in verification scripts.
    category: pattern
    tags: ["otel", "prometheus", "ports", "smoke-test", "infra"]

  - lesson: >
      For infra-only stories with no TypeScript changes, the QA verification model is:
      (1) verify files exist and contain correct config via filesystem reads,
      (2) verify bash syntax for smoke test scripts,
      (3) run existing package test suites to confirm no regressions.
      Runtime Docker verification (smoke-test.sh) is deferred to developer UAT.
    category: pattern
    tags: ["infra", "qa", "verification", "smoke-test"]

