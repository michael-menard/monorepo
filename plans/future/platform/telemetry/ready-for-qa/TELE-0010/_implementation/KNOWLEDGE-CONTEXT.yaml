  lessons_learned:
    count: 3
    relevant_to_scope:
      - story_id: "TELE-0010 (analysis)"
        lesson: >
          foldersFromFilesStructure: true in Grafana provisioning is load-bearing alongside the
          subdirectory — setting the flag without the corresponding .gitkeep directory means no
          folder is provisioned; Grafana starts cleanly but the folder never appears
        category: blocker
        applies_because: "ST-2 implements both changes; the .gitkeep must not be omitted"

      - story_id: "TELE-0010 (analysis)"
        lesson: >
          AC-9 (OTel Collector) uses port 8889 (Prometheus exporter) for metric verification;
          the healthcheck port 13133 is for compose health only — they serve different purposes
          and must not be confused in smoke test assertions
        category: pattern
        applies_because: "ST-3 smoke test script must use 8889 for AC-9 curl assertion"

      - story_id: "INFR-0040 (dependency)"
        lesson: >
          INFR-0040 is in-QA status; telemetry.workflow_events table schema is available in
          packages/backend/database-schema but does not block TELE-0010 — no DB changes needed
        category: reuse
        applies_because: "TELE-0010 is infra-only; no schema migrations required"

    blockers_to_avoid:
      - >
        Omitting infra/grafana/dashboards/workflow-telemetry/.gitkeep when setting
        foldersFromFilesStructure: true — Grafana silently provisions no folder without the directory
      - >
        Running the compose stack without ENABLE_METRICS=true on the host lego-api — Prometheus
        shows lego-api as DOWN and AC-3 fails; this is a prerequisite, not a code change
      - >
        Using port 13133 for OTel Collector metric verification — 13133 is the health extension port,
        8889 is the Prometheus exporter endpoint tested by AC-9

    patterns_to_follow:
      - "Use :ro mounts for all config files (already applied in compose.lego-app.yaml)"
      - >
        Follow healthcheck pattern: wget -q --spider http://localhost:{port}/-/healthy for new services
      - >
        depends_on with condition: service_healthy for services that depend on prometheus
        (already applied to grafana and otel-collector)
      - "Named volumes for persistence (all 5 volumes already defined in compose)"
      - "host.docker.internal:host-gateway extra_hosts for container-to-host scraping (prometheus, otel)"

    patterns_to_avoid:
      - "Creating a new pnpm workspace package for infra concerns (infra/ is the correct home)"
      - "Modifying compose.lego-app.yaml — all services are already complete; story is verification + gap-closing"
      - "Modifying packages/backend/observability/ — createMetricsEndpoint() is correct as-is"
      - "Reading full serverless.yml — not applicable to this infra-only story"

