schema: 2
story_id: "TELE-0010"
timestamp: "2026-02-20T23:45:00Z"
subtask_source: story

steps:
  - id: 1
    subtask_id: "ST-1"
    description: >
      Document ENABLE_METRICS=true in apps/api/lego-api/.env.example with a comment explaining
      it activates the /metrics Prometheus endpoint scraped via host.docker.internal:3001/metrics.
      Create infra/grafana/dashboards/README.md documenting infra/grafana/dashboards/ as the
      canonical dashboard path and noting that the apps/telemetry/dashboards/ PLAN.md reference
      is superseded.
    files:
      - "apps/api/lego-api/.env.example"
      - "infra/grafana/dashboards/README.md"
    files_to_read:
      - "apps/api/lego-api/.env.example"
      - "infra/compose.lego-app.yaml"
    dependencies: []
    slice: infra
    verification: >
      grep ENABLE_METRICS apps/api/lego-api/.env.example && cat infra/grafana/dashboards/README.md
    acs_covered:
      - "AC-6"
      - "AC-7"

  - id: 2
    subtask_id: "ST-2"
    description: >
      Update infra/grafana/provisioning/dashboards/default.yaml to set foldersFromFilesStructure: true
      (currently false). Create infra/grafana/dashboards/workflow-telemetry/.gitkeep to establish the
      directory so Grafana provisions the "workflow-telemetry" folder on startup. Both changes must
      be made together — the flag without the directory produces no folder.
    files:
      - "infra/grafana/provisioning/dashboards/default.yaml"
      - "infra/grafana/dashboards/workflow-telemetry/.gitkeep"
    files_to_read:
      - "infra/grafana/provisioning/dashboards/default.yaml"
    dependencies: [1]
    slice: infra
    verification: >
      grep "foldersFromFilesStructure: true" infra/grafana/provisioning/dashboards/default.yaml &&
      ls infra/grafana/dashboards/workflow-telemetry/.gitkeep
    acs_covered:
      - "AC-5"

  - id: 3
    subtask_id: "ST-3"
    description: >
      Create infra/smoke-test.sh — a bash script that verifies all core ACs against the live
      compose stack. Script should: (1) start the stack with docker compose up -d, (2) wait for
      services to be healthy, (3) curl each endpoint with assertion comments per AC, (4) report
      [PASS]/[FAIL] per check, (5) exit 0 only if all checks pass. Header must document the
      ENABLE_METRICS=true prerequisite for AC-3. Port 8889 for OTel AC-9 (not 8888 or 13133).
    files:
      - "infra/smoke-test.sh"
    files_to_read:
      - "infra/compose.lego-app.yaml"
      - "infra/prometheus/prometheus.yml"
    dependencies: [1, 2]
    slice: infra
    verification: >
      bash infra/smoke-test.sh
    acs_covered:
      - "AC-1"
      - "AC-2"
      - "AC-3"
      - "AC-4"
      - "AC-8"
      - "AC-9"

files_to_change:
  - path: "apps/api/lego-api/.env.example"
    action: modify
    reason: "Add ENABLE_METRICS=true with comment per AC-6; missing from current file"

  - path: "infra/grafana/dashboards/README.md"
    action: create
    reason: "Document canonical dashboard path decision per AC-7; resolves PLAN.md vs compose mount inconsistency"

  - path: "infra/grafana/provisioning/dashboards/default.yaml"
    action: modify
    reason: "Set foldersFromFilesStructure: true (currently false) to enable folder provisioning per AC-5"

  - path: "infra/grafana/dashboards/workflow-telemetry/.gitkeep"
    action: create
    reason: "Establish workflow-telemetry directory so Grafana provisions the folder per AC-5; load-bearing alongside default.yaml change"

  - path: "infra/smoke-test.sh"
    action: create
    reason: "Bash smoke test script covering AC-1 through AC-4, AC-8, AC-9 with [PASS]/[FAIL] assertions per AC"

commands_to_run:
  - command: "bash infra/smoke-test.sh"
    when: "after all file changes; requires Docker and docker compose -f infra/compose.lego-app.yaml up -d"
    required: true

  - command: "docker compose -f infra/compose.lego-app.yaml ps"
    when: "after smoke test to confirm all services healthy"
    required: true

  - command: "curl -u admin:admin http://localhost:3003/api/folders | jq '.[].title'"
    when: "after grafana starts; verify workflow-telemetry folder provisioned"
    required: true

  - command: "grep ENABLE_METRICS apps/api/lego-api/.env.example"
    when: "after ST-1; quick verification before moving to ST-2"
    required: false

acceptance_criteria_map:
  - ac_id: "AC-1"
    planned_evidence: "smoke-test.sh: docker compose up -d exits 0; all healthchecks pass within 60s"
    evidence_type: command

  - ac_id: "AC-2"
    planned_evidence: "smoke-test.sh: curl http://localhost:9090/-/healthy returns 200"
    evidence_type: command

  - ac_id: "AC-3"
    planned_evidence: >
      smoke-test.sh: curl http://localhost:9090/api/v1/targets shows lego-api with health:up
      (requires host lego-api running with ENABLE_METRICS=true)
    evidence_type: command

  - ac_id: "AC-4"
    planned_evidence: >
      smoke-test.sh: curl -u admin:admin http://localhost:3003/api/datasources returns
      Prometheus datasource with url: http://prometheus:9090
    evidence_type: command

  - ac_id: "AC-5"
    planned_evidence: >
      default.yaml set to foldersFromFilesStructure: true + workflow-telemetry/.gitkeep created;
      curl -u admin:admin http://localhost:3003/api/folders returns folder in array
    evidence_type: file

  - ac_id: "AC-6"
    planned_evidence: "grep ENABLE_METRICS apps/api/lego-api/.env.example returns documented line with comment"
    evidence_type: file

  - ac_id: "AC-7"
    planned_evidence: "infra/grafana/dashboards/README.md exists; documents infra/grafana/dashboards/ as canonical; notes PLAN.md reference superseded"
    evidence_type: file

  - ac_id: "AC-8"
    planned_evidence: "smoke-test.sh: docker compose down -v && up -d completes cleanly; all services healthy; minio-init exits 0"
    evidence_type: command

  - ac_id: "AC-9"
    planned_evidence: "smoke-test.sh: curl http://localhost:8889/metrics returns 200 with Prometheus text format"
    evidence_type: command

architectural_decisions: []

complexity: simple

notes:
  - "infra/compose.lego-app.yaml requires NO changes — all services already fully defined"
  - "infra/prometheus/prometheus.yml requires NO changes — scrape targets already correct"
  - "packages/backend/observability/ requires NO changes — createMetricsEndpoint() correct as-is"
  - >
    Dashboard path decision is resolved: infra/grafana/dashboards/ is canonical per story
    Architecture Notes section — no user decision required
  - >
    ENABLE_METRICS=true is a host process environment variable, not a Docker Compose variable;
    it must be set in the local dev environment or .env.local for AC-3 to pass
  - >
    Grafana folder will provision as 'workflow-telemetry' (lowercase, hyphenated) matching
    the directory name — this satisfies AC-5 which says 'Workflow Telemetry' or equivalent
  - "AC-10 (Tempo) is explicitly deferred and out of scope for TELE-0010"
  - "E2E tests not applicable — frontend_impacted: false in SCOPE.yaml; ADR-006 skip condition applies"
  - "ADR-002: infra/ is the correct home for all infrastructure-as-code artifacts"
  - >
    ST-2 critical ordering: foldersFromFilesStructure: true AND workflow-telemetry/.gitkeep
    must both be applied — one without the other silently fails AC-5
