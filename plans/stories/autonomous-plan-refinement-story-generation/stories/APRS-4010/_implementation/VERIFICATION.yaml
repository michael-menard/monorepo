lessons_to_record:
  - lesson: >-
      Injectable adapter pattern (via factory config parameter) enables fully hermetic unit tests for LangGraph nodes
      without LLM or network calls. Each node exports its phase functions for direct unit testing, while the node
      factory is tested via graph integration tests.
    category: pattern
    tags:
      - langgraph
      - injectable-adapters
      - testing
      - backend
  - lesson: >-
      When AC specifies complex subtask objects ({id, description, files[], verification}) but the KB API only accepts
      string arrays, simplifying the internal schema to match the KB API's actual contract avoids a mapping layer.
      Verify KB API contract before implementing story schemas.
    category: time_sink
    tags:
      - schema-design
      - kb-compatibility
      - ac-spec
