lessons_to_record:
  - lesson: >-
      Skills that are pure markdown orchestration definitions (SKILL.md) have no TypeScript coverage requirement — the
      45% coverage threshold applies to TypeScript packages only. QA should explicitly document this exemption rather
      than treating it as a gap.
    category: pattern
    tags:
      - skills
      - qa
      - coverage
  - lesson: >-
      When running vitest with a glob that matches worktree copies (tree/story/*), pre-existing failures in worktree
      files pollute the test run output. Always run with --root scoped to the canonical package path to get clean
      results.
    category: anti_pattern
    tags:
      - testing
      - vitest
      - worktrees
