lessons_to_record:
  - lesson: >-
      AC-4 informal feature list ('phase') conflicted with AC-11 authoritative schema ('operatorId'). When story has
      both an informal AC and a schema-level AC, the schema-level AC (with typed Zod definitions) is the authoritative
      spec. Implementation correctly followed AC-11.
    category: pattern
    tags:
      - spec
      - zod
      - acceptance-criteria
  - lesson: >-
      DISTINCT ON subquery pattern injected via Drizzle sql`` template literal is effective for deduplicating
      story_outcomes joins without requiring a unique constraint on story_id. Pattern reusable for any
      partitioned/non-unique join in the workflow schema.
    category: reuse
    tags:
      - drizzle
      - postgres
      - deduplication
      - workflow-schema
  - lesson: >-
      Chainable Drizzle mock pattern (createSelectChain) with vi.fn().mockReturnValue(chain) provides clean, reusable
      test scaffolding for multi-join queries without real DB access.
    category: pattern
    tags:
      - testing
      - vitest
      - drizzle
      - mocking
