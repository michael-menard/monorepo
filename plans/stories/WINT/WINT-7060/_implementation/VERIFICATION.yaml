lessons_to_record:
  - lesson: >-
      Evidence artifacts can be written against pre-patch file reads. The WINT-7060 EVIDENCE artifact claimed
      evidence-judge.agent.md was migrated (6 refs), but the file was never actually changed. QA verification must
      always spot-check at least one claimed change per file directly from the filesystem.
    category: blocker
    tags:
      - qa-process
      - evidence-integrity
      - batch-migration
  - lesson: >-
      When a code review marks a story PASS based on 'manual verification confirmed all 4 files correctly migrated' but
      the reviewer has not actually read the files, the review artifact becomes a false signal. QA verification cannot
      trust code review verdicts for docs/markdown-only stories — direct file reads are required.
    category: anti_pattern
    tags:
      - code-review
      - docs-stories
      - verification
  - lesson: >-
      For coupled producer-consumer migrations (evidence-judge writes ac-verdict, qa-verify-story reads it), the
      coupling makes partial implementation especially dangerous — both ends must be verified independently in QA.
    category: pattern
    tags:
      - coupled-migration
      - producer-consumer
      - batch-migration
