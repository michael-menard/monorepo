    title: 'classifyDecisionTier returns correct tier for known keywords'
    setup: 'Import classifyDecisionTier from @repo/workflow-logic'
    action: 'Call classifyDecisionTier("rename this file") and classifyDecisionTier("drop the users table")'
    expected: 'Returns "clarification" for rename, "destructive" for drop table'
    evidence: 'Test assertions pass with vitest expect().toBe()'

  - id: HP-2
    title: 'shouldEscalate returns false for Tier 1 at aggressive autonomy'
    setup: 'Import shouldEscalate from @repo/workflow-logic'
    action: 'Call shouldEscalate("clarification", "aggressive")'
    expected: 'Returns false (auto-proceed)'
    evidence: 'Test assertion passes'

  - id: HP-3
    title: 'shouldEscalate returns true for Tier 4 at any autonomy level'
    setup: 'Import shouldEscalate from @repo/workflow-logic'
    action: 'Call shouldEscalate("destructive", "conservative"), shouldEscalate("destructive", "moderate"), shouldEscalate("destructive", "aggressive")'
    expected: 'All three return true (always escalate)'
    evidence: 'it.each assertions pass for all 3 inputs'

  - id: HP-4
    title: 'getArtifactPhase maps artifact types to correct phases'
    setup: 'Import getArtifactPhase from @repo/workflow-logic'
    action: 'Call getArtifactPhase("pm_test_plan") and getArtifactPhase("dev_proof")'
    expected: 'pm_test_plan → "planning", dev_proof → "development"'
    evidence: 'Test assertions pass'

  - id: HP-5
    title: 'isValidArtifactForPhase returns true for valid combos'
    setup: 'Import isValidArtifactForPhase from @repo/workflow-logic'
    action: 'Call isValidArtifactForPhase("pm_test_plan", "planning")'
    expected: 'Returns true'
    evidence: 'Test assertion passes'

  - id: HP-6
    title: 'buildContextQuery produces non-empty canonical query string'
    setup: 'Import buildContextQuery from @repo/workflow-logic'
    action: 'Call buildContextQuery("wishlist", "story-generation", "pm")'
    expected: 'Returns a string containing domain, taskType, and role terms'
    evidence: 'String includes all three inputs'

  - id: HP-7
    title: 'buildBlockerQuery produces blockers-oriented query string'
    setup: 'Import buildBlockerQuery from @repo/workflow-logic'
    action: 'Call buildBlockerQuery("wishlist")'
    expected: 'Returns a string containing "wishlist" and "blocker" or "lesson"'
    evidence: 'String matches expected pattern'

  - id: HP-8
    title: 'TokenUsageSchema validates a well-formed token usage object'
    setup: 'Import TokenUsageSchema from @repo/workflow-logic'
    action: 'Parse { inputTokens: 1200, outputTokens: 400, model: "claude-sonnet-4-6", agentName: "dev-agent" } through TokenUsageSchema.parse()'
    expected: 'Returns valid typed object without error'
    evidence: 'No ZodError thrown'

  - id: HP-9
    title: 'estimateTokenCount approximates tokens from byte length'
    setup: 'Import estimateTokenCount from @repo/workflow-logic'
    action: 'Call estimateTokenCount("hello") on a 400-byte string'
    expected: 'Returns 100 (400 / 4)'
    evidence: 'Return value matches Math.floor(byteLength / 4)'

  - id: HP-10
    title: 'formatTokenSummary produces standard "In: ~X / Out: ~Y" format'
    setup: 'Import formatTokenSummary from @repo/workflow-logic'
    action: 'Call formatTokenSummary({ inputTokens: 1200, outputTokens: 400, model: "claude-sonnet-4-6", agentName: "dev-agent" })'
    expected: 'Returns "In: ~1200 / Out: ~400"'
    evidence: 'String matches expected format'

