edge_cases:
  - id: ED-1
    title: 'estimateTokenCount handles empty string'
    setup: 'Import estimateTokenCount from @repo/workflow-logic'
    action: 'Call estimateTokenCount("")'
    expected: 'Returns 0'
    evidence: 'Return value === 0'

  - id: ED-2
    title: 'estimateTokenCount handles unicode / multi-byte characters'
    setup: 'Import estimateTokenCount from @repo/workflow-logic'
    action: 'Call estimateTokenCount("✓✓✓✓") where each ✓ is 3 bytes'
    expected: 'Returns floor(byteLength / 4), not floor(charLength / 4)'
    evidence: 'Implementation uses Buffer.byteLength or equivalent'

  - id: ED-3
    title: 'buildContextQuery trims whitespace in query output'
    setup: 'Import buildContextQuery from @repo/workflow-logic'
    action: 'Call buildContextQuery("  wishlist  ", "story-generation", "pm")'
    expected: 'Returned query does not have leading/trailing spaces'
    evidence: 'String trim assertion passes'

  - id: ED-4
    title: 'classifyDecisionTier is case-insensitive for input patterns'
    setup: 'Import classifyDecisionTier from @repo/workflow-logic'
    action: 'Call classifyDecisionTier("DROP TABLE users") and classifyDecisionTier("drop table users")'
    expected: 'Both return "destructive"'
    evidence: 'Both assertions return same tier'

