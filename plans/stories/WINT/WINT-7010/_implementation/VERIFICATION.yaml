lessons_to_record:
  - lesson: >-
      Audit-only stories should explicitly mark build/test/e2e as exempt in evidence with reason strings, not just
      status fields — this avoids QA ambiguity about whether tests were skipped or missed.
    category: pattern
    tags:
      - qa
      - audit
      - evidence
  - lesson: >-
      _shared/ agent files (story-context.md, permissions.md) are high-leverage migration targets — a single fix
      propagates to all consuming agents. Prioritize shared files over individual agent files in any bulk migration
      effort.
    category: reuse
    tags:
      - agent-migration
      - shared-files
      - multiplier
  - lesson: >-
      When a story goes through fix iterations (evidence iteration > 0), QA should confirm that the review artifact
      reflects the final iteration and that all previously-failing ACs are marked RESOLVED in the review.
    category: pattern
    tags:
      - qa
      - fix-cycles
      - review
