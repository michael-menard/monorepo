goal: Eliminate the dual-write divergence between LESSONS-LEARNED.md files and knowledge_entries by establishing the KB as the authoritative source, running a one-time full import of existing files, adding a kb_export_lessons tool for human-readable exports, and updating agent instructions to write directly to kb_add_lesson.
non_goals:
  - Real-time bidirectional sync
  - Deleting existing LESSONS-LEARNED.md files (kept as read-only archives)
  - Changing the kb_add_lesson tool interface
acs:
  - id: AC1
    text: One-time migration script imports all parseable LESSONS-LEARNED.md files to KB with deduplication
    type: functional
  - id: AC2
    text: kb_export_lessons tool generates valid LESSONS-LEARNED.md formatted markdown from KB entries for a story or feature prefix
    type: functional
  - id: AC3
    text: No agent writes directly to LESSONS-LEARNED.md files (verified by audit of agent .md files)
    type: functional
  - id: AC4
    text: Duplicate lessons detected by content hash and skipped without error
    type: functional
  - id: AC5
    text: Existing LESSONS-LEARNED.md files are preserved with an archived header comment
    type: functional
risks:
  - risk: Agent compliance if agents still write to files after the change
    mitigation: Audit all agent .md files in AC3, update any that still reference direct file writes
  - risk: Duplicate content from prior partial imports
    mitigation: Content-hash deduplication handles this, verify before running in production
