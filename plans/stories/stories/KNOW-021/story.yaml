schema: 1
id: KNOW-021
feature: know
type: feature
state: backlog
title: KB Monitoring and Metrics Export
points: 2
priority: medium
blocked_by: null
depends_on: []
follow_up_from: null
scope:
  packages:
    - apps/api/knowledge-base
  surfaces:
    - backend
goal: Implement structured metrics emission from the KB MCP server covering tool latency, search breakdown, cache hit rate, tool error rates, and audit write failures as structured log lines filterable from regular logs.
non_goals:
  - A metrics UI or dashboard
  - Distributed tracing
  - Alerting infrastructure
  - External metrics backends (Prometheus, Datadog)
acs:
  - id: AC1
    text: Every tool call emits a kb.tool.duration_ms metric log line with tool name and success flag
    type: functional
  - id: AC2
    text: kb_search emits latency breakdown metrics for embedding, semantic, keyword, and RRF steps
    type: functional
  - id: AC3
    text: Audit write failures emit a kb.audit.write_failure counter metric (fulfils existing TODO)
    type: functional
  - id: AC4
    text: Cache hit/miss metrics emitted (depends on KNOW-016)
    type: functional
  - id: AC5
    text: Metric log lines are filterable from regular logs via type metric field
    type: functional
risks:
  - risk: Increased log volume at high agent concurrency
    mitigation: Metrics use logger.debug level by default, logger.info only for errors
