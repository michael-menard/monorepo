schema: 1
id: KNOW-022
feature: know
type: feature
state: backlog
title: Cross-Story and Date-Range Search Filtering for KB
points: 2
priority: medium
blocked_by: null
depends_on: []
follow_up_from: null
scope:
  packages:
    - apps/api/knowledge-base
  surfaces:
    - backend
goal: Add story_id, story_prefix, created_after, and created_before filter parameters to kb_search and kb_list so agents can scope searches to a specific feature, story, or time window.
non_goals:
  - Natural language date parsing
  - Filtering by updated_at (only created_at in v1)
  - Story prefix inference from query text
acs:
  - id: AC1
    text: story_id filter returns only entries with that exact story_id
    type: functional
  - id: AC2
    text: story_prefix filter returns entries matching LIKE prefix% pattern across all stories in a feature
    type: functional
  - id: AC3
    text: created_after filter excludes entries created before the given ISO 8601 date
    type: functional
  - id: AC4
    text: created_before filter excludes entries created after the given ISO 8601 date
    type: functional
  - id: AC5
    text: Multiple filters combine as AND conditions
    type: functional
  - id: AC6
    text: kb_list supports the same new filter parameters as kb_search
    type: functional
  - id: AC7
    text: Invalid date strings return a validation error before any DB query
    type: functional
risks:
  - risk: LIKE query performance on story_id text column
    mitigation: Existing knowledge_entries_story_id_idx index supports prefix LIKE efficiently
