schema: 1
id: KNOW-016
feature: know
type: tech-debt
state: backlog
title: Implement Result Cache Backend for KB Search
points: 2
priority: high
blocked_by: null
depends_on: []
follow_up_from: null
scope:
  packages:
    - apps/api/knowledge-base
  surfaces:
    - backend
goal: Replace the stub cache functions in the KB MCP server with a working in-memory LRU cache for kb_search results, reducing duplicate OpenAI embedding API calls and improving search response times for repeated queries within a session.
non_goals:
  - Redis or distributed cache (in-memory is sufficient for single-process MCP server)
  - Caching tools beyond kb_search and kb_get_related in v1
  - Persistent cache across server restarts
  - Cache warming or pre-population
acs:
  - id: AC1
    text: Cache returns results for repeated queries within TTL window with cache_hit metadata flag
    type: functional
  - id: AC2
    text: Cache is invalidated on kb_add, kb_update, kb_delete, and kb_bulk_import
    type: functional
  - id: AC3
    text: Cache respects configurable TTL (KB_CACHE_TTL_MS env var, default 5 minutes)
    type: functional
  - id: AC4
    text: Cache is bounded by configurable max entries (KB_CACHE_MAX_ENTRIES, default 200) with LRU eviction
    type: functional
risks:
  - risk: Cache staleness if TTL is too long after bulk imports
    mitigation: Default TTL of 5 minutes plus clear on all mutation tools
