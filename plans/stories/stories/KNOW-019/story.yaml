schema: 1
id: KNOW-019
feature: know
type: feature
state: backlog
title: KB Compression and Deduplication Tooling
points: 3
priority: medium
blocked_by: null
depends_on: []
follow_up_from: null
scope:
  packages:
    - apps/api/knowledge-base
  surfaces:
    - backend
goal: Implement a kb_compress MCP tool that identifies near-duplicate knowledge_entries using stored embedding similarity, marks duplicates as archived, and links them to a canonical entry to keep search quality high over time.
non_goals:
  - Automatic scheduled compression (manual trigger only in v1)
  - Merging content from multiple entries into a single canonical entry
  - Cross-entry_type compression
acs:
  - id: AC1
    text: dry_run mode reports duplicate pairs and similarity scores without making mutations
    type: functional
  - id: AC2
    text: Compression archives the newer of two near-duplicate entries and sets canonical_id on it
    type: functional
  - id: AC3
    text: Entries below the similarity threshold are not archived
    type: functional
  - id: AC4
    text: Compression can be scoped to a single entry_type
    type: functional
  - id: AC5
    text: Archived entries are excluded from kb_search results
    type: functional
  - id: AC6
    text: Result includes summary stats (evaluated, duplicates found, archived, skipped)
    type: functional
risks:
  - risk: False positives at aggressive similarity thresholds
    mitigation: Default threshold of 0.92, dry_run mode for preview, configurable threshold
  - risk: O(n^2) performance on large datasets
    mitigation: Default limit of 500 entries per run, process in batches
