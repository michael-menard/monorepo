schema: 1
id: KNOW-018
feature: know
type: feature
state: backlog
title: Expose Story Dependency Graph as MCP Tools
points: 2
priority: high
blocked_by: null
depends_on: []
follow_up_from: null
scope:
  packages:
    - apps/api/knowledge-base
  surfaces:
    - backend
goal: Expose the story_dependencies table through three new MCP tools so agents can programmatically query blockers, dependents, and resolve dependency relationships without reading story YAML files on disk.
non_goals:
  - Dependency cycle detection
  - Dependency graph visualization
  - Auto-resolving dependencies based on story state changes
acs:
  - id: AC1
    text: kb_get_story_blockers returns all stories blocking the given story with their current state
    type: functional
  - id: AC2
    text: kb_get_story_dependents returns all stories that depend on the given story
    type: functional
  - id: AC3
    text: kb_resolve_dependency sets resolved_at on the dependency row
    type: functional
  - id: AC4
    text: Both query tools return story state, title, and story_id in results
    type: functional
  - id: AC5
    text: Empty results returned without error for stories with no dependencies
    type: functional
risks:
  - risk: Stale dependencies where story YAML files have deps not synced to DB
    mitigation: Document as known data quality issue, address in follow-up sync story
