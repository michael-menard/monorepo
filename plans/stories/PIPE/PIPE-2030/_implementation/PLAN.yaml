notes:
  - "ST-1 is a one-line fix: change 'UAT' to 'completed' at line 219 of supervisor/index.ts."
  - >-
    ST-2 adds state: 'blocked' to the kb_update_story_status call at lines 272-274. The 'as any' cast at line 234 for
    the completed path should also be removed after ST-1 since all mapped states are now valid StoryStateSchema members.
  - >-
    Test file supervisor-callbacks.test.ts must NOT import PipelineSupervisor directly and start it (requires real
    Redis). Instead, extract the callback logic by mocking the Worker class and capturing the event handler functions
    registered via worker.on(), following the pattern from supervisor-blockers.test.ts.
  - >-
    BullMQ Worker mock: mock 'bullmq' module so new Worker(...) returns a mock with .on() that captures handlers. Then
    invoke captured handlers directly in tests.
  - >-
    Fire-and-forget pattern: tests must flush the microtask queue (await Promise.resolve()) before asserting
    kb_update_story_status was called.
  - >-
    StoryStateSchema valid states confirmed from apps/api/knowledge-base/src/__types__/index.ts lines 780-799:
    'completed' is valid, 'UAT' and 'uat' are NOT valid.
  - No architectural decisions required — all choices are pre-specified in the story ACs and subtask details.
  - No wint.* references should be introduced anywhere in the modified or created files (AC-8).
