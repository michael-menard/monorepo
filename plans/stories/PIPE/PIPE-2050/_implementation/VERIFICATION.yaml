      Vitest inadvertently picks up test files from git worktrees under tree/ directories — pre-existing worktree paths
      (PIPE-1020, PIPE-2050) appear as failing suites when running from monorepo root. Run tests with --filter
      @repo/pipeline to scope to the correct package.
