feasible: true
confidence: high
rationale: >
  The SchedulerLoop in apps/api/pipeline/src/scheduler/index.ts is well-structured for extension.
  The dispatchStory() method, getEligibleStories() SQL CTE, and applyFinishBeforeNewStart/applyStrictFinishFilter
  methods all follow consistent patterns that are straightforward to replicate for review and QA stages.
  ReviewJobDataSchema and QaJobDataSchema already exist in @repo/pipeline-queue with correct payload shapes.
  The canonical state machine clarifies the dispatch triggers: stories in ready_for_qa dispatch as
  'review' stage jobs (advancing to in_qa), and the QA dispatch trigger is less clear from the state
  machine but can be inferred from the dispatch-router's runQAVerify path.
  One key clarification is needed: the AC-2 spec mentions advancing to 'in_review' which is not a
  canonical state — the correct canonical advance from ready_for_qa is to in_qa. This must be
  corrected in the implementation. No new infrastructure is required.

complexity: medium

change_surface:
  areas:
    - apps/api/pipeline/src/scheduler/index.ts
    - apps/api/pipeline/src/scheduler/__tests__/scheduler.test.ts
  endpoints: []
  deploy_touchpoints:
    - 'SchedulerLoop process restart required after deployment (long-lived process)'

risks:
  - finding: >
      AC-2 specifies advancing story to 'in_review' state before review dispatch, but 'in_review'
      is NOT in the canonical 13-state model. The valid transition from ready_for_qa is to in_qa.
      If the implementation blindly uses 'in_review', kb_update_story_status will reject the transition
      and no review jobs will ever be dispatched (F006 guard will return updated:false every time).
    mitigation: >
      Use state 'in_qa' as the target advance state for review dispatch (ready_for_qa → in_qa).
      The 'review' stage in BullMQ terminology corresponds to the QA gate in the state model.
      Confirm this interpretation against dispatch-router.ts runReview() function behavior.

  - finding: >
      QA dispatch trigger state is ambiguous from the AC spec. AC-4 says "state = in_qa or a
      QA-ready trigger state". If review dispatch already advances to in_qa, there is no separate
      state that triggers QA dispatch — unless the QA stage is separate from code review automation.
      Possible resolution: review stage = automated code review bot (dispatched from ready_for_qa),
      QA stage = human/automated QA verification (dispatched from needs_code_review after fix?).
    mitigation: >
      Verify dispatch-router.ts routing: runReview() handles 'review' stage, runQAVerify() handles 'qa' stage.
      Look at what KB state each advances the story to after completion to determine the correct scheduler
      trigger states. If review = code review (ready_for_qa → in_qa) and qa = QA verification (in_qa → completed),
      then: review dispatch trigger = ready_for_qa, qa dispatch trigger = in_qa.
      This would mean the scheduler dispatches QA jobs for stories already in in_qa state,
      which is unusual (normally in_qa means QA is already running). Needs confirmation.

missing_requirements:
  - >
    AC-2: Specify the correct canonical state to advance to for review dispatch. 'in_review' is not
    canonical. Expected answer: 'in_qa' (ready_for_qa → in_qa transition in state machine).
  - >
    AC-4/AC-5: Specify the exact QA dispatch trigger state. Is it 'ready_for_qa' (dispatch review job)
    or 'in_qa' (dispatch qa job for stories already in_qa)? The state machine shows in_qa → completed
    is triggered by /qa-verify-story, which maps to the qa stage job.

evidence_expectations:
  - 'pnpm check-types --filter @repo/pipeline exits 0 with zero TypeScript errors'
  - 'pnpm test --filter @repo/pipeline exits 0 with all scheduler tests passing'
  - 'dispatchReviewStory() calls kb_update_story_status BEFORE queue.add() — verified by test execution order'
  - 'dispatchQaStory() calls kb_update_story_status BEFORE queue.add() — verified by test'
  - 'queue.add() not called when KB returns updated:false — verified by EC-1, EC-2 test cases'
  - 'jobId format {storyId}:review:1 and {storyId}:qa:1 — verified by test assertions'

