feasible: true
confidence: high
rationale: >
  Both deliverables are straightforward additive changes to the existing SchedulerLoop class.
  (1) The jobId addition is a single-line change to queue.add() in dispatchStory() — BullMQ
  already supports JobsOptions including jobId, and the pipeline-queue PipelineQueue.add()
  signature already forwards opts?: JobsOptions to bullQueue.add(). No wrapper changes needed.
  (2) The strictFinishBeforeNewStart config flag can reuse the exact SQL pattern from the
  existing applyFinishBeforeNewStart() method (lines 202–215 of scheduler/index.ts). The
  Drizzle raw SQL query pattern and makeKbDeps() test mock are both established. The only
  ambiguity is where attemptNumber comes from in dispatchStory() — reviewing the code confirms
  it is already a parameter of dispatchStory(story, attemptNumber: number) and is currently
  hardcoded to 1 at the call site in runOnce() (line 140). The jobId will be
  `${story.storyId}:implementation:${attemptNumber}` which is fully derivable from available data.

complexity: low

change_surface:
  areas:
    - apps/api/pipeline/src/scheduler/index.ts
    - apps/api/pipeline/src/scheduler/__types__/index.ts
    - apps/api/pipeline/src/scheduler/__tests__/scheduler.test.ts
  endpoints: []
  deploy_touchpoints: []

risks:
  - finding: >
      The strictFinishBeforeNewStart filter requires a DB query to detect whether any plan
      has in_progress stories. The query must return plan-level in_progress data for stories
      NOT in the eligible list (unlike applyFinishBeforeNewStart which queries for the eligible
      stories' own plan siblings). The query must answer: "are there any plans with in_progress
      stories at all?" so that non-sibling stories can be filtered out.
    mitigation: >
      Use a two-step approach: (1) existing applyFinishBeforeNewStart() result already identifies
      which eligible stories have in_progress plan siblings (hasSiblingInProgress Set). (2) To
      determine "does ANY plan have in_progress work?", run a simple COUNT query:
      SELECT COUNT(*) FROM workflow.plan_story_links psl JOIN workflow.stories s ON s.story_id = psl.story_id
      WHERE s.state = 'in_progress'. If count > 0 AND strictFinishBeforeNewStart is true, filter
      eligible list to only those with hasSiblingInProgress. This reuses the existing DB query
      pattern and avoids a new complex join.

missing_requirements: []

evidence_expectations:
  - 'pnpm check-types --filter @repo/pipeline exits 0 after all changes'
  - 'pnpm test --filter @repo/pipeline exits 0 with all tests passing'
  - 'queue.add() spy shows third argument containing { jobId: "STORY-001:implementation:1" } in test output'

