lessons_to_record:
  - lesson: >-
      When a worktree lacks installed node_modules for workspace packages, type errors appear for all imports of those
      packages — always confirm error count before vs after changes rather than treating any TS error as a new
      regression.
    category: pattern
    tags:
      - typescript
      - worktree
      - workspace-resolution
  - lesson: >-
      Contract tests that use vi.mock to avoid loading real LangGraph dist are the right pattern for CI: they validate
      the module export shape without requiring built artifacts or live dependencies.
    category: pattern
    tags:
      - testing
      - vitest
      - mocking
      - langgraph
      - ci
  - lesson: >-
      A missing export (runReview) from a re-export barrel can cause silent runtime failures where mod.runReview is
      undefined — adding a regression guard test for each required export prevents this class of bug.
    category: blocker
    tags:
      - orchestrator
      - export
      - regression
      - runtime
