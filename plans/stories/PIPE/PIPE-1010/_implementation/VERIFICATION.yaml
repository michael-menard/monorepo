lessons_to_record:
  - lesson: >-
      Pre-existing KB records with a different feature field (autonomous-pipeline vs apip) are invisible to
      feature-scoped list queries. APIP-1010 and APIP-1030 existed as pre-migration records under
      feature=autonomous-pipeline; they do not contaminate the import count and are effectively superseded in context
      without being flagged as imported.
    category: pattern
    tags:
      - kb
      - data-migration
      - feature-scoping
  - lesson: >-
      The kb_get_story API response does not expose the epic field in its serialized output schema. QA verification of
      epic field correctness can only be confirmed through implementer evidence or by querying the DB directly. Future
      evidence artifacts for story imports should include a direct DB query or plan-link check to prove epic= value.
    category: blocker
    tags:
      - kb
      - api
      - evidence-quality
  - lesson: >-
      Data migration stories with e2e_exempt=true and zero touched_files require QA verification via direct KB state
      inspection (kb_get_story, kb_list_stories) rather than test re-execution. The verification pattern: count check +
      state spot-check per non-default state + exclusion check for superseded IDs is sufficient for this class of story.
    category: pattern
    tags:
      - qa
      - data-migration
      - chore
      - e2e-exempt
