    - 'apps/api/knowledge-base/src/crud-operations/__tests__/'
  endpoints: []
  deploy_touchpoints: []
risks:
  - finding: 'kb_write_artifact may not accept proof/review artifact types if not in GATED_ARTIFACT_TYPES'
    mitigation: >
      Check artifact-operations.ts GATED_ARTIFACT_TYPES set. If proof/review are not
      present, use direct DB insert into storyArtifacts in test setup (mirroring
      artifact-operations.integration.test.ts pattern). Alternatively confirm
      kb_write_artifact accepts all artifact types and only gates the write_to_kb
      path, not the type itself.
  - finding: 'Story state must be set correctly before each gate test — kb_update_story_status requires FROM state match'
    mitigation: >
      Use kb_create_story then direct DB state override, or chain kb_update_story_status
      calls through intermediate valid states to reach the desired from-state. Verify
      that ungated transitions allow state bootstrapping.
