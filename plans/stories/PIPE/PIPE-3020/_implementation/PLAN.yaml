architectural_decisions: []
complexity: moderate
notes:
  - >-
    GitRunner type and defaultGitRunner are imported from packages/backend/orchestrator/src/nodes/create-worktree.ts —
    do NOT redeclare
  - >-
    Branch naming convention for elab worktrees: elab/{storyId} (not impl/ which is used by create-worktree.ts for
    dev-implement)
  - >-
    createWorktreeSetupNode and createWorktreeTeardownNode signatures change from () to (opts?: { gitRunner?: GitRunner;
    repoRoot?: string }) — this is a non-breaking change since createElabStoryGraph passes no args today
  - >-
    worktreeRegister returns null on error (does not throw) — check for null before emitting warning; worktreeSetup
    stays true
  - >-
    worktreeGetByStory returns null when no active record — skip worktreeMarkComplete with logger.warn, still return
    worktreeTornDown:true
  - >-
    Teardown uses awaited async (not void IIFE) because it is an explicit graph node — void IIFE is the
    create-worktree.ts non-blocking cleanup pattern for outside-the-graph use only
  - MCP tool imports use @repo/mcp-tools package path — confirm the exact import path from the existing package.json
  - >-
    worktreePath in setup: path.join(worktreeBaseDir, storyId) — use path.join (not string template) to match
    create-worktree.ts pattern
  - All new/changed code must pass pnpm lint via /lint-fix and pnpm check-types before commit
