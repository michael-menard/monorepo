lessons_to_record:
  - lesson: >-
      When a story's AC references ON CONFLICT DO NOTHING for idempotency, always verify a unique constraint actually
      exists on the target table before implementation. story_state_history has only a PK on id — no unique constraint
      on (story_id, event_type, from_state, to_state) — making ON CONFLICT unavailable. NOT EXISTS guard is the correct
      alternative.
    category: blocker
    tags:
      - postgresql
      - idempotency
      - migration
      - story_state_history
  - lesson: >-
      When documenting event_type constraint mismatches in trigger functions, scan ALL migration files that insert into
      the affected table — not just the first-found migration. Migration 1001 and migration 1003 both had the same
      'state_changed' defect.
    category: pattern
    tags:
      - postgresql
      - migrations
      - audit-trail
      - event_type
  - lesson: >-
      For pgtap idempotency tests, a temp table with before/after count columns is a valid alternative to SAVEPOINT when
      testing cross-INSERT idempotency. The before/after count pattern avoids SAVEPOINT complexity while still asserting
      row delta = 0.
    category: pattern
    tags:
      - pgtap
      - idempotency
      - testing
      - migrations
