# Test Plan for PIPE-3010: Wire Execute Node to LLM Invocation
# Generated by pm-draft-test-plan worker
strategy: unit+integration
scope:
  endpoints: []
  ui_touched: false
  data_touched: false
happy_path_tests:
  - id: HP-1
    title: 'Execute node invokes IModelDispatch for each ChangeSpec and records completedChanges'
    setup: |
      Mock IModelDispatch.dispatch returning success response.
      Create DevImplementConfig with modelDispatch and worktreePath.
      Create state with planContent containing a ChangeSpec array.
    action: 'Call createExecuteNode(config)(state)'
    expected: |
      executeComplete === true.
      completedChanges has one entry per ChangeSpec.
      No WINT-9070 warning in state.warnings.
      iterationCount incremented in state.
    evidence: 'Vitest assertion: expect(result.executeComplete).toBe(true); expect(result.completedChanges).toHaveLength(1)'
  - id: HP-2
    title: 'afterExecute routes to review_subgraph when execute succeeds and runReview=true'
    setup: 'State with executeComplete=true, config.runReview=true'
    action: 'Call afterExecute(state)'
    expected: 'Returns "review_subgraph"'
    evidence: "expect(afterExecute(state)).toBe('review_subgraph')"
  - id: HP-3
    title: 'afterExecute routes to collect_evidence when runReview=false'
    setup: 'State with executeComplete=true, config.runReview=false'
    action: 'Call afterExecute(state)'
    expected: 'Returns "collect_evidence"'
    evidence: "expect(afterExecute(state)).toBe('collect_evidence')"
  - id: HP-4
    title: 'createCollectEvidenceNode builds real evidence from completedChanges'
    setup: |
      State with completedChanges containing one CommitRecord.
      Inject mock workflowRepo.saveProof.
    action: 'Call createCollectEvidenceNode()(state)'
    expected: |
      evidenceCollected === true.
      workflowRepo.saveProof called with evidence containing touched files from completedChanges.
      No "stub" path in evidence.
    evidence: 'expect(mockSaveProof).toHaveBeenCalledWith(expect.objectContaining({ touchedFiles: expect.not.arrayContaining([{ path: "stub" }]) }))'
  - id: HP-5
    title: 'Integration: runDevImplement with mock IModelDispatch produces real completedChanges'
    setup: |
      Create full config with mock IModelDispatch, mock storyRepo, mock workflowRepo.
      planContent includes one ChangeSpec.
    action: 'Call runDevImplement({ storyId: "PIPE-3010-test", config })'
    expected: |
      result.executeComplete === true.
      result.evidenceCollected === true.
      workflowRepo.saveProof called once with real touched file paths.
    evidence: 'Vitest assertions on result object and mock call counts'
error_cases:
  - id: EC-1
    title: 'Execute node degrades gracefully when modelDispatch not configured'
    setup: 'State with planContent containing ChangeSpecs; config has no modelDispatch'
    action: 'Call createExecuteNode(config)(state)'
    expected: |
      executeComplete === true.
      completedChanges is empty array.
      warnings contains message about missing modelDispatch.
      No throw.
    evidence: "expect(result.warnings).toEqual(expect.arrayContaining([expect.stringContaining('modelDispatch')]))"
  - id: EC-2
    title: 'shouldEscalate routes to abort_to_blocked at maxIterations'
    setup: 'State with iterationCount=2, maxIterations=2'
    action: 'Call shouldEscalate(state)'
    expected: 'Returns "abort_to_blocked"'
    evidence: "expect(shouldEscalate({ iterationCount: 2, maxIterations: 2 })).toBe('abort_to_blocked')"
  - id: EC-3
    title: 'afterExecute routes to complete with workflowSuccess=false on abort_to_blocked'
    setup: 'State with executeComplete=true; shouldEscalate returns abort_to_blocked (iterationCount >= maxIterations)'
    action: 'Call afterExecute(state)'
    expected: 'Returns a path that terminates workflow as blocked (workflowComplete=true, workflowSuccess=false)'
    evidence: 'expect(afterExecute(state)).toBe("complete") or equivalent abort edge'
  - id: EC-4
    title: 'createCollectEvidenceNode handles missing workflowRepo gracefully'
    setup: 'State with completedChanges containing entries; config.workflowRepo not injected'
    action: 'Call createCollectEvidenceNode()(state)'
    expected: 'evidenceCollected === true; no throw; warning emitted about missing workflowRepo'
    evidence: "expect(result.evidenceCollected).toBe(true)"
  - id: EC-5
    title: 'Execute node handles empty ChangeSpec list (plan has no specs)'
    setup: 'planContent with empty changeSpecs array; valid modelDispatch mock'
    action: 'Call createExecuteNode(config)(state)'
    expected: 'executeComplete=true; completedChanges=[]; no model calls made'
    evidence: 'expect(mockDispatch).not.toHaveBeenCalled(); expect(result.completedChanges).toHaveLength(0)'
edge_cases:
  - id: ED-1
    title: 'DevImplementStateAnnotation type-checks with all new fields'
    setup: 'Construct state object including worktreePath, changeSpecs, currentChangeIndex, completedChanges, changeLoopStatus'
    action: 'Run pnpm check-types --filter @repo/orchestrator'
    expected: 'Zero type errors; existing tests pass without modification to createTestState helper'
    evidence: 'CI check-types output shows 0 errors'
  - id: ED-2
    title: 'shouldEscalate escalates to opus at iterationCount >= 1'
    setup: 'State with iterationCount=1, maxIterations=2'
    action: 'Call shouldEscalate(state)'
    expected: 'Returns "escalate_to_opus"'
    evidence: "expect(shouldEscalate({ iterationCount: 1, maxIterations: 2 })).toBe('escalate_to_opus')"
  - id: ED-3
    title: 'Execute node planContent parse failure results in empty completedChanges'
    setup: 'planContent is invalid/unparseable JSON; modelDispatch configured'
    action: 'Call createExecuteNode(config)(state)'
    expected: 'executeComplete=true; completedChanges=[]; warning logged about parse failure; no throw'
    evidence: "expect(result.warnings).toEqual(expect.arrayContaining([expect.stringContaining('parse')]))"
  - id: ED-4
    title: 'WINT-9070 warning string no longer appears after implementation'
    setup: 'State with valid config and planContent'
    action: 'Call createExecuteNode(config)(state); inspect warnings'
    expected: 'No warning containing "WINT-9070" in result.warnings'
    evidence: "expect(result.warnings).not.toEqual(expect.arrayContaining([expect.stringContaining('WINT-9070')]))"
tooling_evidence:
  backend:
    http_requests: []
    assertions:
      - 'executeComplete === true on successful dispatch'
      - 'completedChanges length matches ChangeSpec count'
      - 'evidenceCollected === true with real touched file paths'
      - 'pnpm test --filter @repo/orchestrator exits 0'
      - 'pnpm check-types exits 0'
manual_cases: []
fixture_definitions:
  - name: 'mockIModelDispatch'
    type: 'vi.fn()'
    description: 'Mock implementing IModelDispatch.dispatch; returns ModelDispatchResponse with success:true'
  - name: 'mockChangeSpec'
    type: 'ChangeSpec'
    description: 'Single ChangeSpec with change_type=file_change, file_path=packages/backend/orchestrator/src/graphs/dev-implement.ts'
  - name: 'mockCommitRecord'
    type: 'CommitRecord'
    description: 'Completed commit record with sha, filePaths, command fields'
  - name: 'mockWorkflowRepo'
    type: 'WorkflowRepository (partial mock)'
    description: 'Mock with saveProof: vi.fn().mockResolvedValue(undefined)'
risks:
  - 'createChangeLoopNode delegates to git subprocess — integration tests require mock or worktree pre-provisioned; unit tests should mock createChangeLoopNode'
  - 'afterExecute routing depends on both runReview flag AND shouldEscalate result — test matrix must cover all combinations'
  - 'DevImplementStateAnnotation extension may break existing createTestState() helper in dev-implement.test.ts — storyTransitioned field already present, new fields need defaults'
