architectural_decisions: []
complexity: moderate
notes:
  - >-
    ST-1 and ST-4 have no inter-dependency; both can be authored in the same editing pass since both modify
    dev-implement.ts
  - >-
    createChangeLoopNode expects ImplementationGraphState — the execute node must build a compatible partial state
    projection for each ChangeSpec iteration, since DevImplementState has different field names
  - >-
    The execute node does NOT directly call createChangeLoopNode's returned function in a subgraph loop — it must invoke
    the node function for each ChangeSpec in a sequential for-loop, passing a constructed ImplementationGraphState
    slice, and accumulate CommitRecord results into completedChanges
  - >-
    afterExecute currently typed as returning 'review_subgraph' | 'collect_evidence'; ST-3 must extend this to include
    'complete' AND add complete: 'complete' to addConditionalEdges to satisfy TypeScript and LangGraph schema validation
    (AC-11)
  - >-
    Existing test 'sets executeComplete=true with stub warning' will need updating in ST-5 — it asserts on stub warning
    which will no longer be emitted after ST-2
  - >-
    createTestState must add storyTransitioned, worktreePath, changeSpecs, currentChangeIndex, completedChanges,
    changeLoopStatus to avoid TS errors in ST-5
  - >-
    Do NOT import from change-spec-schema.ts (used in implementation.ts) — dev-implement.ts should import from
    change-spec.ts (the canonical path confirmed in PIPE-3010.md scope)
  - >-
    worktreePath derivation: use path.join(config.worktreePath, storyId) per architecture notes — not just
    config.worktreePath directly
