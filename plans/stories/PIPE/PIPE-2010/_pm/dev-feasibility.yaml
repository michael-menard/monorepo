feasible: true
confidence: high
rationale: >
  The schema changes are additive: we extend an existing Zod object schema using .extend() to
  add two optional fields. The discriminated union structure is unchanged. The dispatch-router
  fix is a one-line type import swap (remove cast, import ReviewPayload). All test additions
  follow established patterns in pipeline-job-schema.test.ts. README update is straightforward.
  Risk is low because no structural or breaking changes are needed.

complexity: low

change_surface:
  areas:
    - 'packages/backend/pipeline-queue/src/__types__/index.ts'
    - 'packages/backend/pipeline-queue/src/index.ts'
    - 'apps/api/pipeline/src/supervisor/dispatch-router.ts'
    - 'packages/backend/pipeline-queue/src/__tests__/pipeline-job-schema.test.ts'
    - 'packages/backend/pipeline-queue/README.md'
  endpoints: []
  deploy_touchpoints: []

risks:
  - finding: >
      ReviewWorkerInput (orchestrator types.ts) declares worktreePath as z.string().min(1) (required),
      but ReviewPayloadSchema in pipeline-queue will declare it as z.string().optional().
      The dispatch-router must validate/default the value before passing to runReview() — the
      current code already defaults to '' which the schema will now enforce.
    mitigation: >
      dispatch-router.ts review branch already uses `payload.worktreePath ?? ''` — this pattern
      is preserved after removing the type cast. Document the required/optional mismatch in README.

missing_requirements: []

evidence_expectations:
  - 'pnpm check-types passes with zero TypeScript errors across all packages'
  - 'pnpm test --filter @repo/pipeline-queue passes (all existing + new tests)'
  - "grep -rn 'as StorySnapshotPayload &' apps/api/pipeline/src returns no results (cast removed)"
  - 'ReviewPayloadSchema and QaPayloadSchema visible in pipeline-queue/src/index.ts exports'

