    depends_on: ST-2
    verification: 'pnpm test --filter @repo/orchestrator -- pipeline-e2e'
    estimated_tokens: 6000

  - id: ST-4
    title: 'Implement error path test, type check, and timing validation (AC-4, AC-10, AC-11, AC-12)'
    goal: >
      Write error path describe block: bootstrap with story-creation mock throwing returns
