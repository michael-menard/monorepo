      Run full type check. Run test suite with --reporter=verbose to confirm total < 10s.
      Confirm bootstrap.ts and elaboration.ts coverage does not decrease.
    files_to_read:
      - 'packages/backend/orchestrator/src/__tests__/integration/pipeline-e2e.integration.test.ts'
    files_to_modify:
      - 'packages/backend/orchestrator/src/__tests__/integration/pipeline-e2e.integration.test.ts'
    acs: ['AC-4', 'AC-10', 'AC-11', 'AC-12']
    depends_on: ST-3
    verification: 'pnpm check-types --filter @repo/orchestrator && pnpm test --filter @repo/orchestrator -- pipeline-e2e --reporter=verbose'
