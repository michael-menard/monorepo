lessons_to_record:
  - lesson: >-
      Evidence artifacts must be verified against actual filesystem state — claimed test suite files
      (story-transition-service.test.ts) can be absent even when evidence claims pass status. QA verification must
      always cross-reference evidence claims against repo contents.
    category: anti_pattern
    tags:
      - evidence
      - testing
      - qa-verify
  - lesson: >-
      When a story requires enforcement at two layers (orchestrator service + MCP tool), both layers must be
      independently verified. Implementing only one layer constitutes partial delivery even if the other layer is
      architecturally sound.
    category: pattern
    tags:
      - artifact-enforcement
      - mcp-tools
      - orchestrator
  - lesson: >-
      Test output schemas should match implementation return shapes exactly. StoryUpdateStatusOutputSchema excludes 'id'
      but tests expected it — indicates test was written against a different version of the schema.
    category: anti_pattern
    tags:
      - zod
      - schema
      - testing
      - mcp-tools
