name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.changes.outputs.auth-service }}
      lego-projects-api: ${{ steps.changes.outputs.lego-projects-api }}
      lego-moc-instructions-app: ${{ steps.changes.outputs.lego-moc-instructions-app }}
      packages: ${{ steps.changes.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            auth-service:
              - 'apps/api/auth-service/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            lego-projects-api:
              - 'apps/api/lego-projects-api/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            lego-moc-instructions-app:
              - 'apps/web/lego-moc-instructions-app/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            packages:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.auth-service == 'true' || needs.changes.outputs.lego-projects-api == 'true' || needs.changes.outputs.lego-moc-instructions-app == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for Turborepo change detection

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build dist packages required for type resolution
        run: |
          # Build packages whose dist/ is needed by TypeScript for module resolution.
          # These packages use dist-based exports (not src-based), so tsc needs dist/
          # to exist before type-checking downstream packages.
          cd packages/core/logger && pnpm exec tsc
          echo "logger dist after build:" && ls dist/ | head -5
          cd ../../../packages/backend/database-schema && pnpm exec tsc -p tsconfig.build.json
          echo "database-schema dist after build:" && ls dist/ | head -5
          cd ../../../packages/backend/observability
          echo "observability node_modules/@repo/logger before tsc:" && ls node_modules/@repo/logger/ | head -5
          echo "logger dist via symlink:" && ls node_modules/@repo/logger/dist/ | head -5
          pnpm exec tsc

      - name: Lint changed projects
        run: pnpm turbo lint --filter="...[HEAD^1]"

      - name: Type check changed projects
        run: pnpm turbo check-types --filter="...[HEAD^1]"

  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for Turborepo change detection

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests for changed packages
        run: pnpm turbo test --filter="./packages/*...[HEAD^1]"

  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for Turborepo change detection

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build changed packages
        run: pnpm turbo build --filter="./packages/*...[HEAD^1]"
