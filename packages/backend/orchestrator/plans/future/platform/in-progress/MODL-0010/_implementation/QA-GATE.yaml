story_title: "Provider Adapters (OpenRouter/Ollama/Anthropic)"
gate: CONCERNS
status_reason: "Implementation complete and functional, but 9 HIGH severity findings require attention: CLAUDE.md violations (interfaces vs Zod, barrel file), security issues (API key exposure, weak cache keys), performance concerns (unbounded cache, inefficient hashing), and test coverage gaps (30% AC coverage). Issues are fixable and do not block core functionality."
reviewer: "Claude Code (Comprehensive Review)"
updated: "2026-02-13T21:00:00Z"

waiver:
  active: false
  reason: ""
  approved_by: ""

# Top HIGH severity issues requiring attention
top_issues:
  - id: QUAL-001
    severity: high
    category: code-quality
    finding: "ILLMProvider interface violates CLAUDE.md requirement 'ALWAYS use Zod schemas for types - never use TypeScript interfaces'"
    suggested_action: "Convert ILLMProvider to Zod schema using z.object() with z.function() types, or remove from public interface (implementation detail)"
    file: packages/backend/orchestrator/src/providers/base.ts
    line: 51

  - id: QUAL-004
    severity: high
    category: code-quality
    finding: "Barrel file anti-pattern in index.ts re-exports all types (lines 17-24), violates CLAUDE.md 'NO BARREL FILES - import directly from source files'"
    suggested_action: "Remove re-export block. Consumers import directly from base.ts, ollama.ts, etc. Keep only factory and registry in index.ts"
    file: packages/backend/orchestrator/src/providers/index.ts
    line: 17

  - id: SEC-001
    severity: high
    category: security
    finding: "API key exposure in checkAvailability() - Anthropic passes API key in plain-text header to availability check endpoint"
    suggested_action: "Use dedicated health check endpoint without authentication, or verify HTTPS enforcement and no proxy/downgrade risk"
    file: packages/backend/orchestrator/src/providers/anthropic.ts
    line: 101-105
    cwe: CWE-522

  - id: SEC-002
    severity: high
    category: security
    finding: "Weak cache key generation using JSON.stringify() - reversible, includes API key material in cache keys potentially logged or exposed"
    suggested_action: "Use SHA-256 cryptographic hash, exclude sensitive fields (API keys) from hash generation"
    file: packages/backend/orchestrator/src/providers/base.ts
    line: 150-152
    cwe: CWE-327

  - id: PERF-001
    severity: high
    category: performance
    finding: "Unbounded instance cache (Map) will grow indefinitely - no LRU or eviction policy. Risk of memory exhaustion in long-running processes"
    suggested_action: "Implement LRU cache (e.g., lru-cache package) with reasonable limits (maxSize=100), or add TTL-based expiration (1 hour)"
    file: packages/backend/orchestrator/src/providers/anthropic.ts
    line: 47

  - id: PERF-002
    severity: high
    category: performance
    finding: "Hash generation uses JSON.stringify(config) on hot path - verbose cache keys (500+ chars), O(n) string comparison instead of O(1) hash"
    suggested_action: "Use crypto.createHash('sha256').update(JSON.stringify(config)).digest('hex').substring(0, 16) for deterministic, fast hashing"
    file: packages/backend/orchestrator/src/providers/base.ts
    line: 150

  - id: TEST-001
    severity: high
    category: testing
    finding: "AC-9 integration tests deferred - requires real service connections (Ollama, OpenRouter, Anthropic) with graceful skip pattern"
    suggested_action: "Create integration.test.ts with test.skipIf(!process.env.PROVIDER_API_KEY) pattern per AC-9 requirements"
    file: packages/backend/orchestrator/src/providers/__tests__/

  - id: TEST-002
    severity: high
    category: testing
    finding: "Availability check logic not tested - checkAvailability() has cache logic, timeout handling, AbortController but zero unit tests"
    suggested_action: "Add unit tests: mock fetch, test cache TTL, timeout enforcement, concurrent calls, logging assertions"
    file: packages/backend/orchestrator/src/providers/ollama.ts
    line: 71-114

  - id: DEBT-003
    severity: high
    category: technical-debt
    finding: "getCachedInstance() defined in ILLMProvider but never called - unused interface method creates confusion and untestable code path"
    suggested_action: "Remove getCachedInstance() from interface (implementation detail) OR refactor getModel() to call it internally"
    file: packages/backend/orchestrator/src/providers/base.ts
    line: null

