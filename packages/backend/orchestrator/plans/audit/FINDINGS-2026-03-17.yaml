findings:
  # ───────────────────────────────────────────────────────────────────────────
  - id: AUDIT-8-F001
    severity: low
    lens: emergency-controls
    status: RESOLVED
    title: 'No pausePipeline() / drainPipeline() utility — only SIGTERM drain existed'
    file: apps/api/pipeline/src/supervisor/drain/index.ts
    detail: |
      The drain module correctly handled SIGTERM → Worker.pause() → Worker.close()
      but there was no programmatic emergency stop callable via CLI or admin API
      without sending a Unix signal. Operators had no way to pause the queue from
      a shell without access to the supervisor process PID.
    resolution: |
      Implemented `pausePipeline(queue, worker?)` and `drainPipeline(queue)` in
      `apps/api/pipeline/src/emergency-controls.ts`.

      Wired to CLI as:
        `pipeline-cli emergency pause`
        `pipeline-cli emergency drain`

      `pausePipeline()` calls `queue.pause()` (server-side, affects all workers)
      and optionally `worker.pause()` for the local worker instance.
      `drainPipeline()` calls `queue.drain()` to remove all waiting jobs.

  # ───────────────────────────────────────────────────────────────────────────
  - id: AUDIT-8-F002
    severity: low
    lens: emergency-controls
    status: RESOLVED
    title: 'No quarantineStory() helper — per-story blocking required manual DB + queue steps'
    file: apps/api/pipeline/ (missing)
    detail: |
      Blocking a specific story required:
        1. Manually calling kb_update_story_status (KB API only)
        2. Manually finding and removing the BullMQ job (no tooling)

      The scheduler correctly filters on `state='ready'` so blocked stories
      cannot be re-dispatched once blocked in KB — but removing the already-queued
      job required direct BullMQ API access.
    resolution: |
      Implemented `quarantineStory(kbDeps, queue, storyId, reason)` in
      `apps/api/pipeline/src/emergency-controls.ts`.

      Steps:
        1. Calls `kb_update_story_status({ story_id, blocked_reason: reason })`
        2. Searches waiting + delayed BullMQ jobs for this story
        3. Removes the job if found

      Wired to CLI as:
        `pipeline-cli emergency quarantine <storyId> <reason>`

  # ───────────────────────────────────────────────────────────────────────────
  - id: AUDIT-8-F003
    severity: medium
    lens: emergency-controls
    status: CONFIRMED_SAFE
    title: 'shouldEscalate() defined but not wired to graph retry loops (stubs are acyclic)'
    file: packages/backend/orchestrator/src/graphs/ (review.ts, qa-verify.ts, dev-implement.ts)
    detail: |
      All three graphs (dev-implement, review, qa-verify) have:
        - `iterationCount` and `maxIterations` in their state annotations
        - A correct `shouldEscalate()` function exported

      However `shouldEscalate()` is not called in any conditional edge because
      the graphs are currently acyclic (no retry loops). The execute nodes are
      stubs (WINT-9070, WINT-9080) that return immediately without LLM calls.

      Since there are no retry loops, there is no runaway risk with the current
      stubs. The iteration cap infrastructure is in place and correct.
    impact: |
      No runaway risk today (stubs always terminate). However, once real LLM
      calls are wired (AUDIT-3 implementation), the retry loops MUST call
      shouldEscalate() in their conditional edges or the cap will not be enforced.
    recommendation: |
      Before wiring real LLM calls to any node, add a retry loop to the graph
      and wire shouldEscalate() as the conditional edge function. The abort_to_blocked
      branch must call storyTransitionService.claim(storyId, 'blocked', ...).

      Confirmed caps enforced today:
        - BullMQ queue: attempts=3 with exponential backoff (outermost cap) PASS
        - change-loop node: MAX_CHANGE_RETRIES=3 PASS
        - story-attack node: maxIterationsPerAssumption=3 PASS
        - batch-process: maxRetriesPerStory=2 PASS

  # ───────────────────────────────────────────────────────────────────────────
  - id: AUDIT-8-F004
    severity: medium
    lens: emergency-controls
    status: RESOLVED
    title: 'Concurrency env vars existed in bootstrap() but not documented in .env.example'
    file: .env.example
    detail: |
      `SCHEDULER_MAX_CONCURRENT`, `PIPELINE_STAGE_TIMEOUT_MS`,
      `SUPERVISOR_DRAIN_TIMEOUT_MS`, `SCHEDULER_POLL_INTERVAL_MS` were all read
      in `bootstrap()` but absent from `.env.example`. Operators had no reference
      for what knobs existed or what their defaults were.
    resolution: |
      Updated `.env.example` with all pipeline env vars, defaults, and comments
      explaining the emergency use cases (e.g., "Set SCHEDULER_MAX_CONCURRENT=1
      for serial/safe mode before first real run").

  # ───────────────────────────────────────────────────────────────────────────
  - id: AUDIT-8-F005
    severity: high
    lens: emergency-controls
    status: RESOLVED
    title: 'No ops runbook — emergency procedures undocumented'
    file: apps/api/pipeline/ (missing)
    detail: |
      AUDIT-7 built the health server and structured logs but did not create
      an ops runbook. No documentation existed for how to pause the pipeline,
      quarantine a story, or what env vars control runtime behavior.
    resolution: |
      Created `apps/api/pipeline/OPS-RUNBOOK.md` covering:
        - Emergency pause/drain/quarantine procedures with CLI examples
        - Concurrency control (SCHEDULER_MAX_CONCURRENT)
        - Iteration limits table for all graphs
        - Signal handling (SIGTERM, SIGINT, SIGKILL)
        - Health check endpoint usage
        - Queue inspection CLI commands

