performance:
  t_shirt_size: M
  size_rationale: |
    Medium complexity due to subprocess spawning (inherently blocking operation) and unbuffered
    string concatenation in stdout/stderr handling. The file I/O and regex parsing are relatively
    lightweight, but the subprocess overhead and stream handling patterns introduce moderate
    performance concerns requiring careful monitoring.
  performance_risk: medium

findings:
  - id: PERF-001
    severity: high
    finding: |
      Unbuffered string concatenation in subprocess stream handlers
      (lines 109, 114: stdout += data.toString(), stderr += data.toString())

      When large output is produced, repeated string concatenation creates new string allocations
      on each chunk received. For a process emitting 1MB of output in 100 chunks, this results
      in O(n²) memory operations and GC pressure.
    estimated_impact: |
      High impact if doc-sync command output is large (>100KB).
      - 1MB output: ~50 extra allocations and GC cycles
      - Memory spike during stream processing
      - Tail latency degradation in production
    suggested_action: |
      Replace string concatenation with array buffering:

      const stdoutChunks: Buffer[] = []
      const stderrChunks: Buffer[] = []

      child.stdout?.on('data', data => {
        stdoutChunks.push(data)
      })

      child.stderr?.on('data', data => {
        stderrChunks.push(data)
      })

      // Then in 'close' handler:
      stdout: Buffer.concat(stdoutChunks).toString('utf-8')
      stderr: Buffer.concat(stderrChunks).toString('utf-8')

  - id: PERF-002
    severity: high
    finding: |
      Subprocess spawn is blocking I/O operation (lines 100-127).

      The entire node execution blocks while waiting for child process completion. The 10-second
      timeout (from createToolNode preset) is appropriate but the blocking nature means:
      - Graph execution is stalled
      - Multiple concurrent doc-sync operations will queue up
      - No ability to process other work during doc-sync execution
    estimated_impact: |
      High impact on throughput in high-concurrency scenarios.
      - Single doc-sync execution blocks entire workflow orchestrator
      - N concurrent workflows = N serialized doc-sync calls
      - 10 workflows × 5 second average = 50 second total vs 5 second parallel
    suggested_action: |
      1. Document that this is inherently blocking (appropriate for file I/O operations)
      2. Consider subprocess pooling/queueing at orchestrator level if high concurrency expected
      3. Add metrics collection for subprocess duration and count
      4. Monitor actual subprocess execution times to validate 10-second timeout is appropriate

  - id: PERF-003
    severity: medium
    finding: |
      Regex scanning entire file content repeatedly (lines 148-151).

      For a large SYNC-REPORT.md (1-10MB typical for large doc-sync operations), running
      4 separate .match() calls with different patterns scans the entire document 4 times
      sequentially. Each regex creates temporary object allocations.
    estimated_impact: |
      Medium impact on large reports.
      - 100KB report: ~2-4ms overhead (acceptable)
      - 1MB+ report: ~20-40ms per regex (noticeable)
      - 4 sequential scans = cumulative overhead
    suggested_action: |
      Single-pass regex with alternation or split on newlines then parse:

      // Option 1: Single regex with lookups
      const patterns = {
        filesChanged: /Total files changed:\s*(\d+)/i,
        sectionsUpdated: /Total sections updated:\s*(\d+)/i,
        diagramsRegenerated: /Total diagrams regenerated:\s*(\d+)/i,
        manualReviewNeeded: /Manual review items:\s*(\d+)/i,
      }

      const results: Record<string, number> = {}
      for (const [key, pattern] of Object.entries(patterns)) {
        const match = content.match(pattern)
        results[key] = match ? Number.parseInt(match[1], 10) : 0
      }

      // Option 2: Line-based parsing (more efficient for structured reports)
      const lines = content.split('\n')
      for (const line of lines) {
        if (line.includes('Total files changed')) {
          filesChanged = Number.parseInt(line.match(/\d+/)?.[0] ?? '0', 10)
        }
        // ... etc
      }

  - id: PERF-004
    severity: medium
    finding: |
      No resource limits on subprocess execution (lines 100-103).

      The spawn call does not set memory limits, CPU limits, or stream size limits. A misbehaving
      or infinite-loop subprocess could consume all available memory or CPU, affecting the
      orchestrator and other workflows.
    estimated_impact: |
      Medium-to-high impact on system stability.
      - Runaway subprocess consumes unbounded memory
      - Orchestrator becomes unresponsive
      - Other workflows starved of resources
      - No explicit cleanup if process hangs beyond timeout
    suggested_action: |
      Add resource constraints to spawn options:

      const child = spawn('claude', ['doc-sync', ...args], {
        cwd: workingDir,
        shell: true,
        maxBuffer: 10 * 1024 * 1024, // 10MB max output buffer
        stdio: ['ignore', 'pipe', 'pipe'], // Explicit stdio config
        // Consider adding resource limits via OS-level tools:
        // timeout command wrapper, ulimit, cgroups, etc.
      })

      // Add explicit cleanup
      const timeoutHandle = setTimeout(() => {
        if (!child.killed) {
          child.kill('SIGTERM')
          // If still alive after grace period, escalate to SIGKILL
          setTimeout(() => child.killed || child.kill('SIGKILL'), 1000)
        }
      }, retryConfig.timeoutMs + 500)

      child.on('close', () => clearTimeout(timeoutHandle))

  - id: PERF-005
    severity: low
    finding: |
      File stat operation not optimized (line 145: fs.readFile before report parsing).

      While fs.readFile is appropriate (need full content for regex), error handling for ENOENT
      happens after read. No early validation that file exists.
    estimated_impact: |
      Low impact. ENOENT errors are caught quickly, but adds 1 disk seek + failed read.
      Typical scenario: report file exists >99% of time.
    suggested_action: |
      No immediate action needed. Current approach is reasonable for expected happy path.
      If profiling shows this is bottleneck, consider:

      if (!reportPath) {
        throw new Error(`SYNC-REPORT.md not found at ${reportPath}`)
      }
      // Then attempt read

  - id: PERF-006
    severity: low
    finding: |
      GraphState update includes full state copy in error paths (lines 216-227, 246-257).

      While state updates are small (partial objects), errors return default values that
      re-initialize multiple fields even on expected exit code conditions.
    estimated_impact: |
      Negligible. GraphState is already partial update, and object creation overhead is minimal.
      Only concern if millions of doc-sync calls at high concurrency.
    suggested_action: |
      No action required. Current approach is clear and maintainable.

  - id: PERF-007
    severity: low
    finding: |
      No early return on validation failure (line 202: DocSyncConfigSchema.parse).

      If config is invalid, Zod throws immediately, which is correct. However, validation
      happens before logging entry, so invalid config doesn't log attempt.
    estimated_impact: |
      Negligible. Config validation is appropriate early gate.
    suggested_action: |
      No action required. Current error handling is correct.

optimization_opportunities:
  - |
    CRITICAL: Implement buffer pooling for repeated doc-sync calls to reduce GC pressure
    from stream concatenation. Could pre-allocate buffers for common doc-sync output sizes
    and reuse across calls.

  - |
    RECOMMENDED: Add structured logging with process lifecycle events (spawn, stdio chunks,
    completion). Current logging misses intermediate events that could help diagnose slow
    or hung processes in production.

  - |
    RECOMMENDED: Implement subprocess result caching if doc-sync is called repeatedly with
    identical configuration within a time window. Current implementation always re-executes.

  - |
    OPTIONAL: Profile actual SYNC-REPORT.md sizes in production to validate regex scanning
    overhead is not significant. If >1MB reports common, implement line-based parsing.

timeout_analysis:
  configured_timeout_ms: 10000
  rationale: |
    Tool preset (10s) is appropriate for file I/O operations. Doc-sync execution time
    depends on codebase size and doc-sync agent complexity. Validate actual execution
    times to confirm timeout is not frequently triggered.
  recommendation: |
    Monitor metrics for timeout occurrences. If >5% of calls timeout, investigate:
    1. Whether codebase/docs are growing
    2. Whether subprocess overhead is increasing
    3. Whether working directory I/O is slow (network mount, SSD degradation, etc)

memory_profile:
  estimated_peak_memory:
    small_report_100kb: "~500KB - 1MB (stream buffers, parsed state)"
    large_report_1mb: "~10-15MB (unbuffered concatenation spikes)"
    worst_case: "Unbounded if subprocess produces output without limit"

  gc_impact: |
    Unbuffered string concatenation (PERF-001) will trigger GC cycles proportional to
    output size. For typical 100-500KB reports, acceptable. For large docs (>1MB),
    consider the buffer pooling optimization.

database_io: "None - file-only I/O"
react_frontend: "None - backend node only"
conclusions: |
  The doc-sync node is well-structured for its purpose as a file I/O tool. Primary concerns
  are:
  1. Subprocess spawning is inherently blocking (acceptable, document clearly)
  2. String concatenation pattern will cause GC pressure at scale (FIX PERF-001)
  3. Resource limits needed to prevent runaway subprocess (ADD PERF-004)
  4. Regex scanning is acceptable for typical report sizes (MONITOR, optimize if needed)

  Recommended action items:
  1. IMMEDIATE: Fix unbuffered string concatenation (PERF-001)
  2. IMMEDIATE: Add subprocess resource limits (PERF-004)
  3. SHORT-TERM: Add process lifecycle metrics for observability
  4. ONGOING: Monitor actual execution times and report sizes in production
