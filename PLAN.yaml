acceptance_criteria_map:
  - ac_id: "AC-1"
    planned_evidence: >
      Unit test in story-tools.test.ts: mock kb_get_next_story returns
      { story: null, candidates_count: 0, blocked_by_dependencies: [], message: '...' };
      assert result.content[0].text parsed JSON matches shape.
    evidence_type: test
  - ac_id: "AC-2"
    planned_evidence: >
      Unit test: mock returns { story: null, candidates_count: 3,
      blocked_by_dependencies: ['KBAR-0080 (blocked by: KBAR-0070)'], message: '...' };
      assert blocked_by_dependencies.length > 0.
    evidence_type: test
  - ac_id: "AC-3"
    planned_evidence: >
      Unit test: mock returns { story: { storyId: 'KBAR-0090', ... }, candidates_count: 1,
      blocked_by_dependencies: [], message: '...' }; assert story.storyId === 'KBAR-0090'.
    evidence_type: test
  - ac_id: "AC-4"
    planned_evidence: >
      Two unit tests: (a) call with include_backlog: true, assert mock called;
      (b) call without include_backlog, assert mock called. Both assert correct result forwarding.
      vi.fn() call args inspection confirms the parameter is forwarded.
    evidence_type: test
  - ac_id: "AC-5"
    planned_evidence: >
      Unit test: call with exclude_story_ids: ['KBAR-0080', 'KBAR-0070'];
      assert mock was called and result is returned correctly.
    evidence_type: test
  - ac_id: "AC-6"
    planned_evidence: >
      Unit test: call with feature: 'kb-artifact-migration';
      assert mock was called and result is returned correctly.
    evidence_type: test
  - ac_id: "AC-7"
    planned_evidence: >
      Unit test: create context with agent_role cast to invalid role ('unknown' as AgentRole);
      assert result.isError === true and mock DB function not called.
    evidence_type: test
  - ac_id: "AC-8"
    planned_evidence: >
      Unit test: call handleKbGetNextStory with empty input {};
      assert result.isError === true and content contains Zod error message.
    evidence_type: test
  - ac_id: "AC-9"
    planned_evidence: >
      mcp-integration.test.ts updated: toHaveLength(53) assertion and
      kb_update_story present in expected names array. Test passes.
    evidence_type: test
  - ac_id: "AC-10"
    planned_evidence: >
      pnpm check-types --filter @repo/knowledge-base exits 0;
      pnpm test --filter @repo/knowledge-base exits 0 with all tests green.
    evidence_type: command

