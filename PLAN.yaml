    kb_get_next_story allows ALL 4 valid roles (pm/dev/qa/all). To test AC-7 (auth failure),
    cast an invalid string as AgentRole: { agent_role: 'unknown' as AgentRole, ... }
  - >
    Confirmed actual toolDefinitions count = 53 (49 kb_ tools + 4 worktree_ tools).
    mcp-integration.test.ts currently asserts 52 and is missing kb_update_story.
  - >
    Mock return shape for kb_get_next_story must match the TypeScript return type:
    { story: typeof stories.$inferSelect | null, candidates_count: number,
      blocked_by_dependencies: string[], message: string }
    Minimal story fixture needs: { storyId, title, epic, state, priority, createdAt, ... }
  - >
    SCOPE.yaml lists touched_paths_globs as packages/backend/mcp-tools/** and
    packages/backend/orchestrator/** but the actual files are in
    apps/api/knowledge-base/src/mcp-server/__tests__/. This is acceptable —
    the scope glob was set at setup time before elaboration confirmed the exact path.
    The plan correctly targets the apps/api path.
  - >
    Do NOT modify tool-schemas.ts, tool-handlers.ts, or access-control.ts per story Non-Goals.
