waiver:
  active: false
  reason: ""
  approved_by: ""

# Top priority issues requiring attention
top_issues:
  # Security - High Severity
  - id: "SEC-001"
    severity: high
    finding: "Path Traversal Vulnerability - filePath and outputPath parameters accept any string without validating against directory traversal attacks (../, absolute paths escaping intended directories)"
    suggested_action: "Add path.resolve() and path.relative() validation to verify paths stay within allowed directories. Reject paths containing '..' or symbolic links pointing outside boundaries"
    file: "packages/backend/kbar-sync/src/__types__/index.ts"
    line: "21, 53, 84"

  - id: "SEC-002"
    severity: high
    finding: "Symlink Following Vulnerability - readFile() follows symlinks without restrictions, allowing access to sensitive files outside intended scope"
    suggested_action: "Use fs.lstat() to detect symlinks, fs.realpath() to verify canonical path stays within allowed directory, or use O_NOFOLLOW flag"
    file: "packages/backend/kbar-sync/src/sync-story-to-database.ts"
    line: "100"

  - id: "SEC-003"
    severity: high
    finding: "Symlink Following on Write - rename() operation follows symlinks at target, could cause unintended file overwrites"
    suggested_action: "Check if outputPath is symlink using fs.lstat() before writing. Reject operations if target is a symlink"
    file: "packages/backend/kbar-sync/src/sync-story-from-database.ts"
    line: "109"

  # Test Coverage - High Severity
  - id: "TEST-001"
    severity: high
    finding: "Critical skipped test for checksum-based idempotency (AC-4). Test cannot verify checksums match between runs without real SHA-256 computation"
    suggested_action: "Refactor computeChecksum to accept injectable crypto function or move test to integration suite where real checksums work"
    file: "packages/backend/kbar-sync/src/__tests__/sync-story-to-database.test.ts"
    line: "109"

  - id: "TEST-002"
    severity: high
    finding: "Skipped test in detectSyncConflicts for no-conflict scenario. Critical success path when checksums match not verified in unit tests"
    suggested_action: "Implement with same crypto mocking solution as TEST-001"
    file: "packages/backend/kbar-sync/src/__tests__/detect-sync-conflicts.test.ts"
    line: "44"

  # Performance - High Severity
  - id: "PERF-001"
    severity: high
    finding: "N+1 query pattern: artifact table queried twice in transaction with identical filters (lines 122-128 then 185-191)"
    suggested_action: "Store first artifact query result and reuse it. Eliminate duplicate query"
    file: "packages/backend/kbar-sync/src/sync-story-to-database.ts"
    line: "122-128, 185-191"

  - id: "PERF-002"
    severity: high
    finding: "Duplicate SELECT queries on kbarStories table when operations run sequentially, wasting database roundtrips"
    suggested_action: "Return story data from sync operations to avoid re-fetching, or implement result caching within session scope"
    file: "packages/backend/kbar-sync/src/detect-sync-conflicts.ts"
    line: "122"

  # Code Quality - High Severity
  - id: "QUAL-001"
    severity: high
    finding: "Code duplication - computeChecksum function identically implemented in both sync-story-to-database.ts and detect-sync-conflicts.ts"
    suggested_action: "Extract to shared utilities module (src/utils/checksum.ts)"
    file: "packages/backend/kbar-sync/src/sync-story-to-database.ts"
    line: "29"

  - id: "QUAL-002"
    severity: high
    finding: "Repeated error handling pattern for sync event updates across all three sync functions (~15 lines duplicated)"
    suggested_action: "Extract to utility function: updateSyncEventOnFailure(syncEventId, errorMessage)"
    file: "packages/backend/kbar-sync/src/sync-story-to-database.ts"
    line: "258-273"

  - id: "QUAL-003"
    severity: high
    finding: "Repeated input validation pattern in all three sync functions with identical Zod validation structure"
    suggested_action: "Create reusable validateInput<T>(input, schema) helper function"
    file: "packages/backend/kbar-sync/src/sync-story-to-database.ts"
    line: "65-75"

  - id: "QUAL-004"
    severity: high
    finding: "Inconsistent transaction typing: db.transaction() callback typed as 'any' instead of proper Drizzle type"
    suggested_action: "Import and use proper Drizzle transaction type for type safety"
    file: "packages/backend/kbar-sync/src/sync-story-to-database.ts"
    line: "110"

