  synthesis_rationale: |
    Modal size is M (4/7 specialists). Security and Performance flagged as L due to:
    - Security: Path traversal and symlink vulnerabilities create attack surface
    - Performance: N+1 queries will impact scalability at 100+ stories

    Despite L estimates in security and performance, overall recommendation is M because:
    - This is a backend utility package for internal use (not user-facing)
    - Security issues can be mitigated by path allowlisting at call sites
    - Performance issues are real but not critical for infrequent sync operations
    - Strong test coverage (89%) and well-structured code reduce risk

    Recommended: M with mandatory security hardening before production use
