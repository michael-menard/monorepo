# Risk summary
risk_summary:
  totals:
    high: 6
    medium: 15
    low: 32

  recommendations:
    must_fix:
      - "QUAL-001: Extract shared state enum to eliminate duplication"
      - "QUAL-002: Extract shared priority enum to eliminate duplication"
      - "QUAL-003: Extract shared story output schema to eliminate duplication"
      - "TEST-012: Add concurrent update race condition tests"
      - "DEBT-001: Centralize enum definitions in shared constants package"
      - "DEBT-002: Implement state transition validation using orchestrator's isValidTransition()"

    should_fix:
      - "REQ-001: Fix ordering to include priority DESC in story-get-by-status"
      - "QUAL-004-007: Refactor duplicated patterns (pagination schema, error handling, OR clauses, mappers)"
      - "PERF-004: Add partial index on storyStates for active state lookups"
      - "TEST-002-009: Expand test coverage for edge cases, boundaries, and validation"
      - "DEBT-003-005: Create shared utilities and expand integration tests"

  additional_context: |
    The implementation is functionally complete and working with 24/24 tests passing.
    High-severity findings are primarily about code maintainability (duplication) and
    test completeness rather than functional bugs. The code follows CLAUDE.md guidelines,
    uses proper error handling, and demonstrates good architectural patterns.

    Key strengths:
    - All 10 acceptance criteria met with evidence
    - Comprehensive unit test coverage (24 tests)
    - Proper Zod validation throughout
    - Type-safe Drizzle ORM queries
    - Graceful error handling with structured logging
    - Transaction-based state updates for atomicity

    Recommended priority:
    1. Address code duplication (QUAL-001-003, DEBT-001) - prevents future maintenance burden
    2. Add state transition validation (DEBT-002) - ensures business rule consistency
    3. Expand test coverage (TEST-012, TEST-004) - validates edge cases and concurrent scenarios
    4. Fix ordering discrepancy (REQ-001) - aligns implementation with specification

