# Top issues across all categories (high and medium severity only)
top_issues:
  # High Severity Issues (6 total)
  - id: "QUAL-001"
    severity: high
    category: code_quality
    finding: "Enum state values duplicated across 6 Zod schemas (StoryGetStatusOutputSchema, StoryUpdateStatusOutputSchema, StoryGetByStatusInputSchema, etc.). Same enum appears in lines 40-49, 67-76, 92-101, 113-122, 138-147, 180-189. Creates maintenance debt - any state changes require updates in multiple locations."
    suggested_action: "Extract shared state enum to a constant: const STORY_STATES = ['backlog', 'ready_to_work', ...] as const; const StateEnum = z.enum(STORY_STATES). Then reuse: state: StateEnum in all schemas. Reduces from ~8 enum definitions to 1."
    file: "packages/backend/mcp-tools/src/story-management/__types__/index.ts"
    line: 40
    can_auto_fix: true

  - id: "QUAL-002"
    severity: high
    category: code_quality
    finding: "Priority enum duplicated across output schemas (StoryGetStatusOutputSchema line 50, StoryGetByStatusOutputSchema line 148, StoryGetByFeatureOutputSchema line 190). Same pattern: z.enum(['P0', 'P1', 'P2', 'P3', 'P4'])"
    suggested_action: "Extract as shared constant: const PRIORITY_ENUM = z.enum(['P0', 'P1', 'P2', 'P3', 'P4']) as const. Reuse across all schemas."
    file: "packages/backend/mcp-tools/src/story-management/__types__/index.ts"
    line: 50
    can_auto_fix: true

  - id: "QUAL-003"
    severity: high
    category: code_quality
    finding: "Story output object schema duplicated across 3 locations with identical field definitions (lines 35-56 in GetStatus, lines 133-155 in GetByStatus, lines 175-197 in GetByFeature). Each includes: id, storyId, title, state, priority, storyType, epic, wave, createdAt, updatedAt."
    suggested_action: "Extract shared object schema: const StoryDetailSchema = z.object({ id, storyId, title, state, priority, storyType, epic, wave, createdAt, updatedAt }). Use in all output types. Reduces duplication from 3 full definitions to 1 schema with 3 references."
    file: "packages/backend/mcp-tools/src/story-management/__types__/index.ts"
    line: 35
    can_auto_fix: true

  - id: "TEST-012"
    severity: high
    category: test_coverage
    finding: "No test for concurrent state updates (race conditions). Two simultaneous storyUpdateStatus calls for same story. Database constraint violations or state inconsistency not tested."
    suggested_action: "Add integration test: Promise.all([storyUpdateStatus(story, state1), storyUpdateStatus(story, state2)]). Verify one succeeds, one fails, or database constraint prevents inconsistency. Test optimistic locking if used."
    file: "packages/backend/mcp-tools/src/story-management/__tests__/integration.test.ts"

  - id: "DEBT-001"
    severity: high
    category: technical_debt
    finding: "Enum values hardcoded in schema and duplicated in type definitions. Story state enum defined in both database-schema (wint.ts line 53-62) and story-management/__types__/index.ts (lines 40-49). Priority enum similarly duplicated (database-schema line 68 vs types lines 50). Changes to state/priority values require updates in multiple locations, risking drift and inconsistency."
    suggested_action: "Extract enums to a shared @repo/story-constants or similar package. Export from database-schema or create dedicated constants package that both db and mcp-tools import from. Consider following the pattern already established in orchestrator (src/state/enums/story-state.ts) which has helper functions (isTerminalState, isValidTransition, etc.)."
    file: "packages/backend/mcp-tools/src/story-management/__types__/index.ts"
    estimated_effort: medium

  - id: "DEBT-002"
    severity: high
    category: technical_debt
    finding: "No state transition validation. storyUpdateStatus allows any state transition without enforcing business rules. The orchestrator already has a comprehensive isValidTransition() function (orchestrator/src/state/enums/story-state.ts lines 80-101) that validates state machines (e.g., can't go backwards from done, allows QA rejection, emergency close to done). MCP tool currently skips from ready_to_work to in_progress unconditionally. This creates divergence from orchestrator's state machine logic."
    suggested_action: "Import isValidTransition() from orchestrator and validate before updating state. Add check after line 61 (toState assignment): if (!isValidTransition(fromState, toState)) { logger.warn(`Invalid state transition: ${fromState} -> ${toState}`); return null; }"
    file: "packages/backend/mcp-tools/src/story-management/story-update-status.ts"
    estimated_effort: medium

  # Medium Severity Issues (15 total - showing top 10)
  - id: "REQ-001"
    severity: medium
    category: requirements
    finding: "AC-3 ordering discrepancy: Story spec (line 112) specifies ordering 'priority DESC, createdAt ASC' but implementation only orders by 'createdAt DESC' (line 57), missing priority field. This affects result ordering for stories in the same state but different priorities."
    suggested_action: "Update line 57 in story-get-by-status.ts: FROM .orderBy(desc(stories.createdAt)) TO .orderBy(desc(stories.priority), asc(stories.createdAt)). Note: This requires priority enum ordering to be defined for proper DESC sorting."
    file: "packages/backend/mcp-tools/src/story-management/story-get-by-status.ts"
    line: 57
    impact: "Low - results still valid, just not optimally ordered by priority"

  - id: "QUAL-004"
    severity: medium
    category: code_quality
    finding: "Pagination input schema duplicated in StoryGetByStatusInputSchema (lines 112-125) and StoryGetByFeatureInputSchema (lines 163-167). Both define: limit with identical validation (min 1, max 1000, default 50), offset with identical validation (min 0, default 0)."
    suggested_action: "Extract pagination schema: const PaginationSchema = z.object({ limit: z.number().int().min(1).max(1000).default(50), offset: z.number().int().min(0).default(0) }). Compose in both input schemas using spread: ...PaginationSchema.shape."
    file: "packages/backend/mcp-tools/src/story-management/__types__/index.ts"
    line: 112
    can_auto_fix: true

  - id: "QUAL-005"
    severity: medium
    category: code_quality
    finding: "Error handling pattern duplicated identically across all 4 query functions (story-get-status.ts line 72-78, story-update-status.ts line 128-135, story-get-by-status.ts line 73-80, story-get-by-feature.ts line 74-81). Each catches and logs with logger.warn() + returns null/empty array. No error context differentiation."
    suggested_action: "Create error handler utility: handleQueryError(error, operation: string) => logger.warn(...); return defaultValue. Reuse across all functions. Enables centralized error handling policy changes and consistent error logging."
    file: "packages/backend/mcp-tools/src/story-management/story-get-status.ts"
    line: 72
    can_auto_fix: true

  - id: "PERF-004"
    severity: medium
    category: performance
    finding: "story-update-status.ts updates storyStates table without index on (storyId, state, isNull(exitedAt)) - compound lookups may trigger full table scan. When story has many historical states, finding active state entry may scan all rows for that story. Acceptable now, but degrades as storyStates table grows (100k+ rows)."
    suggested_action: "Add composite index to schema: uniqueIndex('story_states_story_active_state_idx').on(storyId, state).where(isNull(exitedAt)). This partial index is efficient - it only indexes active (non-exited) states, keeping index size small."
    file: "packages/backend/mcp-tools/src/story-management/story-update-status.ts"
    estimated_impact: "At scale, this becomes a hotspot"

  - id: "TEST-002"
    severity: medium
    category: test_coverage
    finding: "No tests for null/undefined edge cases in optional fields (reason, metadata in storyUpdateStatus). Schemas accept optional values but behavior with null metadata is not explicitly tested."
    suggested_action: "Add test case: storyUpdateStatus with undefined reason and metadata, verify null values persisted to database. Add test for empty metadata object vs null."
    file: "packages/backend/mcp-tools/src/story-management/__tests__/story-update-status.test.ts"

  - id: "TEST-003"
    severity: medium
    category: test_coverage
    finding: "Zod validation tests only test basic format errors (invalid-format, invalid-state). Missing tests for boundary conditions: very long storyId strings, max length limits, special character handling."
    suggested_action: "Add test cases for: storyId with 2000+ characters, special characters in storyId (emoji, unicode), exactly at regex boundary (A-Z{2,10}-\d{3,4}), min/max regex variations."
    file: "packages/backend/mcp-tools/src/story-management/__tests__/story-get-status.test.ts"

  - id: "TEST-004"
    severity: medium
    category: test_coverage
    finding: "State transition validation not tested - can update to any state from any state. Missing tests for invalid state transitions that business logic should prevent (e.g., done → in_progress)."
    suggested_action: "Add tests for business rule validation: attempt transitions like done → backlog, cancelled → in_progress, etc. Currently implementation allows any transition; clarify if this is intentional or needs validation."
    file: "packages/backend/mcp-tools/src/story-management/story-update-status.ts"

  - id: "TEST-007"
    severity: medium
    category: test_coverage
    finding: "No tests for query result ordering and sorting correctness. storyGetByStatus orders by DESC createdAt (newest first), storyGetByFeature orders by ASC wave then ASC createdAt. Ordering not validated in tests."
    suggested_action: "Add integration or mock tests validating sort order: create multiple stories with different dates, verify DESC createdAt ordering for status query, verify wave ASC for feature query. Test null wave handling in ordering."
    file: "packages/backend/mcp-tools/src/story-management/__tests__/story-get-by-status.test.ts"

  - id: "TEST-009"
    severity: medium
    category: test_coverage
    finding: "Pagination boundary not fully tested. Tested limit=1000 (max valid) but missing: limit=1001 (should fail), offset=-1 (should fail), limit=0 (should fail)."
    suggested_action: "Add comprehensive boundary tests: limit=-1, limit=0, limit=1001, offset=-1, limit=999 (just under max), verify all properly rejected by Zod with clear messages."
    file: "packages/backend/mcp-tools/src/story-management/__tests__/story-get-by-status.test.ts"

  - id: "DEBT-003"
    severity: medium
    category: technical_debt
    finding: "Duplicate field mapping code across query functions. storyGetStatus, storyGetByStatus, and storyGetByFeature all have identical mapping logic (lines 61-72, 62-72, 63-73 respectively). Also inconsistent with storyUpdateStatus which returns fewer fields. This creates 4 different data shapes that are hard to maintain if schema changes."
    suggested_action: "Create a shared helper function (e.g., formatStoryOutput) in story-management/utils/format.ts that maps story records to output shape. Use this consistently in all 4 functions. This aligns with CLAUDE.md requirement for component-specific utils directories."
    file: "packages/backend/mcp-tools/src/story-management/story-get-status.ts"
    estimated_effort: small

