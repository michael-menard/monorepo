updated: "2026-02-15T04:08:00Z"

waiver:
  active: false
  reason: ""
  approved_by: ""

# Top priority issues requiring attention
top_issues:
  - id: "SEC-001"
    severity: high
    finding: "Subprocess spawned with shell=true creates potential command injection vector"
    suggested_action: "Remove shell=true from spawn() call (5 minute fix, high impact)"
    file: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    line: 102

  - id: "PERF-001"
    severity: high
    finding: "Unbuffered string concatenation in subprocess stdout/stderr handlers causes O(n²) memory operations for large output"
    suggested_action: "Replace string concatenation with Buffer array pooling pattern"
    file: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    line: 109

  - id: "PERF-002"
    severity: high
    finding: "Subprocess execution blocks entire workflow with no resource limits"
    suggested_action: "Add maxBuffer, explicit timeout, and cleanup handling to spawn() options"
    file: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    line: 100

  - id: "SEC-002"
    severity: medium
    finding: "Path traversal vulnerability in workingDir parameter - no validation that paths stay within allowed bounds"
    suggested_action: "Add path validation to ensure workingDir and reportPath stay within sandbox"
    file: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    line: 204

  - id: "QUAL-001"
    severity: medium
    finding: "GraphStateWithDocSync interface violates CLAUDE.md Zod-first policy - uses TypeScript interface instead of Zod schema"
    suggested_action: "Convert GraphStateWithDocSync to Zod schema using GraphStateSchema.extend({ docSync: DocSyncResultSchema.optional() })"
    file: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    line: 66

  - id: "QUAL-002"
    severity: high
    finding: "Inconsistent exit code handling - line 212 checks 'exitCode !== 0 && exitCode !== 1' but logic for exit code 1 semantics is ambiguous"
    suggested_action: "Create exit code constants (EXIT_SUCCESS=0, EXIT_OUT_OF_SYNC=1) and clarify subprocess contract documentation"
    file: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    line: 212

  - id: "TEST-003"
    severity: medium
    finding: "Exit code boundary not tested - missing tests for edge cases like exitCode=127 (command not found), exitCode=-1, or exitCode=null"
    suggested_action: "Add tests for uncommon exit codes to validate error handling robustness"
    file: "packages/backend/orchestrator/src/nodes/workflow/__tests__/doc-sync.test.ts"

  - id: "PERF-003"
    severity: medium
    finding: "Regex scanning entire SYNC-REPORT.md file 4 times with separate patterns - cumulative overhead for large reports"
    suggested_action: "Consider single-pass parsing or line-based parsing for 1MB+ reports"
    file: "packages/backend/orchestrator/src/nodes/workflow/doc-sync.ts"
    line: 148

