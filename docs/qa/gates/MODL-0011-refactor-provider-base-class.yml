# All issues found
top_issues:
  - id: "PERF-001"
    severity: high
    finding: "Redundant environment variable parsing on every config load. parseFloat() and parseInt() operations occur before cache check even when configuration is cached."
    file: "packages/backend/orchestrator/src/providers/ollama.ts"
    line: 85
    suggested_action: "Move parseFloat/parseInt inside cache miss block. Only parse environment variables when cache is empty."
    category: performance

  - id: "TEST-001"
    severity: high
    finding: "Missing tests for checkEndpointAvailability() helper function (base.ts lines 172-243). Critical shared utility used by all providers has no direct test coverage."
    file: "packages/backend/orchestrator/src/providers/base.ts"
    line: 172
    suggested_action: "Add comprehensive test suite covering successful response, custom acceptableStatuses, timeout scenarios, cache behavior, and error handling."
    category: test_coverage

  - id: "DEBT-001"
    severity: high
    finding: "Static cache management across three providers creates testing complexity and state pollution risk. Each provider has three static caches that must be manually cleared in tests."
    file: "packages/backend/orchestrator/src/providers/base.ts"
    line: 286
    suggested_action: "Refactor static caches into instance-based cache managers for better test isolation and garbage collection."
    category: technical_debt

  - id: "QUAL-001"
    severity: high
    finding: "TypeScript/Language Limitation: Abstract method getCachedInstance() cannot be truly abstract. Each provider must implement identical cache retrieval logic (3x duplication) due to TypeScript static method constraints."
    file: "packages/backend/orchestrator/src/providers/base.ts"
    line: 394
    suggested_action: "Document unavoidable duplication clearly (already done). This is acceptable per MODL-0011 design decision."
    category: code_quality

  - id: "SEC-001"
    severity: medium
    finding: "API keys cached in static memory without eviction policy. Could accumulate multiple API keys if multiple configurations tested, potentially leaking credentials if process memory dumped."
    file: "packages/backend/orchestrator/src/providers/base.ts"
    line: 292
    suggested_action: "Implement LRU cache with eviction policy (noted as TODO MODL-0020). Cap cache size to 5 entries max."
    category: security
    cwe: "CWE-502"

  - id: "PERF-002"
    severity: medium
    finding: "SHA-256 hash computation on every model retrieval, even for cached models. configHash computed before checking cache in getModel()."
    file: "packages/backend/orchestrator/src/providers/base.ts"
    line: 325
    suggested_action: "Cache configHash as instance property or compute only on cache miss. Consider lightweight hash function for non-cryptographic use."
    category: performance

  - id: "QUAL-004"
    severity: medium
    finding: "Static cache access pattern is fragile. Pattern of accessing via `(this.constructor as typeof BaseProvider).instanceCache` is type-safe but non-obvious."
    file: "packages/backend/orchestrator/src/providers/base.ts"
    line: 341
    suggested_action: "Extract static cache access into protected helper method for clarity."
    category: code_quality

  - id: "QUAL-008"
    severity: medium
    finding: "Error handling asymmetry: OpenRouter and Anthropic throw errors on missing API keys, but Ollama gracefully falls back to default localhost."
    file: "packages/backend/orchestrator/src/providers/ollama.ts"
    line: 84
    suggested_action: "Decide on uniform error strategy and document asymmetric behavior explicitly."
    category: code_quality

  - id: "TEST-004"
    severity: medium
    finding: "Provider-specific checkAvailability() methods lack direct test coverage. Tests skip when API keys missing in CI environments."
    file: "packages/backend/orchestrator/src/providers/ollama.ts"
    line: 116
    suggested_action: "Add mocked tests for availability checks without requiring real API keys."
    category: test_coverage

  - id: "DEBT-004"
    severity: medium
    finding: "Environment variable parsing duplicated across three providers with identical structure. ~60 lines of boilerplate despite Zod schema framework."
    file: "packages/backend/orchestrator/src/providers/ollama.ts"
    line: 78
    suggested_action: "Create generic loadConfigFromEnv<T>(schema: ZodSchema, envVarPrefix: string): T utility function."
    category: technical_debt

