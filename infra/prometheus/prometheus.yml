global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'lego-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'langgraph-platform'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8123']

  # APIP-2030: Pipeline Supervisor health endpoint
  # Scrapes GET /health JSON body for monitoring drain/active job state.
  # Content-Type: application/json — Prometheus will scrape the JSON body as a metric target.
  # Note: For structured Prometheus metrics (gauges/counters), see APIP-2030 ELAB.yaml opp-2.
  - job_name: 'pipeline-supervisor'
    metrics_path: /health
    static_configs:
      - targets: ['pipeline-supervisor:9091']
