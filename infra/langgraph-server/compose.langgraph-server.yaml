# LangGraph Server Infrastructure
#
# Usage:
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml up -d          # Start all services
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml up -d langgraph-server  # Start server only
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml down           # Stop all services
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml down -v        # Stop and remove volumes
#
# Services:
#   LangGraph API:      http://localhost:8123
#   LangGraph Studio:   http://localhost:8124
#
# Reserved ports (DO NOT USE):
#   5432 - PostgreSQL (monorepo primary)
#   5433 - PostgreSQL (monorepo test)
#   6379 - Redis
#   9090 - Prometheus
#   3003 - Grafana
#   4317 - OTel gRPC
#   4318 - OTel HTTP
#   9000 - MinIO S3 API
#   9001 - MinIO Console
#
# Checkpoint DB: Aurora PostgreSQL (target via env vars below).
# Uses an isolated pg.Pool — NOT @repo/db — to avoid connection contention.
#
# NOTE: The placeholder image (python:3.11-slim) will be replaced by the
# actual LangGraph Platform image built in APIP-0030.

services:
  langgraph-server:
    image: python:3.11-slim
    container_name: langgraph-server
    # TODO(APIP-0030): Replace with the actual LangGraph Platform image, e.g.:
    #   image: langchain/langgraph-api:latest
    # or the custom image produced by the APIP-0030 build pipeline.
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "LangGraph server placeholder — replace image in APIP-0030" && sleep infinity
    ports:
      - '127.0.0.1:8123:8123'   # LangGraph REST API — bound to loopback only (not world-routable)
      - '127.0.0.1:8124:8124'   # LangGraph Studio UI — bound to loopback only (not world-routable)
    volumes:
      - langgraph_data:/app/data
    environment:
      # Checkpoint DB — isolated pool, NOT @repo/db
      # Targeting Aurora PostgreSQL; ALL values must be set via .env or secrets manager at deploy time.
      # SECURITY: No default values are provided for credentials or host.
      #   These variables MUST be set externally before starting the service.
      #   If any required variable is unset, the service will fail to start (intentional fail-fast).
      # WARNING: Any variable still showing REPLACE_ME at runtime has NOT been configured.
      LANGGRAPH_CHECKPOINT_DB_HOST: '${LANGGRAPH_CHECKPOINT_DB_HOST:?LANGGRAPH_CHECKPOINT_DB_HOST must be set to the Aurora cluster endpoint}'
      LANGGRAPH_CHECKPOINT_DB_PORT: '${LANGGRAPH_CHECKPOINT_DB_PORT:-5432}'
      LANGGRAPH_CHECKPOINT_DB_NAME: '${LANGGRAPH_CHECKPOINT_DB_NAME:-langgraph_checkpoints}'
      LANGGRAPH_CHECKPOINT_DB_USER: '${LANGGRAPH_CHECKPOINT_DB_USER:?LANGGRAPH_CHECKPOINT_DB_USER must be set to the service account username}'
      LANGGRAPH_CHECKPOINT_DB_PASSWORD: '${LANGGRAPH_CHECKPOINT_DB_PASSWORD:?LANGGRAPH_CHECKPOINT_DB_PASSWORD must be set via secrets manager or .env — never hardcode}'
      LANGGRAPH_CHECKPOINT_DB_POOL_MAX: '3'
      # TLS: enforce encrypted connections to Aurora PostgreSQL
      LANGGRAPH_CHECKPOINT_DB_SSL_MODE: '${LANGGRAPH_CHECKPOINT_DB_SSL_MODE:-require}'
      # LangGraph server runtime config
      LANGGRAPH_API_PORT: '8123'
      LANGGRAPH_STUDIO_PORT: '8124'
      # Graph store / persistence directory inside the container
      LANGGRAPH_DATA_DIR: '/app/data'
    healthcheck:
      # NOTE(SEC-004): /ok is unauthenticated by design (Docker health probe runs inside container).
      # The endpoint is only reachable from within the container itself (localhost).
      # External access is restricted by the 127.0.0.1 port binding above.
      test: ['CMD-SHELL', 'curl -sf http://localhost:8123/ok || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

volumes:
  langgraph_data:
