# LangGraph Server + Pipeline Supervisor — Docker Compose
#
# Services for the LangGraph Platform and autonomous pipeline execution environment.
#
# Usage:
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml up -d          # Start all services
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml down           # Stop all services
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml down -v        # Stop and remove volumes
#   docker compose -f infra/langgraph-server/compose.langgraph-server.yaml pull           # Pull latest pinned image
#
# Services:
#   LangGraph Platform API: http://localhost:8123
#   LangGraph Studio UI:    http://127.0.0.1:8124  (localhost-only, SEC-001)
#   Pipeline Supervisor:    http://localhost:9091   (health/liveness probes)
#   Redis:                  redis://localhost:6379  (pipeline job queue backend)
#
# Required environment variables:
#   LANGGRAPH_CHECKPOINT_DATABASE_URL  - Aurora PostgreSQL connection string for langgraph_checkpoint schema
#   REDIS_URL                          - Redis connection URL (default: redis://redis:6379)
#
# Integration:
#   APIP-0020 agents call this service at http://langgraph-platform:8123 (Docker network)
#   or http://localhost:8123 (host access)
#
# Port assignments (APIP-2030, confirmed free in compose environment):
#   9091 — pipeline-supervisor health HTTP server (GET /health, GET /live)
#
# APIP-0030: LangGraph Platform Docker deployment
# APIP-2030: Graceful Shutdown, Health Check, and Deployment Hardening

services:
  langgraph-platform:
    image: langchain/langgraph-api:0.0.9
    container_name: monorepo-langgraph-platform
    ports:
      - '8123:8123'           # LangGraph Platform API (public)
      - '127.0.0.1:8124:8124' # LangGraph Studio UI (localhost-only, SEC-001)
    volumes:
      - langgraph_data:/data
    environment:
      LANGGRAPH_CHECKPOINT_DATABASE_URL: ${LANGGRAPH_CHECKPOINT_DATABASE_URL}
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8123/ok || wget -q --spider http://localhost:8123/ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # One-shot init container: runs checkpoint schema initialization against Aurora.
  # Follows minio-init pattern: runs after platform is healthy, then exits.
  langgraph-checkpoint-init:
    image: langchain/langgraph-api:0.0.9
    container_name: monorepo-langgraph-checkpoint-init
    depends_on:
      langgraph-platform:
        condition: service_healthy
    environment:
      LANGGRAPH_CHECKPOINT_DATABASE_URL: ${LANGGRAPH_CHECKPOINT_DATABASE_URL}
    entrypoint: >
      /bin/sh -c "
      echo 'Running LangGraph checkpoint schema initialization...';
      python -m langgraph.checkpoint.postgres.init --database-url \"$$LANGGRAPH_CHECKPOINT_DATABASE_URL\" || true;
      echo 'Checkpoint schema initialization complete.';
      exit 0;
      "
    restart: 'no'

  # ─────────────────────────────────────────────────────────────────────────
  # Pipeline Supervisor
  #
  # Long-lived Node.js process that consumes BullMQ jobs and dispatches
  # to LangGraph worker graphs. Implements drain mode for zero-downtime deploys.
  #
  # AC-7: Docker HEALTHCHECK via CMD-SHELL curl -f /live
  # AC-11: stop_grace_period = drainTimeoutMs (600s) + 30s buffer = 630s
  # ─────────────────────────────────────────────────────────────────────────
  pipeline-supervisor:
    image: node:23-slim
    container_name: pipeline-supervisor
    working_dir: /app
    command: ['node', '--import', 'tsx/esm', 'src/supervisor/index.ts']
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PIPELINE_QUEUE_NAME: ${PIPELINE_QUEUE_NAME:-pipeline}
      PIPELINE_STAGE_TIMEOUT_MS: ${PIPELINE_STAGE_TIMEOUT_MS:-600000}
      # APIP-2030: Drain and health configuration
      SUPERVISOR_DRAIN_TIMEOUT_MS: ${SUPERVISOR_DRAIN_TIMEOUT_MS:-600000}
      SUPERVISOR_HEALTH_PORT: ${SUPERVISOR_HEALTH_PORT:-9091}
    ports:
      - '9091:9091'
    volumes:
      - ./apps/api/pipeline:/app:ro
    depends_on:
      - redis

    # AC-7: Docker HEALTHCHECK — liveness probe using GET /live
    # curl -f exits non-zero on HTTP 4xx/5xx, so a 200 from /live = healthy.
    # interval: 30s  — check every 30 seconds
    # timeout: 5s    — fail check if no response within 5 seconds
    # retries: 3     — mark unhealthy after 3 consecutive failures
    # start_period: 10s — grace period before first check (allow supervisor to start)
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9091/live || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # AC-11: stop_grace_period must be >= drainTimeoutMs + buffer
    # Default drain timeout = 600s (10 min). Buffer = 30s. Total = 630s.
    # Docker sends SIGTERM then waits stop_grace_period before sending SIGKILL.
    # If stop_grace_period < drainTimeoutMs, Docker kills the supervisor before
    # in-flight jobs can complete.
    stop_grace_period: 630s

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  # Redis — pipeline job queue backend
  # Can be replaced by external Redis via REDIS_URL env var.
  redis:
    image: redis:7-alpine
    container_name: pipeline-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  langgraph_data:
