AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Secrets Manager secrets for Autonomous Pipeline provider API keys (APIP-5004)'

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues:
      - staging
      - production
    Description: Deployment environment

Resources:
  # ─────────────────────────────────────────────────────────────────────────
  # Anthropic API Key Secret
  # ─────────────────────────────────────────────────────────────────────────

  AnthropicApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${Environment}/autonomous-pipeline/ANTHROPIC_API_KEY'
      Description: 'Anthropic API key for Claude model access via AnthropicProvider'
      # SecretString is NOT set here — inject via AWS CLI or Console after deployment:
      #   aws secretsmanager put-secret-value \
      #     --secret-id staging/autonomous-pipeline/ANTHROPIC_API_KEY \
      #     --secret-string "your-key-here"
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-apip-anthropic-api-key'
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: SecretsManager
        - Key: Feature
          Value: AutonomousPipeline
        - Key: Story
          Value: APIP-5004

  # ─────────────────────────────────────────────────────────────────────────
  # OpenRouter API Key Secret
  # ─────────────────────────────────────────────────────────────────────────

  OpenRouterApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${Environment}/autonomous-pipeline/OPENROUTER_API_KEY'
      Description: 'OpenRouter API key for multi-model access via OpenRouterProvider'
      # SecretString is NOT set here — inject via AWS CLI or Console after deployment:
      #   aws secretsmanager put-secret-value \
      #     --secret-id staging/autonomous-pipeline/OPENROUTER_API_KEY \
      #     --secret-string "your-key-here"
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-apip-openrouter-api-key'
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: SecretsManager
        - Key: Feature
          Value: AutonomousPipeline
        - Key: Story
          Value: APIP-5004

  # ─────────────────────────────────────────────────────────────────────────
  # MiniMax API Key Secret
  # ─────────────────────────────────────────────────────────────────────────

  MinimaxApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${Environment}/autonomous-pipeline/MINIMAX_API_KEY'
      Description: 'MiniMax API key for abab model access via MinimaxProvider'
      # SecretString is NOT set here — inject via AWS CLI or Console after deployment:
      #   aws secretsmanager put-secret-value \
      #     --secret-id staging/autonomous-pipeline/MINIMAX_API_KEY \
      #     --secret-string "your-key-here"
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-apip-minimax-api-key'
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: SecretsManager
        - Key: Feature
          Value: AutonomousPipeline
        - Key: Story
          Value: APIP-5004

Outputs:
  AnthropicApiKeySecretArn:
    Description: ARN of the Anthropic API key secret
    Value: !Ref AnthropicApiKeySecret
    Export:
      Name: !Sub '${Environment}-apip-anthropic-api-key-arn'

  OpenRouterApiKeySecretArn:
    Description: ARN of the OpenRouter API key secret
    Value: !Ref OpenRouterApiKeySecret
    Export:
      Name: !Sub '${Environment}-apip-openrouter-api-key-arn'

  MinimaxApiKeySecretArn:
    Description: ARN of the MiniMax API key secret
    Value: !Ref MinimaxApiKeySecret
    Export:
      Name: !Sub '${Environment}-apip-minimax-api-key-arn'
