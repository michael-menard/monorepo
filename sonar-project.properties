# SonarQube Project Configuration
# Project identification
sonar.projectKey=lego-moc-instructions-platform
sonar.projectName=LEGO MOC Instructions Platform
sonar.projectVersion=1.0

# Source code location
sonar.sources=apps,packages
sonar.sourceEncoding=UTF-8

# Exclude directories
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__tests__/**,**/playwright/**,**/.turbo/**

# Test files location
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript specific settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# JavaScript/TypeScript language settings
sonar.javascript.node.maxspace=4096

# Code coverage (will be generated by Vitest)
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**,**/test/**,**/tests/**

# Connection settings (default local)
sonar.host.url=http://localhost:9001
