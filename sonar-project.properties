sonar.projectKey=lego-moc-instructions-platform
sonar.projectName=LEGO MOC Instructions Platform
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=apps,packages
sonar.tests=apps,packages

# File inclusions/exclusions
sonar.inclusions=**/*.ts,**/*.tsx
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.config.ts,\
  **/*.config.js,\
  **/*.d.ts,\
  **/migrations/**,\
  **/*.tsbuildinfo,\
  **/sonarqube-plugins/**

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Coverage - lcov format from vitest --coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server (overridden by env vars in CI)
sonar.host.url=http://localhost:9001

# Token is read from SONAR_TOKEN env var — do not hardcode here
