# Docker Compose for Knowledge Base PostgreSQL with pgvector + PgBouncer
#
# Architecture:
#   MCP processes (port 5433) -> PgBouncer (transaction pooling) -> PostgreSQL
#
# PgBouncer multiplexes ~180 client connections down to ~30 actual Postgres
# connections, reducing resource usage and preventing connection exhaustion
# when running 60+ concurrent MCP agent processes.
#
# SECURITY WARNING: You MUST set KB_DB_USER and KB_DB_PASSWORD in your .env file.
# Do NOT use default credentials in any environment.
#
# Usage:
#   docker-compose up -d          # Start PostgreSQL + PgBouncer
#   docker-compose down           # Stop containers
#   docker-compose down -v        # Stop and remove volumes (reset data)
#   docker-compose logs -f        # Follow container logs
#
# The init/ directory contains SQL files that run automatically on first startup:
#   - 01-schema.sql: Creates tables and indexes
#   - 02-seed.sql: Inserts sample knowledge entries

services:
  kb-postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledge-base-postgres
    command: >-
      postgres
      -c max_connections=300
      -c statement_timeout=15000
      -c lock_timeout=5000
      -c idle_in_transaction_session_timeout=30000
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=256MB
      -c autovacuum_vacuum_scale_factor=0.02
      -c autovacuum_vacuum_cost_delay=2
    environment:
      POSTGRES_USER: ${KB_DB_USER:?KB_DB_USER must be set in .env file}
      POSTGRES_PASSWORD: ${KB_DB_PASSWORD:?KB_DB_PASSWORD must be set in .env file}
      POSTGRES_DB: ${KB_DB_NAME:-knowledgebase}
    # Postgres is only accessible via PgBouncer — no host port exposed
    expose:
      - "5432"
    volumes:
      - kb_postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KB_DB_USER} -d ${KB_DB_NAME:-knowledgebase}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kb-pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: knowledge-base-pgbouncer
    depends_on:
      kb-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${KB_DB_USER:?}:${KB_DB_PASSWORD:?}@kb-postgres:5432/${KB_DB_NAME:-knowledgebase}
      # SCRAM-SHA-256 auth passthrough (required for Postgres 16 default auth)
      AUTH_TYPE: scram-sha-256
      # Transaction pooling: connections are returned to pool after each transaction
      POOL_MODE: transaction
      # Max client connections PgBouncer will accept (from all MCP processes)
      MAX_CLIENT_CONN: 300
      # Actual connections PgBouncer opens to Postgres
      DEFAULT_POOL_SIZE: 30
      # Extra connections allowed above DEFAULT_POOL_SIZE during bursts
      RESERVE_POOL_SIZE: 10
      # How long to wait for a reserve connection before error (seconds)
      RESERVE_POOL_TIMEOUT: 3
      # Server-side idle timeout — close idle Postgres connections after 60s
      SERVER_IDLE_TIMEOUT: 60
      # Client-side idle timeout — close idle client connections after 300s
      CLIENT_IDLE_TIMEOUT: 300
      # Max time a query can run (matches Postgres statement_timeout)
      QUERY_TIMEOUT: 15
      # Log connections and disconnections for debugging
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
    ports:
      - "${KB_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  kb_postgres_data:
    name: knowledge_base_postgres_data
